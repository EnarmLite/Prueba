                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el tiempo máximo de paro cardíaco presenciado para que la toracotomía de reanimación en urgencias esté indicada y sea viable?", 
                options: ["5 minutos", "10 minutos", "15 minutos", "20 minutos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los pacientes que presentan heridas penetrantes torácicas con paro cardíaco presenciado o hipotensión profunda refractaria ameritan una toracotomía de reanimación urgente en el cubículo, siempre que el paro cardíaco documentado no haya superado un tiempo máximo límite de 15 minutos.<br><br>Perla ENARM: Un paro cardíaco postraumático con un tiempo de reanimación sin perfusión mayor a 15 minutos es indicación de futilidad para la toracotomía en la sala de emergencias.<br><br>Análisis de Distractores: Las ventanas de 5 (A) o 10 minutos (B) son excesivamente estrictas y negarían maniobras salvavidas a individuos con posibilidad de sobrevida sin daño isquémico terminal. Prolongar el intervalo a 20 minutos (D) o más garantiza un daño encefálico anóxico masivo irreversible donde el gasto operativo es inútil.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 2, 
                question: "Además del hematoma escrotal, ¿qué hallazgo a la inspección de extremidades inferiores sugiere fuertemente una fractura pélvica inestable?", 
                options: ["Deformidad rotacional de una pierna", "Ausencia de pulsos pedios bilaterales", "Cianosis distal simétrica", "Fístula arteriovenosa palpable"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la inestabilidad arquitectónica mayor del anillo pélvico provoca migración cefálica de la hemipelvis. A la inspección externa, el médico advertirá acortamiento o discrepancia obvia en la longitud de las extremidades inferiores junto a una grotesca deformidad rotacional de toda la pierna sin una fractura femoral visible.<br><br>Perla ENARM: La asimetría en la longitud de las piernas combinada con rotación externa extrema y un fémur intacto es el equivalente clínico ortopédico de fractura de pelvis desplazada inestable.<br><br>Análisis de Distractores: La falta de pulsos (B), cianosis (C) y fístulas (D) evidencian lesión directa intrínseca sobre la luz arterial iliofemoral, hallazgos de alto riesgo pero no criterios morfológicos mecánicos per se de la estructura esquelética del anillo pélvico colapsado.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 3, 
                question: "¿Cuál es la vía de elección para descomprimir el estómago en un paciente poli-traumatizado con signos de fractura de la base del cráneo?", 
                options: ["Sonda nasogástrica con guía", "Sonda orogástrica directa", "Tubo de gastrostomía endoscópico", "Catéter percutáneo subxifoideo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la descompresión temprana y eficaz previene la aspiración y alivia la dilatación aguda. En pacientes con trauma maxilofacial complejo, epistaxis masiva o signos clínicos de fractura de la base del cráneo, la vía debe ser obligatoriamente la boca (sonda orogástrica) para impedir la introducción iatrogénica del tubo a la bóveda intracraneal.<br><br>Perla ENARM: El signo del mapache o de Battle contraindica de manera formal y absoluta cualquier abordaje diagnóstico o terapéutico a través del lecho nasal.<br><br>Análisis de Distractores: Emplear la ruta nasogástrica (A), incluso con la ayuda de guías o endoscopia, expone la placa cribiforme lesionada. Las gastrostomías percutáneas (C, D) son procedimientos diferidos, nunca maniobras de reanimación de rescate en la revisión primaria inicial.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 4, 
                question: "¿Qué hallazgo urinario constituye la principal indicación clínica inmediata para obtener imágenes del tracto genitourinario postraumático?", 
                options: ["Hematuria microscópica leve", "Presencia de cilindros granulares", "Piuria estéril postraumática", "Hematuria macroscópica franca"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la evidencia de hematuria macroscópica, en conjunto a contusiones en el flanco, representa una indicación absoluta e innegociable para iniciar el rastreo radiológico formal del riñón, vejiga y uréter mediante tomografía computarizada con contraste intravenoso o uretrografía.<br><br>Perla ENARM: La orina de color rojo oscuro o vinoso (hematuria macroscópica) posibilitada por trauma obliga a investigar lesión parenquimatosa renal o laceración del colector vesical.<br><br>Análisis de Distractores: La hematuria microscópica (A) no obliga de forma genérica a solicitar imágenes complejas a menos que el paciente curse en estado de choque grave concomitante o sea trauma penetrante directo. Cilindros (B) y piuria (C) se relacionan a nefropatías médicas e infecciosas, ajenas a las fuerzas biomecánicas de ruptura.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 5, 
                question: "¿Cuál de las siguientes porciones del intestino grueso es vulnerable a lesiones retroperitoneales ocultas por carecer de recubrimiento peritoneal posterior?", 
                options: ["Colon ascendente", "Ciego y apéndice", "Colon transverso", "Colon sigmoides"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., tanto el colon ascendente como el descendente poseen caras posteriores adheridas permanentemente al espacio anatómico extraperitoneal o retroperitoneal posterior. El daño visceral en estas localizaciones suele enmascarar los signos de peritonitis anterior precoz, provocando retrasos mortales en el tratamiento y sepsis.<br><br>Perla ENARM: Una perforación penetrante del colon ascendente puede no generar gas libre subdiafragmático inicial ni respuesta peritoneal inflamatoria inmediata, al ser una víscera parcialmente retroperitoneal.<br><br>Análisis de Distractores: El colon transverso (C) y el sigmoides (D) viajan libres gracias a la extensión de sus respectivos mesocolon y mesenterio, siendo estructuras de comportamiento puramente intraperitoneal capaces de provocar dolor rápido. El ciego (B) suele revestirse de manera ventral e intraperitoneal masiva en su fondo.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 6, 
                question: "¿Qué estudio diagnóstico mínimamente invasivo es idóneo para confirmar la penetración diafragmática en una herida por arma blanca toracoabdominal izquierda?", 
                options: ["Toracocentesis con aguja", "Laparoscopia diagnóstica", "Lavado peritoneal diagnóstico", "Resonancia magnética de diafragma"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., cuando el paciente se encuentra hemodinámicamente estable tras sufrir heridas cortopunzantes en las áreas de transición toracoabdominal inferior, la laparoscopia diagnóstica resulta la herramienta más aceptada y confiable para visualizar de forma directa los pequeños cortes en la superficie del diafragma y reparar el defecto.<br><br>Perla ENARM: La evaluación de una herida toracoabdominal estabilizada se realiza mediante videolaparoscopia o toracoscopia diagnóstica con la finalidad de confirmar y corregir orificios diafragmáticos ocultos.<br><br>Análisis de Distractores: El LPD (C) o FAST pierden inmensa sensibilidad operativa en la musculatura del diafragma e ignoran fugas tisulares vacías. La toracocentesis (A) drena pleura pero no inspecciona músculo. La resonancia (D) es un gasto logístico y de tiempo absurdo para un evento hemorrágico latente en fase aguda.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 7, 
                question: "¿Qué estructuras anatómicas definen los límites vertical y caudal de la Zona I del cuello traumatizado?", 
                options: ["Ángulo mandibular y cricoides", "Base del cráneo y mandíbula", "Escotadura esternal y apófisis xifoides", "Clavículas y cartílago cricoides"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la topografía cervical ubica a la Zona I en el estrecho cérvico-torácico, extendiéndose superiormente desde las clavículas y escotadura supraesternal hasta alcanzar el margen inferior anatómico del cartílago cricoides.<br><br>Perla ENARM: La Zona I alberga la base vascular del cuello, comprendida topográficamente entre las clavículas y el cricoides.<br><br>Análisis de Distractores: La región entre el cartílago cricoides y el ángulo mandibular (A) representa a la Zona II. La anatomía supramandibular hasta la base del cráneo (B) define a la Zona III. La escotadura esternal y la apófisis xifoides (C) delimitan la silueta torácica central, situándose anatómicamente por debajo del compartimento cervical en cuestión.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 8, 
                question: "¿Dentro de qué ventana de tiempo máxima desde el traumatismo penetrante se debe administrar el ácido tranexámico para maximizar su eficacia?", 
                options: ["Primera hora", "Primeras dos horas", "Primeras tres horas", "Primeras seis horas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el control farmacológico de la exanguinación y coagulopatía en entornos limitados o severos avala el empleo estricto de ácido tranexámico siempre y cuando se administre de manera temprana dentro de un umbral máximo de las primeras tres horas post-evento lesivo penetrante.<br><br>Perla ENARM: La administración oportuna de agentes antifibrinolíticos como el ácido tranexámico no debe retrasarse jamás más allá de las primeras 3 horas de suscitado el trauma masivo.<br><br>Análisis de Distractores: Las opciones (A) o (B) resultan ideales terapéuticamente pero omiten el periodo máximo útil protocolizado en donde la estabilización del coágulo previene todavía de manera óptima la fibrinólisis endógena temprana. Postergarlo a las 6 horas (D) incrementa paradójicamente el riesgo de un perfil trombogénico y mortalidad tardía sin brindar control agudo del sangrado.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 9, 
                question: "De acuerdo a la clasificación de la lesión aórtica cerrada, ¿cuál grado anatómico representa un pseudoaneurisma que requiere reparación quirúrgica?", 
                options: ["Grado I", "Grado II", "Grado III", "Grado IV"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el espectro de daño aórtico se estratifica anatómicamente. El Grado I es desgarro íntimo; el Grado II es hematoma intramural; y el Grado III se define por la deformación transmural originando un pseudoaneurisma sacular contenido. Las lesiones III y IV requieren recomendación operativa o endovascular mandatoria.<br><br>Perla ENARM: Todo paciente categorizado con una lesión aórtica Grado III (pseudoaneurisma) demanda obligatoriamente reparación quirúrgica endovascular con stent.<br><br>Análisis de Distractores: El Grado IV (D) significa ruptura libre exanguinante al espacio pleural. El Grado I (A) y Grado II (B) son frecuentemente controlables y curables con estricto manejo antihipertensivo primario utilizando beta-bloqueadores de acción rápida sin abrir quirófano.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 10, 
                question: "En el traumatismo penetrante de cuello, ¿qué síndrome neurológico ipsilateral alerta sobre daño severo a la cadena simpática cervical?", 
                options: ["Síndrome de Wallenberg", "Síndrome de Horner", "Síndrome de Brown-Séquard", "Síndrome de Claude Bernard"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la exploración del tronco simpático lesionado por arma blanca o contusión cervical arroja la clásica aparición homolateral del síndrome de Horner, caracterizado por miosis, ptosis palpebral y anhidrosis.<br><br>Perla ENARM: La tríada clásica de miosis, ptosis y anhidrosis tras un traumatismo de cuello confirma seccionamiento ineludible de la vía simpática cervical.<br><br>Análisis de Distractores: El síndrome de Wallenberg (A) obedece a un infarto isquémico bulbar intracraneal. El síndrome de Brown-Séquard (C) denota hemisección medular con déficit sensitivo-motor cruzado. El síndrome de Claude Bernard (D) es un distractor epónimo incompleto; en cirugía de trauma a la triada simpática se le llama Horner, y Bernard suele evocar descripciones de fisiología metabólica ajenas a este contexto de urgencia quirúrgica.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 11, 
                question: "¿A qué nivel intercostal se eleva anatómicamente el diafragma durante una espiración completa?", 
                options: ["Cuarto espacio intercostal", "Quinto espacio intercostal", "Sexto espacio intercostal", "Séptimo espacio intercostal"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el diafragma puede ascender cefálicamente hasta el nivel del cuarto espacio intercostal durante la fase de espiración máxima. Por este motivo, cualquier fractura costal inferior o herida penetrante debajo de la línea de los pezones tiene una alta probabilidad de perforar vísceras intraabdominales.<br><br>Perla ENARM: Toda herida torácica ubicada por debajo del cuarto espacio intercostal (nivel mamilar) debe ser evaluada intencionadamente para descartar lesión abdominal concomitante.<br><br>Análisis de Distractores: El quinto (B), sexto (C) y séptimo (D) espacio intercostal son niveles topográficos más caudales; la cúpula diafragmática máxima alcanza el cuarto espacio protegiendo estructuras como el hígado, el bazo y el estómago dentro de la caja torácica inferior.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 12, 
                question: "¿Qué complicación infecciosa severa se previene al retirar tampones inadvertidos durante la exploración vaginal de una paciente traumatizada inconsciente?", 
                options: ["Embolismo séptico", "Sepsis tardía", "Fístula rectovaginal", "Sangrado pélvico"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la evaluación de mujeres inconscientes en edad fértil debe incluir obligatoriamente el examen para descartar la presencia de tampones vaginales, ya que dejarlos in situ por tiempo prolongado durante la hospitalización puede precipitar el desarrollo de sepsis tardía (como el síndrome de choque tóxico).<br><br>Perla ENARM: La exploración pélvica de la paciente politraumatizada inconsciente debe identificar y retirar cuerpos extraños intravaginales para prevenir complicaciones sépticas diferidas.<br><br>Análisis de Distractores: La fístula rectovaginal (C) y el sangrado pélvico (D) derivan de las esquirlas óseas de una fractura pélvica lacerando los tejidos blandos, no de retención de dispositivos de higiene. El embolismo séptico (A) se relaciona a tromboflebitis o endocarditis sistémica.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 13, 
                question: "¿Qué parámetro anatómico delimita la frontera superior de la región de los flancos en la evaluación del paciente traumatizado?", 
                options: ["Cuarto espacio intercostal", "Octavo espacio intercostal", "Sexto espacio intercostal", "Décimo espacio intercostal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el flanco se define topográficamente como el área comprendida entre las líneas axilares anterior y posterior, extendiéndose desde el sexto espacio intercostal superiormente hasta la cresta ilíaca de forma inferior.<br><br>Perla ENARM: El área de los flancos tiene como margen superior el nivel del sexto espacio intercostal y protege anatómicamente al retroperitoneo mediante su grosor muscular.<br><br>Análisis de Distractores: El cuarto espacio (A) marca el nivel del diafragma anterior. El octavo (B) y décimo espacio (D) quedan por debajo de la delimitación craneal oficial de la zona lateral toracoabdominal del flanco.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 14, 
                question: "¿Cuál es el principal riesgo de colocar un collarín espinal rígido de manera rutinaria en un paciente con traumatismo penetrante en el cuello?", 
                options: ["Aumento de presión intracraneal", "Obstrucción de la vía aérea", "Disección arterial carotídea", "Ocultar heridas y retrasar evaluación"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los pacientes con traumatismo penetrante en el cuello sin compromiso neurológico directo o lesión ósea obvia no requieren restricción rutinaria del movimiento cervical. El uso de collarines en estos escenarios oculta las heridas, dificulta la hemostasia y retrasa el diagnóstico de lesiones vasculares exanguinantes.<br><br>Perla ENARM: La inmovilización cervical rutinaria está desaconsejada en el traumatismo penetrante aislado del cuello ya que interfiere con la evaluación vascular y el control del sangrado.<br><br>Análisis de Distractores: Si bien un collarín muy ajustado podría incrementar la presión venosa (A) o distorsionar la anatomía anterior (B), la contraindicación absoluta obedece a la incapacidad visual y física de atender una hemorragia penetrante en las zonas del cuello. La disección carotídea (C) es causada por el propio trauma, no por el dispositivo.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 15, 
                question: "En la población pediátrica, ¿cuántas veces más letal es estadísticamente una lesión por arma de fuego frente a una colisión vehicular?", 
                options: ["7.8 veces", "2.5 veces", "4.2 veces", "10.5 veces"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las heridas por proyectil de arma de fuego tienen una letalidad desproporcionada en la edad infantil, siendo 7.8 veces más probables de provocar la muerte en un paciente pediátrico en comparación con los mecanismos cerrados de un accidente de tránsito.<br><br>Perla ENARM: El trauma penetrante pediátrico por arma de fuego exhibe un riesgo de letalidad casi 8 veces mayor que los accidentes vehiculares cerrados, requiriendo cirugía inmediata con alta frecuencia.<br><br>Análisis de Distractores: Cifras como 2.5 (B), 4.2 (C) y 10.5 veces (D) no corresponden a la estadística epidemiológica exacta resaltada por las directrices del curso avanzado de apoyo vital en trauma para poblaciones pediátricas.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 16, 
                question: "¿Qué marcador bioquímico sérico puede resultar normal en las fases iniciales a pesar de existir una fractura pancreática estructural?", 
                options: ["Lipasa", "Fosfatasa alcalina", "Deshidrogenasa láctica", "Amilasa"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., un nivel sérico de amilasa normal en la etapa aguda temprana no descarta en absoluto un traumatismo pancreático mayor. La secreción enzimática al torrente sanguíneo tarda horas en elevarse de forma fidedigna.<br><br>Perla ENARM: La amilasa sérica normal en las primeras horas posteriores al trauma no excluye lesión pancreática contusa, siendo indispensable basarse en la cinemática del trauma epigástrico.<br><br>Análisis de Distractores: La lipasa (A) es específica para patología pancreática médica pero comparte la ventana de falsos negativos precoces postraumáticos. La deshidrogenasa láctica (C) y la fosfatasa alcalina (B) carecen de sensibilidad o relación directa útil para el cribado de lesión contusa retrogástrica o pancreática en urgencias.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 17, 
                question: "¿A partir de qué umbral de frecuencia cardíaca se otorga un punto diagnóstico en la escala de Evaluación del Consumo de Sangre?", 
                options: ["120 latidos por minuto", "100 latidos por minuto", "110 latidos por minuto", "130 latidos por minuto"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la puntuación ABC (Assessment of Blood Consumption) suma puntos basándose en variables clínicas simples para activar un protocolo de transfusión masiva. Una frecuencia cardíaca igual o mayor a 120 latidos por minuto proporciona un punto positivo en este score.<br><br>Perla ENARM: El score ABC otorga un punto a la taquicardia severa mayor o igual a 120 lpm, alertando sobre pérdida de volumen intravascular crítica.<br><br>Análisis de Distractores: Valores de 100 (B) o 110 lpm (C) reflejan respuesta simpática temprana pero no alcanzan el umbral validado de choque avanzado del score. Un valor de 130 lpm (D) es patológico, pero el límite de corte oficial comienza en los 120 latidos por minuto.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 18, 
                question: "¿Qué secuela vascular intraluminal aguda está estrechamente documentada como lesión asociada a la compresión abdominal por cinturón de seguridad?", 
                options: ["Pseudoaneurisma esplénico", "Transección de vena cava", "Disección de arteria renal", "Trombosis de arteria ilíaca"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la presión transversal que ejerce un cinturón de seguridad contra el retroperitoneo óseo lumbar durante la desaceleración abrupta puede provocar, además de desgarros intestinales (asa de balde), la disrupción de la íntima y trombosis secundaria de la aorta abdominal o la arteria ilíaca.<br><br>Perla ENARM: La trombosis de la aorta abdominal distal o de las arterias ilíacas es la complicación vascular característica del síndrome de restricción por cinturón de seguridad.<br><br>Análisis de Distractores: La transección de vena cava (B) o disección renal (C) se asocian a mecanismos de cizallamiento vertical o caídas de altura. El pseudoaneurisma esplénico (A) responde a traumatismos esplénicos cerrados parenquimatosos directos, no típicamente a la fricción de la correa abdominal.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 19, 
                question: "¿Cuál es el manejo inicial prequirúrgico idóneo para la evisceración del intestino o epiplón tras una herida abdominal abierta?", 
                options: ["Reducción manual inmediata", "Mantener húmedo y cubierto", "Lavado con solución yodada", "Resección del tejido expuesto"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las vísceras expuestas a través de un defecto en la pared abdominal no deben ser empujadas o reducidas nuevamente hacia la cavidad intraperitoneal en el cubículo. El tejido debe ser protegido manteniéndolo húmedo con solución salina tibia y cubierto con apósitos estériles hasta el momento de la laparotomía exploradora.<br><br>Perla ENARM: El tejido eviscerado debe envolverse en apósitos estériles humedecidos; bajo ninguna circunstancia se debe intentar su reducción manual en el área de urgencias.<br><br>Análisis de Distractores: La reducción manual (A) introduciría masivamente bacterias cutáneas e incrementaría el daño vascular al comprimir el tejido en el defecto de la fascia. Soluciones yodadas (C) son tóxicas para el peritoneo seroso y mucoso. Resecar el tejido (D) en urgencias es una imprudencia quirúrgica absoluta.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 20, 
                question: "¿Cuál es el plan de abordaje para una lesión aislada confirmada de órgano sólido abdominal si el paciente mantiene una fisiología hemodinámica normal?", 
                options: ["Manejo no operatorio", "Empaquetamiento preperitoneal", "Laparotomía exploradora urgente", "Angioembolización profiláctica"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los traumatismos de órganos sólidos (hígado, bazo o riñón) en un paciente con constante estabilidad hemodinámica y sin signos de peritonitis frecuentemente se manejan de manera no operatoria (conservadora). Esto exige ingreso a un área de monitoreo para evaluaciones clínicas repetidas por un cirujano.<br><br>Perla ENARM: La estabilidad hemodinámica es el principal determinante clínico que autoriza un manejo no operatorio con estricta observación en lesiones aisladas de hígado o bazo.<br><br>Análisis de Distractores: La laparotomía (C) se reserva únicamente para choque o extravasación activa incontrolable. El empaquetamiento (B) atiende la fractura pélvica masiva extraperitoneal. La embolización (D) actúa como adjunto si hay un blush arterial visible en la TC, pero no se aplica rutinariamente de forma profiláctica a todas las lesiones sólidas estables.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 21, 
                question: "¿Qué meta de presión arterial media se permite temporalmente en un entorno de escasos recursos sin disponibilidad de sangre para limitar la exanguinación?", 
                options: ["50 mmHg", "70 mmHg", "60 mmHg", "80 mmHg"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., en entornos carentes de productos sanguíneos para la restitución formal, se acepta la reanimación de control de daños con una tolerancia a la hipotensión permisiva (presión arterial media cercana a 60 mmHg) para evitar que los ascensos súbitos de tensión revienten los coágulos frágiles y reactiven la hemorragia.<br><br>Perla ENARM: La reanimación hipotensiva permisiva (PAM de 60 mmHg) se instituye como puente crítico para restringir el sangrado activo cuando los hemoderivados no están disponibles en la escena.<br><br>Análisis de Distractores: Una PAM de 50 mmHg (A) o menor cruza el umbral de isquemia coronaria y cerebral crítica irreversible. Metas de 70 (B) y 80 mmHg (D) son valores normotensos que exacerban de inmediato la fuga hidráulica de las laceraciones arteriales no controladas.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 22, 
                question: "¿Cuál incisión quirúrgica se requiere clásicamente para lograr el control vascular de una herida penetrante oculta en la Zona I del cuello?", 
                options: ["Incisión cervical transversa", "Abordaje submandibular", "Cervicotomía posterolateral", "Esternotomía o toracotomía"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la Zona I cervical comprende el estrecho cérvico-torácico, albergando la raíz de los grandes vasos (tronco innominado, origen subclavio). El acceso quirúrgico expedito a estas estructuras profundas no es posible solo por el cuello, requiriendo ineludiblemente una toracotomía o esternotomía media.<br><br>Perla ENARM: Las lesiones exanguinantes comprobadas en la Zona I del cuello demandan una extensión del campo operatorio hacia el tórax anterior mediante esternotomía media o toracotomía anterolateral.<br><br>Análisis de Distractores: Las incisiones altas, como el abordaje submandibular (B), operan la Zona III. Las cervicotomías puras (A, C) carecen de exposición adecuada para pinzar proximalmente la aorta o la subclavia intrapleural, resultando ineficaces en el control del daño vascular torácico superior.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 23, 
                question: "A diferencia del paciente con traumatismo craneoencefálico cerrado, ¿cuál es el estado sistémico inicial que caracteriza a una herida cefálica abierta extensa?", 
                options: ["Choque hemorrágico", "Choque neurogénico", "Herniación amigdalina", "Diabetes insípida"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., a diferencia del trauma encefálico cerrado que raramente origina descompensación hemodinámica aislada en el adulto, las lesiones craneales penetrantes laceran directamente el vasto plexo vascular del cuero cabelludo y los grandes senos venosos durales, precipitándose un choque hemorrágico franco puramente por pérdida externa craneal.<br><br>Perla ENARM: El traumatismo craneal penetrante es una de las pocas etiologías neurológicas que puede provocar exanguinación directa y choque hemorrágico por exposición de los senos venosos.<br><br>Análisis de Distractores: El choque neurogénico (B) deriva de lesiones medulares cervicales o torácicas altas con pérdida del tono simpático. La herniación (C) y la diabetes insípida (D) son complicaciones neurológicas intrínsecas tardías de la hipertensión endocraneal severa y la compresión del tallo, pero no explican la hipotensión aguda exanguinante del ingreso.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 24, 
                question: "¿Qué estructuras anatómicas conforman el límite natural inferior de la pared abdominal anterior en la semiología del trauma?", 
                options: ["Músculos rectos del abdomen", "Espinas ilíacas anterosuperiores", "Ligamentos inguinales y sínfisis", "Pliegues interglúteos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la división topográfica estandarizada para la inspección y el triage estipula que el abdomen anterior termina de manera caudal en el trayecto de los ligamentos inguinales bilateralmente y la unión central de la sínfisis del pubis.<br><br>Perla ENARM: El margen inferior del abdomen anterior está constituido por el ligamento inguinal y la sínfisis del pubis, estructurando la transición diagnóstica hacia la fosa pélvica y los miembros pélvicos.<br><br>Análisis de Distractores: Las espinas ilíacas (B) son prominencias óseas puntuales pélvicas, mas no la barrera lineal transversal completa. Los rectos del abdomen (A) corren verticalmente. Los pliegues glúteos (D) limitan la anatomía perineal y posterior de la pelvis inferior.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 25, 
                question: "¿Qué lesión torácica interna severa puede presentarse como daño directo por el impacto contuso del despliegue de la bolsa de aire?", 
                options: ["Laceración hepática", "Hernia diafragmática", "Rotura aórtica", "Lesiones cardíacas"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., si bien las bolsas de aire reducen la incidencia de daño letal maxilofacial y craneal, el vector frontal de desaceleración brutal y la expansión pirotécnica del dispositivo originan fuerzas de compresión precordial directas que propician contusiones y lesiones miocárdicas o cardíacas estructurales severas, especialmente sin uso de cinturón.<br><br>Perla ENARM: El despliegue a gran velocidad de una bolsa de aire frontal debe poner en alerta clínica sobre la presencia de contusión o trauma cardíaco oculto secundario al contacto directo.<br><br>Análisis de Distractores: La rotura aórtica (C) y el desgarro diafragmático (B) responden mecánicamente al cizallamiento y al efecto en \"prensa\" abdominal, no al impacto cutáneo superficial del globo neumático. La laceración hepática (A) se asocia típicamente con el reborde del volante o el cinturón inferior.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 26, 
                question: "¿Cómo se clasifica a la trayectoria balística craneal que golpea la tabla ósea sin penetrar el encéfalo, pero que fractura el cráneo por energía cinética?", 
                options: ["Perforación", "Tangencial", "Rebote", "Derrape"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., una lesión es tangencial cuando el proyectil roza o impacta oblicuamente la superficie de la cabeza y continúa su vuelo sin penetrar la masa cerebral, pero transfiriendo energía suficiente para fracturar el cráneo y originar contusiones corticales subyacentes.<br><br>Perla ENARM: El disparo tangencial a la bóveda craneal carece de trayecto intracerebral pero origina invariablemente hundimientos óseos y contusión hemorrágica focal subyacente de alto riesgo.<br><br>Análisis de Distractores: La perforación (A) crea un orificio de entrada y salida con túnel parenquimatoso. El rebote (C) describe un proyectil que penetra la cavidad craneal y choca contra la tabla interna ósea opuesta sin salir. El derrape (D) penetra el cráneo y desliza superficialmente sobre la corteza sin clavarse profundo, dañando los senos venosos.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 27, 
                question: "¿Qué objetivo clínico fundamental se persigue al realizar un tacto rectal como parte inicial de la exploración del traumatismo cerrado de pelvis?", 
                options: ["Palpar la próstata", "Extraer impactación fecal", "Evaluar mucosa y esfínter", "Comprobar reflejo bulbocavernoso"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., en el entorno de un traumatismo abdominal o pélvico cerrado, el propósito primario y justificado del examen digital rectal es investigar el tono del esfínter anal (riesgo neurológico) y palpar disrupciones de la integridad de la mucosa rectal por espículas óseas.<br><br>Perla ENARM: La integridad de la mucosa rectal y la valoración neurológica del esfínter anal son los únicos pilares que justifican el tacto rectal rutinario en el trauma pélvico.<br><br>Análisis de Distractores: Palpar la próstata \"flotante\" (A) ha demostrado ser impreciso y no fidedigno en urgencias en comparación con la uretrografía. Extraer impactación fecal (B) responde a manejo de estreñimiento geriátrico, irrelevante en reanimación hídrica aguda. El reflejo bulbocavernoso (D) se evoca traccionando ligeramente la sonda o comprimiendo el glande, no estrictamente por la exploración de la pared posterior rectal.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 28, 
                question: "¿En qué escenario clínico de trauma inestable se encuentra formalmente contraindicada la colocación de un balón endovascular intraaórtico (REBOA)?", 
                options: ["Choque hemorrágico profundo", "Previo al traslado a otro hospital", "Sospecha de fractura pélvica", "En pacientes sin pulso femoral"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el dispositivo REBOA detiene la perfusión general distal al globo provocando isquemia rápida grave. Jamás debe considerarse una herramienta temporal para alistar y trasladar a un paciente a otra instalación; su inflado solo es permisible si el quirófano para la hemostasia definitiva está disponible e inmediato en el mismo hospital.<br><br>Perla ENARM: El REBOA es un puente oclusivo intrahospitalario a la mesa de operaciones; su uso está absolutamente contraindicado si se planea el traslado interhospitalario del paciente traumatizado.<br><br>Análisis de Distractores: El choque hemorrágico grave (A) y la fractura pélvica exanguinante (C) son las indicaciones diana idóneas de primera línea para la inserción del dispositivo. Las alteraciones del pulso (D) complican su acceso percutáneo, pero la falta de intervención quirúrgica definitiva inmediata (traslado) es la única barrera logística que veta éticamente la terapia.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 29, 
                question: "¿Qué porcentaje estadístico de pacientes diagnosticados con una lesión esplénica o hepática aislada sufre simultáneamente daño en una víscera hueca?", 
                options: ["Mayor al 50%", "Menor al 25%", "Menor al 15%", "Menor al 5%"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la asociación fisiopatológica de un traumatismo contuso puro sobre una víscera maciza no predice habitualmente perforación entérica. La lesión concomitante comprobada de la víscera hueca ocurre en menos del 5% de los individuos diagnosticados inicialmente con lesiones de órganos sólidos aisladas.<br><br>Perla ENARM: El hallazgo de líquido periesplénico o perihepático aislado responde en el 95% de los casos puramente a la lesión sólida, siendo extremadamente rara (menos del 5%) la co-perforación intestinal inadvertida en trauma cerrado sin marcadores peritoneales directos.<br><br>Análisis de Distractores: Porcentajes de 15% (C), 25% (B) o 50% (A) generarían que el manejo conservador no operatorio fuese un acto de impericia extrema, cuando en realidad la bajísima incidencia real de lesión hueca oculta (5%) es lo que valida el tratamiento expectante en la actualidad.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 30, 
                question: "¿Qué medida farmacológica de cobertura se indica obligatoriamente al colocar un tubo de toracostomía tras recibir un traumatismo torácico penetrante?", 
                options: ["Antibióticos de amplio espectro", "Anticoagulación sistémica", "Ácido tranexámico local", "Corticosteroides intravenosos"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las heridas penetrantes arrastran piel, tela y pólvora hacia la cavidad pleural. Insertar un tubo de drenaje introduce aún más colonización percutánea a la herida; por ello, la indicación protocolizada y preventiva universal dicta administrar siempre una dosis de profilaxis con antibióticos al instaurar una sonda pleural en trauma abierto.<br><br>Perla ENARM: La profilaxis antibiótica sistémica inmediata es una pauta imperativa estandarizada previa o durante la colocación de sondas de toracostomía de emergencia por heridas transfixiantes de tórax.<br><br>Análisis de Distractores: El ácido tranexámico se dosifica por vía sistémica en la primera hora, no en lavado local pleural (C). Los corticoesteroides (D) inhiben la reparación temprana y empeoran la sepsis. Los anticoagulantes (B) transformarían el lecho del daño contuso pulmonar en un hemotórax masivo progresivo.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 31, 
                question: "¿Qué espacio anatómico es evaluado de manera deficiente tanto por el lavado peritoneal diagnóstico como por el rastreo ecográfico FAST?", 
                options: ["Saco de Douglas", "Fosa hepatorrenal", "Espacio retroperitoneal", "Cavidad pericárdica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el espacio retroperitoneal alberga estructuras críticas como la aorta, vena cava y riñones, pero debido a su localización profunda detrás del revestimiento peritoneal, sus lesiones son de difícil detección clínica temprana. Ni el LPD ni el examen FAST logran visualizar o evaluar adecuadamente esta región anatómica aislada.<br><br>Perla ENARM: La principal limitación diagnóstica del FAST y del LPD es su incapacidad absoluta para evaluar la presencia de sangre o líquido en el espacio retroperitoneal.<br><br>Análisis de Distractores: El saco de Douglas (A), la fosa hepatorrenal (B) y la cavidad pericárdica (D) son precisamente las ventanas anatómicas intraperitoneales y torácicas que el estudio FAST evalúa con altísima sensibilidad y especificidad estandarizada.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 32,

            {

            {

            {

                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExaATLS502Progress');
                localStorage.removeItem('ExaATLS502LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>

                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>

                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">

                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS502Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS502LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS502LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS502Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');

            localStorage.theme = isDark ? 'dark' : 'light';

            document.getElementById('moon-icon').classList.toggle('hidden');
        }
