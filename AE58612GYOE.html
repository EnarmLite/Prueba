                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el tiempo mínimo de espera entre 2 mediciones de presión arterial para confirmar el diagnóstico clínico de hipertensión?",
        options: ["30 minutos", "2 horas", "15 minutos", "6 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, el diagnóstico exige 2 tomas espaciadas para evitar diagnósticos erróneos derivados del estrés agudo o la actividad física reciente.<br><br>Perla ENARM: \"La hipertensión durante el embarazo se define como una elevación de la presión arterial sistólica ≥ 140 mmHg y presión arterial diastólica ≥ 90 mmHg, considerando al menos 2 mediciones, tomadas por lo menos con 15 minutos de diferencia, realizadas en el mismo brazo\".<br><br>Análisis de Distractores: 30 minutos y 2 horas son intervalos arbitrarios no avalados como límite inferior. 6 horas representa el tiempo máximo aceptado para la segunda medición confirmatoria, no el intervalo mínimo.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Atención, Página 37."
    },
    {
        id: 2,
        question: "¿A partir de qué valor en la tira reactiva de orina se debe sospechar proteinuria significativa y solicitar prueba confirmatoria?",
        options: ["≥ 2+", "≥ 1+", "≥ 3+", "Trazas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, el escrutinio inicial de daño endotelial glomerular requiere alta sensibilidad; cualquier positividad clara justifica un estudio cuantitativo.<br><br>Perla ENARM: \"Se debe sospechar proteinuria significativa cuando la tira reactiva urinaria es ≥ 1+\".<br><br>Análisis de Distractores: Valores de ≥ 2+ o ≥ 3+ representan estadios avanzados y retrasan el abordaje si se esperan como umbral. Trazas es un resultado inconcluso dependiente de la concentración urinaria y no obliga por sí solo a la confirmación inmediata.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Diagnóstico, Página 44."
    },
    {
        id: 3,
        question: "¿Cuál es la dosis y el horario de administración recomendados para el ácido acetilsalicílico como intervención preventiva?",
        options: ["150 mg matutinos", "300 mg en ayuno", "500 mg cada 12 horas", "60 a 100 mg nocturnos"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, la inhibición selectiva del tromboxano A2 plaquetario requiere dosis bajas para no afectar la prostaciclina endotelial, optimizando su perfil cronofarmacológico por la noche.<br><br>Perla ENARM: \"El ácido acetilsalicílico debe tomarse en una dosis baja (60 a 100 mg/día), administrada por la noche, al inicio del diagnóstico del embarazo hasta la semana 16 de gestación\".<br><br>Análisis de Distractores: 150 mg, 300 mg y 500 mg corresponden a dosis analgésicas o antiinflamatorias que bloquean también la prostaciclina vasodilatadora e incrementan el riesgo de hemorragia, perdiendo el efecto protector.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Prevención, Página 32."
    },
    {
        id: 4,
        question: "¿Qué suplementos están expresamente contraindicados para la prevención primaria de esta patología?",
        options: ["Carbonato de calcio", "Sulfato de magnesio", "Ácido acetilsalicílico", "Vitaminas C y E"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, las intervenciones antioxidantes no reducen la incidencia de la patología y carecen de impacto fisiopatológico comprobado.<br><br>Perla ENARM: \"No se recomienda el consumo de los siguientes suplementos cuando se utilizan únicamente con el objetivo de prevenir hipertensión durante el embarazo: Magnesio, Ácido fólico, Vitaminas C y E, Aceites de pescado, Ajo\".<br><br>Análisis de Distractores: El carbonato de calcio sí está indicado en dietas deficientes (< 600 mg). El ácido acetilsalicílico es la profilaxis farmacológica universal. El sulfato de magnesio es tratamiento anticonvulsivo, pero su contraindicación preventiva es oral, siendo las vitaminas el distractor clásico de tamizaje inefectivo.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Prevención, Página 35."
    },
    {
        id: 5,
        question: "¿Cuál es el parámetro respiratorio mínimo que indica tolerancia y ausencia de toxicidad durante la infusión de sulfato de magnesio?",
        options: ["> 10 respiraciones por minuto", "> 16 respiraciones por minuto", "> 12 respiraciones por minuto", "> 20 respiraciones por minuto"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, el catión deprime la unión neuromuscular; el diafragma es altamente sensible a niveles séricos tóxicos.<br><br>Perla ENARM: \"Se recomienda realizar monitoreo clínico de la paciente con sulfato de magnesio evaluando: Reflejo rotuliano presente, Frecuencia respiratoria mayor a 16 respiraciones /minuto, Diuresis mayor a 100 ml/h\".<br><br>Análisis de Distractores: Valores ≤ 16, como > 10 o > 12 rpm, indican depresión respiratoria inaceptable que exige suspensión y aplicación de gluconato de calcio. > 20 rpm es taquipnea y excede el umbral estricto de vigilancia neurológica.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Tratamiento, Página 69."
    },
    {
        id: 6,
        question: "En un cuadro grave, ¿cuál es la meta terapéutica estricta de control para la presión arterial diastólica?",
        options: ["< 90 mmHg", "110 a 120 mmHg", "90 a 105 mmHg", "80 a 89 mmHg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, un descenso excesivo causa hipoperfusión placentaria por pérdida del gradiente fisiológico.<br><br>Perla ENARM: \"En la mujer con preeclampsia grave debe considerarse como objetivo lograr presiones sistólicas entre 140-155 y diastólicas entre 90 y 105 mmHg\".<br><br>Análisis de Distractores: Reducir a < 90 mmHg o 80 a 89 mmHg compromete el flujo uteroplacentario. Mantener 110 a 120 mmHg perpetúa el riesgo de hemorragia cerebral materna.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Tratamiento, Página 61."
    },
    {
        id: 7,
        question: "¿Con cuánto tiempo de antelación se presentan de forma habitual los fosfenos y la epigastralgia antes del inicio de crisis convulsivas?",
        options: ["24 horas", "7 días", "48 horas", "30 días"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, el vasoespasmo visceral y neurológico ofrece una ventana de intervención prolongada antes de la isquemia cerebral crítica.<br><br>Perla ENARM: \"Se recomienda observar y preguntar a la paciente sintomatología (cefalea, fosfenos, náuseas, epigastralgia), ya que estos signos y síntomas se presentan 1 semana antes de desarrollar eclampsia\".<br><br>Análisis de Distractores: 24 horas o 48 horas subestiman la ventana clínica de evolución típica. 30 días sobrestiman el progreso natural de la enfermedad en su fase de descompensación acelerada.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Tratamiento, Página 49."
    },
    {
        id: 8,
        question: "¿Cuál es el límite máximo recomendado de infusión de líquidos intravenosos para la restricción de volumen?",
        options: ["100 ml/hora", "50 ml/hora", "150 ml/hora", "200 ml/hora"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, la pérdida de la presión oncótica capilar predispone a extravasación pulmonar si se excede la precarga hídrica.<br><br>Perla ENARM: \"Individualizar el volumen a infundir de líquidos endovenosos, teniendo en cuenta que la mayoría de las pacientes no requiere más de 100 cc/hora\".<br><br>Análisis de Distractores: 50 ml/hora no garantiza la perfusión renal mínima para evitar insuficiencia prerrenal. 150 ml/hora y 200 ml/hora sobrepasan el volumen de tolerancia capilar y precipitan edema agudo de pulmón.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Tratamiento, Página 60."
    },
    {
        id: 9,
        question: "¿Qué antihipertensivo inhibidor del sistema renina-angiotensina se considera seguro durante la lactancia materna?",
        options: ["Telmisartán", "Losartán", "Captopril", "Ramipril"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, aunque los IECAs se contraindican durante la gestación, su paso a la leche materna es infímo y avala su reinstauración posparto.<br><br>Perla ENARM: \"Los agentes antihipertensivos generalmente aceptables para su uso en la lactancia materna incluyen los siguientes: nifedipino, labetalol, alfa-metildopa, captopril y enalapril\".<br><br>Análisis de Distractores: Telmisartán y Losartán (ARAs) no tienen el mismo nivel de evidencia explícito en el listado de lactancia segura. Ramipril no está estipulado como elección primaria en este renglón específico frente al Captopril o Enalapril.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Promoción, Página 82."
    },
    {
        id: 10,
        question: "¿Qué fármaco constituye la intervención profiláctica absoluta para frenar y prevenir el progreso a convulsiones?",
        options: ["Fenitoína sódica", "Coctel lítico", "Diazepam intravenoso", "Sulfato de magnesio"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, su estabilización de la membrana neuronal supera ampliamente a los anticonvulsivos clásicos sin deprimir el centro respiratorio del feto.<br><br>Perla ENARM: \"Se recomienda administrar sulfato de magnesio intravenoso a todas las mujeres con preeclampsia severa con el fin de prevenir episodios eclámpticos\".<br><br>Análisis de Distractores: Diazepam, fenitoína y coctel lítico están formalmente contraindicados por asociarse con peores desenlaces materno-fetales, como paradas respiratorias o convulsiones recurrentes.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Tratamiento, Página 59."
    },
    {
        id: 11,
        question: "Durante un evento convulsivo agudo en evolución, ¿cuál es el manejo postural indicado de forma inmediata?",
        options: ["Decúbito supino", "Decúbito lateral", "Posición de Fowler", "Posición de Trendelenburg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, la prioridad absoluta durante la fase tónico-clónica es mantener permeable la vía aérea y desviar fluidos gastrointestinales.<br><br>Perla ENARM: \"Para minimizar el riesgo de aspiración, la paciente debe estar en posición de decúbito lateral y el vómito y la secreción oral se succionan según sea necesario\".<br><br>Análisis de Distractores: Decúbito supino garantiza colapso aortocavo e hipoxia total. Posición de Fowler o Trendelenburg no protegen eficientemente contra la aspiración masiva de contenido gástrico durante los espasmos.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Tratamiento, Página 73."
    },
    {
        id: 12,
        question: "Al medir la presión arterial en consulta, ¿cuál es la velocidad máxima de deflación para evitar valores erróneamente bajos?",
        options: ["≤ 2 mmHg/segundo", "≤ 5 mmHg/segundo", "≤ 10 mmHg/segundo", "≤ 1 mmHg/segundo"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, descensos abruptos del aire escapan a la percepción acústica de los ruidos de Korotkoff de fase I, perdiendo los picos sistólicos reales.<br><br>Perla ENARM: \"La tasa de deflación del brazalete debe ser ≤ 2 mm por segundo para evitar subestimar la presión arterial sistólica\".<br><br>Análisis de Distractores: Desinflar a 5 o 10 mmHg por segundo ocasiona pérdida de lectura y diagnósticos silentes. 1 mmHg es excesivamente lento y causa congestión venosa que altera la lectura diastólica.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Diagnóstico, Página 41."
    },
    {
        id: 13,
        question: "En el periodo del puerperio, ¿cuál es el límite estricto de presión arterial sistólica por debajo del cual debe mantenerse a la paciente medicada?",
        options: ["< 140 mmHg", "< 160 mmHg", "< 150 mmHg", "< 130 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Trastornos Hipertensivos del Embarazo, en la etapa resolutiva se requiere evitar emergencias cerebrovasculares sin generar hipotensión profunda.<br><br>Perla ENARM: \"La hipertensión posparto debe ser tratada con terapia antihipertensiva para mantener metas de presión arterial sistólica < 160 mmHg y presión arterial diastólica < 110 mmHg\".<br><br>Análisis de Distractores: Buscar metas inferiores a 140 o 130 mmHg no aporta beneficio agudo probado e incrementa el requerimiento de múltiples fármacos. 150 mmHg es el límite inferior intraparto, no la cifra posparto definitiva de corte.",
        source: "IMSS-586-12, Intervenciones de enfermería para la prevención y atención de mujeres con trastornos hipertensivos en el embarazo, 2017, Promoción, Página 82."
    },
    {
        id: 14,
        question: "¿Qué extremos de edad reproductiva otorgan factor de riesgo ponderado desde la primera visita prenatal?",
        options: ["< 20 o > 40 años", "< 16 o > 30 años", "< 18 o > 35 años", "< 15 o > 45 años"],
        answer: 2,

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ENF1Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ENF1LastQId', currentQuestionId);
                else localStorage.removeItem('ENF1LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ENF1Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
