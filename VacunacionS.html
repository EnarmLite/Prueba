    <script>

        const casesData = [
{
                id: 1,
                caseText: "Recién nacido masculino de 3 días de vida, producto de la primera gestación, obtenido por parto eutócico a las 38 semanas. Madre acude a la Unidad de Medicina Familiar para valoración inicial e inmunización. A la exploración física: TA 65/40 mmHg, FC 140 lpm, FR 45 rpm, temperatura 36.8 °C, peso 2,100 g, talla 48 cm. Paciente reactivo, con adecuado esfuerzo respiratorio, sin ictericia. Ruidos cardíacos rítmicos sin soplos. Abdomen blando, muñón umbilical limpio, sin datos de onfalitis. Tono muscular adecuado, reflejos primarios presentes y simétricos. No se integran antecedentes heredofamiliares de importancia y la madre niega comorbilidades. Se decide iniciar el esquema nacional de vacunación universal correspondiente a su edad.",
                source: "Lineamientos Generales 2026, Programa de Vacunación Universal, 1a Edición.",
                questions: [
                    {
                        question: "De acuerdo con los lineamientos vigentes, ¿cuál es el peso mínimo requerido para administrar la vacuna indicada en este paciente para prevenir formas graves de tuberculosis?",
                        options: [
                            "2,000 g",
                            "2,500 g",
                            "1,500 g",
                            "1,800 g"
                        ],
                        answer: 0,
                        justification: "El peso al nacimiento es un criterio absoluto para la aplicación segura de la vacuna BCG. El sistema inmunológico y el tejido dérmico de neonatos con bajo peso extremo no garantizan una respuesta adecuada ni limitan la diseminación local del bacilo atenuado. Está contraindicada en recién nacidos con peso inferior a 2,000 gramos hasta que alcancen el peso meta.<br><br><b>Perla ENARM:</b> \"Se aplicará dosis única de 0.1 mL, vía intradérmica en la región deltoidea del brazo derecho, a la población recién nacida con peso igual o mayor a 2,000 gramos.\"<br><br><b>Análisis de Distractores:</b> La opción C y D engloban pesos que constituyen una contraindicación absoluta temporal (< 2,000 g) donde el paciente debe ser diferido. La opción B es un peso normal, pero el punto de corte estricto normativo inferior no exige llegar hasta los 2,500 g para autorizar la inmunización."
                    },
                    {
                        question: "Para la aplicación del biológico contra la tuberculosis, ¿cuál es la vía de administración y el sitio anatómico normado?",
                        options: [
                            "Intramuscular en el tercio medio de la cara anterolateral externa del muslo izquierdo",
                            "Intradérmica en la región deltoidea del brazo derecho",
                            "Subcutánea en la región deltoidea del brazo izquierdo",
                            "Intradérmica en la región deltoidea del brazo izquierdo"
                        ],
                        answer: 1,
                        justification: "La vacuna BCG requiere presentación exclusiva al sistema reticuloendotelial de la dermis para desencadenar la inmunidad celular sin provocar abscesos profundos. Su administración errónea genera complicaciones locales severas.<br><br><b>Perla ENARM:</b> \"Se aplicará dosis única de 0.1 mL, vía intradérmica en la región deltoidea del brazo derecho.\"<br><br><b>Análisis de Distractores:</b> La opción A describe la vía y el sitio anatómico exactos para la vacuna anti hepatitis B en recién nacidos. La opción C corresponde al sitio de aplicación de las vacunas virales atenuadas (Triple Viral o Doble Viral). La opción D altera la lateralidad; la normatividad en México exige estandarizar el brazo derecho para BCG por trazabilidad epidemiológica de la cicatriz."
                    },
                    {
                        question: "¿Cuál es el cantidad exacta en mililitros que debe ser administrada para considerar una dosis completa y eficaz en este escenario clínico?",
                        options: [
                            "0.5 mL",
                            "1.0 mL",
                            "0.1 mL",
                            "1.5 mL"
                        ],
                        answer: 2,
                        justification: "A diferencia de la gran mayoría de las vacunas parenterales pediátricas que requieren medio mililitro, la BCG está estandarizada a una décima de mililitro. El inóculo exacto garantiza la carga antigénica necesaria para inducir la cicatrización sin diseminación ganglionar masiva (BCGitis).<br><br><b>Perla ENARM:</b> \"Se aplicará dosis única de 0.1 mL, vía intradérmica en la región deltoidea del brazo derecho, a la población recién nacida.\"<br><br><b>Análisis de Distractores:</b> La opción A (0.5 mL) es el estándar universal de vacunas como hexavalente, neumocócica o hepatitis B pediátrica. La opción B (1.0 mL) es la dosis exclusiva de la vacuna anti hepatitis B para la población adulta a partir de los 11 años de edad (20 µg). La opción D (1.5 mL) corresponde al volumen de la vacuna monovalente contra rotavirus de administración oral."
                    },
                    {
                        question: "Si el personal de enfermería reconstituye un frasco de vacuna liofilizada que no corresponde a la cepa Tokio, ¿cuál es el tiempo máximo que el biológico mantiene su viabilidad antes de ser desechado?",
                        options: [
                            "28 días",
                            "12 horas",
                            "4 horas",
                            "6 horas"
                        ],
                        answer: 3,
                        justification: "Las vacunas liofilizadas pierden drásticamente su estabilidad térmica y se vuelven susceptibles a la contaminación una vez que el polvo es reconstituido con su diluyente. Por política de frascos abiertos, su vida útil intrajornada es limitada.<br><br><b>Perla ENARM:</b> \"Las vacunas liofilizadas como BCG, varicela, SR y SRP, podrán ser utilizadas hasta 6 horas después de reconstituidas o al finalizar la jornada de trabajo, lo que ocurra primero.\"<br><br><b>Análisis de Distractores:</b> La opción C (4 horas) es la indicación exclusiva y restrictiva para la vacuna BCG de la cepa Tokio debido a su mayor labilidad térmica. La opción A (28 días) es la política exclusiva para frascos multidosis de vacunas líquidas (DPT, Td, anti influenza, anti hepatitis B). La opción B (12 horas) no existe como estándar de viabilidad en ningún lineamiento de la red de frío en México."
                    },
                    {
                        question: "Ante el desarrollo de un Evento Supuestamente Atribuible a la Vacunación o Inmunización por este biológico, ¿hasta cuántos meses posteriores a la aplicación se debe otorgar seguimiento y vigilancia estrecha?",
                        options: [
                            "12 meses",
                            "6 meses",
                            "1 mes",
                            "42 días"
                        ],
                        answer: 0,
                        justification: "La replicación del bacilo atenuado de Calmette-Guérin es lenta, y la evolución fisiológica de la pápula hacia la úlcera y cicatriz toma semanas. Las complicaciones como la osteítis, abscesos profundos o adenitis supurativa pueden manifestarse de forma muy tardía.<br><br><b>Perla ENARM:</b> \"En caso de presentarse un ESAVI, deberá darse seguimiento por doce meses y vigilancia estrecha por el personal de salud, ante cualquier otra manifestación se deberá notificar en los formatos correspondientes a la DGE.\"<br><br><b>Análisis de Distractores:</b> La opción D (42 días) es el periodo de vigilancia epidemiológica crítico y establecido únicamente para detectar intususcepción posterior a la vacuna contra rotavirus. La opción C (1 mes o 30 días) es el margen general estandarizado para la aparición de ESAVI graves y no graves del resto de las vacunas. La opción B (6 meses) es un distractor que no corresponde a los tiempos normativos de ningún biológico actual."
                    }
                ]
            },
            {
                id: 2,
                caseText: "Niño de 18 meses de edad, acude a la Unidad de Medicina Familiar para valoración integral y actualización de su esquema de inmunizaciones. A la exploración física: TA 90/60 mmHg, FC 110 lpm, FR 24 rpm, temperatura 36.5 °C, peso 11 kg, talla 80 cm. Paciente reactivo, eutrófico, mucosas bien hidratadas. Faringe sin hiperemia. Ruidos cardíacos rítmicos sin soplos agregados. Campos pulmonares bien ventilados. Abdomen blando, depresible, sin visceromegalias. Desarrollo psicomotor normal. La Cartilla Nacional de Salud documenta la aplicación oportuna de todas las vacunas correspondientes al primer año de vida, incluyendo la primera dosis contra el sarampión, rubéola y parotiditis.",
                source: "Lineamientos Generales 2026, Programa de Vacunación Universal, 1a Edición.",
                questions: [
                    {
                        question: "De acuerdo con la normatividad nacional vigente, ¿cuál es el fundamento epidemiológico para aplicar la segunda dosis de esta vacuna específica a los 18 meses de edad en este paciente?",
                        options: [
                            "Estrategia exclusiva para pacientes con riesgo inmunológico",
                            "Lineamiento normado para nacidos desde julio 2020",
                            "Bloqueo epidemiológico por un brote comunitario activo",
                            "Modificación temporal por desabasto de vacuna hexavalente"
                        ],
                        answer: 1,
                        justification: "Históricamente, el refuerzo de la vacuna Triple Viral se administraba a los 6 años de edad. Sin embargo, para cerrar brechas de inmunidad a edades tempranas, el esquema actual adelantó esta dosis.<br><br><b>Perla ENARM:</b> \"La segunda dosis de SRP a los 18 meses aplica solo para niñas y niños nacidos a partir de julio de 2020. Dicha estrategia se implementará hasta 2026, posteriormente se dejará de aplicar a esta edad, pero se seguirá aplicando a niñas y niños de 18 meses de edad.\"<br><br><b>Análisis de Distractores:</b> La opción A es incorrecta porque es una indicación universal, no reservada para inmunosupresión. La opción C aplica solo para el escenario de \"dosis cero\" que se otorga a lactantes de 6 a 11 meses de edad durante un brote, sin convalidarse en el esquema oficial. La opción D es un distractor irreal que no justifica la alteración de la cronología de un biológico viral atenuado."
                    },
                    {
                        question: "¿Cuál es la vía de administración y el sitio anatómico estrictamente normado para la inoculación de este biológico en este paciente?",
                        options: [
                            "Intradérmica en la región deltoidea derecha",
                            "Intramuscular en la cara anterolateral del muslo",
                            "Subcutánea en la región deltoidea del brazo",
                            "Intramuscular en la región deltoidea del brazo"
                        ],
                        answer: 2,
                        justification: "Las vacunas virales atenuadas inyectables (Triple Viral, Doble Viral y Varicela) requieren un depósito en el tejido celular subcutáneo para lograr una absorción gradual y adecuada presentación antigénica local.<br><br><b>Perla ENARM:</b> \"Se aplicarán 2 dosis de 0.5 mL, vía subcutánea en la región deltoidea del brazo izquierdo.\"<br><br><b>Análisis de Distractores:</b> La opción A corresponde a la vía y sitio anatómico exclusivos de la vacuna contra la tuberculosis. La opción B describe el sitio anatómico e inyección para vacunas inactivadas pediátricas en menores de 18 meses de edad. La opción D confunde la vía; las inyecciones intramusculares a partir de los 18 meses en el deltoides se reservan estrictamente para vacunas inactivadas como la neumocócica o influenza."
                    },
                    {
                        question: "Si este paciente acudiera por primera vez a los 4 años de edad sin antecedente documentado de ninguna dosis previa de esta vacuna, ¿cuál es el intervalo mínimo que debe transcurrir entre la primera y la segunda dosis para completar su esquema?",
                        options: [
                            "4 semanas",
                            "6 semanas",
                            "8 semanas",
                            "12 semanas"
                        ],
                        answer: 0,
                        justification: "En situaciones de rezago vacunal para pacientes menores de 10 años de edad, el esquema completo para sarampión, rubéola y parotiditis consta de dos dosis que jamás deben aplicarse de forma simultánea, respetando un margen vital para permitir una seroconversión robusta.<br><br><b>Perla ENARM:</b> \"Se aplicarán dos dosis de SRP (0.5 mL) con un intervalo de 4 semanas, a menores de 10 años que no hayan recibido ninguna dosis y se completará esquema en personas con antecedente de una dosis previa de esta vacuna.\"<br><br><b>Análisis de Distractores:</b> La opción B dicta el intervalo mínimo requerido entre la cuarta dosis de la vacuna hexavalente y el refuerzo de la vacuna triple bacteriana. Las opciones C y D son lapsos temporales excesivos y no fundamentados, los cuales retrasarían injustificadamente la protección inmunológica contra el sarampión en un esquema atrasado."
                    },
                    {
                        question: "El personal de enfermería procede a la reconstitución del frasco liofilizado de esta vacuna. ¿Cuál es el límite máximo de viabilidad operativa del biológico antes de que deba desecharse?",
                        options: [
                            "28 días posteriores a su apertura",
                            "6 horas después de ser reconstituida",
                            "12 horas bajo temperatura de refrigeración",
                            "4 horas exclusivas con red estricta"
                        ],
                        answer: 1,
                        justification: "La política de frascos abiertos es extremadamente restrictiva para estas presentaciones. Una vez que un biológico liofilizado se homogeniza con su diluyente, su termoestabilidad disminuye drásticamente, incrementando paralelamente el riesgo de contaminación y proliferación bacteriana intraluminal.<br><br><b>Perla ENARM:</b> \"Las vacunas liofilizadas como BCG, varicela, SR y SRP, podrán ser utilizadas hasta 6 horas después de正式 reconstituidas o al finalizar la jornada de trabajo, lo que ocurra primero.\"<br><br><b>Análisis de Distractores:</b> La opción A representa el tiempo de vida útil exclusivo para los frascos multidosis de vacunas líquidas e inactivadas (ejemplo: hepatitis B, toxoide tetánico). La opción D es un criterio aplicativo que existe única y excepcionalmente para la vacuna BCG correspondiente a la cepa Tokio. La opción C carece de validez operativa en la red de frío de México."
                    },
                    {
                        question: "Si los padres solicitan aplicar el mismo día la inmunización contra la varicela pero la unidad médica presenta desabasto momentáneo, ¿cuánto tiempo debe esperar el paciente para poder recibir esta segunda vacuna de forma segura y eficaz?",
                        options: [
                            "7 días mínimos",
                            "14 días estrictos",
                            "21 días hábiles",
                            "4 semanas de intervalo"

                    const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
                    const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
                    const cData = casesData[caseIdx];
                    
                    if(!cData) return;
                    
                    const qData = cData.questions[qIdx];
                    const matchText = cData.caseText.toLowerCase().includes(term) || qData.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || globalId.toString() === term) ? 'flex' : 'none';
                });
            });

            });

                localStorage.removeItem('ExamenvacunacionProgress');
                localStorage.removeItem('ExamenvacunacionLastQId');
                localStorage.removeItem('ExamenvacunacionExamState');
                window.location.reload();

        function navigateCase(currentCaseId, direction) {
            let targetCaseId = currentCaseId;
            if (direction === 'prev' && currentCaseId > 1) {
                targetCaseId = currentCaseId - 1;
            } else if (direction === 'next' && currentCaseId < casesData.length) {
                targetCaseId = currentCaseId + 1;
            } else {
                displayQuestion(null); 
                return;
            }
            const targetGlobalQId = (targetCaseId - 1) * QUESTIONS_PER_CASE + 1;
            displayQuestion(targetGlobalQId);
        }

        function getQBoxClass(globalId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-[10px] sm:text-xs cursor-pointer transition-all select-none border ";
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[globalId];
            const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
            const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
            const cData = casesData[caseIdx];
            
            if (!cData) return base + "bg-slate-100 text-slate-300";

            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";
                } else {
                    return base + "bg-slate-600 text-white border-slate-700 dark:bg-slate-700 dark:border-slate-600 shadow-inner";
                }
            } 
            else {
                if (!state || !state.answered) {
                    return base + "bg-slate-100 text-slate-400 border-slate-200 dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700";
                } else {
                    const isCorrect = state.selectedOption === cData.questions[qIdx].answer;
                    if (isCorrect) {
                        return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
                    } else {
                        return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
                    }
                }
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            let boxes = [];
            for (let i = 1; i <= totalQuestions; i++) {
                boxes.push(`<div class="${getQBoxClass(i, i === isActiveIdContext)}" data-id="${i}" onclick="displayQuestion(${i})">${i}</div>`);
            }
            return boxes.join('');
        }

            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);

            let actionBtn = "";
            if (examState.isFinished) {
                actionBtn = `<button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white border border-white/30 px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Reiniciar Examen</button>`;
            } else {
                actionBtn = `
                    <button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-900/30 transition-transform hover:-translate-y-0.5 mr-3">
                        ${ans === 0 ? 'Iniciar Examen' : 'Continuar Examen'}
                    </button>
                    <button onclick="document.getElementById('finish-modal').classList.remove('hidden')" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-rose-900/30 transition-transform hover:-translate-y-0.5">
                        Finalizar y Calificar
                    </button>
                `;
            }

            let badgeText = examState.isFinished ? "RETROALIMENTACIÓN COMPLETA" : "ENARM 2026";
            let badgeClass = examState.isFinished ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";

            let statsHTML = examState.isFinished ? `
                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${totalQuestions}</span></p>
                    </div>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                    </div>
                    <div class="px-2">
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                    </div>
                </div>
            ` : `
                <div class="w-full text-center py-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Avance Global del Examen</p>
                    <p class="text-4xl sm:text-5xl font-black text-white">${ans}<span class="text-xl sm:text-2xl text-slate-500">/${totalQuestions}</span></p>
                    <div class="w-full bg-slate-700/50 rounded-full h-2 mt-4 overflow-hidden">
                        <div class="bg-blue-400 h-2 rounded-full shadow-md transition-all duration-300" style="width: ${(ans/totalQuestions)*100}%"></div>
                    </div>
                </div>
            `;

            let legendHTML = examState.isFinished ? `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
            ` : `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-50 border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700/50"></div> Pendiente</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-600 border border-slate-700"></div> Respondida</div>
            `;

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-7xl mx-auto lg:mt-0">
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <span class="inline-flex items-center gap-2 text-slate-400 font-semibold text-sm select-none">
                            
                        </span>
                    </div>

                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500">
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left w-full lg:w-3/5">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass}">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 ${examState.isFinished ? 'text-emerald-400' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium mx-auto lg:mx-0">${descText}</p>
                                <div class="mt-8 flex justify-center lg:justify-start flex-wrap gap-4">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col items-center shadow-2xl w-full lg:w-2/5">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                Tablero del Examen (280 Preguntas)
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                ${legendHTML}
                            </div>
                        </div>
                        <div class="grid gap-2 grid-cols-[repeat(auto-fill,minmax(40px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>
                </div>
            `;
        }

        function displayQuestion(globalId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = globalId ? parseInt(globalId) : null;
                
                if (currentQuestionId) {
                    localStorage.setItem('ExamenvacunacionLastQId', currentQuestionId);
                } else {
                    localStorage.removeItem('ExamenvacunacionLastQId');
                }

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');
                    dashboardBtn.classList.add('lg:left-[22rem]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const caseIdx = Math.floor((currentQuestionId - 1) / QUESTIONS_PER_CASE);
                const cData = casesData[caseIdx];
                
                if (!cData) return displayQuestion(null);
                
                renderCaseLayout(cData, currentQuestionId);
                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                setTimeout(() => {
                    const targetCard = document.getElementById(`q-card-${currentQuestionId}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }, 50);

            }, 150); 
        }

        function renderCaseLayout(cData, activeGlobalId) {
            let html = `
                <div class="flex flex-col gap-6 max-w-5xl mx-auto items-center">
                    
                    <!-- COLUMNA: TEXTO DEL CASO CLÍNICO -->
                    <div class="w-full bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-2xl shadow-md border border-slate-200 dark:border-slate-800 transition-all duration-300">
                        <div class="flex items-center justify-between mb-4">
                            <span class="inline-block bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-900/30">
                                Caso Clínico Seriado
                            </span>
                            <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                                Bloque #${cData.id}
                            </span>
                        </div>
                        <p class="text-slate-800 dark:text-slate-200 text-sm sm:text-base leading-relaxed font-medium">
                            ${cData.caseText}
                        </p>
                        ${examState.isFinished ? `
                            <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                <span class="text-slate-500">Bibliografía GPC:</span> ${cData.source}
                            </div>
                        ` : ''}
                    </div>

                    <!-- COLUMNA: BLOQUE DE LAS 5 PREGUNTAS ASOCIADAS -->
                    <div class="w-full space-y-5">
            `;

            cData.questions.forEach((q, idx) => {
                const globalQId = (cData.id - 1) * QUESTIONS_PER_CASE + idx + 1;
                const qState = userProgress[globalQId];
                const hasAnswered = qState && qState.answered;
                const userAnswer = hasAnswered ? qState.selectedOption : null;
                
                let cardStyle = "border-slate-200 dark:border-slate-800/80";
                if (globalQId === activeGlobalId) {
                    cardStyle = "border-blue-500 dark:border-blue-500 ring-2 ring-blue-500/10";
                }
                if (examState.isFinished && hasAnswered) {
                    cardStyle = (userAnswer === q.answer) ? "border-l-4 border-emerald-500" : "border-l-4 border-rose-500";
                }

                html += `
                    <div id="q-card-${globalQId}" class="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-sm border ${cardStyle} transition-all">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700">
                                PREGUNTA ${globalQId}
                            </span>
                        </div>
                        <h3 class="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-100 mb-4 leading-snug">${q.question}</h3>
                        <form id="q-form-${globalQId}" class="space-y-2.5">
                `;

                q.options.forEach((opt, i) => {
                    if (examState.isFinished) {
                        let optClasses = "flex items-start p-3 border rounded-xl text-xs sm:text-sm ";
                        let icon = "";
                        
                        if (i === q.answer) {
                            optClasses += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 font-semibold";
                            icon = `<svg class="w-4 h-4 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
                        } else if (i === userAnswer) {
                            optClasses += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                            icon = `<svg class="w-4 h-4 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                        } else {
                            optClasses += "bg-slate-50 border-slate-100 dark:bg-slate-800/30 dark:border-slate-800/50 opacity-50 text-slate-400";
                        }

                        html += `
                            <div class="${optClasses}">
                                <span class="leading-snug pr-3">${opt}</span>
                                ${icon}
                            </div>
                        `;
                    } else {
                        const checkedStr = (hasAnswered && userAnswer === i) ? 'checked' : '';
                        html += `
                            <label class="flex items-start p-3 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/40 has-[:checked]:bg-blue-50/80 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/20 text-xs sm:text-sm shadow-sm" onclick="autoSaveAnswer(${globalQId})">
                                <input type="radio" name="option" value="${i}" ${checkedStr} class="mt-0.5 h-3.5 w-3.5 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-700 cursor-pointer">
                                <span class="ml-2.5 text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `;
                    }
                });

                html += `</form>`;

                if (examState.isFinished) {
                    html += `
                        <div class="bg-blue-50/60 dark:bg-slate-800/50 border border-blue-100/50 dark:border-slate-800 rounded-xl p-4 text-xs sm:text-sm mt-4">
                            <h4 class="font-bold text-blue-800 dark:text-blue-400 mb-1 flex items-center gap-1 uppercase tracking-wider text-[10px]">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Justificación Médica GPC
                            </h4>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${q.justification}</p>
                        </div>
                    `;
                }

                html += `</div>`;
            });

            const isLastCase = cData.id === casesData.length;

            html += `
                        <!-- CONTROLES DE FLUJO EN CASOS -->
                        <div class="flex justify-between items-center pt-4 mt-6 border-t border-slate-200 dark:border-slate-800">
                            <button onclick="navigateCase(${cData.id}, 'prev')" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                                Caso Anterior
                            </button>
                            
                            ${examState.isFinished ? `
                                ${!isLastCase ? `
                                    <button onclick="navigateCase(${cData.id}, 'next')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5 shadow-sm">
                                        Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                    </button>
                                ` : `
                                    <button onclick="displayQuestion(null)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider shadow-sm">
                                        Ver Calificaciones
                                    </button>
                                `}
                            ` : `
                                <button onclick="navigateCase(${cData.id}, 'next')" class="bg-blue-600 dark:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:bg-blue-700 dark:hover:bg-blue-400 transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5">
                                    Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('module-display').innerHTML = html;
        }

        function autoSaveAnswer(globalId) {
            if(examState.isFinished) return;
            const form = document.getElementById(`q-form-${globalId}`);
            if (!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (selected) {
                userProgress[globalId] = { answered: true, selectedOption: parseInt(selected.value) };
                saveState();
                updateProgressBar();
                renderSidebarGrid();
            }
        }

        function updateProgressBar() {
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = totalQuestions > 0 ? Math.round((ans / totalQuestions) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; 
            }
        }

        function saveState() {
            try { localStorage.setItem('ExamenvacunacionProgress', JSON.stringify(userProgress)); } catch(e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('ExamenvacunacionProgress');
                userProgress = saved ? JSON.parse(saved) : {};
                const savedState = localStorage.getItem('ExamenvacunacionExamState');
                if (savedState) examState = JSON.parse(savedState);
            } catch(e) { userProgress = {}; examState = { isFinished: false }; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
