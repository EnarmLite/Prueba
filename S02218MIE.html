    <script>
        const questionsData = [

    {
        id: 1,
        question: "¿Cuál es el porcentaje que representa esta neoplasia respecto al total de defunciones por patologías oncológicas a nivel mundial?",
        options: ["17.7%", "25.8%", "11.7%", "34.4%"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, esta enfermedad constituye el problema de salud pública de mayor impacto letal en la oncología global, superando a las neoplasias de mama, colon y próstata. La alta letalidad se atribuye al diagnóstico en etapas avanzadas y a su relación intrínseca con el tabaquismo.<br><br>Perla ENARM: \"El CP constituye la principal causa de muerte por cáncer a nivel mundial. De acuerdo con datos de la OMS, representó 17.7% del total de muertes por cáncer.\"<br><br>Análisis de Distractores: El 25.8% corresponde a la sinergia estadística entre exposición a radón y tabaco. El 11.7% es la prevalencia de esta neoplasia en hombres en México. El 34.4% corresponde al porcentaje de pacientes con esta neoplasia que tienen antecedente de exposición a humo de leña.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Introducción, Página 8."
    },
    {
        id: 2,
        question: "¿En qué entidades federativas se reportan las tasas más bajas de mortalidad por neoplasias pulmonares en México?",
        options: ["Hidalgo y Tlaxcala", "Sonora y Chihuahua", "Sinaloa y Nuevo León", "Baja California y Sonora"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, existe una polarización epidemiológica en el país. Los estados del norte concentran la mayor carga de la enfermedad, correlacionado históricamente con una adopción más temprana y masiva del tabaquismo. Por el contrario, los estados del centro-sur mantienen tasas estandarizadas inferiores.<br><br>Perla ENARM: \"Se presentó una mayor tasa estandarizada para los estados de Baja California Sur, Sinaloa, Sonora, Chihuahua y Nuevo León, y las más bajas para Hidalgo y Tlaxcala.\"<br><br>Análisis de Distractores: Sonora, Chihuahua, Sinaloa, Nuevo León y Baja California Sur representan los focos rojos epidemiológicos con las tasas de mortalidad más altas a nivel nacional, por lo que son incorrectas en el contexto de buscar las tasas más bajas.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Introducción, Página 8."
    },
    {
        id: 3,
        question: "¿Cuál es la estirpe histológica diagnosticada con mayor frecuencia en mujeres mexicanas con exposición crónica a biomasa?",
        options: ["Carcinoma de células escamosas", "Adenocarcinoma de pulmón", "Carcinoma de células pequeñas", "Tumor carcinoide bronquial"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, el humo de biomasa (leña) induce mutaciones distintas a las del alquitrán del tabaco. En la población femenina no fumadora, el daño alveolar crónico deriva predominantemente en la formación de neoplasias glandulares periféricas.<br><br>Perla ENARM: \"En mujeres mexicanas no fumadoras, el humo de leña se asocia con CP en particular del tipo histológico adenocarcinoma (58.8%).\"<br><br>Análisis de Distractores: El carcinoma de células escamosas (epidermoide) y el de células pequeñas tienen una asociación central y estricta con el consumo pesado de tabaco. El tumor carcinoide es una neoplasia neuroendocrina rara no asociada directamente a biomasa.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Introducción, Página 9."
    },
    {
        id: 4,
        question: "De acuerdo a la estadística evaluada, ¿cuál es el factor de riesgo que confiere la mayor probabilidad individual de desarrollar esta patología?",
        options: ["Tabaquismo activo", "Antecedentes de cáncer", "Exposición a asbesto", "Exposición humo de leña"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, aunque el tabaquismo explica el mayor volumen poblacional de casos, la predisposición genética y el daño celular previo de un historial oncológico personal otorgan el riesgo estadístico más elevado y obligan a un umbral más estricto de vigilancia.<br><br>Perla ENARM: \"Antecedentes de cáncer (5.7), Asbesto (4.4) y Tabaquismo (3.6).\"<br><br>Análisis de Distractores: El tabaquismo activo es la causa más común, pero estadísticamente su impacto individual es de 3.6. El asbesto tiene 4.4 y el humo de leña 3.1. El antecedente oncológico supera a todos con 5.7.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Cuadros o figuras, Página 26."
    },
    {
        id: 5,
        question: "¿Cuál es el rango de edad establecido para considerará a un paciente asintomático como candidato a tamizaje tomográfico estándar?",
        options: ["40 a 55 años", "50 a 65 años", "55 a 74 años", "60 a 80 años"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, la ventana de escrutinio se fundamenta en el equilibrio clínico; someter a individuos más jóvenes genera radiación innecesaria y falsos positivos, mientras que después del límite superior, las comorbilidades y la expectativa de vida disminuyen el beneficio de la detección.<br><br>Perla ENARM: \"Se recomienda que a las personas de 55 a 74 años de edad, fumadoras activas o que dejaron de fumar en los últimos 15 años y que tengan IT ≥ 30 paquetes/año, se refieran para que se les realice la TCDB.\"<br><br>Análisis de Distractores: Las edades fuera del rango 55-74 años no justifican el escrutinio primario estándar según la indicación mayor. Existen criterios especiales para pacientes a partir de 50 años, pero exigen sumar factores de riesgo extra y un menor índice tabáquico, sin ser el tamizaje estándar general.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Página 23."
    },
    {
        id: 6,
        question: "En pacientes a partir de los 50 años, ¿cuál es el índice tabáquico mínimo requerido para justificar el escrutinio imagenológico si existen factores de riesgo adicionales?",
        options: ["10 paquetes por año", "15 paquetes por año", "20 paquetes por año", "30 paquetes por año"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, cuando convergen el tabaquismo y otro carcinógeno probado (como asbesto o cáncer previo), el umbral de daño acumulado para iniciar la búsqueda activa disminuye. En este subgrupo más joven, se reduce la carga tabáquica necesaria para justificar la tomografía.<br><br>Perla ENARM: \"Se recomienda que a las personas ≥ 50 años de edad, con antecedente de IT ≥ 20 paquetes/año y con factores de riesgo para CP sean referidas para que se les realice la TCDB.\"<br><br>Análisis de Distractores: Un índice de 30 paquetes es el requerimiento para el grupo de edad estándar (55-74 años) sin factores extra obligatorios. Los índices de 10 o 15 no alcanzan el punto de corte avalado para someter a radiación al paciente asintomático.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Página 24."
    },
    {
        id: 7,
        question: "¿Cuál es el estudio de imagen de elección indicado para realizar el escrutinio primario en población de alto riesgo asintomática?",
        options: ["Tomografía dosis baja", "Tomografía por emisión", "Radiografía de tórax", "Ultrasonografía torácica"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, esta modalidad es la única intervención validada por ensayos clínicos masivos que identifica nódulos en etapa subclínica (alta sensibilidad) limitando el daño por exposición a radiación ionizante repetida. Su implementación impacta directamente en la sobrevida.<br><br>Perla ENARM: \"Realizar una tomografía computada de dosis baja de tórax (TCDB) comparado con evaluación clínica, análisis de esputo o radiografía de tórax disminuye la mortalidad.\"<br><br>Análisis de Distractores: La radiografía de tórax falla en detectar lesiones menores a 1 cm ocultas por estructuras óseas o mediastinales. La tomografía por emisión (PET) es un recurso de estadificación costoso. El ultrasonido no es útil para visualizar parénquima aireado profundo.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Página 22."
    },
    {
        id: 8,
        question: "¿Qué modalidad de imagen está formalmente contraindicada para utilizarse como herramienta de cribado en pacientes asintomáticos?",
        options: ["Tomografía de alta resolución", "Radiografía de tórax", "Resonancia magnética torácica", "Tomografía con contraste"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, la evidencia demostró que el uso de estudios radiográficos convencionales de forma periódica en asintomáticos no altera la mortalidad, propicia una falsa sensación de seguridad e incrementa intervenciones innecesarias.<br><br>Perla ENARM: \"No se recomienda realizar RxT como prueba de cribado para CP.\"<br><br>Análisis de Distractores: La resonancia y tomografías contrastadas/alta resolución no son tamizaje, pero la radiografía de tórax es la que recibe explícitamente una indicación \"Fuerte en contra\" debido a su uso tradicional pero erróneo en la práctica clínica diaria de primer nivel.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Página 23."
    },
    {
        id: 9,
        question: "¿Qué prueba diagnóstica de laboratorio cuenta con una recomendación fuerte en contra para su uso sistemático como método de detección temprana?",
        options: ["Gasometría arterial", "Biometría hemática completa", "Marcadores tumorales séricos", "Citología de esputo"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, la evaluación celular de expectoraciones en pacientes sin sintomatología carece de sensibilidad anatómica y no impacta la detección de masas periféricas. Su uso retrasa recursos que deben dirigirse a imagen tomográfica.<br><br>Perla ENARM: \"No se recomienda realizar citología de esputo como prueba de cribado para CP.\"<br><br>Análisis de Distractores: Gasometría, biometría y marcadores no se utilizan para cribado primario pulmonar; sin embargo, la citología de esputo era una práctica antigua que la evidencia actual penaliza y prohíbe de manera tajante para este propósito preventivo.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Página 23."
    },
    {
        id: 10,
        question: "Dentro de las manifestaciones clínicas iniciales, ¿cuál es el signo que presenta el mayor valor predictivo positivo para confirmar esta neoplasia?",
        options: ["Tos crónica", "Dolor torácico", "Pérdida de peso", "Presencia de hemoptisis"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, la erosión de vasos sanguíneos endobronquiales o cavitación tumoral produce expectoración hemática. Clínicamente, es el dato de alarma más específico de destrucción tisular oncológica en el tracto respiratorio inferior comparado con síntomas constitucionales.<br><br>Perla ENARM: \"El VPP para hemoptisis fue de 2.4 con OR de 16.24. En caso de hemoptisis la duración de 6 meses presentó un VPP en hombres de 5.8 y en mujeres de 3.3.\"<br><br>Análisis de Distractores: La tos crónica, el dolor torácico y la pérdida de peso presentan valores predictivos inferiores (0.44, 0.82 y 1.1 respectivamente). Son relevantes pero inespecíficos; la expectoración sanguinolenta es la manifestación cardinal.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Páginas 22 y 23."
    },
    {
        id: 11,
        question: "¿Cuál es la conducta clínica indicada en un paciente que presenta factores de riesgo y expectoración sanguinolenta recurrente?",
        options: ["Solicitar tomografía anual", "Iniciar antibiótico empírico", "Referir para protocolo diagnóstico", "Realizar citología seriada"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, la aparición del síntoma cardinal elimina la naturaleza preventiva del caso. El abordaje cambia inmediatamente de \"tamizaje asintomático\" a \"evaluación oncológica activa\", requiriendo atención especializada sin retrasos en primer nivel.<br><br>Perla ENARM: \"Se sugiere referir a personas con factores de riesgo para CP asociado a síntomas respiratorios y hemoptisis, con o sin pérdida de peso, a la instancia de salud pertinente para que se lleve a cabo el protocolo diagnóstico.\"<br><br>Análisis de Distractores: Solicitar tomografía de tamizaje anual es exclusivo para asintomáticos. Iniciar antibióticos asume patología infecciosa e ignora el riesgo oncológico inminente. La citología de esputo está proscrita en este abordaje inicial.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Diagnóstico, Página 24."
    },
    {
        id: 12,
        question: "¿Qué intervención de estilo de vida sugiere la GPC como factor protector con evidencia clínica para disminuir la probabilidad de esta neoplasia?",
        options: ["Dieta hiperproteica", "Ayuno intermitente", "Suplementación con folatos", "Consumo de té verde"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Prevención Cáncer Pulmón, existe evidencia epidemiológica que asocia los metabolitos antioxidantes y polifenoles presentes en infusiones botánicas específicas con una inhibición parcial del estrés oxidativo que precede a la mutagénesis epitelial.<br><br>Perla ENARM: \"Se sugiere el consumo de té negro o verde, elaborado a partir de Camellia sinensis, si no existe contraindicación médica, para disminuir el riesgo de CP.\"<br><br>Análisis de Distractores: La suplementación vitamínica y de folatos está explícitamente en contra de indicarse para quimioprevención pulmonar. La dieta hiperproteica y el ayuno no poseen sustento en las recomendaciones preventivas de esta patología.",
        source: "GPC-SS-022-18, Prevención y detección temprana del cáncer de pulmón en el primer nivel de atención, 2018, Prevención, Página 19."
    },

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
