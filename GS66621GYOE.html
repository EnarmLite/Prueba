    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el tiempo máximo de resolución espontánea que permite clasificar clínicamente un cuadro de alteración del estado de ánimo como \"tristeza materna\" (baby blues) en lugar de un episodio depresivo mayor?", 
                options: ["7 días", "14 días", "2 a 3 semanas", "6 semanas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, es imperativo diferenciar la adaptación fisiológica de la patología psiquiátrica. El baby blues inicia entre los 2 y 4 días posparto y no requiere intervención médica, ya que remite por sí solo antes del primer mes.<br><br>Perla ENARM: \"La patología denominada Baby Blues se describe como una alteración del estado de ánimo [...] Los síntomas de dicha patología son de alivio espontáneos dentro de las dos a tres semanas siguientes al parto, y no requieren de atención médica y/o psicológica.\"<br><br>Análisis de Distractores: La opción A corresponde al periodo de memoria que evalúa la Escala de Edimburgo (últimos 7 días). La opción B es el tiempo mínimo de persistencia de síntomas para diagnosticar una verdadera depresión clínica. La opción D es la duración anatómica del puerperio tradicional.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Introducción, Página 8." 
            },
            {
                id: 2, 
                question: "¿Cuál es el factor de riesgo con mayor peso predictivo para el desarrollo de depresión posparto en una paciente gestante?", 
                options: ["Tristeza materna transitoria", "Depresión previa al embarazo", "Embarazo en la adolescencia", "Ausencia de control prenatal"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, el historial psiquiátrico de la paciente es el determinante biológico más fuerte para la recurrencia de un episodio durante la vulnerabilidad del puerperio, superando a los factores puramente sociodemográficos.<br><br>Perla ENARM: \"Los principales factores de riesgo para la depresión posparto es tener antecedente de este trastorno previamente al embarazo, depresión anteriormente y carecer de mecanismos de apoyo eficaces.\"<br><br>Análisis de Distractores: Las opciones A, C y D son factores de riesgo documentados en la etiología de la enfermedad, pero la guía especifica que la historia previa de depresión es el \"predictor más fuerte\" y principal.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Introducción, Página 9." 
            },
            {
                id: 3, 
                question: "¿Cuál es la herramienta de tamizaje de primera elección para el escrutinio de depresión en pacientes durante el periodo perinatal?", 
                options: ["Inventario de Beck", "Escala de Edimburgo", "Escala de Hamilton", "Cuestionario PHQ-9"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, el tamizaje universal se realiza con esta herramienta autoadministrada de 10 ítems, ya que ha sido validada específicamente para esta población y discrimina de manera efectiva a las pacientes en riesgo con una alta especificidad.<br><br>Perla ENARM: \"La Escala de Depresión Postnatal de Edimburgo (EPDE) es la herramienta de detección de depresión recomendada para el período perinatal.\"<br><br>Análisis de Distractores: La opción A se utiliza en esta guía primariamente para clasificar la severidad de la depresión, no para el tamizaje universal. Las opciones C y D son herramientas psiquiátricas generales que no están designadas como primera elección para la población obstétrica en esta normatividad.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Detección, Página 17." 
            },
            {
                id: 4, 
                question: "Al interpretar la herramienta de tamizaje de primera elección en el puerperio, ¿qué puntuación mínima establece la probabilidad de depresión y justifica el inicio de una intervención multidisciplinaria?", 
                options: ["≥ 8 puntos", "≥ 10 puntos", "≥ 12 puntos", "≥ 15 puntos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, el corte operativo es estricto; alcanzar o superar esta cifra clasifica a la paciente en la zona de alarma clínica, detonando la canalización obligatoria a psicoterapia.<br><br>Perla ENARM: \"INTERPRETACIÓN: Puntuación ≥10 Probabilidad de Depresión.\"<br><br>Análisis de Distractores: La opción A refleja un puntaje de bajo riesgo que solo requiere vigilancia habitual. Las opciones C y D son puntajes que confirman la depresión pero exceden el límite inferior (el punto de inflexión) dictado por el algoritmo para iniciar manejo.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Anexos, Página 31." 
            },
            {
                id: 5, 
                question: "Independientemente del puntaje total obtenido en la Escala de Edimburgo, ¿qué hallazgo en el cuestionario clasifica a la paciente como una urgencia que requiere evaluación psiquiátrica inmediata?", 
                options: ["Pregunta 3 mayor a 1", "Pregunta 10 mayor a 0", "Anhedonia severa aislada", "Insomnio de 7 días"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, el ítem 10 evalúa explícitamente los pensamientos de autolesión o suicidio. Cualquier respuesta afirmativa anula el abordaje escalonado ambulatorio por el alto riesgo de mortalidad materna o infanticidio.<br><br>Perla ENARM: \"Cualquier número que se escoja que no sea el 0 en la pregunta 10 significa que es necesario hacer evaluaciones adicionales de inmediato.\"<br><br>Análisis de Distractores: La opción A (sentimientos de culpa) suma puntos al total pero no es un foco rojo aislado vital. Las opciones C y D son síntomas cardinales y somáticos, respectivamente, que integran el síndrome pero no denotan una emergencia suicida inminente.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Anexos, Página 31." 
            },
            {
                id: 6, 
                question: "Si bien las escalas de escrutinio detectan el riesgo, ¿cuál es el estándar de oro establecido para la confirmación diagnóstica definitiva de la depresión posparto?", 
                options: ["Inventario de Beck ≥ 19", "Evaluación psicosocial ALPHA", "Entrevista clínica estructurada", "Escala de Edimburgo ≥ 15"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, ningún cuestionario autoadministrado tiene peso diagnóstico final. El diagnóstico definitivo recae en la valoración por un profesional basándose estrictamente en los criterios del DSM-V.<br><br>Perla ENARM: \"La EDPE es una escala recomendada para la detección temprana [...] sin embargo, tome en cuenta que la EPD no es diagnóstica, el estándar de oro es la entrevista diagnóstica confirmada con los criterios en el DSM-V.\"<br><br>Análisis de Distractores: La opción A mide la gravedad, no confirma la patología. La opción B es una herramienta de detección de riesgo psicosocial en el embarazo. La opción D indica alta probabilidad en tamizaje, pero sigue sin ser una prueba confirmatoria por sí sola.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Detección, Página 18." 
            },
            {
                id: 7, 
                question: "Al utilizar el Inventario de Depresión de Beck para estadificar la severidad de un cuadro clínico confirmado en el puerperio, ¿qué clasificación corresponde a una puntuación de 24 puntos?", 
                options: ["Tristeza materna leve", "Depresión leve", "Depresión moderada", "Depresión severa"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, esta herramienta es fundamental para guiar el inicio de tratamiento farmacológico. Su rango para la categoría moderada abarca de los 19 a los 29 puntos.<br><br>Perla ENARM: \"Inventario de Depresión de Beck [...] 10-18 = Depresión leve, 19-29 = Depresión moderada, 30-63 = Depresión severa.\"<br><br>Análisis de Distractores: La opción A no se clasifica con esta escala. La opción B corresponde a puntajes menores (10 a 18). La opción D aplica únicamente para puntajes de 30 o más.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Anexos, Página 36." 
            },
            {
                id: 8, 
                question: "¿Cuál es el abordaje terapéutico de primera línea indicado para prevenir y manejar los síntomas iniciales de depresión perinatal en el primer nivel de atención?", 
                options: ["Clorhidrato de sertralina", "Terapia cognitivo conductual", "Clorhidrato de fluoxetina", "Inhibidores de la monoaminooxidasa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, la medicalización temprana se evita debido a la exposición fetal y neonatal a psicofármacos. Las intervenciones psicológicas estructuradas han demostrado reducir la sintomatología y prevenir recaídas de forma segura.<br><br>Perla ENARM: \"Se recomienda utilizar la Terapia conductual en la prevención de la depresión posparto en la atención primaria.\"<br><br>Análisis de Distractores: Las opciones A y C son antidepresivos de primera elección, pero están reservados para pacientes con síntomas moderados a graves o que han presentado falla a la psicoterapia. La opción D incluye fármacos en desuso por su perfil de toxicidad e interacciones.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Tratamiento, Página 20." 
            },
            {
                id: 9, 
                question: "Tras instaurar el tratamiento no farmacológico de primera línea en una paciente con depresión posparto, ¿en qué momento exacto exige la normativa realizar la evaluación de efectividad terapéutica?", 
                options: ["2 y 4 semanas", "1 y 3 meses", "4 y 6 meses", "6 y 12 meses"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, los beneficios de las terapias conductuales requieren tiempo para consolidarse, pero también tienden a disminuir, por lo que el seguimiento a mediano plazo es un estándar de calidad obligatorio para decidir si se escala el tratamiento.<br><br>Perla ENARM: \"Se recomienda utilizar la Terapia conductual en la prevención de la depresión posparto en la atención primaria. Así como evaluarla a los 4 y 6 meses posterior a la intervención.\"<br><br>Análisis de Distractores: Las opciones A, B y D presentan ventanas de tiempo que no concuerdan con la recomendación clave (RC) explícita de seguimiento para la intervención psicológica dictada en el documento.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Tratamiento, Página 20." 
            },
            {
                id: 10, 
                question: "En caso de requerir un estabilizador del estado de ánimo durante cualquier etapa de la gestación, ¿qué fármaco se encuentra absolutamente contraindicado por inducir defectos del tubo neural de forma dosis-dependiente?", 
                options: ["Ácido valproico", "Carbonato de litio", "Clorhidrato de amitriptilina", "Bromhidrato de citalopram"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, este antiepiléptico y eutimizante es un teratógeno humano categórico (Categoría D) que causa el síndrome fetal homónimo y eleva hasta un 35% el riesgo de malformaciones mayores (espina bífida) en altas dosis.<br><br>Perla ENARM: \"Se recomienda evitar el uso de ácido Valproico durante la gestación.\"<br><br>Análisis de Distractores: La opción B (Litio) está contraindicada solo en el primer trimestre, no en toda la gestación. La opción C se asocia a parto pretérmino pero no primariamente a defectos del tubo neural. La opción D es un ISRS sin contraindicación absoluta.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Pronóstico, Página 28." 
            },
            {
                id: 11, 
                question: "Si una paciente obstétrica con patología psiquiátrica severa requiere prescripción ineludible de Carbonato de Litio, ¿en qué periodo específico se debe evitar rigurosamente su administración?", 
                options: ["Primer trimestre", "Segundo trimestre", "Tercer trimestre", "Durante el trabajo de parto"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de depresión prenatal y posparto, la restricción temporal del Litio obedece a su impacto durante la organogénesis cardiaca temprana, momento en el cual induce daño directo en el desarrollo de las válvulas derechas.<br><br>Perla ENARM: \"Se recomienda evitar el uso de Litio durante el primer trimestre del embarazo [...] sólo existe un riesgo absoluto pequeño de anomalía de Epstein.\"<br><br>Análisis de Distractores: Las opciones B, C y D representan etapas de la gestación donde el corazón fetal ya está formado, por lo que el riesgo de anomalía de Ebstein desaparece, permitiendo el uso del Litio bajo estrecha vigilancia si el riesgo materno lo amerita.", 
                source: "GPC-SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Pronóstico, Página 27." 
            },
            {
                id: 12, 
                question: "¿Cuál es el riesgo cardiovascular fetal más grave asociado al consumo de Fluoxetina o Sertralina que obliga a mantener una vigilancia pediátrica estrecha en el momento del nacimiento?", 
                options: ["Síndrome de adaptación neonatal", "Anomalía de válvula Ebstein", "Cierre prematuro del ductus", "Defectos del tubo neural"], 
                answer: 0,

            {

            {

        let userProgress = {};

            displayQuestion(lastQId ? parseInt(lastQId) : null);

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('gyoGProgress');
                localStorage.removeItem('gyoGLastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);

                displayQuestion(null);

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`

                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="HS83121GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoGProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoGLastQId', currentQuestionId);
                else localStorage.removeItem('gyoGLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoGProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
