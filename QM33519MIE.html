    <script>
        const questionsData = [



    {
        id: 1,
        question: "¿Cuál es el tiempo mínimo de persistencia de las alteraciones estructurales o funcionales para establecer el diagnóstico de la enfermedad?",
        options: ["1 mes", "3 meses", "6 meses", "12 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, se exige cronicidad confirmada para distinguir el cuadro de una lesión aguda reversible.<br><br>Perla ENARM: \"Presencia de marcadores de daño renal o disminución de la tasa de filtrado glomerular < 60 ml/min/1.73 m2 durante al menos 3 meses\".<br><br>Análisis de Distractores: 1 mes corresponde al intervalo para reevaluar algunas lesiones agudas e isquémicas. 6 y 12 meses retrasan de manera injustificada la estadificación clínica y el envío temprano a especialidad.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Anexos (Cuadro 2), p. 37."
    },
    {
        id: 2,
        question: "¿En qué edad inicia la búsqueda activa asintomática en pacientes con hipertensión arterial sistémica?",
        options: ["≥ 30 años", "≥ 40 años", "≥ 50 años", "≥ 60 años"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el tamizaje poblacional abierto no es costo-efectivo, limitándose de manera estricta a los grupos demográficos de alta prevalencia.<br><br>Perla ENARM: \"En pacientes de más de 50 años con hipertensión o Diabetes se debe determinar la presencia de Enfermedad renal ya que resulta ser una intervención costo efectiva\".<br><br>Análisis de Distractores: 30 y 40 años generan sobrediagnóstico sin rentabilidad clínica demostrada, salvo en escenarios hereditarios. 60 años retrasa el diagnóstico preventivo primario de manera significativa.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tamizaje, p. 17."
    },
    {
        id: 3,
        question: "¿Qué ecuación matemática tiene mayor precisión comprobada para estimar la filtración en pacientes mayores de 60 años?",
        options: ["CKD-EPI", "MDRD", "Cockcroft-Gault", "Schwartz"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el rendimiento de las fórmulas varía intrínsecamente según la masa muscular residual y la edad metabólica del paciente.<br><br>Perla ENARM: \"Se recomienda utilizar la ecuación MDRD para el cálculo de la tasa de filtrado glomerular en pacientes adultos con diabetes. Esta ecuación tiene una mayor precisión en estadios avanzados y en pacientes > 60 años\".<br><br>Análisis de Distractores: CKD-EPI es la ecuación idónea para adultos jóvenes. Cockcroft-Gault predice de forma eficaz la mortalidad para ajustes farmacológicos pero falla en estadificación. Schwartz es de uso exclusivo en pediatría.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Diagnóstico, p. 20."
    },
    {
        id: 4,
        question: "¿Qué fórmula predictiva reduce el sesgo diagnóstico al estadificar la filtración de pacientes menores de 60 años?",
        options: ["MDRD", "Cockcroft-Gault", "Jelliffe", "CKD-EPI"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el adulto joven requiere de algoritmos de corrección matemática distintos debido a que su reserva funcional y masa magra no están abatidas.<br><br>Perla ENARM: \"En pacientes jóvenes, la precisión fue mayor con la ecuación CKD-EPI (18 a 39 años: 63.7%, 40 a 49 años: 72.8%)\".<br><br>Análisis de Distractores: MDRD subestima significativamente el filtrado en etapas tempranas juveniles. Cockcroft-Gault sobreestima al no emplear variables de superficie corporal ajustada al milímetro. Jelliffe es obsoleta.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Diagnóstico, p. 20."
    },
    {
        id: 5,
        question: "¿Cuál es el estudio de laboratorio inicial preferido para la cuantificación clínica de la proteinuria?",
        options: ["Tira reactiva convencional", "Recolección orina 24 horas", "Cociente albúmina/creatinina", "Electroforesis de proteínas"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el cociente aislado matutino cancela los enormes sesgos de recolección preanalítica que existen con el método ambulatorio volumétrico.<br><br>Perla ENARM: \"Se recomienda utilizar la relación albúmina/creatinina para la evaluación inicial de proteinuria\".<br><br>Análisis de Distractores: La recolección de 24 horas (opción B) es compleja y ha dejado de ser el estándar primario de tamizaje. La tira reactiva (opción A) es meramente cualitativa. La electroforesis (opción D) pesquisa cadenas monoclonales mielomatosas.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Diagnóstico, p. 22."
    },
    {
        id: 6,
        question: "¿Cuál de las siguientes comorbilidades se clasifica patogénicamente como un factor de riesgo \"iniciador\" directo del daño renal?",
        options: ["Obesidad", "Tabaquismo", "Diabetes Mellitus", "Hiperuricemia"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, existen vulnerabilidades somáticas diversas, pero solo contadas patologías destruyen directamente el ovillo capilar como primer golpe agresor.<br><br>Perla ENARM: \"Factores iniciadores: inician directamente el daño renal... Diabetes, Hipertensión arterial, Enfermedades autoinmunes\".<br><br>Análisis de Distractores: La obesidad y el tabaquismo fungen como aceleradores del declive (factores perpetuadores/progresión). La hiperuricemia daña el endotelio vascular acelerando la esclerosis, pero no es el \"iniciador\" canónico.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Anexos (Cuadro 1), p. 37."
    },
    {
        id: 7,
        question: "¿Qué combinación farmacológica antihipertensiva está formalmente contraindicada por ausencia de beneficio y mayor toxicidad?",
        options: ["Tiazida y betabloqueador", "Calcioantagonista y tiazida", "IECA y ARA-II", "IECA y calcioantagonista"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el bloqueo masivo del eje renina-angiotensina no suma efectos neurohormonales protectores, pero exacerba letalidad por azoemia e hipercalemia brusca.<br><br>Perla ENARM: \"No se recomienda combinar IECAs con bloqueadores del receptor de angiotensina ya que no se han demostrado beneficios al combinarlos para disminuir el riesgo de daño renal\".<br><br>Análisis de Distractores: Tiazidas, calcioantagonistas y betabloqueadores son agentes antihipertensivos aditivos y validados de segunda o tercera línea indispensables para estados de presión arterial resistente.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tratamiento, p. 25."
    },
    {
        id: 8,
        question: "¿Qué grupo de hipoglucemiantes reduce de forma directa hasta un 45 % el riesgo de progresión del daño crónico?",
        options: ["Sulfonilureas", "Inhibidores SGLT-2", "Agonistas GLP-1", "Inhibidores DPP-4"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, esta familia modula la hemodinámica de la arteriola aferente revirtiendo la hiperfiltración nefrotóxica independientemente de la carga glucémica basal.<br><br>Perla ENARM: \"Los inhibidores SGLT-2 redujeron el riesgo de progresión de enfermedad renal en un 45%. El tratamiento con inhibidores SGLT-2 puede reducir el riesgo de progresión\".<br><br>Análisis de Distractores: Las sulfonilureas (opción A) carecen de perfil nefroprotector. Agonistas GLP-1 (opción C) mejoran el perfil aterosclerótico sistémico, pero no detienen la pérdida del filtrado per se. Inhibidores DPP-4 (opción D) resultan neutrales funcionalmente.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tratamiento, p. 24."
    },
    {
        id: 9,
        question: "¿Cuál es la ingesta proteica diaria recomendada en pacientes con filtrado glomerular < 60 ml/min/1.73 m² sin terapia dialítica?",
        options: ["0.4 g/kg", "0.6 g/kg", "0.8 g/kg", "1.2 g/kg"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, un riñón lastimado fracasa excretando sobrecargas nitrogenadas, pero empujar al paciente hacia la subnutrición incrementa severamente la mortalidad precoz.<br><br>Perla ENARM: \"En pacientes con una tasa de filtrado glomerular < 60 ml/min/1.73 m2 y que no se encuentren en diálisis se sugiere una ingesta diaria de proteínas de 0.8 g/kg\".<br><br>Análisis de Distractores: Dosis de 1.2 g/kg (opción D) exacerban la hiperfiltración compensatoria destructiva. Bajar el consumo a 0.4 o 0.6 g/kg (opciones A y B) sin administración estricta de cetoanálogos dispara sarcopenia.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tratamiento, p. 33."
    },
    {
        id: 10,
        question: "¿Cuál es el límite estricto de consumo diario de sodio sugerido para favorecer el control hemodinámico y presor?",
        options: ["< 50 mEq", "< 100 mEq", "< 150 mEq", "< 200 mEq"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, frenar la hipervolemia retarda la hipertensión capilar intraglomerular, coadyuvando contundentemente al efecto terapéutico de los fármacos.<br><br>Perla ENARM: \"Se sugiere una ingesta de < 100 mEq/día de sodio para que la restricción pueda ser sostenible y se pueda mantener a lo largo del tiempo\".<br><br>Análisis de Distractores: Intentar un descenso < 50 mEq induce rápido fracaso dietético por palatabilidad nula y activa sistemas presores. Niveles > 100 mEq bloquean la cascada antiproteinúrica de los ARA-II.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tratamiento, p. 31."
    },
    {
        id: 11,
        question: "¿Cuál es el manejo farmacológico obligado para reducir desenlaces isquémicos en pacientes mayores de 50 años con esta alteración?",
        options: ["Fibratos", "Estatinas", "Resinas biliares", "Ezetimiba"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el ambiente urémico con microinflamación sistémica equivale biológicamente a un riesgo cardiovascular aterogénico máximo.<br><br>Perla ENARM: \"Se recomienda iniciar tratamiento con estatinas en pacientes con una tasa de filtración glomerular < 60 ml/min/1.73 m2 para disminuir la presentación de eventos cardiovasculares\".<br><br>Análisis de Distractores: Ezetimiba y resinas no disminuyen morbilidad miocárdica utilizándose aisladamente. Fibratos multiplican el riesgo tóxico (rabdomiólisis) en ambiente de filtrado pobre sin comprobar rescate vital solitario.",

    },
    {
        id: 12,
        question: "¿A partir de qué cifra de triglicéridos está justificado el uso de fibratos asumiendo el riesgo potencial de miopatía urémica?",
        options: ["≥ 200 mg/dl", "≥ 400 mg/dl", "≥ 500 mg/dl", "≥ 886 mg/dl"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, la inhibición ppar-alfa acarrea una altísima letalidad muscular a menos que el riesgo de pancreatitis isquémica fulminante exceda dicho costo tóxico.<br><br>Perla ENARM: \"No se sugiere utilizar fibratos, ya que pueden producir una mayor cantidad de eventos adversos... Únicamente valorar su uso en pacientes con triglicéridos > 10 mmol/L (886 mg/dL)\".<br><br>Análisis de Distractores: Cifras de 200, 400 o 500 mg/dl obligan a intensificar dietoterapia y estatinas como escalón preliminar ante los efectos secundarios cruzados severos que imponen los fibratos en pacientes nefrópatas.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tratamiento, p. 28."
    },
    {
        id: 13,
        question: "¿Cuál es el umbral cuantitativo de hemoglobina sérica que define la anemia de causa renal en pacientes masculinos?",
        options: ["< 11.0 g/dl", "< 12.0 g/dl", "< 13.0 g/dl", "< 14.0 g/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Renal Crónica Temprana, el parénquima fibrosado merma críticamente la cascada productora de eritropoyetina limitando la maduración medular e impidiendo la respiración tisular.<br><br>Perla ENARM: \"Se debe diagnosticar anemia en adultos y niños > 15 años de edad con ERC cuando la concentración de hemoglobina sea < 13 g/dL en hombres y < 12 g/dL en mujeres\".<br><br>Análisis de Distractores: 11.0 g/dl advierte el techo terapéutico tope tras tratamiento sintético. 12.0 g/dl delimita el percentil inferior estricto exclusivamente para la población femenina.",
        source: "GPC-IMSS-335-19, Prevención, Diagnóstico y Tratamiento de la Enfermedad Renal Crónica, 2019, Tratamiento, p. 29."

    {
        id: 14,
        question: "¿Cuál es la vía de administración preferida para la suplementación inicial de hierro considerando su eficacia pre-diálisis?",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');

                const qData = questionsData.find(q => q.id === currentQuestionId);

            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
