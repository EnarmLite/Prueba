                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>

    <script>
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el dato clínico clave que permite distinguir la Hipertensión Arterial Sistémica Enmascarada de la Hipertensión de Bata Blanca?", 
                options: ["Elevada en ambas mediciones", "Alta consultorio, normal en casa", "Alta casa, normal en consultorio", "Normal en ambas mediciones"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial en el Primer Nivel, la HTA Enmascarada representa un fenotipo peligroso, ya que el paciente exhibe aparente control frente al médico, pero sufre impacto hemodinámico el resto del día.<br><br>Perla ENARM: \"HAS Enmascarada: < 140 en consultorio y > 140 en casa.\" (Por el contrario, Bata Blanca es >140 en consultorio y <140 en casa).<br><br>Análisis de Distractores: Alta en consultorio y normal en casa (B) define a la Hipertensión de Bata Blanca. Elevada en ambas (A) diagnostica HTA sostenida. Normal en ambas (D) descarta la enfermedad en ese momento.", 
                source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento de la Hipertensión Arterial en el Primer Nivel de Atención, 2021, Anexos, Cuadro 1, Página 75." 
            },
            {
                id: 2, 
                question: "En pacientes adultos con obesidad, ¿cuál es el hallazgo o tamizaje clínico que debe realizarse de forma obligatoria, además del Índice de Masa Corporal, para integrar el riesgo cardiovascular presuntivo en el rango de 25 a 35 kg/m2?", 
                options: ["Pliegue cutáneo tricipital", "Índice cintura-cadera", "Circunferencia de cintura", "Bioimpedancia eléctrica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento del Sobrepeso y Obesidad, la adiposidad abdominal y sus riesgos no siempre se logran capturar en el rango de 25 a 35 kg/m2 utilizando únicamente la relación peso/talla. La medición de este perímetro es vital para estratificar el riesgo cardiometabólico.<br><br>Perla ENARM: \"Se recomienda medir además la circunferencia de cintura en aquellos pacientes con un IMC entre 25 y 35 kg/m2 porque la adiposidad abdominal y sus riesgos asociados podrían no ser capturados en este rango de IMC.\"<br><br>Análisis de Distractores: El Índice cintura-cadera (B) indica tendencia a acumular grasa, pero la GPC prioriza la circunferencia de cintura como indicador directo. La bioimpedancia (D) y el pliegue tricipital (A) no son los métodos iniciales de tamizaje recomendados para el primer nivel de atención.", 
                source: "GPC-IMSS-046-18, Diagnóstico y Tratamiento del Sobrepeso y Obesidad Exógena, 2018, Diagnóstico, p. 16." 
            },
            {
                id: 3, 
                question: "En la Enfermedad de Fabry, ¿cuál es el estudio de laboratorio que integra el diagnóstico presuntivo inicial en pacientes masculinos según la guía?", 
                options: ["Secuenciación del gen GLA", "Biopsia de tejido renal", "Actividad de alfa-galactosidasa A", "Medición de globotriaosilceramida"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedad de Fabry, la ruta diagnóstica inicial en hombres se basa en demostrar la deficiencia de la enzima a nivel bioquímico. Si la actividad es menor al 1%, el diagnóstico es altamente sugestivo y procede confirmarse mediante genética.<br><br>Perla ENARM: \"En los hombres, el diagnóstico definitivo se realiza documentando deficiencia de actividad enzimática en leucocitos y una mutación patogénica en el gen GLA\".<br><br>Análisis de Distractores: La secuenciación del gen GLA (Opción A) es el estándar de oro confirmatorio y el paso inicial en mujeres, pero no el tamizaje presuntivo inicial en hombres. La biopsia renal (Opción B) evalúa el daño a órgano blanco pero no diagnostica la enfermedad de base. La medición de globotriaosilceramida (Opción D) evalúa la carga de sustrato acumulado, no el déficit enzimático.", 
                source: "IMSS-165-09, Diagnóstico, Tratamiento y Seguimiento multidisciplinario en enfermedad de Fabry, 2017, Diagnóstico, Página 15." 
            },
            {
                id: 4, 
                question: "¿Cuál es el dato clínico o patrón de herencia que permite distinguir la Hemofilia A leve de la Enfermedad de von Willebrand?", 
                options: ["Tiempo de Tromboplastina prolongado", "Mujeres afectadas en la familia", "Hemorragia en articulaciones exclusivamente", "Desarrollo de autoanticuerpos neutralizantes"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Hemofilia A y B, tanto la Hemofilia A leve como ciertos tipos de Enfermedad de von Willebrand (EvW 2N y 3) cursan con Factor VIII bajo y TTPa prolongado. Sin embargo, la hemofilia tiene herencia ligada al cromosoma X (afecta varones), mientras que la EvW es autosómica, afectando a hombres y mujeres por igual.<br><br>Perla ENARM: \"En el paciente con hemofilia A leve, sin antecedentes familiares de hemofilia, donde hayan mujeres afectadas se recomienda descartar EvW (Enfermedad de von Willebrand).\"<br><br>Análisis de Distractores: A (Tiempo de Tromboplastina prolongado): Incorrecto, ambas patologías (hemofilia y variantes de EvW) prolongan el TTPa, por lo que no ayuda a diferenciarlas inicialmente. C (Hemorragia en articulaciones exclusivamente): Incorrecto, aunque la EvW sangra más por mucosas, los tipos severos (2N o 3) pueden imitar clínica articular, confundiendo el diagnóstico. D (Desarrollo de autoanticuerpos neutralizantes): Incorrecto, la aparición de inhibidores caracteriza a la hemofilia A adquirida o es una complicación del tratamiento a largo plazo, no un discriminador con EvW.", 
                source: "IMSS-178-09, Diagnóstico y Tratamiento Hemofilia A y B, 2017, Evidencias y Recomendaciones, p. 17." 
            },
            {
                id: 5, 
                question: "En un evento de Exposición Laboral al Virus de Inmunodeficiencia Humana (VIH), ¿cuál es el estudio de laboratorio inicial recomendado para establecer el diagnóstico y estado serológico basal del trabajador expuesto?", 
                options: ["ELISA de cuarta generación", "Prueba de Western Blot", "Carga viral para VIH", "Cuantificación de linfocitos CD4"], 
                answer: 0, 
                justification: "Justificación: Para establecer la serología basal del trabajador y descartar una infección preexistente, es necesario un estudio de alta sensibilidad que detecte la enfermedad de forma temprana. De acuerdo a la GPC de Exposición Laboral al VIH, el tamizaje ideal debe identificar tanto anticuerpos como antígenos para acortar el periodo de ventana biológica.<br><br>Perla ENARM: \"Para identificar el VIH es recomendable realizar un ELISA de cuarta generación ya que incluye la detección de anticuerpos y antígeno P24.\"<br><br>Análisis de Distractores: La prueba de Western Blot funge como un estudio confirmatorio posterior a un tamizaje positivo, no como estudio inicial. La carga viral se reserva para situaciones de sospecha de Síndrome Retroviral Agudo en el paciente fuente o ante cuadros agudos atípicos. La cuantificación de CD4 se utiliza para etapificar el daño inmunológico en pacientes con diagnóstico ya establecido, no para diagnóstico incidental basal.", 
                source: "IMSS-241-12, Prevención, Diagnóstico y Tratamiento de la Exposición Laboral al VIH en Trabajadores de la Salud, 2017, Sección: Diagnóstico de la infección por el VIH, Página 24." 
            },
            {
                id: 6, 
                question: "¿Cuál es el dato clínico clave que permite obligar la sustitución específica de Efavirenz en un paciente con Infección por el VIH?", 
                options: ["Tubulopatía proximal progresiva", "Síntomas neuropsiquiátricos persistentes", "Diarrea crónica persistente", "Reacción de hipersensibilidad sistémica"], 
                answer: 1, 
                justification: "Justificación: Las modificaciones de esquema (cambios reactivos) obedecen a toxicidades distintivas de cada familia. De acuerdo a la GPC de Infección por el VIH, este inhibidor no nucleósido penetra fácilmente al LCR, alterando receptores y manifestándose en la calidad de vida mental del portador.<br><br>Perla ENARM: \"El cambio reactivo es obligado si el efecto adverso va a desaparecer tras el cambio de TAR (ejemplo: efectos adversos del Sistema Nervioso Central causados por Efavirenz).\"<br><br>Análisis de Distractores: La tubulopatía es el sello de toxicidad clínica del Tenofovir Disoproxil, no de Efavirenz. La diarrea persistente o intolerancia gastrointestinal profunda caracteriza a los Inhibidores de Proteasa reforzados con Ritonavir. La reacción de hipersensibilidad obliga al retiro inmediato y definitivo del Abacavir.", 
                source: "IMSS-245-09, Tratamiento Antirretroviral del Paciente Adulto con Infección por el VIH, 2017, Cambio de Tratamiento por Toxicidad, Página 158." 
            },
            {
                id: 7, 
                question: "En el carcinoma basocelular, ¿cuál es el estudio o herramienta inicial que permite integrar el diagnóstico clínico presuntivo con una sensibilidad de hasta el 97%?", 
                options: ["Biopsia en sacabocados", "Dermatoscopia", "Raspado cutáneo", "Tomografía computarizada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Carcinoma Basocelular, el abordaje clínico de esta patología debe iniciar mediante la visualización magnificada por personal capacitado para evitar procedimientos invasivos iniciales de manera innecesaria. La biopsia se reserva únicamente en caso de duda clínica.<br><br>Perla ENARM: \"Se recomienda el uso de la dermatoscopia para el diagnóstico clínico del carcinoma basocelular.\"<br><br>Análisis de Distractores: La biopsia en sacabocados o de otro tipo (A, C) no es el estudio inicial, es el estudio de confirmación en caso de duda o sospecha fundada. La tomografía (D) no está indicada en el abordaje inicial de lesiones cutáneas no complicadas.", 
                source: "GPC-IMSS-360-19, Diagnóstico y Tratamiento del Carcinoma Basocelular, 2019, Sección: Evidencias y Recomendaciones (Diagnóstico), Página 13." 
            },
            {
                id: 8, 
                question: "Considerando que el electrorretinograma multifocal (mfERG) es un estudio diagnóstico valioso, ¿en qué porcentaje de los pacientes muestra disminución de la función cuando alcanzan una dosis acumulada tóxica de 1250g de hidroxicloroquina?", 
                options: ["Veinticinco por ciento (25%)", "Cincuenta por ciento (50%)", "Ochenta por ciento (80%)", "Diez por ciento (10%)"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención de toxicidad ocular por antimaláricos, se ha demostrado en la evidencia biofísica que existe una alta tasa de pacientes que pierden amplitud electrofisiológica a nivel celular en relación directa con altos niveles de gramaje acumulativo de la hidroxicloroquina a largo de la vida del enfermo.<br><br>Perla ENARM: \"El electrorretinograma multifocal muestra disminución de la función retiniana en el 50% de los pacientes que han tomado una dosis total acumulada de 1250g de hidroxicloroquina.\"<br><br>Análisis de Distractores: Las respuestas ficticias de 25% (A), 80% (C) y 10% (D) son distractores poblacionales que pretenden confundir con otras estadísticas o enfermedades descritas; sin embargo, para el umbral farmacológico documentado de 1250 gramos de HCQ, la caída de actividad biológica abarca exactamente a la mitad de la cohorte estudiada en la literatura de referencia que respalda esta guía de práctica clínica.", 
                source: "IMSS-431-11, Prevención de toxicidad ocular por cloroquina e hidroxicloroquina, 2017, Evidencias y Recomendaciones (Diagnóstico), p. 42." 
            },
            {
                id: 9, 
                question: "En raquitismo carencial, ¿cuál es el hallazgo de laboratorio inicial que apoya el diagnóstico presuntivo según la GPC?", 
                options: ["Calcio sérico elevado", "Fosfatasa alcalina elevada", "Paratohormona sérica suprimida", "Fósforo sérico elevado"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Raquitismo Carencial, el déficit de vitamina D ocasiona un hiperparatiroidismo secundario que busca compensar el calcio sérico extrayéndolo del hueso. Esto se traduce bioquímicamente en elevación de la Paratohormona y de la Fosfatasa alcalina, acompañados de disminución del fósforo sérico.<br><br>Perla ENARM: \"Los hallazgos de laboratorio comúnmente encontrados en presencia de raquitismo carencial incluyen disminución de 25-hidroxivitamina D, fósforo sérico, calcio sérico y aumento de hormona paratiroidea sérica y fosfatasa alcalina\".<br><br>Análisis de Distractores: El calcio sérico se encuentra normal o bajo en fases iniciales (nunca elevado, lo que descartaría raquitismo carencial y sugeriría hiperparatiroidismo primario o intoxicación). La Paratohormona está elevada (no suprimida) como respuesta compensatoria. El fósforo sérico se encuentra bajo (hipofosfatemia).", 
                source: "GPC-IMSS-459-19, Prevención, diagnóstico y tratamiento del Raquitismo Carencial, 2019, Estudios Bioquímicos, p. 29." 
            },
            {
                id: 10, 
                question: "¿Cuál es el diagnóstico diferencial de Rubéola sugerido por la GPC ante lesiones dérmicas similares pero con un \"ataque al estado general considerable\"?", 
                options: ["Sarampión", "Exantema súbito", "Escarlatina", "Dengue"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención de la Rubéola, el espectro de exantemas maculopapulares endémicos en México exige descartar arbovirosis en el diagnóstico diferencial, ya que clínicamente en etapas tempranas el exantema es indistinguible, pero el estado toxémico orienta al médico.<br><br>Perla ENARM: \"Dado que eventualmente la rubéola se confunde con el Dengue por las lesiones en la piel, y este a su vez con las que pueden presentar los enfermos de Zika y Chikungunya, también deberá hacer diagnóstico diferencial con estas entidades, aunque en estas el ataque al estado general es considerable\".<br><br>Análisis de Distractores: El Sarampión (A) cursa con mayor ataque que la rubéola (fiebre >39°C y Koplik), pero la GPC es literal al nombrar el ataque al estado general en Dengue/Zika/Chik como \"considerable\". El exantema súbito (B) presenta la caída de fiebre antes del rash, con buen estado general. La Escarlatina (C) es bacteriana y presenta piel de lija.", 
                source: "IMSS-469-11, Prevención, Diagnóstico y Tratamiento de la Rubéola en Primer Nivel de Atención, 2017, Sección 4.2.4 Diagnóstico Diferencial de la Rubéola, Página 23." 
            },
            {
                id: 11, 
                question: "¿Cuál es el factor de riesgo con mayor asociación para desarrollar Síndrome de Realimentación reportado por la GPC de Nutrición Parenteral?", 
                options: ["Ayuno por más de 3 días", "Índice de Masa Corporal <16", "Nutrición Parenteral por 4 semanas", "Falla intestinal tipo III"], 
                answer: 1,

        let userProgress = {};

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ExMI25LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExMI25Progress');
                localStorage.removeItem('ExMI25LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-purple-500 shadow-md z-10 border-purple-500 dark:border-purple-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

            const isAllCompleted = ans === total && total > 0;
            
            let firstUncompletedId = questionsData.find(q => !userProgress[q.id]?.answered)?.id;

            // Lógica para cambiar a estado de finalizado
            let blur1 = isAllCompleted ? "bg-emerald-500/30" : "bg-fuchsia-900/40";

            let titleText = isAllCompleted ? "¡Examen Finalizado!" : "MEDICINA INTERNA";
            let descText = isAllCompleted 
                ? "Has completado con éxito todas las preguntas. Revisa tus las respuestas correctas/incorrectas en el tablero." 
                : "Preguntas diseñadas para fortalecer tus conocimientos con reactivos de alta exigencia y enfoque clínico tipo ENARM basadas en las GPC mexicanas.";

            displayArea.innerHTML = `

                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />

                    <!-- HERO DYNAMIC -->
                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500 ${isAllCompleted ? 'ring-2 ring-emerald-500/50' : ''}">
                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">

                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>

                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>

                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->

                            </h2>

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>

                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="Ex_MI30.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI25Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI25LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI25LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI25Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

</script>
