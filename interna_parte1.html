        const desktopInnerLogoHtml = `
            <div class="hidden md:block md:absolute md:top-8 md:right-8 z-10">
                <div class="logo-container bg-white py-1 px-3 rounded-lg border border-slate-200 shadow-sm">
                    <span class="logo-enarm text-xl">ENARM</span>
                    <span class="logo-Lite text-base">Lite<sup>®</sup></span>
                </div>
            </div>
        `;

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento del sobrepeso y obesidad exógena",
    gpcLink: "https://drive.google.com/file/d/1I4cwUkmScVQdgNlWw7M7xgON_zpd5q9P/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM no evalúa la obesidad como un problema estético, sino como una <strong class="text-indigo-900 dark:text-indigo-200">entidad de riesgo cardiovascular escalonado</strong>. La clave es dominar los puntos de corte numéricos del IMC que obligan a cambiar la estrategia: transicionar de dieta exclusiva a fármaco (<strong class="underline">IMC &ge; 30 o &ge; 27 con comorbilidad</strong>) y cuándo derivar a cirugía (<strong class="underline">IMC &ge; 40 o &ge; 35 con comorbilidad grave</strong>).</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo no es lineal, es un sistema de "compuertas" basado en la gravedad y la respuesta:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Estilo de Vida vs. Fármacos:</strong> Si el paciente tiene IMC &gt; 30 o un IMC &gt; 27 con comorbilidad (DM2, HTA) y ha fallado a dieta sola, <strong class="text-rose-600 dark:text-rose-400 font-bold">se debe añadir farmacoterapia</strong>. No se inicia fármaco en sobrepeso simple sin comorbilidades.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El "Techo" Quirúrgico:</strong> Si el paciente alcanza IMC &gt; 40 o de 35-39.9 con comorbilidad severa y las medidas anteriores fallaron, la GPC dicta <strong class="underline">referencia a Cirugía Bariátrica</strong>. Retener a este paciente en primer nivel con dieta es un error.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Regla del 5%:</strong> Para evaluar éxito (farmacológico o conductual), se busca una <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">pérdida &gt; 5% del peso basal a los 3-6 meses</strong>. Si no, intensificar o suspender.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>"Zona Gris" del IMC:</strong> La medición de la <strong class="text-emerald-700 dark:text-emerald-300 font-bold">circunferencia de cintura</strong> es útil y obligatoria SOLO en pacientes con IMC entre <u class="decoration-emerald-400 decoration-2 font-bold">25 y 35 kg/m&sup2;</u> para capturar el riesgo de adiposidad abdominal. Si IMC &gt; 35, es innecesaria.</li>
                        <li><strong>Perfil Bioquímico:</strong> Todo paciente requiere Glucosa, Triglicéridos, HDL para justificar entrada al algoritmo farmacológico.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Obesidad Iatrogénica:</strong> Revisa la lista de medicamentos. Fármacos como <strong class="font-bold text-rose-600 dark:text-rose-400">insulina, sulfonilureas, propranolol, paroxetina y olanzapina</strong> causan ganancia de peso. Intenta cambiarlos primero.</li>
                        <li><strong>La Contraindicación Mexicana:</strong> La GPC establece explícitamente que <u class="decoration-rose-500 decoration-2">NO se recomienda Naltrexona/Bupropión</u> debido a la alta incidencia de eventos adversos (distractor frecuente en el examen).</li>
                        <li><strong>Suplementos de Calcio:</strong> No se recomiendan para bajar de peso.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-046-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">1ra Elección:</strong> El <strong class="underline">Orlistat</strong> se mantiene como el estándar de oro inicial por sus beneficios adicionales en presión arterial y lípidos.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Selección de Dieta:</strong> Si hay Hipertensión = <strong class="underline">Dieta DASH</strong>. Si hay Riesgo Cardiovascular general = <strong class="underline">Dieta Mediterránea</strong>.</li>

                </h4>
                <p>El ENARM evalúa que el diagnóstico de certeza requiere <strong class="text-indigo-900 dark:text-indigo-200">Monitoreo Ambulatorio (MAPA)</strong> para evitar el sobretratamiento (Bata Blanca) y que el tratamiento moderno es agresivo desde el inicio: <u class="decoration-indigo-400 decoration-2 font-medium">Terapia Dual Combinada en una sola píldora para casi todos los pacientes</u>, reservando la monoterapia solo para casos muy específicos (bajo riesgo o fragilidad).</p>

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Enfermedad de Fabry es una <strong class="text-indigo-900 dark:text-indigo-200">tesaurismosis lisosomal ligada al cromosoma X</strong>, donde la deficiencia de alfa-galactosidasa A provoca el depósito sistémico de globotriaosilceramida, manifestándose clínicamente con la <u class="decoration-indigo-400 decoration-2 font-medium">tríada clásica de acroparestesias, hipohidrosis y angioqueratomas</u>, evolucionando inevitablemente hacia falla renal y cardiomiopatía hipertrófica si no se trata.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo diagnóstico tiene una bifurcación crítica dependiente del sexo del paciente:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Escenario Masculino (La ruta bioquímica):</strong> Ante la sospecha clínica, el primer paso es <strong class="underline">medir la actividad enzimática</strong> de alfa-galactosidasa A en leucocitos. Si es baja o nula (&lt; 1%), se confirma obligatoriamente identificando la mutación patogénica en el gen GLA.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Escenario Femenino (La trampa diagnóstica):</strong> Por la inactivación aleatoria del cromosoma X (lyonización), <strong class="text-rose-600 dark:text-rose-400 font-bold">las mujeres pueden tener niveles enzimáticos normales a pesar de tener la enfermedad</strong>. En ellas, se salta el paso bioquímico y se exige ir directamente a la secuenciación del gen GLA.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Pivote Familiar:</strong> Una vez confirmado el caso índice, es obligatorio <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">realizar el árbol genealógico</strong> para identificar y estudiar a todos los familiares en riesgo.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Piel y Dolor:</strong> Lesiones rojo-violáceas en "traje de baño" (angioqueratomas) + dolor quemante en palmas/plantas = buscar intencionadamente <strong class="text-emerald-700 dark:text-emerald-300 font-bold">daño renal</strong>.</li>
                        <li><strong>Ojo y Diagnóstico:</strong> La <u class="decoration-emerald-400 decoration-2 font-bold">córnea verticillata</u> (opacidades corneales en remolino) visible con lámpara de hendidura "regala" el diagnóstico.</li>
                        <li><strong>Corazón (ECG):</strong> Mimetiza hipertrofia ventricular izquierda (HVI). Busca <strong class="text-emerald-700 dark:text-emerald-300 font-bold">PR corto</strong> y signos de HVI (septum &gt; 12 mm en paciente joven).</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa de la "Artritis":</strong> Acroparestesias confundidas con dolores de crecimiento/artritis juvenil. Si VSG/PCR son normales, piensa en Fabry.</li>
                        <li><strong>Red Flag de Tratamiento (Futilidad):</strong> NO iniciar Terapia de Reemplazo Enzimático (TRE) si hay enfermedad cardiaca avanzada (<strong class="font-bold text-rose-600 dark:text-rose-400">&ge; 2 segmentos fibróticos en RM</strong>) o deterioro cognitivo severo.</li>
                        <li><strong>Hombres Asintomáticos:</strong> Un hombre asintomático SÍ se trata si cumple tres criterios: <u class="decoration-rose-500 decoration-2">mutación + enzima &lt; 1% + &gt; 16 años</u>.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-165-09)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Diagnóstico Definitivo:</strong> Hombres: <strong class="underline">enzima baja + mutación</strong>; Mujeres: la enzima puede ser normal, <strong class="underline">siempre requiere mutación</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Manejo de Proteinuria:</strong> Con excreción de albúmina &gt; 300 mg/24h, se recomienda <strong class="underline">IECA o ARA-II</strong> como nefroprotección, independiente de la PA.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Inicio de TRE en Renales:</strong> Considerar TRE en pacientes con proteinuria clínica, caída de la TFG o disfunción tubular.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Dolor Neuropático:</strong> El fármaco de primera línea para dolor urente es la <strong class="underline">Carbamazepina</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Contraindicación Absoluta:</strong> NO iniciar tratamiento si la esperanza de vida es <strong class="underline">&lt; 1 año</strong> por comorbilidades.</li>
                </ol>
            </div>
        </div>
    `,
    clinicalCase: `

{
    id: 4,
    title: "Módulo 4: Diagnóstico y tratamiento de Hemofilia A y B en adultos",
    gpcLink: "https://drive.google.com/file/d/18EdyYdXU9tuIPV8ADKkUZoHoiR-EUYlr/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Hemofilia (A o B) debe entenderse como una <strong class="text-indigo-900 dark:text-indigo-200">coagulopatía de la vía intrínseca ligada al cromosoma X</strong>, donde la gravedad clínica es directamente proporcional al déficit porcentual del factor. El ENARM evaluará tu capacidad para correlacionar el nivel de factor (<strong class="underline">&lt; 1%</strong>) con hemorragias espontáneas (hemartrosis) y tu reflejo de <u class="decoration-indigo-400 decoration-2 font-medium">evitar el uso de plasma o crioprecipitados</u> en favor de concentrados liofilizados o recombinantes.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo del paciente adulto se estructura en tres decisiones críticas:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Clasificación de Gravedad:</strong> Ante un TTPa prolongado, se cuantifica el factor:
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Grave (&lt; 1%):</span> Sangrado espontáneo.</li>
                                <li><span class="font-bold text-amber-600 dark:text-amber-500">Moderada (1-5%):</span> Sangrado por trauma menor.</li>
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Leve (&gt; 5-40%):</span> Sangrado solo por trauma mayor o cirugía.</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Modalidad Terapéutica:</strong> <strong class="font-bold">A demanda</strong> (aplicar factor solo ante evidencia clínica) vs. <strong class="font-bold text-indigo-600 dark:text-indigo-400">Profilaxis Secundaria</strong> (estándar en adultos con 2 o más sangrados en articulaciones grandes para prevenir artropatía).
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Manejo del Evento Agudo (La Meta %):</strong> 
                            <br> - Si es <strong class="underline">hemartrosis</strong> (rodilla, codo), la meta es elevar el factor al <strong class="text-rose-600 dark:text-rose-400 font-bold">40-60%</strong>.
                            <br> - Si hay <strong class="underline">riesgo vital</strong> (SNC, Cuello, Trauma mayor), la meta sube al <strong class="text-rose-600 dark:text-rose-400 font-bold">80-100%</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Exploración:</strong> Paciente masculino con aumento de volumen articular (hemartrosis) tras trauma mínimo o espontáneo.</li>
                        <li><strong>Laboratorio Pivote:</strong> <strong class="text-emerald-700 dark:text-emerald-300 font-bold">TTPa Prolongado que CORRIGE</strong> con plasma normal. Si NO corrige = presencia de inhibidores (autoanticuerpos).</li>
                        <li><strong>Comorbilidad Silenciosa:</strong> Vigilar intencionadamente la <u class="decoration-emerald-400 decoration-2 font-bold">osteopenia/osteoporosis</u> por inactividad a partir de los 40 años.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa del "Leve":</strong> En Hemofilia leve (&gt; 5%) sin historia familiar clara, es OBLIGATORIO descartar <strong class="font-bold text-rose-600 dark:text-rose-400">Enfermedad de Von Willebrand</strong>.</li>
                        <li><strong>El "Paciente Nuevo":</strong> Anciano que súbitamente inicia con sangrados graves sin antecedentes, TTPa prolongado que <u class="decoration-rose-500 decoration-2">NO corrige</u> con mezclas = <strong class="font-bold">Hemofilia A Adquirida</strong> (inhibidores). No asumas que es congénita.</li>
                        <li><strong>Deficiencia Factor XI:</strong> Sospecharla si hay TTPa prolongado pero sin patrón de herencia ligado al X (ej. patrón autosómico).</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-178-09)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Tratamiento de Elección:</strong> NUNCA usar plasma o crioprecipitados si hay opción. Usar <strong class="underline">Concentrados liofilizados o Recombinantes</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Manejo del Dolor:</strong> Evitar AINEs clásicos. Iniciar con <strong class="underline">Paracetamol</strong>; si se requieren AINEs, usar Inhibidores selectivos de COX-2 con precaución.</li>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La exposición laboral al VIH es una urgencia médica cuyo pilar fundamental en el ENARM es el inicio de la profilaxis post-exposición (PPE) con terapia antirretroviral triple de forma <strong class="text-indigo-900 dark:text-indigo-200">inmediata (idealmente en las primeras 2 horas)</strong>, <u class="decoration-indigo-400 decoration-2 font-medium">sin retrasar el manejo por esperar confirmaciones de laboratorio</u> del paciente fuente.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo del trabajador expuesto sigue una secuencia estricta basada en el tiempo y el grado de riesgo:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">0</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Accidente:</strong> Ante la exposición, la medida inmediata y absoluta es <strong class="underline">lavar con agua y jabón o irrigar mucosas</strong>. Nunca exprimir el sitio del accidente ni usar agentes cáusticos.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Evaluación y Decisión:</strong> Se estratifica el riesgo. Un "Riesgo muy alto" equivale a una <strong class="text-rose-600 dark:text-rose-400 font-bold">punción profunda con aguja hueca</strong> (acceso vascular) de un paciente fuente con carga viral elevada.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Inicio de la PPE:</strong> Ofrecer la primera dosis de PPE mientras se realiza la evaluación clínica. El manejo cambia drásticamente si ya <strong class="text-rose-600 dark:text-rose-400 font-bold">pasaron más de 72 horas</strong>, punto de corte donde la PPE ya NO está indicada.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Reevaluación a las 72 horas:</strong> Momento crítico para ajustar o suspender. Si se confirma que el paciente fuente es VIH negativo, <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">la profilaxis se deberá suspender</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Piquete Superficial vs Profundo:</strong> Aguja maciza (de sutura) superficial = "NO alto riesgo". Aguja hueca contaminada con sangre = <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Alto riesgo absoluto</strong>.</li>
                        <li><strong>Paciente Fuente en Periodo de Ventana:</strong> Si la fuente tiene un cuadro compatible con Síndrome Retroviral Agudo, una ELISA saldría negativa; el estudio que define la necesidad de PPE es la <u class="decoration-emerald-400 decoration-2 font-bold">Carga Viral o el Antígeno p24</u>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa de la Conducta Inicial:</strong> Opciones como "aplicar hipoclorito" o "exprimir la herida" están <strong class="font-bold text-rose-600 dark:text-rose-400">contraindicadas</strong> porque aumentan la absorción. Solo lavar con agua y jabón.</li>
                        <li><strong>Retrasar el Manejo:</strong> Retrasar el inicio para "tomar ELISA al residente y al paciente" es un error grave. La PPE debe iniciar en <u class="decoration-rose-500 decoration-2">&lt; 2 horas</u> sin esperar resultados.</li>

                        <li><strong>Trampa del Seguimiento:</strong> Citar al paciente a los 6 meses es incorrecto según guías actuales; el seguimiento es basal, a las 4 y a las 12 semanas con ELISA de 4ta generación.</li>
                    </ul>
                </div>
            </div>

                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-241-12)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Medida Inmediata:</strong> Lavar con agua y jabón o irrigar mucosas; <strong class="underline">nunca exprimir</strong> la herida.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Tiempo Dorado:</strong> Iniciar la PPE idealmente en las <strong class="underline">primeras 2 horas</strong> y NO iniciarla si han pasado <strong class="underline">&gt; 72 horas</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Esquema 1ra Línea:</strong> Terapia triple por 28 días con <strong class="underline">Tenofovir/Emtricitabina + Raltegravir (o Dolutegravir)</strong>.</li>

                    <li><strong class="text-amber-700 dark:text-amber-500">Falla de PPE:</strong> Los factores de seroconversión a pesar de la profilaxis son inicio tardío (<strong class="underline">&gt; 45 horas</strong>), falta de adherencia y exposiciones repetidas.</li>
                </ol>
            </div>
        </div>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríauno1CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríauno1CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríauno1CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-amber-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-amber-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }

        appId: "1:767032952477:web:84347320ed3d376f7e7674",
        measurementId: "G-PVR3RBVNSV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 2. Ocultamos la página por 1 segundo para que no vean el contenido si no tienen sesión
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.5s ease';

    // 3. Revisamos quién entra
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Está logueado, pero ¿sigue en la lista blanca?
            const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            
            if(userDocSnap.exists()) {
                // ¡Todo en orden! Mostramos el contenido
                document.body.style.opacity = '1';
            } else {
                // Está logueado pero no en la lista blanca -> Al inicio
                window.location.href = "index.html"; 
            }
        } else {
            // No tiene sesión abierta -> Al inicio
            window.location.href = "index.html";
        }
    });
</script>
