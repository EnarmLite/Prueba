            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "En Infección de Vías Urinarias durante el embarazo, ¿cuál es el hallazgo microbiológico que confirma el diagnóstico de certeza de acuerdo a la GPC?", 
                options: [">10,000 UFC/ml dos microorganismos", ">100,000 UFC/ml un microorganismo", "Nitritos y leucocitos incontables", ">50,000 UFC/ml un microorganismo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, el estándar de oro para el diagnóstico definitivo, tanto para cistitis como para bacteriuria asintomática, exige una carga bacteriana significativa demostrada por cultivo, limitándose a una sola cepa para descartar contaminación de la muestra.<br><br>Perla ENARM: \"Se recomienda realizar urocultivo para confirmar diagnóstico de ITU en embarazadas con síntomas (100,000 unidades formadoras de colonias de un solo microrganismo).\"<br><br>Análisis de Distractores: Las opciones con recuentos menores (10,000 o 50,000) o la presencia de múltiples microorganismos se consideran habitualmente muestras contaminadas o no diagnósticas en toma a chorro medio. Los nitritos y leucocitos son datos presuntivos en la tira reactiva, útiles para inicio empírico, pero no confirman el diagnóstico de certeza.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Sección Diagnóstico, Página 22." 
            },
            {
                id: 2, 
                question: "Utilizando las definiciones temporales de la GPC para la Amenaza de Aborto, ¿cómo se clasifica a una paciente que presenta el cuadro clínico en la semana 16 de gestación?", 
                options: ["Amenaza de aborto temprana", "Amenaza de aborto tardía", "Aborto diferido temprano", "Aborto inevitable tardío"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, el punto de corte fisiológico para dividir la sintomatología de la amenaza es la semana 14. Las causas y el riesgo de pérdida cambian radicalmente al superar el primer trimestre.<br><br>Perla ENARM: \"La amenaza de aborto tardía es aquella que se presenta entre la semana 14 a 22.\"<br><br>Análisis de Distractores: La opción A (temprana) abarca embarazos de menos de 14 semanas. Las opciones C y D implican la ausencia de latido o la dilatación cervical, lo cual no corresponde a un cuadro exclusivo de amenaza donde hay embrión vivo y cérvix cerrado.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Introducción, Página 8." 
            },
            {
                id: 3, 
                question: "Durante el manejo intraoperatorio de una paciente con Acretismo Placentario, ¿cuál es el grupo farmacológico que la GPC indica evitar estrictamente para la profilaxis de hemorragia obstétrica debido al riesgo de sangrado masivo?", 
                options: ["Tocolíticos", "Corticoesteroides", "Uterotónicos", "Anestésicos regionales"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, al inducir contracciones enérgicas del miometrio contra una placenta profundamente adherida (acretismo), se genera un desgarro parcial incontrolable y letal. En este contexto quirúrgico, los uterotónicos representan la respuesta correcta como agentes contraindicados. \"En pacientes con diagnóstico de acretismo placentario no se recomienda el uso de uterotónicos para la profilaxis de la hemorragia obstétrica.\"<br><br>Análisis de Distractores: Los anestésicos regionales (Opción D) son precisamente la técnica anestésica preferida por la guía para mantener la estabilidad materna. Los corticoesteroides (Opción B) se utilizan de manera prenatal, no intraoperatoria. Los tocolíticos (Opción A) inhiben la contracción, lo opuesto al mecanismo fisiopatológico del daño por uterotónicos en el acretismo.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 27." 
            },
            {
                id: 4, 
                question: "Según la estrategia de atención prenatal integral para prevenir la Amenaza de Aborto, ¿cuál es el esquema de suplementación recomendado por la GPC antes y durante el primer trimestre?", 
                options: ["Inmunoglobulina anti-D", "Sulfato ferroso exclusivo", "Ácido acetilsalicílico profiláctico", "Multivitamínicos y ácido fólico"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, los micronutrientes inciden directamente en el desarrollo trofoblástico temprano y el cierre del tubo neural, reduciendo la incidencia de pérdidas espontáneas.<br><br>Perla ENARM: \"La suplementación de vitaminas antes y durante del embarazo ayuda a prevenir el aborto espontaneo. Multivitaminas más hierro y ácido fólico (Fuerte GRADE).\"<br><br>Análisis de Distractores: La inmunoglobulina anti-D (A) es para prevención de isoinmunización, no para prevenir el aborto en sí. El ácido acetilsalicílico (C) se usa para prevención de preeclampsia en alto riesgo, no como suplementación universal para amenaza de aborto. El hierro exclusivo (B) previene anemia pero la vitamina C, E y vitaminas del complejo B también son requeridas.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Prevención, Páginas 13 y 32." 
            },
            {
                id: 5, 
                question: "Según la estrategia de prevención para Infección de Vías Urinarias en embarazadas con alto riesgo (ej. portadoras de catéter), ¿cuál es el fármaco profiláctico indicado por la GPC?", 
                options: ["Amoxicilina", "Nitrofurantoína", "Fosfomicina trometamol", "Ceftriaxona"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, para sostener un ambiente intraluminal urinario hostil al crecimiento bacteriano de forma crónica sin alterar la flora sistémica de manera severa, se requiere un antiséptico urinario concentrado en la excreción.<br><br>Perla ENARM: \"Se sugiere el uso de nitrofurantoína para profilaxis farmacológica en mujeres embarazadas con alto riesgo de infección del tracto urinario.\"<br><br>Análisis de Distractores: Fosfomicina se reserva como primera línea de tratamiento empírico episódico, no profiláctico continuo. La amoxicilina sufre de severa resistencia. La ceftriaxona es un parenteral hospitalario para pielonefritis.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Sección Prevención, Página 19." 
            },
            {
                id: 6, 
                question: "Más allá del uso rápido de la tira reactiva inicial, ¿cuál es el estudio considerado por la GPC como estándar de oro confirmatorio para la cuantificación y diagnóstico de la proteinuria?", 
                options: ["Recolección orina de 24 horas.", "Cociente proteína creatinina urinaria.", "Cuantificación en 12 horas.", "Tira reactiva visual."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Preeclampsia, recolectar la micción durante un ciclo circadiano completo es la única forma que evade las fluctuaciones temporales fisiológicas, el pH y la densidad urinaria, manteniendo a la recolección orina de 24 horas como el referente histórico confirmatorio absoluto.<br><br>Perla ENARM: \"La recolección de orina durante 24 horas, se considera el estandar de oro para la cuantificación de proteinuria en el embarazo, se define como proteinuria significativa mayor que o igual a 300 mg por 24 horas o mas.\"<br><br>Análisis de Distractores: El cociente proteína creatinina es de alta utilidad por su rapidez en urgencias, pero la guía remarca a la de 24 hrs como \"estándar de oro\". La tira visual acarrea altos falsos positivos/negativos por infección o concentración. Las 12 horas es alternativa pero inferior a 24 horas.", 
                source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 19." 
            },
            {
                id: 7, 
                question: "Según la GPC de Emergencias Obstétricas, ¿cuál es uno de los fármacos de elección para el manejo agudo inicial de la Crisis Hipertensiva en el Embarazo?", 
                options: ["Trinitrato de glicerina intravenoso", "Nifedipino de liberación inmediata", "Sulfato de magnesio intravenoso", "Diazóxido en infusión continua"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, la reducción aguda de la presión arterial busca evitar accidentes cerebrovasculares maternos utilizando agentes de rápida acción comprobada.<br><br>Perla ENARM: \"Para el tratamiento inicial de la crisis hipertensiva en el embarazo se podrá considerar como fármacos de primera línea al nifedipino de liberación inmediata vía oral o hidralazina intravenosa.\"<br><br>Análisis de Distractores: El trinitrato de glicerina y el diazóxido son opciones de segunda o tercera línea para refractariedad. El sulfato de magnesio se utiliza para profilaxis de convulsiones (eclampsia), no como hipotensor primario.", 
                source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Crisis hipertensiva en el embarazo, Página 18." 
            },
            {
                id: 8, 
                question: "Para el seguimiento ambulatorio de una paciente con Amenaza de Aborto en etapa de viabilidad incierta, ¿cada cuántos días establece la GPC que deben realizarse las determinaciones seriadas de la fracción beta de Gonadotropina Coriónica Humana?", 
                options: ["Cada 24 horas", "Cada 12 horas", "Cada 2 a 3 días", "Cada 7 a 10 días"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, los niveles de la fracción beta de Gonadotropina Coriónica Humana en un embarazo intrauterino viable en el primer trimestre presentan una duplicación característica que sirve como marcador de buen pronóstico y vitalidad trofoblástica en lapsos cortos.<br><br>Perla ENARM: \"Manejo ambulatorio: Medidas seriadas de b-HGC cada 2 a 3 días.\"<br><br>Análisis de Distractores: A las 12 o 24 horas (A y B) los cambios hormonales no son concluyentes para confirmar viabilidad. El rango de 7 a 10 días (D) es el intervalo indicado por la GPC para repetir un \"Ultrasonido\" ante un embarazo de viabilidad incierta, no para la prueba en sangre.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Cuadros o figuras, Página 23." 
            },
            {
                id: 9, 
                question: "Según la GPC de Anomalías de Inserción Placentaria, ¿cuál es la técnica quirúrgica indicada y recomendada universalmente para el manejo definitivo de una paciente con Acretismo Placentario?", 
                options: ["Histerectomía subtotal", "Extracción manual de placenta", "Legrado uterino instrumentado", "Histerectomía dejando placenta in situ"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la manipulación de una placenta adherida a miometrio desata hemorragias fulminantes con elevadísima mortalidad materna. El control de daños exige extirpar el órgano pélvico cerrado, siendo la histerectomía dejando placenta in situ la respuesta correcta. \"En pacientes con acretismo placentario se recomienda realizar cesárea histerectomía, dejar la placenta in situ y evitar intentar separar la placenta de las paredes uterinas.\"<br><br>Análisis de Distractores: La Histerectomía subtotal (Opción A) es incorrecta; la GPC estipula realizar la histerectomía \"total abdominal\" ya que la inserción de la placenta suele asentar en el segmento bajo o cérvix. La Extracción manual de placenta (Opción B) o el Legrado uterino (Opción C) garantizan desgarros masivos y choque hipovolémico letal.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 25." 
            },
            {
                id: 10, 
                question: "¿Cuál es la meta terapéutica de tensión arterial que establece la GPC para una paciente con preeclampsia sin comorbilidades agudas con el fin de evitar la hipoperfusión placentaria?", 
                options: ["Menor a 120/80 mmHg.", "130-155 / 80-105 mmHg.", "140-160 / 90-110 mmHg.", "130-139 / 80-89 mmHg."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Preeclampsia, mantener rangos de tensión discretamente por encima del valor fisiológico normal es mandatorio para asegurar una adecuada presión de perfusión en el lecho uteroplacentario y evitar el sufrimiento fetal, por lo tanto, el rango de 130-155 / 80-105 mmHg es el indicado.<br><br>Perla ENARM: \"En pacientes con preeclampsia sin co-morbilidad la terapia antihipertensiva se recomienda para mantener presión diastólica entre 105 y 80 mm Hg, y sistólica entre 155 a 130 mm Hg.\"<br><br>Análisis de Distractores: Buscar cifras <120/80 mmHg disminuye letalmente el flujo umbilical. Los rangos de 130-139 / 80-89 mmHg son metas aplicables pero únicamente para mujeres gestantes que cursen de forma conjunta con diabetes u otra condición comórbida severa. Cifras mayores a 160/110 ya son criterio de emergencia.", 
                source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 33." 
            },
            {
                id: 11, 
                question: "En el contexto de las Anomalías de Inserción Placentaria, ¿cuál es el factor de riesgo con el mayor nivel de asociación (Odds Ratio) reportado por la GPC para desarrollar estas alteraciones en la gestación actual?", 
                options: ["Edad materna avanzada", "Tratamientos de infertilidad", "Cesárea previa", "Tabaquismo activo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, el daño endometrial y los procesos de cicatrización incrementan el riesgo de alteraciones. El cuadro de factores de riesgo describe que los tratamientos de infertilidad lideran estadísticamente con el OR más alto, haciendo de los Tratamientos de infertilidad la respuesta correcta. \"Tratamientos de infertilidad OR 1.97; IC 95% 1.45–2.66; P < 0.001.\"<br><br>Análisis de Distractores: La cesárea previa (Opción C) es el factor de riesgo más buscado clínicamente para acretismo (OR 1.76), pero no tiene el OR más alto reportado globalmente en la tabla general de riesgo de la GPC. El tabaquismo (Opción D) y la edad materna (Opción A) contribuyen al riesgo (OR 1.42 y OR 1.08, respectivamente), pero en menor proporción.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Cuadros o figuras, Página 40."

                options: ["Medición de pH vaginal", "Cultivo de exudado vaginal", "Prueba de aminas", "Frotis con tinción Gram"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, ante un cuadro con datos de severidad (fisuras, escoriaciones, edema intenso) la enfermedad se reclasifica como complicada. En estos escenarios, el tratamiento empírico es insuficiente y es obligatorio identificar la especie exacta, dado el riesgo de estar frente a cepas no albicans (ej. C. glabrata) que requieren esquemas terapéuticos distintos y prolongados.<br><br>Perla ENARM: \"A todas las pacientes con cuadro clínico que sugiera CVV es necesario muestra de exudado vaginal para examen en fresco y ante la sospecha de una CVV complicada es indispensable la toma de cultivo de exudado vaginal\".<br><br>Análisis de Distractores: La opción A y C son utilizadas para el diagnóstico diferencial (vaginosis). La opción D tiene mejor sensibilidad que el examen en fresco, pero no permite tipificar la especie de levadura como lo hace el cultivo, por lo que no cumple el requisito indispensable de la forma complicada.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Diagnóstico clínico y pruebas diagnósticas, Página 17." 
            },
            {
                id: 29, 
                question: "Ante la fuerte sospecha clínica de Sepsis Materna en el área de urgencias, ¿cuál es la medida paraclínica inicial obligatoria previa al inicio de antimicrobianos según el algoritmo de la GPC?", 
                options: ["Toma de dos hemocultivos.", "Medición de procalcitonina sérica.", "Gasometría arterial basal.", "Ultrasonido obstétrico urgente."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, el abordaje diagnóstico inicial obliga a identificar el agente causal para dirigir la terapia. Se deben solicitar al menos dos frascos de hemocultivos de diferentes sitios (y de catéteres si están presentes) antes de la administración del antibiótico, siempre cuidando que esta toma no retrase el inicio empírico del fármaco en la \"hora dorada\".<br><br>Perla ENARM: \"Ante la sospecha de sepsis materna, es útil tomar cultivos microbiológicos adecuados antes de comenzar el tratamiento antibiótico, sin retrasar el inicio del mismo.\"<br><br>Análisis de Distractores: La opción B (procalcitonina) no figura en el cuadro básico de abordaje inicial recomendado por esta guía. La opción C (gasometría) y la D (ultrasonido) son parte de la evaluación integral para ver disfunción respiratoria y bienestar fetal, pero la GPC es enfática en priorizar la toma de cultivos antes del fármaco como estándar microbiológico.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Tratamiento, p. 17 y 31." 
            },
            {
                id: 30, 
                question: "En el abordaje del paciente grave, ¿cuál es el marcador bioquímico incluido en la GPC de preeclampsia que confirma hemólisis isquémica y pronostica el diagnóstico del Síndrome de HELLP?", 
                options: ["Deshidrogenasa láctica mayor a 600.", "Creatinina sérica mayor a 1.1.", "Ácido úrico mayor a 6.", "Albúmina plasmática severamente disminuida."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Preeclampsia, la fragmentación de hematíes en la microvasculatura estrecha sumada a la isquemia hepática libera grandes cantidades enzimáticas intracelulares hacia el plasma, siendo el valor mayor de 600 UI/ml de DHL un estándar definitorio y deshidrogenasa láctica mayor a 600 la respuesta correcta.<br><br>Perla ENARM: \"Complicaciones severas Hepático: Elevación de Deshidrogenasa láctica >600UI/ml.\"<br><br>Análisis de Distractores: La creatinina sérica de >1.1 mg/dl es el marcador del riñón, el daño de órgano blanco es lesión renal aguda pero no define el HELLP. El ácido úrico y la albúmina se alteran durante el cuadro general de preeclampsia por daño renal y endotelial, pero la DHL caracteriza la 'H' (Hemolysis) y la injuria del hepatocito.", 
                source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Anexos, Página 61." 
            },
            {
                id: 31, 
                question: "En el diagnóstico diferencial de las medidas terapéuticas, ¿cuál es la intervención que la GPC contraindica explícitamente en el Parto Pretérmino por aumentar el riesgo tromboembólico?", 
                options: ["Hidratación intravenosa rápida", "Reposo estricto en cama", "Administración de nitratos", "Uso de antibióticos profilácticos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, es imperativo desmitificar viejas costumbres obstétricas. Mantener en decúbito absoluto a una gestante (estado inherentemente hipercoagulable) expone a la madre a trombosis venosa profunda y no cambia el pronóstico del embarazo.<br><br>Perla ENARM: \"El reposo estricto en cama incrementa el riesgo tromboembólico y no disminuye el riesgo de parto pretérmino. No se recomienda la hidratación y el reposo estricto en cama como tratamientos específicos e intervenciones que disminuyan el parto pretérmino.\"<br><br>Análisis de Distractores: La hidratación rápida (Opción A) tampoco sirve y eleva riesgo de edema agudo de pulmón (sobre todo combinada con tocolíticos como betamiméticos), pero el riesgo tromboembólico es la huella específica del reposo. Los nitratos (Opción C) están en fase experimental. Los antibióticos profilácticos (Opción D) con membranas íntegras no son recomendados, pero no causan trombosis.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 92 y 93." 
            },
            {
                id: 32, 
                question: "¿Cuáles son los criterios clínicos que obligan al envío a Ginecología (segundo nivel) de una paciente con Candidosis Vulvovaginal?", 
                options: ["Cuadro clínico recurrente severo", "Primer episodio de su vida", "Falla al tratamiento empírico", "Infección por Candida glabrata"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, en los escenarios de bajo riesgo, el primer nivel suele dar manejos empíricos. Cuando no existe mejoría a este abordaje, se justifica referir a Ginecología para poder extender los recursos diagnósticos de gabinete y confirmar la etiología, descartando enfermedades alternas o complicaciones.<br><br>Perla ENARM: \"Las mujeres con CVV que debieran ser enviadas del primer nivel de atención al segundo nivel de atención al servicio de Ginecología, son aquellas con CVV no complicada que recibieron tratamiento empírico y no hubo respuesta\".<br><br>Análisis de Distractores: La opción A y D, al ser recurrentes complicadas con aislamiento microbiológico que requiere tipificación avanzada (determinar resistencias), deben ir directamente a Infectología en el tercer nivel. La opción B se maneja de forma rutinaria en el primer nivel.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Criterios de Referencia, Página 24." 
            },
            {
                id: 33, 
                question: "Según la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, ¿cuál es el parámetro clínico específico que forma parte de la escala de tamizaje inicial modificada en obstetricia (omqSOFA)?", 
                options: ["Presión arterial sistólica ≤90.", "Frecuencia respiratoria ≥22.", "Frecuencia cardiaca >100.", "Temperatura corporal >38.5°C."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, los cambios fisiológicos del embarazo obligan a utilizar parámetros modificados. Mientras que la escala qSOFA clásica usa una presión sistólica ≤100 mmHg y frecuencia respiratoria ≥22, la escala omqSOFA (obstétrica) es más estricta con la presión, definiendo el criterio como una Presión Arterial Sistólica (PAS) ≤90 mmHg, una frecuencia respiratoria ≥25 por minuto y cualquier alteración del estado de conciencia.<br><br>Perla ENARM: \"Se recomienda emplear la escala de omqSOFA (puntaje modificado en obstetricia, para la evaluación rápida de la falla orgánica) para el tamizaje de la sepsis materna.\"<br><br>Análisis de Distractores: La opción B corresponde al criterio de la escala quick-SOFA para población general, no para embarazadas (donde el corte es 25). Las opciones C y D son variables del antiguo Síndrome de Respuesta Inflamatoria Sistémica (SIRS), el cual la guía internacional y la actual GPC recomiendan abandonar por su falta de precisión en la mujer gestante.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Diagnóstico, p. 15." 
            },
            {
                id: 34, 
                question: "De acuerdo a la guía de referencia rápida, ¿cuál es el dato epidemiológico clave que permite prever y vigilar de manera más frecuente la aparición de hipertensión o preeclampsia temprana posparto?", 
                options: ["Inicio a las 12 semanas.", "Inicio en primeras 48 horas.", "Ausencia de proteinuria cuantificada.", "Presencia de convulsiones generalizadas."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Preeclampsia, las adaptaciones vasculares tras el desalumbramiento y el retorno masivo de los fluidos al espacio intravascular provocan el pico hipertensivo agudo de mayor incidencia poco tiempo después de egresar del toco-quirúrgico, siendo el inicio en primeras 48 horas la opción correcta a vigilar.<br><br>Perla ENARM: \"La elevación de la presión posparto es más frecuente durante los primeros tres a seis días posparto, cuando la mayoría de las pacientes han sido dadas de alta. La mayoría de los casos se desarrollan dentro de las 48 h siguientes al parto.\"<br><br>Análisis de Distractores: La aparición a las 12 semanas indica hipertensión arterial crónica esencial y ya no se considera patología ligada al puerperio (la GPC reevalúa hasta esas semanas). Las crisis generalizadas son consecuencias (eclampsia) y la ausencia de proteinuria no es el rasgo que distingue a la patología per se como factor temporal posparto.", 
                source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 51." 
            },
            {
                id: 35, 
                question: "Ante la sospecha clínica de Placenta Previa en una paciente que ingresa por sangrado transvaginal activo a Urgencias, ¿cuál es la acción clínica indicada inicialmente para evaluar la procedencia del sangrado según la GPC?", 
                options: ["Ultrasonido abdominal", "Resonancia magnética", "Tacto vaginal", "Especuloscopía"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la manipulación cervical digital puede desinsertar catástroficamente un borde placentario subyacente. La revisión debe ser exclusivamente visual para certificar el origen uterino del sangrado, lo que convierte a la especuloscopía en la respuesta correcta. \"En pacientes con sospecha clínica de anomalías de inserción placentaria o de vasa previa, se recomienda hospitalización, realizar ultrasonido para confirmar el diagnóstico y especuloscopía para evaluar la presencia de sangrado procedente de cavidad uterina.\"<br><br>Análisis de Distractores: El tacto vaginal (Opción C) está absoluta y tajantemente contraindicado. El ultrasonido abdominal (Opción A) y la resonancia (Opción B) son estudios de gabinete posteriores, pero la \"acción clínica\" inicial para evaluar el sangrado visible en la camilla de urgencias es colocar un espejo vaginal.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 13." 
            },
            {
                id: 36, 
                question: "Ante una paciente con Hemorragia Postparto refractaria donde se planea indicar tratamiento quirúrgico con suturas compresivas uterinas, ¿cuál es la prueba clínica que debe realizarse transoperatoriamente para confirmar la posible eficacia de las suturas según la GPC?", 
                options: ["Pinzamiento vaginal de Zea", "Reversión de índice de choque", "Prueba de compresión uterina bimanual", "Cuantificación de fibrinógeno normal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Hemorragia Postparto, antes de comprometer el útero con material de sutura invasivo (tipo B-Lynch), el cirujano debe replicar mecánicamente el efecto de la sutura comprimiendo el útero con ambas manos; si el sangrado cede, la sutura será exitosa.<br><br>Perla ENARM: \"Se sugiere realizar prueba de eficacia previa (compresión uterina bimanual en cara anterior y posterior) cuando se considera utilizar suturas compresivas, la cual es positiva si se controla el sangrado y negativa si este persiste.\"<br><br>Análisis de Distractores: La opción A es una medida temporal vaginal que no predice el éxito de una compresión fúndica quirúrgica. Las opciones B y D son metas de reanimación sistémica, no predictores mecánicos locales.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento, Página 32." 
            },
            {
                id: 37, 
                question: "Según la GPC de Infección de Vías Urinarias durante el embarazo, ¿cómo se clasifica a una gestante con bacteriuria significativa acompañada de fiebre y dolor lumbar?", 
                options: ["Bacteriuria asintomática", "Pielonefritis aguda", "Cistitis aguda", "Infección de tracto inferior"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, la clasificación anatómica clínica de la infección divide a las entidades en tracto inferior (cistitis) y superior. La invasión del parénquima renal se manifiesta con síntomas sistémicos y focalización en la fosa renal.<br><br>Perla ENARM: \"En la ITU superior, la pielonefritis se presenta con fiebre y sensibilidad renal.\"<br><br>Análisis de Distractores: La bacteriuria asintomática carece de cualquier síntoma. La cistitis aguda y la infección del tracto inferior se limitan a síntomas irritativos locales (disuria, urgencia, polaquiuria) sin involucro sistémico (fiebre) ni dolor en la percusión costovertebral.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Sección Introducción, Página 7." 
            },
            {
                id: 38, 
                question: "¿Cuál de los siguientes es un dato clínico materno o fetal que obliga a suspender el manejo conservador en la Ruptura Prematura de Membranas Pretérmino?", 
                options: ["Taquicardia fetal", "Actividad uterina leve", "Edad de 28 semanas", "Salida de líquido claro"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, la taquicardia fetal es un dato clínico temprano de corioamnionitis[cite: 163, 168]. El manejo conservador (espera vigilada con esteroides y antibióticos) está contraindicado si existe infección intraamniótica, ya que el riesgo de sepsis neonatal y morbilidad materna supera el beneficio de la madurez pulmonar [cite: 251, 266].<br><br>Perla ENARM: \"Se recomienda el monitoreo fetal diario usando estudio cardiotocográfico para detectar taquicardia por el alto riesgo de corioamnionitis\"[cite: 171].<br><br>Análisis de Distractores: La actividad uterina leve (B) puede presentarse sin ser una indicación absoluta de interrupción si no hay infección o compromiso. La edad gestacional de 28 semanas (C) es, de hecho, la indicación principal para INICIAR el manejo conservador[cite: 162]. La salida de líquido (D) es la definición de la patología, no una complicación que obligue a interrumpir[cite: 67].", 
                source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Evidencias y Recomendaciones, Página 16." 
            },
            {
                id: 39, 
                question: "¿En Candidosis Vulvovaginal, Cuál es la comorbilidad metabólica que clasifica a una paciente como \"hospedero susceptible\" requiriendo esquemas de inducción oral de 3 dosis?", 
                options: ["Hipotiroidismo subclínico", "Síndrome de Cushing", "Resistencia a la insulina", "Diabetes mellitus descontrolada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, la inmunosupresión endógena provocada por los desórdenes glucémicos clasifica inmediatamente el cuadro como \"complicado\", invalidando las terapias de \"dosis única\". El ambiente hiperglucémico perpetúa la colonización, por lo que se exige control estricto de la patología de base y esquemas agresivos intermitentes en la primera semana.<br><br>Perla ENARM: \"La CVV en hospederos con enfermedades subyacentes: diabetes, VIH, manejo con corticoesteroides... No prescribir tratamiento corto... O fluconazol 100 mg, 150 mg o 200 mg por vía bucal cada tercer día por tres dosis (días 1, 4 y 7)\".<br><br>Análisis de Distractores: Las opciones A, B y C son alteraciones endocrinas, pero la guía especifica enfáticamente a la Diabetes Mellitus como el factor metabólico predisponente clásico asociado al cuadro complicado de la vulvovaginitis fúngica.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Tratamiento Farmacológico, Página 23." 
            },
            {
                id: 40, 
                question: "Según la GPC de Emergencias Obstétricas, en una paciente con sospecha clínica de Embolia de Líquido Amniótico, ¿cuál es el hallazgo o alteración clínica que integra el diagnóstico presuntivo además del choque y compromiso respiratorio?", 
                options: ["Fiebre mayor a 38°C", "Coagulación intravascular diseminada", "Cefalea intensa y vértigo", "Elevación del segmento ST"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, el diagnóstico de esta patología es eminentemente clínico y de exclusión. La coagulopatía de consumo temprana es un marcador fisiopatológico fundamental que acompaña al choque y a la hipoxia.<br><br>Perla ENARM: \"Los criterios para establecer el diagnóstico de embolia de líquido amniótico [...] son: 1. Paro cardiorrespiratorio o hipotensión súbita y compromiso respiratorio. 2. Presencia de coagulación intravascular diseminada (CID). 3. Que el cuadro clínico se presente durante el trabajo de parto, nacimiento o a los 30 minutos posteriores. 4. Ausencia de fiebre.\"<br><br>Análisis de Distractores: La fiebre es un criterio de exclusión absoluto para este diagnóstico (apunta a sepsis). La cefalea y vértigo se asocian a trastornos hipertensivos como eclampsia. La elevación del ST es indicativa de infarto agudo del miocardio.", 
                source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Embolia de líquido amniótico, Página 22." 
            },
            {
                id: 41, 
                question: "En Sepsis Materna, ¿cuál es el factor de riesgo independiente asociado al nacimiento con mayor impacto y asociación estadística reportado en la GPC?", 
                options: ["Cesárea de urgencia.", "Más de 5 tactos.", "Obesidad materna grado III.", "Anemia materna severa."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, aunque existen múltiples factores predisponentes (como la obesidad, anemia y el número de tactos), la cesárea no programada o de urgencia es el factor de riesgo independiente más contundente, elevando el riesgo (OR = 8.06) debido a la urgencia, la potencial ruptura de membranas, la hemorragia y el menor tiempo para profilaxis óptima.<br><br>Perla ENARM: \"Conocer los factores de riesgo para sepsis materna es fundamental para prevenir y/o reconocer las condiciones que ponen en riesgo la vida de la madre y/o el feto.\"<br><br>Análisis de Distractores: La opción B (más de 5 tactos vaginales) y la opción D (anemia) sí son factores de riesgo documentados en la guía, pero su OR (Odds Ratio) es significativamente menor (1.09 y 3.4, respectivamente). La opción C (obesidad) tiene un OR de 1.85, por lo que la cesárea de urgencia es la respuesta correcta indiscutible por su peso estadístico.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Factores de riesgo, p. 13-14." 
            },
            {
                id: 42, 
                question: "Ante la sospecha clínica de Ruptura Prematura de Membranas Pretérmino, ¿cuál es el método inicial que mejor documenta el diagnóstico?", 
                options: ["Ultrasonido obstétrico", "Tacto vaginal digital", "Historia materna y revisión", "Estudio cardiotocográfico"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, el abordaje diagnóstico inicial es puramente clínico y no requiere de entrada estudios de imagen avanzados o invasivos, los cuales deben reservarse para casos de duda[cite: 154]. La visualización directa de la salida de líquido a través de una revisión con espejo vaginal (especuloscopía) es el estándar [cite: 154].<br><br>Perla ENARM: \"El diagnóstico de ruptura espontánea de membranas estará mejor documentado por la historia materna, seguido de la revisión vaginal\" [cite: 154].<br><br>Análisis de Distractores: El ultrasonido (A) evalúa el volumen de líquido, pero no documenta la salida activa[cite: 154]. El tacto vaginal (B) está restringido \"solo en caso necesario\" por el alto riesgo de introducir patógenos[cite: 155, 258]. El estudio cardiotocográfico (D) evalúa bienestar fetal, no confirma la ruptura.", 
                source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Evidencias y Recomendaciones, Página 13." 
            },
            {
                id: 43, 
                question: "¿Cuál es el evento clínico agudo que obliga a realizar una cesárea de urgencia inmediata en una paciente con diagnóstico establecido de Vasa Previa para evitar la exanguinación fetal?", 
                options: ["Disminución de líquido amniótico", "Sangrado escaso intermitente", "Ruptura de membranas", "Contracciones esporádicas aisladas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, en la vasa previa, los vasos fetales desprovistos de gelatina se rompen mecánicamente al momento de la pérdida de integridad de las bolsas amnióticas, llevando la volemia del feto a cero en minutos, por tanto, la ruptura de membranas es la respuesta correcta como indicación absoluta de urgencia. \"Se recomienda realizar cesárea de urgencia en casos de pacientes con diagnóstico prenatal de vasa previa y que presenten ruptura de membranas o trabajo de parto.\"<br><br>Análisis de Distractores: Las Contracciones esporádicas aisladas (Opción D) obligan a descartar trabajo de parto, pero no constituyen una urgencia de corte inmediato a quirófano sin dinámica establecida. El Sangrado escaso intermitente (Opción B) ocurre comúnmente en la placenta previa estable, pero en vasa previa el daño letal es la ruptura vascular tras amniorrexis. La Disminución de líquido amniótico (Opción A) se vigila por oligohidramnios crónico, no agudo hemorrágico.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 31." 
            },
            {
                id: 44, 
                question: "En el contexto de la Amenaza de Aborto, ¿cuál es el factor de riesgo materno con mayor asociación reportado por la GPC para presentar la pérdida temprana del embarazo?", 
                options: ["Tabaquismo activo intenso", "Infección de vías urinarias", "Obesidad grado III", "Edad materna avanzada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la edad materna avanzada tiene la correlación clínica más fuerte con anomalías cromosómicas, causantes del 50% de las pérdidas tempranas; el riesgo aumenta del 9-17% en pacientes de 20 a 30 años hasta un 80% a los 45 años.<br><br>Perla ENARM: \"Los factores de riesgo más comunes identificados en las mujeres con perdida temprana del embarazo son: la edad materna avanzada y el antecedente de pérdida temprana del embarazo.\"<br><br>Análisis de Distractores: Aunque la obesidad (C) es un factor de riesgo mencionado para problemas de fertilidad y pérdida gestacional, la GPC resalta explícitamente a la edad materna avanzada como el factor más común asociado a alteraciones cromosómicas. Tabaquismo (A) e infecciones (B) modifican el pronóstico pero no son el principal riesgo estadístico citado.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Introducción, Página 8." 
            },
            {
                id: 45, 
                question: "Utilizando la escala omSOFA para clasificar la disfunción orgánica en Sepsis Materna, ¿qué puntaje se le otorga a una paciente con recuento de plaquetas de 120,000/mm3?", 
                options: ["1 punto.", "2 puntos.", "0 puntos.", "3 puntos."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la escala modificada para obstetricia (omSOFA) ajusta los valores de las plaquetas considerando los cambios de la gestación y los diferencia del SOFA normal. Un recuento de plaquetas de 100,000 a 150,000/mm3 otorga 1 punto, indicando el inicio de la disfunción hematológica.<br><br>Perla ENARM: \"La escala de omSOFA es una herramienta útil para la evaluación de la disfunción orgánica en la mujer embarazada o puérpera.\"<br><br>Análisis de Distractores: La opción B (2 puntos) corresponde a un nivel de plaquetas menor a 100,000/mm3. La opción C (0 puntos) se otorga cuando las plaquetas son ≥150,000/mm3. La opción D (3 puntos) no existe en la escala omSOFA abreviada en la guía, la cual solo califica de 0 a 2 puntos por rubro.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Cuadros o figuras, p. 30." 
            },
            {
                id: 46, 
                question: "Según la GPC de Prevención y manejo de la hemorragia postparto, ¿cuál es el uterotónico de primera elección indicado fisiopatológicamente en pacientes que presentan patologías que requieren estricta restricción hídrica (como cardiopatías o preeclampsia)?", 
                options: ["Oxitocina en infusión continua", "Misoprostol vía sublingual", "Ergonovina intramuscular", "Carbetocina intravenosa lenta"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Hemorragia Postparto, la carbetocina es un análogo de vida media larga que se administra en bolo único o inyección lenta (100 mcg), evitando la infusión de grandes volúmenes de cristaloides (necesarios cuando se utiliza la infusión de altas dosis de oxitocina), lo que previene el edema agudo de pulmón en pacientes cardiópatas o preeclámpticas.<br><br>Perla ENARM: \"Se recomienda el uso de carbetocina como uterotónico de primera elección para prevenir HPP en situaciones especiales... y en pacientes en las que por alguna patología pre existente se requiere restricción hídrica (cardiopatía, nefropatía, preeclampsia-eclampsia).\"<br><br>Análisis de Distractores: La opción A requiere típicamente la infusión en 500 ml o 1000 ml de cristaloide. La opción B es útil pero tiene efectos térmicos (fiebre/escalofrío) indeseables. La opción C está absolutamente contraindicada si el motivo de restricción hídrica es preeclampsia.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Prevención, Página 22." 
            },
            {
                id: 47, 
                question: "¿Cuál es el fármaco empírico de primera elección para el manejo de Cistitis Aguda y Bacteriuria Asintomática durante el embarazo?", 
                options: ["Amoxicilina 500 mg", "Ciprofloxacino 500 mg", "Nitrofurantoína 100 mg", "Fosfomicina trometamol 3 g"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, ante la alta prevalencia de resistencia a betalactámicos en México, se requieren fármacos con alta eficacia y seguridad fetal en todos los trimestres. La fosfomicina en monodosis cumple estos criterios y asegura la adherencia.<br><br>Perla ENARM: \"En el caso de no contar con urocultivo y antibiograma, se recomienda tratamiento antimicrobiano empírico de la cistitis con fosfomicina (posible prescribirlo con mínimo riesgo en cualquier trimestre del embarazo).\"<br><br>Análisis de Distractores: La nitrofurantoína es buena opción, pero no debe darse en el 1er ni 3er trimestre. La amoxicilina empírica está contraindicada por las altísimas tasas de resistencia de E. coli. El ciprofloxacino (quinolona) altera el desarrollo del cartílago fetal y está contraindicado en gestantes.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Sección Tratamiento, Página 31."

            {
                id: 48, 
                question: "Ante una paciente con cuadro agudo de sangrado y dolor pélvico simulando una Amenaza de Aborto en el primer trimestre, ¿cuál es el hallazgo por imagen de emergencia que obliga a descartar el principal diagnóstico diferencial anatómico?", 
                options: ["Visualización de un hematoma subcorial", "Frecuencia cardíaca fetal disminuida", "Contracciones uterinas difusas", "Ausencia de saco gestacional intrauterino"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, si existe confirmación bioquímica de embarazo (hCG positiva) y la evaluación clínica revela signos de alarma, la incapacidad de localizar el trofoblasto dentro del útero convierte la urgencia ginecológica en una potencial amenaza para la vida materna por estallamiento tubárico.<br><br>Perla ENARM: \"USG en paciente con sangrado transvaginal en el 1er trimestre de embarazo: ¿Presencia de Saco gestacional intrauterino? No -> Considerar embarazo ectópico.\"<br><br>Análisis de Distractores: Visualizar un hematoma subcorial (A) o contracciones (C) es el cuadro canónico para mantener el diagnóstico de Amenaza de Aborto. Una frecuencia cardíaca baja (B) predice aborto pero confirma que el embarazo está in-utero, descartando una implantación extrauterina.",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ELex3Progress');
                localStorage.removeItem('ELex3LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);

                displayQuestion(null);

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ELex3Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ELex3LastQId', currentQuestionId);
                else localStorage.removeItem('ELex3LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ELex3Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

    const firebaseConfig = {

        authDomain: "enarm-lite.firebaseapp.com",

    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.5s ease';

    // 3. Revisamos quién entra
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Está logueado, pero ¿sigue en la lista blanca?
            const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            
            if(userDocSnap.exists()) {
                // ¡Todo en orden! Mostramos el contenido
                document.body.style.opacity = '1';
            } else {
                // Está logueado pero no en la lista blanca -> Al inicio
                window.location.href = "index.html"; 
            }
        } else {
            // No tiene sesión abierta -> Al inicio
            window.location.href = "index.html";
        }
    });
</script>
