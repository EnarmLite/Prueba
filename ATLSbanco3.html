<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Reiniciar Examen

        <!-- MAIN CONTENT (Scrollable) -->

                </svg>

            </button>

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
{
                id: 1, 
                question: "¿Cuál es el origen anatómico de la pérdida de sangre que se presenta hasta en el 85% de los casos de fracturas de anillo pélvico?", 
                options: ["Origen venoso pélvico", "Origen capilar óseo", "Origen arterial ilíaco", "Origen arterial glúteo"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el sangrado por fracturas pélvicas puede originarse en el hueso, desgarros musculares, o lesiones arteriales y venosas. La gran mayoría de los casos de pérdida de sangre en la pelvis es de origen venoso (85%), lo que explica la alta tasa de éxito clínico que se observa al aplicar compresión externa para cerrar el volumen de la pelvis.<br><br>Perla ENARM: La principal fuente de sangrado en fracturas pélvicas es el plexo venoso presacro, cuyo taponamiento se favorece mediante la reducción del volumen pélvico con una faja.<br><br>Análisis de Distractores: Las opciones C y D representan lesiones arteriales que, aunque generan hemorragias exanguinantes y catastróficas que requieren empaquetamiento o angioembolización, ocurren en un porcentaje mucho menor de los pacientes. La opción B contribuye al hematoma, pero el gran volumen hemorrágico proviene del plexo venoso.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 2, 
                question: "¿Qué tipo de lesión intraabdominal representa hasta un tercio de los casos y clásicamente no es detectada por el estudio ecográfico FAST en niños?", 
                options: ["Laceración vascular mesentérica", "Ruptura de víscera hueca", "Desgarro del epiplón mayor", "Lesión intraparenquimatosa aislada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el estudio FAST es incapaz de identificar lesiones intraparenquimatosas aisladas de órganos sólidos cuando no generan líquido libre intraperitoneal, las cuales representan hasta un tercio de las lesiones orgánicas en pediatría.<br><br>Perla ENARM: Un estudio FAST negativo en un niño hemodinámicamente estable no excluye el daño a un órgano sólido; si el mecanismo sugiere alta energía, la evaluación por tomografía está justificada.<br><br>Análisis de Distractores: Las opciones A y C generan clásicamente líquido libre difuso (sangre o contenido entérico) que es fácilmente captable por un operador FAST entrenado en las fosas y recesos. La opción B suele acompañarse de líquido libre loculado y aire libre.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 3, 
                question: "¿Qué condición crónica preexistente se asocia estadísticamente con la duplicación del riesgo de mortalidad en pacientes traumatizados mayores de 65 años?", 
                options: ["Hipotiroidismo subclínico", "Osteoartritis degenerativa", "Cirrosis hepática", "Hiperplasia prostática benigna"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., existen cinco condiciones preexistentes críticas que influyen drásticamente en los resultados del paciente geriátrico: cirrosis, coagulopatía, enfermedad pulmonar obstructiva crónica, cardiopatía isquémica y diabetes mellitus. La presencia de al menos una de ellas duplica el riesgo de mortalidad en comparación con ancianos sin estas afecciones.<br><br>Perla ENARM: La reserva fisiológica en el adulto mayor dicta que la gravedad de la lesión sumada a condiciones como la cirrosis o EPOC determinan directamente el riesgo de mortalidad, más que la edad cronológica por sí sola.<br><br>Análisis de Distractores: Las opciones A, B y D son condiciones altamente prevalentes en geriatría que afectan la calidad de vida y pueden dificultar la evaluación (ej. intubación, cateterismo), pero no han demostrado duplicar per se la mortalidad aguda en los grandes registros de trauma en comparación con la cirrosis.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 4, 
                question: "¿Cuál es la meta horaria de gasto urinario esperada que indica una reanimación hídrica óptima en un paciente pediátrico menor de 14 años con quemaduras térmicas?", 
                options: ["0.5 ml/kg", "1.0 ml/kg", "1.5 ml/kg", "2.0 ml/kg"], 
                answer: 1, 
                justification: "Justificación: La perfusión esplácnica y renal en el paciente quemado debe ser estrictamente monitorizada. De acuerdo al ATLS 11.ª ed., para los niños menores de 14 años, la meta de gasto urinario durante la infusión de la tasa ajustada de líquidos (3 ml x kg x % SCT) es de 1.0 ml/kg/h.<br><br>Perla ENARM: Las metas de orina para trauma térmico pediátrico difieren del adulto; se establece en 1.0 ml/kg/h para niños frente a los 0.5 ml/kg/h indicados universalmente para adultos.<br><br>Análisis de Distractores: La opción A es el objetivo normal exclusivo para pacientes mayores de 14 años y adultos quemados. Las opciones C y D superan la meta terapéutica térmica y llevarían a sobrecarga de líquidos, a menos que exista mioglobinuria por lesión eléctrica donde sí se buscan hasta 2.0 ml/kg/h en niños.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 5, 
                question: "¿Qué volumen aproximado de pérdida sanguínea aguda tolera una paciente gestante a término antes de manifestar signos clínicos clásicos de hipovolemia?", 
                options: ["400 a 600 ml", "1,200 a 1,500 ml", "800 a 1,000 ml", "1,800 a 2,000 ml"], 
                answer: 1, 
                justification: "Justificación: El embarazo genera una expansión sustancial del volumen plasmático materno. De acuerdo al ATLS 11.ª ed., la paciente embarazada sana posee la capacidad fisiológica de perder entre 1,200 y 1,500 ml de sangre antes de mostrar signos clásicos de hipovolemia como taquicardia e hipotensión.<br><br>Perla ENARM: A pesar de que la madre gestante luzca hemodinámicamente estable tras perder 1,200 ml de sangre, el flujo uteroplacentario disminuye críticamente, ocasionando sufrimiento y secuelas en el feto de forma oculta.<br><br>Análisis de Distractores: La opción A representa el sangrado permisible en un adulto sano sin hipovolemia franca, pero es muy inferior a la reserva del embarazo. Las opciones C y D no reflejan la barrera exacta citada por los consensos en trauma obstétrico; 2,000 ml desencadenaría ya un choque grado III descompensado incluso en la gestante.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 6, 
                question: "¿Cuál es el tiempo recomendado para mantener intactas las ampollas no infectadas que fungen como apósito biológico en una lesión por congelación?", 
                options: ["7 a 10 días", "1 a 3 días", "4 a 6 días", "11 a 14 días"], 
                answer: 0, 
                justification: "Justificación: Las heridas por congelación se caracterizan por una demarcación tisular muy tardía. De acuerdo al ATLS 11.ª ed., las ampollas no infectadas deben mantenerse intactas durante un máximo de 7 a 10 días para que sirvan como apósito biológico estéril que proteja el lecho de la lesión y promueva la epitelización subyacente.<br><br>Perla ENARM: A diferencia del desbridamiento agudo en algunas lesiones térmicas, en lesiones por frío se prohíbe romper empíricamente las vesículas en urgencias, protegiendo el tejido viable hasta completar el periodo de 7 a 10 días.<br><br>Análisis de Distractores: Las opciones B y C promueven una remoción prematura exponiendo capilares y dermis frágil a infecciones nosocomiales. La opción D retrasa excesivamente la evaluación del nivel final de necrosis y desbridamiento definitivo cuando la epitelización básica ya debió ocurrir.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 7, 
                question: "¿Qué nivel de presión requiere frecuentemente un torniquete neumático para lograr la oclusión total del sistema arterial en una extremidad inferior?", 
                options: ["200 mmHg", "250 mmHg", "300 mmHg", "400 mmHg"], 
                answer: 3, 
                justification: "Justificación: La masa muscular y tisular de la pierna y el muslo disipan gran parte del efecto compresivo de los dispositivos. De acuerdo al ATLS 11.ª ed., un torniquete neumático requiere presiones de 400 mmHg o más en una extremidad inferior (y 250 mmHg en una extremidad superior) para ocluir el sistema arterial; inflar a menor presión únicamente colapsa las venas y empeora la hemorragia por estasis.<br><br>Perla ENARM: Las fallas en el uso de torniquetes neumáticos en miembros inferiores suelen deberse a una compresión insuficiente (<400 mmHg) que ocasiona un efecto de ingurgitación venosa paradójica y exanguinación acelerada.<br><br>Análisis de Distractores: La opción A es ineficaz para flujo arterial. La opción B es la presión máxima recomendada para una extremidad superior anatómica normal. La opción C es una presión limítrofe en la que el flujo femoral o poplíteo puede no estar totalmente bloqueado.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 8, 
                question: "¿Qué movimiento específico de los dedos evalúa correctamente la integridad motora del nervio cubital tras una luxación o fractura del codo?", 
                options: ["Extensión del dedo pulgar", "Abducción del dedo meñique", "Flexión de la muñeca", "Contracción del músculo tenar"], 
                answer: 1, 
                justification: "Justificación: El trauma osteoarticular cerrado obliga al rastreo de compresión nerviosa. De acuerdo al ATLS 11.ª ed., la evaluación motora específica para el nervio cubital se realiza comprobando la abducción de los dedos índice y meñique (función de los músculos interóseos).<br><br>Perla ENARM: En traumas de codo, la pérdida de abducción del meñique y la hipoestesia de su cara palmar confirman el atrapamiento neuropático del nervio cubital.<br><br>Análisis de Distractores: La opción A evalúa primariamente al nervio radial. La opción C involucra una inervación mixta en el antebrazo. La opción D explora específicamente al nervio mediano distal mediante la aposición del pulgar.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 9, 
                question: "¿Qué tipo de lesión vertebral característica se asocia al uso exclusivo del componente abdominal del cinturón de seguridad durante una colisión en niños?", 
                options: ["Fractura en estallido", "Fractura de Chance", "Fractura de Jefferson", "Fractura del odontoides"], 
                answer: 1, 
                justification: "Justificación: El uso incorrecto de los sistemas de retención vehicular transfiere toda la inercia a puntos de anclaje anómalos. De acuerdo al ATLS 11.ª ed., el uso del cinturón de regazo por sí solo permite la hiperflexión del tronco superior, originando lesiones de distracción-flexión de la columna lumbar llamadas fracturas de Chance, las cuales coexisten frecuentemente con lesiones intestinales mesentéricas.<br><br>Perla ENARM: La tríada del síndrome del cinturón de seguridad involucra la marca equimótica abdominal, lesión de víscera hueca en intestino delgado y la fractura de Chance lumbar.<br><br>Análisis de Distractores: La opción A es producto de compresión axial severa. La opción C es una rotura del anillo de C1 originada por impacto vertical en la cabeza. La opción D ocurre comúnmente en ancianos con osteoporosis por hiperextensión cervical.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11 y 14." 
            },
            {
                id: 10, 
                question: "¿Qué estructuras vasculares intracraneales sufren estiramiento y desgarro por traumas menores debido a la atrofia cerebral en el paciente geriátrico?", 
                options: ["Arterias meníngeas medias", "Arterias cerebrales medias", "Venas emisarias o puente", "Senos venosos durales"], 
                answer: 2, 
                justification: "Justificación: Con el envejecimiento, la masa cerebral disminuye generando un ensanchamiento de los espacios subdurales. De acuerdo al ATLS 11.ª ed., las venas puente corticales se vuelven sumamente frágiles y se tensan; un mecanismo de aceleración/desaceleración mínimo es suficiente para causar su desgarro y producir un hematoma subdural de progresión sutil.<br><br>Perla ENARM: Todo adulto mayor que sufre una caída de propia altura con un GCS de 15 debe someterse a tomografía simple de cráneo dado el altísimo riesgo de ruptura silente de las venas puente.<br><br>Análisis de Distractores: La opción A origina hematomas epidurales agudos y rápidos por fracturas del hueso temporal. Las opciones B y D son estructuras de gran resistencia hemodinámica que no sufren desgarros sin un trauma penetrante o de aplastamiento catastrófico extremo.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 11, 
                question: "¿Cuál es el síntoma o signo predictor clínico más sensible para establecer el diagnóstico temprano de desprendimiento de placenta postraumático?", 
                options: ["Contracciones uterinas", "Sangrado transvaginal", "Bradicardia fetal profunda", "Dolor abdominal agudo"], 
                answer: 0, 
                justification: "Justificación: La rigidez placentaria frente a la distensibilidad uterina provoca fuerzas de cizallamiento en traumatismos. De acuerdo al ATLS 11.ª ed., la presencia de contracciones uterinas documentadas es el predictor más sensible para diagnosticar un desprendimiento de placenta, incluso por encima del monitoreo ecográfico, cuyo rendimiento es muy bajo.<br><br>Perla ENARM: La monitorización fetal electrónica con tocometría debe mantenerse al menos 6 horas en toda gestante traumatizada; la aparición de >6 contracciones en una sola hora obliga a descartar desprendimiento abrupto.<br><br>Análisis de Distractores: La opción B puede estar ausente hasta en un 20% de casos si el hematoma queda oculto en el fondo uterino. La opción C es un hallazgo terminal indicativo de asfixia, pero no es el signo temprano sensible. La opción D conforma la tríada, pero la actividad tocográfica es el marcador patognomónico inicial.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 12, 
                question: "¿Cuál es el tiempo mínimo de irrigación continua con agua tibia indicado en la sala de reanimación para descontaminar una quemadura química cutánea?", 
                options: ["5 a 10 minutos", "10 a 15 minutos", "45 a 60 minutos", "20 a 30 minutos"], 
                answer: 3, 
                justification: "Justificación: La profundidad del daño en la piel depende exclusivamente del tiempo de contacto del agente cáustico. De acuerdo al ATLS 11.ª ed., se debe irrigar inmediatamente el producto químico con grandes cantidades de agua tibia de forma ininterrumpida durante al menos 20 a 30 minutos utilizando una ducha o manguera.<br><br>Perla ENARM: Las quemaduras químicas (especialmente por álcalis) nunca deben neutralizarse con agentes que reaccionen liberando calor local; el estándar de oro es la irrigación hídrica profusa por 20 a 30 minutos revisando con tiras de pH.<br><br>Análisis de Distractores: Las opciones A y B son ineficaces para lavar el estrato córneo penetrado, permitiendo daño corrosivo continuado. La opción C sobreexpone al paciente a hipotermia iatrogénica sistémica sin un beneficio de limpieza superior a la meta de 30 minutos iniciales.",

            {
                id: 13,

            {

                justification: "Justificación: Los lactantes y niños pequeños tienen escasas reservas hepáticas de glucógeno y se agotan rápido bajo estrés metabólico térmico. De acuerdo al ATLS 11.ª ed., los niños con un peso de 30 kg o inferior deben recibir Ringer lactato que contenga un 5% de dextrosa (D5RL) a una tasa de mantenimiento basal, en adición a sus líquidos ajustados de la reanimación de quemaduras.<br><br>Perla ENARM: El choque por quemadura pediátrica siempre requiere vigilancia de glucosa; la inclusión de Dextrosa al 5% en la solución base Ringer Lactato previene el coma hipoglucémico iatrogénico.<br><br>Análisis de Distractores: La opción A agravaría la acidosis hiperclorémica y carece de aporte calórico. La opción C causaría hiperglucemia extrema y diuresis osmótica engañando la meta de orina. La opción D está reservada para edema cerebral refractario, no para terapia basal.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9."

            {
                id: 15,

                options: ["Menor a 32 grados centígrados", "Menor a 33 grados centígrados", "Menor a 34 grados centígrados", "Menor a 35 grados centígrados"], 
                answer: 0, 
                justification: "Justificación: Todos los pacientes lesionados expuestos a la intemperie o a fluidos no precalentados pierden calor drásticamente. De acuerdo al ATLS 11.ª ed., la hipotermia leve inicia por debajo de 35 °C, pero se define formalmente como hipotermia sistémica grave a cualquier temperatura central inferior a los 32 °C (89.6 °F), momento en que el paciente frecuentemente cesa los escalofríos y altera su estado mental.<br><br>Perla ENARM: El cese de escalofríos en un paciente con temperatura por debajo de los 32 °C marca el inicio de hipotermia grado II y requiere técnicas activas de recalentamiento para prevenir arritmias letales.<br><br>Análisis de Distractores: Las opciones B, C y D corresponden a fases de hipotermia grado I (leve), donde el cuerpo aún compensa el defecto térmico induciendo escalofríos fisiológicos activos y taquicardia para la termogénesis simpática.",

                id: 16,

                source: "ATLS 11.ª edición, 2025, Capítulo 11."

            {

                answer: 0, 
                justification: "Justificación: La reversión escalonada de los dicumarínicos en lesiones craneales o toracoabdominales exige terapia multimodal de coagulación. De acuerdo al ATLS 11.ª ed., la vitamina K debe administrarse en un rango de 5 a 10 mg por vía intravenosa lenta, junto con plasma fresco congelado o concentrado de complejo protrombínico (CCP) para la reposición urgente del tiempo de protrombina.<br><br>Perla ENARM: La vitamina K proporciona una reversión metabólica progresiva pero lenta; la hemostasia inmediata en el adulto mayor traumatizado amerita siempre plasma de rescate (10 a 15 ml/kg) o CCP simultáneo.<br><br>Análisis de Distractores: La opción B es ineficaz para antagonizar saturaciones terapéuticas de dicumarínicos a gran escala. Las opciones C y D originan un bloqueo refractario grave que vuelve extremadamente difícil re-anticoagular al paciente si este portara válvulas metálicas, superando el límite seguro.",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {

                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');

            });
            document.getElementById('confirm-reset').addEventListener('click', () => {

                localStorage.removeItem('ExaATLS03LastQId');
                window.location.reload();

                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');

                    }

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`

                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS03Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS03LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS03LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS03Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
