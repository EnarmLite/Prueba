    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Qué escala es de primera elección para evaluar el dolor en un paciente de 78 años con deterioro cognitivo leve?",
        options: ["Escala Visual Análoga", "Escala Descriptiva Verbal", "Escala de Braden", "Escala de Waterlow"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, en adultos mayores la capacidad de abstracción disminuye, por lo que herramientas como la Escala Visual Análoga deben usarse con reserva. La Escala Descriptiva Verbal permite elegir frases descriptivas adaptadas a su percepción clínica.<br><br>Perla Quirúrgica: Se recomienda que el uso de la escala visual análoga (EVA) se realice con cautela en adultos mayores de 65 años.<br><br>Análisis de Distractores: La Escala Visual Análoga (A) se restringe por la dificultad de pensamiento abstracto. Las Escalas de Braden (C) y Waterlow (D) evalúan riesgo de úlceras por presión, no la medición del dolor agudo.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Valoración, Página 33."
    },
    {
        id: 2,
        question: "¿Cuál es el fármaco de primera línea recomendado para el control de dolor agudo posoperatorio?",
        options: ["Nalbufina", "Diclofenaco", "Paracetamol", "Celecoxib"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, el tratamiento analgésico inicial se basa en fármacos no opioides por su perfil de seguridad geriátrica. El Paracetamol es de primera elección ajustando dosis en hepatopatía, reservando los AINEs por toxicidad.<br><br>Perla Quirúrgica: El tratamiento de elección para el control del dolor en adultos mayores son paracetamol, metamizol y tramadol.<br><br>Análisis de Distractores: Diclofenaco (B) y Celecoxib (D) son AINEs no recomendados de primera línea por alto riesgo de toxicidad gastrointestinal y renal. La Nalbufina (A) es un opioide fuertemente contraindicado por riesgo de delirium.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Tratamiento, Página 43."
    },
    {
        id: 3,
        question: "¿Qué analgésico opioide está contraindicado en el periodo posoperatorio por su alta asociación con el desarrollo de delirium?",
        options: ["Tramadol", "Nalbufina", "Paracetamol", "Metamizol"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, el delirium es una complicación mayor en ortogeriatría detonada frecuentemente por hipoxia o uso de opioides específicos que cruzan agresivamente la barrera hematoencefálica.<br><br>Perla Quirúrgica: Se recomienda evitar el uso de nalbufina en el posoperatorio, ya que es el opiáceo que con mayor frecuencia se asocia al desarrollo de delirium.<br><br>Análisis de Distractores: Tramadol (A) se usa habitualmente en el segundo escalón analgésico. Paracetamol (C) y Metamizol (D) son fármacos no opioides de primera elección sugeridos para el control basal del dolor.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 70."
    },
    {
        id: 4,
        question: "¿Cuánto tiempo debe transcurrir para reevaluar la intensidad del dolor después de administrar analgesia por vía intravenosa?",
        options: ["15 minutos", "30 minutos", "45 minutos", "60 minutos"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, el efecto farmacológico intravenoso requiere un periodo de consolidación hística antes de decidir un cambio o escalamiento empírico en la analgesia.<br><br>Perla Quirúrgica: Se recomienda valorar el dolor posoperatorio 60 minutos después de la administración de la terapia por vía parenteral.<br><br>Análisis de Distractores: La evaluación a los 30 minutos (B) es la indicada exclusivamente después de aplicar una intervención no farmacológica (frío, calor, reposición postural). Las opciones de 15 o 45 minutos (A, C) no son cortes normados.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Valoración, Página 39."
    },
    {
        id: 5,
        question: "¿Qué herramienta clínica es el estándar de elección para la detección temprana de delirium en las primeras 24 horas de ingreso?",
        options: ["Confusion Assessment Method", "Mini Mental State Examination", "Escala Visual Análoga", "Escala de Norton"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, la detección del síndrome confusional agudo exige herramientas de alta sensibilidad en escenarios dinámicos. El CAM detecta inicio agudo, inatención y alteración de conciencia.<br><br>Perla Quirúrgica: La escala Confusion Assessment Method (CAM) es una herramienta diagnóstica válida con alta sensibilidad y especificidad.<br><br>Análisis de Distractores: El Mini Mental (B) evalúa deterioro cognitivo crónico preoperatorio o demencia establecida. La Escala Visual Análoga (C) mide intensidad del dolor. La Escala de Norton (D) estratifica el riesgo tegumentario.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 68."
    },
    {
        id: 6,
        question: "¿A partir de qué nivel sérico de hemoglobina posoperatoria está recomendada la transfusión de concentrados eritrocitarios para prevenir delirium?",
        options: ["< 12 g/dl", "< 10 g/dl", "< 8 g/dl", "< 7 g/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, la hipoxia cerebral secundaria a hemoconcentración o pérdida hemática es un precipitante biológico directo de delirium en el encéfalo senil.<br><br>Perla Quirúrgica: Se recomienda verificar el nivel de hemoglobina posoperatoria y transfundir concentrados eritrocitarios si su valor es < 10 g/dl previa indicación médica.<br><br>Análisis de Distractores: Los niveles < 7 u 8 g/dl (C, D) son umbrales restrictivos en adultos jóvenes, pero en ortogeriatría la meta es permisiva para evitar daño isquémico subclínico. El nivel de < 12 g/dl (A) no justifica de forma rutinaria un evento transfusional.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 72."
    },
    {
        id: 7,
        question: "¿Qué medida de profilaxis mecánica estandarizada se indica desde el ingreso para prevenir trombosis venosa profunda?",
        options: ["Medias de compresión graduadas", "Vendaje elástico compresivo", "Dispositivos de impulso plantar", "Reposo absoluto prolongado"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, la inmovilidad eleva el riesgo vascular exponencialmente, por lo que es imperativo estimular el retorno venoso con gradientes de presión milimétricos.<br><br>Perla Quirúrgica: Se recomienda el uso de medias de compresión graduadas (MCG).<br><br>Análisis de Distractores: El vendaje elástico común (B) no provee gradientes precisos y puede crear ligaduras vasculares. Los dispositivos de impulso plantar (C) son de segunda línea o para contraindicaciones. El reposo absoluto (D) exacerba la estasis venosa.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 82."
    },
    {
        id: 8,
        question: "¿Cuál es el rango de presión distal adecuado que deben ejercer las medias de compresión graduadas?",
        options: ["5 a 10 mmHg", "10 a 15 mmHg", "15 a 20 mmHg", "20 a 30 mmHg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, la efectividad volumétrica depende de vencer la presión de estasis sin comprometer el flujo arterial de los capilares superficiales.<br><br>Perla Quirúrgica: Deben utilizarse MCG que generen una presión de 15 a 20 mmHg a nivel distal y de 8 mmHg a nivel proximal.<br><br>Análisis de Distractores: Los gradientes menores a 15 mmHg (A, B) fracasan en promover retorno valvular eficaz. Las presiones mayores a 20 mmHg (D) aumentan el riesgo de isquemia cutánea distal y necrosis de contacto.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 82."
    },
    {
        id: 9,
        question: "¿Qué fármaco es de primera línea para la profilaxis antitrombótica farmacológica en el perioperatorio?",
        options: ["Warfarina", "Enoxaparina", "Clopidogrel", "Ácido Acetilsalicílico"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, las heparinas de bajo peso molecular (HBPM) presentan mejor perfil de bioseguridad, posología amigable y menor incidencia de hemorragia activa.<br><br>Perla Quirúrgica: Se recomienda iniciar la profilaxis con HBPM desde el diagnóstico de la fractura en el momento de la hospitalización del paciente.<br><br>Análisis de Distractores: Warfarina (A) requiere monitorización crónica estricta y puentes terapéuticos. Ácido acetilsalicílico (D) y Clopidogrel (C) intervienen en la fase plaquetaria arterial, no previenen eficazmente la trombosis del sistema venoso profundo.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Páginas 84-85."
    },
    {
        id: 10,
        question: "¿Qué dispositivo está strictly contraindicado para la prevención de úlceras por presión en prominencias óseas?",
        options: ["Colchones de presión alterna", "Apósitos de poliuretano", "Cojines en forma de dona", "Almohadas de algodón"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, los dispositivos circulares o flotadores bloquean el flujo linfático perimetral y causan isquemia de reperfusión por estancamiento.<br><br>Perla Quirúrgica: No se recomienda la utilización de instrumentos con forma de flotadores o anillos ya que concentran la presión y las fuerzas tangenciales sobre la periferia de la úlcera y aumentan el cizallamiento.<br><br>Análisis de Distractores: Los colchones de presión alterna (A) evitan isquemia estática. Las almohadas (D) liberan zonas de presión sin atrapar la microcirculación. Los apósitos de poliuretano (B) se usan de forma estandarizada en el cuidado primario.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Tratamiento, Página 58."
    },
    {
        id: 11,
        question: "¿Cada cuánto tiempo deben realizarse los cambios posturales programados en un paciente encamado sin riesgo extraordinario?",
        options: ["15 minutos", "60 minutos", "2 a 4 horas", "6 a 8 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, la rotación previene el cierre de redes capilares y la hipoxia tisular que deviene en escara epidérmica.<br><br>Perla Quirúrgica: Cambiar la posición a intervalos regulares (es decir cada dos a cuatro horas) en base a las úlceras de presión presentadas.<br><br>Análisis de Distractores: La ventana de 15 minutos (A) es recomendada de forma exclusiva cuando el paciente logra la sedestación continua en silla. Ciclos de 60 minutos (B) o mayores a 6 horas (D) son incorrectos o aseguran necrosis tisular.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Tratamiento, Página 56."
    },
    {
        id: 12,
        question: "¿Qué laxante osmótico está indicado para aumentar la frecuencia de deposiciones en estreñimiento crónico intrahospitalario?",
        options: ["Senósidos", "Polietilenglicol", "Supositorios de Glicerina", "Citrato de Sodio"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, ante la reducción del peristaltismo, los modificadores de la carga hídrica intraluminal facilitan el tránsito de forma atraumática.<br><br>Perla Quirúrgica: Se recomienda el uso de polietilenglicol como parte del tratamiento del estreñimiento crónico en adultos para incrementar la frecuencia de deposiciones semanales.<br><br>Análisis de Distractores: Los Senósidos (A) fungen como laxantes estimulantes directos. Los supositorios de glicerina (C) y citrato de sodio (D) abordan exclusivamente desimpactación del segmento rectal distal.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 90."
    },
    {
        id: 13,
        question: "¿Cuál es el aporte de fibra dietética diaria recomendada para prevenir estreñimiento en el paciente geriátrico hospitalizado?",
        options: ["10 a 15 g/día", "15 a 20 g/día", "25 a 30 g/día", "40 a 50 g/día"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones en fractura de cadera, proveer masa al bolo biológico contrarresta el aletargamiento gástrico mediado por analgésicos centrales.<br><br>Perla Quirúrgica: Se ha recomendado el consumo de 25-30 g/día en el manejo de los pacientes con estreñimiento crónico.<br><br>Análisis de Distractores: Consumos inferiores a 20 g (A, B) son clínicamente ineficaces ante polifarmacia hospitalaria. Aportes superiores a 40 g (D) condicionan riesgo de íleo u obstrucción por material seco si falla el balance hídrico.",
        source: "IMSS-603-13, Intervenciones de enfermería para la atención de adultos mayores con fractura de cadera, 2018, Prevención secundaria, Página 90."
    },
    {
        id: 14,
        question: "¿Cuál es el estudio de imagen de elección para confirmar sospecha clínica de neumonía por hipoventilación?",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');

            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                        dashboardBtn.classList.remove('lg:left-[22rem]');

                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');

                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGFUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGFULastQId', currentQuestionId);
                else localStorage.removeItem('CGFULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGFUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
