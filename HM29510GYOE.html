    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es la vía de abordaje de primera elección recomendada para realizar histerectomía por patología uterina benigna?", 
                options: ["Laparoscópica asistida", "Abdominal total", "Vaginal directa", "Laparoscópica robótica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, esta vía anatómica reporta resultados superiores en recuperación y morbilidad hospitalaria frente a los abordajes incisionales.<br><br>Perla ENARM: \"En mujeres que presentan patología uterina benigna, se recomienda como primera opción de tratamiento quirúrgico la realización de histerectomía vaginal, por que se asocia a menor número de complicaciones, se realiza más rápido y con menos morbilidad\".<br><br>Análisis de Distractores: La vía laparoscópica es la segunda línea de tratamiento. La vía abdominal se reserva como última opción. El abordaje robótico toma mayor tiempo y no reporta beneficios superiores.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 19." 
            },
            {
                id: 2, 
                question: "¿Qué estructuras anatómicas deben suturarse obligatoriamente a la cúpula vaginal durante el cierre para evitar su prolapso posterior?", 
                options: ["Ligamentos redondos y anchos", "Fascia endopélvica profunda", "Ligamentos uterosacros y cardinales", "Músculo elevador del ano"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, restituir el soporte del nivel apical es vital para mantener la estática pélvica.<br><br>Perla ENARM: \"La sutura de los ligamentos uterosacros y cardinales a la cúpula vaginal durante la histerectomía, es una medida que se recomienda para evitar su prolapso\".<br><br>Análisis de Distractores: Los ligamentos redondos y anchos no fungen como principales suspensores apicales anatómicos. La fascia endopélvica y el músculo elevador proveen soporte lateral e inferior, no fijación de cúpula postquirúrgica primaria.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 24." 
            },
            {
                id: 3, 
                question: "Ante la evidencia clínica de pérdida involuntaria de orina previa a la cirugía, ¿qué estudio preoperatorio es obligatorio solicitar?", 
                options: ["Ultrasonido renal bilateral", "Estudio urodinámico completo", "Cistoscopia flexible transuretral", "Urografía excretora contrastada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, el tratamiento quirúrgico pélvico modifica la anatomía y puede enmascarar o agravar disfunciones vesicales, por lo que es mandatorio evaluar la dinámica funcional preexistente.<br><br>Perla ENARM: \"Se recomienda realizar una adecuada evaluación prequirúrgica completa y ante la evidencia de incontinencia urinaria, realizar estudio urodinámico antes de someter a la paciente a histerectomía\".<br><br>Análisis de Distractores: El ultrasonido, cistoscopia y urografía son estudios de imagen y evaluación estructural, pero no cuantifican presiones ni funcionalidad de continencia urinaria.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 28." 
            },
            {
                id: 4, 
                question: "¿Cuál es la indicación de seguimiento oncológico que debe recibir una paciente sometida a histerectomía supracervical?", 
                options: ["Ultrasonido pélvico anual", "Colposcopia con biopsia semestral", "Citología cervical anual", "Determinación de papilomavirus humano"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, al conservar la zona de transformación del cuello uterino, la paciente mantiene su riesgo poblacional inalterado para malignidad escamosa.<br><br>Perla ENARM: \"Se recomienda que si se considera la preservación del cuello del útero, la paciente debe ser informada de que es necesario continuar la citología cervical anual, para la detección oportuna de cáncer cervicouterino\".<br><br>Análisis de Distractores: El ultrasonido no detecta displasia epitelial temprana. La colposcopia y la determinación viral se utilizan en algoritmos específicos ante hallazgos anormales, no sustituyen el tamizaje anual de primer nivel.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 21." 
            },
            {
                id: 5, 
                question: "¿Cuál es el factor mecánico primario que desencadena la lesión del nervio femoral tras una histerectomía abdominal?", 
                options: ["Disección térmica con electrocauterio", "Presión de las valvas sobre el psoas", "Tracción uterina superior forzada", "Isquemia por ligadura vascular"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, el uso de separadores autoestáticos con hojas muy profundas genera daño isquémico directo al nervio en su trayecto.<br><br>Perla ENARM: \"Se recomienda que el cirujano corrobore en el momento de colocación del separador, que las hojas laterales tengan la longitud adecuada para separar exclusivamente la pared abdominal y que sus puntas no presionen el músculo psoas... para evitar la neuropatía femoral postoperatoria\".<br><br>Análisis de Distractores: El electrocauterio, la tracción uterina y la ligadura arterial condicionan otras lesiones iatrogénicas, pero la neuropatía periférica femoral se asocia específicamente a la compresión retropélvica mecánica prolongada.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 26." 
            },
            {
                id: 6, 
                question: "¿Cuál es el manejo indicado inicial en una paciente diagnosticada con miomatosis uterina que no presenta ninguna manifestación clínica?", 
                options: ["Manejo conservador farmacológico", "Histerectomía vaginal profiláctica", "Ablación endometrial térmica", "Seguimiento clínico"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, la ausencia de sintomatología compresiva o sangrado invalida la exposición al riesgo de un procedimiento invasivo o tratamiento hormonal innecesario.<br><br>Perla ENARM: \"Diagrama de flujo 1. Histerectomía en patología uterina benigna: Miomatosis -> ¿Paciente asintomática? SI -> Seguimiento\".<br><br>Análisis de Distractores: El manejo farmacológico y la ablación se indican en pacientes con sangrado activo. La histerectomía carece de indicación profiláctica en úteros no sintomáticos.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Diagramas de Flujo, Página 36." 
            },
            {
                id: 7, 
                question: "En pacientes premenopáusicas programadas para histerectomía, ¿cuál es la conducta recomendada respecto a la ooforectomía profiláctica rutinaria?", 
                options: ["Realizarla en mayores de 35 años", "Realizarla en todas las pacientes", "Individualizar el riesgo del paciente", "Preservarla siempre por miomatosis"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, extirpar los anexos sin patología comprobada acelera la deficiencia estrogénica y conlleva riesgos cardiometabólicos severos que pueden superar la prevención del riesgo oncológico futuro.<br><br>Perla ENARM: \"No existe suficiente evidencia para emitir una recomendación sobre la realización de ooforectomía en mujeres premenopáusicas, siempre se deberá individualizar tomando en cuenta el riesgo de cada paciente\".<br><br>Análisis de Distractores: Indicarla sistemáticamente o sólo basándose en edad poblacional expone a la mujer a falla ovárica prematura; su preservación dogmática ignoraría el historial oncológico genético que pudiera justificarla.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 30." 
            },
            {
                id: 8, 
                question: "¿Qué porcentaje de pacientes sometidas a histerectomía subtotal manifiestan sangrado transvaginal cíclico posquirúrgico a largo plazo?", 
                options: ["5 %", "10 %", "15 %", "20 %"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, el remanente de mucosa endocervical puede continuar respondiendo al estímulo hormonal bifásico conservado si los ovarios permanecen íntegros.<br><br>Perla ENARM: \"El sangrado cíclico posterior a la histerectomía subtotal se presenta hasta en el 20 % de las pacientes\".<br><br>Análisis de Distractores: Los valores menores al 20 % son incorrectos en el escenario natural; sin embargo, la misma GPC indica que realizar conización transoperatoria reduce este sangrado a cifras cercanas al 1.4 %.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 21." 
            },
            {
                id: 9, 
                question: "¿Cuál grupo farmacológico disminuye el tamaño uterino y mejora parámetros hematológicos cuando se administra semanas previas a la cirugía por miomatosis?", 
                options: ["Anticonceptivos orales combinados", "Agonistas de hormona liberadora de gonadotrofina", "Progestágenos intramusculares de depósito", "Sistemas de liberación de levonorgestrel"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, su uso continuo bloquea el eje hipotálamo-hipófisis induciendo hipoestrogenismo transitorio, lo que provoca la atrofia del leiomioma y facilita la vía vaginal.<br><br>Perla ENARM: \"Se ha demostrado que los agonistas de la GnRH-a, administrados de 2 a 3 meses antes de la intervención quirúrgica, mejoran los parámetros hematológicos, acortan la estancia hospitalaria y disminuyen el sangrado...\".<br><br>Análisis de Distractores: Los anticonceptivos orales y progestágenos logran un control clínico aceptable de las metrorragias, pero carecen de efecto comprobado sobre la reducción física del tamaño miomatoso.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 17." 
            },
            {
                id: 10, 
                question: "En pacientes con miomatosis tratadas con dispositivo intrauterino liberador de levonorgestrel premenopáusicas, ¿cuál es el resultado fisiológico clínico esperado?", 
                options: ["Disminuye pérdida hemática sin reducir miomas", "Disminuye el tamaño de los miomas submucosos", "Aumenta sangrado transoperatorio a nivel vaginal", "Induce atrofia uterina completa y definitiva"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, su mecanismo de acción es la decidualización y atrofia del endometrio suprayacente, mejorando la hemoglobina, pero no afecta estructuralmente al tumor liso.<br><br>Perla ENARM: \"En mujeres premenopáusicas, los sistemas intrauterinos que liberan progestágeno (DIU levonorgestrel) reducen la pérdida de sangre menstrual, pero no reducen el tamaño de los miomas\".<br><br>Análisis de Distractores: La creencia de que reducen el tamaño tumoral es un error común descartado por la evidencia clínica. No existe asociación documentada con incremento de hemorragia quirúrgica.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 16." 
            },
            {
                id: 11, 
                question: "¿Qué medida farmacológica de prevención se indica específicamente para pacientes con factores de riesgo sometidas a histerectomía abdominal total?", 
                options: ["Lavado peritoneal transoperatorio exhaustivo", "Uso de estrógenos tópicos locales", "Administración de antibióticos profilácticos", "Terapia puente con anticoagulantes orales"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, al incidir la bóveda vaginal vía abdominal, la cavidad se contamina con flora natural ascendente incrementando la tasa de morbilidad febril.<br><br>Perla ENARM: \"Se recomienda en pacientes a quienes se les realice histerectomía abdominal total y presenten riesgos asociados para presentar infección, se les informe e indiquen antibióticos profilácticos\".<br><br>Análisis de Distractores: El lavado abdominal aislado o estrógenos locales no previenen la celulitis de cúpula bacteriana. La terapia anticoagulante puente es manejo de riesgo tromboembólico, no para control de sepsis en el sitio quirúrgico.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 26." 
            },
            {
                id: 12, 
                question: "Según el algoritmo para endometriosis grave, ¿qué criterio clínico preoperatorio es indispensable antes de proceder a la histerectomía radical?", 
                options: ["Nuliparidad en edad reproductiva", "Paciente asintomática con endometriosis mínima", "Sospecha diagnóstica inicial sin tratamiento", "Falla a tratamientos médicos conservadores"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Histerectomía en patología benigna, la extirpación quirúrgica pélvica tiene impacto sistémico severo y debe reservarse exclusivamente tras agotar medidas como progestinas, danazol o análogos.<br><br>Perla ENARM: \"Se recomienda la histerectomía como tratamiento de última elección en pacientes que presentan endometriosis grave, asociada a sintomatología incapacitante y con falla de otros tratamientos...\".<br><br>Análisis de Distractores: La sospecha de primera vez requiere manejo médico. Realizarla en la paciente asintomática o nulípara con deseo de fertilidad atenta contra el pronóstico biológico de la mujer.", 
                source: "SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 18." 
            },
            {
                id: 13, 
                question: "En comparación directa con el abordaje laparotómico abdominal, ¿qué ventaja ha demostrado la histerectomía laparoscópica?",

                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoHMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoHMLastQId', currentQuestionId);
                else localStorage.removeItem('gyoHMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoHMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
