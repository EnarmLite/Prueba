    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Ante un diagnóstico citológico sugestivo de malignidad cervical, ¿cuál es el estudio recomendado para corroborar el diagnóstico?", 
                options: ["Conización cervical", "Histerectomía extrafascial", "Biopsia por colposcopia", "Resonancia magnética"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el diagnóstico definitivo requiere confirmación tisular antes de planificar un esquema oncológico. La citología es exclusivamente una herramienta de tamizaje.<br><br>Perla ENARM: \"El estudio de todas las pacientes con cáncer cérvico-uterino debe incluir historia clínica, exploración física completa, realización de citología cervical y toma de biopsia de sitio representativo de la lesión. Preferentemente guiada por colposcopia\".<br><br>Análisis de Distractores: La conización cervical evalúa lesiones microinvasoras ya identificadas. La histerectomía extrafascial es un tratamiento definitivo, no de escrutinio. La resonancia magnética se usa para determinar extensión tumoral, no aporta el diagnóstico histopatológico inicial.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Evaluación Clínica, p. 13." 
            },
            {
                id: 2, 
                question: "¿Qué sistema de clasificación rige la toma de decisiones iniciales para determinar el estadio clínico de esta patología?", 
                options: ["Clasificación de Bethesda", "Criterios clínicos de FIGO", "Escala de Sedlis y Peters", "Criterios quirúrgicos de Piver"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, la estadificación es fundamentalmente clínica, basándose en la exploración bimanual, tacto rectovaginal y especuloscopía para categorizar el grado de avance tumoral.<br><br>Perla ENARM: \"Para la estadificación clínica del cáncer cervicouterino es recomendable utilizar los criterios emitidos por la FIGO 2010\".<br><br>Análisis de Distractores: La clasificación de Bethesda estandariza el reporte citológico de Papanicolaou. La escala de Sedlis y Peters evalúa el riesgo de recurrencia postquirúrgica. Los criterios de Piver dictaminan el nivel de radicalidad de la histerectomía.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Evaluación Clínica, p. 14." 
            },
            {
                id: 3, 
                question: "¿Cuál es el límite máximo de profundidad en la invasión estromal para categorizar un tumor dentro del estadio clínico IA1?", 
                options: ["≤ 3 mm", "≤ 5 mm", "≤ 7 mm", "≤ 10 mm"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, delimitar los milímetros exactos de invasión separa a las pacientes que pueden recibir un manejo conservador de aquellas que requieren disección de ganglios linfáticos.<br><br>Perla ENARM: \"Estadio IA1: Invasión estromal no más profunda de 3 mm y no mayor de 7 mm de diseminación horizontal\".<br><br>Análisis de Distractores: Una profundidad ≤ 5 mm corresponde al estadio IA2. El valor de 7 mm marca el límite de extensión horizontal, no de profundidad. Un grosor de 10 mm refiere a la profundidad total que debe alcanzar el cono quirúrgico, no a la infiltración tumoral.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Anexos, p. 47." 
            },
            {
                id: 4, 
                question: "En el manejo de estadios tempranos, ¿qué margen negativo mínimo requiere el estudio histopatológico para definir a un cono cervical como terapéutico?", 
                options: ["1 mm", "3 mm", "5 mm", "10 mm"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, asegurar un margen oncológico suficiente previene tratamientos radicales posteriores en mujeres jóvenes.<br><br>Perla ENARM: \"Se considera como cono terapéutico cuando se reporta por histopatología: Margen negativo de 3 mm, profundidad del cono mínima de 10 mm, sin invasión linfovascular y colposcopia adecuada\".<br><br>Análisis de Distractores: Un margen de 1 mm es insuficiente e indica un cono incompleto. Los 5 mm no son el punto de corte normativo. El valor de 10 mm es la profundidad longitudinal requerida del cono, no el margen circunferencial libre de tumor.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IA1 sin invasión linfovascular, p. 18." 
            },
            {
                id: 5, 
                question: "Para catalogar un procedimiento de conización cervical como terapéutico, ¿cuál debe ser la profundidad mínima del tejido extraído?", 
                options: ["3 mm", "5 mm", "7 mm", "10 mm"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, la pieza de escisión debe abarcar la totalidad de la zona de transformación y las criptas glandulares para reducir el riesgo de tejido residual inadvertido.<br><br>Perla ENARM: \"Profundidad en el canal endocervical de 10 mm para que incluya las criptas\".<br><br>Análisis de Distractores: Los 3 mm corresponden al margen negativo necesario o al límite del estadio IA1. Los 5 mm definen la invasión del estadio IA2. Los 7 mm corresponden a la máxima diseminación horizontal permitida en microinvasores.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Cono vs Biopsia cervical, p. 15." 
            },
            {
                id: 6, 
                question: "¿Cuál es la intervención quirúrgica de elección en estadio IA1 sin invasión linfovascular en una paciente con paridad satisfecha?", 
                options: ["Histerectomía tipo Piver III", "Histerectomía extrafascial", "Traquelectomía radical laparoscópica", "Exenteración pélvica anterior"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, al documentarse un riesgo menor al 1% de metástasis ganglionar en esta etapa específica, la disección pélvica radical no aporta beneficio a la supervivencia global.<br><br>Perla ENARM: \"El tratamiento estándar consiste en cono cervical vs histerectomía extrafascial (PIVER I o tipo A)\".<br><br>Análisis de Distractores: La histerectomía tipo Piver III conlleva alta morbilidad y es excesiva. La traquelectomía radical es para estadios mayores en pacientes con deseo de fertilidad. La exenteración pélvica se reserva como salvamento en recurrencias centrales avanzadas.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IA1 sin invasión linfovascular, p. 18." 
            },
            {
                id: 7, 
                question: "¿Cuál es el tratamiento quirúrgico recomendado en estadio clínico IA2 para una paciente que exige preservar la función reproductiva?", 
                options: ["Conización cervical simple", "Histerectomía extrafascial tipo A", "Braquiterapia de baja tasa", "Traquelectomía radical"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el estadio IA2 incrementa el riesgo de afectación linfática, por lo que el manejo no puede limitarse a tejido cervical superficial. Debe ir acompañado de mapeo ganglionar bilateral.<br><br>Perla ENARM: \"Se recomienda como opciones terapéuticas: Cono cervical más LPB o Traquelectomía radical con linfadenectomía pélvica bilateral laparoscópica o abierta\".<br><br>Análisis de Distractores: La conización simple omite la extirpación obligatoria de los ganglios linfáticos pélvicos. La histerectomía extrafascial imposibilita la gestación. La braquiterapia causa daño endometrial irreversible y no permite conservar la fertilidad.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IA2, p. 20." 
            },
            {
                id: 8, 
                question: "¿Qué hallazgo a la exploración física bimanual clasifica la patología directamente como estadio IIB e indica inoperabilidad?", 
                options: ["Invasión clínica a parametrios", "Extensión a cavidad uterina", "Afección de mucosa rectal", "Tumor cervical ≥ 4 cm"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, palpar induración en el tejido paracervical y ligamentos laterales modifica el abordaje de quirúrgico a radioterapia definitiva por el riesgo de seccionar tumor activo.<br><br>Perla ENARM: \"Estadio T2b/IIb: Tumor con compromiso parametrial\".<br><br>Análisis de Distractores: La extensión a cavidad uterina no modifica el estadio. La afección de la mucosa rectal eleva el estadiaje a IVA. Un tumor ≥ 4 cm pero confinado al cérvix se clasifica como IB2.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Anexos, p. 47." 
            },
            {
                id: 9, 
                question: "¿Cuál es la concentración de hemoglobina que se estipula mantener durante la radio-quimioterapia para prevenir la hipoxia tumoral intratratamiento?", 
                options: ["≥ 8 g/dl", "≥ 9 g/dl", "≥ 10 g/dl", "≥ 12 g/dl"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el daño celular por radiación ionizante requiere abundante oxígeno tisular para la fijación de radicales libres; niveles anémicos promueven la radioresistencia y empeoran la sobrevida.<br><br>Perla ENARM: \"El nivel de hemoglobina debe llevarse por arriba del 10 g/dL previo y durante el tratamiento con Quimio/Radioterapia\".<br><br>Análisis de Distractores: Valores de 8 o 9 g/dl no revierten el estado hipóxico neoplásico. Mantener ≥ 12 g/dl no está indicado rutinariamente como límite inferior, ya que la guía institucional especifica taxativamente 10 g/dl.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IB2 - IVA, p. 27." 
            },
            {
                id: 10, 
                question: "¿Cuál es el tiempo máximo en el que debe ser completado el esquema total de teleterapia y braquiterapia para optimizar el control oncológico local?", 
                options: ["4 semanas", "6 semanas", "8 semanas", "12 semanas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, exceder este lapso crítico induce una repoblación celular acelerada que disminuye la supervivencia libre de enfermedad.<br><br>Perla ENARM: \"Se recomienda completar el tratamiento de Teleterapia/Braquiterapia en 8 semanas o menos\".<br><br>Análisis de Distractores: Finalizar en 4 o 6 semanas requiere fraccionamientos de alta toxicidad inaceptables para tejidos sanos. Un periodo de 12 semanas genera fracaso terapéutico por tolerancia clonal tumoral.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IB2 - IVA, p. 27." 
            },
            {
                id: 11, 
                question: "¿Qué antineoplásico se administra como primera línea concomitante a la radioterapia externa en la enfermedad localmente avanzada?", 
                options: ["Paclitaxel", "Cisplatino", "Ifosfamida", "Doxorrubicina"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el uso de compuestos platinados actúa como agente sensibilizador, amplificando el daño en el ADN causado por los haces de radiación a nivel pélvico.<br><br>Perla ENARM: \"Para las pacientes con alto riesgo de recurrencia, además de RT se debe otorgar además quimioterapia concomitante a base de Cisplatino\".<br><br>Análisis de Distractores: El paclitaxel y la ifosfamida se aplican como opciones de segunda línea o en paliación. La doxorrubicina es prioritaria en neoplasias de mama o sarcomas, no en cervicouterino.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IB1>2cm y Estadio IIA1, p. 24." 
            },
            {
                id: 12, 
                question: "¿Qué hallazgo histopatológico documentado durante el estadio IA1 exige contra-referir inmediatamente a la paciente hacia oncología quirúrgica en tercer nivel?", 
                options: ["Infiltración linfovascular", "Márgenes quirúrgicos ≤ 5 mm", "Presencia de células atípicas", "Grado de diferenciación bajo"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, la invasión a vasos sanguíneos o linfáticos detona el potencial metastásico. Esto transfiere el caso de un manejo extrafascial en segundo nivel a la necesidad de linfadenectomías pélvicas especializadas.<br><br>Perla ENARM: \"Serán enviadas a oncología quirúrgica pacientes con diagnóstico histológico por cono de cáncer cervicouterino etapa IA1 con infiltración linfovascular\".<br><br>Análisis de Distractores: Márgenes menores a 5 mm implican un cono no terapéutico (requiere re-cono), pero no envío directo si es IA1 sin invasión. Las células atípicas y el grado bajo de diferenciación son factores histológicos, pero el criterio de referencia forzoso para el nivel es la infiltración linfovascular.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Criterios de Referencia, p. 37." 
            },
            {
                id: 13, 
                question: "¿Cuál de las siguientes variantes histológicas es un motivo directo para particularizar el tratamiento clínico en un centro especializado independientemente del estadio?", 
                options: ["Carcinoma epidermoide", "Adenocarcinoma mucinoso", "Células pequeñas", "Carcinoma adenoescamoso"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, estos subtipos de agresividad extrema escapan a los algoritmos estandarizados habituales de estadificación y manejo general.<br><br>Perla ENARM: \"Bajo circunstancias especiales en pacientes con histología diferente a epidermoide o adenoescamoso (Neuroendocrino, de células pequeñas, carcinoma adenoideo quístico, etc). Se debe particularizar el tratamiento y envío a centro oncológico especializado\".<br><br>Análisis de Distractores: El carcinoma epidermoide y el adenoescamoso engloban más del 80% de los casos y siguen la norma convencional. El adenocarcinoma mucinoso es tratado con los parámetros estándar según su estadio clínico y deseo de fertilidad.", 
                source: "IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Estadio IB1>2cm y Estadio IIA1, p. 23." 
            },
            {
                id: 14,

                    const matchText = qObj.question.toLowerCase().includes(term);

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoDMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoDMLastQId', currentQuestionId);
                else localStorage.removeItem('gyoDMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoDMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
