    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>

            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "Criterio volumétrico que define el diagnóstico de Hemorragia Postparto de forma universal, independiente de la vía de resolución obstétrica.",
        options: ["≥ 500 ml", "≥ 1000 ml", "≥ 1500 ml", "≥ 2000 ml"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la definición estandarizada por el programa ReVITALize unifica el criterio de pérdida de sangre para reflejar el impacto hemodinámico real, abandonando la diferencia histórica entre el parto vaginal y la cesárea.<br><br>Perla ENARM: \"Define la hemorragia posparto como pérdida de sangre ≥ 1000 ml o pérdida de sangre con signos o síntomas de hipovolemia dentro de las 24 horas posteriores al parto, ya sea cesárea o parto vaginal\".<br><br>Análisis de Distractores: La opción A corresponde al límite tradicional de alerta exclusivo para parto vaginal, pero ya no define la patología severa universal. Las opciones C y D indican hemorragias masivas ya consolidadas que requieren activación de transfusión masiva, no el umbral diagnóstico inicial.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Introducción, Página 10."
    },
    {
        id: 2,
        question: "Dato de laboratorio que clasifica a una paciente gestante en la categoría de riesgo alto para desarrollar Hemorragia Postparto.",
        options: ["Plaquetas < 150,000 /ul", "Hemoglobina < 11 g/dl", "Hematocrito < 30%", "Fibrinógeno < 300 mg/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la estratificación del riesgo permite anticipar complicaciones. Un hematocrito bajo limita críticamente la capacidad de la paciente para tolerar las pérdidas sanguíneas normales, lo que la sitúa en un riesgo elevado de choque hemorrágico.<br><br>Perla ENARM: \"Alto riesgo: Placenta previa, acreta, increta y percreta. Hematocrito menor de 30. Sangrado vaginal a su ingreso. Defectos en la coagulación ya conocidos\".<br><br>Análisis de Distractores: La opción A describe una trombocitopenia leve, frecuente y fisiológica en muchas gestantes. La opción B es el umbral para tamizaje y diagnóstico de anemia leve, pero el hematocrito < 30% es el parámetro exacto listado para el riesgo alto. La opción D es un nivel normal durante la gestación.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadro 9, Página 87."
    },
    {
        id: 3,
        question: "Fármaco de primera línea recomendado universalmente para el manejo activo del tercer periodo del trabajo de parto.",
        options: ["Ergonovina intramuscular", "Carbetocina intravenosa", "Misoprostol sublingual", "Oxitocina intramuscular"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, este fármaco ha demostrado ser la intervención más costo-efectiva para la inducción de las contracciones miometriales necesarias (\"ligaduras vivas de Pinard\") que previenen la atonía uterina post-alumbramiento.<br><br>Perla ENARM: \"Se recomienda el uso de oxitocina como uterotónico de primera elección en el postparto para prevenir HPP\".<br><br>Análisis de Distractores: Las opciones A y C son uterotónicos de segunda línea. La opción B se reserva para pacientes con perfiles de alto riesgo o condiciones que exigen estricta restricción de líquidos, no para la población general sin complicaciones.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Prevención, Página 21."
    },
    {
        id: 4,
        question: "Condición materna que representa una contraindicación absoluta para la administración farmacológica de Ergonovina.",
        options: ["Trastornos hipertensivos", "Enfermedad renal crónica", "Macrosomía fetal", "Trabajo de parto prolongado"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, este derivado del cornezuelo de centeno produce una intensa vasoconstricción sistémica que puede desencadenar crisis hipertensivas letales o eventos vasculares cerebrales en pacientes con endotelio susceptible.<br><br>Perla ENARM: \"Se recomienda considerar que la ergonovina está contraindicada en pacientes con estados hipertensivos asociados al embarazo\".<br><br>Análisis de Distractores: Las opciones C y D predisponen a la atonía uterina y justifican el uso de uterotónicos potentes, sin contraindicar este fármaco. La opción B exige control hídrico, donde la carbetocina es ideal, pero la ergonovina no está absolutamente contraindicada por la falla renal en sí, sino por la hipertensión concurrente.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento, Página 26."
    },
    {
        id: 5,
        question: "Valor límite sugerido en el tamizaje prenatal de la biometría hemática para iniciar tratamiento profiláctico contra la anemia gestacional.",
        options: ["Hemoglobina ≤ 10 g/dl", "Hemoglobina ≤ 11 g/dl", "Hematocrito ≤ 33%", "Ferritina ≤ 15 mcg/L"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la detección temprana y corrección de la anemia mejora la oxigenación tisular y asegura que la paciente soporte el sangrado permisible durante la resolución del embarazo sin descompensarse prematuramente.<br><br>Perla ENARM: \"Se sugiere realizar tamizaje de anemia (Hb ≤ 11 g/dl) en mujeres embarazadas\".<br><br>Análisis de Distractores: La opción A diagnostica anemia severa u otras comorbilidades. La opción C no es el parámetro primario definido por la guía para el inicio de suplementación universal. La opción D confirma déficit de depósitos de hierro una vez hallada la anemia, pero el tamizaje base es la hemoglobina.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Prevención, Página 18."
    },
    {
        id: 6,
        question: "Uterotónico de elección indicado para profilaxis en pacientes con preeclampsia severa y riesgo de edema agudo de pulmón.",
        options: ["Misoprostol rectal", "Oxitocina infusión continua", "Carbetocina intravenosa", "Ergonovina intramuscular"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, este análogo sintético de acción prolongada se administra en un bolo mínimo, lo que evita la necesidad de grandes volúmenes de cristaloides requeridos típicamente para las infusiones de oxitocina, protegiendo la vasculatura pulmonar de sobrecargas hídricas.<br><br>Perla ENARM: \"Se recomienda el uso de carbetocina como uterotónico de primera elección para prevenir HPP en... pacientes en las que por alguna patología pre existente se requiere restricción hídrica (cardiopatía, nefropatía, preeclampsia-eclampsia)\".<br><br>Análisis de Distractores: La opción B condiciona un alto aporte de líquidos por su vehículo. La opción D es una contraindicación absoluta por el riesgo de evento vascular cerebral. La opción A es un uterotónico de rescate o tercera línea sin beneficio superior a los inyectables de primera elección en medios hospitalarios.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Prevención, Página 22."
    },
    {
        id: 7,
        question: "Ventana terapéutica de máxima eficacia para la administración intravenosa de ácido tranexámico tras el inicio del evento hemorrágico.",
        options: ["Primeras 12 horas", "Primeras 6 horas", "Primeras 3 horas", "Primeras 24 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, este antifibrinolítico estabiliza el coágulo en el lecho placentario, logrando una reducción comprobada de la mortalidad únicamente si se utiliza antes de que la cascada de hiperfibrinolisis y agotamiento microvascular se haya instaurado de forma irreversible.<br><br>Perla ENARM: \"Utilizó ácido tranexámico en pacientes con HPP dentro de las primeras tres horas del inicio del evento hemorrágico\".<br><br>Análisis de Distractores: Las opciones A, B y D sobrepasan el margen temporal demostrado en ensayos clínicos (estudio WOMAN). Su aplicación tardía carece de beneficio hemostático real y expone a la paciente a riesgos de trombosis.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Anexos, Página 487."
    },
    {
        id: 8,
        question: "Grupo de marcadores paraclínicos y clínicos que evalúan de manera conjunta la hipoperfusión tisular para predecir morbi-mortalidad en choque hemorrágico.",
        options: ["Hematocrito, uresis horaria y tensión arterial", "Índice de choque, déficit de base y lactato", "Conteo de plaquetas, fibrinógeno y dímero D", "Saturación venosa central, lactato y hemoglobina"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la hemorragia oculta y masiva (mayor a 1500 ml) activa el metabolismo anaerobio y altera la hemodinámica compensada. Evaluar estos tres parámetros integra el daño metabólico microvascular con la respuesta macrohemodinámica, mejorando la sensibilidad predictiva.<br><br>Perla ENARM: \"Se sugiere utilizar el índice de choque, déficit de base y medición de lactato (en conjunto) como predictores de morbi-mortalidad en paciente con HPP (mayores de 1500 ml), ya que estos son imprecisos si se utilizan de forma independiente\".<br><br>Análisis de Distractores: La opción A menciona signos vitales aislados que tardan en alterarse por los mecanismos neurohormonales del embarazo. La opción C sirve para el manejo dirigido de la coagulación, no para el diagnóstico temprano del choque tisular. La opción D incluye parámetros de oxigenación invasivos no estandarizados como primer escrutinio obstétrico.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Pronóstico, Página 68."
    },
    {
        id: 9,
        question: "Meta terapéutica sérica estricta para el nivel de fibrinógeno durante la reanimación de control de daños en obstetricia.",
        options: ["> 100 mg/dl", "> 150 mg/dl", "> 200 mg/dl", "> 250 mg/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la formación y resistencia del coágulo en la extensa herida del lecho placentario requiere niveles de fibrinógeno superiores a los recomendados en traumas no obstétricos, debido a la alta tasa de consumo fisiopatológico inherente a la gestación.<br><br>Perla ENARM: \"Reanimación de control de daños guiada por pruebas de laboratorio estándar... Meta >200 mg/dl Nivel de fibrinógeno\".<br><br>Análisis de Distractores: Las opciones A y B son insuficientes en obstetricia y marcan estados de coagulopatía de consumo activa que exigen transfusión agresiva inmediata de crioprecipitados. La opción D excede el umbral de urgencia.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Algoritmo 9, Página 81."
    },
    {
        id: 10,
        question: "Nivel de hemoglobina que determina el límite crítico para indicar la transfusión de concentrados eritrocitarios en ausencia de hemorragia masiva activa.",
        options: ["< 8 g/dl", "< 7 g/dl", "< 9 g/dl", "< 6 g/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, las estrategias de transfusión restrictiva reducen riesgos inmunológicos y de sobrecarga de volumen. Una hemoglobina de 7 g/dl garantiza un transporte de oxígeno basal suficiente en pacientes que ya han sido estabilizadas hemostáticamente.<br><br>Perla ENARM: \"Se sugiere considerar como umbral mínimo, hemoglobina de 7 g/dl, para transfusión de concentrados eritrocitarios\".<br><br>Análisis de Distractores: La opción A es válida únicamente si la paciente continúa con sangrado activo o descompensación hemodinámica incontrolable. Las opciones C y D están fuera del protocolo de transfusión restrictiva de control de daños (la C expone a riesgos innecesarios y la D marca un umbral isquémico muy riesgoso).",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento, Página 63."
    },
    {
        id: 11,
        question: "Dispositivo de contención no invasivo indicado para la estabilización hemodinámica temporal durante el traslado a una unidad de mayor resolución.",
        options: ["Empaquetamiento tipo Mickulicz", "Balón de Bakri", "Pantalón antichoque no neumático", "Compresión bimanual continua"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la compresión circunferencial externa de las extremidades inferiores y la pelvis autotransfunde el volumen residual de capacitancia venosa hacia el sistema central (cerebro, corazón), salvando la vida de la paciente durante tiempos prehospitalarios críticos.<br><br>Perla ENARM: \"Se sugiere el uso de pantalón antichoque no neumático como medida temporal en caso de HPP para traslado de paciente a unidad con mayor capacidad de resolución\".<br><br>Análisis de Distractores: La opción A es un procedimiento de abdomen abierto reservado para quirófano. La option B requiere invasión cavitaria y material estéril que puede no estar disponible en el primer nivel de atención. La opción D es temporal pero agota físicamente al personal y es ineficaz para un traslado prolongado en ambulancia.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Referencia Rápida, Página 16."
    },
    {
        id: 12,
        question: "Vía de abordaje quirúrgico descrita en la Técnica Posadas para la ligadura de las arterias uterinas y ováricas debido a su mayor rapidez.",
        options: ["Abordaje retroperitoneal", "Abordaje anterior", "Abordaje vaginal profundo", "Abordaje posterior"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, exteriorizar el útero mediante tracción fúndica y exponer su cara posterior facilita la visualización inmediata de los vasos y disminuye radicalmente el riesgo de iatrogenia sobre los uréteres y vejiga.<br><br>Perla ENARM: \"Se sugiere utilizar el abordaje posterior en la ligadura de arterias uterinas, ya que es más rápido y sencillo... generando así una desarterialización selectiva uterina (Técnica Posadas)\".<br><br>Análisis de Distractores: La opción A es técnicamente demandante y consume tiempo vital. La opción B expone estructuras anatómicas complejas (vejiga) al intentar pinzar. La opción C no permite un control quirúrgico proximal alto de la irrigación ovárica complementaria.",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento, Página 33."
    },
    {
        id: 13,
        question: "Técnica quirúrgica recomendada de primera intención cuando se presenta una coagulopatía secundaria mixta intraoperatoria con sangrado difuso.",

        options: ["Mayor a 20,000 por microlitro", "Mayor a 50,000 por microlitro", "Mayor a 100,000 por microlitro", "Mayor a 150,000 por microlitro"],

        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, en presencia de sangrado microvascular difuso y consumo en el lecho de la cicatriz placentaria, un nivel de 50,000/µl es el umbral empírico mínimo de seguridad para permitir la formación inicial del tapón plaquetario temporal sin caer en transfusión profiláctica irresponsable de aféresis.<br><br>Perla ENARM: \"Nivel de plaquetas: Meta >50000 µl\".<br><br>Análisis de Distractores: La opción A es el límite de riesgo de hemorragia espontánea en el sistema nervioso central, absolutamente insuficiente para cirugía obstétrica. Las opciones C y D son rangos deseables en situaciones electivas previas al parto, pero sobrepasan la meta racional de un protocolo estricto de control de daños con recursos limitados.",

    {
        id: 32,
        question: "Por su farmacocinética competitiva y riesgo de complicaciones orgánicas asociadas a receptores celulares comunes, ¿qué par de fármacos uterotónicos tienen contraindicada su administración de manera simultánea durante una reanimación obstétrica?",

    {

        question: "Durante la profilaxis farmacológica estandarizada y en el manejo de una hemorragia por atonía (sin comorbilidades contraindicantes), ¿cuál es la dosis única intramuscular del alcaloide ergonovina que establece el cuadro básico de atención?",

        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la potencia vasopresora de los derivados del cornezuelo del centeno exige dosis precisas y mínimas para estimular de forma rítmica (contracción tetánica) el útero sin paralizar de forma súbita los esfínteres vasculares mayores que llevarían al vasoespasmo coronario materno.<br><br>Perla ENARM: \"Uterotónicos profilácticos... Ergonovina 0.2 mg intramuscular dosis única. Contraindicado en trastornos hipertensivos del embarazo\".<br><br>Análisis de Distractores: Las opciones B, C y D exceden peligrosamente el índice terapéutico del fármaco, generando toxicidad neurológica y cardiovascular inminente como cefalea vascular incapacitante, vómitos centrales en proyectil o crisis hipertensivas.",

    {
        id: 34,
        question: "Desde el escrutinio obstétrico de factores predisponentes para alteraciones del \"Tono\" uterino, ¿qué alteración propia de la progresión del trabajo de parto presenta la mayor probabilidad matemática de predecir hemorragia grave?",
        options: ["Infección intraamniótica clínica", "Tercer periodo de parto prolongado", "Ruptura prematura de membranas", "Uso de analgesia neuroaxial"],

        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la demora en la expulsión de la placenta (tercer periodo > 30 minutos) altera la fisiología de la contracción rítmica, interrumpe el clampaje biológico y fomenta el depósito local de fibrina de mala calidad, presentando el Razón de Momios (OR=7.60) más letal en los cuadros predictivos directos por atonía y retención de restos.<br><br>Perla ENARM: \"Factores de riesgo... Tercer estadio de trabajo de parto prolongado. Cuatro T: Tono OR 7.60 (4.20–13.50)\".<br><br>Análisis de Distractores: Las opciones A y C se asocian a sepsis y riesgo materno/fetal que pueden precipitar coagulopatía o atonía funcional, pero estadísticamente su OR es inferior al agotamiento de la fase placentaria inmediata. La opción D es un mito obstétrico rebatido; la anestesia neuroaxial reduce la hemoglobina menos que la anestesia general.",

    },
    {
        id: 35,
        question: "Durante la reanimación hídrica de gran volumen, ¿cuál de los siguientes coloides se sugiere utilizar específicamente en pacientes con hemorragia grave para mantener la presión oncótica limitando activamente la coagulopatía dilucional?",
        options: ["Almidón de hidroxietilo", "Gelatina de piel porcina", "Solución salina hipertónica", "Albúmina sérica humana"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, a diferencia de los coloides sintéticos artificiales (almidones o dextranos) que alteran la función plaquetaria por unión de membrana y precipitan la disfunción renal aguda sistémica, la albúmina restituye volumen intravascular arrastrando líquidos sin destruir mecánicamente el tapón hemostático primario.<br><br>Perla ENARM: \"Se sugiere considerar el uso de albumina en pacientes con HPP grave o masiva (limitar coagulopatía dilucional).\"<br><br>Análisis de Distractores: La opción A interfiere y bloquea los receptores glicoproteicos de la agregación plaquetaria, estando proscrita en hemorragias activas. La opción B es un compuesto hemostático de uso tópico-quirúrgico, no intravenoso. La opción C es un cristaloide hiperosmolar puro, no un coloide que aporte presión oncótica real sostenida.",

    {
        id: 36,
        question: "Dentro de las directrices laboratoriales para reanimación dirigida por metas y uso de hemoderivados (Complejo protrombínico o plasma fresco), ¿cuál es el objetivo terapéutico de coagulación dictado por el valor del INR?",

        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, el Índice Internacional Normalizado (INR) refleja fidedignamente la vía extrínseca de la coagulación. Un INR prolongado por arriba de dos indica un estado propenso al sangrado difuso intraoperatorio que obliga a transfundir de manera acelerada plasma fresco o complejos factoriales.<br><br>Perla ENARM: \"Reanimación de control de daños guiado con pruebas de laboratorio estándar... Meta TP y TTP normales e INR <2.0\".<br><br>Análisis de Distractores: La opción A es el valor perfecto estricto de un sujeto sano, prácticamente inalcanzable de manera súbita en el contexto de politransfusión masiva aguda obstétrica y que gastaría recursos de manera ineficaz. La opción D denota un estado franco de anticoagulación patológica activa.",

    {

        justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la T de \"Trauma\" se refiere exclusivamente a la disrupción anatómica de los tejidos maternos (desgarros cervicales, vaginales, hematomas vulvares o ruptura franca del útero). El sangrado no cederá con fármacos uterotónicos y exige visualización directa, pinzamiento y cierre anatómico en bloque por planos.<br><br>Perla ENARM: \"Algoritmo 6. Tratamiento específico de HPP... Trauma: Laceración, hematomas o ruptura uterina -> Reparación de laceraciones, drenaje de hematoma o histerorrafia\".<br><br>Análisis de Distractores: La opción A trata la coagulopatía (\"Trombina\"). La opción B resuelve el sangrado por falta de respuesta del miometrio ante oxitócicos (\"Tono\"). La opción D es exclusiva para la extracción de cotiledones o membranas remanentes (\"Tejido\").",
        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Algoritmo 6, Página 78."

    {

        source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Anexo de Verificación, Página 488."
    },
    {
        id: 39,
        question: "En aquellas pacientes admitidas en una unidad de terapia intensiva debido al empleo de empaquetamiento abdominal de salvamento (Mickulicz), ¿cuál es la entidad fisiopatológica local inminente de alta letalidad que debe descartarse en sus evaluaciones seriadas?",

                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="GU29610GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoFUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoFULastQId', currentQuestionId);
                else localStorage.removeItem('gyoFULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoFUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
