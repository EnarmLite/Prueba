    <script>
        // --- LOGO SNIPPET (Desktop Module & Screens: Absolute Right inside content) ---
        const desktopInnerLogoHtml = `
            <div class="hidden md:block md:absolute md:top-8 md:right-8 z-10">
                <div class="logo-container bg-white py-1 px-3 rounded-lg border border-slate-200 shadow-sm">
                    <span class="logo-enarm text-xl">ENARM</span>
                    <span class="logo-Lite text-base">Lite<sup>®</sup></span>
                </div>
            </div>
        `;

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento de fracturas intracapsulares de fémur proximal",
    gpcLink: "https://drive.google.com/file/d/1BU4Zzc_MHsp-SMAiovuNYimjSPYzc6Xc/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>Para el ENARM, la fractura intracapsular reside en su <strong class="text-indigo-900 dark:text-indigo-200">integridad vascular</strong>. La decisión no es solo "reparar", sino predecir la viabilidad de la cabeza femoral. El ENARM evaluará tu capacidad para discernir entre <u class="decoration-indigo-400 decoration-2 font-medium">preservar la cabeza (osteosíntesis)</u> en fracturas estables/jóvenes o <u class="decoration-indigo-400 decoration-2 font-medium">sacrificarla (artroplastía)</u> en fracturas desplazadas/añosas por riesgo inminente de necrosis avascular.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura la toma de decisiones en tres "filtros" críticos:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Viabilidad Vital:</strong> Si el paciente tiene <strong class="underline">&gt; 80 años y comorbilidades con alto riesgo de mortalidad</strong> (infarto, EPOC severo), la GPC dicta tratamiento conservador. La meta es supervivencia, no funcionalidad mecánica.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Desplazamiento (Garden):</strong>
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">No desplazada (Garden I-II):</span> Vascularidad intacta. Se realiza <strong class="font-bold">Fijación Interna (Osteosíntesis)</strong> con tornillos canulados.</li>
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Desplazada (Garden III-IV):</span> Asumes daño vascular irreversible. Pasas al tercer filtro.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Reserva Funcional (Artroplastía):</strong> Ante fractura desplazada:
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-amber-600 dark:text-amber-500">Baja demanda / comorbilidades:</span> <strong class="font-bold">Hemiartroplastía (HA)</strong>.</li>
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Paciente activo:</span> <strong class="font-bold">Artroplastía Total de Cadera (ATC)</strong> para mayor durabilidad.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Regla de Oro en Imagen:</strong> La serie inicial obligatoria incluye <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Radiografía AP de pelvis y Lateral de cadera</strong> afectada.</li>
                        <li><strong>Biomecánica (Pauwels):</strong> Un Pauwels Tipo III (<u class="decoration-emerald-400 decoration-2 font-bold">&gt; 70 grados</u>) es crítico porque predominan las <strong class="text-emerald-700 dark:text-emerald-300 font-bold">fuerzas de cizallamiento</strong>, lo que abre la fractura y aumenta el riesgo de fallo en osteosíntesis.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa Radiografía "Normal":</strong> Anciano con dolor en cadera tras caída e imposibilidad para marcha, pero con Rx "negativas", NO se va a casa. Siguiente paso obligatorio es <strong class="text-rose-600 dark:text-rose-400 font-bold">TC o RMN para descartar fracturas ocultas</strong>.</li>
                        <li><strong>Confusión en Rehabilitación:</strong> 
                            <br>- Si pusiste prótesis (HA o ATC): Bipedestación a las 24 hrs y marcha a las 48 hrs.
                            <br>- Si pusiste tornillos (Osteosíntesis): <u class="decoration-rose-500 decoration-2">Se difiere el apoyo hasta las 4 semanas</u>.
                        </li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-115-08)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Profilaxis Extendida:</strong> La tromboprofilaxis (HBPM) no termina al alta; mantener por <strong class="underline">4 a 5 semanas postoperatorias</strong>.</li>

    title: "Módulo 5: Cirugía de Control de Daños en herida por PAF en abdomen",
    gpcLink: "https://drive.google.com/file/d/16ZfkrGFmSgHphmQvZas7SYHOtnLmLvp5/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Cirugía de Control de Daños (CCD) no es una técnica de rescate fallido, sino una <strong class="text-indigo-900 dark:text-indigo-200">decisión estratégica anticipada</strong> donde se sacrifica la reparación anatómica inmediata para priorizar la reserva fisiológica, deteniendo la laparotomía ante la aparición de la <u class="decoration-indigo-400 decoration-2 font-medium">"tríada de la muerte" (acidosis, hipotermia, coagulopatía)</u> para trasladar al paciente a la UCI y diferir la reconstrucción definitiva.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo no es lineal, es un bucle de reevaluación constante dependiente de la estabilidad metabólica:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Primer "Bail-out" (Decisión Intraoperatoria):</strong> Si durante la cirugía por herida de proyectil de arma de fuego (PAF) el paciente presenta inestabilidad, se aborta el plan reconstructivo y se cambia a modo supervivencia: <strong class="underline">control de hemorragia, control de contaminación y dejar el abdomen abierto</strong>.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Purgatorio (La UCI):</strong> Una vez instituida la CCD, el paciente NO regresa a piso. Pasa a la UCI para corrección metabólica y estabilización.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Segundo "Time-out" (Reintervención):</strong> Si hay deterioro súbito (hemorragia, síndrome compartimental), la reintervención es "a demanda" (inmediata). Si mejora y se corrigen parámetros, se realiza la reintervención planeada <strong class="text-rose-600 dark:text-rose-400 font-bold">(idealmente a las 24-96 horas)</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>La Clínica:</strong> Paciente con sangrado en capa (coagulopatía), mucosa pálida y frialdad distal (hipotermia).</li>
                        <li><strong>El "Trigger" Laboratorial:</strong> La GPC es estricta. Esta clínica se correlaciona con <strong class="text-emerald-700 dark:text-emerald-300 font-bold">pH &lt; 7.2, Temp &lt; 34&deg;C o HCO3 &lt; 15 mEq/L</strong>.</li>
                        <li><strong>La Decisión:</strong> Ante clínica de choque + pH &lt; 7.2, la respuesta correcta NUNCA es anastomosis o reparación compleja; es <u class="decoration-emerald-400 decoration-2 font-bold">control de daños y empaquetamiento</u>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Cierre Forzado:</strong> Si hay edema intestinal o imposibilidad de cerrar sin tensión, <strong class="text-rose-600 dark:text-rose-400 font-bold">JAMÁS fuerces el cierre</strong> (causa Síndrome Compartimental Abdominal). Utiliza Bolsa de Bogotá o VAC.</li>
                        <li><strong>La Trampa del Tiempo:</strong> Reintervenir antes de 24h sin corregir la coagulopatía es fútil; esperar &gt; 96h aumenta el riesgo de infección y "abdomen congelado".</li>
                        <li><strong>El Recurso Real:</strong> El ideal es el VAC (Presión Negativa). En medio austero, la opción correcta es la <u class="decoration-rose-500 decoration-2">Bolsa de Bogotá</u>.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SEDENA-445-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">El "Gatillo" Metabólico:</strong> Se instituye CCD obligatoriamente ante acidosis significativa: <strong class="underline">pH &lt; 7.2 o HCO3 &lt; 15 mEq/L</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Ventana de Reintervención:</strong> La fase III debe realizarse preferentemente entre las <strong class="underline">24 a 96 horas</strong> posteriores a la laparotomía inicial.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Cierre Temporal:</strong> En hospitales austeros, la <strong class="underline">Bolsa de Bogotá</strong> es la alternativa de elección para el abdomen abierto.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Manejo de la Contaminación:</strong> Si hay fístulas o contaminación grave, se permite la granulación y se difiere el cierre proyectando una <strong class="underline">Hernia Ventral Planeada (HVP) a 6-12 meses</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Indicador de Transfusión:</strong> Se instituye CCD si se requiere transfusión masiva: <strong class="underline">&gt; 4,000 ml de sangre total o &gt; 3,000 ml de hemoderivados</strong>.</li>
                </ol>
            </div>
        </div>

{
    id: 6,
    title: "Módulo 6: Diagnóstico y tratamiento del traumatismo de tórax en adultos",
    gpcLink: "https://drive.google.com/file/d/17QkzLbM1ZETqDrp_yqMBWAZLTre5QJpr/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM evalúa tu capacidad para dicotomizar al paciente de trauma torácico en dos escenarios: <strong class="text-indigo-900 dark:text-indigo-200">inestabilidad letal inminente</strong>, donde la clínica manda y la acción es inmediata (sin esperar gabinete), frente a la <u class="decoration-indigo-400 decoration-2 font-medium">estabilidad hemodinámica</u>, que permite la confirmación diagnóstica escalonada. El "corazón" del tema es saber cuándo el bisturí o la aguja deben preceder a la radiografía.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura el manejo basándose en la fisiología del colapso cardiovascular:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Paciente Inestable (La Vía Rápida):</strong>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>
                            <span>${score}/${total}</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-teal-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });
            moduleScoresHtml += '</div>';
            
            const finalPct = totalQuestions > 0 ? Math.round((totalScore/totalQuestions)*100) : 0;
            const dateStr = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

            document.getElementById('module-display').innerHTML = `
                <div class="animate-fade-in-up">
                    <div class="flex justify-center mb-6 md:hidden">
                        <div class="welcome-logo logo-container bg-white py-2 px-4 rounded-lg border border-slate-200 shadow-sm">

        function renderModuleList() {
            const list = document.getElementById('module-list');
            if(!list) return;
            list.innerHTML = '';

            // MODIFICACIÓN: Iterar sobre la lista COMPLETA de títulos cortos
            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                const li = document.createElement('li');
                
                if (module) {
                    // MÓDULO DISPONIBLE
                    let classes = 'p-3 rounded-lg cursor-pointer transition-all duration-200 flex items-center justify-between gap-3 ';
                    if (isActive) classes += 'bg-teal-600 font-bold text-white shadow-lg';
                    else if (isCompleted) classes += 'bg-emerald-800/80 text-emerald-300 hover:bg-emerald-700/80';
                    else classes += 'bg-slate-700 hover:bg-slate-600 hover:pl-4';

                    li.className = classes;
                    
                    let iconSvg = isCompleted 
                        ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />'
                        : '<path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />';

                    let innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-70" viewBox="0 0 20 20" fill="currentColor">
                                ${iconSvg}
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;

                    if (isCompleted) {
                        innerHTML += `
                            <button onclick="event.stopPropagation(); showModuleSummary(${moduleId})" class="p-1 hover:bg-white/20 rounded-full transition-colors" title="Ver Resumen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        `;
                    }

                    li.innerHTML = innerHTML;
                    li.onclick = () => displayModule(moduleId);
                } else {
                    // MÓDULO NO DISPONIBLE AÚN
                    li.className = 'p-3 rounded-lg flex items-center gap-3 bg-slate-800 text-slate-500 cursor-not-allowed opacity-50';
                    li.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;
                }
                list.appendChild(li);
            });
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríadosCourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríadosCourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríadosCourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-teal-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-teal-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
