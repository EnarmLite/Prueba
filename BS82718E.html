    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el periodo de vigilancia epidemiológica para descartar la infección tras la colocación de un implante articular?",
        options: ["30 días posoperatorios", "60 días posoperatorios", "180 días posoperatorios", "1 año posoperatorio"],
        answer: 3,
        justification: "Justificación: El material protésico genera biopelículas que alteran la latencia de la proliferación bacteriana. De acuerdo a la GPC de Prevención de Infección Quirúrgica, los procedimientos con implantes extienden la cronología de vigilancia estándar de 30 días.<br><br>Perla Quirúrgica: Se define como ISQ en incisión profunda... además se considera hasta dentro de un año del posoperatorio si se colocan implantes y parece relacionarse al procedimiento quirúrgico.<br><br>Análisis de Distractores: La vigilancia de 30 días (A) es aplicable exclusivamente a procedimientos sin cuerpo extraño. Las opciones de 60 y 180 días (B, C) no forman parte de los criterios estandarizados del Centro para el Control de Enfermedades (CDC).",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Diagnóstico, p. 24."
    },
    {
        id: 2,
        question: "¿Cuál es el límite máximo tolerado de glucosa capilar durante las primeras 24 horas posoperatorias para prevenir fallas en la cicatrización?",
        options: ["≤ 180 mg/dl", "≤ 140 mg/dl", "≤ 200 mg/dl", "≤ 250 mg/dl"],
        answer: 0,
        justification: "Justificación: La hiperosmolaridad paraliza el estallido respiratorio de los leucocitos locales. De acuerdo a la GPC de Prevención de Infección Quirúrgica, se requiere un margen estricto inmediato tras la extubación.<br><br>Perla Quirúrgica: Se recomienda mantener la glucemia en 180 mg/dl o menor dentro de las primeras 18 a 24 horas del término del tiempo anestésico.<br><br>Análisis de Distractores: Un límite ≤ 140 mg/dl (B) eleva el riesgo de hipoglucemia inadvertida. El corte ≤ 200 mg/dl (C) es permisible únicamente a partir de las 6 am del día 1 y 2 posoperatorio. Mantener ≤ 250 mg/dl (D) supera la recomendación normativa.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 12."
    },
    {
        id: 3,
        question: "¿Cuál es el mecanismo fisiopatológico directo por el que la transfusión de hemoderivados incrementa el riesgo infeccioso quirúrgico?",
        options: ["Induce vasoconstricción e hipoxia tisular", "Altera la cascada plasmática de coagulación", "Disminuye el funcionamiento del macrófago", "Induce microtrombos en el lecho capilar"],
        answer: 2,
        justification: "Justificación: La inmunomodulación transfusional deprime la primera línea fagocítica tras la infusión de antígenos celulares alógenos. De acuerdo a la GPC de Prevención de Infección Quirúrgica, esto se asocia independientemente a mayor tasa de complicaciones.<br><br>Perla Quirúrgica: La trasfusión sanguínea aumenta el riesgo de ISQ al disminuir el funcionamiento del macrófago local.<br><br>Análisis de Distractores: La vasoconstricción local (A) es la respuesta típica atribuida a la hipotermia. Las alteraciones de la coagulación o microtrombos (B, D) no explican la caída del sistema reticuloendotelial de defensa cutánea.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 15."
    },
    {
        id: 4,
        question: "¿Cuál es el instrumento mecánico recomendado para la remoción preoperatoria de vello cuando este interfiere con el campo de incisión?",
        options: ["Navaja libre de acero inoxidable", "Máquina de rasurar eléctrica", "Crema depilatoria queratolítica tópica", "Cinta con cera adhesiva caliente"],
        answer: 1,
        justification: "Justificación: Las disrupciones del estrato córneo generan nichos de proliferación bacteriana aguda. De acuerdo a la GPC de Prevención de Infección Quirúrgica, se requiere realizar cortes que no generen tracción ni microabrasión folicular.<br><br>Perla Quirúrgica: En caso necesario hacerlo fuera del quirófano usando tijeras o máquinas de rasurar desechables y no usar navajas.<br><br>Análisis de Distractores: La navaja (A) está estrictamente contraindicada. Los agentes químicos (C) y la cera (D) producen dermatitis de contacto preoperatoria inaceptable.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 18."
    },
    {
        id: 5,
        question: "¿En qué ventana cronológica exacta debe infundirse la profilaxis antimicrobiana intravenosa antes de incidir la piel?",
        options: ["10 a 20 minutos", "30 a 60 minutos", "90 a 120 minutos", "Mayor a 120 minutos"],
        answer: 1,
        justification: "Justificación: La incisión genera isquemia inmediata en el borde cutáneo; el fármaco requiere alcanzar su meseta tisular antes de que el bisturí corte la perfusión capilar. De acuerdo a la GPC de Prevención de Infección Quirúrgica, este periodo se acopla a la inducción anestésica.<br><br>Perla Quirúrgica: Para procedimientos quirúrgicos, la administración de antibióticos profilácticos debe ser entre 30 y 60 minutos antes de incidir la piel.<br><br>Análisis de Distractores: Menos de 30 minutos (A) no asegura penetración del tejido. Ventanas >60 minutos (C, D) promueven aclaramiento renal precoz, perdiendo niveles bactericidas transoperatorios.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 20."
    },
    {
        id: 6,
        question: "¿Cuál es la temperatura corporal central mínima que debe asegurarse tras la cirugía para mantener la homeostasis tisular periférica?",
        options: ["≥ 35.5 °C", "≥ 36.5 °C", "≥ 35.0 °C", "≥ 37.0 °C"],
        answer: 0,
        justification: "Justificación: El descenso de temperatura causa vasoconstricción periférica grave que induce disfunción de neutrófilos. De acuerdo a la GPC de Prevención de Infección Quirúrgica, este umbral inferior marca el inicio exponencial del riesgo infeccioso.<br><br>Perla Quirúrgica: Se recomienda mantener una temperatura corporal mínima de 35.5 grados centígrados, después de un evento quirúrgico.<br><br>Análisis de Distractores: Las temperaturas ≥ 36.5 °C y ≥ 37.0 °C (B, D) son fisiológicas, pero el punto de corte clínico permitido de la norma inferior es 35.5 °C. Llegar a 35.0 °C (C) ya implica hipotermia deletérea activa.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 13."
    },
    {
        id: 7,
        question: "En el cierre por planos tras una cirugía mayor, ¿cuál es el material y técnica indicados para la fascia abdominal?",
        options: ["Material inabsorbible a puntos separados", "Material inabsorbible continuo", "Material absorbible a puntos separados", "Material absorbible continuo"],
        answer: 3,
        justification: "Justificación: Las suturas continuas distribuyen uniformemente la tensión parietal y evitan la isquemia focal de los bordes. De acuerdo a la GPC de Prevención de Infección Quirúrgica, evitar nidos extraños crónicos (hilos irreabsorbibles) limita la fijación bacteriana.<br><br>Perla Quirúrgica: Se recomienda el uso de material absorbible ininterrumpido en el cierre de la pared abdominal.<br><br>Análisis de Distractores: Los materiales inabsorbibles (A, B) predisponen a formación de granulomas crónicos. La técnica de puntos separados (C) altera la distribución isquémica de la aponeurosis.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 16."
    },
    {
        id: 8,
        question: "Durante la valoración preoperatoria, ¿qué condición clínica NO debe considerarse de forma aislada como un factor predictor de infección de sitio quirúrgico?",
        options: ["Tabaquismo activo reciente", "Hipoxemia transoperatoria transitoria", "Uso de esteroides sistémicos", "Hiperglucemia capilar descontrolada"],
        answer: 2,
        justification: "Justificación: Clásicamente se creía que la inmunosupresión farmacológica predecía infecciones incisionales directas. De acuerdo a la GPC de Prevención de Infección Quirúrgica, la evidencia actual descartó este dogma como determinante aislado frente a alteraciones de perfusión.<br><br>Perla Quirúrgica: No se recomienda considerar la edad, la administración de radioterapia previa a la cirugía o el uso de esteroides sistémicos como factor de riesgo.<br><br>Análisis de Distractores: El tabaquismo (A), la hipoxemia (B) y la hiperglucemia (D) son los tres pilares reversibles más documentados que disminuyen drásticamente el flujo de oxígeno y la acción de los neutrófilos en la herida.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 12."
    },
    {
        id: 9,
        question: "¿Qué medida profiláctica de aplicación directa está recomendada exclusivamente en las heridas abdominales abiertas previo a la sutura de la piel?",
        options: ["Irrigación a presión con cefazolina", "Aplicación de spray de yodopovidona", "Lavado exhaustivo con peróxido de hidrógeno", "Inserción de ungüento de mupirocina subcutáneo"],
        answer: 1,
        justification: "Justificación: Modificar la biocarga colónica residual esparcida en la incisión previene la formación subcutánea de pus. De acuerdo a la GPC de Prevención de Infección Quirúrgica, esta maniobra tópica específica logró reducir tasas purulentas en este tipo de cirugías.<br><br>Perla Quirúrgica: Se recomienda utilizar spray de iodopovidona de manera tópica en la piel de las heridas abdominales antes de la sutura de las mismas.<br><br>Análisis de Distractores: La irrigación con antibiótico (A) fomenta resistencias. El peróxido de hidrógeno (C) es tóxico celular. El ungüento de mupirocina (D) induce alergias severas y dermatitis de contacto si se aplica directo en tejido cruento.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 16."
    },
    {
        id: 10,
        question: "¿Cuál es el tiempo protocolario exacto que garantiza la caída de las unidades formadoras de colonias durante el lavado quirúrgico de manos?",
        options: ["1 minuto", "5 minutos", "3 minutos", "10 minutos"],
        answer: 2,
        justification: "Justificación: Lograr la desnaturalización de membranas bacterianas saprófitas sin destruir el estrato córneo cutáneo exige una fricción cronometrada. De acuerdo a la GPC de Prevención de Infección Quirúrgica, esto maximiza la acción residual debajo de los guantes.<br><br>Perla Quirúrgica: El lavado durante 3 minutos conlleva a disminuir la cantidad de UFC en las manos comparado con 2 minutos. Se sugiere que la duración de la antisepsia quirúrgica sea de 3 minutos.<br><br>Análisis de Distractores: Tiempos cortos de 1 minuto (A) no penetran los anexos epidérmicos. Exceder de 5 a 10 minutos (B, D) causa dermatitis irritativa severa crónica para el cirujano sin agregar margen aséptico demostrable.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Prevención, p. 19."
    },
    {
        id: 11,
        question: "¿Cuál es la terapia empírica profiláctica de primera elección indicada antes de realizar una apendicectomía no complicada?",
        options: ["Cefalotina combinada con metronidazol", "Ceftriaxona en monoterapia intravenosa", "Clindamicina combinada con amikacina", "Ciprofloxacino combinado con metronidazol"],
        answer: 0,
        justification: "Justificación: Las incisiones que manipulan el íleon terminal y el colon derecho precisan aniquilar transitoriamente cepas anaerobias (Bacteroides fragilis) además de cocos grampositivos epidérmicos. De acuerdo a la GPC de Prevención de Infección Quirúrgica, esta sinergia garantiza la cobertura diana exacta.<br><br>Perla Quirúrgica: Antibiótico recomendado en apendicectomía (apendicitis no complicada): Cefalotina + metronidazol.<br><br>Análisis de Distractores: Ceftriaxona sola (B) no cubre anaerobios al 100%. Clindamicina/Amikacina (C) o Ciprofloxacino (D) constituyen segundas líneas reservadas estrictamente para alergia a los betalactámicos.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Cuadros o Figuras, p. 27."
    },
    {
        id: 12,
        question: "Según la clasificación estandarizada de heridas, ¿a qué categoría corresponde un trauma hepático con perforación colónica masiva de 12 horas de evolución?",
        options: ["Herida limpia", "Herida limpia contaminada", "Herida contaminada", "Herida sucia"],
        answer: 3,
        justification: "Justificación: El lapso cronológico y el vertido de materia fecal purulenta transforman un campo operatorio en infectado previo a la intervención. De acuerdo a la GPC de Prevención de Infección Quirúrgica, su tasa basal de ISQ supera el 40% y cambia los esquemas de tratamiento.<br><br>Perla Quirúrgica: Herida sucia (Clase 4). Heridas traumáticas antiguas con presencia de tejido desvitalizado, presencia clínica de infección o perforación de viscera.<br><br>Análisis de Distractores: La Limpia contaminada (B) involucra apertura mucosa bajo control estricto médico. La Contaminada (C) es para derrames sin infección clínica declarada o trauma agudo temprano. La Limpia (A) excluye tractos mucosos.",
        source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección de sitio quirúrgico, 2018, Introducción, p. 8."
    },
    {
        id: 13,
        question: "Durante un reemplazo aórtico adulto con reanimación hídrica constante, ¿qué umbral de pérdida hemática obliga normativamente a una re-dosificación antibiótica?",

                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGBSProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGBSLastQId', currentQuestionId);
                else localStorage.removeItem('CGBSLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGBSProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
