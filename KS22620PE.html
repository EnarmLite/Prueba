    <script>
        const questionsData = [
    {
        id: 1,
        question: "En la Displasia del Desarrollo de la Cadera, ¿cuál factor de riesgo incrementa la frecuencia de presentación de 3 a 8 veces más en comparación con el resto de la población?",
        options: ["Presentación pélvica al nacimiento", "Peso al nacer mayor a 4 kg", "Sexo femenino del recién nacido", "Antecedente de oligohidramnios"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, aunque condiciones como la macrosomía o la presentación pélvica restringen el espacio intrauterino, la influencia hormonal de los estrógenos y la relaxina materna generan una laxitud ligamentaria mucho mayor y con alta predilección genética hacia las niñas.<br><br>Perla ENARM: \"Pacientes con factores de riesgo que tienen una fuerte relación con: Historia familiar del 10 al 25%. Tres a ocho veces más frecuente en mujeres.\"<br><br>Análisis de Distractores: La presentación pélvica (A), el peso mayor a 4 kg (B) y el oligohidramnios (D) son factores de riesgo directos, pero la guía asocia la cuantificación de \"3 a 8 veces más frecuente\" en exclusividad al sexo femenino.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 2,
        question: "En la Displasia del Desarrollo de la Cadera, ¿en qué momento cronológico exacto está indicado realizar un ultrasonido en recién nacidos asintomáticos con factores de riesgo positivos?",
        options: ["Entre la 2a y 4a semana de vida", "Después de la 8a semana de vida", "En las primeras 48 horas de vida", "Entre la 4a y 6a semana de vida"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, realizar estudios de imagen demasiado temprano resulta en sobrediagnóstico por la laxitud fisiológica transitoria. Se debe permitir la maduración capsular inicial.<br><br>Perla ENARM: \"Se recomienda realizar el ultrasonido de forma temprana entre la 4a y 6a semana, en recién nacidos que cuenten con una exploración física anormal o con factores de riesgo para DDC.\"<br><br>Análisis de Distractores: Las opciones (A) y (C) resultarán sistemáticamente en falsos positivos debido a la inmadurez articular, la cual desaparece naturalmente a las 4 semanas. Esperar después de la octava semana (B) retrasa un eventual abordaje terapéutico de secuestro articular.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 3,
        question: "En la valoración del recién nacido de término, ¿qué límite de peso al nacer establece la Guía de Práctica Clínica como un factor fuertemente asociado a la presencia de criptorquidia?",
        options: ["Menor a 2500 gramos", "Mayor a 4000 gramos", "Menor a 1500 gramos", "Menor a 2000 gramos"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, los lactantes a término pero con bajo peso sufren interrupciones o retrasos en el estímulo androgénico y en el de cierre del canal inguinal intrauterino.<br><br>Perla ENARM: \"El bajo peso al nacer < 2500 g está asociado con la criptorquidia y con hipospadias de manera significativa.\"<br><br>Análisis de Distractores: El peso mayor a 4000 gramos (B) es riesgo clásico para displasia de cadera, no criptorquidia. Los valores de 1500 g (C) y 2000 g (D) identifican grados de prematurez, pero el corte oficial de bajo peso dictado textualmente como riesgo por la evidencia nacional es menor a 2500 gramos.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 4,
        question: "Ante un recién nacido masculino con diagnóstico clínico de criptorquidia bilateral no palpable, ¿a qué servicios de subespecialidad debe referirse de forma urgente desde su diagnóstico?",
        options: ["Cirugía pediátrica y urología", "Pediatría médica y nefrología", "Genética y endocrinología pediátrica", "Cirugía general y oncología"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, la falta de ambos testículos exige descartar trastornos de diferenciación sexual (ej. virilización de una niña XX con hiperplasia suprarrenal) que pueden desencadenar crisis perdedoras de sal mortales.<br><br>Perla ENARM: \"El recién nacido masculino con testículos no palpables bilateralmente, debe ser evaluado para detectar trastornos del desarrollo sexual... se debe referir a los servicios de genética y endocrinología pediátrica.\"<br><br>Análisis de Distractores: Cirugía y urología (A) tratarán el aspecto anatómico posteriormente, pero el diagnóstico agudo y riesgo vital dependen del abordaje metabólico-cromosómico inmediato. Nefrología (B) y oncología (D) no forman parte del algoritmo diagnóstico de primer contacto para esta anomalía.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 16."
    },
    {
        id: 5,
        question: "En el recién nacido diagnosticado con criptorquidia unilateral persistente, ¿cuál es el tiempo cronológico máximo permisible dictado para iniciar el tratamiento quirúrgico y preservar la fertilidad?",
        options: ["24 meses de edad", "6 meses de edad", "18 meses de edad", "12 meses de edad"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, la exposición prolongada del tejido gonadal a la temperatura intraabdominal degrada irreversiblemente los túbulos seminíferos y altera el pronóstico oncológico a futuro.<br><br>Perla ENARM: \"El tratamiento se inicia tan pronto como sea posible a partir de los seis meses de edad, máximo a los 18 meses de edad; ya que los resultados finales en pacientes adultos se observó mejoría en la espermatogénesis... así como en la disminución del riesgo de tumores.\"<br><br>Análisis de Distractores: Los 6 (B) y 12 meses (D) son la ventana \"ideal\" u \"óptima\", pero la pregunta solicita el límite o tiempo cronológico \"máximo\" permitido por la guía, el cual es 18 meses. Retrasarlo a 24 meses (A) conlleva daño térmico severo instaurado.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 17."
    },
    {
        id: 6,
        question: "En la sospecha de criptorquidia no palpable o en pacientes obesos, ¿cuál es el estudio de imagen inicial recomendado por su especificidad del 100% en la localización testicular?",
        options: ["Angiorresonancia testicular", "Exploración ecográfica bilateral", "Resonancia magnética pélvica", "Tomografía axial computarizada"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, previo a cualquier escrutinio quirúrgico invasivo (laparoscopia) es mandatorio ubicar la gónada de manera accesible, económica y sin radiación.<br><br>Perla ENARM: \"En la actualidad ante un testículo no palpable o en el paciente obeso se sugiere realizar la exploración ecográfica, ya que no es invasiva y tiene una sensibilidad de 76% y una especificidad de 100% en la localización testicular.\"<br><br>Análisis de Distractores: La angiorresonancia (A) detecta la viabilidad funcional vascular, pero es la opción de segunda línea cuando el USG no ubica tejido. La RM convencional (C) no ha demostrado superioridad clínica frente a la ecografía inicial. La tomografía (D) emite radiación innecesaria en lactantes.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 17."
    },
    {
        id: 7,
        question: "En el tamiz oftalmológico de primera línea para el recién nacido, ¿qué nombre recibe la técnica que evalúa simultáneamente la simetría de ambos reflejos rojos pupilares?",
        options: ["Oftalmoscopia directa monocular", "Prueba de Hirschberg binocular", "Prueba de Brückner binocular", "Reflejo rojo fotomotor simultáneo"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, iluminar los dos ojos al mismo tiempo a una distancia de 45-75 cm desenmascara sutiles diferencias refractivas, asimetrías o bloqueos como la leucocoria.<br><br>Perla ENARM: \"El reflejo rojo binocular (prueba de Brückner), es la comparación del reflejo rojo cuando se observan ambos ojos al mismo tiempo. Esta prueba se utiliza para evaluar la simetría de alineación y los errores de refracción de los ojos.\"<br><br>Análisis de Distractores: La oftalmoscopia directa (A) evalúa los ojos individualmente de cerca. La prueba de Hirschberg (B) observa el reflejo corneal para confirmar o descartar microestrabismo, no bloqueos del cristalino. El término (D) es un distractor inexistente en esta nomenclatura clínica.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 19."
    },
    {
        id: 8,
        question: "En la evaluación visual infantil, ¿qué patología representa la causa tratable más común de discapacidad y origina hasta el 10% de la ceguera mundial?",
        options: ["Retinopatía del prematuro", "Glaucoma congénito primario", "Catarata congénita pediátrica", "Retinoblastoma ocular maligno"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, la opacidad del cristalino al nacimiento causa una barrera para la maduración de sinapsis nerviosas retrooculares.<br><br>Perla ENARM: \"El diagnóstico de las cataratas congénitas es la causa tratable más común de discapacidad visual en la infancia y la niñez. Las cataratas congénitas no tratadas son responsables de aproximadamente 10% de la ceguera infantil en todo el mundo.\"<br><br>Análisis de Distractores: El retinoblastoma (D) es letal si no se trata, pero es mucho menos frecuente que la catarata. La retinopatía (A) asume antecedente de prematurez y oxigenoterapia estricta. El glaucoma (B) se presenta clásicamente con epífora, fotofobia y blefaroespasmo, pero no es estadísticamente la causa \"más común\".",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 20."
    },
    {
        id: 9,
        question: "En el recién nacido diagnosticado con catarata congénita unilateral obstructiva, ¿cuál es la ventana de tiempo máxima para la intervención quirúrgica y así evitar ceguera cortical irreversible?",
        options: ["Doce semanas de vida", "Seis semanas de vida", "Tres meses de vida", "Nueve meses de vida"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, cuando el cerebro percibe la asimetría de un solo ojo que no funciona, suprime agresivamente esa vía, requiriendo intervención la mitad del tiempo más rápido que un cuadro simétrico.<br><br>Perla ENARM: \"Se debe realizar la intervención quirúrgica temprana, durante los tres primeros meses de vida y hasta seis semanas en el caso de enfermedad unilateral o cataratas que obstruyen el eje visual, para evitar el desarrollo visual anormal con ambliopía irreversible.\"<br><br>Análisis de Distractores: Los tres meses (C) o doce semanas (A) corresponden al límite tolerable estricto para cataratas de presentación bilateral. A los nueve meses (D), el desarrollo neurológico de la vía óptica ya presenta ambliopía intratable profunda.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 20."
    },
    {
        id: 10,
        question: "Durante la prueba del reflejo rojo en el recién nacido, ¿qué alteración refractiva sugiere clásicamente el hallazgo de una media luna más brillante posicionada superiormente?",
        options: ["Hipermetropía ocular significativa", "Miopía visual significativa", "Astigmatismo corneal significativo", "Anisotropía ocular grave"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, la refracción irregular por el diámetro o la convexidad ocular anormal altera el patrón del reflejo luminoso dependiendo de la patología basal.<br><br>Perla ENARM: \"La miopía significativa se presenta como una media luna más brillante colocada superiormente.\"<br><br>Análisis de Distractores: La hipermetropía (A) proyecta la media luna brillante de manera inversa, localizada hacia inferior. El astigmatismo (C) y la anisotropía (D) no producen un patrón morfológico clásico superior en la prueba de Brückner con luz semidirecta.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 19."
    },
    {
        id: 11,
        question: "En el de tamiz audiológico del recién nacido de término, ¿qué intervención o complicación metabólica aguda se considera un factor de riesgo altísimo para desarrollar hipoacusia neurosensorial?",
        options: ["Enfermedad de membrana hialina", "Policitemia neonatal asintomática", "Hiperbilirrubinemia con exanguinotransfusión", "Taquipnea transitoria del neonato"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección del recién nacido, los niveles séricos tóxicos de bilirrubina indirecta impregnan de manera afín los ganglios basales (kernicterus) y destruyen los núcleos auditivos del tronco encefálico.<br><br>Perla ENARM: \"Dentro de los factores de riesgo para hipoacusia neurosensorial se encuentran los siguientes... Hiperbilirrubinemia que ameritó exanguinotransfusión.\"<br><br>Análisis de Distractores: La policitemia neonatal asintomática (B) y la taquipnea transitoria (D) son procesos fisiológicos transitorios sin impacto neurológico final. La enfermedad de membrana hialina (A) causa distrés pero no es ototóxica directa a diferencia de los picos de bilirrubina.",
        source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de alta hospitalaria del recién nacido de término, 2020, Evidencias y Recomendaciones, Página 22."
    },
    {
        id: 12,
        question: "En el recién nacido que cursa una infección sistémica o enfermedad crítica, ¿cuántos días de ventilación mecánica en terapia intensiva establecen un factor de riesgo para desarrollar sordera neurosensorial?",
        options: ["Siete días o más", "Cinco días o más", "Dos días o más", "Diez días o más"],
        answer: 1,

                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="LS80717PE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('22620Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('22620LastQId', currentQuestionId);
                else localStorage.removeItem('22620LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('22620Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
