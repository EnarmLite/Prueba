    <!-- MODAL REINICIAR -->

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

            </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el factor de riesgo independiente de mayor impacto para el desarrollo de Sepsis Materna?",
        options: ["Anemia materna severa", "Cesárea de urgencia", "Obesidad grado III", "Ruptura de membranas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, las intervenciones obstétricas no planificadas exponen a la paciente a un entorno de urgencia donde las barreras de esterilidad pueden comprometerse, lo que eleva significativamente la morbilidad infecciosa con un OR de 8.06. La prevención y profilaxis en estos escenarios es un punto crítico de evaluación clínica.<br><br>Perla ENARM: \"La cesárea no programada (de urgencia) es el factor de riesgo independiente más importante para sepsis materna.\"<br><br>Análisis de Distractores: La opción A (anemia) y la opción C (obesidad) son factores de riesgo documentados, pero tienen un impacto estadístico menor (OR de 3.4 y 1.85, respectivamente). La opción D (ruptura de membranas) contribuye al riesgo intraparto pero no supera el peso independiente de la intervención quirúrgica de urgencia.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 30."
    },
    {
        id: 2,
        question: "¿Cuál es el punto de corte para la presión arterial sistólica en la escala omqSOFA para el tamizaje de Sepsis Materna?",
        options: ["≤ 90 mmHg", "≤ 100 mmHg", "< 110 mmHg", "< 120 mmHg"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la fisiología del embarazo demanda ajustes en las escalas de tamizaje clínico. Mientras que el qSOFA para la población general utiliza una presión arterial sistólica ≤ 100 mmHg, la escala modificada para obstetricia requiere un descenso mayor (≤ 90 mmHg) para encender la alarma clínica por hipoperfusión.<br><br>Perla ENARM: \"Se recomienda emplear la escala de omqSOFA (puntaje modificado en obstetricia, para la evaluación rápida de la falla orgánica) para el tamizaje de la sepsis materna.\"<br><br>Análisis de Distractores: La opción B corresponde al valor del qSOFA no modificado, utilizado en población general. Las opciones C y D son presiones arteriales normales durante la gestación y no indican compromiso orgánico.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 34."
    },
    {
        id: 3,
        question: "En la escala omSOFA, ¿qué relación de gases arteriales otorga 2 puntos de severidad respiratoria?",
        options: ["PaO2/FiO2 < 300", "PaO2/FiO2 < 400", "PaO2/FiO2 ≤ 200", "PaO2/FiO2 ≤ 250"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la disfunción orgánica respiratoria en la mujer embarazada se clasifica mediante la escala omSOFA, la cual es abreviada para calificar de 0 a 2 puntos. El puntaje máximo de 2 puntos en el rubro respiratorio se alcanza de forma temprana cuando el índice de Kirby (PaO2/FiO2) cae por debajo de 300.<br><br>Perla ENARM: \"La escala de omSOFA es una herramienta útil para la evaluación de la disfunción orgánica en la mujer embarazada o puérpera.\"<br><br>Análisis de Distractores: La opción B (PaO2/FiO2 < 400) pero mayor a 300 solo otorga 1 punto de severidad. Las opciones C y D son valores de la escala SOFA clásica completa (que evalúa hasta 4 puntos), la cual no está validada de forma prioritaria para los cambios fisiológicos del embarazo según la evidencia actual.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Cuadros o figuras, p. 74."
    },
    {
        id: 4,
        question: "¿Cuál es el volumen y tipo de solución intravenosa inicial recomendado para la reanimación hídrica en las primeras 3 horas?",
        options: ["20 ml/kg de coloides", "30 ml/kg de coloides", "20 ml/kg de cristaloides", "30 ml/kg de cristaloides"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la reanimación temprana mediante expansión volumétrica es indispensable para revertir la isquemia tisular. Los estudios demuestran que los cristaloides administrados agresivamente en esta ventana de tiempo mejoran la sobrevida sin el riesgo de complicaciones asociadas a otros expansores plasmáticos.<br><br>Perla ENARM: \"Dentro de las primeras tres horas, se recomienda iniciar la reanimación con 30 ml/kg de soluciones cristaloides por vía intravenosa.\"<br><br>Análisis de Distractores: Las opciones A y B incluyen coloides, los cuales no han demostrado superioridad clínica, incrementan los costos y elevan la necesidad de terapia de reemplazo renal. La opción C propone un volumen insuficiente para revertir el choque distributivo característico de la sepsis.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 41."
    },
    {
        id: 5,
        question: "¿Cuál es el tiempo máximo recomendado para iniciar el tratamiento antibiótico intravenoso empírico ante la sospecha de Sepsis Materna?",
        options: ["30 minutos", "1 hora", "3 horas", "6 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, el riesgo de mortalidad se incrementa de forma exponencial por cada hora de retraso en la administración del antimicrobiano. Establecer el esquema empírico en la primera hora (\"Hora Dorada\") es la intervención terapéutica con mayor impacto en la supervivencia.<br><br>Perla ENARM: \"Se recomienda iniciar el tratamiento antibiótico intravenoso empírico en cuanto se establezca la sospecha de sepsis o choque séptico en el plazo máximo de una hora.\"<br><br>Análisis de Distractores: La opción A es ideal pero clínicamente menos realista como estándar absoluto establecido en protocolos. Las opciones C y D permitían un margen de tiempo que actualmente es obsoleto debido a que condena a la paciente a un daño tisular irreversible.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 40."
    },
    {
        id: 6,
        question: "¿Cuál es el nivel sérico de ácido láctico que define la presencia de choque séptico tras una reanimación hídrica adecuada?",
        options: ["> 1.5 mmol/L", "> 1.8 mmol/L", "> 2.0 mmol/L", "> 4.0 mmol/L"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la definición hemodinámica de choque séptico se acompaña de evidencia bioquímica de metabolismo anaerobio celular. El umbral para establecer este nivel de hipoperfusión grave se fija en niveles de lactato por encima de 2.0 mmol/L, junto con la necesidad de vasopresores.<br><br>Perla ENARM: \"El diagnóstico de choque séptico... se establece al presentarse hipotensión persistente... y niveles de ácido láctico mayores de 2 mmol/L (18 mg/dl).\"<br><br>Análisis de Distractores: La opción B (1.8 mmol/L) es el límite superior esperado por los propios cambios fisiológicos del embarazo. La opción D (4.0 mmol/L) fue un parámetro de severidad en guías antiguas, pero la evidencia actual (Sepsis-3) sitúa la alarma desde los 2.0 mmol/L.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 38."
    },
    {
        id: 7,
        question: "¿Cuál es el vasopresor de primera elección para alcanzar la meta hemodinámica en el choque séptico?",
        options: ["Epinefrina", "Dopamina", "Vasopresina", "Norepinefrina"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, cuando el lecho vascular pierde su tono y no responde a la carga volumétrica de 30 ml/kg, es imperativo iniciar apoyo vasoactivo. La norepinefrina es el fármaco titular debido a su potente efecto alfa-adrenérgico que incrementa la resistencia vascular periférica con menor incidencia de taquiarritmias secundarias.<br><br>Perla ENARM: \"En caso de ser necesario, se recomienda el uso de norepinefrina como el vasopresor de elección.\"<br><br>Análisis de Distractores: La opción B (dopamina) ha sido desplazada a segunda línea por su alto perfil arritmogénico. Las opciones A y C (epinefrina y vasopresina) actúan únicamente como agentes adjuntos o de rescate cuando falla la norepinefrina, no como inicio.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 49."
    },
    {
        id: 8,
        question: "¿Cuál es la meta de presión arterial media a mantener con el uso de vasopresores en el choque séptico?",
        options: ["≥ 60 mmHg", "≥ 65 mmHg", "≥ 70 mmHg", "≥ 75 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, sostener una presión de perfusión basal es necesario para evitar la isquemia orgánica. Alcanzar 65 mmHg asegura una presión hidrostática adecuada para la filtración glomerular, la perfusión cerebral y el flujo placentario sin someter a la paciente a dosis tóxicas y excesivas de aminas vasoactivas.<br><br>Perla ENARM: \"En pacientes con choque séptico que requieran vasopresores, se recomienda mantener una presión arterial media (PAM) mayor de 65 mmHg.\"<br><br>Análisis de Distractores: La opción A (60 mmHg) es insuficiente y mantiene un estado de hipoxia tisular silente. Las opciones C y D son metas demasiado altas que incrementan los efectos adversos de los vasopresores sin mostrar beneficios superiores en la mortalidad.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 49."
    },
    {
        id: 9,
        question: "¿En qué momento exacto se debe administrar la profilaxis antibiótica intravenosa en pacientes sometidas a cesárea?",
        options: ["Al pinzamiento del cordón", "Posterior al alumbramiento", "Antes de la incisión cutánea", "Durante el cierre aponeurótico"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la prevención de la endometritis postquirúrgica depende de que los tejidos cuenten con niveles bactericidas del antibiótico al momento de la exposición bacteriana. Esto se logra impregnando a la paciente de forma sistemática previo a iniciar el procedimiento quirúrgico.<br><br>Perla ENARM: \"Se recomienda que la administración del antibiótico profiláctico, en pacientes que serán sometidas a cesárea, se realice antes de la incisión cutánea.\"<br><br>Análisis de Distractores: Las opciones A, B y D son prácticas antiguas que exponen el campo estéril a microorganismos patógenos antes de que el fármaco esté activo en la circulación, elevando drásticamente el porcentaje de infección de herida y corioamnionitis secundaria.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 66."
    },
    {
        id: 10,
        question: "¿Qué solución antiséptica se recomienda para el aseo vaginal inmediatamente antes de realizar una cesárea?",
        options: ["Clorhexidina acuosa", "Yodo-povidona", "Cloruro de benzalconio", "Solución salina isotónica"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, el control del inóculo endógeno que reside en el canal cérvicovaginal se traduce en una reducción estadísticamente significativa de la tasa de endometritis (disminución al 3.8%). El antiséptico validado por evidencia clínica directa para la preparación de esta mucosa es la yodo-povidona.<br><br>Perla ENARM: \"Se recomienda el aseo vaginal con yodo-povidona inmediatamente antes de realizar la cesárea.\"<br><br>Análisis de Distractores: Las opciones A y C son antisépticos potentes utilizados en la preparación de la piel abdominal, pero su uso rutinario no está establecido por esta GPC específica para el aseo vaginal. La opción D no tiene propiedades bactericidas.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 64."
    },
    {
        id: 11,
        question: "¿En cuál de los siguientes focos infecciosos se recomienda la interrupción urgente del embarazo independientemente de la edad gestacional?",
        options: ["Pielonefritis aguda", "Neumonía adquirida", "Sepsis intrauterina", "Fascitis necrosante"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, el control del foco (Source Control) es un paso básico en la supervivencia. Cuando la cavidad uterina es el sitio primario de la invasión microbiana (como en la corioamnionitis clínica), mantener el embarazo perpetúa la cascada proinflamatoria de forma mortal para la madre y el feto.<br><br>Perla ENARM: \"En caso de sepsis intrauterina se debe considerar la interrupción urgente del embarazo, independientemente de la edad gestacional.\"<br><br>Análisis de Distractores: En las opciones A, B y D el foco infeccioso es sistémico o ajeno a la unidad útero-placentaria. En estos casos se busca primero la estabilización materna con antibióticos y se puede intentar prolongar la gestación para mejorar el pronóstico del neonato pretérmino.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 51."
    },
    {
        id: 12,
        question: "¿A partir de qué nivel de glucemia consecutiva se recomienda la administración de insulina intravenosa en Sepsis Materna?",
        options: ["> 140 mg/dl", "> 150 mg/dl", "> 180 mg/dl", "> 200 mg/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Sepsis Materna, la liberación de catecolaminas y cortisol durante el estrés séptico genera hiperglucemia. Iniciar esquemas con insulina mitiga la inmunosupresión secundaria, pero debe mantenerse un margen de seguridad razonable para evitar las hipoglucemias yatrogénicas graves en la Unidad de Cuidados Intensivos.<br><br>Perla ENARM: \"Se recomienda la administración de insulina cuando los niveles de glucemia consecutivos sean mayores de 180 mg/dl.\"<br><br>Análisis de Distractores: Las opciones A y B son controles metabólicos recomendados para diabéticas estables en piso, pero sumamente peligrosos en pacientes en estado de choque. La opción D es un valor extremadamente elevado que ya causa toxicidad vascular y no se debe tolerar sin tratamiento.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Evidencias y Recomendaciones, p. 54."
    },
    {
        id: 13,

        answer: 2,

    {

        question: "En una paciente con embarazo pretérmino y diagnóstico de Choque Séptico secundario a neumonía adquirida en la comunidad, ¿cuál es la conducta obstétrica prudente avalada por la guía?",
        options: ["Interrupción inmediata del embarazo", "Considerar prolongar la gestación", "Cesárea de urgencia fúndica", "Inducción con prostaglandinas"],

        justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, cuando el foco infeccioso es sistémico o extrauterino (neumonía, apendicitis, pielonefritis) y el feto es pretérmino, el esfuerzo terapéutico se centra en la reanimación materna y antibioticoterapia. A diferencia de una corioamnionitis, aquí no se exige vaciar el útero de manera perentoria si la madre responde.<br><br>Perla ENARM: \"En los casos de sepsis de origen extrauterino en pacientes con embarazo pretérmino, se puede considerar prolongar la gestación, en tanto se continúen los esfuerzos por tratar la sepsis materna.\"<br><br>Análisis de Distractores: Las opciones A, C y D corresponden al tratamiento definitivo exclusivo de las infecciones donde el compartimento uterino es la fuente del patógeno (sepsis intraamniótica o corioamnionitis grave), donde sí es obligatoria la extracción del contenido retenido.",

    {

        justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, ante la inminencia del nacimiento pretérmino impulsado por la sepsis, la protección del neumocito tipo II fetal mejora la adaptabilidad neonatal extrauterina. Se deben aplicar esteroides valorando el foco, pero bajo la premisa de no retrasar jamás el inicio de los antibióticos o la evacuación si hay choque grave.<br><br>Perla ENARM: \"En caso de requerirse la interrupción urgente del embarazo, debe de considerarse el uso de corticoesteroides para la maduración pulmonar fetal. Esta decisión también debe de tomar en cuenta el origen del foco séptico.\"<br><br>Análisis de Distractores: La opción A (tocolíticos) perpetúa la inflamación si la causa es corioamnionitis y es deletérea. La opción B tiene espacio obstétrico, pero la GPC prioriza y hace explícita mención de la maduración pulmonar. La opción D interfiere mecánicamente con un eventual parto y retiene detritus infectados.",

    {
        id: 34,
        question: "Para detectar oportunamente la hipoxia y el sufrimiento fetal como consecuencia de la hipoperfusión materna por Sepsis, ¿qué estudio ecográfico recomienda la GPC?",

        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, el compromiso del flujo materno sistémico altera las resistencias en el lecho placentario. La evidencia demuestra que medir los índices de pulsatilidad del flujo feto-placentario reduce la muerte perinatal en pacientes inestables, siendo el vaso titular de evaluación temprana la arteria umbilical.<br><br>Perla ENARM: \"La sepsis materna y la subsecuente hipoxia materna afecta el adecuado aporte de oxígeno al feto... por lo que debe establecerse una vigilancia fetal estrecha con ultrasonido de segundo nivel y pruebas de bienestar fetal... y Doppler de arteria umbilical.\"<br><br>Análisis de Distractores: Las opciones A y C evalúan la centralización de flujo y la falla cardíaca derecha inminente en etapas más terminales o en anemia fetal isoinmune, pero la evaluación protocolaria de primer paso que cita la guía es la umbilical. La opción D es observacional e imprecisa en el contexto hemodinámico agudo materno.",

        justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, las infecciones intraamnióticas albergan una flora aerobia Gram negativa y estreptocócica agresiva. La sinergia del betalactámico que destruye la pared celular con el aminoglucósido inhibidor proteico garantiza una excelente cobertura materno-fetal rápida en piso y sala de labor.<br><br>Perla ENARM: \"Causas comunes de sepsis materna y su manejo antibiótico recomendado... Corioamnioitis intraparto: Ampicilina 2gr IV cada 6hrs + Gentamicina.\"<br><br>Análisis de Distractores: La opción B suele reservarse como triple esquema para endometritis poscesárea o puerperal aguda. La opción C es una bomba ineficaz para Gram negativos pélvicos, reservada solo para MRSA estricto. La opción D omite la penetración sinérgica de los aminoglucósidos avalada en el embarazo.",
        source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Cuadros o figuras, p. 84."

    {

                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="CU43619GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoBUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoBULastQId', currentQuestionId);
                else localStorage.removeItem('gyoBULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoBUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
