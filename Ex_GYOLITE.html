    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Utilizando la clasificación anatómica de desgarros perineales en el trabajo de parto, ¿cómo se clasifica a una paciente que presenta lesión de más del 50 porciento del esfínter anal externo tras el expulsivo?", 
                options: ["Desgarro perineal grado 2", "Desgarro perineal grado 3A", "Desgarro perineal grado 3B", "Desgarro perineal grado 4"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Trabajo de parto de bajo riesgo, el desgarro de tercer grado involucra el esfínter anal y se subdivide anatómicamente: 3A si es menor al 50% del externo, 3B si supera el 50% del externo, y 3C si involucra el esfínter interno. El grado 2 es exclusivo de músculo perineal sin tocar esfínter, y el grado 4 expone o rompe la mucosa rectal.<br><br>Perla ENARM: Grado III: involucro de músculos perineales y esfínter anal externo e interno, que a su vez se subdivide en 3B: Lesión de >50% del esfínter anal externo.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Glosario, p. 48." 
            },
            {
                id: 2, 
                question: "Según la GPC de Ruptura Prematura de Membranas Pretérmino, ¿cuál es el punto de corte en la edad gestacional que indica fuertemente la necesidad de interrupción del embarazo sobre el manejo expectante?", 
                options: ["Mayor a 32 semanas", "Mayor a 36 semanas", "Mayor a 34 semanas", "Mayor a 28 semanas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, prolongar el embarazo tras la rotura de membranas en fetos mayores a 34 semanas expone a la madre a un riesgo innecesario de corioamnionitis e infección sistémica. A partir de las 34 semanas de gestación, el riesgo de hipoplasia pulmonar neonatal o membrana hialina es minúsculo, y los beneficios de un manejo expectante son completamente superados por las elevadas tasas de sepsis intrauterina que incrementan la morbimortalidad materna y fetal.<br><br>Perla ENARM: En la ruptura prematura de membranas pretérmino que se presenta después de la semana 34 de gestación se recomienda la interrupción del embarazo.<br><br>Análisis de Distractores: Un embarazo de mayor a 32 semanas (A) puede requerir inducción únicamente si se documenta madurez pulmonar fetal mediante estudios de líquido amniótico, pero normativamente el manejo conservador se mantiene si no se prueba. Entre las 28 semanas (D), los fetos son severamente prematuros, y el retraso del parto es prioritario. A las 36 semanas (B) es ya un límite muy tardío para la intervención recomendada (debe interrumpirse desde que alcanza la 34).", 
                source: "GPC-SEDENA-446-18, Diagnóstico y Tratamiento de la Ruptura Prematura de Membranas Pretérmino, 2018, Evidencias y Recomendaciones, página 24." 
            },
            {
                id: 3, 
                question: "Utilizando la clasificación de pérdida sanguínea del Soporte Vital Avanzado en Trauma mencionada en la GPC para Ruptura Uterina, ¿cómo se clasifica a una paciente con pérdida del 35 por ciento, frecuencia cardiaca de 130 latidos por minuto e hipotensión?", 
                options: ["Hemorragia Clase I", "Hemorragia Clase II", "Hemorragia Clase III", "Hemorragia Clase IV"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Uterina y la clasificación de pérdida sanguínea, una hemorragia Clase III se define por una pérdida de volumen del 30 al 40 por ciento (1500 a 2000 ml), taquicardia mayor a 120 latidos por minuto e hipotensión manifiesta, encajando perfectamente en este escenario clínico de choque avanzado.<br><br>Perla ENARM: Para el diagnóstico y tratamiento de la hemorragia obstétrica, se sugiere consultar las GPC correspondientes en el Catálogo Maestro del CENETEC.<br><br>Análisis de Distractores: La Clase I (A) supone pérdida menor al 15 por ciento sin alteraciones hemodinámicas. La Clase II (B) tiene taquicardia leve pero mantiene presión arterial normal. La Clase IV (D) es la hemorragia exanguinante con pérdida mayor al 40 por ciento, anuria y letargia profunda.", 
                source: "GPC SS-296-10, Prevención, diagnóstico y manejo oportuno de la ruptura uterina, 2017, Anexos, Página 37." 
            },
            {
                id: 4, 
                question: "Según la GPC de Prevención del Parto Pretérmino, ¿cuál es el hallazgo clínico en seguimiento que indica la colocación de cerclaje cervical de emergencia?", 
                options: ["Dilatación mayor 1 cm", "Índice de Bishop 8", "Antecedente de cono cervical", "Longitud cervical de 20 mm"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, cuando existe franca incapacidad esfinteriana del cérvix (evidenciada por la apertura física del conducto) y se ha estabilizado a la paciente farmacológicamente, el cerclaje funciona mecánicamente para evitar la protrusión de las membranas.<br><br>Perla ENARM: \"Las pacientes que hayan cursado con síntomas de parto pretérmino, que ameritaron tratamiento tocolítico y que en el seguimiento posterior se determine dilatación cervical mayor a 1 cm y menor a 3 cm o cérvix ≤ 15 milímetros es recomendable la colocación de cerclaje cervical de emergencia.\"<br><br>Análisis de Distractores: Una longitud de 20 mm sin síntomas (Opción D) es indicación primaria de progesterona vaginal. El antecedente asintomático de cono cervical (Opción C) exige vigilancia ecográfica, mas no un cerclaje de primera intención a ciegas.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 255." 
            },
            {
                id: 5, 
                question: "Ante la sospecha clínica de Candidosis Vulvovaginal grave (eritema vulvar extenso y fisuras), ¿cuál es el estudio indispensable que debe solicitarse además del examen en fresco?", 
                options: ["Medición de pH vaginal", "Cultivo de exudado vaginal", "Prueba de aminas", "Frotis con tinción Gram"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, ante un cuadro con datos de severidad (fisuras, escoriaciones, edema intenso) la enfermedad se reclasifica como complicada. En estos escenarios, el tratamiento empírico es insuficiente y es obligatorio identificar la especie exacta, dado el riesgo de estar frente a cepas no albicans (ej. C. glabrata) que requieren esquemas terapéuticos distintos y prolongados.<br><br>Perla ENARM: \"A todas las pacientes con cuadro clínico que sugiera CVV es necesario muestra de exudado vaginal para examen en fresco y ante la sospecha de una CVV complicada es indispensable la toma de cultivo de exudado vaginal\".<br><br>Análisis de Distractores: La opción A y C son utilizadas para el diagnóstico diferencial (vaginosis). La opción D tiene mejor sensibilidad que el examen en fresco, pero no permite tipificar la especie de levadura como lo hace el cultivo, por lo que no cumple el requisito indispensable de la forma complicada.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Diagnóstico clínico y pruebas diagnósticas, Página 17." 
            },
            {
                id: 6, 
                question: "En la evaluación de la amenaza de parto pretérmino en centros de primer nivel sin recursos ecográficos, ¿cuál es la escala recomendada por la GPC para normar la conducta clínica?", 
                options: ["Índice de Bishop", "Criterios de ACOG", "Índice de madurez fetal", "Índice de Gruber-Baumgarten"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, en el contexto de atención primaria donde el estándar de oro (ultrasonido endovaginal) no está disponible, se requiere una herramienta clínica estandarizada. Este índice evalúa factores tangibles (actividad uterina, ruptura de membranas, hemorragia y dilatación cervical) asignando un puntaje que predice el éxito de la tocólisis.<br><br>Perla ENARM: \"Es de gran utilidad para el tamizaje el índice de Gruber Baumgarten, para evitar el uso excesivo del ultrasonido para medir el cérvix, así como estrategia en los centros que no cuenten con estudios de gabinete\".<br><br>Análisis de Distractores: El Índice de Bishop (A) evalúa la favorabilidad cervical para la inducción del parto a término, no el riesgo de parto pretérmino. Los criterios de ACOG (B) son guías, no una escala pronóstica de tamizaje. El índice de madurez fetal (C) evalúa líquido amniótico, no la clínica materna de la amenaza.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Tamizaje, Página 26." 
            },
            {
                id: 7, 
                question: "¿Cuál es la contraindicación absoluta del grupo farmacológico comúnmente usado para la hipertensión, debido a malformaciones renales fetales en la preeclampsia?", 
                options: ["Bloqueadores de canales de calcio.", "Inhibidores de enzima convertidora.", "Betabloqueadores como el metoprolol.", "Agonistas alfa adrenérgicos centrales."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Prevención, Diagnóstico y Tratamiento de la Preeclampsia, la interrupción exógena del sistema renina-angiotensina-aldosterona compromete directamente la nefrogénesis y dinámica tubular fetal, derivando en oligohidramnios y falla funcional severa.<br><br>Perla ENARM: \"El uso de inhibidores de la enzima convertidora de angiotensina y los antagonistas de los receptores de angiotensina incrementan el riesgo de anormalidades congénitas (renales) si son administrados durante el embarazo\".<br><br>Análisis de Distractores: Los bloqueadores de canales de calcio (nifedipino), los betabloqueadores (metoprolol) y los agonistas alfa centrales (alfametildopa) sí están indicados y su perfil toxicológico materno-fetal los convierte en las recomendaciones pilares de la guía.", 
                source: "GPC IMSS-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Tratamiento Farmacológico, Página 36." 
            },
            {
                id: 8, 
                question: "Utilizando el índice tocolítico de Gruber-Baumgarten para Parto Pretérmino, ¿cuál es el puntaje máximo que permite iniciar el tratamiento tocolítico según la GPC?", 
                options: ["Puntaje mayor 5", "Puntaje igual 7", "Puntaje menor 6", "Puntaje menor 3"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, las escalas de valoración clínica permiten objetivar la decisión terapéutica. Un puntaje bajo en el índice de Gruber-Baumgarten indica una alta probabilidad de éxito al inhibir las contracciones.<br><br>Perla ENARM: \"La tocolisis puede ser considerada para las mujeres con sospecha de parto prematuro que han tenido un embarazo sin complicaciones... Indicaciones del tratamiento: Posibilidades de éxito de uteroinhibición (Índice de Gruber-Baumgarten menor a 3).\"<br><br>Análisis de Distractores: Un puntaje mayor a 3 o 5 (Opciones A, B, C) reduce drásticamente la probabilidad de inhibir el parto, marcando un trabajo de parto avanzado donde los tocolíticos están contraindicados por falta de eficacia y riesgo de complicaciones.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Anexo 5.3 Cuadro 1, Página 257." 
            },
            {
                id: 9, 
                question: "En el contexto de Candidosis Vulvovaginal en el embarazo, ¿cuál es el mecanismo fisiopatológico que proporciona una fuente de carbono para la levadura?", 
                options: ["Aumento de pH vaginal", "Disminución de lactobacilos", "Aumento de glucógeno tisular", "Respuesta inflamatoria exagerada"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, los altos niveles hormonales característicos de la gestación no solo incrementan la avidez celular por adherir hifas, sino que sobrecargan el epitelio vaginal de metabolitos que funcionan como sustrato alimenticio óptimo para la rápida germinación de los hongos.<br><br>Perla ENARM: \"La alta concentración de progesterona también es responsable del aumento del contenido de glucógeno en el tejido vaginal, que proporciona una fuente de carbono para el crecimiento y la germinación de Candida\".<br><br>Análisis de Distractores: La opción A es incorrecta porque durante el embarazo, de hecho, hay una disminución del pH por el mismo efecto hormonal. Las opciones B y D no son los determinantes principales del crecimiento micótico descritos en la fisiopatología por progesterona.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Prevención Primaria: Factores de riesgo y Clasificación, Página 13." 
            },
            {
                id: 10, 
                question: "Utilizando el sistema de clasificación BI-RADS para Cáncer de Mama, ¿cómo se clasifica a una paciente con hallazgos mastográficos altamente sugestivos de malignidad (probabilidad mayor al 95%)?", 
                options: ["Categoría 3", "Categoría 4", "Categoría 5", "Categoría 6"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la estratificación del riesgo dicta la conducta clínica y la urgencia de la biopsia. La categoría 5 implica casi certeza visual de cáncer.<br><br>Perla ENARM: \"5: Altamente sugestivo de malignidad. Estas evaluaciones tienen una probabilidad muy alta de malignidad (≥ 95%). Envío a tercer nivel o clínica de mama, para su atención inmediata\".<br><br>Análisis de Distractores: La categoría 3 (A) es probablemente benigno. La categoría 4 (B) es sospechoso (2 al 95%). La categoría 6 (D) se usa solo cuando ya existe malignidad comprobada por biopsia previa.", 
                source: "GPC S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención, 2017, Cuadro 3. Clasificación BI-RADS de los hallazgos en mastografía, Página 53." 
            }
        ];

        // ==========================================
        // ==========================================
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ExagyoLITELastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExagyoLITEProgress');
                localStorage.removeItem('ExagyoLITELastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExagyoLITEProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExagyoLITELastQId', currentQuestionId);
                else localStorage.removeItem('ExagyoLITELastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExagyoLITEProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</body>
</html>
