<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

    <div id="app-container" class="relative h-full lg:flex">
        
        <!-- SIDEBAR: MAPA DE PREGUNTAS -->

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute right-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>

                <!-- Rejilla de 280 preguntas continuas -->
                <div id="sidebar-q-grid" class="grid grid-cols-[repeat(auto-fill,minmax(38px,1fr))] gap-1.5 p-1"></div>

            <div class="pt-4 border-t border-slate-200 dark:border-slate-800 mt-2 space-y-3">
                <button id="dark-mode-toggle" class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 font-semibold py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

        <!-- CONTENIDO PRINCIPAL -->
        <main id="main-content" class="flex-1 h-[100dvh] overflow-y-auto overscroll-y-contain p-4 sm:p-6 lg:p-8 transition-all duration-300 relative bg-slate-50 dark:bg-slate-950">
            
            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300" title="Ver Tablero General">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <button id="menu-toggle" class="hidden fixed top-4 right-4 lg:right-8 bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-blue-600 transition-colors">

    <!-- MODALES -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará todo tu progreso y respuestas de los casos. ¿Deseas empezar desde cero?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán todas tus respuestas y se liberará la justificación médica.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const casesData = [

{
                id: 1,
                caseText: "Hombre de 58 años con diabetes tipo 2 de 10 años de diagnóstico e hipertensión arterial sistémica. Acude asintomático para valoración rutinaria. Signos vitales: TA 145/88 mmHg, FC 80 lpm, FR 16 rpm, IMC 31 kg/m². Exploración física: campos pulmonares limpios, ruidos cardiacos rítmicos, extremidades con edema leve, pulsos pedios presentes. Examen general de orina: sin leucocitos ni eritrocitos, tira reactiva positiva para proteínas. Laboratorios: creatinina sérica 1.2 mg/dl, urea 40 mg/dl.",
                source: "GPC-IMSS-335-19, Prevención, diagnóstico y tratamiento de la ENFERMEDAD RENAL CRÓNICA.",
                questions: [
                    {
                        question: "En este paciente con factores de riesgo, ¿cuál es la estrategia inicial más costo-efectiva indicada para el tamizaje de enfermedad renal crónica?",
                        options: [
                            "Determinación de albúmina en orina con tira reactiva",
                            "Medición de cistatina C en suero al azar",
                            "Recolección de proteínas en orina de 24 horas",
                            "Ultrasonido renal bilateral con modo Doppler"
                        ],
                        answer: 0,
                        justification: "El tamizaje poblacional abierto no está indicado, pero en pacientes con factores de riesgo mayores (hipertensión y diabetes) mayores de 50 años, la búsqueda intencionada de albúmina urinaria es la intervención más costo-efectiva inicial para detectar daño endotelial precoz. La GPC prioriza pruebas accesibles en primer nivel antes de progresar a estudios cuantitativos complejos o de imagen.<br><br><b>Perla ENARM:</b> \"Se sugiere utilizar la determinación de albúmina con tiras reactivas o la determinación analítica de albúmina en orina y/o la determinación de la tasa de filtrado glomerular dependiendo de la disponibilidad de las pruebas.\"<br><br><b>Análisis de Distractores:</b> La cistatina C (B) es un biomarcador avanzado útil para confirmar casos dudosos, pero no es la prueba de escrutinio inicial debido a su costo y disponibilidad. La recolección de 24 horas (C) ha sido desplazada por el cociente albúmina/creatinina en muestras aisladas debido a la dificultad técnica en la recolección ambulatoria. El ultrasonido renal (D) es el estudio inicial ante alteración estructural, falla aguda o hematuria, no para tamizaje funcional en un paciente asintomático."
                    },
                    {
                        question: "Para predecir el riesgo y calcular de forma estimada la tasa de filtrado glomerular en este paciente con diabetes, ¿qué ecuación matemática está recomendada por su mayor precisión?",
                        options: [
                            "Ecuación de Cockcroft Gault",
                            "Colaboración Epidemiológica de la Enfermedad Renal Crónica",
                            "Modificación de la Dieta en Enfermedad Renal",
                            "Ecuación de Jelliffe"
                        ],
                        answer: 2,
                        justification: "La depuración de creatinina sérica aislada sobreestima la función renal. Las guías exigen utilizar ecuaciones predictivas. Específicamente en la población de pacientes adultos con diabetes o mayores de 60 años, la ecuación de Modificación de la Dieta en Enfermedad Renal (MDRD) ha demostrado tener la menor cantidad de sesgos y la mayor correlación clínica, especialmente en estadios avanzados del deterioro glomerular.<br><br><b>Perla ENARM:</b> \"Se recomienda utilizar la ecuación MDRD para el cálculo de la tasa de filtrado glomerular en pacientes adultos con diabetes. Esta ecuación tiene una mayor precisión en estadios avanzados y en pacientes mayores de 60 años.\"<br><br><b>Análisis de Distractores:</b> La ecuación de Colaboración Epidemiológica de la Enfermedad Renal Crónica o CKD-EPI (B) es de primera elección para población general menor de 60 años o con filtrados superiores a 60 ml/min. La fórmula de Cockcroft Gault (A) predice mejor la mortalidad farmacológica en falla cardiaca, pero es menos exacta para diagnóstico de función glomerular. La ecuación de Jelliffe (D) es obsoleta para el abordaje actual estandarizado por KDIGO."
                    },
                    {
                        question: "¿Cuál es el tratamiento antihipertensivo y antiproteinúrico de primera línea indicado para este paciente?",
                        options: [
                            "Terapia dual con bloqueadores del sistema renina angiotensina",
                            "Monoterapia con bloqueador de canales de calcio no dihidropiridínico",
                            "Terapia combinada con diurético tiazídico y betabloqueador",
                            "Monoterapia con inhibidor de la enzima convertidora de angiotensina"
                        ],
                        answer: 3,
                        justification: "El pilar absoluto del tratamiento para frenar la progresión del daño renal crónico secundario a nefroesclerosis hipertensiva y nefropatía diabética es el bloqueo del sistema renina-angiotensina-aldosterona mediante monoterapia (IECA o ARA-II). Estos fármacos reducen la presión intraglomerular deprimiendo la vasoconstricción de la arteriola eferente.<br><br><b>Perla ENARM:</b> \"Se sugiere administrar inhibidores de la enzima convertidora de angiotensina o bloqueadores del receptor de angiotensina en pacientes con Diabetes tipo 2 y normoalbuminuria para reducir el riesgo de desarrollo de microalbuminuria.\"<br><br><b>Análisis de Distractores:</b> La terapia dual combinando un IECA con un ARA-II (A) está formalmente contraindicada por ausencia de beneficios sumatorios y por incrementar drásticamente el riesgo de hipercalemia y lesión renal agua. Los calcioantagonistas (B) y los diuréticos con betabloqueadores (C) son excelentes antihipertensivos de segunda línea, pero no poseen el efecto modificador hemodinámico glomerular directo de primera línea exigido en nefropatía diabética."
                    },
                    {
                        question: "Para reducir significativamente el riesgo de progresión de la enfermedad renal, ¿qué grupo farmacológico debe incluirse en el manejo de su diabetes?",
                        options: [
                            "Inhibidores de la dipeptidil peptidasa 4",
                            "Inhibidores del cotransportador sodio-glucosa tipo 2",
                            "Agonistas del receptor del péptido similar al glucagón tipo 1",
                            "Sulfonilureas de segunda generación"
                        ],
                        answer: 1,
                        justification: "Los inhibidores SGLT-2 (gliflozinas) han revolucionado la nefroprotección. Tienen un efecto pleiotrópico más allá del control glucémico: inducen natriuresis, reducen la hiperfiltración mediante retroalimentación tubuloglomerular y disminuyen la presión arterial. La GPC destaca que reducen el riesgo de progresión renal de forma sustancial.<br><br><b>Perla ENARM:</b> \"El tratamiento con inhibidores SGLT-2 puede reducir el riesgo de progresión de enfermedad renal en pacientes con Diabetes Mellitus tipo 2.\"<br><br><b>Análisis de Distractores:</b> Los agonistas GLP-1 (C) tienen alto beneficio cardiovascular, pero la recomendación contundente de la GPC enfocada estrictamente a la reducción de la progresión de nefropatía señala a los SGLT-2. Los inhibidores DPP-4 (A) y las sulfonilureas (D) son fármacos hipoglucemiantes útiles en el algoritmo de la diabetes, pero no han demostrado modificar la historia natural del deterioro de la tasa de filtrado glomerular de manera significativa."
                    },
                    {
                        question: "Durante el seguimiento clínico en el primer nivel, ¿qué hallazgo clínico o de laboratorio constituye un criterio absoluto de derivación al servicio de nefrología?",
                        options: [
                            "Cociente albúmina creatinina mayor a 300 mg/g acompañado de hematuria",
                            "Disminución de la tasa de filtrado glomerular del 15 % en un año",
                            "Presión arterial de 135/85 mmHg con biterapia antihipertensiva",
                            "Hemoglobina sérica de 11.5 g/dl asintomática"
                        ],
                        answer: 0,
                        justification: "La presencia de albuminuria en rangos severos combinada con hematuria exige descartar patologías primarias glomerulares mediante biopsia renal, un procedimiento de tercer nivel. El hallazgo simultáneo traduce disrupción severa de la barrera de filtración.<br><br><b>Perla ENARM:</b> \"Se debe referir a los pacientes con un cociente albúmina/creatinina mayor a 300 mg/g (o equivalente a proteinuria de mayor a 300 mg/24 h), con hematuria y a pesar de un adecuado tratamiento y control de la presión arterial.\"<br><br><b>Análisis de Distractores:</b> El envío por deterioro abrupto exige una caída del filtrado glomerular mayor al 25% en un solo mes o mayor a 5 ml/min al año; un 15% anual entra dentro de la vigilancia estrecha, no del envío inmediato (B). La presión arterial de 135/85 con biterapia no cumple criterios de refractariedad, la cual requiere fracaso con tres fármacos incluyendo diurético (C). Una hemoglobina de 11.5 g/dl es la cifra límite superior meta descrita por la guía y no obliga a derivación por sí sola (D)."
                    }
                ]
            },


{
                id: 2,
                caseText: "Hombre de 45 años acude a urgencias por dolor abdominal de 5 días de evolución en fosa ilíaca derecha, asociado a anorexia y picos febriles. TA 110/70 mmHg, FC 105 lpm, FR 20 rpm, temperatura 38.8 °C. A la exploración física: paciente con fascies álgica, abdomen con resistencia muscular voluntaria y palpación de una masa dolorosa de bordes mal delimitados en cuadrante inferior derecho de 5 centímetros. Signo del psoas positivo. Se sospecha cuadro de apendicitis aguda complicada con formación de absceso.",
                source: "Schwartz's Principles of Surgery, Capítulo 30: The Appendix, 11e.",
                questions: [
                    {
                        question: "¿Qué microorganismos aerobios y anaerobios son los aislados con mayor frecuencia en la fisiopatología de esta complicación específica?",
                        options: [
                            "Pseudomonas aeruginosa y Clostridium difficile",
                            "Escherichia coli y Bacteroides fragilis",
                            "Klebsiella pneumoniae y Peptostreptococcus",
                            "Enterococcus faecalis y Fusobacterium nucleatum"
                        ],
                        answer: 1,
                        justification: "La apendicitis perforada representa una entidad fisiopatológica diferente a la no complicada, caracterizándose por una translocación bacteriana masiva hacia la cavidad peritoneal. La flora aislada es polimicrobiana, pero sistemáticamente está dominada por E. coli (aerobio gramnegativo) y B. fragilis (anaerobio).<br><br><b>Perla ENARM:</b> \"Escherichia coli y Bacteroides fragilis son las bacterias aerobias y anaerobias aisladas con mayor frecuencia en la apendicitis perforada.\"<br><br><b>Análisis de Distractores:</b> Las opciones A, C y D incluyen patógenos que pueden encontrarse en el tracto gastrointestinal o causar infecciones intraabdominales, pero no son los microorganismos predominantes universales. Clostridium difficile (A) se asocia a colitis seudomembranosa post-apendicectomía o uso de antibióticos prolongados, no como etiología primaria del absceso apendicular."
                    },
                    {
                        question: "El hallazgo exploratorio del signo del psoas positivo (dolor a la flexión activa de la cadera) se asocia clásicamente con una variante anatómica del apéndice. ¿A qué localización corresponde?",
                        options: [
                            "Pélvica",
                            "Preileal",
                            "Retrocecal",
                            "Paracecal"
                        ],
                        answer: 2,
                        justification: "Los signos clínicos epónimos ayudan a localizar anatómicamente el apéndice inflamado. El signo del psoas se desencadena al flexionar activamente la cadera o extenderla pasivamente, lo cual irrita el músculo iliopsoas subyacente; esto es indicativo de un apéndice recostado sobre este plano.<br><br><b>Perla ENARM:</b> \"El signo del iliopsoas, dolor con la flexión de la cadera, corresponde a un apéndice retrocecal.\"<br><br><b>Análisis de Distractores:</b> La localización pélvica (A) se identifica clásicamente con el signo del obturador (dolor a la rotación interna de la cadera). Las localizaciones preileal (B) y paracecal (D) carecen de proximidad anatómica con los músculos pélvicos profundos, por lo que no generan irritación sobre el iliopsoas ni presentan un signo epónimo tan representativo."
                    },
                    {
                        question: "¿Cuál es el manejo inicial de elección avalado por la literatura para este paciente que presenta una tumoración palpable y síntomas de 5 días de evolución?",
                        options: [
                            "Drenaje percutáneo guiado por imagen",
                            "Apendicectomía laparoscópica de urgencia",
                            "Apendicectomía abierta inmediata",
                            "Laparotomía exploradora con lavado peritoneal"
                        ],
                        answer: 0,
                        justification: "En pacientes que se presentan de forma tardía (mayor a 5 días) con apendicitis complicada y formación de un absceso de larga evolución, la intervención quirúrgica inicial se asocia a complicaciones severas (lesión intestinal, resecciones ileocecales). El manejo óptimo es el abordaje escalonado que incluye reanimación, antibióticos y drenaje percutáneo, posponiendo la cirugía.<br><br><b>Perla ENARM:</b> \"Los pacientes con perforación de larga evolución se tratan mejor con un drenaje percutáneo guiado por imagen adecuado.\"<br><br><b>Análisis de Distractores:</b> La apendicectomía laparoscópica (B) o abierta (C) de urgencia ante un absceso consolidado con bridas densas aumenta significativamente el riesgo de crear fístulas enterocutáneas y extirpar tejido sano adyacente. La laparotomía de urgencia (D) es exclusiva para cuadros de peritonitis generalizada con choque o sepsis fulminante, no para abscesos localizados."
                    },
                    {
                        question: "Tras lograr el control del foco infeccioso (drenaje exitoso), ¿cuál es la duración exacta recomendada para la antibioticoterapia posoperatoria o posdrenaje en este escenario de enfermedad complicada?",
                        options: [
                            "2 días",
                            "7 días",
                            "10 días",
                            "4 días"
                        ],
                        answer: 3,

                    {
                        question: "Usted decide iniciar manejo farmacológico de primera línea con un bisfosfonato oral. ¿Cuál es el mecanismo de acción celular primario de este fármaco?",

                            "Estimulación directa de osteoblastos",

                        answer: 1,
                        justification: "Los bisfosfonatos (como el alendronato y risedronato) son análogos del pirofosfato que se unen a la hidroxiapatita del hueso y son internalizados por los osteoclastos, induciendo su apoptosis e inhibiendo directamente la resorción ósea.<br><br><b>Perla ENARM:</b> \"Los bisfosfonatos son agentes antiresortivos potentes que inhiben la acción y acortan la vida media de los osteoclastos.\"<br><br><b>Análisis de Distractores:</b> La estimulación directa de osteoblastos es el mecanismo de los agentes anabólicos como la teriparatida. La inhibición del ligando de RANK describe el mecanismo del denosumab (un anticuerpo monoclonal). La modulación de receptores estrogénicos corresponde al raloxifeno."

                    {
                        question: "Durante el seguimiento, la paciente desarrolla enfermedad renal crónica con una tasa de filtración glomerular de 25 ml/min. ¿Qué consideración farmacológica debe aplicar sobre el uso de bisfosfonatos?",
                        options: [
                            "Reducir la dosis a la mitad",

                            "Iniciar terapia con calcitonina nasal",
                            "Contraindicar el uso de bisfosfonatos"
                        ],
                        answer: 3,
                        justification: "Los bisfosfonatos se excretan por vía renal y conllevan riesgo de nefrotoxicidad. Están estrictamente contraindicados en pacientes con una tasa de filtración glomerular estimada menor a 30 a 35 ml/min. En este escenario, deben suspenderse y considerar agentes alternativos que no dependan del aclaramiento renal.<br><br><b>Perla ENARM:</b> \"Los bisfosfonatos están totalmente contraindicados en pacientes con depuración de creatinina menor a 30 ml/min.\"<br><br><b>Análisis de Distractores:</b> La reducción de dosis no previene la nefrotoxicidad en insuficiencia renal avanzada. La calcitonina nasal carece de eficacia demostrada para prevenir fracturas no vertebrales y ya no se recomienda. La teriparatida se administra vía subcutánea, no intravenosa, y no es la respuesta directa a la consideración de seguridad renal con bisfosfonatos."
                    },
                    {
                        question: "Tras 6 años de tratamiento continuo con bisfosfonatos, la paciente refiere dolor sordo en la cara lateral del muslo derecho de meses de evolución, sin antecedente de traumatismo. ¿Qué complicación grave debe sospecharse?",

                        justification: "Las fracturas femorales atípicas son una complicación rara asociada a la supresión prolongada de la remodelación ósea por bisfosfonatos (generalmente tras 5 a 7 años de uso). Clínicamente están precedidas por un dolor prodrómico en la ingle o en la cara lateral del muslo durante semanas o meses antes de que la fractura de estrés se complete.<br><br><b>Perla ENARM:</b> \"El dolor prodrómico en muslo en pacientes con uso prolongado de bisfosfonatos es el síntoma pivote para sospechar y descartar de inmediato una fractura femoral atípica.\"<br><br><b>Análisis de Distractores:</b> La osteonecrosis de la mandíbula es otra complicación de los bisfosfonatos, pero se presenta tras procedimientos dentales invasivos, no con dolor en muslo. La osteomalacia no produce esta presentación focal. Los espolones óseos son hallazgos de osteoartrosis espinal que elevan falsamente la densitometría, pero no causan dolor femoral atípico."

                    {
                        question: "Ante el hallazgo electrocardiográfico descrito, ¿cuál criterio otorga el puntaje máximo (5 puntos) en la escala clásica utilizada para confirmar isquemia aguda en presencia de un bloqueo de rama izquierda?",

                        justification: "El diagnóstico electrocardiográfico en un bloqueo de rama izquierda de nueva aparición se basa en los Criterios de Sgarbossa. La elevación concordante del segmento ST en las derivaciones con QRS positivo (en este caso V5 y V6) es el signo más específico de oclusión coronaria aguda y el que mayor puntaje confiere.<br><br><b>Perla ENARM:</b> \"Criterios de Sgarbossa para IAM CEST en presencia de bloqueo de rama izquierda del haz de His: Desnivel positivo del segmento ST mayor o igual a 1 mm concordante con la polaridad del complejo QRS (Valor: 5 puntos)\".<br><br><b>Análisis de Distractores:</b> El desnivel negativo concordante en V1-V3 (B) otorga únicamente 3 puntos. El desnivel discordante exagerado de 5 mm (C) otorga 2 puntos. La opción D hace referencia a los criterios modificados de Smith, que reemplazan el umbral absoluto de 5 mm por una relación proporcional, pero no es el criterio original de 5 puntos."
                    },
                    {
                        question: "Durante la obtención de la estabilidad clínica inicial, considerando el estado hemodinámico y la congestión pulmonar del paciente, ¿cuál es el manejo farmacológico que debe iniciarse para reducir la remodelación ventricular, rehospitalización y muerte?",

                            "Antagonistas de receptores de mineralocorticoides",
                            "Calcioantagonistas no dihidropiridínicos",
                            "Inotrópicos intravenosos tipo dobutamina",
                            "Inhibidores de la enzima convertidora de angiotensina"
                        ],
                        answer: 3,
                        justification: "Los IECA reducen significativamente la mortalidad a las 5 semanas y a los 12 meses cuando se inician tempranamente en pacientes cursando con un infarto de cara anterior o con evidencia clínica de falla de bomba, limitando la progresión al daño estructural.<br><br><b>Perla ENARM:</b> \"Para todo paciente con insuficiencia cardiaca o fracción de eyección del ventrículo izquierdo menor o igual a 40%, está indicado el tratamiento con un inhibidor de la enzima convertidora de angiotensina (IECA) o un antagonista de los receptores de la angiotensina II (ARA-II) tan pronto se alcance la estabilidad hemodinámica para reducir el riesgo de rehospitalización y muerte.\"<br><br><b>Análisis de Distractores:</b> Los antagonistas de mineralocorticoides (A) requieren terapia previa con IECA y betabloqueadores. Los calcioantagonistas (B) están contraindicados con falla de bomba. Los inotrópicos (C) se reservan para choque cardiogénico refractario con hipotensión severa sostenida."
                    },
                    {
                        question: "Durante el cateterismo se reperfunde la arteria culpable, pero se documenta enfermedad significativa en dos vasos coronarios adicionales. Según la directriz de manejo, ¿cuál es la conducta definitiva recomendada para estas lesiones secundarias?",

                            "Revascularizar sistemáticamente antes del alta hospitalaria",
                            "Retrasar intervención y solicitar prueba de esfuerzo en 6 semanas",
                            "Intervención exclusiva solo si el paciente presenta angina refractaria"
                        ],
                        answer: 1,
                        justification: "La revascularización multivaso (o estrategia preventiva) ha demostrado ser superior a tratar únicamente la arteria responsable del evento agudo, ya que disminuye drásticamente el riesgo futuro de angina refractaria, reinfarto y mortalidad global a corto plazo.<br><br><b>Perla ENARM:</b> \"En los pacientes con infarto de miocardio con elevación del segmento ST, debe considerarse revascularizar sistemáticamente las lesiones de las arterias no responsables del infarto antes del alta hospitalaria.\"<br><br><b>Análisis de Distractores:</b> El manejo conservador (A y D) deja isquemia residual con alto riesgo de complicaciones recurrentes. Retrasar el estudio (C) expone al paciente a reinfartos en el periodo vulnerable subagudo, y las pruebas de isquemia no invasivas no sustituyen el beneficio de la revascularización anatómica completa intrahospitalaria."

                        justification: "La clasificación de Killip-Kimball predice de manera directa la mortalidad intrahospitalaria basada puramente en la exploración física. La presencia de galope ventricular (S3) y la congestión pulmonar restringida a las bases definen la falla cardiaca moderada.<br><br><b>Perla ENARM:</b> \"Killip-Kimball Clase II: Características clínicas consistentes en tercer ruido cardiaco y estertores basales, con una mortalidad hospitalaria del 17%\".<br><br><b>Análisis de Distractores:</b> Killip 1 (A) es la ausencia de insuficiencia cardiaca. Killip 3 (D) es edema agudo pulmonar franco (estertores generalizados). Killip 4 (B) corresponde a choque cardiogénico."

                    {
                        question: "¿Cuál es el agente etiológico responsable de la mayoría de los casos del padecimiento de este paciente?",

                    {

                    {

                    {

                    {

                targetCaseId = currentCaseId + 1;
            } else {

            const targetGlobalQId = (targetCaseId - 1) * QUESTIONS_PER_CASE + 1;
            displayQuestion(targetGlobalQId);

            const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);

            const cData = casesData[caseIdx];

            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";

                    return base + "bg-slate-100 text-slate-400 border-slate-200 dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700";

                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left w-full lg:w-3/5">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass}">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 ${examState.isFinished ? 'text-emerald-400' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium mx-auto lg:mx-0">${descText}</p>
                                <div class="mt-8 flex justify-center lg:justify-start flex-wrap gap-4">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col items-center shadow-2xl w-full lg:w-2/5">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                Tablero del Examen (50 Preguntas)
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                ${legendHTML}
                            </div>
                        </div>
                        <div class="grid gap-2 grid-cols-[repeat(auto-fill,minmax(40px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>
                </div>
            `;
        }

        function displayQuestion(globalId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = globalId ? parseInt(globalId) : null;
                
                if (currentQuestionId) {
                    localStorage.setItem('simuladorELW1LastQId', currentQuestionId);
                } else {
                    localStorage.removeItem('simuladorELW1LastQId');
                }

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');
                    dashboardBtn.classList.add('lg:left-[22rem]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const caseIdx = Math.floor((currentQuestionId - 1) / QUESTIONS_PER_CASE);
                const cData = casesData[caseIdx];
                
                if (!cData) return displayQuestion(null);
                
                renderCaseLayout(cData, currentQuestionId);
                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                setTimeout(() => {
                    const targetCard = document.getElementById(`q-card-${currentQuestionId}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }, 50);

            }, 150); 
        }

        function renderCaseLayout(cData, activeGlobalId) {
            let html = `
                <div class="flex flex-col gap-6 max-w-5xl mx-auto items-center">
                    
                    <!-- COLUMNA: TEXTO DEL CASO CLÍNICO -->
                    <div class="w-full bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-2xl shadow-md border border-slate-200 dark:border-slate-800 transition-all duration-300">
                        <div class="flex items-center justify-between mb-4">
                            <span class="inline-block bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-900/30">
                                Caso Clínico Seriado
                            </span>
                            <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                                Bloque #${cData.id}
                            </span>
                        </div>
                        <p class="text-slate-800 dark:text-slate-200 text-sm sm:text-base leading-relaxed font-medium">
                            ${cData.caseText}
                        </p>
                        ${examState.isFinished ? `
                            <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                <span class="text-slate-500">Bibliografía GPC:</span> ${cData.source}
                            </div>
                        ` : ''}
                    </div>

                    <!-- COLUMNA: BLOQUE DE LAS 5 PREGUNTAS ASOCIADAS -->
                    <div class="w-full space-y-5">
            `;

            cData.questions.forEach((q, idx) => {
                const globalQId = (cData.id - 1) * QUESTIONS_PER_CASE + idx + 1;
                const qState = userProgress[globalQId];
                const hasAnswered = qState && qState.answered;
                const userAnswer = hasAnswered ? qState.selectedOption : null;
                
                let cardStyle = "border-slate-200 dark:border-slate-800/80";
                if (globalQId === activeGlobalId) {
                    cardStyle = "border-blue-500 dark:border-blue-500 ring-2 ring-blue-500/10";
                }
                if (examState.isFinished && hasAnswered) {
                    cardStyle = (userAnswer === q.answer) ? "border-l-4 border-emerald-500" : "border-l-4 border-rose-500";
                }

                html += `
                    <div id="q-card-${globalQId}" class="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-sm border ${cardStyle} transition-all">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700">
                                PREGUNTA ${globalQId}
                            </span>
                        </div>
                        <h3 class="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-100 mb-4 leading-snug">${q.question}</h3>
                        <form id="q-form-${globalQId}" class="space-y-2.5">
                `;

                q.options.forEach((opt, i) => {
                    if (examState.isFinished) {
                        let optClasses = "flex items-start p-3 border rounded-xl text-xs sm:text-sm ";
                        let icon = "";
                        
                        if (i === q.answer) {
                            optClasses += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 font-semibold";
                            icon = `<svg class="w-4 h-4 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
                        } else if (i === userAnswer) {
                            optClasses += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                            icon = `<svg class="w-4 h-4 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                        } else {
                            optClasses += "bg-slate-50 border-slate-100 dark:bg-slate-800/30 dark:border-slate-800/50 opacity-50 text-slate-400";
                        }

                        html += `
                            <div class="${optClasses}">
                                <span class="leading-snug pr-3">${opt}</span>
                                ${icon}
                            </div>
                        `;
                    } else {
                        const checkedStr = (hasAnswered && userAnswer === i) ? 'checked' : '';
                        html += `
                            <label class="flex items-start p-3 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/40 has-[:checked]:bg-blue-50/80 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/20 text-xs sm:text-sm shadow-sm" onclick="autoSaveAnswer(${globalQId})">
                                <input type="radio" name="option" value="${i}" ${checkedStr} class="mt-0.5 h-3.5 w-3.5 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-700 cursor-pointer">
                                <span class="ml-2.5 text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `;
                    }
                });

                html += `</form>`;

                if (examState.isFinished) {
                    html += `
                        <div class="bg-blue-50/60 dark:bg-slate-800/50 border border-blue-100/50 dark:border-slate-800 rounded-xl p-4 text-xs sm:text-sm mt-4">
                            <h4 class="font-bold text-blue-800 dark:text-blue-400 mb-1 flex items-center gap-1 uppercase tracking-wider text-[10px]">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Justificación Médica GPC
                            </h4>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${q.justification}</p>
                        </div>
                    `;
                }

                html += `</div>`;
            });

            const isLastCase = cData.id === casesData.length;

            html += `
                        <!-- CONTROLES DE FLUJO EN CASOS -->
                        <div class="flex justify-between items-center pt-4 mt-6 border-t border-slate-200 dark:border-slate-800">
                            <button onclick="navigateCase(${cData.id}, 'prev')" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                                Caso Anterior
                            </button>
                            
                            ${examState.isFinished ? `
                                ${!isLastCase ? `
                                    <button onclick="navigateCase(${cData.id}, 'next')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5 shadow-sm">
                                        Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                    </button>
                                ` : `
                                    <button onclick="displayQuestion(null)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider shadow-sm">
                                        Ver Calificaciones
                                    </button>
                                `}
                            ` : `
                                <button onclick="navigateCase(${cData.id}, 'next')" class="bg-blue-600 dark:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:bg-blue-700 dark:hover:bg-blue-400 transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5">
                                    Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('module-display').innerHTML = html;
        }

        function autoSaveAnswer(globalId) {
            if(examState.isFinished) return;
            const form = document.getElementById(`q-form-${globalId}`);
            if (!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (selected) {
                userProgress[globalId] = { answered: true, selectedOption: parseInt(selected.value) };
                saveState();
                updateProgressBar();
                renderSidebarGrid();
            }
        }

        function updateProgressBar() {
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = totalQuestions > 0 ? Math.round((ans / totalQuestions) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; 
            }
        }

        function saveState() {
            try { localStorage.setItem('simuladorELW1Progress', JSON.stringify(userProgress)); } catch(e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('simuladorELW1Progress');
                userProgress = saved ? JSON.parse(saved) : {};
                const savedState = localStorage.getItem('simuladorELW1ExamState');
                if (savedState) examState = JSON.parse(savedState);
            } catch(e) { userProgress = {}; examState = { isFinished: false }; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</body>
</html>
