    <script>
        const questionsData = [


    {
        id: 1,
        question: "¿Qué intervención de inmunización está recomendada específicamente para prevenir la enfermedad invasiva y neumonía bacterémica en pacientes mayores de 65 años?",
        options: ["Vacuna de polisacáridos 23", "Vacuna conjugada de 13 serotipos", "Vacuna de virus atenuados", "Vacuna recombinante tetravalente"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, la edad avanzada se asocia a inmunosenescencia, requiriendo vacunas conjugadas que generen una respuesta dependiente de células T para una protección efectiva contra patógenos encapsulados.<br><br>Perla ENARM: Se recomienda utilizar la vacuna PCV13 en adultos mayores de 65 años de edad para prevenir neumonía adquirida en la comunidad bacterémica, no bacterémica, y la enfermedad invasiva por pneumococo.<br><br>Análisis de Distractores: La vacuna de polisacáridos se sugiere en adultos jóvenes sanos para evitar enfermedad invasiva. Las opciones virales no otorgan protección antibacteriana directa contra el neumococo.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Prevención, Página 15."
    },
    {
        id: 2,
        question: "¿Cuál es la razón inmunológica fisiológica por la cual la vacuna de polisacáridos puros está contraindicada para la prevención primaria en niños?",
        options: ["Causa anafilaxia severa", "Induce inmunidad cruzada", "Genera hepatotoxicidad aguda", "Es pobremente inmunogénica"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, el sistema inmunitario inmaduro pediátrico no reconoce eficazmente los antígenos T-independientes como los polisacáridos capsulares, impidiendo la formación de memoria celular duradera.<br><br>Perla ENARM: Se recomienda utilizar las vacunas de polisacáridos de pneumococo para prevenir la enfermedad por pneumococo invasiva en adultos sanos; no se recomienda su uso en niños ya que en este grupo de edad es pobremente inmunogénica.<br><br>Análisis de Distractores: Esta vacuna no presenta una tasa superior de anafilaxia, hepatotoxicidad o autoinmunidad; el motivo de su exclusión es puramente la ineficacia antigénica en menores.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Prevención, Página 14."
    },
    {
        id: 3,
        question: "En el esquema de vacunación contra el virus de la influenza para pacientes pediátricos menores de 8 años sin inmunización previa, ¿cuál es la pauta profiláctica de administración?",
        options: ["Dosis única anual rutinaria", "Dosis doble calendarizada", "Profilaxis oral pos-exposición", "Refuerzo semestral continuo"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, la falta de exposición previa a cepas circulantes en niños pequeños exige una dosis de \"priming\" seguida de un refuerzo para alcanzar un título protector de anticuerpos adecuado.<br><br>Perla ENARM: Se recomienda inmunización anual en todas las personas, con una dosis doble calendarizada en niños menores de 8 años de edad que no han sido previamente inmunizados y una dosis única para el resto de la gente.<br><br>Análisis de Distractores: La dosis única se reserva para mayores de 8 años o niños ya inmunizados en temporadas pasadas. La profilaxis y los refuerzos semestrales no forman parte del esquema universal preventivo de influenza.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Prevención, Página 15."
    },
    {
        id: 4,
        question: "Ante la triada clínica de fiebre, taquicardia y crepitaciones a la auscultación, ¿cuál es el estudio de gabinete inicial e indispensable para obtener certeza diagnóstica?",
        options: ["Tomografía de alta resolución", "Radiografía de tórax", "Gammagrama ventilatorio", "Ultrasonido pulmonar focalizado"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, el abordaje exige la demostración anatómica de un infiltrado nuevo o zona de consolidación para confirmar la etiología infecciosa alveolar y evitar el uso ciego de antibióticos.<br><br>Perla ENARM: Se debe realizar una radiografía de tórax, si se requiere de certeza diagnóstica en el manejo de un paciente con sospecha de neumonía.<br><br>Análisis de Distractores: La tomografía es superior pero no se usa de escrutinio inicial por radiación y costo. El ultrasonido es una alternativa si hay disponibilidad, pero la radiografía es el estándar universal establecido indispensablemente.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Diagnóstico clínico, Página 17."
    },
    {
        id: 5,
        question: "Si existe el equipo y el personal capacitado en urgencias, ¿qué modalidad de imagen se sugiere como alternativa debido a su sensibilidad de 0.95 y especificidad de 0.90?",
        options: ["Ultrasonido pulmonar", "Resonancia magnética simple", "Tomografía axial computarizada", "Ecocardiograma transesofágico"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, la ecografía \"point-of-care\" identifica consolidaciones subpleurales y líneas B de manera rápida y sin exposición a radiación ionizante, superando la sensibilidad de la placa simple.<br><br>Perla ENARM: Se sugiere realizar radiografía de tórax a todo paciente con datos sugestivos de neumonía o, de contar con el recurso, utilizar ultrasonido.<br><br>Análisis de Distractores: La tomografía no se usa de primera intención en urgencias básicas. La resonancia y el ecocardiograma carecen de indicación inicial en el diagnóstico del parénquima pulmonar agudo.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Diagnóstico, Página 19."
    },
    {
        id: 6,
        question: "¿Qué biomarcadores séricos tienen indicación para predecir los desenlaces de manera objetiva y apoyar al clínico en la selección del tratamiento antimicrobiano?",
        options: ["Dímero D y lactato deshidrogenasa", "Fibrinógeno y velocidad sedimentación", "Ferritina y recuento reticulocitario", "Procalcitonina y proteína C reactiva"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, ambos reactantes de fase aguda poseen una cinética que responde directamente a la carga bacteriana, ayudando a diferenciar la gravedad y a decidir el escalamiento o suspensión terapéutica.<br><br>Perla ENARM: Se recomienda utilizar la medición de procalcitonina y proteína C reactiva para predecir desenlaces y como apoyo en la selección de tratamiento en pacientes con NAC.<br><br>Análisis de Distractores: El dímero D y la LDH se utilizan para evaluar tromboembolismo o daño celular general. El fibrinógeno y la VSG son muy inespecíficos y permanecen elevados por semanas.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Diagnóstico, Página 21."
    },
    {
        id: 7,
        question: "En el abordaje microbiológico, ¿en qué escenario clínico específico está justificado solicitar la obtención de un cultivo de esputo?",
        options: ["Neumonía severa e intubados", "Neumonía leve ambulatoria", "Sospecha de origen viral", "Fracaso a tratamiento oral"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, la toma de muestras de vía aérea inferior en el entorno ambulatorio se asocia a alta contaminación cruzada orofaríngea; su alta rentabilidad se limita al paciente crítico bajo soporte mecánico.<br><br>Perla ENARM: Se sugiere realizar cultivo de esputo en pacientes con NAC severa y que estén intubados.<br><br>Análisis de Distractores: En manejo ambulatorio o fallos leves se prefiere ajustar empíricamente o referir, sin esperar días por un cultivo. En sospecha viral se solicitan paneles específicos rápidos, no cultivos bacterianos tradicionales.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Diagnóstico, Página 23."
    },
    {
        id: 8,
        question: "Para evaluar el pronóstico, ¿cuál escala multidimensional está recomendada como primera opción para determinar con alta especificidad el sitio de tratamiento (ambulatorio o intrahospitalario)?",
        options: ["Criterios mayores de IDSA", "Puntaje de Fine o PSI", "Escala clínica SCAP", "Puntaje agudo CRB-65"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, el \"Pneumonia Severity Index\" (PSI) incluye 20 variables clínicas y paraclínicas, ofreciendo la estratificación más rigurosa para clasificar a los pacientes en 5 clases de riesgo predictivo de mortalidad a 30 días.<br><br>Perla ENARM: Se recomienda utilizar PSI como primera opción para determinar el sitio de tratamiento inicial (ambulatorio o intrahospitalario) en pacientes con NAC.<br><br>Análisis de Distractores: IDSA/ATS se utiliza solo para decidir el ingreso directo a Terapia Intensiva. SCAP estratifica severidad pero no es la primera opción de triage general. CRB-65 es útil pero simplificado para escenarios sin acceso rápido a laboratorio.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Evaluación de la gravedad, Página 26."
    },
    {
        id: 9,
        question: "Según el puntaje acrónimo CURB-65, ¿a partir de qué puntuación clínica se recomienda de forma estricta el ingreso hospitalario del paciente?",
        options: ["Superior a un punto", "Cero puntos asociados", "Mayor a tres puntos", "Cinco puntos exactos"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, obtener de 0 a 1 punto indica riesgo bajo y manejo en casa. Un puntaje de 2 o superior incrementa exponencialmente el riesgo y amerita observación estricta o ingreso definitivo a sala.<br><br>Perla ENARM: De acuerdo a CURB-65, se recomienda el ingreso hospitalario cuando la puntuación es superior a 1 punto, especialmente si existen otros factores de gravedad asociados.<br><br>Análisis de Distractores: Un puntaje de cero es egreso inmediato. Un puntaje de tres marca el ingreso a Terapia Intensiva, no solo hospitalización básica.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Evaluación de la gravedad, Página 26."
    },
    {
        id: 10,
        question: "Dentro de los criterios de la IDSA/ATS para el ingreso directo a Unidad de Cuidados Intensivos, ¿qué hallazgo hematológico clasifica como un criterio menor de severidad infecciosa?",
        options: ["Hiperglucemia mayor 250 mg/dl", "Hematocrito inferior a 30%", "Leucopenia menor 4000 cel/mm3", "Trombocitosis mayor 400,000"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, la disminución en el conteo leucocitario indica fracaso en la respuesta medular, consumo severo y un estado inminente de disfunción orgánica en sepsis pulmonar grave.<br><br>Perla ENARM: Criterios menores: Leucopenia (recuento leucocitario < 4000 cel/mm3) como resultado únicamente de la infección.<br><br>Análisis de Distractores: La hiperglucemia y la anemia (hematocrito <30%) son variables de riesgo en la escala PSI, no en IDSA/ATS. La trombocitosis es un reactante de fase aguda pero no define falla orgánica como la citopenia de consumo.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Cuadros o figuras, Página 38."
    },
    {
        id: 11,
        question: "Aplicando la escala de gravedad SCAP (Severity Community-Acquired Pneumonia), ¿cuál alteración gasométrica suma de manera absoluta 13 puntos y se cataloga como criterio mayor?",
        options: ["Bicarbonato menor a 15", "pH arterial menor 7.3", "Saturación venosa reducida", "Presión arterial oxígeno menor 60"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, la acidosis respiratoria o metabólica profunda marca un colapso en la homeostasis celular sistémica, siendo un predictor casi letal si no se interviene inmediatamente en terapia avanzada.<br><br>Perla ENARM: Puntos de corte para gravedad SCAP. Variable: pH < 7.3 (Criterio Mayor, Puntos: 13).<br><br>Análisis de Distractores: La PaO2 menor a 54 o 60 aporta puntos, pero se considera un criterio menor (6 puntos). El bicarbonato y la saturación venosa no forman parte de las mediciones primarias acrónimas en esta escala específica.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Cuadros o figuras, Página 39."
    },
    {
        id: 12,
        question: "En caso de requerirse suplementación de oxígeno en el adulto, ¿cuál estrategia ventilatoria está recomendada de primera instancia para evitar complicaciones invasivas?",
        options: ["Ventilación no invasiva", "Mascarilla con reservorio", "Intubación orotraqueal temprana", "Puntas nasales de alto flujo"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, aplicar presión positiva apoya el reclutamiento alveolar continuo y reduce el trabajo muscular, evadiendo los riesgos de la sedación profunda y la neumonía asociada a ventilador.<br><br>Perla ENARM: Se recomienda la suplementación de oxígeno con ventilación no invasiva en pacientes adultos con neumonía adquirida en la comunidad.<br><br>Análisis de Distractores: La intubación orotraqueal se reserva para fracaso terapéutico o paro respiratorio inminente. Las mascarillas y puntas ofrecen FiO2 elevado pero no aportan la presión de apertura alveolar mecánica.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Manejo inicial, Página 27."
    },
    {
        id: 13,
        question: "¿Cuál es el grupo farmacológico indicado como terapia de elección sintomática para el dolor pleurítico agudo secundario a inflamación parietal?",

            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('234Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('234LastQId', currentQuestionId);
                else localStorage.removeItem('234LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('234Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
