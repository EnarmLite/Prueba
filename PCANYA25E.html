    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es la neoplasia maligna de mayor frecuencia epidemiológica a nivel nacional en el grupo de 0 a 19 años?",
        options: ["Linfoma No Hodgkin", "Leucemia", "Cáncer tiroideo", "Tumor de células germinales"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, la leucemia representa el 34.1% de la incidencia oncológica pediátrica, consolidándose como la patología maligna predominante, seguida de los tumores del sistema nervioso central con un 10.3%. Conocer la prevalencia dicta la sospecha clínica ante alteraciones hematológicas iniciales.<br><br>Perla ENARM: Leucemia 2,421 (34.1%).<br><br>Análisis de Distractores: El Linfoma No Hodgkin representa el 6.5%, los tumores de células germinales el 9.2% y el cáncer tiroideo el 5.7%; todas son etiologías válidas pero con una incidencia significativamente menor.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Epidemiología GLOBOCAN, Página 7."
    },
    {
        id: 2,
        question: "¿Qué hallazgo estructural define al Triángulo de Codman en la evaluación radiográfica de una extremidad?",
        options: ["Extensión tumoral hacia planos blandos profundos", "Formación de septos perpendiculares a la cortical", "Elevación del periostio en el borde óseo", "Destrucción medular con esclerosis periférica"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Datos Radiológicos de Tumor Óseo, esta imagen triangular se produce cuando el rápido crecimiento de la neoplasia maligna supera la capacidad de osificación, levantando el periostio y generando una reacción perióstica focalizada de alto riesgo.<br><br>Perla ENARM: Se aprecia la formación de un \"triángulo\" en el borde del hueso cuando el tumor levanta el periostio.<br><br>Análisis de Distractores: La formación de septos perpendiculares corresponde al signo del sol naciente. La invasión a planos blandos y la destrucción medular son hallazgos de agresividad pero no definen específicamente el epónimo de Codman.",
        source: "Datos Radiológicos de Tumor Óseo Maligno, 2022, Signos Radiológicos, Página 1."
    },
    {
        id: 3,
        question: "¿Cuál es el tiempo de duración mínimo de un síntoma general para considerarse criterio formal de sospecha oncológica?",
        options: ["≥ 15 días", "≥ 21 días", "≥ 30 días", "≥ 45 días"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, la temporalidad es un criterio de escrutinio clínico ineludible. Un cuadro clínico que no remite en este lapso rompe el patrón de las infecciones agudas habituales en pediatría, obligando al clínico a descartar procesos proliferativos.<br><br>Perla ENARM: Uno o más signos y síntomas que duren 15 días o más, pueden ser un dato de sospecha de cáncer.<br><br>Análisis de Distractores: 21, 30 y 45 días son lapsos que retrasan injustificadamente la referencia oportuna, aumentando el riesgo de progresión clínica y disminuyendo la probabilidad de curación.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Signos y Síntomas, Página 3."
    },
    {
        id: 4,
        question: "¿A partir de qué percentil se considera el incremento de la circunferencia craneal como un dato de alarma por patología maligna?",
        options: ["> p85", "> p95", "> p97", "> p90"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Medición del Perímetro Cefálico, una medición por encima de este límite establece una desviación significativa del crecimiento fisiológico esperado. Fisiopatológicamente, se relaciona con el aumento de la presión intracraneal secundario a efecto de masa por tumores del sistema nervioso central o bloqueo del flujo de líquido cefalorraquídeo.<br><br>Perla ENARM: Si el punto se encuentra por arriba del percentil 90, debe buscarse la causa, puede ser un signo de cáncer infantil.<br><br>Análisis de Distractores: p85 es considerado un límite de vigilancia sin alarma inmediata, mientras que esperar a p95 o p97 representa una demora diagnóstica ante un posible síndrome de hipertensión endocraneana en lactantes.",
        source: "Medición del Perímetro Cefálico, 2022, Interpretación de Gráficas, Página 10."
    },
    {
        id: 5,
        question: "¿Qué recuento absoluto de leucocitos es un criterio de referencia inmediata a hematología pediátrica en niñas y niños?",
        options: ["< 2,500 o > 15,000 mm³", "< 1,500 o > 12,000 mm³", "< 1,000 o > 10,000 mm³", "< 2,000 o > 20,000 mm³"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, la leucopenia severa o la hiperleucocitosis en la etapa preescolar o escolar indican fallo medular primario o proliferación clónica descontrolada. El diagnóstico diferencial principal es la infiltración leucémica.<br><br>Perla ENARM: Leucocitos Niñas y niños: > 10,000 mm³ o < 1,000 mm³.<br><br>Análisis de Distractores: Los rangos de < 2,500 o > 15,000 mm³ corresponden exclusivamente a los criterios de referencia para población adolescente. Los demás valores no son puntos de corte estandarizados.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Criterios de Referencia, Página 4."
    },
    {
        id: 6,
        question: "¿Cuál es el mecanismo fisiopatológico que da origen al signo radiológico del sol naciente?",
        options: ["Reacción inflamatoria con septos perpendiculares", "Reacción esclerótica de la médula ósea", "Neoformación lítica de bordes espiculados", "Elevación del periostio con formación triangular"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Datos Radiológicos de Tumor Óseo, este patrón es patognomónico de lesiones osteosarcomatosas agresivas. La mineralización tumoral sigue el trayecto de las fibras de Sharpey estiradas a través de la cortical, proyectándose hacia los tejidos blandos adyacentes.<br><br>Perla ENARM: Reacción inflamatoria del hueso con septos irradiados de manera perpendicular a la cortical dando el aspecto de un \"sol\".<br><br>Análisis de Distractores: La elevación del periostio triangular describe a Codman. La reacción esclerótica o lítica no explica la formación espiculada radiada característica de este hallazgo.",
        source: "Datos Radiológicos de Tumor Óseo Maligno, 2022, Signos Radiológicos, Página 1."
    },
    {
        id: 7,
        question: "En el algoritmo de derivación por color, ¿qué estudio de imagen clasifica para el código azul ante focalización neurológica?",
        options: ["Tomografía por emisión de positrones", "Resonancia magnética o tomografía de cráneo", "Radiografía lateral de cráneo", "Ultrasonido transfontanelar"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, la aparición de cefalea persistente, vómito explosivo o alteraciones en la marcha requiere neuroimagen estructural urgente (simple y contrastada) para delimitar neoformaciones ocupativas supratentoriales o infratentoriales.<br><br>Perla ENARM: AZUL: Resonancia magnética o TAC de cráneo (simple y contrastada).<br><br>Análisis de Distractores: El ultrasonido transfontanelar está limitado por el cierre de fontanelas y no evalúa fosa posterior. La radiografía es ineficaz para tejidos blandos y el PET no es un abordaje inicial.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Algoritmo de Derivación, Página 2."
    },
    {
        id: 8,
        question: "¿Cuáles son las referencias anatómicas que deben seguirse para la técnica correcta de medición del perímetro cefálico?",
        options: ["Vértebra cervical prominente y glabela", "Conducto auditivo externo y sutura coronal", "Sutura sagital y base del hueso temporal", "Frente, cejas, orejas y protuberancia occipital"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Medición del Perímetro Cefálico, estandarizar la técnica asegura que se capture el diámetro máximo del neurocráneo. Cualquier desviación del plano horizontal supraorbitario o infranucal subestima o sobreestima los percentiles de riesgo.<br><br>Perla ENARM: Pásala por la parte más prominente de la frente, encima de las cejas y las orejas y por detrás, por la protuberancia occipital.<br><br>Análisis de Distractores: El uso de las suturas coronales, sagitales o el conducto auditivo externo no reflejan el punto de circunferencia máxima.",
        source: "Medición del Perímetro Cefálico, 2022, Técnica de Medición, Página 9."
    },
    {
        id: 9,
        question: "¿Qué proporción de la población oncológica pediátrica en México se diagnostica en etapas avanzadas de la enfermedad?",
        options: ["75%", "60%", "50%", "80%"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, este rezago estadístico explica por qué la tasa de sobrevida a largo plazo a nivel nacional es solo del 50%, contrastando con el 80% global. Esto incrementa de manera drástica los costos, la toxicidad y el riesgo de recaídas.<br><br>Perla ENARM: Tres de cada cuatro pacientes (75%) son diagnosticados en etapas avanzadas de la enfermedad.<br><br>Análisis de Distractores: El 50% corresponde a la tasa de sobrevida a largo plazo actual en el país. El 80% representa la probabilidad de curación en países con abordaje temprano óptimo.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Introducción, Página 5."
    },
    {
        id: 10,
        question: "¿Qué alteración define radiográficamente a una lesión de tejido óseo mal delimitada?",
        options: ["Calcificación endomedular densa", "Extensión y bordes que no pueden definirse", "Reacción perióstica en capas de cebolla", "Radiolucidez perirradicular expansiva"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Datos Radiológicos de Tumor Óseo, la ausencia de una zona de transición estrecha o márgenes escleróticos indica una tasa de lisis ósea que supera la respuesta reparadora del huésped, lo cual es altamente predictivo de patología maligna infiltrativa.<br><br>Perla ENARM: Presencia de tumor o lesión en el hueso cuya extensión o bordes no pueden definirse.<br><br>Análisis de Distractores: La reacción en capas de cebolla sugiere Sarcoma de Ewing, pero no define semánticamente a la lesión mal delimitada general. Las calcificaciones densas son propias de lesiones condroides benignas o malignas lentas.",
        source: "Datos Radiológicos de Tumor Óseo Maligno, 2022, Lesión Mal Delimitada, Página 1."
    },
    {
        id: 11,
        question: "¿Qué diámetro mínimo define el límite de sospecha para investigar malignidad en una adenopatía de consistencia dura y adherida?",
        options: ["> 0.5 cm", "> 1.0 cm", "> 1.5 cm", "> 2.0 cm"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, el escrutinio del sistema reticuloendotelial pediátrico requiere diferenciar ganglios reactivos de masas linfoproliferativas. Las adenopatías que superan este diámetro, carecen de dolor, están adheridas a planos profundos y no responden a tratamiento empírico son indicativas de linfoma o leucemia.<br><br>Perla ENARM: Adenopatías (indoloras, duras, adheridas a planos profundos, mayores de 1.5cm de diámetro que no responden a tratamiento).<br><br>Análisis de Distractores: 0.5 y 1.0 cm son diámetros frecuentes en ganglios cervicales reactivos a infecciones virales. 2.0 cm retrasa la intervención ya que el corte establecido de riesgo inicia desde 1.5 cm.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Signos de Búsqueda Intencionada, Página 8."
    },
    {
        id: 12,
        question: "En la gráfica de percentiles de la Organización Mundial de la Salud, ¿qué variable clínica se interpola sobre el eje horizontal?",
        options: ["Edad", "Perímetro cefálico", "Talla", "Peso"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Medición del Perímetro Cefálico, la estandarización somatométrica exige graficar la progresión del tiempo de desarrollo cronológico (en meses y años cumplidos) contra la medida antropométrica obtenida, evaluando la velocidad de crecimiento craneal.<br><br>Perla ENARM: En el eje horizontal encuentra la edad correspondiente y en el eje vertical el tamaño del perímetro cefálico.<br><br>Análisis de Distractores: El perímetro cefálico se grafica sobre el eje vertical. El peso y la talla se evalúan en curvas de nutrición separadas y no pertenecen a la gráfica de neurodesarrollo descrita.",
        source: "Medición del Perímetro Cefálico, 2022, Interpretación de Gráficas, Página 9."
    },
    {
        id: 13,
        question: "En el algoritmo de derivación, ¿cuál es la indicación de gabinete clasificada como código morado?",
        options: ["Tomografía axial computarizada de abdomen", "Radiografía simple de extremidad", "Serie esofagogastroduodenal", "Ultrasonido abdominal y/o pélvico"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Diagnóstico Temprano de Cáncer, la presencia de distensión abdominal o masas palpables en hemiabdomen requiere evaluación con ecosonografía por su alta sensibilidad para determinar el origen de la masa (renal, adrenal, hepática o retroperitoneal) sin emitir radiación.<br><br>Perla ENARM: MORADO: Ultrasonido abdominal y/o pélvico.<br><br>Análisis de Distractores: La radiografía corresponde al código rojo. La tomografía abdominal no está indicada como tamizaje inicial por color debido a su disponibilidad y radiación ionizante.",
        source: "Lineamientos e Infografías para el Diagnóstico Temprano de Cáncer en Niñas, Niños y Adolescentes, 2022, Algoritmo de Derivación, Página 3."
    },
    {
        id: 14,
        question: "¿Qué técnica y vistas conforman el estudio inicial obligado ante la evidencia de dolor en extremidades progresivo?",

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

                    </div>

                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('cainfProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('cainfLastQId', currentQuestionId);
                else localStorage.removeItem('cainfLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('cainfProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
