                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el grupo etario de mujeres que concentra la tasa de incidencia más alta de Candidosis Vulvovaginal en México?", 
                options: ["15 a 19 años", "20 a 24 años", "25 a 34 años", "35 a 44 años"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, la epidemiología local demuestra que la etapa de mayor riesgo coincide con el pico inicial de la edad reproductiva y sexual activa en la población femenina.<br><br>Perla ENARM: \"En México, esta enfermedad afecta a mujeres de diferentes grupos etarios; las tasas de incidencia... la tasa más alta corresponde al grupo etario de mujeres adultas jóvenes, entre 20-24 años de edad\".<br><br>Análisis de Distractores: La opción A incluye el inicio de vida sexual pero no el pico máximo. Las opciones C y D son grupos de alta prevalencia, pero estadísticamente inferiores al grupo de 20 a 24 años según el Boletín Epidemiológico citado.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Justificación, Página 17." 
            },
            {
                id: 2, 
                question: "¿Qué porcentaje de los aislamientos microbiológicos en mujeres con patología vulvovaginal fúngica corresponde a la especie Candida albicans?", 
                options: ["50 a 60%", "65 a 75%", "85 a 95%", "95 a 100%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, comprender la dominancia etiológica justifica el uso empírico de esquemas cortos con azoles (altamente efectivos contra esta cepa) en episodios no complicados, dejando la sospecha de cepas minoritarias solo para los fracasos terapéuticos.<br><br>Perla ENARM: \"En la CVV entre 85 y 95% de las levaduras aisladas de vagina, pertenecen a la especie C. albicans, siguiéndole en frecuencia C. glabrata\".<br><br>Análisis de Distractores: Las opciones A y B subestiman la inmensa mayoría de la etiología clásica. La opción D excluye al 5-15% restante que es vital reconocer, integrado por las especies \"no albicans\" como C. glabrata o C. tropicalis.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Justificación, Página 16." 
            },
            {
                id: 3, 
                question: "A nivel nacional, ¿qué lugar ocupa la Candidosis Vulvovaginal entre las causas más comunes de vaginitis infecciosa?", 
                options: ["Primera causa", "Segunda causa", "Tercera causa", "Cuarta causa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, el reconocimiento epidemiológico permite establecer prioridades en el algoritmo mental diferencial frente a una paciente con leucorrea.<br><br>Perla ENARM: \"Se considera la segunda causa más común de vaginitis después de la vaginosis bacteriana\".<br><br>Análisis de Distractores: La opción A pertenece a la vaginosis bacteriana (Gardnerella vaginalis). Las opciones C y D corresponderían a etiologías menos prevalentes como la tricomoniasis.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Justificación, Página 18." 
            },
            {
                id: 4, 
                question: "¿Cuál es la probabilidad epidemiológica de que una mujer experimente al menos un episodio sintomático de Candidosis Vulvovaginal durante su vida?", 
                options: ["50%", "75%", "85%", "95%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, el contacto universal con la levadura colonizadora la vuelve una de las patologías más frecuentes en la consulta de primer nivel, impactando directamente en la morbilidad y calidad de vida.<br><br>Perla ENARM: \"Se estima que un 75% de las mujeres experimentan al menos un episodio sintomático durante su vida y 6 a 9% experimentará candidosis vulvovaginal recurrente\".<br><br>Análisis de Distractores: La opción A es la probabilidad de que una mujer infectada inicialmente sufra un segundo evento. Las opciones C y D son los porcentajes correspondientes a la prevalencia de la cepa albicans, no al riesgo poblacional de enfermar.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Justificación, Página 20." 
            },
            {
                id: 5, 
                question: "Ante el hallazgo incidental de un cultivo positivo para Candida sp en el exudado vaginal de una paciente asintomática, ¿cuál es la conducta terapéutica indicada?", 
                options: ["Fluconazol oral profiláctico", "Nistatina tópica en óvulos", "No prescribir tratamiento", "Repetir toma de cultivo"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, la levadura forma parte de la biota normal en un 10-15% de las mujeres sanas. Sin una respuesta inflamatoria activa evidenciada por clínica (prurito, ardor, leucorrea), no existe indicación para erradicar la colonización comensal.<br><br>Perla ENARM: \"En mujeres asintomáticas con cultivo positivo para Candida sp., no prescribir tratamiento\".<br><br>Análisis de Distractores: Las opciones A y B representan iatrogenia y sobreúso de antimicóticos en estados de colonización. La opción D genera un gasto innecesario de recursos ante un hallazgo que no dictará cambio de conducta.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Tratamiento Farmacológico, Página 45." 
            },
            {
                id: 6, 
                question: "Durante la gestación, ¿cuál es el mecanismo fisiopatológico directo mediado por los estrógenos que favorece la infección clínica por Candida?", 
                options: ["Disminución del pH vaginal", "Depleción de lactobacilos protectores", "Aumento de glucógeno tisular", "Aumento de avidez celular epitelial"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, la fisiopatología en el embarazo obedece a un daño bimodal: la progesterona incrementa los nutrientes (glucógeno), mientras que los estrógenos alteran físicamente las células de la mucosa para permitir el anclaje micótico.<br><br>Perla ENARM: \"Además, los estrógenos en el embarazo aumentan la avidez de las células epiteliales vaginales por la adherencia de Candida y la formación de micelios de levadura\".<br><br>Análisis de Distractores: La opción A y C son mecanismos generados por la dominancia de progesterona, no estrogénica. La opción B es un concepto asociado a la génesis de vaginosis bacteriana, no candidosis.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Prevención Primaria: Factores de riesgo, Página 33." 
            },
            {
                id: 7, 
                question: "Clínicamente, ¿en qué momento anatómico o ciclo hormonal suele exacerbarse el espectro sintomático de la Candidosis Vulvovaginal aguda?", 
                options: ["Durante la menstruación", "Fase folicular temprana", "Fase ovulatoria media", "Semana previa a la menstruación"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, las fluctuaciones hormonales cíclicas (pico de progesterona en fase lútea) propician un ambiente vaginal rico en sustratos energéticos, provocando un rápido estallido de germinación del hongo justo antes del sangrado.<br><br>Perla ENARM: \"La CVV aguda es la presentación clínica más usual... el espectro clínico suele exacerbarse durante la semana previa a la menstruación\".<br><br>Análisis de Distractores: Las opciones A, B y C corresponden a momentos anatómicos donde predomina el descame endotelial o los picos estrogénicos puros, los cuales no generan la carga máxima de glucógeno progestágeno que detona los síntomas agudos.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Definición, Página 24." 
            },
            {
                id: 8, 
                question: "Al preparar un examen en fresco para el escrutinio en consultorio de una probable vulvovaginitis fúngica, ¿cuál es la solución química estandarizada que debe añadirse a la muestra?", 
                options: ["Peróxido de hidrógeno al 3%", "Solución de Lugol al 2%", "Ácido acético al 5%", "Hidróxido de potasio al 10%"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, la lisis de células epiteliales y detritos celulares es necesaria para despejar el campo visual microscópico, dejando intactas las paredes quitinosas del hongo.<br><br>Perla ENARM: \"Examen en fresco con observación directa al microscopio de muestra del exudado vaginal... con una preparación con solución salina al 10% de KOH\".<br><br>Análisis de Distractores: La opción A se usa en la prueba de aminas para vaginosis. Las opciones B y C son soluciones de tinción in vivo empleadas en colposcopia (Pruebas de Schiller y Schiller-acético) para tamizaje cervical, no para visualización micológica en fresco.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Diagnóstico y paraclínicos, Página 39." 
            },
            {
                id: 9, 
                question: "En el abordaje diagnóstico paraclínico de la CVV, ¿cuál es la sensibilidad diagnóstica esperada al observar levaduras o pseudohifas empleando un frotis teñido con Gram?", 
                options: ["40 a 50%", "65%", "85%", "95 a 100%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, el Gram es la alternativa superior de tinción rápida en el consultorio, logrando fijar las estructuras fúngicas con mayor contraste que la simple evaluación salina, aunque aún por debajo del estándar de oro.<br><br>Perla ENARM: \"Observación de levaduras o pseudohifas en el frotis de exudado vaginal teñido con tinción de Gram (65% de sensibilidad)\".<br><br>Análisis de Distractores: La opción A corresponde a la sensibilidad del examen en fresco básico. Las opciones C y D reflejan las altísimas eficacias clínicas de los azoles o la sensibilidad del cultivo, no del frotis de escrutinio.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Diagnóstico y paraclínicos, Página 36." 
            },
            {
                id: 10, 
                question: "¿Cuál es la sensibilidad clínica máxima esperada al utilizar exclusivamente el examen en fresco (con KOH) para la detección de levaduras?", 
                options: ["10 a 20%", "40 a 60%", "70 a 80%", "90 a 95%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, a pesar de ser la herramienta clínica inicial de elección por su rapidez y nulo costo, su baja capacidad diagnóstica intrínseca es la razón por la cual un resultado negativo no descarta la enfermedad si la sospecha clínica es alta.<br><br>Perla ENARM: \"Observación de levaduras o pseudohifas en el examen en fresco del exudado vaginal (40- 60% de sensibilidad)\".<br><br>Análisis de Distractores: La opción A subestima el valor de la prueba, volviéndola inútil. Las opciones C y D sobrestiman peligrosamente el método, atribuyéndole eficacias que solo logra el cultivo de Sabouraud.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Diagnóstico y paraclínicos, Página 36." 
            },
            {
                id: 11, 
                question: "En una mujer con episodio no complicado en quien se prefiere o indica manejo tópico intravaginal, ¿cuál es el esquema de primera línea sugerido por la Guía?", 
                options: ["Clotrimazol crema por 7 días", "Nistatina óvulos por 14 días", "Isoconazol óvulos por 3 días", "Ácido bórico óvulos por 21 días"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, cuando se opta por evitar la vía sistémica (fluconazol oral), el polieno tópico representa el estándar de duración moderada para asegurar el barrido micótico en la pared vaginal en un episodio episódico.<br><br>Perla ENARM: \"En la CVV no complicada: leve a moderada o periódica considerar regímenes farmacológicos cortos o de dosis única... Nistatina 100 000 U, una tableta u óvulo vaginal, por vía vaginal durante 14 días\".<br><br>Análisis de Distractores: Las opciones A y C son manejos alternativos cortos no marcados como la pauta principal de 14 días en la tabla de medicamentos. La opción D se reserva exclusivamente para inducciones difíciles en especies C. glabrata o cuadros complicados fallidos.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Tratamiento Farmacológico, Página 54." 
            },
            {
                id: 12, 
                question: "En el tratamiento farmacológico de un episodio clasificado como \"Grave\" (extenso eritema, edema y fisuras), ¿cuál es el esquema terapéutico oral indicado?", 
                options: ["Fluconazol 150 mg dosis única", "Itraconazol 200 mg dosis única", "Fluconazol 150 mg repetir a las 72 horas", "Fluconazol 150 mg semanal por 6 meses"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, ante la destrucción celular importante y la carga inflamatoria severa, la vida media de una sola dosis de fluconazol es insuficiente para mantener los niveles fungistáticos tisulares; escalar a dos dosis asegura la penetración profunda y erradicación.<br><br>Perla ENARM: \"En la CCV complicada indicar Fluconazol 150 mg por vía bucal una dosis y repetir a las 72 h una segunda dosis\".<br><br>Análisis de Distractores: Las opciones A y B son las pautas cortas para formas no complicadas o leves. La opción D es la fase supresiva o de mantenimiento estricta para formas recurrentes crónicas, no para resolver la gravedad aguda.", 
                source: "GPC-IMSS-609-19, Diagnóstico y Tratamiento de Candidosis Vulvovaginal, 2019, Tratamiento Farmacológico, Página 58." 
            },
            {
                id: 13, 
                question: "Durante la fase inicial de inducción en el manejo bifásico de una Candidosis Vulvovaginal Recurrente, ¿qué esquema oral se debe prescribir para alcanzar la remisión micológica?", 
                options: ["Fluconazol 150 mg repetir a las 72 horas", "Fluconazol 150 mg en los días 1, 4 y 7", "Fluconazol 150 mg semanal durante 1 mes", "Itraconazol 200 mg cada 12 horas por 3 días"], 
                answer: 1,

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoCProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoCLastQId', currentQuestionId);
                else localStorage.removeItem('gyoCLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoCProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
