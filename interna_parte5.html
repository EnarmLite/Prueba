    <script>
        // --- LOGO SNIPPET (Desktop Module & Screens: Absolute Right inside content) ---
        const desktopInnerLogoHtml = `
            <div class="hidden md:block md:absolute md:top-8 md:right-8 z-10">
                <div class="logo-container bg-white py-1 px-3 rounded-lg border border-slate-200 shadow-sm">
                    <span class="logo-enarm text-xl">ENARM</span>
                    <span class="logo-Lite text-base">Lite<sup>®</sup></span>
                </div>
            </div>
        `;

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento de hipertensión arterial en el adulto mayor",
    gpcLink: "https://drive.google.com/file/d/1z6zIJ4HnY7P4DZARX6Ns7I2fU9l5nlIs/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM no busca que "normalices" la presión arterial a toda costa en el adulto mayor, sino que entiendas que la curva de seguridad cambia con la edad: en pacientes mayores de 80 años, <strong class="text-indigo-900 dark:text-indigo-200">la hipotensión iatrogénica (&lt; 120 mmHg) es tan letal como la hipertensión</strong>, aumentando paradójicamente el riesgo de EVC e infarto. La meta es un control permisivo.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo depende de dos pivotes fundamentales: la edad cronológica y las comorbilidades.</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Umbral de Inicio (El filtro):</strong> 
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong>65 a 79 años:</strong> Inicias fármacos con TA &ge; 140/90 mmHg.</li>
                                <li><strong class="font-bold text-rose-600 dark:text-rose-400">&gt; 80 años:</strong> La GPC te frena: SOLO inicias fármacos si la PAS es <strong class="underline">&ge; 160 mmHg</strong>. No se trata un 150/90 en un anciano virgen a tratamiento.</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Selección del Fármaco:</strong> 
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li>IC, hipertrofia ventricular o nefropatía: <strong class="font-bold text-indigo-600 dark:text-indigo-400">IECA o ARA II</strong>.</li>
                                <li>Angina, enfermedad arterial periférica o demencia vascular: <strong class="font-bold text-emerald-600 dark:text-emerald-500">Calcioantagonistas</strong>.</li>
                                <li>Hipertensión sistólica aislada pura: <strong class="font-bold">Tiazidas</strong> (con vigilancia).</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Zona Prohibida:</strong> Tu meta en &gt; 80 años es &lt; 150/80 mmHg. Si bajas la sistólica a <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">&lt; 120 mmHg</strong>, debes desescalar tratamiento inmediatamente.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Vigilancia de Tiazidas:</strong> Si decides iniciar una tiazida, la GPC exige monitorizar <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Glucosa, Ácido Úrico y Lípidos</strong>. Un anciano con Gota o dislipidemia de nuevo inicio tras tratamiento, el culpable suele ser la tiazida.</li>
                        <li><strong>Fragilidad y Ejercicio:</strong> En el paciente frágil, no se da ejercicio genérico. Se prescribe <u class="decoration-emerald-400 decoration-2 font-bold">caminar intervalos de 5 minutos, 3 veces por semana</u>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa Farmacológica (Causa Secundaria):</strong> Antes de catalogar como "hipertensión resistente", busca el uso crónico de <strong class="font-bold text-rose-600 dark:text-rose-400">AINEs (por osteoartrosis)</strong>. Es la causa secundaria más común.</li>
                        <li><strong>El Falso Amigo (Betabloqueadores):</strong> Están <u class="decoration-rose-500 decoration-2">EXCLUIDOS como monoterapia de primera línea</u> en el anciano. Solo se usan si hay una indicación obligatoria: Infarto previo, Cardiopatía Isquémica o IC estable.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-238-09)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Meta &gt; 80 años:</strong> Mantener TA &lt; 150/80 mmHg, pero <strong class="underline">NUNCA &lt; 120 mmHg sistólica</strong>.</li>

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM busca que integres que, en niños preescolares (0-4 años), la etiología predominante de la infección de vías respiratorias bajas es <strong class="text-indigo-900 dark:text-indigo-200">viral (VSR, Rinovirus, Influenza)</strong> y no bacteriana; el pilar del manejo es el soporte respiratorio y la terapia antiviral temprana, <u class="decoration-indigo-400 decoration-2 font-medium">evitando el uso indiscriminado de antibióticos</u> a menos que exista evidencia clínica o bioquímica de coinfección bacteriana.</p>

                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Miastenia Gravis (MG) se define por una falla en la transmisión neuromuscular postsináptica mediada por anticuerpos, cuya marca clínica innegociable es la <strong class="text-indigo-900 dark:text-indigo-200">debilidad muscular fluctuante y la fatigabilidad verdadera</strong> que empeora con el uso repetitivo y mejora tras el reposo, afectando predominantemente ojos (ptosis/diplopía) y bulbo.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El abordaje diagnóstico no es lineal, es jerárquico. La GPC establece decisiones críticas basadas en la disponibilidad y la especificidad:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El primer paso ante la sospecha:</strong> No es la electromiografía, es el laboratorio. Debes solicitar <strong class="text-rose-600 dark:text-rose-400 font-bold">Anticuerpos anti-Receptor de Acetilcolina (AChR)</strong> porque tienen una especificidad altísima y confirman el diagnóstico en el 85% de las formas generalizadas.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El paciente "Seronegativo":</strong> Si los Anti-AChR son negativos, el algoritmo te exige buscar <strong class="underline">Anticuerpos anti-MuSK</strong>. Estos explican hasta el 40% de los casos que no tienen anticuerpos AChR.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La confirmación fisiológica:</strong> Solo si la serología es incierta o negativa, pasamos a la neurofisiología. Primero <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">Estimulación Nerviosa Repetitiva</strong> y, si es normal pero la sospecha persiste, escalar a Electromiografía de Fibra Única. El Tensilon (Edrofonio) se relega al final como último recurso.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Maniobra de Fatigabilidad:</strong> Pides mirada sostenida hacia arriba (30-60 seg) o contar en voz alta hasta 50. Si aparece ptosis o disfonía, tienes positividad clínica.</li>
                        <li><strong>Mujer <50 años con hiperplasia tímica:</strong> Piensa en <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Anti-AChR</strong>.</li>
                        <li><strong>Presentación bulbar severa refractaria:</strong> Piensa en <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Anti-MuSK</strong>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Diferenciales</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Síndrome de Eaton-Lambert:</strong> Trampa clásica. Cursa con arreflexia, boca seca y debilidad proximal, pero <strong class="font-bold text-rose-600 dark:text-rose-400">mejora o facilita con la contracción repetida inicial</strong>.</li>
                        <li><strong>Medicamentos Prohibidos:</strong> Si tu paciente tiene neumonía o IVU, evita <u class="decoration-rose-500 decoration-2">aminoglucósidos (gentamicina) y macrólidos (telitromicina)</u>. Pueden precipitar una crisis respiratoria inmediata.</li>
                        <li><strong>Botulismo vs MG:</strong> Busca pupilas dilatadas (la MG respeta pupilas) y parálisis descendente.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-391-20)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Ahorrador de Esteroides:</strong> El fármaco de primera línea para reducir la dosis de prednisona a largo plazo es la <strong class="underline">Azatioprina (2-3 mg/kg/día)</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Embarazo Seguro:</strong> El perfil farmacológico ideal es <strong class="underline">Piridostigmina + Prednisona</strong>. El micofenolato está contraindicado.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Crisis Miasténica:</strong> Ante deterioro respiratorio agudo, inicia <strong class="underline">Plasmaféresis (en los primeros 2 días) o Inmunoglobulina IV</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Rescate en MuSK+:</strong> Si el paciente no responde a esteroides/azatioprina, la GPC recomienda <strong class="underline">Rituximab</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Timectomía:</strong> La asociación es clave: Timoma requiere cirugía, y la hiperplasia tímica en jóvenes con AChR+ también se beneficia.</li>
                </ol>
            </div>
        </div>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Enfermedad de Alzheimer (EA) en el ENARM no es solo "pérdida de memoria"; es un <strong class="text-indigo-900 dark:text-indigo-200">diagnóstico de exclusión</strong> caracterizado por un deterioro cognitivo insidioso y progresivo que afecta la funcionalidad diaria. La obligación clínica es <u class="decoration-indigo-400 decoration-2 font-medium">objetivar el déficit con escalas validadas (MMSE) y descartar causas reversibles</u> (fármacos o depresión) antes de etiquetar al paciente.</p>

                <p class="mb-4">El abordaje de la GPC sigue una narrativa de "filtrado" progresivo:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Filtro Farmacológico:</strong> Ante la queja de memoria, debes descartar el uso de <strong class="text-rose-600 dark:text-rose-400 font-bold">benzodiacepinas, anticolinérgicos o neurolépticos</strong>. Si el paciente toma esto, se retira y se reevalúa antes de diagnosticar demencia.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Objetivación (Tamizaje):</strong> Si no hay fármacos culpables, se aplica el <strong class="underline">Mini-Mental State Evaluation (MMSE)</strong>. Un puntaje &lt; 24 enciende la alarma de deterioro cognitivo.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Confirmación y Estructuralidad:</strong> Un MMSE bajo no es diagnóstico. Se deben aplicar los <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">Criterios NINCDS-ADRDA</strong> y solicitar obligatoriamente una TAC o RM para descartar tumores o eventos vasculares.

                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Estadificación y Tratamiento:</strong> Etapa Leve/Moderada: Iniciar Inhibidores de Acetilcolinesterasa y seguir con escala GDS. Etapa Moderada/Grave: Cambiar a escala FAST.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>La Perla Clínica:</strong> Paciente con EA típica tiene un <strong class="text-emerald-700 dark:text-emerald-300 font-bold">examen neurológico normal</strong> (fuerza y sensibilidad conservadas) en etapas iniciales, excepto por el fallo cognitivo.</li>
                        <li><strong>El Gabinete:</strong> La TAC/RM muestra <u class="decoration-emerald-400 decoration-2 font-bold">atrofia cerebral (predominio temporal/hipocampal)</u> y ausencia de lesiones vasculares.</li>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">

                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">

                    Las 5 Perlas de Oro (GPC IMSS-393-10)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Diagnóstico Clínico:</strong> Los criterios recomendados internacionalmente son los del <strong class="underline">NINCDS-ADRDA</strong>.</li>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Enfermedad de von Willebrand (EvW) es la alteración hemorrágica hereditaria paradigmática del sangrado mucocutáneo. El ENARM evaluará tu capacidad para sospecharla clínicamente ante hemorragias superficiales desproporcionadas, clasificarla mediante el cociente de sus factores antigénicos y funcionales, y discernir cuándo usar <strong class="text-indigo-900 dark:text-indigo-200">desmopresina (DDAVP)</strong> frente a <u class="decoration-indigo-400 decoration-2 font-medium">concentrados de factor</u>.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo diagnóstico y terapéutico se divide en tres fases críticas:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Fase de Sospecha:</strong> Ante antecedente de hemorragia mucocutánea severa/recurrente, solicitar escrutinio básico (BHC, frotis, TP, TTPa) y obligatoriamente el <strong class="font-bold">panel específico (FvW:Ag, FvW:CoR y FVIII:C)</strong>.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Fase de Tipificación (El Gran Punto de Inflexión):</strong> El manejo cambia según la relación FvW:CoR/FvW:Ag:
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong class="font-bold text-emerald-600 dark:text-emerald-500">Cociente > 0.6:</strong> Defecto cuantitativo (Tipo 1). Pilar terapéutico = DDAVP.</li>
                                <li><strong class="font-bold text-rose-600 dark:text-rose-400">Cociente < 0.6:</strong> Defecto cualitativo (Tipos 2A, 2B o 2M).</li>
                                <li><strong>Tipo 3:</strong> Ausencia total, la DDAVP es inútil.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Fase de Resolución:</strong> Hemorragias leves o Tipo 1 usan DDAVP. Si hay cirugía mayor, partos en Tipo 3 o hemorragias graves, el manejo pivota a <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">concentrados de FVIII/FvW</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Presentación Clásica:</strong> Mujer joven con <strong class="text-emerald-700 dark:text-emerald-300 font-bold">epistaxis espontánea > 10 minutos</strong> o menorragia (coágulos > 1 pulgada o cambio de toalla cada hora) y plaquetas normales.</li>
                        <li><strong>Perla Diagnóstica:</strong> El diagnóstico definitivo se hace demostrando la alteración funcional mediante el <u class="decoration-emerald-400 decoration-2 font-bold">Factor de von Willebrand Cofactor de Ristocetina (FvW:CoR)</u>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa del Tipo 2B:</strong> Jamás administres DDAVP si el caso clínico indica EvW Tipo 2B; está <strong class="font-bold text-rose-600 dark:text-rose-400">absolutamente contraindicada</strong>.</li>
                        <li><strong>Restricción Hídrica:</strong> Todo paciente con DDAVP tiene riesgo de hiponatremia. Limitar ingesta de líquidos a <u class="decoration-rose-500 decoration-2">< 1 litro en 24 horas</u>.</li>
                        <li><strong>Contraindicaciones:</strong> El uso de DDAVP está contraindicado en <strong class="font-bold">< 2 años</strong> y en embarazadas con preeclampsia.</li>
                    </ul>
                </div>
            </div>

                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-408-10)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Panel Inicial Indispensable:</strong> Ante sospecha clínica incluye: BHC, TP, TTPa, <strong class="underline">FvW:Ag, FvW:CoR y FVIII:C</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Variante Cualitativa:</strong> Un cociente <strong class="underline">FvW:CoR/FvW:Ag < 0.6</strong> te hará sospechar de una variante cualitativa (Tipo 2A, 2B o 2M).</li>

                </ol>
            </div>
        </div>

                </h4>
                <p>El ENARM no evalúa los cuidados paliativos como "el final del tratamiento", sino como una intervención activa y dinámica. El corazón del tema es el <strong class="text-indigo-900 dark:text-indigo-200">cambio de objetivo terapéutico</strong>: abandonar la curación para priorizar el control sintomático y la calidad de vida mediante escalas validadas, reconociendo que la <u class="decoration-indigo-400 decoration-2 font-medium">vía de administración preferida cuando la oral falla es la subcutánea</u>, no la intravenosa, por ser menos invasiva y facilitar el manejo domiciliario.</p>

                        <div>

                        <div>

                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">

                    <ul class="space-y-3 text-sm">

            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

            `;
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>

                            Ver Resumen del Módulo

        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }

                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">

            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;

                    let innerHTML = `

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríauno5CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríauno5CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríauno5CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-amber-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-amber-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
