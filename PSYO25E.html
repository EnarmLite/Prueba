    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿En qué momento del ciclo respiratorio debe realizarse la técnica correcta para medir la circunferencia de cintura en el paciente adulto?",
        options: ["Durante la apnea inspiratoria", "Al final de una espiración normal", "Al inicio de una espiración forzada", "Durante la inspiración profunda"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, la técnica antropométrica exige condiciones estandarizadas para evitar variaciones en el diámetro abdominal. El sitio de medición más preciso es en el punto medio entre la cresta iliaca y el arco subcostal, a nivel de la línea media axilar anterior, al final de una espiración normal.<br><br>Análisis de Distractores: Realizar la medición durante la inspiración (profunda o apnea) subestima el valor real por la contracción diafragmática. El inicio de la espiración no garantiza la relajación de la pared abdominal necesaria para el escrutinio del riesgo cardiometabólico.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección II. Sobrepeso y Obesidad en la Población Adulta, Página 6."
    },
    {
        id: 2,
        question: "¿A partir de qué puntaje Z del índice peso para la longitud se establece el diagnóstico clínico de obesidad en menores de 5 años?",
        options: ["Mayor o igual a 3", "Mayor o igual a 2", "Mayor o igual a 1.5", "Mayor o igual a 1"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, la estratificación en la infancia temprana depende de las gráficas de la OMS para evitar clasificaciones erróneas del neurodesarrollo y la velocidad de crecimiento. La obesidad infantil en niños de 0 a 5 años se define con un Puntaje Z de peso/longitud o talla mayor o igual a 3.<br><br>Análisis de Distractores: Un puntaje Z de 1 a menor a 2 corresponde a riesgo de sobrepeso. Un puntaje Z de 2 a menor a 3 establece el diagnóstico de sobrepeso en este grupo etario específico.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección III. Sobrepeso y Obesidad en Edad Pediátrica, Página 18."
    },
    {
        id: 3,
        question: "De acuerdo con el Sistema de Estadificación de la Obesidad de Edmonton (EOSS), ¿en qué estadio se clasifica a un paciente adulto con diagnóstico de osteoartritis que genera limitación funcional moderada?",
        options: ["Estadio 4", "Estadio 3", "Estadio 1", "Estadio 2"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, la afectación mecánica dictamina el pronóstico funcional independientemente del índice de masa corporal. El Estadio 2 incluye la presencia de una enfermedad crónica relacionada con la obesidad, como hipertensión, diabetes tipo 2, apnea del sueño y osteoartritis, o limitaciones moderadas en las actividades de la vida diaria.<br><br>Análisis de Distractores: El Estadio 1 implica síntomas físicos leves sin interferencia diaria. El Estadio 3 indica daño a órgano blanco establecido o artrosis incapacitante severa. El Estadio 4 refiere discapacidad grave o etapa terminal.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección II. Sobrepeso y Obesidad en la Población Adulta, Página 11."
    },
    {
        id: 4,
        question: "¿A partir de qué valor sérico de alanina aminotransferasa se sospecha fuertemente de enfermedad hepática grasa (MAFLD) en pacientes pediátricos varones?",
        options: ["Mayor a 20 U/L", "Mayor a 22 U/L", "Mayor a 26 U/L", "Mayor a 30 U/L"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, los puntos de corte enzimáticos en pediatría son más estrictos que en la población adulta para la detección oportuna de disfunción metabólica. Para evaluar datos de enfermedad hepática grasa asociada a alteraciones metabólicas, se sospecha fuertemente con una elevación de alanina aminotransferasa mayor a 26 U/L en niños y mayor a 22 U/L en niñas.<br><br>Análisis de Distractores: El corte de 22 U/L es exclusivo para el escrutinio en pacientes femeninas. Los valores de 20 U/L o 30 U/L no son puntos de referencia antropométrica o laboratorial estandarizados en la guía clínica nacional para este fin.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección III. Sobrepeso y Obesidad en Edad Pediátrica, Página 20."
    },
    {
        id: 5,
        question: "¿Cuál es la frecuencia semanal mínima recomendada para la prescripción de entrenamiento de fuerza en pacientes adultos como parte de la modificación del estilo de vida?",
        options: ["Al menos dos veces", "Al menos tres veces", "Al menos cuatro veces", "Todos los días"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, el fortalecimiento muscular es un pilar indispensable para optimizar la sensibilidad a la insulina y preservar la masa magra durante la reducción ponderal. Se debe prescribir entrenamiento de fuerza al menos dos veces por semana, permitiendo un descanso de al menos 48 horas entre sesiones de cada grupo muscular.<br><br>Análisis de Distractores: El ejercicio aeróbico se indica la mayoría de los días (150-300 min/semana), pero el estímulo de fuerza y resistencia requiere periodos de recuperación específicos, por lo que prescribirlo tres, cuatro o todos los días sin justificación individualizada eleva el riesgo de lesiones musculoesqueléticas.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección II. Sobrepeso y Obesidad en la Población Adulta, Página 13."
    },
    {
        id: 6,
        question: "¿Cuál es el límite máximo de pérdida de peso mensual permitido en un paciente pediátrico prepúber sometido a intervención conductual intensiva?",
        options: ["250 gramos", "500 gramos", "1000 gramos", "1500 gramos"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, la restricción calórica severa en infantes interfiere negativamente con el neurodesarrollo y la ganancia estatural. En caso de haber pérdida de peso durante la estabilización del puntaje z-IMC, esta no deberá exceder los 500 g al mes para mantener una velocidad de crecimiento adecuada.<br><br>Análisis de Distractores: El límite de 1000 gramos (1 kg) al mes está reservado exclusivamente para adolescentes de 15 a 19 años. 250 g o 1500 g no corresponden a los parámetros de seguridad establecidos por la normativa para evitar afectación fisiológica en el niño.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección III. Sobrepeso y Obesidad en Edad Pediátrica, Página 22."
    },
    {
        id: 7,
        question: "Según las directrices internacionales para la actividad física, ¿cuántos minutos mínimos semanales de ejercicio aeróbico de intensidad moderada se recomiendan en mujeres embarazadas sin contraindicaciones?",
        options: ["75 minutos", "100 minutos", "300 minutos", "150 minutos"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Actividad Física OMS, el ejercicio previene complicaciones gestacionales como preeclampsia y macrosomía. A todas las mujeres embarazadas y en puerperio sin contraindicaciones se les recomienda hacer como mínimo 150 minutos de actividad física aeróbica de intensidad moderada cada semana.<br><br>Análisis de Distractores: 75 minutos corresponden al límite inferior exclusivo para actividad de intensidad vigorosa en adultos no gestantes. 300 minutos es el límite superior recomendado en población general, pero no la meta clínica mínima de escrutinio para la paciente obstétrica.",
        source: "Directrices de la OMS sobre actividad física y hábitos sedentarios, 2020, Mujeres Embarazadas y en Puerperio, Página 8."
    },
    {
        id: 8,
        question: "¿Qué puntaje mínimo en la subescala de ansiedad del Cuestionario HAD indica la necesidad clínica de derivación obligatoria a psiquiatría o psicología?",
        options: ["Mayor o igual a 5 puntos", "Mayor o igual a 8 puntos", "Mayor o igual a 7 puntos", "Mayor o igual a 10 puntos"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, el tamizaje de salud mental es una de las 4M's indispensables para evitar el fracaso terapéutico. En el cuestionario HAD, el punto de corte diagnóstico para derivación por ansiedad es mayor o igual a 8 puntos.<br><br>Análisis de Distractores: El puntaje mayor o igual a 7 puntos es el límite diagnóstico específico para la subescala de depresión, no de ansiedad. Valores menores a 7 se consideran adaptativos o sin requerimiento de intervención farmacológica inmediata.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección II. Sobrepeso y Obesidad en la Población Adulta, Página 10."
    },
    {
        id: 9,
        question: "¿A partir de qué edad resulta aplicable y predictivo el cálculo del índice cintura-talla para determinar un alto riesgo de comorbilidades metabólicas en pediatría?",
        options: ["A partir de los 2 años", "A partir de los 4 años", "A partir de los 6 años", "A partir de los 5 años"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, el depósito de tejido adiposo visceral se correlaciona con resistencia a la insulina de forma temprana. El índice cintura-talla (ICT) se realiza mediante el cálculo de la circunferencia en cm entre la estatura en cm; a partir de los 6 años de edad, si esta medida es mayor de 0.5, el paciente tiene mayor riesgo metabólico.<br><br>Análisis de Distractores: Antes de los 5 años, el parámetro predominante es el puntaje Z del índice peso para la talla (PT/E). A los 5 años se introduce la medición de cintura, pero el uso predictivo validado del cociente (ICT > 0.5) se aplica normativamente a partir de los 6 años cronológicos.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección III. Sobrepeso y Obesidad en Edad Pediátrica, Página 18."
    },
    {
        id: 10,
        question: "¿Cuál es la batería de estudios de laboratorio estrictamente indispensable en el escrutinio inicial metabólico de todo paciente adulto clasificado con sobrepeso u obesidad?",
        options: ["Glucosa, lípidos, creatinina, ácido úrico, transaminasas y examen general de orina", "Glucosa, lípidos, hemoglobina glucosilada, insulina, transaminasas y electrolitos", "Glucosa, lípidos, creatinina, perfil tiroideo, biometría hemática y examen de orina", "Glucosa, lípidos, ácido úrico, bilirrubinas, examen general de orina y química sanguínea"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, la identificación sistemática de daño a órgano blanco no requiere estudios avanzados de inicio, sino un abordaje costo-efectivo en el primer nivel de atención. Se deben solicitar al menos glucosa en ayuno, perfil de lípidos, creatinina, ácido úrico, enzimas hepáticas (transaminasas) y examen de orina.<br><br>Análisis de Distractores: La insulina basal, hemoglobina glucosilada de rutina o perfil tiroideo no están indicados en el escrutinio inicial universal y se reservan para fenotipos clínicos específicos o falla terapéutica confirmada.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección II. Sobrepeso y Obesidad en la Población Adulta, Página 8."
    },
    {
        id: 11,
        question: "Aplicando el Sistema EOSS-P, ¿en qué estadio clínico se clasifica a un adolescente que presenta acantosis nigricans sin evidencia de otras comorbilidades sistémicas?",
        options: ["Estadio 0", "Estadio 2", "Estadio 3", "Estadio 1"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de EOSS-P, las alteraciones pigmentarias de origen metabólico se catalogan como signos iniciales que exigen intervención conductual sin tratamiento farmacológico obligatorio. El Estadio 1 incluye anomalías metabólicas leves, tales como intolerancia a los carbohidratos, prehipertensión y acantosis nigricans.<br><br>Análisis de Distractores: El Estadio 0 corresponde a la ausencia total de anormalidades metabólicas. El Estadio 2 implica patología manifiesta como diabetes sin complicaciones o hipertensión. El Estadio 3 denota enfermedad descontrolada o daño orgánico avanzado.",
        source: "Anexo Sistema de Estadificación de la Obesidad de Edmonton (EOSS-P), 2024, Evaluación Metabólica."
    },
    {
        id: 12,
        question: "Como medida conductual de higiene del sueño para favorecer la pérdida de peso en el adulto, ¿cuántas horas diarias de descanso nocturno recomienda el protocolo oficial?",
        options: ["De 5 a 7 horas", "De 8 a 10 horas", "De 6 a 8 horas", "De 9 a 11 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, la privación crónica de sueño incrementa la resistencia a la insulina y altera los neuropéptidos saciógenos. Las recomendaciones generales de higiene del sueño indican dormir de 6 a 8 horas diarias y apagar dispositivos electrónicos para asegurar un descanso reparador.<br><br>Análisis de Distractores: De 8 a 11 horas es la recomendación operativa para la población adolescente. Menos de 6 horas se asocia fuertemente con alteración circadiana e incremento de la adiposidad visceral.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Sección II. Sobrepeso y Obesidad en la Población Adulta, Página 13."
    },
    {
        id: 13,
        question: "¿Cuál es el tiempo diario estandarizado para la prescripción de actividad física de tipo lúdico en niños preescolares de 2 a 4 años?",
        options: ["180 minutos", "60 minutos", "90 minutos", "150 minutos"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Sobrepeso y Obesidad, en la etapa de desarrollo motor grueso, el sedentarismo es deletéreo. En niñas y niños preescolares (2-4 años) se debe fomentar el ejercicio lúdico constante con una meta clínica estructurada de 180 minutos al día.<br><br>Análisis de Distractores: 60 minutos es la meta diaria de ejercicio estructurado para niños mayores de 5 años y adolescentes. 150 minutos es el objetivo mínimo semanal, no diario, para la población adulta.",
        source: "Protocolo Nacional de Atención Médica Sobrepeso y Obesidad, 2024, Infografía Sobrepeso y Obesidad, Sección Niños."
    },
    {
        id: 14,
        question: "¿Qué estudio de gabinete confirmatorio es mandatorio cuando un paciente adulto presenta una elevación de transaminasas séricas mayor a dos veces su límite normal?",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150);

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('SOBRYOBESProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('SOBRYOBESLastQId', currentQuestionId);
                else localStorage.removeItem('SOBRYOBESLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('SOBRYOBESProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
