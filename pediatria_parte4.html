    <script>

        const desktopInnerLogoHtml = `

                <div class="logo-container bg-white py-1 px-3 rounded-lg border border-slate-200 shadow-sm">
                    <span class="logo-enarm text-xl">ENARM</span>
                    <span class="logo-Lite text-base">Lite<sup>®</sup></span>
                </div>

        `;

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento de los defectos de los tabiques interauricular e interventricular en pediatría",
    gpcLink: "https://drive.google.com/file/d/1PSCDiEGgCS8bYvGtl2yd193wi8zQBwlQ/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El éxito en el manejo de los defectos septales (CIA y CIV) no es solo cerrar el agujero, sino intervenir en la <strong class="text-indigo-900 dark:text-indigo-200">ventana de oportunidad crítica</strong>: cuando existe repercusión hemodinámica significativa (sobrecarga de volumen) pero <u class="decoration-indigo-400 decoration-2 font-medium">antes de que la hipertensión pulmonar se vuelva irreversible (Síndrome de Eisenmenger)</u>.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura la toma de decisiones como un "filtro de seguridad" para evitar cirugías innecesarias o peligrosas:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Confirmación y Anatomía:</strong> La herramienta pivote es el <strong class="underline">Ecocardiograma Transtorácico</strong>. Si muestra defecto pequeño sin repercusión, se vigila. Si la anatomía es compleja o de mala ventana, se escala a Eco Transesofágico, Tridimensional o Resonancia Magnética.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Decisión de Cierre (RVP):</strong> Si hay dilatación de cavidades, se evalúan las Resistencias Vasculares Pulmonares (RVP):
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Luz Verde:</span> RVP &lt; 6 Unidades Wood (UW) &rarr; <strong class="underline">Cierre definitivo autorizado</strong>.</li>
                                <li><span class="font-bold text-amber-600 dark:text-amber-500">Luz Ámbar:</span> RVP entre 6 y 8 UW (o &gt; 2/3 sistémicas) &rarr; Realizar <strong class="underline">prueba de vasodilatación pulmonar</strong>.</li>
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Luz Roja:</span> Prueba negativa &rarr; <strong class="font-bold">Síndrome de Eisenmenger</strong>. El defecto NO se toca (cuidados paliativos).</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Comunicación Interauricular (CIA):</strong> 
                            <br>Clínica: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Desdoblamiento fijo y amplio del S2</strong> + soplo pulmonar.
                            <br>Eco: <u class="decoration-emerald-400 decoration-2">Dilatación de cavidades derechas</u>.
                            <br>Manejo: Cierre percutáneo si es Ostium Secundum con bordes &gt; 5mm. Quirúrgico si es Primum o Seno Venoso.
                        </li>
                        <li><strong>Comunicación Interventricular (CIV):</strong>
                            <br>Clínica: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Soplo holosistólico en barra</strong> en BPI.
                            <br>Eco: <u class="decoration-emerald-400 decoration-2">Dilatación de cavidades izquierdas</u>.
                            <br>Manejo: Cierre si el Qp/Qs es &gt; 2:1 o hay falla cardíaca refractaria.
                        </li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa de la Cianosis:</strong> Si el caso describe cianosis y acropaquia, el shunt se invirtió (derecha a izquierda). Diagnóstico: <strong class="text-rose-600 dark:text-rose-400 font-bold">Síndrome de Eisenmenger</strong>. Contraindicación absoluta de cierre.</li>
                        <li><strong>Profilaxis de Endocarditis:</strong> La GPC indica antibióticos profilácticos <u class="decoration-rose-500 decoration-2">solo en los primeros 6 meses</u> posteriores a la corrección o si existe un defecto residual (no "de por vida").</li>
                        <li><strong>Ostium Secundum vs Primum:</strong> Ostium Secundum (fosa oval) es percutáneo. El Primum requiere cirugía.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-482-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Estudio Inicial:</strong> El de elección inicial ante sospecha es el <strong class="underline">Ecocardiograma Transtorácico</strong>.</li>

                    El Concepto Fundamental
                </h4>
                <p>El éxito en el ENARM frente a la Lesión Obstétrica del Plexo Braquial (LPBO) radica en <strong class="text-indigo-900 dark:text-indigo-200">diferenciar clínicamente la raíz afectada (Erb vs. Klumpke)</strong> y reconocer que <u class="decoration-indigo-400 decoration-2 font-medium">los 3 meses de edad o la presencia del Síndrome de Horner son los puntos críticos de no retorno</u> que marcan la pauta para el tratamiento quirúrgico.</p>

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM busca que entiendas que el manejo moderno del SDR en el prematuro ya no es "intubar y surfactante para todos"; la prioridad absoluta es la <strong class="text-indigo-900 dark:text-indigo-200">estabilización no invasiva temprana (CPAP nasal)</strong> y la administración de <u class="decoration-indigo-400 decoration-2 font-medium">surfactante de rescate temprano basándose en criterios clínicos de falla al CPAP</u>, sin esperar confirmación radiológica para la primera dosis.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La secuencia de decisión clínica sigue un flujo lógico de "menos a más invasión":</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Minuto de Oro y Estabilización:</strong> Si el paciente respira espontáneamente (aunque tenga dificultad), la conducta es <strong class="underline">CPAP nasal inmediato</strong> (primeros 15 min) con presión de al menos 6 cmH2O para evitar colapso alveolar.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto de Quiebre (¿Cuándo administrar Surfactante?):</strong> Si el paciente está en CPAP, se vigila la falla. Se considera falla de CPAP si requiere <strong class="font-bold text-rose-600 dark:text-rose-400">FiO2 &ge; 30% o Presión de CPAP &ge; 8 cmH2O</strong>. Este es el umbral para administrar surfactante (ya no se espera al 40-50%).
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Elección de la Técnica:</strong> 
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Respiración espontánea:</span> Técnica de elección <strong class="underline">LISA</strong> (Less Invasive Surfactant Administration).</li>
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Apneico o inestable:</span> Intubar y técnica convencional o InSurE.</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">4</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Mantenimiento y Retiro:</strong> Iniciar <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">Citrato de Cafeína</strong> en las primeras 48 horas para facilitar el esfuerzo respiratorio y retiro del apoyo.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Clínica vs Radiografía:</strong> La primera dosis de surfactante <strong class="text-emerald-700 dark:text-emerald-300 font-bold">NO requiere radiografía de tórax</strong>. El tiempo es pulmón.</li>
                        <li><strong>Ultrasonido Pulmonar:</strong> El nuevo estándar. El patrón de SDR es <u class="decoration-emerald-400 decoration-2 font-bold">"Pulmón Blanco" (líneas B coalescentes)</u>, ausencia de líneas A y línea pleural engrosada.</li>
                        <li><strong>Gasometría y SpO2:</strong> A los 5 min se espera 80-85%, y a los 10 min 85-95%. Una SpO2 de 70-75% al minuto 3 es fisiológica.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Simuladora (TTRN):</strong> Suele ser en términos/prematuros tardíos, mejora con oxígeno bajo (&lt; 40%) y resuelve rápido. El SDR empeora y requiere alto oxígeno.</li>
                        <li><strong>Red Flag (Hernia Diafragmática):</strong> Si mencionan abdomen escafoide o ruidos hidroaéreos en tórax: <strong class="text-rose-600 dark:text-rose-400 font-bold">¡Contraindicación absoluta de CPAP!</strong> Requiere intubación inmediata.</li>
                        <li><strong>Cardiopatía Congénita:</strong> Sospechar si hay cianosis que no corrige con oxígeno (prueba de hiperoxia). Si el eco es normal, pensar en 3ra dosis de surfactante.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-137-21)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Dosis Surfactante:</strong> Primera dosis de elección es <strong class="underline">Poractant alfa a 200 mg/kg</strong> (sobre Beractant a 100 mg/kg).</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Criterio Falla CPAP:</strong> Memoriza el número: <strong class="underline">FiO2 &ge; 30% o Presión &ge; 8 cmH2O</strong> (Indicación directa de surfactante).</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Citrato de Cafeína:</strong> En prematuros &lt; 1,250g, iniciar (dosis 20 mg/kg) <strong class="underline">dentro de las primeras 48 horas</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Esteroides Postnatales:</strong> NUNCA en los primeros 7 días (riesgo de parálisis cerebral). La Dexametasona se reserva para casos crónicos.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Temperatura:</strong> En &lt; 28 semanas, usar bolsa de polietileno <strong class="underline">sin secar al nacer</strong> para evitar hipotermia.</li>
                </ol>
            </div>
        </div>

    title: "Módulo 4: Diagnóstico, tratamiento y pronóstico de la encefalopatía hipóxico-isquémica",

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM exige que reconozcas de inmediato a un recién nacido <strong class="text-indigo-900 dark:text-indigo-200">&ge; 35 semanas de gestación y &ge; 1800 gramos</strong> con asfixia perinatal severa para instaurar <u class="decoration-indigo-400 decoration-2 font-medium">hipotermia terapéutica en sus primeras 6 horas de vida</u>, la única ventana de oportunidad real para brindar neuroprotección y modificar el pronóstico.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo de decisiones inicia desde la reanimación neonatal:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto de Inflexión Diagnóstico:</strong> Si el paciente presenta un Apgar &le; 5 a los 10 min o requirió ventilación en sus primeros 10 min de vida, el manejo cambia hacia encefalopatía. El diagnóstico definitivo en la primera hora es gasométrico: <strong class="underline">pH &le; 7.00 o un déficit de base &ge; 12</strong>.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Clasificación de Gravedad:</strong> Con los criterios confirmados, se debe clasificar la gravedad clínica mediante la <strong class="text-emerald-600 dark:text-emerald-500 font-bold">Escala de Sarnat</strong>.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Tratamiento Definitivo:</strong> Si el cuadro clasifica como encefalopatía moderada o severa y se corrobora alteración en el <strong class="underline">electroencefalograma de amplitud integrada (aEEG)</strong> en las primeras 6 horas, se activa el tratamiento: <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">Inducir hipotermia terapéutica (33 a 34 °C) por 72 horas</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Sarnat 2 (Moderado) Clásico:</strong> Paciente letárgico, pupilas mióticas, bradicardia y <strong class="text-emerald-700 dark:text-emerald-300 font-bold">crisis convulsivas focales</strong>.</li>
                        <li><strong>Estudio Inicial:</strong> Dentro de las primeras 24 horas a pie de cuna será siempre el <u class="decoration-emerald-400 decoration-2 font-bold">ultrasonido craneal transfontanelar</u>.</li>
                        <li><strong>Gold Standard Pronóstico:</strong> Para definir extensión de daño isquémico estructural y establecer el pronóstico a mediano plazo, la <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Resonancia Magnética</strong> es obligatoria y debe solicitarse entre el 7º y 21º día de vida.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa de la Prematurez:</strong> Jamás indiques hipotermia en &lt; 35 semanas o con peso &lt; 1,800 gramos; no cumplen criterios de inclusión.</li>
                        <li><strong>El Distractor Farmacológico:</strong> Si ofrecen fenobarbital o sulfato de magnesio como sinergia a la hipotermia, descártalos; <u class="decoration-rose-500 decoration-2">no se recomiendan medicamentos en sinergia</u>.</li>
                        <li><strong>Trampa Gasométrica (Hiperventilación):</strong> Cuidado con hiperventilar profilácticamente. Es imperativo <strong class="font-bold text-rose-600 dark:text-rose-400">evitar la hipocarbia</strong> para no agravar la isquemia por vasoconstricción.</li>
                        <li><strong>Contraindicaciones Absolutas:</strong> Coagulopatía con hemorragia activa o malformaciones congénitas mayores.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">

            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El objetivo prioritario en el ENARM frente a la hipoglucemia neonatal es <strong class="text-indigo-900 dark:text-indigo-200">identificar rápidamente los factores de riesgo</strong> (especialmente la macrosomía y la diabetes materna) e iniciar el <u class="decoration-indigo-400 decoration-2 font-medium">tratamiento intravenoso inmediato ante cualquier síntoma neurológico</u>, sin retrasar jamás la infusión en espera de una confirmación de laboratorio central, para evitar el daño neurológico irreversible.</p>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo dictado por la GPC se divide por la presencia de clínica y los niveles capilares:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El inicio (Profilaxis):</strong> Contacto piel a piel y alimentación al seno materno en los primeros 30-60 min. Si no hay riesgo y está asintomático, <strong class="underline">no se tamiza</strong>. Si hay factores de riesgo, tomar glucosa capilar a las 2 horas.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Punto de Inflexión 1 (¿Hay síntomas?):</strong> Si hay cualquier síntoma, salta al manejo IV directo: <strong class="text-rose-600 dark:text-rose-400 font-bold">Bolo de SG al 10% a 2 ml/kg</strong>, seguido de infusión a 6-8 mg/kg/min.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Punto de Inflexión 2 (Asintomático pero hipoglucémico):</strong>

                        </div>
                    </div>

                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El destete:</strong> Jamás suspender abruptamente. Cuando se logran <strong class="underline">&gt; 50 mg/dL de forma sostenida</strong> y hay tolerancia oral, la infusión se disminuye paulatinamente (2 en 2 mg/kg/min cada 6h).
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Binomio Diagnóstico:</strong> Antecedente de estrés perinatal o hijo de madre diabética + letargo/temblores/apnea + <strong class="text-emerald-700 dark:text-emerald-300 font-bold">dextrostix &lt; 45 mg/dL</strong>.</li>

                    Las 5 Perlas de Oro (GPC IMSS-442-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Prevención Universal:</strong> El inicio de la alimentación al seno materno en los <strong class="underline">primeros 30-60 minutos</strong> es la medida profiláctica más importante.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Tratamiento 1ra Línea:</strong> Si es sintomático o &lt; 25 mg/dL, administrar <strong class="underline">bolo de SG 10% (2 ml/kg)</strong> seguido de infusión a 6-8 mg/kg/min.</li>

                    <li><strong class="text-amber-700 dark:text-amber-500">Criterios de Referencia:</strong> Toda hipoglucemia que persista <strong class="underline">&gt; 72 horas</strong> o requiera infusión &gt; 12 mg/kg/min indica envío a endocrinología.</li>
                </ol>
            </div>
        </div>

                    El Concepto Fundamental
                </h4>
                <p>El abordaje del paciente pediátrico quemado exige una evaluación sistemática donde <strong class="text-indigo-900 dark:text-indigo-200">la extensión de la lesión dicta la reanimación hídrica inmediata que salva la vida</strong> (corte en <u class="decoration-indigo-400 decoration-2 font-medium">&gt; 20% de SCQ</u>), mientras que la profundidad y localización definen la urgencia quirúrgica temprana para evitar la pérdida de la extremidad.</p>

                <p class="mb-4">El manejo del paciente quemado sigue una cascada estricta de decisiones donde la clínica dicta el siguiente paso:</p>

                        </div>

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">B</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto Crítico (&gt; 20% SCQ):</strong> Si el paciente supera este porcentaje, se detona el esquema de restitución de líquidos de urgencia, cuyo éxito NO se mide con la presión arterial, sino confirmando que la <strong class="underline">uresis</strong> se mantenga dentro de los parámetros.

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">C</div>

                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>

                        <li><strong>Diferencial Terapéutico (Eléctrica vs Fuego):</strong> Quemadura total por fuego = escisión temprana. Quemadura total <u class="decoration-rose-500 decoration-2">eléctrica = esperar 5 días</u> antes de intervenir el lecho.</li>

                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Lesión Renal Aguda (LRA) en pediatría ha dejado de ser un diagnóstico estático basado solo en creatinina para convertirse en una patología dinámica y predecible; el ENARM exige que domines el uso del <strong class="text-indigo-900 dark:text-indigo-200">Índice de Angina Renal para anticiparte al daño</strong> y entiendas que la <u class="decoration-indigo-400 decoration-2 font-medium">sobrecarga hídrica es un factor de mortalidad independiente que debes prevenir activamente</u>.</p>

                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo sigue una secuencia lógica de "Predicción - Estadificación - Intervención Hemodinámica":</p>
                
                <div class="space-y-5">

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Predicción (Antes de la CrS):</strong> No esperes a que suba la creatinina. Se recomienda usar el <strong class="underline">Índice de Angina Renal (RAI)</strong>. Un valor &ge; 8 el día de ingreso predice LRA severa al tercer día.
                        </div>
                    </div>

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Estadificación (Momento del Diagnóstico):</strong> Utilizas la <strong class="underline">clasificación KDIGO</strong>. Se clasifica por el peor criterio entre: elevación de creatinina sérica o la duración de la oliguria/anuria.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>

                            </ul>
                        </div>
                    </div>
                </div>

                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Dato Clínico (Oliguria):</strong> Observa la duración en horas: <br>- &lt; 0.5 ml/kg/h por 6-12h = <strong class="text-emerald-700 dark:text-emerald-300 font-bold">KDIGO 1</strong>.<br>- &lt; 0.5 ml/kg/h por &ge; 12h = <strong class="text-emerald-700 dark:text-emerald-300 font-bold">KDIGO 2</strong>.<br>- &lt; 0.3 ml/kg/h por &ge; 24h o anuria 12h = <strong class="text-emerald-700 dark:text-emerald-300 font-bold">KDIGO 3</strong>.</li>

                    <li><strong class="text-amber-700 dark:text-amber-500">Monitorización Obligatoria:</strong> Calcular diariamente el <strong class="underline">% de Sobrecarga Hídrica</strong>: ((Peso actual - Peso ingreso) / Peso ingreso) x 100.</li>

                </ol>
            </div>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La supervivencia en la sepsis y el choque séptico pediátrico radica en la <strong class="text-indigo-900 dark:text-indigo-200">identificación clínica temprana de la hipoperfusión</strong> (incluso antes de que exista hipotensión), la <u class="decoration-indigo-400 decoration-2 font-medium">administración de antibióticos en la primera hora y una reanimación hídrica agresiva (A-B-C)</u> guiada por metas clínicas precisas.</p>

                <p class="mb-4">El manejo del choque séptico es una carrera contra el tiempo basada en la respuesta clínica paso a paso:</p>

                        <div>

                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Punto A (Sobrecarga):</strong> Entre cada carga buscar intencionadamente datos de sobrecarga (estertores, hepatomegalia). Si aparecen, se suspenden los líquidos.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Punto B (Choque Refractario a Líquidos):</strong> Si no se alcanzan las metas, iniciar <strong class="text-rose-600 dark:text-rose-400">inotrópicos IV/IO</strong>, colocar sonda urinaria y trasladar a UTIP.

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">4</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Punto C (Refractario a Catecolaminas):</strong> Si no mejora con aminas, sospechar insuficiencia suprarrenal e iniciar <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">esteroides (Hidrocortisona)</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">

                        <li><strong>Choque Caliente:</strong> Extremidades calientes, rubicundas, pulsos saltones, llenado capilar "flash" (&lt; 2 seg). Vasoplejía. Primera línea: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Norepinefrina</strong> (0.05 a 1 &micro;g/kg/min).</li>
                        <li><strong>Metas en UTIP:</strong> Lograr una <u class="decoration-emerald-400 decoration-2 font-bold">ScvO2 &ge; 70%</u> y un índice cardiaco entre 3.3 y 6.0 L/min/m&sup2;.</li>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">

                        <li><strong>Falla a Aminas (Causas Ocultas):</strong> Buscar <strong class="text-rose-600 dark:text-rose-400 font-bold">taponamiento, neumotórax a tensión, PIA &gt; 12 mmHg o descontrol metabólico</strong> (hipoglucemia/hipocalcemia).</li>
                        <li><strong>Trampa de Esteroides:</strong> NO para todos. La GPC es tajante: <u class="decoration-rose-500 decoration-2">solo indicados en choque resistente a catecolaminas</u> o riesgo/diagnóstico de insuficiencia suprarrenal.</li>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";

                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">

        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>

                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-sky-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;

            moduleScoresHtml += '</div>';

"GPC-SS-291-10. Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad en los tres niveles de atención. 2017."

            bibliographyContent.innerHTML = '';
            allSources.forEach(citation => {
                const item = document.createElement('div');
                item.className = 'bg-slate-100 dark:bg-slate-700 p-3 rounded-lg flex items-start gap-3 text-sm';
                item.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 dark:text-slate-400 flex-shrink-0 mt-1" viewBox="0 0 20 20" fill="currentColor">

        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríaIVCourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríaIVCourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríaCourseIVProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-sky-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-sky-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
