    <script>
        const questionsData = [



    {
        id: 1,
        question: "¿Cuál es el sitio anatómico más frecuente de presentación de trombosis venosa profunda durante el embarazo debido a compresión mecánica extrínseca?",
        options: ["Vena poplítea derecha", "Vena iliofemoral izquierda", "Vena subclavia derecha", "Vena femoral común derecha"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, el útero grávido exacerba la compresión anatómica natural que ejerce la arteria ilíaca derecha sobre la vena ilíaca izquierda al cruzar la pelvis. Esto genera estasis venosa asimétrica, convirtiendo a esta extremidad en el sitio primario de oclusión en embarazadas.<br><br>Perla ENARM: El 80% de los eventos de ETV asociados a embarazo son TVP aislada, de éstos el 70% se localiza en pierna izquierda y frecuentemente en vena iliofemoral en un 72%.<br><br>Análisis de Distractores: Las opciones A y D son incorrectas porque la predilección anatómica es marcadamente hacia la extremidad pélvica izquierda (no derecha). La opción C es un sitio anatómico del miembro superior, generalmente afectado por dispositivos invasivos como catéteres centrales, no por el embarazo.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Trombosis y embarazo, Página 101."
    },
    {
        id: 2,
        question: "En la evaluación inicial de un paciente, ¿cuál es el riesgo de mortalidad a treinta días estimado para una embolia pulmonar que se presenta con choque hemodinámico?",
        options: ["Menor al 1%", "Entre 3 y 15%", "Mayor al 15%", "Cercano al 50%"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, la hipotensión sostenida indica una obstrucción vascular masiva con pérdida aguda de la reserva hemodinámica del ventrículo derecho. Clínicamente, el estado de choque reclasifica al paciente de forma automática a la categoría de \"riesgo alto\", marcando este umbral crítico de mortalidad.<br><br>Perla ENARM: El estado hemodinámico del paciente, si está en choque se clasifica como de alto riesgo o EP masiva con un riesgo estimado de mortalidad a 30 días > 15%.<br><br>Análisis de Distractores: La opción A corresponde a pacientes hemodinámicamente estables con riesgo bajo. La opción B agrupa a los pacientes de riesgo intermedio según escalas de estratificación. La opción D sobrestima la estadística general de mortalidad a 30 días establecida en las guías para cohorte general en choque.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Evidencias y Recomendaciones, Página 85."
    },
    {
        id: 3,
        question: "De acuerdo a la epidemiología descrita, ¿cuál es el único factor de riesgo conductual que la trombosis venosa comparte fuertemente con la enfermedad arterial cardiovascular?",
        options: ["Obesidad grado tres", "Consumo de alcohol", "Tabaquismo crónico activo", "Sedentarismo por ocupación"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, históricamente la trombosis venosa (asociada a estasis e hipercoagulabilidad) y la arterial (asociada a daño aterosclerótico y dislipidemia) se consideraban entidades sin traslape. Sin embargo, el estrés oxidativo del tabaco genera daño endotelial sistémico que precipita ambas patologías.<br><br>Perla ENARM: Un meta análisis de estudios prospectivos con ~250,000 pacientes reportó que el único factor de riesgo cardiovascular compartido con ETV fue el tabaquismo.<br><br>Análisis de Distractores: La opción A es un factor de riesgo puro para ETV y síndrome metabólico, pero no es el hallazgo epidemiológico compartido destacado en la GPC. Las opciones B y D son factores de riesgo generales, pero la normatividad subraya explícitamente al tabaquismo como el nexo patológico bidireccional.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Prevención, Página 22."
    },
    {
        id: 4,
        question: "En una paciente embarazada con diagnóstico establecido de síndrome de anticuerpos antifosfolípidos y antecedente de abortos, ¿cuál es el régimen profiláctico preparto indicado?",
        options: ["Dosis altas de aspirina sola", "Antagonistas de vitamina K", "Heparina combinada con aspirina", "Anticoagulante oral directo solo"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, el daño microvascular placentario inducido por los anticuerpos requiere bloqueo de la cascada de coagulación (heparina) y reducción de la reactividad plaquetaria (aspirina a dosis baja) simultáneamente para evitar microtrombosis y pérdida fetal temprana.<br><br>Perla ENARM: A la embarazada que reúne los requisitos para diagnóstico de SAAF, se recomienda antes del parto la administración de dosis profilácticas o intermedias de heparina... combinada con aspirina de 75 a 100 mg/día.<br><br>Análisis de Distractores: La opción A es insuficiente para inhibir la cascada de coagulación activada por el SAAF. La opción B está contraindicada por su alta teratogenicidad (embriopatía warfarínica). La opción D está proscrita en el embarazo por cruzar la barrera placentaria y generar sangrado fetal.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Trombosis y embarazo, Página 125."
    },
    {
        id: 5,
        question: "En un paciente adulto promedio que iniciará terapia con antagonistas de vitamina K, ¿cuál es la dosis de inicio recomendada sin utilizar esquemas de carga?",
        options: ["2.5 mg por la mañana", "5 mg por la tarde", "10 mg como dosis única", "15 mg en dosis dividida"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, las dosis de carga iniciales altas provocan una caída abrupta de la Proteína C (anticoagulante natural), lo que paradójicamente induce un estado hipercoagulable grave (necrosis por warfarina). El inicio progresivo es mandatorio.<br><br>Perla ENARM: Se recomienda iniciar la terapia anticoagulante con AVK en el día 1 o 2 del tratamiento con heparina... con una dosis de 5 mg/día de warfarina por la tarde, sin utilizar dosis de “carga”.<br><br>Análisis de Distractores: La opción A se utiliza en adultos mayores, fragilidad o disfunción hepática, no en un adulto promedio. Las opciones C y D corresponden a los históricos \"esquemas de carga\" que hoy están prohibidos por el riesgo de necrosis isquémica cutánea al depletar agudamente la Proteína C.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Tratamiento, Página 65."
    },
    {
        id: 6,
        question: "Si un paciente con probabilidad clínica intermedia presenta un ultrasonido por compresión negativo que se limitó únicamente a las venas proximales, ¿cuál es el abordaje a seguir?",
        options: ["Egresar con alta médica", "Repetir estudio en 48 horas", "Repetir estudio en una semana", "Realizar pletismografía por impedancia"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, un ultrasonido que no evalúa las venas de la pantorrilla no puede descartar de forma segura un trombo distal en evolución. Como la propagación a territorio proximal ocurre en un lapso de 5 a 7 días, se requiere vigilancia ecográfica para detectar y tratar oportunamente la extensión.<br><br>Perla ENARM: Sí el USG sólo se realiza en venas proximales y es negativo, se repite en una semana o agregar determinación del DD.<br><br>Análisis de Distractores: La opción A expone al paciente a una TEP no prevenida si el trombo asintomático asciende. La opción B es un tiempo demasiado corto para detectar extensión significativa. La opción D es un estudio obsoleto que ha perdido su lugar en las guías modernas debido a su baja sensibilidad.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Diagnóstico, Página 32."
    },
    {
        id: 7,
        question: "¿En qué ventana de tiempo gestacional la exposición fetal a antagonistas de la vitamina K produce el mayor riesgo de anomalías congénitas (embriopatía)?",
        options: ["De la primera a la tercera semana", "De la cuarta a la octava semana", "De la décima a la duodécima semana", "Después de la semana veinte"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, la warfarina atraviesa libremente la placenta. La organogénesis máxima del cartílago y tejido óseo ocurre en este período; el fármaco inhibe la osteocalcina, causando hipoplasia nasal, condrodisplasia punctata y malformaciones del SNC.<br><br>Perla ENARM: La warfarina es teratogénica... y está asociada con más de 30% de riesgo de anomalías congénitas si se toma durante la 4ª a 8ª semanas después de la concepción (período de organogénesis).<br><br>Análisis de Distractores: Las opciones A y C flanquean el período de mayor teratogenicidad crítica, aunque el riesgo basal de aborto sigue existiendo en todo el primer trimestre. La opción D (segunda mitad) se asocia más a microhemorragias cerebrales fetales que a las anomalías morfológicas clásicas de la embriopatía.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Trombosis y embarazo, Página 110."
    },
    {
        id: 8,
        question: "¿Cuál es el límite de peso corporal a partir del cual es obligatorio realizar monitoreo farmacológico con niveles de anti factor Xa para heparinas de bajo peso molecular?",
        options: ["Peso mayor a 100 kg", "Peso mayor a 150 kg", "Peso mayor a 200 kg", "Peso mayor a 250 kg"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, la lipofilia de las heparinas inyectables altera su volumen de distribución. En obesidad extrema, la farmacocinética lineal basada en peso se pierde, haciendo que las dosis calculadas por kilo generen picos plasmáticos supraterapéuticos impredecibles y altamente hemorrágicos.<br><br>Perla ENARM: En personas con peso >200 kg necesitan asesoría mediante farmacología para dosis mayores de 400 mg/día... La única justificación del monitoreo mediante la actividad de anti factor Xa es durante el embarazo, personas con TFG <30 ml/min o aquellas con obesidad mórbida.<br><br>Análisis de Distractores: Las opciones A y B representan obesidad grave pero la GPC establece que las fórmulas estandarizadas de mg/kg siguen siendo tolerables y seguras en esos rangos sin requerir pruebas especiales. La opción D excede el umbral crítico normado.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Tratamiento, Página 61."
    },
    {
        id: 9,
        question: "¿Qué fármaco anticoagulante inyectable debe ajustarse específicamente a una dosis de 7.5 mg al día en pacientes con un peso entre 50 y 100 kilogramos?",
        options: ["Tinzaparina subcutánea", "Dalteparina subcutánea", "Fondaparinux subcutáneo", "Enoxaparina subcutánea"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, a diferencia de las heparinas clásicas que se dosifican por miligramo o unidad por kilo estricto, este pentasacárido sintético se administra en dosis fijas preestablecidas por bandas amplias de peso corporal para simplificar el manejo ambulatorio.<br><br>Perla ENARM: Terapia inicial en personas con cáncer: Fondaparinux <50 Kg. 5.0 mg/día; 50-100 Kg. 7.5 mg/día; >100 Kg. 10 mg/día.<br><br>Análisis de Distractores: La opción A se calcula a 175 U/kg/día. La opción B se calcula a 200 U/kg/día. La opción D se calcula a 1 mg/kg cada 12 horas o 1.5 mg/kg cada 24 horas. Ninguna de estas utiliza el sistema de bloques fijos de peso.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Trombosis asociada a cáncer, Página 98."
    },
    {
        id: 10,
        question: "¿Cuál es la duración recomendada de la tromboprofilaxis extendida con heparina de bajo peso molecular posterior a cirugía abdominal mayor por cáncer de alto riesgo?",
        options: ["Siete a diez días", "Catorce a veintiún días", "Mayor a cuatro semanas", "Hasta doce semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, el estado procoagulante inducido por la manipulación del lecho tumoral (liberación de factor tisular) y la inmovilidad de la convalecencia no desaparece al alta hospitalaria. Cubrir al paciente solo la primera semana deja sin protección la ventana de mayor letalidad por embolia.<br><br>Perla ENARM: La profilaxis extendida con HBPM por más de 4 semanas pos operatorio. Se considerará en pacientes sometidos a cirugía abdominal o pélvica por cáncer con factores de alto riesgo.<br><br>Análisis de Distractores: La opción A es el tiempo estándar profiláctico general no oncológico. La opción B es un tiempo intermedio no especificado en esta guía. La opción D aplica a la terapia curativa del paciente con cáncer y evento trombótico confirmado (que dura de 3 a 6 meses mínimos), no a la profilaxis quirúrgica.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Trombosis y cáncer, Página 99."
    },
    {
        id: 11,
        question: "¿Qué parámetro evolutivo contraindica o excluye de la recomendación el uso de trombolisis dirigida por catéter en trombosis de miembro superior grave?",
        options: ["Falla a anticoagulación previa", "Trombosis de la vena axilar", "Síntomas mayores a catorce días", "Expectativa de vida de un año"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enfermedad Tromboembólica Venosa, pasado este umbral temporal, el trombo sufre organización fibrótica e infiltración por fibroblastos; el coágulo se endurece y pierde sensibilidad al activador del plasminógeno, aumentando el riesgo de sangrado masivo sin lograr la lisis del tejido.<br><br>Perla ENARM: La trombolisis guiada por catéter está indicada en los siguientes casos: Síntomas graves, trombosis que involucre la mayor parte de la vena subclavia y axilar, y Síntomas menores de 14 días.<br><br>Análisis de Distractores: Las opciones A, B y D son precisamente las indicaciones formales (criterios de inclusión) dictados por la guía para optar por la terapia fibrinolítica invasiva en un abordaje de salvamento para el brazo afectado.",
        source: "GPC-IMSS-425-18, Diagnóstico y tratamiento de la enfermedad tromboembólica venosa, 2018, Tratamiento, Páginas 80 y 81."
    },

                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
