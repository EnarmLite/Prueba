            </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿A partir de qué edad está indicado el escrutinio universal para diabetes en la población general asintomática?",
        options: ["Mayor de 35 años", "Mayor de 40 años", "Mayor de 45 años", "Mayor de 50 años"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, la edad avanzada es un factor de riesgo independiente para resistencia a la insulina que amerita búsqueda intencionada incluso sin comorbilidades.<br><br>Perla ENARM: \"Solicitar glucosa de ayuno y hemoglobina glucosilada en toda persona mayor de 45 años\".<br><br>Análisis de Distractores: Las edades de 35 y 40 años corresponden a guías internacionales ajenas al escrutinio nacional actual. Esperar a los 50 años retrasa el diagnóstico oportuno de una patología altamente prevalente.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección II. Detección de diabetes, Página 1."
    },
    {
        id: 2,
        question: "¿Cuál es el punto de corte exacto de circunferencia de cintura para diagnosticar síndrome metabólico en personas de 6 a 18 años?",
        options: ["> 80 cm", "> 85 cm", "≥ 90 cm", "> 90 cm"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, en la población pediátrica y adolescente los criterios de riesgo cardiovascular se unifican sin distinción de sexo biológico, difiriendo de los cortes para adultos.<br><br>Perla ENARM: \"En personas 6-18 años establecer diagnóstico con 3 condiciones: 1. Circunferencia de cintura > 90 cm\".<br><br>Análisis de Distractores: > 80 cm es el límite superior de riesgo aplicable únicamente para mujeres adultas. Las opciones con el símbolo \"≥\" (mayor o igual) son incorrectas, ya que el protocolo exige que la medición supere estrictamente la cifra marcada.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección II. Detección de diabetes, Página 2."
    },
    {
        id: 3,
        question: "¿Cuál es el volumen máximo de agua simple permitido para la correcta administración oral de semaglutida?",
        options: ["120 ml", "100 ml", "250 ml", "50 ml"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, la absorción gástrica de este péptido requiere un ambiente con dilución mínima para evitar la degradación del fármaco.<br><br>Perla ENARM: \"Semaglutida oral requiere que el estómago este vacío. Debe tomarse 30 minutos antes del desayuno, con un sorbo de agua simple, (no más de 120 ml) y sin administrarse con ningún otro medicamento\".<br><br>Análisis de Distractores: Las opciones de 50 ml y 100 ml subestiman el margen de seguridad volumétrica permitido. La ingesta de 250 ml (un vaso estándar) reduce la biodisponibilidad del arGLP-1 hasta niveles subterapéuticos.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Tratamiento farmacológico, Página 9."
    },
    {
        id: 4,
        question: "¿Qué límite de tasa de filtración glomerular estimada establece el criterio absoluto de referencia inmediata a segundo nivel?",
        options: ["≤ 45 ml/min/1.73m²", "≤ 30 ml/min/1.73m²", "< 60 ml/min/1.73m²", "< 15 ml/min/1.73m²"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, alcanzar un estadio avanzado de enfermedad renal crónica limita críticamente el arsenal terapéutico y requiere manejo nefrológico especializado.<br><br>Perla ENARM: \"Referir a la brevedad a segundo nivel a paciente que presente... Pacientes con tasa de filtración glomerular ≤ 30 ml/min/1.73 m²\".<br><br>Análisis de Distractores: El nivel < 60 ml/min amerita flexibilizar metas pero se maneja en el primer nivel. El corte de ≤ 45 ml/min obliga a suspender sulfonilureas y ajustar otros fármacos, pero no indica derivación urgente. El valor < 15 ml/min (diálisis) sobrepasa por mucho el umbral de referencia temprana.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Referencia oportuna de pacientes, Página 7."
    },
    {
        id: 5,
        question: "¿Qué rango paramétrico de hemoglobina glucosilada fundamenta el diagnóstico categórico de prediabetes?",
        options: ["5.7 a 6.4 %", "6.0 a 6.5 %", "5.5 a 6.4 %", "5.7 a 6.9 %"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, este rango porcentual refleja el deterioro de la homeostasis glucémica en los últimos tres meses antes del debut franco de la enfermedad.<br><br>Perla ENARM: \"Establecer el diagnóstico de prediabetes basado en... Hemoglobina glucosilada 5.7 a 6.4 %\".<br><br>Análisis de Distractores: El nivel de 6.5 % o superior ya establece diagnóstico de diabetes. El rango a partir de 6.0 % ignora a pacientes en riesgo temprano que sí están contemplados en la norma mexicana. El corte de 5.5 % corresponde a pacientes sanos.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección II. Detección de diabetes, Página 1."
    },
    {
        id: 6,
        question: "Tras iniciar tratamiento antidepresivo empírico, ¿en qué lapso exacto se debe evaluar obligatoriamente la respuesta clínica?",
        options: ["2 semanas", "4 semanas", "6 semanas", "12 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, los inhibidores de recaptura de serotonina requieren este periodo mínimo de impregnación sináptica para determinar si el fármaco amerita ajuste, continuación o referencia psiquiátrica.<br><br>Perla ENARM: \"Evaluación en 6 semanas. Mucho mejor, levemente mejor, o sin cambios/empeoramiento\".<br><br>Análisis de Distractores: Las semanas 2 y 4 son muy prematuras para observar una remisión afectiva completa. A las 12 semanas se habría retrasado inaceptablemente la intervención en un paciente sin respuesta favorable.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Tratamiento de depresión, Página 13."
    },
    {
        id: 7,
        question: "De acuerdo con el semáforo nutricional, ¿cuál de las siguientes verduras se clasifica como \"medible\" y debe limitarse a máximo dos tazas?",
        options: ["Champiñón fresco", "Nopal asado", "Espinaca cocida", "Zanahoria cruda"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, aunque la mayoría de los vegetales son de libre demanda, existe un grupo selecto con mayor carga de carbohidratos que requiere restricción volumétrica.<br><br>Perla ENARM: \"Verduras medibles: no consumir más de 2 tazas; cebolla, jícama, zanahoria, brócoli y betabel\".<br><br>Análisis de Distractores: El champiñón, el nopal y la espinaca se encuentran en el listado explícito de verduras catalogadas como de consumo libre en la guía alimentaria, sin límite de tazas al día.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Anexos de alimentación, Página 3."
    },
    {
        id: 8,
        question: "¿A partir de qué nivel de triglicéridos en ayuno se deben iniciar fibratos de manera simultánea al control glucémico intensivo?",
        options: ["≥ 300 mg/dl", "≥ 500 mg/dl", "> 150 mg/dl", "≥ 400 mg/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, la hipertrigliceridemia grave confiere un alto riesgo de pancreatitis aguda, lo que transforma este parámetro en una urgencia relativa de abordaje combinado inmediato.<br><br>Perla ENARM: \"Cuando los niveles de triglicéridos son ≥ 500 mg/dl, iniciar fibratos de manera simultánea a la indicación de cambios en el estilo de vida y al control glucémico\".<br><br>Análisis de Distractores: Los valores mayores a 150 mg/dl representan dislipidemia que inicialmente se aborda logrando la meta de hemoglobina glucosilada (la hiperglucemia es el motor de los triglicéridos). Solo si persiste >150 mg/dl tras la meta, se valora el fibrato.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Control de triglicéridos, Página 12."
    },
    {
        id: 9,
        question: "¿Cuál es la meta porcentual mínima de reducción ponderal que se debe plantear cada 3 a 6 meses en pacientes con sobrepeso u obesidad?",
        options: ["> 5 %", "> 10 %", "≥ 7 %", "> 15 %"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, plantear objetivos progresivos y realistas a corto plazo fomenta el apego del paciente y genera un impacto metabólico demostrado en la sensibilidad insulínica.<br><br>Perla ENARM: \"En personas con sobrepeso u obesidad, plantear como meta la reducción > 5% del peso cada 3 a 6 meses\".<br><br>Análisis de Distractores: Las disminuciones de >10% o >15% son deseables a largo plazo pero no representan la meta escalonada a nivel trimestral o semestral. La reducción del 7% es propia de guías preventivas de prediabetes, no la recomendación general del protocolo.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Metas de control a evaluar, Página 7."
    },
    {
        id: 10,
        question: "¿Qué límite de la tasa de filtración glomerular establece la contraindicación absoluta para la prescripción de metformina?",
        options: ["< 45 ml/min", "≤ 45 ml/min", "< 30 ml/min", "< 60 ml/min"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, el deterioro avanzado de la función renal anula el aclaramiento de las biguanidas, aumentando logarítmicamente el riesgo de acidosis láctica fatal.<br><br>Perla ENARM: \"Contraindicaciones de Metformina: En pacientes con TFG < 30 ml/min o exacerbación de trastornos gastrointestinales\".<br><br>Análisis de Distractores: Una filtración entre 30 y 45 ml/min exige reducir la dosis máxima a 1000 mg diarios, pero no proscribe el medicamento. Una TFG menor a 60 ml/min no representa contraindicación inicial para la metformina.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Tratamiento de hiperglucemia, Página 10."
    },
    {
        id: 11,
        question: "En paciente asintomático con tensión arterial de 135/85 mmHg y relación albúmina/creatinina ≥ 30 mg/g, ¿cuál es el abordaje inicial indicado?",
        options: ["Monoterapia con IECA o ARA2", "Terapia dual con tiazida", "Monitoreo en una semana", "Monoterapia con calcioantagonista"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, la detección de nefropatía incipiente obliga a bloquear el sistema renina-angiotensina-aldosterona como nefroprotección, aunque la tensión no alcance cifras de inicio dual.<br><br>Perla ENARM: \"TA 130/80 a <140/90 mmHg: Si la Relación albúmina/creatinina es ≥ 30 mg/g iniciar IECA o ARA2\".<br><br>Análisis de Distractores: El monitoreo durante una semana aplica únicamente si la relación es < 30 mg/g. La terapia dual con tiazida es la indicación de primera línea exclusiva para pacientes que superan los 140/90 mmHg. Los calcioantagonistas no ofrecen el mismo perfil antiproteinúrico primario.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección III. Tratamiento de la hipertensión arterial sistémica, Página 11."
    },
    {
        id: 12,
        question: "¿Cuál es el antecedente de peso al nacimiento (programación fetal) que justifica el escrutinio temprano de diabetes?",
        options: ["< 2.0 kg", "< 3.0 kg", "< 2.8 kg", "< 2.5 kg"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, la restricción del crecimiento intrauterino condiciona adaptaciones epigenéticas que favorecen el acúmulo de grasa visceral y síndrome metabólico en la vida posnatal.<br><br>Perla ENARM: \"Solicitar glucosa de ayuno en cualquier persona que tenga una de las siguientes condiciones: Bajo peso al nacer (< 2.5 kg)\".<br><br>Análisis de Distractores: Los valores de 2.0, 2.8 y 3.0 kg no corresponden al punto de corte universal utilizado para definir al recién nacido de bajo peso en la norma oficial.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección II. Detección de diabetes, Página 1."
    },
    {
        id: 13,
        question: "¿Cuál criterio diagnóstico de hiperglucemia sella la enfermedad sin requerir repetición en una segunda muestra?",
        options: ["Glucemia de ayuno ≥ 126 mg/dl", "Curva de tolerancia ≥ 200 mg/dl", "Hemoglobina glucosilada ≥ 6.5 %", "Glucemia al azar ≥ 200 mg/dl con síntomas"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Diabetes tipo 2 y síndrome metabólico, la concurrencia de francos datos de descompensación (poliuria, polidipsia, pérdida de peso) y cifras aleatorias elevadas descarta errores de laboratorio y define la patología de forma inmediata.<br><br>Perla ENARM: \"Todos los criterios deben repetirse para corroborar el diagnóstico con un segundo método o muestra, excepto ≥ 200 mg/dl en cualquier medición con síntomas\".<br><br>Análisis de Distractores: La glucosa de ayuno alterada, la hemoglobina glucosilada ≥ 6.5% y la curva de tolerancia positiva son pruebas estrictamente dependientes de reevaluación confirmatoria en pacientes sin datos de descompensación clínica.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Diabetes tipo 2 y síndrome metabólico, 2024, Sección II. Detección de diabetes, Página 1."
    },
    {
        id: 14,
        question: "¿Cuál es la dosis tope de sitagliptina ajustada para pacientes con tasa de filtración glomerular entre 30 y 45 ml/min?",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

            document.getElementById('module-display').innerHTML = html;

                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('DT2Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('DT2LastQId', currentQuestionId);
                else localStorage.removeItem('DT2LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('DT2Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
</body>
</html>
