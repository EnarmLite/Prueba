                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "En la evaluación epidemiológica de la pérdida temprana de la gestación, ¿cuál es la etiología responsable de la mitad de los casos confirmados clínicamente?", 
                options: ["Insuficiencia del cuerpo lúteo", "Anomalías cromosómicas fetales", "Infecciones de vías urinarias", "Traumatismo abdominal cerrado"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la mitad de las gestaciones que terminan en pérdida durante el primer trimestre tienen un origen genético intrínseco, lo que explica por qué el manejo médico a menudo no puede evitar la progresión de la pérdida cuando esta alteración está presente.<br><br>Perla ENARM: \"Aproximadamente 50% de todos los casos de pérdida temprana del embarazo se deben a anomalías cromosómicas fetales.\"<br><br>Análisis de Distractores: La insuficiencia del cuerpo lúteo (A) es una causa específica pero mucho menos frecuente, abordable con progesterona. Las infecciones (C) y traumatismos (D) son factores predisponentes u obstétricos incidentales, pero no representan la causa de la mitad de los casos.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Introducción, Página 8." 
            },
            {
                id: 2, 
                question: "Durante la evaluación física de una paciente con sangrado transvaginal del primer trimestre, ¿cuál es el objetivo clínico principal de realizar una especuloscopía?", 
                options: ["Medir la longitud cervical exacta", "Tomar cultivo de líquido amniótico", "Evaluar el grado de desprendimiento", "Descartar origen no obstétrico"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, el sangrado vaginal no siempre proviene de la cavidad uterina. La visualización directa con espejo vaginal es imperativa para descartar lesiones anatómicas locales que simulen una amenaza, como pólipos, laceraciones o cáncer.<br><br>Perla ENARM: \"La exploración de la paciente debe incluir especuloscopia para visualizar y evaluar el cérvix, para descartar cualquier otra lesión capaz de producir sangrado trasvaginal (eversión glandular, lesiones cervicales malignas, pólipo cervical, entre otras).\"<br><br>Análisis de Distractores: La longitud cervical (A) y el grado de desprendimiento (C) se evalúan de forma precisa mediante ultrasonido endovaginal, no con especuloscopía. La toma de cultivo de líquido amniótico (B) está contraindicada y no aplica en este escenario de membranas íntegras.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Detección, Página 17." 
            },
            {
                id: 3, 
                question: "Ante una paciente con sangrado transvaginal en la que el rastreo ecográfico no logra documentar un saco gestacional dentro de la cavidad uterina, ¿cuál es el diagnóstico diferencial primario a descartar?", 
                options: ["Mola hidatiforme completa", "Embarazo ectópico", "Aborto diferido temprano", "Insuficiencia cervical"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, un útero vacío acompañado de una prueba de embarazo positiva y sangrado obliga a asumir una implantación anómala hasta demostrar lo contrario, dada la morbimortalidad materna asociada a su ruptura.<br><br>Perla ENARM: \"USG en paciente con sangrado transvaginal en el primer trimestre de embarazo... ¿Presencia de Saco gestacional intrauterino? No -> Considerar embarazo ectópico.\"<br><br>Análisis de Distractores: La mola hidatiforme (A) mostraría un patrón de \"tormenta de nieve\" intrauterino. El aborto diferido (C) requiere la visualización previa de un producto intrauterino sin vitalidad. La insuficiencia cervical (D) cursa con dilatación indolora usualmente en el segundo trimestre.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Diagramas de flujo, Página 22." 
            },
            {
                id: 4, 
                question: "En una paciente catalogada ecográficamente con un \"embarazo de viabilidad incierta\", ¿cuántos días deben transcurrir estrictamente para repetir el estudio de imagen y confirmar el diagnóstico?", 
                options: ["2 a 3 días", "24 a 48 horas", "7 a 10 días", "14 a 21 días"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, apresurar el dictamen ecográfico puede resultar en un diagnóstico erróneo de aborto en un embarazo sano muy temprano. El intervalo establecido otorga el tiempo necesario para visualizar el desarrollo estructural o la aparición del latido cardíaco.<br><br>Perla ENARM: \"Se recomienda repetir el estudio ultrasonográfico con un intervalo de 7 a 10 días, cuando existan marcadores ultrasonográficos de mal pronóstico o embarazo con viabilidad incierta.\"<br><br>Análisis de Distractores: El lapso de 2 a 3 días (A) es exclusivo para la medición seriada de laboratorio (Beta-hCG). Reevaluar en 24 a 48 horas (B) no mostrará cambios ecográficos significativos. Esperar 14 a 21 días (D) incrementa innecesariamente la ansiedad y el riesgo de complicaciones agudas.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Pronóstico, Página 18." 
            },
            {
                id: 5, 
                question: "Para el seguimiento bioquímico ambulatorio de un embarazo en etapas tempranas, ¿cuál es el intervalo de tiempo recomendado para las determinaciones seriadas de la fracción beta de Gonadotropina Coriónica Humana?", 
                options: ["Cada 24 horas", "Cada 12 horas", "Cada 7 días", "Cada 2 a 3 días"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la curva fisiológica de la actividad metabólica del trofoblasto en un embarazo intrauterino normal duplica sus valores en este margen temporal, convirtiéndolo en un marcador dinámico excelente de buen pronóstico.<br><br>Perla ENARM: \"Consideraciones generales: Manejo ambulatorio... Medidas seriadas de b-HGC cada 2 a 3 días.\"<br><br>Análisis de Distractores: Determinar niveles a las 12 o 24 horas (A, B) no es costo-efectivo ni refleja un cambio exponencial confirmatorio. Hacerlo a los 7 días (C) corresponde al tiempo indicado para repetir un ultrasonido ecográfico, no la prueba hormonal en sangre.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Cuadro 1, Página 23." 
            },
            {
                id: 6, 
                question: "Durante la evaluación ultrasonográfica de un saco intrauterino anembrionado, ¿a partir de qué diámetro del saco gestacional se decreta la inviabilidad definitiva del embarazo?", 
                options: ["Mayor a 10 milímetros", "Mayor a 15 milímetros", "Mayor a 20 milímetros", "Mayor a 25 milímetros"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, un saco de estas dimensiones que se encuentre totalmente vacío certifica un fallo del desarrollo primario y permite al médico tomar decisiones resolutivas definitivas sin necesidad de vigilancia adicional.<br><br>Perla ENARM: \"Repetir USG: Saco Gestacional mayor 25 mm... Embarazo no viable -> Referencia.\"<br><br>Análisis de Distractores: Los valores menores a 25 milímetros (A, B, C) representan estadios donde el polo fetal podría ser aún muy pequeño para el nivel de resolución del ultrasonido, lo cual los agrupa en la categoría de \"viabilidad incierta\" que obliga a revalorar.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Diagramas de flujo, Página 22." 
            },
            {
                id: 7, 
                question: "Si durante el rastreo por ultrasonido no se percibe actividad cardíaca fetal, ¿cuál es el tamaño de la longitud cráneo-rabadilla que establece el diagnóstico confirmatorio de \"embarazo no viable\"?", 
                options: ["Mayor a 5 milímetros", "Mayor a 7 milímetros", "Mayor a 10 milímetros", "Mayor a 12 milímetros"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, este punto de corte biométrico es irrefutable. Si el embrión alcanzó esta longitud, la falta de tubo cardíaco funcional asegura que la detención del crecimiento es irreversible.<br><br>Perla ENARM: \"No se detecta Frecuencia Cardiaca Fetal, Longitud Cráneo-Rabadilla mayor 7mm: Embarazo No viable.\"<br><br>Análisis de Distractores: Embriones de 5 milímetros (A) caen en el rubro de viabilidad incierta, pudiendo tratarse de gestaciones menores a 6 semanas. Las medidas de 10 y 12 milímetros (C, D) sobrepasan el criterio y retrasarían la conducta si se esperara a que el embrión creciera hasta ese punto sin latido.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Diagramas de flujo, Página 22." 
            },
            {
                id: 8, 
                question: "¿Cuál es el hallazgo anormal de la frecuencia cardíaca fetal que cuenta con mayor especificidad para predecir un desenlace abortivo en el primer trimestre?", 
                options: ["Bradicardia menor a 110", "Taquicardia mayor a 180", "Arritmia sinusal fetal", "Desaceleración temprana"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la caída de los latidos fetales refleja un ambiente de hipoxia severa y colapso circulatorio inminente del embrión, siendo el factor pronóstico aislado más adverso documentado por ultrasonido.<br><br>Perla ENARM: \"Los marcadores ultrasonograficos que predicen aborto en mujeres con viabilidad fetal confirmada son: Bradicardia fetal (con FCF < 110 latidos por minuto, entre la 6 a 14 semanas de gestación, Sensibilidad 68% y Especificidad 97%).\"<br><br>Análisis de Distractores: La taquicardia (B) o arritmias (C) no son predictores ecográficos de alta especificidad para aborto descritos en esta normativa. Las desaceleraciones (D) se evalúan mediante registro cardiotocográfico en el tercer trimestre, no en la amenaza de aborto.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Pronóstico, Página 17." 
            },
            {
                id: 9, 
                question: "De forma fisiológica y ecográfica, ¿cuál es la frecuencia cardiaca normal esperada para un embrión sano entre las semanas 5 y 10 de gestación?", 
                options: ["80 a 110 latidos por minuto", "100 a 175 latidos por minuto", "120 a 160 latidos por minuto", "140 a 190 latidos por minuto"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, los rangos de normalidad en etapas tan precoces son más amplios que en el embarazo a término, y conocerlos evita catalogar falsamente al producto con sufrimiento agudo precoz o inminencia de pérdida.<br><br>Perla ENARM: \"La Frecuencia Cardiaca Fetal durante la semana de gestación 5 a 10 es de 100 a 175 latidos por minuto, cuando existe FCF < 120 latidos por minuto se asocia con muerte fetal.\"<br><br>Análisis de Distractores: El rango de 120 a 160 (C) es el estándar oro para el feto durante el segundo y tercer trimestre, pero es incorrecto para esta etapa embrionaria. Rangos muy bajos (A) indican muerte inminente y los altos (D) no corresponden a la norma basal clínica.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Pronóstico, Página 18." 
            },
            {
                id: 10, 
                question: "¿Cuál es el fármaco de primera línea sugerido por su mecanismo antiespasmódico para aliviar el dolor y relajar el músculo liso uterino?", 
                options: ["Terbutalina", "Indometacina", "Butilhioscina", "Paracetamol"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, controlar la sintomatología dolorosa mejora el estado de ansiedad de la paciente y teóricamente reduce el riesgo de expulsión al frenar la motilidad del miometrio con agentes anticolinérgicos específicos.<br><br>Perla ENARM: \"Los tocolíticos que han sido evaluados incluyen la atropina, agentes escopolaminas e hioscinas (por su actividad antiespasmódica)... Cuadro 1: Antiespasmódicos (butilhioscina).\"<br><br>Análisis de Distractores: La terbutalina (A) es un beta-agonista también sugerido, pero la Butilhioscina es el antiespasmódico directo resaltado como primera opción. La indometacina (B) es para amenaza de parto pretérmino en etapas tardías. El paracetamol (D) es analgésico pero sin efecto tocolítico relajante de músculo liso.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Cuadro 1, Página 23." 
            },
            {
                id: 11, 
                question: "¿En qué escenario clínico específico cuenta con recomendación absoluta la indicación terapéutica de progesterona natural?", 
                options: ["Presencia de hemorragia severa", "Prevención primaria poblacional", "Presencia de contracciones uterinas", "Deficiencia de cuerpo lúteo"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, usar progesterona de manera indiscriminada como un \"sellador\" del embarazo carece de base médica. Solo aporta beneficio si la mujer se sometió a reproducción asistida o inducción de ovulación, donde la producción hormonal materna es biológicamente deficiente.<br><br>Perla ENARM: \"Solo se recomienda el uso de los progestágenos, en los casos de deficiencia del cuerpo lúteo (en embarazos obtenidos mediante técnicas de reproducción asistida o con el uso de inductores de la ovulación).\"<br><br>Análisis de Distractores: Darla a toda la población (B), para contracciones (C) o hemorragias (A) es una mala práctica médica común reprobada expresamente por la directriz clínica.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Cuadro 1, Página 23." 
            },
            {
                id: 12, 
                question: "Según el cuadro de medicamentos normativo de la GPC, ¿cuál es la dosis establecida de inmunoglobulina humana anti-D a administrar en el primer embarazo con sangrado?", 
                options: ["50 microgramos", "100 microgramos", "300 microgramos", "500 microgramos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la dosis estándar que logra la neutralización profiláctica de los antígenos eritrocitarios fetales tempranos en circulación materna es inferior a la utilizada en el postparto o en traumatismos obstétricos severos.<br><br>Perla ENARM: \"La inmunoglobulina humana anti-D, se debe administrar en las mujeres Rh negativo... Dosis: 100 microgramos (500 Unidades Internacionales) en el primer embarazo.\"<br><br>Análisis de Distractores: Las dosis de 300 microgramos (C) se emplean tradicionalmente después de las 28 semanas o en eventos masivos de microtransfusión. Las dosis de 50 (A) y 500 microgramos (D) no corresponden al cuadro clínico de protección precoz indicado en la pauta oficial.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Prevención, Página 16." 
            },
            {
                id: 13, 
                question: "En el manejo no farmacológico de la Amenaza de Aborto, ¿cuál es el tiempo de reposo absoluto sugerido a partir de que la paciente deja de presentar sangrado?", 
                options: ["Hasta 12 horas", "Hasta 48 horas", "Hasta 7 días", "Todo el embarazo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, enviar a la mujer a la inmovilidad prolongada es contraproducente (riesgo de trombosis) y no modifica el éxito. El reposo está dictado de manera breve como ventana de observación clínica ante recidivas del coágulo subcorial.<br><br>Perla ENARM: \"Se sugiere el reposo absoluto, hasta 48 horas, tras el cese del sangrado, suplementar con ácido fólico y uso de sedante.\"<br><br>Análisis de Distractores: Reposar 12 horas (A) es insuficiente para asegurar el cese hemostático real. Extenderlo a 7 días (C) o indicarlo por todo el embarazo (D) es obsoleto, aumenta la morbilidad y es catalogado como carente de justificación y evidencia.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Tratamiento, Página 19." 
            },
            {
                id: 14, 
                question: "Como estrategia en el tratamiento, se indica suspender las relaciones sexuales (coito interrumpido). ¿Cuál es la justificación fisiopatológica textual que cita la GPC respecto a la eyaculación?", 
                options: ["Alteración de flora bacteriana", "El semen libera prostaglandinas", "Incrementa riesgo de desgarro", "Aumenta isoinmunización feto-materna"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la exposición vaginal a los componentes biológicos del líquido seminal ejerce un efecto directo sobre el cérvix y el miometrio, provocando contracciones uterinas y maduración cervical indeseadas en el escenario de sangrado.<br><br>Perla ENARM: \"Manejo ambulatorio: Explicar la importancia del coito interrumpido durante la actividad sexual, debido a que el semen libera prostaglandinas.\"<br><br>Análisis de Distractores: Alterar la flora (A) o generar desgarros (C) no son los mecanismos moleculares inductores de contracción en este caso. La isoinmunización (D) es hematológica, no transmitida por vía sexual.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Cuadro 1, Página 23." 
            },
            {
                id: 15, 
                question: "Con base en la mejor evidencia documentada en la GPC, ¿qué intervención de micronutrientes se recomienda de forma universal antes y durante el embarazo para prevenir el aborto espontáneo?", 
                options: ["Altas dosis de vitamina A", "Altas dosis de vitamina C", "Ácido acetilsalicílico temprano", "Multivitaminas y ácido fólico"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, existe una correlación sólida entre los depósitos adecuados de oligoelementos y folatos séricos con un menor índice poblacional de pérdidas tempranas por defectos anatómicos y vasculares iniciales.<br><br>Perla ENARM: \"La suplementación de vitaminas antes y durante del embarazo ayuda a prevenir el aborto espontaneo. Multivitaminas más hierro y ácido fólico (Fuerte GRADE).\"<br><br>Análisis de Distractores: El consumo aislado de Vitamina C (B) o Vitamina A (A) carece de impacto en la tasa de nacimientos y están explícitamente negados en la guía. El ácido acetilsalicílico (C) tiene su nicho preventivo en fenotipos de preeclampsia o síndrome antifosfolípido, no como norma general contra el aborto.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Prevención, Página 13 y 32." 
            },
            {
                id: 16, 
                question: "Desde la perspectiva del riesgo epidemiológico, ¿cuál es el porcentaje de posibilidad basal de presentar aborto espontáneo en una paciente que tiene 45 años de edad?", 
                options: ["20 por ciento", "40 por ciento", "60 por ciento", "80 por ciento"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la curva de riesgo asciende severamente, traduciendo directamente el deterioro de la calidad de los ovocitos y el altísimo incremento de errores meióticos al final de la etapa reproductiva de la mujer.<br><br>Perla ENARM: \"La frecuencia de pérdida temprana del embarazo... aumenta bruscamente a 20% a la edad de 35 años y a 40% a la edad de 40 años, siendo de 80% a la edad de 45 años.\"<br><br>Análisis de Distractores: A los 35 años el riesgo es del 20 por ciento (A). A los 40 años el riesgo se sitúa en 40 por ciento (B). Ningún grupo etario tiene una estandarización de 60 por ciento (C) directo en la estadística oficial de la guía.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Introducción, Página 8." 
            },
            {
                id: 17, 
                question: "Según la clasificación temporal estipulada para la amenaza de aborto, ¿a partir de qué semana de gestación se cataloga clínicamente como \"tardía\"?", 
                options: ["12 semanas de gestación", "14 semanas de gestación", "18 semanas de gestación", "20 semanas de gestación"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, el abordaje diagnóstico cambia porque tras completar las primeras trece semanas y la placentación total, las causas del sangrado varían de defectos cromosómicos a factores mecánicos u obstétricos mayores.<br><br>Perla ENARM: \"La amenaza de aborto tardía es aquella que se presenta entre la semana 14 a 22.\"<br><br>Análisis de Distractores: Las 12 semanas (A) marcan el fin del primer trimestre pero no el corte oficial de \"tardía\" según el texto. 20 y 22 semanas (D) representan el límite máximo teórico donde el cuadro dejaría de ser aborto para transformarse legalmente en amenaza de parto pretérmino inmaduro.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Introducción, Página 8." 
            },
            {
                id: 18, 
                question: "Si la Amenaza de Aborto se asocia como factor de riesgo en el transcurso futuro del embarazo que logra la viabilidad, ¿cuál es la principal complicación obstétrica asociada por la GPC en estas pacientes?", 
                options: ["Oligohidramnios severo", "Preeclampsia con datos de severidad", "Trabajo de parto prematuro", "Acretismo placentario"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, el sangrado decidual temprano interfiere en parte con la invasión trofoblástica óptima y libera citocinas inflamatorias que crean un ambiente propenso a complicaciones estructurales de la membrana y el músculo en etapas finales.<br><br>Perla ENARM: \"Se ha demostrado que se asocia con aumento de riesgo obstétrico, como el trabajo de parto prematuro, bajo peso al nacer y rotura prematura de membranas.\"<br><br>Análisis de Distractores: La preeclampsia (B) requiere defectos endoteliales puros independientemente del sangrado clínico temprano. El acretismo (D) está ligado a cirugías uterinas previas. El oligohidramnios (A) es secundario a falla renal fetal o patología de arterias uterinas terminales.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Introducción, Página 8." 
            },
            {
                id: 19, 
                question: "A nivel ecográfico temprano, ¿cuál es el hallazgo patológico tisular característico que sustenta las manifestaciones clínicas o metrorragia en la Amenaza de Aborto?", 
                options: ["Coágulo subcorial o hemorragia decidual", "Desprendimiento prematuro de placenta", "Implantación en segmento inferior", "Placentación con invasión miometrial"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la tracción o fricción en el margen de adhesión del trofoblasto inmaduro con el tejido decidual origina un hematoma, cuya resolución puede tardar semanas y cursar con sangrado intermitente pero sin pérdida fetal intrínseca.<br><br>Perla ENARM: \"Cuadro 2. Etapas Clínicas de la Amenaza de Aborto: Ecografía: Hemorragia decidual, Coágulo subcorial, Embrión vivo intrauterino.\"<br><br>Análisis de Distractores: El desprendimiento prematuro (B) es un término exclusivo para el tercer trimestre. La implantación inferior (C) genera placenta previa a futuro. La invasión miometrial (D) describe un defecto histológico del acretismo y no un sangrado subcorial agudo.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Cuadros o figuras, Página 24." 
            },
            {
                id: 20, 
                question: "En el diagnóstico diferencial clínico, ¿qué dato de la exploración del cuello uterino transforma la clasificación de \"Amenaza de aborto\" a un aborto \"Inevitable\"?", 
                options: ["Posición en retroversión", "Sangrado con coágulos", "Dolor lumbopélvico punzante", "Inicio de la dilatación cervical"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la integridad del orificio cervical interno es la barrera que permite denominar al cuadro como una \"amenaza\" reversible. La ruptura de este hito indica que el motor uterino ya ha progresado irreversiblemente hacia la expulsión ovular.<br><br>Perla ENARM: \"Una vez que la dilatación del cuello uterino ha comenzado el aborto involuntario es inevitable.\"<br><br>Análisis de Distractores: Un cérvix retroverso (A) es una variante anatómica normal. La presencia de coágulos (B) o dolor severo (C) aumenta la sospecha de pérdida aguda y agrava el cuadro clínico, pero no categoriza estructuralmente la inevitabilidad de forma autónoma sin comprobar la dilatación.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Detección, Página 16." 
            },
            {
                id: 21, 
                question: "De acuerdo a la estadística epidemiológica, ¿cuál es la frecuencia de presentación de la amenaza de aborto durante los embarazos tempranos?", 
                options: ["5 a 10 %", "10 a 15 %", "20 a 25 %", "30 a 35 %"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, el sangrado temprano es una de las complicaciones obstétricas más prevalentes, afectando a una cuarta parte de todas las mujeres en las fases iniciales de la gestación, lo que exige un protocolo de escrutinio sistematizado en el primer nivel de atención.<br><br>Perla ENARM: \"La amenaza de aborto es una de las complicaciones obstétricas más comunes, con una incidencia que varía entre 20% y 25% de los embarazos tempranos.\"<br><br>Análisis de Distractores: El rango de 5 a 10 % corresponde al riesgo de pérdida después de la novena semana. 10 a 15 % y 30 a 35 % son valores subestimados y sobreestimados, respectivamente, que no reflejan la estadística oficial de presentación clínica.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Introducción, Página 8." 
            },
            {
                id: 22, 
                question: "De las pacientes que cursan clínicamente con una amenaza de aborto, ¿qué porcentaje de ellas progresará de forma inevitable a una pérdida de la gestación?", 
                options: ["1 a 2 %", "3 a 16 %", "20 a 25 %", "40 a 50 %"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, aunque la presentación clínica del sangrado es muy frecuente, la gran mayoría de los embarazos continúan su desarrollo de manera exitosa si se descartan alteraciones cromosómicas; solo una fracción menor culminará en la expulsión del producto.<br><br>Perla ENARM: \"La amenaza de aborto se presenta en uno de cada cinco embarazos, de los cuales entre 3% y 16% terminará en aborto.\"<br><br>Análisis de Distractores: 1 a 2 % es un porcentaje de complicación demasiado bajo. 20 a 25 % representa la incidencia global de la amenaza de aborto en sí misma. 40 a 50 % es incorrecto, ya que significaría que casi la mitad de los sangrados terminarían en aborto, lo cual contradice la estadística clínica.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Justificación, Página 9."

            {
                id: 23, 
                question: "En un embarazo evaluado entre las 5 y 10 semanas de gestación, ¿cuál es el valor exacto de la frecuencia cardíaca fetal que se asocia con un aumento marcado en la mortalidad intrauterina?", 
                options: ["< 120 latidos por minuto", "< 140 latidos por minuto", "< 160 latidos por minuto", "< 175 latidos por minuto"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la inmadurez del tubo cardíaco embrionario tiene un margen de tolerancia específico. Una frecuencia por debajo de 120 latidos por minuto en esta etapa es un signo ominoso de disfunción cardiovascular precoz.<br><br>Perla ENARM: \"La frecuencia cardíaca fetal durante la semana de gestación 5 a 10 es de 100 a 175 latidos por minuto, cuando existe frecuencia cardíaca fetal < 120 latidos por minuto se asocia con muerte fetal.\"<br><br>Análisis de Distractores: Las opciones < 140, < 160 y < 175 caen dentro del amplio rango de normalidad esperado para la actividad autonómica embrionaria (100 a 175 latidos por minuto), por lo que no son predictores de muerte en esta fase temprana.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Pronóstico, Página 18." 
            },
            {
                id: 24, 
                question: "Además de la bradicardia fetal y el tamaño del hematoma, ¿cuál es el hallazgo anatómico en los anexos embrionarios evaluado por ultrasonido que incrementa el riesgo de pérdida del embarazo?", 
                options: ["Saco gestacional simétrico", "Líquido amniótico claro", "Trofoblasto con flujo periférico", "Saco vitelino de forma irregular"],

                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Pronóstico, Página 17." 
            },
            {
                id: 25, 
                question: "Si se decide emplear un fármaco de la familia de los beta-agonistas para lograr la relajación del músculo liso uterino en la amenaza de aborto, ¿cuál es la opción sugerida?", 
                options: ["Nifedipino", "Terbutalina", "Atosiban", "Indometacina"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, cuando la actividad uterina contribuye al riesgo de expulsión, se pueden utilizar agentes tocolíticos. La terbutalina actúa sobre los receptores beta-2 adrenérgicos del miometrio disminuyendo las contracciones.<br><br>Perla ENARM: \"Los tocolíticos que han sido evaluados incluyen la atropina, agentes escopolaminas e hioscinas, y betas agonistas (terbutalina, isoxsuprina, clorhidrato de nilidrina).\"<br><br>Análisis de Distractores: Nifedipino es un calcioantagonista, Atosiban es un antagonista de oxitocina, e Indometacina es un inhibidor de prostaglandinas; aunque todos son tocolíticos, pertenecen a familias farmacológicas diferentes y no son beta-agonistas.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Cuadro 1, Página 23."

            {

                question: "¿Cuál es la dosis diaria estandarizada de ácido fólico que debe recibir una paciente embarazada para la prevención de complicaciones en el primer trimestre?", 
                options: ["1.0 mg", "2.0 mg", "0.4 mg", "5.0 mg"],

                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Cuadro de medicamentos, Página 25." 
            },
            {
                id: 27, 
                question: "En pacientes sin complicaciones aparentes, ¿en qué momento de la gestación se establece que debe realizarse de forma ideal la consulta de control prenatal inicial para la detección de riesgos?", 
                options: ["10 semanas", "12 semanas", "14 semanas", "20 semanas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, realizar la valoración inicial en este momento permite identificar de forma temprana comorbilidades, iniciar suplementación clave y programar estudios de escrutinio cromosómico oportunos.<br><br>Perla ENARM: \"La consulta de control prenatal (idealmente a las diez semanas), debe incluir detecciones y pruebas encaminadas a identificar a las mujeres que necesitan cuidados adicionales.\"<br><br>Análisis de Distractores: Consultar a las 12 o 14 semanas retrasa la ventana de oportunidad para detectar riesgo de anomalías cromosómicas tempranas y optimizar niveles de micronutrientes. A las 20 semanas el periodo de organogénesis y máximo riesgo de aborto temprano ha concluido.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Prevención, Página 14." 
            },
            {
                id: 28, 
                question: "¿Qué esquema vitamínico carece de utilidad clínica demostrada y, por lo tanto, no debe recomendarse como intervención para la prevención del aborto espontáneo?", 
                options: ["Vitamina D y Calcio", "Complejo B y Ácido fólico", "Sulfato ferroso y Zinc", "Vitamina A y Vitamina C"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la evidencia científica de alta calidad descartó el beneficio de la suplementación aislada o combinada de estos dos elementos en la prevención de la pérdida temprana, a diferencia de los multivitamínicos integrales.<br><br>Perla ENARM: \"La suplementación con vitamina A y C no ayudan a prevenir el aborto espontaneo (Fuerte GRADE).\"<br><br>Análisis de Distractores: El ácido fólico y el sulfato ferroso están explícitamente indicados dentro de la estrategia de multivitamínicos. La vitamina D y el Calcio son componentes nutricionales del control prenatal con beneficio en otros desenlaces como preeclampsia.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Prevención, Página 14." 
            },
            {
                id: 29, 
                question: "Durante la consulta de control prenatal integral de una paciente menor de 25 años, ¿qué patógeno infeccioso específico debe buscarse intencionadamente debido a su alta prevalencia en este grupo etario?", 
                options: ["Treponema pallidum", "Neisseria gonorrhoeae", "Chlamydia trachomatis", "Virus del papiloma humano"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la infección intracelular por este microorganismo es frecuentemente asintomática pero altamente deletérea para la integridad de las membranas ovulares y la cavidad uterina, elevando el riesgo de complicaciones.<br><br>Perla ENARM: \"La consulta de control prenatal debe incluir: Informar a las mujeres menores de 25 años, la alta prevalencia de infección por Chlamidia en su grupo de edad.\"<br><br>Análisis de Distractores: Aunque la sífilis (Treponema pallidum) se tamiza rutinariamente, la especificidad poblacional de alerta en '< 25 años' dictada en la recomendación de la GPC pertenece a Chlamydia. Gonorrea y VPH son patógenos de transmisión sexual, pero no son el enfoque directo de esta instrucción preventiva etaria.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Prevención, Página 15." 
            },
            {
                id: 30, 
                question: "Ante una mujer embarazada con antecedentes de aborto espontáneo, ¿qué intervención no farmacológica de soporte ha demostrado aumentar la tasa de éxito del embarazo en curso?", 
                options: ["Reposo absoluto en cama", "Asesoramiento psicológico prenatal", "Dieta hipercalórica estricta", "Suspensión de la actividad física"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Amenaza de Aborto, la modulación del estrés, la ansiedad y la depresión a través de apoyo profesional especializado disminuye las catecolaminas circulantes y mejora el entorno neuroendocrino del embarazo.<br><br>Perla ENARM: \"El aborto espontáneo se ha asociado con aumento de angustia, ansiedad y depresión. Las mujeres embarazadas que seguían un plan específico de apoyo de asesoramiento prenatal tenían una tasa de éxito del embarazo significativamente más alta que las que no participaron.\"<br><br>Análisis de Distractores: El reposo absoluto y la suspensión de actividad no garantizan la prevención de pérdida ni mejoran las tasas de éxito estadístico. Una dieta hipercalórica promueve obesidad, la cual es un factor de riesgo independiente para aborto.", 
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto en el primer y segundo nivel de atención, 2020, Prevención, Página 14." 
            },
            {
                id: 31, 
                question: "Independientemente de la edad cronológica gestacional, ¿qué peso fetal establece el límite fisiológico y legal para catalogar la interrupción del embarazo como un aborto?", 
                options: ["< 500 g", "< 1000 g", "< 1500 g", "< 2000 g"], 
                answer: 0,

                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="HM29510GYO.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoGMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoGMLastQId', currentQuestionId);
                else localStorage.removeItem('gyoGMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoGMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
