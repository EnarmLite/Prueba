    {
        id: 168,
        question: "Se atiende en consulta prequirúrgica a un paciente diagnosticado con Enfermedad de Von Willebrand (tipo 1 y 2) que será sometido a un procedimiento de cirugía menor invasiva dental. Según el algoritmo hematológico, ¿cuál es el agente terapéutico de primera línea para garantizar la hemostasia si el paciente demostró respuesta previa a la molécula?",
        options: ["Concentrados de FVIII recombinante profiláctico", "Ácido tranexámico en infusión de 24 horas", "Desmopresina (DDAVP) endovenosa o intranasal", "Infusión de crioprecipitados a demanda"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de Hemofilia (y Von Willebrand), la liberación de las reservas endoteliales de factor de Von Willebrand y FVIII endógeno es suficiente para cohibir hemorragias menores en pacientes con defectos cualitativos leves. El algoritmo estipula que en el rubro \"Hemorragias leves/cirugía menor\", si el padecimiento corresponde a las variantes 1, 2A, 2M, 2N, se debe prescribir la vasopresina sintética como estímulo liberador, evitando la exposición riesgosa e innecesaria a hemoderivados externos.<br><br>Perla ENARM: Algoritmo de Terapéutica. Hemorragias leves/cirugía menor en EVW 1, 2A, 2M, 2N -> Primera línea: DDAVP (confirmando que sí responden).<br><br>Análisis de Distractores: A) Los concentrados purificados o liofilizados de Factor VIII con FVW asociado (CFC-FVIII/FVW) se reservan imperativamente para cirugías mayores, hemorragias intracraneales graves o en los casos donde la DDAVP esté formalmente contraindicada o carezca de respuesta (Tipo 3). B) El ácido tranexámico es un antifibrinolítico adyuvante tópico o sistémico, pero carece de la fuerza de puente plaquetario primario que exige el déficit intrínseco del factor adhesivo genético tisular de la enfermedad de base. D) Los crioprecipitados contienen concentraciones elevadas de Fibrinógeno y FVW, pero su uso ha sido desplazado sistemáticamente en terapias de primera línea leves debido al inherente y grave riesgo de transmisión de virus patógenos intraplasmáticos frente a opciones asépticas.",
        source: "IMSS-408-10 RR, Diagnóstico y Tratamiento de Hemofilia, 2010, Algoritmos, Página 43."
    },
    {
        id: 169,
        question: "Al realizar la evaluación ecográfica transvaginal en una paciente en el primer trimestre de gestación que cursa con metrorragia escasa y cérvix cerrado, ¿cuál de los siguientes hallazgos de imagen confirma el diagnóstico clínico compatible con la etapa de \"Amenaza de aborto\"?",
        options: ["Línea endometrial menor de 15 milímetros sin reacción", "Ausencia franca de ecos y saco gestacional vacío", "Modificaciones y borramiento del orificio cervical interno", "Presencia de hemorragia decidual y coágulo subcorial"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Intervenciones para la Amenaza de Aborto, la distinción de las etapas del aborto espontáneo rige la conducta expectante frente a la intervención instrumentada de legrado. En la \"Amenaza de aborto\", el embrión mantiene latido cardíaco, pero la placenta sufre microdesprendimientos iniciales. El Cuadro 2 dictamina que el hallazgo patognomónico visible en la ecografía para este estadio de dolor y manchado es la visualización del hematoma de separación inicial: \"Ecografía: Hemorragia decidual, Coágulo subcorial, Embrión vivo intrauterino\".<br><br>Perla ENARM: Cuadro 2. Etapas clínicas. Amenaza de aborto -> Hallazgos Ecografía: Hemorragia decidual, Coágulo subcorial, Embrión vivo intrauterino.<br><br>Análisis de Distractores: A) La ausencia de desarrollo embrionario o líneas endometriales atróficas tempranas sin saco obedece a un escenario de gestación no viable o huevo muerto retenido. B) El hallazgo de \"desprendimiento total y expulsión\" sin ecos vivos descarta la amenaza y transiciona biológicamente al aborto inevitable, incompleto o consumado. C) La apertura y modificación estructural dinámica y progresiva del cérvix uterino (dilatación o borramiento) es el signo biológico de inflexión que marca el paso definitivo hacia el aborto en evolución (inevitable), erradicando el diagnóstico inicial conservador de \"amenaza\".",
        source: "SS-026-20 RR, Intervenciones en Amenaza de Aborto, 2020, Cuadro 2, Página 9."
    },
    {
        id: 170,
        question: "Según la clasificación ecográfica y de riesgo de nódulos tiroideos para decidir el envío a biopsia por aspiración con aguja fina (BAAF), ¿a partir de qué diámetro transversal se recomienda la punción si un nódulo presenta patrón espongiforme y es catalogado como de \"Muy baja sospecha\"?",
        options: ["Mayor o igual a 2.0 cm", "Mayor o igual a 0.5 cm", "Mayor o igual a 1.0 cm", "Mayor o igual a 1.5 cm"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Nódulo Tiroideo, se evita biopsiar lesiones diminutas con características radiológicas benignas para no saturar los servicios de citología. La tabla de estratificación indica que aquellos nódulos \"espongiformes o parcialmente quísticos\" carentes de microcalcificaciones o márgenes irregulares se agrupan en el patrón de \"Muy baja sospecha\" (riesgo de cáncer menor al 3%). En esta categoría permisiva particular, la indicación inamovible normativa para intervenir mediante aguja se retrasa y arranca exclusivamente hasta que la lesión alcance o rebase un límite de \"≥1.5 cm\" de tamaño sólido.<br><br>Perla ENARM: Patrón ecográfico: Muy baja sospecha (nódulos espongiformes). Recomendación: BAAF a ≥1.5 cm.<br><br>Análisis de Distractores: A) Esperar a los 2 cm representa un retardo diagnóstico en los algoritmos internacionales tiroideos actuales, donde el diámetro de corte general protocolizado no excede los 1.5 cm aun en fenotipos muy benignos. B) Nódulos subcentimétricos (menores a 1 cm) rara vez se punzan, a menos que asienten adenopatías cervicales metastásicas concomitantes, invadan la cápsula o posean un alto riesgo familiar evidente. C) El dintel de 1.0 cm constituye el umbral estricto para ordenar de inmediato la biopsia en aquellos nódulos sólidos hipoecoicos categorizados con \"Sospecha intermedia\" o \"Alta sospecha\" oncológica.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico, 2009, Cuadro de Patrones Ecográficos, Página 30."
    },
    {
        id: 171,
        question: "Durante la estadificación clínica de severidad en un paciente con Enfermedad Pulmonar Obstructiva Crónica (EPOC) empleando la escala de disnea mMRC, ¿qué manifestación física referida de fatiga respiratoria impone automáticamente un \"Grado 4\"?",
        options: ["Solo le falta aire al caminar deprisa en una pendiente poco pronunciada", "Le falta el aire al desvestirse o no puede salir de su casa", "Tiene que parar a respirar después de caminar 100 metros", "Camina más lento que personas de su misma edad en terreno llano"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y Diagnóstico de EPOC, la escala del Medical Research Council modificado (mMRC) va de 0 a 4 y es un pilar en la clasificación de los grupos terapéuticos GOLD. El límite máximo de incapacidad biológica (\"Grado 4\") corresponde a la postración hipoxémica intradomiciliaria total y se asigna al paciente que afirma: \"Me falta tanto el aire que no puedo salir de mi casa o me ahogo al vestirme y desvestirme\".<br><br>Perla ENARM: Escala mMRC: Grado 4: Le falta el aire al desvestirse o no puede salir de su casa.<br><br>Análisis de Distractores: A) La disnea exclusiva de sobreesfuerzo en cuestas inclina a un paciente con reserva compensatoria adecuada, catalogado funcionalmente en el Grado 1. C) La claudicación respiratoria limitante estandarizada métricamente que exige pausas \"a los 100 metros o tras unos minutos de marcha\" determina al Grado 3 de la escala. D) La incapacidad para seguirle el paso a los pares sanos en el mismo terreno plano establece el diagnóstico de Grado 2.",
        source: "IMSS-037-21 RR, Prevención y Diagnóstico de EPOC, 2021, Anexos, Escala mMRC, Página 22."
    },
    {
        id: 172,
        question: "En la evaluación funcional hospitalaria del paciente amputado utilizando la Escala de Medida de Independencia Funcional (FIM), ¿cuál es el puntaje numérico máximo total acumulable al valorar de forma exclusiva el dominio \"Cognitivo\" (comprensión, expresión, interacción social y resolución de problemas)?",
        options: ["35 puntos", "25 puntos", "91 puntos", "50 puntos"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación en Amputación, el test FIM se escinde en la carga biológica de asistencia biomecánica y mental para orientar la labor de enfermería asilar. El dominio superior \"Cognitivo\" consta únicamente de los ítems numéricos del 14 al 17, evaluados del 1 al 7 cada uno. La sumatoria general de estas categorías (Comunicación y Conocimiento social) alcanza un techo matemático estricto validado en la herramienta nacional de \"35 puntos\" tope absolutos frente a la indemnidad cortical sana preservada.<br><br>Perla ENARM: Escala de medida de independencia funcional (FIM): Dominio COGNITIVO (Comunicación y Conocimiento social) -> 35 puntos.<br><br>Análisis de Distractores: B y D) Cifras erróneas distractoras espurias que no corresponden al límite estandarizado del constructo psicométrico de FIM en su tabulador estadístico central mexicano. C) Los masivos 91 puntos conforman exclusivamente la puntuación tope global y sumaria que puede acumular el dominio opuesto fisiológico primario (Dominio Motor), el cual engloba actividades de vestido, esfínteres y traslados pesados de camilla a silla.",
        source: "DIF-331-21 RR, Rehabilitación Post-EVC, 2021 (Aplicable a FIM en GPC Amputados DIF-257-21, p. 7), Cuadro FIM."
    },
    {
        id: 173,
        question: "Al ejecutar la prueba de escrutinio neuropsicológico de Folstein (MMSE), el explorador debe evaluar el dominio de \"Lenguaje y Construcción\" y la apraxia motora mediante una orden seriada de tres pasos. Para validar estadísticamente el puntaje normado por la guía mexicana, ¿cuál es la instrucción textual obligada que se debe dictar verbalmente?",
        options: ["Dibuje un pentágono, escriba una frase con sujeto y cierre ambos ojos", "Escriba su nombre completo, tome el lápiz y señale la ventana más cercana", "Tome el papel con la mano izquierda, dóblelo por la mitad y póngalo en el suelo", "Cierre la puerta, apague la luz y siéntese frente a mí con las manos cruzadas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Enfermedad de Alzheimer, el Mini-Mental penaliza la alteración de sus consignas operativas a fin de mantener la concordancia de sus pruebas de validación hispana internacionales. En el rubro de obediencia tricomandada auditiva ejecutiva fina, se prohíben las frases intuitivas empíricas, ordenando que el médico diga estrictamente y solo una vez: \"Tome el papel con la mano izquierda, dóblelo por la mitad y póngalo en el suelo\", garantizando 1 punto por cada ítem exitoso no repetido.<br><br>Perla ENARM: LENGUAJE Y CONSTRUCCIÓN: Le voy a dar algunas instrucciones. Por favor sígalas en el orden en que se las voy a decir. 1. \"Tome el papel con la mano izquierda”, 2. “dóblelo por la mitad” y 3. “póngalo en el suelo\". (Máximo 3 puntos).<br><br>Análisis de Distractores: A) Los pentágonos cruzados, la escritura del mensaje predicativo libre y el cierre voluntario de los ojos a partir de una cartulina leída componen órdenes de reactivos distintos separados y asíncronos distribuidos en el test, no aglomerados bajo una indicación tricomandada verbal continua de atención de memoria de trabajo de 3 puntos. B y D) Inventivas clínicas desestructuradas no tabuladas en el escrutinio de Folstein, las cuales arruinan y sesgan irremediablemente el rigor y la reproducibilidad paramétrica psicométrica requerida por las instituciones de salud públicas de control mental.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, MMSE de Folstein, Página 34."
    },
    {
        id: 174,
        question: "En el marco de la Valoración Geriátrica Integral hospitalaria, ¿cuál es la denominación de la herramienta estandarizada clínica específica recomendada para medir y objetivar tempranamente el grado de riesgo a desarrollar \"Úlceras por Presión\" en pacientes senectos inmovilizados?",
        options: ["Escala Predictiva de Norton Modificada", "Escala Anatómica de Wagner", "Escala Funcional de Braden", "Escala de Desempeño de Karnofsky"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral en Unidades de Atención, el colapso del tejido epitelial y la isquemia dérmica asilar exigen la prevención proactiva rotacional basada en puntuaciones numéricas higrométricas y biomecánicas. La guía estipula como el patrón paramétrico oficial integrador de escrutinio para este fin a la \"Escala de Braden\" (Cuadro 9: Valoración del riesgo de úlceras por presión), la cual cruza dominios de percepción sensorial, humedad, actividad asilar basal y nutrición calórica.<br><br>Perla ENARM: Cuadro 9. Escala de Braden. Valoración del riesgo de úlceras por presión.<br><br>Análisis de Distractores: A) La escala de Norton también estima el riesgo de decúbito, pero históricamente y en el contexto riguroso de esta GPC mexicana protocolizada específica, el instrumento oficial seleccionado y expuesto in extenso en los anexos y Cuadro 9 como estándar directriz nacional es el modelo de Braden. B) La Escala fisiopatológica de Wagner se dedica a la clasificación focal estructurada biológica tisular (infección/necrosis ósea) del Pie Diabético franco ya establecido. D) La escala de Karnofsky evalúa somáticamente el estado funcional y de postración global oncológica vital del paciente paliativo oncológico, y no el riesgo predictivo focal isquémico microvascular tisular por aplastamiento sobre prominencias óseas.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral en Unidades de Atención Médica, 2018, Anexos, Cuadro 9, Página 25."
    },
    {
        id: 175,
        question: "Al emplear el Modelo Predictivo de Wells modificado para calcular objetivamente la probabilidad clínica de padecer Tromboembolismo Pulmonar (TEP) en urgencias, ¿qué hallazgo del examen físico otorga puntos de manera contundente y directa al cálculo final?",
        options: ["Elevación térmica sostenida y fiebre franca mayor a 39° C", "Frecuencia cardiaca documentada por encima de 100 latidos por minuto", "Ausencia de murmullo vesicular o ruidos ventilatorios en bases pulmonares", "Desaturación y saturación de oxígeno por oximetría inferior a 85%"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Tromboembolia Pulmonar, la métrica de Wells confía en los signos duros de respuesta adrenérgica simpática del choque obstructivo del lecho arterial pulmonar y el estancamiento retrógrado sistémico. Dentro del listado de sus características clínicas penalizadas (junto a cáncer, inmovilidad, hemoptisis, etc.), la taquicardia reactiva patológica definida y dictaminada estrictamente como \"Frecuencia cardiaca > 100 latidos/min\" conforma uno de los principales reactivos mayores y fiables ineludibles que apuntalan la decisión de activar angiografía en el score matemático intermedio o severo.<br><br>Perla ENARM: Cuadro 9. Modelo Clínico de Wells para diagnóstico de embolismo pulmonar: Características clínicas: Frecuencia cardiaca > 100 latidos/min.<br><br>Análisis de Distractores: A) La fiebre, aunque presente en infartos pulmonares necrotizantes u oclusiones severas tardías asépticas, se asocia primariamente en la clínica a cuadros neumónicos consolidados parenquimatosos infecciosos lobares alternos, perdiendo su especificidad pronóstica tromboembólica intrínseca en el score de Wells de exclusión vascular original. C) El silencio ventilatorio o derrame exudativo pleural atelectásico obstructivo conforma un dato valioso paraclínico neumológico accesorio, pero ajeno al cuestionario simplificado estricto algorítmico tabular rápido paramétrico histórico en triage. D) La desaturación de los niveles de pO2 circulantes en pulsioximetría es el sello patognomónico biológico fisiológico del shunt veno-arterial alveolar agudo; sin embargo, no suma ningún punto estadístico como variable clínica bruta autorizada conformante del panel predictivo clásico estandarizado universal de Wells.",
        source: "IMSS-425-18 RR, Trombosis Venosa y Tromboembolia Pulmonar, 2018, Anexos, Cuadro 9, Página 44."
    },
    {
        id: 176,
        question: "Durante el interrogatorio dermatológico dirigido a una paciente femenina que debuta con un cuadro agudo y pruriginoso de eccema alérgico localizado primariamente en los márgenes de ambos párpados oculares y región malar, la guía establece investigar el contacto reciente de forma ectópica con un producto estético distal muy patognomónico. ¿De cuál producto se trata?",
        options: ["Sales de aluminio en desodorantes axilares", "Esmaltes de uñas y sus derivados acrílicos", "Tinte rubio oxidativo o blanqueadores de peróxido", "Champú con sulfatos pesados y anticaspa"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Dermatitis de Contacto, el área periorbital tiene la piel más delgada y reactiva del cuerpo, haciéndola susceptible a irritantes y contactantes transportados por las manos inconscientemente durante el parpadeo y rascado diario de la persona afectada. La normativa clínica y el listado de sospechas obligan textualmente al explorador del consultorio: \"Si su rash es en la cara y/o párpados especifique el uso de: Cosméticos... Esmalte de uñas/cosméticos de uñas\", ya que la resina de toluensulfonamida / formaldehído de los barnices se evapora o transfiere mediante contacto directo por la frotación mecánica facial, manifestándose eccematosamente en el rostro sin dañar la gruesa piel digital periungueal queratinizada inicial inmunológicamente resistente.<br><br>Perla ENARM: Interrogatorio de Dermatitis de Contacto: Si su rash es en la cara y/o párpados especifique el uso de: Esmalte de uñas/cosméticos de uñas.<br><br>Análisis de Distractores: A) Los desodorantes y clorhidratos axilares en solución acuosa provocan dermatitis eccematosas ocluidas predominantemente intertriginosas y sudoríparas locales friccionales, careciendo de migración y manifestación oftálmica periorbital típica dominante de los dedos. C y D) Los blanqueadores agresivos dérmicos o capilares y las aminas de tinturas de cabello oscuro condicionan y precipitan inflamación pruriginosa irritativa intensa y costrosa primaria severa confinada a nivel epidérmico retroauricular de las orejas, en el borde de inserción superior tricológico en cuero cabelludo, frente y nuca del paciente, pero rara vez descienden de manera predominante hacia el pliegue cantal.",
        source: "IMSS-560-12 RR, Dermatitis de Contacto, 2012, Anexos, Cuestionario Específico, Página 57."
    },
    {
        id: 177,
        question: "En un paciente adulto cursando el sexto mes posterior a un Evento Vascular Cerebral isquémico, se estipula la rehabilitación física mediante programas de entrenamiento aeróbico. Para favorecer la remodelación de la capacidad cardiopulmonar de forma paulatina y segura sin causar fatiga extrema, ¿qué intensidad inicial basada en la reserva de frecuencia cardíaca indica la GPC?",
        options: ["De un 80 a 90%", "De un 40 a 60%", "De un 20 a 30%", "Al 100% rítmicamente en periodos cortos"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación Post-EVC, la prescripción de ejercicio en el daño cerebral exige metas hemodinámicas meticulosas y paulatinas debido al desacondicionamiento crónico central y periférico paretico grave del enfermo. La indicación protocolizada rige: \"Se recomienda que la rehabilitación... integre programas de entrenamiento combinado (aeróbico y resistencia), con intensidad inicial de 40-60% de la reserva de frecuencia cardiaca\", elevándola progresivamente para no colapsar la oxigenación miocárdica de rescate residual precaria y evitar caídas sincopeadas isquémicas del adulto mayor fragilizado.<br><br>Perla ENARM: Se recomienda que la rehabilitación después de un EVC integre entrenamiento combinado... con intensidad inicial de 40-60% de la reserva de frecuencia cardiaca y del 50-70% de 1RM.<br><br>Análisis de Distractores: A) Las demandas taquicárdicas crónicas anaeróbicas altas extenuantes ubicadas entre los márgenes y picos del 80 a 90% conforman el umbral exigente y severo de acondicionamiento de alta intensidad (Hit), indicado biológicamente de forma tardía a seis meses si el objetivo final ya es \"mejorar la marcha atlética avanzada\", pero letal e inseguro como \"intensidad inicial de enganche primario\" basal hospitalario. C) Pautar de forma infrautilizada dosis de 20 a 30% de la frecuencia submáxima, confiere un esfuerzo pasivo equivalente llanamente al reposo biomecánico, resultando ineficaz clínicamente y deficiente como estímulo terapéutico inductor de estrés biológico para mejorar la tasa metabólica cardiopulmonar curativa celular del miocardio deprimido. D) Trabajar repetitivamente a máxima capacidad anaerobia o 100% arrastraría el consumo masivo de oxígeno coronario al límite mortal miocárdico en un senecto comórbido vascular.",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos Post-EVC, 2021, Recomendaciones, Página 6."
    },
    {
        id: 178,
        question: "Al evaluar clínicamente y estratificar los antecedentes en un paciente pediátrico masculino de 10 años que debuta recientemente con Trombocitopenia Inmune Primaria (TIP), ¿qué factor biológico orienta estadísticamente hacia una alta probabilidad patológica de evolucionar a la \"Cronicidad\" de la enfermedad?",
        options: ["Existencia previa documentada y reciente de un evento infeccioso febril exantemático agudo o bacteriano en vías aéreas", "Cuenta de plaquetas marcadamente depletada e inferior a los 10,000 milímetros cúbicos (10x10^9/L) en la biometría hemática en urgencias", "Presencia positiva persistente de Anticuerpos Antinucleares (AAN) en suero sanguíneo periférico", "Sexo biológico masculino de la infancia media pediátrica del paciente afectado"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Trombocitopenia Inmune Primaria, existen características clínicas al debut que dictaminan de manera certera el fallo de la remisión natural y prolongan la destrucción plaquetaria periférica en el bazo por más de 12 meses (Cronicidad). El texto establece la \"Recomendación Clave\" incondicional listando como pronóstico oscuro la carencia de disparador e inmunodesregulación intrínseca: \"femenino, edad >8 años, ausencia de infección o sin vacunación poco antes de la presentación..., y/o presencia de AAN (Anticuerpos Antinucleares) positivos\".<br><br>Perla ENARM: Se recomienda considerar como factores de alto riesgo para evolucionar hacia la cronicidad: femenino, >8 años... ausencia de infección o vacunación, cuenta plaquetaria >10x109/L al diagnóstico, y/o presencia de AAN positivos.<br><br>Análisis de Distractores: A) La Púrpura Trombocitopénica pediátrica autolimitada clásica (aguda transitoria favorable y de curación total de la médula) suele y acostumbra invariablemente debutar semanas después y en cascada inmunológica cruzada secundaria como reacción pasajera precipitada francamente por una infección aguda viral o aplicación exógena toxoide de vacunación biológica foránea reciente. B) Los recuentos muy depletados masivos agresivos y aparatosos asustantes que asientan severamente en niveles críticos francos de plaquetas <10,000 en el primer mes no auguran un curso fatal crónico longitudinal de por vida en niños; paradójicamente las cuentas de debut indolentes sostenidas menos escandalosas y poco severas (>10,000 o >10x10^9/L) se correlacionan biológicamente a persistencia inflamatoria silente e insidiosa. D) El sexo femenino (por la dominancia hormonal poligénica asociada a disautoinmunidad linfoide natural de la mujer adolescente), y no el sexo masculino referenciado, constituye el factor de riesgo y estadístico formal primario para transicionar el cuadro purpúrico hacia una larga refractariedad sistémica persistente crónica sin fin en la tabla.",
        source: "IMSS-143-19 RR, Diagnóstico y Tratamiento de Trombocitopenia Inmune Primaria, 2019, Pronóstico, Página 17."
    },
    {
        id: 179,
        question: "Durante la consulta de escrutinio psicomotor pediátrico en el control y evaluación de la medicina de nivel primario, un infante sano muestra desarrollo biomecánico congruente con su peso. Según la estandarización cronológica neurológica normativa mexicana, ¿a partir de qué margen de edad biológica es esperado que este lactante alcance el hito muscular maduro de \"voltearse sobre su propio eje de supino a prono y viceversa\"?",
        options: ["A los 3 meses redondos", "Entre los 5 y 6 meses de edad", "A los 2 meses cumplidos iníciales", "Entre los 8 y 9 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Alteraciones del Neurodesarrollo y Estimulación Temprana, el desarrollo kinesiológico tensional antigravitacional descendente permite al infante liberarse de la base de la cuna rotando el torque biomecánico y pélvico. La directriz cronológica para este hito grueso (\"Volteo: Se voltea de supino a prono o de prono a supino\") está fijada y es evaluable en parámetros fisiológicos sanos de neuroeje de motoneurona central \"normal a los 5-6 meses\" cronológicos.<br><br>Perla ENARM: Cuadro Hitos motores. Volteo: Se da la vuelta hacia un lado (normal a los 4 m). Se voltea de supino a prono o de prono a supino (normal a los 5-6 m).<br><br>Análisis de Distractores: A y C) Edades precoces anatómicas primarias de 2 a 3 meses se asocian llanamente y de manera exclusiva al sostén firme antigravitacional e inicial de la cabeza y control de la cintura escapular cervical pasiva sentada en el regazo, pero sin fuerza abdominal torcional cinética en bloque. D) Los 8 a 9 meses sobrepasan peligrosamente el hito básico dictaminado del decúbito, conformando ya el preámbulo para estadios neurológicos motores superiores como la deambulación rastrera ventral militar abdominal o arrastre precoz y giros sedentes dinámicos.",
        source: "DIF-332-18 RR, Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Cuadro de Hitos Motores, Página 10."
    },
    {
        id: 180,
        question: "Un paciente adulto masculino es atendido y acude al servicio clínico cardiológico cursando ya la cuarta semana posterior a un cuadro masivo inicial transmural de Infarto Agudo de Miocardio (IAMCEST). Inicia de forma atípica un nuevo dolor punzante en el tórax que empeora a la inspiración profunda severa, con elevación difusa cóncava del segmento ST en todo el trazo de doce derivaciones e indicios de frote inflamatorio auscultable, dictándose diagnóstico clínico nosológico del Síndrome de Dressler. ¿Qué grupo o vía farmacológica se encuentra estricta y rígidamente proscrita o contraindicada de manera absoluta por la pauta en este escenario post-isquémico inmediato en México?",
        options: ["Colchicina biológica preventiva a dosis plenas divididas empíricas", "Ácido acetilsalicílico de origen purificado (Aspirina cardiológica basal)", "Corticosteroides sistémicos inmunomoduladores y AINEs comunes desinflamatorios", "Antibióticos betalactámicos profilácticos sistémicos macrólidos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio con Elevación del Segmento ST, la Pericarditis Tardía inmunológica e inflamatoria cruzada antimiocárdica post-lesional severa (Síndrome de Dressler) es una reacción cicatricial estéril dolorosa pleural-pericárdica frecuente. Su protocolo de resolución dicta el uso mandatario inicial hemostático con \"Ácido acetilsalicílico y, si no hay respuesta, se añade colchicina\". Sin embargo, la advertencia negra capital en letra sostenida mayúscula en el esquema de complicaciones instruye que \"NUNCA se utilizan AINE's ni esteroides en la pericarditis asociada a infarto de miocardio\", debido a que retardan profundamente y rompen la migración y la cicatrización estructural densa macrofágica fibrosa ventricular remanente en reparación biológica temprana, facilitando o precipitando el desgarro letal transmural fulminante subsecuente de la pared delgada isquémica infartada.<br><br>Perla ENARM: Cuadro Complicaciones IAM: Pericarditis tardía (Síndrome de Dressler). Tratamiento: ácido acetilsalicílico y, si no hay respuesta, se añade colchicina. NUNCA se utilizan AINE´s ni esteroides en la pericarditis asociada a infarto de miocardio.<br><br>Análisis de Distractores: A) La adición progresiva resolutiva del metabolito extraído mitótico antiinflamatorio \"Colchicina\" (cuyo beneficio es evitar la migración neutrofílica agresiva en placa estéril a tejidos coronarios residuales) está indicada en primera instancia y aconsejada positivamente siempre que exista dolor persistente refractario refractario y fallido a las primeras dosis simples del analgésico primario de elección. B) La Aspirina u Ácido acetilsalicílico es por estatuto cardiológico y de consenso primario y unánime el fármaco y pilar analgésico basal inicial resolutivo de salvataje que arranca siempre el manejo hemostático del síndrome pleural inflamatorio subyacente. D) Las moléculas antibióticas o macrólidos profilácticos (amoxicilina u otros espectros purulentos) no intervienen, interfieren ni figuran en este esquema nosológico antígeno-cruzado, ya que el síndrome de Dressler responde a autoinmunidad isquémica franca celular propia de los cardiomiocitos libres necróticos, no a bacterias bacterémicas latentes intraluminales.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Complicaciones, Página 31."
    },
    {
        id: 181,
        question: "En el contexto del Manejo Hemático del Paciente (PBM) para un individuo hospitalizado en el servicio de Neurocirugía que presenta anemia aguda postoperatoria, ¿qué nivel de hemoglobina sérica establece la indicación absoluta donde \"la transfusión es apropiada\"?",
        options: ["Menor a 7 g/dL", "Menor a 9 g/dL", "Menor a 10 g/dL", "Menor a 8 g/dL"],
        answer: 0,
        justification: "Justificación: En el paciente neuroquirúrgico, el cerebro requiere una presión de perfusión y oxigenación tisular estricta, pero la sobretransfusión eleva la morbimortalidad. De acuerdo a la GPC de Manejo Hemático de Paciente, los umbrales transfusionales están tabulados rígidamente por especialidad. En el rubro \"Neuroquirúrgico\", la guía decreta de manera ineludible que frente a una hemoglobina \"Menor de 70 g/L (7 g/dL)\", la intervención con concentrados eritrocitarios es \"Apropiada\". Cifras entre 7 y 8 g/dL entran en la zona de incertidumbre (puede ser apropiada), y por encima de 8 g/dL se considera no requerida.<br><br>Perla ENARM: Cuadro de Indicaciones Transfusionales. Paciente Neuroquirúrgico: Hb menor de 70 g/L (7 g/dL) -> La transfusión es apropiada.<br><br>Análisis de Distractores: B y D) Con hemoglobina de 8 o 9 g/dL, el estado transfusional en el tabulador neuroquirúrgico transita hacia \"La transfusión puede ser no requerida\" (dependiendo de la clínica), perdiendo el carácter de intervención apropiada categórica. C) Transfundir eritrocitos en un paciente neuroquirúrgico con niveles de hemoglobina que rondan los 10 g/dL o superiores se considera una práctica \"Inapropiada\", incrementando el riesgo de daño pulmonar (TRALI) sin beneficio isquémico.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Anexos, Cuadro Transfusional, Página 89."
    },
    {
        id: 182,
        question: "En la valoración geriátrica integral comunitaria, se aplica el cuestionario estandarizado SARC-F para el tamizaje clínico de sarcopenia. ¿A partir de qué puntuación total acumulada se considera un resultado predictivo positivo y de alto riesgo en el adulto mayor?",
        options: ["Mayor o igual a 2 puntos", "Mayor o igual a 6 puntos", "Mayor o igual a 4 puntos", "Mayor o igual a 8 puntos"],
        answer: 2,
        justification: "Justificación: La sarcopenia condiciona fragilidad, caídas y muerte. El escrutinio rápido se efectúa mediante la escala SARC-F (que evalúa fuerza, asistencia para caminar, levantarse de una silla, subir escaleras y caídas). De acuerdo a la GPC de Valoración Geriátrica Integral, la herramienta califica cada uno de sus 5 dominios con 0, 1 o 2 puntos. La interpretación estandarizada oficial dicta que \"el resultado es positivo cuando la suma de las respuestas es mayor o igual a 4 puntos\", obligando a prescribir entrenamiento de resistencia e ingesta proteica.<br><br>Perla ENARM: Escala SARC-F. INTERPRETACIÓN: El resultado es positivo cuando la suma de las respuestas es mayor o igual a 4 puntos.<br><br>Análisis de Distractores: A) Un puntaje de 2 refleja deficiencias aisladas leves (ej. \"alguna dificultad para subir escaleras\"), pero no reúne el peso estadístico para diagnosticar el síndrome global sarcopénico. B y D) Exigir 6 u 8 puntos retrasa el diagnóstico, limitándolo únicamente a los estadios de invalidez terminal muscular, perdiendo la ventana de intervención nutricional preventiva. El máximo posible de la prueba es 10.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral en Unidades de Atención Médica, 2018, Anexos, Escala SARC-F, Página 25."
    },
    {
        id: 183,
        question: "Durante la aplicación clínica del Mini-Mental State Examination (MMSE) de Folstein, se evalúa el dominio de \"Concentración y Cálculo\" pidiendo al paciente que reste de 7 en 7 a partir del 100. Si el individuo comete un error aritmético a la mitad de la serie, ¿cuál es la conducta estandarizada que debe ejecutar el evaluador?",
        options: ["Detener la prueba, calificar con cero todo el bloque y pasar al siguiente ítem", "Repetir la instrucción completa de \"reste de 7 en 7\" desde el inicio", "Corregirle proporcionando el número correcto y pedirle que continúe", "Anotar el error y permitir que continúe restando desde su cifra equivocada sin intervenir"],
        answer: 2,
        justification: "Justificación: El rigor psicométrico del MMSE no evalúa únicamente la aptitud matemática aislada, sino la retención de la memoria de trabajo sostenida en la corteza prefrontal. De acuerdo a la GPC de Enfermedad de Alzheimer, las instrucciones para este ítem son explícitas y prohibitivas respecto a las ayudas: \"Si la persona contesta en forma incorrecta se calificará con 0 [ese intento], y se le dará la respuesta correcta para posteriormente pedirle que continúe, pero de ninguna manera se tendrá que repetir la instrucción de restar de 7 en 7\".<br><br>Perla ENARM: MMSE Instrucciones: Si se equivoca, deberá corregirlo y decirle el número correcto, y pedirle “por favor continúe”, pero NUNCA decirle que debe continuar restando de 7 en 7.<br><br>Análisis de Distractores: A) Detener la prueba anula la oportunidad de evaluar los eslabones restantes de la cadena de concentración, violando el diseño de los 5 puntos parciales de la herramienta. B) Repetir la instrucción original (\"reste de 7 en 7\") introduce un facilitador amnésico que borra el esfuerzo de retención de comandos, invalidando el propósito frontal del test. D) Permitir el arrastre del error sin corregir el pivote numérico es una práctica común errónea de algunos clínicos, pero penalizada por la estandarización mexicana, que exige resetear la cifra ancla para evaluar la siguiente resta de manera justa.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Instrucciones MMSE, Página 35."
    },
    {
        id: 184,
        question: "En un paciente adulto cursando con dermatitis de contacto irritativa en las manos por su labor en un entorno de lavado industrial, ¿cuál es el tiempo máximo continuo de uso recomendado por la guía para portar guantes de hule (plástico) sin exacerbar la maceración del estrato córneo?",
        options: ["De 60 a 90 minutos", "De 15 a 20 minutos", "De 30 a 45 minutos", "De 5 a 10 minutos"],
        answer: 1,
        justification: "Justificación: El uso prolongado de polímeros impermeables sobre la piel induce hiperhidrosis oclusiva, alterando el pH ácido y macerando las uniones intercelulares, lo que agrava dramáticamente el eccema de contacto subyacente. De acuerdo a la GPC de Dermatitis de Contacto, en la Hoja de Cuidados de Manos, se instruye rigurosamente al trabajador: \"Si el trabajo de sus manos es en un medio húmedo... no debe usar guantes de hule (plástico) en forma continua por más de 15 a 20 minutos\". Tras este lapso, el paciente debe retirar, secar y sustituir por guantes secos.<br><br>Perla ENARM: Hoja de cuidado de manos: 8. Si el trabajo de sus manos es en un medio húmedo, no debe usar guantes de hule por más de 15 a 20 minutos en forma continua.<br><br>Análisis de Distractores: A y C) Periodos de 30, 60 o 90 minutos de oclusión total garantizan la retención de sudor ecrino, la proliferación de dermatofitos y la maceración de las fisuras eccematosas, contrariando la profilaxis dermatológica. D) Limitaciones menores a 10 minutos resultan operativamente irreales e imprácticas para cualquier jornada laboral industrial, impidiendo el cumplimiento básico de las tareas.",
        source: "IMSS-560-12 RR, Dermatitis de Contacto, 2012, Anexos, Cuadro 6, Página 56."
    },
    {
        id: 185,
        question: "Como parte de la iniciativa estandarizada del \"Hospital Amigo del Niño y de la Madre\" promovida tras el parto vaginal sin complicaciones, ¿cuál es el tiempo mínimo establecido que el recién nacido sano debe permanecer en contacto directo piel a piel con su madre inmediatamente después del alumbramiento?",
        options: ["Al menos 15 minutos", "Al menos 60 minutos", "Al menos 30 minutos", "Al menos 120 minutos"],
        answer: 1,
        justification: "Justificación: El contacto inmediato fomento el apego, estabiliza la termorregulación neonatal, coloniza al lactante con el microbioma materno sano y desencadena los reflejos de búsqueda y succión efectivos. De acuerdo a la GPC de Cuidados del Recién Nacido Sano, la tabla de los \"Diez pasos del hospital amigo\" estipula en su paso número 4 como mandato imperativo asistencial: \"Colocar a los bebes en contacto piel a piel inmediatamente después del parto y por al menos una hora\". Durante este lapso ininterrumpido se debe alentar a la madre a iniciar la lactancia.<br><br>Perla ENARM: Cuadro 4. Diez pasos del hospital amigo: Paso 4. Colocar a los bebes en contacto piel a piel inmediatamente después del parto y por al menos una hora.<br><br>Análisis de Distractores: A y C) Lapsos breves de 15 a 30 minutos cortan abruptamente la primera fase de alerta tranquila del neonato, impidiendo que escale por sí mismo hacia el pecho para el enganche fisiológico espontáneo (breast crawl). D) Si bien 120 minutos son biológicamente ideales, el dintel normativo de exigencia basal estandarizado para acreditar la práctica institucional amigable está fijado en \"al menos una hora\".",
        source: "SS-226-20 RR, Cuidados del Recién Nacido de Término, 2020, Anexos, Cuadro 4, Página 13."
    },
    {
        id: 186,
        question: "Ante un paciente adulto diagnosticado con Enfermedad de Von Willebrand \"Tipo 3\" que va a ser sometido a una cirugía mayor o cursa con una hemorragia intracraneal grave, ¿cuál es la terapia farmacológica profiláctica o de rescate incondicional de primera línea en el algoritmo?",
        options: ["Desmopresina (DDAVP) endovenosa en infusión continua", "Concentrados liofilizados de FVIII y Factor de Von Willebrand", "Inmunoglobulina G intravenosa a altas dosis", "Transfusión exclusiva de plasma fresco congelado"],
        answer: 1,
        justification: "Justificación: El \"Tipo 3\" de la Enfermedad de Von Willebrand representa la deficiencia cuantitativa absoluta y total del factor en el endotelio, por lo que los estimulantes de liberación endógena resultan completamente inútiles. De acuerdo a la GPC de Tratamiento de Hemofilia (que incluye a Von Willebrand), el algoritmo dicta que frente a una hemorragia grave en un fenotipo Tipo 3, la única terapia sustitutiva vital capaz de puentear la adhesión plaquetaria y estabilizar la cascada es la infusión directa de \"Concentrados de Factor VIII ricos en Factor de Von Willebrand (CFC-FVIII/FVW)\".<br><br>Perla ENARM: Algoritmo de Terapéutica. Hemorragias graves/cirugía mayor en EVW Tipo 3 -> CFC-FVIII/FVW.<br><br>Análisis de Distractores: A) La Desmopresina (DDAVP) provoca la exocitosis de las reservas de Von Willebrand de los cuerpos de Weibel-Palade; al carecer el paciente Tipo 3 de dichas reservas genéticas, el fármaco carece de sustrato y está formalmente contraindicado por ineficaz. C) La Inmunoglobulina es el tratamiento de rescate para disautoinmunidades destructivas (como la Trombocitopenia Inmune), no para las ausencias congénitas de proteínas hemostáticas de adhesión. D) El plasma fresco posee cantidades diluidas de los factores, exponiendo al paciente a sobrecargas masivas de volumen y riesgo viral sin alcanzar los picos hemostáticos rápidos que brindan los concentrados purificados o recombinantes específicos.",
        source: "IMSS-408-10 RR, Diagnóstico y Tratamiento de Hemofilia, 2010, Algoritmos, Página 41."
    },
    {
        id: 187,
        question: "En el programa de rehabilitación integral para un paciente que cursa con un episodio de dolor lumbar inespecífico agudo, el médico decide prescribir el uso simultáneo de electroterapia (TENS) y compresas húmedo-calientes. ¿Cuál es el objetivo clínico primario y exclusivo de esta intervención física superficial previa a la sesión motora?",
        options: ["Generar hipertrofia reactiva de la musculatura paravertebral", "Detener la progresión degenerativa del disco intervertebral", "Proporcionar un efecto analgésico inmediato previo al ejercicio terapéutico", "Corregir la estenosis ósea foraminal del canal medular"],
        answer: 2,
        justification: "Justificación: Las modalidades físicas pasivas carecen de la capacidad de regenerar el tejido por sí solas, pero abren una ventana de tolerancia biomecánica. De acuerdo a la GPC de Dolor Lumbar Inespecífico, la termoterapia y las corrientes no son curativas de la patología basal. Su prescripción clínica tiene un mandato específico y limitado: \"La aplicación TENS, corrientes interferenciales o compresa húmedo caliente debe tener como objetivo proporcionar un efecto analgésico inmediato, previo a la realización de ejercicio terapéutico\", facilitando así la participación del paciente en la kinesioterapia activa que es la que realmente remodela el núcleo lumbosacro.<br><br>Perla ENARM: La aplicación TENS, corrientes interferenciales o compresa húmedo caliente debe tener como objetivo proporcionar un efecto analgésico inmediato, previo a la realización de ejercicio terapéutico.<br><br>Análisis de Distractores: A) La hipertrofia muscular y el refuerzo del core se obtienen invariablemente a través de la tensión isométrica e isotónica del ejercicio volitivo activo (Pilates, estabilización), jamás deponiendo corriente en la piel de forma pasiva. B y D) El desgaste del anillo fibroso discal y la calcificación foraminal de la estenosis son procesos anatómicos crónicos intrínsecos de la columna que no se detienen, lisan ni revierten biológicamente con la imposición externa superficial de calor o electrodos cutáneos.",
        source: "DIF-313-19 RR, Rehabilitación del Dolor Lumbar Inespecífico, 2019, Intervenciones Físicas, Página 5."
    },
    {
        id: 188,
        question: "Al recibir la biopsia de tejido prostático de un paciente masculino de 70 años, el reporte oncológico cataloga el tumor dentro del \"Grupo de Grado 4\" según el consenso de la Sociedad Internacional de Patología Urológica (ISUP). ¿A qué puntaje sumario en la escala tradicional de Gleason equivale estrictamente esta categoría histológica?",
        options: ["Grado 6 (3+3)", "Grado 7 (3+4)", "Grado 8 (4+4, 3+5, o 5+3)", "Grado 9 o 10 (4+5 o 5+5)"],
        answer: 2,
        justification: "Justificación: La homologación del pronóstico oncológico urológico busca un lenguaje claro para el riesgo de diseminación. De acuerdo a la GPC de Cáncer de Próstata, el ISUP (del 1 al 5) destierra la falsa seguridad. El \"Grupo 4\" agrupa a neoplasias de alta agresividad y pobre diferenciación glandular. De forma inamovible en el Cuadro 10, la arquitectura que recae en este escalón conforma a aquellos tumores cuya sumatoria celular primaria y secundaria arroja matemáticamente un \"Grado 8\", ya sean patrones dominantes 4+4, o las raras variantes 3+5 y 5+3.<br><br>Perla ENARM: Cuadro 10. Sistema ISUP. Grupo y grado 4 -> Patrón y escala de Gleason: Grado 8 (4 + 4, 3 + 5, o 5 + 3).<br><br>Análisis de Distractores: A) El Grado 6 es el adenocarcinoma más benévolo y bien conformado posible a nivel diagnóstico (Grupo ISUP 1). B) El Grado 7 con dominancia morfológica del 3 (3+4) define el riesgo intermedio favorable confiriendo el Grupo ISUP 2. D) El Grado de 9 a 10 marca el colapso histológico anaplásico total, conformando el estadio terminal Grupo ISUP 5.",
        source: "IMSS-140-18 RR, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Anexos, Cuadro 10, Página 17."
    },
    {
        id: 189,
        question: "En la Unidad de Cuidados Intensivos Neonatales, un lactante prematuro inicia su \"Día 1\" de nutrición enteral mediante plan trófico estandarizado. Según el esquema de progresión progresiva institucional, ¿cuál es el volumen inicial prescrito de leche humana que se debe infundir?",
        options: ["De 40 a 50 mililitros por kilogramo", "De 10 a 20 mililitros por kilogramo", "De 60 a 80 mililitros por kilogramo", "De 5 a 10 mililitros por kilogramo"],
        answer: 1,
        justification: "Justificación: La introducción precoz del alimento en el prematuro estimula la maduración de las microvellosidades intestinales y evita la atrofia mucosa, sin abrumar el riesgo de enterocolitis necrotizante. De acuerdo a la GPC de Manejo de Componentes Sanguíneos (y cuidados anexos neonatales de prematuros referidos en protocolos), el \"Esquema orientativo de la progresión del aporte enteral\" dicta rígidamente que durante las primeras 72 horas (Días 1, 2 y 3), la meta del plan trófico arranca con volúmenes defensivos basales de \"10 a 20 ml LH/kg\" administrados en 6 u 8 tomas o raciones gástricas.<br><br>Perla ENARM: Esquema de progresión del aporte enteral. Día 1. Plan trófico y Aporte Enteral -> 10-20 ml LH/kg en 6 u 8 raciones.<br><br>Análisis de Distractores: A) Los volúmenes de 40 ml/kg representan la primera escalada de nutrición gástrica agresiva que arranca estandarizadamente a partir del cuarto día de vida (Día 4). C) Suministrar de inicio 60 a 80 ml/kg induce estrés osmótico masivo, isquemia mesentérica y estasis en un intestino inmaduro, siendo volúmenes reservados fisiológicamente para el Día 5 o 6. D) Dosis subterapéuticas menores a 10 ml/kg no alcanzan a revestir la pared con IgA ni estimulan la motilidad peristáltica propulsiva biliar necesaria.",
        source: "IMSS-362-18 RR, Manejo de Componentes Sanguíneos (Anexos Pediátricos/Neonatales), 2018, Esquemas, Página 29."
    },
    {
        id: 190,
        question: "De acuerdo a la clasificación MIC (Morfológica, Inmunológica, Citogenética) empleada para tipificar a las Leucemias Agudas en Pediatría, ¿qué alteración cromosómica específica y puntual delinea biológicamente a la variante Mieloide \"M2\" (Leucemia mieloblástica con maduración)?",
        options: ["t(15;17)(q22;q12)", "t(8;21)(q22;q22)", "t(9;22)(q34;q11)", "t(1;22)(p13;q13)"],
        answer: 1,
        justification: "Justificación: Las traslocaciones genéticas definen el pronóstico en la mieloide infantil y los blancos de tratamiento. De acuerdo a la GPC de Leucemias Agudas Pediátricas, el Cuadro 1 \"Sistema MIC\", enlaza la nomenclatura de la clasificación FAB con su cariotipo causal. Se dictamina que el \"Grupo MIC: M2\" que expresa inmunológicamente CD13 y CD33, alberga característicamente la fusión génica originada por la traslocación cromosómica \"t(8;21)(q22;q22)\".<br><br>Perla ENARM: Cuadro 1. Clasificación MIC. Leucemia Aguda Mieloide: Grupo MIC M2 -> Cariotipo: t(8;21)(q22;q22).<br><br>Análisis de Distractores: A) La traslocación t(15;17) genera el gen PML-RARA, siendo el marcador absoluto y definitorio de la leucemia promielocítica de riesgo hemorrágico (M3). C) La alteración t(9;22), o cromosoma Filadelfia (bcr-abl), se asocia abrumadoramente a la leucemia mieloide crónica o como marcador de mal pronóstico ocasional en linfoblásticas agudas y raras LMA M1, no sellando fenotípicamente a la M2. D) La t(1;22) se correlaciona con marcadores plaquetarios y megacariocíticos, definiendo de forma patognomónica a la Leucemia Megacarioblástica Aguda pediátrica (M7).",
        source: "SS-061-08 RR, Diagnóstico Oportuno de Leucemia Aguda en Pediatría, 2008, Anexos, Cuadro 1, Página 66."
    },
    {
        id: 191,
        question: "Durante el escrutinio de polifarmacia y prescripción riesgosa en el paciente anciano, se aplica el protocolo internacional de los \"Criterios START\". ¿Cuál es el objetivo clínico directo que persigue esta herramienta de revisión médica?",
        options: ["Detectar interacciones medicamentosas que generen hepatotoxicidad", "Retirar prescripciones potencialmente inapropiadas o peligrosas", "Llamar la atención del médico sobre tratamientos indicados y apropiados", "Cuantificar la carga anticolinérgica total del paciente senil"],
        answer: 2,
        justification: "Justificación: En la geriatría moderna, la omisión de fármacos beneficiosos por miedo a la edad es tan letal como la sobremedicación. De acuerdo a la GPC de Valoración Geriátrica Integral, los criterios se dividen en dos brazos. Mientras que los criterios STOPP suprimen el peligro, los criterios START (Screening Tool to Alert doctors to Right Treatments) se traducen literalmente y tienen la función protocolizada de \"Llamar la atención del médico sobre tratamientos indicados y apropiados\". Actúan como una lista de verificación proactiva que asegura que el anciano con enfermedades específicas sí esté recibiendo los fármacos protectores que merece por derecho de morbilidad (ej. estatinas post-infarto, calcio en osteoporosis).<br><br>Perla ENARM: Cuadro 10B. Criterios START: Screening Tool to Alert doctors to Right Treatments (Herramienta para llamar la atención del médico sobre tratamientos indicados y apropiados).<br><br>Análisis de Distractores: A y D) Las interacciones tóxicas o la carga de anticolinérgicos se evalúan mediante farmacocinética general o calculadoras de riesgo (Anticholinergic Burden Scale), pero no es la definición semántica y operativa primaria estructurada que da origen al acrónimo de la tabla START. B) La detección y supresión activa de medicamentos inapropiados, caducos o de alto riesgo biológico para la senectud conforma enteramente el objetivo clínico y definición de la contraparte restrictiva de la herramienta: los criterios \"STOPP\".",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral, 2018, Anexos, Cuadro 10B, Página 24."
    },
    {
        id: 192,
        question: "En la atención de urgencias obstétricas, el algoritmo del protocolo de Manejo Hemático del Paciente (PBM) se activa ante la presencia de un choque hemorrágico grave postparto. ¿Qué volumen de pérdida sanguínea uterina define normativamente y de forma aguda la Hemorragia Postparto \"Grave\" por vía vaginal?",
        options: ["Pérdida mayor a 500 mililitros", "Pérdida mayor a 1,500 mililitros", "Pérdida mayor a 1,000 mililitros", "Pérdida mayor a 2,000 mililitros"],
        answer: 1,
        justification: "Justificación: La obstetricia tolera ciertas pérdidas fisiológicas, pero la dilatación del lecho espiral puede desangrar a una mujer en minutos. De acuerdo a la GPC de Optimización de la Sangre (PBM), el diagrama \"Algoritmo 5. Utilización de ROTEM y manejo de la hemorragia post parto\" divide el abordaje y dictamina que el flujo grave y catastrófico que dispara todo el pool viscoelástico y transfusional directo de rescate (ácido tranexámico y fibrinógenos) se denomina \"Algoritmo HPP vaginal grave\" de manera exclusiva y estricta cuando existe una \"Perdida > 1500 ml\".<br><br>Perla ENARM: Algoritmo 5. Manejo de hemorragia post parto: Algoritmo HPP vaginal grave -> Perdida > 1500 ml.<br><br>Análisis de Distractores: A) La pérdida mayor a 500 ml establece la definición técnica clásica y obstétrica basal de una Hemorragia Postparto (HPP) simple, requiriendo uterotónicos (oxitocina) o masaje, pero no la clasifica algorítmicamente en la gravedad extrema de choque del PBM. C) El sangrado de 1,000 mililitros tipifica el umbral límite anatómico clásico para la HPP generada en la herida quirúrgica de una incisión por operación Cesárea, no el volumen de choque crítico vaginal. D) Esperar a perder >2,000 ml representa un colapso exsanguinante irrecuperable (Clase IV), superando por 500 ml el punto de corte fisiológico donde el protocolo exige prender la alarma roja y cruzar hemoderivados.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 5, Página 86."
    },
    {
        id: 193,
        question: "En la evaluación integral del estado de salud mental post-infarto cerebral del paciente en rehabilitación, se ejecuta la Escala de Montgomery-Asberg (MADRS). El Ítem número 8 evalúa la \"Incapacidad para sentir\". ¿Qué situación clínica o emocional se puntúa y se correlaciona con este rubro específico en el adulto mayor?",
        options: ["Sentimientos pesimistas de ruina económica o culpa moral por el evento isquémico", "Experiencia subjetiva de un menor interés por el entorno o por actividades placenteras", "Manifestación visible y facial de llanto incontrolable durante la entrevista médica", "Dificultad generalizada para mantener el hilo de las conversaciones"],
        answer: 1,
        justification: "Justificación: La depresión vascular se manifiesta frecuentemente como una desconexión anhedónica pura, perdiendo resonancia afectiva ante los estímulos familiares. De acuerdo a la GPC de Rehabilitación Post-EVC, la Escala MADRS define escrupulosamente sus dominios de afección. El \"Ítem 8. Incapacidad para sentir\" está conceptualizado textualmente para evaluar y cuantificar la \"experiencia subjetiva de un menor interés por el entorno o por actividades que habitualmente dan placer\", así como la merma biológica para \"reaccionar con la emoción adecuada a las circunstancias o personas\", graduando al paciente desde el interés normal hasta la parálisis emocional absoluta.<br><br>Perla ENARM: Escala MADRS. 8. Incapacidad para sentir: Representa la experiencia subjetiva de un menor interés por el entorno o por actividades que habitualmente dan placer. La capacidad para reaccionar con la emoción adecuada a las circunstancias o personas se ve reducida.<br><br>Análisis de Distractores: A) Los delirios de inferioridad, los autorreproches dolorosos y el convencimiento tenaz e irracional de fracaso y ruina se escrutan y evalúan exclusivamente en el apartado subsecuente del test, el \"Ítem 9. Pensamientos pesimistas\". C) El abatimiento facial evidente, la desesperación fisionómica o el llanto a flor de piel que nota el examinador recaen clínicamente en el constructo de la \"Tristeza observada\", correspondiente al inicio evaluativo (Ítem 1). D) La labilidad atencional y el colapso ejecutivo para sostener el enfoque analítico durante la charla se documentan en el \"Ítem 6. Dificultades para concentrarse\".",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos Post-EVC, 2021, Anexos, Escala MADRS, Página 37."
    },
    {
        id: 194,
        question: "Para calcular el riesgo de fractura por fragilidad a 10 años utilizando el modelo probabilístico internacional FRAX avalado para la población mexicana, el clínico debe interrogar hábitos de consumo tóxicos diarios. ¿Cuál es el gramaje estandarizado de alcohol que define y equivale a \"1 dosis\" dentro del cuestionario?",
        options: ["8 a 10 gramos de alcohol", "25 a 30 gramos de alcohol", "2 a 5 gramos de alcohol", "15 a 20 gramos de alcohol"],
        answer: 0,
        justification: "Justificación: El etanol inhibe la función osteoblástica y es un factor independiente para la descalcificación trabecular si se consume de manera pesada. De acuerdo a la GPC de Prevención y Tratamiento de la Osteoporosis, el ítem número 7 del panel interrogativo y de riesgo clínico del formato FRAX indaga: \"¿Toma 3 o más dosis diarias de alcohol?\". Para evitar la ambigüedad o subestimación por parte del paciente, la directriz define y estandariza estrictamente que biológicamente \"(1 dosis equivale a 8-10 gramos de alcohol)\", que corresponde pragmáticamente en el consultorio a beber una caña de cerveza de 285 cc, o una copa de vino mediano. Tres de estas dosis continuas restan protección densitométrica.<br><br>Perla ENARM: Cuestionario FRAX. Pregunta 7. ¿Toma 3 o más dosis diarias de alcohol? (1 dosis equivale a 8-10 gramos de alcohol).<br><br>Análisis de Distractores: B y D) Gramajes amplios o industriales equivalentes a los 20 o 30 gramos por bebida sobredimensionan el volumen de ingesta hepatotóxico o etílico, arruinando el escrutinio sensible del test óseo y arrojando falsos negativos si el paciente cree que bebe \"poco\". C) Cifras residuales de 2 a 5 gramos equivalen a tinturas mínimas, careciendo del peso metabólico farmacocinético pernicioso para inducir una toxicidad supresora real evaluable contra las unidades formadoras del hueso humano.",
        source: "IMSS-673-18 RR, Prevención y Tratamiento de la Osteoporosis, 2018, Anexos, Cuestionario FRAX, Página 61."
    },
    {
        id: 195,
        question: "Al detectar en el consultorio pediátrico que un lactante presenta problemas de succión, sangrado repetitivo bucal y dolor severo referido en el pezón materno durante el amamantamiento, se documenta la existencia física de una \"anquiloglosia\". De acuerdo a la recomendación estricta de la guía, ¿qué especialista es el facultado y entrenado obligadamente para realizar la liberación o frenectomía?",
        options: ["Médico familiar del primer nivel de atención", "Pediatra neonatólogo adscrito a cuidados intensivos", "Otorrinolaringólogo pediatra", "Odontólogo general o cirujano maxilofacial básico"],
        answer: 2,
        justification: "Justificación: El frenillo lingual corto o anquiloglosia atrapa la punta de la lengua en el piso de la boca, arruinando el sello de vacío del lactante sobre la areola, lo que culmina en desnutrición y abandono de la lactancia. De acuerdo a la GPC de Lactancia Materna, el abordaje terapéutico exige un alto grado de destreza micro-anatómica debido a los vasos profundos del plexo sublingual infantil. La \"Recomendación Clave\" estipula: \"Realizar frenotomía, frenuloplastia o frenectomía en niños con anquiloglosia por un otorrinolaringólogo pediatra... No se debe realizar el procedimiento por médicos no entrenados, ya que los intentos de liberación podrían dar lugar a complicaciones potencialmente mortales\" (hemorragias asfixiantes).<br><br>Perla ENARM: Realizar frenotomía, frenuloplastia o frenectomía en niños con anquiloglosia por un otorrinolaringólogo pediatra... No se debe realizar por médicos no entrenados.<br><br>Análisis de Distractores: A, B y D) Aunque otros médicos (pediatras, dentistas o familiares) son indispensables para la sospecha, el diagnóstico y el tamizaje oportuno en sus respectivas consultas de niño sano, la GPC restringe explícita y taxativamente la ejecución incisiva cruenta o ablación quirúrgica biológica del lecho vascular de la base de la lengua al adiestramiento fino exclusivo de la \"otorrinolaringología pediátrica\", penalizando su práctica indiscriminada.",
        source: "IMSS-704-18 RR, Lactancia Materna con Alteraciones, 2018, Recomendaciones Clave, Página 63."
    },
    {
        id: 196,
        question: "En la unidad de choque ingresa un paciente cursando con una hemorragia mayor difusa y trauma que demanda intervención quirúrgica de urgencia. En sus antecedentes se documenta que el enfermo toma habitualmente el anticoagulante oral \"Acenocumarina\" (Antagonista de Vitamina K). De acuerdo al protocolo PBM, ¿cuál es el agente terapéutico de primera línea para la reversión enzimática aguda inmediata in vivo de este fármaco?",
        options: ["Anticuerpo monoclonal Idarucizumab a dosis fija", "Complejo Protrombínico de 4 factores a dosis de 25 a 50 UI/kg", "Plasma Fresco Congelado en infusión veloz de cristaloides", "Fibrinógeno liofilizado sintético masivo a 50 mg/kg"],
        answer: 1,
        justification: "Justificación: La inhibición crónica por antagonistas de la vitamina K (Warfarina o Acenocumarina) agota los factores procoagulantes II, VII, IX y X. Frente a un lecho sangrante crítico, la restitución debe ser en volumen exiguo y concentración máxima. De acuerdo a la GPC de Optimización de la Sangre (PBM), la reversión aguda en urgencias decreta contundentemente la sustitución factor-por-factor. El algoritmo instruye que ante toxicidad dicumarínica, la \"1a elección [es] CCP4f (Complejo Protrombínico de 4 factores) a dosis de 25 a 50 UI de factor IX o de 10 a 15 ml por kilo de peso\". Este concentrado asienta en minutos el tapón sin diluir la masa celular.<br><br>Perla ENARM: Reversión de hemorragia por anticoagulación: 1ª elección: CCP4f a dosis de 25 a 50 UI de factor IX EN ANTIK (Antagonistas de Vitamina K).<br><br>Análisis de Distractores: A) El anticuerpo monoclonal idarucizumab funciona como un antídoto biológico neutralizante altamente específico que carece de cruzamiento con la warfarina y está restringido a inhibir o quelar letalmente de manera exclusiva la molécula sintética de Dabigatrán en la sangre circulante. C) El Plasma Fresco Congelado restituye factores globales, pero posee concentraciones débiles procoagulantes acompañadas de un volumen dilucional agresivo. El algoritmo actual del PBM lo relega y cataloga explícitamente y de manera punitiva como recurso subóptimo tardío o \"3ª elección PFC\". D) El Fibrinógeno liofilizado restaura únicamente la carencia estructural de monómeros para los hilos del coágulo fibrilar final (hipofibrinogenemia o A5FIB<12mm en el ROTEM), pero no soluciona el bloqueo en cascada trombínico previo generado en los factores vitamina K dependientes iniciales.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 5, Página 88."
    },
    {
        id: 197,
        question: "En la consulta de desarrollo infantil se aplica la prueba estandarizada y referida del \"Inventario de Desarrollo Battelle de 2a edición\". De acuerdo a la estructuración metodológica, ¿cuáles son los dos sub-dominios específicos de aprendizaje humano que conforman al pilar general \"Cognitivo\"?",
        options: ["Interacción social con adultos y autoconcepto biológico", "Capacidad de autocuidado y limpieza personal", "Lenguaje expresivo verbal y lenguaje receptivo auditivo", "Atención y memoria, junto con Razonamiento y Habilidades Académicas"],
        answer: 3,
        justification: "Justificación: El neurodesarrollo fracciona sus evaluaciones para no ocultar déficits parciales en niños que aparentan normalidad asimétrica. De acuerdo a la GPC de Evaluación de Menores de 5 Años, el Inventario de Battelle es la piedra angular del escrutinio confirmatorio avanzado. Esta herramienta disgrega exhaustivamente sus cinco dominios rectores. El dominio superior \"Cognitivo\" se subdivide rígidamente y evalúa de manera exclusiva la indemnidad cortical de las subescalas prefrontales de \"Atención y memoria\", acopladas a la integración simbólica de \"Razonamiento y Habilidades Académicas\".<br><br>Perla ENARM: Cuadro 10. Dominios del desarrollo evaluados por el inventario Battelle: Dominio Cognitivo: -> Atención y memoria. -> Razonamiento y Habilidades Académicas.<br><br>Análisis de Distractores: A) Evaluar cómo el niño forja su autoconcepto y la interacción empática psicosocial con sus padres o adultos ajenos constituye la función primaria y delimitada de la columna del \"Dominio Personal Social\" de la prueba, no la capacidad abstracta mental resolutiva. B) El logro biomecánico y de rutina que otorga autonomía (vestirse, alimentarse o tener autocuidado e higiene fisiológica) se categoriza formal y singularmente en el \"Dominio Adaptativo\". C) El escrutinio de la comunicación fónica verbal (expresivo) y la decodificación de las directrices auditivas de terceros (receptivo) configuran en solitario el pilar lingüístico del \"Dominio Lenguaje\" del niño.",
        source: "IMSS-338-10 RR, Evaluación de Menores de 5 Años, 2010, Anexos, Cuadro 10, Página 28."
    },
    {
        id: 198,
        question: "Durante el escrutinio intrahospitalario del enfermo oncológico terminal, se evalúa su sufrimiento depresivo somático empleando rigurosamente el \"Cuestionario de Depresión de Beck\" (BDI). ¿Qué extremo emocional letal estandarizado y anclado afirma el paciente que selecciona obligatoriamente la opción de máxima gravedad en el ítem de las ideaciones suicidas (Pregunta 9)?",
        options: ["Me mataría si tuviera la oportunidad", "Pienso en matarme, pero no lo haría biológicamente", "Me gustaría que mi vida se terminara de manera natural y sin dolor", "Siento que mi vida ya carece completamente de valor social alguno"],
        answer: 0,
        justification: "Justificación: La ideación suicida en cuidados paliativos exige discriminar si se trata del síndrome natural de claudicación al dolor o una planeación volitiva activa. De acuerdo a la GPC de Cuidados Paliativos y Dolor, el test de Beck está blindado con 21 reactivos cuyas respuestas jerarquizan del alivio a la letalidad. El ítem 9 aborda directamente el impulso auto-lesivo. Mientras la normalidad es no pensar en matarse, el extremo más alto y catastrófico de la matriz que enciende el soporte psiquiátrico de rescate inminente es que el paciente oncológico tache la aseveración analítica literal de preparación: \"Me mataría si tuviera la oportunidad\", denotando el cese de los mecanismos homeostáticos de la auto-preservación humana ante la agonía tumoral.<br><br>Perla ENARM: Cuestionario de Depresión de Beck. Pregunta 9. a) No pienso en matarme. b) Pienso en matarme, pero no lo haría. c) Me gustaría matarme. d) Me mataría si tuviera la oportunidad.<br><br>Análisis de Distractores: B) Esta aseveración (\"Pienso en matarme, pero no lo haría\") conforma una etapa intermedia de desesperación teórica; el freno inhibitorio vital sigue biológicamente activo, restándole la fatalidad del escalón máximo pre-suicida terminal. C y D) Desear pasivamente o invocar una muerte natural no autoinfligida por dolor, y expresar de manera aislada que la existencia no ostenta valor actual, representan ítems y signos lógicos de abatimiento somatomorfo biológico y anhedonia que se rastrean puntualmente en sub-evaluaciones iniciales y difusas del mismo test u otras pruebas de claudicación (como el Montgomery-Asberg), sin englobar ni conformar por sí mismas el acto físico motor consumado interrogado y tipificado explícitamente en el dintel final y mortal \"d\" del apartado suicida del Cuestionario de Beck.",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Anexos, Cuestionario de Beck, Página 48."
    },
    {
        id: 199,
        question: "En la consulta externa de rehabilitación, se recibe a un paciente masculino adulto que sufrió una neuropatía aguda unilateral en el rostro y fue diagnosticado clínicamente con Parálisis de Bell. El explorador médico emite la indicación perentoria \"Apretar los dientes lo más fuerte posible\" durante la revisión gesticular. ¿Qué grupo muscular facial o cutáneo se está evaluando de manera específica con este comando?",
        options: ["El músculo risorio temporal y bucinador", "El músculo superciliar del ala nasal profunda", "El músculo elevador palpebral y occipitofrontal craneal", "El músculo cutáneo del cuello y el triangular de los labios"],
        answer: 3,
        justification: "Justificación: El mapeo del séptimo par craneal permite focalizar topográficamente las ramas periféricas fallidas. De acuerdo a la GPC de Parálisis de Bell, el cuadro oficial e inalterable de \"Exploración Facial Motora\" impone órdenes semiológicas estrictas e inalterables atadas a un par muscular ipsilateral anatómico. Pedirle al paciente enfermo el esfuerzo maxilar inferior forzado con los maxilares cerrados bajo el dictamen literal: \"Apretar los dientes lo más fuerte posible\", desencadena en cascada el tono y la tracción del platisma que deprime la mandíbula inferior evaluando sinérgicamente al \"Cutáneo del cuello\" y probando conjuntamente el declive descendente de las comisuras mediante el vector del músculo \"Triangular de los labios\".<br><br>Perla ENARM: Exploración facial motora: Acción ordenada: Apretar los dientes lo más fuerte posible -> Músculo evaluado de la mímica: 10. Cutáneo del cuello, y 11. Triangular de los labios.<br><br>Análisis de Distractores: A) La distensión lateral externa transversal del músculo risorio (y no su compresión medial dental) se valora semiológicamente pidiendo u ordenando al enfermo gesticular y emitir forzadamente una \"Sonrisa amplia dirigiendo la comisura labial hacia afuera y atrás\". B y C) Los músculos aponeuróticos superiores occipitofrontales y superciliares son interrogados en su potencia corrugadora exigiendo arrugar la piel alcinada de la frente, alzar simétricamente las cejas o \"fruncir el ceño\", quedando totalmente ajenos al área perioral y la presión radicular inferior impuesta por el cierre maxilar oclusal masticatorio.",
        source: "IMSS-066-08 RR, Parálisis de Bell en el Adulto, 2008, Anexos, Cuadro de Exploración Facial, Página 13."
    },
    {
        id: 200,
        question: "Durante la entrevista clínica e interrogatorio dirigido utilizando el Cuestionario de Impacto de la Fibromialgia (FIQ) en la valoración del síndrome somatomorfo algésico en reumatología, la pregunta número 5 exige indagar cuantitativamente al paciente: \"¿Cuál fue la intensidad del dolor?\". Para obtener el valor máximo representativo de invalidez neurológica de la escala, ¿qué aseveración semántica extrema y exacta le dicta el test al enfermo al tachar el número 10 de la regla gráfica de Likert?",
        options: ["Dolor con fuerte limitación funcional de vida", "Dolor persistente de características punzantes severas", "Dolor muy severo", "El peor dolor imaginable"],
        answer: 2,
        justification: "Justificación: En la medicina de atención primaria, las herramientas autoaplicables adaptan los términos clínicos a un lenguaje crudo y llano para evitar errores de interpretación abstracta. De acuerdo a la GPC de Diagnóstico de Fibromialgia, el FIQ utiliza gradillas horizontales paramétricas ancladas del 0 al 10 en todas sus valoraciones fisiológicas de esfuerzo. Para estandarizar e inclinar la percepción basal de la corteza hiper-reactiva del individuo en el reactivo del dolor orgánico global corporal en toda la semana (Pregunta 5), el límite basal \"0\" reza literalmente \"No dolor\", y el dintel opuesto estadístico aflictivo del \"10\" (que confiere el tope evaluativo) en su base escrita inferior rige rígidamente: \"Dolor muy severo\".<br><br>Perla ENARM: Cuestionario FIQ: 5. ¿Cuál fue la intensidad del dolor? (Del 0 al 10). Semántica: 0 (No dolor) ------ 10 (Dolor muy severo).<br><br>Análisis de Distractores: A y B) Describir el carácter etiopatológico \"punzante/limitante o incapacitante vital\" conforman rubros cualitativos de índole descriptiva interrogados puntualmente en otras herramientas analíticas profundas de dolor neurogénico discriminatorio (como el Cuestionario de la UCSF, el LANSS o el propio test sensorial McGill), ausentes formalmente en el constructo simple lineal crudo cuantitativo de la medición de Fibromialgia. D) La histórica aseveración fatalista en la literatura del \"peor dolor imaginable\" o \"dolor catastrófico sin fin\" es y funge exclusiva y normativamente como el límite terminal estandarizado validado propio e independiente que sella únicamente a la herramienta visual clásica universal \"Escala Visual Análoga (EVA)\", distando y separándose de los enunciados escritos litúrgicos exactos del test reumatológico estructurado del cuestionario FIQ mexicano algésico.",
        source: "IMSS-075-18 RR, Diagnóstico y Tratamiento de la Fibromialgia, 2018, Anexos, Cuadro FIQ, Página 14."
    },
    {
        id: 201,
        question: "En la evaluación ecográfica transvaginal de una paciente en el tercer trimestre que cursa con sangrado transvaginal, ¿qué distancia milimétrica máxima entre el borde placentario y el orificio cervical interno (OCI) obliga algorítmicamente a clasificar el cuadro como inserción baja o placenta previa, indicando la prevención de anemia e inductores de madurez pulmonar?",
        options: ["Menor de 20 milímetros", "Menor de 10 milímetros", "Menor de 30 milímetros", "Menor de 15 milímetros"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Anomalías en la Inserción Placentaria, el ultrasonido endovaginal es el estándar de oro para localizar el trofoblasto inferior. El algoritmo de diagnóstico y manejo de la placenta previa estipula que una \"Distancia entre el borde placentario y el OCI < 20 mm\" en el tercer trimestre confirma el riesgo obstructivo y hemorrágico inminente, obligando al clínico a instaurar profilaxis para anemia y esquema de maduración pulmonar entre las 24-34 semanas.<br><br>Perla ENARM: Algoritmo 1. Diagnóstico y Manejo de la Placenta Previa: Distancia entre el borde placentario y el OCI < 20 mm -> SI -> Prevenir y tratar anemia / Aplicar inductores de madurez pulmonar.<br><br>Análisis de Distractores: B, C y D) Las mediciones de 10 o 15 mm se encuentran dentro del rango de riesgo, pero el punto de corte ecográfico absoluto y paramétrico establecido en el diagrama de flujo que divide la vía clínica de bajo riesgo contra la vía de intervención farmacológica profiláctica aguda es estrictamente <20 mm. Cifras mayores se catalogan transitoriamente como riesgo bajo de sangrado masivo periparto.",

        question: "Ante la confirmación clínica, psicológica y social de un caso de abuso físico intencional en un paciente pediátrico hospitalizado, ¿a qué autoridades se debe realizar la notificación obligatoria conjunta por parte del personal de salud?",
        options: ["Juez Cívico y Trabajo Social del Hospital de adscripción", "Ministerio Público y Procuraduría de Protección de Niñas, Niños y Adolescentes", "Policía de Investigación y Sistema Nacional para el Desarrollo Integral de la Familia", "Comisión Nacional de Derechos Humanos y Secretaría de Salud Estatal"],

    {

        question: "Según la Cuarta Definición Universal, ¿qué evento fisiopatológico o contexto clínico define de manera exclusiva al Infarto Agudo de Miocardio clasificado como \"Tipo 4b\"?",
        options: ["Elevación de biomarcadores por intervención coronaria percutánea inicial", "Desequilibrio isquémico por espasmo coronario o anemia aguda", "Trombosis del stent confirmada por angiografía o autopsia", "Reestenosis tardía del stent post-angioplastia con balón"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio (IAMCEST), la tipificación orienta el abordaje etiológico específico. El subgrupo 4 asocia el infarto a procedimientos intervencionistas. La subcategoría \"Tipo 4b\" se define estrictamente como la oclusión aguda \"Relacionada con trombosis del stent. Confirmado a través de angiografía coronaria o autopsia en el contexto clínico de isquemia miocárdica\".<br><br>Perla ENARM: Cuadro de Definición Universal. Tipo 4b: Relacionado con trombosis del stent. Confirmado a través de angiografía coronaria o autopsia.<br><br>Análisis de Distractores: A) El daño tisular o infarto peri-procedimiento ocurrido por flujo lento o embolización durante la misma ICP se clasifica como Tipo 4a. B) El infarto secundario a desequilibrio del aporte o demanda de oxígeno (hipotensión, espasmo, sepsis) conforma el Infarto Tipo 2. D) La oclusión progresiva por proliferación celular intimal clasificada como \"Reestenosis del stent o post-angioplastía\" se cataloga específicamente como Infarto Tipo 4c.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Anexos, Página 11."
    },

        id: 204,
        question: "De acuerdo a la clasificación MIC (Morfológica, Inmunológica, Citogenética), ¿qué patrón de marcadores inmunológicos de superficie celular caracteriza y define a la Leucemia Aguda Linfoblástica de precursores T en pediatría?",
        options: ["Expresión simultánea positiva de CD19 y CD10", "Positividad franca a marcadores mieloides CD13 y CD33", "Presencia de inmunoglobulinas de superficie Ig k/l", "Expresión positiva de los antígenos CD2 y CD7"],

        question: "En la valoración geriátrica integral, se evalúa el estado nutricional y biomecánico del adulto mayor para establecer el fenotipo de fragilidad empleando los \"Criterios de Fried\". ¿Qué magnitud de pérdida de peso involuntaria en el último año otorga positividad a este criterio específico?",

        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral, los Criterios de Fried evalúan el agotamiento de la reserva fisiológica. El primer criterio rector del tamizaje requiere un colapso nutricional y calórico evidente, estandarizado rígidamente como la presencia de \"Pérdida de peso involuntaria de al menos 5 kg durante el año precedente\". Acumular tres o más de los cinco criterios confirma el fenotipo frágil.<br><br>Perla ENARM: Cuadro 11. Criterios de Fried, para el fenotipo de fragilidad: 1. Pérdida de peso involuntaria de al menos 5 kg durante el año precedente.<br><br>Análisis de Distractores: B) Tres kilogramos de fluctuación anual pueden obedecer a cambios hídricos o dietéticos menores, no alcanzando la merma tisular magra requerida para puntuar sarcopenia grave. C y D) Exigir pérdidas catabólicas masivas (7 a 10 kg) subdiagnosticaría el síndrome en fases tempranas de prefragilidad, retrasando el soporte proteico y rehabilitador.",
