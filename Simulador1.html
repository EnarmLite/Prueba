        justification: "Justificación: El ítem motor apendicular inferior en la escala NIHSS requiere que el paciente en decúbito supino eleve y sostenga la pierna extendida a 30 grados. El evaluador inicia una cuenta regresiva vital. De acuerdo a la GPC de Enfermedad Vascular Cerebral, si la pierna sostiene su peso y \"titubea pero no cae antes de los 5 segundos\", se le otorga 1 punto de paresia leve. Pero el criterio estricto para \"2 puntos\" dicta el fracaso biomecánico rotundo donde la extremidad inferior \"cae hacia la cama antes de cumplirse los 5 segundos\" o choca antes de la marca límite (pero aún logra cierto despegue activo contra gravedad inicial).<br><br>Perla ENARM: Escala NIHSS. Grupo 5 Fuerza de piernas: 0 – normal, 1 – titubea después de cinco segundos, 2 – cae después de cinco segundos.<br><br>Análisis de Distractores: A) Un miembro denso pléjico donde \"no hay esfuerzo ni despegue inicial a la cama en contra de la gravedad\" se penaliza castigadoramente con 3 puntos neurológicos enteros de daño motor córticoespinal. C) El titubeo, claudicación blanda o descenso del eje anatómico paulatino que ocurre en la marca \"después de los 5 segundos\", representa preservación de la vía motora primaria con fatiga, siendo solo penalizado con 1 punto en la tabla. D) La inercia absoluta letal, \"no hay movimiento o fasciculación contráctil percusiva\", aglutina la parálisis y flacidez en su estrato terminal de 4 puntos.",
        source: "S-102-08 RR, Diagnóstico de Evento Vascular Cerebral, 2008, Anexos, Cuadro 3, Página 65."
    },
    {
        id: 79,
        question: "En la consulta clínica ambulatoria geriátrica, al aplicar el instrumento simple Mini-Cog™ (que incluye la evocación de tres palabras y el dibujo del reloj), ¿qué rango de puntuación total se interpreta como \"muy poco probable que haya deterioro cognitivo\"?",
        options: ["0 a 2 puntos", "1 a 3 puntos", "3 a 5 puntos", "4 a 6 puntos"],
        answer: 2,
        justification: "Justificación: El Mini-Cog es una herramienta rápida de 3 minutos, altamente sensible e independiente de barreras de idioma cultural extenso que entorpecen al MMSE en el adulto analfabeta funcional. Combina la memoria de corto plazo y la alta función ejecutiva cortical frontal. De acuerdo a la GPC de Rehabilitación de Adultos post-EVC (y herramientas geriátricas), califica hasta 3 puntos por cada palabra evocada correctamente (ej. papel, bicicleta, cuchara) y 2 puntos sólidos si el dibujo y orden de manecillas del reloj (ej. las 11 y 10) es perfecto (total 5). La pauta interpretativa decreta que obtener un puntaje final acumulado en el rango de \"3 a 5 puntos\" significa que es \"muy poco probable que haya deterioro cognitivo\" vascular u orgánico significativo en la corteza.<br><br>Perla ENARM: Mini-Cog Calificación total: 0-2 puntos = Probable deterioro cognitivo. 3-5 puntos = Muy poco probable que haya deterioro cognitivo.<br><br>Análisis de Distractores: A) 0 a 2 puntos obliga estadísticamente a dictaminar la sospecha clínica franca de \"Probable deterioro cognitivo\" y deriva forzosamente al sujeto a evaluaciones formales neurológicas exhaustivas complejas. B) Los estratos cortados al azar como 1 a 3 no respetan la dicotomía rigurosa de alerta médica de la herramienta, que escinde limpiamente la alarma en 2 puntos o menos. D) La sumatoria matemática máxima biológicamente alcanzable en la herramienta es un bloque irrefutable de 5 puntos; no existen los 6 puntos posibles en este diseño.",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos post-EVC, 2021, Anexos (Figura 3), Página 27."
    },
    {
        id: 80,
        question: "De acuerdo a la validación de la Escala Modificada de Ashworth empleada en la rehabilitación muscular espástica de neurona motora superior, ¿qué hallazgo clínico asigna la evaluación de grado 2?",
        options: ["Ningún aumento perceptible estático o dinámico del tono muscular", "Aumento discreto con ligera resistencia al final del arco pasivo", "Limitación espástica severa del arco con rigidez a la movilidad", "Disminución del rango de movimiento mayor del 50% y menor del 100%"],
        answer: 3,
        justification: "Justificación: La hipertonía espástica es la secuela paralítica deformante principal tras el EVC, complicando el vestido y el aseo regional por flexión contracturante sostenida. La objetivación es vital. De acuerdo a la GPC de Rehabilitación Integral tras EVC, el recuadro evaluador paramétrico de la Escala de Ashworth para el tono muscular del miembro parético otorga la \"evaluación grado 2\" específicamente cuando, al someter la articulación hipertónica al empuje pasivo tendinoso, se presenta una franca \"disminución del rango de movimiento que oscila de forma mayor del 50% pero menor del 100%\" (limitación rígida pero no congelada).<br><br>Perla ENARM: Escala de Ashworth: Grado 2: Disminución del rango de movimiento mayor de 50% y menor del 100%.<br><br>Análisis de Distractores: A) El tono eutrófico, donde \"no existe ningún aumento tensional restrictivo del músculo oponente a la fase cinética\", se califica biológicamente en la cabecera como un 0 inobjetable. B) Un incremento tensional tenue muscular periférico \"discreto del tono, con cierta resistencia en la fase última del estiramiento o arco del movimiento pasivo\", encuadra perfectamente la definición del Grado 1 de Ashworth. C) El anquilosamiento denso y refractario, catalogado en el tabulador como la \"limitación severa extrema a la movilidad activa y al desgarre pasivo en general\", constituye la máxima alteración tensional y se puntúa siempre como grado 4.",
        source: "DIF-331-21 RR, Rehabilitación de Adultos post-EVC, 2021, Anexos (Escala de Ashworth), Página 34."
    },
    {
        id: 81,
        question: "Al preparar el protocolo de rehabilitación pre-protésica para un paciente con amputación transfemoral, se indica realizar la prueba Predictor de Movilidad para Amputados (AMPPro). ¿Cuál es el tiempo promedio estandarizado que dura la administración de este instrumento clínico?",
        options: ["Menos de 15 minutos", "Entre 30 y 45 minutos", "Aproximadamente 60 minutos", "Menos de 5 minutos"],
        answer: 0,
        justification: "Justificación: En la medicina de rehabilitación integral, evaluar tempranamente el potencial de movilidad y adaptación de un paciente a su futura prótesis es esencial. De acuerdo a la GPC de Rehabilitación en Amputación, el instrumento AMPPro (Predictor de Movilidad para Amputados) o su variante sin prótesis (AMPnoPRO) es una herramienta validada altamente eficiente en recursos y tiempo clínico en el consultorio. La guía puntualiza explícitamente que la administración completa del protocolo mediante obstáculos simples y sillas \"dura menos de 15 minutos\".<br><br>Perla ENARM: Metodología de prueba Predictor de Movilidad para Amputados (AMP). El tiempo promedio requerido para administrar el AMP o AMPnoPRO dura menos de 15 minutos.<br><br>Análisis de Distractores: B y C) Lapsos de 30 a 60 minutos son propios de evaluaciones neuropsicológicas complejas o baterías isocinéticas musculares completas, restando utilidad como prueba rápida de tamizaje locomotor en la sala de terapia. D) Menos de 5 minutos no permite completar la progresión de los ítems de equilibrio estático, alcance, transferencias, empujes y marcha que la escala AMP exige.",
        source: "DIF-257-21 RR, Rehabilitación en Amputación de Extremidad Inferior, 2021, Anexos (Metodología AMP), Página 24."
    },
    {
        id: 82,
        question: "En la consulta de primer nivel, un paciente con diagnóstico de EPOC refiere que al caminar en terreno plano debe hacerlo más lentamente que otras personas de su misma edad debido a la falta de aire. ¿A qué grado de disnea corresponde según la escala mMRC (Modified Medical Research Council)?",
        options: ["Grado 1", "Grado 3", "Grado 2", "Grado 4"],
        answer: 2,
        justification: "Justificación: La evaluación objetiva de la disnea es fundamental para clasificar el impacto sintomático de la Enfermedad Pulmonar Obstructiva Crónica (EPOC) y dictar el uso de broncodilatadores. De acuerdo a la GPC de EPOC, la escala mMRC estratifica de 0 a 4. El \"Grado 2\" se define estrictamente como aquel individuo que \"Al caminar en plano, camina más lento que otras personas de la misma edad por la falta de aire, o tiene que parar para respirar cuando camina en llano a su propio paso\".<br><br>Perla ENARM: Escala mMRC: Grado 2: Al caminar en plano, camino más lento que otras personas de la misma edad por la falta de aire.<br><br>Análisis de Distractores: A) El Grado 1 corresponde al paciente que únicamente siente falta de aire al \"caminar deprisa en plano, o al caminar subiendo una pendiente poco pronunciada\". B) El Grado 3 representa una limitación mayor, donde el paciente se ve forzado a \"parar a respirar cuando camina 100 metros o después de unos minutos en llano\". D) El Grado 4 se reserva para el colapso funcional severo, donde al paciente \"le falta el aire al desvestirse o no puede salir de su casa\".",
        source: "IMSS-037-21 RR, Prevención y Diagnóstico de EPOC, 2021, Anexos (Cuadro 5), Página 22."
    },
    {
        id: 83,
        question: "Al evaluar a una mujer primigesta de término en el servicio de urgencias obstétricas por contracciones uterinas regulares, ¿a partir de qué diámetro de dilatación cervical el algoritmo exige su ingreso definitivo a la sala de labor de parto?",
        options: ["≥ 3 cm", "≥ 5 cm", "≥ 4 cm", "≥ 6 cm"],
        answer: 1,
        justification: "Justificación: La saturación de los servicios obstétricos y el riesgo de intervenciones innecesarias se reducen al admitir a la paciente en la fase activa real del trabajo de parto. De acuerdo a la GPC de Vigilancia del Trabajo de Parto, el algoritmo de admisión hospitalaria (\"Algoritmo 1. Valoración inicial\") es tajante al indicar que, tras auscultar la frecuencia cardiaca fetal, el ingreso a la labor solo debe efectuarse si la mujer presenta \"≥ 5 cm de dilatación\". Si el cérvix se encuentra en una fase menor (fase latente prolongada), la directriz indica el egreso a domicilio con datos de alarma.<br><br>Perla ENARM: Algoritmo 1. Valoración inicial en admisión hospitalaria: ¿Presenta ≥ 5 cm dilatación? -> SÍ -> Ingreso a labor. NO -> Egreso a domicilio.<br><br>Análisis de Distractores: A, C y D) Históricamente, las curvas clásicas de Friedman marcaban el inicio de la fase activa entre los 3 y 4 cm, pero las pautas contemporáneas consolidadas por el partograma de la OMS y adoptadas por la GPC mexicana actualizan el dintel de franco dinamismo obstétrico y resolución hospitalaria obligada a partir de los 5 centímetros para prevenir cesáreas por falsas \"detenciones de la dilatación\".",
        source: "IMSS-052-19 RR, Vigilancia y Manejo del Trabajo de Parto, 2019, Algoritmos, Página 20."
    },
    {
        id: 84,
        question: "Al estadificar la severidad de un evento hemorrágico en un paciente pediátrico con Trombocitopenia Inmune Primaria (TIP), ¿qué manifestación clínica lo clasifica inmediatamente en el \"Grado 5\" de la escala pronóstica?",
        options: ["Menorragia severa que requiere transfusión celular", "Epistaxis incontrolable con requerimiento de taponamiento", "Hemorragia intracraneal u otra que comprometa la vida", "Gingivorragia que provoca anemia sintomática aguda"],
        answer: 2,
        justification: "Justificación: La conducta terapéutica en la Trombocitopenia Inmune se guía más por la clínica hemorrágica que por el número aislado de plaquetas. De acuerdo a la GPC de TIP, se emplean escalas objetivas de sangrado. El estatus de letalidad máxima absoluta, catalogado numéricamente como \"Grado 5\" (En riesgo vital/fatal), está reservado de manera exclusiva para la evidencia radiológica de una \"Hemorragia intracraneal documentada o hemorragia de cualquier localización masiva que comprometa la vida\". Este grado dispara el protocolo de megadosis de esteroides intravenosos, inmunoglobulina y transfusión de rescate si hay catástrofe neurológica.<br><br>Perla ENARM: Escala de sangrado. Grado 5 En riesgo vital/fatal: Hemorragia intracraneal documentada o hemorragia de cualquier localización que comprometa la vida.<br><br>Análisis de Distractores: A y B) Las hemorragias francas por orificios naturales (menorragia, epistaxis, sangrado de tubo digestivo) que sí requieren atención médica hospitalaria o intervención clínica directa (taponamiento, transfusión sin colapso vital inminente neurológico) se clasifican en el Grado 4 (Severa). D) El sangrado de mucosas (como gingivorragia) que se autolimita o no exige intervención quirúrgica/médica de reanimación crítica inmediata de emergencia recae en el Grado 3 (Moderada).",
        source: "IMSS-143-19 RR, Púrpura Trombocitopénica Inmunológica, 2019, Anexos, Cuadro 4, Página 24."
    },
    {
        id: 85,
        question: "Tras el evento agudo de una enfermedad vascular cerebral, se le aplica el Índice de Barthel al paciente geriátrico para planear su inclusión en redes de apoyo. Si el paciente obtiene un puntaje final de 45 puntos, ¿qué grado de funcionalidad ostenta según la interpretación estandarizada de la guía?",
        options: ["Dependencia Total", "Dependencia Moderada", "Dependencia Grave", "Dependencia Leve"],
        answer: 1,
        justification: "Justificación: El Índice de Barthel evalúa la autonomía de las actividades básicas de la vida diaria (10 rubros: alimentación, baño, movilidad, control de esfínteres, etc.) y genera un puntaje de 0 a 100. De acuerdo a la GPC de Valoración Geriátrica Integral y EVC, el tabulador de interpretación oficial clasifica un resultado entre los \"40 y 55 puntos\" como \"Dependencia Moderada\". Este rango alerta a trabajo social sobre la necesidad de adaptaciones mecánicas en el hogar y vigilancia media sin requerir postración o cuidados intensivos las 24 horas.<br><br>Perla ENARM: Interpretación Índice de Barthel: Menor a 20 = Dependencia Total. 20-35 = Dependencia Grave. 40-55 = Dependencia Moderado. 60 o más = Dependencia Leve.<br><br>Análisis de Distractores: A) La Dependencia Total implica un colapso masivo de la autonomía, requiriendo asistencia en casi todo rubro, y se asigna cuando la suma es menor a 20 puntos. C) La Dependencia Grave se define por una puntuación que oscila entre los 20 y 35 puntos. D) La Dependencia Leve agrupa a aquellos pacientes con déficit menor, sumando 60 puntos o más (hasta antes de los 100 de la independencia absoluta).",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral en Unidades de Atención Médica, 2018, Anexos (Índice de Barthel), Página 41."
    },
    {
        id: 86,
        question: "En el sistema de estadificación FIGO / TNM para el Cáncer Cervicouterino, ¿qué hallazgo anatómico tumoral o patológico determina inequívocamente la categoría clínica de estadio IVb?",
        options: ["Invasión de la mucosa de la vejiga urinaria", "Extensión a la pared lateral de la pelvis", "Metástasis a distancia", "Invasión de la mucosa del recto"],
        answer: 2,
        justification: "Justificación: La etapa clínica IV del cáncer de cuello uterino es la fase terminal de la enfermedad, dividiéndose en diseminación local por contigüidad y siembra vascular sistémica. De acuerdo a la GPC de Cáncer Cervicouterino, la estadificación clasifica el daño más allá de la pelvis verdadera. Mientras que el daño local a órganos huecos define el IVa, el estadio \"IVb\" (M1) obedece única y exclusivamente a la confirmación de \"Metástasis a distancia\" (por ejemplo, invasión a pulmón, hígado, hueso o ganglios supraclaviculares extra-pélvicos), confiriendo un pronóstico ominoso y derivando a la paciente a paliación sistémica.<br><br>Perla ENARM: Estadios por Grupo: Estadio IVb -> Cualquier T, Cualquier N, M1 (Con metástasis a distancia).<br><br>Análisis de Distractores: A y D) La infiltración maligna directa sobre la mucosa de la vejiga anterior o la mucosa del recto posterior corresponde al estadio IVa (extensión a órganos adyacentes intrapélvicos). B) La extensión de la masa tumoral que infiltra y se fija a la pared lateral de la pelvis, congelando la movilidad e involucrando un riñón excluido o hidronefrosis, define clínicamente el estadio IIIb.",
        source: "IMSS-333-09 RR, Cáncer Cervicouterino, 2009, Anexos (Estadificación TNM/FIGO), Página 31."
    },
    {
        id: 87,
        question: "Según la Cuarta Definición Universal del Infarto de Miocardio, ¿cuál es el mecanismo fisiopatológico o contexto médico que define a un infarto catalogado como \"Tipo 5\"?",
        options: ["Desequilibrio agudo entre el suministro y la demanda de oxígeno", "Trombosis confirmada de un stent coronario previo", "Relacionado con cirugía de derivación arterial coronaria", "Muerte súbita sin disponibilidad de biomarcadores"],
        answer: 2,
        justification: "Justificación: La definición universal clasifica los infartos para guiar estrategias de tratamiento y prevención secundaria. De acuerdo a la GPC de IAMCEST, el grupo \"Tipo 5\" es el infarto y daño miocárdico yatrogénico severo que se asocia directamente a una \"Cirugía de derivación arterial coronaria\" (CABG o Bypass aortocoronario abierto). Este grupo exige criterios enzimáticos mucho más altos que los de un evento espontáneo (elevación de troponinas mayor a 10 veces el límite superior normal) asociado a la aparición de nuevas ondas Q o pérdida de viabilidad en el injerto recién anastomosado.<br><br>Perla ENARM: Cuadro 3. Definición Universal: Tipo 5: Relacionado con cirugía de derivación arterial coronaria.<br><br>Análisis de Distractores: A) El desequilibrio hemodinámico y de perfusión (ej. anemia, sepsis, arritmia) sin una ruptura de placa ateroesclerótica define al infarto Tipo 2. B) La trombosis de un implante endovascular metálico (stent) corroborada por angiografía define sub-estratégicamente al infarto Tipo 4b. D) El colapso letal precoz por isquemia antes de lograr tomar una muestra de sangre para medir troponinas se clasifica universalmente como infarto Tipo 3.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Anexos, Cuadro 3, Página 41."
    },
    {
        id: 88,
        question: "Durante el escrutinio de demencia mediante la prueba de Folstein (MMSE), ¿cuáles son los dos objetos físicos específicos que el médico debe mostrar obligatoriamente al paciente para evaluar la sub-escala de denominación y otorgar hasta 2 puntos?",
        options: ["Una llave y un papel", "Un reloj y un bolígrafo", "Un vaso y unas gafas", "Una moneda y un zapato"],
        answer: 1,
        justification: "Justificación: El Mini-Mental State Examination exige estandarización rigurosa para no invalidar el puntaje internacional, evaluando la indemnidad del lóbulo temporal en el área semántica y de lenguaje (denominación visual). De acuerdo a la GPC de Enfermedad de Alzheimer, el rubro correspondiente a \"Lenguaje y Construcción\" indica que el clínico tiene prohibido usar elementos aleatorios; debe señalar explícitamente: \"¿Qué es esto? (Mostrar un reloj). ¿y esto? (Mostrar un bolígrafo)\", abonando 1 punto por cada nombre correcto sin aceptar sinónimos ambiguos.<br><br>Perla ENARM: LENGUAJE Y CONSTRUCCIÓN: \"¿Qué es esto?” (Mostrar un reloj). “¿y esto?” (Mostrar un bolígrafo). (Máximo 2 puntos).<br><br>Análisis de Distractores: A, C y D) Emplear objetos sustitutos, sin importar lo comunes que sean, viola el protocolo estandarizado de la prueba. Mostrar llaves, gafas o papeles confunde las subescalas, pues el papel se usa posteriormente para la prueba de comando ejecutivo (\"tome el papel con la mano derecha...\"), no para nominación.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Página 54."
    },
    {
        id: 89,
        question: "Al valorar en el primer nivel de atención a un paciente con artrosis de rodilla de grado moderado que no responde al manejo conservador, ¿qué proyecciones radiográficas específicas se deben solicitar previo a su envío al segundo nivel?",
        options: ["Proyección anteroposterior y oblicua en posición de decúbito", "Proyección axial de rótula y tangencial bilateral", "Proyección anteroposterior y lateral de ambas rodillas de pie", "Proyección posteroanterior en flexión de 45 grados"],
        answer: 2,
        justification: "Justificación: La objetivación del daño cartilaginoso en la osteoartritis exige visualizar el pinzamiento real del espacio articular bajo el efecto natural de la carga axial humana. De acuerdo a la GPC de Osteoartrosis de Rodilla, el algoritmo de referencia indica como requisito indispensable previo a la canalización a cirugía o traumatología, la solicitud del estudio de gabinete clásico estandarizado: \"Rx AP y lateral de ambas rodillas con el paciente de pie\". La bipedestación revela el cierre del compartimento femorotibial que puede parecer falsamente abierto si el paciente estuviera acostado en la mesa de rayos X.<br><br>Perla ENARM: Algoritmo: Realizar estudios de gabinete (Rx AP y lateral de ambas rodillas con el paciente de pie) -> Enviar a segundo o tercer nivel.<br><br>Análisis de Distractores: A) Las radiografías en decúbito (acostado) descargan el peso de la rodilla, ocultando el grado de compresión y fricción ósea subcondral asimétrica, subestimando la necesidad protésica. B) Las proyecciones axiales y tangenciales son útiles para evaluar síndromes de hiperpresión patelofemoral, subluxación rotuliana o condromalacia de facetas, pero no son las indicadas como barrido universal de la artrosis tibio-femoral prequirúrgica de referencia. D) La posteroanterior en flexión de 45° (Proyección de Rosenberg o túnel intercondíleo) es un estudio avanzado para visualizar pinzamiento sutil posterior o cuerpos libres, pero la normativa exige simplemente AP y Lateral de pie para el trámite general.",
        source: "IMSS-435-18 RR, Diagnóstico y Tratamiento de Osteoartrosis de Rodilla, 2018, Algoritmos, Página 11."

    {
        id: 90,
        question: "En el paciente oncológico que se encuentra en un programa de cuidados paliativos, ¿qué descripción de funcionalidad global corresponde a un índice de Karnofsky de 50 puntos?",
        options: ["Incapaz de cuidarse a sí mismo, equivalente a estado de coma", "Capaz de llevar actividad normal, síntomas menores y esporádicos", "Requiere atención ocasional, pero puede cuidarse a sí mismo", "Requiere gran atención, incluso médica, encamado menos del 50% del día"],
        answer: 3,
        justification: "Justificación: La escala de Karnofsky (KPS) permite cuantificar el declive en el estado de desempeño (Performance Status) del paciente terminal para guiar la intensidad de las medidas paliativas y la esperanza de vida biológica. De acuerdo a la GPC de Cuidados Paliativos, la escala decae desde 100 hasta 0. Específicamente, el umbral clínico crítico de \"50 puntos\" define la barrera donde el paciente pierde su autonomía basal: \"Requiere gran atención, incluso de tipo médico. Encamado menos del 50% del día\". Si pasa más de la mitad del día en cama, su puntaje desciende a 40 y la futilidad sistémica aumenta.<br><br>Perla ENARM: Escala de Karnofsky: 50 = Requiere gran atención, incluso de tipo médico. Encamado menos del 50% del día.<br><br>Análisis de Distractores: A) El estado vegetativo o paciente en estadio pre-mortem, que necesita sostén vital sin respuesta al medio circundante, se enmarca en las cifras de 10 o 0 (muerte biológica). B) La capacidad de laborar con síntomas mínimos representa un paciente íntegro en seguimiento, catalogándose en los escalones altos de 90 a 80 puntos de Karnofsky. C) El paciente que solo demanda ayuda de manera intermitente pero preserva el autocuidado higiénico general (\"Requiere atención ocasional\") recibe una asignación puntual de 60.",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Anexos, Página 45."
    },
    {
        id: 91,
        question: "Al utilizar la Escala de Deficiencia del Tronco (Trunk Impairment Scale - TIS) para valorar a un paciente en rehabilitación tras un EVC, ¿cuál es el puntaje máximo total que puede sumar si presenta coordinación y equilibrio perfectos?",
        options: ["23 puntos", "15 puntos", "30 puntos", "47 puntos"],
        answer: 0,
        justification: "Justificación: El control axial (tronco) post-EVC es el mejor predictor de la capacidad futura para la bipedestación y la marcha. De acuerdo a la GPC de Rehabilitación Post-EVC, la Trunk Impairment Scale (TIS) evalúa tres sub-dominios clave sentados en la orilla de la cama: Equilibrio estático (hasta 7 puntos), Equilibrio dinámico (hasta 10 puntos) y Coordinación de giros (hasta 6 puntos). La sumatoria global máxima inamovible que acredita una indemnidad central del core muscular asciende matemáticamente a 23 puntos absolutos (\"Total Trunk Impairment Scale /23\").<br><br>Perla ENARM: Escala TIS (Trunk Impairment Scale): El máximo puntaje alcanzable que demuestra control axial íntegro es de 23 puntos.<br><br>Análisis de Distractores: B) 15 puntos es el valor central histórico de otras escalas neurológicas de coma (Glasgow), no asociado al análisis toraco-abdominal kinesiológico. C) 30 puntos es el tope numérico clásico de herramientas como el MoCA o el Mini-Mental (MMSE) para el deterioro de dominios cognitivos. D) 47 puntos corresponde de forma específica a la puntuación tope que puede arrojar el sub-instrumento Predictor de Movilidad de Amputados (AMPPro) evaluado en la GPC de miembros inferiores.",
        source: "DIF-331-21 RR, Rehabilitación de Adultos post-EVC, 2021, Anexos (Figura 7, TIS), Página 34."

    {
        id: 92,
        question: "En la evaluación del riesgo absoluto de fracturas óseas por fragilidad utilizando la escala FRAX en la población mexicana, ¿qué acción matemática estipula la guía si al sumar los factores de riesgo clínico de la paciente se obtiene un total exacto de 7 puntos?",
        options: ["Clasificar a la paciente con osteoporosis severa inmediata", "Multiplicar el valor por el índice de masa corporal basal", "Restar dos puntos al valor debido a protección estrogénica", "Considerarlo igual a 6 puntos para su comparación en la tabla"],
        answer: 3,
        justification: "Justificación: La herramienta FRAX calcula el riesgo a 10 años de padecer una fractura mayor. La GPC de Osteoporosis emplea una matriz simplificada adaptada a la estadística mexicana (Cuadro 5B). Como detalle peculiar técnico, la cuadrícula matemática diseñada por la institución carece de columna para el número 7, por lo que la directriz normativa dicta textualmente una regla de excepción: \"En caso de obtener 7 puntos, será considerado igual a 6, para la comparación en la tabla\" e inserción de la paciente en el cuadrante rojo, naranja o verde de intervención con alendronato.<br><br>Perla ENARM: Cuadro 5B (FRAX): En caso de obtener 7 puntos, será considerado igual a 6, para la comparación en la tabla.<br><br>Análisis de Distractores: A) FRAX no otorga un diagnóstico densitométrico (T-score), sino una probabilidad estadística. Un puntaje de 7 es alto riesgo, pero no equivale histológicamente al sello diagnóstico de \"osteoporosis severa\" sin correlación ósea clínica. B y C) La tabla ya integra y cruza el Índice de Masa Corporal de forma visual sin requerir multiplicaciones, y no existen correcciones matemáticas de protección por estrógenos en la puntuación bruta.",
        source: "IMSS-673-18 RR, Prevención y Tratamiento de la Osteoporosis, 2018, Anexos, Página 67."
    },
    {
        id: 93,
        question: "Dentro de la estrategia para inducir la \"inmunidad de rebaño\" o efecto \"capullo\" contra la Tosferina, ¿de cuántas dosis consta el esquema de vacunación completo aconsejado con Tdap en mujeres en edad fértil (12-45 años)?",
        options: ["Tres dosis", "Cinco dosis", "Dos dosis", "Dosis única de refuerzo anual"],
        answer: 1,
        justification: "Justificación: La vacunación materna previene la tosferina letal en el neonato durante sus primeros meses vulnerables (efecto capullo). De acuerdo a la GPC de Vacunación, es vital verificar la inmunidad histórica de la mujer fértil. La normativa dicta enfáticamente que \"se aconseja en forma prioritaria aplicar esquema completo de vacunación (5 dosis) con toxoide tetánico y diftérico o TDaP a las mujeres entre 12 - 45 años de edad\", para garantizar títulos protectores duraderos de anticuerpos IgG transferibles por barrera placentaria al feto y sostenibles para la madre.<br><br>Perla ENARM: Se aconseja en forma prioritaria aplicar esquema completo de vacunación (5 dosis) con toxoide tetánico y diftérico o TDaP a las mujeres entre 12 - 45 años de edad.<br><br>Análisis de Distractores: A) Tres dosis configuran el rescate típico en adultos del esquema basal por accidentes tetanógenos (0, 1 y 12 meses), pero no es el concepto de \"esquema completo\" de la vida para la mujer en edad fértil desprotegida. C) Dos dosis son insuficientes para establecer la memoria inmunológica duradera requerida frente al antígeno pertússico y toxinas tetánicas. D) La vacunación no se aplica de manera indiscriminada anualmente; los refuerzos en adultos con esquemas plenos se separan habitualmente cada 10 años, o 1 dosis de Tdap por cada gestación en curso a partir de la semana 20.",
        source: "IMSS-829-18 RR, Inmunización en el Adulto, 2018, Prevención de Infecciones, Página 11."

    {
        id: 94,
        question: "Frente a un paciente escolar que es admitido en la sala de urgencias por datos floridos de hipertensión endocraneal y sospecha sólida de un tumor del sistema nervioso central, ¿cuál es la primera prueba de imagen obligada e inmediata en el algoritmo de abordaje pediátrico?",
        options: ["Tomografía axial computarizada de cráneo urgente", "Resonancia magnética de neuroeje con gadolinio", "Angiografía cerebral por cateterismo arterial", "Ultrasonido transfontanelar con barrido Doppler"],
        answer: 0,
        justification: "Justificación: Las neoplasias infratentoriales infantiles frecuentemente debutan ocluyendo la vía del LCR y generando hidrocefalia aguda, lo que requiere un mapeo de las cisternas para evitar la herniación y la muerte. De acuerdo a la GPC de Tumores Cerebrales Pediátricos, el \"Algoritmo de manejo de tumores\" es explícito: ante un niño que debuta con una crisis o sospecha de masa, el primer peldaño insalvable y prioritario por su amplia disponibilidad hospitalaria y velocidad de escaneo óseo/sangre es \"Solicitar TAC de cráneo URGENTE\". Posteriormente, con el niño estabilizado, se programará la RM como \"Gold Standard\" de planeación de resección.<br><br>Perla ENARM: Algoritmo 1 de manejo de tumores de SNC en pediatría: Niño con sospecha de tumor -> Solicitar TAC de cráneo URGENTE.<br><br>Análisis de Distractores: B) La Resonancia Magnética (RM) con contraste es el mejor estudio de planeación anatómica tisular, pero su ejecución tarda hasta una hora, requiere sedación anestésica en niños, no está disponible 24/7 en todos los centros y retrasa el diagnóstico masivo letal en urgencias en un paciente inestable que requiere una válvula de derivación inminente. C) La angiografía es un estudio neuroquirúrgico de mapeo de lechos vasculares de malformaciones o embolización de fístulas, careciendo de papel como tamizaje primario en masa cerebral. D) El ultrasonido transfontanelar pierde toda utilidad técnica en el paciente escolar (quien ha sellado las suturas craneales entre los 12 y 18 meses de vida), volviéndose inútil su ventana acústica.",
        source: "ISSSTE-136-18 RR, Tumores Cerebrales Pediátricos, 2018, Algoritmo 1, Página 48."

    {
        id: 95,
        question: "Para la protección tromboembólica crónica en un paciente diagnosticado con Fibrilación Auricular no valvular y una función renal preservada, ¿cuál es la posología estándar de mantenimiento demostrada y recomendada para el uso de Apixabán?",
        options: ["150 miligramos administrados dos veces al día", "2.5 miligramos vía oral en dosis única diaria", "5 miligramos administrados dos veces al día", "20 miligramos administrados una vez al día"],
        answer: 2,
        justification: "Justificación: La anticoagulación oral de los Nuevos Anticoagulantes Orales (NOAC) demanda estricto apego posológico. De acuerdo a la GPC de Anticoagulación Oral, en la gráfica de Riesgo de sangrado mayor vs Embolia sistémica, el esquema biológico validado de Apixabán, que demostró alta superioridad de seguridad y efectividad sobre la warfarina en pacientes con fibrilación auricular con filtración renal intacta, obedece inamoviblemente a la dosis de \"5 mg/2xdía\" (5 mg vía oral cada 12 horas).<br><br>Perla ENARM: Gráfica de dosis estándar en FA: Apixaban 5 mg/2xdía.<br><br>Análisis de Distractores: A) La alta dosis de 150 mg administrada dos veces al día corresponde biológicamente al mecanismo inhibidor directo de trombina de la molécula Dabigatrán. B) Los regímenes atenuados de Apixabán equivalentes a \"2.5 mg dos veces al día\" se prescriben y reservan exclusivamente si el paciente reúne al menos dos de tres criterios de fragilidad (edad >80, peso <60 kg, o creatinina sérica >1.5 mg/dl). Jamás es dosis única diaria. D) Los 20 mg indicados una sola vez al día conforman la dosificación profiláctica para la fibrilación auricular cuando se selecciona prescribir Rivaroxabán.",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Anexos, Gráfica de Riesgo, Página 66."
    },
    {
        id: 96,
        question: "Ante el ingreso de un paciente al servicio de urgencias con diagnóstico de choque hemorrágico grave de etiología traumática, ¿cuál es la posología intravenosa estandarizada que rige el bolo inicial del fármaco antifibrinolítico Ácido Tranexámico?",
        options: ["25 mg/kg", "10 mg/kg", "50 mg/kg", "15 mg/kg"],
        answer: 0,
        justification: "Justificación: En el paciente politraumatizado, el consumo veloz de factores genera hiperfibrinólisis secundaria diseminada, disolviendo los coágulos de rescate en formación. De acuerdo a la GPC de Manejo Hemático del Paciente (PBM), el empleo oportuno dentro de las primeras horas de un agente sintético inhibidor de la plasmina mitiga masivamente el desangrado. El algoritmo central protocoliza que, frente a signos de sangrado difuso, hemorragia postparto masiva o perfiles viscoelásticos anormales de lisis (ML >=5%), se debe ordenar y administrar inmediatamente el \"Ácido tranexámico a dosis de 25 mg/kg en bolo\" intravenoso directo.<br><br>Perla ENARM: Algoritmo 5 en trauma. Sangrado difuso -> Ácido tranexámico 25 mg/kg en bolo.<br><br>Análisis de Distractores: B y D) Lapsos de 10 a 15 mg/kg son dosificaciones insuficientes subterapéuticas no respaldadas en los ensayos pivotales CRASH para la hemostasia profunda traumática y choque. C) Las infusiones empíricas de 50 mg/kg y superiores elevan injustificadamente el perfil de seguridad del fármaco, asociándose ocasionalmente a neurotoxicidad pro-convulsivante en el paciente en cuidado intensivo sin aportar un freno lisis adicional comprobado.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmos de Trauma, Página 75."
    },
    {
        id: 97,
        question: "Dentro de los criterios de ingreso a la sala de choque de la unidad hospitalaria, ¿qué valor de puntuación en el score predictivo \"TASH\" (Trauma Associated Severe Hemorrhage) activa oficialmente el protocolo de Riesgo de Transfusión Masiva?",
        options: ["Mayor o igual a 8 puntos", "Mayor o igual a 15 puntos", "Mayor o igual a 5 puntos", "Mayor o igual a 20 puntos"],
        answer: 1,
        justification: "Justificación: La anticipación proactiva y el desembalaje preventivo de hemoderivados (plasma, plaquetas y eritrocitos a partes iguales) previene la muerte por la triada letal del trauma (hipotermia, acidosis, coagulopatía). De acuerdo a la GPC de Optimización de Sangre (PBM), existen desencadenantes específicos al arribo del paciente a la cortina de Urgencias para iniciar el puente masivo. El algoritmo decreta contundentemente la activación del protocolo si el paciente manifiesta un Exceso de Base < -6 mmol/L, una Hemoglobina < 10 g/dL, un ISS (Injury Severity Score) ≥ 25, o presenta matemáticamente un índice de sangrado predictivo \"TASH-Score ≥ 15\".<br><br>Perla ENARM: Criterios Riesgo Transfusión Masiva: Llegada a Urgencias BE < -6 mmol/L o Hb < 10 g/dL o ISS ≥ 25 o TASH-Score ≥ 15.<br><br>Análisis de Distractores: A y C) Los puntajes de 5 u 8 alertan sangrados orgánicos intermedios manejables en primera instancia con reanimación hemostática focal, pero no denotan la certeza estadística de requerir 10 unidades empaquetadas en las siguientes horas vitales. D) Esperar a un índice colosal superior a 20 puntos significaría actuar de manera tardía, pues la hipoperfusión extrema ya habría dictado el fallo orgánico isquémico irreversible y la hipoxia tisular.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 5 (Esquema Transfusional), Página 74."
    },
    {
        id: 98,
        question: "Durante la valoración neuro-motora pediátrica de un infante sin antecedentes perinatales de riesgo, ¿cuál es la edad cronológica esperada y considerada normal para que el paciente consolide el patrón organizado de gateo sobre manos y rodillas?",
        options: ["A los 6 meses", "A los 8 meses", "A los 12 meses", "A los 10 meses"],
        answer: 3,
        justification: "Justificación: La evaluación del hito del desarrollo motor refleja la indemnidad madurativa córtico-espinal ascendente de la sustancia blanca. De acuerdo a la GPC de Alteraciones del Neurodesarrollo y Estimulación Temprana, la secuencia normal del \"Gateo\" en el lactante implica varias fases progresivas. Inicia con la simple elevación sobre los hombros (3 meses), elevación sobre manos (4-5 meses), para después transicionar al arrastre sobre el abdomen (8 meses), culminando finalmente en la consolidación anatómica madura cuadrupedal descrita normativamente en el manual nacional como \"Gatea sobre manos y rodillas\", lo cual es catalogado en el casillero de normalidad a los 10 meses redondos de vida.<br><br>Perla ENARM: Cuadro Hitos motores: Gateo: Se eleva sobre manos (4-5 m), Se desplaza arrastrándose (8 m), Gatea sobre manos y rodillas (normal a los 10 m).<br><br>Análisis de Distractores: A) A los 6 meses biológicos el lactante recién se encuentra dominando el control tensional central y el hito de la \"sedestación sin apoyo\" y el \"volteo completo de supino a prono\", careciendo de la fuerza del cíngulo pélvico para despegar las rodillas al unísono con el abdomen del piso. B) A los 8 meses de edad, el infante se traslada mediante la locomoción ventral rastrera militar (se desplaza arrastrándose apoyado sobre el abdomen), no levantando aún el eje sobre las articulaciones rodilleras. C) A los 12 meses, un lactante sano ya se debe encontrar firmemente en postura ortostática, transitando hacia el hito motor de \"bipedestación sin ayuda\" y \"marcha independiente primaria incipiente\".",
        source: "DIF-332-18 RR, Detección de Alteraciones del Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Cuadro de Hitos, Página 20."
    },
    {
        id: 99,
        question: "Al clasificar por grupos de riesgo clínico al adenocarcinoma de próstata tras realizar una biopsia transrectal ecoguiada y detectar anormalidades, ¿qué rango histopatológico numérico de la escala de Gleason ubica de forma inmediata al paciente en la categoría de \"Alto Riesgo\"?",
        options: ["Escala de Gleason igual a 6", "Escala de Gleason de 8 a 10", "Escala de Gleason menor a 4", "Escala de Gleason de 7"],
        answer: 1,
        justification: "Justificación: El sistema de grado de Gleason mide la desdiferenciación histológica del tejido prostático tumoral, dictaminando la agresividad microscópica (y por ende metabólica y metastásica) para orientar el bloqueo androgénico y radioterapia radical. De acuerdo a la GPC de Cáncer de Próstata, el Cuadro de estratificación de D´Amico divide tajantemente en tres ramas: Bajo riesgo, intermedio y alto. Sin importar si el tumor no fuera clínicamente grande a la palpación, si la sumatoria de las muestras glandulares dominantes arroja una \"Escala de Gleason 8 a 10\", la célula está tan desdiferenciada (patrones sólidos y cribaicos sin glándulas formadas) que catapulta la enfermedad al estadio de \"Alto riesgo\".<br><br>Perla ENARM: Estratificación pretratamiento de Cáncer de Próstata. Alto riesgo: Etapa clínica T3a, Escala de Gleason 8 a 10, PSA sérico >20 ng/ml.<br><br>Análisis de Distractores: A) Un tejido con patrón de Gleason de 6 es una neoplasia bien diferenciada morfológicamente, lo que encuadra habitualmente al paciente en el espectro de \"Bajo riesgo\" (ideal para la conducta conservadora de vigilancia activa u observación). C) Biológicamente y por consenso patológico internacional actual, no existen sumatorias de diagnóstico adenocarcinomatoso oncológico primario menores de 6 informadas (grados menores de 3+3 se denominan hiperplasia atípica pero se prohíbe llamarlas cáncer para no sobretratar). D) Un Gleason aislado exacto de 7 (ya sea 3+4 o 4+3) encajona al tumor de forma estricta en el apartado transicional evolutivo de \"Riesgo Intermedio\".",
        source: "IMSS-140-18 RR, Cáncer de Próstata, 2018, Anexos, Cuadro 5, Página 31."
    },
    {
        id: 100,
        question: "Durante la vigilancia en la sala de expulsión de un parto que transcurre de forma inminente, la guía clínica estipula indicaciones muy puntuales y restrictivas para realizar una episiotomía. ¿Cuál de los siguientes escenarios justifica el corte quirúrgico del periné según el algoritmo oficial?",
        options: ["Todo embarazo con peso fetal mayor a 3,000 gramos", "Exclusivamente a solicitud explícita de la paciente", "Inducción profiláctica de la labor de parto y oxitocina", "Presentación fetal de cara, periné corto o parto instrumentado"],
        answer: 3,
        justification: "Justificación: En la obstetricia moderna, la episiotomía profiláctica o de rutina está formalmente proscrita, debido a que incrementa el riesgo biológico de desgarros perineales de tercer y cuarto grado, dispareunia e incontinencia fecal materna crónica. De acuerdo a la GPC de Vigilancia y Manejo del Trabajo de Parto, el \"Algoritmo 3. Periodo expulsivo\" evalúa cuidadosamente la tensión del periné y solo \"considere la realización de una episiotomía medio lateral\" si el clínico constata emergencias de obstrucción física genuinas o de mecánica anómala, listando explícitamente: \"periné muy corto, presentación de cara, presentación compuesta o pélvica, distocia de hombros inminente o requerimiento de un parto instrumentado (fórceps/espátulas)\".<br><br>Perla ENARM: Algoritmo 3. Expulsivo: ¿Presenta periné corto, presentación de cara, compuesta o pélvica, distocia de hombros o parto instrumentado? -> SÍ -> Considere la realización de una episiotomía medio lateral con analgesia.<br><br>Análisis de Distractores: A) Un feto de 3,000 gramos o más (macrosomía límite o peso adecuado alto) no es indicación quirúrgica perineal de corte a priori; el tejido elástico vulvar suele distender de manera natural mediante maniobras protectoras manuales tibias (Ritgen modificado). B) La cirugía invasiva sobre el piso pélvico no se realiza a petición ni de rutina obstétrica, sino bajo mandato de indicación o urgencia mecánica fisiológica en el alumbramiento. C) El hecho clínico aislado de que una labor de parto se induzca o conduzca farmacológicamente con goteo oxitócico en la vena periférica no predice automáticamente colapso estructural a la salida final del producto que deba paliarse con el bisturí profiláctico.",
        source: "IMSS-052-19 RR, Vigilancia y Manejo del Trabajo de Parto, 2019, Algoritmo 3, Página 22."
    },
    {
        id: 101,
        question: "En la evaluación integral de salud en el trabajo para un paciente con dolor lumbar inespecífico, ¿qué factor psicosocial define específicamente a las \"Banderas Azules\" que predisponen a la cronicidad del padecimiento?",
        options: ["Comorbilidades psiquiátricas subyacentes", "Insatisfacción y percepción de estrés laboral", "Creencias catastróficas sobre el dolor", "Alteraciones conductuales de evitación motora"],
        answer: 1,
        justification: "Justificación: En la medicina de rehabilitación y salud ocupacional, la estratificación del dolor lumbar exige identificar predictores de mala evolución. De acuerdo a la GPC de Dolor Lumbar Inespecífico, los factores psicosociales se dividen en banderas amarillas (creencias, emociones, conductas de evitación) y banderas azules (entorno de trabajo). Las banderas azules engloban exclusivamente la relación del individuo con su entorno laboral, como la baja satisfacción, la poca ayuda en el trabajo, la percepción de estrés laboral y la preocupación sobre satisfacer las exigencias del empleador, lo cual retarda el retorno funcional.<br><br>Perla ENARM: Banderas Azules: Preocupaciones acerca de si la persona es capaz de satisfacer las exigencias del trabajo, baja satisfacción laboral, poca ayuda en el trabajo, percepción de estrés laboral.<br><br>Análisis de Distractores: A, C y D) Las creencias de daño anatómico grave, la catastrofización, los miedos, la hipervigilancia, el comportamiento de evitación por temor a lesionarse nuevamente y los cuadros de depresión o ansiedad, corresponden rigurosamente al espectro de las \"Banderas Amarillas\".",
        source: "DIF-313-19 RR, Rehabilitación del Dolor Lumbar Inespecífico, 2019, Anexos, Cuadro 3, Página 26."
    },
    {
        id: 102,
        question: "Para un paciente diagnosticado con eccema agudo por dermatitis de contacto en las manos, ¿cuál es la técnica específica de lavado recomendada para favorecer la desinflamación y curación del estrato córneo?",
        options: ["Agua fría y jabón antibacteriano", "Agua caliente y clorhexidina", "Agua tibia corriente y sustituto de jabón", "Fricción con alcohol gel exclusivamente"],
        answer: 2,
        justification: "Justificación: Las manos carecen de folículos pilosos abundantes en el dorso y su manto lipídico es fácilmente barrido por agentes tensoactivos, perpetuando el daño eccematoso irritativo. De acuerdo a la GPC de Dermatitis de Contacto, el protocolo de cuidado de manos exige medidas estrictas de barrera y limpieza. La indicación precisa para la remoción de detritos sin exacerbar la inflamación vascular es utilizar \"agua tibia corriente\" acoplada a un \"sustituto de jabón\" (Syndet), retirando forzosamente cualquier anillo que atrape químicos y evitando el uso de secadoras de aire caliente que deshidratan la epidermis.<br><br>Perla ENARM: Cuadro 6. Hoja de Cuidado de Manos. Lave sus manos las veces estrictamente necesarias, para ello use de preferencia agua tibia corriente y sustituto de jabón. Si usa anillos quítelos.<br><br>Análisis de Distractores: A y B) Las temperaturas extremas (muy fría o muy caliente) inducen hiperreactividad vascular (vasodilatación refleja o vasoespasmo), prurito severo y mayor liberación de histamina. Los antibacterianos y antisépticos potentes (clorhexidina) son altamente irritantes y destruyen la microbiota comensal protectora. D) El alcohol gel disuelve dramáticamente los lípidos intercelulares del estrato córneo, provocando ardor quemante inmediato sobre las fisuras de la dermatitis activa y empeorando la xerosis.",
        source: "IMSS-560-12 RR, Dermatitis de Contacto, 2012, Anexos, Cuadro 6, Página 113."
    },
    {
        id: 103,
        question: "En el abordaje quirúrgico de los síntomas del tracto urinario inferior secundarios a hiperplasia prostática benigna, ¿a partir de qué volumen prostático está estrictamente indicada la Enucleación prostática con láser Holmium (HoLEP)?",
        options: ["Mayores a 30 gramos", "Mayores a 40 gramos", "Mayores a 60 gramos", "Mayores a 80 gramos"],
        answer: 2,
        justification: "Justificación: La selección del abordaje endoscópico para la hipertrofia prostática depende del tamaño de la glándula para minimizar el riesgo del Síndrome de Resección Transuretral (intoxicación hídrica) y sangrado. De acuerdo a la GPC de Crecimiento Prostático, el láser de Holmio posee la ventaja de vaporizar y coagular simultáneamente, permitiendo resecar glándulas de gran tamaño que antes eran exclusivas de la cirugía abierta. La directriz estipula que la técnica HoLEP está formalmente recomendada como el estándar de mínima invasión en \"casos de próstatas mayores a 60 gramos\", siempre que exista el equipo y personal capacitado.<br><br>Perla ENARM: Enucleación prostática con láser Holmium (HoLEP). Se recomienda en casos de próstatas mayores a 60 grs y donde se encuentre disponible el equipo.<br><br>Análisis de Distractores: A y B) Volúmenes de 30 a 40 gramos, al ser pequeños a moderados, son el territorio ideal, clásico y estándar para la Resección Transuretral de Próstata (RTUP) monopolar o bipolar, no requiriendo forzosamente tecnología láser avanzada de enucleación. D) Los 80 gramos marcan históricamente el punto de corte tradicional donde se recomendaba la adenomectomía abierta (cirugía retropúbica de Millin), pero el límite inferior para justificar el uso inicial del láser HoLEP arranca desde los 60 gramos.",
        source: "IMSS-176-18 RR, Síntomas del Tracto Urinario Inferior y Crecimiento Prostático, 2018, Anexos, Página 63."
    },
    {
        id: 104,
        question: "Durante la primera fase de cribaje de la herramienta Mini-Nutritional Assessment (MNA) en un paciente geriátrico, ¿cuál es el puntaje máximo total acumulable que descarta riesgo de malnutrición y evita pasar a la evaluación extendida?",
        options: ["10 puntos", "12 puntos", "14 puntos", "16 puntos"],
        answer: 2,
        justification: "Justificación: La sarcopenia y desnutrición en el adulto mayor empeoran el pronóstico hospitalario. El instrumento MNA se divide en dos secciones: Cribaje rápido (6 preguntas) y Evaluación global. De acuerdo a la GPC de Valoración Geriátrica, la sumatoria tope del bloque inicial (que valora pérdida de apetito, pérdida de peso, movilidad, estrés psicológico, problemas neuropsicológicos y el IMC) es de 14 puntos matemáticos. Si el paciente alcanza entre \"12 y 14 puntos\", se asume un \"estado nutricional normal\" y la prueba concluye, optimizando el tiempo clínico en consulta.<br><br>Perla ENARM: Evaluación del cribaje (subtotal máx. 14 puntos). 12-14 puntos: estado nutricional normal. 8-11 puntos: riesgo de malnutrición. 0-7 puntos: malnutrición.<br><br>Análisis de Distractores: A y B) Obtener entre 8 y 11 puntos (incluyendo 10) cataloga al anciano en una zona de \"riesgo de malnutrición\", obligando inmediatamente al médico a contestar la segunda parte del cuestionario (Evaluación global) para perfilar intervenciones dieto-terapéuticas. D) 16 puntos corresponde explícitamente a la sumatoria máxima de la segunda parte de la prueba (Evaluación global), no del apartado de cribaje inicial. El puntaje máximo de la prueba completa es de 30 puntos.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral, 2018, Anexos, Cuadro 16, Página 72."
    },
    {
        id: 105,
        question: "Al recibir el reporte citopatológico de una biopsia por aspiración de un nódulo tiroideo clasificado como \"Categoría 2 de Bethesda\", ¿cuál es la descripción morfológica predominante esperada en la muestra?",
        options: ["Grupos foliculares con hendiduras nucleares", "Abundante coloide y células foliculares típicas", "Células de Hürthle y abundantes linfocitos", "Patrón microfolicular y escaso coloide"],
        answer: 1,
        justification: "Justificación: La citología tiroidea rige la decisión entre cirugía o vigilancia. De acuerdo a la GPC de Nódulo Tiroideo, la Categoría 2 de Bethesda diagnostica lesiones estrictamente \"Benignas\" con un riesgo de neoplasia histológica casi nulo (0-3%). El texto señala que la entidad clínica que con mayor abrumadora frecuencia arroja este resultado es la hiperplasia nodular o bocio coloide, cuyo frotis se caracteriza celularmente por exhibir \"abundante coloide, grupos de células foliculares típicas en monocapa y celularidad histiocitaria\".<br><br>Perla ENARM: Categoría 2: Benigna. La entidad más frecuente es la hiperplasia nodular cuya PAAF se caracteriza por extendidos con abundante coloide, grupos de células foliculares típicas en monocapa y celularidad histiocitaria.<br><br>Análisis de Distractores: A) Las hendiduras nucleares longitudinales (\"granos de café\"), los pseudoinclusiones y los cuerpos de psamoma son el sello patognomónico celular del Carcinoma Papilar de Tiroides, correspondiendo a la Categoría 6 (Maligno). C) Una invasión linfoide masiva sobre células oncocíticas (Hürthle) plantea el diagnóstico diferencial de Tiroiditis de Hashimoto, pero si hay atipia nuclear puede ameritar ser reportado como Categoría 3 (AUS/FLUS). D) Un frotis hipercelular de patrón microfolicular monótono con \"escaso o ausente coloide\" representa la definición exacta de la Categoría 4 de Bethesda (Sospechosa de neoplasia folicular), obligando a hemitiroidectomía diagnóstica.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico, 2009, Anexos, Cuadro 2, Página 83."
    },
    {
        id: 106,
        question: "Para interpretar correctamente si un paciente pediátrico cursa con hipertensión arterial empleando las tablas de percentiles oficiales de las guías clínicas, ¿qué parámetro antropométrico se debe cruzar obligatoriamente con la edad cronológica del niño?",
        options: ["Percentil de índice de masa corporal", "Percentil de peso para la edad", "Percentil de talla o estatura", "Percentil de perímetro cefálico"],
        answer: 2,
        justification: "Justificación: El diagnóstico de hipertensión en pediatría no se rige por cifras fijas universales, ya que el tamaño del sistema arterial y la resistencia periférica crecen proporcionalmente al desarrollo somático lineal. De acuerdo a la GPC de alteraciones de presión, los tabuladores diagnósticos (Cuadro 8) se titulan \"Presión arterial en niños por edad y percentil de talla\". El pediatra requiere forzosamente ubicar la edad, calcular el percentil de estatura actual del paciente (50, 90, 95) y entonces interceptar la cifra de presión sistólica y diastólica en el normograma.<br><br>Perla ENARM: Cuadro 8. Presión arterial en niños por edad y percentil de talla. (El cruce diagnóstico exige Edad y Percentila de Talla).<br><br>Análisis de Distractores: A y B) El peso y el IMC son útiles para diagnosticar factores de riesgo metabólicos subyacentes, pero fisiológicamente un niño obeso sin incremento de talla no tiene una readaptación estructural del lecho vascular de la misma forma que lo dicta el crecimiento longitudinal óseo; las tablas no ajustan la tensión arterial basal normal por el peso. D) El perímetro cefálico es un marcador de neurodesarrollo temprano y volumen cerebral, irrelevante para los gradientes hemodinámicos sistémicos estandarizados en pediatría mayor.",
        source: "SS-188-18 RR, Prevención y Diagnóstico de Hipertensión Arterial, 2018, Anexos, Cuadro 8, Página 137."
    },
    {
        id: 107,
        question: "En la evaluación funcional del paciente geriátrico que se encuentra en rehabilitación tras un infarto cerebral, ¿con qué factor clínico guarda una correlación directa el resultado de la \"Prueba de caminata de 6 minutos\" (6MWT)?",
        options: ["Riesgo de evento isquémico cerebral recurrente", "Potencial de deambulación del individuo en la comunidad", "Capacidad vital forzada respiratoria máxima", "Riesgo de caídas por inestabilidad ortostática"],
        answer: 1,
        justification: "Justificación: La rehabilitación neurológica exige medir la resistencia cardiorrespiratoria acoplada al esfuerzo biomecánico de la hemiparesia. De acuerdo a la GPC de Rehabilitación Post-EVC, la prueba de caminata de 6 minutos (6MWT) es la herramienta sugerida y avalada con Grado de recomendación A para evaluar la marcha dinámica. Su utilidad recae en que la velocidad de marcha cómoda y la distancia alcanzada en este lapso tienen una correlación altísima y directa con el \"potencial de deambulación del individuo en la comunidad\" (es decir, la autonomía para cruzar calles, ir a tiendas y reintegrarse socialmente).<br><br>Perla ENARM: Se sugiere la utilización de la 6MWT para la evaluación de la marcha después de un EVC, debido a la correlación entre velocidad de la marcha cómoda y el potencial de deambulación del individuo en la comunidad.<br><br>Análisis de Distractores: A) El riesgo de recurrencia isquémica se evalúa mediante marcadores vasculares, ecocardiogramas, Holter y control de cifras tensionales, no mediante una prueba de esfuerzo aeróbico de piso. C) La espirometría en reposo y el FEV1/FVC determinan la capacidad ventilatoria pulmonar (volúmenes y capacidades restrictivas/obstructivas), mientras que la 6MWT mide la tolerancia periférica y el gasto metabólico de la marcha funcional. D) El riesgo de caídas y la propiocepción estática y dinámica se valoran formalmente con escalas de balance fino, como la prueba de Berg o la Escala de Tinetti, no evaluando primordialmente la velocidad en 6 minutos.",
        source: "DIF-331-21 RR, Rehabilitación de Adultos post-EVC, 2021, Recomendaciones, Página 28."
    },
    {
        id: 108,
        question: "Según la clasificación MIC (Morfológica, Inmunológica y Citogenética) de las Leucemias Agudas Pediátricas, ¿qué alteración cromosómica es el sello biológico del subtipo mieloide M4 Eo (Mielomonocítica con eosinofilia)?",
        options: ["t(15;17)", "t(8;21)", "inv(16)(q23)", "t(9;22)"],
        answer: 2,
        justification: "Justificación: La estratificación citogenética de la leucemia mieloide dicta el riesgo de recaída y la sensibilidad a quimioterapia. De acuerdo a la GPC de Leucemia Aguda en Pediatría, el Cuadro 1 de Clasificación MIC correlaciona la morfología FAB con sus traslocaciones. De manera muy específica, la variante M4 que se acompaña de eosinófilos atípicos medulares (M4 Eo) alberga sistemáticamente la alteración estructural del cromosoma 16, descrita formalmente como \"inv(16)(q23)\".<br><br>Perla ENARM: Cuadro 1. Sistema MIC. Leucemia Aguda Mieloide Grupo MIC: M4 Eo, Cariotipo: inv(16)(q23).<br><br>Análisis de Distractores: A) La traslocación t(15;17) es la anormalidad cromosómica definitoria e inconfundible de la Leucemia Promielocítica Aguda (M3), altamente sensible al ATRA. B) La traslocación t(8;21) se presenta de forma característica en el subtipo de Leucemia Mieloblástica Aguda con maduración (M2). D) La t(9;22) o cromosoma Filadelfia es el motor primario de la Leucemia Mieloide Crónica y un marcador de mal pronóstico en un subgrupo de Leucemia Linfoblástica Aguda, no define a la M4.",
        source: "SS-061-08 RR, Diagnóstico de Leucemia Aguda en Pediatría, 2008, Anexos, Cuadro 1, Página 136."
    },
    {
        id: 109,
        question: "Al clasificar la gravedad clínica de un paciente portador de Enfermedad Arterial Periférica mediante la escala de Fontaine, ¿qué manifestación isquémica corresponde al Estadio III?",
        options: ["Dolor isquémico de reposo", "Claudicación intermitente severa", "Úlcera o gangrena focal", "Claudicación intermitente moderada"],
        answer: 0,
        justification: "Justificación: La insuficiencia arterial crónica progresa desde el dolor al esfuerzo hasta la isquemia crítica que amenaza la viabilidad de la extremidad. De acuerdo a la GPC de Enfermedad Arterial Periférica, el sistema europeo clásico de Fontaine estratifica esta perfusión en cuatro peldaños anatómico-funcionales. El estadio I es asintomático. El estadio II abarca la claudicación (IIa moderada, IIb severa). Cuando el flujo basal de las arterias es tan pobre que la demanda metabólica hística no se cubre ni siquiera estando el paciente inmóvil en la cama, se establece clínicamente el \"Estadio III: Dolor isquémico de reposo\" (característicamente nocturno y aliviado al colgar la pierna).<br><br>Perla ENARM: Clasificación de Fontaine de la gravedad de la EAP: Estadio I Asintomático, Estadio II Claudicación intermitente, Estadio III Dolor isquémico de reposo, Estadio IV Úlcera o gangrena.<br><br>Análisis de Distractores: B) La claudicación intermitente limitante a cortas distancias corresponde al Estadio IIb de la escala de Fontaine. C) La necrosis tisular establecida, con ulceración isquémica franca o gangrena distal seca/húmeda, define la terminalidad de la enfermedad arterial, enmarcada en el Estadio IV de Fontaine. D) La claudicación que aparece tras un esfuerzo mayor y que es tolerable conforma el subgrupo del Estadio IIa de Fontaine.",
        source: "IMSS-007-08 RR, Enfermedad Arterial Periférica de Miembros Inferiores, 2008, Anexos, Cuadro 1, Página 44."
    },
    {
        id: 110,
        question: "De acuerdo a la escala de funcionalidad del Grupo Oncológico Cooperativo del Este (ECOG), ¿qué estado clínico debe presentar un paciente con cáncer de pulmón para asignarle un grado numérico de 4?",
        options: ["Capaz de autocuidado pero encamado 50%", "Completamente discapacitado y encamado todo el día", "Restringido en trabajo activo pero deambulando", "Incapaz de trabajar pero fuera de cama"],
        answer: 1,
        justification: "Justificación: La valoración del Performance Status (Estado de Desempeño) es imperativa en oncología, ya que determina si un paciente tolerará la toxicidad de la quimioterapia sistémica o si debe canalizarse a cuidados paliativos exclusivos. De acuerdo a la GPC de Cáncer de Pulmón, la métrica universal ECOG califica la vitalidad del 0 al 5. El grado máximo de postración en vida corresponde al \"Grado 4\", que define a un individuo que está \"Completamente discapacitado; incapaz de realizar alguna de las actividades de autocuidado. Encamado o en silla todo el día, gravemente limitado\".<br><br>Perla ENARM: Escala ECOG. Grado 4: Completamente discapacitado; incapaz de realizar alguna de las actividades de autocuidado. Encamado o en silla todo el día, gravemente limitado.<br><br>Análisis de Distractores: A) El paciente que mantiene capacidad residual de autocuidado, pero la fatiga neoplásica lo obliga a estar \"confinado a cama o silla más del 50% del día\" se clasifica en el Grado 3 del ECOG. C) El individuo que ya no puede ejecutar un trabajo físico extenuante o activo, pero que puede moverse libremente y hacer labores ligeras de oficina (deambulando más del 50% del tiempo), se clasifica en el Grado 1 del ECOG. D) La incapacidad de trabajar pero conservando la presteza ambulatoria y el cuidado propio casi normal confiere un Grado 2 en el ECOG.",
        source: "IMSS-030-19 RR, Diagnóstico y Tratamiento del Cáncer de Pulmón, 2019, Anexos, Cuadro 6, Página 45."
    },
    {
        id: 111,
        question: "En el manejo de una mujer con embarazo de bajo riesgo que ingresa a sala de labor con dilatación de 6 cm, ¿cuál es el intervalo de tiempo recomendado por la GPC para realizar la monitorización intermitente de la frecuencia cardiaca fetal?",
        options: ["Cada 5 a 10 minutos", "Cada 15 a 30 minutos", "Cada 30 a 45 minutos", "Cada 45 a 60 minutos"],
        answer: 1,
        justification: "Justificación: La vigilancia estrecha del bienestar fetal en el primer periodo de trabajo de parto permite detectar desaceleraciones tempranas asociadas a hipoxia periparto sin inmovilizar innecesariamente a la madre con monitores continuos. De acuerdo a la GPC de Vigilancia y Manejo del Trabajo de Parto, el \"Algoritmo 2. Vigilancia en sala de labor\" dicta que una vez ingresada la paciente (fase activa con dilatación >5 cm), la acción médica recomendada es auscultar la Frecuencia Cardiaca Fetal (FCF) rítmicamente en un rango de \"cada 15 a 30 minutos\", durante 1 minuto completo inmediatamente después del acmé de una contracción uterina (verificando que oscile entre 110-160 lpm).<br><br>Perla ENARM: Algoritmo 2. Vigilancia en sala de labor: Vigilancia obstétrica -> FCF cada 15-30 minutos, durante 1 minuto y después de contracción.<br><br>Análisis de Distractores: A) Auscultar a la paciente cada 5 minutos interrumpe excesivamente la dinámica del parto fisiológico; este margen cerrado está reservado exclusivamente para la vigilancia hiper-estrecha en el segundo periodo del trabajo de parto (periodo expulsivo inminente) o en gestaciones de alto riesgo fetal. C y D) Lapsos de 45 a 60 minutos de abandono acústico en una paciente que cursa con dinámica uterina efectiva y trabajo de parto franco incrementan dramáticamente el riesgo médico legal de pasar por alto una asfixia fetal progresiva intraparto, constituyendo mala práctica.",
        source: "IMSS-052-19 RR, Vigilancia y Manejo del Trabajo de Parto, 2019, Algoritmos, Página 47."
    },
    {
        id: 112,
        question: "Al clasificar clínicamente la asimetría en un paciente que cursa con parálisis de Bell utilizando la escala internacional de House-Brackmann, ¿qué manifestación ocular y facial otorga un Grado V de disfunción?",
        options: ["Asimetría al reposo con parálisis total", "Movimientos apenas perceptibles y cierre ocular incompleto", "Parálisis total sin ningún tipo de movimiento", "Asimetría al movimiento con cierre ocular completo"],
        answer: 1,
        justification: "Justificación: La escala de House-Brackmann otorga un valor pronóstico en la lesión del nervio facial, guiando la necesidad de corticoterapia agresiva o antivirales. De acuerdo a la GPC de Parálisis de Bell, el Grado V define una disfunción neural severa en el límite de la sección total. Clínicamente, el paciente presenta un rostro altamente deformado por la atonía (\"asimetría evidente al reposo\"), y al esfuerzo, la frente no tiene movimiento, la boca tiene un tirón muy ligero (\"movimientos apenas perceptibles\"), y el dato patognomónico que lo ancla en esta gravedad es el \"cierre ocular incompleto\", predisponiendo a úlceras corneales (lagoftalmos).<br><br>Perla ENARM: Escala House-Brackmann. Grado V Disfunción severa: Global: solamente movimientos apenas perceptibles. Asimetría al reposo. Movimiento de frente: ninguno. Ojo: cierre incompleto.<br><br>Análisis de Distractores: A y C) La ausencia absoluta de contracción fibrilar ante cualquier comando, el colapso flácido íntegro del hemirrostro y el cero movimiento global catalogan a la lesión periférica letal del \"Grado VI (Parálisis total)\". D) Una asimetría desfigurante que ocurre solo durante el movimiento (por ejemplo, al sonreír), pero que al pedirle que apriete los párpados logra un cierre ocular firme y total, sitúa la lesión en una lesión intermedia, típicamente Grado III o IV (Disfunción moderada a moderada-severa).",
        source: "IMSS-066-08 RR, Parálisis de Bell en el Adulto, 2008, Anexos, Cuadro Clínico, Página 49."
    },
    {
        id: 113,
        question: "En la valoración ambulatoria de primer contacto a un paciente con dolor crónico y puntos gatillo sugestivos, ¿cuál es el cuestionario clínico estandarizado y recomendado para medir específicamente el impacto de la Fibromialgia sobre su calidad de vida?",
        options: ["Cuestionario de Dolor de McGill", "Cuestionario de Impacto de la Fibromialgia (FIQ)", "Índice de Widespread Pain (WPI)", "Escala Visual Analógica Continua (EVA)"],
        answer: 1,
        justification: "Justificación: La fibromialgia es un síndrome somatomorfo y de sensibilización central que deteriora profundamente la capacidad laboral y el sueño. De acuerdo a la GPC de Tratamiento de la Fibromialgia, el algoritmo de abordaje central exige objetivar la limitación funcional para guiar la escalada de neuromoduladores. El \"Punto de Buena Práctica\" indica que el clínico debe proporcionar y ejecutar de forma estructurada la \"Evaluación del paciente a través de instrumentos validados\" diseñados exprofeso para la enfermedad, siendo el \"FIQ (Fibromyalgia Impact Questionnaire)\" la prueba de escrutinio protocolizada a nivel nacional.<br><br>Perla ENARM: Algoritmo 1. Tratamiento de la Fibromialgia: Realizar/Proporcionar: Evaluación del paciente a través de instrumentos validados (FIQ).<br><br>Análisis de Distractores: A) El cuestionario de McGill es excelente para la discriminación semántica y multidimensional de los tipos de dolor (neuropático vs nociceptivo), pero no mide la pérdida de la calidad de vida global ni la fatiga asociada a este reumatismo de tejidos blandos de forma específica. C) El Widespread Pain Index (WPI) cuenta las áreas corporales dolorosas (los cuadrantes) y es parte integral de los Criterios Diagnósticos de la ACR (junto con el índice de severidad de síntomas SS), pero la evaluación del \"impacto global de la enfermedad\" longitudinalmente se cede al FIQ. D) La escala EVA de 0 a 10 solo mide la intensidad puntual aislada de un episodio algésico en el día, ignorando la depresión, rigidez o astenia inherentes a la fibromialgia.",
        source: "IMSS-075-18 RR, Tratamiento de la Fibromialgia, 2018, Algoritmos, Página 51."
    },
    {
        id: 114,
        question: "Tras someter a un paciente masculino a biopsia de próstata por elevación leve del PSA, el reporte patológico informa un \"Grupo de Grado 1\" según el sistema internacional ISUP. ¿A qué puntaje clásico de la escala de Gleason corresponde este nivel de bajo riesgo?",
        options: ["Grado 6 (3 + 3)", "Grado 7 (3 + 4)", "Grado 7 (4 + 3)", "Grado 8 (4 + 4)"],
        answer: 0,
        justification: "Justificación: El sistema de la International Society of Urological Pathology (ISUP) de 2014 simplificó la escala de Gleason para mejorar la comprensión clínica y evitar tratamientos radicales en tumores indolentes. De acuerdo a la GPC de Cáncer de Próstata, la nueva estratificación divide el comportamiento biológico del 1 al 5. El \"Grupo 1\" (el de comportamiento más benigno y con recomendación de vigilancia activa pura) agrupa exclusivamente a aquellos focos histológicos confinados, glandulares y bien diferenciados, cuyo puntaje aditivo en el esquema antiguo corresponde estrictamente al \"Grado 6 (3+3)\".<br><br>Perla ENARM: Cuadro 10. Sistema de clasificación por grupo y grado ISUP: Grupo y grado 1: Patrón y escala de Gleason Grado 6 (3 + 3).<br><br>Análisis de Distractores: B) El Grupo de Grado 2 según la ISUP, engloba los tumores de riesgo intermedio favorable donde el patrón celular primario es 3 y el secundario es 4, sumando un Gleason total de 7 (3+4). C) El Grupo de Grado 3 de la ISUP concentra a las neoplasias de riesgo intermedio desfavorable, donde las células dominantes son más aberrantes (Gleason 4+3=7). D) El Grupo de Grado 4 avanza a los tumores agresivos o pobremente diferenciados (Gleason total de 8).",
        source: "IMSS-140-18 RR, Cáncer de Próstata, 2018, Anexos, Cuadro 10, Página 58."
    },
    {
        id: 115,
        question: "Al evaluar mediante ecocardiografía a un paciente adulto con antecedente de fiebre reumática infantil en la consulta de cardiología, ¿qué hallazgo anatómico de planimetría en el área de la válvula mitral establece que cursa con un Estadio B (Estenosis mitral progresiva y asintomática)?",
        options: ["Menor o igual a 1.0 cm²", "Mayor o igual a 1.5 cm²", "Menor a 1.5 cm²", "Mayor o igual a 2.0 cm²"],
        answer: 1,
        justification: "Justificación: La evolución de la estenosis mitral reumática es un contínuum de daño fibrótico, calcificación y fusión de las comisuras valvulares. De acuerdo a la GPC de la Válvula Mitral, la valvulopatía se estadifica de la A a la D para prever cirugía. El Estadio B agrupa a la \"Estenosis Mitral Progresiva\" (pacientes silentes con cambios anatómicos). El punto de corte ecocardiográfico que certifica que las valvas están enfermas y fusionadas, pero que el orificio aún es lo suficientemente permisivo para no colapsar la hemodinamia pulmonar severa, es poseer una \"Planimetría MVA (Mitral Valve Area) mayor o igual a 1.5 cm²\".<br><br>Perla ENARM: Estadíos anatómicos y hemodinámicos de la Estenosis Mitral (EM): Estadío B (Estenosis mitral progresiva): Cambios valvulares reumáticos con fusión de comisuras. Planimetría MVA >= 1.5 cm2.<br><br>Análisis de Distractores: A y C) Las áreas valvulares mitrales restrictivas que caen por debajo del umbral de 1.5 cm² (y especialmente el orificio crítico < 1.0 cm²) determinan el paso a la enfermedad letal o quirúrgica, designadas explícitamente en el cuadro como Estadio C (Estenosis severa asintomática) y Estadio D (Estenosis severa sintomática). D) El área fisiológica normal de una válvula mitral sana en un adulto promedio ostenta de 4.0 a 5.0 cm² de orificio libre de flujo; no existe estadificación reumática para cortes por encima de 2.0 cm2, salvo el grupo A (\"En riesgo\") que solo vigila flujo normal y velos en domo incipientes sin estrechez fija aún cuantificable como anormalidad hemodinámica grave.",
        source: "IMSS-235-09 RR, Diagnóstico y Tratamiento de la Patología de la Válvula Mitral, 2009, Anexos, Tabla 6, Página 75."
    },
    {
        id: 116,
        question: "En el dominio de \"Lenguaje y Construcción\" de la evaluación cognitiva (Mini-Mental State Examination), el médico debe solicitar la repetición precisa de una frase sin equivocaciones articulares. ¿Cuál es el enunciado estandarizado obligatorio por la guía clínica que debe emplearse?",
        options: ["Tres perros tristes comen trigo", "Ni si, ni no, ni pero", "El hombre camina por la calle", "La manzana es roja y dulce"],
        answer: 1,
        justification: "Justificación: El MMSE de Folstein exige que su aplicación y sus reactivos no sean alterados a voluntad, para preservar su validez psicométrica y estadística frente a las demencias afásicas o de disfunción articular. De acuerdo a la GPC de Alzheimer, en el apartado de valoración del lenguaje frontal y repetición fluida, la pauta instruye al médico emitir textualmente y por una sola vez el comando de conjunciones sin sentido rítmico natural: \"Repita la siguiente frase después de mí: 'Ni si, ni no, ni pero'\". Si el paciente omite o sustituye una preposición, el punto se deniega irremediablemente.<br><br>Perla ENARM: LENGUAJE Y CONSTRUCCIÓN: \"Repita la siguiente frase después de mí: 'ni si, ni no, ni pero'\". (1 punto).<br><br>Análisis de Distractores: A, C y D) Las opciones representan frases de memoria, trabalenguas lógicos o estructuras de sintaxis común que se emplean a menudo informalmente en cabecera por médicos no apegados a la GPC o extraídas del test MoCA (\"el gato se esconde bajo el sofá\"), anulando totalmente la estructura normada de la evaluación Folstein nacional para México.",
        source: "IMSS-393-10 RR, Enfermedad de Alzheimer, 2010, Anexos, Página 89."
    },
    {
        id: 117,
        question: "Ante un paciente en urgencias que cursa con dolor torácico pleurítico y taquicardia, se sospecha de Enfermedad Tromboembólica Venosa Pulmonar. Al aplicar el \"Modelo de escala de Ginebra (modificada)\", ¿a partir de qué puntuación se determina que el evento embólico tiene una \"Alta probabilidad\"?",
        options: ["Mayor de 2 puntos", "Mayor de 4 puntos", "Mayor de 6 puntos", "Mayor de 8 puntos"],
        answer: 2,
        justification: "Justificación: El score de Ginebra agrupa datos objetivos (frecuencia cardíaca elevada, cáncer, hemoptisis, antecedentes vasculares) para prescindir del Dímero D y pasar directo a la angio-TC en casos francos. De acuerdo a la GPC de Enfermedad Tromboembólica Venosa, la estratificación matemática de la escala de Ginebra original (modificada) indica textualmente en su nota interpretativa que: un puntaje menor de 2 indica baja probabilidad; un rango de 2 a 6 puntos confiere probabilidad intermedia; y un umbral aditivo estadístico de \"más de 6 puntos\" dictamina irrebatiblemente una \"alta probabilidad de embolia pulmonar\", eximiendo al clínico de pruebas biológicas de exclusión de bajo poder y obligando a la heparinización empírica.<br><br>Perla ENARM: Cuadro 10. Modelo de escala de Ginebra: Un puntaje < de 2 indica baja probabilidad de embolismo pulmonar. De 2-6 indican probabilidad intermedia y más de 6 indican alta probabilidad de embolia pulmonar.<br><br>Análisis de Distractores: A) Un puntaje menor de 2 denota un cuadro de origen atípico con muy escasa penetrancia para trombo en tránsito (baja probabilidad). B) Cifras en la escala de 3 a 5 puntos (ej. mayor a 4) pertenecen a la vasta y ambigua \"zona intermedia\" de la tabla, debiéndose apoyarse fuertemente con Dímero D ELISA antes del TAC. D) Cifras por encima de 8 puntos (muy severo) superan la barrera del diagnóstico firme, pero el corte oficial que enciende el protocolo de alta probabilidad se establece precozmente cruzando la barrera técnica de los 6 puntos.",
        source: "IMSS-425-18 RR, Tromboembolia Pulmonar, 2018, Anexos, Cuadro 10, Página 101."
    },
    {
        id: 118,
        question: "Durante el periodo de rehabilitación física de una paciente sometida a artroplastia total de rodilla por osteoartrosis severa, ¿cuál es la secuencia correcta y segura descrita por la guía para bajar escaleras utilizando muletas?",
        options: ["Pierna no operada y después muletas con pierna operada", "Muletas y pierna operada al mismo tiempo, y después pierna no operada", "Pierna operada y después pierna sana, deslizando las muletas al final", "Pierna no operada y muletas juntas, soportando el peso con la operada"],
        answer: 1,
        justification: "Justificación: El entrenamiento funcional de la marcha en el postoperatorio mediato de una sustitución de rodilla previene la luxación protésica o caídas letales. De acuerdo a la GPC de Artroplastia Total de Rodilla, el fisioterapeuta debe instruir una cinética articular de descarga (un Punto de Buena Práctica altamente evaluado). La instrucción para \"bajar escaleras con muletas\" obliga mecánicamente a colocar primero el soporte distal de equilibrio (\"colocando estas [las muletas] y la pierna operada en el escalón de abajo simultáneamente\") para amortiguar el peso, y \"posteriormente la pierna sana (no operada)\" descenderá para cargar el eje central de gravedad corporal firme y estabilizar el peldaño.<br><br>Perla ENARM: Instrucciones de rehabilitación: 7.-Bajar escaleras con muletas, colocando estas y la pierna operada en el escalón de abajo y posteriormente la pierna no operada.<br><br>Análisis de Distractores: A) Iniciar el descenso con la pierna fuerte \"no operada\" forzaría a la extremidad pléjica recién mutilada a sostener en solitario toda la masa del cuerpo en el escalón de arriba durante la transición de caída libre gravitacional, garantizando el colapso periprotésico doloroso y la inestabilidad de cuádriceps. Esta técnica descrita (pierna sana primero) es exclusiva para \"subir\" peldaños, no para descender. C y D) Las cinéticas cruzadas sin el apoyo basal sincrónico de la muleta (el tercer eje) contravienen la biomecánica isocinética ortopédica protectora de la carga axial descrita.",
        source: "IMSS-435-18 RR, Artroplastia Total de Rodilla, 2018, Anexos, Figura de Marcha, Página 105."
    },
    {
        id: 119,
