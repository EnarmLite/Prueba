        question: "En un paciente adulto diagnosticado con Trombocitopenia Inmune Primaria (TIP) persistente que carece de contraindicaciones quirúrgicas, ¿cuál es el tratamiento biológico de segunda línea dictado por el algoritmo ante la falta de respuesta médica?",
        options: ["Infusión continua de Inmunoglobulina G intravenosa", "Administración de análogos del receptor de trombopoyetina", "Procedimiento quirúrgico de esplenectomía", "Inmunosupresión profunda con anticuerpo monoclonal Rituximab"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Trombocitopenia Inmune Primaria, el bazo es el órgano destructor primario de las plaquetas opsonizadas. La directriz estipula tajantemente que en los mayores de edad sin riesgo anestésico inaceptable, la ablación del tejido linfoide esplénico es el estándar subsecuente normativo: \"En el adulto, si no tiene contraindicación quirúrgica o comorbilidades que incrementen el riesgo quirúrgico, preferir esplenectomía en pacientes con TIP persistente como terapia de 2ª línea\".<br><br>Perla ENARM: En el adulto, preferir esplenectomía en pacientes con TIP persistente como terapia de 2ª línea.<br><br>Análisis de Distractores: A) La inmunoglobulina intravenosa es un rescate de urgencia (junto con esteroides) utilizado exclusivamente en la primera línea ante sangrado masivo o mucoso. B y D) Los agonistas de trombopoyetina o el Rituximab fungen como tratamientos farmacológicos de tercera línea o alternativas desesperadas para quienes rechazan la cirugía o recaen tras la extracción del bazo.",
        source: "IMSS-143-19 RR, Diagnóstico y Tratamiento de Trombocitopenia Inmune Primaria, 2019, Tratamiento 2da Línea, Página 28."
    },
    {
        id: 245,
        question: "Al evaluar el control y equilibrio axial de un paciente post-EVC mediante la herramienta \"Trunk Impairment Scale\" (TIS), se procede a medir el dominio de \"Coordinación\". ¿Cuál es el movimiento estandarizado evaluativo que se exige realizar en el ítem 1 de este bloque?",
        options: ["Tocar la cama lateralmente con el codo hemipléjico", "Cruzar la pierna sana sobre la extremidad parética", "Rotar el tronco superior seis veces con la cabeza fija", "Levantar la pelvis de la cama del lado hemipléjico"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación Post-EVC, la escala TIS aísla las compensaciones espinales. En el apartado final de \"Co-ordination (Coordinación)\", el ítem número 1 dicta la orden motora restrictiva: \"Se instruye al paciente a rotar el tronco superior 6 veces (cada hombro debe moverse hacia adelante 3 veces)... la cabeza debe estar fijada en la posición inicial\", otorgando puntos si el movimiento es simétrico y se ejecuta sin trasladar el eje inferior.<br><br>Perla ENARM: Trunk Impairment Scale (TIS). Co-ordination, Item 1: Patient is instructed to rotate upper trunk 6 times (every shoulder should be moved forward 3 times), head should be fixated.<br><br>Análisis de Distractores: A) Tocar la cama con el codo evalúa el acortamiento y alargamiento activo del tronco, correspondiente al dominio intermedio de \"Equilibrio dinámico en sedestación\" (Dynamic sitting balance). B) Cruzar la pierna sin soporte forma parte del bloque de inicio de \"Equilibrio estático en sedestación\" (Static sitting balance). D) Levantar unilateralmente la pelvis valora los oblicuos pélvicos en el ítem 7 del equilibrio dinámico.",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos Post-EVC, 2021, Anexos, Figura 7, Página 34."
    },
    {
        id: 246,
        question: "Para clasificar hemodinámicamente a un paciente pediátrico y dictaminar hipertensión arterial severa (Estadio 2) empleando los nomogramas oficiales de la guía, ¿qué valor numérico adicional se debe sumar matemáticamente a la cifra del percentil 95 obtenido en la tabla?",
        options: ["Se le suman 10 mmHg exactos", "Se le suman 15 mmHg exactos", "Se le suman 12 mmHg exactos", "Se le suman 5 mmHg exactos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y Diagnóstico de Hipertensión Arterial, la arquitectura de las tablas pediátricas de talla-edad incluye una columna final para alertar sobre crisis hipertensivas o estadios avanzados (Estadio 2) que exigen farmacoterapia inminente. El renglón inferior límite y estandarizado oficial de peligro no agrega un porcentaje, sino una carga manométrica rígida a la barrera previa, descrito operativamente en cada tabla como: \"Pc 95 + 12 mmHg\".<br><br>Perla ENARM: Tablas de Presión arterial en niños por edad y percentil de talla: Umbral límite superior tabulado -> Pc 95 + 12 mmHg.<br><br>Análisis de Distractores: A, B y D) Cifras arbitrarias (5, 10 o 15 mmHg) arruinan el cálculo de resistencia periférica vascular estandarizado de la AHA adoptado por México. El umbral máximo que cruza a hipertensión grado 2 está normado universalmente en el niño al añadir la constante de \"+12 mmHg\" sobre el valor exacto de su percentila 95.",
        source: "SS-188-18 RR, Prevención y Diagnóstico de Hipertensión Arterial, 2018, Anexos, Tablas de Presión Infantil, Página 101."
    },
    {
        id: 247,
        question: "Al aplicar el Índice de Barthel para las Actividades Básicas de la Vida Diaria en la consulta de geriatría, se evalúa el parámetro de \"Alimentación\". ¿Qué estado funcional describe al adulto mayor que recibe una puntuación intermedia parcial de 5 puntos en este rubro?",
        options: ["Es capaz de preparar los alimentos desde cero en la cocina", "Necesita ayuda mecánica externa para cortar carne o el pan", "Es totalmente dependiente requiriendo nutrición enteral por sonda", "Conserva total independencia para llevar los bocados a la boca"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral y Diabetes en Adulto Mayor, el Índice de Barthel penaliza la pérdida de la motricidad fina distal. En el ítem de Alimentación, 10 puntos dictan autonomía absoluta, 0 puntos marca dependencia total. El puntaje intermedio penalizador de \"5 puntos\" se adjudica exclusiva y puntualmente a aquel anciano que aún puede masticar y deglutir, pero cursa con limitación articular severa, por lo que: \"Necesita ayuda para cortar carne, el pan, etc.\".<br><br>Perla ENARM: Índice de Barthel. Parámetro Alimentación: Necesita ayuda para cortar carne, el pan, etc. -> Puntuación: 5 puntos.<br><br>Análisis de Distractores: A) La preparación compleja de alimentos en la estufa no se evalúa en las \"Actividades Básicas\" de Barthel, sino en las \"Instrumentales\" (Escala de Lawton y Brody). C) El paciente dependiente que requiere que le introduzcan la comida o la sonda nasogástrica califica irremediablemente con \"0 puntos\". D) La independencia motora preservada que no demanda intervención asistencial externa obtiene el puntaje completo de \"10 puntos\".",
        source: "IMSS-657-21 RR, Diagnóstico y Tratamiento de Diabetes Mellitus 2 en Adulto Mayor, 2021, Anexos, Cuadro 6, Página 88."
    },
    {
        id: 248,
        question: "Tras el hallazgo ecográfico y citológico de una tumoración tiroidea, el servicio de endocrinología decide instaurar un tratamiento biológico ablativo mediante Inyección Percutánea de Etanol (PEI). ¿Cuál es la única indicación benigna anatómica avalada por la guía para este procedimiento agresivo endoluminal?",
        options: ["Bocio multinodular gigante que produce disnea", "Nódulos sólidos hiperfuncionantes (calientes)", "Lesiones quísticas benignas recidivantes", "Adenoma folicular atípico con patrón espongiforme"],
        answer: 2,
        justification: "Justificación: La ablación química con alcohol absoluto causa necrosis por coagulación y trombosis de los capilares, siendo riesgosa si se filtra fuera de una cápsula contenida. De acuerdo a la GPC de Nódulo Tiroideo No Tóxico, la esclerosis química liquida no actúa sobre tejido sólido. La Recomendación Clave (Grado B) decreta inamoviblemente: \"Se recomienda el uso PEI (Aplicación Percutánea de Etanol) como tratamiento para lesiones quísticas benignas recidivantes\". La directriz anexa explícitamente: \"La PEI no se recomienda para nódulos sólidos, ya sean hiperfuncionantes o no, o para BMN\".<br><br>Perla ENARM: Recomendación Clave. Se recomienda el uso PEI como tratamiento para lesiones quísticas benignas recidivantes. (No se recomienda para nódulos sólidos).<br><br>Análisis de Distractores: A, B y D) Las masas hiperplásicas densas, los bocios multinodulares sólidos y los nódulos \"calientes\" resisten la difusión del etanol, exigiendo en su lugar terapia metabólica isotópica (Radioyodo I131) o resección quirúrgica directa, estando la inyección química formalmente contraindicada por ineficacia y dolor intenso transitorio innecesario.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico en Adultos, 2009, Recomendaciones Clave, Página 45."
    },
    {
        id: 249,
        question: "En la Unidad de Cuidados Intensivos Neonatales se instaura el monitoreo del desarrollo somatométrico (peso, talla y perímetro cefálico) de los recién nacidos pretérmino. ¿Cuál es el instrumento gráfico estandarizado dictaminado por la guía mexicana para cruzar la edad gestacional de estos pacientes?",
        options: ["Curvas de crecimiento de Fenton", "Gráficas longitudinales de Ramos Galván", "Nomograma de percentiles de Lubchenco", "Tablas somáticas de Battelle y Capurro"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Manejo de Componentes Sanguíneos (que en sus anexos de neonatología aporta los esquemas basales de pretérmino), la monitorización nutricional y antropométrica del paciente prematuro exige estándares que simulen el crecimiento intrauterino a partir de las 22 semanas de gestación. El \"Cuadro 3\" y el título explícito de los gráficos dictaminan que la herramienta biológica actual y universal a emplear es: \"Curvas de crecimiento para mujeres y hombres prematuros de Fenton\".<br><br>Perla ENARM: Cuadro 3. Curvas de crecimiento para mujeres y hombres prematuros de Fenton.<br><br>Análisis de Distractores: B) Las gráficas de Ramos Galván son patrones históricos pediátricos nacionales obsoletos para infantes de término o niños mayores en escuelas, inútiles para la biometría micro-ajustada del feto prematuro. C) El nomograma de Lubchenco fue pionero en los años 60, pero actualmente ha sido desplazado sistemáticamente en los protocolos mexicanos modernos por las curvas de Fenton debido a su falta de actualización nutricional contemporánea. D) Capurro es un test de valoración neurológica-física de edad gestacional postparto, y Battelle es un inventario psicomotor; ninguno de los dos constituye tablas de graficación longitudinal de kilogramos o centímetros.",
        source: "IMSS-362-18 RR, Manejo de Componentes Sanguíneos, 2018, Anexos Neonatales, Cuadro 3, Página 48."
    },
    {
        id: 250,
        question: "Durante el escrutinio de demencia aplicando la escala \"Mini-Mental State Examination\" (MMSE), el clínico evalúa la función visuoespacial solicitando al paciente: \"Copie este dibujo\". Para otorgar el punto aprobatorio, el individuo debe dibujar dos pentágonos cruzados. ¿Qué característica geométrica exige rígidamente la pauta en la intersección de ambas figuras para validarla como correcta?",
        options: ["Debe formar de manera exacta un diamante o rombo de cuatro lados", "Deben intersectarse cruzando un único vértice superficial", "Debe formar un cuadrado perfecto de ángulos rectos en el centro", "Las dos figuras deben unirse formando una cruz asimétrica libre"],
        answer: 0,
        justification: "Justificación: El dibujo de los polígonos intersectados evalúa la preservación del lóbulo parietal derecho. De acuerdo a la GPC de Enfermedad de Alzheimer, los criterios de calificación de Folstein prohíben dar puntos por intenciones incompletas. En las directrices de puntuación para el MMSE, se especifica el requisito biomecánico absoluto: \"cada pentágono debe tener 5 lados y 5 vértices, y la intersección forma un diamante\". Si la unión conforma una figura distinta a cuatro lados internos (diamante/romboide), se califica inexorablemente con cero puntos.<br><br>Perla ENARM: Criterios MMSE: Copie este dibujo (1 punto): Cada pentágono debe tener 5 lados y 5 vértices y la intersección forma un diamante.<br><br>Análisis de Distractores: B) Si el paciente dibuja los pentágonos tocándose exclusivamente por la punta de un vértice, la intersección interna carece de área, revelando un colapso visuo-constructivo profundo patológico (0 puntos). C y D) Formar cuadrados centrales rectos de 90 grados o cruces desestructuradas incumple la geometría original de la tarjeta muestra, la cual exige la penetración oblicua de dos polígonos de 108 grados que obligadamente originan un paralelogramo romboidal o diamante de 4 puntas en su interior.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Escala MMSE, Página 34."
    },
    {
        id: 251,
        question: "En la evaluación prequirúrgica de un paciente programado para extracción dental (cirugía menor) que padece la \"Enfermedad de Von Willebrand subtipo 2B\", se debe asegurar la hemostasia. De acuerdo al algoritmo farmacológico, ¿cuál es el agente terapéutico indicado que suple el defecto y evita exacerbar la patología plaquetaria de este subtipo específico?",
        options: ["Infusión rápida con Desmopresina sintética endovenosa (DDAVP)", "Administración de ácido tranexámico aislado a grandes dosis", "Transfusión directa de crioprecipitados descongelados en piso", "Concentrados liofilizados de Factor VIII con Factor de Von Willebrand (CFC-FVIII/FVW)"],
        answer: 3,
        justification: "Justificación: El subtipo 2B de Von Willebrand se caracteriza por una mutación de ganancia de función donde el factor circulante se adhiere espontáneamente a las plaquetas, causando trombocitopenia por consumo. De acuerdo a la GPC de Diagnóstico y Tratamiento de Hemofilia, la aplicación del estimulante desmopresina liberaría más factor aberrante, precipitando trombosis y mayor caída de plaquetas. Por lo tanto, el \"Algoritmo de Terapéutica\" decreta que para el \"Tipo 2B\" en cirugías menores, está \"contraindicada DDAVP\", siendo la indicación ineludible de reemplazo seguro administrar: \"CFC-FVIII/FVW\" (Concentrados plasmáticos ricos en factor normal exógeno).<br><br>Perla ENARM: Algoritmo Terapéutico. Hemorragias leves/cirugía menor en EVW 2B: -> CFC-FVIII/FVW (contraindicada DDAVP).<br><br>Análisis de Distractores: A) La DDAVP es letal en el Tipo 2B, pues precipita agregación plaquetaria intravascular diseminada aguda al forzar la salida de las reservas de Von Willebrand mutado al torrente sanguíneo. B) Los antifibrinolíticos tópicos son adyuvantes insuficientes ante el déficit de adhesión plaquetaria primaria que requiere sustitución hemostática activa central. C) El crioprecipitado transmite infecciones virales, estando relegado de las opciones de primera línea actuales, ya que se exige el uso de los viales purificados recombinantes \"CFC-FVIII/FVW\".",
        source: "IMSS-408-10 RR, Diagnóstico y Tratamiento de Hemofilia (y Von Willebrand), 2010, Algoritmos, Página 62."
    },
    {
        id: 252,
        question: "En la atención de urgencias de un paciente con sospecha clínica de Tromboembolia Pulmonar (TEP), se le estratifica como \"Hemodinámicamente inestable\". Al cruzar el algoritmo diagnóstico, se corrobora que el paciente está \"críticamente enfermo\" e intolerante al traslado. ¿Cuál es el estudio de imagen de rescate obligado en la camilla de choque para confirmar o descartar el daño del ventrículo derecho?",
        options: ["Angiotomografía multimodal de tórax en escáner de urgencias", "Ecocardiograma transesofágico o transtorácico", "Gammagrama pulmonar ventilatorio-perfusorio portátil", "Determinación seriada de niveles de Dímero D capilar"],
        answer: 1,
        justification: "Justificación: El choque obstructivo masivo por embolismo cor-pulmonale impide movilizar al paciente fuera de su reanimador. De acuerdo a la GPC de Tromboembolia Pulmonar, el diagrama \"Algoritmo diagnóstico de embolia pulmonar\" dicta la vía a seguir en el paciente hipotenso que colapsa. En la rama \"Hemodinámicamente inestable -> ¿Está críticamente enfermo? -> SI\", se prescribe categóricamente omitir el viaje al tomógrafo y ejecutar in situ un \"Ecocardiograma transesofágico o transtorácico\" buscando signos directos de disfunción letal del ventrículo derecho (Signo de McConnell, dilatación libre) para autorizar trombolisis masiva desesperada.<br><br>Perla ENARM: Algoritmo de embolia pulmonar: Paciente hemodinámicamente inestable -> ¿Está críticamente enfermo? -> SI -> Realizar ecocardiograma transesofágico o transtorácico.<br><br>Análisis de Distractores: A) La tomografía axial multicorte es el \"estándar de oro\" algorítmico reservado exclusivamente para el paciente inestable que \"NO está críticamente enfermo\" y tolera mecánicamente el traslado al servicio de rayos X. C) La gammagrafía de ventilación/perfusión requiere cooperación ventilatoria, estabilidad alveolar y largos tiempos de decúbito, siendo impensable en el paro circulatorio o pre-paro del choque masivo agudo. D) El Dímero D sérico se solicita de forma restrictiva únicamente en el paciente \"Hemodinámicamente estable con baja probabilidad clínica\" de Wells, careciendo de utilidad pronóstica en el colapso cardiogénico franco por falta de especificidad.",
        source: "IMSS-425-18 RR, Diagnóstico y Tratamiento de Tromboembolia Pulmonar, 2018, Algoritmo Diagnóstico, Página 63."
    },
    {
        id: 253,
        question: "Al evaluar la depresión claudicante en el paciente oncológico terminal empleando el \"Cuestionario de Depresión de Beck\" (BDI), se analiza el constructo ejecutivo interrogado en la Pregunta 13. Para que este rubro alcance el puntaje aflictivo máximo extremo estandarizado en la prueba (3 puntos), ¿qué aseveración exacta y dicotómica debe referir y tachar el paciente?",
        options: ["Postergo la adopción de decisiones más que de costumbre", "Tengo más dificultad para tomar decisiones que antes", "Ya no puedo tomar decisiones", "Tomo decisiones casi siempre de forma autónoma"],
        answer: 2,
        justification: "Justificación: El letargo cortical somatomorfo en la enfermedad paliativa anula la función del lóbulo frontal. De acuerdo a la GPC de Cuidados Paliativos, el inventario de Beck se estructura desde la normalidad incólume hasta el parálisis conductual absoluta. El Ítem 13 (Toma de decisiones) avanza patológicamente: (a) toma decisiones, (b) posterga decisiones, (c) tiene gran dificultad. La opción \"d\", que impone el peso de letalidad máxima y castiga con los 3 puntos estadísticos directos en este dominio, es la frase terminal paralizante: \"Ya no puedo tomar decisiones\".<br><br>Perla ENARM: Cuestionario de Depresión de Beck. Pregunta 13. a) Tomo decisiones casi siempre. b) Postergo la adopción de decisiones. c) Tengo más dificultad para tomar decisiones. d) Ya no puedo tomar decisiones.<br><br>Análisis de Distractores: A) \"Postergo la adopción de decisiones\" corresponde al estadio leve incipiente de apatía, sumando 1 punto. B) \"Tengo más dificultad para tomar decisiones que antes\" marca la indecisión moderada (2 puntos). D) Afirmar autonomía para dictar veredictos (\"Tomo decisiones casi siempre\") denota vigilia intacta, aportando 0 puntos de riesgo al sumario de claudicación.",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Anexos, Cuestionario de Beck, Página 72."
    },
    {
        id: 254,
        question: "En el marco del Programa de Optimización de la Sangre (PBM), se atiende a un paciente ingresado en el servicio de \"Trauma y Ortopedia\" que presenta un cuadro de hemorragia aguda y sangrado activo profuso en el lecho quirúrgico. Según la matriz de transfusión estandarizada, ¿qué rango numérico del conteo plaquetario define que transfundir plaquetas de rescate es una indicación directa \"Apropiada\"?",
        options: ["De 20 a 50 x 10^3 µL o menor en todo momento", "Exclusivamente cuando la cifra es menor de 10 x 10^3 µL", "Cuando las plaquetas se encuentran por encima de 100 x 10^3 µL", "Solamente si el nivel recae entre 50 y 100 x 10^3 µL"],
        answer: 0,
        justification: "Justificación: Las indicaciones transfusionales restrictivas previenen reacciones anafilácticas y disfunción pulmonar. De acuerdo a la GPC de Manejo Hemático del Paciente, el cuadro matriz semaforizado para \"Plaquetas en Pacientes con Hemorragia Activa\" clasifica las intervenciones según el grupo clínico. En el rubro explícito de \"Trauma y ortopedia\", las casillas verdes categóricas donde \"La transfusión es apropiada\" se extienden abarcando tanto el conteo basal de choque \"Menor de 20 x 10^3\", como la ventana limítrofe inestable subsiguiente \"De 20 a 50 x 10^3\", permitiendo al cirujano ortopédico reponer el factor celular libremente ante vasos óseos sangrantes incontrolables sin restricción burocrática.<br><br>Perla ENARM: Cuadro Transfusión de Plaquetas en Hemorragia Activa: Trauma y ortopedia -> <20 x 10^3: La transfusión es apropiada. De 20 a 50 x 10^3: La transfusión es apropiada.<br><br>Análisis de Distractores: B) El dintel diminuto de 10 x 10^3 es un límite profiláctico empírico para leucemias estables sin sangrado, no aplicable al paciente exsanguinante en plancha quirúrgica ortopédica. C) Ante recuentos ricos superiores a >100 x 10^3 (casilla roja masiva), la directriz penaliza la transfusión dictaminando llanamente que \"La transfusión es inapropiada e innecesaria\". D) En la franja de 50 a 100 x 10^3 (casilla amarilla), la transfusión se restringe y evalúa dictaminando que \"es inapropiada e innecesaria, CON la excepción exclusiva en casos de disfunción plaquetaria viscoelástica\", no siendo la conducta universal aprobatoria \"verde\" de inicio.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Anexos, Cuadro de Plaquetas, Página 134."
    },
    {
        id: 255,
        question: "De acuerdo al sistema de clasificación morfológica, inmunológica y citogenética (MIC) para leucemias agudas pediátricas, ¿qué marcador inmunológico superficial, aparte de la positividad de la línea linfoide B, distingue de manera exclusiva y definitoria a la Leucemia de células B madura (subtipo L3)?",
        options: ["Presencia en la membrana de Inmunoglobulinas Ig k/l", "Expresión universal del antígeno CD10", "Positividad nuclear dominante del marcador TdT", "Positividad franca a la tinción Mieloperoxidasa (MPO)"],
        answer: 0,
        justification: "Justificación: La Leucemia Linfoblástica tipo Burkitt (L3) requiere quimioterapia hiper-fraccionada intensiva de ciclos cortos. De acuerdo a la GPC de Leucemia Aguda en Pediatría, el Cuadro 1 \"Sistema MIC\", aísla molecularmente a las estirpes neoplásicas de la médula ósea infantil. El clúster morfológico \"LAL células B madura (L3)\" se diagnostica citométricamente por carecer típicamente del antígeno inmaduro TdT, pero expresa de manera patognomónica y celular su receptor de diferenciación terminal en membrana: la inmunoglobulina de superficie \"Ig k/l (+)\".<br><br>Perla ENARM: Cuadro 1. Clasificación MIC. Leucemia Aguda Linfoblástica: LAL células B madura (L3) -> Marcador Inmunológico: Ig k / l (+).<br><br>Análisis de Distractores: B) El antígeno de la leucemia común (CD10/CALLA) suele negativizarse o ser irrelevante (+/-) en la etapa madura terminal tipo Burkitt, mientras que define categóricamente a las formas inmaduras LAL Común y Pre-B. C) La deoxinucleotidil transferasa terminal (TdT) es una enzima intra-nuclear exclusiva de los precursores blásticos inmaduros linfoides primarios (Pre-B o Pro-B), la cual se apaga y desaparece (negativa) en el clon celular ya maduro L3. D) La tinción peroxidasa (MPO) y sus granulaciones citoplásmicas son el sello universal definitorio ineludible del linaje agresivo de las Leucemias Agudas Mieloides, no de las estirpes linfoides B.",
        source: "SS-061-08 RR, Diagnóstico de Leucemia Aguda en Pediatría, 2008, Anexos, Cuadro 1, Página 100."
    },
    {
        id: 256,
        question: "En el protocolo de prevención neumocócica dictado en la Unidad Médica, se recibe a un niño de 5 años con comorbilidad de inmunosupresión sistémica adquirida (VIH). De acuerdo a la GPC, para optimizar el esquema de protección cruzada, se le administró primero la vacuna conjugada VCN13. ¿Cuál es el intervalo de tiempo mínimo obligatorio de espera antes de aplicar la subsecuente vacuna de polisacáridos VPS23S?",
        options: ["Mayor o igual a 8 semanas después de la VCN13", "Mayor o igual a 1 año después de la VCN13", "Mayor o igual a 6 meses después de la VCN13", "A las 48 horas tras verificar la reacción inflamatoria cutánea"],
        answer: 0,
        justification: "Justificación: Los pacientes carentes de inmunidad celular madura necesitan respuestas dependientes y polisacáridas robustas para frenar la sepsis por neumococo. De acuerdo a la GPC de Vacunación Universal (con esquema para Infección Respiratoria por Neumococo), la regla en inmunocomprometidos severos (VIH, Asplenia, Inmunodeficiencias congénitas) dicta una pauta acelerada de cobertura dual: \"Si la vacuna de VCN13 (conjugada) se ha dado primero... entonces se requiere dar y administrar la dosis de VPSN23 (polisacárida) tras un intervalo de ≥ 8 semanas después de la VCN13\", garantizando la cascada sin generar tolerancia ni agotamiento de antígenos circulantes en este estado de urgencia biológica pediátrica y adulta de alto riesgo.<br><br>Perla ENARM: Cuadro 5. Esquema neumococo en Inmunocomprometidos: 1 dosis de VPSN23 ≥ 8 semanas después de VCN13.<br><br>Análisis de Distractores: B) El lapso prolongado conservador de \"esperar ≥ 1 año\" se aplica obligadamente al subgrupo de individuos que tienen riesgo estructural per se pero conservan su sistema inmune intrínseco fuerte intacto (inmunocompetentes con diabetes, cardiopatía, implantes cocleares o asma), retrasando la polisacárida de manera prudente. C y D) Lapsos empíricos espurios de 6 meses o estímulos agudos de 48 horas rompen la biología estandarizada celular de respuesta de IgG frente a polisacáridos capsulares estipulada estrictamente en el dintel de las \"8 semanas\" de inmunología básica en la GPC.",
        source: "SS-384-20 RR, Enfermedades Prevenibles por Vacunación, 2020, Cuadro 5, Página 116."
    },
    {
        id: 257,
        question: "Durante el tamizaje de factores de riesgo en atención primaria para detectar precozmente la probabilidad de padecer diabetes en la próxima década, se le aplica a un paciente adulto el \"Cuestionario FINDRISC\". En la pregunta sobre el historial genético familiar, ¿qué cantidad de puntos sumarios otorga obligatoriamente la prueba si el sujeto relata que su madre y su hermano fueron diagnosticados con la enfermedad?",
        options: ["Otorga 3 puntos fijos", "Otorga 1 punto de riesgo bajo", "Otorga 5 puntos de penalidad directa", "Otorga 0 puntos ya que los genes no saltan dos generaciones"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Diabetes Mellitus tipo 2 en la Persona Adulta Mayor y población abierta, el test FINDRISC estratifica el peso biológico de la resistencia a la insulina con base en el polimorfismo hereditario. La pregunta 8 explora la consanguinidad metabólica dictando: \"¿Ha habido algún diagnóstico de DM en su familia?\". La matriz penaliza severamente el linaje directo de \"primer grado\": \"Sí: padres, hermanos o hijos\", adjudicando la mayor carga unitaria genética predispuesta tabulada equivalente a \"5 puntos\" matemáticos globales inmediatos hacia el cálculo de 10 años.<br><br>Perla ENARM: Cuestionario FINDRISC. ¿Ha habido algún diagnóstico de DM en su familia? -> Sí: padres, hermanos o hijos -> Puntuación: 5 puntos.<br><br>Análisis de Distractores: A) Los \"3 puntos\" conforman el riesgo intermedio genético diferido asociado y adjudicado de forma exclusiva cuando la enfermedad metabólica salta y recae únicamente en los consanguíneos de segundo grado, limitados a: \"Sí: abuelos, tíos o primos hermanos\". B y D) No asignar valor de gravedad (0 puntos) resulta inaplicable ante el historial hereditario comprobado; la respuesta negativa o de \"cero puntos\" obedece explícitamente a la indemnidad genética donde \"Ningún\" familiar sufre alteraciones del páncreas en la entrevista.",
        source: "IMSS-657-21 RR, Diabetes Mellitus tipo 2 en la Persona Adulta Mayor, 2021, Anexos, Cuestionario FINDRISC, Página 87."
    },
    {
        id: 258,
        question: "En el gabinete de rehabilitación ortopédica, un paciente adulto mayor ha sido sometido a una amputación transfemoral y se clasifica su potencial cinemático en el nivel \"K1\" (Actividad y cadencia muy baja o lenta y exclusiva de uso intra-domiciliario asistido). ¿Cuál es la indicación de prescripción y tecnología del componente de pie protésico recomendada puntualmente por la guía?",
        options: ["Pies protésicos multiaxiales y de almacenamiento y retorno de energía", "Pies mecánicos básicos tipo SACH", "Pies deportivos de pilón de carrera de fibra de carbono libre", "Pies dinámicos integrados controlados con microprocesador"],
        answer: 1,
        justification: "Justificación: Seleccionar un dispositivo biomecánico sobrecalificado para un amputado frágil ocasiona fatiga por inercia de la prótesis pesada o arrastre del tobillo y caídas insalvables. De acuerdo a la GPC de Rehabilitación en Amputación de Miembro Inferior, en la \"Prescripción de la Prótesis\", el grupo de desarrollo asigna los componentes mecánicos con relación a los niveles de actividad. Se señala incondicionalmente en su apartado resolutivo PBP: \"Se sugiere el uso de pies tipo SACH a usuarios con nivel de actividad K1\", proporcionando un talón de material suave estático que absorbe el escaso impacto de la pisada llana domiciliaria, sin requerir control muscular propulsivo avanzado de la cadera o rodilla sana de soporte por parte del senecto.<br><br>Perla ENARM: Prescripción protésica: Se sugiere el uso de pies tipo SACH a usuarios con nivel de actividad K1.<br><br>Análisis de Distractores: A) Los tobillos y pies de \"Almacenamiento y retorno de energía\" y los de conformación compleja multiaxial están indicados explícitamente como la prescripción ideal de progreso y fuerza cinética superior \"a usuarios con actividad K2 y K3\", que negocian escaleras e imperfecciones del suelo. C y D) Los componentes pilares de atletismo o los terminales dinámicos exigen velocidades de reacción anaerobia máximas mayores a 3 m/s, designándose obligadamente al nicho especial competitivo y extremo de \"usuarios nivel de actividad K4\" y deportistas avanzados, siendo inviables funcionalmente en el anciano intradomiciliario basal de la viñeta de inicio.",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputados, 2021, Intervenciones Protésicas, Página 15."
    },
    {
        id: 259,
        question: "En el abordaje terapéutico de la enfermedad arterial periférica en el consultorio de medicina familiar, a un paciente que refiere síntomas típicos de dolor claudicante en pantorrillas a los 100 metros de marcha sin datos de necrosis crítica se le instaura tratamiento farmacológico médico en primer nivel. De acuerdo al diagrama de flujo de intervención, ¿cuál es el esquema combinado explícito que se debe iniciar para estabilizar la placa y el endotelio antes de considerar envíos quirúrgicos?",
        options: ["Pentoxifilina a 400 mg y Heparina de Bajo Peso Molecular inyectable", "Pravastatina 20 mg c/24 hr y Ácido Acetilsalicílico (ASA) 150 mg c/24 hr", "Atorvastatina a dosis masivas de 80 mg y Cilostazol a 100 mg cada 12 horas", "Ácido Acetilsalicílico 300 mg diarios acompañado de Clopidogrel 75 mg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Enfermedad Arterial Periférica, la estabilización del lecho vascular infrarrenal se centra en detener el avance de la estenosis hiperlipidémica limitante trombótica primaria. El algoritmo número 1 asienta de forma directa y explícita la medicación estándar inicial de rescate en la consulta básica de escrutinio ordenando: \"Tratamiento farmacológico: Pravastatina 20 mg c/24 hr, ASA (Ácido Acetilsalicílico) 150 mg c/24 hr\", para posteriormente, en caso de no documentarse mejoría biológica a los meses, remitir al individuo al tercer nivel de derivación de Angiología para una eventual revascularización o simpatectomía endovascular terminal.<br><br>Perla ENARM: Algoritmo de atención EAP: Tratamiento farmacológico -> Pravastatina 20 mg c/24 hr + ASA 150 mg c/24 hr.<br><br>Análisis de Distractores: A, C y D) Medicamentos rheológicos y dilatadores potentes específicos (cilostazol, pentoxifilina) o esquemas agresivos duales antiagregantes pesados isquémicos de choque no conforman la indicación primaria tabulada institucional referida en la caja de manejo base restrictiva de la norma del algoritmo de primer nivel, el cual prioriza biológicamente y normativamente el control pleiotrópico lipídico fijo (Pravastatina) aunado a la dosis antiplaquetaria preventiva intermedia y noble de aspirina baja de 150 mg para evitar iatrogenias ulcerosas del tubo digestivo senil durante la larga y prudente observación médica clínica inicial periférica.",
        source: "IMSS-007-08 RR, Abordaje de Enfermedad Arterial Periférica, 2008, Algoritmos, Página 19."
    },
    {
        id: 260,
        question: "Durante el interrogatorio del desarrollo neurológico de un paciente de primera infancia en el programa del niño sano, el pediatra verifica las destrezas adquiridas y referidas en la columna de bipedestación progresiva. ¿Cuál es el margen de edad biológica estipulado como normal en la tabla normativa mexicana en el cual el lactante logra tempranamente \"aguantar su propio peso\" al flexionarle las rodillas apoyando los pies sobre una superficie?",
        options: ["Entre los 8 a 10 meses cronológicos", "De los 11 a los 12 meses cumplidos", "De los 4 a los 5 meses de edad", "A los 2 meses redondos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Detección de Alteraciones del Neurodesarrollo y Estimulación Temprana, el control tensional madurativo descendente alcanza las cinturas articulares inferiores del fémur antes del primer semestre. El \"Cuadro de Hitos motores\", en su bloque de verticalización temprana (Bipedestación primaria refleja precursora), dictamina y ordena a la pauta que el signo neurológico estático donde el infante \"Aguanta su peso\" apoyado pasivamente sobre las caderas sin ceder como gelatina o flacidez absoluta al cargarlo, tiene su punto de normalidad fijado: \"(normal a los 4-5 m)\".<br><br>Perla ENARM: Cuadro Hitos Motores (no se puntúan): Bipedestación temprana -> Aguanta su peso: (normal a los 4-5 m).<br><br>Análisis de Distractores: A) Los 8 meses corresponden al peldaño posterior superior en la tabla ortostática, estadio en el cual el lactante ya escala su madurez motriz y dictamina la capacidad de que \"Se mantiene de pie con ayuda y soporte directo\" en andaderas o rejas de la cuna. B) Los 12 meses superan la ventana pasiva inicial del recién nacido, constituyendo el hito del logro estático supremo y de inicio final atlético y de equilibrio maduro, donde biológicamente el infante ya \"Se mantiene de pie SIN ayuda humana o sostenimiento\". D) A los escasos 2 meses el infante apenas consolida la cintura torácica cefálica y cervical del neuroeje y el cuello erguido transitorio sobre sus codos al estar postrado ventralmente; la pelvis es incapaz y ajena por completo a tolerar ninguna carga tensional vertical estática del cuerpo.",
        source: "DIF-332-18 RR, Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Cuadro de Hitos Motores, Página 18."
    },
    {
        id: 261,
        question: "De acuerdo a la GPC de Optimización de la Sangre, al detectar anemia en un paciente adulto en la evaluación prequirúrgica, ¿cuáles son las tres etiologías patológicas principales que se recomienda investigar de forma obligatoria y protocolizada antes de la cirugía?",
        options: ["Deficiencia de folato, hepatopatía crónica o neoplasia oculta", "Sangrado crónico intestinal, hemólisis autoinmune o desnutrición severa", "Aplasia medular reactiva, deficiencia de vitamina B12 o sangrado activo", "Deficiencia de hierro, insuficiencia renal o inflamación"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Programa de Optimización de la Sangre (PBM), la anemia preoperatoria es el predictor más fuerte y documentado de transfusión perioperatoria innecesaria y eventos adversos. El Pilar 1 establece como recomendación biológica fuerte: \"Si hay anemia, se recomienda identificar la causa (deficiencia de hierro, insuficiencia renal o inflamación)\", para instaurar tratamiento restitutivo oral o venoso específico que optimice la masa eritrocitaria basal y evite la exposición a hemoderivados.<br><br>Perla ENARM: Pilar 1. Si hay anemia, se recomienda identificar la causa (deficiencia de hierro, insuficiencia renal o inflamación).<br><br>Análisis de Distractores: A, B y C) Aunque el folato, la hemólisis, y las hepatopatías crónicas merman la eritropoyesis, la directriz hemática institucional agrupa y focaliza la búsqueda etiológica primaria prequirúrgica estricta de primer contacto únicamente sobre los tres pilares epidémicos de la hemoglobina baja: el déficit férrico, la falla eritropoyética renal y la cascada hepcidina-inflamatoria.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Recomendaciones Clave, Página 41."
    },
    {
        id: 262,
        question: "En la evaluación de un paciente de 55 años con fibrilación auricular que obtiene 0 puntos en la escala de riesgo trombótico CHA2DS2-VASc, ¿cuál es la única indicación estricta del algoritmo para prescribir profilaxis con terapia dual antiplaquetaria (Aspirina + Clopidogrel)?",
        options: ["Presencia documentada de válvula cardiaca protésica mecánica", "Requerimiento por intervención coronaria percutánea reciente", "Alto riesgo de sangrado de tubo digestivo por angiodisplasia", "Antecedente de evento vascular cerebral embólico criptogénico"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Anticoagulación Oral, el riesgo nulo en la fibrilación auricular exime del uso de dicumarínicos. El \"Algoritmo 1. Valoración de riesgo y tratamiento de tromboprofilaxis\" establece que frente a un score \"0\", se debe cuestionar: \"¿Tiene requerimientos de terapia dual antiplaquetaria?\". El asterisco anexo define exclusivamente a esta excepción biológica ineludible como la \"Intervención coronaria percutánea reciente\", ordenando en caso afirmativo la prescripción temporal de \"Aspirina + Clopidogrel\" para proteger el stent metálico intraluminal.<br><br>Perla ENARM: Algoritmo 1. Escala de riesgo (CHAD252-VASc): 0 puntos -> ¿Tiene requerimientos de terapia dual antiplaquetaria? (*Intervención coronaria percutánea reciente) -> Si -> Aspirina + Clopidogrel.<br><br>Análisis de Distractores: A y D) Las prótesis valvulares o un EVC embólico previo sumergen al paciente instantáneamente en la zona roja de alto riesgo, exigiendo anticoagulación total formal y aboliendo por completo el abordaje inicial de la vía de \"0 puntos\". C) El riesgo de hemorragia gastrointestinal contraindica y limita el uso prolongado indiscriminado de la agresiva doble antiagregación plaquetaria descrita.",
        source: "SS-014-18 RR, Anticoagulación Oral en Fibrilación Auricular, 2018, Algoritmo 1, Página 37."
    },
    {
        id: 263,
        question: "Durante el seguimiento hematológico de un paciente pediátrico diagnosticado previamente con Trombocitopenia Inmune Primaria (TIP), se documenta que la cuenta plaquetaria no ha logrado la remisión. Según el algoritmo de estatificación temporal, ¿qué periodo exacto de evolución a partir del diagnóstico consolida la clasificación de \"TIP persistente\"?",
        options: ["Evolución clínica continua entre los 6 y 12 meses", "Falla terapéutica de 1 a 3 meses redondos", "Evolución clínica a partir del diagnóstico de 3 a 12 meses", "Trombocitopenia refractaria superior a 12 meses"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Trombocitopenia Inmune Primaria, el margen temporal de autolimitación plaquetaria divide las etapas de la enfermedad. El \"Algoritmo 1. Diagnóstico y clasificación\" fracciona la curva en tres estadios inamovibles. Si no remite en los primeros 3 meses (Reciente), pasa a la interrogante: \"¿La evolución a partir del diagnóstico es de 3 a 12 meses? -> SI -> Diagnóstico de TIP persistente\". Esta ventana denota una falla biológica moderada del freno esplénico que aún guarda posibilidad de cura tardía.<br><br>Perla ENARM: Algoritmo 1. Diagnóstico y clasificación de TIP: ¿La evolución a partir del diagnóstico es de 3 a 12 meses? -> SI -> Diagnóstico TIP persistente.<br><br>Análisis de Distractores: A y B) Lapsos empíricos menores (1 a 3 meses) o acotados (6 a 12 meses) carecen de validación diagnóstica estandarizada en el rombo algorítmico. Una evolución <= 3 meses cataloga al evento como \"TIP de reciente diagnóstico\". D) Cuando la destrucción plaquetaria periférica rebasa incesantemente el límite mayor absoluto de 1 año (>12 meses), el cuadro se decreta de por vida como \"TIP crónica\".",
        source: "IMSS-143-19 RR, Diagnóstico y Tratamiento de Trombocitopenia Inmune Primaria, 2019, Algoritmo 1, Página 7."
    },
    {
        id: 264,
        question: "Al realizar el cribaje nutricional de un adulto mayor mediante la herramienta Mini-Nutritional Assessment (MNA), se calcula el Índice de Masa Corporal (IMC) en el reactivo \"F\". ¿Qué valor de densidad metabólica castiga severamente al paciente otorgándole la calificación más baja de la métrica (0 puntos)?",
        options: ["Índice de masa corporal menor a 21 kg/m²", "Índice de masa corporal menor a 19 kg/m²", "Índice de masa corporal menor a 23 kg/m²", "Índice de masa corporal menor a 18 kg/m²"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral, el MNA detecta la caquexia senil silenciosa antes del colapso funcional. El reactivo F evalúa numéricamente el IMC del anciano otorgando de 0 a 3 puntos. El peldaño más grave y anoréxico de depleción magra y adiposa estandarizado en la tabla que dictamina biológicamente \"0 puntos\" de penalidad ineludible, corresponde a la medición pélvica-torácica de \"IMC < 19 kg/m²\".<br><br>Perla ENARM: Cuadro 16. Evaluación del estado nutricional (MNA). Reactivo F. Índice de masa corporal (IMC): 0 = IMC <19.<br><br>Análisis de Distractores: A) Un IMC entre 19 y <21 otorga una penalidad leve de 1 punto. C) El peso ideal o aceptable limítrofe en geriatría que recae en \"21 <= IMC <23\" arroja un puntaje seguro de 2. D) Establecer el punto de corte en 18 retrasa el diagnóstico de malnutrición asilar, violando el dintel precautorio estandarizado original validado de 19 del cuestionario europeo.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral en Unidades de Atención Médica, 2018, Anexos, Cuadro 16, Página 12."
    },
    {
        id: 265,
        question: "Durante la estadificación patológica oncológica del cáncer cervicouterino, ¿qué hallazgo clínico estructural o diseminativo determina rígidamente el Estadio Terminal \"IVb\" según el sistema FIGO/TNM?",
        options: ["Tumor con extensión masiva a la pared pélvica lateral y riñón no funcional", "Invasión celular documentada a los ganglios linfáticos regionales", "Presencia confirmada de metástasis a distancia en cualquier estadio tumoral o ganglionar", "Invasión directa y ulcerada a la mucosa de la vejiga urinaria anterior"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el estadio de diseminación hematógena dicta un manejo exclusivamente paliativo. En el \"Cuadro de Estadificación por Grupo\", se estipula inamoviblemente que la categorización final oncológica terminal \"Estadio IVb\" se otorga cuando el cuadro clínico correlaciona con la clasificación \"Cualquier T, Cualquier N, M1 (Metástasis a distancia)\", denotando que la clona tumoral abandonó la pelvis para invadir pulmón, hígado o hueso extracervical.<br><br>Perla ENARM: Cuadro Estadificación por Grupo (FIGO/TNM). Estadio IVb -> Cualquier T, Cualquier N, M1 (Con metástasis a distancia).<br><br>Análisis de Distractores: A) La infiltración ósea-muscular de la pared pélvica con hidronefrosis obstructiva secundaria tipifica clásicamente el Estadio IIIb. B) El alcance inicial tumoral linfático focal en nódulos regionales intrapélvicos (N1) sin M1, altera el pronóstico pero no decreta per se el estadio hematógeno IVb de metástasis sistémica distal. D) La perforación mucosa y fistulización del cérvix hacia la vejiga o el recto, sin depósitos distales comprobados (M0), clasifica rígidamente como Estadio IVa anatómico local agresivo.",
        source: "IMSS-333-09 RR, Diagnóstico y Tratamiento del Cáncer Cervicouterino, 2009, Anexos, Cuadro TNM, Página 14."
    },
    {
        id: 266,
        question: "En el plan interdisciplinario de rehabilitación de un paciente post-amputación de extremidad inferior que cursa con hiperalgesia en la herida, se prescribe la desensibilización temprana del muñón. ¿Qué intervención física mecánica específica recomienda la guía que el paciente se autoadministre en domicilio tras el entrenamiento?",
        options: ["Compresión hidráulica intermitente con bomba isquémica", "Crioterapia con compresas de hielo directo por 30 minutos", "Fricción profunda ascendente con mallas texturizadas", "Masaje y percusión controlada en el muñón"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación Interdisciplinaria en Amputación, la reorganización del mapa cortical del dolor y el alivio del síndrome del miembro fantasma exigen bombardeo táctil suave. La directriz (Grado C) ordena biológicamente al terapeuta: \"Se recomienda la autoadministración de técnicas de desensibilización mediante masaje y percusión en el muñón, para el control del dolor, con entrenamiento y enseñanza previa por parte de un experto en rehabilitación\", reeducando las terminaciones neuromatosas superficiales cicatriciales seccionadas.<br><br>Perla ENARM: Recomendaciones: Se recomienda la autoadministración de técnicas de desensibilización mediante masaje y percusión en el muñón, para el control del dolor.<br><br>Análisis de Distractores: A) La compresión hidráulica asilar o isquémica colapsaría el delicado flujo capilar remanente del colgajo recién cerrado, induciendo necrosis y dolor anóxico severo. B) Imponer crioterapia masiva directa (hielo) está proscrito en un tejido con microcirculación arteriópata periférica mermada debido a la vasoconstricción letal refleja que genera en el muñón diabético. C) Friccionar o abrasar rígidamente una herida en consolidación con texturas destrozaría la epidermis friable injertada.",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Personas con Amputación, 2021, Recomendaciones, Página 11."
    },
    {
        id: 267,
        question: "Durante la aplicación del escrutinio cognitivo con el test MMSE de Folstein, se le proporciona al paciente una hoja en blanco y se le pide: \"Quiero que por favor escriba una frase que diga un mensaje\". Para que el evaluador califique obligatoriamente este reactivo como positivo y funcional (1 punto), ¿qué tres elementos gramaticales debe contener ineludiblemente la oración escrita?",
        options: ["Verbo, adjetivo y un artículo definido", "Sujeto, verbo y un predicado largo", "Verbo activo, adjetivo y sujeto tácito", "Verbo, sujeto y sustantivo"],
        answer: 3,
        justification: "Justificación: La evaluación de la afasia agrafica o construccional en el MMSE penaliza la disgregación de las ideas del lóbulo frontal. De acuerdo a la GPC de Enfermedad de Alzheimer, las instrucciones de validación normativa para el examinador hispano son inflexibles: \"La pregunta se considera positiva cuando la frase contiene verbo, sujeto y sustantivo; la presencia de estos tres elementos es indispensable para calificar como correcta a la pregunta\". Cualquier omisión dictamina disfunción expresiva motora.<br><br>Perla ENARM: Instrucciones MMSE: Escribir un mensaje. La pregunta se considera positiva cuando la frase contiene verbo, sujeto y sustantivo; es indispensable para calificar como correcta (1 punto).<br><br>Análisis de Distractores: A, B y C) Aceptar oraciones incompletas carentes de sujeto, o llenas de artículos inconexos sin el núcleo accional del verbo o la base física del sustantivo relacional, sobrestima la indemnidad mental e invalida la sensibilidad del instrumento paramétrico validado por la clínica neuro-psiquiátrica de Folstein.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Instrucciones MMSE, Página 22."
    },
    {
        id: 268,
        question: "De acuerdo al sistema internacional MIC (Morfológico, Inmunológico, Citogenético) para tipificar la Leucemia Aguda Linfoblástica en Pediatría, ¿qué alteración cromosómica cruzada define y caracteriza clásicamente al fenotipo \"LAL Pre-B\", acoplada a la expresión medular de CD19 y CD10?",
        options: ["Cariotipo con deleción del(9p) o trisomía", "Alteración de fusión t(1;19) y presencia de t(9;22)", "Translocación pesada de núcleo t(8;14)", "Cariotipo t(4;11) definitorio de vida"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Leucemia Aguda en Pediatría, el Cuadro 1 \"Sistema MIC\", aísla la carga mutacional pronóstica que rige la neoplasia. El grupo linfoblástico \"LAL Pre-B\" se reconoce citométricamente por sostener positividad a CD10, CD19 y TdT (inmadurez), encadenando su biología destructiva medular estrictamente a los cariotipos estandarizados de \"t(1;19)\" y de manera alterna ominosa al cromosoma Filadelfia \"t(9;22)\".<br><br>Perla ENARM: Cuadro 1. Sistema MIC. Leucemia Aguda Linfoblástica: LAL Pre-B -> Marcadores: CD10+, CD19+, TdT+ -> Cariotipo: t(1;19), t(9;22).<br><br>Análisis de Distractores: A) La deleción del brazo corto del cromosoma 9, \"del(9p)\", asienta como defecto biológico casi patognomónico universal en las malignidades provenientes del timo, la \"LAL de precursores T\". C) El cariotipo agresivo de hiper-replicación \"t(8;14)\" corresponde íntegra y exclusivamente al linfoma-leucemia madura \"LAL células B madura (L3) tipo Burkitt\". D) La mortal y temprana disfunción genética celular pre-blástica \"t(4;11)\" sella el linaje de pronóstico fatal en los neonatos que debutan con \"LAL Pro-B (LAL de precursores B o B temprana)\".",
        source: "SS-061-08 RR, Diagnóstico Oportuno de Leucemia Aguda en Pediatría, 2008, Anexos, Cuadro 1, Página 38."
    },
    {
        id: 269,
        question: "Al interrogar el impacto somático en un paciente diagnosticado con síndrome de Fibromialgia utilizando el cuestionario específico (FIQ), la pregunta número 3 mide rígidamente el absentismo laboral o invalidez doméstica de los días pasados. Para esta métrica, ¿cuál es el cuestionamiento clínico exacto y numérico que se le presenta al enfermo?",
        options: ["¿Cuántas horas seguidas es capaz de realizar esfuerzo sin dolor?", "¿Cuántos días de la semana anterior no pudo trabajar o hacer las cosas de la casa por los síntomas?", "¿En cuántas de las últimas actividades ha necesitado tomar descansos profundos?", "¿Cuántos días pudo usted decir con certeza que se encontró bien o sin síntomas?"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de Fibromialgia, el FIQ posee reactivos cronológicos (del 0 al 7) que miden la parálisis económica provocada por la hiperalgesia. La pregunta 3 exige cuantificar fríamente la inmovilidad al plantear: \"¿Cuántos días de la semana anterior no pudo trabajar o hacer las cosas de la casa por los síntomas?\", sumando peso a la calificación global entre más alta sea la cifra de días postrados y perdidos por dolor miofascial limitante de la persona.<br><br>Perla ENARM: Cuestionario de Impacto de la Fibromialgia (FIQ): Pregunta 3. ¿Cuántos días de la semana anterior no pudo trabajar o hacer las cosas de la casa por los síntomas? (Marcar de 0 a 7 días).<br><br>Análisis de Distractores: A y C) El conteo cronometrado de horas libres de dolor continuo o pausas profundas fatigosas en rutinas carecen de tabulación estructural o peso evaluativo dentro de este cuestionario estandarizado mexicano. D) La interrogante opuesta compensatoria de \"¿cuántos días puede decir que se encontró bien?\" se evalúa de manera aislada en el reactivo contiguo de bienestar general previo (Pregunta 2 de la tabla).",
        source: "IMSS-075-18 RR, Diagnóstico y Tratamiento de Fibromialgia, 2018, Anexos, Cuestionario FIQ, Página 24."
    },
    {
        id: 270,
        question: "En la consulta de medicina de primer nivel se tamiza la salud ósea de una mujer perimenopáusica empleando el test probabilístico de \"FRAX\". Tras responder los ítems y sumar matemáticamente los puntos de riesgo de fractura a 10 años, ¿cuáles son las tres variables obligadas que el médico debe cruzar transversalmente en el gráfico de la guía (Cuadro 5B) para emitir el veredicto final?",
        options: ["Edad biológica, Talla en centímetros y Puntaje total FRAX", "Sexo del paciente, Densidad Mineral Ósea (DMO) y Puntaje total FRAX", "Edad biológica, Índice de Masa Corporal (IMC) y Puntaje total FRAX", "Resultado T-score en cuello femoral, Edad biológica y Puntaje total FRAX"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y Tratamiento de la Osteoporosis, las tablas de cribaje rápido nacional simplifican la decisión prescindiendo de densitometrías costosas para arrancar la terapia de soporte. La nota instruccional inferior ordena metodológicamente: \"Sume la totalidad de los puntos y compare en el cuadro 5B correspondiente, para lo cual requiere cruzar la edad, el IMC de la persona y el puntaje obtenido\". Un paciente delgado o añoso agravará su predicción en la gráfica roja termométrica comparado a uno con reserva calórica protectora muscular sólida.<br><br>Perla ENARM: Interpretación Tabla FRAX (Cuadro 5B): Requiere cruzar la edad, el IMC de la persona y el puntaje obtenido (con tope estadístico máximo estandarizado en 6 puntos).<br><br>Análisis de Distractores: A, B y D) Aunque la altura (talla) decaída puede insinuar colapso vertebral somático agudo, y el T-score del Dual-DXA u absorciometría radiológica confirma microscópicamente la microarquitectura apolillada final profunda del hueso, la tabla de colores mexicana de primer nivel estandarizada FRAX omite exigir dichos estudios complejos radiológicos, limitando su abscisa y ordenada clínica vital puramente a la edad metabólica y el IMC basal nutricional.",
        source: "IMSS-673-18 RR, Prevención y Tratamiento de la Osteoporosis, 2018, Anexos, Cuestionario FRAX (Interpretación), Página 35."
    },
    {
        id: 271,
        question: "En el marco terapéutico endocrinológico de un paciente diagnosticado con Nódulo Tiroideo No Tóxico benigno asintomático, la escisión quirúrgica o la vigilancia son las vías habituales. Sin embargo, ¿en qué subgrupo de pacientes específicos decreta la GPC que administrar I-131 (Radioyodo) representa una opción terapéutica de rescate avalada?",
        options: ["Pacientes con nódulos quísticos recidivantes asintomáticos y densos", "Pacientes ancianos, frágiles o con alto riesgo quirúrgico a la anestesia", "Mujeres jóvenes en etapa perimenopáusica con bocio coloide difuso", "Pacientes asintomáticos con nódulos de consistencia espongiforme"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Nódulo Tiroideo No Tóxico, reducir mecánicamente la compresión laringotraqueal de un bocio sólido sin extirparlo demanda inflamación isotópica. No obstante, el yodo radiactivo agota las reservas glandulares induciendo hipotiroidismo letárgico. La \"Recomendación Clave\" (Grado D) reserva esta intervención proscribiéndola de la población joven y dictando ineludiblemente: \"En pacientes ancianos, frágiles o con alto riesgo quirúrgico el I131 puede representar una opción terapéutica\". Esto achica el volumen de la masa obstructiva sin exponer al senecto comórbido grave al escalpelo de quirófano en cuello abierto vascularizado cervical.<br><br>Perla ENARM: Tratamiento con Radioyodo. Recomendación Clave: En pacientes ancianos, frágiles o con alto riesgo quirúrgico el I131 puede representar una opción terapéutica.<br><br>Análisis de Distractores: A) Los quistes tiroideos residuales y benignos llenos de líquido líquido repelen fisiológicamente la fijación del radiomarcador al carecer de tirocitos activos receptivos intracavitarios, indicándose formalmente para ellos la inyección percutánea química ablativa con \"Etanol (PEI)\". C y D) En adultos sanos operables, pacientes asintomáticos eutiroideos estables, o lesiones francamente espongiformes de escaso y mínimo riesgo pronóstico patológico (<3%), el yodo radiactivo constituye un exceso iatrogénico innecesario que se asocia a crisis destructivas estériles tirotóxicas silentes.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico en Adultos, 2009, Recomendaciones Clave, Página 15."
    },
    {
        id: 272,
        question: "Durante la consulta de medicina preventiva, el abordaje diagnóstico oportuno de la Enfermedad Arterial Periférica deprime el riesgo de amputación letal. ¿Cuál es el síntoma isquémico cardinal y clásico interrogado en el algoritmo de primer nivel que decreta el inicio inmediato del estudio de flujo y de terapia antiplaquetaria estabilizadora?",
        options: ["Pérdida de pulsos dístales acompañada de cianosis en declive en cama", "Frialdad asimétrica distal y formación de úlceras plantares por frote", "Claudicación intermitente, dolor inducido por ejercicio y que cede con reposo", "Parestesias continuas urentes ascendentes y debilidad motora en pantorrillas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Enfermedad Arterial Periférica, el diámetro de la arteria sana suple el flujo basal pero fracasa cuando el cuádriceps exige sobre-flujo. El diagrama \"Algoritmo de abordaje en Medicina Familiar\" dicta en su primera caja de escrutinio clínico semiológico interrogativo restrictivo: \"Buscar síntomas de claudicación intermitente, dolor en músculos de extremidades inferiores inducido por ejercicio y que cede con reposo\". Su confirmación activa el cruce de fármacos protectores de membrana y perfil lipídico.<br><br>Perla ENARM: Algoritmo Medicina Familiar EAP -> Acción inicial: Buscar síntomas de claudicación intermitente, dolor inducido por ejercicio y que cede con reposo.<br><br>Análisis de Distractores: A y B) La cianosis grave perenne, la palidez en la elevación de Bürger, o las úlceras necróticas digitales instaladas configuran el estadio de isquemia crítica profunda terminal, lo que exige revascularización en el tercer nivel de salvataje inminente y no representa el cuadro sintomático típico precoz inicial de \"Tamizaje/Escrutinio claudicante\" dictado por la GPC preventiva ambulatoria del primer eslabón médico. D) El dolor urente, eléctrico, en calcetín o lancinante corresponde a la afección anatómica vasa-nervorum intrínseca sensitiva de la polineuropatía distal desmielinizante diabética de fibras largas o cortas nerviosas, careciendo de la estricta y mecánica temporalidad isquémica claudicante-dependiente \"de la caminata\" referida para claudicación vascular periférica.",
        source: "IMSS-007-08 RR, Enfermedad Arterial Periférica, 2008, Algoritmo, Página 4."
    },
    {
        id: 273,
        question: "En la fase del manejo hemostático prequirúrgico de un paciente diagnosticado con Enfermedad de Von Willebrand (EVW) catalogada exclusivamente como de \"Tipo 3\", ¿cuál es la terapia farmacológica de reemplazo dictaminada en el algoritmo ante un procedimiento de sangrado leve o cirugía menor?",
        options: ["Concentrados liofilizados ricos en FVIII y FVW (CFC-FVIII/FVW)", "Administración endovenosa aislada de Desmopresina (DDAVP) rápida", "Infusión sistémica masiva de ácido tranexámico preventivo", "Transfusión directa de unidades globulares de Crioprecipitados a demanda"],
        answer: 0,
        justification: "Justificación: El \"Tipo 3\" de la Enfermedad de Von Willebrand es la variante letal y recesiva caracterizada por la \"ausencia total y absoluta biológica\" del factor en las células endoteliales. De acuerdo a la GPC de Hemofilia (y FVW), sin importar si el reto hemostático se cataloga como \"Hemorragia grave\" o \"Hemorragia leve/cirugía menor\", el \"Algoritmo de Terapéutica\" de EVW prohíbe el uso ineficaz de estimuladores orgánicos inútiles al carecer el paciente de reservas secretoras. Por tanto, instruye y exige el rescate ineludible de factor genético exógeno prescribiendo estrictamente: \"CFC-FVIII/FVW\".<br><br>Perla ENARM: Algoritmo de Terapéutica. Hemorragias leves/cirugía menor en EVW Tipo 3 -> Tratamiento ineludible de reemplazo: CFC-FVIII/FVW.<br><br>Análisis de Distractores: B) La DDAVP es inútil al 100% en el Tipo 3, ya que su mecanismo forzador de vaciamiento endotelial de factor carece de biomasa intracelular de Weibel-Palade donde poder actuar, requiriendo en los respondedores al menos un Tipo 1 u 2 funcional leve residual. C) El crioprecipitado congelado viral arrastra el estigma histórico patógeno de transmisión infecciosa, siendo extirpado y erradicado como pilar profiláctico en cirugías odontológicas bucales leves exiguas en los diagramas modernos. D) Los antifibrinolíticos tópicos sistémicos coadyuvan y sellan la matriz de fibrina post-extracciones, pero fracasan irremediablemente solos para formar el puente primario trombótico plaquetario inicial colagenoso exigido en una herida cruenta si el individuo no tiene ninguna hebra de Von Willebrand en sangre circulante.",
        source: "IMSS-408-10 RR, Diagnóstico y Tratamiento de Hemofilia, 2010, Algoritmos, Página 23."

    {
        id: 274,
        question: "Al ejecutar la tabla estructurada del \"Índice de Barthel\" para ponderar la autonomía geriátrica de un anciano asilar frágil diabético, se califica su necesidad de asistencia externa. ¿A qué categoría del test corresponde específicamente asignar un castigo limitante estandarizado de \"5 puntos\" en el rubro medular de \"Alimentación\"?",
        options: ["Al paciente postrado que recibe purés licuados o comida enteral por sonda", "Al adulto independiente capaz de preparar sus alimentos en estufa y servirlos en mesa", "Al adulto mayor que conserva autonomía solo para ingerir los alimentos pero precisa que la enfermera le rebane la carne", "Al individuo que retiene la fuerza dinámica fina y completa del acto deglutorio pero mastica lento en la silla"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral y de Diabetes en el Anciano, el \"Índice de Barthel\" fracciona la independencia biológica de las manos. Mientras que la autonomía incondicional se premia con 10, y el fracaso global exige 0, la \"Dependencia Parcial\" se califica de forma exacta con la adjudicación central paramétrica de \"5 puntos\", descrita y tabulada llanamente para aquel que: \"Necesita ayuda para cortar carne, el pan, etc.\", manteniendo la coordinación propioceptiva gruesa de acercar la cuchara a la boca pero sin la prensa palmar destructora mecánica cortante fina inicial.<br><br>Perla ENARM: Índice de Barthel. Parámetro de Alimentación: Necesita ayuda para cortar carne, el pan, etc. -> Asignación de puntaje: 5 puntos.<br><br>Análisis de Distractores: A) La necesidad absoluta y total de ser alimentado en boca por otro humano o por manguera yeyunal enteral califica irremediablemente con la dependencia abrumadora nula de \"0 puntos\" fisiológicos de Barthel. B) El planificar el guiso con cuchillos pesados de cocina y cocinar de cero al calor de la flama obedece y recae rigurosamente a las \"Actividades Instrumentales\" de las escalas cognitivas funcionales superiores complejas (Lawton y Brody), no siendo rubro tabulado por la tabla de las Necesidades Básicas biomecánicas inferiores de Barthel. D) Quien consume el alimento de forma aislada y lo procesa lenta pero independientemente sin apoyos periféricos retiene los \"10 puntos\" de la vida fisiológica de manera plena y total de su dominio corporal, a pesar del letargo.",
        source: "IMSS-657-21 RR, Diabetes Mellitus tipo 2 en la Persona Adulta Mayor, 2021, Anexos, Cuadro 6, Página 88."
    },
    {
        id: 275,
        question: "En el protocolo algorítmico hematológico de la Trombocitopenia Inmune Primaria (TIP), se clasifica y estipula la terapéutica dependiente de la edad. Para el escenario biológico del paciente con TIP de Reciente Diagnóstico (menor a 3 meses), ¿qué punto de corte cronológico define la GPC para dictaminar el salto de la vía \"Pediátrica\" (que tolera simple observación pasiva vigilante alta a plaquetas de 20x10^9) hacia la vía o brazo clínico \"Adulto\"?",

    {
        id: 276,
        question: "Al realizar la evaluación estandarizada de la corteza cognitiva superior de un anciano en la clínica de memoria utilizando la escala de Folstein (MMSE), el clínico llega al dominio y reactivo impreso que le ordena al paciente la orden visual literal: \"Cierre los ojos\". ¿Bajo qué escenario estricto y único de vulnerabilidad social rige la GPC que este enunciado evaluativo debe omitirse e invalidarse obligatoriamente de la sumatoria psicométrica global del individuo por falta de equidad clínica probatoria comprensiva analítica estructural basal visual?",
        options: ["En pacientes con menos de 3 años de escolaridad y educación básica académica", "En pacientes con hipoacusia senil neurosensorial demostrada y documentada asilar", "En pacientes con agudeza visual mermada secundaria a un antecedente crónico grave de presbicia y retinopatía", "En pacientes que presenten de manera activa un cuadro franco evidente y doloroso de irritación parpebral facial inflamatoria de parálisis asimétrica facial"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, el test internacional MMSE puede subestimar las capacidades y diagnosticar erróneamente demencia si no se compensa la pobreza formativa analfabeta y de retraso comprensivo gramatical primario. Las \"Instrucciones Criterios MMSE\" dictan invariablemente que tanto el reactivo que impone el mandato lectivo \"Cierre los ojos\", como el ítem final visuoespacial geométrico abstracto de \"Copie el dibujo\", no evalúan justamente al marginado. La sentencia de los manuales ordena de manera punitiva y estricta: \"(Esta pregunta se omitirá para pacientes con menos de 3 años de educación)\".<br><br>Perla ENARM: Criterios MMSE: Pregunta -Por favor haga lo que dice aquí. \"cierre los ojos\": *(Esta pregunta se omitirá para pacientes con menos de 3 años de educación).<br><br>Análisis de Distractores: B, C y D) Las deficiencias orgánicas de presbicia periférica óptica del cristalino, la sordera senil acústica coclear, o el dolor gesticular estático no se asientan ni norman biológicamente como eximentes validados para la anulación selectiva del bloque cognitivo; en su lugar, la herramienta recomienda suplirlas externamente dictando: \"es indispensable indicar al paciente que si usa lentes debe de colocárselos\" o gritar auditivamente con fuerza, manteniendo intacto el peso estadístico calificador.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Instrucciones MMSE, Página 21."
    },
    {
        id: 277,
        question: "En la evaluación exhaustiva del dolor profundo neoplásico de una mujer en programa de Cuidados Paliativos asilares, se aplica el apartado descriptivo sensorial analítico cualitativo (versión McGill/Beck Anexa). ¿Qué adjetivo semántico o descriptor clínico tachable de la tabla identifica biológicamente que la masa tumoral está causando injuria radicular neuropática y daño nervioso inflamatorio directo, más allá de la mera necrosis compresiva visceral abultada difusa opresiva nociceptiva pura?",
        options: ["Dolor pesado y agotador asfixiante generalizado en reposo", "Entumecido (adormecido)", "Sordo, latiente rítmico y continuo con claudicación", "Mortificante constante (calambre) doloroso visceral"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cuidados Paliativos en Adultos, discernir el dolor somático u óseo perióstico del dolor neuropático destructivo exige analizar el lenguaje gesticular con adjetivos selectos y sensitivos neurovasculares, dictando así la correcta prescripción coadyuvante de pregabalina o esteroide desinflamatorio descompresivo de raíz. La \"Pregunta 12\" de la escala de claudicación (Anexos) demanda indagar si \"ese adjetivo se aplica a su dolor\", enlistando aversiones como \"Punzante, Quemante...\". La única opción descrita biológicamente avalada tabulada para tipificar la parestesia nerviosa pura de mielina muerta se encuentra codificada dictando: \"Entumecido (adormecido)\".<br><br>Perla ENARM: Cuestionario de Cuidados Paliativos. 12. Marque con una cruz si ese adjetivo se aplica a su dolor: -> Entumecido (adormecido).<br><br>Análisis de Distractores: A, C y D) Referir agotamiento asfixiante general difuso asilar somatomorfo depresivo nociceptivo, latidos rítmicos vasculares inflamatorios tumorales arteriales palpitantes de pulso, o calambres puros masivos cólicos musculares intestinales constrictivos difusos profundos obedecen clásicamente a fenotipos dolorosos nociceptivos, vasculares puros distróficos o somáticos parietales, no caracterizando patognomónicamente la abolición y adormecimiento parestésico neuropático asimétrico propio de la afección del neuroeje sensitivo dañado de tracto del cable nervioso de mielina.",
        source: "IMSS-440-11 RR, Cuidados Paliativos en el Adulto, 2011, Anexos, Cuestionario Paliativo de Dolor, Página 24."
    },
    {
        id: 278,
        question: "Durante el escrutinio de desnutrición subclínica e involución metabólica asilar en el adulto mayor utilizando la herramienta Mini-Nutritional Assessment (MNA), se ponderan los daños orgánicos intercurrentes. ¿Qué condición médica psiquiátrica terminal grave descrita taxativamente en el ítem \"E\" de la prueba confiere una penalización devastadora otorgando \"0 puntos\" de supervivencia fisiológica funcional protectora en la escala de cribaje inicial?",
        options: ["Situación de estrés psicológico o duelo por pérdida reciente viudal en los últimos 3 meses", "Presencia de úlceras o lesiones cutáneas crónicas isquémicas profundas y desmoralizantes", "Diagnóstico clínico neurológico de demencia o depresión grave", "Trastorno del ánimo secundario reactivo y ansioso al consumir polifarmacia mayor a 3 medicamentos al día asilar de base"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral (VGI), el letargo frontal apático deprime el impulso alimenticio oral, llevando al paciente a un estadio crítico hipometabólico. El reactivo de escrutinio \"E. Problemas neuropsicológicos\" de la escala MNA califica progresivamente (0-2). El puntaje terminal que dicta \"0 puntos\" de penalidad y que anula la autonomía biológica ingestiva, se adjudica obligatoria y llanamente frente al colapso cognoscitivo estandarizado de \"0 = demencia o depresión grave\", alertando sobre la inminente anorexia somatomorfa postrada.<br><br>Perla ENARM: Escala MNA. Reactivo E. Problemas neuropsicológicos: 0 = demencia o depresión grave. (Puntuación de riesgo: 0).<br><br>Análisis de Distractores: A) Un duelo temporal adaptativo u hospitalización catastrófica inflamatoria que involucre \"Situación de estrés psicológico en los últimos 3 meses\", recae puntualmente bajo el reactivo \"D\" independiente de la prueba, no siendo el definitorio psiquiátrico crónico profundo interrogado letal grave de demencia asilar apática global del renglón \"E\". B y D) Evaluar morbilidad isquémica pélvica de escaras (Úlceras cutáneas postradas ocluidas) y documentar interacciones toxicológicas gástricas (\"Toma más de 3 medicamentos\") conforman rígidamente los ítems \"I\" e \"H\" evaluados en la Segunda Fase extensiva (\"Evaluación del estado\") del test, y carecen del peso cerebral primario y basal inicial del filtro rápido (\"Cribaje\") del área psicológica del anciano cognitivo de la primera sección corta.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral en Unidades de Atención Médica, 2018, Anexos, Cuadro 16 MNA, Página 12."
    },
    {
        id: 279,
        question: "En el marco de la evaluación clínica cardiovascular pediátrica estructurada y preventiva a nivel nacional, se categoriza y escruta hemodinámicamente a un infante de 7 años y 121.4 centímetros de talla. Si la tensión arterial sistólica documentada en esfigmomanómetro rebasa e invade el límite extremo rígido manométrico calculado a partir de la constante \"Percentil 95 + 12 mmHg\" para su edad y peso, ¿qué diagnóstico grave y agudo se le estampa y adjudica al niño de manera algorítmica y obligada en su historia clínica?",
        options: ["Presión Arterial Normal Alta y asilar límite biológica intermitente", "Prehipertensión arterial infantil limítrofe por estrés asilar y llanto", "Hipertensión Arterial Severa Estadio 2 exigente de fármacos", "Hipertensión Arterial Leve y pasiva asintomática de Estadio 1"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y Diagnóstico de Hipertensión Arterial, las crisis en niños no se miden con umbrales fijos rígidos de 140/90 como en adultos. El cuadro anexo paramétrico de \"Presión arterial en niños por edad y percentil de talla\", dictamina y estratifica el riesgo hemodinámico de hipertrofia ventricular concéntrica severa y letal asintomática. El umbral máximo absoluto e infernal de la tabla graficada que cruza y dictamina per se el \"Estadio 2\", ocurre invariable y precisamente en el peldaño límite rotulado como \"Pc 95 + 12 mmHg\". Todo valor igual o por encima de esta cifra exige farmacoterapia agresiva hipotensiva de choque en urgencias asilar.<br><br>Perla ENARM: Tablas de Presión infantil: Umbral matemático límite superior tabulado extremo -> Pc 95 + 12 mmHg -> (Corresponde y denota Hipertensión Estadio 2).<br><br>Análisis de Distractores: A, B y D) Las mediciones tensiones esporádicas reaccionales, el llanto fisiológico y los estadios silentes de prehipertensión (Estadio 1) o normal alta recaen, fluctúan y se acotan de manera biológicamente pasiva o moderada por debajo y en las áreas numéricas ubicadas entre los perceptiles 90 y el simple y llano 95 bruto basal no alterado, sin tocar el techo letal castigado de sumar las extremas 12 unidades milimétricas tóxicas de mercurio extras pautadas y referidas para la crisis de la clasificación final de \"Estadio 2\".",
        source: "SS-188-18 RR, Prevención y Diagnóstico de Hipertensión Arterial, 2018, Anexos, Tablas de Presión Infantil, Página 40."
    },
    {
        id: 280,
        question: "Durante el interrogatorio oncológico de soporte al final de la vida y cuidados asilares empleando estrictamente el Cuestionario de Depresión de Beck (BDI) mexicano, el clínico sondea el rubro del aislamiento social anhedónico y la muerte anticipada del paciente en la \"Pregunta 12\". Para calificar este nivel con el grado máximo extremo asilar de claudicación fatal de \"3 puntos\", ¿qué aseveración debe indicar u obligatoriamente confirmar y tachar el paciente paliativo oncológico?",
        options: ["Estoy algo menos interesado y un poco cansado de ver asiduamente a las otras personas sanas que de costumbre habitualmente o comúnmente", "He perdido todo mi interés de forma permanente e irrenunciable asilar absoluta por otras personas ajenas o queridas", "He perdido casi todo el interés biológico psíquico profundo basal orgánico por otras personas", "Me irrita en sumo grado ser visitado en las rondas de cama de asilar por la familia y exijo pasivamente que nadie de los conocidos me acompañe"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cuidados Paliativos y manejo del final de la vida, el retraimiento orgánico tumoral borra la corteza límbica interaccional. El Cuestionario de Depresión de Beck gradúa el declive letal progresivamente por estadios. La Pregunta 12 interroga la anhedonia social progresiva partiendo desde \"a) No he perdido el interés...\" hacia las facetas del abatimiento somatomorfo psiquiátrico de la claudicación. El peldaño fatal y de severidad catatónica extrema que decreta la máxima carga aflictiva (inciso d), rige ineludiblemente la triste frase biológica terminal apática restrictiva de letargo general y final asilar: \"d) He perdido todo mi interes por otras personas\".<br><br>Perla ENARM: Cuestionario de Depresión de Beck. Pregunta 12. a) No he perdido el interes... d) He perdido todo mi interes por otras personas.<br><br>Análisis de Distractores: A) Reflejar y asimilar de forma teórica que se está \"menos interesado\" (opción b) constituye apenas una manifestación incipiente moderada y adaptativa natural intermedia de cansancio biológico inflamatorio oncológico (1 punto). C) Afirmar tajantemente que se ha extirpado y borrado \"casi todo\" el interés relacional asilar pero manteniendo un rescoldo frágil residual diminuto (opción c) dictamina el grave y duro escalón pre-terminal biológico asilar psiquiátrico de 2 puntos severos del test. D) Inventivas hostiles o de irritación histriónica dramática no recaen, figuran, o se tabulan como respuestas estandarizadas válidas codificadas numéricamente y de forma oficial en la evaluación cualitativa de Beck mexicana psiquiátrica clínica, la cual obedece a un llano colapso de interés apático pasivo restrictivo plano basal asilar en los ancianos terminales de cama.",
        source: "IMSS-440-11 RR, Cuidados Paliativos y Dolor, 2011, Anexos, Cuestionario de Beck BDI, Página 28."
