<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

    <div id="app-container" class="relative h-full lg:flex">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 w-80 p-5 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out z-30 shadow-[4px_0_24px_rgba(0,0,0,0.05)] border-r border-slate-200 dark:border-slate-800">

                    <span class="logo-enarm text-base">ENARM</span>

            <div class="flex-1 overflow-y-auto min-h-0 custom-scrollbar pr-1">

                    <input type="text" id="module-search" placeholder="Buscar número o texto..." class="w-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-lg py-2 pl-3 pr-10 focus:outline-none focus:ring-2 focus:ring-pink-500 transition-colors text-sm">

                </div>

                <div id="sidebar-q-grid" class="grid grid-cols-[repeat(auto-fill,minmax(40px,1fr))] gap-2 p-2"></div>

            <div class="pt-4 border-t border-slate-200 dark:border-slate-800 mt-2 space-y-3">
                <button id="dark-mode-toggle" class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 font-semibold py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Reiniciar Simulador

            </div>
        </aside>

        <main id="main-content" class="flex-1 h-[100dvh] overflow-y-auto overscroll-y-contain p-4 sm:p-6 lg:p-8 transition-all duration-300 relative bg-slate-50 dark:bg-slate-950">
            
            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-pink-600 dark:hover:text-pink-400 transition-all duration-300" title="Ver Tablero General">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <button id="menu-toggle" class="hidden fixed top-4 right-4 lg:right-8 bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-pink-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>

                <div id="progress-bar" class="bg-gradient-to-r from-pink-500 to-rose-500 h-full transition-all duration-500 flex items-center justify-center text-[11px] font-bold text-white leading-none relative z-10" style="width:0%">0%</div>
            </div>
            
            <div id="module-display" class="transition-opacity duration-300 pb-12"></div>
        </main>
        
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>
    </div>
    
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará todo tu progreso y calificación. ¿Deseas empezar desde cero?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán tus respuestas y no podrás modificarlas después.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "En la estadificación del cáncer de pulmón, ¿cuál es el tamaño tumoral que define la categoría T2a?",
        options: [">3 cm pero ≤4 cm", ">2 cm pero ≤3 cm", "≤1 cm en su mayor dimensión", ">4 cm pero ≤5 cm"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de pulmón, la clasificación TNM (octava edición) es un pilar fundamental para establecer el pronóstico y el enfoque terapéutico. La categoría T1 engloba tumores ≤3 cm, dividiéndose en T1a (≤1 cm), T1b (>1 a ≤2 cm) y T1c (>2 a ≤3 cm). A partir de los 3 cm, el tumor pasa a la categoría T2. Específicamente, el estadio T2a se define como un tumor con un diámetro mayor a 3 cm pero menor o igual a 4 cm, siempre que no invada estructuras más allá de la pleura visceral o bronquios principales (sin afectar la carina).<br><br>Perla ENARM: T2a Tumor mayor a 3 cm pero menor o igual a 4 cm en su mayor dimensión.<br><br>Análisis de Distractores: B) >2 cm pero ≤3 cm corresponde a la categoría T1c, lo cual representa un tumor de menor tamaño sin los criterios de invasión de T2. C) ≤1 cm en su mayor dimensión define a la categoría T1a. D) >4 cm pero ≤5 cm define a la categoría T2b, que implica un riesgo local mayor que T2a.",
        source: "IMSS-030-19 RR, Diagnóstico y Tratamiento del Cáncer de Pulmón, 2019, Anexos, Página 49."
    },
    {
        id: 2,
        question: "¿Cuál es el estudio inicial de escrutinio indicado para la determinación de proteinuria en todas las consultas de control prenatal?",
        options: ["Microalbúmina en orina matutina", "Relación proteína/creatinina", "Recolección de orina de 24 horas", "Tira reactiva en orina"],
        answer: 3,
        justification: "Justificación: La preeclampsia es una de las principales causas de morbimortalidad materna y fetal. La tamización de su principal signo bioquímico, la proteinuria, debe realizarse de forma sistemática y accesible. De acuerdo a la GPC de Atención Prenatal, el método de escrutinio clínico rápido, costo-efectivo y recomendado para cada una de las consultas de seguimiento a lo largo de las semanas de gestación es el uso de tiras reactivas. Este abordaje permite detectar tempranamente daño endotelial glomerular e iniciar la ruta diagnóstica confirmatoria.<br><br>Perla ENARM: Se recomienda la determinación de proteinuria por tira reactiva en orina en todas las consultas de atención prenatal.<br><br>Análisis de Distractores: A) La microalbúmina en orina matutina es útil para tamizaje de nefropatía diabética, pero no es el escrutinio estándar de la paciente obstétrica sana. B) La relación proteína/creatinina es un método confirmatorio o de cuantificación rápida cuando hay sospecha, no el estudio de primer escrutinio. C) La recolección de orina de 24 horas es el estándar de oro (prueba confirmatoria) para diagnosticar preeclampsia, pero no es factible como escrutinio en cada consulta.",
        source: "IMSS-028-08 RR, Atención Prenatal Rutinaria, 2008, Anexos, Página 34."
    },
    {
        id: 3,
        question: "En un paciente que acude por asimetría facial aguda, ¿qué síntoma oftalmológico y auditivo debe interrogarse dirigidamente para evaluar la topografía de la lesión del nervio facial?",
        options: ["Hiperacusia y fotofobia", "Hipoacusia profunda y escotomas", "Anosmia transitoria y diplopía", "Acúfenos y miosis pupilar"],
        answer: 0,
        justification: "Justificación: La parálisis de Bell es la parálisis facial periférica idiopática más común. El nervio facial (VII par craneal) no solo provee inervación motora a la cara, sino que también inerva el músculo estapedio (amortiguando sonidos fuertes) y las glándulas lagrimales (vía nervio petroso mayor). De acuerdo a la GPC de Parálisis Facial, la topografía del daño nervioso se correlaciona con los síntomas acompañantes; por lo tanto, es mandatorio buscar alteraciones en el reflejo estapedial y en la lubricación ocular.<br><br>Perla ENARM: Al interrogatorio dirigido se deberá averiguar específicamente sobre el tiempo de inicio, localización de síntomas, hiperacusia, dolor periauricular o retroauricular, irritación y/o resequedad ocular, fotofobia, cambios en la visión y alteración del gusto.<br><br>Análisis de Distractores: B) La hipoacusia profunda y los escotomas sugerirían daño del VIII par craneal o alteraciones isquémicas del sistema nervioso central, alejando el diagnóstico de una parálisis de Bell idiopática. C) La anosmia y diplopía evalúan el I par craneal y los nervios oculomotores (III, IV, VI), hallazgos típicos de un síndrome de base de cráneo o neurológico más extenso. D) Los acúfenos pueden asociarse a daño coclear y la miosis a un síndrome de Horner (vía simpática), ninguno dependiente del trayecto del nervio facial.",
        source: "IMSS-066-08 RR, Diagnóstico y Tratamiento de la Parálisis Facial Periférica, 2008, Diagnóstico, Página 8."
    },
    {
        id: 4,
        question: "En la estadificación del cáncer de próstata localizado, ¿qué hallazgo clínico define la etapa T1c?",
        options: ["Tumor que involucra ambos lóbulos prostáticos", "Tumor identificado incidentalmente en <5% del tejido resecado", "Tumor identificado por biopsia por aguja debido a PSA elevado", "Tumor palpable limitado a la mitad de un lóbulo prostático"],
        answer: 2,
        justification: "Justificación: El cáncer de próstata en etapas tempranas suele ser asintomático. El escrutinio moderno se apoya en el Antígeno Prostático Específico (PSA). De acuerdo a la GPC de Cáncer de Próstata, la clasificación clínica T1 corresponde a un tumor clínicamente inaparente, no palpable ni visible por imagen de rutina. Específicamente, el estadio T1c es aquel que se diagnostica histológicamente tras realizar una biopsia prostática indicada de forma exclusiva por la elevación del PSA, siendo el escenario diagnóstico más común en la actualidad.<br><br>Perla ENARM: T1c: tumor identificado por biopsia por aguja (Ej. Por PSA elevado).<br><br>Análisis de Distractores: A) Un tumor que involucra ambos lóbulos, si es palpable, corresponde a una etapa T2c. B) Un tumor identificado incidentalmente en menos del 5% del tejido (usualmente tras resección transuretral de próstata) corresponde a la etapa T1a. D) Un tumor palpable o visible que involucra una mitad de un lóbulo o menos corresponde a la etapa clínica T2a.",
        source: "IMSS-140-18 RR, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Anexos, Página 67."
    },
    {
        id: 5,
        question: "De acuerdo a la clasificación FIGO, ¿cuáles son los criterios de invasión estromal que definen a un cáncer cervicouterino estadio Ia2?",
        options: ["Invasión >5 mm pero <7 mm de profundidad", "Lesión microscópica con invasión ≤3 mm de profundidad", "Lesión clínicamente visible ≤4 cm", "Invasión >3 mm y ≤5 mm de profundidad"],
        answer: 3,
        justification: "Justificación: El cáncer cervicouterino en estadio temprano microinvasor (Estadio I) se estratifica estrictamente por el tamaño de invasión microscópica en el estroma, lo cual dicta el riesgo de metástasis linfáticas y la necesidad de linfadenectomía. De acuerdo a la GPC de Cáncer Cervicouterino, el estadio Ia1 abarca invasiones ≤3 mm. El estadio Ia2 representa un incremento de riesgo y se define por invasión del estroma mayor de 3 mm pero no mayor de 5 mm, conservando una diseminación horizontal máxima de 7 mm.<br><br>Perla ENARM: T1a2 / Ia2: Invasión estromal mayor de 3mm, pero no menor de 5 mm y no mayor de 7 mm de diseminación horizontal.<br><br>Análisis de Distractores: A) Una invasión de profundidad >5 mm reclasifica a la paciente a un estadio Ib, ya no es considerado estadio Ia (microinvasor). B) La invasión microscópica ≤3 mm de profundidad con diseminación horizontal ≤7 mm define el estadio Ia1. C) Una lesión clínicamente visible ≤4 cm circunscrita al cuello uterino corresponde al estadio Ib1.",
        source: "IMSS-333-09 RR, Diagnóstico y Tratamiento del Cáncer Cervicouterino, 2009, Anexos, Página 31."
    },
    {
        id: 6,
        question: "En la clasificación evolutiva de la trombocitopenia inmune (TIP), ¿qué criterio establece el diagnóstico de una TIP refractaria?",
        options: ["Persistencia del recuento plaquetario <100x10⁹/L de 3 a 12 meses", "Ausencia de respuesta tras la esplenectomía y necesidad de tratamiento", "Elevación del conteo plaquetario pero con sangrado mucocutáneo grave", "Falta de respuesta inicial al uso de esteroides a altas dosis"],
        answer: 1,
        justification: "Justificación: La Trombocitopenia Inmune (TIP) se clasifica en primaria o secundaria y por su temporalidad (reciente, persistente, crónica). Sin embargo, el término \"refractaria\" denota un grupo de muy alto riesgo. De acuerdo a la GPC de Púrpura Trombocitopénica, la TIP refractaria es aquella que cumple simultáneamente dos criterios estrictos: ausencia de respuesta (o recaída) tras el fracaso de una esplenectomía y que el paciente mantenga recuentos <100x10⁹/L con necesidad clínica de continuar tratamiento activo. La simple falta de respuesta a primera línea no otorga este título.<br><br>Perla ENARM: TIP refractaria: Es la que cumple con 2 criterios al mismo tiempo: ausencia de respuesta o recaída y que amerite tratamiento después de la esplenectomía. La respuesta temporal a esteroides o a inmunoglobulina no excluye la refractaria.<br><br>Análisis de Distractores: A) La persistencia de un conteo de plaquetas <100x10⁹/L que perdura de 3 a 12 meses a partir del diagnóstico define a la TIP persistente, no a la refractaria. C) El sangrado no define el carácter de refractariedad, sino el fracaso a la esplenectomía con requerimiento de terapia de rescate. D) La falla de respuesta inicial a esteroides aísla a un paciente como resistente a primera línea, pero solo será catalogado como refractario tras fracasar a la cirugía esplénica.",
        source: "IMSS-143-19 RR, Diagnóstico y Tratamiento de Púrpura Trombocitopénica Inmunológica, 2019, Anexos, Página 45."
    },
    {
        id: 7,
        question: "En un paciente masculino de 35 años con dolor torácico, ¿cuál es el punto de corte de elevación del segmento ST en las derivaciones V2 y V3 requerido para diagnosticar un infarto agudo de miocardio?",
        options: ["≥0.10 mV", "≥0.15 mV", "≥0.25 mV", "≥0.20 mV"],
        answer: 2,
        justification: "Justificación: El diagnóstico electrocardiográfico del infarto agudo de miocardio con elevación del segmento ST (IAMCEST) requiere identificar la magnitud del desnivel en derivaciones contiguas. Debido a variantes de repolarización temprana benigna que son comunes en hombres jóvenes en la cara septal y anterior, los valores son más exigentes en este grupo. De acuerdo a la GPC de IAMCEST, el punto de corte en hombres menores de 40 años para las derivaciones V2 y V3 debe ser igual o superior a 0.25 mV (2.5 milímetros), mientras que en el resto de las derivaciones bastan 0.1 mV.<br><br>Perla ENARM: Criterios diagnósticos para IAMCEST: b) ≥0.25 mV en hombres con edad <40 años en V2 y V3.<br><br>Análisis de Distractores: A) ≥0.10 mV (1 mm) es el corte estándar para casi todas las derivaciones (excepto V2 y V3), e incluye V7-V9 en hombres jóvenes. B) ≥0.15 mV es el punto de corte de elevación exigido en las derivaciones V2 y V3, pero específicamente para las mujeres (de cualquier edad). D) ≥0.20 mV es el criterio exigido en las derivaciones V2 y V3 para hombres que tienen una edad igual o mayor a 40 años.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Anexos, Página 90."
    },
    {
        id: 8,
        question: "¿Qué subespecialidades se recomiendan indispensablemente para integrar el equipo de evaluación y seguimiento multidisciplinario de los niños con sospecha de mucopolisacaridosis tipo I (MPS I)?",
        options: ["Cardiología y Genética", "Reumatología e Inmunología", "Endocrinología y Nefrología", "Neumología y Psiquiatría"],
        answer: 0,
        justification: "Justificación: La mucopolisacaridosis tipo I es un error innato del metabolismo por deficiencia de alfa-L-iduronidasa que ocasiona acúmulo sistémico de glucosaminoglicanos. Al afectar múltiples sistemas (esquelético, neurológico, cardiovascular, ocular), el abordaje no puede ser aislado. De acuerdo a la GPC de Mucopolisacaridosis tipo I, es mandatario establecer un seguimiento multidisciplinario para la estratificación, el tratamiento de reemplazo enzimático o el trasplante, y el manejo paliativo, involucrando obligatoriamente a Genética (para la confirmación y el consejo) y a Cardiología (para la evaluación de valvulopatías severas asociadas al acúmulo lisosomal).<br><br>Perla ENARM: Se recomienda que en el diagnóstico, tratamiento y seguimiento de los niños con MPS I intervengan por lo menos las siguientes disciplinas: Cardiología, Ortopedia, Otorrinolaringología, Neumología, Neurología, Psiconeurologia, Genética, Oftalmología, Gastroenterología.<br><br>Análisis de Distractores: B) La reumatología y la inmunología no son disciplinas directrices en este padecimiento, pues la etiología es genética metabólica, no autoinmune. C) Aunque puede haber daño orgánico múltiple, la endocrinología y nefrología no forman parte del núcleo inicial exigido por la normativa para seguimiento estructurado. D) La neumología sí participa, pero la psiquiatría pura no está en la recomendación núcleo (se requiere más bien psiconeurología o neuropediatría debido al retraso del desarrollo).",
        source: "IMSS-338-10 RR, Diagnóstico y Tratamiento de la Mucopolisacaridosis I, 2010, Tratamiento, Página 18."
    },
    {
        id: 9,
        question: "Ante el reporte de un nódulo tiroideo con resultado de citología Bethesda 1, ¿cuál es la conducta clínica de seguimiento indicada?",
        options: ["Referencia a cirugía para lobectomía", "Repetir BAAF guiada por ecografía en 3 a 6 meses", "Iniciar tratamiento de supresión con levotiroxina", "Solicitar un gammagrama tiroideo con tecnecio-99"],
        answer: 1,
        justification: "Justificación: El sistema Bethesda estandariza los resultados citológicos de la Biopsia por Aspiración con Aguja Fina (BAAF). Un resultado Bethesda 1 significa una muestra no diagnóstica o insatisfactoria (por ejemplo, sangre predominante, escasas células foliculares o artefacto por desecación), lo cual no descarta malignidad ni confirma benignidad. De acuerdo a la GPC de Nódulo Tiroideo, ante este hallazgo no se debe realizar una intervención radical inmediata; la conducta recomendada con alto grado de evidencia es re-intervenir para asegurar material óptimo, dando un margen prudente de resolución de la inflamación tisular de la primera punción.<br><br>Perla ENARM: Cuando la muestra de biopsia es insatisfactoria para el análisis citológico (categoría 1 de Bethesda), se recomienda repetir la BAAF dirigida por ecografía 3 a 6 meses después.<br><br>Análisis de Distractores: A) La lobectomía quirúrgica está indicada en categorías de mayor sospecha maligna (Bethesda V o VI) o en nódulos grandes con síntomas compresivos, no por una citología insuficiente. C) La terapia de supresión con hormona tiroidea no está indicada para el manejo rutinario de nódulos de comportamiento indeterminado o no diagnóstico, y su uso ha caído en desuso por efectos adversos cardiovasculares. D) El gammagrama se utiliza fundamentalmente para evaluar la funcionalidad (nódulo \"caliente\" vs \"frío\") en pacientes con perfil de TSH suprimida, no para resolver una BAAF ineficiente.",
        source: "IMSS-354-09 RR, Diagnóstico y Tratamiento de Nódulo Tiroideo, 2009, Tratamiento, Página 24."
    },
    {
        id: 10,
        question: "En la clasificación MIC de leucemias agudas pediátricas, ¿cuál es la alteración citogenética característica de la Leucemia Aguda Mieloide subtipo M3?",
        options: ["t(9;22)", "inv(16)", "t(8;21)", "t(15;17)"],
        answer: 3,
        justification: "Justificación: La clasificación Morfológica, Inmunológica y Citogenética (MIC) correlaciona los subtipos FAB con traslocaciones moleculares específicas que dirigen terapias blanco. La Leucemia Promielocítica Aguda (clasificación FAB M3) es una urgencia hematológica por el riesgo de coagulopatía intravascular diseminada. De acuerdo a la GPC de Leucemia Aguda en Pediatría, este subtipo se caracteriza patognomónicamente por la traslocación cromosómica de los cromosomas 15 y 17, involucrando la fusión de los genes PML y RARA, lo cual determina su sensibilidad al ácido transretinoico (ATRA).<br><br>Perla ENARM: Leucemia Aguda Mieloide Grupo M3: Cariotipo t(15;17)(q22;q12).<br><br>Análisis de Distractores: A) La t(9;22) corresponde al cromosoma Filadelfia, hallazgo patognomónico de la Leucemia Mieloide Crónica y un subgrupo de mal pronóstico en la Leucemia Linfoblástica Aguda. B) La inv(16) se asocia clásicamente con la Leucemia Aguda Mieloide subtipo M4 Eo (Mielomonocítica con eosinofilia). C) La t(8;21) es la alteración genética característica de la Leucemia Aguda Mieloide subtipo M2 (Mieloblástica con maduración).",
        source: "SS-061-08 RR, Diagnóstico Oportuno de Leucemia Aguda en Pediatría, 2008, Anexos, Página 26."
    },
    {
        id: 11,
        question: "Durante la exploración física básica estructurada del recién nacido, ¿qué elemento anatómico se inspecciona intencionadamente mediante la búsqueda del reflejo rojo?",
        options: ["Cierre del conducto auditivo", "Permeabilidad de la fosa nasal", "Integridad del cristalino y la retina", "Reflejos osteotendinosos asimétricos"],
        answer: 2,
        justification: "Justificación: La exploración oftalmológica temprana es vital para detectar patologías que causan ceguera prevenible (como cataratas congénitas) o letalidad (como el retinoblastoma). El reflejo de Brückner o \"reflejo rojo\" se genera al incidir luz del oftalmoscopio sobre la retina vascularizada. De acuerdo a la GPC de Detección en el Recién Nacido, la presencia de un reflejo rojo simétrico, intenso y homogéneo descarta de manera gruesa la existencia de opacidades en los medios transparentes del globo ocular (cornea, humor acuoso, cristalino, humor vítreo). Un reflejo blanco (leucocoria) obliga a descartar patología intraocular grave.<br><br>Perla ENARM: La exploración básica incluye ojos: presencia del reflejo rojo para descartar cataratas congénitas o retinoblastoma. (Referenciado visualmente en Cuadro 2 Reflejo Rojo).<br><br>Análisis de Distractores: A) El cierre del conducto auditivo se evalúa por inspección del pabellón y otoscopia directa, no mediante transiluminación. B) La permeabilidad nasal se confirma observando el patrón respiratorio o pasando una pequeña sonda para descartar atresia de coanas, no tiene relación con el oftalmoscopio. D) Los reflejos osteotendinosos forman parte del examen neurológico primitivo, evaluando asimetrías de tono o plexopatías, ajenos a la inspección óptica.",
        source: "SS-226-20 RR, Detección, Referencia y Pautas de Alta del Recién Nacido de Término, 2020, Anexos, Página 11."
    },
    {
        id: 12,
        question: "En el contexto del manejo hemático del paciente preoperatorio (Pilar 1), ¿cuál es la conducta dictada tras la identificación de anemia previa a la cirugía?",
        options: ["Identificar la causa como deficiencia de hierro, falla renal o inflamación", "Programar de forma electiva una transfusión preoperatoria", "Suspender el abordaje quirúrgico por un periodo mínimo de 3 meses", "Indicar terapia intensiva con corticosteroides sistémicos"],
        answer: 0,
        justification: "Justificación: La anemia preoperatoria es un predictor fuerte de complicaciones, mayor morbimortalidad y un factor de riesgo para requerir hemotransfusiones alogénicas perioperatorias. De acuerdo a la GPC de PBM (Patient Blood Management), el Pilar 1 se enfoca específicamente en optimizar la masa eritrocitaria del paciente antes del evento quirúrgico. En caso de detectar anemia, la acción fundamental, con fuerza de recomendación alta, es tipificar su fisiopatología (principalmente déficit de hierro, secundario a daño renal o inflamación crónica) para establecer una terapia dirigida y evitar transfusiones innecesarias.<br><br>Perla ENARM: PILAR 1: Si hay anemia, se recomienda identificar la causa (deficiencia de hierro, insuficiencia renal o inflamación). Fuerte.<br><br>Análisis de Distractores: B) Programar transfusiones preoperatorias sistemáticas viola el principio de Patient Blood Management, que busca precisamente reducir y evitar la exposición a hemoderivados si la causa (ej. ferropenia) se puede corregir médicamente. C) Suspender la cirugía es una medida que dependerá del tipo de intervención (urgente vs electiva) y gravedad hemodinámica, pero no es la acción inicial per se, la prioridad es investigar y corregir la causa. D) El uso de corticosteroides no tiene cabida a menos que se diagnostique una etiología autoinmune específica subyacente; el abordaje inicial exige el tamizaje nutricional/inflamatorio/renal.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Recomendaciones, Página 44."
    },
    {
        id: 13,
        question: "En la aplicación de la escala de severidad de infarto cerebral NIHSS, ¿qué parámetro se evalúa en el rubro número 2 y otorga hasta 2 puntos si hay parálisis total?",
        options: ["Campos visuales", "Mirada", "Comandos y órdenes", "Nivel de conciencia"],
        answer: 1,
        justification: "Justificación: La National Institutes of Health Stroke Scale (NIHSS) es la herramienta universal para graduar el déficit neurológico focal agudo isquémico. Su correcta aplicación y conocimiento de rubros es evaluable en el ENARM. De acuerdo a la GPC de Enfermedad Vascular Cerebral, la prueba sigue un orden estrictamente numerado: 1A Conciencia, 1B Preguntas, 1C Comandos. El ítem 2 corresponde de forma exclusiva a la evaluación clínica de la Mirada conjugada horizontal. Un puntaje de 0 representa normalidad, 1 parálisis parcial de la mirada, y 2 puntos representan parálisis total (mirada forzada o desviación conjugada severa).<br><br>Perla ENARM: Escala NIHSS, Grupo 2 Mirada: 0 – normal, 1 – parálisis parcial de la mirada, 2 – parálisis total de la mirada.<br><br>Análisis de Distractores: A) Los campos visuales se exploran sistemáticamente a través del ítem 3 de la escala NIHSS, permitiendo una puntuación de hasta 3 puntos (hemianopsia bilateral). C) Los comandos y órdenes pertenecen al ítem 1C de la escala, valorando la capacidad de obediencia motora (cerrar ojos, apretar manos). D) El nivel de conciencia es el primer punto evaluado de la escala (ítem 1A), otorgando de 0 (alerta) a 3 puntos (coma o respuesta refleja nula).",
        source: "S-102-08 RR, Diagnóstico y Tratamiento Temprano del EVC Isquémico, 2008, Anexos, Página 58."
    },
    {
        id: 14,
        question: "Durante el programa de rehabilitación integral de un miembro paretico tras un EVC, ¿qué intervención se recomienda integrar para potenciar de forma directa la recuperación motora muscular?",
        options: ["Uso de láser pulsado de baja frecuencia", "Inmovilización en férula rígida", "Oxigenación en cámara hiperbárica", "Estimulación eléctrica funcional"],
        answer: 3,
        justification: "Justificación: La reeducación muscular en pacientes que cursan con hemiparesia secundaria a un daño de neurona motora superior requiere inputs aferentes continuos para fomentar la neuroplasticidad cortical. De acuerdo a la GPC de Rehabilitación en EVC, las técnicas modernas favorecen el entrenamiento de tarea dirigida centrado en las necesidades funcionales del paciente. Dentro de este paradigma, se recomienda la integración sistemática de la Estimulación Eléctrica Funcional (FES, por sus siglas en inglés) acoplada a la terapia física o de espejo, ya que previene atrofia por desuso, asiste la contracción muscular voluntaria pobre y potencia la retroalimentación sensitiva cortical.<br><br>Perla ENARM: Se recomienda valorar la integración de estimulación eléctrica funcional a los programas de rehabilitación del miembro parético después de un EVC, para potenciar su recuperación motora.<br><br>Análisis de Distractores: A) El láser de baja frecuencia tiene evidencia debatible para manejo de dolor tisular, pero no es una terapia directriz con fuerza probada para regenerar la función motora gruesa del miembro parético post-EVC. B) La inmovilización rígida es deletérea; el estándar promueve movilización temprana y activa para evitar contracturas, síndromes dolorosos regionales y potenciar neuroplasticidad. C) La cámara hiperbárica no tiene indicación rutinaria ni evidencia avalada en el tratamiento neuromotor de secuelas subagudas/crónicas del EVC.",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos después de un Evento Vascular Cerebral, 2021, Recomendaciones, Página 18."
    },
    {
        id: 15,
        question: "Al evaluar el tono muscular periférico en un lactante para descartar anomalías del neurodesarrollo, ¿qué rango de grados del ángulo poplíteo le confiere un puntaje de normalidad (3 puntos)?",
        options: ["150-110°", "20-30°", "< 80°", "> 170°"],
        answer: 0,
        justification: "Justificación: La valoración del tono pasivo muscular y el arco de movilidad es clave para identificar síndromes de neurona motora central en lactantes, como la parálisis cerebral, que típicamente genera espasticidad distal temprana. De acuerdo a la GPC de Rehabilitación Infantil, el ángulo poplíteo se mide flexionando la pierna a la cadera y extendiendo la rodilla hasta notar resistencia. Un lactante normal presenta un rango de extensión permisivo sin hipertonía severa ni flacidez (hipotonía). La escala de evaluación le asigna el máximo puntaje de sanidad (3 puntos) cuando este ángulo se mantiene en el rango fisiológico de 150 a 110 grados.<br><br>Perla ENARM: Escala de Tono Muscular - Ángulo poplíteo: 3 puntos para un Rango: 150-110°.<br><br>Análisis de Distractores: B) 20-30° es un arco restringido y corresponde típicamente a la flexión del tobillo (dorsiflexión) fisiológica, no a los rangos de movilidad a nivel de rodilla. C) < 80° indica una severa resistencia a la extensión de la rodilla por hipertonía de isquiotibiales (espasticidad) o en un pretérmino extremo, otorgándosele 0 puntos. D) > 170° indica hipotonía grave y flacidez (laxitud extrema articular), recibiendo un puntaje de 1 o 0 puntos por reflejar daño de vía final común central o periférica.",
        source: "DIF-332-18 RR, Detección de Alteraciones del Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Página 72."
    },
    {
        id: 16,
        question: "De acuerdo a la clasificación funcional de la NYHA, ¿cómo se catalogan los síntomas en un paciente con insuficiencia cardiaca secundaria a estenosis mitral que presenta limitación leve de su actividad física?",
        options: ["Clase funcional IV", "Clase funcional III", "Clase funcional I", "Clase funcional II"],
        answer: 3,
        justification: "Justificación: La clasificación de la New York Heart Association (NYHA) evalúa sintomatología y correlación con el esfuerzo físico para dirigir la terapéutica farmacológica o quirúrgica en valvulopatías. De acuerdo a la GPC de Patología de la Válvula Mitral, la Clase Funcional II se define de forma específica como una \"limitación leve de la actividad física\"; es decir, el paciente está asintomático en reposo, pero la actividad física ordinaria (habitual) le provoca síntomas congestivos como disnea, palpitaciones o astenia limitante.<br><br>Perla ENARM: Clase funcional II: Limitación leve de la actividad física. Actividad física habitual provoca síntomas de IC, fundamentalmente disnea, palpitaciones o astenia.<br><br>Análisis de Distractores: A) La Clase Funcional IV describe la incapacidad total para llevar a cabo actividades o la presencia de síntomas cardiovasculares en estado de reposo absoluto. B) La Clase Funcional III implica una limitación marcada de la actividad física, donde actividades menores a las habituales despiertan la sintomatología. C) La Clase Funcional I designa a un paciente portador de la enfermedad (estenosis), pero que cursa totalmente asintomático ante el ejercicio físico rutinario.",
        source: "IMSS-235-09 RR, Diagnóstico y Tratamiento de la Patología de la Válvula Mitral, 2009, Anexos, Página 36."
    },
    {
        id: 17,
        question: "En la sección de \"Concentración y Cálculo\" del Mini-Mental State Examination (MMSE), ¿qué instrucción cognitiva se debe emitir para que el paciente obtenga hasta 5 puntos?",
        options: ["Deletrear MUNDO al revés", "Restar de 7 en 7 a partir del 100", "Repetir tres palabras dictadas", "Seguir un comando de tres pasos"],
        answer: 1,
        justification: "Justificación: El Mini Examen del Estado Mental (MMSE) de Folstein es la herramienta tamiz por excelencia para el déficit cognitivo y demencia, explorando dominios de memoria, orientación, cálculo y funciones ejecutivas. De acuerdo a la GPC de evaluación geriátrica/cognitiva, el dominio de \"Concentración y Cálculo\" se evalúa pidiéndole al adulto que, mentalmente, reste el número siete consecutivamente a partir de la cifra 100. El examinador debe anotar un punto por cada cifra secuencialmente correcta hasta acumular un máximo de 5 puntos (ej. 93, 86, 79, 72, 65).<br><br>Perla ENARM: CONCENTRACIÓN Y CÁLCULO \"Le voy a pedir que reste de 7 en 7 a partir del 100.\" (Anote un punto cada vez que la diferencia sea correcta, máximo 5 puntos).<br><br>Análisis de Distractores: A) Deletrear \"MUNDO\" al revés era una alternativa histórica en la prueba para evaluar atención, pero la pauta estandarizada primaria priorizada por la GPC dicta la resta serial de los sietes. C) Repetir tres palabras dictadas previamente obedece al dominio clínico de \"Fijación\" (repetir de inmediato) o \"Memoria de evocación\" (recordar minutos después). D) Seguir un comando motor secuencial de 3 pasos (\"tome el papel, dóblelo, póngalo en el suelo\") evalúa el área de \"Lenguaje y Construcción / Funciones ejecutivas\".",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Página 54."
    },
    {
        id: 18,
        question: "Dentro de las normativas estructurales de un Banco de Leche Humana, ¿cómo se define el \"Plan Operativo\"?",
        options: ["Serie de actividades programadas con un responsable secuencial a corto plazo", "Evaluación microbiológica rápida para descartar contaminación del producto", "Planeación de duración anual que soporta la implementación del plan táctico", "Intervención para riesgos que requieren atención breve en tareas específicas"],
        answer: 2,
        justification: "Justificación: La administración y gestión de calidad institucional de un Banco de Leche Humana exige estrictas métricas administrativas, ya que este producto biológico es altamente lábil y su contaminación representa riesgos fatales en Unidades de Cuidados Intensivos Neonatales (UCIN). De acuerdo a la GPC de Bancos de Leche Humana, se dividen los rubros de respuesta organizativa ante eventualidades. El \"Plan Operativo\" es un concepto administrativo técnico que hace referencia a una directriz de soporte extendida: un tipo de planeación con duración anual que cimienta de forma sólida y constante la implementación del \"plan táctico\" o metas mayores del servicio, distinto a acciones reactivas frente a incidentes diarios.<br><br>Perla ENARM: Plan operativo: Tipo de planeación de duración anual que soporta la implementación de estrategias del plan táctico.<br><br>Análisis de Distractores: A) Una serie de actividades programadas con un responsable que son secuenciales corresponden administrativamente a un \"Plan de Trabajo\", no al macro esquema del plan operativo. B) Una evaluación microbiológica rápida hace alusión a criterios de descarte bacteriano antes de la pasteurización de la leche. D) La acción breve frente a problemas puntuales o de emergencia con tareas específicas define el concepto de \"Plan de Intervención\".",
        source: "IMSS-704-18 RR, Funcionamiento del Banco de Leche Humana, 2018, Anexos, Página 62."
    },
    {
        id: 19,
        question: "¿Qué temas profilácticos obligatorios deben discutirse durante la primera consulta prenatal de acuerdo a las directrices de la práctica obstétrica?",
        options: ["Suplementos con ácido fólico e higiene para evitar infecciones", "Identificación de contracciones pretérmino e hidratación peridural", "Profilaxis antitrombótica masiva e indicación de esteroides", "Selección exclusiva de la técnica anestésica durante el expulsivo"],
        answer: 0,
        justification: "Justificación: El objetivo de la consulta prenatal temprana es incidir preventivamente en el desarrollo embrionario primitivo (organogénesis) y mitigar conductas de riesgo. De acuerdo a la GPC de Atención Prenatal Rutinaria, en la consulta de inicio, el personal médico está obligado a dar consejería prioritaria y educación en salud enfocada en suplementos del tubo neural (ácido fólico, y subsecuente vitamina D), directrices nutricionales estrictas y la higiene de alimentos enfocada a la reducción de teratógenos por ingesta (toxoplasmosis, listeria), además del cese inminente de tabaco y alcohol.<br><br>Perla ENARM: En la primera consulta prenatal el profesional médico debe proporcionar información específica sobre: Los suplementos con ácido fólico; Higiene de los alimentos, incluyendo la forma de reducir el riesgo de una infección adquirida; y El estilo de vida.<br><br>Análisis de Distractores: B) La identificación de contracciones y sintomatología de un trabajo de parto pretérmino es información capital, pero debe reforzarse a finales del segundo y durante el tercer trimestre, no es el tópico profiláctico anatómico central de la semana 8. C) La profilaxis antitrombótica sistémica no es universal para la embarazada sana del primer trimestre; y la maduración pulmonar con esteroides se decide ante amenaza real en semana 24-34. D) El manejo anestésico o la planeación hospitalaria periparto se dialogan hacia el final de la gestación.",
        source: "SS-026-20 RR, Intervenciones de Enfermería en la Atención Prenatal, 2020, Recomendaciones, Página 24."
    },
    {
        id: 20,
        question: "En un paciente adulto valorado en primer nivel con artrosis de rodilla de grado moderado a severo que ha fracasado al manejo conservador y a la viscosuplementación, ¿cuál es el paso en el algoritmo a seguir?",
        options: ["Indicar reposo absoluto y bastón de cuatro puntos para evitar la carga", "Inyectar metilprednisolona intraarticular trimestralmente de por vida", "Referir a segundo o tercer nivel para efectuar valoración quirúrgica", "Mantener dosis de antiinflamatorios no esteroideos sistémicos indefinidamente"],
        answer: 2,
        justification: "Justificación: El manejo de la osteoartritis de rodilla es progresivo, iniciando con el control de peso, AINEs tópicos u orales a dosis mínima, modificación del estilo de vida y posteriormente técnicas de infiltración articular (esteroide agudo, viscosuplementación). De acuerdo a la GPC de Osteoartrosis de Rodilla, el paciente sintomático documentado que presenta grado radiográfico moderado/severo (Kellgren-Lawrence) y que no responde clínicamente a todos estos peldaños, agotó el manejo médico de retardo estructural. Según el algoritmo resolutivo, la conducta imperativa es su derivación especializada al segundo o tercer nivel de atención para establecer la indicación de un manejo invasivo definitivo, como una artroplastia total o parcial.<br><br>Perla ENARM: Paciente con artrosis moderada a severa que no presentaron respuesta a tratamiento conservador ni a la visco suplementación... Enviar a segundo o tercer nivel donde de acuerdo a la capacidad resolutiva Efectuar valoración clínica y de gabinete.<br><br>Análisis de Distractores: A) El reposo incondicional acelera la sarcopenia cuadricipital (que estabiliza la rodilla) y empeora el pronóstico y el dolor crónico. Se promueve el ejercicio isométrico asistido. B) Los corticoesteroides intrarticulares tienen un uso transitorio para manejo de crisis inflamatorias agudas; su uso rutinario indefinido genera toxicidad sistémica y degeneración condral acelerada por supresión anabólica. D) El uso a largo plazo, continuo e indefinido de AINEs se asocia a alto riesgo de complicaciones gastrointestinales hemorrágicas, nefrotoxicidad y eventos cardiovasculares, y no detiene la progresión osteoarticular.",
        source: "IMSS-435-18 RR, Diagnóstico y Tratamiento de la Osteoartrosis de Rodilla, 2018, Anexos, Página 58."
    },
    {
        id: 21,
        question: "En la evaluación de un paciente que acude a urgencias por sospecha de pericarditis aguda, ¿cuál de los siguientes hallazgos representa un criterio clínico estratificador de riesgo para indicar el ingreso hospitalario inmediato?",
        options: ["Derrame pericárdico mayor a 20 mm", "Frote pericárdico diastólico aislado", "Inversión difusa de la onda T", "Dolor torácico pleurítico severo"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale y Pericarditis, la mayoría de las pericarditis agudas virales o idiopáticas pueden manejarse de forma ambulatoria. Sin embargo, existen factores predictores de complicaciones (como taponamiento cardíaco) que exigen hospitalización estricta. El algoritmo diagnóstico señala que los pacientes que cursen con fiebre >38°C, leucocitosis, derrame pericárdico >20 mm, inmunosupresión, anticoagulación oral, miopericarditis o taponamiento, deben ser ingresados de inmediato al área de choque u hospitalización para vigilancia y posible pericardiocentesis.<br><br>Perla ENARM: Los criterios de hospitalización en pericarditis incluyen Taponamiento cardiaco, Derrame mayor a 20 mm e Inmunosupresión, entre otros.<br><br>Análisis de Distractores: B) El frote pericárdico es un criterio diagnóstico mayor patognomónico, pero por sí solo en un derrame leve no es indicación de internamiento. C) La inversión de la onda T ocurre en estadios tardíos de la evolución electrocardiográfica de la pericarditis, no confiere riesgo agudo de mortalidad. D) El dolor pleurítico es el síntoma cardinal y obliga al manejo con AINEs, pero sin derrames severos u otros datos de alarma, el manejo es conservador.",
        source: "IMSS-463-11 RR, Diagnóstico y Tratamiento de Pericarditis, 2011, Anexos, Página 37."
    },
    {
        id: 22,
        question: "De acuerdo a la clasificación clínica integral, ¿qué patología se categoriza dentro del Grupo 3 como etiología directa de hipertensión pulmonar y cor pulmonale crónico?",
        options: ["Enfermedad pulmonar intersticial", "Disfunción diastólica ventricular izquierda", "Tromboembolia pulmonar crónica", "Cardiopatía congénita obstructiva"],
        answer: 0,
        justification: "Justificación: La hipertensión pulmonar que origina el cor pulmonale crónico se divide en 5 grupos mundiales. De acuerdo a la GPC de Cor Pulmonale Crónico, el Grupo 3 engloba a todas aquellas patologías secundarias a enfermedad pulmonar primaria y/o hipoxia crónica. Dentro de este peldaño se listan explícitamente la Enfermedad Pulmonar Obstructiva Crónica (EPOC), la Enfermedad Pulmonar Intersticial, los trastornos respiratorios del sueño y la exposición crónica a la altitud.<br><br>Perla ENARM: Grupo 3: Hipertensión pulmonar secundaria a enfermedad pulmonar y/o hipoxia (Ej. EPOC, Enfermedad pulmonar intersticial).<br><br>Análisis de Distractores: B) La disfunción diastólica y sistólica ventricular izquierda, así como las enfermedades valvulares mitrales/aórticas, corresponden de manera estricta al Grupo 2. C) La tromboembolia pulmonar crónica (hipertensión pulmonar tromboembólica crónica) constituye su propia categoría en el Grupo 4. D) Las cardiopatías congénitas son causantes de flujos pulmonares alterados y se agrupan morfológicamente en el Grupo 1 (HAP) o Grupo 2 dependiendo del mecanismo.",
        source: "IMSS-036-08 RR, Diagnóstico y Tratamiento de Cor Pulmonale Crónico, 2008, Anexos, Página 8."
    },
    {
        id: 23,
        question: "En un paciente adulto valorado por dolor y claudicación intermitente en las extremidades inferiores derivados del esfuerzo físico, ¿qué valor del Índice Tobillo-Brazo posterior al ejercicio confirma objetivamente el diagnóstico de isquemia arterial?",
        options: ["Menor a 0.70", "Mayor a 1.20", "Menor a 0.90", "Mayor a 0.85"],
        answer: 0,
        justification: "Justificación: El Índice Tobillo-Brazo (ITB) es el estudio inicial y costo-efectivo ideal en primer nivel para escrutinio de enfermedad arterial periférica (EAP). De acuerdo a la GPC de evaluación cardiovascular/arterial, si los síntomas aparecen con el esfuerzo físico pero no son de origen articular, se debe proceder a la medición del ITB post-ejercicio. Un valor <0.70 bajo este estrés hemodinámico se estipula como \"anormal\" y confirma la isquemia dinámica que exige evaluación anatómica por ecografía dúplex o envío especializado.<br><br>Perla ENARM: En pacientes con síntomas en extremidades derivados del ejercicio, un ITB con ejercicio anormal <0.70 indica evaluación anatómica.<br><br>Análisis de Distractores: B) Un ITB >1.20 a >1.40 sugiere calcificación de la capa media arterial (esclerosis de Mönckeberg), muy clásica en diabetes de larga evolución, e invalida la medición asumiendo arterias no compresibles. C) <0.90 es el punto de corte diagnóstico clásico anormal en reposo, pero el algoritmo de la GPC establece el límite específico de <0.70 para la alteración crítica documentada posterior a la prueba de esfuerzo. D) Un ITB basal de 0.91 a 0.99 se considera limítrofe (borderline) y requiere vigilancia o pruebas dinámicas.",
        source: "IMSS-007-08 RR, Enfermedad Arterial Periférica, 2008, Anexos, Página 4."
    },
    {
        id: 24,
        question: "Al aplicar el cuestionario estandarizado de la Asociación Americana de Diabetes (ADA) para detectar precozmente alteraciones del metabolismo de glucosa, ¿a partir de qué puntaje total acumulado se establece la obligación de realizar pruebas bioquímicas confirmatorias?",
        options: ["3 o más puntos", "5 o más puntos", "7 o más puntos", "10 o más puntos"],
        answer: 1,
        justification: "Justificación: El escrutinio temprano de prediabetes y diabetes tipo 2 es la principal herramienta preventiva en primer nivel. De acuerdo a la GPC de Diabetes Mellitus, se recomienda utilizar de manera universal el tamizaje de riesgo de la ADA. Este cuestionario autoadministrable asigna un valor numérico a factores de riesgo inherentes (edad, sexo, antecedentes heredofamiliares, hipertensión). Obtener un resultado acumulado de 5 o más puntos categoriza al individuo en la franja de \"riesgo incrementado\", obligando al clínico a proceder con la medición de glucosa sérica en ayuno o hemoglobina glucosilada.<br><br>Perla ENARM: Cuadro 1. Tamizaje para diabetes (ADA). Si obtuvo 5 o más puntos: Existe un mayor riesgo de que usted tenga diabetes tipo 2. Consulte a su médico para hacerse pruebas adicionales.<br><br>Análisis de Distractores: A) 3 puntos indican un riesgo menor (usualmente pacientes jóvenes sin obesidad grave), donde solo se aconseja vigilancia dietética. C) 7 puntos es un distractor numérico comúnmente confundido con los criterios de porcentaje de HbA1c o las metas de control terapéutico. D) 10 puntos excede ampliamente el umbral clínico estandarizado requerido para desencadenar el flujograma de confirmación de laboratorio.",
        source: "IMSS-657-21 RR, Diagnóstico y Tratamiento de Diabetes Mellitus 2, 2021, Anexos, Página 40."
    },
    {
        id: 25,
        question: "En la valoración clínica de un paciente pediátrico escolar que cursa con cefalea intermitente, ¿qué antecedente orgánico se cataloga como un dato de alarma altamente indicativo de un tumor del sistema nervioso central?",
        options: ["Presencia de diabetes insípida", "Talla baja heredofamiliar", "Hipotiroidismo subclínico", "Retraso constitucional de crecimiento"],
        answer: 0,
        justification: "Justificación: Las neoplasias cerebrales en pediatría representan la segunda causa más frecuente de cáncer infantil, siendo las estructuras infratentoriales y de la región selar/quiasmática altamente vulnerables. De acuerdo a la GPC de patología neurológica pediátrica, el clínico debe interrorafo exhaustivamente sobre signos o síntomas endocrinos de reciente aparición como banderas rojas. La disfunción endocrinológica como la pubertad precoz, la diabetes insípida (por compromiso neurohipofisiario) o una franca detención patológica del desarrollo de crecimiento imponen de inmediato el envío y el estudio de neuroimagen cerebral.<br><br>Perla ENARM: Se recomienda identificar datos de alarma en cefalea como: Disfunción endócrina (pubertad precoz, diabetes insípida, aceleración o detención del crecimiento).<br><br>Análisis de Distractores: B) La talla baja heredofamiliar es una variable constitucional benigna fisiológica. C) El hipotiroidismo subclínico por patología autoinmune (Hashimoto) es un problema metabólico periférico primario muy prevalente y rara vez secundario a un macroadenoma craneal agresivo o glioma incipiente. D) El retraso constitucional obedece a curvas biológicas retrasadas de maduración ósea natural, no es equivalente a la detención del crecimiento hipofisiaria abrupta inducida por un proceso expansivo cerebral.",
        source: "ISSSTE-136-18 RR, Diagnóstico de Tumores Cerebrales Pediátricos, 2018, Intervención en Salud, Página 44."
    },
    {
        id: 26,
        question: "En un hombre de 62 años con Diabetes Mellitus tipo 2 e hipertensión arterial, ¿cuál grupo de fármacos de primera línea se estipula específicamente para reducir de forma probada la progresión hacia enfermedad renal crónica?",
        options: ["Antagonistas del calcio", "Beta bloqueadores selectivos", "Bloqueadores del receptor de angiotensina", "Diuréticos tiazídicos a dosis máxima"],
        answer: 2,
        justification: "Justificación: La nefropatía diabética es la primera causa de enfermedad renal crónica (ERC) en etapa terminal. El control hemodinámico intraglomerular es un eslabón fundamental de la nefroprotección. De acuerdo a la GPC de Enfermedad Renal Crónica, en todo paciente adulto portador crónico de diabetes y cifras de tensión arterial elevadas, se debe indicar imperativamente monoterapia (o en casos selectos combinación vigilada) con fármacos que inhiban el eje renina-angiotensina-aldosterona (IECA o ARA-II), ya que reducen selectivamente la presión de la arteriola eferente capilar y frenan la pérdida de la Tasa de Filtración Glomerular y la albuminuria.<br><br>Perla ENARM: Se recomienda tratar a los pacientes adultos con Diabetes e Hipertensión con una combinación de IECA y bloqueadores del receptor de angiotensina o monoterapia... para disminuir la frecuencia de enfermedad renal crónica.<br><br>Análisis de Distractores: A) Los calcioantagonistas (tipo dihidropiridinas como el amlodipino) son antihipertensivos muy potentes, pero no poseen la evidencia de protección directa intraglomerular como agente único protector. B) Los beta bloqueadores se prefieren únicamente cuando existe cardiopatía isquémica coexistente, o hiperactividad adrenérgica en escenarios de insuficiencia cardiaca. D) Los tiazídicos son una excelente segunda línea antihipertensiva, pero metabólicamente empeoran temporalmente la homeostasis de glucosa y no revierten la proteinuria de la microalbuminuria diabética inicial.",
        source: "IMSS-335-19 RR, Detección y Manejo de Enfermedad Renal Crónica, 2019, Tratamiento, Página 23."
    },
    {
        id: 27,
        question: "Al atender a una paciente primigesta cursando su octava semana de embarazo que refiere sangrado transvaginal de color rojo vinoso y dolor abdominal tipo cólico espasmódico, ¿qué elementos conforman la base para estipular un diagnóstico definitivo de amenaza de aborto?",
        options: ["Especuloscopia bivalva, progesterona en orina y tacto bimanual profundo", "Historia clínica minuciosa, exploración física y ultrasonografía", "Biometría hemática con plaquetas, cervicometría e hisopos vaginales", "Examen general de orina cualitativo, tacto vaginal y tococardiografía"],
        answer: 1,
        justification: "Justificación: En el primer trimestre, el diagnóstico diferencial de sangrado incluye ectópico, mola, aborto inevitable, o pólipos cervicales. De acuerdo a la GPC de Atención del Aborto, se debe evitar el sobre-diagnóstico con elementos únicos. La recomendación clave con evidencia B estipula que la \"amenaza de aborto\" se consolida solo de manera integral. La triada dorada para establecer la conducta a seguir exige la integración metódica de la historia clínica (tiempo y cuantía de sangrado), la exploración física (corroborar orificio cervical interno cerrado) y los hallazgos ecográficos (vitalidad embrionaria intacta), reforzado siempre por la fracción beta de la hormona gonadotropina coriónica (B-hCG).<br><br>Perla ENARM: Se necesita de una evaluación exhaustiva para hacer un diagnóstico definitivo. La combinación de una historia clínica completa, una adecuada exploración física en combinación con el ultrasonido y las pruebas de B-hCG.<br><br>Análisis de Distractores: A) El tacto bimanual profundo y el uso rudo del espéculo no integran la triada; además, la progesterona se determina habitualmente en suero, no en orina para este fin. C) La cervicometría está validada primordialmente en el segundo trimestre anatómico para predecir parto pretérmino inminente, no como marcador de amenaza en el primer trimestre. D) El registro tococardiográfico es de uso exclusivo en la evaluación del feto viable a partir del tercer trimestre (comúnmente desde la semana 28-32), siendo inútil a la semana 8.",
        source: "SS-026-20 RR, Amenaza de Aborto, 2020, Diagnóstico, Página 7."
    },
    {
        id: 28,
        question: "En una paciente diagnosticada con cáncer de mama etapa temprana que fue intervenida con cirugía conservadora de cuadrantes y requiere quimioterapia subsecuente, ¿cuál es el margen temporal crítico en el que debe iniciarse la radioterapia adyuvante para mantener la efectividad?",
        options: ["No se deberá de retrasar más de 24 semanas", "No se deberá de retrasar más de 36 semanas", "No se deberá de retrasar más de 12 semanas", "No se deberá de retrasar más de 8 semanas"],
        answer: 0,
        justification: "Justificación: La cirugía conservadora de mama obliga, casi de forma universal, a la administración de radioterapia al lecho tumoral (45-50 Gy) para equiparar la supervivencia global y el control local al de una mastectomía radical. De acuerdo a la GPC de Cáncer de Mama, cuando se determina que la mujer amerita quimioterapia sistémica citotóxica, esta precede al haz de radiación. Sin embargo, para no perder la ventaja de la esterilización locorregional por retrasos terapéuticos, la normativa clínica ordena que la radioterapia adyuvante jamás deberá diferirse por un lapso superior a 24 semanas contadas tras el abordaje quirúrgico inicial.<br><br>Perla ENARM: Se recomienda en persona con cáncer de mama, candidata a quimioterapia y RT, otorgar primero quimioterapia. La radioterapia no se deberá de retrasar más de 24 semanas.<br><br>Análisis de Distractores: B) 36 semanas es un tiempo subestándar prolongado que incrementa abruptamente el riesgo de recaída tumoral en el lecho primario. C) 12 semanas es un lapso excelente para el inicio temprano o en pacientes sin quimioterapia, pero un ciclo completo de quimioterapia adyuvante estándar exige más tiempo antes de irradiar. D) 8 semanas es el periodo meta para iniciar adyuvancia (de cualquier modalidad inicial), pero no el umbral máximo de retraso de la radiación post-quimio.",
        source: "IMSS-232-09 RR, Tratamiento Quirúrgico y Oncológico de Cáncer de Mama, 2009, Tratamiento, Página 18."
    },
    {
        id: 29,
        question: "Ante el reporte topográfico de un incidentaloma tiroideo de 1.5 cm descubierto de manera fortuita en una tomografía computarizada de tórax/cuello por otro motivo, ¿cuál es el paso mandatorio previo a la decisión de puncionar la lesión?",
        options: ["Valoración volumétrica con gammagrafía de yodo radioactivo", "Tomografía por emisión de positrones para medir metabolismo", "Biopsia directa de los ganglios cervicales clínicamente palpables", "Realizar exploración por ultrasonido cervical diagnóstico dirigido"],
        answer: 3,
        justification: "Justificación: En la era de la imagenología moderna, la detección fortuita de nódulos asintomáticos en la glándula tiroides (incidentalomas) es extraordinariamente frecuente al realizar TC, RM o Doppler carotídeo. De acuerdo a la GPC de Nódulo Tiroideo, el algoritmo dictamina con un nivel de recomendación alto que, independientemente del reporte tomográfico, todos los incidentalomas deben ser sometidos a un barrido con el \"estándar de oro morfológico\" que es el ultrasonido cervical de alta resolución antes de considerar cualquier invasión. Esto estratifica bordes, microcalcificaciones y vascularidad (TI-RADS) indicativos o no de BAAF.<br><br>Perla ENARM: INCIDENTALOMAS: Realizar USG a los incidentalomas detectados por la TC o RM antes de considerar BAAF. (Recomendación Grado A).<br><br>Análisis de Distractores: A) La gammagrafía tiroidea solo se considera prioritariamente en pacientes que cursan bioquímicamente con tirotoxicosis (TSH suprimida) para distinguir nódulos autónomos (calientes). B) La tomografía PET-CT se utiliza ante escrutinio de metástasis o de tumores primarios sistémicos, careciendo de especificidad como paso de criba primario para un pequeño nódulo tiroideo asintomático. C) Puncionar directamente un ganglio sin conocer por ecografía las características invasivas y el mapeo ecográfico del cuello y nódulo primario contraviene el protocolo.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico, 2009, Recomendaciones, Página 27."
    },
    {
        id: 30,
        question: "En la evolución longitudinal de la Trombocitopenia Inmune Primaria (TIP) de la edad pediátrica, ¿qué parámetro de temporalidad a partir de su detección inicial clasifica a la enfermedad como \"Persistente\"?",
        options: ["Remisión ausente o falla de conteo durante 3 a 12 meses", "Cifras plaquetarias anormales más allá de 12 meses absolutos", "Sangrado mucocutáneo constante en los primeros 3 meses", "Trombocitopenia asintomática con duración menor a 6 meses"],
        answer: 0,
        justification: "Justificación: Históricamente, la Púrpura Trombocitopénica Inmunológica se dividía mecánicamente en aguda (<6 meses) y crónica. No obstante, las pautas globales actuales dictaminan una ventana pronóstica intermedia muy importante. De acuerdo a la GPC de TIP, si a partir del hito del diagnóstico confirmatorio el conteo plaquetario no alcanza niveles homeostáticos (<100x10⁹/L) en un periodo continuo de 3 meses, pero no sobrepasa el límite del año, se le otorga la categoría nosológica precisa de TIP \"Persistente\".<br><br>Perla ENARM: Algoritmo 1. Diagnóstico y clasificación de TIP: ¿La evolución a partir del diagnóstico es de 3 a 12 meses? -> SI -> Diagnóstico TIP persistente.<br><br>Análisis de Distractores: B) Si la duración del padecimiento transcurre más allá de la barrera estricta de los 12 meses, la enfermedad transiciona automáticamente a ser clasificada como TIP \"Crónica\". C) Todo cuadro activo durante los primeros 3 meses exactos, con o sin sangrado, desde el momento del diagnóstico, se denomina obligatoriamente TIP de \"reciente diagnóstico\". D) La temporalidad menor a 6 meses responde a terminologías médicas obsoletas que ya no se respaldan en la normativa actual.",
        source: "IMSS-143-19 RR, Púrpura Trombocitopénica Inmunológica, 2019, Anexos, Algoritmo 1, Página 14."
    },
    {
        id: 31,
        question: "Al emplear la escala física estandarizada de destrezas para adultos jóvenes que han sufrido amputación transfemoral de un miembro pélvico, ¿qué reacción durante la \"Prueba de empuje\" externaliza un puntaje clínico de 1 (inestabilidad intermedia)?",
        options: ["Cae súbitamente y de forma inminente perdiendo la base", "Se estabiliza sin hacer uso alguno del dispositivo en turno", "Transfiere su eje gravitacional sin desbalancear la prótesis", "Se tambalea tras el embate, pero logra detenerse o usa asistencia"],
        answer: 3,
        justification: "Justificación: En el tratamiento de rehabilitación por amputación, el dominio proprioceptivo tras la intervención es determinante para la marcha con dispositivo ortésico y la reincorporación laboral. De acuerdo a la GPC de Rehabilitación en Amputación, el rubro 10 valora la prueba de empuje (donde el examinador desplaza el peso tres veces tocando el esternón). En esta escala técnica, un grado 0 significa que la persona no posee control y \"comienza a caer\", 2 representa independencia y estado \"estable\", y específicamente el grado de 1 punto es otorgado cuando el individuo \"se tambalea transitoriamente, pero logra contener la caída o debe recargarse en un dispositivo de asistencia\".<br><br>Perla ENARM: Cuadro de evaluación. Prueba de empuje (máxima posición): 0= Comienza a caer, 1= Se tambalea, pero se detiene o usa un dispositivo de asistencia, 2= Estable.<br><br>Análisis de Distractores: A) Iniciar la caída franca y la pérdida total del eje corporal central de gravedad otorga una calificación sumaria de 0 (nula compensación estática). B) Mantener la estabilidad absoluta sin ninguna flexión correctiva con los tobillos no protésicos otorga la más alta calificación ortostática: 2 puntos. C) La transferencia ideal del centro de masa de gravedad representa una marcha o estática adecuada, no el puntaje intermedio patológico de \"tambaleo\".",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputación de Miembro Inferior, 2021, Anexos, Página 2."
    },
    {
        id: 32,
        question: "En una paciente con antecedente quirúrgico preexistente de cambio valvular o plastía, ¿cuál de los siguientes hallazgos ecocardiográficos o escenarios fundamenta la obligatoriedad de referirla a tercer nivel hospitalario?",
        options: ["Aparición de bradicardia sinusal de 55 latidos por minuto en reposo", "Documentación de dificultad en el manejo del INR e interacciones", "Sospecha confirmada de disfunción protésica y signos de reestenosis", "Elevación aislada de la proteína C reactiva por infección urinaria"],
        answer: 2,
        justification: "Justificación: El flujo de atención de la valvulopatía cardíaca requiere criterios estrictos de referencia para prevenir disfunciones catastróficas. De acuerdo a la GPC de la Patología de la Válvula Mitral, los pacientes que ya han sido intervenidos en el pasado (prótesis mecánicas/biológicas) y que en su monitoreo evidencian falla estructural o sospecha alta de disfunción o reestenosis, no pueden retenerse en niveles bajos, y representan un \"Punto de Buena Práctica\" de envío absoluto y urgente al tercer nivel de atención para eventual re-intervención cardiocirujana de alta gama.<br><br>Perla ENARM: Refiera al paciente con antecedente de cirugía valvular mitral, con sospecha de disfunción protésica o reestenosis mitral a un tercer nivel de atención.<br><br>Análisis de Distractores: A) La bradicardia sinusal asintomática puede ser un hallazgo no relacionado, por entrenamiento físico o uso de beta bloqueadores, sin implicar colapso de la prótesis. B) La dificultad reiterada para el manejo ambulatorio de los anticoagulantes orales (dicumarínicos) es una indicación explícita de referencia exclusiva al segundo nivel (clínica de trombosis/hematología), no directamente al tercer nivel resolutivo. D) La infección urinaria requiere un ajuste y tratamiento antibiótico sistémico inmediato en primer nivel sin justificar un internamiento cardiológico de tercer grado.",
        source: "IMSS-235-09 RR, Diagnóstico de Patología de la Válvula Mitral, 2009, Referencia, Página 20."
    },
    {
        id: 33,
        question: "Durante la ejecución formal de la sección \"Lenguaje y Construcción\" en la prueba Mini-Mental (MMSE), el clínico emite una orden ejecutiva de tres tiempos. ¿A qué puntaje máximo es acreedor el paciente si sigue de manera perfecta la secuencia indicada?",
        options: ["2 puntos", "3 puntos", "4 puntos", "5 puntos"],
        answer: 1,
        justification: "Justificación: El Mini Examen del Estado Mental de Folstein discrimina déficits cognitivos en senectud. En el dominio de comprensión auditiva, funciones ejecutivas y lenguaje de ejecución, la normativa estandarizada obliga al clínico a dictar solo en una ocasión la frase de tres partes: \"tome este papel con la mano izquierda, dóblelo por la mitad y póngalo en el suelo\". De acuerdo a la GPC de Alzheimer, el examinador evalúa individualmente cada acción, otorgando 1 punto por la prensión izquierda, 1 por el pliegue intermedio y 1 por depositarlo en el suelo, acumulando un puntaje máximo riguroso de 3 puntos.<br><br>Perla ENARM: \"Tome el papel con la mano izquierda, dóblelo por la mitad y póngalo en el suelo\" (Anote un punto por cada orden bien ejecutada). Máximo 3 puntos.<br><br>Análisis de Distractores: A) 2 puntos es la máxima calificación de otro apartado del mismo dominio que examina la nominación o denominación (mostrar un reloj y un bolígrafo y que diga qué son). C) 4 puntos es una cifra que no coincide con ninguna métrica parcial tope estipulada dentro del MMSE. D) 5 puntos es el valor máximo para dominios más pesados: la orientación topográfica estricta (país, ciudad) temporal, y el dominio de atención y concentración (restar de siete en siete).",
        source: "IMSS-393-10 RR, Enfermedad de Alzheimer, 2010, Anexos, Página 31."
    },
    {
        id: 34,
        question: "Tras el inicio de un evento de parálisis de Bell idiopática, ¿qué dato neurológico al examen físico denota una evolución atípica que justifica el envío temprano al segundo nivel de atención?",
        options: ["Alteración e involucro funcional de pares craneales distintos al facial", "Aplanamiento profundo y súbito del surco nasogeniano facial ipsilateral", "Epífora ocular marcada en la glándula lagrimal comprometida", "Aparición de dolor en la zona retroauricular sin supuración ni fiebre"],
        answer: 0,
        justification: "Justificación: La Parálisis de Bell constituye una pérdida inflamatoria y aguda de inervación motora aislada en el VII par craneal. De acuerdo a la GPC de Parálisis de Bell, su manejo general con corticosteroides debe instaurarse en el primer nivel de asistencia médica general. No obstante, si el clínico constata a la exploración la abolición o alteración de otros nervios craneales no faciales (por ejemplo, diplopía por el VI par, hipoacusia profunda y progresiva del VIII par, parálisis palatina del IX par), este es un dato ominoso que orienta el diagnóstico a masas, abscesos del ángulo pontocerebeloso o polineuropatías difusas (Guillain Barré) y amerita envío emergente.<br><br>Perla ENARM: Recomendación fuerte: La alteración en el resto de los pares craneales es indicativa de valoración en el segundo nivel de atención.<br><br>Análisis de Distractores: B) El aplanamiento del surco nasogeniano y la comisura labial caída inferior es la semiología natural, típica e inherente a toda disfunción flácida de Bell. C) El incremento en el desgarro ocular (epífora por atonía del punto lagrimal inferior) o disminución de secreción lagrimal (nervio petroso) es clínicamente predecible en el proceso. D) El dolor sordo periauricular posterior es un dolor referido pródromo muy frecuente causado por el edema inicial del nervio a su salida del agujero estilomastoideo, no requiere derivación secundaria per se.",
        source: "IMSS-066-08 RR, Parálisis de Bell en el Adulto, 2008, Recomendaciones, Página 10."
    },
    {
        id: 35,
        question: "¿Cuál es el margen temporal perentorio estipulado por las guías clínicas para la finalización de un ciclo combinado de radioterapia y quimioterapia en pacientes con cáncer de cuello uterino de alto riesgo?",
        options: ["Antes del cumplimiento de las 12 semanas", "Exactamente a las 10 semanas desde su diagnóstico histopatológico", "Obligatoriamente dentro de las primeras 8 semanas", "De forma dinámica antes de cumplir las 24 semanas"],
        answer: 2,
        justification: "Justificación: El cáncer cervicouterino invasor local, con gran compromiso pélvico ganglionar (estadio IB2 en adelante y estadios II/III), no es candidato a cirugía de primera intención. Se recurre de manera estándar al uso concomitante pélvico de Cisplatino semanal acoplado a Radioterapia Externa y Braquiterapia de Alta Tasa de Dosis. De acuerdo a la GPC de Cáncer Cervicouterino, con la intención de mermar la repoblación celular intratratamiento que aumenta la quimiorresistencia por mitosis acelerada, se emite la directriz estricta de que el esquema integral no puede suspenderse ni retrasarse, debiendo culminar por completo dentro de las primeras 8 semanas exactas (56 días biológicos).<br><br>Perla ENARM: Todas las pacientes que reciban Quimioterapia/Radioterapia concomitante deben concluir el tratamiento dentro de las primeras 8 semanas. (Grado de recomendación D).<br><br>Análisis de Distractores: A) 12 semanas es un retraso sistémico inaceptable que castiga contundentemente la sobrevida celular global y precipita fracasos pélvicos isquémicos focales en braquiterapia tardía. B) Los conteos de la ventana radioterapéutica nunca inician a partir del acto de la biopsia patológica, sino desde el día 1 en que la primera dosis citotóxica entra al cuerpo del paciente. D) El concepto \"antes de las 24 semanas\" es el límite temporal estandarizado para la adyuvancia mamaria después de completar la cirugía y la inducción previa en cáncer de mama, no en cérvix.",
        source: "IMSS-333-09 RR, Cáncer Cervicouterino, 2009, Tratamiento, Página 21."
    },
    {
        id: 36,
        question: "En la escala internacional de medición del grado de autonomía \"Índice de Barthel\", ¿qué puntaje numérico recibe un adulto mayor si posee la aptitud de comer mecánicamente solo, pero precisa asistencia exclusiva de terceros para cortar los trozos sólidos?",
        options: ["0 puntos (Dependencia)", "10 puntos (Independencia plena)", "5 puntos (Independencia compensada)", "15 puntos (Ayuda externa mínima)"],
        answer: 2,
        justification: "Justificación: La funcionalidad geriátrica en enfermedades crónicas demanda escalas de objetivación cuantitativa en las AVD (Actividades de la Vida Diaria). El índice de Barthel estratifica estas capacidades. De acuerdo a la GPC de DM en el Adulto Mayor, el constructo de \"Alimentación\" es muy específico: se conceden 10 puntos a aquel paciente enteramente independiente que lleva los alimentos sólidos y líquidos y los fracciona en sus proporciones; se le rebaja a un estricto 5 (puntaje de ayuda) a quien lo logra todo pero irremediablemente \"necesita que alguien le corte la carne, la fruta dura o el pan\"; mientras el 0 puntos es el postrado dependiente absoluto para su alimentación o alimentación enteral.<br><br>Perla ENARM: Índice de Barthel. Parámetro Alimentación: Totalmente independiente (10 puntos). Necesita ayuda para cortar carne, el pan, etc. (5 puntos). Dependiente (0 puntos).<br><br>Análisis de Distractores: A) Otorgarle un cero significaría categorizarlo injustamente con una discapacidad motora densa de los miembros torácicos o deglución, sesgando el manejo de rehabilitación alimentaria integral. B) 10 puntos le certificaría una presteza biomecánica y bimanual intacta total en la mesa, lo cual es contradicho en el enunciado al presentar falencia en la técnica de corte de alimentos duros. D) La escala de Barthel no asigna un puntaje de 15 a ninguna vertiente ni de lavado, nutrición ni de baño. Los 15 puntos solo alcanzan a manifestarse de manera agregada en subrubros de movilidad o marcha prolongada.",
        source: "IMSS-657-21 RR, Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Página 41."
    },
    {
        id: 37,
        question: "En el abordaje histopatológico post-resección radical del adenocarcinoma de próstata, ¿qué nivel anatómico de invasión glandular es determinante para considerar a un tumor como estadio T2b?",
        options: ["Enfermedad de ambos lóbulos", "Diseminación a la pared rectal", "Extensión uni o bilateral a la cápsula", "Más de la mitad de un solo lóbulo sin afectar el opuesto"],
        answer: 3,
        justification: "Justificación: La estadificación patológica del cáncer prostático focalizado regula las indicaciones de terapia adyuvante con inhibición androgénica o radioterapia de rescate anatómico. De acuerdo a la GPC de Cáncer de Próstata, el estadio T2 estipula tumores restringidos dentro de los límites de las fibras aponeuróticas prostáticas. Específicamente, el T2b está delineado anatómicamente como aquel conglomerado maligno de células glandulares que involucra físicamente una proporción que \"excede la mitad de un lóbulo, pero no llega a invadir las vertientes de ambos lóbulos a la vez\".<br><br>Perla ENARM: Clasificación: T2b Tumor que involucra más de la mitad de un lóbulo pero no ambos lóbulos.<br><br>Análisis de Distractores: A) Un tejido patológico infiltrando las dos mitades parenquimatosas lobares de la glándula es clasificado uniformemente en la etapa T2c. B) El tejido tumoral que rebasa totalmente el complejo anatómico esfinteriano y queda fijo invadiendo pared de vejiga, piso pélvico o tubo rectal, avanza dramáticamente al T4. C) El carcinoma de próstata que ya se extiende rompiendo la estructura o \"extensión extracapsular\" (ya sea de un solo lado o en ambas vías) salta de etapa, asignándosele de inmediato la etiqueta pT3a clínica.",
        source: "IMSS-140-18 RR, Cáncer de Próstata, 2018, Estadificación y Pronóstico, Página 13."
    },
    {
        id: 38,
        question: "¿Cuál es el tratamiento de intervención farmacológica que debe iniciarse de primera línea desde el abordaje de medicina familiar para un paciente portador de Enfermedad Arterial Periférica y claudicación?",
        options: ["Cilostazol 50 mg más clopidogrel crónico a dosis fijas", "Pravastatina 20 mg al día junto con ácido acetilsalicílico 150 mg al día", "Enoxaparina de bajo peso molecular puenteando la heparina basal", "Trinitrato de glicerilo cutáneo junto a dosis elevadas de estatinas"],
        answer: 1,
