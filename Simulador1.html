        justification: "Justificación: La inercia y resistencia médica retrasa de forma negligente y crónica la insulinización temprana y oportuna de los pacientes agotados de las células beta pancreáticas. De acuerdo a la GPC de Tratamiento de Diabetes Mellitus tipo 2, el algoritmo del flujograma transicional indica de manera franca que cuando se constata biológicamente el fracaso (HbA1c fuera de meta superior al 8% mantenida), se estipula la caída final hacia la aguja. El médico deberá iniciar directamente la \"Insulina NPH a dosis inicial de 10 UI, o calculando un abordaje ponderado equivalente a 0.2 UI x kilogramo de peso\", para instaurar un colchón homeostático hipoglucemiante y posteriormente titular de forma progresiva en las consultas siguientes según glucemia de ayuno.<br><br>Perla ENARM: Algoritmo de manejo de Diabetes Mellitus: Falla de terapia triple -> Iniciar Insulina NPH dosis inicial: A) 10 UI o B) Insulina NPH 0.2 x peso kg.<br><br>Análisis de Distractores: A y B) Dosificaciones masivas agresivas (como las equivalentes al 0.5 o 0.8 UI/kg) son altamente peligrosas y letales, constituyendo el requerimiento sustitutivo basal total integral en cetoacidosis agudas superadas, diabéticos tipo 1 sin reserva o ancianos multi-insulino-resistentes obesos terminales graves, pero inducirán hipoglucemia matutina o madrugada profunda (Efecto Somogyi) al aplicarse burdamente y de manera no titulada e irresponsable a una terapia basal que arranca de primera vez con pastillas a tope aún remanentes biológicamente en la sangre del enfermo. C) El dintel tímido e infrautilizado de inicio de 0.1 UI x kg sub-dosiﬁca clínicamente a un fenotipo hispano diabético mexicano promedio de 80 kilos (otorgándole solo una raquítica dosis de 8 UI), siendo la directriz explícita protocolizada arrancar de forma un poco más enérgica e instaurada normativamente con el multiplicador de 0.2 para asegurar control de ayuno desde el primer mes.",
        source: "IMSS-718-18 RR, Diagnóstico y Tratamiento de Diabetes Mellitus Tipo 2, 2018, Algoritmo de Tratamiento, Página 65."
    },
    {
        id: 156,
        question: "Al evaluar la presión arterial en una niña de 8 años en su revisión médica infantil protocolaria del niño sano, el pediatra cruza los ejes del normograma pediátrico buscando hipertensión oculta. De acuerdo a la GPC, para determinar con rigor científico el umbral hemodinámico de los percentiles arteriales tensionales correspondientes, la edad cronológica biológica obligadamente debe ser cotejada contra:",
        options: ["El percentil o medición exacta de talla", "La correlación basal del Índice de Masa Corporal", "El peso total somático real por báscula", "La velocidad de crecimiento bi-anual ósea"],
        answer: 0,
        justification: "Justificación: En el paciente pediátrico, un valor numérico bruto aislado (ej. 120/80) no puede etiquetarse erróneamente ni confirmarse como \"hipertensión\" o \"normalidad\" sin un marco de adaptación a la física estricta de la resistencia vascular de su lecho arterial creciente primario, comandado inexorablemente por los ejes longitudinales estructurales de sus vasos de capacitancia sistémicos principales mayores. De acuerdo a la GPC de Prevención de Hipertensión, el diagnóstico infantil ostenta un cuadro específico universal titulado: \"Presión arterial en niños por edad y percentil de talla\". El explorador requiere siempre ubicar el número de la edad de la niña, y cruzar verticalmente y de manera cruzada y determinante con su \"Percentil de talla o medición de talla\" fisiológica (50, 90, 95) para finalmente obtener el límite normal sano biológico sistólico.<br><br>Perla ENARM: Cuadro 8. Presión arterial en niños por edad y percentil de talla. (El cruce estricto en toda la columna y normativa diagnóstica pediátrica exige de manera ineludible Edad contra la Percentila de Talla).<br><br>Análisis de Distractores: B y C) Aunque la obesidad infantil epidémica eleva el riesgo del desarrollo del estado metabólico y de la hipertensión primaria, las tablas estandarizadas estructurales de corte vascular diagnóstico oficial internacional (AHA) integradas en la pauta nacional no modifican basalmente los límites pre-establecidos de tensión natural mediante ajustes crudos ponderales de kilogramos, grasa sistémica ni IMC, sino que lo hacen ajustado mecánicamente de acuerdo al desarrollo natural esquelético lineal del paciente (talla). D) La velocidad y dinámica cronológica puberal de maduración ósea concierne netamente al dictamen de tallas bajas genéticas, endocrinología hipofisiaria o cierre epifisiario por placas de mano, pero no estipula ni tabula en el día de la consulta general ordinaria el rango diagnóstico agudo circulatorio periférico a registrar en el expediente presorio de la niña.",
        source: "SS-188-18 RR, Prevención y Diagnóstico de Hipertensión Arterial, 2018, Anexos, Cuadro 8, Página 137."
    },
    {
        id: 157,
        question: "Al llevar a cabo el protocolo de estandarización fisioterapéutica \"AMPPro\" (Predictor de Movilidad para Amputados), el fisioterapeuta somete al paciente amputado a la evaluación estática evaluando el dominio específico del \"Alcance de pie\". Para otorgar el puntaje máximo (2 puntos), ¿a qué distancia horizontal (centímetros) por delante de la línea media y punta del esternón del sujeto el examinador debe ubicar el objeto para que el amputado intente tomarlo en el aire manteniendo el balance pélvico estático?",
        options: ["A una distancia de 15 centímetros", "A una distancia de 30 centímetros", "A una distancia de 50 centímetros", "A una distancia de 10 centímetros"],
        answer: 1,
        justification: "Justificación: En la medicina de rehabilitación protésica pre-laboral, la integridad del núcleo (core) somático abdominal que evita que un paciente claudique y se precipite catastróficamente al suelo por desbalance gravitacional rotacional frente a fuerzas extrínsecas cinéticas es fundamental. De acuerdo a la GPC de Rehabilitación en Amputación, el instrumento AMPPro en su acápite número 9 evalúa precisamente esta \"anticipación motora\" del eje anatómico sano: el \"Alcance de pie\". El texto instructivo señala incondicionalmente y ordena al evaluador de la prueba: \"estírese hacia adelante y agarre la regla. El examinador sostiene la regla 30 centímetros más allá de los brazos, siguiendo la línea media hasta el esternón\". El paciente obtendrá su puntaje de suficiencia de balance \"2\" si \"se estira hacia adelante y agarra con éxito el artículo sin ayuda ortopédica de apoyos secundarios protectores externos\".<br><br>Perla ENARM: Escala Predictor de Movilidad (AMP). 9. Alcance de pie: El examinador sostiene la regla 30 centímetros más allá de los brazos... Se estira hacia adelante y agarra con éxito el artículo sin apoyo (2 puntos).<br><br>Análisis de Distractores: A y D) Las mediciones diminutas espaciales de 10 o 15 cm equivalen cinéticamente a un alcance conservador nulo, eludiendo someter verdaderamente a reto o estrés oscilatorio de tracción del torque rotacional biomecánico del aparato pélvico-articular y tobillos sanos residuales aéreos. C) El colocar el reactivo evaluador o regla a un extremo horizontal inusitado e incuantificable de 50 cm alejado del perímetro escapular máximo anatómico, excede forzosamente los arcos lógicos articulares corporales biológicos sanos viables permitidos de brazo humano sin ocasionar deliberadamente el quiebre inminente, lo cual violenta la seguridad laboral de la escala de la camilla del hospital dictando caídas traumáticas.",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputación de Miembro Inferior, 2021, Anexos, Metodología AMPPro, Página 9."

    {
        id: 158,
        question: "En el paciente sometido a la encuesta FIQ (Cuestionario de Impacto de la Fibromialgia) en el gabinete de atención de Reumatología y Medicina Familiar, se indaga exhaustivamente la calidad recuperadora de los patrones orgánicos de sueño. Para la respuesta del enunciado: \"¿Cómo se sintió al levantarse por las mañanas?\", ¿qué implicación o manifestación clínica somatomorfa se adjudica si el paciente tacha firmemente la puntuación matemática equivalente al número \"0\" de la escala análoga del cuestionario?",
        options: ["Sentirse completamente fatigada y dolorida", "Fuerte limitación o lentitud en actividades cotidianas", "Sentirse muy descansada", "Rigidez total incapacitante y muscular"],
        answer: 2,
        justification: "Justificación: A diferencia de los síndromes agudos lesivos o dolorosos, la Fibromialgia está comandada neurobiológicamente y arruina invariablemente la calidad biológica vital regeneradora por alteraciones severas del circuito y fases delta lentas profundas de la corteza, perpetuando hipersensibilidad al día siguiente. De acuerdo a la GPC de Fibromialgia, el FIQ posee reactivos de severidad con rangos o ejes numéricos que oscilan bidireccionalmente evaluativos del 0 al 10 en su representación gráfica para ser interpretados. En la pregunta \"¿Cómo se sintió al levantarse por las mañanas?\", la herramienta en México sitúa a su numeral \"0\" como el escenario y polo más sano absoluto posible: \"Muy descansada\", y a su máximo valor escalar numérico de terminalidad aflictiva, el \"10\", como \"Muy cansada\".<br><br>Perla ENARM: Cuestionario de Impacto de la Fibromialgia (FIQ): 7. ¿Cómo se sintió al levantarse por las mañanas? -> 0 (Muy descansada) ---------- 10 (Muy cansada).<br><br>Análisis de Distractores: A y D) \"Sentirse extremadamente dolorida, cansada con debilidad y mialgias extremas o rigidez muscular terminal matinal total\" componen justamente todos los cuadros semánticos descriptivos de invalidez dolorosa para los topes máximos y extremos del test (calificables forzosa e inexorablemente con los puntajes de 10 redondos sobre la barra Likert), distando completamente de significar la homeostasis curada sana equivalente y estricta ligada a un 0 en este ítem somático interrogado. B) Estas limitaciones biomecánicas diurnas evaluativas corresponden enteramente al abanico superior de preguntas procedentes en la escala FIQ (como la aptitud para poder ir en ruta al mandado al mercado, lavar ventanas altas, tender sábanas en camas o bañarse en cuartos), y no evalúan para nada el subgrupo de despertar nocturno aislado.",
        source: "IMSS-075-18 RR, Diagnóstico y Tratamiento de Fibromialgia, 2018, Anexos, Cuadro FIQ, Página 30."
    },
    {
        id: 159,
        question: "Al indicar terapias físicas coadyuvantes curativas o moduladoras paliativas en un paciente con dolor agudo lumbar inferior en medicina familiar y rehabilitación ortopédica, ¿cuál es el único escenario físico y condición exploratoria dictado con grado firme en el que se recomienda estrictamente emplear e indicar la \"Masoterapia\" muscular manual profunda lumbar inespecífica sobre la columna?",
        options: ["Corroboración de osteofitos artrósicos o facetarios limitantes", "Constatación franca de un déficit neurológico sensitivo ciático", "En pacientes con dolor provocado en la maniobra diagnóstica de Lasegue", "Exploración física que identifique evidentemente un espasmo muscular"],
        answer: 3,
        justification: "Justificación: En medicina física regenerativa y terapéutica de la espalda, no toda intervención superficial amigable pasiva confiere recuperación biológica en patología facetaria o discogénica intrínseca densa del canal neural interior. De acuerdo a la GPC de Dolor Lumbar, existen modalidades curativas que deben emplearse juiciosamente para que no mermen un recurso de alto costo. La normativa expone que si bien \"Se recomienda la masoterapia como parte del tratamiento del dolor lumbar agudo\", esta indicación viene fuertemente condicionada con un Punto de Buena Práctica estricto: \"El uso de masoterapia sólo debe ser considerado y prescrito en pacientes con una exploración física que identifique espasmo muscular\".<br><br>Perla ENARM: El uso de masoterapia solo debe ser considerado en pacientes con una exploración física que identifique espasmo muscular (PBP).<br><br>Análisis de Distractores: A) La deformidad osteofítica de la espondiloartrosis y facetas intervertebrales obedece estructuralmente a daños del hueso y fricción capsular ineludible, donde un simple masaje de tejido blando externo sinérgico no restaura morfológicamente ni cede la estenosis espinal crónica senil inespecífica foraminosa interna degenerativa de la raíz del paciente anciano. B y C) El dolor de tipo neuropático y radiculopático intenso asimétrico con Lasegue positivo irradia un compromiso agudo desmielinizante neurofisiológico isquémico axonal compresivo de la columna baja radicular, territorio crítico que desaconseja y carece de eficacia científica ante las terapias locales pasivas superficiales sin la instauración urgente esteroidea previa o valoración de bloqueos selectivos espinales en agudo.",
        source: "DIF-313-19 RR, Rehabilitación del Dolor Lumbar Inespecífico, 2019, Intervenciones Terapéuticas, Página 8."

        question: "Para estratificar funcionalmente el grado del padecimiento coronario del anciano y evaluar la viabilidad cognitiva basal mediante el escrutinio geriátrico estandarizado nacional, se le aplica un panel rápido a una mujer de 85 años con la Escala de Yesavage en su versión abreviada. ¿Qué afirmación interrogada en este test suma incondicionalmente \"un punto (1)\" o alarma predictiva letárgica a su conteo general estadístico geriátrico total?",
        options: ["Siente que su vida está vacía y monótona", "Suele y afirma estar constantemente de buen ánimo en la tarde", "Argumenta explícitamente estar satisfecha con su vida social", "Preserva de manera consistente un entusiasmo diurno"],
        answer: 0,
        justification: "Justificación: El adulto mayor frágil disimula su ideación anhedónica o es abandonado socialmente cursando disfunción letal cardiovascular encubierta o en pseudo-demencia. De acuerdo a la GPC de Diabetes en Adulto Mayor y Valoración Geriátrica, la Escala de Depresión Geriátrica validada e inamovible (Yesavage en su versión reducida de 15 ítems) es una herramienta contundente y binaria (SÍ / NO). La presencia o marcaje confirmatorio \"SI\" en cualquiera de las aseveraciones pesimistas del formato, como el ítem clásico \"3. ¿Siente que su vida está vacía?\", castiga irremediablemente y evalúa el ánimo con la imposición del lastre matemático y dictaminatorio de \"1 punto\" directo hacia el fenotipo diagnóstico franco y severo global del espectro de depresión de la unidad primaria.<br><br>Perla ENARM: Cuadro 9. Escala de Depresión Geriátrica de Yesavage. Pregunta: 3. ¿Siente que su vida esta vacía? SI (1) NO (0). (El contestar SÍ agrega 1 punto de riesgo).<br><br>Análisis de Distractores: B, C y D) \"Tener buen ánimo o un espíritu y carácter positivo alegre, preservar entusiasmo y reportar estar francamente satisfecha y en sintonía con su vida general\", atestigua y confirma la indemnidad psiquiátrica hedonista basal y un sistema de control de salud mental sano en la paciente longeva interrogada en cabecera clínica; ante cualquiera de estas descripciones loables y optimistas referidas de manera expresa en la tabla, el baremo del cuestionario y test le perdona sin pena y no suma carga alguna, es decir, obsequia contundentemente a la cuenta neta matemática global la exención exenta total de \"0 puntos\".",
        source: "IMSS-657-21 RR, Diagnóstico y Tratamiento de Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Cuadro 9, Página 20."

        id: 161,
        question: "En el contexto del manejo hemático intrahospitalario por sangrado grave en un paciente anticoagulado previamente, ¿cuál es el agente farmacológico de reversión específico indicado como primera línea ante la intoxicación aguda por Dabigatrán?",
        options: ["Concentrado de complejo protrombínico de 4 factores", "Anticuerpo monoclonal Idarucizumab", "Plasma Fresco Congelado a dosis altas", "Fitomenadiona (Vitamina K) intravenosa lenta"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Programa de Optimización de la Sangre (PBM), el control de la hemorragia letal en pacientes que consumen Nuevos Anticoagulantes Orales (NOAS) requiere agentes directos. El algoritmo dicta que para el inhibidor directo de la trombina (Dabigatrán), el antídoto ineludible es su fracción de anticuerpo monoclonal neutralizante.<br><br>Perla ENARM: Algoritmo 5. ROTEM y Sangrado grave: *En caso de Dabigatran usar reversión con Idarucizumab.<br><br>Análisis de Distractores: A) El Concentrado de Complejo Protrombínico (CCP4f) es la primera línea de rescate (25-50 UI/kg) para intoxicación por dicumarínicos tradicionales (Anti-K) o el resto de los NOAS inhibidores del Factor Xa (Rivaroxabán, Apixabán), no para Dabigatrán. C) El Plasma Fresco Congelado se considera una tercera elección desesperada y subóptima debido a la sobrecarga de volumen y la baja concentración de factores activos frente a la inhibición enzimática masiva por NOAS. D) La Vitamina K es el cofactor de reversión tardía y escalonada de la Warfarina o Acenocumarina, careciendo de sustrato biológico contra los anticoagulantes directos.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 5, Página 88."

        question: "De acuerdo con la clasificación celular y molecular (MIC) de las Leucemias Agudas en Pediatría, ¿qué marcador inmunológico de superficie caracteriza positivamente al subtipo de \"Leucemia Aguda Linfoblástica Común\"?",
        options: ["Expresión franca del antígeno CD10", "Positividad al marcador mieloide CD13", "Ausencia total de los antígenos CD19 y TdT", "Expresión dominante del marcador CD2"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Leucemia Aguda en Pediatría, el sistema integral MIC vincula la morfología con los receptores celulares. El subtipo \"LAL Común\" (la estirpe infantil más frecuente) se identifica en la citometría de flujo por expresar obligatoriamente de forma simultánea los marcadores de la línea B inmadura CD19 y, de manera definitoria para esta variante, el CD10 (Antígeno Común de Leucemia Linfoblástica Aguda o CALLA).<br><br>Perla ENARM: Cuadro 1. Sistema MIC. Leucemia Aguda Linfoblástica: LAL Común -> Marcador inmunológico: CD10 (+), CD19 (+).<br><br>Análisis de Distractores: B) La expresión de CD13 o CD33 es la huella de la diferenciación granular granulocítica, definiendo a las Leucemias Agudas Mieloides (LAM), no a las linfoides. C) La negatividad al CD19 descartaría el linaje B primario. La TdT suele ser positiva en casi todas las linfoblásticas inmaduras. D) El antígeno CD2 (junto con el CD7) delimita de forma exclusiva a las neoplasias originadas en el timo, dictaminando la Leucemia Linfoblástica Aguda de estirpe T.",

    {
        id: 163,
        question: "Durante la estadificación clínica prequirúrgica del cáncer cervicouterino (sistema FIGO/TNM), se documenta mediante exploración que el tumor se ha extendido hasta fijarse en la pared pélvica lateral. ¿Qué estadio clínico patológico se establece automáticamente con este hallazgo?",
        options: ["Estadio IIa", "Estadio Ib2", "Estadio IVa", "Estadio IIIb"],

        justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el avance local de la neoplasia rige la transición de la cirugía radical a la radioterapia. La parametritis tumoral que logra penetrar y anclarse densamente a las estructuras osteomusculares limítrofes pélvicas, o que en su avance obstruye el uréter causando hidronefrosis, define irremediablemente la categoría T3b, correlacionada clínicamente con el Estadio IIIb.<br><br>Perla ENARM: Cuadro Estadificación TNM/FIGO. Estadio IIIb: El tumor se extiende a la pared pélvica y/o causa hidronefrosis o la falta de funcionamiento de un riñón (T3b).<br><br>Análisis de Distractores: A) El Estadio IIa implica involucramiento del tercio superior de la vagina, pero sin extensión ni invasión a los parametrios laterales. B) El Estadio Ib2 describe una masa tumoral macroscópica mayor a 4 cm pero que permanece estrictamente confinada al cérvix anatómico uterino. C) El Estadio IVa se asigna exclusivamente cuando el tumor perfora hacia la mucosa de órganos huecos adyacentes como la vejiga anterior o el recto posterior.",
        source: "IMSS-333-09 RR, Cáncer Cervicouterino, 2009, Anexos, Cuadro TNM, Página 27."

        id: 164,
        question: "Ante un paciente cursando con un Infarto Agudo de Miocardio con elevación del ST (IAMCEST) que se presenta en una clínica sin acceso a angioplastia primaria, se decide iniciar terapia fibrinolítica intravenosa con Estreptoquinasa. ¿Cuál es la dosificación total y esquema de infusión protocolizado?",
        options: ["15 miligramos en bolo único directo", "1.5 millones de unidades administradas durante 30 a 60 minutos", "75 mg/kg infundidos a lo largo de 12 horas", "100 miligramos en infusión escalonada de 90 minutos"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio (IAMCEST), la elección del trombolítico en ausencia de hemodinamia depende de la disponibilidad. Si se opta por el activador del plasminógeno bacteriano clásico (Estreptoquinasa), su posología biológica exige una infusión diluida no rápida (para evitar hipotensión profunda o anafilaxia) de \"1.5 millones de unidades durante 30-60 minutos\".<br><br>Perla ENARM: Cuadro 9. Esquemas terapéuticos fibrinolíticos. Estreptoquinasa: Dosis 1.5 millones de unidades, durante 30-60 minutos.<br><br>Análisis de Distractores: A) Los 15 mg administrados en bolo único o rápido equivalen a la posología de inicio acelerado recomendada para los análogos recombinantes como el Tenecteplase o el bolo inicial del Alteplase. C) Distractor numérico sin fundamento en los regímenes trombolíticos cardíacos (el manejo hemostático en infarto se mide en minutos agudos, no en infusiones lentas de 12 horas). D) La dosis fraccionada de \"hasta 100 mg en 90 minutos\" conforma el esquema dorado peso-dependiente para el fármaco Alteplase (rt-PA).",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Anexos, Cuadro 9, Página 31."

    {
        id: 165,
        question: "Durante el abordaje inicial de la disfunción vesical en la mujer, ¿qué característica clínica distingue específicamente a la incontinencia urinaria clasificada como \"Mixta\"?",
        options: ["Fugas desencadenadas por neuropatía diabética subyacente", "Pérdida de orina de igual forma con actividad física que con urgencia urinaria", "Goteo continuo en reposo absoluto secundario a rebosamiento", "Fugas asociadas primordialmente a fístulas vesicovaginales"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Valoración Geriátrica Integral, los fenotipos de incontinencia orientan el tratamiento pélvico. La tipificación distingue entre el fracaso del esfínter mecánico y la hiperactividad del detrusor. Si la paciente relata episodios equitativos donde el escape sucede tanto al reír, toser o saltar (esfuerzo), como también al percibir un deseo miccional súbito incontrolable antes de llegar al sanitario (urgencia), se encuadra en el diagnóstico dual simétrico de incontinencia.<br><br>Perla ENARM: Cuadro Tipo de Incontinencia. Mixta -> De igual forma con actividad física que con urgencia urinaria.<br><br>Análisis de Distractores: A y C) El goteo paradójico por retención crónica vesical e insensibilidad neural (vejiga neurogénica por neuropatía) se clasifica como incontinencia por rebosamiento, no mixta. D) Las fugas por orificios aberrantes postquirúrgicos o radiación corresponden a incontinencia extrauretral o de causa estructural urológica continua.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral, 2018, Anexos, Cuadro de Incontinencia, Página 25."
    },
    {

        question: "Al evaluar la indemnidad del nervio facial en un paciente con diagnóstico de Parálisis de Bell, ¿qué músculo cutáneo de la mímica se evalúa funcionalmente cuando el médico emite la orden específica de \"Cerrar los ojos\"?",

        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Parálisis Facial Periférica, el mapeo motor del VII par craneal se realiza solicitando gesticulaciones que contraigan vientres musculares individuales. El colapso del \"orbicular de los párpados\" (inervado por la rama temporofacial) es el responsable del defecto palpebral y del riesgo de ceguera por úlcera corneal expositiva en esta patología.<br><br>Perla ENARM: Exploración facial motora: Acción: Cerrar los ojos -> Músculo evaluado: 17. Orbicular de los párpados.<br><br>Análisis de Distractores: A) El superciliar se explora pidiendo al paciente que frunza el ceño. B) El risorio (rama cervicofacial) se valora solicitando una sonrisa amplia dirigiendo las comisuras hacia afuera. C) El elevador del párpado superior es el antagonista apertor del ojo, pero su inervación depende biológicamente del III par craneal (Oculomotor), por lo que se mantiene preservado o intacto durante una parálisis pura de Bell periférica.",

    {
        id: 167,
        question: "En el protocolo de escrutinio oncológico y geriátrico de soporte psicológico, se decide aplicar el \"Cuestionario de Depresión de Beck\" (Beck Depression Inventory). ¿Cuál es la cantidad exacta de planteamientos clínicos (ítems) que integran este instrumento en su formato validado y estipulado?",
        options: ["10 planteamientos", "21 planteamientos", "15 planteamientos", "30 planteamientos"],
