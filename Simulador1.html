        id: 206,
        question: "Durante la evaluación del balance de tronco en un paciente adulto en rehabilitación tras un evento vascular cerebral, se aplica la herramienta \"Trunk Impairment Scale\" (TIS). En la subescala de \"Equilibrio estático en sedestación\", ¿qué acción debe realizar el paciente para obtener la máxima puntuación (3 puntos) en el reactivo número 3?",
        options: ["Mantener la posición de sentado por 10 segundos sin apoyo de brazos", "Cruzar la pierna parética sobre la pierna sana con apoyo de manos", "Tocar la cama con el codo hemipléjico y retornar a la posición inicial", "Cruzar las piernas sin desplazamiento del tronco ni asistencia de las manos"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación Post-EVC, la escala TIS cuantifica la asimetría del eje axial. En el ítem de equilibrio estático final, se solicita al paciente \"cruzar la pierna no afectada sobre la pierna hemipléjica\". El puntaje supremo validado (3 puntos) se otorga exclusivamente si el paciente logra el cruce isométrico \"sin desplazamiento del tronco ni asistencia (Patient crosses the legs without trunk displacement or assistance)\". Si el tronco se desplaza más de 10 cm hacia atrás, el puntaje decae a 2.<br><br>Perla ENARM: Trunk Impairment Scale (TIS). Static sitting balance: Patient crosses the legs without trunk displacement or assistance -> 3 points.<br><br>Análisis de Distractores: A) Mantener la postura inicial por 10 segundos conforma el reactivo 1 de la escala, otorgando solo 2 puntos de entrada. B) Cruzar la pierna hemipléjica sobre la sana con asistencia manual (\"assists crossing with the hand\") penaliza la calificación otorgando 2 puntos. C) Tocar la cama con el codo evalúa el \"Equilibrio dinámico en sedestación\" mediante el acortamiento y alargamiento muscular, constituyendo un rubro funcional distinto en la escala TIS.",
        source: "DIF-331-21 RR, Rehabilitación Integral Post-EVC, 2021, Anexos, Figura 7, Página 34."
    },

        question: "En un paciente con cáncer de próstata avanzado sometido a Terapia de Privación Androgénica (ADT), el oncólogo debe monitorizar complicaciones metabólicas inducidas por la castración química. ¿Cuál es la alteración bioquímica directa sobre la sensibilidad a la insulina reportada como efecto adverso en la GPC?",
        options: ["Incremento de la sensibilidad a la insulina y episodios de hipoglucemia", "Disminución de la insulina plasmática en ayunas por falla de células beta", "Incremento en la insulina plasmática en ayunas y decremento en la sensibilidad a la insulina", "Supresión total de la producción pancreática con diabetes tipo 1 secundaria"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, la supresión crónica de testosterona modifica drásticamente la composición grasa subcutánea y altera los receptores periféricos. El Cuadro 11 alerta sobre los factores de riesgo cardiacos inducidos por ADT, especificando que en el rubro de sensibilidad a la insulina se presenta un \"Incremento en la insulina plasmática en ayunas y decremento en la sensibilidad a la insulina\", lo que predispone a síndrome metabólico yatrogénico y un pequeño incremento en la hemoglobina glucosilada.<br><br>Perla ENARM: Cuadro 11. Efectos de la terapia de privación androgénica: Sensibilidad a la insulina -> Incremento en la insulina plasmática en ayunas y decremento en la sensibilidad a la insulina.<br><br>Análisis de Distractores: A) La deprivación androgénica induce un estado adipogénico y resistencia insulínica (tipo DM2), no un estado hiper-sensible hipoglucémico. B y D) El bloqueo hormonal gonadal no destruye ni atrofia directamente a los islotes pancreáticos de las células beta; al contrario, estas cursan con hiperinsulinismo compensatorio reaccionario frente a la resistencia periférica impuesta por la redistribución lipídica celular.",
        source: "IMSS-140-18 RR, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Anexos, Cuadro 11, Página 20."

        question: "Al implementar el programa de Manejo Hemático del Paciente (PBM) en la Unidad de Cuidados Intensivos, se atiende a un \"Enfermo crítico\" con disfunción orgánica múltiple que cursa con hemorragia activa difusa. ¿Qué cifra de recuento plaquetario dictamina que la transfusión de plaquetas es \"apropiada\" en este contexto?",
        options: ["Mayor de 50 x 10^3/µL", "Menor de 20 x 10^3/µL", "Entre 20 y 50 x 10^3/µL", "Mayor de 100 x 10^3/µL"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Programa de Optimización de la Sangre (PBM), las metas de transfusión plaquetaria son conservadoras para evitar injuria inflamatoria pulmonar (TRALI). La matriz transfusional estipula para el grupo específico \"Enfermo crítico\" en situación de hemorragia activa, que la indicación es categóricamente \"La transfusión es apropiada\" única y exclusivamente cuando el conteo se precipita a niveles \"Menor de 20 x 10^3\".<br><br>Perla ENARM: Cuadro Transfusión de Plaquetas en Hemorragia Activa. Enfermo crítico: < 20 x 10^3 -> La transfusión es apropiada.<br><br>Análisis de Distractores: A, C y D) Para el enfermo crítico sangrante con conteos entre 20 a 50 x 10^3, la transfusión \"puede ser apropiada\" (zona amarilla dudosa) dependiendo de pruebas viscoelásticas o disfunción plaquetaria. En recuentos mayores a 50 x 10^3, la transfusión es explícitamente \"Inapropiada e innecesaria\" si no hay disfunción celular confirmada de base.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Anexos, Cuadro de Plaquetas, Página 97."

        question: "Durante la rehabilitación temprana intrahospitalaria de un paciente postoperado por artroplastia total de rodilla, ¿cuál es el ejercicio de contracción muscular específico y estandarizado que debe iniciar obligatoriamente el primer día después de la cirugía en cama?",
        options: ["Ejercicios isométricos colocando una toalla doblada debajo del tobillo y empujando la rodilla hacia abajo", "Flexión pasiva de la rodilla más allá de los 90 grados apoyada por el fisioterapeuta", "Bipedestación con descarga total de peso utilizando muletas axilares estáticas", "Ejercicios isotónicos contra resistencia elástica en abducción de cadera"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Artroplastia Total de Rodilla, el movimiento precoz previene el tromboembolismo y despierta el cuádriceps inhibido por dolor. El \"Cuadro III. Recomendaciones para la Movilización Postoperatoria\" indica tajantemente: \"1.- El primer día después de la cirugía, el paciente deberá realizar ejercicios isométricos colocándose una toalla doblada debajo del tobillo y tratando de tocar la cama con la parte posterior de la rodilla\". Esto co-contrae el aparato extensor sin someter el implante a estrés angular de fricción prematura.<br><br>Perla ENARM: Movilización Postoperatoria Día 1: Ejercicios isométricos colocándose una toalla doblada debajo del tobillo y tratando de tocar la cama con la rodilla.<br><br>Análisis de Distractores: B) La flexión de rodilla a tolerancia apoyado al borde de la cama está protocolizada e indicada hasta el \"segundo día\" postoperatorio. C) La verticalización y marcha en descarga controlada con auxiliares inicia posteriormente tras dominar el balance en sedestación, no en las primeras 24 horas encamado. D) Ejercicios dinámicos isotónicos con ligas o pesos están contraindicados en la etapa aguda inflamatoria por riesgo de rotura de la sutura capsular.",

        id: 210,
        question: "Al estratificar el riesgo tromboembólico en un paciente adulto mayor portador de fibrilación auricular no valvular mediante el uso de la escala CHA2DS2-VASc, ¿qué puntaje numérico se le adjudica directamente y en exclusiva por contar con 78 años de edad cronológica?",
        options: ["1 punto", "2 puntos", "3 puntos", "0 puntos"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Anticoagulación Oral, la edad avanzada es el principal predictor aislado de evento vascular cerebral embólico. La escala CHA2DS2-VASc estratifica la edad en dos peldaños biológicos críticos. Los pacientes entre 65 y 74 años reciben 1 punto. Sin embargo, los individuos que alcanzan y se ubican en el rango de \"Edad ≥ 75 años\", reciben de manera ineludible y categórica \"2 puntos\" puros de penalización matemática en la herramienta por su alto riesgo intrínseco degenerativo tisular.<br><br>Perla ENARM: Escala CHA2DS2-VASc: A: Edad ≥ 75 años -> Puntaje: 2.<br><br>Análisis de Distractores: A) 1 punto es la carga asignada a factores menores o a la banda etaria precedente más joven (Edad entre 65 y 74 años). C) 3 puntos no existe como adjudicación unitaria para ningún rubro singular dentro de la puntuación clásica máxima sumaria de la escala CHA2DS2-VASc (cuyo ítem de mayor peso individual vale 2). D) 0 puntos se asigna a individuos jóvenes sanos menores de 65 años sin factores de riesgo adicionales cardiovasculares.",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Anexos, Escala CHA2DS2-VASc, Página 78."
    },

        question: "En la exploración neurológica estructurada de un paciente que debuta con asimetría facial secundaria a Parálisis de Bell unilateral, ¿cuál es el movimiento gesticular estricto que el médico debe solicitar para evaluar específicamente la función aislada del músculo Risorio?",
        options: ["Apretar los dientes y morder lo más fuerte posible", "Fruncir el ceño y arrugar la frente simétricamente", "Sonrisa amplia dirigiendo la comisura labial hacia afuera y atrás", "Silbar y proyectar los labios cerrados hacia adelante fuertemente"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Parálisis de Bell en el Adulto, el topodiagnóstico de la paresia facial exige órdenes anatómicas selectivas. El manual de Exploración Facial Motora enlista la asociación precisa entre el movimiento y su efector. Para evaluar la preservación de la rama cigomático-bucal responsable del \"Músculo Risorio\" (músculo 9 de la escala), se debe ordenar semiológicamente al paciente: \"Sonrisa amplia dirigiendo la comisura labial hacia afuera y atrás\".<br><br>Perla ENARM: Exploración facial motora. Acción ordenada: Sonrisa amplia dirigiendo la comisura labial hacia afuera y atrás -> Músculo evaluado: 9. Risorio.<br><br>Análisis de Distractores: A) Apretar los dientes evoca la contracción del cutáneo del cuello (platisma) y el músculo triangular de los labios simultáneamente. B) Arrugar la frente evalúa exclusivamente la indemnidad de las ramas temporales superiores que inervan al vientre frontal del músculo occipitofrontal y superciliares. D) Proyectar o fruncir los labios como para dar un beso estimula de forma aislada al músculo orbicular de los labios.",

    {
        id: 212,
        question: "Durante la estadificación patológica posquirúrgica de una pieza de histerectomía en una paciente con cáncer cervicouterino, el reporte documenta una lesión macroscópica visible confinada estrictamente al cérvix uterino sin involucrar otras estructuras, cuya medición máxima es de 5.5 centímetros. De acuerdo a la clasificación FIGO/TNM vigente en la guía, ¿qué estadio clínico patológico se establece automáticamente?",
        options: ["Estadio Ia1", "Estadio Ib1", "Estadio IIa", "Estadio Ib2"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cáncer Cervicouterino, el Estadio I representa una enfermedad estrictamente confinada al cuello del útero. El subgrupo \"Ib\" denota lesiones clínicamente visibles o mayores que los tumores microinvasores. La directriz anatómica subdivide este grupo por su volumen de masa tumoral: el Estadio Ib1 corresponde a lesiones ≤ 4 cm, mientras que cualquier lesión macroscópica cervical que rebase dicha frontera (\"Lesión clínicamente visible mayor a 4 cm\") se clasifica inamoviblemente como \"Estadio Ib2\" (T1b2 en TNM).<br><br>Perla ENARM: Cuadro Estadificación FIGO: Estadio Ib2 -> Lesión clínicamente visible mayor a 4 cm confinada al cérvix.<br><br>Análisis de Distractores: A) El Estadio Ia1 obedece a un diagnóstico microscópico puro (invasión estromal menor de 3 mm de profundidad y 7 mm de extensión), no a masas fungosas macroscópicas. B) El Estadio Ib1 agrupa a tumores exofíticos clínicamente visibles pero con la restricción de medir 4 centímetros o menos en su eje mayor. C) El Estadio IIa implica el salto biológico tumoral más allá del útero hacia el tercio superior de la vagina, el cual no está documentado en la pieza quirúrgica descrita.",
        source: "IMSS-333-09 RR, Diagnóstico y Tratamiento del Cáncer Cervicouterino, 2009, Anexos, Cuadro TNM, Página 33."

    {
        id: 213,
        question: "En la estratificación integral de severidad y supervivencia de un paciente con Enfermedad Pulmonar Obstructiva Crónica (EPOC), se calcula el \"Índice BODEx\". ¿Cuál es el punto de corte fisiológico para el rubro de Índice de Masa Corporal (IMC) que castiga al paciente otorgándole 1 punto de riesgo estadístico de mortalidad?",
        options: ["Índice de masa corporal menor a 21 kg/m²", "Índice de masa corporal mayor a 30 kg/m²", "Índice de masa corporal entre 25 y 29 kg/m²", "Índice de masa corporal mayor a 35 kg/m²"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención y Diagnóstico de EPOC, la caquexia y el hipermetabolismo ventilatorio son marcadores ominosos de declive biológico terminal en la enfermedad obstructiva. A diferencia de la población sana donde la obesidad es el riesgo, en EPOC el desgaste magro es deletéreo. El \"Índice BODEx\" (IMC, Obstrucción, Disnea, Exacerbaciones) decreta que un Índice de Masa Corporal \"menor a 21 kg/m²\" se asocia a alta morbimortalidad, sumando matemáticamente \"1 punto\" directo a la escala de severidad. Un IMC >21 confiere \"0 puntos\" (factor protector de reserva calórica pulmonar).<br><br>Perla ENARM: Cuadro 6. Índice BODEx: Marcador B (IMC kg/m2): >21 = 0 puntos; <21 = 1 punto.<br><br>Análisis de Distractores: B, C y D) La obesidad y el sobrepeso (IMC >25 o >30), si bien incrementan el riesgo cardiovascular genérico, en las tablas específicas de estadificación pulmonar (BODE/BODEx) actúan fisiológicamente como una reserva energética basal que retrasa la consunción del diafragma, por lo que no se castigan numéricamente en este índice pronóstico ventilatorio puro.",
        source: "IMSS-037-21 RR, Prevención y Diagnóstico de EPOC, 2021, Anexos, Cuadro 6, Página 16."
    },
    {
        id: 214,
        question: "Durante la consulta geriátrica de una persona adulta mayor con diabetes mellitus tipo 2, el médico aplica la \"Escala FRAIL\" para escrutar el fenotipo biológico de fragilidad temprana. ¿Qué parámetro clínico o pregunta específica es evaluada obligatoriamente en el rubro \"R\" (Resistencia) del acrónimo de la prueba?",
        options: ["Reducción franca de la fuerza en la mano dominada por sarcopenia", "Incapacidad o dificultad subjetiva referida para subir un tramo de escaleras", "Riesgo aumentado de caídas por inestabilidad ortostática de repetición", "Reducción en la velocidad para caminar o recorrer una cuadra completa"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Diabetes Mellitus 2 en la Persona Adulta Mayor, el escrutinio geriátrico incluye cinco reactivos dicotómicos que componen el acrónimo FRAIL (Fatiga, Resistencia, Aeróbica, Illness/Enfermedades, Pérdida de peso/Loss). La letra \"R\" evalúa la potencia explosiva antigravitacional cuádriceps de tren inferior, dictaminada estrictamente mediante la interrogante de \"Resistencia: Incapacidad para subir un tramo de escaleras\". La confirmación afirmativa suma 1 punto hacia la postración senil y alto riesgo metabólico.<br><br>Perla ENARM: Cuadro 11. Escala FRAIL, para el fenotipo de fragilidad: R. Resistencia. Incapacidad para subir un tramo de escaleras.<br><br>Análisis de Distractores: A) La medición cuantitativa dinamométrica de la disminución de fuerza de prensión palmar conforma un criterio analítico técnico del fenotipo riguroso de Fried, ausente en el cuestionario subjetivo FRAIL. C) El escrutinio y testeo del miedo a caer o inestabilidad ortostática corresponden a escalas neurológicas primarias de equilibrio como Tinetti o Berg, no codificados en las cinco letras de FRAIL. D) La incapacidad referida claudicante cardiovascular o falta de aire para \"Caminar una cuadra completa en llano\" se explora e interroga inmediatamente en la siguiente letra continua del acrónimo, la \"A\" (Capacidad Aeróbica).",
        source: "IMSS-657-21 RR, Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Cuadro 11, Página 22."
    },
    {
        id: 215,
        question: "Tras la estabilización aguda de un adulto sometido a una amputación de extremidad inferior en el servicio de ortopedia, el equipo multidisciplinario formula un plan de acondicionamiento cardiopulmonar y protésico. Para garantizar adaptaciones funcionales reales de fuerza muscular y marcha estable, ¿cuál es la duración temporal mínima establecida por la guía para prescribir este programa de ejercicios específicos?",
        options: ["Al menos 16 semanas", "Al menos 4 semanas", "Al menos 8 semanas", "Al menos 12 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación Interdisciplinaria en Amputación, el reacondicionamiento metabólico de un amputado requiere consolidar la adaptación de nuevas cadenas propioceptivas motoras y el aumento del gasto energético periférico. La \"Recomendación\" (Grado B) dicta imperativamente a los servicios: \"Se recomienda establecer un programa de ejercicios específicos de al menos 8 semanas, que incluya cinco componentes: 1) resistencia cardiopulmonar, 2) fortalecimiento de tronco, 3) equilibrio, 4) control de postura, y 5) entrenamiento de marcha protésica\". Periodos menores resultan insuficientes para inducir hipertrofia y neuro-adaptación permanente segura.<br><br>Perla ENARM: Se recomienda establecer un programa de ejercicios específicos de al menos 8 semanas que incluya los cinco componentes funcionales de rehabilitación.<br><br>Análisis de Distractores: A y D) Prescribir esquemas rígidos forzosos pre-aprobados de 12 o 16 semanas encarece inútilmente el costo asilar hospitalario o de las unidades de terapia y satura los servicios, postergando la reintegración comunitaria y laboral activa temprana deseada. B) Programas cortos o intensivos precipitados de 4 semanas fracasan estrepitosamente en generar readaptación estructural ósea al socket protésico, conduciendo a caídas e intolerancia cutánea isquémica al encaje mecánico de la pierna biónica.",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputación de Miembro Inferior, 2021, Intervenciones Terapéuticas, Página 12."
    },
    {
        id: 216,
        question: "Al evaluar la indemnidad neuromotora en un infante sano durante la consulta de medicina preventiva infantil, ¿cuál es la edad biológica normalizada en los hitos del desarrollo mexicano en que el lactante debe lograr la destreza propulsiva ventral clasificada como \"Se desplaza arrastrándose sobre el abdomen\"?",
        options: ["A los 5 meses", "A los 10 meses", "A los 9 meses", "A los 7 meses"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Detección de Alteraciones del Neurodesarrollo y Estimulación Temprana, la cinemática preparatoria para el gateo requiere el dominio progresivo del peso en decúbito. El \"Cuadro de Hitos Motores\" evalúa y estratifica mensualmente la movilidad: A los 6 meses el infante se incorpora pasivamente apoyándose en las manos. La barrera neurológica de la primera tracción independiente y desplazamiento reptante en piso liso descrita rigurosamente como: \"Gateo: Se desplaza arrastrándose sobre el abdomen\" tiene su margen de ejecución óptima fisiológica y normal \"a los 7 meses\" cronológicos de vida.<br><br>Perla ENARM: Cuadro Hitos Motores. Gateo: Se desplaza arrastrándose sobre el abdomen -> (normal a los 7 m).<br><br>Análisis de Distractores: A) A los 5 meses la columna dorsal es inmadura para la tracción escapular simultánea de peso, logrando apenas iniciar el hito estático de \"voltearse de supino a prono\". B y C) Edades tardías como 9 o 10 meses marcan de forma estricta el inicio de hitos superiores de verticalización y bipedestación paralela, o la posición obligada de \"gateo maduro de cuatro puntos (manos y rodillas)\". Carecer de arrastre simple ventral a esta edad conforma una bandera roja severa de letargo motor espinal central.",
        source: "DIF-332-18 RR, Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Cuadro de Hitos, Página 11."
    },
    {
        id: 217,
        question: "Durante el escrutinio de sufrimiento y morbilidad psíquica en un paciente adulto en fase terminal adscrito a cuidados paliativos empleando el \"Cuestionario de Depresión de Beck\" (BDI), el médico le pide que responda al enunciado número 18, enfocado fisiológicamente a los hábitos alimenticios. Para que la herramienta otorgue la máxima severidad (3 puntos) en dicho ítem somático anoréxico, ¿qué respuesta debe marcar obligatoriamente el paciente?",
        options: ["Ya no tengo apetito", "Mi apetito está mucho peor ahora", "Mi apetito no es tan bueno como solía ser", "Mi apetito no es peor que de costumbre"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cuidados Paliativos, el Cuestionario de Beck gradúa el declive del paciente oncológico progresivamente en cada pregunta (0 a 3). La consunción caquéctica total terminal anula el centro hipotalámico del hambre. El Ítem 18 escala la anorexia desde el apetito conservado (a), la reducción moderada (b), y la aversión grave (c), posicionando en su extremo \"d\" (el mayor nivel aflictivo del componente vegetativo) la sentencia biológica catastrófica: \"Ya no tengo apetito\".<br><br>Perla ENARM: Cuestionario de Depresión de Beck. Pregunta 18. a) Mi apetito no es peor que de costumbre. b) Mi apetito no es tan bueno como solía ser. c) Mi apetito esta mucho peor ahora. d) Ya no tengo apetito.<br><br>Análisis de Distractores: B) La respuesta \"Mi apetito está mucho peor ahora\" es de severidad intermedia-alta (2 puntos), indicando la ingesta dolorosa forzada pero sin la pérdida o abolición del reflejo central digestivo completo total. C) \"Mi apetito no es tan bueno como solía ser\" (1 punto) revela apenas el inicio orgánico clínico del declive y letargo sutil incipiente tumoral citocínico de anorexia y llenado precoz. D) La aseveración \"Mi apetito no es peor\" confiere 0 puntos de riesgo, documentando indemnidad calórica biológica homeostática intacta frente al proceso.",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Anexos, Cuestionario de Beck, Página 61."
    },
    {
        id: 218,
        question: "Al evaluar mediante ecocardiografía a un paciente adulto cursando con insuficiencia cardiaca secundaria a estenosis mitral reumática, se calcula el índice morfológico de Wilkins para decidir la factibilidad de una comisurotomía percutánea. En la categoría \"Engrosamiento subvalvular\", ¿qué hallazgo anatómico decreta automáticamente el Grado 4 (Severo) y predice mal resultado quirúrgico?",
        options: ["Engrosamiento confinado estrictamente al tercio distal de las cuerdas", "Engrosamiento extenso y acortamiento de todas las cuerdas que se extiende hasta el músculo papilar", "Fusión fibrótica mínima y exclusiva de las estructuras subvalvulares inmediatamente debajo del anillo", "Engrosamiento grueso que afecta únicamente un tercio de la longitud global de las cuerdas tendinosas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Patología de la Válvula Mitral, la rigidez del aparato valvular y subvalvular dicta si la válvula se romperá útilmente con el balón percutáneo o requerirá prótesis abierta. El score valora la esclerosis fibrótica retrógrada descendente en la categoría \"Engrosamiento subvalvular\". El último escalón, Grado 4, describe la anquilosis total letal de tracción en bloque del complejo y se certifica ante la presencia ecocardiográfica ineludible de \"Engrosamiento extenso y acortamiento de todas las cuerdas que se extiende hasta el músculo papilar\".<br><br>Perla ENARM: Score de Válvula Mitral. Engrosamiento subvalvular Grado 4: Engrosamiento extenso y acortamiento de todas las cuerdas que se extiende hasta el músculo papilar.<br><br>Análisis de Distractores: A) Cuando el engrosamiento reumático fibroso se extiende y alcanza el \"tercio distal de las cuerdas\", se clasifica morfológicamente en la tabla un peldaño por debajo, conformando el Grado 3 de severidad anatómica de la GPC. C) Un daño leve caracterizado únicamente por \"engrosamiento mínimo inmediatamente debajo de la válvula\" dicta la etapa más incipiente, leve e inicial del proceso cicatricial fibroblástico degenerativo subvalvular, el Grado 1. D) Si el eco documenta alteración descendente que engrosa y calcifica el aparato pero solo \"hasta un tercio de longitud de las cuerdas\", se otorga ecográficamente el Grado 2 de la escala.",
        source: "IMSS-235-09 RR, Diagnóstico y Tratamiento de la Patología de la Válvula Mitral, 2009, Anexos, Página 32."
    },
    {
        id: 219,
        question: "Durante el abordaje preventivo en el primer nivel de atención, el médico emplea la calculadora validada FRAX (Fracture Risk Assessment Tool) para estimar la probabilidad de que una mujer postmenopáusica sufra una fractura por fragilidad en 10 años. Según la regla operativa estandarizada para cruzar los ejes (Edad vs IMC vs Puntaje) en los cuadros de la guía mexicana, si tras interrogar los factores de riesgo clínico la paciente suma matemáticamente un total bruto de 7 puntos, ¿qué valor compensatorio numérico se debe utilizar de manera obligatoria para ingresar al tabulador de riesgo?",
        options: ["Deberá ser considerado igual y tope límite a 5 puntos", "Deberá descartarse el cuestionario por invalidez clínica", "Será considerado y ajustado como igual a 6 puntos", "Conservará intacto su valor original de 7 puntos en la abscisa"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y Tratamiento de la Osteoporosis, el tamizaje masivo probabilístico FRAX condensa riesgos dicotómicos. Las tablas nacionales (Cuadro 5B) precalculadas no proyectan ejes infinitos de riesgo ni cruces por encima del sexto nivel sumatorio aditivo. La nota de interpretación metodológica y clínica indica de manera estricta y restrictiva al médico familiar: \"Sume la totalidad de los puntos y compare... En caso de obtener 7 puntos, será considerado igual a 6, para la comparación en la tabla\". Esta regla previene errores de sobresaturación matemática algorítmica al ingresar al gráfico termométrico.<br><br>Perla ENARM: Cuestionario FRAX y Tablas de Riesgo: Resultado: En caso de obtener 7 puntos, será considerado igual a 6, para la comparación en la tabla.<br><br>Análisis de Distractores: A, B y D) Degradarlo irracionalmente a 5 puntos, omitir la prueba, o intentar forzar la lectura abstracta inexistente en gráficas mexicanas con \"7 puntos brutos\" incumple flagrantemente la instrucción metodológica impresa y documentada en los recuadros anexos, la cual obliga e instruye explícitamente a topar y emparejar estadísticamente el riesgo masivo final crudo de siete al límite precalculado máximo estandarizado tabular clínico real de \"seis\".",
        source: "IMSS-673-18 RR, Prevención y Tratamiento de la Osteoporosis, 2018, Anexos, Cuestionario FRAX, Página 76."
    },
    {
        id: 220,
        question: "En la consulta hematológica se programa a un paciente diagnosticado con la Enfermedad de Von Willebrand subtipo 2A para un procedimiento quirúrgico menor electivo (extracción dental simple). Considerando que el paciente posee antecedentes de una buena respuesta en las pruebas de reto farmacológico, ¿cuál es el agente hemostático profiláctico inicial de primera línea para garantizar la coagulación sin uso de derivados plasmáticos?",
        options: ["Infusión rápida de ácido tranexámico de forma intraoperatoria", "Concentrados recombinantes de FVIII aislados de alta pureza", "Transfusión dirigida de una unidad de crioprecipitado congelado", "Administración de desmopresina endovenosa o intranasal (DDAVP)"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de Hemofilia, los subtipos cualitativos de la Enfermedad de Von Willebrand (tipo 1, 2A, 2M, 2N) que cursan con hemorragias leves o son sometidos a cirugía menor conservan reservas intracelulares funcionales de factor útiles para cohibir el sangrado. El algoritmo terapéutico prequirúrgico dictamina incondicionalmente el uso profiláctico del agonista de liberación de los depósitos endoteliales del cuerpo, prescribiendo en primera línea la \"DDAVP (confirmando que sí responden y dependiendo del tiempo que se requiere para cicatrización)\". Esto previene de forma segura y eficaz la hemorragia limitando la exposición patógena evitable a transfusiones o donadores extraños en procedimientos exiguos asépticos estomatológicos.<br><br>Perla ENARM: Algoritmo de Terapéutica. Hemorragias leves/cirugía menor en Enfermedad de Von Willebrand 1, 2A, 2M, 2N -> Primera línea: DDAVP (confirmando que sí responden).<br><br>Análisis de Distractores: A) Los antifibrinolíticos tópicos de contacto local actúan como excelente barrera coadyuvante sobre mucosas friables cavitarias tras cirugías dentarias, pero carecen intrínsecamente del factor de puente primario tisular vascular central hemostático capaz de frenar el sangrado del árbol capilar interno subyacente. B y C) La escalada invasiva biológica hacia hemoderivados masivos purificados de sangre humana exógena (Concentrados CFC-FVIII/FVW o el temido plasma crudo en crioprecipitados virales) en cirugías odontológicas bucales leves o periféricas contraviene francamente las directrices del programa internacional PBM, reservándose estrictamente de manera exclusiva para aquellos pacientes no respondedores refractarios a la desmopresina sintética o en la letal carencia absoluta total del Tipo 3.",
        source: "IMSS-408-10 RR, Diagnóstico y Tratamiento de Hemofilia (y Von Willebrand), 2010, Algoritmos, Página 54."
    },
    {
        id: 221,
        question: "De acuerdo a la Cuarta Definición Universal estandarizada en cardiología, ¿cuál es el criterio bioquímico y estructural que define de forma exclusiva al Infarto Agudo de Miocardio clasificado como \"Tipo 5\"?",
        options: ["Elevación de troponinas mayor a 5 veces el percentil 99 con alteración de la motilidad", "Isquemia por desequilibrio en el aporte secundario a espasmo coronario", "Elevación de troponinas mayor a 10 veces el percentil 99 relacionado a cirugía de derivación", "Trombosis del stent confirmada angiográficamente en paciente pos-angioplastia"],
        answer: 2,
        justification: "Justificación: La reclasificación universal del infarto orienta su abordaje fisiopatológico. De acuerdo a la GPC de Infarto Agudo de Miocardio, el \"Tipo 5\" engloba el daño miocárdico yatrogénico masivo perioperatorio. Su definición es rígida y exige que esté \"Relacionado con cirugía de derivación arterial coronaria (CABG)\". Para confirmarlo en pacientes con valores basales normales, se requiere documentar obligatoriamente una \"Elevación de las troponinas >10 veces por arriba del percentil 99\", sumado a nuevas ondas Q o nueva oclusión del injerto.<br><br>Perla ENARM: Cuadro de Definición Universal. Tipo 5: Relacionado con cirugía de derivación arterial coronaria. Elevación de las troponinas >10 veces por arriba del percentil 99... y nuevas ondas Q o nueva oclusión documentada.<br><br>Análisis de Distractores: A) Un pico enzimático de troponinas >5 veces el límite superior define de manera protocolizada al Infarto Tipo 4a (relacionado con intervención coronaria percutánea inicial), no a la cirugía de derivación abierta. B) El espasmo coronario o la anemia aguda que rompen la relación aporte/demanda configuran el Infarto Tipo 2. D) La trombosis aguda de la endoprótesis metálica vascular confirmada en la sala de hemodinamia sella el diagnóstico estricto de Infarto Tipo 4b.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Anexos, Página 11."
    },
    {
        id: 222,
        question: "Durante el interrogatorio en la consulta de dermatología laboral, un paciente de ocupación albañil se presenta con dermatitis eccematosa crónica y fisurada en ambas manos. ¿Cuál es la pareja de metales alergenos estandarizados presentes en el cemento húmedo responsables de desencadenar esta inmunidad mediada por células?",
        options: ["Níquel y persulfatos alcalinos", "Eugenol y metacrilatos acrílicos", "Cloruro de aluminio y resinas epóxicas", "Cromados y cobalto pesados"],
        answer: 3,
        justification: "Justificación: La dermatitis de contacto profesional se rige por la exposición tópica repetitiva a haptenos específicos. De acuerdo a la GPC de Dermatitis de Contacto, el cemento es altamente alcalino e irritante, pero su componente antigénico retardado que sensibiliza a la población de trabajadores de la construcción (albañiles) está plenamente identificado en el cuadro de etiología. Se documenta ineludiblemente que las sales del \"Cemento\" transfieren e inducen reacción a través de sus trazas metálicas de \"Cromados, cobalto\".<br><br>Perla ENARM: Cuadro Dermatitis de Contacto Ocupacional: Alérgeno Cemento -> Cromados, cobalto. (Ocupación: Albañiles).<br><br>Análisis de Distractores: A) Los persulfatos, tintes oxidativos y el níquel conforman el perfil etiológico típico de alergia de contacto de los \"peinadores o peluqueros\". B) El eugenol, los plásticos de impresión y los monómeros de metacrilato son los contactantes profesionales exclusivos de \"dentistas y técnicos dentales\". C) Las resinas y maderas pulverizadas afectan primariamente a los ebanistas y carpinteros, no constituyendo la base haptenica del cemento gris fraguado.",
        source: "IMSS-560-12 RR, Dermatitis de Contacto, 2012, Anexos, Cuadro Ocupacional, Página 59."
    },
    {
        id: 223,
        question: "Al evaluar la dinámica hemostática en un paciente poli-traumatizado grave mediante tromboelastografía (ROTEM), se documenta que la amplitud de la curva en el parámetro \"LY30 o LY60 es muy largo\". ¿Cuál es el tratamiento dirigido de reanimación indicado por el algoritmo normativo?",
        options: ["Infusión rápida de ácido tranexámico", "Transfusión masiva de plaquetas de aféresis", "Administración de concentrado de complejo protrombínico", "Infusión empírica de plasma fresco congelado"],
        answer: 0,
        justification: "Justificación: El manejo dirigido por metas viscoelásticas previene la sobrecarga hídrica y la coagulopatía dilucional. De acuerdo a la GPC de Programa de Optimización de la Sangre (PBM), el \"Algoritmo 6\" evalúa las fases del coágulo en tiempo real. Si la máquina documenta que \"¿Que tan largo?\" es el coágulo y arroja un \"LY30 o LY60 muy largo\", esto \"indica demasiada lisis\" (hiperfibrinolisis fulminante). La conducta terapéutica de rescate algorítmico directa y única es neutralizar a la plasmina mediante la \"Reanimación con ácido tranexámico\".<br><br>Perla ENARM: Algoritmo 6. Elementos en tromboelastografía: ¿Que tan largo? -> LY30 o LY60 muy largo indica demasiada lisis -> Reanimación con ácido tranexámico.<br><br>Análisis de Distractores: B) La disfunción plaquetaria o depleción celular asienta su huella gráfica en el estudio generando una amplitud máxima (Ma) débil en un contexto de fibrinógeno normal, no alterando el índice lítico (LY30). C y D) El concentrado de complejo protrombínico (CCP) o el Plasma Fresco se prescriben de manera exclusiva para la fase de inicio cuando \"¿Que tan rápido?\" falla, manifestado por un tiempo de reacción (R) prolongado por déficit enzimático, no para el coágulo que se disuelve prematuramente.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 6, Página 86."
    },
    {
        id: 224,
        question: "Al realizar un ecocardiograma transtorácico en un paciente con antecedente de fiebre reumática infantil para calcular el Score de Wilkins de la válvula mitral, ¿qué grado de severidad se otorga al rubro \"Calcificación valvular\" si el reporte describe un \"Brillo que se extiende hacia la porción media de las valvas\"?",
        options: ["Grado 4", "Grado 1", "Grado 2", "Grado 3"],
        answer: 3,
        justification: "Justificación: El score de Wilkins dictamina si una válvula estenótica acartonada es apta para valvuloplastia con balón o si se desgarrará por exceso de calcio. De acuerdo a la GPC de Patología de la Válvula Mitral, la escala avanza milimétricamente hacia el centro del orificio. La calcificación se estatifica en el \"Grado 3\" de la tabla de manera rigurosa cuando existe un \"Brillo que se extiende hacia la porción media de las valvas\", denotando una calcificación invasiva que excede los bordes pero aún no es terminal ni petrifica la totalidad del tejido.<br><br>Perla ENARM: Score de Wilkins. Calcificación valvular. Grado 3: Brillo que se extiende hacia la porción media de las valvas.<br><br>Análisis de Distractores: A) El Grado 4 se reserva para el colapso calcificado absoluto y se describe como \"Brillo extenso a través de la mayor parte del tejido de la valva\", lo que suele contraindicar la dilatación percutánea. B) El Grado 1 se otorga a los estadios tempranos y leves donde solo se percibe \"Una zona aislada de aumento del brillo en el eco\". C) El Grado 2 delimita la esclerosis marginal periférica, tipificada textualmente como \"Áreas dispersas de brillo confinadas a los bordes de la valva\".",
        source: "IMSS-235-09 RR, Diagnóstico y Tratamiento de la Patología de la Válvula Mitral, 2009, Anexos, Página 28."
    },
    {
        id: 225,
        question: "En la atención obstétrica de una mujer primigesta de bajo riesgo que cursa con 6 centímetros de dilatación y dinámica uterina regular, ¿cuál de los siguientes grupos de intervenciones está clasificado explícitamente como \"Acciones no recomendadas de realizar de forma rutinaria\" en la sala de labor?",
        options: ["Canalización intravenosa, uso de oxitocina y amniotomía", "Ingesta de líquidos orales claros y deambulación", "Acompañamiento familiar continuo y postura libre", "Auscultación intermitente de la frecuencia cardiaca fetal"],
        answer: 0,
        justification: "Justificación: La medicalización excesiva del parto eutócico interrumpe la biomecánica natural y precipita cesáreas innecesarias. De acuerdo a la GPC de Vigilancia y Manejo del Trabajo de Parto, el \"Algoritmo 2. Vigilancia en sala de labor\" divide claramente las acciones amigables de las intervenciones invasivas que hoy se prohíben por sistema. En la caja de \"Acciones NO recomendadas (no realizar de forma rutinaria)\", se estipula de manera categórica la abolición del goteo preventivo o la ruptura forzada: \"Canalización intravenosa, Amniotomía, Uso de oxitocina, Uso de antiespasmódicos\".<br><br>Perla ENARM: Algoritmo 2. Sala de labor. Acciones no recomendadas de forma rutinaria: Canalización intravenosa, Amniotomía, Uso de oxitocina, Uso de antiespasmódicos.<br><br>Análisis de Distractores: B y C) La tolerancia al movimiento (\"deambulación, libre movilidad, posición deseada\") y el soporte nutricional metabólico básico (\"ingesta de líquidos, acompañamiento\") conforman las \"Acciones recomendadas\" que integran la definición central contemporánea del parto amigable y humanizado. D) La auscultación intermitente o pinard clínico (1 minuto cada 15-30 minutos poscontracción) es el método de oro no invasivo de vigilancia mandatado, evitando el estrés del monitoreo cardiotocográfico continuo atado a la cama.",
        source: "IMSS-052-19 RR, Vigilancia y Manejo del Trabajo de Parto, 2019, Algoritmo 2, Página 15."
    },
    {
        id: 226,
        question: "Tras la escisión ecoguiada de una lesión tiroidea clasificada como nódulo coloide benigno asintomático, un paciente pregunta sobre el uso de medicamentos para prevenir el crecimiento de otros nódulos. De acuerdo a la recomendación de mayor grado de la GPC, ¿cuál es la conducta terapéutica sistémica dictada?",
        options: ["Iniciar dosis titulables de metimazol para frenar la hormona estimulante", "No se recomienda utilizar terapia supresora con levotiroxina", "Indicar levotiroxina para mantener la TSH suprimida por debajo de 0.1 mUI/L", "Administrar radioyodo profiláctico a dosis ablativas bajas"],
        answer: 1,
        justification: "Justificación: Inducir un hipertiroidismo subclínico exógeno para achicar bocios coloides expone al paciente a taquiarritmias, pérdida de masa ósea y fibrilación auricular, superando el escaso beneficio reductor sobre el nódulo. De acuerdo a la GPC de Nódulo Tiroideo No Tóxico, en el apartado estricto de \"Terapia Supresora\", la guía mexicana establece como \"Recomendación Clave\" inamovible (Grado A): \"No se recomienda utilizar terapia supresora con levotiroxina\". El manejo de estas lesiones estables se basa en la vigilancia ecográfica pasiva anual.<br><br>Perla ENARM: Recomendación Clave. Terapia supresora: No se recomienda utilizar terapia supresora con levotiroxina. (Grado A).<br><br>Análisis de Distractores: A) Los antitiroideos (metimazol o propiltiouracilo) son fármacos tóxicos reservados estrictamente para cuadros de hipertiroidismo franco o enfermedad de Graves activa, careciendo de indicación en nódulos coloides eutiroideos fríos. C) Suprimir la TSH con levotiroxina constituía una práctica médica arcaica riesgosa, hoy abolida universalmente por su falta de evidencia en reducir la masa nodular y su alta tasa de eventos cardiovasculares silentes en el adulto. D) El I131 (Radioyodo) se contempla como opción en nódulos \"calientes\" hiperfuncionantes compresivos en ancianos de alto riesgo quirúrgico, no como profilaxis en adenomas coloides inactivos asintomáticos.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico, 2009, Recomendaciones Clave, Página 31."
    },
    {
        id: 227,
        question: "En el ajuste de las metas glucémicas y terapéuticas de una persona adulta mayor con diabetes mellitus, se le estratifica dentro de la categoría \"Grupo 3: Pobre estado de salud\". ¿Qué característica de dependencia o comorbilidad clasifica y exige biológicamente agrupar al paciente en este escalón de laxitud metabólica?",
        options: ["Independencia funcional para las Actividades Básicas de la Vida Diaria (ABVD)", "Presencia de 1 a 2 enfermedades crónicas sin demencia evidente", "Dependencia documentada en 2 o más Actividades Básicas de la Vida Diaria (ABVD)", "Presencia de hipertensión arterial y artrosis leve aislada"],
        answer: 2,
        justification: "Justificación: En geriatría, forzar la hemoglobina glucosilada a niveles bajos en pacientes postrados o frágiles desencadena hipoglucemias asintomáticas fatales y coma. De acuerdo a la GPC de Diabetes en Adulto Mayor, el \"Cuadro 13. Grupos de riesgo\" divide a los ancianos en tres bloques (Sano, Regular y Pobre). El \"Grupo 3 (Pobre estado de salud)\" que exige relajar las metas, engloba de manera excluyente a los enfermos terminales, con demencia de moderada a severa, con tres o más comorbilidades crónicas avanzadas, y/o que sufran de \"Dependencia en >= 2 ABVD (Actividades Básicas de la Vida Diaria)\".<br><br>Perla ENARM: Cuadro 13. Grupos de riesgo: Grupo 3: Pobre estado de salud -> Características: 3 ó más enfermedades crónicas, Demencia moderada a severa, Dependencia en >= 2 ABVD.<br><br>Análisis de Distractores: A) La \"Independencia en las ABVD\" o cursar sin comorbilidades categoriza al anciano en el \"Grupo 1: Buen estado de salud\", permitiéndole tolerar metas glucémicas estrictas casi idénticas a las de un adulto joven (HbA1c < 7.5%). B y D) Presentar un envejecimiento normal con \"1 a 2 enfermedades crónicas\" o una dependencia parcial leve que recaiga únicamente sobre las actividades instrumentales menores (<= 1 AIVD) ubica al paciente en el estrato intermedio de reserva: \"Grupo 2: Estado de Salud Regular\".",
        source: "IMSS-657-21 RR, Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Cuadro 13, Página 65."
    },
    {
        id: 228,
        question: "Durante el control de medicina preventiva en la adolescencia y adultez temprana, ¿cuál es el número total de inyecciones que la guía dicta para asegurar en forma prioritaria el \"esquema completo de vacunación\" con toxoide tetánico/diftérico (Td o TDaP) en las mujeres de 12 a 45 años de edad?",
        options: ["Una dosis única de refuerzo anual permanente", "5 dosis en su esquema global protector completo", "3 dosis iniciales sin refuerzos adicionales", "2 dosis aplicadas en el último trimestre de gestación"],
        answer: 1,
        justification: "Justificación: La erradicación del tétanos neonatal en zonas endémicas y la protección a largo plazo del adulto exigen múltiples estímulos inmunológicos anamnésicos sostenidos que consoliden la memoria de las células plasmáticas. De acuerdo a la GPC de Inmunización y Vacunación (referida transversalmente en los protocolos primarios de esquemas), la recomendación estricta y directa a los equipos de medicina preventiva decreta: \"Se aconseja en forma prioritaria aplicar esquema completo de vacunación (5 dosis) con toxoide tetánico y diftérico o TDaP a las mujeres entre 12 - 45 años de edad\", asegurando la transmisión pasiva transplacentaria masiva de inmunoglobulinas.<br><br>Perla ENARM: Se aconseja en forma prioritaria aplicar esquema completo de vacunación (5 dosis) con toxoide tetánico y diftérico o TDaP a las mujeres entre 12 - 45 años de edad.<br><br>Análisis de Distractores: A, C y D) Las aplicaciones de refuerzos únicos anuales, la limitación a 3 dosis parciales pediátricas, o el confinamiento temporal a 2 vacunas gestacionales aisladas confieren una protección fugaz o incompleta, fallando en el estándar de oro epidemiológico de \"5 impactos biológicos\" necesario para sellar definitivamente la indemnidad poblacional reproductiva contra las esporas de Clostridium tetani.",
        source: "IMSS-829-18 RR, Aplicación de Vacunas y Toxoide, 2018, Recomendaciones de Vacunación, Página 68."
    },
    {
        id: 229,
        question: "En la Unidad de Terapia Intensiva, un paciente sometido a intubación orotraqueal requiere monitoreo clínico del nivel de hipnosis farmacológica. Al aplicar la Escala de Sedación de Ramsay, el enfermo es clasificado en el \"Nivel 4\". ¿Qué descripción fisiológica estandarizada arroja el paciente para adjudicarse este puntaje exacto?",
        options: ["Paciente dormido con respuesta mínima a estímulos mecánicos", "Paciente dormido con respuesta a estímulos auditivos intensos", "Paciente colaborador, orientado y biológicamente tranquilo", "Paciente dormido sin respuesta neurológica a estímulos"],
        answer: 1,
        justification: "Justificación: El control del bloqueo cortical previene el delirio por infrasedación y el colapso hemodinámico o retraso en la extubación por sobresedación barbitúrica o propofólica excesiva. De acuerdo a la GPC de Cuidados Paliativos (Anexo Ramsay), el instrumento gradúa la obnubilación en seis pasos críticos. El umbral seguro de sedación profunda ligera, \"Nivel 4\", se alcanza y constata cuando el clínico se aproxima a la cabecera y dictamina un \"Paciente dormido con respuesta a estímulos auditivos intensos\" (abriendo los ojos al llamado fuerte de su nombre o al palmoteo sonoro), conservando el reflejo neurosensorial acústico primario de alerta.<br><br>Perla ENARM: Escala de Sedación Ramsay. Nivel 4: Paciente dormido con respuesta a estímulos auditivos intensos.<br><br>Análisis de Distractores: A) La profundización grave farmacológica donde la corteza solo obedece vagamente a dolor o compresión refleja y pobre, correspondiendo a un \"Paciente dormido con respuesta mínima a estímulos\", tipifica al Nivel 5. C) El estado alerta pacífico del preoperatorio electivo o ansiólisis leve, manifestado como \"Paciente colaborador, orientado y tranquilo\", encuadra en la vigilia del Nivel 2. D) El coma inducido farmacológico profundo de muerte aparente (\"Paciente dormido sin respuesta a estímulos\") decreta el máximo escalón de letargo letal y parálisis, el Nivel 6.",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Anexos, Escala Ramsay, Página 55."
    },
    {
        id: 230,
        question: "En el tratamiento avanzado oncológico de un varón asintomático con \"cáncer de próstata resistente a la castración\" que muestra progresión bioquímica, se documenta a través de gammagrama la invasión extensa y exclusiva al esqueleto óseo axil. Pese al bloqueo, ¿cuál es el radiofármaco dirigido protocolizado específicamente ante la presencia de metástasis óseas y ausencia de metástasis viscerales?",
        options: ["Tratamiento con Quimioterapia intravenosa Cabazitaxel", "Infusión dirigida del isótopo Radium 223", "Terapia de anticuerpos con Sipuleucel-T a nivel ganglionar", "Terapia esteroidea empírica a dosis masivas de rescate"],
        answer: 1,
        justification: "Justificación: El tejido óseo metastásico capta elementos alcalinotérreos análogos al calcio que actúan como \"balas\" radiactivas destructoras selectivas en los nidos tumorales sin envenenar sistémicamente los pulmones o el hígado. De acuerdo a la GPC de Cáncer de Próstata, el \"Algoritmo 2\" delimita terapéuticas complejas. En la rama del individuo resistente a castración que \"Progresa\", el esquema indica como opción cardinal directa prescribir \"Radium 223\", pero condicionado obligatoriamente por la anotación biológica estricta: \"(metástasis Óseas y sin metástasis Viscerales)\", frenando así el dolor y la destrucción osteoclástica axial de la columna de manera localizada.<br><br>Perla ENARM: Algoritmo 2. Tratamiento de Cáncer de Próstata Resistente a la Castración: ¿Progresa? -> Radium 223, (sólo con metástasis óseas y sin metástasis viscerales).<br><br>Análisis de Distractores: A) El taxano sintético Cabazitaxel es el citotóxico de rescate tardío para esquemas terminales fracasados, pautado universalmente para aquel enfermo agresivo que ya cursó y \"progresó tras recibir terapia de primera línea con Docetaxel\", independiente de la estirpe y masa tumoral ósea exclusiva descrita. C) La inmunoterapia celular activa pre-programada periférica Sipuleucel-T retarda el avance asintomático letárgico, pero su indicación carece del efecto microfocal lítico óseo directo y potente radioactivo mitigador local que confiere mecánicamente la sal de radio. D) Los esteroides aislados masivos (fuera del combo abiraterona-prednisona) fungen primariamente como paliativos contra el edema espinal neuropático local en la compresión radicular aguda prequirúrgica oncológica, no como quimioterápicos antineoplásicos sistémicos reductores rectores.",
        source: "IMSS-140-18 RR, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Algoritmo 2, Página 17."
    },
    {
        id: 231,
        question: "En la evaluación preoperatoria de un paciente geriátrico con síntomas obstructivos severos del tracto urinario inferior secundarios a un adenoma de crecimiento prostático (HPB), el ecógrafo reporta un volumen de la glándula estipulado en 75 gramos. ¿Cuál es el procedimiento endoscópico indicado (que emplea energía lumínica y morcelador) recomendado específicamente para próstatas que superan los 60 gramos de peso?",
        options: ["Resección transuretral de la próstata clásica con asa monopolar (RTUP)", "Enucleación prostática anatómica subcapsular con láser Holmium (HoLEP)", "Vaporización foto-selectiva volumétrica prostática con láser verde (KTP)", "Cirugía abierta suprapúbica a cielo abierto para prostatectomía simple"],
        answer: 1,
        justification: "Justificación: Las próstatas voluminosas exponen al paciente a tiempos quirúrgicos prolongados, sangrado y al mortal Síndrome de Absorción Post-RTUP. De acuerdo a la GPC de Síntomas del Tracto Urinario Inferior y Crecimiento Prostático, las energías de vanguardia suprimen estas limitantes. La definición estandarizada decreta que la \"Enucleación prostática con láser Holmium (HoLEP)... se recomienda en casos de próstatas mayores a 60 grs y donde se encuentre disponible el equipo\". La técnica permite disecar esféricamente todo el lóbulo desde la cápsula sin hemorragia y usar un aspirador triturador (morcelador) intravesical.<br><br>Perla ENARM: Enucleación prostática con láser Holmium (HoLEP): Consiste en la remoción del adenoma prostático... Se recomienda en casos de próstatas mayores a 60 grs.<br><br>Análisis de Distractores: A) La RTUP clásica (gold standard del siglo pasado) restringe históricamente su anatomía biológica segura y de morbilidad tolerada casi exclusivamente a aquellos adenomas de volúmenes medianos o pequeños (generalmente calculados entre los 30 y los 60 u 80 cc máximos). C) El láser verde (KTP) ablaciona el tejido calentando y quemando el agua intracelular; carece de morcelador anatómico de extracción en bloque, por lo que su indicación primordial abarca próstatas pequeñas u pacientes con alto riesgo de sangrado anti-agregado, no como terapia de enucleación masiva electiva principal. D) La cirugía abierta invasiva (Millin) es el rezago anatómico extremo actual para volúmenes gigantes (>>80-100 g), el cual, si bien retira el tumor, impone alta morbilidad, siendo desplazada y contraindicada formalmente siempre que el nosocomio cuente activamente y de manera prioritaria con el láser HoLEP endoscópico.",
        source: "IMSS-176-18 RR, Síntomas del Tracto Urinario Inferior y Crecimiento Prostático, 2018, Anexos, Página 20."
    },
    {
        id: 232,
        question: "Durante el manejo de la fase hospitalaria aguda de un paciente con amputación de extremidad inferior (transfemoral o transtibial), ¿cuál es la dirección biomecánica obligatoria y correcta indicada para realizar el vendaje de compresión elástico que dará forma al muñón en preparación protésica temprana?",
        options: ["Desde la porción superior anatómica inguinal descendiéndolo longitudinalmente", "De forma circular compresiva homogénea y estática paralela a la herida", "Dirección distal-proximal desde la punta residual hacia el anclaje base", "En cruz a tensión continua desde la articulación hasta la cicatriz inferior"],
        answer: 2,
        justification: "Justificación: Un vendaje en direcciones incorrectas estrangula el drenaje venoso superficial, induce edema en el ápice \"en forma de campana\" y necrosa el colgajo quirúrgico residual, saboteando el encaje de la pierna mecánica. De acuerdo a la GPC de Rehabilitación en Amputación, el \"Punto de Buena Práctica\" rige el cuidado vascular y modelado tensional: \"El vendaje elástico del muñón debe realizarse... con venda de alta compresión, correcto anclaje (sujeción proximal), dirección distal-proximal, con reajustes necesarios durante el día para garantizar su correcta función (control del edema)\".<br><br>Perla ENARM: Vendaje y muñón: El vendaje elástico del muñón debe realizarse, previa enseñanza y supervisión, con venda de alta compresión... en dirección distal-proximal, con reajustes. (PBP).<br><br>Análisis de Distractores: A, B y D) Imponer tensiones de cierre de proximal a distal (empujando la linfa hacia abajo), ejercer compresión anular constrictiva o cruzada isquémica desgarra la integridad microvascular de los bordes frontales tibiales o femorales frágiles isquémicos remanentes en los adultos mayores diabéticos arteriópatas, contrariando los fundamentos de la fisioterapia.",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputación de Miembro Inferior, 2021, Intervenciones Terapéuticas, Página 11."
    },
    {
        id: 233,
        question: "Al recibir en el Servicio de Urgencias a un paciente adulto con cuadro súbito de dolor torácico retroesternal irradiado, diaforesis y náusea, la directriz institucional \"Código Infarto\" establece un límite crítico de tiempo. De acuerdo a la GPC, ¿cuál es el tiempo máximo indispensable para realizar e interpretar biológicamente el primer electrocardiograma de 12 derivaciones desde el primer contacto médico?",
        options: ["Dentro de los primeros 10 minutos", "Dentro de los primeros 20 minutos", "Dentro de los primeros 5 minutos", "Antes de que transcurran 30 minutos"],
        answer: 0,
        justification: "Justificación: En el Infarto Agudo de Miocardio con Elevación del Segmento ST, la cascada de necrosis miocárdica exige acortar la ventana diagnóstica (tiempo puerta-aguja o puerta-balón). De acuerdo a la GPC de IAMCEST, la Recomendación Clave, catalogada con Grado de evidencia \"IIa\", estatuye el tiempo de oro diagnóstico inamovible en la puerta del triaje hospitalario: \"En todo paciente con sospecha de IAM CEST, está indicado realizar e interpretar el electrocardiograma de 12 derivaciones tan pronto como sea posible. Es indispensable que se realice dentro de los primeros 10 minutos en que se tiene el primer contacto entre el paciente y el médico\".<br><br>Perla ENARM: Recomendación Clave: Es indispensable que se realice (y se interprete el ECG de 12 derivaciones) dentro de los primeros 10 minutos en que se tiene el primer contacto entre el paciente y el médico.<br><br>Análisis de Distractores: B y D) Esperar 20 o 30 minutos para tener un trazo eléctrico expone a la institución a un fracaso imperdonable en los indicadores de calidad del Código Infarto mundial AHA, arruinando la ventana terapéutica pre-fibrinolítica oportuna para reperfusión del vaso ocluido. C) El lapso de 5 minutos, aunque logísticamente loable y soñado utópicamente en pasillos de reanimación exprés, no compone el parámetro estandarizado de la meta matemática formal obligada mínima de seguridad \"puerta-ECG\" dictada en la bibliografía mexicana de los 10 minutos.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Recomendaciones Clave, Página 35."
    },
    {
        id: 234,
        question: "Dentro de la clasificación citogenética y molecular de la Leucemia Aguda Mieloide (LMA) en pediatría (Sistema MIC), ¿qué marcador genético alterado originado por translocación determina fenotípicamente a la grave variante leucémica \"M4\" (Mielomonocítica)?",
        options: ["Alteración cromosómica t(9;22)(q34;q11)", "Translocación t(15;17)(q22;q12)", "Inversión inv(16)(q23) o t(16;16)", "Translocación t(8;21)(q22;q22)"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico de Leucemia Aguda en Pediatría, el Cuadro 1 \"Sistema MIC\", enlaza la nomenclatura de la clasificación morfológica FAB con su impronta molecular diagnóstica predictiva. Se dictamina rigurosamente que el subgrupo invasivo \"M4\" (y la subvariante M4 Eo con eosinofilia anómala medular), co-expresa receptores mixtos (CD14 y CD33) y está determinada de manera patognomónica e intrínseca en la médula ósea por la anomalía estructural cromosómica en \"t(16;16)\" o invariablemente la \"inv(16)(q23)\".<br><br>Perla ENARM: Cuadro 1. Sistema MIC. Leucemia Aguda Mieloide (LAM): Grupo MIC M4 (Mielomonocítica) -> Cariotipo: t(16;16) / inv(16)(q23).<br><br>Análisis de Distractores: A) El cromosoma t(9;22) o Filadelfia es el estigma casi exclusivo universal de la Leucemia Mieloide Crónica y es un indicador sombrío de mal pronóstico fatal en Leucemias Linfoblásticas, sin definir a la M4. B) La mortífera t(15;17) devela singular y unívocamente a la urgencia oncológica hematológica de la Leucemia Promielocítica (tipo M3 o M3v). D) La genética t(8;21) funge como el rasgo característico incondicional y genotípico que marca a la clona blástica de la Leucemia Mieloblástica inmadura con maduración (tipo M2).",
        source: "SS-061-08 RR, Diagnóstico de Leucemia Aguda en Pediatría, 2008, Anexos, Cuadro 1, Página 72."
    },
    {
        id: 235,
        question: "En la evaluación anatómica prequirúrgica y endovascular de la Enfermedad Arterial Periférica empleando la Clasificación de lesiones de TASC II, ¿qué hallazgo morfológico arteriográfico se debe documentar para categorizar la lesión del lecho femoro-poplíteo estrictamente como de \"Tipo B\"?",
        options: ["Oclusión femoropoplítea única de extensión superior a 20 centímetros", "Oclusión única o estenosis menor de 15 centímetros sin afectar la arteria poplítea infragenicular", "Lesión hiper-larga que borra por completo y de forma total toda la irrigación del hueco poplíteo y la trifurcación del peroné", "Estenosis localizada solitaria corta y benigna menor a 5 centímetros en el canal de Hunter"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Enfermedad Arterial Periférica, la clasificación TASC II (TransAtlantic Inter-Society Consensus) predice qué estenosis pueden recanalizarse por hemodinamia y cuáles demandan derivaciones de vena abierta. El \"Tipo A\" (muy leves) permite terapia por catéter; el \"Tipo D\" (masivas) exigen Bypass. La descripción angiográfica estricta y morfológica intermedia del \"Tipo B\" se establece bajo la presencia de \"Estenosis única u oclusión <15 cm sin afectar la arteria poplítea infragenicular\" o lesiones múltiples menores a 5 cm.<br><br>Perla ENARM: Clasificación Lesiones Femoro-poplíteas (TASC II): Lesiones tipo B -> Estenosis única u oclusión <15 cm sin afectar la arteria poplítea infragenicular.<br><br>Análisis de Distractores: A y C) Oclusiones isquémicas crónicas masivas, duras y severas mayores de 20 cm (>20 cm) o aquellas que anulan y afectan por completo el territorio de salida tibial y toda la poplítea configuran las nefastas lesiones del \"Tipo C\" o terminal \"Tipo D\", requiriendo injerto derivativo quirúrgico venoso o protésico complejo. D) Una estenosis incipiente menor o igual a 5 cm, es el ejemplo prístino universal del \"Tipo A\" de la clasificación, la cual cede maravillosamente ante la simple dilatación del balón y stent angiológico de consultorio.",
        source: "IMSS-007-08 RR, Enfermedad Arterial Periférica, 2008, Anexos, Figura 2, Página 11."
    },
    {
        id: 236,
        question: "Al calcular la probabilidad de riesgo de que un paciente anciano, previamente sano y sin historia cardiovascular o diabetes, padezca un evento tromboembólico cerebral secundario a un cuadro reciente de fibrilación auricular documentada en piso. Utilizando el puntaje CHA2DS2-VASc, ¿qué sumatoria matemática parcial o riesgo ponderado penaliza rígidamente y de forma directa la herramienta al corroborar que el individuo tiene \"69 años\" de edad cronológica?",
        options: ["0 puntos o nulo riesgo", "2 puntos de penalidad", "1 punto", "3 puntos escalonados"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Anticoagulación Oral, la edad no avanza de forma lineal sino en brincos de riesgo trombótico en la escala de FA. El test CHA2DS2-VASc es estricto en su segmentación cronológica: a los individuos menores de 65 años no se les otorga castigo por edad (0 puntos); a quienes se encuentran en la ventana biológica de \"Edad 65-74 años\", se les confiere de manera punitiva y aislada \"1 punto\" hacia el índice; y quienes cumplen o sobrepasan el dintel ominoso de los 75 años (Edad >=75), se adjudican y arrastran masivamente \"2 puntos\". Al tener 69 años, el paciente encaja exclusivamente en la segunda banda de riesgo moderado asimilando únicamente un punto a su cuenta.<br><br>Perla ENARM: Escala CHA2DS2-VASc: Factor de Riesgo. Edad 65-74 -> Puntaje: 1.<br><br>Análisis de Distractores: A) Los 0 puntos eximen de todo lastre a las juventudes vasculares vigorosas y pacientes adultos menores a la frontera crítica límite inferior impuesta de 65 años biológicos de vida. B) Adjudicar la carga masiva y grave de 2 puntos sobredimensiona el declive arterial sistémico en este paciente al ser de exclusividad diagnóstica predictiva para aquellos pacientes seniles longevos que asientan y rebasan los >= 75 años de edad. D) Ningún constructo o ítem unitario dentro del modelo cardiológico europeo del CHA2DS2-VASc posee el valor analítico arbitrario de 3 puntos.",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Anexos, Tabla de Riesgo y Escala CHA2DS2-VASc, Página 70."
    },
    {
        id: 237,
        question: "Durante la implementación del Cuestionario de Movilidad para Personas con Prótesis de Piernas (PLUS-M versión corta), ¿qué actividad de la vida diaria biomecánica conforma el reactivo y dominio de inicio (Pregunta 1) exigido al paciente para puntuar su recuperación articular intrínseca?",
        options: ["¿Es usted capaz de mantener la velocidad de otras personas al caminar?", "¿Es usted capaz de subir y bajar escaleras o aceras?", "¿Es usted capaz de caminar una distancia corta dentro de su casa?", "¿Es usted capaz de ir de excursión por 2 millas en terrenos disparejos?"],
        answer: 2,
        justification: "Justificación: La validación exitosa de un encaje protésico exige medir la funcionalidad en escenarios cotidianos. De acuerdo a la GPC de Rehabilitación en Amputación, el formulario estructurado PLUS-M (12 preguntas) escala la exigencia motora desde el refugio domiciliario hasta el terreno hostil. El ítem primario rompehielos (Pregunta 1), evaluado en Likert de 1 a 5, indaga la movilidad de base de supervivencia intradomiciliaria de forma ineludible: \"¿Es usted capaz de caminar una distancia corta dentro de su casa?\", siendo la actividad medular sin la cual todo avance ortopédico público subsecuente fracasa.<br><br>Perla ENARM: Cuestionario PLUS-M (Movilidad para Personas con Prótesis). Pregunta 1. ¿Es usted capaz de caminar una distancia corta dentro de su casa?<br><br>Análisis de Distractores: A, B y D) Subir y bajar aceras/escaleras, mantener la competencia atlética social dinámica frente a otros caminantes (velocidad), o someter el torque cinético amputado residual pélvico a caminatas masivas boscosas de 2 millas en inclinación, conforman los reactivos subsecuentes y más exigentes escalonados de alta demanda metabólica (Ítems 2, 9 y 12 respectivamente) evaluados en el cuerpo inferior profundo del formulario test protésico una vez asegurado y dominado el confort llano residencial del Ítem 1.",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputación de Miembro Inferior, 2021, Anexos, Cuadro PLUS-M, Página 25."
    },
    {
        id: 238,
        question: "Al atender un cuadro sospechoso de eccema pruriginoso grave diseminado en la nuca y párpados de una paciente cuya profesión recae en la labor de peluquería o salón de belleza (peinadora), la guía estandarizada indica buscar intencionadamente el agente hapteno profesional responsable de su dermatitis. ¿Cuáles son los alérgenos específicos obligados a investigar en este rubro ocupacional?",
        options: ["Níquel, agentes persulfatos, perfumes y tintes", "Cloruro de benzalconio, limpiadores y jabón", "Cemento en polvo húmedo, cromo y cobalto", "Materiales de resinas dentales y mercurio líquido"],
        answer: 0,
        justification: "Justificación: Las dermatosis de contacto por el lavado y teñido capilar continuo se manifiestan invariablemente en manos de la esteticista y secundariamente como eccema transportado (ectópico) en sus párpados u orejas. De acuerdo a la GPC de Dermatitis de Contacto, en el manual de alérgenos ocupacionales, la ocupación de \"Peinadores\" (peluqueras/estilistas) arrastra una lista negra y estricta de sensibilizantes antígenos mediadores T ineludibles: \"Gel, shampoo, agentes blanqueadores, trabajo húmedo / Tintes, persulfatos, niquel, perfumes, plásticos\".<br><br>Perla ENARM: Cuadro 3. Alérgenos y ocupación. Ocupación: Peinadores -> Agente: Tintes, persulfatos, niquel, perfumes, plásticos.<br><br>Análisis de Distractores: B) El contacto primario con detergentes industriales, limpiadores alcalinos masivos, jabón de manos y comida cruda conforma el perfil alergénico y micótico friccional habitual predominante del estatus laboral de cocineros o intendencia (cuidadores). C) El cemento mojado corrosivo, el cromo o los pesados y densos cromados dictaminan invariablemente el lastre de contacto e histotoxicidad inmunológica del gremio de obreros y \"albañiles\". D) El mercurio pesado, el metacrilato monomérico puro, el eugenol desinfectante irritativo y los moldes duros dentarios asocian biológicamente su cuadro clínico nosológico perioral hacia las ocupaciones cerradas e intrincadas de los \"Dentistas y técnicos dentales\".",
        source: "IMSS-560-12 RR, Dermatitis de Contacto, 2012, Anexos, Cuadro de Ocupaciones, Página 59."
    },
    {
        id: 239,
        question: "Al recibir en urgencias a una paciente obstétrica cursando el tercer trimestre (33 semanas de gestación) que presenta sangrado transvaginal rojo rutilante escaso pero hemodinámicamente estable, ¿cuál es la prohibición clínica semiológica de contacto manual imperativa e inicial que rige el algoritmo antes de indicar la ecografía endovaginal o abdominal?",
        options: ["Evitar todo uso de solución salina endovenosa o hemática urgente empírica profiláctica de la vena cava", "No realizar tacto vaginal bajo ninguna circunstancia, y proceder exclusivamente a realizar especuloscopía", "Auscultar por pinard la frecuencia cardiaca fetal antes de que transcurran cinco minutos de su ingreso físico", "Suspender la colocación empírica y forzosa profiláctica y total masiva del tocodinamómetro electrónico materno"],
        answer: 1,
        justification: "Justificación: La principal causa de muerte materna relámpago en el piso de tococirugía es el desgarro yatrogénico de un lecho placentario previo por el dedo ciego del examinador novato durante la revisión del cérvix. De acuerdo a la GPC de Anomalías en la Inserción Placentaria, el \"Algoritmo 1\" detalla el abordaje de la hemorragia preparto no resuelta. Ante \"Paciente con sangrado transvaginal escaso y hemodinamicamente estable...\", el protocolo prohíbe tajantemente la intromisión dactilar dictando la instrucción restrictiva mayúscula: \"No realizar tacto vaginal. Realizar especuloscopía\". La visualización con espejo metálico permite confirmar el origen del sangrado sin perforar la inserción marginal fúngica esponjosa del trofoblasto bajo.<br><br>Perla ENARM: Algoritmo 1. Diagnóstico de la Placenta Previa: Paciente con sangrado transvaginal -> Acción inicial obligada: No realizar tacto vaginal. Realizar especuloscopía -> Realizar ultrasonido endovaginal.<br><br>Análisis de Distractores: A, C y D) Las acciones fisiológicas de aseguramiento venoso hídrico con cristaloides de choque vitales (para reposición), la vigilancia del bienestar biológico fetal (auscultación continua o por Pinard cardiotocográfico de la hipoxia latente fetal isquémica) y el monitoreo estricto monitorizado de la irritabilidad contráctil uterina son mandatos, apoyos y coadyuvantes absolutos primarios que nunca figuran ni deben considerarse dentro de las contraindicaciones algorítmicas de abstención de la GPC obstétrica mexicana en casos estables perinatales.",
        source: "IMSS-589-19 RR, Diagnóstico y Manejo de las Anomalías en la Inserción Placentaria, 2019, Algoritmo 1, Página 3."
    },
    {
        id: 240,
        question: "Durante la consulta geriátrica se implementa el cuestionario FRAIL para detectar signos subclínicos del síndrome biológico de consunción en el anciano diabético. ¿Qué aseveración en forma de pregunta constituye el ítem normativo oficial para calificar objetivamente la presencia de fatiga crónica profunda en el adulto mayor?",
        options: ["¿Siente usted a menudo que su vida diaria y sus pasatiempos están vacíos de placer y sentido biológico útil?", "¿Está usted cansado o con abatimiento todo el tiempo o la mayor parte de este?", "¿Le resulta imposible levantarse de la silla o cama sin el apoyo secundario y fuerza de los músculos de sus brazos y manos?", "¿Encuentra gran dificultad dolorosa matinal en los músculos cuádriceps de las piernas tras caminar y tratar de descansar?"],
        answer: 1,
        justification: "Justificación: La \"Fatiga\" es un pilar fundamental del fenotipo de agotamiento celular senil. De acuerdo a la GPC de Diabetes en el Adulto Mayor, el cuestionario FRAIL condensa y califica la claudicación con respuestas binarias (Sí/No). La F del acrónimo corresponde al ítem \"Fatiga\" y su evaluación estandarizada indaga la percepción subjetiva de energía extinta al requerir y plantear al paciente el cuestionamiento: \"¿Está usted cansado todo el tiempo, o la mayor parte de este?\". Un \"SÍ\" revela el déficit metabólico del organismo sumando el castigo de 1 punto de riesgo sistémico hacia el diagnóstico de estado \"Prefrágil\" o \"Frágil\" asilar final de la prueba clínica.<br><br>Perla ENARM: Cuadro 11. Escala FRAIL, para el fenotipo de fragilidad: F. Fatiga. ¿Está usted cansado todo el tiempo, o la mayor parte de este? -> Si (1) / No (0).<br><br>Análisis de Distractores: A) Sentir un letargo hedónico o anhedonia, pérdida de interés o un vacío del sentido biológico o monótono corresponde llanamente a los constructos e ítems psicométricos evaluativos formales interrogados por la \"Escala de Yesavage o el Cuestionario de Beck\" para escrutar depresión, no debilidad sarcopénica. C) La incapacidad motora de \"levantarse de la silla sin el impulso y apoyo forzoso de brazos\" conforma el ítem nuclear isométrico y articular de testeo cuádriceps central para la validación pura de la \"Escala SARC-F\", y no compone los reactivos de la letra de la \"F\" (Fatiga general global) en la encuesta FRAIL americana. D) El dolor muscular local o neuropatía radicular descrita no tiene ponderación tabulada ni es referida en la estructuración de fragilidad asilar general geriátrica.",
        source: "IMSS-657-21 RR, Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Cuadro 11, Página 22."
    },
    {
        id: 241,
        question: "Durante la evaluación funcional de un adulto con lumbalgia inespecífica, se aplica el Cuestionario de Discapacidad de Roland-Morris. ¿Qué constructo interrogativo exacto evalúa el ítem número 13 de este instrumento estandarizado?",
        options: ["Camino más lentamente de lo normal", "Me duele la espalda casi siempre", "Uso los pasamanos para subir escaleras", "Evito inclinarme o arrodillarme"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rehabilitación del Dolor Lumbar Inespecífico, el cuestionario de Roland-Morris cuantifica la invalidez física y la interferencia somática mediante respuestas dicotómicas afirmativas. El ítem 13 es el único de la batería que abandona la evaluación biomecánica directa para centrarse en la temporalidad incesante del síntoma cardinal crónico, dictaminando la aseveración: \"Me duele la espalda casi siempre\".<br><br>Perla ENARM: Cuestionario de Discapacidad de Roland-Morris: 13. Me duele la espalda casi siempre.<br><br>Análisis de Distractores: A) La lentitud en la marcha (\"Camino más lentamente de lo normal\") es evaluada explícitamente en el ítem número 3. C) La claudicación que obliga a buscar soporte estructural ascendente (\"Uso los pasamanos para subir escaleras\") corresponde al reactivo 5. D) La abolición de los arcos de flexión inferior (\"Evito inclinarme o arrodillarme\") es documentada en la pregunta número 11.",
        source: "DIF-313-19 RR, Manejo Integral en Rehabilitación del Dolor Lumbar Inespecífico, 2019, Anexos, Cuestionario Roland-Morris, Página 11."
    },
    {
        id: 242,
        question: "En la estadificación quirúrgica y oncológica del cáncer de pulmón empleando la clasificación TNM, ¿qué hallazgo patológico determina irremediablemente el estadio ganglionar \"N2\"?",
        options: ["Metástasis en ganglios peribronquiales ipsilaterales", "Afección de los ganglios escalenos o supraclaviculares", "Metástasis en ganglios linfáticos mediastinales contralaterales", "Metástasis en ganglios mediastinales ipsilaterales y subcarinales"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Pulmón, la diseminación linfática dicta la resecabilidad del tumor. El salto de las barreras peribronquiales hacia el centro de la cavidad torácica pero manteniéndose en el mismo lado anatómico de la masa primaria, se codifica textualmente como nivel \"N2: Metástasis en ganglios linfáticos mediastinales ipsilaterales y/o subcarinales\".<br><br>Perla ENARM: Estadificación N: Nódulos Linfáticos Regionales. N2: Metástasis en ganglios linfáticos mediastinales ipsilaterales y/o subcarinales.<br><br>Análisis de Distractores: A) La invasión temprana limitada a ganglios peribronquiales o hiliares ipsilaterales se clasifica como el estadio más leve de migración linfática, N1. B y C) Cuando la clona neoplásica cruza la línea media hacia los ganglios contralaterales (mediastinales o hiliares) o asciende hacia el cuello (escalenos, supraclaviculares), se decreta el estadio terminal ganglionar inextirpable, N3.",
        source: "IMSS-030-19 RR, Diagnóstico y Tratamiento del Cáncer de Pulmón, 2019, Anexos, Cuadro TNM, Página 20."
    },
    {
        id: 243,
        question: "En la evaluación reumatológica del síndrome somatomorfo algésico mediante el Cuestionario de Impacto de la Fibromialgia (FIQ), ¿qué constructo incapacitante específico exige cuantificar numéricamente la pregunta número 3 del test?",
        options: ["Número de cuadras que es capaz de caminar sin pausa", "Cuántos días se encontró bien la semana pasada", "Cuántos días no pudo trabajar o hacer cosas de la casa", "Qué tan cansado se ha sentido en la última semana"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de Fibromialgia, el FIQ posee reactivos cronológicos que miden el impacto del dolor en la productividad. La pregunta 3 exige cuantificar el ausentismo laboral o invalidez doméstica directa de los 7 días previos, planteando literalmente: \"¿Cuántos días de la semana anterior no pudo trabajar o hacer las cosas de la casa por los síntomas?\".<br><br>Perla ENARM: Cuestionario FIQ: 3. ¿Cuántos días de la semana anterior no pudo trabajar o hacer las cosas de la casa por los síntomas? (0 a 7 días).<br><br>Análisis de Distractores: A) Caminar varias cuadras se evalúa de manera dicotómica en la tabla inicial de actividades cotidianas del bloque de la pregunta 1. B) Los días que logró dominar el dolor y sentirse en homeostasis se interrogan exclusivamente en la pregunta número 2 (\"¿cuántos días puede decir que se encontró bien?\"). D) La magnitud térmica del agotamiento (\"¿Qué tan cansado se ha sentido?\") corresponde a la escala visual análoga de la pregunta 6.",
        source: "IMSS-075-18 RR, Diagnóstico y Tratamiento de Fibromialgia, 2018, Anexos, Cuestionario FIQ, Página 24."
    },
    {
        id: 244,
