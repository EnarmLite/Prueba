        question: "En el escrutinio de neurodesarrollo de un infante de 8 meses, se explora el reflejo y reacción postural de \"Paracaídas\". ¿Cuál es la respuesta motora esperada y normal desencadenada al sostener al niño en posición vertical e inclinarlo rápidamente hacia adelante?",
        options: ["Reacción defensiva de extensión de los brazos", "Flexión súbita de las rodillas sobre el abdomen", "Hiperextensión rígida del cuello y las piernas", "Adopción de postura en tijera de los pies"],
        answer: 0,
        justification: "Justificación: Las reacciones posturales reflejan la madurez de los tractos motores centrales y la integración vestíbulo-espinal de salvaguarda. De acuerdo a la GPC de Alteraciones del Neurodesarrollo y Estimulación Temprana, el desarrollo del reflejo y reacción de \"Paracaídas\" aparece obligatoriamente \"en los lactantes mayores de 6 meses\" de vida. Su manifestación fisiológica correcta exige que, al provocar la caída libre inclinando el cuerpo hacia la camilla, el infante active una respuesta automática y defensiva de \"extensión de ambos brazos hacia el frente\" para frenar el impacto encefálico contra el suelo.<br><br>Perla ENARM: Reflejos y reacciones posturales: Paracaídas. Sostener al niño en posición vertical e inclinarle rápidamente hacia delante. Observar la reacción de los brazos: Extensión de los brazos y manos para protegerse de la caída (en mayores de 6 meses).<br><br>Análisis de Distractores: B) La flexión de extremidades ante estímulos obedece a respuestas de retirada espinal primitiva en recién nacidos (Triple flexión), no a un reflejo vestibular tardío antigravitatorio cortical. C) La hiperextensión en arco del cuello y columna corresponde al tono patológico atetósico o extensor en espasmo en parálisis cerebral o kernicterus, ajeno a la respuesta de manos libre del paracaídas normado. D) La postura en tijera (cruce hipertónico pélvico plantar) es un signo francamente atípico del síndrome de neurona motora superior espástico (ej. en la maniobra de suspensión vertical simple) en infantes dañados perinatales.",
        source: "DIF-332-18 RR, Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Reflejos y Reacciones Posturales, Página 36."
    },
    {
        id: 120,
        question: "Al evaluar a un paciente politraumatizado grave en la sala de choque mediante un estudio de tromboelastometría rotacional (ROTEM) para dirigir la terapia del Patient Blood Management, ¿qué valor viscoelástico determina un estado de hiperfibrinólisis severa y es la indicación absoluta para infundir un bolo inmediato de ácido tranexámico?",
        options: ["Amplitud Máxima A5FIB menor a 12 milímetros", "Lisis Máxima (ML) mayor o igual a 5% dentro de 60 minutos", "Ángulo Alfa (Alpha) menor de 45 grados de amplitud", "Tiempo de Coagulación (CT) mayor de 80 segundos"],
        answer: 1,
        justification: "Justificación: El manejo de la coagulopatía inducida por el trauma se basa en el principio de detener el consumo y la lisis anárquica de la red de fibrina a la cabecera del paciente mediante pruebas viscoelásticas (TEG/ROTEM). De acuerdo a la GPC de Optimización de la Sangre (PBM), el \"Algoritmo 5. Utilización de ROTEM y manejo de hemorragia\", protocoliza las metas hemostáticas críticas. Ante un sangrado difuso en urgencias, el médico debe observar la copa de la muestra; si el tromboelastograma arroja evidencia de degradación precoz documentada como \"ML >= 5% (dentro de los primeros 60 minutos de coágulo)\" o un CT_FIB>600s, se activa el umbral crítico para disparar la dosis endovenosa inmediata de 25 mg/kg de \"Ácido Tranexámico\" para blindar el tapón.<br><br>Perla ENARM: Algoritmo 5. ROTEM y Sangrado grave: A5EX <35 mm ó CTFIB >600 s ó ML ≥5% (dentro de 60 minutos) -> SÍ -> Ácido tranexámico 25 mg/kg en bolo.<br><br>Análisis de Distractores: A) Una amplitud A5 en el canal FIB (Fibrinógeno) que sea francamente menor de 12 mm delata una masa precaria por hipofibrinogenemia pura (falta de ladrillos), exigiendo el uso de infusión de Crioprecipitados o Fibrinógeno sintético liofilizado, no el inhibidor lítico primario. C) El ángulo alfa cerrado atestigua cinéticamente una falla en el estallido rápido de la fibrina; sin embargo, no es el marcador biológico pivote aislado estandarizado para diagnosticar la cascada hiper-fibrinolítica en el diagrama nacional. D) Un tiempo de coagulación prolongado al inicio (CT_EX >80 segundos) exhibe una grave falencia en la vía extrínseca generadora de trombina inicial, dictando forzosamente la infusión rápida de \"Complejo Protrombínico\" (CCP) o Plasma Fresco Congelado, no ácido tranexámico.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 5, Página 147."
    },
    {
        id: 121,
        question: "En la estadificación clínica del deterioro en la enfermedad de Alzheimer mediante la escala validada FAST (Functional Assessment Staging), ¿qué descripción clínica determina que el paciente ha transitado al Nivel 3 de la enfermedad?",
        options: ["Incapacidad total para vestirse o bañarse de manera independiente", "Olvido subjetivo de la ubicación de los objetos personales en casa", "Disminución de la funcionalidad en el trabajo evidente para los compañeros", "Ninguna dificultad cognitiva o funcional comprobable en su entorno"],
        answer: 2,
        justification: "Justificación: La escala FAST estadifica de forma longitudinal la pérdida de las capacidades adquiridas durante la vida. De acuerdo a la GPC de Enfermedad de Alzheimer, el paciente cursa por estadios numerados del 1 al 7. El Nivel 1 es normalidad y el Nivel 2 incluye fallas subjetivas o quejas del paciente (\"olvido de ubicación\"). La barrera clínica fundamental que instaura el Nivel 3 es cuando el déficit abandona la esfera subjetiva y comienza a mermar objetivamente el desempeño social/laboral externo, siendo el punto donde se hace evidente la \"disminución de la funcionalidad en el trabajo para los compañeros\" y la desorientación al viajar a lugares nuevos.<br><br>Perla ENARM: Cuadro 7. Escala FAST. Nivel 3: Disminución de la funcionalidad en el trabajo evidentes para los compañeros. Dificultad para trasladarse a nuevos lugares. Disminuye la capacidad de organización.<br><br>Análisis de Distractores: A) La dependencia severa que exige asistencia de terceros para las Actividades Básicas de la Vida Diaria (como vestirse, higiene y baño) sitúa al paciente en los estadios de demencia moderada-severa a grave (niveles FAST 5 a 6). B) El olvido de los objetos personales (llaves, papeles) y quejas de memoria sin impacto laboral franco ni alerta externa corresponden a los signos incipientes del Nivel 2. D) La ausencia de mermas (subjetivas u objetivas) denota un estado cognitivo basal sin alteraciones, equivalente al Nivel 1.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Cuadro 7, Página 42."
    },
    {
        id: 122,
        question: "Durante la evaluación del tono muscular pasivo en un lactante menor, ¿cuál es la maniobra semiológica específica que desencadena y evalúa el \"Signo de la bufanda\"?",
        options: ["Extensión forzada del cuello con aproximación súbita del mentón al tórax", "Llevar el brazo hacia el lado contrario cruzando el tórax y observar el codo", "Elevación del brazo hasta que quede completamente alineado con la cabeza", "Sujetar el antebrazo y realizar movimientos forzados de pronación y supinación"],
        answer: 1,
        justification: "Justificación: El examen del tono pasivo permite detectar asimetrías, hipotonía central o espasticidad (parálisis cerebral) en los primeros meses de vida. De acuerdo a la GPC de Alteraciones del Neurodesarrollo y Estimulación Temprana, el \"Signo de la bufanda\" explora de forma dirigida el tono del aductor del hombro. La técnica estandarizada exige al explorador \"tomar la mano del niño y llevar el brazo hacia el lado contrario cruzando el tórax\". La respuesta normal de la resistencia del hombro evita que el codo rebase la línea media clavicular; si hay hipotonía severa, el codo cruza el tórax como si el brazo fuera una bufanda.<br><br>Perla ENARM: Examen neurológico: Signo de la bufanda. Técnica: Tomar la mano del niño y llevar el brazo hacia el lado contrario cruzando el tórax. Observar la posición del codo respecto a la línea media.<br><br>Análisis de Distractores: A) Esta maniobra describe la evocación de los signos meníngeos (Brudzinski/Kernig) o la evaluación de la rigidez de nuca, no una prueba de tono pasivo apendicular. C) Levantar el brazo hasta que quede alineado con el eje de la cabeza corresponde a la maniobra de \"Elevación pasiva del hombro\", la cual valora los músculos dorsal ancho y pectoral. D) Estos movimientos rotacionales del antebrazo constituyen la maniobra de \"Pronación/supinación\" pasiva para detectar espasticidad del bíceps/pronador redondo.",
        source: "DIF-332-18 RR, Detección de Alteraciones del Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Página 9."
    },
    {
        id: 123,
        question: "La escala de Medida de Independencia Funcional (FIM) es el estándar universal para cuantificar la discapacidad en el paciente amputado en rehabilitación. Si el paciente alcanza el puntaje máximo de autonomía posible exclusivamente en el dominio \"Motor\", ¿cuál es el valor numérico obtenido?",
        options: ["100 puntos", "65 puntos", "35 puntos", "91 puntos"],
        answer: 3,
        justification: "Justificación: La FIM (Functional Independence Measure) objetiva la carga de cuidados de enfermería y la evolución cinética intrahospitalaria. De acuerdo a la GPC de Rehabilitación en Amputación, la escala se subdivide macroscópicamente en dos grandes dominios que se evalúan del 1 al 7. El dominio \"Motor\", que agrupa el Autocuidado, Control de esfínteres, Movilidad y Ambulación (traslados y escaleras), tiene la mayor carga cuantitativa de la herramienta y suma un total máximo estandarizado de \"91 puntos\".<br><br>Perla ENARM: Escala de medida de independencia funcional (FIM): Dominio MOTOR (Autocuidado, esfínteres, movilidad y ambulación): 91 puntos máximo. Dominio COGNITIVO: 35 puntos máximo.<br><br>Análisis de Distractores: A) 100 puntos es el techo evaluativo característico del \"Índice de Barthel\" para las Actividades Básicas de la Vida Diaria (ABVD), no de la escala FIM. B) 65 puntos no es un corte de dominio máximo; es un valor intermedio de independencia modificada. C) 35 puntos es el valor máximo correspondiente de manera exclusiva a la evaluación del segundo bloque de la FIM: el dominio \"Cognitivo\" (Comunicación y Conocimiento social).",
        source: "DIF-257-21 RR, Rehabilitación Interdisciplinaria en Amputación de Miembro Inferior, 2021, Anexos, Cuadro de Escala FIM, Página 20."
    },
    {
        id: 124,
        question: "En un paciente ambulatorio con dolor asimétrico de pantorrilla, que tras la aplicación de la escala de Wells obtiene un puntaje de 0 (Baja probabilidad clínica para Trombosis Venosa Profunda) pero cuyo estudio serológico reporta un Dímero D positivo de alta sensibilidad, ¿cuál es la conducta diagnóstica ineludible recomendada?",
        options: ["Egresar a domicilio con terapia de vendaje compresivo elástico", "Realizar un ultrasonido venoso dúplex a color de extremidad", "Solicitar una angiotomografía pulmonar helicoidal de urgencia", "Iniciar anticoagulación plena empírica con heparina no fraccionada"],
        answer: 1,
        justification: "Justificación: El Dímero D posee un alto valor predictivo negativo, por lo que resulta ideal para descartar enfermedad en pacientes de bajo riesgo clínico; no obstante, su positividad pierde especificidad (elevándose por inflamación, trauma, edad). De acuerdo a la GPC de Trombosis Venosa Profunda, el flujograma diagnóstico dictamina que: \"En la persona con baja probabilidad clínica del modelo de Wells (puntaje <=0)... si el Dímero D es positivo, se recomienda realizar un USG dúplex a color\" para confirmar o descartar objetivamente la existencia de un trombo oclusivo en la vena femoral o poplítea antes de comprometer al paciente con los riesgos de los anticoagulantes sistémicos.<br><br>Perla ENARM: Persona con baja probabilidad clínica de Wells (<= 0), si el Dímero D es positivo, realizar ultrasonido dúplex a color. (Grado de recomendación A).<br><br>Análisis de Distractores: A) Egresar al paciente basándose únicamente en el score de Wells de 0 ignorando el Dímero D anormal constituye mala práctica por el riesgo latente de embolización fatal. C) La angiotomografía pulmonar está indicada ante la sospecha (clínica o gasométrica) de Tromboembolia Pulmonar (TEP), no siendo el estudio de primera intención ni el método anatómico para mapear venas periféricas de la pantorrilla. D) La heparinización terapéutica inmediata (empírica) se reserva para pacientes con \"Alta\" probabilidad pre-test (Wells >=3) mientras esperan su ecografía o en quienes la inestabilidad hemodinámica lo justifique, nunca para un bajo riesgo sin imagen confirmatoria.",
        source: "IMSS-425-18 RR, Trombosis Venosa y Tromboembolia Pulmonar, 2018, Recomendaciones Clave, Página 43."
    },
    {
        id: 125,
        question: "Se reporta una citología \"Bethesda 2\" tras realizar BAAF ecoguiada a un nódulo tiroideo asintomático. Para la vigilancia longitudinal de esta lesión de comportamiento benigno, ¿cuál es el intervalo temporal indicado por la guía para realizar el primer ultrasonido cervical de control?",
        options: ["A los 6 meses", "A los 12 meses", "A los 24 meses", "A los 3 meses"],
        answer: 1,
        justification: "Justificación: La inmensa mayoría de los nódulos tiroideos resultan ser bocios coloides hiperplásicos o adenomas benignos foliculares (Bethesda 2). Para evitar intervenciones innecesarias sin perder de vista el escaso riesgo de falsos negativos o transformación progresiva asimétrica, se instaura un plan de monitoreo no invasivo. De acuerdo a la GPC de Nódulo Tiroideo, el estándar resolutivo dicta tajantemente que, frente a un nódulo con citología validada como benigna, se debe \"realizar USG al año (12 meses)\". Si en este primer control anual no existen cambios sospechosos de vascularidad, bordes o tamaño, el espaciamiento de los futuros estudios se ampliará a cada 2 años.<br><br>Perla ENARM: Nódulos con resultado benigno, realizar USG al año, cuando no existieron cambios realizar seguimiento con UGS cada 2 años.<br><br>Análisis de Distractores: A y D) Repetir el ultrasonido a los 3 o 6 meses es una sobreutilización de recursos aplicable solo en casos de citologías insuficientes (Bethesda 1) o quistes que requirieron evacuación y se re-coleccionan tempranamente, no en adenomas benignos estables confirmados. C) Los 24 meses (2 años) corresponden al intervalo de relajación de la vigilancia ecográfica, pero solo puede instaurarse \"después\" de haber corroborado la estabilidad de la lesión al cumplir su primer hito normativo de control anual.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo No Tóxico, 2009, Recomendaciones de Seguimiento, Página 27."
    },
    {
        id: 126,
        question: "En la estratificación clínica de las alteraciones urológicas en el adulto mayor utilizando el Índice Internacional de Síntomas Prostáticos (IPSS), ¿qué rasgo de los síntomas urinarios se evalúa al indagar \"cuántas veces tuvo que volver a orinar en las 2 horas siguientes después de haber orinado\"?",
        options: ["Esfuerzo miccional", "Intermitencia", "Vaciado incompleto", "Polaquiuria"],
        answer: 3,
        justification: "Justificación: El IPSS (International Prostate Symptom Score) clasifica la severidad obstructiva e irritativa de la hiperplasia prostática para definir si el manejo será farmacológico (alfa-bloqueadores) o quirúrgico. De acuerdo a la GPC de Crecimiento Prostático, el IPSS contiene 7 reactivos estandarizados. La pregunta específica sobre la necesidad incesante de miccionar con una ventana de retorno menor a \"las 2 horas siguientes después de haber orinado\" evalúa semiológicamente el rubro de la \"Polaquiuria\" (frecuencia diurna aumentada), un síntoma de fase de llenado secundario a la hiperactividad del detrusor que trata de vencer la resistencia del cuello vesical.<br><br>Perla ENARM: IPSS: Polaquiuria -> Durante el último mes ¿Cuántas veces tuvo que volver a orinar en las 2 horas siguientes después de haber orinado?<br><br>Análisis de Distractores: A) El \"esfuerzo\" se indaga explícitamente preguntando si el paciente \"ha tenido que hacer fuerza o empujar para comenzar a orinar\" (uso de prensa abdominal). B) La \"intermitencia\" se valora preguntando si el paciente \"ha notado que al orinar, paraba y comenzaba de nuevo varias veces\" por claudicación del chorro. C) El \"vaciado incompleto\" (tenesmo) interroga la sensación residual: \"¿Cuántas veces ha tenido la sensación de no vaciar completamente su vejiga?\".",
        source: "IMSS-176-18 RR, Síntomas del Tracto Urinario Inferior y Crecimiento Prostático, 2018, Anexos, Cuadro IPSS, Página 21."
    },
    {
        id: 127,
        question: "Al aplicar el test neurológico de tamizaje breve \"Mini-Cog\" en un paciente geriátrico con sospecha de demencia vascular, ¿cuál es el puntaje máximo estandarizado que se le otorga exclusivamente a la sección del \"Dibujo del reloj\" si la ejecución mecánica y numérica es perfecta?",
        options: ["5 puntos", "3 puntos", "2 puntos", "1 punto"],
        answer: 2,
        justification: "Justificación: El instrumento Mini-Cog evalúa la memoria de trabajo y la apraxia ejecutiva visuoespacial en atención primaria consumiendo escasos minutos de la consulta. De acuerdo a la GPC de Rehabilitación Post-EVC, la prueba tiene un puntaje global tope de 5. Este se divide rígidamente: 3 puntos destinados a la evocación de palabras, y un máximo inamovible de \"2 puntos\" designados a la calificación del reloj. Para ser acreedor a estos 2 puntos, el paciente debe integrar sin errores el contorno, colocar todos los números del 1 al 12 en orden simétrico, y situar las manecillas apuntando a las 11 y a las 2. Cualquier omisión degrada el rubro a cero.<br><br>Perla ENARM: Mini-Cog: Puntuación del reloj (0 o 2 puntos): Un reloj normal equivale a 2 puntos... El no cumplir con los criterios de un reloj normal o el rehusarse a dibujar el reloj se califica como 0 puntos.<br><br>Análisis de Distractores: A) 5 puntos equivale a la \"Calificación Total\" posible de la herramienta completa (Reloj + Palabras), no la puntuación parcial del sub-dominio gráfico aislado. B) 3 puntos es el valor máximo topado de la otra mitad de la prueba: la \"Evocación de las tres palabras\" diferidas (ej. papel, bicicleta, cuchara). D) 1 punto es un valor engañoso; el diseño de estandarización del reloj en el Mini-Cog es dicotómico absoluto: o es perfecto (2 puntos) o es anormal (0 puntos), no permitiendo puntuaciones intermedias de un punto para \"intentos parciales\".",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos después de un Evento Vascular Cerebral, 2021, Anexos, Figura 3, Página 26."
    },
    {
        id: 128,
        question: "De acuerdo a la evaluación pronóstica del índice de Karnofsky (KPS) en pacientes oncológicos bajo cuidados paliativos, ¿qué puntaje clínico se le asigna a un individuo que está inválido, incapacitado, necesita cuidados especiales continuos y permanece encamado más del 50% del día?",
        options: ["20 puntos", "30 puntos", "40 puntos", "50 puntos"],
        answer: 2,
        justification: "Justificación: La decisión de retirar o escalar tratamientos de quimioterapia invasiva frente al abordaje de confort sintomático gira en torno a la funcionalidad biológica remanente. De acuerdo a la GPC de Cuidados Paliativos, la escala de Karnofsky avanza en deciles. El punto inflexivo severo de \"40 puntos\" agrupa al paciente que ostenta ya una incapacidad densa global: \"Inválido, incapacitado, necesita cuidados y atenciones especiales. Encamado más del 50% del día\". Este puntaje orienta hacia la terminalidad a corto plazo y exige focalización en alivio del sufrimiento intradomiciliario e higiene.<br><br>Perla ENARM: Escala de Karnofsky. Nivel 40: Invalido, incapacitado, necesita cuidados y atenciones especiales. Encamado más del 50% del día.<br><br>Análisis de Distractores: A) Un paciente calificado con 20 puntos describe un estadio agónico crítico casi sin respuesta: \"Encamado por completo, paciente muy grave, necesita hospitalización y tratamiento activo de soporte\". B) 30 puntos describe a un enfermo \"Inválido grave, severamente incapacitado\", que amerita hospitalización inminente por falla de los cuidados y riesgo vital pero sin estar en coma terminal. D) 50 puntos describe al paciente que \"Requiere gran atención, incluso de tipo médico\", pero aún preserva una movilidad residual suficiente para permanecer \"Encamado menos del 50% del día\".",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Anexos, Página 46."
    },
    {
        id: 129,
        question: "Frente a un paciente pediátrico preescolar diagnosticado con Trombocitopenia Inmune Primaria (TIP) de reciente diagnóstico que cursa con sangrado activo mucocutáneo de moderado a severo, ¿cuál es la intervención farmacológica de primera línea recomendada si se requiere alcanzar un incremento plaquetario rápido y el niño no está esplenectomizado?",
        options: ["Transfusión de aféresis plaquetaria de un solo donador", "Inmunoglobulina G intravenosa o Anti-D", "Rituximab intravenoso semanal por un mes", "Pulsos de ciclofosfamida a dosis bajas"],
        answer: 1,
        justification: "Justificación: El manejo inicial de la Púrpura Trombocitopénica (TIP) en niños con hemorragia activa que amenaza órganos busca inundar los receptores Fc de los macrófagos esplénicos para evitar la destrucción periférica de las plaquetas propias cubiertas de autoanticuerpos. De acuerdo a la GPC de Púrpura Trombocitopénica Inmunológica, las opciones rectoras como tratamiento inicial o de rescate veloz son los corticosteroides sistémicos de curso corto, o si el paciente requiere un pico muy rápido plaquetario, el uso imperativo de \"una sola dosis de IgG IV (800 mg o 1g/kg)\" o la \"inmunoglobulina Anti-D\" en pacientes con Rh positivo y bazo intacto.<br><br>Perla ENARM: Cuadro 7. Opciones de tratamiento de primera línea en niños: Si requieren tratamiento administrar una sola dosis de IgG IV o Anti-D... En especial utilizar IgG IV si se requiere un incremento rápido de plaquetas.<br><br>Análisis de Distractores: A) Las transfusiones plaquetarias están contraindicadas casi universalmente en etiologías inmunes, pues el anticuerpo circulante fagocitará las nuevas plaquetas en horas (generando fiebre o riesgo aloinmune sin subir el conteo), utilizándose exclusivamente en hemorragias letales de SNC (Grado 5). C y D) El Rituximab (anticuerpo anti-CD20 destructor de clones B) y la Ciclofosfamida son agentes potentes considerados terapias de segunda y tercera línea en esquemas crónicos refractarios de larga evolución, careciendo de la velocidad requerida para frenar un sangrado pediátrico de novo urgente.",
        source: "IMSS-143-19 RR, Diagnóstico y Tratamiento de Púrpura Trombocitopénica Inmunológica, 2019, Tratamiento, Cuadro 7, Página 18."
    },
    {
        id: 130,
        question: "En la estratificación patológica del adenocarcinoma de próstata de acuerdo al moderno sistema internacional ISUP (Grupos de Grado), ¿qué puntaje anatómico celular de Gleason categoriza ineludiblemente al tumor dentro de la letal franja del \"Grupo 5\"?",
        options: ["Score de Gleason 6", "Score de Gleason 7 (4+3)", "Score de Gleason 9 o 10", "Score de Gleason 8"],
        answer: 2,
        justification: "Justificación: La reclasificación del ISUP (International Society of Urological Pathology) en el año 2014 buscó correlacionar directamente el riesgo biológico real en 5 grupos, evitando el miedo oncológico del paciente ante los \"Gleason bajos\" que son en realidad tumores indolentes. De acuerdo a la GPC de Cáncer de Próstata, el eslabón final y más ominoso, el \"Grupo de Grado 5\", alberga la desdiferenciación histológica casi total (ausencia franca de glándulas asimilables a la próstata), y correlaciona de manera exclusiva con los carcinomas que arrojan patrones muy primitivos equivalentes al \"Score de Gleason 9 o 10\" (ej. 4+5, 5+4, 5+5).<br><br>Perla ENARM: Cuadro 10. Sistema de clasificación por grupo ISUP: Grupo de Grado 5 -> Score de Gleason 9 ó 10.<br><br>Análisis de Distractores: A) Un Gleason basal 6 (3+3) comprende glándulas bien conformadas sin atipias nucleares aberrantes y dictamina el grupo más leve: ISUP Grupo 1. B) El patrón Gleason dominante 4 sumado al patrón menor 3 que dan como total 7, representan el grado intermedio desfavorable: ISUP Grupo 3. D) El score total sumado de Gleason 8 (con componentes 4+4, o 3+5) integra estrictamente el grupo anatómico adyacente previo: ISUP Grupo 4.",
        source: "IMSS-140-18 RR, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Anexos, Cuadro 10, Página 15."
    },
    {
        id: 131,
        question: "En la consulta externa de Medicina Familiar, un paciente diabético con Enfermedad Arterial Periférica se encuentra bajo tratamiento intensivo preventivo basal de la GPC a base de pravastatina y ácido acetilsalicílico. Si durante sus evaluaciones semestrales no reporta mejoría alguna en la claudicación intermitente de la marcha, ¿cuál es el paso mandatorio indicado por el algoritmo terapéutico?",
        options: ["Añadir cilostazol y pentoxifilina indefinidamente antes de derivar", "Referencia inmediata al segundo o tercer nivel de atención", "Programar amputación infracondílea profiláctica temprana", "Incrementar sistemáticamente el ácido acetilsalicílico a 300 mg"],
        answer: 1,
        justification: "Justificación: La enfermedad claudicante arterial que es refractaria al manejo conservador médico representa una oclusión ateromatosa mecánica crítica inminente. De acuerdo a la GPC de Enfermedad Arterial Periférica de Miembros Inferiores, el diagrama de flujo detalla que si tras el uso de ASA y estatinas el paciente \"¿Presenta mejoría?: NO\", el médico de cabecera debe evitar prolongar inútilmente el daño orgánico isquémico e instruir el \"Envío a segundo nivel: Cirugía General o Angiología\". Allí se le realizarán estudios de Doppler o angiografía para definir una angioplastia endovascular o una derivación con injerto de vena safena.<br><br>Perla ENARM: Algoritmo de atención EAP: Tratamiento farmacológico ASA + Estatinas -> ¿Presenta mejoría? -> NO -> Envío a segundo nivel: Cirugía General o Angiología.<br><br>Análisis de Distractores: A) Aunque el cilostazol y la pentoxifilina poseen propiedades reológicas que extienden el umbral de dolor al caminar, la directriz en el algoritmo mexicano puntualiza el envío especialista ante el fracaso directo de la pauta primera, antes de agotar meses ensayando con terapias vasodilatadoras aisladas en un miembro de salvataje. C) La amputación es el paso último catastrófico de remoción focal indicado solo por sepsis de una extremidad engangrenada irreversible terminal (Fontaine IV), nunca como profilaxis por claudicación en primer nivel. D) La megadosis empírica de Aspirina no mejora la reología estenótica luminal, sino que potencia dramáticamente la hemorragia de tubo digestivo en senectos.",
        source: "IMSS-007-08 RR, Enfermedad Arterial Periférica, 2008, Algoritmo Terapéutico, Página 12."
    },
    {
        id: 132,
        question: "Al interrogar a un paciente geriátrico utilizando la escala validada de Lawton & Brody para medir su grado de capacidad en las Actividades Instrumentales de la Vida Diaria (AIVD), ¿qué puntaje sumario se le otorga al ítem si es \"capaz de contestar el teléfono cuando suena, pero es incapaz de marcar o buscar números por sí mismo\"?",
        options: ["3 puntos", "2 puntos", "1 punto", "0 puntos"],
        answer: 2,
        justification: "Justificación: La autonomía para interactuar con la sociedad retrasa la institucionalización de los ancianos y objetiva la pérdida ejecutiva. De acuerdo a la GPC de Diabetes Mellitus en el Adulto Mayor, el cuestionario de Lawton y Brody asigna un puntaje de \"1 o 0\" a los parámetros interrogados. Dentro del dominio 1 \"Capacidad para usar el teléfono\", la tabla es concesiva y otorga el logro de \"1 punto\" si el paciente utiliza el aparato por propia iniciativa, o si al menos \"es capaz de contestar el teléfono, pero no marcar\", ya que esto demuestra preservación de la asociación sonora-motora y auditiva básica ante el medio exterior. Se castiga con un \"0\" únicamente si \"no utiliza el teléfono para nada\".<br><br>Perla ENARM: Escala de Lawton & Brody: Capacidad para usar el teléfono: Es capaz de contestar el teléfono, pero no marcar -> (1 punto).<br><br>Análisis de Distractores: A y B) Distractores numéricos espurios, ya que la estructura binomial de calificación de esta herramienta confiere como tope absoluto de éxito para un mismo reactivo funcional solo 1 punto. D) Cero puntos asume la postración cognitiva o sordera profunda comunicativa total donde el anciano desconoce el aparato o no reacciona al repique entrante (\"No utiliza el teléfono\").",
        source: "IMSS-657-21 RR, Diagnóstico y Tratamiento de Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Cuadro 7, Página 52."
    },
    {
        id: 133,
        question: "Durante el monitoreo de un paciente diagnosticado con EPOC empleando el cuestionario clínico estandarizado CAT, ¿qué puntuación numérica máxima otorga el paciente si su cuadro obstructivo lo hace concordar de manera total y en el extremo máximo con la aseveración \"Toso todo el tiempo\"?",
        options: ["10 puntos", "3 puntos", "5 puntos", "4 puntos"],
        answer: 2,
        justification: "Justificación: El COPD Assessment Test (CAT) evalúa la magnitud del menoscabo físico de la EPOC a través de 8 ítems, guiando el inicio de oxigenoterapia o antimuscarínicos de larga duración (LAMA). De acuerdo a la GPC de EPOC, cada pregunta exige que el paciente posicione su estado en una escala visual de Likert progresiva que discurre invariablemente del 0 al 5. Seleccionar la aseveración catastrófica terminal en el reactivo de la tos productiva (\"Toso todo el tiempo\"), en contraste con \"Nunca toso\" (0), otorga matemáticamente \"5 puntos\" puros de morbilidad al rubro correspondiente.<br><br>Perla ENARM: Cuadro 7. Cuestionario CAT: \"Yo nunca toso (0) --- Toso todo el tiempo (5)\".<br><br>Análisis de Distractores: A) Las escalas de gravedad general sobre 10 (tipo EVA) no concuerdan con la rigurosa calibración Likert de seis peldaños del sistema neumológico CAT. B y D) 3 y 4 puntos denotan una afección moderada o molesta que requiere intervención (por ejemplo, \"Toso varias veces al día de forma importante\"), pero el extremo máximo de declive anatómico crónico siempre escala a los 5 puntos definitivos de la columna en la GPC.",
        source: "IMSS-037-21 RR, Prevención y Diagnóstico de EPOC, 2021, Anexos, Cuadro 7, Página 13."
    },
    {
        id: 134,
        question: "En un paciente añoso que cursa con fibrilación auricular no valvular de moderado a alto riesgo tromboembólico, que es candidato a anticoagulación y que posee depuración de creatinina normal, ¿cuál es la dosis oral estándar y validada para prescribir el fármaco inhibidor directo de trombina, Dabigatrán?",
        options: ["20 miligramos en una toma cada 24 horas", "5 miligramos administrados cada 12 horas", "150 miligramos administrados cada 12 horas", "60 miligramos en dosis de una vez al día"],
        answer: 2,
        justification: "Justificación: La protección del lecho vascular cerebral requiere mantener concentraciones de pico y valle estables de los Anticoagulantes Orales Directos (DOAC). De acuerdo a la GPC de Anticoagulación Oral, en la gráfica de Riesgo de Evento Vascular (basada en el ensayo clínico magno RE-LY), la dosis meta para garantizar la eficacia antienzimática total de la sal Dabigatrán frente a embolismo, en pacientes sin riesgo hemorrágico fragilizante grave ni falla renal terminal, es estrictamente de \"150 mg / 2 x día\" (150 mg cada 12 horas).<br><br>Perla ENARM: Gráfica Riesgo FA de los DOACS: Dabigatrán 150 mg/2 x día.<br><br>Análisis de Distractores: A) La indicación empírica de 20 mg cada 24 horas (una toma al día) delata el régimen propio y exclusivo del inhibidor del Factor Xa, el fármaco Rivaroxabán. B) Los 5 mg ingeridos de forma dividida (cada 12 horas) representan la posología dorada, segura y con menor sangrado digestivo atribuible al compuesto Apixabán. D) La pauta de 60 miligramos al día obedece y corresponde singularmente a las dosis del anticoagulante de uso diario único Edoxabán.",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Anexos, Gráfica Comparativa, Página 56."
    },
    {
        id: 135,
        question: "En la vigilancia de complicaciones anímicas tras el infarto isquémico cerebral utilizando la Escala Hospitalaria de Ansiedad y Depresión (HAD), ¿a partir de qué puntuación clínica total acumulada se certifica un diagnóstico positivo para el síndrome depresivo de alta sospecha?",
        options: ["Menor a 7 puntos", "Mayor de 15 puntos", "Entre 8 y 10 puntos", "Mayor a 11 puntos"],
        answer: 3,
        justification: "Justificación: La depresión post-EVC ralentiza y boicotea irremediablemente el reacondicionamiento biomecánico del hemisferio paretico y castiga la mortalidad a un año. De acuerdo a la GPC de Rehabilitación en Evento Vascular Cerebral, el test HAD se desglosa en puntajes que cortan matemáticamente el riesgo de letargo o ideas suicidas subyacentes. El tabulador de severidad precisa tajantemente que: de 0 a 7 indica indemnidad neuropsiquiátrica, de 8 a 10 muestra un caso dudoso, y un puntaje \"Mayor de 11 puntos\" ( >11 ) es la marca inequívoca e imperativa que define positividad biológica clínica, obligando a prescribir terapias recaptadoras de serotonina y enviarlo a psicoterapia.<br><br>Perla ENARM: Escala HAD. Interpretación Puntuación HAD-A y HAD-D: <7 normal, 8-10 dudoso, >11 diagnóstico clínico de ansiedad o depresión.<br><br>Análisis de Distractores: A) Un puntaje menor de 7 atestigua un vigor homeostático resiliente e intacto en el circuito serotoninérgico del ánimo y cognición frente a la adversidad aguda. B) Mayor a 15 puntos excede el dintel diagnóstico requerido y podría reflejar una puntuación de otras pruebas de índole demencial/cognitiva pura ajena al corte del HAD. C) El intervalo ajustado entre 8 y 10 puntos aísla y cataloga temporalmente al paciente en el estrato ambiguo \"dudoso\", requiriendo observación mensual, pero no decreta el estatus formal definitivo o intervención medicamentosa súbita por psiquiatría.",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos después de un Evento Vascular Cerebral, 2021, Anexos, Escala HAD, Página 6."
    },
    {
        id: 136,
        question: "Según las pautas del sistema de estratificación FIGO/TNM aplicadas a una paciente con cáncer cervicouterino agresivo, ¿qué criterio anatomoclínico confiere de forma automática la estadificación inoperable de etapa clínica IVa?",
        options: ["Metástasis pulmonares y nódulos óseos francos", "Invasión celular circunscrita al estroma miometrial superior", "Extensión neoplásica que penetra la pared lateral de la pelvis", "Invasión documentada de la mucosa de la vejiga urinaria"],
        answer: 3,
        justification: "Justificación: El cáncer cervical avanzado invade por infiltración directa y contigüidad desmoplásica anatómica. De acuerdo a la GPC de Cáncer Cervicouterino, la etapa clínica IV abandona el límite uterino ginecológico y engloba diseminaciones destructivas. De manera rigurosa, el estadio \"IVa\" (T4 en TNM) está delimitado y otorgado a aquella masa exofítica o endofítica que penetra anterior o posteriormente, perforando e invadiendo directamente la \"mucosa del recto o de la vejiga\" (que debe confirmarse típicamente mediante fístula, hematuria, cistoscopia o proctoscopia con biopsia).<br><br>Perla ENARM: Cuadro Estadificación FIGO: Estadio IVa: Extensión del tumor a los órganos adyacentes (mucosa de la vejiga o recto). T4 M0.<br><br>Análisis de Distractores: A) La infiltración hematógena o metastásica a pulmón, hígado o huesos lejanos (M1 sistémico) sobrepasa la pelvis, sentenciando a la mujer a una incurable y ominosa etapa IVb terminal sistémica. B) La invasión puramente miometrial central, el segmento inferior, o la contención macroscópica pélvica conservada a cérvix corresponde invariablemente al abanico de estadios incipientes locales o locorregionales I y II. C) El congelamiento por fibrosis e invasión carcinomatosa franca de la resistente \"pared lateral de la pelvis\" (fijación al tacto o provocando hidronefrosis renal unilateral) determina inequívocamente al importante Estadio IIIb para braquiterapia.",
        source: "IMSS-333-09 RR, Diagnóstico y Tratamiento del Cáncer Cervicouterino, 2009, Anexos, Cuadro TNM, Página 25."
    },
    {
        id: 137,
        question: "Durante la rehabilitación ortopédica para asegurar una deambulación independiente en el domicilio tras una artroplastia total de rodilla, ¿cuál es la instrucción biomecánica obligatoria que el paciente debe seguir para \"subir\" de manera segura un escalón utilizando muletas?",
        options: ["Subir simultáneamente las muletas, el miembro operado y la pierna sana con impulso fuerte", "Apoyar la muleta en el escalón y subir propulsando el cuerpo únicamente con la pierna recién operada", "Colocar firmemente la pierna no operada y utilizar su fuerza de impulso ascendente para arrastrar la operada", "Apoyar las manos sin muleta sobre el barandal para cargar toda la ingravidez en ambas rótulas"],
        answer: 2,
        justification: "Justificación: Reeducar la marcha periprotésica articular evita la avulsión dolorosa de los componentes y la claudicación del aparato extensor (cuádriceps) debilitado. De acuerdo a la GPC de Artroplastia Total de Rodilla, el fisioterapeuta emite las \"Instrucciones del manejo del paciente en domicilio\". La instrucción 6 (Inicio al subir escaleras) es metódica y conservadora: el individuo debe evitar flexiones agudas cargando peso en el implante, por lo cual se indica \"apoyando con firmeza las muletas y la pierna no operada para iniciar\", es decir, la extremidad sana (\"no operada\") actúa como pilar propulsor elevando el tronco, y subsecuentemente la rodilla de titanio (operada) sube relajada y sin tensión a encontrarse con ella en el nivel superior.<br><br>Perla ENARM: 6.-Inicio al subir escaleras, el cual se realizará apoyando con firmeza las muletas y la pierna no operada para iniciar (y arrastrar) con la pierna operada.<br><br>Análisis de Distractores: A y D) Intentar escalar usando la rodilla quirúrgica inflamada como vector de propulsión de 80 kilos corporales garantiza dolor extremo y fallo muscular por inhibición refleja dolorosa (cediendo la rodilla y descalabrando al anciano por los peldaños). B) Subir las muletas y traccionar todo con salto sin la base fuerte muscular nativa altera el polígono estático ortosimpático seguro de \"3 puntos cruzados de sustentación ortopédica\".",
        source: "IMSS-435-18 RR, Diagnóstico y Tratamiento de Osteoartrosis y Artroplastia de Rodilla, 2018, Anexos, Página 45."
    },
    {
        id: 138,
        question: "En las normativas intrahospitalarias de seguridad del \"Manejo Hemático del Paciente\", se define la aparición de anemia aguda yatrogénica secundaria a la toma rutinaria o prolongada de muestras venosas para exámenes (flebotomía). ¿Qué porcentaje del Volumen Sanguíneo Total (VST) perdido o acumulativo en una semana instaura este daño patológico?",
        options: ["Mayor del 5% del VST", "Mayor del 20% del VST", "Mayor del 2% del VST", "Mayor del 10% del VST"],
        answer: 3,
        justification: "Justificación: Las tomas excesivas de laboratorio en unidades de cuidados intensivos, cirugías neonatales o de adultos sin emplear micro-tubos, generan un colapso en la hematopoyesis funcional (\"vampirismo médico\"). De acuerdo a la GPC de Manejo de la Sangre y PBM (citando a la norma oficial mexicana de la sangre), la iatrogenia exanguinante o \"Pérdida aguda por flebotomía para estudios\" se tipifica formalmente cuando las sumatorias numéricas de tubos rebasan y configuran \"una pérdida aguda mayor al 10% del volumen sanguíneo total\" ya sea en horas o acumulada de manera consecutiva en el transcurso \"de una semana o menos\", precipitando choque o indicación transfusional en infantes o críticos.<br><br>Perla ENARM: Criterios: Pérdida aguda mayor al 10% del volumen sanguíneo total (VST) por flebotomía para estudios de laboratorio o cualquier otra causa de sangrado con una pérdida acumulativa en una semana o menos.<br><br>Análisis de Distractores: A y C) El drenaje acumulativo de apenas el 2 o 5% del VST (aprox 100-250 ml en un adulto de 70 kg) lo repone el organismo por auto-transfusión intersticial de líquidos esplénicos sin manifestar anemia hemodinámica crítica desestabilizadora formal yatrógena evaluable clínicamente. B) Extrapolar pasivamente al 20% describe el umbral o límite que activa la clase II de shock hemorrágico por traumatismo (choque compensado taquicárdico), y representaría una negligencia descomunal de sangrado laboratorial intencional.",
        source: "IMSS-362-18 RR, Manejo de Componentes Sanguíneos, 2018, Anexos, Página 32."
    },
    {
        id: 139,
        question: "Al ejecutar de manera estricta el Test del Estado Mental de Folstein (MMSE) para objetivar el declive de un síndrome demencial incipiente, el evaluador entrega al paciente una hoja en blanco y le pide: \"Copie este dibujo\". Para que el reactivo goce de validez técnica y otorgue el punto estandarizado, ¿qué figura geométrica protocolizada inalterable ha de replicar el anciano?",
        options: ["Un cilindro romboidal en relieve y sombreado", "Dos pentágonos entrelazados", "Un triángulo que enmarca y encierra a un círculo", "Un cuadrado tridimensional perspectivo y sombreado"],
        answer: 1,
        justification: "Justificación: El constructo espacial y la apraxia de diseño exigen interconectar ambos hemisferios parietales para el análisis visual perceptivo en la demencia de Alzheimer. De acuerdo a la GPC de Alzheimer, la rigidez del Mini-Mental (para descartar variantes de otras pruebas psicométricas) prohíbe la invención gráfica espontánea por el tratante. La única imagen autorizada e impresa para el ítem constructivo es la \"figura de dos pentágonos\" trazados con líneas en color negro. La condición obligatoria de acreditación total (\"1 punto\") demanda no solo los cinco lados y cinco vértices de cada uno, sino que las aristas conjuntas obligatoriamente se intersecten generando un polígono cuadrangular \"formando un diamante\" central.<br><br>Perla ENARM: Copie este dibujo (1 punto): Cada pentágono debe tener 5 lados y 5 vértices y la intersección forma un diamante.<br><br>Análisis de Distractores: A, C y D) Dibujar de forma analítica el cubo o cilindro tridimensional representa el sello psicométrico clásico de la prueba paralela Montreal Cognitive Assessment (MoCA), herramienta que indaga a mayor profundidad dominios de abstracción frontales y volúmenes, no siendo un ítem calificador dentro del examen convencional y rígido MMSE de 30 puntos.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Instrucciones y Puntuación MMSE, Página 36."
    },
    {
        id: 140,
        question: "En el paciente obstétrico o traumático masivo en el que se documenta una hemorragia mayor, se solicita de urgencia un examen de tromboelastometría rotacional (ROTEM) para detectar la falta de sustrato hemostático (coagulopatía por agotamiento). ¿Qué marcador físico del canal de Fibrinógeno (FIB) se instaura como el umbral de disparo biológico para indicar infusión inmediata de Fibrinógeno intravenoso sintético o crioprecipitados?",
        options: ["Amplitud de oscilación A5EX mayor de 55 milímetros en 10 minutos", "Tiempo de Coagulación EXTEM que rebase los 120 segundos iniciales", "Amplitud de oscilación A5FIB que resulte inferior o menor a 12 milímetros", "Incremento masivo compensatorio del ángulo Alfa cinético"],
        answer: 2,
        justification: "Justificación: En la resucitación controlada de hemorragias por metas viscoelásticas (ROTEM), no se empacha al paciente empíricamente con plasmas congelados que diluyen la circulación. El primer eslabón consumido y más sensible a desplomarse es la red polimérica de Fibrinógeno. De acuerdo a la GPC de Optimización de la Sangre (Patient Blood Management), si tras agregar factor tisular, el coágulo en el canal FIB a los cinco minutos (A5FIB) dibuja un ancho o amplitud tensional física precaria de \"menor a 12 milímetros\" de grueso, este hallazgo denota carencia absoluta de cimientos para tapar el sangrado. Esto es la señal irrefutable y precisa para preescribir de \"1a elección Concentrado de fibrinógeno o Crioprecipitados\" sobre cualquier otra medida para restaurar el polígono.<br><br>Perla ENARM: Algoritmo 5. ROTEM y Sangrado grave: ¿A5FIB < 12 mm? -> SI -> 1ª elección: Concentrado de fibrinógeno 25-50 mg/kg ó Crioprecipitados.<br><br>Análisis de Distractores: A) Valores de engrosamiento por encima de 55 o 60 milímetros certifican un coágulo robusto, fibrótico e íntegro (eufibrinogenemia e indemnidad plaquetaria), bloqueando enteramente el uso de sangre aógena adicional por no ser requerida mecánicamente. B) El alargamiento inicial del \"Tiempo de Coagulación\" (CT), que supera los umbrales de latencia permitida (CT_EX prolongado), documenta de forma objetiva la falla del gatillo enzimático extrínseco o intoxicación anticoagulante, indicando la reposición por factor protrombínico (CCP), no de fibrinógeno en hilos puros. D) Un ángulo alfa ensanchado verticalmente denota velocidad y calidad de reacción explosiva adecuada formadora del tapón hemostático, traduciendo normalidad, no un déficit de sustrato en sangre exanguinante.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Algoritmo 5 (Manejo viscoelástico), Página 75."
    },
    {
        id: 141,
        question: "¿Qué disciplina física se recomienda como punto de buena práctica para favorecer el apego a la actividad física y reducir la recurrencia, una vez concluido el tratamiento agudo del dolor lumbar inespecífico?",
        options: ["Natación de impacto en estilo crol", "Programas de Tai Chi, Yoga o Pilates", "Halterofilia progresiva de baja carga", "Ejercicios isocinéticos en cadena cerrada"],
        answer: 1,
        justification: "Justificación: La rehabilitación del dolor lumbar busca restaurar la biomecánica de la columna y el fortalecimiento del núcleo (core) abdominal sin generar estrés cizallante sobre los discos intervertebrales. De acuerdo a la GPC de Rehabilitación del Dolor Lumbar, el acondicionamiento físico debe basarse en principios de estabilización rítmica. La directriz estipula explícitamente que la incorporación a programas milenarios de control motor y propiocepción (Tai Chi, Yoga y Pilates) fomenta la adherencia a largo plazo y previene las incapacidades laborales recurrentes una vez que el episodio agudo ha cedido.<br><br>Perla ENARM: El uso de programas de Tai Chi, Yoga y Pilates puede recomendarse en pacientes con dolor lumbar inespecífico para favorecer el apego a programas de actividad física una vez concluido el tratamiento.<br><br>Análisis de Distractores: A) Aunque la natación es un ejercicio de bajo impacto articular general excelente, el estilo libre o crol exige rotación axial y extensión cervical iterativa, lo que puede reactivar facetas espinales lesionadas; la GPC no lo cataloga como el estándar de oro conductual para este padecimiento. C y D) La halterofilia (levantamiento de pesas) y los ejercicios isocinéticos focalizados en maquinaria rígida requieren arcos de hipertrofia severa que pueden desencadenar un espasmo lumbosacro secundario en pacientes con disfunción muscular previa o \"banderas amarillas\".",
        source: "DIF-313-19 RR, Rehabilitación del Dolor Lumbar Inespecífico, 2019, Intervenciones de Terapia, Página 8."
    },
    {
        id: 142,
        question: "En la evaluación del neurodesarrollo motor grueso de un infante en la consulta pediátrica, ¿cuál es la edad cronológica esperada y considerada normal por la guía para que el paciente logre el hito de la \"marcha independiente\"?",
        options: ["A los 12 meses", "A los 18 meses", "A los 15 meses", "A los 11 meses"],
        answer: 2,
        justification: "Justificación: La evaluación estructurada del neurodesarrollo descarta parálisis cerebral o síndromes genéticos. De acuerdo a la GPC de Alteraciones del Neurodesarrollo y Estimulación Temprana, la verticalización del humano es progresiva. A los 11 meses, el lactante presenta \"deambulación si se le lleva de la mano\"; a los 12 meses consolida la bipedestación firme sin ayuda; pero el dominio total de la marcha sin soportes, esquivando pequeños obstáculos, catalogado estandarizadamente en la tabla como \"Marcha independiente\", alcanza su margen fisiológico de normalidad evaluativa a los 15 meses de edad.<br><br>Perla ENARM: Hitos motores (no se puntúan): Deambulación: Marcha independiente (normal a los 15 m).<br><br>Análisis de Distractores: A) A los 12 meses, la respuesta neurológica obligada es aguantar el peso en bipedestación (postura ortostática) o caminar rozando muebles, pero la marcha libre sostenida no es el estándar exigible normativamente a esta edad precoz. B) Si el paciente no camina de manera independiente a los 18 meses, constituye una bandera roja de retraso psicomotor evidente, superando con creces la barrera límite de los 15 meses dictada por la GPC. D) A los 11 meses se presenta la fase transicional de inestabilidad donde el niño \"Camina si se le lleva de la mano\", pero no de forma autónoma.",
        source: "DIF-332-18 RR, Detección de Alteraciones del Neurodesarrollo, 2018, Anexos, Cuadro de Hitos, Página 20."
    },
    {
        id: 143,
        question: "En el abordaje oncológico de un varón con cáncer de próstata resistente a la castración que cursa con metástasis viscerales demostradas, dolor severo y progresión rápida de la enfermedad, ¿cuál es la terapia citotóxica primaria de elección?",
        options: ["Acetato de abiraterona oral", "Terapia celular con Sipuleucel-T", "Isótopo radioactivo Radium-223", "Quimioterapia con Docetaxel"],
        answer: 3,
        justification: "Justificación: El cáncer de próstata avanzado que burla el bloqueo androgénico primario (resistente a la castración) posee un mal pronóstico y exige citorreducción sistémica letal. De acuerdo a la GPC de Cáncer de Próstata, el Algoritmo 2 divide a los pacientes según su sintomatología. Si el individuo cursa con \"Dolor, progresión rápida (tiempo de duplicación de PSA corto), metástasis viscerales y un Gleason >8\", el estado hiper-agresivo de la clona neoplásica obliga a omitir los antiandrógenos de nueva generación e indica el inicio contundente de quimioterapia intravenosa basada en taxanos, siendo el \"Docetaxel\" la única rama directa en este rubro.<br><br>Perla ENARM: Algoritmo 2. Cáncer de próstata resistente a la castración: ¿Presenta sintomatología? Dolor, progresión rápida, metástasis viscerales, Gleason >8 -> Docetaxel.<br><br>Análisis de Distractores: A) La Abiraterona (inhibidor del CYP17A1) o la Enzalutamida son fármacos hormonales excelentes de primera línea, pero el algoritmo los reserva estrictamente para el brazo de pacientes que cursan \"Asintomáticos y sin metástasis viscerales letales\". B) El Sipuleucel-T es una inmunoterapia que prolonga discretamente la supervivencia en pacientes con escasa o nula carga sintomática, siendo inútil ante crisis viscerales fulminantes. C) El Radium-223 es un radiofármaco buscador de hueso (alfaterapia), exclusivo y protocolizado únicamente para pacientes con \"metástasis óseas sintomáticas y SIN metástasis viscerales\", por lo que en este caso clínico está descartado.",
        source: "IMSS-140-18 RR, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Algoritmos, Página 11."
    },
    {
        id: 144,
        question: "Durante el escrutinio de complicaciones psiquiátricas en la fase de recuperación de un evento vascular cerebral mediante la Escala Hospitalaria de Ansiedad y Depresión (HAD), el ítem número 7 evalúa la capacidad de disfrute. Si el paciente responde que es capaz de disfrutar su programa de televisión \"Pocas veces\", ¿qué valor numérico parcial recibe?",
        options: ["3 puntos", "2 puntos", "1 punto", "0 puntos"],
        answer: 1,
        justification: "Justificación: El test HAD suprime deliberadamente los síntomas somáticos de la depresión (como insomnio o pérdida de peso) que en un paciente con EVC o postrado podrían confundirse con la enfermedad física per se, centrándose exclusivamente en la anhedonia y cognición pura. De acuerdo a la GPC de Rehabilitación Post-EVC, el ítem \"D.7. Soy capaz de disfrutar con un buen libro o programa\" califica la anhedonia profunda con una matriz de Likert invertida: si disfruta a menudo (0 puntos), algunas veces (1 punto), si lo logra \"Pocas veces\" recibe la calificación de gravedad intermedia de \"2 puntos\", y si su respuesta es casi nunca (3 puntos máximos).<br><br>Perla ENARM: Escala HAD. D.7. Soy capaz de disfrutar con un buen libro o con un buen programa de radio o televisión: 0) A menudo 1) Algunas veces 2) Pocas veces 3) Casi nunca.<br><br>Análisis de Distractores: A) 3 puntos obedece a la incapacidad emocional total dictada por la opción \"Casi nunca\". C) 1 punto corresponde al individuo que aún preserva el mecanismo hedonista de recompensa \"Algunas veces\". D) 0 puntos refleja indemnidad en este circuito de placer cortical, ya que el paciente disfruta de sus pasatiempos \"A menudo\".",
        source: "DIF-331-21 RR, Rehabilitación Integral de Adultos Post-EVC, 2021, Anexos, Escala HAD, Página 37."
    },
    {
        id: 145,
        question: "En el contexto de un paciente portador de fibrilación auricular que requiere cardioversión por presentar edema pulmonar agudo e isquemia inminente (inestabilidad hemodinámica), ¿cuál es el manejo anticoagulante inicial dictado por el algoritmo previo al choque eléctrico de urgencia?",
        options: ["Administrar Heparina/HBPM o dosis oral de Anticoagulante Directo (AOD)", "Administrar amiodarona en infusión rápida y observar", "Impregnación masiva con warfarina y puenteo endovenoso", "Suspender toda intervención hasta contar con ecocardiograma transesofágico"],
        answer: 0,
        justification: "Justificación: La fibrilación auricular inestable anula el tiempo de ventana electiva para mapear trombos en la orejuela. La falla de bomba inminente prioriza la restauración del ritmo sinusal. De acuerdo a la GPC de Anticoagulación Oral, el \"Algoritmo 2\" divide a los pacientes inestables (con angina, choque o edema pulmonar). En ellos, la \"Cardioversión eléctrica de urgencia\" no puede esperar 3 semanas. Para atenuar el fenómeno de aturdimiento auricular post-choque, se dictamina imperativamente que, de manera simultánea o inmediata a la descarga, se debe \"Heparinizar (HBPM) o dar dosis oral de un AOD\", para asegurar una hemostasia frenada al retomar la sístole auricular mecánica.<br><br>Perla ENARM: Algoritmo 2. Cardioversión Urgente (Inestable): -> Heparina/HBPM o Dosis oral de AOD -> Cardioversión eléctrica de urgencia -> 4 semanas de anticoagulación.<br><br>Análisis de Distractores: B) La amiodarona es útil para la cardioversión farmacológica electiva o ritmo, pero no previene el inminente tromboembolismo cerebral asociado al reinicio del latido, requiriendo el blindaje heparínico. C) La warfarina toma de 3 a 5 días biológicos en alcanzar niveles terapéuticos de INR (agotando los factores II, VII, IX y X), siendo inútil en el choque de los primeros minutos de urgencias. D) El ecocardiograma transesofágico (ETE) se solicita exclusivamente en el paciente \"Estable\" con FA de alto riesgo en quien se planea una \"Cardioversión electiva\" y se desea evitar el esquema engorroso de 3 semanas previas de anticoagulación. En la urgencia vital inestable, este estudio se omite.",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Algoritmo 2, Página 8."
    },
    {
        id: 146,
        question: "En la interpretación del electrocardiograma de un paciente masculino cursando con un Infarto Agudo de Miocardio con elevación del segmento ST, ¿qué localización anatómica miocárdica se confirma si la supradesnivelación se documenta exclusivamente en las derivaciones posteriores V7, V8 y V9?",
        options: ["Infarto de localización posterior o inferobasal", "Infarto masivo del ventrículo derecho", "Infarto focal de la región lateral alta", "Infarto extenso de la cara anterior septal"],
        answer: 0,
        justification: "Justificación: Las derivaciones estándar del electrocardiograma de 12 derivaciones a menudo fallan en ver el territorio irrigado por la arteria circunfleja o la coronaria derecha distal, presentándose falsamente normales. De acuerdo a la GPC de Infarto Agudo de Miocardio (IAMCEST), el uso de electrodos suplementarios espaciales es mandatorio ante dolor típico sin cambios frontales. La tabla topográfica anatómica correlaciona ineludiblemente a las derivaciones de la espalda \"V7, V8 y V9\" con el territorio puro de \"Posterior, dorsal o inferobasal\", que suele acompañarse en las derivaciones derechas frontales (V1-V2) de una imagen en espejo con \"R de alto voltaje y desnivel negativo del ST\".<br><br>Perla ENARM: Localización del infarto: Posterior, dorsal o inferobasal -> Derivaciones electro-anatómicas implicadas: V7, V8, V9.<br><br>Análisis de Distractores: B) El compromiso isquémico del ventrículo derecho, sumamente sensible a los nitratos de forma letal, se diagnóstica aislando derivaciones precordiales derechas espejo: V3R y V4R. C) El infarto del margen lateral alto se diagnostica primordialmente observando el vector de despolarización en las derivaciones bipolares y unipolares de los miembros: DI y aVL. D) La cara anterior y septal masiva se correlaciona con la arteria descendente anterior y arroja sus vectores lesivos directamente sobre toda la parrilla precordial estándar: de V1 a V6.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Anexos, Cuadro de Topografía, Página 41."
    },
    {
        id: 147,
        question: "Dentro de la clasificación citogenética y molecular de la Leucemia Aguda Linfoblástica en la edad pediátrica (sistema MIC), ¿qué marcador genético o traslocación cromosómica define a la variante fenotípica letal \"L3\" o leucemia de células B madura?",
        options: ["t(8;14)", "t(15;17)", "inv(16)(q23)", "t(9;22)"],
        answer: 0,
        justification: "Justificación: La Leucemia Linfoblástica Aguda subtipo L3 (células tipo Burkitt, vacuoladas y con expresión de inmunoglobulinas de superficie) posee un comportamiento sumamente agresivo. De acuerdo a la GPC de Leucemias Agudas en Pediatría, el Cuadro 1 \"Clasificación MIC (Morfológica, Inmunológica, Citogenética)\", acopla la celularidad FAB a su huella genética molecular. Se estipula que el \"Grupo MIC: LAL de células B madura (L3)\", arroja invariablemente positividad en su cariotipo a la traslocación de oncogenes \"t(8;14)\", así como marcadores menos comunes t(2;8) o t(8;22), siendo dependiente de la sobreexpresión de c-MYC.<br><br>Perla ENARM: Cuadro 1. Sistema MIC: LAL células B madura (L3) -> Marcador Inmunológico: Ig k/l -> Cariotipo: t(2;8), t(8;14), t(8;22).<br><br>Análisis de Distractores: B) La t(15;17) es la impronta diagnóstica universal y exclusiva de la Leucemia Mieloide Aguda Promielocítica (tipo M3 de la FAB). C) La inv(16)(q23) define de forma patognomónica a la Leucemia Mieloide Aguda variante Mielomonocítica con eosinofilia anómala (tipo M4 Eo). D) La t(9;22), generadora del gen quimérico bcr-abl o Cromosoma Filadelfia, domina a la Leucemia Mieloide Crónica y clasifica a la LAL de precursores temprana (LAL Común / LAL Pre-B), no a la L3 de células B maduras tipo Burkitt.",
        source: "SS-061-08 RR, Diagnóstico de Leucemia Aguda en Pediatría, 2008, Anexos, Cuadro 1, Página 71."
    },
    {
        id: 148,
        question: "Durante la atención clínica del periodo expulsivo en una mujer primigesta de bajo riesgo obstétrico, ¿cuál es la intervención postural inmediata recomendada por la guía si las instalaciones de la sala hospitalaria lo permiten?",
        options: ["Favorecer activamente el parto en posición vertical", "Indicar la posición clásica supina de litotomía", "Situar a la madre en decúbito lateral con la cadera elevada", "Colocarla en cuclillas asistida por fórceps perineales"],
        answer: 0,
        justification: "Justificación: La biomecánica del parto fisiológico dicta que la gravedad favorece el encajamiento, acorta el tiempo del expulsivo y reduce dramáticamente la compresión aortocava que genera sufrimiento fetal en decúbito. De acuerdo a la GPC de Vigilancia y Manejo del Trabajo de Parto, el \"Algoritmo 3. Vigilancia y manejo del periodo expulsivo\", contiene un nodo de decisión crítico que evalúa el entorno de la unidad médica: \"¿Cuenta con infraestructura para un parto vertical?\". Si la respuesta es SÍ, la directriz normativa dicta imperativamente: \"Favorezca el parto vertical\" como un modelo de atención amigable, fisiológica y segura que reduce desgarros y uso de oxitócicos.<br><br>Perla ENARM: Algoritmo 3: ¿Cuenta con infraestructura para un parto vertical? -> SÍ -> Favorezca el parto vertical.<br><br>Análisis de Distractores: B) La posición tradicional impuesta de litotomía favorece la comodidad visual del cirujano, pero anatómicamente estrecha los diámetros pélvicos, empuja el coxis hacia adentro y aumenta el dolor sacro de la paciente, por lo que su imposición rutinaria está siendo abolida. C) El decúbito lateral izquierdo mejora la perfusión placentaria durante la fase de dilatación latente, pero carece de ventaja de pujo y gravedad durante la expulsión clímax cefálica frontal. D) La instrumentación obstétrica (fórceps, espátulas) debe reservarse exclusivamente para escenarios mecánicos complicados o fatiga extrema (período expulsivo prolongado), contraindicándose su uso abusivo de rutina o mezclado inopinadamente con posturas amigables nativas.",
        source: "IMSS-052-19 RR, Vigilancia y Manejo del Trabajo de Parto, 2019, Algoritmo 3, Página 22."
    },
    {
        id: 149,
        question: "Tras culminar un exitoso periodo de rehabilitación por artroplastia total de rodilla, se programa la transición de la marcha del paciente, progresándolo de usar un par de muletas al uso de un solo bastón ortopédico. Para garantizar la carga biomecánica y el equilibrio adecuado, ¿en qué lado debe indicarse al paciente que sostenga el bastón?",
        options: ["En la mano ipsilateral a la extremidad recién intervenida", "Obligatoriamente en la mano opuesta a la rodilla operada", "En el lado dominante de acuerdo a la destreza del enfermo", "Siempre en la mano derecha sin importar qué rodilla sea"],
        answer: 1,
        justification: "Justificación: La transición del uso del dispositivo de asistencia es crítica para simular el braceo fisiológico de la marcha humana natural (donde el brazo izquierdo se balancea junto a la pierna derecha en fase de choque de talón). De acuerdo a la GPC de Artroplastia de Rodilla, en el manual de instrucciones de egreso a domicilio del paciente operado, la regla de ortopedia mecánica es férrea: \"Una vez dominadas las muletas se retiran las mismas, dejando por último un bastón en la mano opuesta a la rodilla operada en forma definitiva de ser posible\". Esto permite que el apoyo del bastón reciba la carga simultáneamente cuando el paciente da el paso y somete a estrés a la rodilla metálica convaleciente, ampliando la base de sustentación en un triángulo estable.<br><br>Perla ENARM: Instrucciones de manejo en domicilio: 8.- Una vez dominadas las muletas se retiran las mismas dejando por ultimo un bastón en la mano opuesta a la rodilla operada en forma definitiva.<br><br>Análisis de Distractores: A) Llevar el bastón en la misma mano de la rodilla enferma (\"marcha de oso o en ambladura\") inclina gravemente el centro de gravedad hacia la cadera lesionada cada vez que se levanta la pierna sana, induciendo escoliosis antiálgica y precipitando caídas catastróficas por debilidad lateral del músculo glúteo medio. C y D) La destreza motriz fina (lateralidad zurda o diestra) no rige la biomecánica estática de descarga de peso ortopédica; asimismo, dictaminar una mano fija para cualquier lado ignora el fundamento de compensación cruzada cruzada.",
        source: "IMSS-435-18 RR, Osteoartrosis y Artroplastia Total de Rodilla, 2018, Anexos, Página 45."
    },
    {
        id: 150,
        question: "Durante la evaluación psiquiátrica de un adulto en etapa subaguda tras un infarto cerebral vascular, el clínico decide utilizar la Escala de Montgomery-Asberg (MADRS). ¿Qué constructo psicológico o estado patológico se evalúa específicamente en el reactivo número 10 de este instrumento?",
        options: ["Tristeza esporádica e invariabilidad emocional", "Autocusaciones persistentes y ruina moral", "Pensamientos suicidas e intenciones preparatorias", "Dificultad generalizada para concentrarse"],
        answer: 2,
        justification: "Justificación: El instrumento MADRS de Montgomery-Asberg tiene un diseño clínico agudo para discriminar el núcleo biológico del trastorno depresivo mayor en pacientes orgánicos. De acuerdo a la GPC de Rehabilitación Post-EVC, esta escala se estratifica en 10 rubros directos. El reactivo cúspide final, el ítem número \"10. Pensamientos suicidas\", evalúa de manera minuciosa \"el sentimiento de que no vale la pena vivir, que desearía que le llegara una muerte natural, pensamientos suicidas y preparativos para el suicidio\", graduándolo desde \"disfruta de la vida\" (0) hasta la planeación sistemática de la muerte \"con oportunidad específica\" (6).<br><br>Perla ENARM: Escala MADRS: Ítem 10. Pensamientos suicidas. Representa el sentimiento de que no vale la pena vivir, que desearía que le llegara una muerte natural, pensamientos suicidas y preparativos para el suicidio.<br><br>Análisis de Distractores: A) La tristeza aparente, esporádica u observada por el clínico y el paciente, se califica analíticamente al inicio de la escala (Ítems 1 y 2: Tristeza observada y declarada). B) Los sentimientos de culpabilidad irrazonable frente a los familiares, autorreproche y pesimismo infundado corresponden puntualmente a la valoración del rubro previo (Ítem 9: Pensamientos pesimistas). D) La atención lábil, la desestructuración del hilo de pensamiento y el colapso de la función cortical ejecutiva sostenida conforman el reactivo de fase cognitiva del test (Ítem 6: Dificultades para concentrarse).",
        source: "DIF-331-21 RR, Rehabilitación de Adultos post-EVC, 2021, Anexos, Figura 10, Página 37."
    },
    {
        id: 151,
        question: "Al aplicar la prueba de cribaje neurológico \"Mini-Mental State Examination (MMSE)\" a un paciente con quejas subjetivas de fallas de memoria, se ingresa al apartado de \"Concentración y Cálculo\", solicitando que reste de 7 en 7 a partir del 100. ¿Cuál es el puntaje máximo estadísticamente alcanzable que puede sumar este bloque si la ejecución es perfecta?",
        options: ["3 puntos", "2 puntos", "7 puntos", "5 puntos"],
        answer: 3,
        justification: "Justificación: El MMSE penaliza rígidamente la inatención del lóbulo frontal. De acuerdo a la GPC de Alzheimer, en este inciso se insta al paciente a retener el número en su memoria de trabajo, realizar el cálculo aritmético en reversa, y decirlo en voz alta sin perder el flujo (ej. 93, 86, 79, 72, 65). El clínico debe detenerlo en el quinto intento secuencial matemático y calificar \"un punto por cada resta que sea correcta (incluso si la anterior arrastraba un error base)\". El peso total validado de este complejo dominio dentro de los 30 puntos globales de la prueba, es de \"5 puntos máximos\", constituyendo uno de los rubros con mayor valor estadístico predictivo discriminativo del test de Folstein.<br><br>Perla ENARM: MMSE. CONCENTRACIÓN Y CÁLCULO: \"Le voy a pedir que reste de 7 en 7 a partir del 100.\" (Máximo 5 puntos).<br><br>Análisis de Distractores: A) 3 puntos obedece exclusivamente al límite máximo numérico impuesto para otros apartados mucho más cortos: como el registro y \"Fijación\" (repetir tres palabras), o el recuerdo diferido y \"Memoria\" de esas mismas tres palabras. B) 2 puntos representa el total otorgado en el apartado semántico de \"Lenguaje\" a la acción de denominar visualmente dos objetos cotidianos (reloj y bolígrafo). C) 7 puntos actúa únicamente como el dígito aritmético que funge como distractor lógico para la orden clínica operativa, careciendo de cabida como sumatoria real del instrumento, pues el límite funcional de todo ítem en la prueba no sobrepasa el 5.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Figura de MMSE, Página 44."
    },
    {
        id: 152,
        question: "Durante la exploración física neurológica de la musculatura apendicular en un lactante para descartar hipertonía, ¿qué gesto kinesiológico estandarizado debe realizar el explorador para efectuar la maniobra semiológica de la \"Elevación pasiva del hombro\"?",
        options: ["Levantar el brazo hasta que quede completamente alineado con la cabeza", "Mover forzadamente el antebrazo en movimientos rotacionales asimétricos", "Traccionar las extremidades inferiores simultáneamente hacia arriba", "Arrastrar el hombro por detrás del cuello como en postura de paracaídas"],
        answer: 0,
        justification: "Justificación: La asimetría tensional temprana en los arcos de movimiento pasivo alerta sobre lesiones del plexo braquial, parálisis cerebral o atrofia espinal. De acuerdo a la GPC de Alteraciones del Neurodesarrollo, se dictan maniobras protocolizadas y graduadas. La exploración técnica designada para la \"Elevación pasiva del hombro\" instruye y restringe la acción mecánica a \"levantar el brazo hasta que quede alineado con la cabeza\", exigiendo al examinador \"observar detenidamente la resistencia que imponga tanto el nivel del hombro como la articulación del codo\" frente a esta expansión cefálica pasiva máxima, documentando la flacidez o el acortamiento.<br><br>Perla ENARM: Cuadro de Tono Muscular: Elevación pasiva del hombro -> Levantar el brazo hasta que quede alineado con la cabeza. Observar la resistencia a nivel del hombro y del codo.<br><br>Análisis de Distractores: B) Forzar de manera intencionada rotaciones crudas o rotacionales cruzadas del antebrazo sobre su propio eje constituye formalmente a la maniobra neurológica catalogada como de \"Pronación/supinación\". C) Levantar simultáneamente el miembro oponente inferior desde la pelvis carece de correlato con el cíngulo superior, formando parte del bloque de signos ciáticos (Lasegue) o de laxitud del ángulo poplíteo pediátrico, no del brazo. D) La suspensión y abducción tónica antigravitacional posterior en los miembros superiores responde al estímulo de caída libre del reflejo y \"reacción de Paracaídas\".",
        source: "DIF-332-18 RR, Neurodesarrollo y Estimulación Temprana, 2018, Anexos, Exploración del Tono Muscular, Página 18."
    },
    {
        id: 153,
        question: "Para medir el estado de dependencia de un adulto mayor diagnosticado con Diabetes, el equipo multidisciplinario decide aplicar la escala de las Actividades Instrumentales de la Vida Diaria (Lawton & Brody). ¿Qué calificación parcial otorga la herramienta si, durante la entrevista, el paciente refiere ser capaz de preparar su propia comida si el cuidador le deja los ingredientes ya provistos?",
        options: ["Cero puntos", "Un punto", "Dos puntos", "Tres puntos"],
        answer: 1,
        justification: "Justificación: La escala de Lawton & Brody estratifica las habilidades ejecutivas cognitivo-motoras del anciano que le permiten sobrevivir solo en casa. Su diseño matemático, aunque parece complejo por las opciones múltiples de deterioro que plantea cada reactivo, posee una estructura rígidamente dicotómica de validación de independencia. De acuerdo a la GPC de Diabetes en el Adulto Mayor, en el dominio \"Preparación de la comida\", el paciente que \"Prepara la comida si se le dan los ingredientes\" preserva la lógica de la secuenciación calórica en fogones, y por ello el instrumento le confiere el logro numérico tope de independencia parcial de \"1 punto\". Solo el individuo que necesita que le preparen todos los alimentos y se los sirvan al plato recibe el cero punitivo de invalidez total.<br><br>Perla ENARM: Escala Lawton & Brody: Preparación de la comida. Planea, prepara y sirve comida adecuada / Prepara la comida si se le dan los ingredientes -> 1 punto. Calienta y sirve comida preparada, o prepara la comida, pero no dieta balanceada -> 1 punto. Necesita que le preparen y sirvan la comida -> 0. (La escala se puntúa de 0 a 1).<br><br>Análisis de Distractores: A) Un cero se adjudica letalmente en el momento en que el adulto mayor es biológicamente incapaz de encender la estufa, requiriendo que los alimentos sean enteramente provistos y llevados en estado comestible a la mesa (\"Necesita que le preparen y le sirvan su comida\"). C y D) Las calificaciones de dos o tres puntos representan sesgos técnicos en la memorización de escalas (como el ECOG o el Barthel); la herramienta paramétrica específica de Lawton y Brody suma hasta 8 puntos totales globales, pero cada ítem unitario (esfuerzo, teléfono, dinero, lavado, lavandería) tiene un techo intrínseco restrictivo de calificación de \"un máximo de 1 punto único\", jamás más.",
        source: "IMSS-657-21 RR, Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Anexos, Escala Lawton y Brody, Página 52."
    },
    {
        id: 154,
        question: "En el cribaje oftalmológico intrahospitalario previo al egreso de todo recién nacido sano en piso, es obligatorio realizar una prueba instrumental de descarte para detectar leucocorias sugerentes de retinoblastoma o catarata congénita grave. ¿Con qué nombre clínico o epónimo estandarizado se le conoce a esta evaluación dictada por la GPC?",
        options: ["Examen isométrico de Cover-Uncover", "Test de sensibilidad de Hirschberg", "Prueba del reflejo rojo de Brückner", "Examen campimétrico de Amsler"],
        answer: 2,
        justification: "Justificación: La detección de la opacidad en los medios transparentes del ojo neonatal y masas orbitarias fetales salva la vida y la visión. De acuerdo a la GPC de Cuidados del Recién Nacido Sano y Patología Ocular, el tamizaje precoz, universal y obligatorio con el oftalmoscopio directo en el lactante antes de salir del hospital se fundamenta legalmente en realizar \"la prueba del reflejo rojo binocular (prueba de Brückner)\". El médico emite el haz de luz desde una distancia corta, y la asimetría o blanqueamiento del reflejo anaranjado (retinal sano) amerita interconsulta y referencia oftalmológica aguda en el resumen de alta de forma imperativa.<br><br>Perla ENARM: Se debe realizar la prueba del reflejo rojo binocular (prueba de Brückner), y anotar en la hoja de alta el resultado.<br><br>Análisis de Distractores: A) La prueba de Cover-Uncover, que requiere ocluir alternadamente los campos de los ojos, evalúa el tono y alineamiento muscular de los pares craneales oculomotores para cazar endotropias, estrabismos y forias latentes o patentes en la infancia tardía cooperadora, no densidades vítreas del cunero primario. B) La herramienta fotorreactiva corneal de Hirschberg proyecta un estímulo limínico hacia el puente nasal de la pupila, verificando la centralidad reflexiva simétrica simétrica para descartar pseudoestrabismos o bizquera, no para escudriñar la luz del fondo vitreo y retiniano vascular subyacente. D) La cartilla visual estática cuadrangular de la Rejilla de Amsler constituye el test cardinal protocolizado para los ancianos seniles con degeneración macular (verificando la deformación de la mancha central ciega y líneas rectas retorcidas), resultando físicamente imposible de efectuar en un infante preverbal en llanto.",
        source: "SS-226-20 RR, Cuidados en el Recién Nacido, 2020, Recomendaciones de Alta, Página 74."
    },
    {
        id: 155,
        question: "Al atender en la consulta a una mujer adulta diagnosticada con Diabetes Mellitus tipo 2 que acude a revisión sin haber logrado la meta de la GPC (Mantiene una Hemoglobina Glucosilada de 8.8%) pese a encontrarse con apego óptimo estricto a un régimen triple oral (metformina, glibenclamida y pioglitazona). El médico decide el fracaso farmacológico del paso previo e indica inicio de insulina basal NPH. ¿Cuál es el cálculo milimétrico en kilogramos estipulado como dosis inicial en este salto de peldaño normativo?",
        options: ["0.5 unidades internacionales por kg de peso", "0.8 unidades internacionales por kg de peso", "0.1 unidades internacionales por kg de peso", "0.2 unidades internacionales por kg de peso"],
        answer: 3,
