            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegación
        function navigateQuestion(currentId, direction) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (direction === 'prev' && currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else if (direction === 'next' && currentIndex < questionsData.length - 1) {
                displayQuestion(questionsData[currentIndex + 1].id);
            } else {
                displayQuestion(null); // Tablero
            }
        }

        // Lógica de colores del Grid dependiente del estado del examen
        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            
            // FASE 1: SIMULADOR EN CURSO (Sin retroalimentación)
            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";
                } else {
                    // Marcamos que ya se contestó, pero sin decir si es correcto o no
                    return base + "bg-slate-600 text-white border-slate-700 dark:bg-slate-700 dark:border-slate-600 shadow-inner";
                }
            } 
            // FASE 2: EXAMEN FINALIZADO (Mostrar Calificación)
            else {
                if (!state || !state.answered) {
                    return base + "bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700";
                } else {
                    const isCorrect = state.selectedOption === questionsData.find(q=>q.id === qId).answer;
                    if (isCorrect) {
                        return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
                    } else {
                        return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
                    }
                }
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // Finalizar y Calificar
        function finishExam() {
            examState.isFinished = true;
            localStorage.setItem('simulador1ExamState', JSON.stringify(examState));
            displayQuestion(null);
        }

        // --- PANTALLA PRINCIPAL (TABLERO) ---
        function displayWelcomeScreen() {
            document.getElementById('dashboard-button').classList.add('hidden');
            document.getElementById('menu-toggle').classList.add('hidden');
            
            const displayArea = document.getElementById('module-display');
            const total = questionsData.length;
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            
            let correct = 0;
            if (examState.isFinished) {
                correct = Object.keys(userProgress).filter(id => {
                    const qData = questionsData.find(q => q.id === parseInt(id));
                    return userProgress[id].answered && userProgress[id].selectedOption === qData.answer;
                }).length;
            }

            const successRate = total > 0 && ans > 0 ? Math.round((correct / ans) * 100) : 0;
            const allAnswered = ans === total;
            let firstUncompletedId = questionsData.find(q => !userProgress[q.id]?.answered)?.id || 1;

            // Textos y estados visuales dinámicos
            let titleText = examState.isFinished ? "¡Simulador Finalizado!" : "Simulador ENARM";
            let descText = examState.isFinished 
                ? "Has completado la evaluación. Revisa tu desempeño y analiza la justificación clínica de cada caso en el tablero general." 
                : "La calificación y la justificación clínica se mostrará hasta que decidas finalizar el examen.";
            
            let actionBtn = "";
            if (examState.isFinished) {
                actionBtn = `<button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white border border-white/30 px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Reiniciar Simulador</button>`;
            } else {
                actionBtn = `
                    <button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-900/30 transition-transform hover:-translate-y-0.5 mr-3">
                        ${ans === 0 ? 'Iniciar Simulador' : 'Continuar Examen'}
                    </button>
                    <button onclick="document.getElementById('finish-modal').classList.remove('hidden')" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-rose-900/30 transition-transform hover:-translate-y-0.5">
                        Finalizar y Calificar
                    </button>
                `;
            }

            let badgeText = examState.isFinished ? "RESULTADOS DISPONIBLES" : "MODO SIMULADOR ACTIVO";
            let badgeClass = examState.isFinished ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";

            // Renderizado Estadísticas (Oculto si no ha finalizado)
            let statsHTML = "";
            if (examState.isFinished) {
                statsHTML = `
                    <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                        <div>
                            <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                            <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                        </div>
                        <div>
                            <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                            <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                        </div>
                        <div class="px-2">
                            <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                            <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                            <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos / Respondidas</p>
                        </div>
                    </div>
                `;
            } else {
                statsHTML = `
                    <div class="w-full text-center py-4">
                        <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Avance General</p>
                        <p class="text-4xl sm:text-5xl font-black text-white">${ans}<span class="text-xl sm:text-2xl text-slate-500">/${total}</span></p>
                        <div class="w-full bg-slate-700/50 rounded-full h-2 mt-4 overflow-hidden">
                            <div class="bg-blue-400 h-2 rounded-full" style="width: ${(ans/total)*100}%"></div>
                        </div>
                    </div>
                `;
            }

            // Leyendas del tablero dinámicas
            let legendHTML = examState.isFinished ? `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
            ` : `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-50 border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700/50"></div> Pendiente</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-600 border border-slate-700"></div> Respondida</div>
            `;

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-6xl mx-auto lg:mt-0">
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                            Regresar al Menú Principal
                        </a>
                    </div>

                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500">
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left w-full lg:w-3/5">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass}">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 ${examState.isFinished ? 'text-emerald-400' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium mx-auto lg:mx-0">${descText}</p>
                                <div class="mt-8 flex justify-center lg:justify-start flex-wrap gap-4">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col items-center shadow-2xl w-full lg:w-2/5">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                ${legendHTML}
                            </div>
                        </div>
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- GESTIÓN DE PANTALLA DE PREGUNTA ---
        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                
                if (currentQuestionId) {
                    localStorage.setItem('simulador1LastQId', currentQuestionId);
                } else {
                    localStorage.removeItem('simulador1LastQId');
                }

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');
                    dashboardBtn.classList.add('lg:left-[22rem]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                renderQuestionView(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        // Vista Universal de la Pregunta (Se adapta si está finalizado o en curso)
        function renderQuestionView(qData) {
            const qState = userProgress[qData.id];
            const hasAnswered = qState && qState.answered;
            const userAnswer = hasAnswered ? qState.selectedOption : null;
            
            let isCorrect = false;
            if (examState.isFinished && hasAnswered) {
                isCorrect = userAnswer === qData.answer;
            }

            let borderClass = "border-slate-200 dark:border-slate-800";
            if (examState.isFinished && hasAnswered) {
                borderClass = isCorrect ? "border-t-[5px] border-emerald-500" : "border-t-[5px] border-rose-500";
            }

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border ${borderClass} max-w-4xl mx-auto mt-0">
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    <form id="q-form-${qData.id}" class="space-y-3 mb-6">
            `;

            // Mapeo de Opciones
            qData.options.forEach((opt, i) => {
                // Modo Examen Finalizado
                if (examState.isFinished) {
                    let optClasses = "flex items-start p-3 sm:p-4 border rounded-xl ";
                    let icon = "";
                    
                    if (i === qData.answer) {
                        optClasses += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                        icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                    } else if (i === userAnswer) {
                        optClasses += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                        icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                    } else {
                        optClasses += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                    }

                    html += `
                        <div class="${optClasses}">
                            <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                            ${icon}
                        </div>
                    `;
                } 
                // Modo Simulación Activa
                else {
                    const checkedStr = (hasAnswered && userAnswer === i) ? 'checked' : '';
                    html += `
                        <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/20 shadow-sm hover:shadow" onclick="autoSaveAnswer(${qData.id})">
                            <input type="radio" name="option" value="${i}" ${checkedStr} class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                            <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                        </label>
                    `;
                }
            });

            html += `</form>`;

            // Bloque de Justificación (SÓLO SI EL EXAMEN TERMINÓ)
            if (examState.isFinished) {
                html += `
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>
                `;
            }

            // Botonera Inferior
            const isLastQuestion = qData.id === questionsData[questionsData.length - 1].id;
            
            html += `
                    <div class="flex justify-between items-center pt-4 border-t border-slate-100 dark:border-slate-800">
                        <button onclick="navigateQuestion(${qData.id}, 'prev')" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Anterior
                        </button>
                        
                        ${examState.isFinished ? `
                            ${!isLastQuestion ? `
                                <button onclick="navigateQuestion(${qData.id}, 'next')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-xl transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                    Siguiente <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            ` : `
                                <button onclick="displayQuestion(null)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-xl transition-colors text-sm uppercase tracking-wider">
                                    Ver Resultados
                                </button>
                            `}
                        ` : `
                            <button onclick="saveAndNext(${qData.id})" class="bg-blue-600 dark:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-700 dark:hover:bg-blue-400 transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        // Funciones de Guardado en Modo Simulación
        function autoSaveAnswer(qId) {
            if(examState.isFinished) return;
            const form = document.getElementById(`q-form-${qId}`);
            const selected = form.querySelector('input[name="option"]:checked');
            if (selected) {
                userProgress[qId] = { answered: true, selectedOption: parseInt(selected.value) };
                saveState();
                updateProgressBar();
                renderSidebarGrid(); // Refresca el cuadro lateral en gris oscuro
            }
        }

        function saveAndNext(qId) {
            autoSaveAnswer(qId);
            navigateQuestion(qId, 'next');
        }

        // Utilidades de Estado y Progreso
        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; 
            }
        }

        function saveState() {
            try {
                localStorage.setItem('simulador1Progress', JSON.stringify(userProgress));
            } catch(e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('simulador1Progress');
                userProgress = saved ? JSON.parse(saved) : {};
                
                const savedState = localStorage.getItem('simulador1ExamState');
                if (savedState) {
                    examState = JSON.parse(savedState);
                }
            } catch(e) { userProgress = {}; examState = { isFinished: false }; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
