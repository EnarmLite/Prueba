        justification: "Justificación: El objetivo primario en enfermedad vascular de gran vaso periférico es mitigar el accidente ateroesclerótico mortal del lecho carotídeo y coronario concomitante. De acuerdo a la GPC de Enfermedad Arterial Periférica, el médico estratega en primer nivel (Medicina Familiar) no debe demorar el tratamiento estabilizador anti-placa para aquellos con sospecha afianzada de isquemia intermitente. La indicación prioritaria que marca textualmente el diagrama resolutivo es la doble acción: iniciar hipolipemiantes suaves (Pravastatina 20 mg cada 24 hrs) co-administrado sistemáticamente con antiagregación basal (Ácido Acetilsalicílico 150 mg cada 24 hrs) para asegurar sobrevida mientras se gestiona su valoración arterial quirúrgica.<br><br>Perla ENARM: Algoritmo \"Tratamiento farmacológico: Pravastatina 20 mg c/24 hr, ASA 150 mg c/24 hr\".<br><br>Análisis de Distractores: A) El clopidogrel es una segunda opción de prevención secundaria y el cilostazol mejora los tiempos de marcha, pero no representan el recuadro explícito de intervención protocolaria universal en primera fase del flujograma de la GPC nacional. C) La heparina y enoxaparina responden al entorno crítico isquémico de la embolia aguda (enfermedad arterial aguda, los 6 \"Ps\") que destruye el miembro, no a la prevención secundaria ambulatoria o de claudicación estable crónica. D) Los vasodilatadores crónicos en parches transdérmicos carecen de cabida científica probada porque paradójicamente \"roban\" el flujo en las extremidades colaterales para la isquemia periférica.",
        source: "IMSS-007-08 RR, Claudicación en Enfermedad Arterial Periférica, 2008, Anexos, Página 3."
    },
    {
        id: 39,
        question: "En un paciente que acude a la unidad portando un hallazgo ecográfico de tiromegalia y múltiples nódulos difusos a tensión, y que cuenta con indicación protocolizada para Biopsia por Aspiración con Aguja Fina, ¿cuál es la restricción técnica numérica que el profesional intervencionista no debe exceder?",
        options: ["Extracción tisular citológica guiada de un máximo de cuatro ganglios adyacentes", "No someter a un mismo paciente a la biopsia de más de 2 nódulos tiroideos", "Efectuar punciones ciegas a ciegas hasta documentar atipias Bethesda V", "Puncionar estrictamente cada nódulo ecogénicamente sólido identificado"],
        answer: 1,
        justification: "Justificación: En el bocio multinodular o ante glándulas con profuso componente nodular benigno y mixto en degeneración de volumen, la agresividad diagnóstica citológica debe balancear la sensibilidad con la reducción del daño inflamatorio tisular yatrógeno y de punciones vasculares hemorrágicas. De acuerdo a la GPC de Nódulo Tiroideo, el nivel de intervención estipula como Punto Clave el hecho que, si el cuadro clínico implica puncionar, se requiere focalizarse exclusivamente en los de mayor diámetro (más un centímetro) o aquellos con las características ecográficas francas de alto riesgo (hipoecogenicidad o halo ausente). Por mandato de seguridad radiológica intervencionista, bajo ninguna circunstancia se justifica realizar una \"biopsia de más de 2 nódulos en el mismo paciente\" durante una sesión.<br><br>Perla ENARM: Recomendaciones: No realizar biopsia de más de 2 nódulos en el mismo paciente. (Recomendación tipo C).<br><br>Análisis de Distractores: A) El abordaje a 4 ganglios rompe la norma y confunde punciones oncológicas ganglionares terapéuticas masivas de vaciamiento de cuello (procedimientos muy formales o quirúrgicos intraoperatorios definitivos). C) El escrutinio a ciegas para el tiroides a día de hoy está penalizado; toda biopsia ha de respaldarse forzosamente mediante localización y seguimiento activo en tiempo real por el ecógrafo cervical. D) Pinchar compulsivamente \"cada nódulo detectado\" promueve complicaciones hemáticas locales severas (hematoma sofocante del cuello), dolor somático masivo post punción o crisis raras de liberación hormonal.",
        source: "IMSS-354-09 RR, Nódulo Tiroideo en Adultos, 2009, Tratamiento, Página 27."
    },
    {
        id: 40,
        question: "Dentro del sistema organizativo de referencia ante la valvulopatía reumática, ¿qué nivel o subsistema ostenta la indicación de recibir y dar seguimiento a los pacientes en caso de manifestar dificultad seria o refractaria al manejo con esquemas de anticoagulantes orales prescritos?",
        options: ["Clínica subespecializada albergada en el tercer nivel cardiológico", "Valoración subsecuente en el segundo nivel de atención regional", "Cuidados paliativos multidisciplinarios alojados en primer nivel", "Retorno obligado a centro de cirugía torácica de primer contacto"],
        answer: 1,
        justification: "Justificación: La optimización y sostenimiento del cociente internacional normalizado (INR) previene los temidos estragos trombóticos obstructivos de una prótesis mitral o de la fibrilación auricular secundaria a fiebre reumática crónica. De acuerdo a la GPC de la Patología Valvular Mitral, se emiten lineamientos claros sobre la canalización hospitalaria de fallas en estas metas bioquímicas de la coagulación. El texto puntualiza explícitamente a los médicos de red que se \"Refiera al paciente de primer a segundo nivel de atención a pacientes con dificultad para el manejo de anticuagulantes orales\". Esto promueve un ajuste oportuno por especialidades troncales como Medicina Interna o Hematología sin saturar la cardiología intervencionista avanzada.<br><br>Perla ENARM: Refiera al paciente de primer a segundo nivel de atención a pacientes con dificultad para el manejo de anticuagulantes orales (PBP).<br><br>Análisis de Distractores: A) Remitir la dificultad al manejo anticoagulante crónico puro al tercer nivel saturaría las camas de supraespecialidad; a tercer nivel se derivan las fallas de índole exclusivamente quirúrgico o de deterioro por insuficiencia cardíaca descompensada a cirugía. C) Las clínicas paliativas domiciliarias del primer nivel gestionan final de vida oncológica o del dolor grave; las alteraciones protrombóticas curables carecen del estatuto de fase patológica refractaria letal insuperable. D) Retornar un enfermo a su origen para este fin o mandarlo a cirugía carece de pertinencia, pues la complicación deriva estrictamente del régimen médico, no del fallo mecánico del injerto valvular implantado.",
        source: "IMSS-235-09 RR, Patología Válvula Mitral, 2009, Referencia, Página 20."
    },
    {
        id: 41,
        question: "En un paciente que ingresa a urgencias con emergencia hipertensiva secundaria a sospecha de disección aórtica aguda, ¿cuál es el esquema farmacológico intravenoso de primera línea indicado para el control hemodinámico?",
        options: ["Esmolol o labetalol asociado a nitroprusiato de sodio", "Furosemida en infusión asociada a nitroglicerina", "Labetalol en monoterapia con titulación rápida", "Dinitrato de isosorbide asociado a bloqueadores de calcio"],
        answer: 0,
        justification: "Justificación: La disección aórtica aguda es una emergencia catastrófica donde la fuerza de cizallamiento (dP/dt) de la pared arterial debe reducirse drásticamente, controlando primero la frecuencia cardíaca y posteriormente la presión arterial sistólica. De acuerdo a la GPC de Crisis Hipertensivas, se debe evitar el uso de vasodilatadores puros (como el nitroprusiato aislado) como primera acción, ya que generan taquicardia refleja que empeora el desgarro. El algoritmo exige iniciar el abordaje con un beta bloqueador (esmolol o labetalol) y asociarlo a un vasodilatador potente.<br><br>Perla ENARM: Se sugiere en pacientes con emergencia hipertensiva y disección aórtica el tratamiento sea a base de esmolol o labetalol asociado a nitroprusiato de sodio o con nitroglicerina.<br><br>Análisis de Distractores: B) La furosemida asociada a nitroglicerina o nitroprusiato es la terapia de primera línea específica para la emergencia hipertensiva que cursa con Edema Agudo Pulmonar (EAP) cardiogénico. C) El labetalol en monoterapia es el fármaco de primera línea sugerido para el paciente con hemorragia intracerebral aguda y tensión arterial sistólica >220 mmHg. D) El dinitrato de isosorbide es un tratamiento de segunda línea reservado para emergencias hipertensivas con evento coronario agudo.",
        source: "SS-155-20 RR, Diagnóstico y Tratamiento de las Crisis Hipertensivas, 2020, Tratamiento, Página 6."
    },
    {
        id: 42,
        question: "En la persona adulta mayor diagnosticada con Diabetes Mellitus tipo 2 que es catalogada dentro del \"Grupo 3\" (pobre estado de salud, enfermedad renal terminal o dependencia grave), ¿cuál es la meta estricta de Hemoglobina Glucosilada (HbA1c) recomendada?",
        options: ["Menor a 7.5%", "Menor a 8.5%", "Menor a 8.0%", "Menor a 7.0%"],
        answer: 1,
        justification: "Justificación: El abordaje geriátrico de la diabetes exige abandonar el paradigma del control estricto universal, ya que la hipoglucemia genera mayor mortalidad, caídas y deterioro cognitivo que la hiperglucemia permisiva. De acuerdo a la GPC de Diabetes Mellitus en el Adulto Mayor, los pacientes se estratifican en tres grupos. El Grupo 3 engloba a pacientes con pobre estado de salud, demencia moderada-grave, dependencia en actividades básicas (ABVD) o enfermedad renal en etapa terminal. En ellos, el control es más laxo y el objetivo primordial es evitar la hipoglucemia y la glucosuria sintomática.<br><br>Perla ENARM: Grupo 3: Persona adulta mayor con pobre estado de salud... Se recomienda un control glucémico menos estricto con metas: HbA1c menor a 8.5%, Glucosa de ayuno 100-180 mg/dL.<br><br>Análisis de Distractores: A) Menor a 7.5% es la meta glucémica estricta para el Grupo 1 (adulto mayor con buen estado de salud, sin fragilidad y cognición intacta). C) Menor a 8.0% es la meta de control intermedio para el Grupo 2 (estado de salud regular, frágiles, con 3 o más comorbilidades o dependencia instrumental). D) Menor a 7.0% es la meta histórica general de la ADA para adultos jóvenes, pero está formalmente desaconsejada en la normativa geriátrica avanzada.",
        source: "IMSS-657-21 RR, Diabetes Mellitus 2 en la Persona Adulta Mayor, 2021, Metas de Control, Página 9."
    },
    {
        id: 43,
        question: "Al evaluar a un paciente hospitalizado que cursa con neumonía grave relacionada a la infección por virus de la Influenza, ¿contra qué patógeno bacteriano específico se debe incluir cobertura empírica si se sospecha adquisición intrahospitalaria?",
        options: ["Acinetobacter baumannii multirresistente", "Staphylococcus aureus resistente a meticilina", "Pseudomonas aeruginosa productora de carbapenemasas", "Streptococcus pneumoniae con resistencia a penicilina"],
        answer: 1,
        justification: "Justificación: La coinfección bacteriana es la principal causa de letalidad en los pacientes que desarrollan síndrome de distrés respiratorio por influenza. El daño del epitelio ciliar viral facilita la invasión estafilocócica y neumocócica severa (neumonía necrotizante). De acuerdo a la GPC de Influenza Estacional, el clínico debe adelantarse al cultivo. Si la neumonía co-infecciosa se presenta en un entorno intrahospitalario, la normativa exige cobertura empírica directa contra Staphylococcus aureus resistente a meticilina (SARM), a diferencia del entorno comunitario donde basta cubrir S. aureus meticilino sensible.<br><br>Perla ENARM: Se recomienda la cobertura empírica para SARM en la neumonía relacionada a la influenza, en pacientes con sospecha de adquisición hospitalaria.<br><br>Análisis de Distractores: A y C) Acinetobacter y Pseudomonas son patógenos típicos de la Neumonía Asociada al Ventilador (NAV), pero la sinergia fisiopatológica clásicamente descrita y normada con el virus de la influenza está dominada por S. aureus y S. pneumoniae. D) S. pneumoniae es un agente de coinfección comunitaria, pero en el escenario hospitalario dictado, la guía hace énfasis explícito en cambiar el espectro hacia SARM.",
        source: "SS-384-20 RR, Prevención, Diagnóstico y Tratamiento de la Influenza Estacional, 2020, Tratamiento, Página 10."
    },
    {
        id: 44,
        question: "Durante la aplicación del Mini Examen del Estado Mental (MMSE), existe un ítem que requiere que el paciente copie el dibujo de dos pentágonos intersectados. ¿Cuál es el criterio académico para poder omitir formalmente esta pregunta sin penalizar la prueba?",
        options: ["Pacientes con alteraciones de refracción visual no corregidas", "Pacientes con menos de 3 años de escolaridad formal", "Pacientes que presentan temblor en reposo o rigidez severa", "Pacientes con antecedente de infarto cerebral de la arteria cerebral media"],
        answer: 1,
        justification: "Justificación: El MMSE tiene un sesgo inherente al nivel educativo del paciente, afectando particularmente los rubros de lectura, escritura y habilidades visuoespaciales complejas. De acuerdo a la GPC de Alzheimer, tanto la instrucción \"Quiero que por favor escriba una frase que diga un mensaje\" como la de \"Copie el dibujo tal cual está (pentágonos)\" están condicionadas al grado académico básico adquirido a lo largo de la vida, para no confundir analfabetismo funcional o dispraxia educativa con demencia cortical franca.<br><br>Perla ENARM: PREGUNTA -Copie el dibujo tal cual está. Esta pregunta se omitirá para pacientes con menos de 3 años de educación.<br><br>Análisis de Distractores: A) Las alteraciones visuales se previenen pidiendo al paciente que use sus lentes y mejorando la iluminación del consultorio, pero no justifican la omisión automática del ítem en la calificación. C) Los trastornos del movimiento extrapiramidal (Parkinson) dificultan el trazo, pero no son un criterio normativo de exclusión para el dominio de construcción; el paciente debe intentar recrear los ángulos. D) El infarto cerebral puede generar apraxia constructiva o negligencia, lo cual es precisamente un hallazgo neurológico que la prueba busca objetivar, no omitir.",
        source: "IMSS-393-10 RR, Enfermedad de Alzheimer, 2010, Anexos, Página 54."
    },
    {
        id: 45,
        question: "Para prevenir bacteriemias durante el retiro de una sonda vesical de larga evolución en pacientes femeninas, ¿qué fármaco se recomienda como profilaxis antimicrobiana de elección?",
        options: ["Trimetoprima-Sulfametoxazol", "Ciprofloxacino", "Nitrofurantoína", "Ceftriaxona"],
        answer: 2,
        justification: "Justificación: La manipulación de la vía urinaria crónicamente colonizada, como la extracción de un catéter urinario, conlleva un riesgo de translocación bacteriana urológica. De acuerdo a la GPC de Infecciones de Vías Urinarias, se debe emplear un esquema profiláctico preventivo. La opción de primera línea recomendada por su alta concentración vesical y nulo impacto en la generación de resistencia bacteriana sistémica o de amplio espectro es la nitrofurantoína.<br><br>Perla ENARM: Se recomienda el uso de nitrofurantoína para la profilaxis antimicrobiana en el retiro de sonda vesical ya que no está asociada con problemas de resistencia importante.<br><br>Análisis de Distractores: A) El TMP-SMX es un agente común en cistitis no complicada, pero no ostenta la indicación primaria para la profilaxis peri-retiro de sonda en la GPC nacional actual por altas tasas de resistencia de E. coli. B) El ciprofloxacino (fluoroquinolona) se debe preservar y reservar exclusivamente para pacientes que documenten alergia a fármacos de primera línea o urocultivos con sensibilidad dirigida debido al abuso epidémico de su uso. D) La ceftriaxona en dosis única está indicada como rescate profiláctico únicamente en el subgrupo que presenta resistencia microbiológica probada al ciprofloxacino.",
        source: "IMSS-472-11 RR, Infecciones de Vías Urinarias en la Mujer, 2011, Tratamiento, Página 11."
    },
    {
        id: 46,
        question: "Ante una mujer embarazada en el tercer trimestre que ingresa por sangrado transvaginal rojo rutilante, sin dolor, con sospecha clínica de anomalías de inserción placentaria, ¿qué intervención exploratoria está estrictamente contraindicada?",
        options: ["Especuloscopia armada", "Tacto vaginal", "Ultrasonido endovaginal", "Ultrasonido abdominal"],
        answer: 1,
        justification: "Justificación: La placenta previa y el acretismo placentario se manifiestan característicamente por sangrado indoloro de la segunda mitad del embarazo. De acuerdo a la GPC de Inserción Placentaria, la manipulación digital a ciegas del canal endocervical puede disrumpir los cotiledones placentarios expuestos en el orificio cervical interno, provocando una hemorragia masiva exanguinante e incontrolable de forma iatrogénica. Por ello, el tacto vaginal es una maniobra totalmente proscrita hasta que se haya localizado el tejido trofoblástico por imagen.<br><br>Perla ENARM: No se recomienda realizar tacto vaginal en pacientes con sospecha de placenta previa.<br><br>Análisis de Distractores: A) La especuloscopia cuidadosa sí está fuertemente indicada al ingreso (junto con la hospitalización) para objetivar el origen anatómico real del sangrado (descartar varices, pólipos o laceraciones cervicales). C) El ultrasonido endovaginal (realizado por personal capacitado) es seguro y sugerido por la GPC para confirmar el diagnóstico con mayor precisión si el abordaje abdominal dejó dudas sobre el margen del orificio interno. D) El ultrasonido abdominal es la herramienta diagnóstica de primera línea, tamizaje y abordaje morfológico inicial.",
        source: "IMSS-589-19 RR, Diagnóstico y Manejo de las Anomalías en la Inserción Placentaria y Vasa Previa, 2019, Diagnóstico, Página 7."
    },
    {
        id: 47,
        question: "En el manejo perioperatorio de un paciente usuario de terapia anticoagulante oral crónica por fibrilación auricular, ¿en qué procedimiento quirúrgico estipula la guía que la suspensión del fármaco no es obligatoria por considerarse de muy bajo riesgo hemorrágico?",
        options: ["Biopsia hepática percutánea", "Resección transuretral de próstata", "Cirugía de cataratas con anestesia local", "Amigdalectomía con anestesia general"],
        answer: 2,
        justification: "Justificación: La gestión de la anticoagulación perioperatoria (bridging) balancea el riesgo embólico al retirar el fármaco frente al riesgo hemorrágico quirúrgico. De acuerdo a la GPC de Anticoagulación Oral, existen procedimientos menores tipificados como de \"muy bajo riesgo\" donde mantener la fluidez hemática no compromete la vida del paciente ni la viabilidad del órgano, y por tanto, como punto de buena práctica, puede no suspenderse el anticoagulante oral. Entre estos se incluye la cirugía oftalmológica de cataratas con anestesia local, extracciones dentales simples y artrocentesis menores.<br><br>Perla ENARM: Puede no suspenderse la anticoagulación oral en procedimientos de muy bajo riesgo, tales como: Cirugía de cataratas con anestesia local, Extracción dental, Cirugía cutánea menor.<br><br>Análisis de Distractores: A) La biopsia hepática es un procedimiento en un órgano macizo no compresible; de hecho, una punción no compresible reciente es contraindicación absoluta incluso para trombolisis. Exige retiro de anticoagulación. B) La resección prostática transuretral (RTUP) es una cirugía urológica de riesgo hemorrágico alto/intermedio que requiere reversión a la normalidad de las pruebas de coagulación para evitar taponamiento vesical postoperatorio por coágulos. D) Las cirugías de cuello y vía aérea, así como la anestesia general profunda con instrumentación, exigen hemostasia quirúrgica óptima.",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Recomendaciones, Página 11."
    },
    {
        id: 48,
        question: "¿Cuál es el fármaco de primera elección, tanto por vía oral como parenteral, recomendado para el control del síntoma de disnea intratable en un paciente con enfermedad en fase terminal?",
        options: ["Corticosteroides sistémicos a dosis respuesta", "Oxigenoterapia de alto flujo constante", "Morfina", "Benzodiacepinas de vida media corta"],
        answer: 2,
        justification: "Justificación: En la medicina de cuidados paliativos, el alivio del distrés respiratorio (disnea refractaria final o sed de aire) cuando han fallado las medidas de control subyacente es un pilar de la muerte digna. De acuerdo a la GPC de Cuidados Paliativos, los opioides sistémicos han demostrado alta eficacia clínica al disminuir la percepción cortical de la falta de aire, reducir el metabolismo basal, generar vasodilatación y abolir la hipercapnia sensorial. La guía estipula con un alto grado de evidencia que la morfina es la piedra angular para este propósito.<br><br>Perla ENARM: La morfina es el fármaco de primera elección, por vía oral y parenteral, para el manejo de disnea. Grado A.<br><br>Análisis de Distractores: A) Los corticosteroides (como la dexametasona) son los fármacos de primera línea elegidos específicamente para el manejo del síndrome de anorexia-caquexia o la astenia tumoral extrema, no para la disnea pura aguda. B) El oxígeno a alto flujo mejora la hipoxemia objetiva periférica, pero frecuentemente no alivia el pánico o el distrés sensorial (\"sed de aire\") del estadio agónico central. D) Las benzodiacepinas (ej. midazolam) son coadyuvantes cruciales en el estado agónico para el pánico asociado o la agitación, pero el fármaco de elección biológica respiratoria es el opioide mayor.",
        source: "IMSS-440-11 RR, Cuidados Paliativos, 2011, Tratamiento, Página 21."
    },
    {
        id: 49,
        question: "En una paciente portadora de Miastenia Gravis en edad fértil que se encuentra en fase de planeación gestacional, ¿cuál es el régimen farmacológico de control basal que posee el mejor perfil de seguridad para minimizar los riesgos materno-fetales?",
        options: ["Micofenolato de mofetilo y ciclosporina", "Inmunoglobulina intravenosa seriada", "Piridostigmina y prednisona", "Azatioprina en monoterapia a dosis altas"],
        answer: 2,
        justification: "Justificación: El manejo de enfermedades autoinmunes en la paciente obstétrica exige adaptar el régimen inmunosupresor para evitar teratogenicidad (evitando metotrexato, micofenolato, ciclofosfamida). De acuerdo a la GPC de Miastenia Gravis, toda mujer que desee embarazo debe abordarse en su mejor estado clínico basal. El tratamiento normado, probado y seguro de primera línea anticolinesterásica y corticoidea que mantiene estabilidad sin daño estructural fetal sistémico recae en esta combinación dual.<br><br>Perla ENARM: El mejor perfil farmacológico recomendado para una mujer en edad fértil que planea embarazarse es piridostigmina y prednisona con o sin azatioprina.<br><br>Análisis de Distractores: A) El micofenolato de mofetilo es un inmunosupresor altamente teratogénico que genera pérdida fetal precoz y graves malformaciones estructurales congénitas. B) La inmunoglobulina IV se reserva para rescates agudos en crisis miasténica gestacional severa o en pacientes embarazadas que dejaron de responder a los esteroides, no como esquema basal de planeación preconcepcional prolongada. D) La azatioprina se puede usar como ahorrador de esteroide seguro en el embarazo (\"con o sin\"), pero jamás debe sustituir al inhibidor de la colinesterasa (piridostigmina), que es el eje motor del tratamiento sintomático.",
        source: "IMSS-391-20 RR, Miastenia Gravis, 2020, Tratamiento, Página 11."
    },
    {
        id: 50,
        question: "En la valoración de un paciente que acude al servicio de urgencias cursando con un Infarto Agudo de Miocardio con elevación del segmento ST (IAMCEST), ¿qué antecedente constituye una contraindicación absoluta para administrar terapia fibrinolítica?",
        options: ["Reanimación cardiopulmonar traumática en curso", "Traumatismo o lesión craneal importante en el mes anterior", "Evento vascular cerebral isquémico transitorio (AIT) en los últimos 2 meses", "Trombocitopenia documentada menor a 100,000 células/microL"],
        answer: 1,
        justification: "Justificación: La decisión de reperfundir mediante fibrinólisis exige descartar los escenarios clínicos donde el riesgo de sangrado letal intracraneal u orgánico masivo supere al beneficio miocárdico. De acuerdo a la GPC de IAMCEST, se dividen los rubros en relativos y absolutos. Un traumatismo craneal de magnitud o una cirugía neurológica/vascular aórtica ocurrida en los últimos 30 días debilita irreparablemente las estructuras barrera-encefálicas recientes, representando un veto absoluto infranqueable para los activadores del plasminógeno tisular.<br><br>Perla ENARM: Contraindicaciones Absolutas: Traumatismo/cirugía mayor vascular, neurológica, aórtica o intramedular/lesión craneal importante y reciente (en el mes anterior). Hemorragia intracraneal previa, disección aórtica, etc.<br><br>Análisis de Distractores: A) La reanimación cardiopulmonar o traumática prolongada, aunque eleva el riesgo de hemorragia torácica secundaria a fracturas costales, se clasifica en las normativas actuales como una contraindicación de carácter \"Relativa\", que puede ponderarse según la gravedad vital. C) El antecedente de un EVC isquémico transitorio (AIT) ocurrido 2 meses atrás es estrictamente una contraindicación \"Relativa\". (La contraindicación se vuelve absoluta solo si el infarto isquémico denso ocurrió dentro de los últimos 6 meses). D) Una cifra plaquetaria <100,000 predispone a un defecto de hemostasia primaria, catalogándose como otra contraindicación \"Relativa\", que exige balancear el uso de otras terapias mecánicas si están disponibles (ICP primaria).",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Tratamiento Fibrinolítico, Cuadro 7, Página 12."
    },
    {
        id: 51,
        question: "Al ingresar a un paciente adulto a la Unidad de Cuidados Intensivos por Neumonía Adquirida en la Comunidad (NAC) de características severas, ¿cuál es el esquema de inicio antibiótico empírico fuertemente recomendado por la guía clínica?",
        options: ["Cefalosporina de tercera generación y un aminoglucósido intravenoso", "Betalactámico intravenoso asociado a un macrólido por la misma vía", "Quinolona respiratoria oral asociada a ceftriaxona", "Monoterapia intensiva con carbapenémico de amplio espectro"],
        answer: 1,
        justification: "Justificación: La NAC grave que obliga al ingreso a UCI acarrea alta mortalidad por colapso respiratorio, sepsis o choque. Requiere cobertura inmediata, sinérgica e intravenosa para S. pneumoniae invasor, bacilos Gram negativos y gérmenes atípicos (como Legionella o Mycoplasma). De acuerdo a la GPC de Neumonía, la indicación de excelencia con Grado de Recomendación A dicta que la combinación oro es un agente de pared (betalactámico IV) para bacterias típicas cruzado con un inhibidor ribosomal (macrólido IV) que otorga cobertura atípica y potentes efectos inmunomoduladores a nivel alveolar.<br><br>Perla ENARM: Se recomienda iniciar tratamiento en pacientes admitidos a UCI con: 1. betalactámico IV asociado a un macrólido por la misma vía...<br><br>Análisis de Distractores: A) El uso rutinario de aminoglucósidos no confiere beneficio empírico comunitario (no cubren neumococo ni atípicos) y aumenta la nefrotoxicidad sinérgica en el choque séptico, reservándose para sospecha altísima de Pseudomonas en escenarios especiales de daño estructural. C) La quinolona sola intravenosa (levofloxacino) es útil en pisos de medicina interna o NAC moderada, pero no se aconseja por vía oral al admitirse inestable a la terapia intensiva, donde hay pobre absorción entérica. D) Los carbapenémicos se reservan en el protocolo intrahospitalario estricto (NAV) o neutropénicos de alto riesgo, no como empirismo de rutina de las neumonías adquiridas extramuros de primer contacto.",
        source: "IMSS-234-09 RR, Neumonía Adquirida en la Comunidad en Adultos, 2009, Tratamiento, Página 18."
    },
    {
        id: 52,
        question: "En una paciente gestante diagnosticada con Enfermedad de von Willebrand que se encuentra cursando simultáneamente con un cuadro clínico de preeclampsia, ¿qué fármaco coadyuvante hematológico está estrictamente desaconsejado para el manejo de sangrado?",
        options: ["Desmopresina (DDAVP)", "Ácido tranexámico endovenoso", "Concentrado recombinante de FVIII/FvW", "Sulfato de magnesio en infusión"],
        answer: 0,
        justification: "Justificación: La Enfermedad de von Willebrand (EvW) asocia defectos de adhesión plaquetaria. Típicamente, el acetato de desmopresina (DDAVP) es útil liberando reservas endoteliales de factor vW y factor VIII en formas leves de la enfermedad. Sin embargo, su mecanismo intrínseco implica potente liberación de péptidos vasoactivos endoteliales, retención hídrica grave por efecto antidiurético análogo y alteración tensional. De acuerdo a la GPC de Alteraciones de Coagulación, si la paciente ya padece daño endotelial e hipertensión por preeclampsia, el DDAVP empeora letalmente el edema pulmonar materno, la hiponatremia, el vasoespasmo y las convulsiones, estando formalmente contraindicado.<br><br>Perla ENARM: Se recomienda evitar el uso de DDAVP en embarazadas con EvW y preeclampsia.<br><br>Análisis de Distractores: B) El ácido tranexámico (antifibrinolítico) se avala sin problemas para mitigar hemorragias sistémicas, restringiéndose solo temporalmente si la mujer manifiesta hematuria severa por el riesgo de formar coágulos que obstruyan los uréteres. C) Los concentrados purificados o recombinantes de FVIII/FvW son justamente el \"Punto de Buena Práctica\" de tratamiento de elección dictado por la GPC para rescatar a esta paciente o prepararla para un parto o cesárea inminente de forma segura sin las secuelas cardiovasculares del análogo sintético. D) El sulfato de magnesio es el tratamiento preventivo neurológico estándar imperativo del pilar de la eclampsia, no alterando deletéreamente el perfil plaquetario subyacente.",
        source: "IMSS-408-10 RR, Alteraciones de la Coagulación por Deficiencia de Factores, 2010, Tratamiento, Página 24."
    },
    {
        id: 53,
        question: "En el seguimiento ecocardiográfico de urgencia de un paciente con un gran derrame pericárdico exudativo, ¿cuál hallazgo cinético de la evaluación modo M-bidimensional confirma la fisiopatología mecánica de un taponamiento cardíaco inminente?",
        options: ["Colapso diastólico de la pared libre del ventrículo derecho", "Engrosamiento progresivo y calcificación pericárdica apical", "Ausencia del aumento del diámetro del ventrículo izquierdo en llenado rápido", "Movimiento septal anormal de llenado rápido (Fenómeno Dip-plateau)"],
        answer: 0,
        justification: "Justificación: El taponamiento cardíaco es una emergencia donde la presión generada por el derrame intra-saco pericárdico supera las presiones telediastólicas de llenado de las cavidades derechas, colapsándolas e impidiendo la precarga cardiaca global. De acuerdo a la GPC de Pericarditis, el ecocardiografista debe buscar el colapso inicial en fase diastólica de las cámaras de menor presión: la aurícula derecha, seguida de inmediato por el dato contundente del colapso diastólico de la \"pared libre anterior del ventrículo derecho\", lo cual certifica la repercusión hemodinámica que obliga a la pericardiocentesis evacuadora emergente (de rescate).<br><br>Perla ENARM: Hallazgos ecocardiográficos en Taponamiento cardiaco: Derrame pericárdico. Colapso diastólico de: Pared libre anterior del ventrículo derecho, colapso de aurícula derecha...<br><br>Análisis de Distractores: B) El engrosamiento nodular o una calcificación de las membranas pericárdicas constituyen hallazgos crónicos que atañen ecográficamente al espectro de la \"Pericarditis Constrictiva\" y a sus secuelas, no al volumen agudo a tensión del taponamiento. C) El fallo en el aumento turgente del diámetro ventricular izquierdo en la ventana de llenado rápido es un signo de atrapamiento fibrótico crónico riguroso, perteneciente a la pericarditis constrictiva cicatrizal. D) El fenómeno hemodinámico del descenso brusco y meseta de llenado (\"Dip-plateau\") en las morfologías de onda se describe clásicamente en la restricción de las miocardiopatías constrictivas cicatrizales severas, distinto al bamboleo oscilante elástico originado por el líquido de un taponamiento.",
        source: "IMSS-463-11 RR, Pericarditis, 2011, Anexos, Cuadro 2, Página 20."
    },
    {
        id: 54,
        question: "Frente a un lactante de 14 meses que es ingresado al servicio de choque pediátrico cursando clínicamente con estado epiléptico en evolución, ¿cuál es el anticonvulsivante indicado y considerado de primera línea para otorgar la dosis de impregnación intravenosa?",
        options: ["Fenobarbital en dosis carga lenta", "Valproato de magnesio en infusión", "Levetiracetam oral triturado", "Fenitoína en dosis de 10 a 20 mg/kg"],
        answer: 3,
        justification: "Justificación: El estatus epiléptico sintomático, muy común en expansiones rápidas de tumores cerebrales infantiles o infecciones de SNC, exige un control cortical agudo para evitar el enclavamiento o daño celular por excitotoxicidad persistente (anoxia). De acuerdo a la GPC de Tumores Cerebrales Pediátricos, el agente de neuro-control primario que logra impregnación rápida, cede crisis y evita la recurrencia es la Fenitoína. La normativa indica utilizar estrictamente su dosis de carga masiva de \"10-20 mg/kg\" por vía intravenosa, con velocidad monitorizada para prevenir arritmias o colapso vascular cardíaco asociado a su diluyente de alta viscosidad.<br><br>Perla ENARM: Fenitoína (FNT): Considerada de elección, logra control inmediato y evita recurrencias de crisis, debiendo utilizarse en dosis altas por vía IV. Se recomienda dosis de carga 10-20 mg/kg...<br><br>Análisis de Distractores: A) El fenobarbital histórico en dosis carga endovenosa es el estándar, pero específicamente de primera elección \"en los lactantes menores de 6 meses o periodo neonatal\"; en lactantes mayores e infantiles, está en franco desuso generalizado por la depresión respiratoria intrínseca y deterioro profundo del nivel de conciencia. B) El valproato es un excelente fármaco crónico de sostén ambulatorio o rescate terciario (de segunda o tercera línea en guías internacionales), pero la fenitoína es el as fundamental para cortar la crisis en primer contacto. C) El levetiracetam oral es inútil en un paciente obnubilado y no otorga los niveles séricos urgentes; su forma intravenosa es excelente, pero la GPC prioriza y desglosa algorítmicamente a la Difenilhidantoína (Fenitoína) por costo-efectividad.",
        source: "ISSSTE-136-18 RR, Tumores Cerebrales Pediátricos, 2018, Tratamiento, Página 24."
    },
    {
        id: 55,
        question: "¿Cuál es la dosis específica de la Inmunoglobulina Humana Anti-D que debe ser prescrita obligatoriamente durante el primer embarazo a toda mujer con grupo sanguíneo Rh negativo que cumple con los criterios de aplicación profiláctica?",
        options: ["300 microgramos (1500 UI)", "100 microgramos (500 UI)", "50 microgramos (250 UI)", "150 microgramos (750 UI)"],
        answer: 1,
        justification: "Justificación: La isoinmunización materno-fetal produce hemólisis letal por los anticuerpos cruzados IgG (hidropesía fetal secundaria) al aloinjerto feto-placentario en madres sin antígeno D eritrocitario (Rh-). Su prevención recae en administrar un anticuerpo monoclonal secuestrador temprano de los eritrocitos fetales libres en sangre materna que escapan durante las contracciones, abortos, traumas o alumbramiento. De acuerdo a la GPC de Amenaza de Aborto, el \"Punto de Buena Práctica\" dicta tajantemente que la profilaxis incondicional inicial en la paciente que transita por su primer embarazo asciende a una dosis de \"100 microgramos (equivalente a 500 Unidades Internacionales)\" de Inmunoglobulina Anti-D.<br><br>Perla ENARM: La inmunoglobulina humana anti-D, se debe administrar en las mujeres Rh negativo que pretendan embarazarse o que estén embarazadas... Dosis: 100 µg (500 UI) en el primer embarazo.<br><br>Análisis de Distractores: A) La megadosis posparto de 300 µg (1500 UI) se reserva usualmente de forma estándar en normativas universales para los eventos obstétricos post-alumbramiento confirmados con Rh+ del neonato, o ante hemorragias feto-maternas masivas cuantificadas (Kleihauer-Betke). C) 50 µg es una dosificación marginal que se usaba antiguamente en amenaza de aborto temprano (antes de semana 12) que ya no está respaldada ni descrita por esta pauta integradora primaria en mujeres mexicanas gestantes intactas preventivas. D) Cifras como 150 µg son dosis parciales aleatorias para despistar al médico general que memoriza equivalencias.",
        source: "SS-026-20 RR, Amenaza de Aborto, 2020, Prevención, Página 6."
    },
    {
        id: 56,
        question: "Al evaluar y prescribir tratamiento empírico a un paciente adulto cursando con un evento de enfermedad diarreica aguda de carácter severo (asociado a fiebre mayor de 38.3°C y mal estado general), ¿cuál es el esquema posológico estandarizado indicado para el fármaco Levofloxacino?",
        options: ["250 mg vía oral cada 12 horas por 5 días", "750 mg vía oral en dosis única para control temprano", "500 mg vía oral como dosis única o por un periodo de 3 días", "400 mg vía oral dosis única o un máximo de 3 días"],
        answer: 2,
        justification: "Justificación: La disentería febril en un adulto no viajero evoca agresiones de patógenos invasivos de la mucosa colónica (Shigella, Salmonella, Campylobacter, E. coli enteroinvasiva). De acuerdo a la GPC de Diarrea Aguda en el Paciente Adulto, cuando existen estos componentes tóxicos sistémicos febriles o cuadros incapacitantes no limitados (más de 72 horas con moco o sangre), debe indicarse un régimen citotóxico empírico empujado hacia las quinolonas o la azitromicina. Las opciones tabuladas señalan contundentemente que la pauta para \"Levofloxacino\" equivale a 500 mg de forma diaria oral, pudiendo ser una sola toma concentrada o si los síntomas perpetúan a las 24 horas, extender la ventana de dosificación hasta completar el ciclo cerrado biológico curativo de los 3 días estrictos.<br><br>Perla ENARM: USO DE ANTIBIÓTICOS EN ENFERMEDAD DIARREÍCA AGUDA. Levofloxacino: 500mg vía oral. Dosis única o por 3 días.<br><br>Análisis de Distractores: A) 250 mg cada 12 horas en 5 días es una dilución espuria subterapéutica que fomenta resistencia en quinolonas al no lograr picos plasmáticos concentrados rápidos requeridos. B) 750 mg representa de manera obligatoria y exacta el escalón terapéutico recomendado por la misma normativa, pero para el homólogo quinolónico de menor biodisponibilidad directa tisular pulmonar/digestiva generalizada: el Ciprofloxacino, no el Levofloxacino. D) 400 mg vía oral (dosis única o ciclo corto limitante de 3 días) corresponde explícitamente en la GPC al lineamiento de dosificación para el agente \"Ofloxacino\".",
        source: "SS-106-20 RR, Enfermedad Diarreica Aguda en Adulto, 2020, Tratamiento, Cuadro 2, Página 11."
    },
    {
        id: 57,
        question: "En la evaluación del déficit isquémico en urgencias mediante la escala internacional NIHSS (National Institutes of Health Stroke Scale), ¿cuál es la máxima puntuación de gravedad que puede acumular un paciente en el ítem 3 referente a los \"Campos visuales\"?",
        options: ["4 puntos (Amaurosis total y fija no corregible)", "3 puntos (Hemianopsia bilateral o ceguera cortical documentada)", "2 puntos (Hemianopsia homónima parcial congruente)", "5 puntos (Ausencia total e irreversible de seguimiento reflejo y visual)"],
        answer: 1,
        justification: "Justificación: La correcta cuantificación de las áreas cerebrales de isquemia agiliza la toma de decisiones para ventana de trombolisis o trombectomía endovascular mecánica de rescate vascular en centros agudos. De acuerdo a la GPC de Enfermedad Vascular Cerebral Isquémica Temprana, en el renglón particular 3 (campos visuales por confrontación clínica rigurosa), la cuantificación dictaminada califica de manera muy estrecha desde 0 puntos (\"no hay pérdida anatómica detectada de los campos evaluados\") hasta un tope rígido estandarizado de \"3 puntos\", que traduce catastróficamente un infarto silviano o posterior masivo que anula la retroalimentación de ambos trayectos homónimos cerebrales.<br><br>Perla ENARM: Escala NIHSS. Grupo 3 Campos visuales: 0 – no hay pérdida de campos visuales, 1 – hemianopsia parcial, 2 – hemianopsia total, 3 – hemianopsia bilateral.<br><br>Análisis de Distractores: A, C y D) Las sumas de 4 y 5 puntos no existen, son apócrifas y sobrevaloradas para el grupo rubral número 3. El grado que se le asigna de manera estricta a una hemianopsia pura y contundente clásica equivale tan solo a 2 puntos, siendo el 3 el estado ciego y destructivo final del estrato evaluado.",
        source: "S-102-08 RR, Enfermedad Vascular Cerebral Isquémico, 2008, Anexos, Cuadro 3, Página 58."
    },
    {
        id: 58,
        question: "En el paciente ambulatorio con sospecha clínica de Trombosis Venosa Profunda (TVP), ¿a partir de qué puntaje numérico acumulado en la escala internacional predictora de Wells se categoriza probabilísticamente a la patología como un evento \"Probable\"?",
        options: ["Mayor o igual a 2 puntos", "Mayor o igual a 4 puntos", "Menor o igual a 1 punto", "Mayor o igual a 3 puntos"],
        answer: 0,
        justification: "Justificación: El abordaje diagnóstico de la enfermedad tromboembólica venosa en piernas y pulmón se afianza con las escalas estadísticas predictoras internacionales (Wells y Ginebra). De acuerdo a la GPC de Tromboembolia Pulmonar, el riesgo pre-test dirige la utilidad o inutilidad del Dímero D y la remisión directa al ultrasonido (USG) venoso compresivo. La directriz puntualiza para el padecimiento de la pierna que una sospecha se estratifica firmemente como \"Probable\" si y solo si la sumatoria de rubros acumulados (como cáncer activo, inmovilización, edema asimétrico con fóvea y dolor palpatorio directo) alcanza una puntuación que sea matemáticamente equivalente a \"Mayor o igual a 2 puntos\" de la escala de Wells.<br><br>Perla ENARM: La trombosis venosa profunda es improbable con ≤ 1 punto y probable para aquellos casos con ≥ 2.<br><br>Análisis de Distractores: B) Un nivel pretest global mayor a 4 se reserva para las escalas crudas del modelo tromboembólico pulmonar invasivo (Embolia pulmonar). C) Menor o igual a 1 punto define invariablemente el estrato \"Improbable\" bajo riesgo para trombosis de pantorrilla aislada, requiriendo obligadamente el Dímero D sérico para su descarte fidedigno temprano, eludiendo estudios encarecidos. D) Mayor o igual a 3 puntos obedece a las franjas analíticas de alto riesgo en escalas de Ginebra (embolia franca).",
        source: "IMSS-425-18 RR, Trombosis Venosa y Tromboembolia Pulmonar, 2018, Anexos, Cuadro 7, Página 34."
    },
    {
        id: 59,
        question: "Durante la vigilancia cardiaca de un niño diagnosticado con Mucopolisacaridosis Tipo I (MPS I) sometido a terapia de reemplazo, ¿cuál es el porcentaje basal en la medición de Fracción de Eyección (FE) documentada por ecocardiograma que marca formalmente el fracaso restrictivo cardíaco obligando al abandono temporal terapéutico de reemplazo?",
        options: ["Menor del 40%", "Menor del 50%", "Menor del 56%", "Menor del 60%"],
        answer: 2,
        justification: "Justificación: Las disostosis sistémicas lisosomales de depósito de glucosaminoglicanos (MPS) originan de manera irreversible infiltración tisular, valvulopatías mitrales espesas y miocardiopatías letales al músculo cardíaco con pobre o nula contractilidad remanente en el ventrículo izquierdo, fallando el corazón prematuramente. De acuerdo a la GPC de MPS I, los umbrales de daño catastrófico de fin de línea exigen paralizar los protocolos agresivos onerosos de reemplazo (iduronidasa o el trasplante invasivo hematopoyético celular crónico). Un paciente que exponga ecocardiográficamente el rango anómalo con insuficiencia de \"miocardiopatía con fracción de eyección menor del 56%\" cruza esa barrera, orientando a un desenlace de terminalidad hemodinámica e irreversibilidad por acúmulo patológico cardíaco irremediable.<br><br>Perla ENARM: Daño cardiaco: Miocardiopatía con fracción de eyección menor del 56%, (rango normal 56-78%). Reducción de la fracción shortening < 25%.<br><br>Análisis de Distractores: A, B y D) Cifras como el 40%, 50% o 60% corresponden usualmente a umbrales ecocardiográficos genéricos estandarizados en insuficiencia cardiaca del adulto (fracción reducida, media preservada), estenosis valvular clásica degenerativa reumatológica o directrices de oncotoxicidad por antraciclinas (daño adriamicínico >10% de FE base). La GPC en pediatría rara metabólica se rige exclusivamente por el valor de 56% de colapso ventricular genético terminal.",
        source: "IMSS-338-10 RR, Mucopolisacaridosis I, 2010, Anexos, Página 35."
    },
    {
        id: 60,
        question: "Al confirmar un hallazgo de masa ocupativa mediante ultrasonido abdominal en un paciente pediátrico, ¿qué sistema de clasificación tomográfica o morfológica de estadificación hepática prequirúrgica es el estándar de oro obligado mundial y mandatario previo a la biopsia de hepatoblastoma?",
        options: ["Clasificación de Child-Pugh", "Sistema PRETEXT", "Algoritmo oncológico BCLC (Barcelona)", "Estadificación endoscópica de Varices Baveno"],
        answer: 1,
        justification: "Justificación: El hepatoblastoma infantil se expande comprometiendo el mapeo de los grandes vasos porto-hepáticos y las cavas bilobares. Debido al alto poder quimiosensible y de cito-reducción de los nódulos infantiles antes del corte del cirujano oncólogo, su ubicación pretratamiento inicial es sagrada. De acuerdo a la GPC de Hepatocarcinoma y tumores infantiles, toda masa ocupativa detectada se somete a Tomografía con reconstrucción y de forma automática e imperiosa, se le asigna la estadificación clínica-anatómica internacional del sistema \"PRETEXT\" (PRE-Treatment EXTent of tumor). Esto define cuántos sectores del hígado están milimétricamente libres para asegurar un remanente funcional vital o empujar al niño hacia trasplante de hígado o quimioterapia neoadyuvante extrema.<br><br>Perla ENARM: Algoritmo 1. Diagnóstico de hepatocarcinoma en niños: Niño con tumor hepático por USG -> Historia clínica, estudios y TAC... -> Confirmación diagnóstica (Sí) -> Clasificación PRETEXT.<br><br>Análisis de Distractores: A) La escala geriátrica/adulta de Child-Pugh estratifica clínicamente el nivel de reserva o falla funcional de hepatocitos y sobrevida del hígado cirrótico en varones añosos, no evalúa cuadrantes tumorales pediátricos de masas vírgenes anatómicas. C) El sistema BCLC (Barcelona Clinic Liver Cancer) se consagra exclusivamente como la plataforma y directriz mundial hegemónica preestablecida, pero para la tipificación del \"Carcinoma Hepatocelular\" puro originado sobre un terreno francamente cirrótico/viral en adultos añosos asintomáticos o terminales. D) La escala hemostática del consenso venoso de Baveno (I al VI) se encarga de protocolizar estamentos sobre hipertensión portal sangrante en todo adulto cirrótico con várices esofagogástricas, no mapea masas oncológicas fetales subyacentes.",
        source: "SS-582-19 RR, Diagnóstico y Tratamiento del Hepatocarcinoma, 2019, Anexos, Algoritmo 1, Página 21."
    },
    {
        id: 61,
        question: "En la evaluación de un paciente adulto en el primer nivel de atención, ¿a partir de qué tiempo de evolución clínica ininterrumpida se establece formalmente el diagnóstico de \"Dolor lumbar crónico\"?",
        options: ["Síntomas presentes por más de 12 semanas", "Síntomas presentes por más de 6 semanas", "Síntomas presentes por más de 4 semanas", "Síntomas presentes por más de 24 semanas"],
        answer: 0,
        justification: "Justificación: La temporalidad en la lumbalgia inespecífica dicta el abordaje de rehabilitación y la necesidad de intervenciones psicosociales cognitivo conductuales. De acuerdo a la GPC de Dolor Lumbar, el algoritmo de abordaje diagnóstico estratifica el dolor agudo y crónico mediante un punto de corte temporal estricto. Si los síntomas perduran o no ceden al tratamiento inicial y se mantienen activos por un lapso superior a las 12 semanas, el paciente transiciona a la categoría de dolor crónico, requiriendo reevaluación por riesgo de ausentismo laboral.<br><br>Perla ENARM: Algoritmo Adulto con Dolor Lumbar: Establecer diagnóstico de dolor lumbar inespecífico -> ¿Los síntomas están presentes por más de 12 semanas? -> SI -> Dolor crónico.<br><br>Análisis de Distractores: B y C) Los lapsos de 4 a 6 semanas definen clásicamente al dolor lumbar agudo o subagudo en diversas literaturas, siendo el margen donde la gran mayoría de las lumbalgias mecánicas resuelven de forma espontánea o con AINEs. D) 24 semanas (6 meses) es un lapso prolongado que excede el criterio de corte estandarizado por la GPC para catalogar la cronicidad en la columna.",
        source: "DIF-313-19 RR, Rehabilitación del Dolor Lumbar Inespecífico, 2019, Anexos (Algoritmos), Página 1."
    },
    {
        id: 62,
        question: "Durante la estadificación TNM (8va edición) del cáncer de pulmón no microcítico, ¿qué diámetro máximo tumoral establece específicamente la clasificación T3?",
        options: ["Tumor >3 cm pero ≤4 cm", "Tumor >4 cm pero ≤5 cm", "Tumor >5 cm pero <7 cm", "Tumor >7 cm en su mayor dimensión"],
        answer: 2,
        justification: "Justificación: El tamaño tumoral es un predictor directo de resecabilidad anatómica y sobrevida. De acuerdo a la GPC de Cáncer de Pulmón, la categoría T3 se adjudica a masas tumorales que rebasan los 5 cm pero que son menores a 7 cm en su diámetro máximo. Adicionalmente, entran en esta categoría tumores de cualquier tamaño que invadan directamente la pared torácica, el nervio frénico, el pericardio parietal o que presenten nódulos tumorales satélites separados pero ubicados dentro del mismo lóbulo pulmonar primario.<br><br>Perla ENARM: Clasificación T3: Tumor mayor de 5 cm pero menor a 7 cm en su mayor dimensión, o uno que invade pared torácica, nervio frénico, pericardio...<br><br>Análisis de Distractores: A) >3 cm pero ≤4 cm clasifica al tumor como estadio T2a. B) >4 cm pero ≤5 cm clasifica al tumor como estadio T2b. D) Un tumor masivo que excede los 7 cm en su mayor dimensión avanza automáticamente a la categoría pronóstica T4.",
        source: "IMSS-030-19 RR, Diagnóstico y Tratamiento del Cáncer de Pulmón, 2019, Anexos, Cuadro 3, Página 49."
    },
    {
        id: 63,
        question: "Al realizar el manejo activo del tercer periodo del trabajo de parto en un embarazo de bajo riesgo, ¿cuál es el uterotónico de primera elección y su posología recomendada?",
        options: ["Misoprostol 600 mcg vía sublingual", "Ergonovina 0.2 mg vía intramuscular", "Carbetocina 100 mcg vía intravenosa lenta", "Oxitocina 10 UI vía intravenosa o intramuscular"],
        answer: 3,
        justification: "Justificación: El manejo activo del alumbramiento previene la hemorragia obstétrica, principal causa de letalidad materna. De acuerdo a la GPC de Vigilancia y Manejo del Puerperio, tras el nacimiento fetal se debe proceder de inmediato con la profilaxis uterotónica. La normativa establece que si se cuenta con Oxitocina, esta debe ser considerada inamoviblemente como la primera opción farmacológica. La dosis protocolizada es de 10 UI administradas por vía IV o IM, seguida de la tracción controlada del cordón umbilical.<br><br>Perla ENARM: Algoritmo 5. Manejo del puerperio inmediato: Inicie manejo activo del 3er periodo -> ¿Cuenta con oxitocina? SI -> Considérela como 1ra opción -> Administre 10 UI IV o IM.<br><br>Análisis de Distractores: A, B y C) La carbetocina, la ergonovina y el misoprostol son excelentes agentes uterotónicos y se consideran de segunda línea (o alternativas válidas) en el algoritmo de la guía exclusivamente ante escenarios donde no se cuente con oxitocina disponible o exista atonía uterina refractaria.",
        source: "IMSS-052-19 RR, Vigilancia y Manejo del Trabajo de Parto, 2019, Anexos (Algoritmo 5), Página 24."
    },
    {
        id: 64,
        question: "En la evaluación de un hombre asintomático que acude a tamizaje primario, ¿en qué rango de Antígeno Prostático Específico (PSA) la guía recomienda forzosamente ofrecer estudios adicionales antes de proceder con una biopsia, si el tacto rectal es normal?",
        options: ["Entre 1 y 3 ng/ml", "Entre 4 y 10 ng/ml", "Mayor a 10 ng/ml", "Menor a 4 ng/ml"],
        answer: 1,
        justification: "Justificación: El tamizaje de cáncer de próstata tiene un área gris (\"zona de incertidumbre\") donde la hiperplasia benigna o la inflamación pueden elevar el marcador. De acuerdo a la GPC de Cáncer de Próstata, en varones con exploración digital (tacto rectal) estrictamente normal que reportan un PSA elevado pero contenido en la ventana de 4 a 10 ng/ml, se recomienda no realizar biopsias transrectales automáticas a ciegas, sino ofrecer evaluaciones adicionales (PSA libre, densidad, velocidad, resonancia magnética) para optimizar la selección y evitar morbilidad innecesaria.<br><br>Perla ENARM: Se recomienda ofrecer evaluación y estudios adicionales a hombres asintomáticos con un examen rectal digital normal y un nivel de PSA entre 4-10 ng/ml antes de realizar una biopsia de próstata.<br><br>Análisis de Distractores: A) Niveles de 1 a 3 ng/ml son habitualmente normales y solo requieren seguimiento periódico anual o bienal dependiendo de la edad y factores de riesgo. C) Cifras confirmadas de PSA >10 ng/ml (sin causas benignas precipitantes agudas) obligan, en la mayoría de los protocolos, a la indicación directa de biopsia transrectal. D) Un PSA <4 ng/ml requiere estratificar el riesgo familiar o racial, pero rara vez indica pruebas moleculares complementarias salvo tacto rectal sospechoso.",
        source: "IMSS-140-18 RR, Cáncer de Próstata, 2018, Diagnóstico, Página 26."
    },
    {
        id: 65,
        question: "Según la cuarta definición universal del infarto de miocardio, ¿qué escenario clínico y angiográfico define a un IAMCEST categorizado como \"Tipo 4b\"?",
        options: ["Elevación enzimática post cirugía de derivación (CABG)", "Desequilibrio isquémico por espasmo o anemia profunda", "Trombosis confirmada de un stent coronario", "Oclusión coronaria aguda por ruptura espontánea de placa"],
        answer: 2,
        justification: "Justificación: La tipificación del Infarto Agudo de Miocardio (IAM) clarifica su etiología para guiar la terapéutica secundaria. De acuerdo a la GPC de IAMCEST, el tipo 4 está íntimamente ligado a los procedimientos de Intervención Coronaria Percutánea (ICP). Específicamente, el \"Tipo 4b\" se define como el infarto agudo originado por una trombosis del stent previamente colocado, el cual debe estar confirmado fehacientemente a través de angiografía coronaria invasiva o autopsia en el contexto de elevación de biomarcadores cardíacos.<br><br>Perla ENARM: Cuadro 3. Definición Universal del IAM: Tipo 4b: Relacionado con trombosis del stent. Confirmado a través de angiografía coronaria o autopsia.<br><br>Análisis de Distractores: A) La lesión miocárdica yatrógena y elevación troponínica tras una cirugía abierta de revascularización coronaria (derivación arterial / CABG) define el infarto Tipo 5. B) El desequilibrio agudo entre el aporte y la demanda de oxígeno (sin ruptura de placa ateromatosa) corresponde al infarto Tipo 2. D) La ruptura, ulceración o erosión espontánea de la placa ateroesclerótica es la fisiopatología clásica más común y define al infarto Tipo 1.",
        source: "IMSS-357-21 RR, Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Definiciones, Cuadro 3, Página 40."
    },
    {
        id: 66,
        question: "Durante la evaluación cognitiva de un adulto mayor mediante el Mini-Mental State Examination (MMSE) de Folstein, ¿cuántas palabras exactas debe dictar el examinador en el dominio específico de \"Fijación\"?",
        options: ["5 palabras", "4 palabras", "3 palabras", "2 palabras"],
        answer: 2,
        justification: "Justificación: El dominio de \"Fijación\" evalúa el registro mnésico inmediato (memoria de trabajo a corto plazo). De acuerdo a la GPC de Enfermedad de Alzheimer, la instrucción estandarizada del MMSE indica que el médico debe pronunciar exactamente 3 palabras simples (por ejemplo: papel, bicicleta, cuchara, o manzana, llave, libro) y solicitar al paciente que las repita inmediatamente, otorgando un punto máximo por cada acierto (total 3 puntos). Estas mismas palabras se utilizarán minutos después en la sección de memoria diferida (\"evocación\").<br><br>Perla ENARM: MMSE. Fijación \"Le voy a decir 3 palabras, cuando yo los termine quiero que por favor Usted los repita\". (Máximo 3 puntos).<br><br>Análisis de Distractores: A, B y D) Distractores numéricos irreales. Emplear más de 3 palabras corresponde a otras herramientas neuropsicológicas más extensas (como el Test de Aprendizaje Verbal de Hopkins o de Rey que usan listas de 10 a 15 palabras), pero invalidan la puntuación tope de la estructura rígida de 30 puntos del MMSE original.",
        source: "IMSS-393-10 RR, Diagnóstico y Tratamiento de la Enfermedad de Alzheimer, 2010, Anexos, Página 45."
    },
    {
        id: 67,
        question: "En el seguimiento obstétrico de una paciente con antecedente ecográfico de sospecha de Vasa Previa en el segundo trimestre, ¿en qué rango de edad gestacional la guía exige repetir el ultrasonido endovaginal con Doppler para confirmar la persistencia del diagnóstico?",
        options: ["Entre las 36 y 38 semanas", "Entre las 30 y 34 semanas", "Entre las 28 y 30 semanas", "Entre las 24 y 26 semanas"],
        answer: 1,
        justification: "Justificación: La Vasa Previa es una urgencia vital caracterizada por vasos fetales expuestos cruzando el orificio cervical interno, con alto riesgo de exanguinación fetal tras la ruptura de membranas. De acuerdo a la GPC de Anomalías en la Inserción Placentaria y Vasa Previa, si el escrutinio de segundo trimestre sugiere el padecimiento, se debe dar seguimiento estrecho por el fenómeno fisiológico de \"migración\" o trofotropismo placentario. El algoritmo dicta que la ecografía transvaginal Doppler confirmatoria definitiva debe repetirse forzosamente entre las 30 y 34 semanas de gestación; si persiste, se procede a internamiento inmediato e inductores de madurez pulmonar.<br><br>Perla ENARM: Algoritmo 3. Vasa Previa: ¿Se confirma diagnóstico de vasa previa en 2do trimestre? -> SI -> Repetir ultrasonido endovaginal y Doppler entre las 30-34 sdg.<br><br>Análisis de Distractores: A) Esperar hasta las 36-38 semanas es negligente, pues el trabajo de parto prematuro o la ruptura de membranas puede ocurrir en cualquier momento, y la resolución programada (cesárea) en vasa previa se indica entre la 34 y 36. C y D) Son periodos demasiado tempranos donde el segmento uterino inferior no se ha formado por completo anatómica y estructuralmente, existiendo aún la posibilidad de una falsa resolución por distensión miometrial asimétrica.",
        source: "IMSS-589-19 RR, Diagnóstico y Manejo de las Anomalías en la Inserción Placentaria y Vasa Previa, 2019, Algoritmo 3, Página 5."
    },
    {
        id: 68,
        question: "Al emplear la herramienta FRAX (algoritmo adaptado para la población de México) en una mujer para calcular el riesgo absoluto de fractura osteoporótica, ¿cuál es la edad límite inferior a partir de la cual la escala inicia su estratificación de riesgo?",
        options: ["40 años", "45 años", "50 años", "60 años"],
        answer: 2,
        justification: "Justificación: La escala FRAX integra el Índice de Masa Corporal (IMC) y factores de riesgo clínicos para determinar la necesidad de densitometría ósea y tratamiento antirresortivo profiláctico. De acuerdo a la GPC de Osteoporosis, el \"Cuadro 4B. Valoración del riesgo de fractura\" de la adaptación oficial mexicana de la herramienta restringe su uso y estratificación inicial evaluable explícitamente a partir de mujeres que alcanzan los 50 años de edad, progresando el tabulador en quinquenios (50-54, 55-59, etc.) hasta los 90 y más.<br><br>Perla ENARM: Cuadro 4B. Valoración del riesgo de fractura (FRAX). EDAD (años): El primer estrato evaluable es 50-54 años.<br><br>Análisis de Distractores: A y B) Las edades de 40 a 45 años anteceden comúnmente a la menopausia fisiológica de la mujer mexicana. En este estrato, el recambio óseo mediado por estrógenos aún preserva la densidad mineral, por lo que el algoritmo FRAX nacional no tabula factores de riesgo a este nivel. D) Si bien el pico de osteoporosis ocurre a los 60-65 años, la estratificación y ventana de oportunidad preventiva de tamizaje formal arranca estrictamente desde la quinta década (50 años).",
        source: "IMSS-673-18 RR, Prevención y Tratamiento de la Osteoporosis, 2018, Anexos, Cuadro 4B, Página 64."
    },
    {
        id: 69,
        question: "En el contexto del Patient Blood Management (manejo hemático) intrahospitalario, ante una hemorragia aguda activa profusa, ¿cuál es el nivel sérico de fibrinógeno que indica como terapia de primera línea la transfusión de crioprecipitados o concentrados de fibrinógeno?",
        options: ["Menor a 200 mg/dl", "Menor a 50 mg/dl", "Menor a 150 mg/dl", "Menor a 100 mg/dl"],
        answer: 3,
        justification: "Justificación: La reanimación hemostática moderna en hemorragia masiva prioriza corregir la coagulopatía de consumo dirigiendo la terapia por metas objetivas. El fibrinógeno es el primer factor de coagulación que desciende a niveles críticos durante el choque hemorrágico. De acuerdo a la GPC de Optimización de Sangre (PBM), el desencadenante transfusional o \"trigger\" que exige imperativamente la infusión de concentrado de fibrinógeno (o crioprecipitados como opción secundaria) en un paciente con sangrado activo, es poseer una concentración demostrada de fibrinógeno inferior a los 100 mg/dl o pruebas viscoelásticas (TEG/ROTEM) con datos de hipofibrinogenemia.<br><br>Perla ENARM: En hemorragia activa: FIBRINÓGENO MENOR 100 O PRUEBAS VISCOELÁSTICAS CON DATOS DE HIPOFIBRINOGENEMIA -> 1a elección Concentrado de fibrinógeno o Crioprecipitados.<br><br>Análisis de Distractores: A y C) Niveles de 150 a 200 mg/dl son considerados funcionalmente adecuados y estables para garantizar la hemostasia primaria formadora de redes de fibrina; en estos rangos no se justifica el riesgo de exposición plasmática aógena. B) Menor a 50 mg/dl representa un estado letal de afibrinogenemia severa terminal o CID franca, pero el umbral de disparo intervencionista precoz protocolizado para evitar llegar a esta catástrofe es de <100 mg/dl.",
        source: "SS-830-20 RR, Programa de Optimización de la Sangre (PBM), 2020, Anexos (Esquema Transfusional), Página 68."
    },
    {
        id: 70,
        question: "Al evaluar los hitos del neurodesarrollo motor grueso de un lactante sano durante la consulta de niño sano, ¿cuál es la edad límite referida por la guía en la que un lactante alcanza la \"sedestación estable\"?",
        options: ["7 meses", "5 meses", "9 meses", "11 meses"],
        answer: 0,
        justification: "Justificación: La adquisición de la postura de sentado es un pilar crítico en el desarrollo de la bipedestación axial posterior. De acuerdo a la GPC de Alteraciones del Neurodesarrollo y Estimulación Temprana, en la escala de hitos motores (observación del pediatra), la evolución fisiológica normal dicta que el lactante se mantiene sentado apoyando ambas manos hacia adelante a los 6 meses, y logra finalmente la \"sedestación estable\" madura (sin apoyo restrictivo de los brazos) a los 7 meses de edad biológica cronológica.<br><br>Perla ENARM: Hitos motores: Sedestación estable. (Normal a los 7 m).<br><br>Análisis de Distractores: B) A los 5 meses, el tono muscular troncal aún es débil, oscilando la columna, logrando mantener la cabeza erguida pero no el peso sedente estático sin soporte completo. C) A los 9 meses, el lactante ya sobrepasó ampliamente la meta; debe girar sobre su propio eje sedente y encontrarse ejecutando patrones primarios de gateo o arrastre activo en decúbito ventral. D) A los 11 meses, el hito motor meta es la marcha independiente de la mano (\"camina si se le lleva de la mano\") o deambulación asistida con muebles.",
        source: "DIF-332-18 RR, Detección de Alteraciones del Neurodesarrollo y Estimulación Temprana, 2018, Anexos (Hitos Motores), Página 18."
    },
    {
        id: 71,
        question: "En la evaluación neurológica de una paciente con crisis miasténica y debilidad generalizada progresiva que fracasó a la terapia esteroidea, ¿qué intervención clínica define automáticamente la reclasificación a la Clase V en la escala clínica de Osserman?",
        options: ["Debilidad severa simétrica de los músculos axiales", "Intubación con o sin ventilación mecánica", "Parálisis flácida total e irreversible de músculos extraoculares", "Alimentación mediante sonda nasogástrica exclusiva"],
        answer: 1,
        justification: "Justificación: La clasificación de Osserman (revisada) estratifica objetivamente la gravedad vital y el compromiso respiratorio en la Miastenia Gravis, dictando el pronóstico. De acuerdo a la GPC de Miastenia Gravis, la escala va de la ptosis focal (I) a la afección troncal. No obstante, la normativa es absoluta al dictaminar que el grado máximo de colapso, \"Clase V\", está definido única y exclusivamente por el requerimiento emergente de control de la vía aérea (\"intubación, con o sin soporte de presión mecánica continua\"), denotando fallo inminente diafragmático que amenaza la vida.<br><br>Perla ENARM: Clasificación Clínica: Clase V: Definida por intubación, con o sin ventilación mecánica.<br><br>Análisis de Distractores: A) La debilidad que afecta los músculos axiales (como los erectores espinales o cuello) posiciona al paciente en una gravedad Clase IVa, no V. C) La afectación motora oftálmica severa o limitante acompaña a todos los grados sistémicos, pero no es la base definitoria clínica letal de la quinta etapa de la escala. D) La instauración de una cánula para alimentación entérica por disfagia y paresia palatina sitúa a la persona obligadamente en la categoría de riesgo IVb, reservando el paso V solo para la invasión endotraqueal ventilatoria.",
        source: "IMSS-391-20 RR, Diagnóstico y Tratamiento de Miastenia Gravis, 2020, Anexos, Cuadro de Clasificación, Página 44."
    },
    {
        id: 72,
        question: "En la práctica de atención primaria, ¿cuál es el objetivo clínico primordial por el que se indica aplicar el cuestionario validado \"CAPTURE\"?",
        options: ["Medir objetivamente la adherencia técnica a los inhaladores presurizados", "Estratificar de forma urgente la necesidad de oxígeno domiciliario", "Identificar la prevalencia comunitaria de dependencia a la nicotina", "Identificar pacientes no diagnosticados y riesgo de exacerbación"],
        answer: 3,
        justification: "Justificación: El subdiagnóstico de la Enfermedad Pulmonar Obstructiva Crónica (EPOC) condena a miles de pacientes al deterioro funcional silencioso antes de realizar una espirometría. De acuerdo a la GPC de EPOC, la herramienta óptima, corta y validada mundialmente que el médico general debe utilizar durante el escrutinio de primer contacto es el cuestionario CAPTURE (COPD Assessment in Primary Care To Identify Undiagnosed Respiratory Disease and Exacerbation Risk). Sus siglas y su instructivo explícito establecen que su meta primordial es identificar enfermedad respiratoria obstructiva oculta y cuantificar el riesgo inminente de exacerbaciones hospitalarias.<br><br>Perla ENARM: Cuadro 4. Cuestionario CAPTURE para identificar pacientes con enfermedad respiratoria y riesgo de exacerbaciones en atención primaria.<br><br>Análisis de Distractores: A) La técnica de los dispositivos y la adherencia farrmacológica se explora mediante observación directa (checklist de dispositivo MDI) o cuestionarios de Morisky-Green, no con CAPTURE. B) La necesidad de oxigenoterapia en el cor pulmonale compensado se documenta estrictamente a través de gasometría arterial diurna seriada en reposo (PaO2 < 55 mmHg). C) La dependencia a la nicotina y la voluntad del cese tabáquico se estratifican clínicamente de forma magistral con la escala internacional de Fagerström.",
        source: "IMSS-037-21 RR, Prevención y Diagnóstico de EPOC, 2021, Anexos, Cuadro 4, Página 22."
    },
    {
        id: 73,
        question: "Al someter a un adulto mayor a la evaluación cognitiva de escrutinio \"Montreal Cognitive Assessment\" (MoCA) debido a factores de riesgo vascular, ¿a partir de qué puntaje total se define el punto de corte para declarar sospecha de deterioro cognoscitivo?",
        options: ["Menor o igual a 20 puntos", "Menor o igual a 25 puntos", "Menor o igual a 22 puntos", "Menor o igual a 28 puntos"],
        answer: 1,
        justification: "Justificación: A diferencia del MMSE, la prueba MoCA es altamente sensible para detectar el Deterioro Cognitivo Leve (DCL) en fases incipientes (especialmente disfunción ejecutiva frontosubcortical vascular). De acuerdo a la GPC de Valoración Geriátrica Integral, en el \"Algoritmo 1. Evaluación de Deterioro Cognoscitivo\", se aplican las pruebas de tamizaje. Si el resultado total arrojado por el paciente en la prueba de MoCA es numéricamente \"Menor o igual a 25 puntos\" (habiendo ajustado el punto extra por escolaridad baja), se abandona la observación ambulatoria anual y se declara una alerta positiva (\"Con deterioro cognoscitivo\") para proceder al escrutinio de neuroimagen y organicidad.<br><br>Perla ENARM: Algoritmo 1. Evaluación de deterioro cognoscitivo: ¿Montreal Cognitive Assessment (MoCA) <= 25? -> SI -> CON deterioro cognoscitivo.<br><br>Análisis de Distractores: A, C y D) Ninguno de estos valores representa el dintel psicométrico estandarizado y validado en la traducción nacional clínica de la guía geriátrica. 26 a 30 puntos corresponden a un individuo cognitivamente íntegro y preservado para su grupo poblacional etario.",
        source: "IMSS-190-18 RR, Valoración Geriátrica Integral en Unidades de Atención Médica, 2018, Algoritmo 1, Página 29."
    },
    {
        id: 74,
        question: "¿Cuál es la terapia neoplásica indicada como primer eslabón del algoritmo para una paciente diagnosticada mediante biopsia con cáncer de mama inflamatorio (Etapa clínica III)?",
        options: ["Mastectomía radical modificada", "Radioterapia sistémica con haces de electrones", "Quimioterapia neoadyuvante", "Tamoxifeno asociado a inhibidores de aromatasa"],
        answer: 2,
        justification: "Justificación: El cáncer de mama inflamatorio (T4d) es una variante biológicamente letal y de diseminación dérmica linfática veloz. Quirúrgicamente, la piel inflamada, tensa y edematosa (piel de naranja extensa) impide la cicatrización primaria adecuada y confiere un riesgo inminente de diseminación de márgenes en el bisturí. De acuerdo a la GPC de Cáncer de Mama, el \"Algoritmo 4. Tratamiento del Cáncer de Mama etapa clínica III\" es taxativo: si la presentación es \"cáncer inflamatorio\", el paso mandatorio número uno previo a cualquier intervención local es la \"Quimioterapia neoadyuvante\" para citorreducir masivamente el lecho e inactivar la hiperemia.<br><br>Perla ENARM: Algoritmo 4: Cáncer inflamatorio -> Quimioterapia neoadyuvante -> ¿Presenta respuesta clínica? -> SI -> Mastectomía radical modificada.<br><br>Análisis de Distractores: A) La mastectomía radical es imposible y contraindicada en fase inflamatoria aguda; solo se ejecuta de forma posterior si la quimioterapia de inducción logró enfriar el proceso y generar respuesta tisular. B) La radioterapia exclusiva sin quimioterapia inicial carece del control orgánico micrometastásico sistémico que este subtipo tumoral exige por su alta agresividad inherente. D) El manejo hormonal empírico primario no está indicado en escenarios de alto riesgo infiltrativo acelerado; y además, debe reservarse estrictamente después de conocer la expresión de receptores moleculares intracelulares tumorales pos-cirugía.",
        source: "IMSS-232-09 RR, Tratamiento Quirúrgico de Cáncer de Mama, 2009, Algoritmos, Página 37."
    },
    {
        id: 75,
        question: "En un paciente adulto portador de fibrilación auricular no valvular de alto riesgo (CHA2DS2-VASc elevado) e integridad en la tasa de filtración glomerular, ¿cuál es la dosis de mantenimiento estándar diaria recomendada en la guía mexicana para la protección tromboembólica con Rivaroxaban?",
        options: ["5 mg cada 12 horas", "20 mg al día", "150 mg cada 12 horas", "60 mg al día"],
        answer: 1,
        justification: "Justificación: Los Nuevos Anticoagulantes Orales (NOACs) sustituyen eficazmente a los antagonistas de vitamina K debido a que carecen de interacciones alimentarias y no requieren monitoreo de INR. Cada molécula posee posología estricta. De acuerdo a la GPC de Anticoagulación Oral, en la gráfica comparativa de reducción de riesgo de evento vascular isquémico en fibrilación auricular vs riesgo hemorrágico, el régimen estándar avalado y validado en sus ensayos pivotales para Rivaroxaban equivale a la toma oral única de \"20 mg al día\".<br><br>Perla ENARM: Gráfica de riesgo de evento vascular: Rivaroxaban 20 mg/día. (Otros: Apixaban 5 mg/2xdía, Dabigatran 150 mg/2xdía).<br><br>Análisis de Distractores: A) 5 mg cada 12 horas (dos veces al día) es la posología curativa y profiláctica biológica clásica universal del fármaco Apixaban. C) 150 mg administrado dos veces por día (cada 12 horas) refleja el régimen intensivo estándar para el medicamento inhibidor de trombina Dabigatrán. D) 60 mg al día obedece a la dosificación de Edoxabán (cuya otra versión avalada es de 30 mg al día para ajuste renal).",
        source: "SS-014-18 RR, Anticoagulación Oral, 2018, Anexos, Gráfica de Riesgo, Página 66."
    },
    {
        id: 76,
        question: "En el abordaje temprano de un paciente joven al cual se le ha practicado una amputación transfemoral, ¿en qué dirección anatómica se recomienda invariablemente aplicar el vendaje elástico de alta compresión sobre el muñón residual en consolidación?",
        options: ["Dirección de proximal a distal", "Dirección horizontal concéntrica pura", "Dirección de distal a proximal", "Dirección cruzada exclusiva en ápice"],
        answer: 2,
        justification: "Justificación: La etapa pre-protésica condiciona el futuro laboral del amputado. El muñón quirúrgico fresco es proclive al edema masivo estancado por decúbito, lo cual genera dolor en miembro fantasma, retardo cicatricial tisular venoso y bulbosidades que impiden embocar la cuenca de una prótesis. De acuerdo a la GPC de Rehabilitación en Amputación, el \"Punto de Buena Práctica\" de enfermería y fisioterapia indica de forma incondicional que todo vendaje elástico conformador de lecho ha de ejercer mayor tensión distal y menor proximal (\"de distal a proximal\") para propulsar eficientemente el fluido intersticial hacia las cisternas colectoras linfáticas regionales inguinales, conformando un muñón crónico de silueta cónica ideal.<br><br>Perla ENARM: El vendaje elástico del muñón debe realizarse... con venda de alta compresión, correcto anclaje (sujeción proximal), dirección distal-proximal, con reajustes necesarios.<br><br>Análisis de Distractores: A) Vendar de proximal a distal crea un \"efecto de torniquete o ligadura\" central, secuestrando la sangre declive en el ápice, necrosando los colgajos inferiores y deformando la anatomía a una forma esférica (muñón bulboso). B y D) La circularidad pura asfixia el retorno vascular, mientras que anclar solo el ápice es incapaz de exprimir el tercer espacio de manera gradual o de conformar anatómicamente el lecho óseo subcutáneo.",
        source: "DIF-257-21 RR, Rehabilitación en Amputación de Miembro Inferior, 2021, Recomendaciones Pre-Protésicas, Página 11."
    },
    {
        id: 77,
        question: "En el escrutinio de sarcopenia en la atención comunitaria geriátrica mediante el cuestionario validado SARC-F (adaptación mexicana), ¿qué sumatoria total de puntos establece estadísticamente un resultado positivo o de sospecha alta para el padecimiento?",
        options: ["Mayor o igual a 2 puntos", "Mayor o igual a 6 puntos", "Mayor o igual a 4 puntos", "Mayor o igual a 8 puntos"],
        answer: 2,
        justification: "Justificación: La sarcopenia genera fragilidad intrínseca que precipita caídas discapacitantes, postración en cama y fracturas fatales del adulto mayor en el hogar. El cuestionario clínico autoadministrable SARC-F evalúa cinco parámetros funcionales gruesos: fuerza para cargar pesas, asistencia en la caminata, dificultad en silla, subir escalones duros y número de caídas. De acuerdo a la GPC de Diabetes Mellitus en el Adulto Mayor, el constructo psicométrico de escrutinio determina de manera categórica que: \"El resultado es positivo cuando la suma de las respuestas es mayor o igual a 4 puntos\".<br><br>Perla ENARM: Cuestionario SARC-F: INTERPRETACION: El resultado es positivo cuando la suma de las respuestas es mayor o igual a 4 puntos.<br><br>Análisis de Distractores: A) Un puntaje menor de 4 (como 2 puntos) puede indicar deficiencias articulares ligeras asociadas a la edad (por ejemplo, \"alguna dificultad para subir escalones\") que no llegan a satisfacer los duros criterios de merma severa funcional y muscular sarcopénica. B y D) 6 y 8 puntos revelan una atrofia terminal caquéctica muy severa con dependencia inmovilizante franca, pero el umbral de disparo intervencionista nutricional inicia desde los 4 puntos de corte.",
        source: "IMSS-657-21 RR, Diabetes Mellitus en el Adulto Mayor, 2021, Anexos (Cuestionario SARC-F), Página 61."
    },
    {
        id: 78,
        question: "Al cuantificar la severidad de un evento vascular isquémico hemisférico mediante la escala NIHSS, ¿qué hallazgo clínico en el ítem 5 (referente a la fuerza motora de las piernas) otorga directamente al paciente una calificación intermedia de \"2 puntos\"?",
        options: ["No hay esfuerzo evidente en contra de la gravedad", "Cae de forma claudicante después de cinco segundos", "Titubea o desciende suavemente después de cinco segundos", "No existe ningún tipo de movimiento voluntario"],
        answer: 1,
