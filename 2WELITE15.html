    <script>
        const questionsData = [

            {
                id: 1, 
                question: "¿En qué periodo gestacional se debe realizar la prueba bacteriológica para la detección de colonización por Estreptococo del Grupo B en embarazos de feto único?", 
                options: ["35 a 37 semanas", "28 a 32 semanas", "20 a 24 semanas", "38 a 40 semanas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, la flora cervicovaginal materna es dinámica. Realizar el escrutinio en este intervalo maximiza el valor predictivo positivo y negativo para definir con exactitud el estatus de portadora justo antes de que inicie la resolución del parto de término o pretérmino tardío.<br><br>Perla ENARM: \"Las pruebas bacteriológicas se deben realizar idealmente entre la semana 35 a 37 de gestación, o tres a cinco semanas antes de la fecha prevista del nacimiento para las mujeres con embarazo gemelar\".<br><br>Análisis de Distractores: Un tamizaje más temprano entre la semana 20 y 32 (B y C) carece de correlación con la flora bacteriana presente al momento del parto. Hacerlo en la semana 38 a 40 (D) es tardío, exponiendo a riesgo de infección vertical no prevista si el parto ocurre espontáneamente antes del tamizaje.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Pronóstico, Página 31." 
            },

    {
        id: 2,
        question: "Ante la triada clínica de fiebre, taquicardia y crepitaciones a la auscultación, ¿cuál es el estudio de gabinete inicial e indispensable para obtener certeza diagnóstica?",
        options: ["Tomografía de alta resolución", "Radiografía de tórax", "Gammagrama ventilatorio", "Ultrasonido pulmonar focalizado"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Neumonía Adquirida en la Comunidad, el abordaje exige la demostración anatómica de un infiltrado nuevo o zona de consolidación para confirmar la etiología infecciosa alveolar y evitar el uso ciego de antibióticos.<br><br>Perla ENARM: Se debe realizar una radiografía de tórax, si se requiere de certeza diagnóstica en el manejo de un paciente con sospecha de neumonía.<br><br>Análisis de Distractores: La tomografía es superior pero no se usa de escrutinio inicial por radiación y costo. El ultrasonido es una alternativa si hay disponibilidad, pero la radiografía es el estándar universal establecido indispensablemente.",
        source: "IMSS-234-09, Prevención, Diagnóstico y Tratamiento de Neumonía Adquirida en la Comunidad, 2017, Diagnóstico clínico, Página 17."
    },

    {
        id: 3,
        question: "¿Cuál es el punto de corte electrocardiográfico diagnóstico de nueva elevación del segmento ST en derivaciones V2 y V3 para mujeres de cualquier edad?",
        options: ["Mayor o igual a 1 mm", "Mayor o igual a 1.5 mm", "Mayor o igual a 2 mm", "Mayor o igual a 2.5 mm"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, los criterios de voltaje en la cara anterior tienen diferencias dependientes del sexo para mejorar la sensibilidad y especificidad diagnóstica.<br><br>Perla ENARM: \"Nueva elevación del segmento ST en por lo menos dos derivaciones electro-anatómicas contiguas con los siguientes puntos de corte: ≥ 0.15 mV en mujeres (cualquier edad) en V2 y V3\". (1 mm equivale a 0.1 mV).<br><br>Análisis de Distractores: La opción A es el corte estándar para todas las demás derivaciones que no sean V2 y V3. La opción C es el corte exclusivo para hombres de 40 años o mayores. La opción D es el corte para hombres menores de 40 años.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 3), Página 74."
    },
    {
        id: 4,
        question: "¿Cuál es el punto de corte electrocardiográfico diagnóstico de nueva elevación del segmento ST en derivaciones V2 y V3 para hombres mayores o iguales a 40 años?",
        options: ["Mayor o igual a 1 mm", "Mayor o igual a 1.5 mm", "Mayor o igual a 2 mm", "Mayor o igual a 2.5 mm"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, a medida que avanza la edad en el hombre, la exigencia de voltaje en cara anterior disminuye frente a la de pacientes jóvenes.<br><br>Perla ENARM: \"Nueva elevación del segmento ST en por lo menos dos derivaciones electro-anatómicas contiguas con los siguientes puntos de corte: ≥ 0.20 mV en hombres con edad ≥ 40 años en V2 y V3\".<br><br>Análisis de Distractores: La opción A aplica para las derivaciones fuera de V2 y V3. La opción B es el criterio universal de voltaje en cara anterior para mujeres. La opción D es el umbral para hombres menores de 40 años.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 3), Página 74."
    },




            {
                id: 5, 
                question: "¿Cuál es la indicación respecto al uso de medidas no farmacológicas, como el consumo de jugo de arándano o lisados bacterianos, para la prevención de infecciones urinarias en la gestación?", 
                options: ["Indicar junto con nitrofurantoína", "Usar solo en infecciones recurrentes", "Recomendar como profilaxis primaria", "No recomendar por evidencia insuficiente"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, el uso de alternativas naturales o suplementos biológicos no ha demostrado superioridad estadística frente a placebo en la reducción de episodios infecciosos.<br><br>Perla ENARM: \"No existe suficiente evidencia para recomendar el consumo de productos de arándano, probióticos y lisados bacterianos durante el embarazo para prevención de infecciones del tracto urinario.\"<br><br>Análisis de Distractores: Las opciones profilácticas, primarias o complementarias son incorrectas porque la directriz desaconseja su uso rutinario al no modificar la tasa de bacteriuria asintomática, reservando el manejo preventivo exclusivamente para agentes farmacológicos validados (nitrofurantoína).", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Prevención, Página 17." 
            },
    {
        id: 6,
        question: "Para el tratamiento de la hipertensión arterial sistémica en enfermedad renal crónica terminal, ¿qué estrategia farmacológica de combinación debe evitarse siempre?",
        options: ["Inhibidor de enzima y antagonista de receptor", "Diurético de asa y calcioantagonista", "Antagonista de receptor y diurético", "Inhibidor de enzima y betabloqueador"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial en el Primer Nivel, el uso de IECA y ARA II de forma simultánea induce parálisis irreversible del glomérulo, precipitando hiperpotasemia fatal sin otorgar ninguna mejoría antiproteinúrica o nefroprotectora adicional.<br><br>Perla ENARM: \"En pacientes con ERC terminal la estrategia recomendada de tratamiento debe incluir un inhibidor del sistema de renina-angiotensina BRA o IECA por el beneficio ante la reducción de albuminuria, evitando el uso de estos de manera simultánea.\"<br><br>Análisis de Distractores: La adición de diuréticos de asa es mandatoria en falla terminal para movilizar líquidos intraextracelulares. El uso de betabloqueadores y calcioantagonistas ofrece rutas complementarias seguras de reducción tensional que no deterioran directamente la arteriola eferente renal.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento de la Hipertensión Arterial en el Primer Nivel de Atención, 2021, Tratamiento, Página 57."
    },



    
    
    {
        id: 7,
        question: "En una paciente estable hemodinámicamente y diagnosticada con anemia secundaria durante el puerperio, ¿cuál es la dosis oral estándar recomendada de sulfato ferroso (hierro elemental)?",
        options: ["120 mg/día", "150 mg/día", "180 mg/día", "200 mg/día"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, el pilar de seguimiento extrahospitalario busca revertir la depleción de depósitos férricos que precipitan morbilidad crónica.<br><br>Perla ENARM: \"Es recomendable ofrecer siempre que sea posible la administración de sulfato ferroso por vía oral, la dosis con base al hierro elemental es: 180 mg/día dividido en tres dosis\".<br><br>Análisis de Distractores: Las otras dosis (120, 150 y 200 mg/día) corresponden a pautas desactualizadas o empíricas. La GPC homologada nacional estipula los 180 mg diarios (lejos de los lácteos) como recomendación universal sustentada en evidencia.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 38."
    },

    {
        id: 8,
        question: "¿Qué porcentaje de las fracturas del extremo proximal del fémur corresponden anatómicamente a fracturas del cuello femoral?",
        options: ["25%", "33%", "53%", "75%"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Fracturas de Fémur Proximal, más de la mitad de todas las lesiones proximales asientan específicamente en la región cervical, marcando su extrema relevancia epidemiológica en los servicios de traumatología.<br><br>Perla ENARM: \"De todas las fracturas del extremo proximal del fémur, el 53% son fracturas del cuello femoral...\"<br><br>Análisis de Distractores: Las cifras 25% (A), 33% (B) y 75% (D) no corresponden a los datos epidemiológicos citados en el texto para la presentación topográfica del trazo fracturario.",
        source: "IMSS-115-08, Diagnóstico y tratamiento de FRACTURAS INTRACAPSULARES DEL EXTREMO PROXIMAL DEL FÉMUR, 2017, Justificación, Página 8."
    },


    {
        id: 9,
        question: "En gestantes positivas a Virus de Inmunodeficiencia Humana que presentan ruptura prematura de membranas, ¿cómo afecta directamente el tiempo de latencia al pronóstico fetal?",
        options: ["Disminuye con uso de corticosteroides", "Aumenta riesgo por cada hora transcurrida", "Es independiente del tiempo intrauterino", "Se anula completamente con antibióticos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la integridad de las membranas es la barrera final que protege al feto de los líquidos maternos infectados en el cérvix. Al romperse esta barrera, la exposición prolongada favorece la inoculación del virus. El manejo expectante es sumamente peligroso y requiere evaluación multidisciplinaria crítica.<br><br>Perla ENARM: \"El riesgo de transmisión vertical de HIV aumentó por cada hora de duración de la ruptura de membranas, obteniendo una transmisión del 8% con una latencia de 2 horas y 31% con 24 h de RPM\".<br><br>Análisis de Distractores: Los corticosteroides (A) maduran los pulmones pero no tienen impacto antiviral. El factor tiempo es la variable más crítica documentada, por lo que no es independiente (C). Los antibióticos convencionales (D) destruyen bacterias patógenas típicas, pero son absolutamente ineficaces contra cargas retrovirales sistémicas.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 21."
    },

    {
        id: 10,
        question: "¿Cuál es el valor de corte del porcentaje de células en esputo utilizado para clasificar la inflamación como bronquitis eosinofílica?",
        options: ["≥ 1.5 %", "> 2.5 %", "> 5.0 %", "≥ 10.0 %"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, la evaluación citológica del esputo permite identificar fenotipos inflamatorios específicos distintos a los de origen viral o bacteriano clásico.<br><br>Perla ENARM: Bronquitis eosinofílica: inflamación eosinofílica de las vías respiratorias con esputo eosinofilico mayor de 2.5%.<br><br>Análisis de Distractores: Las opciones A, C y D representan valores de corte que no cumplen con los criterios estrictos del glosario normativo nacional para definir esta variante clínica.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Glosario, Página 35."
    },
    {
        id: 11,
        question: "Tras la resolución de un embarazo complicado con preeclampsia, ¿a las cuántas semanas de puerperio se debe citar a la paciente para evaluar la resolución de la proteinuria?",
        options: ["2 semanas", "4 semanas", "6 semanas", "12 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Preeclampsia en segundo nivel, los riñones de la paciente requieren un periodo de desinflamación y barrido de la fisiología del embarazo para normalizar la membrana basal glomerular, fijando el punto de control al término exacto del puerperio tardío.<br><br>Perla ENARM: \"A toda mujer con diagnóstico de preeclampsia se les deberá medir la presión arterial y pedir un análisis de orina para valorar proteinuria a las 6 semanas\".<br><br>Análisis de Distractores: A las 2 o 4 semanas, la paciente aún puede mostrar trazas fisiológicas residuales de la depuración o estar bajo ajuste de antihipertensivos. A las 12 semanas el daño podría progresar a cronicidad si no se revaluó oportunamente.",

    },

    {
        id: 12,
        question: "Previo a la toma de biopsia prostática guiada por ultrasonido, ¿cuál es la recomendación respecto a la administración de un enema evacuante?",
        options: ["Obligatorio la noche previa", "Aplicación dos horas antes", "No se sugiere realizar", "Únicamente con solución salina"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, la preparación intestinal mecánica no confiere una ventaja estadísticamente significativa en la reducción de complicaciones infecciosas y somete al paciente a incomodidad innecesaria. La profilaxis antibiótica es la única medida preventiva indispensable.<br><br>Perla ENARM: No se sugiere realizar enema en pacientes que serán sometidos a una biopsia transrectal de próstata.<br><br>Análisis de Distractores: Indicar enemas rutinarios (opciones A, B y D) carece de evidencia clínica actual para la prevención de sepsis prostática y añade costos logísticos al procedimiento ambulatorio.",

    },

        {
        id: 13,
        question: "De acuerdo a la clasificación epidemiológica, ¿qué grupo etario se considera de alto riesgo de recurrencia tras un primer evento de nefrolitiasis?",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `

                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGASProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGASLastQId', currentQuestionId);
                else localStorage.removeItem('CGASLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGASProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</body>
</html>
