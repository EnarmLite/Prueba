    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el grupo etario que presenta el pico de incidencia máximo para el desarrollo de cólico renoureteral?",
        options: ["15 a 30 años", "31 a 50 años", "51 a 70 años", "≥ 71 años"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, la nefrolitiasis sintomática tiene una presentación característica en pacientes en edad productiva, afectando con mayor frecuencia a los hombres en una relación de 3 a 1.<br><br>Perla ENARM: \"El pico de incidencia fue entre los 31 y 50 años de edad en ambos sexos, con 36.3% en hombres y 21.23% en mujeres.\"<br><br>Análisis de Distractores: Las edades en los extremos de la vida (A y D) tienen una incidencia mucho menor. En pacientes mayores de 60 años (C) con cuadro de primera vez, siempre deben descartarse simuladores graves (como un aneurisma aórtico) antes de asumir etiología litiásica simple.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 2,
        question: "¿Cuál es el componente químico que conforma la etiología de la mayoría de los cálculos renales?",
        options: ["Ácido úrico", "Fosfato de amonio", "Oxalato de calcio", "Cistina pura"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, la gran mayoría de la carga litiásica en la población se debe a la sobresaturación y precipitación de sales de calcio, siendo estas estructuras marcadamente radioopacas a los rayos X.<br><br>Perla ENARM: \"La composición litiásica más frecuente fue oxalato de calcio monohidratado y dihidratado (61.2%).\"<br><br>Análisis de Distractores: El ácido úrico (A) es la causa principal de cálculos radiolúcidos. El fosfato de amonio (B) forma cálculos coraliformes en presencia de infecciones ureasa-positivas. La cistina (D) se asocia a defectos genéticos metabólicos raros.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 3,
        question: "¿Cuál es el factor de riesgo dietético documentado con mayor prevalencia en la génesis de la litiasis renal agudizada?",
        options: ["Ingesta hídrica < 2 L/día", "Consumo elevado de calcio", "Dieta rica en proteínas", "Ingesta excesiva de sodio"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, un bajo volumen urinario condiciona una orina concentrada, desencadenando la sobresaturación y cristalización patológica.<br><br>Perla ENARM: \"El 82% de los pacientes con cólico renal tomaban menos de 2 L de agua simple al día.\"<br><br>Análisis de Distractores: Restringir excesivamente el calcio dietético (B) de hecho aumenta el riesgo de litiasis por hiperoxaluria. Las proteínas (C) y el sodio (D) son factores contribuyentes, pero el bajo consumo de líquidos es el factor de riesgo universal más importante.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 4,
        question: "¿Cuál es el estudio de imagenología de elección inicial en el servicio de urgencias ante la sospecha de urolitiasis?",
        options: ["Tomografía simple", "Ultrasonido renal", "Radiografía de abdomen", "Urografía excretora"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, el abordaje primario requiere un estudio accesible y libre de radiación ionizante que permita visualizar signos indirectos de obstrucción, como la hidronefrosis.<br><br>Perla ENARM: \"El ultrasonido debe ser el estudio de imagenología inicial en el servicio de urgencias y debe realizarse, de preferencia, en los pacientes con sospecha de nefrolitiasis.\"<br><br>Análisis de Distractores: La tomografía (A) es el estándar de oro, pero no el estudio inicial en triage. La radiografía simple (C) tiene baja sensibilidad (40-60%). La urografía excretora (D) ha sido desplazada y utiliza medio de contraste nefrotóxico.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 23."
    },
    {
        id: 5,
        question: "¿Cuál es el estudio de imagen con el mayor rendimiento diagnóstico para identificar nefrolitiasis independientemente de la composición del cálculo?",
        options: ["Tomografía no contrastada", "Resonancia magnética", "Ultrasonido Doppler", "Tomografía con contraste"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, la Uro-TAC simple tiene una sensibilidad y especificidad superiores al 98%, permitiendo evaluar tamaño exacto, localización y densidad litiásica sin el riesgo de contraste intravenoso.<br><br>Perla ENARM: \"La tomografía computarizada no contrastada es la prueba con el mejor rendimiento diagnóstico, por lo tanto, si se cuenta con el recurso, es el estudio de elección en el paciente con litiasis ureteral.\"<br><br>Análisis de Distractores: El contraste (D) enmascara cálculos intraluminales blancos. La resonancia (B) no es eficaz para visualizar calcificaciones agudas. El ultrasonido (C) es el inicial, pero es operador-dependiente en el tercio distal del uréter.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 24."
    },
    {
        id: 6,
        question: "¿Cuál es el fármaco de primera línea para el control del dolor por cólico renoureteral por vía intravenosa?",
        options: ["Paracetamol 1 g", "Diclofenaco 75 mg", "Tramadol 50 mg", "Butilhioscina 20 mg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, el dolor agudo es mediado por la síntesis de prostaglandinas que incrementan la presión de la cápsula renal, siendo los AINEs la piedra angular del tratamiento.<br><br>Perla ENARM: \"Se debe iniciar tratamiento con AINES, por vía intravenosa, para control del dolor en pacientes con cólico renoureteral. Se puede utilizar diclofenaco 75 mg Intravenoso...\"<br><br>Análisis de Distractores: El paracetamol (A) carece del efecto antiinflamatorio renal potente. La butilhioscina (D) o cualquier antiespasmódico aislado no se recomienda como primera línea. Los opioides (C) se reservan para rescate refractario.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 27."
    },
    {
        id: 7,
        question: "En pacientes con cardiopatía isquémica o insuficiencia cardíaca severa, ¿cuál es el analgésico de primera línea recomendado para el dolor cólico?",
        options: ["Ketorolaco 30 mg", "Metamizol 2 g", "Diclofenaco 75 mg", "Morfina 5 mg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, los AINEs tradicionales incrementan el riesgo de eventos coronarios mayores, estando contraindicados ante enfermedad cardiovascular grave.<br><br>Perla ENARM: \"En pacientes con insuficiencia cardíaca congestiva, cardiopatía isquémica y enfermedad arterial periférica, se debe emplear como medicamento de elección el metamizol sódico 2 gr IV en infusión lenta.\"<br><br>Análisis de Distractores: El ketorolaco (A) y diclofenaco (C) son AINEs contraindicados en este escenario. La morfina (D) es un opioide que no se postula como reemplazo primario en el algoritmo inicial antes de intentar metamizol.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 27."
    },
    {
        id: 8,
        question: "Ante la falla del tratamiento inicial con AINEs, ¿cuál es el fármaco indicado específicamente como terapia de rescate?",
        options: ["Clonixinato de lisina 100 mg", "Nalbufina 10 mg", "Buprenorfina 0.3 mg", "Paracetamol 1 g"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, antes de escalar al uso rutinario de opioides en urgencias, se debe agotar la vía antiinflamatoria usando un analgésico de distinta familia o potencia.<br><br>Perla ENARM: \"Se recomienda la administración de 100 mg de Clonixinato de Lisina, vía intravenosa como fármaco de segunda línea para el control del dolor o terapia de rescate.\"<br><br>Análisis de Distractores: Los opioides puros (B y C) se utilizan en caso de refractariedad extrema o tras fallar el esquema dual, pero la norma directa de \"rescate pos-AINE\" cita al clonixinato. El paracetamol (D) es ineficaz para dolor severo isquémico renal.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 28."
    },
    {
        id: 9,
        question: "¿Cuál es el fármaco de elección para la terapia médica expulsiva en un cálculo ureteral distal < 10 mm?",
        options: ["Furosemida 20 mg", "Nifedipino 30 mg", "Tamsulosina 0.4 mg", "Finasterida 5 mg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, los bloqueadores alfa-1 adrenérgicos relajan selectivamente el músculo liso del uréter inferior, incrementando las tasas de paso espontáneo del cálculo.<br><br>Perla ENARM: \"Se deben utilizar bloqueadores alfa como tratamiento para la expulsión del lito. Se recomienda el uso de Tamsulosina 0.4 mg por día.\"<br><br>Análisis de Distractores: La furosemida (A) no tiene efecto relajante. El nifedipino (B) se usó históricamente pero la guía mexicana prioriza los bloqueadores alfa. La finasterida (D) actúa en la próstata por inhibición hormonal, sin efecto ureteral litiásico.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 31."
    },
    {
        id: 10,
        question: "¿Cuál es el agente farmacológico con mayor eficacia demostrada para el tratamiento preventivo y agudo de náusea o vómito en urolitiasis?",
        options: ["Metoclopramida 10 mg", "Ondansetrón 4 mg", "Butilhioscina 20 mg", "Dimenhidrinato 50 mg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, el reflejo emetógeno secundario a la distensión retroperitoneal responde mejor al antagonismo del receptor 5-HT3 en comparación con agentes de primera generación.<br><br>Perla ENARM: \"Se recomienda el uso de ondansetron 4 mg intravenoso, para el control de las náuseas y el vómito del paciente con cólico renoureteral.\"<br><br>Análisis de Distractores: La metoclopramida (A) resultó ser menos eficaz que ondansetrón en ensayos clínicos. Butilhioscina (C) y dimenhidrinato (D) no son validados formalmente como profilaxis central de rescate vagal en esta GPC.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 30."
    },
    {
        id: 11,
        question: "En el análisis del sedimento urinario, ¿qué punto de corte de piuria sugiere fuertemente una infección de tracto urinario asociada a la litiasis?",
        options: ["> 3 leucocitos/campo", "> 5 leucocitos/campo", "> 10 leucocitos/campo", "> 15 leucocitos/campo"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, detectar celularidad inflamatoria incrementada exige descartar una probable urosepsis coexistente con la obstrucción anatómica.<br><br>Perla ENARM: \"Un nivel de piuria > 5 leucocitos por campo tiene una sensibilidad del 86% y una especificidad del 79% para el diagnóstico de infección del tracto urinario.\"<br><br>Análisis de Distractores: Aunque 10 leucocitos (C) es usado tradicionalmente en otras guías internacionales para cistitis, el documento nacional estratifica el riesgo infeccioso específicamente al sobrepasar los 5 por campo en este contexto.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 19."
    },
    {
        id: 12,
        question: "Tras la toma obligatoria del urocultivo, ¿cuál es el antibiótico empírico de primera elección para el manejo de una urolitiasis infectada?",
        options: ["Ciprofloxacino 400 mg", "Nitrofurantoína 100 mg", "Ceftriaxona 1 g", "Fosfomicina 3 g"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, una litiasis asociada a infección se aborda como una pielonefritis o infección de vías altas, requiriendo penetración tisular sistémica.<br><br>Perla ENARM: \"Se recomienda iniciar ciprofloxacino 400 mg intravenosos cada 12 horas como tratamiento inicial, o bien levofloxacino... y completar de 7 a 14 días de tratamiento.\"<br><br>Análisis de Distractores: Nitrofurantoína (B) y fosfomicina (D) no alcanzan el parénquima renal y se limitan a la vejiga. La ceftriaxona (C) es opción alternativa, pero las fluoroquinolonas están dictadas de forma explícita inicial.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 28."
    },
    {
        id: 13,
        question: "En caso de alergia documentada a fluoroquinolonas, ¿qué antibiótico indica la GPC para iniciar el manejo empírico de litiasis infectada?",
        options: ["Claritromicina 500 mg", "Amoxicilina 500 mg", "Gentamicina 160 mg", "Trimetoprima 160 mg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de cólico renoureteral, ante la limitante de uso del medicamento de primera línea, se prescribe temporalmente esta penicilina en lo que se obtienen las sensibilidades del antibiograma.<br><br>Perla ENARM: \"En caso de alergia, usar amoxicilina 500 mg cada 8 horas por 7 a 14 días.\"<br><br>Análisis de Distractores: Gentamicina (C) o Claritromicina (A) no están protocolizadas en este inciso normativo por sus riesgos nefrotóxicos agregados o falta de espectro genitourinario local respectivo.",
        source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 28."

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {

                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGDUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGDULastQId', currentQuestionId);
                else localStorage.removeItem('CGDULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGDUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
