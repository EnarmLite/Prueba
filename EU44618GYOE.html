    <script>

        const questionsData = [
    {
        id: 1,
        question: "Ante la sospecha de ruptura prematura de membranas pretérmino, ¿cuál es el abordaje inicial recomendado para documentar el diagnóstico?",
        options: ["Cristalografía en helecho", "Prueba de nitrazina", "Historia clínica y especuloscopía", "Ultrasonido obstétrico"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la evaluación clínica mediante el interrogatorio directo de la paciente sobre la pérdida de líquido transvaginal, seguido de la visualización directa del líquido a través del orificio cervical con un espejo vaginal, es el método inicial más efectivo. Las pruebas bioquímicas se reservan para casos de duda o confirmación posterior.<br><br>Perla ENARM: \"El diagnóstico de ruptura espontánea de membranas estará mejor documentado por la historia materna, seguido de la revisión vaginal\".<br><br>Análisis de Distractores: La cristalografía (A) y la nitrazina (B) son estudios complementarios útiles, pero no sustituyen el abordaje clínico inicial. El ultrasonido obstétrico (D) es un auxiliar para valorar el índice de líquido amniótico, pero la simple visualización de líquido normal no descarta el diagnóstico, ni el oligohidramnios lo confirma de forma aislada.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Diagnóstico, Página 13."
    },
    {
        id: 2,
        question: "¿Cuál de las siguientes condiciones es causa documentada de un resultado falso positivo en la prueba de nitrazina al evaluar el pH vaginal?",
        options: ["Moco cervical escaso", "Infección por tricomoniasis", "Uso de corticosteroides", "Deficiencia de ácido ascórbico"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la prueba de nitrazina evalúa el pH alcalino del líquido amniótico (7.1 a 7.3) contrastándolo con el medio vaginal normal (4.5 a 6.0). Sin embargo, ciertos contaminantes y patógenos en el canal vaginal alcalinizan el medio, induciendo resultados erróneos.<br><br>Perla ENARM: \"Contaminantes presentes en vagina como sangre, líquido seminal, vaginosis bacteriana, tricomoniasis y antisépticos alcalinos pueden producir resultados falsos positivos de la nitrazina (1-17%)\".<br><br>Análisis de Distractores: El moco cervical (A) puede causar falsos negativos en la cristalografía, no en la nitrazina. El uso de corticosteroides (C) altera el eje endocrino pero no se reporta como modificador del pH vaginal. La deficiencia de ácido ascórbico (D) es un factor de riesgo para la ruptura, pero no interfiere con la reacción colorimétrica de la prueba.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Diagnóstico, Página 13."
    },
    {
        id: 3,
        question: "¿Qué mecanismo fisiopatológico celular está directamente implicado en el debilitamiento y ruptura de las membranas corioamnióticas?",
        options: ["Metaplasia escamosa", "Hipertrofia miometrial", "Apoptosis celular", "Necrosis fibrinoide"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la integridad estructural de las capas corioamnióticas se pierde por una combinación de factores bioquímicos y mecánicos. A nivel microscópico, la muerte celular programada del tejido de sostén disminuye la resistencia a la tensión.<br><br>Perla ENARM: \"La RPMP probablemente ocurre por la prematura activación de estas vías y también está relacionada con apoptosis, la activación de enzimas catabólicas como las colagenasas y fuerzas mecánicas resultan en la ruptura de membranas\".<br><br>Análisis de Distractores: La metaplasia escamosa (A) es un proceso fisiológico de transformación del epitelio cervical. La hipertrofia miometrial (B) explica el crecimiento uterino, no la falla del saco amniótico. La necrosis fibrinoide (D) es un hallazgo vascular placentario asociado a síndromes hipertensivos, independiente del mecanismo primario de ruptura de membranas.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Justificación, Página 9."
    },
    {
        id: 4,
        question: "Dentro del interrogatorio obstétrico, ¿cuál antecedente es considerado uno de los principales factores de riesgo predictivos para presentar esta patología?",
        options: ["Diabetes gestacional", "Parto pretérmino previo", "Cesárea iterativa", "Macrosomía fetal"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la etiología es multifactorial, implicando sobredistensión uterina, desnutrición y procesos infecciosos; sin embargo, el historial obstétrico desfavorable es el marcador de riesgo recurrente más importante.<br><br>Perla ENARM: \"Dentro de los factores de riesgo para RPM se encuentran infecciones de transmisión sexual, infecciones urinarias, índice de masa corporal bajo, tabaquismo, parto pretérmino previo, distensión uterina...\".<br><br>Análisis de Distractores: La diabetes gestacional (A) y la macrosomía fetal (D) generan complicaciones metabólicas y mecánicas al término, pero no son los detonantes clásicos de la cascada inflamatoria prematura de membranas. La cesárea iterativa (C) aumenta el riesgo de acretismo y ruptura uterina, no de ruptura de membranas pretérmino per se.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Introducción, Página 7."
    },
    {
        id: 5,
        question: "Gestante de 28 semanas de gestación candidata a manejo conservador. ¿Cuál es la dosis y vía de administración normativa de betametasona para inducción de madurez pulmonar?",
        options: ["6 mg intramuscular cada 12 horas", "12 mg intramuscular cada 24 horas", "12 mg intravenoso dosis única", "24 mg intramuscular dosis única"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, el manejo farmacológico fetal exige precisión en los esquemas esteroideos para asegurar la estimulación de los neumocitos tipo II sin alcanzar niveles de toxicidad inefectiva. Este es un dato de memorización obligada.<br><br>Perla ENARM: \"Los esquemas de corticoesteroides recomendados son: Betametasona 12 mg IM cada 24 horas por 2 dosis. Dexametasona 6 mg IM cada 12 horas por 4 dosis\".<br><br>Análisis de Distractores: La opción A (6 mg intramuscular cada 12 horas) es el esquema correcto pero para la Dexametasona, no para la betametasona. Las opciones de vía intravenosa (C) o dosis masiva única de 24 mg (D) no están validadas y exponen a la paciente a efectos adversos severos sin lograr la latencia celular requerida.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 19."
    },
    {
        id: 6,
        question: "¿Cuál es el beneficio clínico demostrado del uso de agentes tocolíticos profilácticos en pacientes con diagnóstico confirmado de ruptura de membranas?",
        options: ["Reducción de mortalidad neonatal", "Prolongación del embarazo 48 horas", "Disminución de corioamnionitis", "Ningún beneficio demostrado"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, suprimir las contracciones en un escenario donde la barrera amniótica ya ha fallado carece de utilidad terapéutica y expone a enmascarar un proceso séptico subyacente. La contracción uterina en este contexto suele ser el primer mecanismo defensivo ante la infección intraamniótica.<br><br>Perla ENARM: \"No se recomienda el uso de tocólisis profiláctica ni terapéutica en mujeres con RPMP\".<br><br>Análisis de Distractores: El uso de tocolíticos en este escenario clínico específico NO reduce la mortalidad (A), NO garantiza ganar 48 horas útiles (B) y definitivamente NO disminuye el riesgo de corioamnionitis (C); de hecho, puede favorecer su progresión silente al evitar la evacuación del tejido infectado.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 22."
    },
    {
        id: 7,
        question: "¿Cuál es el esquema antibiótico profiláctico de primera línea recomendado para el manejo expectante en embarazos menores a 34 semanas?",
        options: ["Ceftriaxona y clindamicina", "Ampicilina y eritromicina", "Penicilina y gentamicina", "Amoxicilina y metronidazol"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la cobertura antimicrobiana dual está diseñada para erradicar patógenos ascendentes típicos, prolongando los días de latencia intrauterina con un perfil de bioseguridad alto para el feto prematuro. Este régimen se aplica inicialmente por vía intravenosa y se completa vía oral.<br><br>Perla ENARM: \"Se recomienda una terapia de ampicilina y eritromicina intravenosa durante dos días, seguido de amoxicilina oral y eritromicina durante 5 días en el manejo expectante de RPMP\".<br><br>Análisis de Distractores: Ceftriaxona y clindamicina (A) es un esquema útil en otras infecciones pélvicas pero no estandarizado para latencia en este escenario. Penicilina y gentamicina (C) es el tratamiento terapéutico empírico para corioamnionitis instaurada, no profiláctico. Amoxicilina y metronidazol (D) no ofrece la cobertura adecuada para los microorganismos blanco sin riesgo añadido.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 20."
    },
    {
        id: 8,
        question: "¿Qué complicación neonatal severa se asocia de forma directa con el uso profiláctico de amoxicilina combinada con ácido clavulánico en estas pacientes?",
        options: ["Enterocolitis necrosante", "Hemorragia intraventricular", "Displasia broncopulmonar", "Sepsis de inicio temprano"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, aunque la amoxicilina sola es parte del tratamiento, la adición del inhibidor de betalactamasas (ácido clavulánico) genera un daño desproporcionado en la frágil mucosa intestinal y el microbioma del prematuro.<br><br>Perla ENARM: \"El uso de amoxicilina con ácido clavulánico se asocia con enterocolitis necrosante por lo cual no se recomienda\".<br><br>Análisis de Distractores: La hemorragia intraventricular (B) y la displasia broncopulmonar (C) son secuelas inherentes a la prematurez extrema y la inmadurez tisular, no toxicidades de este antibiótico específico. La sepsis temprana (D) es justamente lo que se busca evitar con los esquemas antibióticos recomendados, no un efecto secundario directo del clavulánico.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 20."
    },
    {
        id: 9,
        question: "Durante la monitorización de una paciente bajo manejo conservador, ¿qué alteración en la cardiotocografía sugiere infección intraamniótica temprana?",
        options: ["Bradicardia < 110 latidos", "Variabilidad basal disminuida", "Taquicardia > 160 latidos", "Desaceleraciones variables recurrentes"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la respuesta inflamatoria sistémica fetal antecede con frecuencia a los datos clínicos floridos en la madre. El aumento del metabolismo fetal secundario a las citoquinas infecciosas se manifiesta de forma fidedigna elevando la frecuencia basal.<br><br>Perla ENARM: \"Temperatura por arriba de 37.8 grados C., secreción vaginal fétida y taquicardia fetal (frecuencia cardiaca mayor a 160 latidos por minuto) indican corioamnionitis clínica\".<br><br>Análisis de Distractores: La bradicardia (A) y las desaceleraciones variables (D) son indicativos de compresión funicular o sufrimiento fetal agudo secundario a oligohidramnios severo, un evento mecánico. La variabilidad disminuida (B) indica hipoxia crónica o sueño fetal, pero la taquicardia sostenida es el signo patognomónico temprano de sepsis.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Diagnóstico, Página 16."
    },
    {
        id: 10,
        question: "Gestante cursa con ruptura de membranas a las 35 semanas de gestación, sin datos de corioamnionitis ni compromiso fetal. ¿Cuál es la conducta obstétrica definitiva indicada por algoritmo?",
        options: ["Esperar inicio de parto espontáneo", "Interrupción del embarazo", "Iniciar esquema de corticosteroides", "Manejo conservador 7 días"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, superada la semana 34, la madurez pulmonar alveolar es suficiente para que el neonato respire en el medio externo con un mínimo riesgo de morbimortalidad respiratoria. Prolongar la exposición intrauterina al ascenso bacteriano carece de justificación clínica o ética.<br><br>Perla ENARM: \"En RPMP que se presenta después de la semana 34 de gestación se recomienda la interrupción del embarazo\".<br><br>Análisis de Distractores: Esperar el parto espontáneo (A) o aplicar manejo conservador por 7 días (D) somete a la madre a un riesgo innecesario de sepsis fulminante sin otorgar ventaja al neonato maduro. Los corticosteroides (C) no están indicados sistemáticamente después de las 34 semanas por su falta de beneficio residual a esta edad.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 24."
    },
    {
        id: 11,
        question: "En embarazos clasificados como previables (menores a 23 semanas) complicados con esta patología, ¿cuál es la recomendación normativa respecto al plan de manejo?",
        options: ["Amnioinfusión seriada terapéutica", "Interrupción del embarazo", "Cerclaje cervical de emergencia", "Profilaxis antibiótica prolongada"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de ruptura prematura de membranas, la ausencia de líquido amniótico antes de la fase canalicular del desarrollo pulmonar ocasiona una hipoplasia pulmonar letal. El pronóstico neonatal es ominoso, mientras que la madre queda expuesta a un alto riesgo de sepsis severa y coagulopatía.<br><br>Perla ENARM: \"El manejo expectante en embarazos pre viables no se justifica, por lo que la interrupción del embarazo en esos casos es recomendado en virtud del pronóstico neonatal malo y el riesgo de morbilidad materna\".<br><br>Análisis de Distractores: La amnioinfusión (A) ha demostrado no ser efectiva para prevenir la hipoplasia pulmonar secundaria a ruptura precoz. El cerclaje de emergencia (C) está contraindicado y suele ser la causa subyacente. La profilaxis antibiótica aislada (D) no revertirá la inviabilidad pulmonar fetal.",
        source: "GPC-SEDENA-446-18, Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino, 2018, Tratamiento, Página 24."
    },

                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>

                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="FU10321GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoEUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoEULastQId', currentQuestionId);
                else localStorage.removeItem('gyoEULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoEUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
