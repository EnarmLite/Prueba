            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

            </div>

    <script>
        const questionsData = [
    {
        id: 1,
        question: "En la desnutrición infantil, ¿qué indicador antropométrico avalado por la OMS determina una desnutrición aguda grave?",
        options: ["Puntaje Z <-1 DE", "Puntaje Z <-2 DE", "Puntaje Z <-1.5 DE", "Puntaje Z <-3 DE"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, el cruce de umbrales estadísticos dicta la severidad de la depleción de masa corporal. Alcanzar o superar negativamente las tres desviaciones estándar indica un estado consuntivo crítico con alto riesgo de fallo orgánico múltiple.<br><br>Perla ENARM: \"Desnutrición grave/desnutrición proteicocalórica grave, no especificada: estado patológico caracterizado por un déficit mayor o igual a -3 desviaciones estándar del indicador peso para la longitud/talla de la media de los patrones de crecimiento de la OMS\".<br><br>Análisis de Distractores: El puntaje de -1 a -1.99 DE (A y C) clasifica la desnutrición leve, manejable en primer nivel. El puntaje de -2 a -2.99 DE (B) indica desnutrición moderada. Solo el valor menor o igual a -3 DE define la categoría grave.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Glosario, 33."
    },
    {
        id: 2,
        question: "En el tamizaje de desnutrición infantil, ¿cuál es el método normado para obtener la longitud en un paciente de 18 meses de edad?",
        options: ["Decúbito dorsal con infantómetro", "Sedestación con estadímetro", "Posición de pie con estadímetro", "Decúbito lateral con cinta"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, el hito de los dos años de edad cambia obligatoriamente la técnica antropométrica. Antes de esa edad, la bipedestación inmadura altera las mediciones espinales, por lo que el infante debe medirse acostado.<br><br>Perla ENARM: \"La medición de la longitud se debe realizar en menores de dos años en decúbito dorsal con el infantómetro y en mayores de dos años, la talla se mide en posición de pie con el estadímetro\".<br><br>Análisis de Distractores: La posición de pie (C) o sedestación (B) son incorrectas por la edad del paciente (< 2 años), lo que subestimaría el cálculo lineal. El decúbito lateral (D) no es una posición antropométrica estandarizada.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Diagnóstico, 16."
    },
    {
        id: 3,
        question: "En el diagnóstico de desnutrición infantil en zonas marginadas sin báscula ni estadímetro, ¿cuál es el valor de perímetro braquial que indica desnutrición aguda grave?",
        options: ["<15.5 cm", "<13.5 cm", "<11.5 cm", "<17.5 cm"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, ante la falta de equipo para calcular el puntaje Z, la circunferencia de la porción media del brazo es el predictor más fuerte de mortalidad por depleción proteica. Un grosor inferior a 11.5 cm es criterio de urgencia vital.<br><br>Perla ENARM: \"Con alguno de los siguientes signos de desnutrición aguda moderada o grave: Perímetro braquial <11.5 cm\".<br><br>Análisis de Distractores: Los valores mayores como 13.5 cm (B), 15.5 cm (A) o 17.5 cm (D) no son umbrales de urgencia; el punto de corte para clasificar la pérdida crítica de masa muscular en lactantes es estrictamente 11.5 cm.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Cuadros o Figuras, 28."
    },
    {
        id: 4,
        question: "En la desnutrición en menores de cinco años, ¿cuál factor de riesgo familiar directo exige búsqueda intencionada durante el interrogatorio inicial?",
        options: ["Padre con desempleo reciente", "Hermano menor de un año", "Hermano mayor de cinco años", "Madre adolescente multípara"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, el intervalo intergenésico corto provoca el desplazamiento agudo del niño mayor respecto al suministro de lactancia y atención de los cuidadores primarios, siendo un detonante patogénico clásico.<br><br>Perla ENARM: \"Son factores de riesgo para el desarrollo de desnutrición: Hermano menor de un año\".<br><br>Análisis de Distractores: Aunque el desempleo (A) o la edad materna (D) merman la economía, el factor específico catalogado textualmente en la matriz de riesgo del algoritmo nacional es la presencia del hermano menor de 12 meses. Un hermano mayor (C) no compite con la lactancia.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Prevención, 13."
    },
    {
        id: 5,
        question: "En el abordaje inicial de la desnutrición leve en menores de cinco años, ¿qué estudio de laboratorio debe solicitarse invariablemente para descartar la principal comorbilidad?",
        options: ["Química sanguínea", "Examen general de orina", "Biometría hemática", "Electrolitos séricos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, todo déficit energético global compromete la síntesis de hemoglobina. Detectar anemia es mandatorio porque exige el inicio concomitante de sales de hierro que no están cubiertas en el manejo dietético primario.<br><br>Perla ENARM: \"En todo paciente con desnutrición el personal de salud deberá descartar la presencia de anemia... El personal de salud deberá solicitar biometría hemática\".<br><br>Análisis de Distractores: La química sanguínea (A) y electrolitos (D) no son tamizaje universal para el estado leve; se reservan para estadios graves con sospecha de choque. El examen de orina (B) se busca solo ante fiebre sin foco.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Diagnóstico, 17."
    },
    {
        id: 6,
        question: "En la desnutrición en menores de cinco años, ¿cuál es el hallazgo hematológico más frecuente que condiciona ajustes en el tratamiento ambulatorio?",
        options: ["Anemia microcítica hipocrómica", "Anemia macrocítica hipercrómica", "Leucopenia con linfopenia", "Trombocitopenia severa aislada"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, el déficit carencial de hierro es prevalente y concomitante al déficit proteicocalórico, alterando los volúmenes eritrocitarios hacia la microcitosis, lo que merma el transporte de oxígeno y retrasa la regeneración tisular.<br><br>Perla ENARM: \"La anemia microcítica hipocrómica es el hallazgo de laboratorio más frecuentemente encontrado en niños desnutridos\".<br><br>Análisis de Distractores: La anemia macrocítica (B) se asocia a deficiencia de B12/folatos, menos común que la ferropénica. La leucopenia (C) es de mal pronóstico infeccioso, pero no el hallazgo más prevalente. La trombocitopenia aislada (D) sugiere patología autoinmune o viral, no desnutrición primaria.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Diagnóstico, 16."
    },
    {
        id: 7,
        question: "En el tratamiento de la desnutrición leve en menores de cinco años, ¿qué micronutrientes deben suplementarse en conjunto de forma rutinaria?",
        options: ["Calcio y magnesio", "Complejo B y ácido fólico", "Hierro y vitamina C", "Vitamina A y zinc"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, estos dos elementos actúan en sinergia para restaurar la integridad de los enterocitos (mejorando la absorción de la dieta fortificada) y para reactivar las líneas de defensa de la inmunidad celular.<br><br>Perla ENARM: \"Suplementar con base en la disponibilidad de la vitamina A y el zinc. Punto de buena práctica\".<br><br>Análisis de Distractores: El hierro con vitamina C (C) solo se prescribe si la biometría hemática confirma anemia. Calcio y magnesio (A) o Complejo B (B) no conforman el dúo de regeneración epitelial prioritario estipulado en el flujograma de desnutrición aguda leve.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Tratamiento, 18."
    },
    {
        id: 8,
        question: "En la prevención de la desnutrición, ¿cuál es la dosis oral única de vitamina A indicada para la complementación universal del recién nacido de término?",
        options: ["10 000 UI", "50 000 UI", "100 000 UI", "200 000 UI"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, la saturación profiláctica neonatal debe ajustarse estrictamente a la masa hepática del recién nacido para evitar picos de toxicidad aguda y abombamiento de fontanelas.<br><br>Perla ENARM: \"Recién nacido de término con peso adecuado... Complementación universal: 50 000 UI equivalente a 1 gota\".<br><br>Análisis de Distractores: 100 000 UI (C) es para lactantes de 6 a 11 meses. 200 000 UI (D) es para infantes mayores de un año. 10 000 UI (A) es una dosis infraterapéutica que no figura en los esquemas de profilaxis semestral masiva.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Cuadros o Figuras, 27."
    },
    {
        id: 9,
        question: "En el manejo de la desnutrición infantil, ¿cuál es el tiempo de restricción absoluta para administrar multivitamínicos tras recibir una megadosis profiláctica de vitamina A?",
        options: ["4 meses", "3 meses", "2 meses", "1 mes"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, al ser una vitamina liposoluble, el retinol se acumula en el tejido hepático. Suplementar extra durante su fase de aclaramiento sistémico precipita hepatotoxicidad e hipertensión intracraneal.<br><br>Perla ENARM: \"No dar multivitamínicos con vitamina A hasta 4 meses después de la dosis\".<br><br>Análisis de Distractores: Tiempos más cortos como uno, dos o tres meses (B, C, D) no garantizan la excreción segura de los depósitos hepáticos, violando la regla de seguridad farmacológica.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Cuadros o Figuras, 27."
    },
    {
        id: 10,
        question: "En el seguimiento de la desnutrición leve en el primer nivel de atención, ¿cuál es el intervalo máximo permitido entre consultas tras la valoración de la primera semana?",
        options: ["Cada semana", "Cada 3 semanas", "Cada 2 semanas", "Cada 4 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, un lapso de 14 días es el equilibrio idóneo para observar cambios antropométricos cuantificables en la ganancia de peso tras ajustar la ingesta calórica, sin descuidar el riesgo de recaída temprana.<br><br>Perla ENARM: \"El seguimiento debe hacerse una vez en la primera semana y al menos cada dos semanas por consulta externa en el hospital; en el caso de los equipos extramurales, alternando las visitas\".<br><br>Análisis de Distractores: Cada semana (A) no permite tiempo metabólico suficiente para ver impacto en el peso. Intervalos de tres o cuatro semanas (B y D) son negligentes frente a la fragilidad energética del menor.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Seguimiento, 19."
    },
    {
        id: 11,
        question: "En la vigilancia ambulatoria de la desnutrición infantil leve, ¿cuánto tiempo sin ganancia ponderal determina el fracaso terapéutico y la remisión a segundo nivel?",
        options: ["1 semana consecutiva", "2 semanas consecutivas", "4 semanas consecutivas", "3 semanas consecutivas"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, el estancamiento crónico del peso a pesar del aporte calórico extra indica que la causa no es primaria, sino secundaria a una enfermedad de base (inmunodeficiencia, malabsorción) que exige internamiento para protocolo de estudio.<br><br>Perla ENARM: \"Pérdida de peso o sin aumento de peso por tres semanas consecutivas (no aplica en caso de edema)... Remisión a segundo nivel\".<br><br>Análisis de Distractores: Una o dos semanas (A, B) de estancamiento permiten ajustes educativos a la madre en la consulta externa. Esperar hasta cuatro semanas (C) expone al niño a daño irreversible de talla y riesgo infeccioso.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Cuadros o Figuras, 29."
    },
    {
        id: 12,
        question: "En la desnutrición infantil, ¿cuál valor de hemoglobina aislada representa un criterio inminente de riesgo de muerte que exige envío urgente a hospitalización?",
        options: ["<8 g/dl", "<6 g/dl", "<4 g/dl", "<2 g/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de desnutrición en menores, la anemia extrema (<4 g/dl) anula el suministro de oxígeno a los órganos vitales y agota la reserva inotrópica de un miocardio ya atrófico, precipitando falla cardiaca fulminante.<br><br>Perla ENARM: \"Y con alguno de los signos que aumentan el riesgo de muerte: Hemoglobina <4 g/dl\".<br><br>Análisis de Distractores: El nivel <6 g/dl (B) se considera letal pero la guía condiciona que debe acompañarse \"con signos de dificultad respiratoria\". Solo el umbral de <4 g/dl es absoluto por sí solo. 8 g/dl (A) requiere hierro ambulatorio.",
        source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Cuadros o Figuras, 28."
    },
    {
        id: 13,
        question: "En el paciente menor de 2 meses con desnutrición, ¿a partir de qué frecuencia respiratoria se establece un signo de aumento de riesgo de muerte?",
        options: ["≥50 por minuto", "≥60 por minuto", "≥40 por minuto", "≥30 por minuto"],
        answer: 1,

                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('119Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('119LastQId', currentQuestionId);
                else localStorage.removeItem('119LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('119Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
