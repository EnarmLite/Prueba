<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente | ENARM Lite</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --logo-blue: #004c8c;
            --logo-green: #70b93d;
        }
        body { font-family: 'Inter', sans-serif; }
        
        /* Logo apilado (idéntico a la app) */
        .logo-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 0.9;
        }
        .logo-enarm {
            font-family: 'Inter', sans-serif; font-weight: 900; color: var(--logo-blue);
            letter-spacing: -0.02em; text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2); 
            background: linear-gradient(180deg, #005a9c 0%, #003d73 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2)); font-size: 2rem;
        }
        .logo-Lite {
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--logo-green);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2); filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2));
            position: relative; font-size: 1.3rem; margin-top: 0.15rem;
        }
        .logo-Lite sup { font-size: 0.4em; top: -1em; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Efectos de fondo difuminados -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 pointer-events-none"></div>

    <!-- Contenedor Principal -->
    <div class="max-w-lg w-full bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-12 text-center relative z-10">
        
        <!-- Logo -->
        <div class="mb-8 flex justify-center">
            <div class="logo-container">
                <span class="logo-enarm">ENARM</span>
                <span class="logo-Lite">Lite<sup>®</sup></span>
            </div>
        </div>

        <!-- Icono Ilustrativo (Reloj de arena/Construcción) -->
        <div class="w-24 h-24 mx-auto bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6 animate-bounce-slow shadow-inner">
            <svg class="w-12 h-12 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <!-- Textos -->
        <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white font-display mb-4">
            ¡Próximamente!
        </h1>
        <p class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed mb-8">
            Estamos trabajando en esta sección para ofrecerte el mejor contenido estratégico para el ENARM. Estará disponible muy pronto.
        </p>

        <!-- Botón de regreso -->
        <a href="login.html" class="inline-flex items-center justify-center px-8 py-3.5 text-base font-bold text-white bg-slate-900 dark:bg-white dark:text-slate-900 rounded-xl hover:-translate-y-1 transition-transform w-full sm:w-auto shadow-lg">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Regresar al inicio
        </a>
        
    </div>

</body>
</html>
