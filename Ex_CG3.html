    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [
            {
                id: 1,
                question: "De acuerdo a los criterios de la Guía de Práctica Clínica, ¿cuál es el tiempo de seguimiento que define a la Infección de Sitio Quirúrgico profunda en presencia de implantes?",
                options: [
                    "Primeros 30 días postquirúrgicos",
                    "Primeros 90 días postquirúrgicos",
                    "Hasta 1 año postquirúrgico",
                    "Primeras 48 horas postquirúrgicas"
                ],
                answer: 2,
                justification: "El material protésico genera un biofilm bacteriano que puede permanecer latente y manifestarse de forma muy tardía. De acuerdo a la GPC de Prevención de Infección Quirúrgica, el seguimiento de las heridas estándar es de un mes, pero los implantes cambian la cronología.<br><br>Perla ENARM: \"Se define como ISQ en incisión profunda... además se considera hasta dentro de un año del posoperatorio si se colocan implantes y parece relacionarse al procedimiento quirúrgico\".<br><br>Análisis de Distractores: Los 30 días (A) aplican exclusivamente para cirugías sin implantes o afecciones superficiales. 90 días (B) o 48 horas (D) no son puntos de corte de la definición operativa del CDC.",
                source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección del sitio quirúrgico, 2018, Evidencias y Recomendaciones, Página 24."
            },
            {
                id: 2, 
                question: "Según la GPC de obesidad mórbida, ¿cuál es el evento temporal o clínico absoluto que indica el momento idóneo para efectuar el tratamiento quirúrgico reconstructivo de los excesos de piel?", 
                options: ["Al presentar infecciones por pliegues.", "Exactamente a los 6 meses.", "Al estabilizar pérdida de peso.", "Al llegar al peso ideal."], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Tratamiento quirúrgico de la obesidad, retirar tejido dermatológico sobrante antes de que el proceso metabólico se detenga incrementa el riesgo de necesitar una segunda escisión o complicaciones por pérdida elástica contínua.<br><br>Perla ENARM: \"La cirugía reconstructiva se debe realizar cuando se ha estabilizado la pérdida de peso (12 a 18 meses después de la cirugía bariátrica)\".<br><br>Análisis de Distractores: Las infecciones de repetición ameritan antimicrobianos locales y no obligan cirugía electiva temprana. Muchos pacientes jamás llegan al \"peso ideal teórico de tablas\", sino a un peso estable de salud. No se puede a los 6 meses porque el sujeto continúa en proceso catabólico de adelgazamiento.", 
                source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Evidencias y Recomendaciones, Página 39." 
            },
            {
                id: 3, 
                question: "Según la GPC de Cáncer de Próstata, ¿cuál es el criterio absoluto de laboratorio que indica la necesidad de procedimiento invasivo inmediato (biopsia) sin requerir más estudios de escrutinio?", 
                options: ["APE inicial total mayor 2.5 ng/ml.", "APE inicial total mayor 3.0 ng/ml.", "APE persistente mayor 5.5 ng/ml.", "APE libre circulante mayor al 25%."], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Prevención y detección temprana del cáncer de próstata, un nivel que en la toma confirmatoria supera esta barrera, posee una fuerte correlación con patología neoplásica clínicamente significativa que exige evitar retrasos.<br><br>Perla ENARM: \"...con cuantificación de APE total después de 1 a 3 meses es mayor a 5.5 ng/ml... se deben de enviar al segundo nivel de atención para que se les realice la toma de biopsia de próstata, independientemente del porcentaje del APE libre.\"<br><br>Análisis de Distractores: Valores iniciales de 2.5 (Opción A) o 3.0 (Opción B) exigen simple vigilancia estrecha o repetición, no biopsia. Un APE libre >25% (Opción D) es un dato tranquilizador.", 
                source: "GPC IMSS-021-18, Prevención y detección temprana del cáncer de próstata en el primer nivel de atención, 2018, Evidencias y Recomendaciones, p. 26." 
            },
            {
                id: 4, 
                question: "Al evaluar a un paciente con cáncer de testículo, ¿qué hallazgos sugieren enfermedad avanzada o diseminación metastásica sistémica?", 
                options: ["Hidrocele severo a tensión", "Adenopatías supraclaviculares y disnea", "Aumento de volumen unilateral", "Atrofia del testículo contralateral"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Cáncer de Testículo, la presencia de síntomas respiratorios (disnea por metástasis pulmonares) y la palpación de ganglios supraclaviculares (debido al drenaje linfático retroperitoneal ascendente) son datos inequívocos de enfermedad diseminada.<br><br>Perla ENARM: \"En el caso de la diseminación extragonadal los signos y síntomas más frecuentes son: dolor en la espalda y en el flanco en el 11%, palpación de tumoración abdominal, adenopatías supraclaviculares palpables, disnea y ataque al estado general; la presencia de éstos indica cáncer testicular avanzado\".<br><br>Análisis de Distractores: El hidrocele es la acumulación de líquido benigno peritesticular. El aumento de volumen unilateral es el síntoma primario localizado, no de metástasis. La atrofia contralateral puede existir, pero no define enfermedad diseminada ni estadio avanzado.", 
                source: "GPC SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 13-14." 
            },
            {
                id: 5, 
                question: "¿Cuál es el abordaje terapéutico de primera elección para un paciente diagnosticado con cáncer de próstata de muy bajo riesgo y expectativa de vida menor a 20 años?", 
                options: ["Vigilancia activa", "Prostatectomía radical laparoscópica", "Braquiterapia prostática de alta tasa", "Supresión androgénica combinada"], 
                answer: 0, 
                justification: "De acuerdo a la Guía de Práctica Clínica de Cáncer de Próstata, el sobretratamiento es un problema crítico en tumores de histología inofensiva y volumen incipiente. Exponer a un hombre añoso a disfunción eréctil o incontinencia por una enfermedad que probablemente no acorte su vida es evitable mediante un protocolo riguroso de seguimiento estrecho.<br><br>Perla ENARM: Para hombres con cáncer de próstata de muy bajo riesgo, clínicamente localizado, y con una expectativa de vida de menos de 20 años, se sugiere realizar vigilancia activa en lugar de tratamiento inmediato definitivo.<br><br>Análisis de Distractores: La cirugía (opción B) y la braquiterapia (opción C) conllevan morbilidad alta injustificada en este grupo particular. El bloqueo hormonal (opción D) está proscrito como manejo primario en enfermedad localizada.", 
                source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Tratamiento de enfermedad local, Página 24." 
            },
            {
                id: 6, 
                question: "Utilizando el Sistema de Clasificación Funcional (MFCL-5) para amputación de extremidad inferior, ¿cómo se clasifica a un paciente con alto impacto y actividad deportiva?", 
                options: ["Nivel K1", "Nivel K2", "Nivel K3", "Nivel K4"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Amputación de Extremidad Inferior, el sistema de Medicare (MFCL-5) estratifica a los pacientes según su cadencia de marcha y demanda energética, lo cual justifica económicamente los componentes a utilizar. El nivel más alto exige soportar fuerzas de torsión severas.<br><br>Perla ENARM: \"El Nivel K4 representa a usuarios de alto impacto, deportistas, adultos muy activos o niños, con potencial de deambulación que excede las habilidades básicas y requiere componentes de alta respuesta dinámica.\"<br><br>Análisis de Distractores: El Nivel K1 (Opción A) es exclusivo de marcha en el hogar. El Nivel K2 (Opción B) permite salvar barreras arquitectónicas bajas. El Nivel K3 (Opción C) es para marcha comunitaria de cadencia variable, pero no incluye la exigencia extrema del deporte de impacto.", 
                source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Clasificación y Escalas, Página 18." 
            },
            {
                id: 7, 
                question: "En la Nefrolitiasis asociada a infección, ¿cuál es el mecanismo fisiopatológico bacteriano indispensable que condiciona la formación rápida de litos de estruvita?", 
                options: ["Acidificación urinaria severa", "Hiperuricosuria inducida", "Deficiencia de citrato", "Producción de ureasa"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Nefrolitiasis en adultos, los microorganismos que hidrolizan la urea elevan drásticamente el amonio y el pH urinario, precipitando sales de magnesio, amonio y fosfato (estruvita).<br><br>Perla ENARM: La presencia de bacterias productoras de ureasa es el paso diagnóstico inicial en la evaluación básica de litos asociados a infección.<br><br>Análisis de Distractores: Las bacterias productoras de ureasa ocasionan alcalinización, no acidificación. La hiperuricosuria y la deficiencia de citrato (hipocitruria) son alteraciones metabólicas de otro tipo de litos (ácido úrico y calcio respectivamente).", 
                source: "GPC SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Figura 4, Página 33." 
            },
            {
                id: 8, 
                question: "¿Cuál es el grupo farmacológico de elección para el manejo inicial de los síntomas del tracto urinario inferior moderados a severos asociados a crecimiento prostático en un paciente sin contraindicaciones según la GPC?", 
                options: ["Bloqueadores alfa 1", "Inhibidores de fosfodiesterasa 5", "Inhibidores de 5-alfa reductasa", "Antagonistas de receptores muscarínicos"], 
                answer: 0, 
                justification: "De acuerdo a la GPC de STUI asociados a Crecimiento Prostático, el manejo de primera línea busca aliviar rápidamente el componente dinámico de la obstrucción (relajación del músculo liso en el cuello vesical y uretra prostática).<br><br>Perla ENARM: \"Se sugiere utilizar los bloqueadores alfa 1 en pacientes con STUI moderados a severos como primera línea de tratamiento por su rápido inicio de acción, perfil de eficacia y seguridad.\"<br><br>Análisis de Distractores: Los inhibidores de la 5-alfa reductasa (C) reducen el volumen pero tardan meses en hacer efecto. Los antimuscarínicos (D) se agregan si predominan síntomas de almacenamiento. Los inhibidores de PDE5 (B) son alternativa si coexiste disfunción eréctil severa.", 
                source: "IMSS-176-06, Diagnóstico y Tratamiento de STUI asociados a Crecimiento Prostático, 2018, Tratamiento farmacológico, p. 25." 
            },
            {
                id: 9, 
                question: "En el contexto de un Cólico Renoureteral, ¿cuál es el mecanismo fisiopatológico que explica la elevación aguda de la creatinina según la GPC?", 
                options: ["Obstrucción ureteral distal unilateral", "Reflejo vasovagal severo prolongado", "Obstrucción bilateral o riñón único", "Infección urinaria parenquimatosa leve"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Cólico Renoureteral, un adulto sano con dos riñones funcionantes compensará la depuración de creatinina con el riñón sano aunque el otro esté totalmente obstruido por un lito. Por ende, la uremia aguda severa indica que ambos sistemas o la única unidad renal están comprometidos, requiriendo acción urgente.<br><br>Perla ENARM: \"Normalmente, la obstrucción de un solo riñón, mientras el riñón contralateral es normal y no presenta obstrucción, no lleva a un incremento perceptible en la creatinina. Sin embargo, la obstrucción bilateral o la obstrucción unilateral en presencia de una enfermedad renal subyacente lleva a un incremento en la creatinina\".<br><br>Análisis de Distractores: La obstrucción unilateral (A) compensa fisiológicamente. El reflejo vagal (B) provoca emesis pero no falla prerenal grave inmediata que eluda la compensación contralateral. Una infección leve (D) no altera drásticamente la tasa de filtración glomerular general.", 
                source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 18." 
            },
            {
                id: 10, 
                question: "¿Cuál es el tratamiento de primera línea con potencial curativo para el manejo inicial de un Hepatocarcinoma estadio A en un paciente que cumple los criterios de Milán?", 
                options: ["Quimioembolización transarterial", "Resección segmentaria paliativa", "Trasplante hepático", "Inmunoterapia sistémica"], 
                answer: 2, 
                justification: "El manejo de la enfermedad localizada busca erradicar tanto el tumor como el sustrato enfermo (hígado cirrótico). De acuerdo a la GPC de Hepatocarcinoma, reemplazar el órgano entero ofrece la mejor sobrevida a largo plazo si las lesiones son lo suficientemente pequeñas para evitar micrometástasis sistémicas.<br><br>Perla ENARM: \"Se recomienda realizar trasplante hepático en pacientes adultos con HCC si se cumplen criterios de Milán y se cuenta con los insumos necesarios\".<br><br>Análisis de Distractores: La quimioembolización (A) es el estándar para el estadio B intermedio. La resección paliativa (B) no es curativa. La inmunoterapia sistémica (D) se reserva para etapas avanzadas irresecables.", 
                source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Tratamiento, Página 37." 
            },
            {
                id: 11, 
                question: "Ante la fuerte sospecha clínica de taponamiento cardiaco en un paciente de urgencias, ¿cuál es el estudio de imagen confirmatorio o de abordaje indicado por el algoritmo?", 
                options: ["Resonancia magnética cardiaca", "Ultrasonido precordial", "Radiografía de tórax", "Angiografía coronaria"], 
                answer: 1, 
                justification: "En el paciente traumatizado e inestable, los tiempos de traslado a áreas de imagen avanzadas son prohibitivos. De acuerdo a la Guía de Práctica Clínica de Trauma de Tórax, la evaluación de la ventana pericárdica debe realizarse a pie de cama como parte de la evaluación ecográfica orientada.<br><br>Perla ENARM: Ante datos clínicos de taponamiento, el paso a seguir es realizar un Ultrasonido precordial o Ecocardiograma transtorácico de forma inmediata.<br><br>Análisis de Distractores: La opción A y D son estudios muy tardados e indicados en patologías programadas o isquémicas. La opción C carece de sensibilidad aguda (la silueta cardiaca puede no verse \"en garrafa\" si la acumulación fue súbita e inextensible).", 
                source: "GPC SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Algoritmo 5. Diagnóstico y tratamiento de taponamiento cardiaco, Página 7." 
            },
            {
                id: 12,
                question: "Utilizando la escala de Gravedad de Lesión a Órganos (AAST-OIS) en la Cirugía de Control de Daños por trauma abdominal, ¿cómo se clasifica el hallazgo hepático que indica forzosamente esta intervención técnica?",
                options: [
                    "Mayor al grado I",

                justification: "De acuerdo a la GPC de Tratamiento quirúrgico de la obesidad, los panículos adiposos gruesos limitan la ventilación mecánica pulmonar y aumentan masivamente las infecciones de sitio quirúrgico. Evitar grandes incisiones favorece una movilización y recuperación hemodinámica rápida.<br><br>Perla ENARM: \"La tasa de mortalidad por todas las causas fue mayor para el grupo que se sometió a cirugía abierta (0,31%, IC 95%: 0.03% 0.97%) en comparación a la vía laparoscópica (0.16%, IC95%: 0.03% -0.36%)...\".<br><br>Análisis de Distractores: La vía laparoscópica es el protector ideal y estándar de manejo en estos pacientes. El uso de la banda gástrica se asocia paradójicamente a las tasas de mortalidad agudas más bajas dentro de todas las técnicas restrictivas.", 
                source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Evidencias y Recomendaciones, Página 28." 
            },
            {
                id: 49, 
                question: "Según la GPC de cáncer de testículo, ¿cuáles hallazgos obligan a realizar el tratamiento quirúrgico radical e inmediato?", 
                options: ["Elevación única de marcadores tumorales", "Ecografía con microcalcificaciones difusas", "Exploración y marcadores altamente sugestivos", "Dolor severo intratable con analgésicos"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Cáncer de Testículo, no se requiere biopsia ni más demoras; un cuadro clínico evidente de masa pétrea junto a alteraciones ecográficas o serológicas justifica la pérdida del órgano.<br><br>Perla ENARM: \"Se debe realizar la orquiectomía radical cuando por la exploración física y el análisis de laboratorio exista alta probabilidad diagnóstica de cáncer testicular\".<br><br>Análisis de Distractores: La elevación de un marcador aislado sin masa tumoral podría corresponder a error o reactividad cruzada (ej. marihuana o daño hepático elevan la AFP levemente). Las microcalcificaciones son solo un factor de riesgo para seguimiento, no indicación de extirpación inmediata aisladas. El dolor severo obliga a explorar isquemia (torsión), y no es el patrón principal del cáncer.", 
                source: "GPC SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 18."

            {
                id: 50,
                question: "Ante la sospecha de colonización que predispone a Infección de Sitio Quirúrgico, ¿cuál es el tamizaje preoperatorio que debe solicitarse para aislar microorganismos resistentes?",
                options: [
                    "Hemocultivo central y periférico",
                    "Cultivo de líquido cefalorraquídeo",

                    "Examen general de orina"
                ],
                answer: 2,
                justification: "Identificar microorganismos resistentes antes de intervenciones mayores (ej. ortopédicas o cardiotorácicas) permite aplicar terapias de erradicación. De acuerdo a la GPC de Prevención de Infección Quirúrgica, el sitio de reservorio principal del Estafilococo aureus es la vía nasal.<br><br>Perla ENARM: \"La detección de pacientes colonizados con S. aureus meticilino sensible (SAMS) deben de seguir las medidas básicas del hospital. En los pacientes colonizados con SARM se recomienda efectuar decolonización con agentes antimicrobianos y antisépticos. Se sugiere una combinación de gluconato de clorhexidina para la piel y mupirocina para la nariz\".<br><br>Análisis de Distractores: Los hemocultivos (A) y el cultivo de LCR (B) son para infecciones sistémicas o del sistema nervioso central ya establecidas. El EGO (D) evalúa vía urinaria, no colonización cutánea/nasal por SARM.",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ECG50Progress');
                localStorage.removeItem('ECG50LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-teal-500 shadow-md z-10 border-teal-500 dark:border-teal-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ECG50Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ECG50LastQId', currentQuestionId);
                else localStorage.removeItem('ECG50LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ECG50Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
