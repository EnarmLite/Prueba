    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Qué hallazgo clínico durante el trabajo de parto es indicativo de una probable pérdida de la continuidad uterina?",
        options: ["Sangrado transvaginal rojo rutilante", "Dolor abdominal persistente entre contracciones", "Hipertonía uterina sostenida", "Expulsión de tapón mucoso"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, el desgarro de las fibras musculares del útero genera un estímulo nociceptivo severo que no cede con la relajación del miometrio, diferenciándose del dolor rítmico del trabajo de parto.<br><br>Perla ENARM: \"No existe signo patognomónico que sea indicativo de ruptura uterina pero la presencia durante el parto de algunos de los siguientes datos debe de poner alerta por la posibilidad de éste evento: Dolor abdominal severo, especialmente si persiste entre contracciones.\"<br><br>Análisis de Distractores: El sangrado rutilante es clásico de placenta previa. La hipertonía uterina sostenida orienta a desprendimiento prematuro de placenta. La expulsión del tapón mucoso es un cambio cervical fisiológico esperado.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Cuadros o figuras, 25."
    },
    {
        id: 2,
        question: "¿Cuál es el factor predisponente principal para la pérdida de la integridad miometrial durante el trabajo de parto?",
        options: ["Cesárea previa", "Macrosomía fetal", "Multiparidad", "Edad materna avanzada"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, la cicatrización miometrial posterior a una cirugía uterina genera un área de debilidad tensil que es altamente susceptible a la disrupción bajo las fuerzas mecánicas del parto.<br><br>Perla ENARM: \"Se recomienda al personal de enfermería valorar los factores de riesgo que pudieran ocasionar una ruptura uterina como: El intento de parto vaginal en las pacientes con antecedente de cesárea previa.\"<br><br>Análisis de Distractores: Aunque la macrosomía y la multiparidad causan sobredistensión y aumento de la presión intrauterina, el riesgo absoluto es significativamente menor comparado con una incisión quirúrgica previa. La edad avanzada no es el principal factor directo de disrupción mecánica.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Criterios de valoración, 11."
    },
    {
        id: 3,
        question: "En la reanimación del choque hipovolémico secundario a esta catástrofe obstétrica, ¿cuál es la meta terapéutica de hemoglobina?",
        options: ["> 7 g/dl", "> 8 g/dl", "> 9 g/dl", "> 10 g/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, el control de daños en la paciente obstétrica exanguinada exige un balance entre mantener el transporte de oxígeno capilar y evitar la coagulopatía dilucional por transfusión masiva.<br><br>Perla ENARM: \"Las Metas terapéuticas que idealmente deben cumplirse en la reanimación y choque hipovolémico en la hemorragia obstétrica son: Hemoglobina > 8 g/dl.\"<br><br>Análisis de Distractores: Valores menores a 8 g/dl comprometen la perfusión tisular sistémica. Metas de > 9 g/dl o > 10 g/dl incrementan la necesidad de transfusiones sin un beneficio demostrado en supervivencia, elevando el riesgo de sobrecarga hídrica y lesión pulmonar aguda.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Criterios de valoración, 12."
    },
    {
        id: 4,
        question: "¿Qué maniobra obstétrica está estrictamente contraindicada por aumentar bruscamente la presión fúndica y favorecer la disrupción uterina?",
        options: ["Maniobra de Ritgen", "Maniobra de McRoberts", "Maniobra de Kristeller", "Maniobra de Mauriceau"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, la compresión extrínseca del fondo uterino genera una hiperpresión aguda intrauterina que, en presencia de una debilidad focal previa, culmina en el estallido de la pared.<br><br>Perla ENARM: \"Se recomienda evitar la maniobra de Kristeller para la extracción del producto especialmente en pacientes con cesáreas previas, para evitar la ruptura uterina.\"<br><br>Análisis de Distractores: La maniobra de Ritgen protege el periné durante la expulsión. La maniobra de McRoberts se utiliza para resolver la distocia de hombros. La maniobra de Mauriceau es técnica de extracción en presentación pélvica. Ninguna aumenta la presión miometrial directamente.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Criterios de valoración, 16."
    },
    {
        id: 5,
        question: "¿Cuál es el nivel mínimo esperado de fibrinógeno para considerar exitosa la reanimación hemostática en la paciente afectada?",
        options: ["> 100 mg/dl", "> 150 mg/dl", "> 200 mg/dl", "> 250 mg/dl"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, en contextos de sangrado masivo, el fibrinógeno es el primer factor de coagulación en agotarse, por lo que restablecer su nivel por encima de este umbral es vital para estabilizar el coágulo.<br><br>Perla ENARM: \"Las Metas terapéuticas que idealmente deben cumplirse en la reanimación y choque hipovolémico en la hemorragia obstétrica son: Fibrinógeno > 1 g/L (o > 100 mg/dl).\"<br><br>Análisis de Distractores: Las otras opciones numéricas superan el umbral estricto definido para el control agudo en el segundo nivel de atención; reponer más allá de 100 mg/dl de manera inmediata no siempre es viable con los recursos disponibles y no es el límite primario de la guía.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Criterios de valoración, 12."
    },
    {
        id: 6,
        question: "¿Qué fármaco uterotónico está contraindicado para la maduración cervical en pacientes con antecedente de incisión uterina?",
        options: ["Oxitocina", "Carbetocina", "Ergometrina", "Misoprostol"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, el uso de análogos de prostaglandinas en un útero con una cicatriz previa precipita contracciones desordenadas e hipertonía, lo cual eleva exponencialmente el riesgo de rotura.<br><br>Perla ENARM: \"Uso de prostaglandina E1 (misoprostol) con cesárea previa se considera una mujer embarazada con mayor riesgo para presentar una ruptura uterina.\"<br><br>Análisis de Distractores: La oxitocina, aunque riesgosa, puede utilizarse bajo estricta vigilancia en inducción prudente si está justificada. La carbetocina y la ergometrina se utilizan en el manejo del puerperio para atonía, no para maduración cervical de un feto viable.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Cuadros o figuras, 25."
    },
    {
        id: 7,
        question: "¿Qué estructura anatómica permanece intacta para clasificar el evento morfológico como una dehiscencia o rotura uterina incompleta?",
        options: ["Endometrio", "Miometrio", "Cubierta peritoneal", "Parametrio"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, la separación parcial de las capas uterinas sin comunicación directa a la cavidad abdominal define la dehiscencia, permitiendo que el feto permanezca confinado en el útero sin protrusión.<br><br>Perla ENARM: \"Rotura uterina incompleta, oculta o simple dehiscencia.- Es aquella rotura que no afecta a todo el espesor del miometrio y su cubierta peritoneal permanece intacta y no se rompen las membranas fetales.\"<br><br>Análisis de Distractores: El endometrio y el miometrio ya presentan disrupción focal. El parametrio es tejido conectivo lateral y no define el grado de ruptura de la cicatriz segmentaria.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Aspectos Generales, 9."
    },
    {
        id: 8,
        question: "¿Qué calibre de catéter intravenoso se requiere para asegurar el manejo inicial de la inestabilidad hemodinámica en esta emergencia?",
        options: ["14 o 16 Fr", "16 o 18 Fr", "18 o 20 Fr", "20 o 22 Fr"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, los accesos venosos periféricos cortos y de grueso calibre garantizan la infusión rápida de cristaloides y hemoderivados bajo presión, logrando la expansión de volumen según la ley de Poiseuille.<br><br>Perla ENARM: \"Recursos sugeridos para emergencias hemorrágicas obstétricas: Dos catéteres intravenosos 16 o 18 por arriba del diafragma.\"<br><br>Análisis de Distractores: Los catéteres calibre 20 o 22 Fr son insuficientes para terapias de transfusión rápida masiva. Calibres menores a 16 (como el 14) son excelentes pero la recomendación estricta de esta normatividad abarca 16 y 18.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Criterios de valoración, 17."
    },
    {
        id: 9,
        question: "¿Cuál es la dosis farmacológica recomendada del uterotónico análogo de la oxitocina de acción prolongada indicado en este escenario?",
        options: ["50 mcg intravenosos", "100 mcg intravenosos", "150 mcg intravenosos", "200 mcg intravenosos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, la carbetocina presenta una vida media prolongada y afinidad superior por los receptores miometriales, garantizando una contracción tetánica sostenida tras su administración única.<br><br>Perla ENARM: \"Dosis recomendada: Adultos: 100 mcg en un minuto. Dosis única. Intravenosa.\"<br><br>Análisis de Distractores: Dosis menores (50 mcg) son subterapéuticas para el control de hemorragia. Dosis mayores (150 o 200 mcg) no aportan mayor beneficio hemostático e incrementan los efectos adversos cardiovasculares (hipotensión severa).",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Listado de Recursos, 27."
    },
    {
        id: 10,
        question: "¿Qué alteración en la exploración física vaginal sugiere fuertemente la extrusión fetal directa hacia la cavidad abdominal?",
        options: ["Borramiento cervical completo", "Pérdida de la estación de la presentación", "Membranas amnióticas abombadas", "Cérvix posterior y cerrado"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, al perderse la pared uterina anterior, la contracción fisiológica expulsa mecánicamente al feto hacia el peritoneo, por lo que el polo cefálico que ya estaba encajado \"sube\" o se torna flotante.<br><br>Perla ENARM: \"No existe signo patognomónico que sea indicativo de ruptura uterina pero la presencia durante el parto de algunos de los siguientes datos debe de poner alerta: Pérdida de la estación de la presentación.\"<br><br>Análisis de Distractores: El borramiento cervical y las membranas abombadas son datos de trabajo de parto normal avanzado. Un cérvix posterior indica inmadurez cervical, no un evento catastrófico agudo.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Cuadros o figuras, 25."
    },
    {
        id: 11,
        question: "¿En qué lapso máximo debe estar completamente integrado el Equipo de Respuesta Inmediata Obstétrica tras activar el Código rojo?",
        options: ["3 minutos", "5 minutos", "10 minutos", "15 minutos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, la ventana fisiológica antes del colapso circulatorio irreversible es mínima, requiriendo acción coordinada simultánea para evitar la tríada letal del choque.<br><br>Perla ENARM: \"De acuerdo al Triage Obstétrico, Código Mater y Equipo de Respuesta Inmediata Obstétrica, el personal de salud deberá activar el Equipo de Respuesta Inmediata Obstétrica (ERIO o Código rojo). El cuál debe estar integrado en los primeros cinco minutos.\"<br><br>Análisis de Distractores: Retrasar la integración a 10 o 15 minutos eleva drásticamente la morbimortalidad materna. 3 minutos es un tiempo ideal pero la normatividad establece el límite en 5.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Intervenciones de enfermería, 18."
    },
    {
        id: 12,
        question: "Durante la reanimación hídrica guiada por metas, ¿cuál es el volumen urinario horario mínimo que indica perfusión esplácnica adecuada?",
        options: ["> 0.3 ml/kg/h", "> 0.5 ml/kg/h", "> 0.7 ml/kg/h", "> 1.0 ml/kg/h"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Ruptura Uterina Segundo Nivel, la tasa de filtración glomerular es un excelente monitor indirecto del gasto cardíaco y volumen intravascular, evidenciando el éxito de los bolos de reposición.<br><br>Perla ENARM: \"Las Metas terapéuticas que idealmente deben cumplirse en la reanimación y choque hipovolémico en la hemorragia obstétrica son: Diuresis horaria por kg de peso por hora mayor a .7 mL/kg/h.\"<br><br>Análisis de Distractores: Volúmenes menores (0.3 o 0.5) indican falla renal aguda prerrenal o persistencia del choque hipovolémico. Volúmenes mayores a 1.0 son óptimos pero no son el límite mínimo marcado por esta meta terapéutica estricta.",
        source: "SS-381-17, Intervenciones de enfermería para la atención en la mujer durante la ruptura uterina en el segundo nivel de atención, 2017, Criterios de valoración, 12."
    },
    {
        id: 13,
        question: "¿Cuál es la intervención quirúrgica que otorga la confirmación diagnóstica definitiva de esta patología obstétrica aguda?",

                    progressContainer.classList.add('hidden');

                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);

                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ENF2Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ENF2LastQId', currentQuestionId);
                else localStorage.removeItem('ENF2LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ENF2Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
