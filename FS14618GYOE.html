    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿A partir de qué edad y hasta qué límite se debe realizar el tamizaje sistemático para detectar alteraciones celulares cervicales en mujeres asintomáticas?", 
                options: ["21 a 65 años", "25 a 69 años", "Inicio de vida sexual", "30 a 60 años"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, el riesgo de detectar alteraciones significativas aumenta en este grupo etario, limitando el tamizaje en menores de 25 años para evitar el sobretratamiento de infecciones virales transitorias. El beneficio preventivo mayor se encuentra acotado a este rango.<br><br>Perla ENARM: \"Citología cervical de primera vez (De 25 a 69 años de edad)\".<br><br>Análisis de Distractores: Iniciar el tamizaje antes de los 25 años (como a los 21 o al inicio de la vida sexual) incrementa falsos positivos y tratamientos innecesarios. A partir de los 30 años se recomienda el uso de biología molecular, no el inicio del tamizaje en sí.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Anexos, Página 45." 
            },
            {
                id: 2, 
                question: "¿Cuál factor de riesgo modificable incrementa directamente la probabilidad de padecer neoplasia intraepitelial cervical y carcinoma, con un riesgo calculado de 2.82?", 
                options: ["Tabaquismo activo", "Múltiples parejas sexuales", "Multiparidad", "Consumo de alcohol"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, existe una asociación directa y estadísticamente significativa entre los componentes del tabaco y la progresión de la infección viral hacia el carcinoma escamoso, calculando un OR de 2.82 en revisiones sistemáticas.<br><br>Perla ENARM: \"Los estudios observacionales muestran asociación directa y estadísticamente significativa con la infección por VPH-AR 16 y 18; el riesgo calculado fue de OR 2.82 (IC 95%: 2.49 a 4.55) para tabaquismo\".<br><br>Análisis de Distractores: Las múltiples parejas sexuales y la multiparidad son factores de riesgo, pero sus razones de momios específicas varían y no definen este valor clásico exacto para el tabaquismo. El consumo de alcohol no está categorizado como factor de riesgo principal en este contexto.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 13." 
            },
            {
                id: 3, 
                question: "Para disminuir el riesgo de progresar a una neoplasia invasiva, ¿cuál es el límite de tiempo recomendado para el uso de anticoncepción hormonal oral en pacientes con infección viral persistente?", 
                options: ["3 años", "4 años", "5 años", "10 años"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, la estimulación estrogénica y progestágena prolongada sobre la zona de transformación actúa como cofactor promotor de oncogénesis en presencia del virus, observándose un incremento significativo en el riesgo al superar este umbral de tiempo.<br><br>Perla ENARM: \"Se recomienda limitar el uso de anticonceptivos orales, ya sean simples o combinados, como método de planificación familiar por no más de 5 años en mujeres que están infectadas\".<br><br>Análisis de Distractores: Menos de 5 años (opciones A y B) no han demostrado una asociación oncológica estadísticamente significativa. Un límite de 10 años sobrepasa por el doble la ventana de seguridad estipulada.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 15." 
            },
            {
                id: 4, 
                question: "¿Cuál es el esquema de inmunización profiláctica indicado en niñas de 9 a 13 años de edad sin inicio de vida sexual?", 
                options: ["1 dosis única", "2 dosis a los 0 y 6 meses", "3 dosis a los 0, 1 y 6 meses", "3 dosis a los 0, 2 y 6 meses"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, el sistema inmune en etapas pre-púberes genera una respuesta de anticuerpos robusta y suficiente con solo dos aplicaciones. Este esquema ha demostrado no ser inferior en inmunogenicidad comparado con el esquema clásico.<br><br>Perla ENARM: \"Se recomienda administrar la vacuna bivalente o tetratavalente en dos dosis, con un intervalo de 0 y 6 meses, a todas las mujeres entre 9 a 13 años de edad\".<br><br>Análisis de Distractores: El esquema de 3 dosis (opciones C y D) se reserva estrictamente para mujeres de 15 años en adelante o con patología inmunológica. La dosis única aún no forma parte de la recomendación central de esta edición.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 18." 
            },
            {
                id: 5, 
                question: "En una paciente de 18 años con diagnóstico de infección por virus de inmunodeficiencia humana, ¿cuál es el esquema profiláctico de inmunización indicado?", 
                options: ["2 dosis a los 0 y 6 meses", "2 dosis a los 0 y 12 meses", "3 dosis a los 0, 1 y 6 meses", "1 dosis de refuerzo anual"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, las pacientes inmunocomprometidas, independientemente de estar bajo terapia antirretroviral, requieren un estímulo antigénico mayor para lograr una seroconversión protectora, justificando la inclusión de una tercera dosis.<br><br>Perla ENARM: \"El esquema de tres dosis (0, 1 a 2 y 6 meses) se recomienda para mujeres de 15 años de edad y más, así como para inmunocomprometidas o infectadas con VIH\".<br><br>Análisis de Distractores: El esquema de 2 dosis (opciones A y B) fallaría en alcanzar títulos protectores de anticuerpos en un huésped inmunocomprometido. Los refuerzos anuales no están indicados en los esquemas vigentes.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 18." 
            },
            {
                id: 6, 
                question: "¿Cuál es el estudio de elección para el tamizaje primario de alteraciones anatómicas y celulares en el grupo etario de 25 a 34 años?", 
                options: ["Citología cervical", "Captura de híbridos", "Inspección visual con ácido acético", "Reacción en cadena de la polimerasa"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, en este grupo de edad la prevalencia de infección transitoria por el virus es altísima. Utilizar pruebas moleculares resultaría en excesivas referencias y sobretratamiento, por lo que el análisis morfológico celular sigue siendo el método indicado.<br><br>Perla ENARM: \"La citología cervical (convencional o en base líquida) está indicada en el grupo de 25 a 34 años de edad\".<br><br>Análisis de Distractores: La captura de híbridos y la reacción en cadena de la polimerasa son pruebas biomoleculares indicadas a partir de los 35 años. La inspección con ácido acético es una alternativa solo en áreas de extrema marginalidad.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 23." 
            },
            {
                id: 7, 
                question: "¿Cuál es el estudio de tamizaje primario de mayor sensibilidad recomendado para mujeres de 35 a 69 años de edad?", 
                options: ["Citología en base líquida", "Frotis con tinción dual", "Detección biomolecular del virus", "Colposcopia diagnóstica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, a partir de los 35 años el riesgo de cronicidad y persistencia viral justifica el cambio de estrategia hacia la detección directa del genoma viral (VPH-AR), debido a su sensibilidad cercana al 100% para evitar el subdiagnóstico.<br><br>Perla ENARM: \"En el grupo de 35 a 69 años, la detección biomolecular de VPH-AR sola o combinada con citología (cotesting) son las pruebas de elección para tamizaje primario\".<br><br>Análisis de Distractores: La citología (A) tiene menor especificidad en este grupo comparada con la biología molecular. La tinción dual (B) y la colposcopia (D) son métodos complementarios o de referencia, jamás de escrutinio primario masivo.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 23." 
            },
            {
                id: 8, 
                question: "Ante un reporte de muestra exfoliativa clasificada macroscópicamente como insatisfactoria para evaluación, ¿en qué tiempo límite se debe repetir el procedimiento?", 
                options: ["10 días hábiles", "21 días hábiles", "30 días hábiles", "6 meses"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, una muestra inadecuada (por sangre o inflamación severa) imposibilita el tamizaje. Se debe permitir un tiempo mínimo para la reparación del epitelio inflamado, pero no retrasar la detección si existiera patología.<br><br>Perla ENARM: \"La mujer con muestra de citología calificada como inadecuada para el diagnóstico, debe ser localizada para repetir la prueba en un plazo no mayor a 21 días hábiles\".<br><br>Análisis de Distractores: Esperar 6 meses o 30 días retrasa de forma innecesaria un diagnóstico potencialmente oncológico. Plazos menores a 21 días (como 10) pueden resultar en una segunda muestra inadecuada por regeneración epitelial incompleta.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención, Página 29." 
            },
            {
                id: 9, 
                question: "En una mujer de 28 años cuyo tamizaje reporta células escamosas atípicas de significado indeterminado, ¿cuál es el seguimiento clínico indicado?", 
                options: ["Enviar a colposcopia", "Prueba de captura de híbridos", "Repetir el estudio en 1 año", "Escisión electroquirúrgica con asa"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, en mujeres menores de 35 años un resultado de ASC-US tiene alta probabilidad de revertir espontáneamente. La conducta es conservadora para evitar morbilidad quirúrgica en cuellos uterinos jóvenes.<br><br>Perla ENARM: \"Diagrama de flujo 3. Conducta ante citología positiva para ASC-US (25 a 34 años): Citología en un año\".<br><br>Análisis de Distractores: La colposcopia (A) y la captura de híbridos (B) están indicadas para este mismo reporte pero en mujeres mayores de 35 años. Los tratamientos invasivos (D) son inaceptables sin confirmación histológica de lesión mayor.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Anexos, Página 47." 
            },
            {
                id: 10, 
                question: "Si una mujer de 38 años presenta un reporte inicial de células escamosas atípicas de significado indeterminado, ¿cuál es la conducta subsiguiente indicada?", 
                options: ["Repetir el estudio en 1 año", "Detección biomolecular del virus", "Conización con bisturí frío", "Observación por 3 años"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, la edad superior a 35 años modifica completamente el abordaje del ASC-US, ya que el riesgo subyacente de lesión oculta es mayor. Se exige descartar la presencia del factor oncogénico persistente antes de invadir.<br><br>Perla ENARM: \"Diagrama de flujo 4. Conducta ante citología positiva para ASC-US (35 a 69 años): Realizar prueba VPH-AR\".<br><br>Análisis de Distractores: Repetir en 1 año (A) es la conducta exclusiva para menores de 35 años. La observación (D) es inadecuada ante una anormalidad presente. La conización (C) es un tratamiento radical para confirmación de invasión, no para hallazgos indeterminados.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Anexos, Página 48." 
            },
            {
                id: 11, 
                question: "En una paciente de 30 años cuyo escrutinio reporta una lesión escamosa intraepitelial de bajo grado, ¿cuál es la intervención de primera línea?", 
                options: ["Envío a colposcopia", "Repetir el estudio en 1 año", "Escisión electroquirúrgica con asa", "Histerectomía total abdominal"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de prevención de lesiones cervicales, una lesión de bajo grado en una paciente joven representa habitualmente la manifestación morfológica de una infección viral transitoria. La tasa de regresión espontánea a los 12 meses es alta, justificando el seguimiento expectante.<br><br>Perla ENARM: \"Diagrama de flujo 5. Conducta ante citología positiva para LEIBG (25 a 34 años): Citología en un año\".<br><br>Análisis de Distractores: La referencia a colposcopia (A) se guarda para la persistencia al año o si la paciente fuera mayor de 35 años. Los métodos invasivos (C y D) incurren en sobretratamiento con riesgo de incompetencia cervical futura.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Anexos, Página 49." 
            },
            {
                id: 12, 
                question: "¿Cuál es el manejo inicial indicado para una mujer de 45 años con reporte de lesión escamosa intraepitelial de bajo grado en el tamizaje?", 
                options: ["Envío a colposcopia", "Prueba biomolecular complementaria", "Repetir el estudio en 6 meses", "Ablación con láser"], 
                answer: 0,

                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>

                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="GS66621GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoFProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoFLastQId', currentQuestionId);
                else localStorage.removeItem('gyoFLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoFProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
