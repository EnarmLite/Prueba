                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>

    <script>
        const questionsData = [

    {
        id: 1,
        question: "¿Cuál es el límite temporal estricto para definir la tos aguda de acuerdo a la GPC?",
        options: ["< 2 semanas", "< 3 semanas", "3 a 8 semanas", "> 8 semanas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, la clasificación del padecimiento depende de la cronicidad de la tos, siendo el límite de 3 semanas el punto de inflexión para descartar cuadros agudos.<br><br>Perla ENARM: Tos aguda, definida como tos que persiste menos de 3 semanas. Empeora a medida que la enfermedad progresa y persiste más allá del cuadro de inflamación aguda.<br><br>Análisis de Distractores: La opción A es un límite arbitrario sin sustento. La opción C define a la tos subaguda (frecuentemente posinfecciosa). La opción D corresponde a la definición de tos crónica, obligando a descartar asma, rinitis o reflujo gastroesofágico.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico, Página 14."
    },
    {
        id: 2,
        question: "¿Cuál es el objetivo clínico principal e innegociable al evaluar inicialmente a un paciente con sospecha de esta patología?",
        options: ["Identificar el agente etiológico", "Iniciar tratamiento antibiótico empírico", "Descartar la presencia de neumonía", "Solicitar estudios de imagen torácica"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, la patología es autolimitada y el riesgo real reside en las complicaciones parenquimatosas subyacentes que puedan pasar desapercibidas.<br><br>Perla ENARM: El diagnóstico de BA, es siempre clínico y se realiza en el momento en que el paciente es evaluado. El objetivo principal en los pacientes con sospecha de BA es descartar la presencia de neumonía.<br><br>Análisis de Distractores: La opción A es incorrecta porque la etiología es viral y autolimitada. La opción B fomenta la resistencia bacteriana. La opción D no está indicada de rutina a menos que haya signos clínicos de consolidación.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico, Página 14."
    },
    {
        id: 3,
        question: "¿Qué porcentaje de los pacientes con síntomas sugestivos de este padecimiento presenta realmente una neumonía bacteriana?",
        options: ["5 %", "15 %", "48 %", "50 %"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, es fundamental conocer la prevalencia epidemiológica de las complicaciones para evitar el sobreuso de antibióticos empíricos.<br><br>Perla ENARM: Solo 5 % de los pacientes con síntomas sugestivos de BA presentan neumonía bacteriana.<br><br>Análisis de Distractores: La opción B carece de sustento epidemiológico nacional. La opción C corresponde a la incidencia de esputo purulento en cuadros de bronquitis sin neumonía. La opción D corresponde a la prevalencia de tos productiva en el cuadro general.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico, Página 14."
    },
    {
        id: 4,
        question: "¿Qué patógenos virales específicos causan un cuadro clínico de mayor gravedad en pacientes > 60 años que habitan en asilos?",
        options: ["Adenovirus y rinovirus", "Virus sincitial respiratorio o influenza", "Coronavirus y bocavirus", "Parainfluenza y metapneumovirus"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, las poblaciones seniles institucionalizadas y los huéspedes inmunosuprimidos tienen alto riesgo de morbilidad cuando se exponen a estos dos agentes etiológicos en particular.<br><br>Perla ENARM: En personas mayores de 60 años de edad, especialmente aquellos que habitan en comunidades cerradas y huéspedes inmunosuprimidos, el cuadro clínico suele ser más sintomático y grave, en particular cuando la etiología es por virus sincicial respiratorio o virus de influenza.<br><br>Análisis de Distractores: Las opciones A, C y D representan virus respiratorios comunes causantes de resfriado o bronquitis leve en la población general, pero no están catalogados normativamente como los principales generadores de gravedad en este grupo etario.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico, Página 14."
    },
    {
        id: 5,
        question: "¿Qué hallazgo exploratorio pulmonar es determinante documentar para confirmar clínicamente el padecimiento y omitir la toma de radiografías?",
        options: ["Sibilancias inspiratorias y espiratorias", "Roncus de tono bajo dispersos", "Murmullo vesicular simétrico", "Ausencia de semiología de condensación"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, para cumplir el objetivo de descartar neumonía sin estudios de imagen, la exploración física negativa para datos de ocupación alveolar es indispensable.<br><br>Perla ENARM: En el examen físico: ausencia de semiología de condensación pulmonar. Habitualmente el examen es normal, aunque en algunos pacientes pueden auscultarse sibilancias y roncus.<br><br>Análisis de Distractores: Las opciones A y B son hallazgos bronquiales que pueden presentarse comúnmente en la enfermedad, pero no definen el diagnóstico ni excluyen neumonía por sí solos. La opción C es un hallazgo normal, pero la normativa exige la redacción específica de ausencia de condensación.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico, Página 14."
    },
    {
        id: 6,
        question: "¿Cuál es el valor diagnóstico real del esputo purulento para predecir una infección bacteriana en esta enfermedad?",
        options: ["Posee alto valor predictivo positivo", "Indica necesidad absoluta de cultivo", "No es un buen predictor de infección", "Es patognomónico de etiología atípica"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, el cambio de coloración de la flema es un fenómeno normal derivado de la descamación de células epiteliales e inflamatorias virales, no de proliferación bacteriana.<br><br>Perla ENARM: El esputo purulento no es un buen predictor de infección bacteriana pulmonar. Se presenta en el 48 % de los pacientes con BA sin neumonía.<br><br>Análisis de Distractores: La opción A es un error conceptual frecuente en la práctica diaria. La opción B está contraindicada en pacientes previamente sanos. La opción D asume erróneamente un agente bacteriano sin evidencia clínica.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico, Página 14."
    },
    {
        id: 7,
        question: "¿Cuál es la intervención farmacológica indicada como primera línea de tratamiento para la resolución de los síntomas?",
        options: ["Macrólidos de nueva generación", "Agonistas beta 2 de acción corta", "Corticoesteroides sistémicos o inhalados", "Antiinflamatorios no esteroideos"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, al ser una patología predominantemente viral y autolimitada, la piedra angular del manejo busca exclusivamente mitigar el disconfort general y la inflamación de la vía aérea.<br><br>Perla ENARM: En pacientes con diagnóstico de BA se recomienda otorgar medidas sintomáticas como: antipiréticas, desinflamatorios y analgésicos, según sea necesario.<br><br>Análisis de Distractores: La opción A es una mala praxis y genera resistencia antimicrobiana. La opción B no ha demostrado acortar los síntomas y aumenta los efectos adversos de forma rutinaria. La opción C carece de evidencia a favor y eleva los costos.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Tratamiento, Página 21."
    },
    {
        id: 8,
        question: "¿Qué antimicrobiano está estrictamente prohibido utilizar de forma empírica en sospecha bacteriana por su falta de beneficio y riesgo epidemiológico?",
        options: ["Amoxicilina con ácido clavulánico", "Eritromicina base", "Azitromicina oral", "Doxiciclina oral"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, el uso irracional de este macrólido es un problema de salud pública, y la normativa es explícita en su proscripción dentro del abordaje de este padecimiento, ya que no ofrece diferencias clínicas contra placebo.<br><br>Perla ENARM: No utiliza azitromicina en pacientes con BA con sospecha bacteriana.<br><br>Análisis de Distractores: Las opciones A y B sí están listadas en el cuadro básico de medicamentos de la guía para casos de infecciones del tracto inferior complicadas, pero no son la primera línea rutinaria. La opción D no se menciona de forma prohibitiva específica como la respuesta correcta.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Cédula de Verificación, Página 34."
    },
    {
        id: 9,
        question: "¿Qué eventualidad clínica justifica invariablemente la solicitud de una radiografía de tórax en este padecimiento?",
        options: ["Presencia de esputo purulento espeso", "Deterioro clínico y fiebre persistente", "Tos productiva de 10 días de evolución", "Auscultación de roncus aislados"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, los estudios de gabinete se reservan para escenarios que abandonan la evolución natural autolimitada de la patología, donde es forzoso realizar diagnóstico diferencial.<br><br>Perla ENARM: Se solicita exclusivamente para realizar el diagnóstico diferencial con otras patologías pulmonares (ej. exclusión de neumonía) ante deterioro del paciente, taquipnea, fiebre persistente o datos de consolidación.<br><br>Análisis de Distractores: La opción A (esputo) ocurre en casi la mitad de casos virales sanos. La opción C (tos 10 días) entra en el rango esperado (< 3 semanas). La opción D (roncus) es un hallazgo normal y esperado en la vía aérea central inflamada.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Diagnóstico y Diagramas de Flujo."
    },
    {
        id: 10,
        question: "¿Cuál es el tiempo de duración posológico recomendado para la administración de AINEs en la terapia sintomática inicial?",
        options: ["1 a 2 días", "3 a 5 días", "7 a 10 días", "10 a 14 días"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, los ciclos cortos de antiinflamatorios mitigan la fase aguda sintomática sin exponer al paciente a la toxicidad gástrica o renal prolongada.<br><br>Perla ENARM: Ibuprofeno: Oral 600 mg cada 6 a 8 horas. Tres a cinco días. Paracetamol: Oral 250 a 500 mg cada 4 o 6 horas. Tres a cinco días.<br><br>Análisis de Distractores: La opción A es insuficiente para la respuesta inflamatoria de la vía aérea. Las opciones C y D superan el límite de seguridad de los AINEs sin supervisión y se asocian a esquemas de antimicrobianos, los cuales no están indicados.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Tabla de Medicamentos, Página 29."
    },
    {
        id: 11,
        question: "Respecto al empleo del extracto herbolario Pelargonium sidoides (Umckaloabo), ¿cuál es la conducta normativa a seguir?",
        options: ["Administrar en cuadros leves", "No se recomienda su uso", "Prescribir solo en tos productiva", "Es tratamiento herbolario de elección"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, los estudios sobre herbolaria carecen de homogeneidad y no logran demostrar una superioridad contundente frente al placebo en la resolución total de los síntomas agudos.<br><br>Perla ENARM: No se recomienda el uso de P. sidoides en el tratamiento de BA.<br><br>Análisis de Distractores: Las opciones A, C y D representan un riesgo clínico por fomentar el gasto de bolsillo en terapias alternativas sin grado de evidencia sólida en las normativas nacionales.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Tratamiento, Página 19."
    },
    {
        id: 12,
        question: "¿Qué indicación médica precisa establece la guía respecto al aumento sistemático de la ingesta de líquidos en el paciente?",
        options: ["Aumentar la ingesta en 2 litros", "Restringir líquidos por secreción de ADH", "Continuar aporte normal o ajustar pérdidas", "Administrar hidratación intravenosa profiláctica"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, forzar la hiperhidratación puede ser riesgoso debido al aumento documentado de hormona antidiurética durante las infecciones del tracto respiratorio inferior.<br><br>Perla ENARM: Actualmente no hay evidencia a favor o en contra de la recomendación de aumentar los fluidos en las infecciones respiratorias agudas. Sin embargo se recomienda continuar con su aporte normal de líquidos o ajustar de acuerdo a aumento de perdidas insensibles.<br><br>Análisis de Distractores: La opción A puede precipitar hiponatremia en pacientes susceptibles. La opción B predispone a deshidratación severa si existe fiebre o diaforesis. La opción D es un recurso hospitalario injustificado en manejo ambulatorio.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Tratamiento, Página 20."
    },
    {
        id: 13,
        question: "¿Cuál de los siguientes se considera un dato de alarma primordial que obliga al paciente a regresar para descartar infección agregada?",
        options: ["Tos de predominio nocturno", "Esputo de coloración verdosa", "Fiebre > 38 °C", "Dolor torácico mecánico leve"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Bronquitis Aguda, la hipertermia sostenida o de alta intensidad sugiere una consolidación parenquimatosa que requiere abordaje clínico avanzado y radiografía de tórax.<br><br>Perla ENARM: Se recomienda dar a conocer los datos de alarma a los pacientes (dificultad para respirar, taquipnea, disnea, fiebre >38º, sibilancias, hemoptisis, cianosis, somnolencia, confusión) y en su caso acudir a revaloración con el fin de descartar infección agregada.<br><br>Análisis de Distractores: La opción A y D son síntomas esperados por la mecánica del espasmo tusígeno. La opción B representa la descamación epitelial viral esperada en el 48% de los casos.",
        source: "SS-189-10, Diagnóstico y Tratamiento de Bronquitis Aguda, Tratamiento, Página 21."
    },
    {
        id: 14,
        question: "¿Cómo se debe reclasificar médicamente un cuadro tusígeno que alcanza una duración confirmada de 5 semanas?",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

            document.getElementById('module-display').innerHTML = html;

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>

                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";

                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
