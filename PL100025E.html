    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el número mínimo de consultas prenatales que debe recibir una persona embarazada de bajo riesgo?",
        options: ["Cinco consultas prenatales", "Ocho consultas prenatales", "Diez consultas prenatales", "Tres consultas prenatales"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Primeros 1000 días, la estructuración del cuidado materno requiere asegurar un piso basal de encuentros médicos para el tamizaje oportuno de patologías. Aunque se sugiere un calendario óptimo de ocho visitas, el umbral mínimo exigido para reducir la morbimortalidad sigue siendo cinco intervenciones estandarizadas.<br><br>Perla ENARM: \"Se debe promover que la embarazada de bajo riesgo reciba como mínimo cinco consultas prenatales, iniciando preferentemente en las primeras 8 semanas de gestación\".<br><br>Análisis de Distractores: Ocho consultas prenatales (B) es el esquema calendario óptimo recomendado, pero no el mínimo legal. Tres consultas prenatales (D) es insuficiente y eleva el riesgo de muerte materna. Diez consultas prenatales (C) aplica para el control de embarazos de alto riesgo con comorbilidades.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección III. Embarazo saludable, Página 2."
    },
    {
        id: 2,
        question: "¿Cuál es la ganancia de peso total recomendada durante el embarazo para una mujer con Índice de Masa Corporal pregestacional normal?",
        options: ["12.5 a 18.0 kilogramos", "6.8 a 11.3 kilogramos", "11.3 a 15.9 kilogramos", "4.0 a 9.0 kilogramos"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Guías Alimentarias, el estado nutricional basal determina la capacidad metabólica y el riesgo de preeclampsia o macrosomía. Para pacientes eutróficas, este rango permite un adecuado desarrollo feto-placentario sin incrementar la adiposidad patológica materna.<br><br>Perla ENARM: \"NORMAL IMC de 18.5 a 24.9 kg/m2, Ganancia de peso total durante el embarazo: 11.3-15.9 kg\".<br><br>Análisis de Distractores: 12.5 a 18.0 kilogramos (A) es la indicación para pacientes con desnutrición inicial. 6.8 a 11.3 kilogramos (B) corresponde al límite para mujeres con sobrepeso pregestacional. 4.0 a 9.0 kilogramos (D) es la restricción estricta para obesidad franca.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección III. Embarazo saludable, Página 5."
    },
    {
        id: 3,
        question: "¿Cuál es el tiempo exacto que debe esperarse para realizar el pinzamiento tardío del cordón umbilical en un recién nacido vigoroso?",
        options: ["10 a 20 segundos", "30 a 60 segundos", "90 a 120 segundos", "1 a 3 minutos"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Primeros 1000 días, la demora controlada en el corte anatómico favorece la transfusión placentaria fisiológica, incrementando el volumen sanguíneo neonatal y consolidando reservas de hierro críticas para el primer semestre.<br><br>Perla ENARM: \"Pinzamiento tardío de cordón umbilical. Es una técnica médica que consiste en esperar entre 30 y 60 segundos después del nacimiento para pinzar el cordón y debe integrarse como práctica esencial\".<br><br>Análisis de Distractores: 10 a 20 segundos (A) constituye un pinzamiento precoz con pérdida del volumen placentario. Las opciones de 90 a 120 segundos (C) y 1 a 3 minutos (D) exceden el límite operativo marcado por la normativa nacional para esta práctica estándar en sala de parto.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección IV. Parto y puerperio seguros, Página 11."
    },
    {
        id: 4,
        question: "¿A qué volumen anatómico y fruta equivale la capacidad gástrica máxima de un recién nacido al tercer día de vida?",
        options: ["50 a 60 mililitros huevo", "80 a 150 mililitros naranja", "5 a 7 mililitros uva", "22 a 27 mililitros limón"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Aprendiendo a amamantar, el estómago neonatal experimenta una distensibilidad progresiva diaria. La sobrealimentación inicial causa vómitos y reflujo, por lo que es vital entender que en los primeros días se requieren ingestas pequeñas (acordes a la producción del calostro).<br><br>Perla ENARM: \"Día 3: 22-27 ml equivalente al tamaño de un limón. El estómago de tu bebé al nacer es muy pequeño, por ello no necesita mucho alimento\".<br><br>Análisis de Distractores: 5 a 7 mililitros uva (C) describe la capacidad en el primer día de nacido. 50 a 60 mililitros huevo (A) se alcanza hasta el décimo día. 80 a 150 mililitros naranja (B) corresponde a la distensibilidad del primer mes de vida.",
        source: "Un regalo de salud para la vida. Aprendiendo a amamantar y alimentar a mi bebé, 2020, Sección ¡Te esperamos con los brazos abiertos!, Página 38."
    },
    {
        id: 5,
        question: "¿Cuál es la dosis de suplementación de ácido fólico indicada para toda persona embarazada sin factores de riesgo adicionales?",
        options: ["4 miligramos diarios", "5 miligramos diarios", "0.4 miligramos diarios", "1 miligramo diario"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Primeros 1000 días, esta concentración compensa los requerimientos embrionarios basales para garantizar el cierre anatómico normal del neuroporo embrionario durante el primer trimestre, aplicable universalmente.<br><br>Perla ENARM: \"Debe prescribirse 0.4 mg de ácido fólico, en todas personas embarazadas al primer contacto, idealmente debe prescribirse 3 meses previos a la gestión\".<br><br>Análisis de Distractores: 4 miligramos diarios (A) es la dosis multiplicada reservada únicamente para pacientes con antecedentes genéticos o alteraciones del tubo neural previas. 5 miligramos diarios (B) y 1 miligramo diario (D) no corresponden al protocolo farmacológico nacional vigente.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección III. Embarazo saludable, Página 6."
    },
    {
        id: 6,
        question: "¿Cuál es el momento normativo indicado para introducir alimentos potencialmente alergénicos como el huevo o el pescado en el lactante?",
        options: ["Después de los 24 meses", "Antes de cumplir un año", "A los 18 meses cumplidos", "Posterior a los 3 años"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Niñas y Niños, la evidencia inmunológica moderna determina que retrasar la exposición a epítopes alimentarios fomenta atopia. El contacto en la ventana fisiológica del primer año favorece la tolerancia intestinal.<br><br>Perla ENARM: \"Los alimentos considerados potencialmente alergénicos como son huevo, kiwi, fresa, cacahuate, pescado, mariscos, trigo y soya se deben introducir antes de cumplir el año de edad\".<br><br>Análisis de Distractores: Después de los 24 meses (A), a los 18 meses cumplidos (C) y posterior a los 3 años (D) son paradigmas pediátricos obsoletos que actualmente elevan el riesgo de desarrollar reacciones anafilácticas y privan al niño de nutrientes de alto valor biológico.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección VI. Niñas y niños de 28 días a 24 meses, Página 18."
    },
    {
        id: 7,
        question: "¿Qué parámetro de saturación pre y postductal clasifica un tamiz cardiaco neonatal como positivo sospechoso de cardiopatía grave?",
        options: ["Menor al 90 porciento", "Mayor al 95 porciento", "Diferencia del 1 porciento", "Diferencia del 2 porciento"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Primeros 1000 días, la incapacidad de mantener la oxigenación periférica evidencia cortocircuitos intra o extracardíacos dependientes de conducto. Una caída por debajo de este umbral o una asimetría marcada obliga al abordaje anatómico urgente.<br><br>Perla ENARM: \"Se considera tamizaje positivo cuando la saturación < 90% o si existe una diferencia mayor a 3% entre la saturación pre y postductal\".<br><br>Análisis de Distractores: Mayor al 95 porciento (B) indica una mecánica cardiopulmonar sana y normal. Las diferencias de saturación del 1 porciento (C) y del 2 porciento (D) entre miembro superior derecho e inferior son gradientes fisiológicos y no superan el punto de corte diagnóstico superior al 3 porciento.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección V. Atención a la persona recién nacida, Página 15-16."
    },
    {
        id: 8,
        question: "¿Cuál es la meta exacta de consumo diario exclusivo de agua natural recomendada durante todo el embarazo?",
        options: ["Seis vasos diarios", "Doce vasos diarios", "Diez vasos diarios", "Nueve vasos diarios"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Mujeres Embarazadas, la expansión crítica del volumen sanguíneo materno y la tasa de recambio de líquido amniótico exigen un aporte hídrico seguro sin recurrir a bebidas endulzadas.<br><br>Perla ENARM: \"Toma agua natural a lo largo del día y con todas tus comidas: 9 vasos al día en el embarazo y 10 vasos al día durante la lactancia\".<br><br>Análisis de Distractores: Diez vasos diarios (C) es el objetivo hídrico exclusivo del periodo de lactancia. Seis vasos diarios (A) predice deshidratación y riesgo de infecciones de vías urinarias. Doce vasos diarios (B) sobrecarga inútilmente el filtrado glomerular materno.",
        source: "Recomendaciones para la promoción de la salud en mujeres embarazadas y en periodo de lactancia, 2024, Recomendación 6, Página 156."
    },
    {
        id: 9,
        question: "¿En qué periodo de vida debe realizarse una biometría hemática de escrutinio universal para detectar anemia por deficiencia de hierro?",
        options: ["3 a 6 meses", "9 a 12 meses", "18 a 24 meses", "Al nacimiento"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Primeros 1000 días, debido al inminente agotamiento fisiológico de las reservas férricas fetales y la alta prevalencia de desnutrición oculta, se exige esta ventana temporal para el abordaje de laboratorio preventivo.<br><br>Perla ENARM: \"Se recomienda realizar estudio de biometría hemática entre los 9 y 12 meses de vida, derivado de la alta prevalencia de anemia por deficiencia de hierro\".<br><br>Análisis de Distractores: Al nacimiento (D) el lactante posee niveles de hemoglobina altos por hemoconcentración. De 3 a 6 meses (A) persiste el soporte férrico intrauterino. De 18 a 24 meses (C) retrasa severamente el diagnóstico y perpetúa el daño neurológico anémico.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección VI. Niñas y niños de 28 días a 24 meses, Página 20."
    },
    {
        id: 10,
        question: "¿Cuál es el tiempo máximo de conservación segura para la leche materna extraída mantenida a temperatura ambiente entre 19 y 26 grados centígrados?",
        options: ["24 horas continuas", "72 horas continuas", "8 horas como máximo", "2 horas como máximo"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Mujeres Embarazadas, la actividad macrofágica natural de la leche le confiere propiedades bacteriostáticas que evitan la descomposición fuera de red de frío dentro de este límite preciso.<br><br>Perla ENARM: \"Conservación de la Leche Materna: Temperatura ambiente 19-26 °C, Hasta por 8 horas (máximo), 4 horas o menos tiempo si el clima es caluroso\".<br><br>Análisis de Distractores: 2 horas como máximo (D) minimiza la estabilidad biológica real. 24 horas continuas (A) exige el uso de una hielera con gel refrigerante (15 grados). 72 horas continuas (B) es el periodo de seguridad admitido exclusivamente dentro de un refrigerador.",
        source: "Recomendaciones para la promoción de la salud en mujeres embarazadas y en periodo de lactancia, 2024, Anexo III, Página 106."
    },
    {
        id: 11,
        question: "¿En qué semanas de gestación se debe aplicar preferentemente la vacuna contra Tétanos, difteria y pertussis acelular?",
        options: ["12 a 20 semanas", "38 a 40 semanas", "10 a 14 semanas", "27 a 36 semanas"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Primeros 1000 días, es indispensable lograr un pico de anticuerpos maternos circulantes y otorgar el tiempo fisiológico para su transvase pasivo a través de la placenta hacia el feto antes del nacimiento.<br><br>Perla ENARM: \"Nombre de la vacuna Tdpa: Momento de aplicación: A partir de la semana 20, preferente entre la semana 27 y 36 de gestación\".<br><br>Análisis de Distractores: 10 a 14 semanas (C) y 12 a 20 semanas (A) resultan prematuras para optimizar la carga inmunológica final. 38 a 40 semanas (B) impide el tiempo metabólico de 14 días necesario para generar los anticuerpos protectores.",
        source: "Protocolo Nacional de Atención Médica (PRONAM): Primeros 1000 días de vida, 2024, Sección III. Embarazo saludable, Página 5."
    },
    {
        id: 12,
        question: "¿Cuál es la cantidad exacta de agua natural recomendada diariamente para un lactante de 7 a 11 meses de edad?",
        options: ["Medio vaso diario", "Un vaso diario", "Dos vasos diarios", "Cuatro vasos diarios"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Niñas y Niños, en este periodo la mayor proporción hídrica ingresa mediante la lactancia materna a libre demanda. Sin embargo, para adaptar el hábito y manejar los residuos de la ablactación temprana se instaura una dosis volumétrica menor.<br><br>Perla ENARM: \"Cantidad de agua natural o simple recomendada: 7 a 11 meses de edad: 120 ml (1/2 taza)\".<br><br>Análisis de Distractores: Un vaso diario (B) es la indicación fisiológica específica a partir de cumplir un año de edad. Dos vasos diarios (C) es el volumen mínimo dictado para infantes de dos años. Cuatro vasos diarios (D) sobrecarga peligrosamente los riñones inmaduros del lactante.",
        source: "Recomendaciones para la promoción de la salud en niñas y niños de 0 a 4 años, 2024, Capítulo 1, Página 49."
    },
    {
        id: 13,
        question: "En la Prueba de Evaluación del Desarrollo Infantil, ¿qué condición define un resultado en color rojo o de riesgo de retraso?",
        options: ["Logra actividades del grupo anterior", "No realiza actividades de edad anterior", "Falla solo en motor fino", "Pierde reflejos primitivos esperados"],

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('1000DIASProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('1000DIASLastQId', currentQuestionId);
                else localStorage.removeItem('1000DIASLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('1000DIASProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
