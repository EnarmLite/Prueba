    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "En una paciente asintomática con antecedente de dos cesáreas, ¿cuál es el estudio inicial indicado en el segundo trimestre para el escrutinio de anomalías placentarias?", 
                options: ["Resonancia magnética pélvica", "Ultrasonido transvaginal", "Ultrasonido abdominal", "Cistoscopía diagnóstica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, el protocolo inicial de evaluación en pacientes de alto riesgo debe realizarse de forma no invasiva para localizar topográficamente la placenta antes de la confirmación milimétrica en el tercer trimestre.<br><br>Perla ENARM: \"Se recomienda realizar ultrasonido abdominal de tamizaje para la detección de placenta previa en pacientes con antecedente de cesárea previa, antecedente de placenta previa en gestaciones previas o con factores de riesgo para anomalías de la inserción placentaria\".<br><br>Análisis de Distractores: El ultrasonido transvaginal es el estudio confirmatorio de elección (estándar de oro) a las 32 semanas, no el tamizaje inicial. La resonancia magnética y la cistoscopía se reservan para evaluar la extensión de la invasión a órganos adyacentes en casos de acretismo o percretismo avanzado.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 14." 
            },
            {
                id: 2, 
                question: "¿Cuál es el hallazgo ecográfico exacto que define categóricamente a la placenta previa?", 
                options: ["Borde placentario a 15 mm", "Borde placentario sobre el orificio", "Inserción en fondo uterino", "Presencia de vasos aberrantes"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la terminología antigua de placenta \"parcial\" o \"marginal\" se ha abandonado. Si la masa placentaria ocluye total o parcialmente la salida cervical, se diagnostica directamente como previa.<br><br>Perla ENARM: \"Se recomienda emplear el término de placenta previa cuando se tenga evidencia ultrasonográfica de que el borde inferior de la placenta se encuentre sobre el orificio cervical interno\".<br><br>Análisis de Distractores: Un borde a 15 mm define una inserción baja de placenta, no placenta previa. La inserción en fondo uterino es la ubicación fisiológica normal. La presencia de vasos aberrantes corresponde a vasa previa.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 16." 
            },
            {
                id: 3, 
                question: "¿A partir de qué edad gestacional se recomienda realizar la confirmación diagnóstica definitiva de las anomalías de inserción placentaria?", 
                options: ["20 semanas", "24 semanas", "28 semanas", "32 semanas"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, el fenómeno fisiológico de elongación del segmento inferior uterino provoca que muchas placentas \"migren\" alejándose del cérvix, por lo que los diagnósticos realizados tempranamente tienen altas tasas de falsos positivos.<br><br>Perla ENARM: \"Se recomienda que la confirmación diagnóstica de placenta previa o inserción baja de placenta, sea a partir de las 32 semanas de gestación\".<br><br>Análisis de Distractores: A las 20, 24 y 28 semanas se debe mantener la vigilancia y tamizaje, pero el diagnóstico no es definitivo ya que el tejido corial aún puede desplazarse hacia el fondo uterino por el crecimiento miometrial.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 15." 
            },
            {
                id: 4, 
                question: "¿Cuál es la manifestación clínica principal en los casos de vasa previa tras la ruptura de membranas?", 
                options: ["Sangrado rojo rutilante indoloro", "Hipertonía uterina con bradicardia", "Sangrado oscuro con desaceleraciones", "Dolor abdominal irradiado a espalda"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la hemorragia en este padecimiento es de origen 100% fetal. Al romperse los vasos expuestos en las membranas, el feto pierde volemia rápidamente, lo que se refleja en sufrimiento fetal agudo y sangre desoxigenada (venosa/fetal).<br><br>Perla ENARM: \"En casos de vasa previa, la principal manifestación clínica es el sangrado transvaginal obscuro, sin presencia de dolor, seguido de alteraciones súbitas en el registro cardiotocográfico\".<br><br>Análisis de Distractores: El sangrado rojo rutilante indoloro es patognomónico de placenta previa. La hipertonía uterina y el dolor irradiado son típicos del desprendimiento prematuro de placenta normoincerta, entidades donde la hemorragia es predominantemente materna.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 13." 
            },
            {
                id: 5, 
                question: "Ante la sospecha clínica de anomalías en la inserción placentaria por sangrado transvaginal, ¿cuál intervención está absolutamente contraindicada?", 
                options: ["Especuloscopía directa", "Tacto vaginal", "Ultrasonido endovaginal", "Aplicación de corticoesteroides"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la exploración digital a ciegas del cérvix puede penetrar el canal endocervical y desgarrar un cotiledón placentario o un vaso fetal previo, desencadenando una hemorragia incontrolable y potencialmente letal.<br><br>Perla ENARM: \"No se recomienda realizar tacto vaginal en pacientes con sospecha de placenta previa\".<br><br>Análisis de Distractores: La especuloscopía directa es la maniobra recomendada inicialmente para visualizar el origen del sangrado. El ultrasonido endovaginal es seguro y el estándar de oro. Los corticoesteroides están indicados profilácticamente entre las 24 y 34 semanas.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 14." 
            },
            {
                id: 6, 
                question: "¿Cuál factor de riesgo tiene el mayor nivel de asociación (Odds Ratio) para desarrollar alteraciones anatómicas en la placentación?", 
                options: ["Tabaquismo activo", "Edad materna avanzada", "Tratamientos de infertilidad", "Cesárea previa"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la manipulación de la cavidad endometrial y los procedimientos de reproducción asistida alteran profundamente los mecanismos de implantación trofoblástica, liderando la tabla de riesgos estadísticos globales.<br><br>Perla ENARM: \"Tratamientos de infertilidad OR 1.97; IC 95% 1.45–2.66; P < 0.001\".<br><br>Análisis de Distractores: La cesárea previa es el factor más importante para acretismo con un OR de 1.76, ligeramente inferior. El tabaquismo y la edad avanzada confieren un riesgo moderado a bajo (OR 1.42 y 1.08, respectivamente).", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Cuadros o figuras, Página 40." 
            },
            {
                id: 7, 
                question: "En el manejo de la placenta previa o inserción baja, ¿en qué periodo gestacional se indica la administración del esquema de madurez pulmonar?", 
                options: ["20 a 24 semanas", "24 a 34 semanas", "34 a 36 semanas", "36 a 38 semanas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, estas pacientes cursan con un altísimo riesgo de resolución anticipada de urgencia debido a hemorragias masivas impredecibles, por lo que la inducción de neumocitos tipo II es vital para la sobrevida neonatal.<br><br>Perla ENARM: \"Se recomienda la administración de un esquema de corticoesteroides para la madurez pulmonar entre la semana 24 a 34 de gestación en pacientes con diagnóstico de placenta previa o inserción baja de placenta\".<br><br>Análisis de Distractores: Antes de las 24 semanas no hay receptores suficientes en el tejido pulmonar fetal. Entre las 34 y 36 semanas se indica el nacimiento anticipado si hubo sangrado, y a las 36 a 38 semanas se programa la cesárea en pacientes asintomáticas sin necesidad de esquema.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 20." 
            },
            {
                id: 8, 
                question: "¿En qué semanas de gestación se debe programar el nacimiento en una paciente con placenta previa asintomática sin episodios de sangrado?", 
                options: ["34 a 35 semanas", "36 a 37 semanas", "38 a 39 semanas", "39 a 40 semanas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la estrategia es equilibrar la madurez fisiológica del recién nacido contra el riesgo de iniciar un trabajo de parto espontáneo de término que desencadenaría una catástrofe hemorrágica.<br><br>Perla ENARM: \"Se recomienda programar el nacimiento entre la semana 36 a 37 de gestación en pacientes con diagnóstico de placenta previa o inserción baja de placenta y sin factores de riesgo o comorbilidades asociadas\".<br><br>Análisis de Distractores: 34 a 35 semanas es muy prematuro para una paciente asintomática. Llegar a la semana 38 o 40 implica un riesgo inminente de dinámica uterina espontánea y sangrado masivo agudo que llevaría a una cirugía de alta urgencia.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 21." 
            },
            {
                id: 9, 
                question: "¿Cuál es la conducta para el nacimiento en una paciente con placenta previa y antecedente de episodios de sangrado transvaginal controlados?", 
                options: ["Programar cesárea a las 38 semanas", "Programar cesárea entre 34 y 36 semanas", "Programar parto vaginal a las 37 semanas", "Esperar inicio de trabajo de parto"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, el historial de hemorragia durante el embarazo es el principal predictor de una complicación intraparto letal, obligando a adelantar la fecha de resolución para evitar un nuevo y más grave sangrado miometrial.<br><br>Perla ENARM: \"Se recomienda programar el nacimiento entre la semana 34 a 36 de gestación en pacientes con diagnóstico de placenta previa o inserción baja de placenta y antecedente de haber presentado uno o más episodios de sangrado transvaginal\".<br><br>Análisis de Distractores: Esperar a las 38 semanas o al trabajo de parto está proscrito en pacientes que ya sangraron. El parto vaginal está contraindicado universalmente si la placenta cubre el orificio cervical o si la paciente ha cursado con sangrado activo.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 21." 
            },
            {
                id: 10, 
                question: "En una paciente asintomática con ultrasonido endovaginal a las 36 semanas, ¿cuál es la distancia ecográfica mínima del borde placentario al orificio cervical interno que permite intentar un parto vaginal seguro?", 
                options: ["Mayor a 5 milímetros", "Menor a 10 milímetros", "Mayor a 10 milímetros", "Menor a 20 milímetros"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, si la placenta está a más de 1 cm, el polo cefálico puede descender durante la dilatación realizando un efecto hemostático compresivo sobre el borde vascular sin ocluir la salida.<br><br>Perla ENARM: \"Se recomienda considerar el nacimiento por vía vaginal en pacientes con diagnóstico de inserción baja de placenta, sin sangrado transvaginal activo y que cuenten con condiciones obstétricas favorables (Distancia entre el borde placentario y el OCI > 10 mm en Algoritmo 1)\".<br><br>Análisis de Distractores: Las distancias de 5 mm o menos de 10 mm tienen una tasa de fracaso prohibitiva y terminan en cesárea de emergencia. Menor a 20 milímetros es solo la definición de inserción baja, pero el punto de corte exacto para permitir prueba de parto de manera segura es que rebase los 10 mm.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Algoritmos, Página 36." 
            },
            {
                id: 11, 
                question: "En la fisiopatología quirúrgica del acretismo placentario secundario a cesáreas iterativas, ¿cuál es el sitio anatómico uterino que resulta invadido con mayor frecuencia?", 
                options: ["Cara anterior del útero", "Fondo uterino posterior", "Cuerno uterino derecho", "Segmento uterino posterior"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la implantación del trofoblasto sigue la ruta de menor resistencia miometrial creada por el defecto cicatrizal de las histerotomías transversas bajas previas, las cuales inciden clásicamente en la pared anterior por detrás de la reflexión vesical.<br><br>Perla ENARM: \"...se deberá de realizar una inspección completa de la pelvis, especialmente en la cara anterior del útero, pues es el sitio más común de invasión placentaria\".<br><br>Análisis de Distractores: El fondo uterino, cuerno derecho y segmento posterior son sitios de tejido íntegro en las técnicas quirúrgicas obstétricas habituales, por lo que raramente sufren acretismo de origen yatrogénico secundario a cesárea previa.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 25." 
            },
            {
                id: 12, 
                question: "Durante el manejo de control de daños en una paciente con acretismo placentario, ¿qué grupo farmacológico NO se recomienda utilizar para la profilaxis de hemorragia obstétrica?", 
                options: ["Corticoesteroides", "Antibióticos profilácticos", "Uterotónicos", "Antifibrinolíticos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la contracción enérgica de un miometrio invadido y firmemente adherido al tejido corial provocará desgarros tisulares extensos e irreparables, empeorando dramáticamente la pérdida hemática.<br><br>Perla ENARM: \"En pacientes con diagnóstico de acretismo placentario no se recomienda el uso de uterotónicos para la profilaxis de la hemorragia obstétrica\".<br><br>Análisis de Distractores: Los corticoesteroides no alteran el tono muscular en quirófano. Los antibióticos previenen infección por manipulación. Los antifibrinolíticos como el ácido tranexámico son útiles en el control del sangrado masivo.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 26." 
            },
            {
                id: 13, 
                question: "En pacientes con acretismo placentario confirmado, ¿cuál es la técnica quirúrgica radical recomendada para la resolución del embarazo?", 
                options: ["Histerectomía subtotal con extracción", "Legrado uterino inmediato profundo", "Extracción manual de placenta", "Dejar la placenta in situ"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la máxima premisa de supervivencia es no manipular un lecho invadido. Se debe aislar el órgano y extirparlo en bloque.<br><br>Perla ENARM: \"En pacientes con acretismo placentario se recomienda realizar cesárea histerectomía, dejar la placenta in situ y evitar intentar separar la placenta de las paredes uterinas\".<br><br>Análisis de Distractores: La histerectomía subtotal es incorrecta porque la invasión suele involucrar cérvix, debiendo ser histerectomía total. El legrado profundo o la extracción manual provocarán de manera inmediata un choque hipovolémico exanguinante masivo al arrancar el miometrio y tejido vascular penetrado.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 25." 
            },
            {
                id: 14, 
                question: "¿Cuál es el límite ecográfico en milímetros para clasificar a una placenta como de inserción baja sin llegar a cubrir el orificio cervical interno?", 
                options: ["Menor a 10 milímetros", "Menor a 15 milímetros", "Menor a 20 milímetros", "Menor a 30 milímetros"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, se elimina el concepto de \"placenta marginal\". Cualquier inserción que, sin ocluir, se encuentre lo suficientemente cerca del cérvix como para sangrar durante la formación del segmento inferior, recibe este título anatómico.<br><br>Perla ENARM: \"Se recomienda emplear el término de inserción baja de placenta cuando se tenga evidencia ultrasonográfica de que el borde inferior de la placenta se encuentre a menos de 20 mm de orificio cervical interno, sin llegar a cubrirlo\".<br><br>Análisis de Distractores: Menor a 10 mm es un parámetro pronóstico para fracaso de parto, pero no la definición global. 15 mm está dentro del rango, pero no es el punto de corte definitorio. 30 mm se considera una inserción placentaria fisiológica y normal.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 16." 
            },
            {
                id: 15, 
                question: "Con el fin de facilitar la exploración de la cavidad abdominal en pacientes intervenidas por acretismo placentario, ¿cuál es la incisión quirúrgica recomendada?", 
                options: ["Incisión de Pfannenstiel", "Incisión de Maylard", "Incisión transversa supraumbilical", "Incisión media infraumbilical"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la complejidad de la cirugía exige máxima exposición pélvica para aislar los grandes vasos parametriales, acceder rápidamente al segmento uterino inferior y extender el campo hacia el abdomen superior en caso de sangrado retroperitoneal incontrolable.<br><br>Perla ENARM: \"En pacientes con diagnóstico de acretismo placentario se recomienda realizar una incisión media infraumbilical, ya que permite una mejor exploración de la cavidad abdominal y una mejor exposición de los tejidos\".<br><br>Análisis de Distractores: Las incisiones transversas bajas como Pfannenstiel o Maylard limitan la exposición cefálica del útero y prolongan la extracción fúndica del feto. La transversa supraumbilical no permite el abordaje adecuado del hueco pélvico inferior y vejiga.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 25." 
            },
            {
                id: 16, 
                question: "¿Cuál es el momento indicado para programar la interrupción del embarazo vía cesárea en pacientes con diagnóstico de vasa previa sin signos de alarma?", 
                options: ["32 a 34 semanas", "34 a 36 semanas", "36 a 38 semanas", "38 a 40 semanas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la vasa previa acarrea un riesgo letal si se presenta dinámica uterina. Por ello, la interrupción debe adelantarse al periodo fisiológico de formación del segmento inferior, garantizando previamente inductores de madurez.<br><br>Perla ENARM: \"En caso de confirmación diagnóstica de vasa previa en el tercer trimestre y ante la ausencia de signos de alarma, se recomienda programar la interrupción del embarazo vía cesárea entre las 34 y 36 semanas de gestación\".<br><br>Análisis de Distractores: De 32 a 34 es el periodo de vigilancia e internamiento profiláctico. Llegar a 36 a 38 o 40 semanas implica un 100% de riesgo de ruptura de membranas a término con mortalidad fetal instantánea.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 31." 
            },
            {
                id: 17, 
                question: "¿Qué evento clínico indica la realización de una cesárea de urgencia inminente en una paciente con diagnóstico prenatal de vasa previa?", 
                options: ["Disminución de movimientos fetales", "Ruptura de membranas", "Contracciones uterinas aisladas", "Expulsión del tapón mucoso"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, los vasos umbilicales expuestos sobre las membranas cervicales se desgarran físicamente en el mismo segundo en el que se pierde la integridad de la bolsa amniótica (amniorrexis).<br><br>Perla ENARM: \"Se recomienda realizar cesárea de urgencia en casos de pacientes con diagnóstico prenatal de vasa previa y que presenten ruptura de membranas o trabajo de parto\".<br><br>Análisis de Distractores: Las contracciones aisladas o expulsión del tapón exigen vigilancia estricta pero no son, sin modificaciones cervicales o sangrado franco, la indicación inmediata de hoja roja a quirófano. La disminución de movimientos amerita prueba sin estrés (NST) para su abordaje, no laparotomía de entrada sin confirmar sufrimiento.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 31." 
            },
            {
                id: 18, 
                question: "Según la escala predictiva de la GPC de transfusión masiva en placenta previa, ¿cuál hallazgo cervical se considera un factor de riesgo clínico-ecográfico que otorga un punto?", 
                options: ["Apariencia esponjosa del cérvix", "Longitud cervical mayor a 35 milímetros", "Dilatación cervical de un centímetro", "Ausencia de glándulas endocervicales"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la alta perfusión que el segmento uterino inferior demanda provoca neovascularizaciones gruesas que alteran el parénquima cervical (vascularidad > 5 áreas hipoecogénicas mayores a 5 mm), las cuales predecirán un lecho intensamente sangrante en quirófano.<br><br>Perla ENARM: \"(Score de predicción de transfusión masiva en placenta previa): Se otorga un punto por cada factor de riesgo: edad gestacional menor de 37 semanas, cesárea previa, placenta anterior, apariencia esponjosa del cérvix\".<br><br>Análisis de Distractores: La dilatación de un centímetro o la longitud cervical mayor a 35 mm (la patológica sería < 35 mm para riesgo) no forman parte de los parámetros de esta escala validada para volumen transfundido. La ausencia de glándulas no interfiere en la hemodinámica obstétrica.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Cuadros o figuras (Cuadro 7), Página 42." 
            },
            {
                id: 19, 
                question: "En pacientes con diagnóstico de percretismo placentario a vejiga en plano quirúrgico, ¿cuál es la técnica intraoperatoria recomendada para la resolución de la pared anterior?", 
                options: ["Extracción manual rápida", "Legrado vesical con cureta", "Cistotomía intencional y escisión", "Aplicación de metotrexato intraoperatorio"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, tratar de arrancar el tejido que ya invadió la capa serosa y la pared vesical originará fístulas incontables y sangrado masivo, por lo que es preferible abrir de manera limpia la víscera y resecar en bloque el bloque fibrótico invadido.<br><br>Perla ENARM: \"En casos de percretismo a vejiga, se recomienda considerar la cistotomía intencional y realizar la escisión del tejido afectado\".<br><br>Análisis de Distractores: La extracción manual rápida es una sentencia de muerte por hemorragia incontrolable. El legrado vesical no tiene fundamento oncológico u obstétrico útil. El metotrexato intraoperatorio no funciona mecánicamente y su uso en el manejo conservador está de hecho proscrito por su toxicidad.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 26." 
            },
            {
                id: 20, 
                question: "¿En qué situación clínica específica se recomienda y justifica el uso de la resonancia magnética para la evaluación de las anomalías de inserción placentaria?", 
                options: ["Tamizaje universal de placenta previa", "Sospecha de inserción baja asintomática", "Evaluación de extensión de invasión", "Diagnóstico de primera línea en urgencias"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, aunque el ultrasonido Doppler es el estándar de oro, existen zonas anatómicas posteriores y tejidos extrauterinos profundos donde las ondas sonoras pierden resolución, siendo ahí donde el contraste magnético tisular determina si el cirujano requerirá un urólogo o cirujano vascular.<br><br>Perla ENARM: \"El uso de la resonancia magnética no es esencial para el diagnóstico de acretismo... sin embargo, se recomienda su uso en el contexto de la evaluación de la extensión de invasión placentaria o ante la presencia de áreas de difícil evaluación ultrasonográfica\".<br><br>Análisis de Distractores: El diagnóstico de primera línea en urgencias o el tamizaje universal siempre será con ultrasonido obstétrico debido a su accesibilidad y bajo costo. La inserción baja asintomática se evalúa y controla perfectamente con ultrasonido endovaginal.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 18." 
            },
            {
                id: 21, 
                question: "Paciente de 30 semanas de gestación con diagnóstico de placenta previa y amenaza de parto pretérmino. Hemodinámicamente estable con sangrado leve. ¿Cuál es el manejo tocolítico indicado en esta condición clínica?", 
                options: ["Indometacina continua hasta la semana 34", "Nifedipino de mantenimiento por 4 semanas", "Contraindicación absoluta de tocolisis uterina", "Tocolíticos limitados a 48 horas"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la tocolisis crónica no mejora los resultados perinatales y prolonga el riesgo de hemorragia materna. Su único objetivo es retrasar la dinámica uterina el tiempo estricto para inducir neumocitos tipo II.<br><br>Perla ENARM: \"Se recomienda considerar la administración de tocolíticos por 48 horas (tiempo para administrar esquema de madurez pulmonar) en pacientes con amenaza de parto pretérmino y diagnóstico de placenta previa o inserción baja de placenta\".<br><br>Análisis de Distractores: La indometacina y nifedipino de mantenimiento prolongado exponen a efectos adversos sin beneficio comprobado. La contraindicación absoluta privaría al feto pretérmino del beneficio crítico de los corticoesteroides.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 21." 
            },
            {
                id: 22, 
                question: "Femenina de 28 semanas de gestación con diagnóstico ecográfico de vasa previa. Se encuentra asintomática y sin dinámica uterina. ¿En qué momento se indica su hospitalización profiláctica continua?", 
                options: ["30 a 34 semanas de gestación", "Al momento del diagnóstico inicial", "34 a 36 semanas de gestación", "Al presentar ruptura de membranas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, el riesgo de que el trabajo de parto inicie de forma sorpresiva a pretérmino tardío es altísimo, por lo que estas pacientes asintomáticas deben ser ingresadas precozmente para monitorización estrecha de la longitud cervical.<br><br>Perla ENARM: \"Se recomienda la hospitalización de pacientes con diagnóstico prenatal de vasa previa entre las 30 a 34 semanas de gestación\".<br><br>Análisis de Distractores: De 34 a 36 semanas es el rango para programar la cesárea, no para iniciar el internamiento. El diagnóstico a las 28 semanas permite aún manejo ambulatorio muy vigilado. Si se espera a la ruptura de membranas, el feto fallecerá por exanguinación aguda.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 30." 
            },
            {
                id: 23, 
                question: "Paciente con placenta previa sin sangrado activo, programada para cesárea electiva a las 37 semanas de gestación. Clínicamente estable. ¿Cuál es el manejo anestésico de elección para el procedimiento quirúrgico?", 
                options: ["Anestesia general balanceada", "Sedación intravenosa profunda", "Anestesia regional", "Bloqueo pudendo bilateral"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, contrario a conductas del pasado, el bloqueo neuroaxial ha demostrado ser seguro en pacientes hemodinámicamente estables, disminuyendo complicaciones asociadas a la vía aérea y mejorando el confort materno.<br><br>Perla ENARM: \"Se recomienda la administración de anestesia regional durante el procedimiento de la cesárea en pacientes con diagnóstico de placenta previa o inserción baja de placenta\".<br><br>Análisis de Distractores: La anestesia general balanceada se reserva como plan de contingencia si ocurre choque hipovolémico intraoperatorio, pero no es la elección electiva. La sedación profunda o el bloqueo pudendo son técnica ineficientes para el control del dolor de una laparotomía.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 23." 
            },
            {
                id: 24, 
                question: "En el contexto del tratamiento conservador de una paciente con acretismo placentario (dejando la placenta in situ), ¿qué intervención farmacológica está formalmente contraindicada como terapia adyuvante?", 
                options: ["Ácido tranexámico sistémico", "Metotrexato", "Corticoesteroides intramusculares", "Antibióticos profilácticos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, aunque históricamente se usó el metotrexato buscando inducir la necrosis del tejido placentario retenido, los estudios actuales no avalan su seguridad y añaden toxicidad severa sin mejorar la tasa de reabsorción.<br><br>Perla ENARM: \"No se recomienda el uso de metotrexato como terapia adyuvante del manejo conservador del acretismo placentario\".<br><br>Análisis de Distractores: El ácido tranexámico puede usarse si hay hemorragia, los corticoesteroides se usan preparto y los antibióticos están indicados en el manejo quirúrgico; ninguna de estas intervenciones está proscrita sistemáticamente.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 29." 
            },
            {
                id: 25, 
                question: "Durante la vigilancia prenatal de una paciente con placenta previa, se realiza medición seriada del cérvix uterino. ¿Qué longitud cervical máxima se asocia con un mayor riesgo pronóstico de hemorragia masiva y cesárea de urgencia?", 
                options: ["≤ 45 milímetros", "≤ 15 milímetros", "≤ 25 milímetros", "≤ 35 milímetros"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, las variaciones dinámicas del segmento predisponen al sangrado antes de la madurez fetal. El corte ultrasonográfico validado demuestra que cérvix largos previenen el desgarro, mientras que medidas ≤ 35 mm lo facilitan exponencialmente.<br><br>Perla ENARM: \"Una longitud cervical menor o igual a 35 mm se asoció a mayor riesgo de presentar una cesárea pretérmino por hemorragia masiva\".<br><br>Análisis de Distractores: Las medidas de ≤ 15 o ≤ 25 mm indican inminencia de parto prematuro, pero el punto de alerta específico tipificado en el algoritmo de esta patología es 35 mm, rebasando los ≤ 45 mm que representan un cérvix largo y seguro.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Complicaciones, Página 32." 
            },
            {
                id: 26, 
                question: "Paciente sometida a cesárea por placenta previa, presenta hemorragia obstétrica proveniente del lecho placentario en el segmento inferior que no responde a la administración de uterotónicos. ¿Cuál es la intervención de primera línea recomendada?", 
                options: ["Histerectomía total abdominal", "Embolización de arterias uterinas", "Colocación de balón intrauterino", "Ligadura de arterias hipogástricas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, el segmento uterino inferior carece del músculo cruzado para realizar la \"ligadura viva de Pinard\", por lo que al fallar la oxitocina, el taponamiento hidrostático intracavitario (como el balón de Bakri) suple la compresión mecánica perdida con altas tasas de éxito.<br><br>Perla ENARM: \"En caso de presencia de hemorragia obstétrica a pesar del uso de uterotónicos, se recomienda el uso de balones intrauterinos o técnicas quirúrgicas conservadoras para el control de la hemorragia\".<br><br>Análisis de Distractores: La histerectomía es el recurso definitivo extremo y debe reservarse solo cuando falla lo conservador. La embolización no está disponible rápido en todos los centros y la ligadura es el segundo escalón quirúrgico tras el balón en una paciente que se desea preservar útero.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 23." 
            },
            {
                id: 27, 
                question: "En una paciente con diagnóstico de placenta previa de localización anterior programada para cesárea, ¿qué consideración técnica sobre la histerotomía es imperativa para mejorar el pronóstico materno?", 
                options: ["Realizar incisión fúndica transversal", "Priorizar una incisión tipo Kerr", "Extracción manual rápida del feto", "Evitar la incisión transplacentaria"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, atravesar el tejido placentario incrementa significativamente la hemorragia materna y expone la red vascular fetal a trauma directo. Por ello, el mapeo debe ubicar el sitio libre.<br><br>Perla ENARM: \"La cesárea... debe ser realizada por personal médico capacitado y se deberá considerar la realización de una incisión media infraumbilical y evitar incidir la placenta durante el momento de la histerotomía y la extracción del recién nacido\".<br><br>Análisis de Distractores: La incisión de Kerr baja transversal incidiría justo sobre la inserción previa descrita. La incisión fúndica transversal causa desgarros a vasos mayores; en caso de necesitar entrar por el fondo, debe ser vertical o corporal. La extracción rápida manual aumenta el riesgo de atonía y ruptura.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 22." 
            },
            {
                id: 28, 
                question: "Durante el ultrasonido estructural, se detectan vasos fetales discurriendo por las membranas ovulares. ¿Cuál es la distancia máxima al orificio cervical interno para confirmar el diagnóstico ecográfico de vasa previa?", 
                options: ["< 15 milímetros", "< 10 milímetros", "< 20 milímetros", "< 30 milímetros"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, al estar en la vecindad de la tracción mecánica de las bolsas cuando el cérvix se modifique, el consenso ha delimitado un radio de seguridad espacial específico.<br><br>Perla ENARM: \"Documentos de consenso han propuesto que el diagnóstico de vasa previa se establezca cuando los vasos fetales se encuentren a menos de 2 centímetros de distancia del orificio cervical interno\".<br><br>Análisis de Distractores: Las distancias estrictas de < 10 mm o < 15 mm ya engloban patología segura, pero acotan erróneamente los casos marginales que siguen en peligro. Por encima de 20 mm (< 30 mm) ya no se clasifica como entidad de riesgo crítico intraparto inmediato.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Diagnóstico, Página 19." 
            },
            {
                id: 29, 
                question: "Paciente multigesta que cursa con su cuarto embarazo, teniendo el antecedente de tres cesáreas previas. ¿Cuál es la probabilidad porcentual de desarrollar acretismo placentario descrita estadísticamente en esta patología?", 
                options: ["11 %", "61 %", "3 %", "40 %"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la correlación entre cicatrices e invasión sigue una curva logarítmica, dando el salto epidemiológico más fuerte entre la segunda y la tercera histerotomía.<br><br>Perla ENARM: \"El riesgo de acretismo placentario es directamente proporcional al número de cesáreas previas: primera (3%), segunda (11%), tercera (40%), cuarta (61%) y quinta o más (67%)\".<br><br>Análisis de Distractores: El 3 % corresponde a un único procedimiento anterior. El 11 % a dos cesáreas, mientras que el 61 % se asocia a pacientes con cuatro eventos quirúrgicos previos.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Epidemiología, Página 8 y 40." 
            },
            {
                id: 30, 
                question: "¿Qué medida farmacológica de soporte basal debe optimizarse estrictamente durante la etapa prenatal en toda paciente diagnosticada con placenta previa asintomática?", 
                options: ["Infusión profiláctica de ácido tranexámico", "Administración de heparina de bajo peso", "Prevención y tratamiento de anemia", "Tratamiento con antibióticos macrólidos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, la optimización del volumen eritrocitario es una intervención anticipatoria obligada, ya que contar con reservas permite un margen de respuesta hemodinámica materna mucho más amplio ante la hemorragia transoperatoria.<br><br>Perla ENARM: \"Se recomienda prevenir y tratar la anemia durante la etapa prenatal en pacientes con diagnóstico de placenta previa o inserción baja de placenta\".<br><br>Análisis de Distractores: El ácido tranexámico se instaura como tratamiento reactivo durante sangrados obstétricos, no como profilaxis prenatal en asintomáticas. La heparina incrementaría catastróficamente el sangrado en caso de desprendimiento y los antibióticos solo se justifican si existe proceso infeccioso concomitante.", 
                source: "GPC-IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Tratamiento, Página 20." 
            },
            {
                id: 31, 
                question: "En la resolución quirúrgica definitiva de una paciente con diagnóstico establecido de placenta percreta, ¿cuál es el abordaje de resección uterina indicado para evitar tejido invasivo residual?", 
                options: ["Histerectomía subtotal abdominal", "Traquelectomía radical modificada", "Histerectomía total abdominal", "Resección cuneiforme miometrial"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Anomalías en Inserción Placentaria, al asentar típicamente la implantación sobre el segmento inferior con alta proximidad e invasión al estroma cervical, amputar solo el cuerpo uterino garantiza dejar lechos sangrantes fulminantes.<br><br>Perla ENARM: \"En pacientes con placenta acreta, increta o percreta se recomienda realizar histerectomía total abdominal dejando la placenta in situ en vez de realizar histerectomía subtotal\".<br><br>Análisis de Distractores: La histerectomía subtotal abdominal no debe realizarse por lo expuesto arriba. La resección cuneiforme se realiza en miomectomías de escasa dimensión o embarazos ectópicos, no en percretismo. La traquelectomía es un procedimiento oncológico.",

                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="FM67318GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoEMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoEMLastQId', currentQuestionId);
                else localStorage.removeItem('gyoEMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoEMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
