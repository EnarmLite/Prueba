    <script>

    {
        id: 1,
        question: "¿Cuál es el instrumento de elección recomendado para evaluar la pérdida de sensibilidad protectora en el pie diabético?",
        options: ["Diapasón de 128 Hertz", "Monofilamento de Semmes-Weinstein", "Pletismografía de volumen", "Martillo de reflejos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, la evaluación de la sensibilidad protectora (presión táctil) debe realizarse para detectar la neuropatía antes de la ulceración, siendo el monofilamento el estándar clínico inicial. \"Técnica de exploración de la sensibilidad con Monofilamento de Semmen Weinstein (sensibilidad y presión al tacto)\".<br><br>Perla ENARM: El monofilamento de Semmes-Weinstein de 10 g es la herramienta más eficaz y reproducible para el escrutinio del riesgo de pérdida de la sensibilidad protectora.<br><br>Análisis de Distractores: El diapasón evalúa la vibración (palestesia). El martillo de reflejos busca arreflexia aquílea. La pletismografía mide insuficiencia vascular, no neurológica.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Diagnóstico, Página 57."
    },
    {
        id: 2,
        question: "¿A partir de qué porcentaje de hemoglobina glucosilada se incrementa significativamente la frecuencia de amputaciones en pacientes con diabetes?",
        options: ["Mayor al 6.5 %", "Mayor al 7.0 %", "Mayor al 8.0 %", "Mayor al 9.5 %"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de pie diabético, el fracaso en las metas de control metabólico detona exponencialmente la falla sistémica y vascular, marcando un umbral crítico de riesgo. \"Se reportó que las amputaciones son más frecuentes en los pacientes con cifras de hemoglobina glucosilada mayores a 8 y glucosa en ayuno mayor de 126\".<br><br>Perla ENARM: Mantener la HbA1c por debajo del 8.0% es un factor protector crítico contra las complicaciones microvasculares avanzadas y amputaciones en las extremidades inferiores.<br><br>Análisis de Distractores: Aunque 6.5% y 7.0% son metas diagnósticas y de control en pacientes no complicados, el riesgo exponencial para amputación citado textualmente es superior al 8.0%.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Prevención, Página 25."
    },
    {
        id: 3,
        question: "¿Qué tipo de fibras nerviosas están afectadas cuando existe pérdida exclusiva de la sensibilidad térmica y dolorosa?",
        options: ["Fibras finas amielínicas", "Fibras gruesas mielinizadas", "Cordones posteriores espinales", "Astas motoras anteriores"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de pie diabético, la neuropatía diabética es selectiva; el daño a la vía amielínica anula la termoalgesia, favoreciendo quemaduras indoloras inadvertidas. \"La sensación térmica se pierde en conjunto con la dolorosa (fibra fina amielínica)\".<br><br>Perla ENARM: La disfunción de fibras finas amielínicas tipo C y mielínicas pequeñas A-delta es la responsable de la pérdida de la percepción térmica y dolorosa del pie diabético.<br><br>Análisis de Distractores: Las fibras gruesas y cordones posteriores manejan la vibración y el tacto-presión. Las astas anteriores son vías motoras que no evalúan temperatura ni dolor superficial.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Cuadros o Figuras, Página 58."
    },
    {
        id: 4,
        question: "Según la Clasificación de la Universidad de Texas, ¿qué hallazgo clínico define a una lesión categorizada en el estadio B?",
        options: ["Isquemia tisular", "Infección local", "Penetración a tendón", "Infección más isquemia"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, la escala de Texas estadifica pronóstico miendo etiología en sus letras, aislando la contaminación bacteriana pura en un estadio específico. \"Estadio B: Infección\".<br><br>Perla ENARM: En la Clasificación de Texas, los grados indican profundidad (0 a 3) y los estadios indican la presencia de comorbilidades (A: limpia, B: infectada, C: isquémica, D: infectada + isquémica).<br><br>Análisis de Distractores: La isquemia corresponde al Estadio C. La penetración a tendón es un grado de profundidad (Grado 2), no un estadio. La infección combinada con isquemia conforma el Estadio D.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Cuadros o Figuras, Página 46."
    },
    {
        id: 5,
        question: "¿Cuál es la prueba diagnóstica no invasiva recomendada universalmente para el tamizaje de enfermedad arterial periférica?",
        options: ["Índice tobillo brazo", "Ultrasonido Doppler venoso", "Angiotomografía de miembros", "Resonancia magnética nuclear"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de pie diabético, todo abordaje vascular inicia con este indicador por ser el estudio más accesible, costo-efectivo y sensible en la práctica clínica diaria. \"Se recomienda realizar el índice tobillo brazo a todo paciente con diabetes\".<br><br>Perla ENARM: El ITB es el método no invasivo de escrutinio vascular arterial por excelencia en la consulta externa de primer nivel.<br><br>Análisis de Distractores: El Doppler venoso no valora territorio arterial. La angiotomografía y la resonancia se reservan para estadios prequirúrgicos o casos donde la revascularización ya está indicada.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Diagnóstico, Página 29."
    },
    {
        id: 6,
        question: "En el manejo avanzado de heridas sin infección con exudado moderado a abundante, ¿cuál es el apósito tópico de primera elección?",
        options: ["Hidrogel amorfo", "Apósitos de alginato", "Apósitos con plata", "Gasa seca estéril"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, la absorción activa de exudado es prioritaria para prevenir la maceración de los bordes sanos, siendo los derivados de algas (polisacáridos) ideales por su alta capacidad hidrofílica. \"Úlcera superficial sin infección con exudado moderado a abundante: Apósitos de Alginatos, hidrofibra de hidrocoloide\".<br><br>Perla ENARM: Los alginatos reaccionan con las sales de la herida formando un gel hidrofílico soluble que mantiene la humedad óptima mientras absorbe el exceso de exudado.<br><br>Análisis de Distractores: El hidrogel aporta humedad a escaras secas. Los apósitos con plata se usan solo si hay colonización o infección local. La gasa seca reseca el lecho y detiene la epitelización.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Cuadros o Figuras, Página 58."
    },
    {
        id: 7,
        question: "¿Cuál es el punto de corte del índice tobillo brazo que confirma enfermedad arterial periférica y obliga a valoración por Cirugía Vascular?",
        options: ["≤ 0.5", "≤ 0.9", "≥ 1.3", "Entre 0.9 y 1.1"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, un cociente de presiones por debajo del umbral de 0.9 demuestra obstrucción del flujo sistólico, requiriendo abordaje especializado para prevenir la pérdida del miembro. \"Se recomienda valoración por cirugía vascular a todo paciente con diabetes con índice tobillo-brazo igual o menor a 0.9\".<br><br>Perla ENARM: Un valor de ITB ≤ 0.9 tiene una correlación diagnóstica altísima con arteriopatía periférica obstructiva sintomática o silente.<br><br>Análisis de Distractores: Valores menores a 0.5 marcan isquemia crítica, pero el envío a Vascular se establece desde el ≤0.9. Mayores a 1.3 indican calcificación incompresible. Entre 0.9 y 1.1 es hemodinámicamente normal.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Detección, Página 31."
    },
    {
        id: 8,
        question: "¿Cuál es el hallazgo clínico cardinal que caracteriza la fase aguda de la neuroartropatía de Charcot diferenciándola de una infección profunda?",
        options: ["Secreción purulenta activa", "Integridad cutánea preservada", "Necrosis tisular profunda", "Fístula con exposición ósea"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, el pie de Charcot se manifiesta con un evento inflamatorio masivo que emula celulitis severa (edema, eritema, calor), pero al no existir herida, se descarta una puerta de entrada bacteriana. \"El evento agudo simula infección; el paciente presenta eritema agudo, edema y aumento de temperatura local, pero con integridad cutánea (sin úlcera)\".<br><br>Perla ENARM: La sospecha de pie de Charcot agudo surge ante un pie rojo, caliente y edematizado, pero con piel totalmente intacta y sin úlceras.<br><br>Análisis de Distractores: La secreción purulenta, necrosis profunda o fístulas son datos clásicos de osteomielitis o infección de tejidos blandos, que obligatoriamente requieren pérdida de la continuidad epidérmica.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Manifestaciones Clínicas, Página 13."
    },
    {
        id: 9,
        question: "En la Clasificación de la Universidad de Texas, ¿como se categoriza a una herida que penetra exclusivamente hasta tendón o cápsula articular?",
        options: ["Grado 0", "Grado 1", "Grado 2", "Grado 3"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de pie diabético, la dimensión de profundidad en la escala de Texas estratifica el riesgo tisular mecánico, ubicando al tejido conectivo denso en el segundo peldaño. \"Grado 2: Herida penetrante a tendón o capsula\".<br><br>Perla ENARM: Los grados de Texas miden profundidad anatómica: Grado 1 superficial, Grado 2 tendón/cápsula, Grado 3 hueso/articulación profunda.<br><br>Análisis de Distractores: Grado 0 es pre-ulceroso. Grado 1 es superficial en epidermis/dermis. Grado 3 es penetrante hasta hueso o articulación franca.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Cuadros o Figuras, Página 46."
    },
    {
        id: 10,
        question: "¿Cuál es el fármaco antibiótico vía oral recomendado de primera elección para el manejo ambulatorio de infección leve a moderada comunitaria?",
        options: ["Amoxicilina con ácido clavulánico", "Imipenem con cilastatina", "Piperacilina con tazobactam", "Vancomicina intravenosa"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de pie diabético, las infecciones comunitarias que no amenazan la extremidad suelen ser monomicrobianas (cocos Gram positivos), controlables con betalactámicos e inhibidores de betalactamasas. \"Se recomienda el uso de Amoxicilina-ácido clavulánico tableta 500 mg/125 mg por vía oral como opción terapéutica\".<br><br>Perla ENARM: Amoxicilina con ácido clavulánico provee la cobertura ideal contra patógenos comunes de la piel productores de betalactamasas en infecciones de pie diabético no complicadas.<br><br>Análisis de Distractores: Imipenem, Piperacilina/Tazobactam y Vancomicina son tratamientos parenterales de muy amplio espectro de reserva hospitalaria para sepsis severa, osteomielitis o isquemia infectada.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Cuadro de Medicamentos, Página 63."
    },
    {
        id: 11,
        question: "Como política de prevención primaria, ¿cuál es el espacio libre recomendado en la parte interna entre la punta del calzado y los dedos del pie?",
        options: ["Ajuste exacto al milímetro", "1 a 2 cm más grande", "3 a 4 cm más grande", "5 cm de espacio libre"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, la fricción crónica del calzado es el principal factor local de ulceración; debe existir un margen de holgura que permita la expansión venosa vespertina sin causar inestabilidad. \"...la parte interna del calzado deberá ser 1 a 2cm más grande que el pie, con suela de calzado con tacón de al menos 3cm...\"<br><br>Perla ENARM: El calzado preventivo del diabético debe ser amplio, de piel suave y sin costuras internas, con una longitud interna excedente de 1 a 2 cm de los dedos.<br><br>Análisis de Distractores: Un ajuste exacto promueve necrosis isquémica e hiperqueratosis. Dejar 3 o más centímetros genera cizallamiento horizontal, inestabilidad en la marcha y riesgo de caídas o ampollas por fricción.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Cuadros o Figuras, Página 51."
    },
    {
        id: 12,
        question: "¿A qué servicio de alta especialidad debe derivarse oportunamente a un paciente con sospecha diagnóstica de neuroartropatía de Charcot?",
        options: ["Infectología", "Traumatología y Ortopedia", "Cirugía General", "Medicina Interna"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de pie diabético, el pie de Charcot implica colapso articular progresivo, microfracturas y luxaciones que exigen inmovilización rígida e intervención biomecánica para prevenir el pie en mecedora. \"Se sugiere que pacientes con neuroartropatía de Charcot sean valorados y tratados por el servicio de traumatología y ortopedia\".<br><br>Perla ENARM: La fase aguda de Charcot exige descarga mecánica total mediante el uso de yesos de contacto total colocados por el servicio de Ortopedia.<br><br>Análisis de Distractores: Infectología no aplica al tratarse de un proceso inflamatorio aséptico sin herida. Cirugía General evaluaría abscesos o necrosis profunda de partes blandas.",
        source: "GPC SS-005-20, Prevención, diagnóstico, tratamiento y rehabilitación del pie diabético, 2020, Sección Complicaciones y criterios de referencia, Página 28."

    {
        id: 13,
        question: "De acuerdo con los criterios pronósticos, ¿cuánto tiempo debe evolucionar una úlcera diabética sin cicatrización antes de exigir forzosamente envío a Cirugía General?",

                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('005Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('005LastQId', currentQuestionId);
                else localStorage.removeItem('005LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('005Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);

    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {

            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}

</script>
