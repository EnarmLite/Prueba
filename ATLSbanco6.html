                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
{
                id: 1, 
                question: "¿Qué antídoto tópico debe aplicarse de manera inmediata en urgencias tras una quemadura química producida específicamente por ácido fluorhídrico?", 
                options: ["Bicarbonato de sodio", "Tiosulfato de sodio", "Calcio tópico", "Azul de metileno"], 
                answer: 2, 
                justification: "Justificación: El ácido fluorhídrico penetra profundamente y secuestra el calcio tisular y sistémico, provocando hipocalcemia letal y necrosis licuefactiva progresiva. De acuerdo al ATLS 11.ª ed., tras el lavado hídrico inicial, en caso de quemaduras por ácido fluorhídrico, se debe aplicar calcio tópico de inmediato para neutralizar los iones de fluoruro y detener la penetración del ácido.<br><br>Perla ENARM: La quemadura por ácido fluorhídrico es la única quemadura química que exige antagonismo tópico inmediato con gel de gluconato de calcio para prevenir arritmias cardíacas por hipocalcemia.<br><br>Análisis de Distractores: Las opciones A y B no son antídotos para este ácido; el tiosulfato se usa en toxicidad sistémica por cianuro. La opción D es el antídoto para la metahemoglobinemia y carece de utilidad en lesiones cutáneas corrosivas.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 2, 
                question: "¿Cuál es el grado de flexión recomendado para las articulaciones metacarpofalángicas al inmovilizar la mano traumatizada en una posición anatómica funcional?", 
                options: ["0 a 10 grados", "20 a 30 grados", "60 a 90 grados", "100 a 110 grados"], 
                answer: 2, 
                justification: "Justificación: Las férulas incorrectas de la mano provocan contracturas irreparables de los ligamentos colaterales. De acuerdo al ATLS 11.ª ed., para entablillar temporalmente la mano en una posición funcional anatómica, la muñeca debe tener una extensión de 10 a 45 grados, las articulaciones metacarpofalángicas flexionadas a 60-90 grados y las articulaciones interfalángicas en extensión completa.<br><br>Perla ENARM: La \"posición de seguridad\" intrínseca para inmovilizar la mano exige invariablemente flexión metacarpofalángica de 60 a 90 grados y extensión total de las interfalángicas.<br><br>Análisis de Distractores: Las opciones A y B dejan los ligamentos colaterales relajados, lo que lleva a un acortamiento fibrótico y rigidez articular permanente (mano en garra). La opción D es una hiperflexión dolorosa e imposible de lograr en un paciente con edema traumático severo sin causar isquemia de los tendones extensores.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 3, 
                question: "¿Qué lesión subyacente de extrema gravedad ocurre cuando un traumatismo por cizallamiento separa la piel de la fascia profunda acumulando sangre y líquido linfático?", 
                options: ["Lesión de Morel-Lavallee", "Síndrome de dolor regional", "Necrosis muscular aséptica", "Fascitis necrosante aguda"], 
                answer: 0, 
                justification: "Justificación: Las fuerzas de fricción cerradas sobre grandes áreas anatómicas (como el muslo o la pelvis) alteran los plexos vasculares perforantes. De acuerdo al ATLS 11.ª ed., las lesiones por avulsión cerrada de tejidos blandos pueden separar la piel de la fascia subyacente y de su aporte vascular, provocando acumulación masiva de sangre y líquido, conocida clínicamente como lesión de Morel-Lavallee.<br><br>Perla ENARM: La presencia de fluctuación cutánea masiva y equimosis tras un aplastamiento tangencial (ej. llanta de vehículo) es patognomónica de una lesión de Morel-Lavallee y riesgo de necrosis del colgajo.<br><br>Análisis de Distractores: La opción B es una complicación neurológica crónica distal, no un espacio hemático agudo. La opción C es secundaria a isquemia focal pero no acumula líquido entre la dermis y la fascia. La opción D es un proceso infeccioso galopante, no el diagnóstico mecánico directo post-trauma cerrado.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 4, 
                question: "Debido a que la tráquea neonatal mide aproximadamente 5 cm, ¿hacia qué estructura anatómica suele desplazarse inadvertidamente el tubo endotraqueal?", 
                options: ["Esófago proximal", "Cuerdas vocales", "Bronquio principal derecho", "Bronquio principal izquierdo"], 
                answer: 2, 
                justification: "Justificación: La profundidad de inserción en pediatría es un margen milimétrico crítico. De acuerdo al ATLS 11.ª ed., la tráquea neonatal mide unos 5 cm de largo y crece a 12 cm en la edad adulta; esta tráquea anormalmente corta en niños predispone invariablemente a la intubación accidental del tronco principal derecho y al colapso asimétrico del pulmón izquierdo.<br><br>Perla ENARM: Todo deterioro respiratorio inmediato post-intubación en el lactante obliga a descartar la intubación monobronquial derecha mediante la evaluación clínica de ruidos respiratorios y radiografía, siguiendo la mnemotecnia DOPE (Desplazamiento).<br><br>Análisis de Distractores: Las opciones A y B implican fallas en la técnica de laringoscopia (extubación o intubación fallida), pero el desplazamiento distal por hiperinserción iatrogénica se dirige anatómicamente al bronquio derecho, más vertical y ancho. La opción D tiene un ángulo más agudo que dificulta el paso ciego del tubo.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 5, 
                question: "¿Qué manifestación clínica en un lactante que no se encuentra en coma indica clásicamente una lesión de masa intracraneal en expansión que demanda cirugía?", 
                options: ["Vómito de contenido gástrico", "Amnesia del evento traumático", "Taquicardia sinusal reactiva", "Abombamiento de las fontanelas"], 
                answer: 3, 
                justification: "Justificación: El cráneo no fusionado del lactante distorsiona los signos clásicos de hipertensión endocraneal del adulto (Tríada de Cushing). De acuerdo al ATLS 11.ª ed., un lactante que no está en coma pero que presenta fontanelas abultadas o diástasis de las suturas craneales ha sufrido una lesión grave con expansión de masa o edema, requiriendo consulta neuroquirúrgica inmediata.<br><br>Perla ENARM: Las fontanelas abiertas fungen como un mecanismo de amortiguación tensional; su abombamiento palpable es un signo inminente de herniación cerebral oculta en lactantes por lo demás asintomáticos.<br><br>Análisis de Distractores: Las opciones A y B son extremadamente comunes y esperadas después de una lesión cerebral pediátrica leve a moderada; no implican necesariamente un aumento de la presión intracraneal si son autolimitados. La opción C es una respuesta universal al llanto y dolor, no un signo neurológico focal de compresión.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 6, 
                question: "¿Qué hallazgo radiológico cerebral en un lactante sin fracturas craneales agudas incrementa drásticamente la sospecha diagnóstica de maltrato infantil?", 
                options: ["Hematomas epidurales agudos", "Hematomas subdurales múltiples", "Conmoción cerebral aislada", "Hemorragia subaracnoidea focal"], 
                answer: 1, 
                justification: "Justificación: El mecanismo de sacudida violenta (Síndrome del Niño Sacudido) genera fuerzas de aceleración y desaceleración rotacional severas. De acuerdo al ATLS 11.ª ed., el hallazgo tomográfico de hematomas subdurales múltiples (a menudo en diferentes etapas de evolución) y especialmente en ausencia de una fractura de cráneo reciente, sugiere de forma inequívoca trauma no accidental.<br><br>Perla ENARM: La tríada clásica del traumatismo craneal por maltrato en el lactante consta de hematoma subdural, hemorragias retinianas y encefalopatía, usualmente sin un impacto físico contuso evidente en el cuero cabelludo o cráneo.<br><br>Análisis de Distractores: La opción A es un sangrado arterial clásicamente vinculado al impacto directo de alta energía con fractura de cráneo. Las opciones C y D son posibles en traumas accidentales (caídas) y carecen de la altísima especificidad para abuso que poseen las hemorragias subdurales bilaterales repetitivas.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 7, 
                question: "¿Cuál es el manejo inicial indicado respecto a las dentaduras postizas de un paciente geriátrico traumatizado durante la ventilación con bolsa y máscara?", 
                options: ["Retirar inmediatamente para prevenir aspiración", "Mantener en su lugar para sellar la máscara", "Fijar con cinta adhesiva al paladar duro", "Extraer exclusivamente las piezas superiores"], 
                answer: 1, 
                justification: "Justificación: El edentulismo colapsa los tejidos blandos periorales impidiendo generar presión positiva de rescate. De acuerdo al ATLS 11.ª ed., aunque las dentaduras postizas flojas pueden obstruir la vía aérea, si no están obstruyendo activamente, deben mantenerse en su lugar estrictamente durante la ventilación con bolsa y máscara, ya que mejoran drásticamente el ajuste de la mascarilla facial.<br><br>Perla ENARM: Las dentaduras del anciano fungen como un andamio anatómico esencial para lograr un sellado neumático perfecto; solo se retiran al momento preciso de introducir la hoja del laringoscopio para la intubación.<br><br>Análisis de Distractores: Las opciones A y D privan al reanimador del soporte maxilar, resultando en fugas masivas de aire perimáscara y fracaso ventilatorio. La opción C es una pérdida de tiempo irreal en un escenario de asfixia y urgencia extrema.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 8, 
                question: "¿Qué agente intravenoso adyuvante está indicado de rescate, junto con la transfusión de plaquetas, para revertir la toxicidad del clopidogrel en un trauma geriátrico grave?", 
                options: ["Ácido tranexámico", "Sulfato de protamina", "Complejo protrombínico", "Desmopresina sistémica"], 
                answer: 3, 
                justification: "Justificación: Los agentes antiplaquetarios ocluyen irreversiblemente los receptores, perpetuando el sangrado cerebral o visceral en geriatría. De acuerdo al ATLS 11.ª ed., la estrategia de reversión de agentes como la aspirina o el clopidogrel consiste en la transfusión directa de plaquetas (1-2 unidades aféresis) combinada con el uso de Desmopresina (DDAVP a 0.3 mcg/kg IV) para forzar la liberación endógena de factor de von Willebrand y mejorar la adhesión plaquetaria.<br><br>Perla ENARM: Ante hemorragia intracraneal en el paciente geriátrico antiagregado con clopidogrel, la administración de desmopresina intravenosa restaura agudamente la disfunción endotelial residual.<br><br>Análisis de Distractores: La opción A previene la fibrinólisis pero no revierte el bloqueo del receptor plaquetario. La opción B antagoniza solo a la heparina. La opción C repone factores dependientes de vitamina K (II, VII, IX, X) bloqueados por la warfarina o los nuevos anticoagulantes orales (DOACs).", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 9, 
                question: "¿Qué fractura anatómica cervical es excepcionalmente frecuente en caídas del adulto mayor y se asocia con una pobre cicatrización crónica independientemente del tratamiento?", 
                options: ["Fractura de la apófisis odontoides", "Fractura del arco posterior del atlas", "Fractura en lágrima del axis", "Fractura de las facetas articulares"], 
                answer: 0, 
                justification: "Justificación: La biomecánica de la región cráneo-cervical y la osteoporosis focal hacen del eje C1-C2 un punto de quiebre. De acuerdo al ATLS 11.ª ed., los mecanismos de hiperextensión al golpear la parte delantera de la cabeza (ej. caída simple) producen característicamente fracturas de la apófisis odontoides (C2) en los adultos mayores; estas lesiones son excepcionalmente comunes y tienen una alta tasa de pseudoartrosis o mala cicatrización intrínseca.<br><br>Perla ENARM: Las caídas con golpe en la frente en pacientes ancianos exigen invariablemente descartar fractura de apófisis odontoides tipo II (base), notoria por requerir fijación quirúrgica dado su nulo potencial de consolidación conservadora.<br><br>Análisis de Distractores: La opción B (fractura de Jefferson) se da por compresión vertical axial pura. La opción C es una lesión de hiperflexión muy destructiva en adultos jóvenes. La opción D ocurre por mecanismos de rotación forzada y compresión cervical baja.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 10, 
                question: "Durante el embarazo, el útero en crecimiento se convierte en un órgano de localización puramente abdominal y vulnerable a trauma anterior directo a partir de las:", 
                options: ["8 semanas de gestación", "12 semanas de gestación", "20 semanas de gestación", "24 semanas de gestación"], 
                answer: 1, 
                justification: "Justificación: El anillo pélvico funge como un escudo óseo impenetrable para el feto en etapas tempranas. De acuerdo al ATLS 11.ª ed., el útero sigue siendo un órgano intrapélvico de paredes gruesas hasta la 12.ª semana de gestación, momento a partir del cual se agranda saliendo de la pelvis ósea para ascender y convertirse en un órgano puramente abdominal y totalmente expuesto a las transferencias de energía térmica, penetrante y contusa.<br><br>Perla ENARM: El hito anatómico para la vulnerabilidad fetal directa por encima de la sínfisis del pubis es invariablemente las 12 semanas de gestación.<br><br>Análisis de Distractores: La opción A es un útero incipiente resguardado bajo el promontorio sacro. Las opciones C y D marcan el útero que ya llegó al ombligo y avanza al epigastrio, mucho después del momento en que abandonó la protección pélvica primaria.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 11, 
                question: "¿Cuál es el límite superior esperado para el recuento normal de leucocitos en una paciente sana y asintomática cursando un embarazo en su tercer trimestre?", 
                options: ["8,000 por microlitro", "10,000 por microlitro", "18,000 por microlitro", "25,000 por microlitro"], 
                answer: 2, 
                justification: "Justificación: El embarazo normal confiere un estado inflamatorio basal mediado por demarginalización de neutrófilos. De acuerdo al ATLS 11.ª ed., el recuento normal de glóbulos blancos se eleva crónicamente durante el embarazo y oscila entre 12,000 y 18,000 células/μL en el tercer trimestre, con picos que superan los 25,000 exclusivamente durante el estrés extremo del trabajo de parto o trauma activo.<br><br>Perla ENARM: No se debe interpretar automáticamente una leucocitosis de 18,000 como signo de sepsis intraabdominal temprana en la gestante traumatizada; corresponde al límite superior de la variabilidad fisiológica del tercer trimestre.<br><br>Análisis de Distractores: Las opciones A y B son valores basales para un adulto no gestante sano. La opción D se asocia con estados reaccionales leucemoides, estrés agudo máximo (como el parto o trauma multiorgánico franco) o sepsis confirmada.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {

        function setupEventListeners() {

                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            });

                    mainContent.classList.toggle('lg:ml-80');

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');

            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";

        }

                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="Ex_ATLS2122.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS06Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS06LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS06LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS06Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
