    <script>

    {
        id: 1,
        question: "En la fisiopatología de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cuál es el antígeno de superficie con mayor capacidad inmunogénica?",
        options: ["Antígeno C", "Antígeno D", "Antígeno Kell", "Antígeno E"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, el sistema Rh consta de múltiples antígenos, pero la variante D tiene el mayor poder para estimular al sistema inmunológico materno y desencadenar la producción de anticuerpos IgG que cruzarán la placenta.<br><br>Perla ENARM: \"El Sistema Rh de la sangre consta de varios antígenos conocidos como D, C, c, E, e), el antígeno D es el más inmunogénico, por lo tanto, el que con más frecuencia se encuentra implicado en la isoinmunización a Rh.\"<br><br>Análisis de Distractores: Las opciones A y D pertenecen al sistema Rh pero causan cuadros de menor gravedad y frecuencia. La opción C genera isoinmunización severa pero suprime la eritropoyesis fetal, siendo atípica comparada con el antígeno D.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Introducción, Página 13."
    },
    {
        id: 2,
        question: "¿Cuál es el porcentaje estimado de presentación del factor Rh negativo en la población indígena mexicana con riesgo de Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido?",
        options: ["1 %", "3 %", "10 %", "15 %"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la prevalencia poblacional del antígeno D negativo dicta el riesgo epidemiológico nacional, siendo significativamente menor en grupos originarios en comparación con la población caucásica.<br><br>Perla ENARM: \"Se estima que aproximadamente 1% de la población indígena y cerca del 3% de la población mestiza tienen factor Rh D negativo.\"<br><br>Análisis de Distractores: La opción B corresponde a la prevalencia en la población mestiza mexicana. Las opciones C y D son cifras que se acercan a la prevalencia en poblaciones caucásicas (hasta 15%), no aplicables a la demografía indígena nacional.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Justificación, Página 15."
    },
    {
        id: 3,
        question: "Para el tamizaje poblacional de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿qué prueba debe solicitarse a toda gestante en su primera cita de control prenatal?",
        options: ["Prueba de Coombs directo", "Búsqueda de anticuerpos IgM", "Prueba de Coombs indirecto", "Cuantificación de hemoglobina"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, es imperativo detectar anticuerpos libres circulantes en el suero materno de forma universal para identificar a pacientes en riesgo o ya sensibilizadas previo a cualquier intervención.<br><br>Perla ENARM: \"Se recomienda que en la primera cita de control prenatal se les realice a todas las mujeres embarazadas (no solo a las mujeres que se conocen Rh negativo) determinación de: Grupo sanguíneo, Rh, Coombs indirecto (búsqueda de anticuerpos).\"<br><br>Análisis de Distractores: La opción A se realiza en el neonato al nacer para detectar anticuerpos unidos al eritrocito. La opción B evalúa anticuerpos agudos que no cruzan la placenta. La opción D valora anemia pero no diagnostica el riesgo aloinmune materno.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Prevención, Página 29."
    },
    {
        id: 4,
        question: "¿Cuál es la dosis indicada de inmunoglobulina humana anti-D para profilaxis primaria de la Enfermedad Hemolítica por Isoinmunización a Rh en una gestante Rh negativa sin inmunidad?",
        options: ["50 µg", "100 µg", "300 µg", "500 µg"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la supresión de la respuesta inmune materna temprana previene la formación de células de memoria y protege gestaciones subsecuentes.<br><br>Perla ENARM: \"Se debe administrar a la embarazada Rh negativa que no tiene inmunidad anti D la profilaxis con inmunoglobulina humana anti-D durante el primer trimestre de embarazo Dosis: 100 µg (500 UI), en el primer embarazo.\"<br><br>Análisis de Distractores: La opción C es el estándar internacional posparto o en tercer trimestre, pero la GPC mexicana puntualiza 100 µg para la profilaxis del primer trimestre. Las opciones A y D representan dosis infraterapéuticas o cálculos para tratamiento de rescate inmunológico endovenoso.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Prevención, Página 32."
    },
    {
        id: 5,
        question: "¿En qué etapa gestacional debe administrarse la profilaxis universal con inmunoglobulina anti-D para prevenir la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido?",
        options: ["Primer trimestre", "Segundo trimestre", "Tercer trimestre", "Posparto inmediato"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, el bloqueo temprano pre-exposición a hemorragias fetomaternas subclínicas evita el inicio de la cascada inmunológica mediada por IgG.<br><br>Perla ENARM: \"Se debe administrar a la embarazada Rh negativa que no tiene inmunidad anti D la profilaxis con inmunoglobulina humana anti-D durante el primer trimestre de embarazo.\"<br><br>Análisis de Distractores: Las opciones B, C y D corresponden a intervenciones suplementarias tras eventos obstétricos específicos o guías extranjeras, pero la indicación preventiva primaria marcada en México para el primer embarazo se instala en las primeras semanas de gestación.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Prevención, Página 32."
    },
    {
        id: 6,
        question: "Al nacimiento de un paciente con sospecha de Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cuál es el estudio confirmatorio de elección en sangre de cordón umbilical?",
        options: ["Prueba de Coombs directo", "Prueba de Coombs indirecto", "Frotis de sangre periférica", "Conteo absoluto de reticulocitos"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la confirmación etiológica requiere evidenciar los anticuerpos maternos ya adheridos estructuralmente a la membrana del eritrocito fetal.<br><br>Perla ENARM: \"Coombs directo positivo confirma el diagnóstico de anticuerpos inducidos por la anemia hemolítica, lo que sugiere la presencia de incompatibilidad ABO o Rh.\"<br><br>Análisis de Distractores: La opción B evalúa anticuerpos libres maternos. Las opciones C y D evalúan la severidad de la hemólisis y la regeneración medular compensatoria, pero no diferencian una causa aloinmune de un defecto intrínseco del eritrocito.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Auxiliares Diagnósticos, Página 39."
    },
    {
        id: 7,
        question: "En el paciente con Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cuál es la alteración metabólica secundaria esperada por la hiperplasia de islotes pancreáticos?",
        options: ["Hipocalcemia", "Hipomagnesemia", "Hipoglucemia", "Hiponatremia"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la respuesta adaptativa al estado inflamatorio y anémico intrauterino genera un hiperinsulinismo funcional que descontrola los niveles de glucosa tras la ligadura del cordón umbilical.<br><br>Perla ENARM: \"Hipoglucemia secundaría hiperinsulinismo e hipertrofia de los islotes pancreáticos.\"<br><br>Análisis de Distractores: La opción A es una complicación yatrogénica de la exanguinotransfusión, no de la historia natural de la enfermedad. Las opciones B y D ocurren en pacientes graves pero no derivan directamente de la hiperplasia pancreática fetal inducida por aloinmunización.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Signos y Síntomas, Página 37."
    },
    {
        id: 8,
        question: "En la forma clínica más severa de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿en cuáles compartimentos se acumula volumen excesivo de líquido?",
        options: ["Piel, pleura y pericardio", "Cerebro, pleura y peritoneo", "Piel, miocardio y pulmón", "Hígado, bazo y peritoneo"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la insuficiencia cardíaca terminal secundaria a anemia profunda desencadena fuga masiva de líquidos (hídrops fetalis), definiendo el estadio más catastrófico in útero.<br><br>Perla ENARM: \"La forma grave de la isoinmunización a factor Rh se conoce como hídrops fetalis... se puede encontrar como consecuencia de volumen excesivo de líquido en dos o más de los siguientes compartimentos fetales: Piel, Pleura, Pericardio, Peritoneo.\"<br><br>Análisis de Distractores: Las opciones B, C y D incluyen órganos macizos o compartimentos (cerebro, miocardio) donde el edema no forma parte de la definición estricta e internacional de los espacios serosos afectados en el hídrops.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Signos y Síntomas, Página 37."
    },
    {
        id: 9,
        question: "En un paciente con Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿qué hallazgo clínico dicta la realización inmediata de exanguinotransfusión?",
        options: ["Ictericia de rápida progresión", "Hepatoesplenomegalia masiva", "Hipoglucemia refractaria a manejo", "Presencia de opistótonos y rigidez"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la manifestación clínica de daño a ganglios basales (encefalopatía aguda) representa un riesgo absoluto de kernicterus inminente, sobrepasando cualquier protocolo laboratorial o de fototerapia.<br><br>Perla ENARM: \"Se recomienda realizar exanguinotransfusión ante la presencia de signos clínicos de encefalopatía aguda como opistotonos y rigidez, aunque el nivel de bilirrubina se encuentre en rangos de fototerapia.\"<br><br>Análisis de Distractores: Las opciones A y B son criterios de gravedad que requieren fototerapia múltiple y evaluación estricta en nomogramas. La opción C es una alteración metabólica que se maneja médicamente, no requiere remoción de volumen hemático extracorpóreo como rescate neurológico.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Exanguinotransfusión, Página 63."
    },
    {
        id: 10,
        question: "¿Cuál es el compuesto hidrosoluble final producto de la acción de la fototerapia en la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido?",
        options: ["Biliverdina", "Lumirubina", "Urobilinógeno", "Estercobilina"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, la fotoisomerización modifica la estructura tridimensional de la bilirrubina lipofílica hacia una molécula polar irreversible que evita el paso por el citocromo hepático.<br><br>Perla ENARM: \"La fototerapia convierte la bilirrubina en un compuesto soluble en agua llamado lumirubina, que se excreta en la orina o la bilis sin necesidad de conjugación en el hígado.\"<br><br>Análisis de Distractores: La opción A es el precursor inicial en el metabolismo del grupo hemo. Las opciones C y D son productos de la degradación entérica normal de la bilirrubina conjugada por la flora bacteriana.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Fototerapia, Página 43."
    },
    {
        id: 11,
        question: "¿Cuál es la longitud de onda lumínica con mayor eficacia demostrada para el tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido?",
        options: ["Luz blanca fría", "Luz fluorescente azul", "Luz ultravioleta directa", "Luz de tungsteno-halógeno"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Isoinmunización a Rh Neonatal, el pico de absorción espectral del pigmento ictérico de la bilirrubina coincide exactamente con el rango nanométrico (460-490 nm) que emiten estos bulbos, optimizando la degradación dérmica.<br><br>Perla ENARM: \"La luz fluorescente y en especial la luz azul es la más eficaz y debe ser utilizada cuando se requiere fototerapia intensiva, la luz ultravioleta no se usa.\"<br><br>Análisis de Distractores: Las opciones A y D son modalidades válidas pero de menor eficacia biofísica. La opción C está contraindicada por riesgo de daño celular térmico y cutáneo.",
        source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Fototerapia, Página 44."
    },
    {
        id: 12,
        question: "Previo a graficar el nomograma terapéutico para Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿qué ajuste se debe realizar al valor de bilirrubina total sérica?",
        options: ["Restar la bilirrubina directa", "Multiplicar por el hematocrito", "No restar la bilirrubina directa", "Promediar con la bilirrubina indirecta"],

                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('37318Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('37318LastQId', currentQuestionId);
                else localStorage.removeItem('37318LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('37318Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
