    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿A partir de qué edad de acuerdo a la GPC se recomienda iniciar la evaluación clínica y el escrutinio de los síntomas del tracto urinario inferior por sospecha de hiperplasia?",
        options: ["40 años", "45 años", "50 años", "60 años"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, esta sintomatología se relaciona directamente con el desarrollo celular progresivo a lo largo del tiempo, estableciendo un umbral joven para iniciar la evaluación e interrogatorio en medicina preventiva.<br><br>Perla ENARM: \"Están fuertemente relacionados con la edad y son una queja común en hombres mayores de 40 años\".<br><br>Análisis de Distractores: A los 50 años (C) la prevalencia histológica es del 50%, pero el protocolo normativo de escrutinio clínico en el primer contacto arranca una década antes. 45 y 60 años son umbrales para otras patologías, pero no marcan el inicio oficial para evaluar STUI.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Introducción, p. 7."
    },
    {
        id: 2,
        question: "¿Qué metabolito intracelular androgénico presenta concentraciones séricas elevadas que confieren un riesgo hasta 3 veces mayor para el crecimiento prostático subsecuente?",
        options: ["Estradiol libre", "Testosterona total", "Dihidrotestosterona", "Androstenediona"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, la patogénesis central depende de la hiperplasia celular mediada por la conversión enzimática (5-alfa reductasa) del andrógeno principal, siendo este producto final el verdadero motor del tejido glandular.<br><br>Perla ENARM: \"Los hombres con niveles más altos de DHT tenían casi tres veces más riesgo de crecimiento prostático subsecuente en comparación con los que tenían los niveles más bajos.\"<br><br>Análisis de Distractores: La testosterona total (B) es el precursor en sangre, pero no la molécula que posee la máxima afinidad hiperplásica nuclear en la próstata. El estradiol (A) interactúa en el tejido estromal pero no es el riesgo triplicado principal establecido. La androstenediona (D) carece de impacto estadístico mayor.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Prevención, p. 8."
    },
    {
        id: 3,
        question: "¿Cuál de las siguientes condiciones fisiopatológicas sistémicas se considera un factor de riesgo modificable directamente implicado en el desarrollo anatómico de la hiperplasia?",
        options: ["Enfermedad pulmonar crónica", "Síndrome metabólico", "Insuficiencia cardiaca", "Consumo de fitoterapia"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, existe una fuerte asociación derivada del estado proinflamatorio sistémico y la resistencia a la insulina con la alteración del ciclo apoptótico en la pelvis.<br><br>Perla ENARM: \"Se debe informar a los pacientes que la edad, la obesidad, niveles altos de colesterol y glucosa y el síndrome metabólico como tal constituyen factores de riesgo para el desarrollo de hiperplasia prostática benigna.\"<br><br>Análisis de Distractores: Las patologías torácicas (A y C) complican el manejo quirúrgico pero no causan proliferación de las glándulas uretrales. La fitoterapia (D) es un mercado de tratamientos naturistas no curativos, no un factor desencadenante etiológico.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Prevención, p. 14."
    },
    {
        id: 4,
        question: "¿Cuál de los siguientes eventos clínicos se clasifica de forma mecánica como un síntoma directo del síndrome de hiperactividad vesical o fase de almacenamiento?",
        options: ["Flujo urinario dividido", "Goteo terminal", "Esfuerzo miccional", "Urgencia miccional"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, agrupar la sintomatología es clave para prescribir; los síntomas de almacenamiento ocurren durante el llenado por la irritabilidad crónica de la pared muscular vesical.<br><br>Perla ENARM: \"Los síntomas de almacenamiento se pueden agrupar en el síndrome de hiperactividad vesical, que se caracteriza por urgencia miccional, incremento en la frecuencia, nocturia, e incontinencia urinaria.\"<br><br>Análisis de Distractores: El goteo terminal (B) ocurre una vez concluida la micción. El esfuerzo físico intenso (C) y la división del chorro (A) son hallazgos de vaciamiento puramente obstructivos contra la uretra colapsada.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Evaluación inicial, p. 15."
    },
    {
        id: 5,
        question: "Durante la inspección física pélvica de todo varón con obstrucción y chorro débil, ¿qué zona anatómica externa exige ser examinada forzosamente para plantear el diagnóstico diferencial?",
        options: ["Fosas inguinales", "Meato uretral", "Fosas renales", "Esfínter anal"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, no todo chorro delgado es por compresión prostática interna; las oclusiones distales y congénitas en la piel mimetizan la claudicación mecánica total y deben descartarse.<br><br>Perla ENARM: \"Se debe examinar el pene para descartar otras causas de STUI como fimosis, estenosis del meato u otras lesiones anormales.\"<br><br>Análisis de Distractores: El esfínter anal (D) evalúa integridad neurológica sacra, no oclusiones luminales morfológicas. Las fosas iliacas o inguinales (A) y las renales (C) abordan el estatus anatómico del dolor urológico alto, no la restricción del flujo de vaciado distal.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Evaluación inicial, p. 15."
    },
    {
        id: 6,
        question: "Al aplicar la Escala Internacional de Síntomas Prostáticos en el consultorio, ¿qué parámetro evaluado debe excluirse invariablemente de la sumatoria aritmética de la severidad clínica?",
        options: ["Nicturia invalidante", "Calidad de vida", "Chorro intermitente", "Frecuencia diurna"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, las 7 preguntas funcionales suman de 0 a 35 puntos para estratificar al enfermo, pero el impacto emocional se usa por separado para tomar la decisión compartida del tratamiento.<br><br>Perla ENARM: \"Su puntuación a la pregunta de 'calidad de vida' no debería añadirse a su puntuación total del IPSS.\"<br><br>Análisis de Distractores: La nicturia (A), intermitencia (C) y frecuencia (D) son tres de las siete dimensiones funcionales obligatorias a medir con puntos enteros, definiendo matemáticamente la obstrucción urinaria objetiva.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Cuadros o figuras, p. 37."
    },
    {
        id: 7,
        question: "De los marcadores positivos que pueden reportarse en la lectura de una tira reactiva de orina rutinaria, ¿cuál de ellos exige inexcusablemente una comprobación sistemática adicional mediante visión microscópica del sedimento?",
        options: ["Trazas de glucosa", "Presencia de proteínas", "Presencia de sangre", "Nitritos bacterianos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, ante el alto número de falsos positivos químicos generados en el consultorio, documentar eritrocitos reales obliga a la derivación profunda para descartar lesiones malignas ocultas.<br><br>Perla ENARM: \"La tira reactiva de orina es una prueba sencilla, muy sensible, pero poco específica. La presencia de sangre debe confirmarse posteriormente siempre, mediante un sistemático de orina con sedimento.\"<br><br>Análisis de Distractores: Las proteínas (B) orientan a nefronas dañadas y la glucosa (A) a un defecto insulínico metabólico. Los nitritos (D) justifican curar una infección agregada, pero la hemorragia urotelial falsa dicta una falsa ruta invasiva hacia urología y amerita descartarse microscópicamente bajo el microscopio.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Diagnóstico, p. 18."
    },
    {
        id: 8,
        question: "¿Qué antecedente recabado en el interrogatorio funcional vesical del adulto justifica clínicamente la toma de creatinina sérica urgente para evaluar el deterioro parenquimatoso por alta presión de la vía?",
        options: ["Eyaculación dolorosa", "Enuresis nocturna", "Disfunción eréctil", "Polaquiuria diurna"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, perder orina dormido sin notarlo revela una incontinencia pasiva por rebosamiento absoluto; la vejiga está al tope de su tensión, impactando a los túbulos renales silentes.<br><br>Perla ENARM: \"Se recomienda durante la evaluación inicial, realizar creatinina sérica en todo paciente con STUI sólo si se sospecha daño renal, (por ejemplo, si tiene vejiga palpable, enuresis nocturna, infecciones recurrentes...\"<br><br>Análisis de Distractores: El aumento de la frecuencia diurna (D) avisa hiperactividad, pero no fracaso total de la vejiga. La disfunción (C) y el dolor seminal (A) avisan inflamación pélvica, no daño de filtración en las pirámides renales.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Diagnóstico, p. 20."
    },
    {
        id: 9,
        question: "Al utilizar el Antígeno Prostático Específico exclusivamente como un predictor de tamaño glandular en un varón sintomático de 65 años, ¿qué cifra confiere una alta seguridad predictiva para documentar un volumen patológico ≥ 30 ml?",
        options: ["≥ 1.0 ng/ml", "≥ 1.5 ng/ml", "≥ 4.0 ng/ml", "≥ 10.0 ng/ml"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, existe un volumen base estandarizado de fuga proteínica epitelial medible en sangre periférica, logrando prescindir parcialmente de estudios ecográficos costosos en poblaciones saturadas para decidir iniciar reductasas hormonales.<br><br>Perla ENARM: \"Los valores de PSA establecidos para detectar volúmenes prostáticos mayores de 30 cc según la edad serían: [...] 1.5 ng/ml en hombres de 60-69 años.\"<br><br>Análisis de Distractores: Cifras de 1.0 ng/ml (A) no garantizan volumen tumoral benigno detectable. Valores de 4.0 ng/ml (C) y 10.0 ng/ml (D) están ligados a la probabilidad estadística oncológica y exigen biopsias, no al simple cálculo métrico o dimensional hiperplásico de consultorio familiar.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Diagnóstico, p. 22."
    },
    {
        id: 10,
        question: "En la ruta de tamizaje serológico prostático, ¿a partir de qué medición plasmática total del antígeno se vuelve imperativa la derivación expedita sin necesidad de calcular perfiles fraccionados libres?",
        options: ["Mayor a 2.5 ng/ml", "Mayor a 4.0 ng/ml", "Mayor a 7.5 ng/ml", "Mayor a 10.0 ng/ml"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, el salto probabilístico a la malignidad microscópica ante proteínas tumorales con esta sobreexpresión anula la pérdida de tiempo pidiendo marcadores grises refinados en el escrutinio general.<br><br>Perla ENARM: \"Se sugiere que ante niveles > 10 ng/ml se sugiere derivar a urología para valorar biopsia.\"<br><br>Análisis de Distractores: Valores entre 4.0 y 10.0 ng/ml (B y C) configuran la inestable y discutida \"zona gris\", la cual requiere explícitamente tomar niveles de fracción libre para evitar el castigo y morbilidad de las punciones en cánceres indolentes de bajo riesgo.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Diagnóstico, p. 22."
    },
    {
        id: 11,
        question: "En el abordaje imagenológico para documentar mecánicamente la falla de vaciamiento, ¿qué nivel exacto de orina residual posmiccional califica normativamente como criterio primario de derivación al urológo en el hospital?",
        options: ["Más de 50 ml", "Más de 100 ml", "Más de 150 ml", "Más de 200 ml"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de STUI por crecimiento prostático, retener este volumen post esfuerzo constata el agotamiento de la bomba contráctil vesical, obligando a reevaluar quirúrgicamente antes del deterioro permanente crónico del detrusor.<br><br>Perla ENARM: \"La derivación de un paciente [...] tiene como objetivo [...] ante la sospecha de las siguientes condiciones: [...] Residuo miccional > 150 ml.\"<br><br>Análisis de Distractores: Residuos de 50 ml (A) marcan valor predictivo de hiperplasia obstructiva pero tratable inicialmente. 100 ml (B) amerita solo cambio o adición farmacológica de prueba. 200 ml (D) es franco daño establecido, pero el corte instruido al familiarista es a partir de los 150 ml.",
        source: "IMSS-176-06, Diagnóstico y Tratamiento de los Síntomas del Tracto Urinario Inferior asociados a Crecimiento Prostático, 2018, Referencia a segundo nivel, p. 25."
    },
    {
        id: 12,
        question: "Si se cuenta con herramientas avanzadas para graficar el perfil urodinámico no invasivo, ¿qué medición estadística del flujo máximo es predictora altamente sensible (70 %) de resistencia a la salida vesical?",

                                <svg class="w-5 h-5 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="DM43518E.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGCMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGCMLastQId', currentQuestionId);
                else localStorage.removeItem('CGCMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGCMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
