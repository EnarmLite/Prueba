    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el signo clínico más frecuentemente reportado al momento del diagnóstico de la leucemia linfoblástica aguda en la población pediátrica?",
        options: ["Fiebre", "Hepatoesplenomegalia", "Adenomegalias generalizadas", "Dolor óseo severo"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, el cuadro clínico inicial se compone de múltiples síndromes por infiltración medular y extramedular. Por orden de frecuencia, la fiebre es el hallazgo dominante, presentándose en el 60% de los casos. La detección temprana exige alta sospecha ante síndromes febriles prolongados sin foco aparente.<br><br>Perla ENARM: \"Por orden de frecuencia, la presencia de signos y síntomas son: fiebre (60%), adenomegalias generalizadas (50%), hepato y esplenomegalia (40%)\".<br><br>Análisis de Distractores: Hepatoesplenomegalia: Es frecuente, pero ocupa el tercer lugar de presentación (40%). Adenomegalias generalizadas: Ocupan el segundo lugar en frecuencia al diagnóstico (50%). Dolor óseo severo: Forma parte del síndrome infiltrativo y obliga al diagnóstico diferencial, pero no supera la frecuencia del síndrome febril en esta patología.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Diagnóstico, Página 2."
    },
    {
        id: 2,
        question: "¿Qué porcentaje mínimo de blastos en el aspirado de médula ósea establece el diagnóstico morfológico confirmatorio de leucemia linfoblástica aguda?",
        options: ["≥ 10 %", "≥ 15 %", "≥ 20 %", "≥ 25 %"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, el estándar de oro diagnóstico es el análisis citomorfológico de la médula ósea. La sustitución del tejido hematopoyético normal por una proliferación linfoide descontrolada alcanza el umbral de confirmación diagnóstica con un recuento blástico del 20% o superior, tipificándolos idealmente según sus características FAB.<br><br>Perla ENARM: \"El diagnóstico de leucemia linfoblástica aguda requiere de un aspirado de médula ósea en el que al menos el 20% o más de blastos presentan morfología L1, L2\".<br><br>Análisis de Distractores: ≥ 10 %: Corresponde a un infiltrado anormal que amerita vigilancia o estudios extendidos, pero no es el umbral diagnóstico de leucemia aguda. ≥ 15 %: No es un valor de corte estandarizado por la Organización Mundial de la Salud ni por el PRONAM para el diagnóstico definitivo. ≥ 25 %: Históricamente o en otros consensos antiguos se utilizaba este punto de corte, pero actualmente el criterio absoluto se fija en 20%.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Diagnóstico, Página 4."
    },
    {
        id: 3,
        question: "Para catalogar a un paciente pediátrico en remisión completa, además de ausencia de enfermedad extramedular y blastos medulares < 5 %, ¿cuál debe ser el recuento absoluto de neutrófilos mínimo?",
        options: ["≥ 500 /µL", "≥ 1,000 /µL", "≥ 1,500 /µL", "≥ 2,000 /µL"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la respuesta favorable a la terapia de inducción implica la erradicación morfológica de la clona leucémica y la reconstitución hematopoyética funcional. Este estado se define estrictamente cumpliendo los tres pilares de la remisión.<br><br>Perla ENARM: \"Estado en el cual los blastos en médula ósea son < 5%, no hay evidencia de enfermedad extramedular, recuento absoluto de neutrófilos ≥ 1000 /µL y plaquetas ≥ 100,000 /µL sin necesidad de transfusiones\".<br><br>Análisis de Distractores: ≥ 500 /µL: Corresponde al límite de neutropenia grave, no al criterio de reconstitución hematológica para remisión. ≥ 1,500 /µL: Es un valor normal en la población sana, pero el umbral mínimo exigido tras quimioterapia para definir remisión es más bajo. ≥ 2,000 /µL: Excede los requisitos numéricos estrictos establecidos para considerar éxito en la fase de inducción.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Definiciones, Página 18."
    },
    {
        id: 4,
        question: "En el sistema de clasificación morfológica Franco-americana-británica (FAB), ¿cuál hallazgo celular es distintivo del subtipo L3?",
        options: ["Células pequeñas regulares", "Nucléolos poco visibles", "Escaso citoplasma basófilo", "Vacuolización citoplasmática prominente"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la evaluación inicial del aspirado de médula ósea incluye la tipificación FAB. El subtipo L3 exhibe características fenotípicas agresivas y comparte morfología con el linfoma de Burkitt, destacando una basofilia profunda y vacuolas lipídicas en su citoplasma.<br><br>Perla ENARM: \"L3: Vacuolización citoplasmática prominente, basofilia citoplasmática profunda. La morfología L3 es parte de las características del linfoma de Burkitt\".<br><br>Análisis de Distractores: Células pequeñas regulares: Son la característica principal de la morfología L1. Nucléolos poco visibles: Corresponde a los nucléolos discretos observados típicamente en la variedad L1. Escaso citoplasma basófilo: Es un dato de la leucemia L1; la variante L3 tiene citoplasma abundante y sumamente basófilo.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Diagnóstico, Página 4."
    },
    {
        id: 5,
        question: "¿Cuál es la alteración electrolítica que caracteriza al síndrome de lisis tumoral de urgencia en estos pacientes?",
        options: ["Hiperkalemia, hiperfosfatemia e hiperuricemia", "Hipokalemia, hipofosfatemia e hiperuricemia", "Hiperkalemia, hipofosfatemia e hipercalcemia", "Hipokalemia, hiperfosfatemia e hipercalcemia"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la destrucción masiva y abrupta de células neoplásicas (frecuente en hiperleucocitosis) libera grandes cantidades de potasio, fósforo y ácidos nucleicos intracelulares hacia el torrente sanguíneo, precipitando una nefropatía obstructiva por cristales y arritmias letales. La hipocalcemia secundaria completa el cuadro metabólico.<br><br>Perla ENARM: \"Es importante recordar que los pacientes con leucemia y sobre todo aquellos que tienen hiperleucocitosis pueden cursar con síndrome de lisis tumoral, el cual se caracteriza por hiperkalemia, hiperfosfatemia e hiperuricemia\".<br><br>Análisis de Distractores: Hipokalemia, hipofosfatemia e hiperuricemia: Es incorrecto; la destrucción celular masiva libera iones intracelulares, por lo que el potasio y el fósforo se elevan, no disminuyen. Hiperkalemia, hipofosfatemia e hipercalcemia: La lisis celular genera hiperfosfatemia, la cual se une al calcio sérico libre, provocando hipocalcemia reactiva, no hipercalcemia. Hipokalemia, hiperfosfatemia e hipercalcemia: Combina alteraciones opuestas al perfil clásico de la lisis celular maligna.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Diagnóstico, Página 2."
    },
    {
        id: 6,
        question: "Una vez iniciados los síntomas vagos e inespecíficos, ¿cuál es el tiempo estimado de progresión para el desarrollo de un cuadro clínico significativo?",
        options: ["1 a 2 semanas", "2 a 3 semanas", "3 a 4 semanas", "5 a 6 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la instauración de la enfermedad tiene una progresión temporal predecible impulsada por la alta tasa de replicación de los blastos medulares y el colapso consecuente de las líneas celulares hematopoyéticas normales.<br><br>Perla ENARM: \"El cuadro clínico más común, se caracteriza por una instauración sintomática progresiva, sin embargo, una vez iniciados los síntomas, la progresión suele ser rápida (en estimado tres a cuatro semanas para un cuadro clínico significativo)\".<br><br>Análisis de Distractores: 1 a 2 semanas: Período de incubación de infecciones virales agudas que sirven de diagnóstico diferencial, pero es un lapso corto para la ocupación medular total. 2 a 3 semanas: Aunque rápido, el tiempo de progresión documentado para la integración completa de los síndromes clínicos es ligeramente superior. 5 a 6 semanas: Sugiere un cuadro subagudo prolongado, el cual es infrecuente ante la agresividad biológica intrínseca de esta neoplasia no tratada.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Diagnóstico, Página 1."
    },
    {
        id: 7,
        question: "Durante el segundo año de vigilancia tras la finalización del tratamiento oncológico, ¿cada cuánto tiempo debe realizarse la consulta médica de seguimiento?",
        options: ["Cada mes", "Cada 3 meses", "Cada 4 meses", "Cada 2 meses"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, el seguimiento sistemático escala en temporalidad conforme el paciente afianza la remisión clínica. El programa de vigilancia está diseñado para detectar recaídas tardías y evaluar toxicidad residual.<br><br>Perla ENARM: \"Programa de vigilancia: 1° año: consulta mensual, 2° año: consulta cada 2 meses, 3° año: consulta cada 3 meses, 4° año: consulta cada 4 meses, 5° año: consulta cada 5 meses\".<br><br>Análisis de Distractores: Cada mes: Corresponde a la frecuencia de citas de vigilancia únicamente durante el primer año postratamiento. Cada 3 meses: Es la frecuencia establecida para el seguimiento correspondiente al tercer año. Cada 4 meses: Es la periodicidad indicada exclusivamente durante el cuarto año de vigilancia clínica.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Seguimiento, Página 20."
    },
    {
        id: 8,
        question: "¿En qué periodo de tiempo desde el diagnóstico se define convencionalmente a una recaída como \"temprana\"?",
        options: ["< 18 meses", "< 24 meses", "< 36 meses", "< 48 meses"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la temporalidad del fracaso terapéutico es un factor pronóstico fundamental. Las recaídas que ocurren de forma veloz implican resistencia primaria a los fármacos y requieren un abordaje de rescate de extrema intensidad.<br><br>Perla ENARM: \"Recaída: Puede clasificarse como temprana (< 18 meses desde el diagnóstico) o tardía (≥ 18 meses), siendo la temprana de peor pronóstico\".<br><br>Análisis de Distractores: < 24 meses: Aunque clínicamente desfavorable, el punto de corte taxonómico institucional exacto se fija antes del año y medio. < 36 meses: Es un intervalo de tiempo donde las recaídas ya se catalogan y se comportan clínicamente como tardías, con mejor tasa de respuesta a reinducción. < 48 meses: No es un parámetro utilizado para la estadificación temporal de recaída.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Definiciones, Página 19."
    },
    {
        id: 9,
        question: "Según la clasificación de involucramiento neurológico, ¿cuál es el criterio celular en líquido cefalorraquídeo para categorizar a un paciente como SNC 3?",
        options: ["Ausencia de blastos en líquido", "Blastos y < 5 leucocitos/µL", "Blastos y ≥ 5 leucocitos/µL", "Líquido francamente traumático"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la invasión meningea requiere ser estadificada mediante punción lumbar para decidir la intensidad del manejo intratecal. La carga inflamatoria y blástica simultánea marca el estrato de mayor gravedad en neuroeje.<br><br>Perla ENARM: \"SNC 3: Clasificación de involucramiento del Sistema Nervioso Central. Cuenta de leucocitos ≥ 5 /µL y citológico con blastos en líquido cefalorraquídeo\".<br><br>Análisis de Distractores: Ausencia de blastos en líquido: Esto define al estado SNC 1, que es un espacio subaracnoideo libre de enfermedad evidente. Blastos y < 5 leucocitos/µL: Esta disociación (blastos con baja celularidad global) clasifica al paciente en el estadio SNC 2. Líquido francamente traumático: Si presenta blastos se clasifica provisionalmente como SNC 2, pero no otorga automáticamente el grado 3 si no cumple el recuento leucocitario.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Glosario, Página 2."
    },
    {
        id: 10,
        question: "¿A qué dosis está indicada la radioterapia en aquellos pacientes que desarrollan infiltración testicular documentada o recaída en sistema nervioso central?",
        options: ["12 Gy", "24 Gy", "30 Gy", "36 Gy"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, el uso de irradiación focalizada ha disminuido drásticamente en los esquemas modernos por sus secuelas neurocognitivas y endocrinas, reservándose para nichos anatómicos que funcionan como \"santuarios\" frente a quimioterapia convencional o en refractariedad comprobada.<br><br>Perla ENARM: \"Refractariedad a SNC: fracaso para eliminar blastos en LCR [...] Tratamiento con 24 Gy de irradiación craneal. Aquellos pacientes con infiltración testicular (biopsia positiva) deberán administrarse a una dosis de 24 Gy\".<br><br>Análisis de Distractores: 12 Gy: Se utilizaba como dosis profiláctica cranial en protocolos antiguos, práctica hoy omitida en favor de optimizar la quimioterapia intratecal. 30 Gy: Excede el margen terapéutico para lechos linfoides y aumenta el daño estromal y germinal de forma inaceptable en pediatría. 36 Gy: Dosis utilizadas para radioterapia paliativa de tumores sólidos mayores, no justificada en enfermedad linfoblástica extramedular.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Asignación de esquema de tratamiento, Página 18."
    },
    {
        id: 11,
        question: "Durante el abordaje diagnóstico inicial del niño con sospecha clínica, ¿en qué porcentaje de los casos la biometría hemática reporta parámetros estrictamente normales?",
        options: ["1 % a 2 %", "10 % a 15 %", "20 % a 25 %", "3 % a 5 %"],
        answer: 3,

    {
        id: 28,
        question: "Al ingreso a urgencias pediátricas con sospecha clínica de síndrome infiltrativo, ¿qué prioridad de triage se le debe asignar estrictamente al paciente?",

        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, la detección inicial demanda atención expedita sin retrasos administrativos para solicitar laboratorios urgentes y buscar datos de lisis tumoral o falla medular aguda. Su clasificación garantiza atención en los primeros minutos de arribo.<br><br>Perla ENARM: \"Nota: En Triage clasificar la prioridad de atención a partir de 3 (amarillo)\".<br><br>Análisis de Distractores: 1 (Rojo): Reservado para inestabilidad hemodinámica inminente o paro cardiorrespiratorio, salvo que el niño llegue en choque séptico o hemorrágico. 2 (Naranja): Podría aplicar si se asocian urgencias hematooncológicas francas y agudas, pero el protocolo general exige categorizar desde el nivel intermedio de urgencia. 4 (Verde): Es una negligencia grave, ya que retrasa el abordaje de una enfermedad de rápida progresión letal.",
        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Algoritmo 1, Página 10."

    {

        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Asignación de esquema, Página 23."

    {
        id: 30,
        question: "Durante el tratamiento de mantenimiento ambulatorio, ¿cuál es la meta estricta de recuento leucocitario que debe mantenerse ajustando las dosis de quimioterapia?",

        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, el mantenimiento (usualmente con mercaptopurina y metotrexato) no utiliza dosis fijas, sino que se titula (modulación) buscando una mielosupresión leve pero controlada, la cual ha demostrado ser el biomarcador subrogado de exposición sistémica eficaz a los antimetabolitos.<br><br>Perla ENARM: \"Modulación de tratamiento durante el mantenimiento: Se debe buscar, mantener constantemente leucocitos entre 1,500 y 3,000/µL\".<br><br>Análisis de Distractores: 500 a 1,000 /µL: Induce neutropenia severa y eleva el riesgo de mortalidad por sepsis de forma inaceptable en atención ambulatoria. 1,000 a 1,500 /µL: Rozando el límite inferior de seguridad; a estos niveles se recomienda iniciar ajustes reductivos a razón 2.5:1. 3,000 a 5,000 /µL: Nivel demasiado alto que indica subdosificación o falta de apego al tratamiento oral, aumentando riesgo de recaída.",

    {
        id: 31,
        question: "En la estratificación inicial del protocolo \"Terapia Total XV\", ¿qué alteración genómica clasifica automáticamente al paciente en el estrato de alto riesgo?",

    {

    {

    {
        id: 34,
        question: "Al concluir la fase de inducción a la remisión, ¿qué porcentaje de blastos residuales en médula ósea define clínicamente una \"respuesta subóptima\"?",

        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, un aclaramiento medular deficiente en este rango exige reintensificación o terapias de rescate de segunda línea sin llegar a etiquetar una falla total de la médula por reemplazo absoluto.<br><br>Perla ENARM: \"Respuesta Subóptima: [...] persistencia de blastos en médula ósea entre 5-25% al final de la inducción, o enfermedad residual mínima elevada\".<br><br>Análisis de Distractores: 1 % a 3 %: Cifra de remisión morfológica exitosa, aunque obliga a estudiar enfermedad mínima residual (EMR) microscópica o molecular. > 25 %: Implica una franca refractariedad al esquema de inducción estándar, no una simple respuesta lenta o subóptima. < 5 %: Definición canónica morfológica de remisión completa lograda.",

        justification: "Justificación: De acuerdo al PRONAM de Leucemia Linfoblástica Aguda pediátrica, debido a la enorme disparidad en infraestructura de soporte entre hospitales, un margen de toxicidad letal tan grave exige adaptar (desescalar) el esquema quimioterapéutico, limitando dosis de antraciclinas o esteroides para no aniquilar al paciente.<br><br>Perla ENARM: \"En casos de centros con tasa global de defunción asociada a tratamiento superior a 50%, o tasa de defunción temprana... superior a 15%, se deberán considerar las modificaciones recomendadas al esquema\".<br><br>Análisis de Distractores: Superior al 15 %: Es el porcentaje límite para la mortalidad temprana (en los primeros 3 meses), pero no para el umbral de mortalidad global. Superior al 30 %: No corresponde a ninguno de los dos indicadores oficiales de auditoría terapéutica marcados por el programa. Superior al 40 %: Es inaceptable médicamente, pero el umbral textual del algoritmo nacional está fijado diez puntos más arriba para este escenario en particular.",

    {

    },
    {
        id: 37,
        question: "Como parte esencial del escrutinio molecular por NGS (Secuenciación de ARN), ¿la expresión de qué biomarcador es prioritario documentar para la estratificación?",

    {

        source: "Protocolo Nacional de Atención Médica Leucemia Linfoblástica Aguda en niñas, niños y adolescentes, 2024, Asignación de esquema, Página 23."

    {

            displayArea.innerHTML = `

                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />

                    <!-- HERO DYNAMIC -->

                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>

                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">

                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">

                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>

                                    <div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->

                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>

                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">

                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">

                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('LLAPROProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('LLAPROLastQId', currentQuestionId);
                else localStorage.removeItem('LLAPROLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('LLAPROProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
