                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
{
                id: 1, 
                question: "Un paciente masculino presenta una herida grave por aplastamiento en la pierna, francamente contaminada con tierra. Refiere desconocer su esquema de vacunación antitetánica en la infancia y adultez. ¿Qué profilaxis sistémica específica debe administrarse de inmediato en urgencias?", 
                options: ["Toxoide tetánico exclusivo", "Inmunoglobulina antitetánica exclusiva", "Vacuna celular DTaP sin anticuerpos", "Vacuna Tdap e inmunoglobulina antitetánica"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., todo paciente mayor de 11 años con una herida sucia o grave (no limpia ni menor) y un historial de vacunación desconocido o incompleto (menos de 3 dosis previas) requiere la administración combinada de la vacuna toxoide (preferentemente Tdap) y la inmunoglobulina antitetánica (TIG) para proveer inmunidad activa y pasiva simultánea.<br><br>Perla ENARM: Las heridas con alto grado de contaminación, desvitalización tisular o isquemia exigen inmunoglobulina antitetánica obligatoria si el paciente carece del esquema primario completo o se desconoce.<br><br>Análisis de Distractores: La opción A (solo toxoide) está indicada si la herida fuera limpia/menor o si el paciente tuviera el esquema completo pero con más de 5 años desde el último refuerzo. La opción B deja desprotegido al paciente a mediano plazo al no inducir memoria inmunológica. La opción C (DTaP) está reservada como el biológico de elección para la inmunización primaria exclusiva en niños menores de 7 años.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 2, 
                question: "¿Cuál es el volumen máximo de sangre que puede perderse de forma contenida hacia los tejidos tras sufrir una fractura cerrada aislada de la diáfisis femoral en un adulto promedio?", 
                options: ["500 ml", "1,000 ml", "2,000 ml", "3,000 ml"], 
                answer: 2, 
                justification: "Justificación: El músculo del muslo forma un compartimento altamente distensible. De acuerdo al ATLS 11.ª ed., una fractura cerrada de la diáfisis femoral en un adulto puede ocasionar la pérdida contenida de hasta 2 litros de sangre, lo que para una persona de 70 kg representa casi el 40% del volumen sanguíneo total, derivando invariablemente en choque hipovolémico si hay fracturas bilaterales.<br><br>Perla ENARM: Identificar una fractura de fémur cerrada justifica matemáticamente una clase de hemorragia grado III, demandando inmovilización inmediata para detener el efecto expansivo del hematoma.<br><br>Análisis de Distractores: Las opciones A y B subestiman enormemente la capacidad del tercer espacio en el muslo; corresponden más a fracturas de tibia o húmero. La opción D (3 litros) excedería la capacidad anatómica de un solo muslo y es típicamente el secuestro asociado a la cavidad pélvica catastrófica.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 3, 
                question: "¿Cuál de las siguientes lesiones asociadas representa una contraindicación para la colocación de una férula de tracción mecánica ante una fractura diafisaria de fémur?", 
                options: ["Luxación anterior de la articulación del hombro", "Laceración muscular profunda en el cuádriceps", "Fractura ipsilateral de la tibia o peroné", "Contusión pulmonar con hemotórax masivo"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las férulas de tracción aplican una fuerza distal en el tobillo que se apoya proximalmente contra el pliegue glúteo. Si existe una fractura por debajo del fémur (tibia ipsilateral, conformando la \"rodilla flotante\"), la tracción separará los fragmentos de la pierna causando disrupción de los vasos tibiales y daño de tejidos blandos.<br><br>Perla ENARM: Las férulas de tracción están absolutamente contraindicadas en sospecha de fractura de pelvis, fracturas del cuello femoral, fracturas peritrocantéreas o fracturas ipsilaterales de la pierna baja.<br><br>Análisis de Distractores: Las opciones A y D son distractores topográficos que no interfieren con la biomecánica de una férula de tracción en el miembro inferior. La opción B requiere control del sangrado y curación inicial, pero la tracción muscular estabiliza el lecho y detiene la hemorragia, por lo que no la contraindica.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 4, 
                question: "¿En qué intervalo de tiempo máximo desde la llegada a urgencias debe instaurarse el régimen antibiótico intravenoso para prevenir infecciones graves en una fractura expuesta?", 
                options: ["Dentro de los 30 minutos", "Dentro de los 60 minutos", "Dentro de los 120 minutos", "Dentro de los 180 minutos"], 
                answer: 1, 
                justification: "Justificación: La profilaxis infecciosa en traumatología ósea es tiempo-dependiente. De acuerdo al ATLS 11.ª ed., idealmente los antibióticos sistémicos en fracturas abiertas deben administrarse dentro de la primera hora posterior a la llegada al departamento de emergencias. Superar las 3 horas de retraso se asocia drásticamente con osteomielitis severa y sepsis.<br><br>Perla ENARM: El estándar de calidad para la infusión antibiótica en trauma óseo abierto es la primera hora (\"Hora Dorada\" de la profilaxis), habitualmente iniciando con Cefazolina.<br><br>Análisis de Distractores: La opción A es un límite excelso pero irreal de exigir como norma absoluta frente a la revisión xABCDE primaria de la que depende la vida. Las opciones C y D sobrepasan el margen óptimo y aumentan de forma directamente proporcional las tasas de infección de sitio quirúrgico y amputación tardía.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 5, 
                question: "¿Cuál es el límite máximo de presión de inflado del manguito al utilizar un tubo endotraqueal con balón en pacientes pediátricos para evitar la estenosis subglótica iatrogénica?", 
                options: ["10 a 15 cm H2O", "20 a 25 cm H2O", "30 a 35 cm H2O", "40 a 45 cm H2O"], 
                answer: 1, 
                justification: "Justificación: Las guías recientes recomiendan el uso de tubos endotraqueales con balón en niños para mejorar la capnografía y disminuir recambios. Sin embargo, de acuerdo al ATLS 11.ª ed., la presión del balón debe ser rigurosamente monitoreada y no debe exceder los 20 a 25 cm H2O para garantizar la perfusión capilar mucosa del anillo cricoideo infantil.<br><br>Perla ENARM: Las presiones de neumotaponamiento pediátrico que superan los 25 cm H2O causan isquemia de la mucosa traqueal, llevando a inflamación aguda y estenosis subglótica permanente.<br><br>Análisis de Distractores: La opción A genera fugas peritubo sustanciales afectando la oxigenación y exponiendo al niño a microaspiración de contenido gástrico. Las opciones C y D superan ampliamente la presión de perfusión capilar de la mucosa traqueal pediátrica garantizando necrosis.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 6, 
                question: "¿Qué proporción clínica de niños con diagnóstico de lesión traumática grave de la médula espinal presentará una serie radiográfica de columna cervical completamente normal?", 
                options: ["Un tercio de los pacientes", "La mitad de los pacientes", "Dos tercios de los pacientes", "Nueve de cada diez pacientes"], 
                answer: 2, 
                justification: "Justificación: La elasticidad de las cápsulas articulares y ligamentos infantiles permite la deformación extrema sin fractura. De acuerdo al ATLS 11.ª ed., hasta dos tercios de los niños que padecen una lesión aguda de la médula espinal tendrán radiografías simples normales (fenómeno conocido como SCIWORA: Spinal Cord Injury Without Radiographic Abnormality).<br><br>Perla ENARM: La ausencia de fractura en las radiografías cervicales pediátricas no excluye nunca la disrupción medular completa; la clínica neurológica manda sobre las imágenes óseas simples.<br><br>Análisis de Distractores: Las opciones A y B subestiman la inmensa incidencia de esta discrepancia radiológico-clínica característica de la pediatría. La opción D es excesivamente alta y no se correlaciona con la incidencia global descrita en la estadística traumatológica.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 7, 
                question: "¿Qué porcentaje de reducción de dosis se debe aplicar a los sedantes y barbitúricos de inducción durante la intubación de secuencia rápida en el adulto mayor traumatizado?", 
                options: ["10 al 15%", "20 al 40%", "50 al 60%", "70 al 80%"], 
                answer: 1, 
                justification: "Justificación: El envejecimiento disminuye la sensibilidad y tolerancia al estrés hemodinámico de los fármacos anestésicos. De acuerdo al ATLS 11.ª ed., se debe reducir empíricamente la dosis de inducción de barbitúricos, benzodiazepinas y propofol entre un 20% y un 40% en pacientes geriátricos para evitar la depresión cardiovascular abrupta y el paro cardíaco perintubación.<br><br>Perla ENARM: Las dosis completas de medicamentos de intubación en el anciano desencadenan choque iatrogénico grave; la regla en trauma geriátrico es reducir las dosis de sedación en 20% a 40%.<br><br>Análisis de Distractores: La opción A es un ajuste clínico insignificante que no prevendrá el colapso vascular. Las opciones C y D originarán infra-sedación, ocasionando que el paciente batalle contra el laringoscopio, despierte paralizado y sufra de picos hipertensivos y de presión intracraneal.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 8, 
                question: "¿Qué aditamento debe emplearse para la restricción espinal de un adulto mayor con espondilitis anquilosante y cifosis severa que llega en ambulancia tras una caída?", 
                options: ["Collarín cervical rígido de extracción forzada", "Sacos de arena o posicionadores laterales", "Tabla espinal larga sin cojines subyacentes", "Tracción axial mecánica con polea cervical"], 
                answer: 1, 
                justification: "Justificación: La columna anquilosada carece de la movilidad fisiológica necesaria para encajar en aditamentos comerciales estándar. De acuerdo al ATLS 11.ª ed., manipular con fuerza el cuello del adulto mayor para adaptarlo al contorno de un collar cervical o tabla plana puede provocar fracturas de los osteofitos y causar lesión medular. Deben usarse sacos de arena o rollos que soporten el occipucio en la postura de cifosis fija nativa del paciente.<br><br>Perla ENARM: Nunca aplane o fuerce hacia atrás la cabeza de un paciente con espondilitis anquilosante severa para adaptarla a una tabla rígida; bloquee y estabilice el cuello \"tal como está\".<br><br>Análisis de Distractores: La opción A fracturaría mecánicamente las vértebras anquilosadas en la línea media. La opción C incrementa la tensión en los músculos vertebrales y la médula estresada. La opción D está contraindicada porque el traumatismo agudo desestabilizó previamente una columna sumamente rígida.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 9, 
                question: "¿Qué valor umbral del déficit de base sugiere la presencia clínica de hipovolemia sistémica oculta y alta mortalidad en el paciente adulto mayor traumatizado?", 
                options: ["Menor a -2 mEq/L", "Menor a -4 mEq/L", "Menor a -6 mEq/L", "Menor a -10 mEq/L"], 
                answer: 2, 
                justification: "Justificación: El lactato sérico y la gasometría revelan perfusión inadecuada antes de que caiga la presión arterial. De acuerdo al ATLS 11.ª ed., en la población geriátrica traumatizada, los signos tempranos son sutiles, pero la alteración metabólica es profunda: un lactato mayor o igual a 2.4 mmol/L o un déficit de bases menor de -6 mEq/L indican choque oculto e isquemia tisular, exigiendo reanimación temprana.<br><br>Perla ENARM: Las variables de oxigenación a nivel celular en geriatría se evalúan de inmediato; el déficit de bases < -6 o lactato > 2.4 diagnostican el estado de choque críptico compensado.<br><br>Análisis de Distractores: Las opciones A y B pueden indicar un estrés metabólico fisiológico, pero no el punto de quiebre analítico del consenso de trauma geriátrico para iniciar protocolos masivos. La opción D marca un estado premórbido terminal, debió de actuarse mucho antes.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 10, 
                question: "Al examinar el abdomen de una gestante traumatizada de manera aguda, percibir el fondo uterino exactamente a la altura anatómica del margen costal indica un embarazo de:", 
                options: ["20 a 22 semanas", "26 a 28 semanas", "34 a 36 semanas", "38 a 40 semanas"], 
                answer: 2, 
                justification: "Justificación: El útero actúa como un órgano intraabdominal cambiante que altera los patrones lesionales. De acuerdo al ATLS 11.ª ed., la evaluación clínica del nivel uterino es rápida y precisa: el fondo llega a la cicatriz umbilical a las 20 semanas y se desplaza cefálicamente alcanzando el margen costal hacia las 34 a 36 semanas de gestación.<br><br>Perla ENARM: A las 34-36 semanas, el útero grávido en el margen costal genera desplazamiento masivo de asas intestinales y eleva el diafragma hasta 4 cm comprometiendo la dinámica ventilatoria.<br><br>Análisis de Distractores: La opción A ubica al útero recién cruzando o a nivel del ombligo. La opción B lo sitúa a mitad de camino entre el ombligo y el apéndice xifoides. La opción D presenta característicamente un descenso anatómico (el encajamiento fetal) que aleja al fondo uterino del margen costal inferior.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 11, 
                question: "¿En qué zona anatómica debe canalizarse de forma obligada la vía intravenosa de gran calibre durante la reanimación de la paciente gestante en el tercer trimestre?", 
                options: ["Extremidades inferiores o sistema safeno", "Extremidades superiores por encima del diafragma", "Venas centrales intraabdominales", "Vía intraósea en meseta tibial bilateral"], 
                answer: 1, 
                justification: "Justificación: El embarazo avanzado condiciona compresión física masiva del sistema venoso inferior. De acuerdo al ATLS 11.ª ed., el acceso vascular en trauma obstétrico siempre debe establecerse por encima del diafragma (venas de extremidades superiores o yugulares), ya que el útero grávido colapsa la vena cava inferior, bloqueando el retorno de los líquidos y medicamentos infundidos en la mitad inferior.<br><br>Perla ENARM: Infundir líquidos de reanimación o presores a través de vías en miembros inferiores o femorales en una gestante es fútil, ya que la barrera aortocava retiene la precarga en la pelvis.<br><br>Análisis de Distractores: La opción A asegura que ningún medicamento o célula infundida alcance el corazón derecho. La opción C es una vía de extrema dificultad quirúrgica en trauma que no existe como línea de acción percutánea rutinaria. La opción D, al estar debajo del diafragma, sufre la misma congestión e incompetencia de retorno de líquidos que los accesos venosos distales.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 12, 
                question: "¿A partir de qué límite de edad gestacional la presentación de crisis convulsivas de nueva aparición en el servicio de trauma debe ser tratada empíricamente como eclampsia?", 
                options: ["Mayor a 12 semanas", "Mayor a 16 semanas", "Mayor a 20 semanas", "Mayor a 24 semanas"], 
                answer: 2, 
                justification: "Justificación: La eclampsia es una complicación neurológica catastrófica inducida por toxemia que desencadena vasoconstricción y edema cerebral. De acuerdo al ATLS 11.ª ed., cualquier paciente embarazada por arriba de las 20 semanas de gestación que sufre convulsiones tónico-clónicas en urgencias sin antecedentes epilépticos, incluso tras un trauma menor, debe ser diagnosticada y manejada simultáneamente como eclampsia.<br><br>Perla ENARM: Las crisis que aparecen tras un golpe en la cabeza en una gestante de >20 semanas engañan al clínico; descartar siempre eclampsia (hipertensión, proteinuria) y administrar neuroprotección con sulfato de magnesio tempranamente.<br><br>Análisis de Distractores: Las opciones A y B son etapas fisiológicas donde el desarrollo trofoblástico anormal aún no desata el pico sistémico patognomónico de los trastornos hipertensivos dependientes de placenta a nivel sistémico. La opción D retrasa el diagnóstico dejando fuera semanas donde el espectro ya inicia.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 13, 
                question: "Al realizar una evaluación focalizada FAST fetal en urgencias, ¿A partir de qué longitud del fémur fetal se considera a este producto como viable para inducción de reanimación?", 
                options: ["Mayor a 2 cm", "Mayor a 3 cm", "Mayor a 4 cm", "Mayor a 5 cm"], 
                answer: 2, 
                justification: "Justificación: La ecografía de trauma gestacional ampliada valora actividad cardíaca, líquido y madurez aproximada. De acuerdo al ATLS 11.ª ed., un examen FAST fetal mide la longitud del fémur como un estimador rápido; un fémur mayor a 4 cm en el ultrasonido dictamina una edad gestacional compatible con la viabilidad extrauterina.<br><br>Perla ENARM: Un fémur fetal medido en el ultrasonido transabdominal mayor de 4 cm (aprox. 24 semanas de gestación) cambia el objetivo terapéutico e impone la consideración de cesárea de reanimación (perimortem).<br><br>Análisis de Distractores: Las opciones A y B corresponden a fetos prematuros pre-viables. La opción D corresponde a un feto grande (tercer trimestre avanzado), pero el límite obstétrico jurídico de viabilidad temprana por ultrasonido en la sala de choque arranca en los 4 cm de fémur.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 14, 
                question: "¿Qué condición fisiológica representa una contraindicación absoluta para iniciar el intento de conversión y aflojamiento de un torniquete neumático en el área de reanimación?", 
                options: ["Tiempo de colocación prehospitalaria mayor a 30 minutos", "Estado de choque hipovolémico y descompensación", "Fractura subyacente expuesta con exposición ósea visible", "Sospecha clínica de lesión aislada del nervio mediano"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el momento de conversión de un torniquete a un vendaje compresivo hemostático demanda estabilidad del sistema circulatorio. Un paciente que se encuentra en choque o está inestable bajo ninguna circunstancia es candidato a liberación del dispositivo, ya que la extremidad no tolera mayor pérdida hemática o secuestro vascular, precipitando el paro o la muerte.<br><br>Perla ENARM: La normotensión es un requisito preoperatorio no negociable para aflojar un torniquete; ante hipotensión, el dispositivo se deja bloqueado y se prioriza la reanimación de control de daños con sangre y cristaloides.<br><br>Análisis de Distractores: La opción A es un escenario precoz e idóneo para conversión y salvamento isquémico. Las opciones C y D representan traumas anatómicos focales en los que sí se recomienda la hemostasia manual compresiva (si la hemodinamia lo permite) para rescatar al tejido neurovascular adyacente sin colapso sistémico.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 14." 
            },
            {
                id: 15, 
                question: "¿Qué catástrofe tisular se busca evitar al realizar un examen, drenaje y descompresión agudos de un hematoma secundario a traumatismo contuso en el pabellón auricular?", 
                options: ["Perforación de la membrana timpánica subyacente", "Necrosis isquémica del cartílago", "Trombosis ascendente de la arteria temporal superficial", "Formación de una fístula perilinfática retroauricular"], 
                answer: 1, 
                justification: "Justificación: El cartílago auricular carece de irrigación intrínseca y su nutrición depende por completo de la difusión desde el pericondrio pegado a él. De acuerdo al ATLS 11.ª ed., los hematomas óticos separan esta capa nutritiva originando rápidamente la asfixia del tejido, por lo que deben drenarse a la brevedad para prevenir la necrosis y subsecuente deformidad permanente del cartílago.<br><br>Perla ENARM: El hematoma subpericóndrico traumatológico auricular no es conservador; amerita evacuación incisional en urgencias y vendaje con presión anatómica para rescatar la nutrición del cartílago.<br><br>Análisis de Distractores: La opción A asocia a cambios de presión del canal auditivo u onda expansiva, pero no a hematomas del pabellón externo. Las opciones C y D involucran espacios intracraneales o retroauriculares profundos no adyacentes a la isquemia cutáneo-cartilaginosa focal descrita.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 14." 
            },
            {
                id: 16, 
                question: "¿En qué rango de temperatura ambiental prolongada en condiciones húmedas, el paciente desarrollará fisiopatológicamente la lesión conocida como \"pie de trinchera\"?", 
                options: ["Menos 10 a 0 grados centígrados", "1.6 a 10 grados centígrados", "12 a 18 grados centígrados", "20 a 24 grados centígrados"], 
                answer: 1, 
                justification: "Justificación: El \"pie de inmersión\" es un prototipo de lesión por frío en ausencia de cristales de hielo intratisulares (sin congelación). De acuerdo al ATLS 11.ª ed., ocurre por daño endotelial microvascular que surge secundario a exposición a condiciones constantemente húmedas con temperaturas por encima del punto de congelación, específicamente en el rango de 1.6 °C a 10 °C.<br><br>Perla ENARM: Las extremidades maceradas y pálidas por frío continuo en humedad entre 1.6 y 10 grados requieren secado y recalentamiento basal sin fricción; esta lesión no congelante provoca ardor hiperémico por 48 horas.<br><br>Análisis de Distractores: La opción A provoca directamente cristalización intracelular, originando necrosis clásica de congelación profunda. Las opciones C y D originan confort o estrés térmico menor que no gatilla vasoespasmo endotelial disfuncional en tejidos sanos.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 17, 
                question: "¿A partir de qué temperatura central registrada se establece clínicamente el estado crítico por pérdida de regulación hipotalámica característico de un golpe de calor clásico?", 
                options: ["Mayor a 38.5 grados centígrados", "Mayor a 39.0 grados centígrados", "Mayor a 40.0 grados centígrados", "Mayor a 42.0 grados centígrados"], 
                answer: 2, 
                justification: "Justificación: La falla termo-regulatoria genera desnaturalización de membranas a nivel sistémico. De acuerdo al ATLS 11.ª ed., el diagnóstico definitivo de un golpe de calor (ya sea por esfuerzo en un joven o pasivo en un anciano) se funda en una tríada estricta: exposición hipertermica externa, alteración aguda de la función neurológica (confusión/delirio) y una temperatura corporal que excede clásicamente los 40 °C (y hasta 43.6 °C).<br><br>Perla ENARM: La alteración del estado mental acoplada a una lectura central de temperatura por arriba de 40 °C en épocas de calor obliga a la inmersión activa en agua helada prehospitalaria y hospitalaria sin retraso.<br><br>Análisis de Distractores: Las opciones A y B indican fiebre infecciosa o agotamiento por calor secundario a depleción hidrosalina, en los que la cognición se mantiene funcional y lúcida. La opción D es un valor extremadamente elevado y casi siempre mortal, pero el corte oficial de intervención en golpe de calor es 40 °C.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 18, 
                question: "¿Cuál es la ventana de tiempo límite permitida después de la lesión tisular por congelación (frostbite) en la que debe evaluarse el inicio de trombolisis intraarterial de rescate?", 
                options: ["Las primeras 6 horas", "Las primeras 12 horas", "Las primeras 24 horas", "Las primeras 48 horas"], 
                answer: 2, 
                justification: "Justificación: La lesión celular en la congelación resulta tanto de la cristalización como de la oclusión microvascular trombótica reactiva que impide el recalentamiento interno. De acuerdo al ATLS 11.ª ed., la viabilidad tisular mejora enormemente con la perfusión precoz, y se debe discutir con el centro de quemados la infusión de agentes trombolíticos sistémicos o dirigidos siempre y cuando el paciente se presente dentro de las primeras 24 horas tras el traumatismo térmico por frío intenso.<br><br>Perla ENARM: Las terapias fibrinolíticas salvan las extremidades en lesiones isquémicas profundas de congelación siempre que se apliquen en la ventana profiláctica aguda dentro de las 24 horas del congelamiento.<br><br>Análisis de Distractores: Las opciones A y B restringen excesivamente un margen terapéutico valioso validado por los protocolos de frío. La opción D supera el umbral del infarto y necrosis avascular donde el trombo está afianzado y su disolución provocará únicamente sangrado difuso catastrófico, no reperfusión útil.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 19, 
                question: "¿Qué daño agudo intraabdominal subyacente de extrema gravedad debe investigarse imperativamente al documentar el \"signo del cinturón de seguridad\" en la pared abdominal de un paciente pediátrico?", 
                options: ["Laceración masiva de la arteria esplénica", "Estallido completo de la vesícula biliar", "Ruptura del intestino o del mesenterio", "Transección anatómica del uréter pélvico"], 
                answer: 2, 
                justification: "Justificación: Las dimensiones anatómicas de la pelvis inmadura infantil impiden un anclaje rígido del cinturón de regazo, originando un ascenso súbito del mismo sobre el abdomen a la hora del impacto. De acuerdo al ATLS 11.ª ed., la presencia del signo del cinturón de seguridad en un niño triplica el riesgo de rotura intestinal en asa cerrada y lesiones isquémicas por avulsión de los vasos del mesenterio en la vecindad del ligamento de Treitz.<br><br>Perla ENARM: El eritema o marca del cinturón cruzando transversalmente el abdomen es altamente patognomónico de lesiones de flexión/distracción de la columna (Chance) sumadas a la rotura perforante de víscera hueca.<br><br>Análisis de Distractores: Las opciones A y B pueden afectarse en traumas contusos abiertos de alta velocidad o trauma lateral focal. La opción D requiere trauma pélvico destructivo con desplazamiento grosero óseo por disrupción sínfisis-ilíaca. La rotura del intestino delgado es la secuela mecánica directa y clásica en el niño tras el cizallamiento del cinturón.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 20, 
                question: "¿Qué alteración patológica específica representa la causa primaria de paro cardíaco o compromiso cardiopulmonar inminente letal secundaria a traumatismo de tórax cerrado infantil?", 
                options: ["Ruptura de contusión cardíaca oculta", "Neumotórax a tensión progresivo", "Lesión contusa del esófago intratorácico", "Disección catastrófica del cayado aórtico"], 
                answer: 1, 
                justification: "Justificación: La extrema laxitud y movilidad del compartimento torácico en la infancia tiene un riesgo inherente. De acuerdo al ATLS 11.ª ed., la hipermovilidad de las estructuras mediastínicas hace a los niños excepcionalmente susceptibles al neumotórax a tensión, considerándose la lesión torácica que pone en peligro inmediato la vida de forma más común en pediatría, produciendo una angulación del flujo de retorno venoso y choque obstructivo de rápido inicio.<br><br>Perla ENARM: El diagnóstico temprano y la descompresión urgente de un neumotórax a tensión son los pilares primordiales en el colapso respiratorio del trauma torácico pediátrico.<br><br>Análisis de Distractores: La opción A, C y D son lesiones torácicas severas bien descritas en traumas de altísima energía del adulto. En el paciente pediátrico son sumamente inusuales debido a la extrema distensibilidad del tórax que \"amortigua\" fracturas rígidas de protección en pro de una gran transferencia cinética parenquimatosa que resulta en contusiones pulmonares y neumotórax.",

        let userProgress = {};

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();

            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExaATLS04Progress');
                localStorage.removeItem('ExaATLS04LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->

                                <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="ATLSbanco5.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS04Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS04LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS04LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS04Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
