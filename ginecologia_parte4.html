        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento de la ruptura prematura de membranas pretérmino",
    gpcLink: "https://drive.google.com/file/d/1wbyOIDcfofkl0wjBaMrSSx0kKZt6lO_x/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El "corazón" de la RPMP en el ENARM es entender que el manejo es un <strong class="text-indigo-900 dark:text-indigo-200">equilibrio crítico riesgo-beneficio dictado casi exclusivamente por la edad gestacional</strong>: buscamos prolongar el embarazo para ganar madurez pulmonar y neuroprotección, pero solo hasta el punto exacto donde el riesgo de corioamnionitis supera los beneficios de la permanencia in utero (<u class="decoration-indigo-400 decoration-2 font-medium">el límite de las 34 semanas</u>).</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo no es lineal, es una serie de compuertas lógicas basadas en la viabilidad y la infección:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Diagnóstico:</strong> Ante la sospecha por historia clínica, la primera decisión es <strong class="text-rose-600 dark:text-rose-400 font-bold">evitar el tacto vaginal</strong>. La confirmación es visual (especuloscopía).
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El "Muro" de la Semana 34:</strong> 
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong class="font-bold text-emerald-600 dark:text-emerald-500">> 34 semanas:</strong> Riesgo de infección > beneficio. Interrupción del embarazo.</li>
                                <li><strong class="font-bold text-emerald-600 dark:text-emerald-500">24 a 34 semanas:</strong> Manejo Conservador (Expectante) para dar esteroides/antibióticos.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Signos de Alarma:</strong> Si aparece cualquier signo de corioamnionitis (fiebre, taquicardia fetal) o compromiso fetal, <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">se interrumpe el embarazo inmediatamente</strong> sin importar la edad gestacional.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>La Regla "Ojos sí, Manos no":</strong> El estándar de oro es la <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Historia Clínica + Especuloscopía Estéril</strong> (líquido en fondo de saco / Valsalva).</li>
                        <li><strong>Monitorización (Taquicardia Fetal):</strong> La cardiotocografía diaria es vital; la <u class="decoration-emerald-400 decoration-2 font-bold">taquicardia fetal</u> suele ser el primer signo de corioamnionitis, precediendo a la fiebre materna.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa de la Tocólisis:</strong> Intentar frenar el trabajo de parto en RPMP es una "red flag". <strong class="font-bold text-rose-600 dark:text-rose-400">NO se recomienda el uso de tocólisis</strong> (ni profiláctica ni terapéutica).</li>
                        <li><strong>Manejo Ambulatorio:</strong> La RPMP <u class="decoration-rose-500 decoration-2 font-bold">exige hospitalización</u>. No existe evidencia de seguridad para el manejo en domicilio.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SEDENA-446-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Corticoides Obligatorios:</strong> En RPMP entre <strong class="underline">24 y 34 semanas</strong>, administrar curso único de Betametasona o Dexametasona.</li>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM busca que integres que la Ruptura Uterina es una <strong class="text-indigo-900 dark:text-indigo-200">catástrofe obstétrica eminentemente clínica y quirúrgica</strong>, cuyo principal factor de riesgo es la presencia de una cicatriz uterina previa. La clave conceptual no es solo el dolor, sino la <u class="decoration-indigo-400 decoration-2 font-medium">pérdida de la estática fetal acompañada de un colapso hemodinámico materno-fetal</u>, lo que obliga a omitir estudios de imagen y proceder directamente a salvar el binomio.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo se estructura en una lógica de "semáforo" basada en el riesgo de la cicatriz:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Filtro Prenatal (Semáforo Rojo):</strong> Si la paciente tiene una cicatriz corporal clásica, en "T" invertida o antecedente de ruptura previa, la conducta es <strong class="text-rose-600 dark:text-rose-400 font-bold">Cesárea electiva programada</strong> (semana 37).
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Decisión del Parto (TOLAC):</strong> Si la cicatriz es transversa baja y no hay contraindicaciones, se permite la Prueba de Trabajo de Parto con <strong class="underline">monitoreo electrocardiográfico continuo fetal</strong>.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto de Quiebre (La Crisis):</strong> Si aparecen datos de alarma (sufrimiento fetal, dolor cicatrizal), <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">se inicia reanimación ABC y traslado inmediato a Laparotomía/Cesárea de emergencia</strong>. No se escala terapia tocolítica; no hay "puntos medios".
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Tacto Vaginal + RCTG:</strong> Un RCTG anormal (bradicardia severa) asociado a <strong class="text-emerald-700 dark:text-emerald-300 font-bold">pérdida de la estación de la presentación</strong> (el feto "sube" o se vuelve "flotante") es ruptura hasta demostrar lo contrario.</li>
                        <li><strong>Dolor Referido:</strong> El <u class="decoration-emerald-400 decoration-2 font-bold">dolor en el hombro (omalgia)</u> y pérdida de aliento indican irritación diafragmática por hemoperitoneo masivo.</li>
                        <li><strong>Contorno Abdominal:</strong> Palpación de partes fetales superficiales o deformidad grosera (signo de reloj de arena invertido).</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Ruptura vs DPPNI:</strong> En el DPPNI el útero está <strong class="font-bold text-rose-600 dark:text-rose-400">hipertónico (madera)</strong>. En la Ruptura existe un <strong class="font-bold text-rose-600 dark:text-rose-400">cese abrupto</strong> de la actividad uterina (el músculo roto no se contrae).</li>
                        <li><strong>Ruptura vs Placenta Previa:</strong> La Placenta Previa sangra rojo rutilante pero <u class="decoration-rose-500 decoration-2 font-bold">no duele y el útero está relajado</u>. La Ruptura es intensamente dolorosa.</li>
                        <li><strong>Trampa de la Hematuria:</strong> Puede presentarse si la ruptura se extiende a la vejiga; en un parto con cesárea previa, no es solo trauma de vía urinaria, es ruptura uterina.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-296-10)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Contraindicación Absoluta TOLAC:</strong> Periodo intergenésico corto <strong class="underline">< 18 meses</strong> entre la cesárea previa y el nuevo embarazo.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Manejo Definitivo:</strong> Ante sospecha confirmada o inestabilidad, la conducta es <strong class="underline">Cirugía de urgencia (Laparotomía/Cesárea)</strong>; no perder tiempo en imagen.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">El Signo Cardinal:</strong> El <strong class="underline">dolor abdominal severo que persiste entre contracciones</strong> es el pródromo clásico.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Criterio de Programación:</strong> Pacientes con factores de alto riesgo (ej. cesárea clásica) deben programarse para cesárea a partir de la <strong class="underline">semana 37</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Vigilancia Intraparto:</strong> Toda paciente con cesárea previa en trabajo de parto requiere <strong class="underline">monitoreo fetal continuo</strong>; la auscultación intermitente es insuficiente.</li>
                </ol>
            </div>
        </div>

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La Enfermedad Tromboembólica Venosa (ETEV) en obstetricia requiere una estratificación de riesgo dinámica; el ENARM evaluará tu capacidad para identificar el <strong class="text-indigo-900 dark:text-indigo-200">antecedente de TEV previo como el predictor más potente</strong> y tu habilidad para diagnosticar una Tromboembolia Pulmonar (TEP) <u class="decoration-indigo-400 decoration-2 font-medium">evitando la radiación torácica siempre que la clínica de las extremidades lo permita</u>.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo de la GPC tiene "bifurcaciones de seguridad" diseñadas para proteger al binomio:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Bifurcación Crítica (Sospecha de TEP):</strong> Ante disnea y dolor torácico, si la paciente <strong class="text-rose-600 dark:text-rose-400 font-bold">SÍ tiene síntomas en piernas</strong>, el paso obligatorio es el USG Doppler de miembros pélvicos. Confirmar TVP permite anticoagular plenamente y evitar la AngioTAC.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Sin Síntomas en Piernas:</strong> Solo entonces, si la Rx de tórax es normal, estás autorizado a solicitar <strong class="underline">Gamagrama V/Q o AngioTAC</strong> (dependiendo de la disponibilidad).
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Estabilidad vs. Colapso:</strong> Si está estable, usas <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">Heparina de Bajo Peso Molecular (HBPM)</strong>. Si está en choque (TEP Grave), cambias a <strong class="text-rose-600 dark:text-rose-400 font-bold">Heparina No Fraccionada (HNF) intravenosa</strong> por su reversibilidad.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Clínica de TVP:</strong> Edema asimétrico + Dolor = <strong class="text-emerald-700 dark:text-emerald-300 font-bold">USG Doppler de compresión</strong> (Gold Standard inicial).</li>
                        <li><strong>Clínica de TEP (Rx Anormal):</strong> Si la radiografía muestra otra patología, la correlación idónea es la <u class="decoration-emerald-400 decoration-2 font-bold">AngioTAC</u>.</li>
                        <li><strong>Clínica de TEP (Rx Normal):</strong> La GPC sugiere preferir el <strong class="font-bold">Gamagrama V/Q</strong> por su alto Valor Predictivo Negativo y menor radiación a la mama.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa de la Warfarina:</strong> Está <strong class="font-bold text-rose-600 dark:text-rose-400">contraindicada en el embarazo</strong> por teratogenicidad, excepto en pacientes con válvulas cardíacas mecánicas.</li>
                        <li><strong>Confusión de Dosis:</strong> Profilaxis = dosis fija (ej. Enoxaparina 40 mg/día). Tratamiento = <u class="decoration-rose-500 decoration-2 font-bold">dosis ajustada por peso exacto (1 mg/kg c/12h)</u>.</li>
                        <li><strong>Trombofilias:</strong> El Síndrome Antifosfolípidos y la deficiencia de Antitrombina son de muy alto riesgo y requieren manejo especializado.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-544-20)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <!-- El Concepto Fundamental -->
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM no evalúa solo tu capacidad para detectar hipertensión, sino tu habilidad para reconocer la preeclampsia como una <strong class="text-indigo-900 dark:text-indigo-200">falla endotelial sistémica y progresiva</strong>. El núcleo del tema es entender que la única cura definitiva es la interrupción del embarazo, y tu trabajo clínico consiste en equilibrar la madurez fetal (manejo expectante &lt; 34 semanas) contra el riesgo inminente de mortalidad materna (Eclampsia/HELLP), donde la <u class="decoration-indigo-400 decoration-2 font-medium">neuroprotección con Sulfato de Magnesio es la piedra angular innegociable</u>.</p>
            </div>

            <!-- Lógica del Algoritmo -->
            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura el manejo en tres momentos críticos donde la conducta cambia drásticamente:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Triaje de Prevención (Semana &lt; 16):</strong> El algoritmo inicia mucho antes del cuadro agudo. Si identificas factores de alto riesgo (historia previa de preeclampsia, enfermedad renal, autoinmune, diabetes o HAS crónica), el <strong class="underline">ácido acetilsalicílico a dosis baja</strong> es la intervención que cambia el pronóstico, debiendo iniciarse antes de la semana 16.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto de Quiebre (Severidad):</strong> Una vez diagnosticada la preeclampsia (TA &gt; 140/90 + Proteinuria), el algoritmo se bifurca:
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Sin datos de severidad:</span> Se permite manejo expectante (ambulatorio o piso), monitorizando laboratorios 2 veces por semana.</li>
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Con datos de severidad:</span> Conducta agresiva. Hospitalización inmediata en UCI, reposo absoluto e inicio de profilaxis para convulsiones.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Decisión de Interrupción:</strong> En embarazos pretérmino (&lt; 34 semanas), se prefiere el manejo expectante para ganar madurez pulmonar, <u class="decoration-rose-500 decoration-2 font-bold text-rose-900 dark:text-rose-200">a menos que existan criterios de inestabilidad materna (Eclampsia, HELLP, DPPNI) o sufrimiento fetal</u>, donde la interrupción es inmediata.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- High-Yield -->
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Vasoespasmo:</strong> La tríada de <strong class="text-emerald-700 dark:text-emerald-300 font-bold">cefalea intensa, alteraciones visuales y epigastralgia</strong> precede a las convulsiones eclámpticas por una semana.</li>
                        <li><strong>Epigastralgia (Dolor en barra):</strong> No es gastritis; correlaciona clínicamente con distensión de cápsula de Glisson y predice elevación de enzimas o ruptura hepática.</li>
                        <li><strong>Proteinuria:</strong> Tira reactiva es tamizaje. Confirmar con recolección 24h. Una proteinuria <strong class="bg-emerald-100 dark:bg-emerald-800/50 px-1 rounded">&gt; 300 mg/24h</strong> indica enfermedad avanzada.</li>
                    </ul>
                </div>

                <!-- Red Flags -->
                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Hipertensión Ficticia (Técnica):</strong> Reposo de 5 min, sentada, sin cruzar piernas, brazalete 80% del brazo. Si llegó corriendo, sospecha falso positivo.</li>
                        <li><strong>Líquidos IV (Sobrecarga):</strong> Exceso de volumen causa EAP. Restricción clara: <strong class="font-bold text-rose-600 dark:text-rose-400">no más de 100 ml/hora</strong>.</li>
                        <li><strong>Fármacos Prohibidos:</strong> 
                            <br>- Eclampsia: <u class="decoration-rose-500 decoration-2">NUNCA uses diazepam/fenitoína</u> como 1ra línea.
                            <br>- Puerperio: Si persiste hipertensa, <strong class="bg-rose-200 dark:bg-rose-800/50 px-1 rounded">evita los AINEs</strong> (exacerban lesión renal).
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Perlas de Oro -->
            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Gold Standard Anticonvulsivo:</strong> El Sulfato de Magnesio IV es el único fármaco de elección para prevenir y tratar la eclampsia.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Meta de Presión Arterial:</strong> NO busques normotensión. El objetivo es mantener la <strong class="underline">Sistólica 140-155 y Diastólica 90-105 mmHg</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Toxicidad por Magnesio:</strong> Vigila tres cosas: Reflejos rotulianos (presentes), FR (&gt; 16 rpm) y Diuresis (&gt; 100 ml/h).</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Profilaxis Real:</strong> Solo el Ácido Acetilsalicílico (dosis baja) y el Calcio están validados. Vitamina C, E y restricción de sal son distractores.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Criterio Oculto:</strong> En preeclampsia no severa no se recomienda repetir la cuantificación de proteinuria constantemente; guíate por la clínica.</li>
                </ol>
            </div>
        </div>

                <p>La emergencia obstétrica, particularmente en los trastornos hipertensivos, no se define únicamente por una cifra tensional, sino por la <strong class="text-indigo-900 dark:text-indigo-200">inestabilidad hemodinámica (Índice de Choque &gt; 0.8) y la presencia de daño a órgano blanco</strong>. La supervivencia depende de la capacidad del clínico (y de enfermería en el primer contacto) para estratificar el riesgo mediante el Triage y <u class="decoration-indigo-400 decoration-2 font-medium">activar inmediatamente el Código Mater</u> ante signos de compromiso neurológico o cardiovascular.</p>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

            const moduleData = courseModules.find(m => m.id === moduleId);

            moduleData.quiz.forEach((q, index) => {

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>
                        <p class="text-xs text-slate-500 mt-1 italic">Fuente: ${q.source}</p>
                    </div>
                </div>`;
            });
            quizHtml += '</div>';

            let nextBtn = "";

                nextBtn = `<button class="w-full sm:w-auto bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-emerald-700 transition-all" onclick="showFinalSummary()">Ver Resultados</button>`;

                            Ver Resumen del Módulo
                        </button>
                        
                        <!-- BOTÓN GPC AÑADIDO (Sólo aparece al completar) -->

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>
                            <span>${score}/${total}</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-pink-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });
            moduleScoresHtml += '</div>';

                                <svg class="h-16 w-16 text-emerald-600 dark:text-emerald-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                            </div>
                            <h2 class="text-3xl font-bold text-slate-800 dark:text-slate-100">¡Curso Completado!</h2>
                        </div>

                        <div class="grid md:grid-cols-2 gap-8">

                                    Reiniciar Curso Completo

                    </div>
                </div>`;
        }

        function renderModuleList() {
            const list = document.getElementById('module-list');
            if(!list) return;
            list.innerHTML = '';

            // MODIFICACIÓN: Iterar sobre la lista COMPLETA de títulos cortos
            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                const li = document.createElement('li');
                
                if (module) {
                    // MÓDULO DISPONIBLE
                    let classes = 'p-3 rounded-lg cursor-pointer transition-all duration-200 flex items-center justify-between gap-3 ';
                    if (isActive) classes += 'bg-pink-600 font-bold text-white shadow-lg';
                    else if (isCompleted) classes += 'bg-emerald-800/80 text-emerald-300 hover:bg-emerald-700/80';
                    else classes += 'bg-slate-700 hover:bg-slate-600 hover:pl-4';

                    li.className = classes;
                    
                    let iconSvg = isCompleted 
                        ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />'
                        : '<path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />';

                    let innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-70" viewBox="0 0 20 20" fill="currentColor">
                                ${iconSvg}
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;

                    if (isCompleted) {
                        innerHTML += `
                            <button onclick="event.stopPropagation(); showModuleSummary(${moduleId})" class="p-1 hover:bg-white/20 rounded-full transition-colors" title="Ver Resumen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        `;
                    }

                    li.innerHTML = innerHTML;
                    li.onclick = () => displayModule(moduleId);
                } else {
                    // MÓDULO NO DISPONIBLE AÚN
                    li.className = 'p-3 rounded-lg flex items-center gap-3 bg-slate-800 text-slate-500 cursor-not-allowed opacity-50';
                    li.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;
                }
                list.appendChild(li);
            });
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatría3CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatría3CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatría3CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-pink-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-pink-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
