    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el soporte de oxigenación inicial obligatorio durante las primeras 24 horas para un paciente adulto con quemaduras graves?",
        options: ["Cánula nasal a 4 litros.", "Intubación orotraqueal profiláctica.", "Oxígeno al 100% por mascarilla.", "Ventilación mecánica no invasiva."],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, todo paciente con quemaduras severas sufre alteraciones en el intercambio gaseoso o riesgo de hipoxia tisular. La oxigenoterapia de alto flujo es prioritaria antes de avanzar en el algoritmo de reanimación.<br><br>Perla ENARM: \"Todos los pacientes con quemaduras graves deben recibir oxígeno al 100% a traves de una mascarilla durante las primeras 24 horas.\"<br><br>Análisis de Distractores: La cánula nasal es insuficiente para revertir la hipoxia tisular por monóxido de carbono. La intubación orotraqueal se reserva exclusivamente para pacientes con compromiso evidente de la vía aérea, hipoxia severa documentada o quemaduras directas en cara y cuello, no de forma profiláctica universal. La ventilación no invasiva no es el manejo estándar inicial.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Vía Aérea y Ventilación, p. 12."
    },
    {
        id: 2,
        question: "¿Qué prueba de laboratorio es indispensable solicitar de inmediato ante la sospecha de lesión de la vía aérea por inhalación de humo en un espacio cerrado?",
        options: ["Gasometría con carboxihemoglobina.", "Niveles de procalcitonina sérica.", "Dímero D y fibrinógeno.", "Biomarcadores de daño miocárdico."],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, la intoxicación por monóxido de carbono es una causa principal de mortalidad temprana. La oximetría de pulso estándar no distingue la oxihemoglobina de la carboxihemoglobina, requiriendo el análisis directo de gases sanguíneos.<br><br>Perla ENARM: \"Realizar medición de gases sanguíneos incluyendo nivel de carboxihemoglobina.\"<br><br>Análisis de Distractores: La procalcitonina es útil en la monitorización de sepsis tardía, no en el diagnóstico agudo respiratorio. El Dímero D y los biomarcadores miocárdicos no evalúan el estado de oxigenación tisular derivado de la inhalación de productos de combustión.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Vía Aérea y Ventilación, p. 12."
    },
    {
        id: 3,
        question: "¿Cuál es la solución de elección recomendada para realizar la reposición inicial del déficit de volumen en el paciente adulto gran quemado?",
        options: ["Hidroxietilalmidón al 6%.", "Solución Ringer Lactato.", "Gelatina modificada intravenosa.", "Solución salina hipertónica."],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, la reanimación hídrica en las primeras horas busca restaurar la volemia minimizando alteraciones electrolíticas o toxicidad orgánica. Los cristaloides isotónicos balanceados han demostrado superioridad frente a los coloides artificiales.<br><br>Perla ENARM: \"En pacientes adultos gran quemados, se recomienda realizar la reposición de volumen con cristaloides (solución Ringer Lactato) en lugar de usar coloides.\"<br><br>Análisis de Distractores: El hidroxietilalmidón y las gelatinas son coloides artificiales y su uso inicial está contraindicado por incrementar la mortalidad y el daño renal. La solución salina hipertónica no es el estándar de primera línea para reanimación sistémica por riesgo de hipernatremia.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Déficit de volumen de líquidos, p. 13."
    },
    {
        id: 4,
        question: "¿Qué complicación orgánica principal se asocia directamente al uso de hidroxietilalmidón en la resucitación hídrica del paciente gran quemado?",
        options: ["Insuficiencia cardiaca congestiva.", "Síndrome de distrés respiratorio.", "Insuficiencia hepática fulminante.", "Falla renal aguda."],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, la terapia de fluidos debe titularse cuidadosamente evitando moléculas que generen toxicidad directa. El hidroxietilalmidón ha demostrado evidencia de daño directo sobre el parénquima renal en pacientes críticos.<br><br>Perla ENARM: \"No se recomienda el uso de hidroxetil-almidón, por lo que se debe preferir otras terapias de reemplazo de fluidos (asociado con el aumento de la falla renal y necesidad de terapia de reemplazo renal).\"<br><br>Análisis de Distractores: Aunque la resucitación hídrica excesiva puede generar insuficiencia cardiaca o distrés respiratorio por sobrecarga, el efecto adverso directo y documentado de los almidones es la nefrotoxicidad, no la hepatotoxicidad fulminante.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Déficit de volumen de líquidos, p. 14."
    },
    {
        id: 5,
        question: "¿Qué fórmula se recomienda utilizar como método inicial para calcular los requerimientos de fluidos en las primeras 24 horas tras la lesión?",
        options: ["Fórmula de Holliday-Segar.", "Fórmula de Parkland.", "Fórmula de Evans.", "Fórmula de Galveston."],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, se requiere una estimación basal del volumen a perfundir según el peso y el porcentaje de superficie corporal quemada para contrarrestar el choque hipovolémico distributivo temprano.<br><br>Perla ENARM: \"La formula de Parkland es el método más adecuado para el calculo de requerimientos de fluidos en la resucitación de pacientes adultos con quemaduras.\"<br><br>Análisis de Distractores: La fórmula de Holliday-Segar es para requerimientos de mantenimiento pediátricos. Las fórmulas de Evans o Galveston (pediátrica basada en m2) no son el estándar de oro inicial dictado en adultos por esta directriz institucional.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Déficit de volumen de líquidos, p. 14."
    },
    {
        id: 6,
        question: "¿Cuál es el parámetro clínico más seguro y eficiente para evaluar y ajustar hora a hora la hidratación del paciente gran quemado?",
        options: ["Frecuencia respiratoria.", "Nivel de conciencia.", "Producción de orina.", "Presión venosa central."],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, la reanimación hídrica requiere titulación horaria dinámica. La diuresis refleja directamente la perfusión esplácnica y el gasto cardíaco sin necesidad de invasión vascular central en la mayoría de los casos.<br><br>Perla ENARM: \"El control horario de la eliminación urinaria es el método más seguro y eficiente para evaluar la hidratación del paciente quemado.\"<br><br>Análisis de Distractores: La presión venosa central es invasiva y sujeta a múltiples variables en el paciente ventilado. La frecuencia respiratoria y el nivel de conciencia son marcadores de respuesta sistémica generales, pero no guían la titulación de líquidos mililitro a mililitro como lo hace la uresis.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Déficit de volumen de líquidos, p. 15."
    },
    {
        id: 7,
        question: "¿Cuál es la indicación precisa para establecer el acceso vascular inicial en un paciente adulto con superficie corporal quemada ≥40%?",
        options: ["Una vía central de inserción periférica.", "Una vía intraósea tibial exclusiva.", "Tres vías periféricas calibre 22.", "Dos vías periféricas calibre 16 o 18."],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, el aporte de grandes volúmenes de líquidos bajo la fórmula de Parkland exige flujos altos que solo se alcanzan de forma inmediata mediante catéteres periféricos cortos y gruesos, evitando el retraso de una vía central inicial.<br><br>Perla ENARM: \"Se debe establecer el acceso a dos líneas venosas periféricas, con catéter calibre 18 ó 16. Una para reposición de líquidos y la segunda para la toma de muestras.\"<br><br>Análisis de Distractores: Las vías calibre 22 no permiten un flujo de reanimación masiva. El catéter venoso central se reserva posterior a la estabilización periférica, excepto en quemaduras eléctricas específicas. La vía intraósea es una medida de rescate extremo, no de primera línea electiva.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Déficit de volumen de líquidos, p. 15."
    },
    {
        id: 8,
        question: "¿Qué escala observacional tiene mayor confiabilidad y especificidad para evaluar el dolor en el paciente intubado dentro de la unidad de cuidados intensivos?",
        options: ["Escala CPOT.", "Escala de FLACC.", "Escala visual analógica.", "Escala de Campbell."],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, en pacientes sometidos a sedación profunda o ventilación mecánica, el autoinforme es imposible, requiriendo herramientas que valoren expresión facial, tensión muscular y adaptación al ventilador.<br><br>Perla ENARM: \"Evaluar el dolor empleando la Escala Observacional del Dolor en Cuidados Intensivos (CPOT).\"<br><br>Análisis de Distractores: La escala de FLACC es estrictamente pediátrica. La escala visual analógica (EVA) requiere cooperación y respuesta verbal del paciente consciente. La escala de Campbell evalúa el dolor en pacientes con demencia o deterioro cognitivo senil, no es el estándar en UCI.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Control del dolor agudo, p. 17."
    },
    {
        id: 9,
        question: "¿Qué instrumento clínico se debe utilizar obligatoriamente para evaluar y titular el nivel de sedación en el paciente quemado crítico?",
        options: ["Escala de Glasgow.", "Escala de Ramsay.", "Escala de RASS.", "Escala de FOUR."],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, el control neuro-metabólico incluye opiáceos y benzodiacepinas. El grado de depresión del sistema nervioso inducido farmacológicamente requiere estandarización.<br><br>Perla ENARM: \"En pacientes gran quemados se debe evaluar el grado de sedación con la escala de RAMSAY.\"<br><br>Análisis de Distractores: La escala de Glasgow evalúa nivel de conciencia tras neurotrauma, no sedación. Las escalas RASS y FOUR son herramientas válidas en UCI general, pero el documento normativo exige explícitamente el uso de la escala de Ramsay.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Control del dolor agudo, p. 18."
    },
    {
        id: 10,
        question: "Además del pilar principal basado en opioides, ¿qué agentes farmacológicos intravenosos se indican como adyuvantes en el dolor del gran quemado?",
        options: ["Ketorolaco y paracetamol.", "Lidocaína tópica y bupivacaína.", "Dexmedetomidina y ketamina.", "Gabapentina y pregabalina."],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, el dolor exige manejo multimodal agresivo para abatir la sensibilización central y reducir los requerimientos y efectos adversos de dosis masivas de opioides.<br><br>Perla ENARM: \"Los agentes farmacológicos tales como la dexmedetomidina, y la ketamina se sugieren como adyuvantes a los opiáceos en el tratamiento del dolor por quemadura.\"<br><br>Análisis de Distractores: Los AINEs (Ketorolaco) tienen alto riesgo de nefrotoxicidad y sangrado digestivo en el quemado crítico. Los neuromoduladores orales (Gabapentina) se usan en fase de rehabilitación para dolor crónico/neuropático, no en agudo severo endovenoso.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Control del dolor agudo, p. 18."
    },
    {
        id: 11,
        question: "¿Qué método topográfico se recomienda como abordaje rápido y práctico para estimar la superficie corporal quemada inicial en urgencias para adultos?",
        options: ["Diagrama de Lund-Browder.", "Esquema de Parkland modificado.", "Escala de Converse-Smith.", "Regla de los nueves."],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, durante el triage primario se requiere una herramienta de fácil memorización anatómica que asigne porcentajes fijos del 9% para agilizar el cálculo de la reanimación hídrica.<br><br>Perla ENARM: \"Utilizar la regla de los nueves para valorar superficie corporal quemada.\"<br><br>Análisis de Distractores: El diagrama de Lund-Browder es de segunda línea para cálculo fino anatómico ajustado al crecimiento. La clasificación de Converse-Smith mide la profundidad histológica (1er, 2do, 3er grado), no la extensión. El esquema de Parkland es una fórmula hídrica, no una regla topográfica.",
        source: "IMSS-375-17, Intervenciones de enfermería para la atención del adulto gran quemado en el tercer nivel de atención, 2017, Deterioro de la integridad tisular, p. 20."
    },
    {
        id: 12,
        question: "¿Qué esquema proporciona la mayor precisión métrica para calcular la superficie corporal afectada al ajustar las proporciones corporales en distintas edades?",
        options: ["Diagrama de Lund-Browder.", "Regla de los nueves.", "Regla de la palma.", "Escala de Benaim."],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Atención del Adulto Gran Quemado, para la toma de decisiones críticas definitivas y evitar sobrehidratación, se debe corregir la variabilidad anatómica generada por el desarrollo humano.<br><br>Perla ENARM: \"El diagrama de Lund-Browder que compensa los cambios en las proporciones del cuerpo con el crecimiento, se utiliza para calcular el área de superficie corporal quemada.\"<br><br>Análisis de Distractores: La regla de los nueves es rápida pero imprecisa en extremos de la vida. La regla de la palma (1%) sirve para lesiones pequeñas o asimétricas. La escala de Benaim define profundidad (A, AB, B), no extensión métrica.",

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="HE60318CGE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGFUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGFULastQId', currentQuestionId);
                else localStorage.removeItem('CGFULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGFUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
