                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>

                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el dato clínico o paraclínico clave que permite distinguir la Hipertensión Crónica pura de la Hipertensión Crónica con Preeclampsia Sobreagregada?", 
                options: ["Edad materna mayor a 40", "Cifras tensionales muy elevadas", "Proteinuria de nueva aparición", "Uso de antihipertensivos orales"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedades Hipertensivas del Embarazo, la adición de la palabra \"sobreagregada\" señala el momento en que una paciente que padecía hipertensión \"estable\" y sin fugas orgánicas previo al embarazo, sufre de súbito el cese de compensación glomerular debido a la cascada vasoconstrictora que ahora lanza la placenta defectuosa en su contra, lo cual se manifiesta perdiendo la capacidad del riñón para retener los polímeros proteicos.<br><br>Perla ENARM: \"Con evidencia de preeclampsia: Es también conocida como preeclampsia sobreagregada y es definida por el desarrollo de 1 o más de los siguientes criterios:... Proteinuria de nueva aparición (igual o mayor a 300 mg en recolección de orina de 24 hrs) o empeoramiento de la misma\".<br><br>Análisis de Distractores: Cifras tensionales disparadas (B) suelen obedecer también a pérdida de adherencia farmacológica o simples crisis transitorias; no obstante, si existe resistencia refractaria súbita al uso de 3 drogas hipotensoras a dosis máxima, ahí sí cataloga para sobreagregada. La prescripción previa y regular de sus medicinas antihipertensivas orales (D) y el grupo de edad materna superior a los 40 años (A) solo describen a su contexto crónico y etario subyacente sin aportar definición diagnóstica aguda por sí solos.", 
                source: "GPC IMSS-058-08, Detección, Diagnóstico y Tratamiento de las Enfermedades Hipertensivas del Embarazo, 2017, Anexos (Cuadro 2), Página 38." 
            },
            {
                id: 2, 
                question: "De acuerdo a la GPC, en una paciente con contracciones regulares, ¿cuál es el dato clínico que establece el diagnóstico de Amenaza de Parto Pretérmino?", 
                options: ["Dilatación menor 3 cm", "Dilatación mayor 5 cm", "Borramiento mayor 80%", "Índice de Bishop 8"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, el diagnóstico inicial se basa en la presencia clínica de actividad uterina regular sin modificaciones cervicales avanzadas. Si la dilatación es mayor a 3 cm o el borramiento es mayor al 80%, se diagnostica como \"Parto Pretérmino\" establecido, cambiando radicalmente la conducta.<br><br>Perla ENARM: \"Se establece diagnóstico de amenaza de parto pretérmino con presencia de contracción uterinas con una frecuencia de 2 en 10 minutos o 4 en 20 minutos y 8 en 60 minutos acompañadas de cualquiera de los siguientes: Dilatación cervical ≤3 cm, borramiento ≤50% o cambios cervicales por medición de longitud cervical.\"<br><br>Análisis de Distractores: La opción B y C (dilatación >5 cm o borramiento >80 porciento) son criterios que definen a un trabajo de parto pretérmino activo o avanzado, contraindicando la tocolisis. La opción D (índice de Bishop alto) se asocia a cérvix favorable pero no define en aislamiento la amenaza.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Diagnóstico, Página 246." 
            },
            {
                id: 3, 
                question: "¿Cuál es el dato clínico clave que permite distinguir la Candidosis Vulvovaginal de la vaginosis bacteriana como su principal diagnóstico diferencial?", 
                options: ["Presencia de disuria", "Cérvix en frambuesa", "Flujo sin olor desagradable", "Prurito vulvar intenso"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, diferenciar entre entidades sindromáticas de flujo vaginal es la competencia médica de primer nivel más evaluada. Mientras que las etiologías bacterianas o parasitarias generan descomposiciones amínicas que otorgan olores fétidos (olor a pescado), el crecimiento micótico no produce estos compuestos, haciendo del olfato un dato clínico primario.<br><br>Perla ENARM: \"Los elementos diferenciales de CVV son: características del flujo vulvovaginal... Los criterios para el diagnóstico de probabilidad de CVV son el flujo o secreción vaginal sin olor desagradable\".<br><br>Análisis de Distractores: La opción A y D son síntomas comunes inespecíficos que pueden presentarse en cualquiera de las vulvovaginitis infecciosas. La opción B es un dato clásico exclusivo de la Tricomoniasis, no de la vaginosis bacteriana que es el diferencial principal aquí discutido.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Diagnóstico clínico y pruebas diagnósticas, Página 15 y 17." 
            },
            {
                id: 4, 
                question: "En el Cáncer de Mama, ¿cuál es el signo clínico al examen físico que integra el diagnóstico presuntivo de sospecha de malignidad según la GPC?", 
                options: ["Dolor punzante intermitente", "Nódulo firme, bordes indistintos", "Secreción láctea bilateral", "Masa móvil y blanda"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, el cuadro clínico típico es un nódulo firme con bordes indistintos, que puede o no presentar retracción de la piel o pezón. El cáncer rara vez duele en etapas tempranas.<br><br>Perla ENARM: \"El cuadro clínico típico del cáncer de mama, es un nódulo firme, con bordes indistintos y presenta retracción de la piel, fascia y pezón\".<br><br>Análisis de Distractores: El dolor (A) no es un signo primario de malignidad y suele relacionarse a mastopatía fibroquística. La secreción láctea (C) orienta a galactorrea por alteraciones endócrinas (ej. hiperprolactinemia). Una masa móvil y blanda (D) es característica de tumores benignos como el fibroadenoma.", 
                source: "GPC S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención, 2017, Diagnóstico clínico, Página 30." 
            },
            {
                id: 5, 
                question: "En el abordaje preventivo del parto pretérmino, ¿cuál es la patología asintomática clave cuyo tratamiento rutinario con nitrofurantoína reduce significativamente el riesgo de prematurez?", 
                options: ["Streptococcus mutans", "Vaginosis bacteriana", "Estreptococo del Grupo B", "Bacteriuria asintomática"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, debido a la estasis urinaria inducida por la progesterona y el crecimiento uterino, las bacterias proliferan silenciosamente en la vía urinaria materna. Estas bacterias secretan proteasas y endotoxinas que viajan al espacio decidual y adelgazan prematuramente las membranas corioamnióticas. Su erradicación con urocultivo rutinario previene esta cascada.<br><br>Perla ENARM: \"Se recomienda indicar en toda paciente con bacteriuria asintomática nitrofurantoína, a dosis de 100 mg cada 8 horas por 7 días; al momento de recibir el antibiograma evaluar si se continua o cambia en caso de existir resistencia\".<br><br>Análisis de Distractores: El Streptococcus mutans (A) y la Vaginosis (B) se manejan con intervenciones odontológicas y tratamiento local/sistémico distinto (clindamicina/metronidazol). El SGB (C) requiere profilaxis intraparto con penicilina, no nitrofurantoína oral ambulatoria.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Manejo Terapéutico, Página 30." 
            },
            {
                id: 6, 
                question: "En el screening de las lesiones precursoras del cáncer de cuello uterino, ¿cuál es el reporte citológico que integra la sospecha de atipias que no logran descartar una lesión de alto grado?", 
                options: ["Lesión escamosa de bajo grado", "Células escamosas atípicas (ASC-H)", "Células glandulares atípicas (AGC)", "Adenocarcinoma in situ (AIS)"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones precursoras del cáncer cervical, el sistema de clasificación Bethesda 2014 categoriza las anormalidades de células escamosas en diferentes grados de severidad. Las Células Escamosas Atípicas se dividen en aquellas de significado indeterminado (ASC-US) y aquellas en las que no se puede excluir una Lesión Escamosa Intraepitelial de Alto Grado (ASC-H). Identificar esta nomenclatura es esencial porque el hallazgo de ASC-H amerita evaluación colposcópica inmediata por el alto riesgo de patología subyacente.<br><br>Perla ENARM: \"Células escamosas atípicas: no se puede excluir LEIAG (ASC-H)\".<br><br>Análisis de Distractores: La opción A (LEIBG) refleja una infección transitoria por VPH o displasia leve (NIC 1), no una atipia indeterminada. Las opciones C y D se refieren a anormalidades del epitelio glandular, no escamoso, cuyo abordaje inicial y riesgo oncológico son distintos.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Anexos, Página 56." 
            },
            {
                id: 7, 
                question: "¿Cuál es el dato clínico clave que permite distinguir la verdadera depresión posparto de su principal diagnóstico diferencial benigno, la \"tristeza materna\" (baby blues)?", 
                options: ["Alivio espontáneo en semanas", "Presencia de llanto frecuente", "Sentimiento materno de culpa", "Interferencia con la lactancia"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Depresión prenatal y posparto, es vital que el médico sepa diferenciar un proceso adaptativo hormonal fisiológico de una patología mayor. El baby blues inicia a los 2-4 días y es autolimitado sin necesidad de tratamiento; si persiste más de 2 a 3 semanas o debuta posteriormente, debe abordarse como depresión.<br><br>Perla ENARM: \"La patología denominada Baby Blues se describe como una alteración del estado de ánimo (...) Los síntomas de dicha patología son de alivio espontáneos dentro de las 2 a 3 semanas siguientes al parto, y no requieren de atención médica y/o psicológica\".<br><br>Análisis de Distractores: Las opciones B y C se presentan de forma solapada tanto en la depresión posparto como en la tristeza materna, por lo tanto, no son el parteaguas diagnóstico. La opción D ocurre principalmente en la depresión instaurada pero no sirve como criterio temporal de diferenciación clínica como la resolución espontánea temprana.", 
                source: "GPC SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Introducción, Página 8." 
            },
            {
                id: 8, 
                question: "En el abordaje de la Infección de Vías Urinarias en el embarazo, ¿cuál es el hallazgo microbiológico que confirma el diagnóstico definitivo según la GPC?", 
                options: [">50,000 UFC/ml un microorganismo", ">10,000 UFC/ml múltiples microorganismos", ">100,000 UFC/ml un microorganismo", "Nitritos y esterasa leucocitaria"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, el estándar de oro para el diagnóstico definitivo requiere una carga bacteriana significativa demostrada por urocultivo, limitándose a una sola cepa para evitar contaminación. Los métodos como la tira reactiva carecen de la especificidad para considerarse diagnósticos confirmatorios definitivos.<br><br>Perla ENARM: \"Se recomienda realizar urocultivo para confirmar diagnóstico de ITU en embarazadas con síntomas (100,000 unidades formadoras de colonias de un solo microrganismo)\".<br><br>Análisis de Distractores: Las opciones con recuentos menores (10,000 o 50,000) o crecimiento de múltiples microorganismos sugieren toma inadecuada o contaminación de la muestra. La presencia de nitritos es un hallazgo de tamizaje presuntivo, no confirmatorio.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Diagnóstico, Página 22." 
            },
            {
                id: 9,
                question: "¿Cuál es el dato clínico o temporal exacto que dicta la GPC que permite distinguir categóricamente una Diabetes Mellitus Pregestacional de una Gestacional de novo?",
                options: ["Requerimiento de insulina suplementaria", "Uso previo de metformina", "Diagnóstico posterior a 24 semanas", "Diagnóstico antes de 13 semanas"],
                answer: 3,
                justification: "Justificación: De acuerdo a la GPC de Control Prenatal, toda alteración franca del metabolismo de los carbohidratos documentada en el primer trimestre no se origina por las hormonas placentarias lactogénicas, sino que refleja una falla preexistente descompensada por el estado gestacional.<br><br>Perla ENARM: \"El diagnóstico de diabetes mellitus (DM) pregestacional se establece en la persona embarazada antes de la semanas 13 utilizando los criterios estándar para DM tipo 2 en la población general.\"<br><br>Análisis de Distractores: El diagnóstico en la semana 24-28 (C) define primariamente a la diabetes gestacional verdadera. El requerimiento de insulina (A) o el uso de metformina (B) son decisiones terapéuticas basadas en descontrol metabólico o coadyuvantes para ovarios poliquísticos, pero no definen temporalmente a la patología.",
                source: "GPC IMSS-028-08, Control prenatal con atención centrada en la paciente, 2017, Tamizaje de Patologías, Página 64."
            },
            {
                id: 10, 
                question: "En una paciente con contracciones uterinas, ¿cuál es el hallazgo clínico al tacto vaginal que integra el diagnóstico presuntivo de la fase activa del trabajo de parto?", 
                options: ["Dilatación de 3 cm", "Dilatación de 4 cm", "Dilatación de 5 cm", "Borramiento del 100%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Trabajo de parto de bajo riesgo, el límite estricto que marca el inicio fisiológico de la fase activa son los 5 cm de dilatación; ingresar a una paciente antes de este corte aumenta injustificadamente el riesgo de cesáreas y uso de oxitocina. Las opciones de 3 y 4 cm representan la fase latente, de manejo domiciliario.<br><br>Perla ENARM: Se recomienda considerar a la fase latente del trabajo de parto como el periodo caracterizado por contracciones uterinas dolorosas que causan modificaciones cervicales y que incluyen dilatación cervical menor a 5 cm.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 25." 
            },
            {
                id: 11, 
                question: "En una paciente embarazada con Cáncer de Mama, ¿cuál es la condición clínica que avala la resolución del embarazo de forma segura por vía vaginal?",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {

                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');

            });
            document.getElementById('confirm-reset').addEventListener('click', () => {

                localStorage.removeItem('Exagyo15LastQId');
                window.location.reload();

                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');

        }

            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

            ).join('');
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `

                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('Exagyo15Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('Exagyo15LastQId', currentQuestionId);
                else localStorage.removeItem('Exagyo15LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('Exagyo15Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
