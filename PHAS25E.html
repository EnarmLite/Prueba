    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cada cuánto tiempo se debe medir la presión arterial en individuos menores de 40 años sin factores de riesgo?",
        options: ["Cada 5 años", "Al menos cada 3 años", "Cada 2 años", "De forma anual"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, el tamizaje estructurado depende directamente de la edad y la vulnerabilidad del paciente para identificar las fases asintomáticas tempranas. En la población joven que no presenta comorbilidades ni factores predisponentes, el periodo de escrutinio es más espaciado.<br><br>Perla ENARM: \"Se recomienda medir la presión arterial (PA): a) Al menos cada 3 años en menores de 40 años y sin FR.\"<br><br>Análisis de Distractores: La opción D (anual) es la indicación estricta para mayores de 40 años. Las opciones A y C presentan intervalos temporales no sustentados por los algoritmos de detección clínica vigentes.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección IV. Tamizaje, Página 1."
    },
    {
        id: 2,
        question: "Para una correcta medición en consultorio, ¿cuántos minutos debe permanecer el paciente sentado en reposo previamente?",
        options: ["Al menos 10 minutos", "Al menos 15 minutos", "Al menos 5 minutos", "Al menos 3 minutos"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, la estabilización hemodinámica es un requisito innegociable para evitar lecturas espurias inducidas por estrés físico o actividad reciente. El protocolo dicta un tiempo exacto para permitir la adaptación cardiovascular antes de insuflar el brazalete.<br><br>Perla ENARM: \"Recomendaciones: el paciente debe estar en ambiente tranquilo, permanecer 5 minutos en reposo.\"<br><br>Análisis de Distractores: Las opciones A y B (10 y 15 minutos) superan el tiempo normado, restando eficiencia operativa en la consulta. La opción D (3 minutos) es insuficiente para garantizar la relajación vascular.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección V. Medición, Página 1."
    },
    {
        id: 3,
        question: "¿Cuál es el punto de corte para diagnosticar hipertensión en un paciente con enfermedad renal crónica?",
        options: ["Mayor a 130/80 mmHg", "Mayor a 140/90 mmHg", "Mayor a 120/80 mmHg", "Mayor a 135/85 mmHg"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, los umbrales diagnósticos se modifican a la baja cuando existe vulnerabilidad orgánica o comorbilidad metabólica establecida, ya que el riesgo cardiovascular se acelera significativamente.<br><br>Perla ENARM: \"HAS con DM, DLP, ERC o DOB: >135 y >85 mmHg.\"<br><br>Análisis de Distractores: La opción B (140/90) es el punto de corte para población general sin factores. La opción A (130/80) es el criterio para MAPA de 24 horas y la meta general, no el umbral diagnóstico de consultorio. La opción C (120/80) diagnosticaría normalidad en MAPA nocturno.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Tabla 1. Clasificación y puntos de corte, Página 2."
    },
    {
        id: 4,
        question: "Del total de pacientes con hipertensión arterial, ¿qué porcentaje corresponde a la etiología esencial o primaria?",
        options: ["90 %", "80 %", "95 %", "70 %"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, la gran mayoría de la carga patológica poblacional obedece a un origen multifactorial complejo que no depende de una alteración orgánica única curable, sino de la interacción genético-ambiental.<br><br>Perla ENARM: \"El 90 % de los enfermos que viven con HAS presentan la forma esencial o primaria.\"<br><br>Análisis de Distractores: El 10 % restante corresponde a la hipertensión secundaria (renovascular, endocrina, etc.). Las opciones B, C y D representan variaciones estadísticas que no coinciden con la distribución epidemiológica descrita en el documento oficial.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección II. Fisiopatología, Página 1."
    },
    {
        id: 5,
        question: "Si durante la exploración física se palpa un pulso irregular, ¿qué tipo de esfigmomanómetro se debe utilizar obligatoriamente?",
        options: ["Dispositivo automático validado", "Equipo oscilométrico", "Equipo aneroide manual", "Monitor ambulatorio 24 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, los algoritmos oscilométricos de los equipos automáticos se confunden ante variaciones latido a latido, arrojando lecturas erróneas. El método auscultatorio manual es el único preciso en este contexto.<br><br>Perla ENARM: \"Si el pulso es regular utilizar dispositivos automáticos o aneroide, si es irregular utilizar solo equipo aneroide.\"<br><br>Análisis de Distractores: Las opciones A y B fallan porque la irregularidad del pulso (ej. fibrilación auricular) altera la captación automatizada. La opción D es un estudio de extensión (MAPA), no una herramienta de medición de consultorio primario.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección V. Medición, Página 2."
    },
    {
        id: 6,
        question: "Según la calculadora HEARTS de las Américas, ¿qué categoría de riesgo cardiovascular corresponde a un resultado mayor al 30 %?",
        options: ["Riesgo moderado", "Riesgo crítico", "Riesgo muy alto", "Riesgo alto"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, la estratificación a 10 años dicta la agresividad del manejo integral. Un puntaje superior a este nivel implica una inminencia estadística de evento letal, requiriendo la máxima categorización.<br><br>Perla ENARM: \"Se definen 5 categorías: bajo < 5%, moderado 5-10%; alto 10-20%; muy alto 20 a 30%, crítico: > 30%.\"<br><br>Análisis de Distractores: La opción A corresponde a 5-10 %. La option D pertenece al bloque de 10-20 %. La opción C aplica a rangos de 20 a 30 % o a pacientes con enfermedad ya establecida, pero matemáticamente el límite superior es riesgo crítico.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección VII. Estratificación de Riesgo Cardiovascular, Página 5."
    },
    {
        id: 7,
        question: "De acuerdo con la ENSANUT 2022, ¿cuál es la prevalencia nacional de personas que viven con hipertensión arterial en México?",
        options: ["16.4 %", "31.0 %", "17.7 %", "29.9 %"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, comprender la carga epidemiológica nacional es indispensable para el escrutinio de salud pública. Este porcentaje refleja el impacto masivo de la patología en el país.<br><br>Perla ENARM: \"La prevalencia de personas que viven con HAS fue de 29.9 %.\"<br><br>Análisis de Distractores: La opción A es la antigua tasa de mortalidad. La opción B (31 %) es la prevalencia global mundial según la carga global. La opción C (17.7 %) corresponde a aquellos pacientes que previamente conocían su diagnóstico.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección I. Introducción, Página 1."
    },
    {
        id: 8,
        question: "¿Cuál es la cifra promedio del monitoreo ambulatorio de 24 horas que confirma el diagnóstico de hipertensión arterial?",
        options: ["Mayor a 130/80 mmHg", "Mayor a 135/85 mmHg", "Mayor a 120/70 mmHg", "Mayor a 140/90 mmHg"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, los promedios continuos de 24 horas manejan puntos de corte inferiores a los de consultorio, dado que incluyen el descenso fisiológico nocturno (dipping).<br><br>Perla ENARM: \"HAS en MAPA durante 24 hrs: >130 sistólica y >80 diastólica.\"<br><br>Análisis de Distractores: La opción B corresponde al diagnóstico por monitoreo domiciliario (MDPA). La opción C diagnostica hipertensión basándose exclusivamente en el promedio nocturno del MAPA. La opción D es el corte estándar en consultorio.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Tabla 1. Clasificación y puntos de corte, Página 2."
    },
    {
        id: 9,
        question: "En la evaluación electrocardiográfica, ¿cuál es el valor límite del índice de Sokolow-Lyon para determinar crecimiento ventricular izquierdo?",
        options: ["Mayor a 20 mm", "Mayor a 28 mm", "Mayor a 35 mm", "Mayor a 11 mm"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, el daño a órgano blanco cardíaco modifica el pronóstico. La suma de los voltajes en las derivaciones precordiales es un criterio clásico y sensible para identificar hipertrofia secundaria a sobrecarga de presión.<br><br>Perla ENARM: \"ECG. Crecimiento ventricular izquierdo: índice Sokolow–Lyon: si S en V1 + R en V5 >35 mm.\"<br><br>Análisis de Distractores: La opción B (>28 mm) es el índice de Cornell en hombres. La opción A (>20 mm) es el índice de Cornell en mujeres. La opción D (>11 mm) es el punto de corte exclusivo para la onda R aislada en aVL según Sokolow.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Tabla 2. Indicadores de Daño a Órgano Blanco, Página 4."
    },
    {
        id: 10,
        question: "Como parte de las medidas no farmacológicas, ¿cuál es la ingesta diaria de sal recomendada para el control tensional?",
        options: ["Menor a 2 gramos", "Entre 5 y 10 gramos", "Cero gramos", "Entre 2 y 5 gramos"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, el control del balance de sodio es la intervención dietética con mayor impacto hemodinámico directo. Se busca una reducción sostenible sin caer en restricciones imposibles de mantener.<br><br>Perla ENARM: \"Dieta baja en sal. 2-5 g al día (1 cucharada pequeña por día).\"<br><br>Análisis de Distractores: La opción A es una restricción excesiva y poco realista a largo plazo. La opción B excede el consumo terapéutico. La opción C (cero) es fisiológicamente incorrecta y no adherente.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Tabla 3. Recomendaciones de manejo no farmacológico, Página 5."
    },
    {
        id: 11,
        question: "En ausencia de fragilidad o edad muy avanzada, ¿cuál es la estrategia farmacológica inicial recomendada en hipertensión?",
        options: ["Terapia dual a dosis bajas", "Monoterapia a dosis máxima", "Terapia triple a dosis bajas", "Monoterapia a dosis bajas"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, la inercia clínica se combate iniciando un esquema sinérgico desde el diagnóstico. Esto maximiza el bloqueo de receptores y previene efectos adversos relacionados a la alta dosificación de un solo agente.<br><br>Perla ENARM: \"La monoterapia debe evitarse... la evidencia recomienda la terapia dual IECA/ARA + CaA o IECA/ARA + Diurético (Dosis Bajas).\"<br><br>Análisis de Distractores: Las opciones B y D (monoterapia) están reservadas únicamente para mayores de 85 años, fragilidad severa o hipotensión ortostática. La opción C (terapia triple) corresponde a un escalón terapéutico en hipertensión resistente, no al inicio.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Figura 2. Algoritmo de tratamiento, Página 6."
    },
    {
        id: 12,
        question: "¿Qué valor de tasa de filtración glomerular establece el diagnóstico de daño a órgano blanco renal moderado?",
        options: ["Menor a 30 mL/min/m2", "Menor a 60 mL/min/m2", "Menor a 45 mL/min/m2", "Menor a 15 mL/min/m2"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, la evaluación de la nefrona permite detectar el inicio clínico de la enfermedad renal crónica, reclasificando inmediatamente al paciente como de alto riesgo vascular.<br><br>Perla ENARM: \"Daño renal moderado: TFG <60 mL/min/m2 o albuminuria ≥30 mg/g.\"<br><br>Análisis de Distractores: La opción A indica daño grave. La opción C es una subclasificación que no define el punto de corte inicial de daño moderado según el documento. La opción D corresponde a falla renal terminal.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Tabla 2. Indicadores de Daño a Órgano Blanco, Página 4."
    },
    {
        id: 13,
        question: "¿Qué familia de fármacos antihipertensivos tiene contraindicación absoluta para su uso durante el embarazo?",
        options: ["Calcioantagonistas", "Betabloqueadores", "Metildopa", "Inhibidores de enzima convertidora"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Hipertensión Arterial Sistémica, el bloqueo del sistema renina-angiotensina-aldosterona induce toxicidad y teratogénesis fetal comprobada (oligohidramnios y falla renal fetal), por lo que se proscribe su uso en gestantes.<br><br>Perla ENARM: \"No se recomienda uso de IECA ni ARA en embarazo.\"<br><br>Análisis de Distractores: Las opciones A y B (amlodipino, metoprolol) representan la primera línea de tratamiento en embarazo. La opción C (alfametildopa) es un agente seguro clasificado como de segunda línea.",
        source: "Protocolo Nacional de Atención Médica Hipertensión Arterial Sistémica, 2024, Sección X. Grupos Especiales, Página 8."
    },
    {
        id: 14,
        question: "En una emergencia hipertensiva, ¿cuál es la meta estricta de reducción de la presión arterial durante las primeras 1 a 2 horas?",
        options: ["Reducir 10 %", "Reducir 50 %", "Reducir 25 %", "Normalizar a 120/80 mmHg"],

        function displayQuestion(qId) {

            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');

                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('HASPRONAMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('HASPRONAMLastQId', currentQuestionId);
                else localStorage.removeItem('HASPRONAMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('HASPRONAMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
