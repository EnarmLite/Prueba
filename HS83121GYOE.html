    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el punto de corte en unidades formadoras de colonias requerido en un cultivo de orina para establecer el diagnóstico confirmatorio de bacteriuria asintomática?", 
                options: ["≥ 10,000 de múltiples microorganismos", "≥ 100,000 de múltiples microorganismos", "≥ 50,000 de un solo microorganismo", "≥ 100,000 de un solo microorganismo"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, el diagnóstico de certeza exige una carga bacteriana significativa mediante urocultivo, debiendo aislarse una única cepa para descartar contaminación de la muestra.<br><br>Perla ENARM: \"Se recomienda realizar urocultivo para confirmar diagnóstico de ITU en embarazadas con síntomas (100,000 unidades formadoras de colonias de un solo microrganismo).\"<br><br>Análisis de Distractores: Las opciones con menor recuento (10,000 o 50,000) o con múltiples microorganismos indican contaminación de la muestra de orina durante la recolección y no justifican el inicio de tratamiento antimicrobiano.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Diagnóstico, Página 22." 
            },
            {
                id: 2, 
                question: "¿Cuál es el microorganismo patógeno aislado con mayor frecuencia en las infecciones del tracto urinario durante la gestación?", 
                options: ["Escherichia coli", "Proteus mirabilis", "Klebsiella pneumoniae", "Staphylococcus saprophyticus"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, las alteraciones anatómicas y el estancamiento urinario facilitan la colonización por enterobacterias provenientes del tracto gastrointestinal, siendo este bacilo responsable de hasta el 86% de los episodios.<br><br>Perla ENARM: \"Los microorganismos patógenos más frecuentemente asociados con ITU son Escherichia coli (86%), Staphylococcus saprophyticus, Klebsiella spp, Enterobacter spp, Proteus spp\".<br><br>Análisis de Distractores: Staphylococcus saprophyticus, Proteus mirabilis y Klebsiella pneumoniae son uropatógenos clínicamente posibles y documentados en cultivos obstétricos, pero su incidencia poblacional es abismalmente menor en comparación con E. coli.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Etiología, Página 6." 
            },
            {
                id: 3, 
                question: "¿Cuál de los siguientes antecedentes médicos en los últimos 3 meses constituye un factor de riesgo para desarrollar infección por bacterias productoras de betalactamasas de espectro extendido?", 
                options: ["Uso de nitrofurantoína", "Uso de cefalosporinas", "Consumo de probióticos", "Alergia a la penicilina"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, la presión selectiva ejercida por el uso previo de antibióticos de amplio espectro induce mutaciones enzimáticas bacterianas que confieren resistencia cruzada de alto impacto.<br><br>Perla ENARM: \"Se sugiere considerar como factores de riesgo para presentar ITU por bacterias BLEE durante el embarazo, los antecedentes de ITU, uso de cefalosporinas, antimicrobianos combinados y catéter urinario.\"<br><br>Análisis de Distractores: La nitrofurantoína mantiene un perfil de resistencia sumamente bajo. Los probióticos intervienen en la flora intestinal pero no alteran la resistencia genética. La alergia a la penicilina es una condición materna, no del patógeno.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Prevención, Página 16." 
            },
            {
                id: 4, 
                question: "¿Cuál es el estudio de tamizaje de primera elección que debe solicitarse en la consulta prenatal inicial para detectar bacteriuria asintomática?", 
                options: ["Tinción de Gram", "Sedimento urinario", "Tira reactiva", "Urocultivo"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, la alta tasa de complicaciones perinatales derivadas de una colonización asintomática exige utilizar el estándar de oro diagnóstico para evitar el subdiagnóstico desde el primer contacto.<br><br>Perla ENARM: \"Se recomienda realizar el tamizaje de BA en la primera consulta prenatal. Se recomienda realizar tamizaje de BA mediante urocultivo en mujeres embarazadas.\"<br><br>Análisis de Distractores: La tinción de Gram solo se avala como segunda opción si no se cuenta con incubación de cultivos. La tira reactiva y el sedimento urinario presentan demasiados falsos negativos como herramienta de escrutinio primario en embarazadas.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Diagnóstico, Página 21." 
            },
            {
                id: 5, 
                question: "Ante la falta de disponibilidad de un cultivo de orina en la unidad de primer nivel, ¿cuál es la prueba diagnóstica alternativa sugerida para tamizaje por su mayor rendimiento y sensibilidad?", 
                options: ["Tinción de Gram", "Reacción de nitritos", "Esterasa leucocitaria", "Examen general de orina"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, la visualización microscópica directa de bacterias centrifugadas sin incubación previa ofrece una sensibilidad del 86% y especificidad del 97%, superando por mucho a los métodos bioquímicos convencionales.<br><br>Perla ENARM: \"Se sugiere realizar tamizaje con tinción de Gram cuando no se cuente con urocultivo y se tenga disponibilidad de realizar la prueba.\"<br><br>Análisis de Distractores: La reacción de nitritos, la esterasa leucocitaria y el EGO tienen una propensión fisiológica a falsos positivos en el embarazo por incremento de secreciones y leucocitosis, relegándolas al último escalón.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Diagnóstico, Página 21." 
            },
            {
                id: 6, 
                question: "¿Cuál es el criterio temporal exacto que define a una infección del tracto urinario como recurrente y justifica evaluar el inicio de profilaxis farmacológica?", 
                options: ["2 infecciones en 12 meses", "4 infecciones en 6 meses", "3 infecciones en 12 meses", "1 infección en cada trimestre"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, para exponer a un feto a antibióticos de manera continua se requiere documentar un fracaso persistente del aclaramiento bacteriano, el cual se define por una alta frecuencia demostrada en urocultivo.<br><br>Perla ENARM: \"Se sugiere la profilaxis farmacológica en mujeres embarazadas con alto riesgo de infección del tracto urinario como ITU recurrente (tres infecciones recurrentes demostradas mediante urocultivo positivo en menos de un año).\"<br><br>Análisis de Distractores: Presentar únicamente 2 infecciones en un año no cumple la definición primaria (requeriría ser 2 en 6 meses). Cuatro infecciones en 6 meses excede severamente el límite. Una infección por trimestre no es una pauta diagnóstica.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Prevención, Página 18." 
            },
            {
                id: 7, 
                question: "En pacientes obstétricas con diagnóstico documentado de infección urinaria recurrente o anomalías anatómicas, ¿cuál es el fármaco profiláctico de primera elección?", 
                options: ["Fosfomicina trometamol", "Nitrofurantoína", "Cefalexina", "Amoxicilina"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, la profilaxis extendida amerita un agente que logre concentraciones intraluminales elevadas en la vejiga con mínima alteración sistémica de la microbiota intestinal para evitar sobreinfecciones.<br><br>Perla ENARM: \"Se sugiere el uso de nitrofurantoína para profilaxis farmacológica en mujeres embarazadas con alto riesgo de infección del tracto urinario.\"<br><br>Análisis de Distractores: La fosfomicina trometamol es fundamental en el tratamiento empírico de eventos agudos, no en pautas profilácticas crónicas. La cefalexina y amoxicilina sufren severas tasas de resistencia nacional (hasta 80%).", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Prevención, Página 18." 
            },
            {
                id: 8, 
                question: "¿Qué grupo de medicamentos antimicrobianos está explícitamente contraindicado utilizar de manera empírica para cistitis debido a su elevada tasa de resistencia bacteriana en México?", 
                options: ["Fosfomicina y nitrofurantoína", "Ceftriaxona y ertapenem", "Ampicilina y cefalexina", "Trimetoprim y sulfametoxazol"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, la prevalencia de cepas de E. coli multirresistentes anula la utilidad de los betalactámicos de primera y segunda generación, asociándose a fracaso del tratamiento primario si no existe sensibilidad comprobada.<br><br>Perla ENARM: \"No se recomienda la utilización de forma empírica de ampicilina, amoxicilina y/o cefalexina debido a la tasa elevada de resistencia identificada en uropatógenos.\"<br><br>Análisis de Distractores: Fosfomicina y nitrofurantoína representan la primera línea empírica actual por su perfil de susceptibilidad. Ceftriaxona y ertapenem son de uso intrahospitalario guiado. TMP/SMX se evita por toxicidad embrionaria, no primariamente por ineficacia.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Herramientas, Página 37." 
            },
            {
                id: 9, 
                question: "¿Cuál es el tratamiento antimicrobiano empírico de elección para cistitis aguda que cuenta con el mejor perfil de seguridad y se puede prescribir en cualquier trimestre?", 
                options: ["Ciprofloxacino 500 mg", "Amoxicilina 500 mg", "Nitrofurantoína 100 mg", "Fosfomicina trometamol 3 g"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, este fármaco garantiza una curación clínica sobresaliente gracias a su administración en dosis única (alta adherencia) y a que carece de toxicidad hematológica intrauterina en todas las fases del desarrollo fetal (Clasificación B).<br><br>Perla ENARM: \"En el caso de no contar con urocultivo y antibiograma, se recomienda tratamiento antimicrobiano empírico de la cistitis con fosfomicina (posible prescribirlo con mínimo riesgo en cualquier trimestre del embarazo).\"<br><br>Análisis de Distractores: La nitrofurantoína es excelente alternativa, pero se prohíbe en 1er y 3er trimestre. El ciprofloxacino impacta el cartílago de crecimiento. La amoxicilina presenta falla terapéutica endémica en México.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Tratamiento, Página 31." 
            },
            {
                id: 10, 
                question: "¿Cuál es la principal morbilidad neonatal previsible por la cual se debe evitar la administración de nitrofurantoína cerca de la fecha de resolución del embarazo?", 
                options: ["Cierre de conducto arterioso", "Anemia hemolítica", "Riesgo de kernicterus", "Hemorragia intraventricular"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, los eritrocitos del recién nacido cursan con inmadurez enzimática en sus sistemas antioxidantes, haciéndolos frágiles ante el estrés oxidativo provocado por drogas si existe exposición hematógena periparto.<br><br>Perla ENARM: \"Evite nitrofurantoína en primer trimestre... y a término debido al riesgo potencial de anemia hemolítica en el recién nacido.\"<br><br>Análisis de Distractores: El kernicterus se presenta con el uso de trimetoprim/sulfametoxazol por alteración en la fijación de albúmina. El cierre prematuro del conducto arterioso deriva de la toma de antiinflamatorios no esteroideos sistémicos.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Herramientas, Página 36." 
            },
            {
                id: 11, 
                question: "Fisiopatológicamente, ¿por qué motivo se contraindica de manera formal el uso de trimetoprim con sulfametoxazol durante el tercer trimestre del embarazo?", 
                options: ["Causa displasia de cartílago", "Produce anomalías del tubo neural", "Desplaza la bilirrubina plasmática", "Induce agranulocitosis fulminante"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, las sulfonamidas tienen alta afinidad por los sitios de unión proteica, liberando bilirrubina indirecta circulante en el neonato, la cual cruza la barrera hematoencefálica favoreciendo la encefalopatía (kernicterus).<br><br>Perla ENARM: \"El sulfametoxazol debe evitarse cerca del término por el riesgo teórico de kernicterus (desplaza la bilirrubina de sus sitios de unión en el recién nacido).\"<br><br>Análisis de Distractores: El cierre de defectos del tubo neural (teratogénesis por antagonismo de folatos) es un evento que contraindica el fármaco en el primer trimestre, no en el tercero. La displasia del cartílago óseo se asocia a la familia de las fluoroquinolonas.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Herramientas, Página 37." 
            },
            {
                id: 12, 
                question: "En una paciente gestante que presenta cuadro clínico de fiebre, disuria, dolor lumbar y maniobra de Giordano positiva, ¿cuál es el antibiótico intrahospitalario empírico recomendado?", 
                options: ["Ertapenem intravenoso", "Fosfomicina vía oral", "Ampicilina intravenosa", "Nitrofurantoína vía oral"], 
                answer: 0,

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('gyoHProgress');
                localStorage.removeItem('gyoHLastQId');
                window.location.reload();
            });

            const mainContent = document.getElementById('main-content');

                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');

                        dashboardBtn.classList.add('lg:left-[22rem]');

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }

                sidebar.classList.add('-translate-x-full');

            });

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="AU16209GYO.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoHProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoHLastQId', currentQuestionId);
                else localStorage.removeItem('gyoHLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoHProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
