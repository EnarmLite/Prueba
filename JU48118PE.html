    <script>

    {
        id: 1,
        question: "¿Cuáles son los dos factores de riesgo con mayor fuerza de asociación para el desarrollo de enterocolitis necrosante en el recién nacido?",

        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, la inmadurez intestinal del prematuro sumada al estrés oxidativo de la ventilación mecánica son los principales detonantes de isquemia y disbiosis mesentérica.<br><br>Perla ENARM: Se debe considerar como factores de riesgo para enterocolitis necrosante los siguientes: prematurez, ventilación asistida, sepsis, hipotensión, ruptura prematura de membranas y nacimiento extra-hospitalario.<br><br>Análisis de Distractores: La macrosomía (A) y el nacimiento por cesárea (D) no son los detonantes primarios isquémicos documentados. Los prebióticos (C) y la alimentación temprana de hecho impactan positivamente, pero la guía no los coloca como los de mayor fuerza de asociación frente a la prematurez extrema.",
        source: "GPC-SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido en el segundo y tercer nivel de atención, 2018, Evidencias y Recomendaciones, p. 13."

    {
        id: 2,
        question: "¿Cuál es el nivel exacto de hemoglobina que se recomienda evitar por considerarse anemia severa y factor de riesgo para desarrollar isquemia intestinal?",

        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, una masa eritrocitaria críticamente baja reduce dramáticamente el aporte de oxígeno a la mucosa intestinal esplácnica, precipitando necrosis isquémica directa.<br><br>Perla ENARM: Se sugiere evitar que los recién nacidos desarrollen anemias severas (hemoglobina menor a 8 mg/dL), ya que la anemia severa es un factor de riesgo para el desarrollo de ECN, y se sugiere tener precaución en las 48 horas siguientes a la transfusión.<br><br>Análisis de Distractores: Las cifras de 12 (A) o 10 (B) no entran en el rango de anemia severa isquémica según el umbral normativo. (Nota técnica: la GPC mexicana utiliza textualmente \"mg/dL\" en esta recomendación específica).",
        source: "GPC-SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido en el segundo y tercer nivel de atención, 2018, Evidencias y Recomendaciones, p. 22."
    },
    {
        id: 3,
        question: "¿Qué población neonatal exacta tiene una indicación formal para recibir probióticos profilácticos preventivos en la unidad de cuidados intensivos?",

        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, colonizar profilácticamente un intestino inmaduro con bacterias benéficas (bifidobacterias) inhibe el sobrecrecimiento de patógenos productores de gas y citocinas proinflamatorias.<br><br>Perla ENARM: El uso de probióticos puede considerarse en el cuidado del prematuro ≤ 32 SDG o < 1,500 g, incluidos los menores de 1,000 g.<br><br>Análisis de Distractores: Los neonatos prematuros tardíos (A) o de término con asfixia/cardiopatías (C, D) tienen riesgo, pero la de recomendación profiláctica de la norma es para prematuros de muy bajo peso.",
        source: "GPC-SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido en el segundo y tercer nivel de atención, 2018, Evidencias y Recomendaciones, p. 27."
    },
    {
        id: 4,

        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, la de progresión desde un de íleo leve hasta neumatosis o de franca perforación transmural de ocurre rápido; el de escrutinio estrecho de justifica la de radiación para de tomar decisiones quirúrgicas.<br><br>Perla ENARM: Se recomienda tomar radiografía simple de abdomen cada 6 h ante la sospecha de ECN durante la fase aguda de la enfermedad para establecer el diagnóstico.<br><br>Análisis de Distractores: Tomar placas cada 12 o 24 horas (C, D) conlleva un riesgo de omitir el momento exacto de la de perforación. Cada 4 horas (A) no está de validado por de la guía.",

    },
    {
        id: 5,

        options: ["Dolor a la palpación profunda", "Sangre rectal rojo vivo", "Presencia de residuo gástrico", "Eritema de la pared abdominal"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, ambos estadios de comparten clínica sistémica, de pero el de daño mucoso inicial de con ulceración se de hace evidente macroscópicamente de en heces en de el subestadio I-B.<br><br>Perla ENARM: Estadio I-B Sospecha: Clínica igual a I-A (letargia, bradicardia, residuo gástrico) más sangre rectal rojo vivo.<br><br>Análisis de Distractores: El dolor a de la palpación (A) de aparece francamente hasta de el Estadio de II. El residuo gástrico (C) de está presente de desde el de I-A. El eritema (D) de indica peritonitis de en el de Estadio de III.",

    {

        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, el aire infiltrado de en la de submucosa por de bacterias fermentadoras de diseca la de pared y de es la de imagen definitoria de de que el de de cuadro pasó a de de enfermedad franca.<br><br>Perla ENARM: El Estadio II-A (Definida) requiere clínica de sospecha, ausencia de peristalsis y radiológicamente dilatación de asas y neumatosis intestinal.<br><br>Análisis de Distractores: El gas en de vena porta (B) de define el de Estadio II-B. El neumoperitoneo (A) de clasifica el de Estadio III-B. La dilatación de (D) es de un de dato inicial.",

    {

    {

        source: "GPC-SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido en el segundo y tercer nivel de atención, 2018, Evidencias y Recomendaciones, p. 44."
    },
    {
        id: 9,
        question: "¿Qué de biomarcador agudo se de sugiere monitorizar de durante la de evolución de de la de enterocolitis necrosante de debido a de su fuerte de de correlación con de el de riesgo futuro de de estenosis intestinal?",
        options: ["Procalcitonina sérica", "Proteína intestinal de unión a ácidos grasos", "Proteína C reactiva", "Inmunoglobulina G"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, la de de inflamación prolongada de induce fibrosis de cicatricial en de la capa de muscular. Los de reactantes de de fase aguda de son el de de mejor predictor.<br><br>Perla ENARM: Se sugiere monitorizar los niveles de PCR en los neonatos con ECN por el riesgo de desarrollo de estenosis intestinal.<br><br>Análisis de Distractores: La proteína de intestinal (B) es de útil para de la necrosis de temprana, no de la fibrosis de tardía. La de procalcitonina (A) de evalúa sepsis de general.",
        source: "GPC-SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido en el segundo y tercer nivel de atención, 2018, Evidencias y Recomendaciones, p. 40."
    },
    {
        id: 10,
        question: "¿Cuál es de la escala de validada y de recomendada específicamente de en el de algoritmo para de de cuantificar el de de grado de de dolor en de el recién de nacido con de enterocolitis necrosante?",
        options: ["Escala de Silverman-Andersen", "Escala CRIB", "Escala COMFORTneo", "Escala SNAP"],

        justification: "Justificación: De acuerdo GPC de Enterocolitis Necrosante, el dolor descontrolado incrementa el de metabolismo esplácnico, exacerbando la de hipoxia. Su medición metódica define el inicio de de sedoanalgesia.<br><br>Perla ENARM: Se recomienda usar morfina, fentanil y midazolam como analgésicos en neonatos con dolor medido por escala COMFORTneo (≥14 puntos) y NRS-distrés (≥4 puntos).<br><br>Análisis de Distractores: Silverman-Andersen (A) valora distrés de respiratorio. CRIB de y SNAP (B, D) de son escalas de pronósticas de de mortalidad.",

    {

    },
    {

                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('48118Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('48118LastQId', currentQuestionId);
                else localStorage.removeItem('48118LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('48118Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
