    <script>
        const questionsData = [
            {
                id: 1, 
                question: "En Hipertensión Arterial Sistémica, ¿cuál es el hallazgo clínico o paraclínico que sugiere daño a órgano blanco tipo rigidez arterial según la GPC?", 
                options: ["Microalbuminuria positiva", "Velocidad de onda >10 m/s", "Índice tobillo-brazo <0.9", "Tasa de filtrado <60"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial en el Primer Nivel, la búsqueda intencionada de daño a órgano blanco (DOB) es fundamental para la estratificación del riesgo. La rigidez arterial se evidencia clínicamente con una presión de pulso ≥ 60 mmHg en >60 años o una velocidad de onda de pulso carotideo-femoral > 10 m/s.<br><br>Perla ENARM: \"El médico familiar debe buscar de manera intencionada daño a órgano blanco: Rigidez arterial (presión pulso en personas >60 años, ≥ 60 mmHg y velocidad de onda de pulso carotideo-femoral > 10 m/s).\"<br><br>Análisis de Distractores: La microalbuminuria positiva (A) y la tasa de filtrado <60 (D) indican daño renal moderado, no rigidez arterial. El índice tobillo-brazo <0.9 (C) indica enfermedad arterial periférica.", 
                source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento de la Hipertensión Arterial en el Primer Nivel de Atención, 2021, Diagnóstico, Página 32." 
            },
            {
                id: 2, 
                question: "Según la GPC de obesidad, ¿cuál es el hallazgo o criterio absoluto que por sí solo indica la necesidad inminente de tratamiento quirúrgico (cirugía bariátrica), incluso en ausencia de otras enfermedades?", 
                options: ["Falla a dieta mayor a 1 año", "Índice de Masa Corporal > 35", "Índice de Masa Corporal > 40", "Circunferencia de cintura > 110 cm"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento del Sobrepeso y Obesidad, la obesidad grado III (mórbida) es un padecimiento mecánico y metabólico tan severo que la morbimortalidad subyacente requiere resolución anatómica/quirúrgica tras la falla del tratamiento médico conservador, independientemente de si hay diabetes o hipertensión evidentes.<br><br>Perla ENARM: \"Los candidatos a Cirugía bariátrica deben ser adultos con un IMC > 40 kg/m2, o con un IMC de 35 a 39.9 kg/m2 con al menos una comorbilidad severa...\"<br><br>Análisis de Distractores: El Índice > 35 (B) requiere la presencia ineludible de comorbilidades. La falla a la dieta (A) es criterio para escalamiento farmacológico. La cintura (D) denota riesgo pero no es indicación de bisturí por sí sola.", 
                source: "GPC-IMSS-046-18, Diagnóstico y Tratamiento del Sobrepeso y Obesidad Exógena, 2018, Tratamiento, p. 30." 
            },
            {
                id: 3, 
                question: "¿Cuál es el dato oftalmológico patognomónico que permite apoyar el diagnóstico diferencial de la Enfermedad de Fabry al ser visualizado con lámpara de hendidura?", 
                options: ["Catarata cortical anterior", "Córnea verticillata", "Luxación del cristalino", "Edema de papila"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedad de Fabry, las opacidades en el epitelio y estroma corneal basal en un patrón característico de remolino son extremadamente prevalentes y un dato pivote esencial no invasivo ante la presencia de dolor neuropático y fallo orgánico no filiado en la juventud.<br><br>Perla ENARM: \"Una revisión sistemática evaluó la córnea verticillata (CV)... la prevalencia agrupada de CV fue del 69% (rango 26-96). Los datos específicos por género, revelan una prevalencia combinada de 74% para los hombres y 66% para las mujeres\".<br><br>Análisis de Distractores: La Catarata cortical (Opción A) no es el tipo clásico en Fabry, donde domina la catarata subcapsular posterior. La Luxación del cristalino (Opción C) orienta hacia conectivopatías como Marfan o Síndrome de Ehlers-Danlos. El Edema de papila (Opción D) señala urgencias por hipertensión endocraneal, no depósito lisosomal directo corneal.", 
                source: "IMSS-165-09, Diagnóstico, Tratamiento y Seguimiento multidisciplinario en enfermedad de Fabry, 2017, Manifestaciones oftalmológicas, Página 33." 
            },
            {
                id: 4, 
                question: "En Hemofilia, ¿cuál es el hallazgo de laboratorio inicial que integra el diagnóstico presuntivo?", 
                options: ["Tiempo de sangrado prolongado", "Tiempo de Protrombina prolongado", "Tiempo de Tromboplastina prolongado", "Disminución de plaquetas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Hemofilia A y B, en los pacientes con sospecha de la enfermedad, la vía intrínseca de la coagulación se encuentra afectada por el déficit funcional o cuantitativo del Factor VIII o IX. Esto provoca que la biometría hemática con plaquetas y el Tiempo de Protrombina (TP) resulten normales, existiendo una prolongación aislada del Tiempo de Tromboplastina Parcial activado (TTPa).<br><br>Perla ENARM: \"Se recomienda que en el paciente con trastorno de la coagulación realizar BHC con cuenta de plaquetas, TP y TTPa, con diluciones y correcciones. Sospechar hemofilia sí sólo está prolongado el TTPa y corrige con mezclas de plasma fresco.\"<br><br>Análisis de Distractores: A (Tiempo de sangrado prolongado): Incorrecto, porque el tiempo de sangrado evalúa la hemostasia primaria (función de las plaquetas y factor de von Willebrand), la cual permanece intacta en la hemofilia. B (Tiempo de Protrombina prolongado): Incorrecto, ya que el TP evalúa de forma exclusiva la vía extrínseca (Factor VII) y común, mismas que no están afectadas en esta patología. D (Disminución de plaquetas): Incorrecto, el conteo de plaquetas en un paciente hemofílico sin complicaciones asociadas siempre debe encontrarse dentro de los parámetros normales.", 
                source: "IMSS-178-09, Diagnóstico y Tratamiento Hemofilia A y B, 2017, Evidencias y Recomendaciones, p. 14." 
            },
            {
                id: 5, 
                question: "En el diagnóstico diferencial de los niveles de riesgo por fluidos biológicos, ¿cuáles secreciones son descritas por la GPC como libres de riesgo para transmisión en la Exposición Laboral al VIH (no ameritando profilaxis) a menos que contengan sangre macroscópica?", 
                options: ["Líquido amniótico y pericárdico", "Secreciones vaginales y semen", "Líquido cefalorraquídeo y sinovial", "Heces, sudor y orina"], 
                answer: 3, 
                justification: "Justificación: No todos los fluidos corporales fungen como vehículos eficientes para sostener la sobrevida del retrovirus; los ambientes hostiles (pH extremos, lisis enzimática) destruyen la cápside celular. De acuerdo a la GPC de Exposición Laboral al VIH, clasificar erróneamente un fluido inocuo como riesgo alto somete a estrés emocional y gasto innecesario al profesional de la salud.<br><br>Perla ENARM: \"No se considera que otros fluidos corporales como las heces, secreciones nasales, saliva, esputo, sudor, lágrimas, orina y el vómito, puedan potencialmente transmitir el VIH, a menos que se encuentren con sangre visible.\"<br><br>Análisis de Distractores: El líquido amniótico, pericárdico, cefalorraquídeo y sinovial son clasificados oficialmente por los CDC como fluidos estériles \"potencialmente infecciosos\", por lo que un contacto percutáneo directo (ej. punción lumbar) sí requeriría evaluación. El semen y las secreciones vaginales portan alto riesgo patogénico en exposiciones mucosas o de contacto directo, requiriendo su análisis epidemiológico riguroso.", 
                source: "IMSS-241-12, Prevención, Diagnóstico y Tratamiento de la Exposición Laboral al VIH en Trabajadores de la Salud, 2017, Sección: Transmisión Laboral (Ocupacional) del VIH, Página 16." 
            },
            {
                id: 6, 
                question: "En la Infección por el VIH, ¿cuál es el hallazgo de laboratorio inicial que establece el diagnóstico presuntivo y requiere de una prueba confirmatoria?", 
                options: ["Prueba rápida de saliva", "Enzima Inmunoanálisis (ELISA) reactivo", "Carga viral RNA detectable", "Inmunotransferencia (Western Blot) positiva"], 
                answer: 1, 
                justification: "Justificación: La evaluación inicial exige métodos de tamizaje de alta sensibilidad antes de proceder a pruebas más costosas. De acuerdo a la GPC de Infección por el VIH, el protocolo diagnóstico inicia siempre con una prueba de tamizaje, siendo el ELISA el estándar de primer paso, reservando la Inmunotransferencia (Western Blot) o la Carga Viral para la confirmación diagnóstica definitiva.<br><br>Perla ENARM: \"Cuando se sospecha de infección por el VIH, al identificar factores de riesgo y comorbilidades, solicitar una prueba de ELISA para VIH, y de ser positiva, realizar una prueba confirmatoria.\"<br><br>Análisis de Distractores: La prueba de saliva no es el estándar inicial recomendado por la GPC en el entorno hospitalario general. La Carga Viral y la Inmunotransferencia (Western Blot) son pruebas confirmatorias (no presuntivas), indicadas únicamente después de obtener un tamizaje reactivo para evitar falsos positivos y optimizar recursos.", 
                source: "IMSS-245-09, Tratamiento Antirretroviral del Paciente Adulto con Infección por el VIH, 2017, Evaluación Inicial y Subsecuente, Página 47." 
            },
            {
                id: 7, 
                question: "¿Cuál es la entidad clínica que representa el principal diagnóstico diferencial de sospecha al evaluar un carcinoma basocelular de variante clínica pigmentada?", 
                options: ["Enfermedad de Bowen", "Melanoma maligno", "Queratosis actínica", "Carcinoma epidermoide"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Carcinoma Basocelular, la captación de pigmento aberrante (café, azul o grisáceo) rompe el fenotipo translúcido habitual de las células basales, simulando clínica y dermatoscópicamente la principal neoplasia cutánea letal.<br><br>Perla ENARM: \"Variante Pigmentado: Neoformación exofítica de color café, azul y grisácea. Puede ser nodular o superficial y puede semejar a un melanoma maligno.\"<br><br>Análisis de Distractores: La enfermedad de Bowen (A) y la queratosis actínica (C) son diagnósticos diferenciales clásicos de la variante de carcinoma basocelular superficial, no del pigmentado. El carcinoma epidermoide (D) frecuentemente se asocia a queratosis y ulceración agresiva, rara vez intensamente pigmentado desde su inicio.", 
                source: "GPC-IMSS-360-19, Diagnóstico y Tratamiento del Carcinoma Basocelular, 2019, Sección: Cuadro 1. Variantes clínicas e histológicas, Página 34." 
            },
            {
                id: 8, 
                question: "En la evaluación clínica inicial de la toxicidad ocular por hidroxicloroquina, ¿cuál es el signo oftalmológico que se ha reportado como la primera manifestación de daño irreversible en pacientes con dosis máximas recomendadas?", 
                options: ["Maculopatía en ojo de buey", "Pérdida del reflejo foveal", "Córnea verticillata por depósitos", "Atrofia retiniana peripapilar extensa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención de toxicidad ocular por antimaláricos, las primeras manifestaciones clínicas pueden pasar desapercibidas si no se realiza un examen intencionado; sin embargo, en seguimientos a largo plazo, la pérdida del reflejo foveal se instaura como el primer dato de toxicidad retiniana establecida antes de cambios maculares gruesos.<br><br>Perla ENARM: \"En un estudio prospectivo de pacientes que toman la dosis máxima recomendada de 6.5mg/kg/día, la incidencia de retinopatía con daño irreversible por hidroxicloroquina fue de 2 casos en 400 pacientes, que recibieron tratamiento por más de 6 años, y el primer dato de toxicidad fue la pérdida del reflejo foveal.\"<br><br>Análisis de Distractores: La \"Maculopatía en ojo de buey\" (A) y la \"Atrofia retiniana\" (D) son manifestaciones de toxicidad tardía y avanzada. La \"Córnea verticillata\" (C) es un hallazgo secundario al depósito del fármaco en el segmento anterior, pero es reversible y no se considera un marcador de daño retiniano irreversible.", 
                source: "IMSS-431-11, Prevención de toxicidad ocular por cloroquina e hidroxicloroquina, 2017, Evidencias y Recomendaciones (Diagnóstico), p. 37." 
            },
            {
                id: 9, 
                question: "¿Cuál es el dato paraclínico clave que permite diagnosticar intoxicación por vitamina D como diferencial en raquitismo carencial?", 
                options: ["Paratohormona suprimida", "Paratohormona elevada", "Hipocalciuria", "Fosfatasa alcalina alta"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Raquitismo Carencial, ante concentraciones extremas por iatrogenia se produce una hipercalcemia severa que, mediante retroalimentación negativa, apaga completamente la glándula paratiroidea.<br><br>Perla ENARM: \"La intoxicación por vitamina D se define como el estado en el que la concentración de (OH) D es >100 ng/ml y se acompaña de hipercalcemia, hipercalciuria y supresión aparente de PTH\".<br><br>Análisis de Distractores: La paratohormona elevada (B) y la fosfatasa alcalina alta (D) son típicos del raquitismo carencial o por deficiencia, no de la intoxicación. En la toxicidad por vitamina D se presenta hipercalciuria para intentar excretar el exceso de calcio, no hipocalciuria (C).", 
                source: "GPC-IMSS-459-19, Prevención, diagnóstico y tratamiento del Raquitismo Carencial, 2019, Tratamiento, p. 36." 
            },
            {
                id: 10, 
                question: "En Rubéola, ¿cuál es el signo clínico que integra el diagnóstico presuntivo de forma temprana?", 
                options: ["Faringe con exudado purulento", "Manchas de Koplik en mucosa", "Adenopatías retroauriculares dolorosas", "Lengua en fresa prominente"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención de la Rubéola, el diagnóstico presuntivo se basa en el cuadro clínico clásico del exantema maculopapular céfalo-caudal acompañado de inflamación ganglionar específica. Esta patología viral se distingue de otras enfermedades exantemáticas por el sitio de las adenopatías.<br><br>Perla ENARM: \"Ganglios linfáticos inflamados y dolorosos al tacto, generalmente en la parte posterior del cuello y detrás de las orejas\".<br><br>Análisis de Distractores: Las manchas de Koplik son patognomónicas del Sarampión. El exudado purulento y la lengua en fresa son característicos de etiologías bacterianas como la Escarlatina (por Estreptococo del Grupo A), las cuales fungen como diagnósticos diferenciales.", 
                source: "IMSS-469-11, Prevención, Diagnóstico y Tratamiento de la Rubéola en Primer Nivel de Atención, 2017, Sección 4.2.2 Signos y Síntomas, Página 20." 
            },
       ];
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ExMI10LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExMI10Progress');
                localStorage.removeItem('ExMI10LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-purple-500 shadow-md z-10 border-purple-500 dark:border-purple-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

                : `<button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-fuchsia-500 to-purple-600 hover:from-purple-600 hover:to-fuchsia-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-purple-900/30 transition-transform hover:-translate-y-0.5">Continuar Aprendiendo</button>`;

            let badgeText = isAllCompleted ? "¡100% Completado! ENARM 2026" : "PREPARACIÓN ENARM 2026";
            let badgeClass = isAllCompleted ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";
            let titleText = isAllCompleted ? "¡Examen Finalizado!" : "MEDICINA INTERNA";
            let descText = isAllCompleted 
                ? "Has completado con éxito todas las preguntas. Revisa tus las respuestas correctas/incorrectas en el tablero."

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-6xl mx-auto lg:mt-0">
                    
                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-purple-600 dark:text-slate-400 dark:hover:text-purple-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>

                    </div>

                    <!-- HERO DYNAMIC -->
                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500 ${isAllCompleted ? 'ring-2 ring-emerald-500/50' : ''}">
                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>

                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="Ex_MI15.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>

        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
