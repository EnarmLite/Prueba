    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Qué lugar ocupa el linfoma de Hodgkin respecto a la incidencia general de neoplasias pediátricas en México?",
        options: ["Tercer lugar", "Segundo lugar", "Primer lugar", "Cuarto lugar"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, esta patología es el segundo tipo más frecuente de cáncer en la población pediátrica a nivel nacional, superado únicamente por las leucemias, alcanzando una incidencia de 4.5 casos por cada 100,000 habitantes.<br><br>Perla ENARM: \"En México, el Linfoma de Hodgkin es el segundo tipo más frecuente de cáncer en la población pediátrica, solo por detrás de las leucemias.\"<br><br>Análisis de Distractores: Las leucemias ocupan el primer lugar absoluto. Las opciones de tercer y cuarto lugar son incorrectas epidemiológicamente en el contexto nacional para población pediátrica global, aunque los tumores del sistema nervioso central suelen alternar posiciones de alta incidencia según el grupo etario específico.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Epidemiología, Página 1."
    },
    {
        id: 2,
        question: "¿En qué porcentaje específico de pérdida de peso a lo largo de 6 meses se define clínicamente la presencia de este síntoma B?",
        options: ["≥ 5 %", "≥ 15 %", "≥ 10 %", "≥ 20 %"],
        answer: 2,
        justification: "Justificación: El abordaje diagnóstico estratifica el riesgo basado en los síntomas constitucionales. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, la pérdida de peso sin causa aparente debe ser igual o superior al 10% del peso corporal en un lapso de 6 meses para considerarse un síntoma B válido.<br><br>Perla ENARM: \"Existen tres síntomas constitucionales específicos (síntomas B): fiebre inexplicable > 38 °C, pérdida de peso ≥ 10 % en 6 meses y diaforesis nocturna.\"<br><br>Análisis de Distractores: Valores menores como 5% no alcanzan el umbral de significancia oncológica constitucional. Porcentajes mayores como 15% o 20% son indicadores de caquexia avanzada pero no representan el punto de corte definitorio para estadificación internacional de Lugano.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Diagnóstico, Página 2."
    },
    {
        id: 3,
        question: "¿Cuál es el riesgo estimado de desarrollar la neoplasia si el paciente es gemelo monocigótico de un caso índice?",
        options: ["15 veces mayor", "3.3 veces mayor", "21 veces mayor", "57 veces mayor"],
        answer: 3,
        justification: "Justificación: El componente genético es altamente predisponente en esta patología linfoproliferativa. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, los gemelos monocigóticos del mismo sexo presentan un riesgo significativamente superior, con una razón de incidencia estandarizada de 57 veces.<br><br>Perla ENARM: \"Se ha observado que los gemelos monocigóticos presentan un riesgo significativamente superior de desarrollar LH, con una razón de incidencia estandarizada de 57 veces.\"<br><br>Análisis de Distractores: Un incremento de 3.3 veces corresponde al riesgo conferido por antecedentes familiares en hermanos no gemelos o padres. Los valores de 15 y 21 no son los promedios estandarizados establecidos para la concordancia monocigótica.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Factores de Riesgo, Página 1."
    },
    {
        id: 4,
        question: "¿Cuál es el estándar de oro actual para establecer la confirmación diagnóstica de la enfermedad?",
        options: ["Biopsia excisional de ganglio periférico", "Citología por aspiración con aguja fina", "Tomografía por emisión de positrones", "Biopsia por sacabocado cutáneo profundo"],
        answer: 0,
        justification: "Justificación: Para la correcta clasificación histológica se requiere la evaluación de la arquitectura completa del ganglio. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, el diagnóstico definitivo exige una biopsia excisional, contraindicando técnicas de menor calibre.<br><br>Perla ENARM: \"El diagnóstico de Linfoma de Hodgkin debe establecerse mediante la biopsia excisional de uno o más ganglios linfáticos periféricos. La prueba citológica por aspiración no se recomienda.\"<br><br>Análisis de Distractores: La citología por aspiración se rechaza por la escasez de células neoplásicas (células de Reed-Sternberg) respecto al tejido reactivo de fondo. La tomografía por emisión de positrones evalúa extensión, no histología.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Diagnóstico, Página 3."
    },
    {
        id: 5,
        question: "De acuerdo con la estadificación de Lugano, ¿qué parámetro torácico define la presencia de enfermedad voluminosa (modificador X)?",
        options: ["Masa tumoral > 5 cm de diámetro", "Invasión a la vasculatura hiliar", "Enfermedad mediastinal > 1/3 del diámetro anteroposterior", "Desplazamiento traqueal > 2 cm"],
        answer: 2,
        justification: "Justificación: El volumen tumoral es un modificador crítico que impacta directamente en el grupo de riesgo terapéutico. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, el modificador X incluye ganglios mayores de 10 cm o un ensanchamiento mediastinal severo.<br><br>Perla ENARM: \"X: Enfermedad ganglionar mayor a 10 cm o enfermedad mediastinal mayor de 1/3 del diámetro anteroposterior.\"<br><br>Análisis de Distractores: Una masa de 5 cm no cumple la definición de \"Bulky disease\" (> 10 cm). La invasión vascular y el desplazamiento traqueal representan complicaciones de efecto de masa (ej. síndrome de vena cava superior), pero no son los criterios métricos estrictos de Lugano para el modificador X.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Estadificación, Página 5."
    },
    {
        id: 6,
        question: "¿Qué marcadores inmunofenotípicos celulares son característicos y positivos en la variante clásica de esta neoplasia?",
        options: ["CD20+, CD45+, CD79a+", "CD3+, CD15-, CD30-", "CD15+, CD30+, PAX5+", "BCL6+, CD3+, CD45+"],
        answer: 2,
        justification: "Justificación: La identificación de las células de Reed-Sternberg requiere inmunohistoquímica específica. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, la variante clásica pierde marcadores pan-B y pan-leucocitarios tradicionales, expresando antígenos de activación.<br><br>Perla ENARM: \"El inmunofenotipo para el diagnóstico de LH clásico se caracteriza por la expresión habitual de CD15+, CD30+, PAX5+ y es negativo para CD3-, CD20-, CD45- y CD79a-.\"<br><br>Análisis de Distractores: El panel CD20+, CD45+, CD79a+, BCL6+ corresponde al Linfoma de Hodgkin de predominio linfocitario nodular, no al clásico. El marcador CD3 evalúa linaje T, consistentemente negativo en ambas variantes hodgkinianas.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Diagnóstico, Página 3."
    },
    {
        id: 7,
        question: "¿Cuáles son los límites anatómicos estrictos para el rastreo inicial con PET-CT con 18F-FDG en estos pacientes?",
        options: ["De la base del cráneo a la mitad del muslo", "Del vértice del cráneo a los tobillos", "Del cuello superior a la sínfisis del pubis", "Del ángulo mandibular a las rodillas"],
        answer: 0,
        justification: "Justificación: El estudio funcional de elección estandariza su campo de visión para detectar actividad metabólica en los principales nichos ganglionares y viscerales. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, el barrido no requiere cuerpo completo extendido salvo indicaciones especiales.<br><br>Perla ENARM: \"El procedimiento de imagen funcional recomendado para la estadificación inicial es la tomografía por emisión de positrones con 18F-FDG, que debe realizarse desde la base del cráneo hasta la mitad del muslo.\"<br><br>Análisis de Distractores: Barridos de vértice a tobillos (\"total body\") aumentan la exposición a radiación innecesariamente en la población pediátrica. Los rangos limitados a hueco pélvico omitirían posibles adenopatías inguinales o femorales altas.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Diagnóstico, Página 3."
    },
    {
        id: 8,
        question: "Según el Children's Oncology Group, ¿qué combinación de estadios y variables define a un paciente de bajo riesgo?",
        options: ["IA y IB con enfermedad extraganglionar", "IIA, IIB y IIIA", "IA y IIA sin modificadores E o X", "IB, IIB y compromiso esplénico"],
        answer: 2,
        justification: "Justificación: La ausencia de enfermedad voluminosa y de diseminación extraganglionar es determinante para escalar el esquema. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, los únicos que califican como bajo riesgo absoluto son los estadios localizados tempranos asintomáticos.<br><br>Perla ENARM: \"Bajo riesgo: Estadios IA y IIA (no E, no X).\"<br><br>Análisis de Distractores: Cualquier modificador X (voluminosa), E (extraganglionar adyacente) o presencia de síntomas B traslada automáticamente al paciente, como mínimo, al grupo de riesgo intermedio. Los estadios III y IV son de riesgo intermedio o alto según síntomas B.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Estadificación, Página 5."
    },
    {
        id: 9,
        question: "¿Cuál es la dosificación indicada del factor estimulante de colonias de granulocitos (Filgastrim) como terapia de soporte primario?",
        options: ["5 mcg/kg por 3 dosis", "15 mcg/kg por 7 dosis", "10 mcg/kg por 5 dosis", "20 mcg/kg por 2 dosis"],
        answer: 2,
        justification: "Justificación: La profilaxis de neutropenia febril es obligatoria dados los regímenes mielosupresores utilizados. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, se debe instaurar el rescate granulocítico de manera protocolizada tras cada ciclo.<br><br>Perla ENARM: \"Terapia de soporte: Filgastrim 10 mcg/kg por 5 dosis.\"<br><br>Análisis de Distractores: Dosis menores (5 mcg/kg) se utilizan habitualmente en profilaxis de adulto convencional, pero el esquema pediátrico intensivo exige los 10 mcg/kg. Tiempos menores a 5 días resultan en una recuperación medular subóptima, retrasando el siguiente ciclo de quimioterapia.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Tratamiento, Página 6."
    },
    {
        id: 10,
        question: "¿Cuál es la frecuencia del ecocardiograma en el seguimiento a largo plazo para un paciente que recibió una dosis acumulada de antracíclicos < 250 mg/m²?",
        options: ["Cada 2 años", "Cada año", "Cada 5 años", "Cada 10 años"],
        answer: 2,
        justification: "Justificación: Las antraciclinas generan toxicidad miocárdica dependiente de la dosis acumulada. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, la vigilancia se espacia a un lustro cuando no se sobrepasa el umbral crítico de toxicidad exponencial.<br><br>Perla ENARM: \"Cardiotoxicidad: Realizar ecocardiograma cada 5 años en pacientes con dosis acumulada de antracíclicos inferior a 250 mg/m².\"<br><br>Análisis de Distractores: Si la dosis supera los 250 mg/m², el control ecocardiográfico debe realizarse cada 2 años. Si el paciente recibió antraciclinas concomitantes con radioterapia torácica, la frecuencia es estricta y obligatoria de forma anual.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Seguimiento, Página 9."
    },
    {
        id: 11,
        question: "¿Qué dosis umbral de radioterapia cervical obliga a iniciar el escrutinio anual con ultrasonido para descartar cáncer tiroideo?",
        options: ["> 15 Gy", "> 10 Gy", "> 5 Gy", "> 20 Gy"],
        answer: 1,
        justification: "Justificación: La glándula tiroides infantil es altamente radio-susceptible. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, el antecedente de irradiación a cuello por arriba del umbral bajo de toxicidad dicta una evaluación anatómica y funcional a largo plazo.<br><br>Perla ENARM: \"Ultrasonido tiroideo: anual para pacientes que hayan recibido radioterapia en el cuello con una dosis superior a 10 Gy.\"<br><br>Análisis de Distractores: Dosis menores a 10 Gy tienen menor riesgo oncogénico secundario directo demostrable. 20 Gy representa una dosis terapéutica habitual en enfermedad residual, pero el seguimiento se activa desde los 10 Gy.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Seguimiento, Página 9."
    },
    {
        id: 12,
        question: "Tras aplicar un esquema de rescate y obtener una respuesta metabólica completa en enfermedad refractaria, ¿cuál es la conducta terapéutica consolidativa subsecuente?",
        options: ["Radioterapia cervical exclusiva", "Inmunoterapia de mantenimiento", "Trasplante alogénico de médula ósea", "Trasplante autólogo de células hematopoyéticas"],
        answer: 3,
        justification: "Justificación: La curación en segundas líneas depende de la intensidad de dosis. De acuerdo al PRONAM de Linfoma de Hodgkin pediátrico, la quimioterapia mieloablativa rescatada con células progenitoras del propio paciente es el tratamiento definitivo post-inducción de rescate exitosa.<br><br>Perla ENARM: \"Evaluación al finalizar 4 ciclos en pacientes refractarios o recaída: Con respuesta completa, trasplante autólogo de células hematopoyéticas.\"<br><br>Análisis de Distractores: El trasplante alogénico asume un riesgo inaceptable de mortalidad por injerto contra huésped y no es la primera línea de consolidación post-recaída sensible en esta patología. La radioterapia sola no erradica el clon sistémico resistente.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Linfoma de Hodgkin, 2024, Algoritmo Tratamiento, Página 6."
    },
    {
        id: 13,
        question: "En el abordaje protocolizado, ¿qué pilar terapéutico está explícitamente omitido del esquema de tratamiento en los pacientes clasificados como riesgo bajo?",
        options: ["Antraciclinas intravenosas", "Radioterapia consolidativa", "Corticoesteroides sistémicos", "Alcaloides de la vinca"],
        answer: 1,

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('LINFOOProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('LINFOOLastQId', currentQuestionId);
                else localStorage.removeItem('LINFOOLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('LINFOOProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
