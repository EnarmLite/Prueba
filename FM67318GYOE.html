    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el punto de corte densitométrico mediante absorciometría de rayos X dual para establecer el diagnóstico de osteoporosis?", 
                options: ["Índice T ≤ -1.0", "Índice T ≤ -2.0", "Índice T ≤ -2.5", "Índice T ≤ -3.0"], 
                answer: 2, 
                justification: "Justificación: El diagnóstico densitométrico evalúa la falla en la resistencia ósea y el riesgo de fractura. De acuerdo a la GPC de Osteoporosis Posmenopáusica, se establece el umbral diagnóstico formal en una pérdida mineral significativa que corresponde a 2.5 desviaciones estándar por debajo de la media poblacional joven.<br><br>Perla ENARM: \"Osteoporosis: índice T -2.5 DE o menor.\"<br><br>Análisis de Distractores: La opción A corresponde al límite para diagnosticar osteopenia (-1.0 a -2.5). Las opciones B y D son valores numéricos arbitrarios que no definen un punto de corte internacional en la densitometría ósea.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Diagnóstico, Página 35." 
            },
            {
                id: 2, 
                question: "¿A partir de qué edad cronológica se recomienda el tamizaje universal con absorciometría de rayos X dual en mujeres posmenopáusicas?", 
                options: ["50 años", "55 años", "60 años", "65 años"], 
                answer: 3, 
                justification: "Justificación: La edad avanzada es un factor de riesgo independiente y progresivo para la pérdida ósea. De acuerdo a la GPC de Osteoporosis Posmenopáusica, el escrutinio primario mediante el estudio de imagen estándar de oro se universaliza en esta cohorte etaria sin necesidad de justificar factores de riesgo adicionales.<br><br>Perla ENARM: \"Se recomienda medir la DMO por DXA: En mujeres de 65 años y más.\"<br><br>Análisis de Distractores: Las opciones A, B y C son edades en las que el tamizaje solo está justificado si la paciente presenta factores de riesgo clínicos concomitantes (como uso de glucocorticoides, bajo peso o fracturas previas).", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Diagnóstico, Página 34." 
            },
            {
                id: 3, 
                question: "En la evaluación del riesgo absoluto mediante FRAX, ¿qué probabilidad a 10 años para fractura osteoporótica mayor clasifica a la paciente en alto riesgo?", 
                options: ["≥ 3%", "≥ 10%", "≥ 15%", "≥ 20%"], 
                answer: 3, 
                justification: "Justificación: La herramienta FRAX estratifica la probabilidad de fracturas a una década para guiar intervenciones farmacológicas tempranas. De acuerdo a la GPC de Osteoporosis Posmenopáusica, el límite umbral validado para intervenir ante una fractura mayor (vertebral, húmero, antebrazo o pelvis) requiere una predicción probabilística alta.<br><br>Perla ENARM: \"La probabilidad a 10 años de fractura de cadera es ≥ 3% y/o de fractura osteoporótica mayor es ≥ 20%.\"<br><br>Análisis de Distractores: La opción A (3%) es el límite específico pero para fractura de cadera. Las opciones B y C son porcentajes que clasifican a las pacientes en riesgo bajo o moderado, requiriendo solo medidas preventivas.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Evaluación, Página 30." 
            },
            {
                id: 4, 
                question: "¿Qué magnitud de pérdida de estatura histórica documentada obliga a solicitar una radiografía lateral de columna para descartar fracturas vertebrales?", 
                options: ["≥ 4 cm", "≥ 3 cm", "≥ 2 cm", "≥ 1 cm"], 
                answer: 0, 
                justification: "Justificación: La pérdida de talla refleja el colapso y acuñamiento de los cuerpos vertebrales secundario a la resorción trabecular. De acuerdo a la GPC de Osteoporosis Posmenopáusica, la discrepancia entre la talla máxima recordada en la juventud y la medición actual es un indicador clínico mandatorio para escrutinio radiográfico.<br><br>Perla ENARM: \"Antecedente de pérdida de estatura de ≥ 4 cm de la talla más alta recordada.\"<br><br>Análisis de Distractores: La opción C (2 cm) es indicación válida pero en el escenario de pérdida de estatura prospectiva (durante el seguimiento clínico continuado). Las opciones B y D no cumplen el umbral de significancia diagnóstica establecido.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Diagnóstico, Página 44." 
            },
            {
                id: 5, 
                question: "¿Cuál es el tratamiento farmacológico de primera línea recomendado para reducir de forma integral el riesgo de fractura de cadera y columna?", 
                options: ["Moduladores selectivos de estrógenos", "Bifosfonatos por vía oral", "Análogos de hormona paratiroidea", "Anticuerpos monoclonales subcutáneos"], 
                answer: 1, 
                justification: "Justificación: El manejo inicial exige una inhibición potente y sostenida de la actividad osteoclástica. De acuerdo a la GPC de Osteoporosis Posmenopáusica, este grupo farmacológico ha demostrado la mejor relación costo-efectividad para la reducción integral de fracturas vertebrales y no vertebrales en la mayoría de las pacientes.<br><br>Perla ENARM: \"Los medicamentos recomendados para reducir el riesgo de fractura de cadera, de columna vertebral y no vertebral de primera línea para la mayoría de las personas con osteoporosis posmenopáusica son los bifosfonatos: alendronato, risedronato y ácido zoledrónico.\"<br><br>Análisis de Distractores: La opción A se reserva para prevención de pérdida ósea en pacientes con riesgo concomitante de cáncer de mama. Las opciones C y D son alternativas de segunda línea para fallos terapéuticos o contraindicaciones renales severas.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Tratamiento, Página 69." 
            },
            {
                id: 6, 
                question: "¿Cuál condición clínica constituye una contraindicación absoluta para la administración de alendronato por vía oral?", 
                options: ["Antecedente de cáncer de mama", "Incapacidad de bipedestación", "Filtración glomerular de 50 ml/min", "Índice de masa corporal bajo"], 
                answer: 1, 
                justification: "Justificación: Los antirresortivos orales de este grupo tienen un efecto altamente erosivo y cáustico sobre la mucosa gastrointestinal. De acuerdo a la GPC de Osteoporosis Posmenopáusica, se exige garantizar el tránsito esofágico rápido hacia el estómago mediante una postura erguida o sentada durante un tiempo mínimo definido.<br><br>Perla ENARM: \"Contraindicaciones: Imposibilidad para mantenerse de pie o sentado por al menos 30 minutos tras administración oral del fármaco.\"<br><br>Análisis de Distractores: La opción A no contraindica el fármaco. La opción C es incorrecta porque la contraindicación se establece con tasas menores a 35 ml/min. La opción D es un factor de riesgo originario para la enfermedad, no una limitante farmacológica.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Anexos, Página 106." 
            },
            {
                id: 7, 
                question: "Como medida no farmacológica en mujeres posmenopáusicas, ¿cuál es la ingesta diaria de calcio recomendada preventivamente?", 
                options: ["500 a 800 mg", "800 a 1000 mg", "1000 a 1200 mg", "1500 a 2000 mg"], 
                answer: 2, 
                justification: "Justificación: Mantener la homeostasis mineral evita la estimulación secundaria de la paratohormona y la subsecuente resorción esquelética. De acuerdo a la GPC de Osteoporosis Posmenopáusica, se debe asegurar este aporte, priorizando vigorosamente las fuentes dietéticas (como los lácteos) antes de recurrir a la suplementación exógena.<br><br>Perla ENARM: \"Ingesta adecuada de calcio (1000-1200mg diarios).\"<br><br>Análisis de Distractores: Las opciones A y B reflejan cantidades insuficientes para cubrir los requerimientos acelerados de la cohorte senil. La opción D sobrepasa el umbral de seguridad e incrementa el riesgo de nefrolitiasis y calcificación cardiovascular.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Tratamiento preventivo, Página 47." 
            },
            {
                id: 8, 
                question: "¿Cuál es el aporte proteico dietético diario sugerido para mitigar la aparición de sarcopenia en pacientes con osteoporosis?", 
                options: ["0.8 a 1.0 g/kg", "0.4 a 0.6 g/kg", "1.2 a 1.5 g/kg", "1.5 a 2.0 g/kg"], 
                answer: 0, 
                justification: "Justificación: El mantenimiento de la masa muscular es vital para conservar el equilibrio y la dinámica biomecánica que previene las caídas. De acuerdo a la GPC de Osteoporosis Posmenopáusica, un consumo moderado y constante de macronutrientes estructurales garantiza la función locomotora sin sobrecargar la fisiología renal en el adulto mayor.<br><br>Perla ENARM: \"Se recomienda que las mujeres posmenopáusicas con osteoporosis tengan una ingesta promedio diaria de 0.8 a 1g/kg/día de aporte proteico para reducir la presencia de sarcopenia.\"<br><br>Análisis de Distractores: La opción B representa una dieta hipoproteica restrictiva, común en la enfermedad renal crónica severa. Las opciones C y D son ingestas hiperproteicas aptas para atletas de alto rendimiento o desnutrición clínica severa, no para tamizaje general.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Tratamiento preventivo, Página 53." 
            },
            {
                id: 9, 
                question: "¿Después de cuánto tiempo de estabilidad densitométrica se sugiere evaluar el periodo de descanso terapéutico en usuarias de bifosfonatos orales?", 
                options: ["1 a 2 años", "3 a 5 años", "10 a 15 años", "5 a 10 años"], 
                answer: 3, 
                justification: "Justificación: Los fármacos antirresortivos se incorporan profundamente en la matriz de hidroxiapatita y mantienen un efecto farmacológico residual prolongado. De acuerdo a la GPC de Osteoporosis Posmenopáusica, prolongar innecesariamente la vía oral incrementa exponencialmente los riesgos de fracturas atípicas y osteonecrosis maxilar.<br><br>Perla ENARM: \"Debido a que los bifosfonatos se quedan depositados en el hueso por largo tiempo... evaluar periodo de descanso al término del periodo (5-10 años) para bifosfonato oral.\"<br><br>Análisis de Distractores: La opción A es tiempo insuficiente para alcanzar la meseta de regeneración ósea. La option B corresponde al límite de descanso pero dictado para la terapia de infusión intravenosa. La opción C representa un uso crónico peligroso y no normado.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Anexos, Página 91." 
            },
            {
                id: 10, 
                question: "¿Cuál es la temporalidad establecida para someter a descanso farmacológico a las pacientes tratadas con ácido zoledrónico endovenoso?", 
                options: ["1 a 2 años", "Mayor a 10 años", "3 a 6 años", "6 a 10 años"], 
                answer: 2, 
                justification: "Justificación: Las formulaciones intravenosas tienen una biodisponibilidad tisular inmediata y un impacto supresor osteoclástico más severo que las vías orales. De acuerdo a la GPC de Osteoporosis Posmenopáusica, el límite de seguridad de esta infusión anual se alcanza mucho más rápido, requiriendo un cese temporal programado y estricto.<br><br>Perla ENARM: \"Bifosfonato intravenoso (ácido zoledrónico) 3-6 años.\"<br><br>Análisis de Distractores: La opción D corresponde a los tiempos aplicables a la medicación oral de absorción deficiente (alendronato/risedronato). La opción B describe usos prolongados totalmente contraindicados. La opción A no permite la consolidación de la ganancia mineral.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Anexos, Página 91." 
            },
            {
                id: 11, 
                question: "¿En qué contexto clínico particular se considera idónea la elección del raloxifeno como terapia osteológica inicial?", 
                options: ["Factores de riesgo de cáncer mamario", "Presencia de síntomas vasomotores", "Antecedente tromboembólico venoso", "Tasa de filtración glomerular baja"], 
                answer: 0, 
                justification: "Justificación: Este modulador selectivo tiene la capacidad dual de actuar como agonista en el tejido óseo y antagonista en el tejido mamario y uterino. De acuerdo a la GPC de Osteoporosis Posmenopáusica, esto permite tratar la fragilidad vertebral al tiempo que se ofrece quimioprevención oncológica sistémica en el mismo esquema.<br><br>Perla ENARM: \"Considerar el tratamiento con raloxifeno con: Factores de riesgo de cáncer de mama.\"<br><br>Análisis de Distractores: La opción B es incorrecta porque este fármaco empeora los bochornos menopáusicos. La opción C es una contraindicación absoluta, ya que eleva el riesgo de trombosis venosa. La opción D aplica para guiar el uso seguro de denosumab.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Tratamiento, Página 71." 
            },
            {
                id: 12, 
                question: "¿Cuál es el tiempo máximo de seguridad permitido para la administración continua de terapia anabólica con teriparatida?", 
                options: ["6 meses", "2 años", "1 año", "5 años"], 
                answer: 1, 
                justification: "Justificación: Los análogos de la paratohormona estimulan drásticamente la proliferación de osteoblastos, promoviendo neoformación cortical y trabecular profunda. De acuerdo a la GPC de Osteoporosis Posmenopáusica, la estimulación descontrolada y crónica del hueso se ha vinculado con la génesis de malignidad ósea y osteosarcoma en modelos médicos experimentales.<br><br>Perla ENARM: \"La duración del tratamiento con teriparatide está limitado a 2 años.\"<br><br>Análisis de Distractores: Las opciones A y C son periodos subóptimos que no logran el impacto estructural deseado de reversión tisular contra el riesgo de fracturas. La opción D excede el margen terapéutico e incrementa inaceptablemente el riesgo oncológico primario.", 
                source: "GPC-IMSS-673-18, Diagnóstico y tratamiento de osteoporosis en mujeres posmenopáusicas, 2018, Tratamiento, Página 72." 
            },
            {
                id: 13, 
                question: "En la evaluación metabólica avanzada, ¿qué marcador bioquímico se recomienda solicitar para documentar tempranamente la formación ósea?", 
                options: ["Telopéptido C-terminal sérico", "Fosfatasa alcalina total sérica", "Propéptido N-terminal de procolágeno", "Hidroxiprolina en orina de 24 horas"], 
                answer: 2,

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoFMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoFMLastQId', currentQuestionId);
                else localStorage.removeItem('gyoFMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoFMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);

    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
