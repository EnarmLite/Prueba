                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [


    {
        id: 1,
        question: "¿Cuál es el factor de riesgo ambiental fuertemente asociado a la modificación del microbioma para el desarrollo de rinitis alérgica en etapas tempranas?",
        options: ["Exposición a humo de leña", "Uso temprano de antibióticos", "Convivencia con mascotas", "Uso de purificadores de aire"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, la alteración de la flora normal durante los primeros meses de vida desvía la respuesta inmunológica hacia el fenotipo celular T cooperador 2, favoreciendo el desarrollo de atopia clínica posterior.<br><br>Perla ENARM: Los factores de riesgo que se han asociado con rinitis alérgica son: historia familiar de atopia, sexo masculino, ser primogénito, uso temprano de antibióticos, madre fumadora durante el primer año de vida y niveles de Inmunoglobulina E sérica mayores a 100 antes de los 6 años de edad.<br><br>Análisis de Distractores: La exposición al humo de leña no es el principal factor documentado para atopia primaria. La convivencia con mascotas es debatida y no presenta evidencia causal contundente. El uso de purificadores no es un factor de riesgo; es una medida de control de utilidad limitada.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Introducción, Página 20."
    },
    {
        id: 2,
        question: "¿Cuál característica demográfica y familiar establece un mayor riesgo primario para el desarrollo del fenotipo atópico respiratorio?",
        options: ["Ser el hijo menor", "Pertenecer al sexo femenino", "Ser el primogénito", "Antecedente de prematurez"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, el orden de nacimiento limita la exposición temprana a infecciones cruzadas con otros hermanos (hipótesis de la higiene), lo cual incrementa el riesgo en el primer hijo.<br><br>Perla ENARM: Los factores de riesgo incluyen ser primogénito y pertenecer al sexo masculino en la infancia.<br><br>Análisis de Distractores: Ser el hijo menor otorga un factor protector relativo. En la niñez, el sexo masculino tiene mayor predominio que el femenino. La prematurez no se lista como un factor de riesgo primario directo.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Introducción, Página 20."
    },
    {
        id: 3,
        question: "¿Qué nivel exacto de Inmunoglobulina E sérica cuantificada antes de los 6 años de edad incrementa el riesgo de rinitis alérgica?",
        options: ["Mayor a 50 UI/mL", "Mayor a 100 UI/mL", "Mayor a 200 UI/mL", "Mayor a 500 UI/mL"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, la elevación sérica temprana de este marcador biológico demuestra una sensibilización sistémica que predispone al desarrollo de hiperreactividad de mucosas.<br><br>Perla ENARM: Constituye un factor de riesgo tener niveles de Inmunoglobulina E sérica mayores a 100 UI/mL antes de los 6 años de edad.<br><br>Análisis de Distractores: Los valores de 50, 200 o 500 UI/mL no representan el punto de corte epidemiológico establecido para delimitar el factor de riesgo pediátrico.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Introducción, Página 20."
    },
    {
        id: 4,
        question: "A la inspección directa, ¿cuál es el hallazgo rinoscópico cardinal que diferencia una inflamación atópica de una infecciosa?",
        options: ["Mucosa hiperémica y congestiva", "Mucosa pálida o azulada", "Presencia de costras hemáticas", "Pólipos nasales sangrantes"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, el estasis venoso crónico secundario a la liberación de histamina provoca edema frío, reflejándose visualmente como palidez o un tono violáceo.<br><br>Perla ENARM: Se debe hacer diagnóstico cuando existan hallazgos consistentes como inflamación y coloración azulada o palidez de mucosa nasal, acompañada de hipertrofia de cornetes.<br><br>Análisis de Distractores: La hiperemia denota un origen infeccioso (rojo brillante). Las costras hemáticas indican irritación desecante o granulomatosis. Los pólipos pueden acompañar la alergia crónica, pero su sangrado sugiere etiologías alternativas o manipulaciones mecánicas.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Anexos (Cuadro 1), Página 100."
    },
    {
        id: 5,
        question: "Utilizando la escala clínica Score for Allergic Rhinitis, ¿a partir de qué puntaje numérico se fundamenta una alta probabilidad diagnóstica?",
        options: ["Mayor a 3 puntos", "Mayor a 5 puntos", "Mayor a 7 puntos", "Mayor a 10 puntos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, este cuestionario integra sintomatología y antecedentes familiares. Alcanzar este umbral validado minimiza la necesidad de serologías iniciales costosas.<br><br>Perla ENARM: Un puntaje mayor a 7 se utiliza para el diagnóstico de rinitis alérgica, basado en la curva ROC y en el índice de Youden sobre un total de 16 posibles.<br><br>Análisis de Distractores: Los umbrales de 3 o 5 son insuficientes para separar rinitis vasomotora o infecciosa episódica. Un corte de 10 disminuiría drásticamente la sensibilidad clínica.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Anexos, Página 106."
    },
    {
        id: 6,
        question: "¿Cuál es el criterio clínico absoluto para autorizar la solicitud de pruebas de Inmunoglobulina E específica (cutánea o sérica)?",
        options: ["Desde el abordaje diagnóstico inicial", "Sospecha de pólipos nasales", "Falla al tratamiento farmacológico empírico", "Previo a manejo quirúrgico septal"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, identificar el antígeno no modifica la terapia de primera línea; se reserva para justificar una inmunoterapia únicamente tras fracaso médico.<br><br>Perla ENARM: Se debe realizar e interpretar la prueba específica de Inmunoglobulina E en pacientes con diagnóstico clínico de rinitis alérgica que no respondan al tratamiento empírico.<br><br>Análisis de Distractores: El abordaje inicial es clínico cien por ciento. Ante pólipos se solicita tomografía o cirugía, no inmunología primaria. La septoplastia corrige estructuras, siendo independiente del perfil IgE.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Diagnóstico, Página 46."
    },
    {
        id: 7,
        question: "¿Qué fármaco representa la piedra angular y primera línea de tratamiento ante sintomatología que compromete la calidad de vida del paciente?",
        options: ["Antihistamínicos orales", "Antagonistas de leucotrienos", "Esteroides nasales", "Descongestivos tópicos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, para la enfermedad persistente o que causa disrupción laboral/escolar (especialmente obstructiva), la potencia antiinflamatoria tópica es superior a la sistémica.<br><br>Perla ENARM: Se debe recomendar el uso de esteroides nasales en pacientes con diagnóstico clínico de Rinitis Alérgica cuyos síntomas afecten su calidad de vida.<br><br>Análisis de Distractores: Los antihistamínicos orales abaten la rinorrea pero son débiles para obstrucción grave. Los antileucotrienos no son primera línea. Los descongestivos causan rinitis medicamentosa post 5 días.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Tratamiento, Página 55."
    },
    {
        id: 8,
        question: "¿Cuál es el manejo inicial de elección para un fenotipo clínico donde el cuadro predominante se basa en estornudos repetitivos y prurito nasal?",
        options: ["Antihistamínicos orales de segunda generación", "Esteroides nasales en dosis tope", "Antihistamínicos orales de primera generación", "Montelukast como monoterapia"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, cuando los mecanismos son mediados aguda y localmente por histamina sin remodelación mucosa severa, el bloqueo sistémico con baja penetración del SNC logra control veloz y seguro.<br><br>Perla ENARM: Se deben recomendar antihistamínicos orales de segunda generación en pacientes en que predominen síntomas como estornudos y prurito.<br><br>Análisis de Distractores: Los esteroides nasales se prefieren cuando predomina obstrucción limitante. La primera generación causa sedación extrema inaceptable en manejo crónico ambulatorio. Montelukast posee baja eficacia analítica sobre el prurito.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Tratamiento, Página 59."
    },
    {
        id: 9,
        question: "¿Qué agente terapéutico está contraindicado como monoterapia de primera elección debido a su inferioridad de eficacia clínica general?",
        options: ["Fluticasona intranasal", "Levocetirizina oral", "Antagonistas del receptor de leucotrieno", "Desloratadina oral"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, inhibir la vía de los leucotrienos impacta marginalmente los síntomas nasales frente al bloqueo H1 o esteroideo; su uso empírico inicial retrasa la curación salvo que coexista asma bronquial.<br><br>Perla ENARM: No se deben recomendar antagonistas del receptor de leucotrieno como primera línea en el tratamiento de pacientes con Rinitis Alérgica.<br><br>Análisis de Distractores: Fluticasona, levocetirizina y desloratadina conforman el arsenal primario y más potente avalado para frenar las fases temprana y tardía del padecimiento.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Tratamiento, Página 70."
    },
    {
        id: 10,
        question: "¿En qué ventana temporal exacta debe agendarse la revaloración clínica tras prescribir un régimen terapéutico empírico inicial?",
        options: ["3 a 5 días", "1 a 2 semanas", "2 a 4 semanas", "6 a 8 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, los medicamentos tópicos (esteroides) requieren semanas de acumulación tisular para revertir el remodelamiento atópico al máximo, definiendo así el verdadero éxito o fracaso médico.<br><br>Perla ENARM: El algoritmo de seguimiento demanda que la revaloración clínica por posible falla terapéutica se ejecute entre las 2 a 4 semanas de instaurado el esquema.<br><br>Análisis de Distractores: 3 a 5 días evalúa el límite de uso de descongestivos adrenérgicos. 1 a 2 semanas subestima el poder antiinflamatorio tardío. 6 a 8 semanas permite un daño excesivo a la calidad de vida si el fármaco fue erróneo.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Anexos, Página 98."
    },
    {
        id: 11,
        question: "Como estrategia de control ambiental terciario, ¿cuál es la única medida intradomiciliaria con eficacia estadísticamente demostrada sobre los síntomas?",
        options: ["Purificadores de aire comerciales", "Uso de acaricidas tópicos", "Retiro definitivo de mascotas", "Colchones impermeables exclusivos"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, la neutralización química directa del Dermatophagoides en reservorios disminuye de manera sustancial la carga antigénica y la severidad sintomática.<br><br>Perla ENARM: Los acaricidas fueron los más eficaces tanto en monoterapia como en combinación con otras medidas para reducir la exposición y mejorar síntomas.<br><br>Análisis de Distractores: El retiro de mascotas posee evidencia no concluyente. Los colchones impermeables reducen el conteo del ácaro pero fracasan clínicamente cuando se usan de forma aislada.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Medidas de control ambiental, Página 31."
    },
    {
        id: 12,
        question: "¿Qué evento adverso encabeza la incidencia tras la administración sostenida de corticosteroides tópicos de la mucosa olfatoria?",
        options: ["Rinitis medicamentosa", "Anosmia neurológica", "Perforación septal", "Epistaxis y resequedad local"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, el vehículo aerosolizado y la vasoconstricción regional menor inducen desecación e irritación mecánica en el área de Kiesselbach.<br><br>Perla ENARM: Los efectos adversos más comunes son resultado de irritación local e incluyen: resequedad, quemazón, secreciones sanguinolentas y epistaxis (incidencia 4 al 8%).<br><br>Análisis de Distractores: La rinitis medicamentosa sobreviene por fenilefrina u oximetazolina. La anosmia no se asocia al esteroide. La perforación septal ocurre raramente y deriva de mala técnica direccional durante la aplicación, no es lo más frecuente.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Tratamiento, Página 53."
    },
    {
        id: 13,
        question: "Tras agotar el tiempo óptimo de vigilancia con un esteroide tópico sin mejoría, ¿cuál es el ajuste farmacológico normado inmediato?",
        options: ["Indicar corticoesteroide sistémico", "Terapia con esteroide y antihistamínico intranasal", "Suspender esteroide e iniciar inmunoterapia", "Agregar antibiótico macrólido"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Rinitis Alérgica, se maximiza el ataque sumando un mecanismo bloqueador de receptores local (acción rápida) a la terapia genética celular (esteroide).<br><br>Perla ENARM: Los médicos pueden recomendar terapia farmacológica combinada en pacientes con rinitis alérgica que presentaron falla a la monoterapia.<br><br>Análisis de Distractores: Los corticoides sistémicos implican morbilidad severa, se usan en rescate muy selecto. La inmunoterapia exige referimiento previo a inmunología, no es paso del primer nivel de inmediato. Los macrólidos no aplican para atopia.",
        source: "IMSS-041-08, Diagnóstico y Tratamiento de Rinitis Alérgica, 2017, Tratamiento, Página 79."
    },
    {
        id: 14,
        question: "¿Cuál es el criterio cardiovascular y respiratorio de exclusión absoluta para derivar e instaurar la inmunoterapia específica con alérgenos?",
        options: ["Alergia estacional polivalente", "Dermatitis atópica generalizada", "Asma severa o no controlada", "Edad mayor a los 65 años"],
        answer: 2,

    {
        id: 15,
        question: "Desde el punto de vista quirúrgico, ¿cuál es la estructura diana a intervenir cuando la obstrucción persiste a pesar de manejo farmacológico escalonado?",

    {

        answer: 3,
        justification: "Justificación: De acuerdo GPC de Rinitis Alérgica, múltiples revisiones y metaanálisis que agrupan cohortes pediátricas no han encontrado asociación directa ni evidencia sólida que confirme que tener mascotas en los primeros años de vida cause atopia, ni tampoco que proteja de ella.<br><br>Perla ENARM: Una revisión de la literatura para investigar si el contacto con mascotas (perros y gatos) se asocia con el desarrollo de atopia no encontró evidencia concluyente.<br><br>Análisis de Distractores: Disminuir el riesgo es una creencia derivada de la hipótesis de la higiene, pero la evidencia actual no lo soporta de manera aislada. Retrasar la presentación no tiene fundamento estadístico. Incrementar el riesgo no se sostiene en los estudios de prevención primaria, aunque en pacientes ya sensibilizados, el epitelio animal desencadena crisis.",

    {

        justification: "Justificación: De acuerdo GPC de Rinitis Alérgica, medir los volúmenes y resistencias del flujo de aire nasal en consultorio no permite discriminar si la inflamación obstructiva es alérgica, vasomotora o infecciosa crónicamente, añadiendo solo un costo injustificado.<br><br>Perla ENARM: No se recomienda el uso rutinario de estudios de imagen u otros estudios como rinometría acústica, las pruebas olfatorias, la determinación de óxido nítrico, pruebas de alergia alimentaria y provocación nasal.<br><br>Análisis de Distractores: El cuestionario es la herramienta diagnóstica de primera línea recomendada. La Inmunoglobulina E y las pruebas intradérmicas son el pilar para pacientes refractarios y candidatos a vacunas desensibilizantes.",

    {

        answer: 3,
        justification: "Justificación: De acuerdo GPC de Rinitis Alérgica, el enantiómero activo puro posee una mayor afinidad y tiempo de ocupación en los receptores H1 periféricos, lo que asegura un bloqueo contundente de la fase temprana aguda incluso frente a cargas antigénicas muy altas.<br><br>Perla ENARM: La monoterapia con levocetirizina fue significativamente más efectiva para reducir el resultado en el Total Symptom Score y muestra un efecto positivo mayor en relación a la severidad clínica en casos con sintomatología severa frente a desloratadina, ebastina y fexofenadina.<br><br>Análisis de Distractores: La loratadina, ebastina y fexofenadina son eficaces para enfermedad leve o moderada, pero los metaanálisis de gran escala demostraron que la levocetirizina los supera en los cuadros de alta puntuación.",

    {

        justification: "Justificación: De acuerdo GPC de Rinitis Alérgica, fusionar en una misma instilación un potente inhibidor H1 inmediato y un glucocorticoide de efecto genómico aborda la fisiopatología en dos frentes temporales distintos, logrando una sinergia inalcanzable para cualquier molécula asilada.<br><br>Perla ENARM: Un estudio comparando azelastina/fluticasona con azelastina y fluticasona de forma individual encontró que la combinación mencionada fue estadísticamente superior, mejorando la escala de síntomas en mayor porcentaje.<br><br>Análisis de Distractores: No existe equivalencia; la mezcla superó a los controles aislados. No eleva la tasa de daño estructural ni perforación. Tampoco hay antagonismo, sino un claro aditivismo o sinergismo local.",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('041Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('041LastQId', currentQuestionId);
                else localStorage.removeItem('041LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('041Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

    const app = initializeApp(firebaseConfig);

    onAuthStateChanged(auth, async (user) => {

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
