    <script>
        // --- LOGO SNIPPET (Desktop Module & Screens: Absolute Right inside content) ---
        const desktopInnerLogoHtml = `
            <div class="hidden md:block md:absolute md:top-8 md:right-8 z-10">
                <div class="logo-container bg-white py-1 px-3 rounded-lg border border-slate-200 shadow-sm">
                    <span class="logo-enarm text-xl">ENARM</span>
                    <span class="logo-Lite text-base">Lite<sup>®</sup></span>
                </div>
            </div>
        `;

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento de la enfermedad pulmonar obstructiva crónica",
    gpcLink: "https://drive.google.com/file/d/1ZLQe5XuMgioYfDYNL7I5Ppj07vglaYUw/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM evalúa la EPOC como una enfermedad prevenible y tratable definida por una limitación persistente del flujo aéreo. La <strong class="text-indigo-900 dark:text-indigo-200">espirometría con relación VEF1/CVF &lt; 0.70</strong> es el dictamen jurídico del diagnóstico, pero la <u class="decoration-indigo-400 decoration-2 font-medium">carga sintomática (mMRC/CAT) y el historial de exacerbaciones</u> son los jueces que dictan el tratamiento farmacológico.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura el manejo en una narrativa de tres actos:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Confirmación (El Filtro):</strong> Todo paciente &gt; 40 años con factores de riesgo y síntomas es sospechoso. La GPC marca un alto total: <strong class="text-rose-600 dark:text-rose-400 font-bold">si no hay espirometría con VEF1/CVF &lt; 0.70 post-broncodilatador, NO es EPOC</strong>.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Estratificación ABCD (El Inicio):</strong> Olvida el VEF1 para elegir el fármaco. Se clasifica cruzando Síntomas (mMRC/CAT) y Riesgo (exacerbaciones). El punto crítico es el <strong class="underline">Grupo D (Alto riesgo/Muchos síntomas)</strong>: Inicias con LAMA, pero si el paciente tiene antecedentes de asma o <strong class="text-indigo-600 dark:text-indigo-400 font-bold">eosinófilos &gt; 300 cel/&micro;L</strong>, das un volantazo hacia LABA + Corticoesteroide Inhalado (CI).
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Seguimiento (El Ajuste):</strong> ¿El problema es la disnea o las exacerbaciones?
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong class="font-bold">Disnea:</strong> Escala a terapia dual (LABA+LAMA).</li>
                                <li><strong class="font-bold">Exacerbaciones:</strong> Considera añadir CI si los eosinófilos lo justifican (&gt; 100 con exacerbaciones frecuentes o &gt; 300 de entrada).</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>La Verdad del Gabinete:</strong> Un VEF1 bajo (&lt; 80&percnt; del predicho) te habla de severidad (GOLD 1-4), pero <strong class="text-emerald-700 dark:text-emerald-300 font-bold">NO confirma el diagnóstico por sí solo</strong>. Lo que define la enfermedad es la obstrucción fija (<u class="decoration-emerald-400 decoration-2 font-bold">VEF1/CVF &lt; 0.70</u>).</li>
                        <li><strong>El Puente Terapéutico:</strong> Encontrar <strong class="font-bold">eosinofilia periférica (&gt; 300 cel/&micro;L)</strong> se correlaciona con un fenotipo que responde a esteroides, rompiendo la regla general de "solo broncodilatadores".</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa de Urgencias:</strong> Ante disnea súbita con antecedente de EPOC, la GPC exige <strong class="font-bold text-rose-600 dark:text-rose-400">descartar 4 asesinos</strong>: Neumonía, Falla Cardíaca, TEP y Neumotórax.</li>
                        <li><strong>Insuficiencia Respiratoria:</strong> Si el paciente retiene CO2 (PaCO2 &gt; 45 mmHg o pH &lt; 7.30), la intervención que reduce mortalidad es la <u class="decoration-rose-500 decoration-2">Ventilación Mecánica No Invasiva (VMNI/BiPAP)</u>, no intubar de primera intención.</li>
                        <li><strong>Distractor de Oxigenoterapia:</strong> Solo está indicado si hay <strong class="font-bold text-rose-600 dark:text-rose-400">PaO2 &lt; 55 mmHg o SatO2 &lt; 88&percnt;</strong> en reposo. Dar oxígeno a quien satura 90&percnt; no mejora la sobrevida.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-037-21)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">

                </h4>
                <p>El ENARM busca que entiendas que la Rinitis Alérgica es un <strong class="text-indigo-900 dark:text-indigo-200">diagnóstico eminentemente clínico</strong> que autoriza el inicio inmediato de tratamiento empírico. <u class="decoration-indigo-400 decoration-2 font-medium">No debes solicitar pruebas específicas (IgE) de primera intención</u>, sino reservarlas exclusivamente para pacientes que fallan a la terapia inicial.</p>

                </h4>
                <p>Para el ENARM, la Fibromialgia no es simplemente "dolor crónico"; debe entenderse como una condición compleja de procesamiento anormal del dolor (<strong class="text-indigo-900 dark:text-indigo-200">sensibilización central</strong>) donde el éxito terapéutico no radica en la analgesia pura, sino en un <u class="decoration-indigo-400 decoration-2 font-medium">abordaje multimodal (biopsicosocial) obligatorio</u>, priorizando siempre la terapia no farmacológica sobre la farmacológica.</p>

                <p>La LLA en el adulto no es un diagnóstico estático, es una <strong class="text-indigo-900 dark:text-indigo-200">urgencia de clasificación genética</strong>. El pronóstico y el tratamiento dependen absolutamente de la dicotomía: Edad (&lt; 35 vs &gt; 35 años) y Citogenética (Ph+ vs Ph-). La estratificación del riesgo molecular define la supervivencia del paciente.</p>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La VGI no es una simple consulta médica, es un proceso diagnóstico <strong class="text-indigo-900 dark:text-indigo-200">multidimensional e interdisciplinario</strong> diseñado para identificar síndromes geriátricos (no solo enfermedades aisladas) con el fin supremo de elaborar un plan que <u class="decoration-indigo-400 decoration-2 font-medium">preserve la funcionalidad y prevenga la cascada de la dependencia</u> en el adulto mayor.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El abordaje en la GPC sigue una lógica de Tamizaje &rarr; Confirmación &rarr; Etiología:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Primer Filtro (Anual):</strong> Todo adulto mayor debe recibir una VGI al menos <strong class="underline">una vez al año</strong>. Se aplican pruebas rápidas (tamizaje) para visión, audición, caídas, incontinencia y depresión.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Bifurcación Cognitiva:</strong> Ante quejas de memoria, se aplica el MMSE o MoCA. Si es anormal, <strong class="text-rose-600 dark:text-rose-400 font-bold">no diagnostiques demencia inmediatamente</strong>. El algoritmo obliga a descartar causas reversibles primero (depresión, fármacos, déficit de B12, hipotiroidismo).
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Deterioro Agudo (Delirium):</strong> Si la alteración es de <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">inicio súbito y fluctuante</strong>, el camino cambia drásticamente. La prioridad no es la imagen, sino identificar factores precipitantes (infección, deshidratación) y aplicar medidas no farmacológicas antes que la sedación.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield" (Escalas)</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Deterioro Cognitivo Leve:</strong> Usar MoCA. Es más sensible que el MMSE (el cual tiene "efecto techo" en alta escolaridad). <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Puntaje &lt; 26 sugiere deterioro</strong>.</li>
                        <li><strong>Depresión:</strong> Escala de Yesavage (GDS). <u class="decoration-emerald-400 decoration-2 font-bold">&gt; 5 puntos sugiere depresión</u>. Si el paciente ya tiene demencia, usar la Escala de Cornell.</li>
                        <li><strong>Riesgo de UPP:</strong> Escala de Braden. <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Puntaje &le; 18</strong> indica riesgo.</li>
                        <li><strong>Fragilidad:</strong> Criterios de Fried. <strong class="font-bold">3 o más criterios</strong> definen al adulto mayor frágil.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">

                </h4>
                <p>El ENARM evalúa tu capacidad para identificar el momento exacto de la intervención. En la Estenosis Mitral, el objetivo es aliviar la obstrucción mecánica antes de que la hipertensión pulmonar sea irreversible, utilizando el <strong class="text-indigo-900 dark:text-indigo-200">Score de Wilkins</strong>. En la Insuficiencia Mitral, el reto es "salvar al ventrículo"; debes <u class="decoration-indigo-400 decoration-2 font-medium">indicar cirugía cuando el ventrículo izquierdo empieza a dilatarse o fallar subclínicamente</u>, incluso si el paciente se siente bien.</p>

                <p class="mb-4">El abordaje de la GPC sigue una narrativa de estadificación y decisión anatómica:</p>

                        <div>

                        </div>
                    </div>

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Estenosis Mitral (El Score de Wilkins):</strong> Se debe calcular este índice de 16 puntos.

                                <li><strong class="font-bold text-emerald-600 dark:text-emerald-500">Anatomía Favorable (Score bajo):</strong> Candidato a Valvuloplastia Mitral Percutánea con balón.</li>
                                <li><strong class="font-bold text-rose-600 dark:text-rose-400">Anatomía Desfavorable (Score alto, trombos):</strong> Requiere Recambio Valvular Quirúrgico.</li>

                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Insuficiencia Mitral (El "Reloj de Arena"):</strong> En IM severa, si hay síntomas (Estadío D) va a cirugía. Si es asintomático (Estadío C2), se opera si <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">FEVI &le; 60&percnt; o DSFVI &ge; 40 mm</strong> para prevenir daño irreversible.

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>
                        <p class="text-xs text-slate-500 mt-1 italic">Fuente: ${q.source}</p>
                    </div>
                </div>`;
            });
            quizHtml += '</div>';

            let nextBtn = "";

                nextBtn = `<button class="w-full sm:w-auto bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-emerald-700 transition-all" onclick="showFinalSummary()">Ver Resultados</button>`;

                nextBtn = `<button class="w-full sm:w-auto bg-slate-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-slate-700 transition-all" onclick="displayModule(null)">Volver al Menú</button>`;
            }

            document.getElementById('module-display').innerHTML = `

                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white pr-0 md:pr-40">${moduleData.title} <span class="text-emerald-500 text-lg align-middle ml-2">(Completado)</span></h2>
                    
                    <div class="mt-4 mb-6 flex flex-col sm:flex-row gap-3">

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" /></svg>
                            Ver Resumen del Módulo

                        <a href="${moduleData.gpcLink}" target="_blank" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold py-3 px-4 rounded-lg border border-slate-200 dark:border-slate-600 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors flex items-center justify-center gap-2">

                            </svg>
                            GPC "Referencia rápida"
                        </a>
                    </div>

                    <div class="mt-6">
                        <h3 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-3">Caso Clínico</h3>

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>
                            <span>${score}/${total}</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-amber-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });
            moduleScoresHtml += '</div>';
            
            const finalPct = totalQuestions > 0 ? Math.round((totalScore/totalQuestions)*100) : 0;
            const dateStr = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

            document.getElementById('module-display').innerHTML = `

                            </div>

                                <div class="grid grid-cols-3 gap-2 mb-6">

                                        <p class="text-[10px] text-green-600 dark:text-green-400 font-bold uppercase">Baja</p>

            const list = document.getElementById('module-list');
            if(!list) return;
            list.innerHTML = '';

            // MODIFICACIÓN: Iterar sobre la lista COMPLETA de títulos cortos
            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;

                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                if (module) {
                    // MÓDULO DISPONIBLE

                        <div class="flex items-center gap-3 overflow-hidden">

                        innerHTML += `

            bibliographyContent.innerHTML = '';

                item.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 dark:text-slate-400 flex-shrink-0 mt-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríauno4CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríauno4CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríauno4CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-amber-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-amber-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
