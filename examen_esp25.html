    <script>
        // =========================================================
        // DATA: BASE DE DATOS DE PREGUNTAS (AGREGA AQUÍ HASTA 280+)
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Basado en la GPC de Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con elevación del segmento ST, ¿cuál es el hallazgo electrocardiográfico que integra el diagnóstico presuntivo en un hombre de treinta y cinco años?", 
                options: ["Mayor 0.15 milivoltios en V2-V3", "Mayor 0.20 milivoltios en V2-V3", "Mayor 0.25 milivoltios en V2-V3", "Mayor 0.1 milivoltios en V7-V9"], 
                answer: 2, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Infarto Agudo de Miocardio, el punto de corte para considerar una nueva elevación del segmento ST varía según la edad y sexo del paciente, siendo más exigente en hombres jóvenes para evitar falsos positivos por repolarización precoz.<br><br>Perla ENARM: \"Nueva elevación del segmento ST en por lo menos dos derivaciones electro-anatómicas contiguas con los siguientes puntos de corte: mayor o igual a 0.25 milivoltios en hombres con edad menor a 40 años en V2 y V3\".<br><br>Análisis de Distractores: La opción A corresponde al punto de corte establecido para mujeres de cualquier edad. La opción B es el punto de corte diagnóstico para hombres mayores de 40 años. La opción D es el criterio para infartos posteriores en derivaciones V7 a V9 en hombres menores de 40 años, no el patrón diagnóstico estándar precordial.", 
                source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con elevación del segmento ST, 2021, Cuadros o Figuras (Cuadro 3), Página 11." 
            },
            {
                id: 2, 
                question: "En el contexto de Enfermedad Tromboembólica Venosa en México, ¿cuál es el factor de riesgo genético con mayor asociación reportado para investigar en un primer evento según la fuente?", 
                options: ["Obesidad grado tres", "Uso de estrógenos orales", "Deficiencia de Proteína C", "Neoplasia maligna activa"], 
                answer: 2, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Enfermedad Tromboembólica Venosa, en pacientes con un primer evento no provocado por factores adquiridos o ambientales, es fundamental el rastreo de trombofilias hereditarias que alteran la cascada de coagulación, como el déficit de anticoagulantes naturales.<br><br>Perla ENARM: Se recomienda que a la persona que presente un primer evento de ETV se investiguen los factores de riesgo para verificar sí son genéticos, adquiridos o ambientales. Entre los genéticos destacan: Deficiencia de antitrombina, Deficiencia de proteína C, Deficiencia de proteína S y Factor V de Leiden.<br><br>Análisis de Distractores: La obesidad, el uso de terapia hormonal (estrógenos) y el cáncer activo son factores de riesgo procoagulantes fuertemente asociados, pero se clasifican como factores adquiridos y ambientales, no genéticos.", 
                source: "GPC-IMSS-425-18, Diagnóstico y tratamiento enfermedad tromboembólica venosa, 2018, Promoción y Cuadro 1, Páginas 2 y 11." 
            },
            {
                id: 3, 
                question: "¿Cuál es el líquido de elección para el manejo de reanimación inicial durante la primera hora en el Estado Hiperglucémico Hiperosmolar en un paciente sin contraindicaciones?", 
                options: ["Solución salina al 0.9%", "Solución salina al 0.45%", "Solución glucosada al 5%", "Cloruro de potasio intravenoso"], 
                answer: 0, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Estado Hiperglucémico Hiperosmolar... la principal causa de mortalidad a corto plazo en estas crisis metabólicas es el colapso circulatorio inducido por la diuresis osmótica masiva. El paso inicial y universal es la expansión agresiva del volumen intravascular con un cristaloide isotónico antes de corregir cualquier otro parámetro.<br><br>Perla ENARM: \"Paciente con criterios de EHH: Solución salina al 0.9% 15 a 20 mililitros por kilogramo intravenosa en la primera hora\".<br><br>Análisis de Distractores: La solución hipotónica al 0.45% y la glucosada al 5% son fluidos de mantenimiento secundario condicionados por el Sodio y la Glucosa respectivamente, nunca de reanimación inicial. El cloruro de potasio se añade a la mezcla posteriormente según los niveles séricos, pero no es una solución de expansión de volumen.", 
                source: "SS-160-09, Diagnóstico y Tratamiento del Estado Hiperglucémico Hiperosmolar en Adultos con Diabetes Mellitus Tipo 2, 2018, Algoritmo 1, Página 1." 
            },
            {
                id: 4, 
                question: "Basado en la GPC de Síndrome de Apnea Obstructiva, ¿cuál es el signo clínico o síntoma que apoya el diagnóstico presuntivo en niños?", 
                options: ["Enuresis secundaria", "Cefalea matutina", "Insomnio", "Diaforesis nocturna"], 
                answer: 0, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Síndrome de Apnea Obstructiva, la presentación clínica varía según el grupo etario, siendo los síntomas diurnos más prevalentes en adultos, mientras que en niños destacan los problemas conductuales y el control de esfínteres durante el sueño.<br><br>Perla ENARM: \"Síntomas de SAOS en niños: Ronquido habitual, Apnea, Respiración oral o ruidosa, Despertares frecuentes, Enuresis secundaria, Trastornos de la conducta, Problemas de aprendizaje\".<br><br>Análisis de Distractores: La cefalea matutina (B), el insomnio (C) y la diaforesis nocturna (D) son síntomas característicos de la población adulta, por lo que no orientan de forma primaria al diagnóstico en el paciente pediátrico.", 
                source: "GPC-SS-572-21, Diagnóstico y Tratamiento del Síndrome de Apnea Obstructiva del Sueño en población pediátrica y adulta en el primer y segundo nivel de atención, 2021, Cuadros o Figuras, Página 8." 
            },
            {
                id: 5, 
                question: "Basado en la GPC de Leucemia Linfoblástica Aguda, ¿cuál es el estudio estándar indispensable para confirmar el diagnóstico presuntivo y realizar la subclasificación?", 
                options: ["Frotis de sangre periférica", "Citometría de flujo en sangre", "Biopsia de hueso", "Aspirado de médula ósea"], 
                answer: 3, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Leucemia Linfoblástica Aguda, el abordaje integral para confirmar la infiltración medular exige la visualización directa celular y la recolección de sustrato para paneles moleculares avanzados.<br><br>Perla ENARM: \"Realizar aspirado de médula ósea tomar muestras para: Extendido, tinción Right, Inmunofenotipo, Citogenética, Estudios moleculares\".<br><br>Análisis de Distractores: El frotis (A) y la citometría en sangre (B) son de sospecha inicial pero no confirmatorios definitivos ni suficientes para todos los estudios requeridos por el algoritmo. La biopsia de hueso (C) se reserva únicamente para cuando el aspirado de médula ósea resulta inadecuado (ej. aspirado seco).", 
                source: "IMSS-142-08, Diagnóstico y Tratamiento Leucemia Linfoblástica Aguda en el Adulto, 2018, Algoritmo Diagnóstico, 1." 
            },
            {
                id: 6, 
                question: "En el contexto de la Patología de la Válvula Mitral en México, ¿cuál es la etiología o factor de riesgo con mayor asociación para desarrollar estenosis reportado por la fuente?", 
                options: ["Fiebre reumática aguda", "Cardiopatía isquémica", "Degeneración mixomatosa", "Endocarditis infecciosa"], 
                answer: 0, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Patología de Válvula Mitral, la carditis aguda por fiebre reumática es la causa predominante de la estenosis mitral en nuestro medio, generando secuelas fibróticas y fusión de comisuras a largo plazo.<br><br>Perla ENARM: \"Se recomienda que a los pacientes sospechosos de fiebre reumática se les realice ecocardiografía. La ecocardiografía en la carditis aguda reumática es más sensible y específica que la auscultación.\"<br><br>Análisis de Distractores: La cardiopatía isquémica y la degeneración mixomatosa son etiologías clásicas de la insuficiencia mitral (secundaria y primaria, respectivamente), no de la estenosis. La endocarditis infecciosa típicamente causa insuficiencia aguda por destrucción del aparato valvular.", 
                source: "IMSS-235-09, Diagnóstico y Tratamiento de la Patología de la Válvula Mitral, 2017, Estenosis de la válvula mitral por enfermedad reumática, p. 9." 
            },
            {
                id: 7, 
                question: "Basado en el PRONAM de Diabetes tipo 2 y síndrome metabólico, ¿cuál es el hallazgo laboratorial que obliga al inicio combinado de un inhibidor del co-transportador de sodio glucosa tipo 2 (iSGLT-2)?", 
                options: ["Glucosa ≥ 126 mg/dL", "Relación albúmina/creatinina ≥ 30 mg/g", "Tasa de filtración disminuida", "Hemoglobina glucosilada de 8.5%"], 
                answer: 1, 
                justification: "Justificación de la Correcta: De acuerdo a la PRONAM de Diabetes y Síndrome Metabólico, el grado de albuminuria es un determinante crítico para añadir nefroprotección específica al tratamiento base, independientemente del control glucémico aislado.<br><br>Perla ENARM: \"Si el paciente presenta relación albúmina/creatinina ≥ 30 mg/g, agregar tratamiento con iSGLT-2 (inhibidor del co-transportador de sodio glucosa tipo 2), en combinación con inhibidor de enzima convertidora de angiotensina o antagonista de los receptores de angiotensina II\".<br><br>Análisis de Distractores: La glucosa y la hemoglobina glucosilada alteradas justifican la intensificación general del tratamiento, pero el trigger específico y obligatorio para usar un iSGLT-2 como protección orgánica es la albuminuria ≥ 30 mg/g. La tasa de filtración disminuida por sí sola exige ajuste de dosis, no forzosamente la adición inmediata de esta familia sin albuminuria o falla cardíaca.", 
                source: "PRONAM, Protocolo Nacional de Atención Médica Diabetes tipo 2 y síndrome metabólico, 2024, Tratamiento farmacológico. Principios generales, Página 8." 
            },
            {
                id: 8, 
                question: "Basado en la GPC de Exacerbación de Asma, ¿cuál es el estudio de medición objetiva indispensable que integra el diagnóstico inicial de la gravedad de obstrucción al flujo aéreo?", 
                options: ["Gasometría arterial de ingreso", "Radiografía de tórax posteroanterior", "Oximetría de pulso continua", "Flujo Espiratorio Máximo (PEF)"], 
                answer: 3, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Exacerbación de Asma, la evaluación inicial nunca debe basarse únicamente en la clínica del paciente, ya que esta tiende a subestimar la severidad real del broncoespasmo. Se requiere forzosamente objetivar el déficit obstructivo mediante una espirometría o flujometría.<br><br>Perla ENARM: \"La evaluación de cualquier exacerbación de asma debe incluir la identificación de signos y antecedentes de crisis de riesgo vital y la utilización de medidas objetivas (PEF o espirometría) para cuantificar el grado de obstrucción al flujo aéreo (evaluación estática).\"<br><br>Análisis de Distractores: La gasometría arterial (A) y la radiografía de tórax (B) no son estudios de primera línea ni indispensables para el diagnóstico o estadiaje inicial de todos los pacientes; se reservan para casos graves con sospecha de complicaciones (ej. neumotórax, hipercapnia o fatiga muscular). La oximetría (C) mide el intercambio gaseoso, pero no cuantifica la obstrucción de la vía aérea.", 
                source: "IMSS-806-17, Diagnóstico, tratamiento y prevención de la exacerbación de asma en Adultos, 2017, Diagnóstico, Página 13." 
            },
            {
                id: 9, 
                question: "¿Cuál es la meta terapéutica del parámetro laboratorial (INR) que establece la norma para un paciente con Enfermedad Tromboembólica Venosa tratado con Warfarina?", 
                options: ["Mantener entre uno y dos", "Mantener entre dos y tres", "Mantener entre tres y cuatro", "Mantener en cinco puntos"], 
                answer: 1, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Enfermedad Tromboembólica Venosa, la eficacia de los Antagonistas de la Vitamina K depende estrictamente del nivel de anticoagulación; valores menores predisponen a recurrencia trombótica, y valores mayores aumentan el riesgo de hemorragia fatal.<br><br>Perla ENARM: Mantener el rango terapéutico de International Naturalized Ratio (INR) entre 2.0 a 3.0 (objetivo 2.5), en lugar de niveles bajos (< 2) o altos (3.0-5.0).<br><br>Análisis de Distractores: Un INR menor a dos es sub-terapéutico y no protege contra la extensión del trombo. Valores entre 3 y 5 son supraterapéuticos e incrementan drásticamente el riesgo de complicaciones hemorrágicas.", 
                source: "GPC-IMSS-425-18, Diagnóstico y tratamiento enfermedad tromboembólica venosa, 2018, Tratamiento, Página 9." 
            },
            {
                id: 10, 
                question: "¿Cuál es el fármaco de elección para el manejo antiagregante inicial del Infarto Agudo de Miocardio con elevación del segmento ST previo a la intervención coronaria?", 
                options: ["Clopidogrel seiscientos miligramos", "Prasugrel sesenta miligramos", "Ácido acetilsalicílico trescientos miligramos", "Tenecteplase en dosis única"], 
                answer: 2, 
                justification: "Justificación de la Correcta: De acuerdo a la GPC de Infarto Agudo de Miocardio, la inhibición temprana de la ciclooxigenasa plaquetaria es el primer paso farmacológico indispensable para limitar el crecimiento del trombo coronario tanto en tratamiento invasivo como farmacológico.<br><br>\"Se debe administrar ácido acetilsalicílico 162 a 325 miligramos antes de la intervención coronaria primaria percutánea. Debe ser administrado de 150 a 300 miligramos, de preferencia 300 miligramos, a todos los pacientes a quienes se les administra tratamiento fibrinolítico\".<br><br>Análisis de Distractores: La opción A y B son dosis de carga de inhibidores P2Y12 que se usan de forma adjunta, pero no sustituyen el mandato universal de la aspirina como primera línea inicial indispensable. La opción D es un fibrinolítico, no un antiagregante.", 
                source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con elevación del segmento ST, 2021, Tratamiento (Recomendación Clave), Página 8." 
            },
            {
                id: 11, 
                question: "Basado en la GPC de Estado Hiperglucémico Hiperosmolar, ¿cuál es el hallazgo laboratorial que integra el diagnóstico de resolución clínica?", 
                options: ["Glucosa menor a 200", "Osmolaridad menor a 310", "Potasio mayor a 5.2", "Sodio mayor a 135"], 
                answer: 1,

        // ==========================================
        // LÓGICA DE LA APLICACIÓN 
        // ==========================================
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ELex1LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ELex1Progress');
                localStorage.removeItem('ELex1LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-purple-500 shadow-md z-10 border-purple-500 dark:border-purple-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

            displayArea.innerHTML = `

                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-purple-600 dark:text-slate-400 dark:hover:text-purple-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>

                    <!-- HERO DYNAMIC -->

                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->

                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="examen_esp30.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>

        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ELex1Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ELex1LastQId', currentQuestionId);
                else localStorage.removeItem('ELex1LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ELex1Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
