    <script>
        const questionsData = [
    {
        id: 1,
        question: "En la atención del Recién Nacido Prematuro sano, ¿cuál es el rango de temperatura ambiental recomendado en la sala de partos o quirófano para evitar la pérdida de calor y el estrés metabólico?",
        options: ["20 a 22 °C", "23 a 25 °C", "26 a 28 °C", "28 a 30 °C"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, la anticipación del nacimiento prematuro exige preparar el entorno físico. Temperaturas más bajas condicionan un gradiente térmico elevado que dispara el consumo de oxígeno y el estrés tisular por homeotermia fallida.<br><br>Perla ENARM: Las siguientes acciones favorecen que el RNP no pierda calor: Temperatura de la habitación donde nacerá entre 23 y 25 °C.<br><br>Análisis de Distractores: La opción A representa una sala fría habitual para confort del cirujano, contraindicada para el pretérmino. Las opciones C y D pueden generar sobrecalentamiento iatrogénico, ya que el neonato también es vulnerable a la hipertermia ambiental por su inmadurez vasomotora cutánea.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Evaluación inicial del Recién Nacido Prematuro, Página 14."
    },
    {
        id: 2,
        question: "En el Recién Nacido Prematuro hospitalizado, ¿cuál es el mecanismo físico responsable de la pérdida de calor性能 por corrientes de aire provenientes de ventanas, puertas o aire acondicionado?",
        options: ["Conducción", "Radiación", "Evaporación", "Convección"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, la dinámica termodinámica establece que un cuerpo sólido (neonato) transfiere energía al aire o líquido en movimiento constante que le rodea si éste se encuentra a una temperatura menor.<br><br>Perla ENARM: Convección es la transferencia de calor entre una superficie sólida, en este caso el cuerpo del neonato, con aire o líquido a su alrededor. Las principales fuentes son las corrientes de aire provenientes de ventanas, puertas, corredores y aire acondicionado.<br><br>Análisis de Distractores: La opción A ocurre por contacto directo con superficies (báscula). La opción B es la pérdida hacia objetos sólidos lejanos no en contacto. La opción C implica el paso de líquido a gas en la superficie cutánea inmadura.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Evaluación inicial del Recién Nacido Prematuro, Página 14."
    },
    {
        id: 3,
        question: "En el Recién Nacido Prematuro en unidad de cuidados intensivos, ¿qué mecanismo de pérdida térmica se produce por transferencia de energía hacia las paredes frías de la incubadora?",
        options: ["Conducción térmica", "Evaporación insensible", "Radiación electromagnética", "Convección por aire"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, aun estando dentro de un ambiente cerrado, el gradiente térmico extremo entre el cuerpo del bebé y las paredes perimetrales de la incubadora o sala causan un \"robo\" de calor a distancia.<br><br>Perla ENARM: Radiación es la transferencia de calor entre dos objetos sólidos que no están en contacto; pérdida de calor en forma de ondas electromagnéticas. Las principales pérdidas son las paredes frías de la incubadora o de la sala.<br><br>Análisis de Distractores: La opción A requiere que el bebé toque físicamente la superficie helada. La opción B está vinculada a la humedad cutánea y respiratoria. La opción D depende de fluidos o gases circulando sobre el bebé.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Evaluación inicial del Recién Nacido Prematuro, Página 14."
    },
    {
        id: 4,
        question: "Durante la estabilización del Recién Nacido Prematuro, la pérdida térmica exacerbada por mantener compresas o campos estériles húmedos sobre la piel ocurre principalmente por el mecanismo de:",
        options: ["Evaporación", "Conducción", "Convección", "Radiación"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, el neonato inmaduro carece de estrato córneo competente, lo que magnifica las pérdidas insensibles cutáneas. Si además la piel se mantiene cubierta por fluidos sin secado o envoltura en polietileno, la energía se consume al vaporizar el agua.<br><br>Perla ENARM: Se produce la pérdida de calor a través de la energía gastada en la conversión de agua en estado líquido a gaseoso. Las principales fuentes de pérdida de calor por evaporación son la aplicación de soluciones frías y la permanencia de compresas húmedas.<br><br>Análisis de Distractores: La opción B ocurre al colocar al neonato directamente sobre placas de rayos X. La opción C es por corrientes de aire ambiental. La opción D ocurre por cercanía al exterior o muros helados.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Evaluación inicial del Recién Nacido Prematuro, Página 14."
    },
    {
        id: 5,
        question: "En el Recién Nacido Prematuro sano hospitalizado, ¿cuál es el requerimiento de energía diario recomendado estrictamente durante la primera semana de vida?",
        options: ["50 a 60 kcal/kg/día", "70 a 80 kcal/kg/día", "90 a 100 kcal/kg/día", "110 a 140 kcal/kg/día"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, durante los primeros 7 días el objetivo prioritario no es el crecimiento anabólico masivo, sino el aporte para las demandas catabólicas, termorregulación y función orgánica básica, en lo que madura la tolerancia gastrointestinal.<br><br>Perla ENARM: Se sabe que durante la primera semana de vida los requerimientos de energía son de 70 a 80 kcal/kg/día, con incremento gradual posterior.<br><br>Análisis de Distractores: La opción A refleja un aporte infraterapéutico que promueve hipoglucemia. La opción C es un punto intermedio transicional. La opción D es la meta metabólica final que se exige a partir de la segunda semana para asegurar la acreción celular y ganancia de peso óptima.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados del RNP Sano Hospitalizado, Página 24."
    },
    {
        id: 6,
        question: "En el seguimiento ponderal del Recién Nacido Prematuro sano, ¿cuál es el porcentaje máximo de pérdida de peso total fisiológicamente esperado a la semana de vida?",
        options: ["5 %", "7 %", "10 %", "15 %"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, el compartimento extracelular del feto se contrae naturalmente en los primeros días extrauterinos mediante diuresis y pérdida insensible de agua, representando una caída calculada.<br><br>Perla ENARM: La disminución máxima por día es del 3% del peso, 7% en los tres primeros días y 10% en total a la semana de vida.<br><br>Análisis de Distractores: La opción A es el umbral para un recién nacido de término robusto, no para un pretérmino. La opción B es la pérdida máxima aceptada al tercer día. La opción D indica una deshidratación patológica que obligaría a reajustar los aportes parenterales/enterales de inmediato.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados del RNP Sano Hospitalizado, Página 25."
    },
    {
        id: 7,
        question: "Según el patrón de recuperación nutricional esperado en el Recién Nacido Prematuro sano, ¿cuál es el tiempo máximo límite en el que debe recuperar su peso exacto de nacimiento?",
        options: ["7 días", "10 días", "14 días", "21 días"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, posterior a la fase de contracción fisiológica de líquidos en la primera semana, el balance calórico positivo (logrando metas >110 kcal/kg/día) instaura una fase anabólica que normaliza la antropometría antes del término de la segunda semana.<br><br>Perla ENARM: Se debe recuperar el peso a los 14 días después del nacimiento.<br><br>Análisis de Distractores: La opción A marca el punto máximo de caída ponderal, no la recuperación. La opción B suele observarse en neonatos de término alimentados exclusivamente con seno materno exitoso. La opción D representa un retraso patológico sugestivo de falla de medro, infección o aporte inadecuado.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados del RNP Sano Hospitalizado, Página 25."
    },
    {
        id: 8,
        question: "De acuerdo con los lineamientos de nutrición temprana en el Recién Nacido Prematuro sano, ¿en qué momento exacto de la vida extrauterina se recomienda idealmente el inicio de la alimentación enteral?",
        options: ["Primeras 2 horas", "A las 6 horas", "A las 12 horas", "Después de 24 horas"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, la nutrición gástrica precoz previene la hipoglucemia, atrofia de vellosidades y colonización por patógenos hospitalarios al proveer inmunoglobulina A secretora presente en el calostro.<br><br>Perla ENARM: En el RNP Sano se debe iniciar la alimentación antes de las 48 horas de vida, de preferencia en el primer día de vida y dentro de las primeras 2 horas, siendo la primera opción el calostro.<br><br>Análisis de Distractores: Las opciones B, C y D retrasan el estímulo trófico intestinal sin justificación en un paciente estable, aumentando el riesgo de necesidad parenteral y displasia de la mucosa gástrica.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados del RNP Sano Hospitalizado, Página 27."
    },
    {
        id: 9,
        question: "En el Recién Nacido Prematuro sano con peso al nacer entre 1500 y 2500 g, ¿cuál es la dosis de hierro profiláctico recomendada para evitar la deficiencia férrica?",
        options: ["1 mg/kg/día", "2 mg/kg/día", "4 mg/kg/día", "6 mg/kg/día"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, el agotamiento temprano de las exiguas reservas de hierro del pretérmino requiere compensación activa. Dosis mayores a este requerimiento profiláctico provocan daño por radicales libres debido a sistemas enzimáticos de barrera inmaduros en las primeras semanas.<br><br>Perla ENARM: Se debe asegurar un aporte de hierro de 2 mg/kg/día a los RNP con peso al nacer 1500-2500 gr.<br><br>Análisis de Distractores: La opción A es el requerimiento del infante sano de término después de los 4 a 6 meses. Las opciones C y D son esquemas terapéuticos agresivos para corrección de anemia ferropénica severa ya instaurada, no de prevención primaria.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados del RNP Sano Hospitalizado, Página 26."
    },
    {
        id: 10,
        question: "Para prevenir la Enfermedad Hemorrágica en un Recién Nacido Prematuro menor a 34 semanas de gestación, ¿cuál es la dosis indicada de fitomenadiona intramuscular al nacimiento?",
        options: ["0.1 miligramos", "0.5 miligramos", "1.0 miligramos", "2.0 miligramos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, la administración profiláctica empírica estandarizada puede causar toxicidad y sobrecarga en el hígado inmaduro de neonatos de bajo peso, por lo que el esquema se titula cortando en la semana 34.<br><br>Perla ENARM: Se recomienda administrar vitamina K (fitomenadiona) intramuscular 0.5 mg dosis única en < 34 SEG.<br><br>Análisis de Distractores: La opción A resulta en niveles subóptimos para la activación de factores de coagulación II, VII, IX y X. La opción C es la dosis estándar exclusiva para neonatos >34 semanas o de término. La opción D está contraindicada por toxicidad en cualquier escenario profiláctico neonatal.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados y Medidas Preventivas, Página 37."
    },
    {
        id: 11,
        question: "¿Cuál es la dosis profiláctica de vitamina K intramuscular indicada al nacimiento para un Recién Nacido Prematuro sano mayor a 34 semanas de gestación?",
        options: ["0.5 miligramos", "1.0 miligramos", "1.5 miligramos", "2.0 miligramos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, al superar la semana 34, el metabolismo hepático del paciente equipara farmacocinética al neonato de término, soportando la dosis de de saturación universal sin riesgo y confiriendo máxima protección contra el sangrado del recién nacido.<br><br>Perla ENARM: Se recomienda administrar vitamina K (fitomenadiona) intramuscular o 1 mg dosis única en RNP >34 SEG al momento del nacimiento.<br><br>Análisis de Distractores: La opción A aplica estrictamente para inmadurez menor a las 34 semanas. Las opciones C y D superan la ventana de tratamiento seguro estandarizada por la norma nacional.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados y Medidas Preventivas, Página 37."
    },
    {
        id: 12,
        question: "Para la evaluación antropométrica longitudinal del Recién Nacido Prematuro sano hospitalizado, ¿cuáles son las curvas de crecimiento estandarizadas y recomendadas por la guía?",
        options: ["Curvas de Lubchenco", "Curvas de Battaglia", "Curvas de Fenton y Kim", "Curvas de Jurado García"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Cuidados del Recién Nacido, el seguimiento pondoestatural es vital para asegurar el crecimiento compensatorio en la unidad. Las tablas actualizadas evalúan la varianza percentilada ajustada con alta precisión para las demandas intrauterinas no resueltas.<br><br>Perla ENARM: Se recomienda utilizar las curvas de Fenton y Kim percentiladas según edad gestacional y sexo, o las curvas de la OMS de acuerdo a la edad gestacional corregida.<br><br>Análisis de Distractores: Las opciones A, B y D son clasificaciones históricas valiosas para la tipificación somatométrica al momento del parto (adecuado o pequeño para edad gestacional), pero están en desuso como la primera línea para el monitoreo dinámico prospectivo por Fenton.",
        source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Crecimiento y Desarrollo, Página 31."
    },

            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('36221Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('36221LastQId', currentQuestionId);
                else localStorage.removeItem('36221LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('36221Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);

    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
