<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute right-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>

                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Reiniciar Examen
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT (Scrollable) -->
        <main id="main-content" class="flex-1 h-[100dvh] overflow-y-auto overscroll-y-contain p-4 sm:p-6 lg:p-8 transition-all duration-300 relative bg-slate-50 dark:bg-slate-950">
            
            <!-- Botón Grid (Tablero) a la Izquierda (Oculto en Inicio) -->
            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300" title="Ver Tablero de Preguntas">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <!-- Botón Menú a la Derecha (Oculto en Inicio, visible en desktop y móvil) -->

            <!-- Barra de Progreso Limpia (Gruesa y sin marca de agua de fondo) -->

        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
            {
                id: 1, 
                question: "Ante la sospecha clínica de Sepsis Neonatal, ¿cuál es el primer estudio de abordaje que debe solicitarse antes del tratamiento según la GPC?", 
                options: ["Hemocultivo para diagnóstico definitivo", "Proteína C Reactiva seriada", "Tomografía computarizada de cráneo", "Punción lumbar de rutina"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Neonatal, el aislamiento microbiológico sigue siendo el pilar fundamental para guiar y desescalar la terapia antibiótica. A pesar del bajo rendimiento en ciertas situaciones de bajo inóculo, el hemocultivo debe tomarse invariablemente antes de la primera dosis de antibiótico para evitar la negativización de la muestra.<br><br>Perla ENARM: \"Se debe realizar hemocultivo para determinar el diagnóstico definitivo de sepsis neonatal\".<br><br>Análisis de Distractores: La Proteína C Reactiva (PCR) es útil para descartar sepsis a las 24-48 horas o guiar la suspensión del antibiótico, pero no da un diagnóstico definitivo en la evaluación inicial por su elevación fisiológica los primeros 3 días. La punción lumbar de rutina no se recomienda en pacientes asintomáticos, y la tomografía no es un estudio inicial.", 
                source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 17." 
            },
            {
                id: 2, 
                question: "En Parálisis Cerebral, ¿cuál es el signo clínico del neurodesarrollo que integra el diagnóstico presuntivo a los 9 meses de edad?", 
                options: ["Ausencia de sonrisa social", "Falta de sedestación independiente", "Empuñamiento persistente de manos", "Pérdida de reflejos primitivos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Parálisis Cerebral en Lactantes, el diagnóstico clínico se basa fuertemente en la vigilancia de los hitos del neurodesarrollo en la consulta de atención primaria. Aunque hay varios signos de alarma precoces, la incapacidad motora de mantener el tronco y sentarse sin apoyo a los 9 meses de edad cronológica o corregida es el dato clínico integrador que establece la sospecha firme de la enfermedad.<br><br>Perla ENARM: \"El médico debe estar alerta ante el retraso de los hitos motores principalmente persistencia de reflejos primitivos, falta de control cefálico, ausencia de sonrisa, presencia de movimientos asimétricos de las manos, persistencia de empuñamiento y falta de sedestación a los 9 meses\".<br><br>Análisis de Distractores: Las opciones A y C son datos clínicos válidos de alarma neuromotora, pero suelen manifestarse o evaluarse en etapas cronológicas mucho más tempranas (como la sonrisa social a los 2-3 meses o el empuñamiento a los 4 meses). La opción D es incorrecta y lo contrario fisiopatológicamente: en esta patología ocurre que los reflejos primitivos persisten patológicamente, no se pierden tempranamente.", 
                source: "GPC DIF-332-18, Evaluación diagnóstica de parálisis cerebral en lactantes, 2018, Diagnóstico Clínico, Página 14." 
            },
            {
                id: 3,
                question: "Según la GPC, en un paciente con Criptorquidia unilateral palpable persistente, ¿cuál es el tiempo cronológico límite y definitivo que indica la necesidad de orquidopexia?",
                options: ["Entre 6 y 12 meses", "Antes de los 3 meses", "Inmediatamente al primer mes", "Después de los 2 años"],
                answer: 0,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Detección del recién nacido de término, permitir que el testículo resida demasiado tiempo en la temperatura abdominal destruye los túbulos seminíferos y el tejido gonadal.<br><br>Perla ENARM: \"El tratamiento se inicia tan pronto como sea posible a partir de los seis meses de edad, máximo a los 18 meses (preferentemente cirugía entre los 6 a 12 meses según el algoritmo); ya que mejora la espermatogénesis y disminuye el riesgo de tumores.\"<br><br>Análisis de Distractores: Antes de los 6 meses (B y C) existe la posibilidad anatómica de un descenso testicular espontáneo sin riesgo vital inminente. Posterior a los 2 años (D) el daño testicular térmico y oncológico está gravemente instaurado.",
                source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de egreso hospitalario del recién nacido de término, 2020, Algoritmos, página 43."
            },
            {
                id: 4, 
                question: "En Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cómo se clasifica clínicamente al paciente que cursa con volumen excesivo de líquido en pleura y pericardio in útero?", 
                options: ["Síndrome de hemólisis masiva", "Encefalopatía aguda por bilirrubina", "Hídrops fetalis por isoinmunización", "Kernicterus de inicio temprano"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Isoinmunización a Rh Neonatal, la destrucción severa y sostenida de eritrocitos genera anemia profunda, descompensación cardíaca con falla sistémica y extravasación capilar masiva de líquidos (edema generalizado) que compromete drásticamente la vida fetal y neonatal inmediata.<br><br>Perla ENARM: \"La forma grave de la isoinmunización a factor Rh se conoce como hídrops fetalis la cual por lo general produce la muerte del feto in útero... se puede encontrar como consecuencia de volumen excesivo de líquido en dos o más de los siguientes compartimentos fetales: Piel, Pleura, Pericardio, Peritoneo\".<br><br>Análisis de Distractores: La opción A es un término fisiopatológico inespecífico. Las opciones B y D se refieren estricta y neurológicamente a la letal toxicidad por depósitos de bilirrubina indirecta en el tejido cerebral de ganglios basales (que ocurre post-nacimiento al fallar el aclaramiento placentario), no al acúmulo de líquido en serosas fetales por falla cardiaca anémica.", 
                source: "GPC IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Signos y Síntomas, Página 37." 
            },
            {
                id: 5, 
                question: "Ante un paciente pediátrico con Otitis Media Aguda que súbitamente desarrolla aumento de volumen retroauricular, fiebre de difícil control y eritema local, ¿cuál es el primer estudio de imagen que debe solicitarse para orientar el abordaje quirúrgico?", 
                options: ["Tomografía computarizada de mastoides", "Radiografía simple de cráneo", "Resonancia magnética con gadolinio", "Ultrasonido de tejidos blandos"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, el cuadro clínico es clásicamente sugestivo de mastoiditis aguda (complicación intratemporal). La evaluación de la erosión ósea y la extensión del absceso requiere cortes de alta resolución del hueso temporal.<br><br>Perla ENARM: \"En casos de OMA con complicación intratemporal el estudio de elección es la TC de cortes finos\".<br><br>Análisis de Distractores: La opción B es un estudio deficiente para evaluar complicaciones supurativas. La opción C es el estándar de oro exclusivamente para descartar complicaciones intracraneales (meningitis, trombosis del seno). La opción D es útil para evaluar colecciones cervicales, pero nada útil para la anatomía intratemporal.", 
                source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Diagnóstico de Laboratorio y por imagen, Página 25." 
            },
            {
                id: 6, 
                question: "¿Cuál es el factor clínico de riesgo que predice con mayor fuerza la probabilidad de resistencia a antibióticos por parte del neumococo en un paciente con Neumonía Bacteriana Adquirida en la Comunidad (NBAC)?", 
                options: ["Desnutrición calórico proteica", "Uso reciente de antibióticos", "Esquema incompleto pentavalente", "Madre con baja escolaridad"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Neumonía Bacteriana en pediatría, la presión de selección antimicrobiana previa altera profundamente la microbiota nasofaríngea, induciendo mutaciones en las proteínas fijadoras de penicilina (PBP) del patógeno.<br><br>Perla ENARM: \"Factores asociados a la resistencia antibiótica del neumococo: Edades extremas de la vida, Uso reciente de antibióticos, Comorbilidades, Inmunosupresión...\".<br><br>Análisis de Distractores: La desnutrición, escolaridad y falta de vacunas incrementan el riesgo de contraer la enfermedad y su mortalidad sistémica, pero el riesgo específico microbiológico de resistencia antimicrobiana se correlaciona de manera directa con la exposición previa al fármaco.", 
                source: "GPC SS-120-21, Diagnóstico y tratamiento de la neumonía bacteriana adquirida en la comunidad en población menor a 18 años, 2021, Cuadros o Figuras, Página 34." 
            },
            {
                id: 7, 
                question: "¿Cuál es el marcador antropométrico que predice mayor riesgo de mortalidad en un paciente pediátrico con Diarrea Aguda reportado en la Guía de Práctica Clínica?", 
                options: ["Edad mayor a cinco años", "Índice peso para la talla", "Puntuación Z menor a dos", "Medición del perímetro cefálico"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Diarrea Aguda Infantil, el estado nutricional basal del huésped es el principal determinante pronóstico para complicaciones irreversibles. Los niños que cursan con desnutrición aguda o crónica subyacente muestran una atrofia de las vellosidades que limita la respuesta a la terapia oral y perpetúa la inflamación intestinal.<br><br>Perla ENARM: \"Los índices antropométricos por debajo de menos dos desviaciones estándar (Puntuación Z), son factores de riesgo independientes comprobados para el aumento de complicaciones y mortalidad por diarrea aguda en menores de cinco años\".<br><br>Análisis de Distractores: La opción A es incorrecta porque el grupo de máxima vulnerabilidad a la mortalidad se concentra estrictamente en menores de tres años (y particularmente en lactantes menores). Las opciones B y D son parámetros biológicos útiles de somatometría general, pero por sí solos sin el punto de corte deficitario severo no predican un desenlace fatal.", 
                source: "GPC SS-156-18, Prevención, diagnóstico y tratamiento de diarrea aguda en pacientes de 2 meses a 5 años de edad, en el primer y segundo nivel de atención, 2018, Pronóstico, Página 35." 
            },
            {
                id: 8,
                question: "Utilizando la Clasificación Radiológica del Síndrome de Dificultad Respiratoria, ¿cómo se clasifica a un recién nacido prematuro con broncograma aéreo visible que sobrepasa la silueta cardíaca?",
                options: ["Estadio I", "Estadio II", "Estadio III", "Estadio IV"],
                answer: 1,
                justification: "Justificación: De acuerdo a la GPC de Síndrome de Dificultad Respiratoria, el Estadio I es muy leve y el broncograma es apenas discreto, mientras que el Estadio II se caracteriza por extensión del patrón reticulogranular y un broncograma aéreo prominente que supera el borde cardíaco. Los estadios III y IV representan formas más graves con borramiento total de la silueta (\"pulmón blanco\").<br><br>Perla ENARM: \"Estadio II (Moderada): La imagen reticulogranular se extiende a través de todo el campo pulmonar. Broncograma aéreo muy visible y sobrepasa los límites de la silueta cardíaca. Transparencia pulmonar disminuida.\"",
                source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Auxiliares Diagnósticos, Páginas 20-21."
            },
            {
                id: 9, 
                question: "En la Encefalopatía Hipóxico-Isquémica, ¿cuál es el hallazgo gasométrico en sangre de cordón umbilical que integra el diagnóstico presuntivo de asfixia perinatal según la Guía de Práctica Clínica?", 
                options: ["pH arterial menor a 7.20", "Presión de dióxido normal", "Lactato sérico mayor a 5", "Déficit de base mayor a 12"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Encefalopatía Hipóxico-Isquémica, el diagnóstico de asfixia se confirma objetivamente al nacimiento mediante parámetros gasométricos estrictos que reflejan el metabolismo anaerobio prolongado in útero. Un déficit de base igual o mayor a 12 mmol/L, o un pH de 7.00 o menor, son los marcadores absolutos que evidencian un alto componente isquémico intraparto severo.<br><br>Perla ENARM: \"Con pH menor de 7.0 en sangre de la arteria umbilical o déficit de base mayor o igual de 12 mmol / L o ambos, aumenta la probabilidad de que la encefalopatía neonatal, haya tenido un componente hipóxico durante el parto\".<br><br>Análisis de Distractores: El pH para normar criterio diagnóstico estricto de asfixia debe ser $\\le$ 7.00; si el pH está por arriba de 7.20 (A) es poco probable que la hipoxia pura sea la causa primaria de la encefalopatía (buscar infecciones o malformaciones). La PCO2 no es el criterio inicial de asfixia metabólica (B), y el lactato, aunque es un biomarcador de isquemia útil, no funge como el criterio operativo de inclusión en los algoritmos nacionales (C).", 
                source: "GPC IMSS-371-10, Diagnóstico, Tratamiento y Pronóstico de la Encefalopatía Hipóxico-Isquémica, 2017, Criterios Diagnósticos, Página 27." 
            },
            {
                id: 10, 
                question: "Ante la sospecha clínica inicial de Enterocolitis Necrosante en la incubadora, ¿cuál es el primer estudio de imagen que debe solicitarse de forma seriada para guiar el abordaje según la GPC?", 
                options: ["Tomografía axial computarizada abdominal", "Resonancia magnética abdominal", "Tránsito intestinal contrastado fluoroscópico", "Radiografía simple de abdomen"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Enterocolitis Necrosante, aunque hoy en día existen métodos dinámicos más sensibles como el ultrasonido Doppler de asa, la tradicional placa radiográfica en decúbito y tangencial sigue siendo el pilar diagnóstico inicial de escrutinio, universal y de control evolutivo en todas las UCIN.<br><br>Perla ENARM: \"Se recomienda tomar radiografía simple de abdomen cada 6 h ante la sospecha de Enterocolitis Necrosante durante la fase aguda de la enfermedad para establecer el diagnóstico y vigilar progresión\".<br><br>Análisis de Distractores: La tomografía (A) y la costosa resonancia (B) no son prácticas, disponibles, ni útiles en la urgencia aguda neonatal por el traslado y sedación del prematuro. El tránsito con medio de contraste (C) está absolutamente contraindicado en la fase aguda por el altísimo riesgo de fuga y perforación con peritonitis química.", 
                source: "GPC SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido, 2018, Diagnóstico (Imagenología), Página 36." 
            },
        ];

        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('PEDIALITEEXLastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('PEDIALITEEXProgress');
                localStorage.removeItem('PEDIALITEEXLastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('PEDIALITEEXProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('PEDIALITEEXLastQId', currentQuestionId);
                else localStorage.removeItem('PEDIALITEEXLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('PEDIALITEEXProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
</body>
</html>
