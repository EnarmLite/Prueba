        question: "¿Cuál es el tratamiento inicial inmediato indicado ante el diagnóstico clínico de neumotórax a tensión?",

        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, el colapso pulmonar con repercusión hemodinámica es una urgencia letal que requiere evacuación de aire a presión sin retrasos. La invasión pleural con aguja libera la válvula unidireccional permitiendo el retorno venoso al corazón.<br><br>Perla ENARM: Se debe de realizar toracocentesis en todos los pacientes con diagnóstico clínico de neumotórax a tensión.<br><br>Análisis de Distractores: La opción A es el paso subsecuente definitivo, no el inicial de salvamento. La opción C es el manejo del neumotórax simple menor. La opción D agravaría el colapso al introducir presión positiva sin haber liberado la presión pleural.",

    },
    {
        id: 2,
        question: "¿Cuál es la longitud mínima recomendada del catéter para asegurar el éxito en la toracocentesis de un neumotórax a tensión?",

        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, la pared torácica tiene un grosor que frecuentemente impide que catéteres cortos alcancen el espacio pleural, resultando en descompresiones fallidas. El uso de la longitud estandarizada permite atravesar los tejidos blandos en más del 95% de los pacientes.<br><br>Perla ENARM: Se recomienda realizar toracocentesis en el segundo espacio intercostal línea media clavicular del lado afectado con catéter de 6.5 cm de longitud.<br><br>Análisis de Distractores: Las opciones A y B son insuficientes para atravesar el tejido celular subcutáneo y muscular en la mayoría de los adultos. La opción D excede el requerimiento y aumenta el riesgo de lesión parenquimatosa profunda.",
        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 19."
    },
    {
        id: 3,
        question: "¿Cuál es el calibre indicado de la sonda endopleural para el manejo definitivo del neumotórax simple secundario a trauma?",

        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 20."
    },
    {
        id: 4,
        question: "¿Cuál es el punto de corte del despegamiento pleural apical para considerar un neumotórax simple como menor?",

        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 21."
    },
    {

    },
    {

        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, una pérdida de este volumen al colocar el tubo de drenaje refleja la sección de un vaso sistémico mayor, dictaminando un estado de choque hemorrágico que amerita control de daños hemostático.<br><br>Perla ENARM: El hemotórax masivo se define de acuerdo a los siguientes criterios: más de 1500 ml de sangre drenados inmediatamente a través del tubo de pleurostomía.<br><br>Análisis de Distractores: Las opciones A y B son volúmenes moderados que permiten continuar el manejo conservador y vigilancia. La opción D excede el umbral de diagnóstico temprano; esperar a este volumen incrementa drásticamente la mortalidad.",
        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 23."

    {
        id: 7,
        question: "¿Cuál es la intervención quirúrgica de primera línea indicada ante un paciente con diagnóstico de hemotórax masivo?",

        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, el sangrado exanguinante intratorácico requiere exploración quirúrgica abierta para ligar los vasos sangrantes, evacuar coágulos y reexpandir el pulmón de forma directa.<br><br>Perla ENARM: Se recomienda en pacientes con trauma de tórax con diagnóstico de hemotórax masivo realizar toracotomía de manera inicial.<br><br>Análisis de Distractores: La opción A es exclusiva para el taponamiento cardiaco. La opción B no detiene la hemorragia arterial. La opción D está contraindicada en el contexto de un choque hemorrágico agudo por masividad.",

    {

        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 23."
    },
    {
        id: 9,
        question: "¿Cuál es el método de imagen de primera elección para confirmar la sospecha de taponamiento cardiaco en urgencias?",

        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Diagnóstico, Página 22."

    {
        id: 10,
        question: "¿Qué condición clínica disminuye significativamente la sensibilidad del ultrasonido FAST en el paciente traumatizado?",

        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, el aire atrapado en los tejidos blandos actúa como un aislante acústico total que impide el paso de las ondas sonoras, haciendo imposible la visualización de las ventanas cardiacas y abdominales.<br><br>Perla ENARM: Se sugiere considerar que la sensibilidad del ultrasonido puede disminuir en pacientes con enfisema subcutáneo y obesidad.<br><br>Análisis de Distractores: La hipotensión (opción A) es el escenario ideal para el FAST. El neumotórax (opción C) y el hemotórax (opción D) son precisamente patologías que el protocolo FAST y e-FAST buscan identificar.",
        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Diagnóstico, Página 16."
    },
    {
        id: 11,
        question: "¿Cuál es el estudio de gabinete de elección para confirmar la ruptura traumática de aorta?",

        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, la utilización de contraste yodado sincronizado a la fase arterial permite visualizar la extravasación activa, la disección intimal o el seudoaneurisma.<br><br>Perla ENARM: Se recomienda realizar la angiotomografía en pacientes con trauma de tórax y sospecha de lesión de aorta.<br><br>Análisis de Distractores: La opción A es demasiado lenta para urgencias. La opción B es solo de escrutinio inicial. La opción D detecta hematoma, pero sin el contraste no evalúa directamente el lumen vascular.",
        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Diagnóstico, Página 17."
    },
    {
        id: 12,
        question: "¿Qué hallazgo en la radiografía de tórax obliga a descartar inminentemente una lesión traumática de la aorta?",

        answer: 0,

        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Diagnóstico, Página 17."
    },
    {
        id: 13,
        question: "¿En qué etapa del manejo del tórax inestable se sugiere considerar el uso de analgesia epidural?",

        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, el control óptimo del dolor mejora la mecánica torácica y evita hipoventilación. Sin embargo, su uso de rutina no es superior inicialmente, reservándose para facilitar la extubación.<br><br>Perla ENARM: Se sugiere considerar la analgesia epidural en pacientes con fracturas costales bajas o tórax inestable en etapa de destete ventilatorio siempre y cuando existan los recursos.<br><br>Análisis de Distractores: Las opciones A y B ocurren en etapas de choque donde el bloqueo simpático de la epidural empeoraría la hipotensión. La opción D requiere sedoanalgesia intravenosa profunda, no epidural.",
        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 25."
    },
    {

        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de traumatismo de tórax, el monitoreo continuo del intercambio de gases (hipoxia e hipercapnia) determina el éxito o fracaso del soporte no invasivo ante el riesgo de deterioro súbito de la mecánica pulmonar.<br><br>Perla ENARM: Se recomienda mantener vigilancia clínica y gasométrica estrecha en pacientes con ventilación mecánica no invasiva.<br><br>Análisis de Distractores: Las opciones A, B y C son estudios basales inespecíficos que no miden de forma directa la función ventilatoria ni el estado ácido-base alveolar requerido.",
        source: "SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Tratamiento, Página 26."

    {

        function displayQuestion(qId) {

            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            displayArea.classList.add('opacity-0');

                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');

                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGFUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGFULastQId', currentQuestionId);
                else localStorage.removeItem('CGFULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGFUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
