            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "De acuerdo a la GPC, ¿cuál es el punto de corte clínico exacto para clasificar a un recién nacido como pretérmino extremo?",
        options: ["≤ 28 semanas", "29 a 32 semanas", "32 a 34 semanas", "34 a 36 semanas"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, la morbimortalidad neonatal se asocia fuertemente con la edad gestacional al nacer. Por ello, estratificar el riesgo es fundamental; se considera prematuro extremo a todo aquel nacimiento que ocurra con 28 semanas o menos de gestación, grupo que concentra la mayor tasa de complicaciones graves como hemorragia intraventricular.<br><br>Perla ENARM: \"Se denomina recién nacido pretérmino al que nace entre las 20.1 y 36.6 semanas y se clasifican en tres grupos: recién nacido pretérmino extremo (≤ 28 semanas de gestación), recién nacido pretérmino moderado (29-32 semanas de gestación) y recién nacidos pretérmino (33-36 semanas de gestación).\"<br><br>Análisis de Distractores: La opción B corresponde al grupo de pretérminos moderados. Las opciones C y D abarcan el concepto de pretérmino tardío, el cual presenta una supervivencia mucho mayor y menores secuelas en el neurodesarrollo.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Introducción, Página 6."
    },
    {
        id: 2,
        question: "De acuerdo a la GPC, ¿qué alteración hematológica se debe buscar intencionadamente durante el control prenatal en mujeres de estrato social medio y bajo por ser un factor de riesgo para parto prematuro?",
        options: ["Trombocitopenia gestacional", "Leucocitosis asintomática", "Anemia materna", "Deficiencia de folato"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, las deficiencias nutricionales agudizadas por determinantes sociales impactan directamente en el crecimiento fetal y la duración de la gestación. La deficiencia de hemoglobina circulante compromete la oxigenación placentaria, desencadenando respuestas de estrés que pueden activar prematuramente el trabajo de parto.<br><br>Perla ENARM: \"El personal de enfermería deberá monitorear el control prenatal en mujeres de estrato social medio y bajo para detectar la anemia y prevenir el bajo peso al nacer o el parto prematuro.\"<br><br>Análisis de Distractores: La trombocitopenia y la leucocitosis no se destacan en esta guía como factores directos tamizables en este estrato sociodemográfico específico para parto prematuro. La deficiencia de folato se asocia a defectos del tubo neural, pero el documento enfatiza puntualmente el escrutinio de anemia.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Valoración de enfermería, Página 11."
    },
    {
        id: 3,
        question: "De acuerdo a la GPC, ¿qué porcentaje de las infecciones intrauterinas asociadas a un mayor riesgo de parto prematuro son provocadas por candidiasis vaginal asintomática?",
        options: ["14%", "25%", "40%", "50%"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, la colonización y proliferación fúngica en el tracto vaginal puede originar una respuesta inflamatoria ascendente. Los microorganismos de baja virulencia desencadenan la liberación de citocinas y prostaglandinas que inducen contractilidad uterina y modificaciones cervicales.<br><br>Perla ENARM: \"Un meta análisis demostró que el 40% de las infecciones intrauterinas por candidiasis vaginal asintomática es un factor de riesgo para presentar parto prematuro.\"<br><br>Análisis de Distractores: El 14% corresponde a la reducción del riesgo de parto prematuro al suplementar con zinc. Las opciones 25% y 50% son cifras incorrectas y no avaladas por la evidencia epidemiológica en la guía para esta patología.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Factores de riesgo del parto prematuro, Página 12."
    },
    {
        id: 4,
        question: "De acuerdo a la GPC, ¿cuál es el tiempo mínimo recomendado que debe existir entre un embarazo y otro para evitar el síndrome de agotamiento materno?",
        options: ["12 meses", "18 meses", "24 meses", "36 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, el periodo intergenésico corto priva al organismo materno del tiempo necesario para reponer las reservas nutricionales y fisiológicas consumidas durante la gestación y lactancia previas, elevando sustancialmente la incidencia de nacimientos antes de término.<br><br>Perla ENARM: \"El persona de enfermería deberá orientar a la población acerca del periodo intergenesico de no menos de 18 meses entre un embarazo y otro para evitar el síndrome de agotamiento materno.\"<br><br>Análisis de Distractores: Un periodo de 12 meses se considera un factor de riesgo directo por ser demasiado corto. Los periodos de 24 o 36 meses son seguros, pero el límite inferior dictado por la recomendación clave para evitar este síndrome es estrictamente 18 meses.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Factores de riesgo del parto prematuro, Página 14."
    },
    {
        id: 5,
        question: "De acuerdo a la GPC, ¿cuál es el límite máximo de horas de jornada laboral por semana recomendado para disminuir el riesgo de parto prematuro?",
        options: ["Menos de 36 horas", "Menos de 40 horas", "Menos de 44 horas", "Menos de 48 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, el estrés físico y mental crónico, desencadenado por largas jornadas de trabajo, incrementa los niveles de catecolaminas y cortisol materno, favoreciendo la maduración cervical precoz y la actividad miometrial.<br><br>Perla ENARM: \"El personal de enfermería deberá orientará a las mujeres sobre disminuir los riesgos de: Disminuir jornada laboral de menos de 40 horas por semana.\"<br><br>Análisis de Distractores: Las normativas laborales habituales a menudo permiten hasta 48 horas semanales; sin embargo, en el contexto del embarazo con riesgo de prematuridad, las 40 horas representan el umbral máximo de tolerancia comprobado. 36 y 44 horas son distractores numéricos sin sustento en el texto.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Factores de riesgo del parto prematuro, Página 13."
    },
    {
        id: 6,
        question: "De acuerdo a la GPC, ¿cuál es el tiempo límite de bipedestación continua permitido durante el día en la mujer embarazada para reducir el riesgo de parto prematuro?",
        options: ["2 horas continuas", "4 horas continuas", "6 horas continuas", "8 horas continuas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, la postura erecta prolongada altera la hemodinámica pélvica, comprometiendo el flujo uteroplacentario y ejerciendo presión mecánica directa sobre el cérvix, lo que predispone al parto pretérmino.<br><br>Perla ENARM: \"El personal de enfermería deberá orientará a las mujeres sobre disminuir los riesgos de: No estar de pie por más de 4 horas continuas durante el día.\"<br><br>Análisis de Distractores: Tiempos de 6 u 8 horas aumentan drásticamente el riesgo de complicaciones venosas y contracciones uterinas. 2 horas es una recomendación conservadora que no representa el límite máximo señalado en la normativa clínica.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Factores de riesgo del parto prematuro, Página 13."
    },
    {
        id: 7,
        question: "De acuerdo a la GPC, ¿durante qué periodo de la gestación se debe promover el consumo diario de suplementos de zinc para reducir el riesgo de parto prematuro en mujeres de bajos ingresos?",
        options: ["Primer trimestre", "Primer y segundo trimestre", "Dos últimos trimestres", "Todo el embarazo"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, los micronutrientes juegan un rol crítico en el mantenimiento de la integridad de las membranas fetales y en la regulación inmunológica. La deficiencia de zinc es común en poblaciones marginadas y su suplementación estratégica disminuye complicaciones infecciosas y rotura prematura de membranas en las fases de mayor crecimiento fetal.<br><br>Perla ENARM: \"El personal de enfermería promoverá el consumo prenatal de suplementos de micronutrientes múltiples, como el zinc diario durante los dos últimos trimestres del embarazo, para reducir el riesgo de parto prematuro.\"<br><br>Análisis de Distractores: El requerimiento de zinc aumenta exponencialmente en la segunda mitad del embarazo. Suplementarlo únicamente en el primer trimestre o de forma indistinta todo el embarazo no es la indicación estricta dirigida por el texto para el grupo de bajos ingresos.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Factores de riesgo del parto prematuro, Página 13."
    },
    {
        id: 8,
        question: "De acuerdo a la GPC, ¿cuál es la dosis diaria recomendada de aceites marinos para contribuir a disminuir el riesgo de parto prematuro?",
        options: ["100 mg diarios", "200 mg diarios", "300 mg diarios", "400 mg diarios"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, la suplementación con ácidos grasos poliinsaturados (omega-3 y omega-6) prolonga la gestación al alterar el equilibrio de la síntesis de prostaglandinas, reduciendo las formas proinflamatorias y pro-contráctiles que desencadenan el trabajo de parto.<br><br>Perla ENARM: \"El personal de enfermería orientará sobre el consumo de suplementos de aceites marinos de 200 mg diarios, como grasa de pescados y mariscos, omega-3 y omega-6 para contribuir a disminuir el riesgo de parto prematuro.\"<br><br>Análisis de Distractores: Dosis menores a 200 mg no logran una acumulación sérica protectora, mientras que dosis mayores (300 o 400 mg) no son la prescripción estándar de buena práctica recomendada por la normativa evaluada.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Prevención, Página 17."
    },
    {
        id: 9,
        question: "De acuerdo a la GPC, ¿antes de qué semana se debe promover y otorgar la primera consulta de atención prenatal para identificar y tratar comorbilidades?",
        options: ["8 semanas", "10 semanas", "12 semanas", "14 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, el inicio temprano del control gestacional permite una estratificación oportuna de factores de riesgo modificables, implementación de modificaciones dietéticas y despistaje de infecciones antes de que estas causen daño intrauterino irreversible.<br><br>Perla ENARM: \"El personal de salud deberá promover y otorgar atención prenatal a partir de las 12 semanas de gestación, identificar y tratar las comorbilidades durante el periodo de gestación.\"<br><br>Análisis de Distractores: Aunque iniciar el control a las 8 o 10 semanas es ideal en la práctica privada, la recomendación base del sector salud fija las 12 semanas como el umbral límite para una captación temprana efectiva. 14 semanas ya se considera un inicio tardío del control.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Valoración de enfermería, Página 11."
    },
    {
        id: 10,
        question: "De acuerdo a la GPC, ¿a qué servicio de atención debe ser referida de forma sistemática toda mujer embarazada para prevenir complicaciones que desencadenen parto prematuro?",
        options: ["Nutrición clínica", "Consulta dental", "Psicología clínica", "Medicina interna"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, los patógenos bucales pueden translocarse por vía hematógena hacia la unidad fetoplacentaria. La periodontitis es una fuente crónica de endotoxinas que precipitan la cascada inflamatoria uterina.<br><br>Perla ENARM: \"El personal de enfermería deberá referir a las mujeres embarazadas a consulta dental para la prevención y tratamiento de enfermedad periodontal con la finalidad de reducir el riesgo parto prematuro.\"<br><br>Análisis de Distractores: Aunque nutrición y psicología son importantes, el documento emite una recomendación contundente (Nivel de evidencia 1+) para la referencia y manejo no quirúrgico de la enfermedad periodontal como prevención primaria en todo el universo de gestantes.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Factores de riesgo del parto prematuro, Página 12."
    },
    {
        id: 11,
        question: "De acuerdo a la GPC, ¿qué alteración del estado de ánimo se debe valorar obligatoriamente en toda embarazada al asociarse directamente con el consumo de tabaco y parto prematuro?",
        options: ["Trastorno de ansiedad", "Trastorno bipolar", "Depresión", "Trastorno adaptativo"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Prematuro, las alteraciones psicológicas graves actúan como un factor precipitante de conductas de riesgo (como tabaquismo y alcoholismo), además de elevar el tono simpático y la producción de hormonas del estrés que alteran la quietud miometrial.<br><br>Perla ENARM: \"El personal de salud deberá realizar una valoración de depresión a la mujer embarazada y analizar el riesgo de consumo de tabaco ya que esta conducta puede condicionar un parto prematuro.\"<br><br>Análisis de Distractores: La ansiedad, los trastornos adaptativos y la bipolaridad son condiciones psiquiátricas relevantes, pero la directriz específica de tamizaje obligatorio en el entorno de prevención del parto prematuro recae sobre la depresión.",
        source: "SS-811-17, Intervenciones de enfermería para la prevención y detección oportuna del parto prematuro, 2017, Atención de la mujer embarazada, Página 16."
    },
    {
        id: 12,
        question: "De acuerdo a la GPC, ¿cuál es la característica fundamental que debe tener la dieta recomendada durante el embarazo, además de incluir granos enteros sin procesar, para evitar el parto prematuro?",
        options: ["Baja en sodio", "Baja en grasas", "Baja en glucemia", "Baja en proteínas"],
        answer: 2,

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ENF5Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ENF5LastQId', currentQuestionId);
                else localStorage.removeItem('ENF5LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ENF5Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

    onAuthStateChanged(auth, async (user) => {

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
