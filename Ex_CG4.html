    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [
            {
                id: 1, 
                question: "Utilizando el algoritmo de riesgo para Cáncer de Próstata, ¿cómo se clasifica y qué conducta procede en un paciente de 55 años asintomático con Antígeno Prostático Específico (APE) inicial de 2.0 ng/ml?", 
                options: ["Riesgo bajo, cuantificación cada año.", "Riesgo bajo, repetir en 2 años.", "Riesgo intermedio, solicitar APE libre.", "Riesgo alto, enviar a urología."], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Prevención y detección temprana del cáncer de próstata, los valores menores o iguales a 2.5 ng/ml en la prueba inicial confieren un periodo de seguridad clínica, haciendo innecesaria la medición anual.<br><br>Perla ENARM: \"Se recomienda que el médico haga una cuantificación sérica del APE cada 2 años, si en la prueba inicial el nivel sérico total fue ≤2.5 ng/ml.\"<br><br>Análisis de Distractores: La cuantificación anual (Opción A) se indica cuando el nivel inicial es mayor o igual a 2.5 ng/ml pero menor a 3.0 ng/ml. El APE libre (Opción C) y el envío a urología (Opción D) aplican solo para umbrales más altos y sospechosos.", 
                source: "GPC IMSS-021-18, Prevención y detección temprana del cáncer de próstata en el primer nivel de atención, 2018, Evidencias y Recomendaciones, p. 23." 
            },
            {
                id: 2,
                question: "Más allá de los cultivos, ¿cuál es el criterio confirmatorio (Estándar de Oro) que define a la Infección de Sitio Quirúrgico superficial aunque no exista aislamiento bacteriano?",
                options: [
                    "Reapertura deliberada por el cirujano",
                    "Dolor postoperatorio muy leve",
                    "Presencia de fiebre aislada",
                    "Eritema cutáneo sin extensión"
                ],
                answer: 0,
                justification: "Ante la evidencia macroscópica de infección que obliga a intervenir físicamente la herida, el diagnóstico se establece de facto. De acuerdo a la GPC de Prevención de Infección Quirúrgica, el juicio del especialista pesa sobre la sensibilidad de los cultivos.<br><br>Perla ENARM: \"Para el diagnóstico se requiere uno de los siguientes... También si el cirujano decide reabrir la herida deliberadamente aunque el cultivo sea negativo o si el médico tratante diagnostica una ISQ en una incisión superficial\".<br><br>Análisis de Distractores: El dolor leve (B), fiebre aislada (C) y eritema sin extensión (D) son datos de inflamación esperados en la cicatrización normal; requieren otros criterios (como descarga purulenta) para sumar diagnóstico de ISQ, a diferencia de la reapertura.",
                source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección del sitio quirúrgico, 2018, Evidencias y Recomendaciones, Página 24."
            },
            {
                id: 3, 
                question: "Según la GPC de amputación de extremidad inferior, ¿cuál es el hallazgo anatómico transoperatorio que previene el tratamiento quirúrgico inmediato por neuromas dolorosos?", 
                options: ["Dejar el nervio expuesto", "Cierre por segunda intención", "Cauterización del borde dérmico", "Sección nerviosa por encima"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Amputación de Extremidad Inferior, cuando un nervio se secciona, su extremo proximal intenta regenerarse formando un ovillo axonal (neuroma). Si este neuroma queda superficial y en la zona de carga del socket, la hiperestesia imposibilita la rehabilitación, obligando a reintervenir.<br><br>Perla ENARM: \"Técnicamente, se exige que el nervio principal haya sido sometido a tracción y sección por encima del nivel de la amputación (retracción) para quedar embebido en tejido muscular sano y evitar neuromas dolorosos superficiales.\"<br><br>Análisis de Distractores: Dejar el nervio expuesto (Opción A) es yatrogenia. El cierre por segunda intención (Opción B) genera cicatrices adherentes e irregulares que duelen con la prótesis. La cauterización dérmica (Opción C) no evita la hiperplasia axonal profunda.", 
                source: "GPC-DIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Manifestaciones Clínicas, Página 21." 
            }, 
            {
                id: 4, 
                question: "Más allá del abordaje inicial, ¿cuál es el estudio de imagen con mayor rendimiento (estándar de oro) para confirmar el Cólico Renoureteral según la GPC?", 
                options: ["Tomografía computarizada no contrastada", "Radiografía simple de tracto urinario", "Urografía excretora intravenosa", "Resonancia magnética pélvica"], 
                answer: 0, 
                justification: "De acuerdo a la GPC de Cólico Renoureteral, si bien el USG es el primer paso para no radiar, la Tomografía Computarizada (TAC) simple tiene la mayor sensibilidad clínica permitiendo identificar la inmensa mayoría de los litos y medir la densidad o características.<br><br>Perla ENARM: \"La tomografía computarizada no contrastada es la prueba con el mejor rendimiento diagnóstico, por lo tanto, si se cuenta con el recurso, es el estudio de elección en el paciente con litiasis ureteral\".<br><br>Análisis de Distractores: La radiografía (B) no ve litos radiolúcidos. La urografía excretora (C) ha caído en desuso frente a la TAC por su menor sensibilidad y riesgo de nefropatía por contraste. La resonancia (D) es deficiente para valorar calcificaciones agudas.", 
                source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 24." 
            },
            {
                id: 5, 
                question: "¿Cuál es el fármaco inhibidor multiquinasa que representa el estándar de oro utilizado en Hepatocarcinoma avanzado (Child-Pugh A-B) sin opción locorregional?", 
                options: ["Cisplatino", "Doxorrubicina", "Regorafenib", "Sorafenib"], 
                answer: 3, 
                justification: "Cuando el tumor invade la vasculatura o se disemina, las terapias locales son inútiles. De acuerdo a la GPC de Hepatocarcinoma, se debe bloquear la angiogénesis tumoral y la proliferación celular a nivel sistémico para extender la sobrevida.<br><br>Perla ENARM: \"Se recomienda usar sorafenib o lenvatinib en pacientes con HCC no resecable, no candidatos a terapia de control locorregional, con buen estado funcional (ECOG 0 y 1) y con función hepática adecuada\".<br><br>Análisis de Distractores: El Regorafenib (C) se indica como terapia de segunda línea exclusiva para pacientes que presentan falla o progresión tras el uso de Sorafenib. El Cisplatino (A) y la Doxorrubicina (B) forman parte de los esquemas neoadyuvantes pediátricos (PLADO), no son el estándar inicial en adultos avanzados.", 
                source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Tratamiento, Página 44." 
            },      
            {
                id: 6,
                question: "¿Cuál es el mecanismo de acción de los dispositivos comerciales de presión negativa utilizados en el cierre temporal de la Cirugía de Control de Daños por trauma abdominal?",
                options: [
                    "Promueven la evisceración temprana",
                    "Aumentan el edema visceral masivo",
                    "Disminuyen adherencia y deshidratación",
                    "Incrementan la retracción aponeurótica"
                ],
                answer: 2,
                justification: "De acuerdo a la GPC de Cirugía de control de daños, el uso del Sistema de Terapia de Presión Negativa de la Herida (TPNH) aísla el contenido visceral del exterior, controla el exudado y protege los tejidos.<br><br>Perla ENARM: \"Los dispositivos de TPNH que integran un sistema de instilación, disminuyen la adherencia y deshidratación de las asas intestinales, facilitando la reexploración seriada\".<br><br>Análisis de Distractores: Las otras tres opciones (promover evisceración, aumentar edema y aumentar la retracción fascial) son precisamente las complicaciones que el cierre temporal busca evitar al instituir la presión negativa controlada.",
                source: "GPC SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Tratamiento Quirúrgico, Página 23."
            },
            {
                id: 7, 
                question: "En el paciente inestable con neumotórax a tensión al que se le acaba de realizar una descompresión torácica, ¿cuál es el siguiente paso terapéutico obligatorio en la secuencia?", 
                options: ["Alta con cita abierta", "Tomografía simple computarizada", "Radiografía de tórax control", "Pleurostomía"], 
                answer: 3, 
                justification: "La aguja o catéter grueso insertado inicialmente alivia la tensión de manera temporal y salva la vida del paciente, pero no sella definitivamente la fuga de aire ni permite una reexpansión pulmonar completa a largo plazo. De acuerdo a la Guía de Práctica Clínica de Trauma de Tórax, el abordaje definitivo requiere un tubo torácico de grueso calibre.<br><br>Perla ENARM: El diagrama de flujo dicta que tras realizar la descompresión torácica por neumotórax a tensión, el paso inmediato subsecuente es la colocación de una Pleurostomía.<br><br>Análisis de Distractores: La opción A es negligencia médica. Las opciones B y C son estudios de gabinete que están contraindicados de forma inmediata en este contexto, ya que el paciente requiere estabilización invasiva definitiva (sello de agua) antes de ser trasladado al área de imagenología.", 
                source: "GPC SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Algoritmo 3. Diagnóstico y tratamiento del neumotórax a tensión, Página 5." 
            }, 
            {
                id: 8,
                question: "Según la estrategia de prevención primaria para Infección de Sitio Quirúrgico, ¿cuál es la medida indicada para la remoción del vello corporal?",
                options: [
                    "Uso de navaja libre",
                    "Uso de crema depilatoria",
                    "Uso de máquina para rasurar",
                    "Depilación manual con cera"
                ],
                answer: 2,
                justification: "Provocar microtraumatismos en el estrato córneo fomenta la multiplicación bacteriana previa a la incisión. De acuerdo a la GPC de Prevención de Infección Quirúrgica, si la remoción es inevitable, el método debe ser el menos abrasivo mecánicamente.<br><br>Perla ENARM: \"No se sugiere remover el pelo en el sitio quirúrgico a menos que el pelo interfiera con la operación. En caso necesario hacerlo fuera del quirófano usando tijeras o máquinas de rasurar desechables y no usar navajas\".<br><br>Análisis de Distractores: Las navajas libres (A) están estrictamente contraindicadas por las microabrasiones. Las cremas (B) o cera (D) causan dermatitis y no están recomendadas en el abordaje quirúrgico estándar.",
                source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección del sitio quirúrgico, 2018, Evidencias y Recomendaciones, Página 19."
            },
            {
                id: 9, 
                question: "En el abordaje del paciente con obesidad mórbida y diabetes mellitus, ¿cuál es el grupo farmacológico que la norma obliga a suspender exactamente 24 horas antes de la cirugía bariátrica?", 
                options: ["Anticonceptivos orales combinados.", "Inhibidores de dipeptidil-peptidasa 4.", "Inhibidores de bomba de protones.", "Fármacos del grupo biguanidas."], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Tratamiento quirúrgico de la obesidad, el manejo perioperatorio de los hipoglucemiantes varía según el mecanismo de acción y la vida media para prevenir complicaciones transanestésicas.<br><br>Perla ENARM: \"Glitazonas, glinidas e inhibidores de la dipeptidil-dipeptidasa 4, se deben suspender 24 horas antes de la cirugía con una reducción de la dosis de insulina a 0.3 unidades/kg. La metformina debe suspenderse el día de la cirugía\".<br><br>Análisis de Distractores: Las biguanidas (Metformina) se suspenden hasta el mero día de la cirugía. Los anticonceptivos orales deben retirarse 1 ciclo antes para evitar tromboembolismo. Los inhibidores de bomba se utilizan activamente antes y después para profilaxis de úlcera.", 
                source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Evidencias y Recomendaciones, Página 18." 
            }, 
            {
                id: 10, 
                question: "Más allá del abordaje inicial, ¿cuál es el estudio con mayor sensibilidad y especificidad (Estándar de Oro) para confirmar el Cáncer de Próstata según la GPC?", 
                options: ["Ultrasonido prostático transrectal simple.", "Resonancia magnética pélvica multiparamétrica.", "Tomografía axial computarizada pélvica.", "Biopsia de próstata."], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Prevención y detección temprana del cáncer de próstata, todo el flujograma de tamizaje tiene como único fin derivar al paciente asertivamente para la comprobación histopatológica del tejido tumoral, la cual es el estándar definitivo.<br><br>Perla ENARM: \"Enviar a segundo nivel de atención para evaluar por urólogo para realizar biopsia de próstata.\"<br><br>Análisis de Distractores: El ultrasonido (Opción A) y la resonancia (Opción B) son excelentes estudios de gabinete que incluso auxilian la toma de muestra, pero por sí solos no establecen el diagnóstico definitivo de cáncer frente al escrutinio patológico.", 
                source: "GPC IMSS-021-18, Prevención y detección temprana del cáncer de próstata en el primer nivel de atención, 2018, Flujogramas, p. 27." 
            },
            {
                id: 11, 
                question: "¿Cuáles son los marcadores tumorales séricos que deben solicitarse como estándar para el abordaje de cáncer de testículo?", 
                options: ["CA-125 y antígeno prostático", "AFP, hGC y DHL", "Antígeno carcinoembrionario y CA-19-9", "Fosfatasa alcalina y bilirrubina"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Cáncer de Testículo, la Alfa-fetoproteína (AFP), la Fracción Beta de la Gonadotropina Coriónica humana (hGC) y la Deshidrogenasa Láctica (DHL) son los tres marcadores obligatorios, indispensables tanto para el diagnóstico como para pronóstico y monitoreo postoperatorio.<br><br>Perla ENARM: \"En los pacientes en quienes por medio de la exploración física y el interrogatorio se tenga alta sospecha de cáncer testicular, se les debe solicitar la cuantificación sérica de AFP, hGC y DHL\".<br><br>Análisis de Distractores: El CA-125 es clásico de cáncer de ovario; el antígeno prostático es para próstata. El antígeno carcinoembrionario y CA-19-9 son marcadores de tracto gastrointestinal (colon, páncreas). La fosfatasa alcalina se eleva en problemas hepáticos u óseos.", 
                source: "GPC SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 15." 
            },
            {
                id: 12,

            {

                question: "¿Cuál es la edad recomendada para iniciar la prevención primaria mediante autoexploración para detectar el cáncer de testículo?",

                justification: "De acuerdo a la GPC de Cáncer de Testículo, el pico de incidencia de los tumores de células germinales se encuentra en hombres jóvenes, por lo que las estrategias de salud pública instan a instruir la exploración desde la adolescencia.<br><br>Perla ENARM: \"Maniobra de autoexploración testicular. Hacerlo una vez al mes a partir de los 15 años en adelante\".<br><br>Análisis de Distractores: Los 25 años es una edad donde ya existe una alta incidencia, pero la maniobra debió iniciarse mucho antes. A los 40 y 50 años, disminuye la incidencia de los tumores germinales clásicos (que son de adultos jóvenes) y comienzan a aparecer otras estirpes o etiologías (como el linfoma testicular en mayores de 60), por lo que el tamizaje a esa edad es tardío para la patología principal.",

                question: "¿Cuál es el tratamiento neoadyuvante indicado junto a radioterapia radical en un paciente con cáncer de próstata de alto riesgo?",

                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ECG75Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ECG75LastQId', currentQuestionId);
                else localStorage.removeItem('ECG75LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ECG75Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
</body>
</html>
