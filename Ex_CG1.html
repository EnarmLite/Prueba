            </div>

    <script>
        const questionsData = [
            {
                id: 1, 
                question: "Ante la sospecha clínica de un paciente con probable lesión de grandes vasos secundaria a trauma de tórax, ¿cuál es el primer estudio de imagen que debe solicitarse?", 
                options: ["Angio Tomografía Computarizada", "Radiografía de tórax", "Tomografía simple de tórax", "Ecocardiograma transtorácico"], 
                answer: 1, 
                justification: "De acuerdo a la Guía de Práctica Clínica de Trauma de Tórax, ante un paciente con trauma torácico que presenta inestabilidad hemodinámica, dolor torácico o taquipnea, el abordaje imagenológico primario siempre comienza con un estudio radiográfico para buscar alteraciones mediastinales.<br><br>Perla ENARM: En el algoritmo diagnóstico de lesión de grandes vasos, el primer paso tras descartar otras lesiones es realizar una Radiografía de tórax para buscar intencionadamente ensanchamiento de mediastino.<br><br>Análisis de Distractores: La opción A es el estudio subsecuente si se encuentra ensanchamiento mediastinal. La opción C se indica únicamente si no hay insumos para la Angio Tomografía. La opción D se utiliza para el abordaje del taponamiento cardiaco, no para grandes vasos.", 
                source: "GPC SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Algoritmo 2. Diagnóstico de lesión de grandes vasos, Página 4." 
            },
            {
                id: 2,
                question: "¿Cuál es el marcador laboratorial directo que predice agotamiento en la coagulación indicando la Cirugía de Control de Daños por trauma abdominal?",
                options: [
                    "Tiempo de protrombina acortado",
                    "Plaquetas mayores a 150,000",
                    "Fibrinógeno mayor a 400 mg/dL",
                    "INR mayor a 1.5"
                ],
                answer: 3,
                justification: "De acuerdo a la GPC de Cirugía de control de daños, la medición de los tiempos de coagulación permite la confirmación bioquímica de que el sangrado no es mecánico (falta de ligadura) sino sistémico.<br><br>Perla ENARM: \"Evidencia de coagulopatía transoperatoria definida por: Alargamiento >1.5 veces el tiempo de protrombina y tromboplastina parcial activada, INR >1.5\".<br><br>Análisis de Distractores: El tiempo de protrombina acortado, plaquetas y fibrinógenos altos reflejan una hemostasia competente. En el choque de consumo (tríada de la muerte), estos parámetros están invertidos (tiempos alargados, hipofibrinogenemia, trombocitopenia).",
                source: "GPC SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Diagnóstico Clínico, Página 18."
            },     
            {
                id: 3, 
                question: "Según la GPC de Cólico Renoureteral, ¿cuál es el tamaño anatómico del cálculo que indica resolución o tratamiento quirúrgico como criterio absoluto por Urología?", 
                options: ["Mayor a 5 milímetros", "Mayor a 10 milímetros", "Mayor a 15 milímetros", "Mayor a 20 milímetros"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Cólico Renoureteral, conforme aumenta el volumen de la carga litiásica, el abordaje pasa de médico expulsivo, a litotricia y finalmente abordajes invasivos quirúrgicos. Las dimensiones de más de 2 centímetros son criterios categóricos de derivación urgente.<br><br>Perla ENARM: \"Se debe solicitar interconsulta al servicio de Urología para resolución del cuadro cuando el paciente presente alguna de las siguientes características... Litos mayores de 20mm\".<br><br>Análisis de Distractores: De 5 a 10 mm (A) se intenta manejo conservador o terapia médica expulsiva (Tamsulosina). Mayor a 10 se deriva a consulta externa (B, C). Mayor a 20 mm es un parámetro directo de urgencia resolutiva integral.", 
                source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 32." 
            },
            {
                id: 4, 
                question: "Utilizando la clasificación del Cáncer de Hígado de Barcelona (BCLC) para Hepatocarcinoma, ¿cómo se clasifica a un paciente adulto que presenta un nódulo único de 3 cm?", 
                options: ["Estadio 0 muy temprano", "Estadio A temprano", "Estadio B intermedio", "Estadio C avanzado"], 
                answer: 1, 
                justification: "La correcta estadificación dicta la pauta curativa o paliativa. De acuerdo a la GPC de Hepatocarcinoma, un nódulo único o hasta tres nódulos que no superen los 3 cm cada uno, en ausencia de invasión vascular, se consideran una etapa temprana susceptible de tratamiento con intención curativa.<br><br>Perla ENARM: \"Estadio A (Temprano): Carcinoma hepatocelular temprano (tumor único o tres tumores de menos de 3 cm de diámetro máximo)\".<br><br>Análisis de Distractores: El estadio 0 (A) aplica únicamente para tumores menores de 2 cm. El estadio B (C) incluye tumores grandes y múltiples. El estadio C (D) se caracteriza por invasión vascular macroscópica o diseminación extrahepática.", 
                source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Anexos (Cuadro 5), Página 55." 
            },      
            {
                id: 5, 
                question: "Según el algoritmo de tratamiento de la Nefrolitiasis, tras cualquier abordaje endourológico, ¿cuál es el hallazgo que indica invariablemente la necesidad de una reintervención?", 
                options: ["Riesgo de litiasis residual", "Hematuria macroscópica persistente", "Litiasis residual confirmada", "Dolor cólico leve postoperatorio"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Nefrolitiasis en adultos, no se puede dar de alta de vigilancia a un paciente si queda carga litiásica demostrada, ya que servirá como nido inminente para el crecimiento de un nuevo cálculo.<br><br>Perla ENARM: Ante el hallazgo de litiasis residual confirmada tras ureterorrenoscopía o abordaje percutáneo, el algoritmo indica proceder a reintervención quirúrgica.<br><br>Análisis de Distractores: El \"riesgo\" por sí solo amerita colocación de tubo de drenaje, pero no obligadamente reintervención inmediata si no se corrobora. La hematuria y el dolor cólico leve son hallazgos postoperatorios esperados de manejo sintomático.", 
                source: "GPC SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Algoritmo 1, Página 37." 
            },
            {
                id: 6, 
                question: "Utilizando la Escala Internacional de Síntomas Prostáticos (IPSS) en un paciente con síntomas del tracto urinario inferior por crecimiento prostático, ¿cómo se clasifica a un paciente con un puntaje de 15 puntos?", 
                options: ["Sintomatología ausente", "Sintomatología leve", "Sintomatología moderada", "Sintomatología grave"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de STUI asociados a Crecimiento Prostático, la toma de decisiones clínicas y el escalamiento farmacológico (o quirúrgico) dependen críticamente de esta puntuación validada internacionalmente.<br><br>Perla ENARM: \"1 a 7 = Sintomatología leve; 8 a 19 = Sintomatología moderada; 20 a 35 = Sintomatología grave.\"<br><br>Análisis de Distractores: Un puntaje menor a 7 indicaría síntomas leves (B) susceptibles a vigilancia expectante. Puntajes de 20 o más representan síntomas graves (D) que frecuentemente ameritan manejo dual o quirúrgico temprano.", 
                source: "IMSS-176-06, Diagnóstico y Tratamiento de STUI asociados a Crecimiento Prostático, 2018, Cuadros o figuras, p. 37." 
            },     
            {
                id: 7, 
                question: "¿Qué agente antineoplásico está indicado sumar como primera línea a la terapia de privación androgénica en un paciente con cáncer de próstata metastásico que nunca ha recibido hormonoterapia?", 
                options: ["Bicalutamida vía oral", "Cabazitaxel intravenoso", "Estramustina vía oral", "Docetaxel intravenoso"], 
                answer: 3, 
                justification: "De acuerdo a la Guía de Práctica Clínica de Cáncer de Próstata, el paradigma clásico trataba a los metastásicos sólo con bloqueo hormonal. Estudios pivotales demostraron que añadir quimioterapia de forma temprana en el volumen metastásico alto, aún siendo \"sensible a hormonas\", mejora drásticamente la sobrevida global comparado con reservarlo solo para el estadio de resistencia.<br><br>Perla ENARM: Se recomienda añadir Docetaxel al tratamiento de supresión androgénica como primera línea de tratamiento de enfermedad metastásica, que no ha recibido tratamiento hormonal previo, en pacientes aptos para quimioterapia.<br><br>Análisis de Distractores: Cabazitaxel (opción B) se reserva como segunda línea después de que el paciente ya falló al Docetaxel. Bicalutamida (opción A) es un antiandrógeno obsoleto como monoterapia o manejo de primera línea actual para alto volumen. Estramustina (opción C) no es el estándar de cuidado de primera línea.", 
                source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Enfermedad avanzada/metastásica, Página 30." 
            },
            {
                id: 8, 
                question: "Ante la sospecha clínica de bajo potencial funcional en amputación de extremidad inferior, ¿cuál es el primer tamizaje que debe solicitarse según la GPC?", 
                options: ["Escala de FIM", "Índice de Barthel", "Radiografía de muñón", "Predictor de Movilidad AMPnoPRO"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Amputación de Extremidad Inferior, es un error prescribir una prótesis basándose únicamente en la edad o el deseo del paciente. Se requiere una medición objetiva del equilibrio, transferencias y capacidad metabólica antes de gastar recursos en tecnología protésica.<br><br>Perla ENARM: \"Se sugiere al clínico valorar los parámetros contemplados en el Predictor de Movilidad de Amputados, AMPnoPRO (versión para evaluación sin prótesis) para la evaluación de la deambulación funcional en personas con amputación de extremidades inferiores y orientar la prescripción.\"<br><br>Análisis de Distractores: La Escala FIM (Opción A) y el Barthel (Opción B) evalúan la independencia global y autocuidado, pero no predicen específicamente la biomecánica de marcha en amputados. La radiografía (Opción C) evalúa remanente óseo, pero no la capacidad funcional global del individuo.", 
                source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación Inicial, Página 17." 
            },                 
            {
                id: 9, 
                question: "¿Cuál es el marcador epidemiológico que predice mayor riesgo de mortalidad o desarrollo agresivo en un paciente con riesgo de Cáncer de Próstata?", 
                options: ["Antecedente familiar menor 60 años.", "Consumo crónico de carnes rojas.", "Tabaquismo y obesidad mórbida.", "Origen étnico caucásico."], 
                answer: 0, 
                justification: "De acuerdo a la GPC de Prevención y detección temprana del cáncer de próstata, las mutaciones genéticas que desencadenan la enfermedad a edades tempranas en la familia índice conllevan una penetrancia muy alta y obligan a vigilar al paciente con extremo cuidado.<br><br>Perla ENARM: \"...ya que a mayor cercanía del parentesco y menor sea la edad de presentación del cáncer en el familiar (60 años de edad) mayor será el riesgo de desarrollar CP.\"<br><br>Análisis de Distractores: Factores como la dieta (Opción B) o el tabaquismo (Opción C) tienen asociación pobre o evidencia muy baja como predictores letales comparados con la genética directa. La etnia caucásica (Opción D) es de menor riesgo que la afroamericana.", 
                source: "GPC IMSS-021-18, Prevención y detección temprana del cáncer de próstata en el primer nivel de atención, 2018, Evidencias y Recomendaciones, p. 13." 
            },
            {
                id: 10, 
                question: "Ante la sospecha clínica de cáncer de testículo por exploración, ¿cuál es el primer estudio de imagen que debe solicitarse?", 
                options: ["Tomografía axial computarizada", "Resonancia magnética pélvica", "Ultrasonido testicular bilateral", "Radiografía simple de abdomen"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Cáncer de Testículo, el ultrasonido es el estudio ideal porque permite diferenciar rápidamente masas sólidas (con alta sospecha de malignidad) de masas quísticas (benignas), evaluando además la vascularidad.<br><br>Perla ENARM: \"Se debe realizar el USG testicular bilateral con transductores de alta frecuencia o Doppler a color como primer estudio de imagen, después de la detección clínica de un probable tumor intraescrotal\".<br><br>Análisis de Distractores: La tomografía computarizada no se usa de primera instancia para el tumor primario, sino para etapificar ganglios retroperitoneales. La resonancia magnética es costosa y no supera al ultrasonido en el abordaje agudo inicial. La radiografía simple no valora el parénquima testicular.", 
                source: "GPC SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 16." 
            },   
            {
                id: 11,
                question: "¿Cuál es el marcador laboratorial preoperatorio que predice mayor riesgo y cuyo control disminuye la Infección de Sitio Quirúrgico en pacientes diabéticos?",
                options: [
                    "Glucosa capilar en ayuno",
                    "Hemoglobina Glucosilada menor a 7%",
                    "Cetonas en examen general",
                    "Péptido C sérico elevado"
                ],
                answer: 1,
                justification: "Un mal control crónico altera permanentemente la quimiotaxis y fagocitosis celular, lo que no se revierte solo corrigiendo la glucosa al ingreso. De acuerdo a la GPC de Prevención de Infección Quirúrgica, la cirugía electiva exige optimizar este marcador metabólico.<br><br>Perla ENARM: \"Para el paciente diabético, en la cirugía programa se recomienda reducir el nivel de hemoglobina glucosilada A1c a menos de 7% antes de la intervención quirúrgica\".<br><br>Análisis de Distractores: Aunque la glucosa capilar (A) se mide, la hemoglobina glucosilada predice verdaderamente el ambiente proinflamatorio crónico. Las cetonas (C) descartan cetoacidosis urgente, no perfilan riesgo de ISQ electiva.",
                source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección del sitio quirúrgico, 2018, Evidencias y Recomendaciones, Página 12."
            },
            {
                id: 12, 
                question: "Ante la sospecha clínica de fuga anastomótica en un paciente con obesidad mórbida postoperado de derivación gástrica, ¿cuál es el primer estudio de imagen que debe solicitarse según la GPC?", 
                options: ["Tomografía por emisión de positrones.", "Ultrasonido de abdomen superior.", "Radiografía simple de abdomen.", "Serie con contraste hidrosoluble."], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Tratamiento quirúrgico de la obesidad, para comprobar la integridad de la anastomosis gastro-yeyunal de forma segura, se debe utilizar un contraste inerte a la cavidad peritoneal antes de utilizar bario u otra técnica.<br><br>Perla ENARM: \"Ante el paciente con sospecha de fuga anastomótica y clínicamente estable, se debe considerar estudios con contraste hidrosoluble seguido de bario o tomografía axial computarizada\".<br><br>Análisis de Distractores: El ultrasonido y la radiografía simple carecen de sensibilidad para microfugas tempranas. La tomografía por emisión de positrones es un estudio metabólico de oncología sin utilidad en perforación gástrica aguda.", 
                source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Evidencias y Recomendaciones, Página 37." 
            }, 
            {
                id: 13, 
                question: "De acuerdo a los criterios establecidos en la GPC, ¿cuál es el volumen de drenaje inicial por pleurostomía que define formalmente a un hemotórax masivo?", 
                options: ["500 mililitros", "1000 mililitros", "1500 mililitros", "2000 mililitros"], 
                answer: 2, 
                justification: "El volumen de pérdida hemática en la cavidad torácica dicta la conducta terapéutica. De acuerdo a la Guía de Práctica Clínica de Trauma de Tórax, obtener este volumen al momento de colocar el tubo pleural es un criterio de severidad absoluto que requiere intervención quirúrgica.<br><br>Perla ENARM: Son criterios de hemotórax masivo un drenaje inicial de 1500 mililitros o un drenaje continuo de 150 a 200 mililitros por hora.<br><br>Análisis de Distractores: Las opciones A, B y D son volúmenes incorrectos que no cumplen con la definición estricta de la guía para clasificar el sangrado como masivo ni indican por sí solos toracotomía en el drenaje inicial.", 
                source: "GPC SS-447-11, Diagnóstico y tratamiento del traumatismo de tórax en adultos, 2017, Algoritmo 6. Diagnóstico de hemotórax masivo, Página 8."

                answer: 2,
                justification: "De acuerdo a la GPC de Cirugía de control de daños, el paciente requiere un periodo de estabilización en Cuidados Intensivos (reversión de la tríada letal) antes de someterlo a una reconstrucción definitiva. Hacerlo antes predispone al fracaso metabólico; después, aumenta el riesgo de abdomen congelado.<br><br>Perla ENARM: \"La intervención planeada debe efectuarse 24 a 96 horas después de la laparotomía inicial en el paciente con trauma abdominal por PAF bajo CCD\".<br><br>Análisis de Distractores: De 2 a 12 horas es insuficiente para corregir coagulopatía o acidosis en la mayoría de los casos. De 6 a 12 meses es el tiempo establecido para el cierre definitivo de una Hernia Ventral Planeada (HVP), no para la reintervención inmediata planeada.",
                source: "GPC SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Tratamiento Quirúrgico, Página 21."

            {
                id: 15,

        function setupEventListeners() {

                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            if (!state || !state.answered) {

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">

                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ECG15Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ECG15LastQId', currentQuestionId);
                else localStorage.removeItem('ECG15LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ECG15Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
