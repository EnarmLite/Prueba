    <script>
        // --- LOGO SNIPPET (Desktop Module & Screens: Absolute Right inside content) ---
        const desktopInnerLogoHtml = `
            <div class="hidden md:block md:absolute md:top-8 md:right-8 z-10">
                <div class="logo-container bg-white py-1 px-3 rounded-lg border border-slate-200 shadow-sm">
                    <span class="logo-enarm text-xl">ENARM</span>
                    <span class="logo-Lite text-base">Lite<sup>®</sup></span>
                </div>

        `;

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Tratamiento médico del estreñimiento funcional en el escolar y adolescente",
    gpcLink: "https://drive.google.com/file/d/1MNMLfIcwXmrpFbez8xp5Z9iVgF6-BAEj/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM no evalúa simplemente "dar laxantes"; evalúa tu capacidad para identificar el estado de <strong class="text-indigo-900 dark:text-indigo-200">impactación fecal</strong>. El concepto central es que está <u class="decoration-indigo-400 decoration-2 font-medium">contraindicado iniciar terapia de mantenimiento o aumentar la fibra dietética si el paciente está impactado</u>, ya que esto exacerba el dolor y el manchado, empeorando el cuadro clínico.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo del estreñimiento funcional no es lineal, es bifásico:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Primer Filtro (Descarte):</strong> Ante un paciente con criterios de Roma III, lo primero es buscar "Banderas Rojas". Si existen, no tocas al paciente y refieres a gastroenterología. Si no hay datos de alarma, el algoritmo avanza.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto de Inflexión (¿Está impactado?):</strong>
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">SÍ tiene impactación:</span> Entras a la Fase de Desimpactación. <strong class="underline">Debes suspender o reducir la fibra</strong> e incrementar agresivamente los líquidos junto con laxantes osmóticos a dosis altas.</li>
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">NO tiene impactación:</span> Pasas a la Fase de Mantenimiento. Iniciamos aporte calculado de fibra y ajuste de laxantes para lograr evacuaciones blandas.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Cierre (Retirada):</strong> El tratamiento no se suspende cuando el niño evacúa bien una vez. Se debe mantener al menos <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">2 meses</strong> y solo se retira gradualmente cuando los síntomas se han resuelto por completo durante al menos 1 mes. Retirar abruptamente es causa de recidiva.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Diagnóstico Operativo:</strong> La clínica manda sobre la radiografía. La impactación se define por: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Masa fecal grande y dura</strong> a la palpación abdominal (usualmente FII) o <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Recto dilatado ocupado</strong> al tacto.</li>
                        <li><strong>La Perla Clínica:</strong> Si el caso menciona <u class="decoration-emerald-400 decoration-2 font-bold">"manchado de ropa interior" (encopresis)</u> asociado a dolor, no es diarrea, es estreñimiento grave con rebosamiento por impactación.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa del Aceite Mineral:</strong> Está absolutamente <strong class="text-rose-600 dark:text-rose-400 font-bold">contraindicado en niños &lt; 1 año o con daño neurológico/ERGE</strong> por riesgo de broncoaspiración y neumonía lipoídica.</li>
                        <li><strong>La Trampa de la Fibra:</strong> Si el paciente está en fase de desimpactación, la fibra aumenta la producción de gas y dolor. La indicación es <u class="decoration-rose-500 decoration-2">dieta pobre o ausente de fibra</u> en este momento.</li>
                        <li><strong>Diferencial Terapéutico:</strong> Si no cuentas con PEG 3350, la Lactulosa es la alternativa de primera línea recomendada antes que la Leche de Magnesia.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-643-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Fármaco de Elección:</strong> El <strong class="underline">Polietilenglicol (PEG) 3350</strong> es la primera línea tanto para desimpactación como para mantenimiento.</li>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El dominio del asma pediátrica para el examen no reside simplemente en identificar sibilancias, sino en la capacidad de <strong class="text-indigo-900 dark:text-indigo-200">estratificar dinámicamente la gravedad</strong> (Crisis Leve-Moderada vs. Grave) para decidir el soporte ventilatorio inmediato y aplicar la escalada terapéutica basada estrictamente en el <u class="decoration-indigo-400 decoration-2 font-medium">nivel de control clínico</u> y no solo en la función pulmonar.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 Lógica del Algoritmo (Urgencia y Mantenimiento)</h4>
                <p class="mb-4">El algoritmo de la GPC se mueve en dos escenarios distintos:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">En la Urgencia (El Triage de Vida o Muerte):</strong>
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Sat 90-95% y habla con frases (Leve-Moderada):</span> El manejo es con <strong class="underline">SABA + Espaciador</strong>. Se reserva la nebulización solo si no tolera el dispositivo.</li>
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Sat &lt; 90%, habla entrecortada o sentado (Grave):</span> Abandonar espaciador. Pasar a Nebulización con <strong class="font-bold">SABA + Bromuro de Ipratropio + Oxígeno</strong> cada 20 min las primeras 2 horas.</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">En el Mantenimiento (La "Regla de los Dos"):</strong> Se justifica iniciar tratamiento a largo plazo (CEI) si el niño usa broncodilatador o tiene síntomas <strong class="text-pink-600 dark:text-pink-400">&ge; 2 veces por semana</strong>, o despertares nocturnos <strong class="text-pink-600 dark:text-pink-400">&ge; 2 veces al mes</strong>.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Arte de Escalar (Step-Up):</strong> Si no se controla, en mayores de 4 años se duplica dosis de CEI o se agrega LABA/Antileucotrieno. <em class="text-amber-600 dark:text-amber-500">Ojo: En menores de 4 años, agregar LABA es terreno estricto del especialista</em>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>PEF/VEF1 50-60%:</strong> Se correlaciona con paciente que aún habla en frases y mantiene SpO2 &gt; 90% (Crisis Leve-Moderada).</li>
                        <li><strong>La Ruptura Funcional:</strong> PEF/VEF1 cae al <strong class="text-emerald-700 dark:text-emerald-300 font-bold bg-emerald-100 dark:bg-emerald-800/50 px-1 rounded">25-50%</strong> = Uso de músculos accesorios, FC &gt; 120 lpm, y el niño prefiere sentarse (Crisis Grave).</li>
                        <li><strong>Monitoreo Especializado:</strong> La FeNO (Fracción exhalada de Óxido Nítrico) monitorea adhesión, pero ¡cuidado!, las infecciones virales pueden elevarla falsamente.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa del "Silencio":</strong> Si hay <u class="decoration-rose-500 decoration-2">tórax silente</u>, bradicardia o letargo = Paro Respiratorio Inminente. No se nebuliza, se prepara intubación (Meta SpO2 &gt; 94%).</li>
                        <li><strong>La Trampa de la Inmunoterapia:</strong> Iniciar inmunoterapia en una exacerbación es una <strong class="text-rose-600 dark:text-rose-400 font-bold">contraindicación absoluta</strong> (solo se hace en asma alérgica controlada).</li>
                        <li><strong>El Menor de 4 años:</strong> El uso de CEI + LABA en menores de 4 años no es de primera línea sin evaluación por especialista.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-009-20)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Elección en Crisis Grave:</strong> Nebulizar <strong class="underline">Salbutamol + Bromuro de Ipratropio con oxígeno</strong> cada 20 minutos por 2 horas.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">La "Regla de los Dos":</strong> Iniciar mantenimiento (CEI) si hay síntomas o rescate <strong class="underline">&ge; 2 veces/semana</strong>, o síntomas nocturnos <strong class="underline">&ge; 2 veces/mes</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Manejo Refractario:</strong> En crisis grave que no responde a SABA + corticoide sistémico, agregar <strong class="underline">Metilxantinas (Aminofilina)</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Referencia a Alergología:</strong> Se envía a pacientes con asma alérgica <strong class="underline">controlada</strong> (pasos 2-4) para Inmunoterapia.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Dispositivo en Crisis Leve:</strong> La primera línea es SABA con <strong class="underline">espaciador</strong> (incluso en &lt; 4 años con mascarilla), no la nebulización rutinaria.</li>
                </ol>
            </div>
        </div>

{
    id: 4,
    title: "Módulo 4: Diagnóstico y tratamiento de la infección de vías urinarias no complicada en menores de 18 años",
    gpcLink: "https://drive.google.com/file/d/1IGAvQrZfkxsXi3SKRF4YiUk26x85ZweO/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM no evalúa simplemente si sabes dar antibiótico, sino si entiendes que <strong class="text-indigo-900 dark:text-indigo-200">la prioridad en pediatría es preservar la función renal</strong>. El núcleo de este tema es la técnica de recolección de la muestra basada en el control de esfínteres; un diagnóstico erróneo por contaminación lleva a sobretratamiento, y un subdiagnóstico lleva a <u class="decoration-indigo-400 decoration-2 font-medium">cicatrices renales irreversibles e hipertensión futura</u>.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El abordaje clínico sigue una narrativa dicotómica basada en la edad y la capacidad del niño para colaborar:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">A</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Sospecha Clínica y la Recolección:</strong> Ante fiebre sin foco en lactantes o síntomas urinarios en escolares, el algoritmo se bifurca:
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">NO controla esfínteres (usualmente &lt; 2 años):</span> La bolsa recolectora tiene un valor predictivo muy bajo. El estándar obligatorio es invasivo: <strong class="underline">cateterismo vesical o punción suprapúbica (PSP)</strong>.</li>
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Controla esfínteres:</span> Se opta por el chorro medio.</li>
                            </ul>
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">B</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Decisión Terapéutica (Hospital vs. Casa):</strong> Confirmado el diagnóstico (Esterasa/Nitritos + Cultivo), el punto de inflexión es la edad de 3 meses y la toxicidad.
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong class="font-bold text-slate-700 dark:text-slate-200">&lt; 3 meses:</strong> Se hospitalizan para manejo parenteral (Ampicilina + Aminoglucósido) por riesgo de sepsis y uropatía oculta.</li>
                                <li><strong class="font-bold text-slate-700 dark:text-slate-200">&gt; 3 meses:</strong> Con buena tolerancia oral, manejo ambulatorio con Nitrofurantoína o TMP-SMX.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>La Regla de Oro del Urocultivo:</strong> 
                            <br>- Cateterismo vesical: Positivo con <strong class="text-emerald-700 dark:text-emerald-300 font-bold">&gt; 10,000 UFC/ml</strong>.
                            <br>- Chorro medio: Requiere <strong class="text-emerald-700 dark:text-emerald-300 font-bold">&ge; 100,000 UFC/ml</strong>.
                            <br>- Punción Suprapúbica (PSP): <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Cualquier crecimiento</strong> es altamente sugestivo.
                        </li>
                        <li><strong>Hallazgo Clínico:</strong> En lactantes, fiebre sin foco, irritabilidad y orina fétida equivalen a la disuria del adulto. <u class="decoration-emerald-400 decoration-2 font-bold">Nitritos y esterasa leucocitaria</u> en tira reactiva son el gatillo empírico.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa de la Bolsa Recolectora:</strong> Urocultivo de bolsa con &gt; 100,000 UFC de flora mixta NO es diagnóstico. La bolsa <strong class="text-rose-600 dark:text-rose-400 font-bold">sirve para descartar</strong> (si sale negativa), no para confirmar.</li>
                        <li><strong>Red Flag de Imagen:</strong> Todo niño <strong class="underline">&lt; 2 años con su primera IVU requiere Ultrasonido Renal</strong>. No pidas Gamagrama (DMSA) en fase aguda para cicatrices (se pide &gt; 3 meses después).</li>
                        <li><strong>Red Flag de Tratamiento:</strong> NUNCA des Nitrofurantoína si sospechas pielonefritis o sepsis, no alcanza niveles tisulares; usa Cefalosporinas de 3ra gen (Cefixima o Ceftriaxona).</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-027-21)

                    El Concepto Fundamental
                </h4>
                <p>El LNH pediátrico es una urgencia oncológica donde el éxito depende de la determinación inmediata del linaje histológico. El ENARM evaluará tu capacidad para distinguir que el <strong class="text-indigo-900 dark:text-indigo-200">LNH de células B (Burkitt) se trata con ciclos cortos e intensos</strong>, mientras que el <u class="decoration-indigo-400 decoration-2 font-medium">LNH Linfoblástico se maneja como una leucemia aguda de alto riesgo</u> (largo plazo).</p>

                        <div>

                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">

                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>La Regla del 25% (Médula Ósea):</strong> Es la frontera entre Linfoma y Leucemia. Si hay <strong class="text-emerald-700 dark:text-emerald-300 font-bold">&lt; 25% blastos</strong> = Linfoma Estadio IV. Si hay <strong class="text-emerald-700 dark:text-emerald-300 font-bold">&gt; 25% blastos</strong> = Leucemia (Burkitt o LLA).</li>

                    Las 5 Perlas de Oro (GPC SS-290-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Salvamento Células B:</strong> Ante recaída/refractariedad en Burkitt, el esquema de elección es <strong class="underline">ICE</strong> (Ifosfamida, Carboplatino, Etopósido).</li>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">

                    El Concepto Fundamental
                </h4>
                <p>El Sarcoma de Ewing debe entenderse no solo como una masa ósea, sino como una <strong class="text-indigo-900 dark:text-indigo-200">enfermedad sistémica desde el diagnóstico</strong>. El ENARM busca que integres que la cirugía por sí sola es insuficiente; el éxito del tratamiento radica en una <u class="decoration-indigo-400 decoration-2 font-medium">estrategia multimodal obligatoria que siempre inicia con quimioterapia sistémica (neoadyuvancia)</u> para el control de micrometástasis, antes de cualquier intento de control local definitivo.</p>

                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El manejo se estructura en una secuencia lógica de "golpear, evaluar y consolidar":</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Punto de Partida (Estratificación):</strong> Antes de tocar al paciente, debes clasificarlo. La GPC es estricta: un tumor localizado se considera de Riesgo Estándar solo si tiene un volumen <strong class="underline">&lt; 200 ml</strong>. Si el volumen supera los 200 ml, automáticamente escala a <strong class="text-rose-600 dark:text-rose-400">Alto Riesgo</strong>, lo que ensombrece el pronóstico.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Inflexión Terapéutica (Inducción):</strong> No se opera de entrada. Todos inician con <strong class="font-bold">Quimioterapia de Inducción (Protocolo VIDE)</strong> por 6 ciclos para reducir el tumor y evaluar la quimiosensibilidad in vivo.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Decisión del Control Local:</strong> Tras la inducción, se decide: ¿Cirugía o Radioterapia? La preferencia es la cirugía si el tumor es resecable. La RT se reserva para casos irresecables o como complemento a cirugía no curativa.

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">4</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El "Juez" Histológico (Respuesta R1 vs. R2):</strong> El patólogo evalúa cuántas células tumorales sobrevivieron a la quimioterapia:
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Buena (R1):</span> &lt; 10% de células viables.</li>
                                <li><span class="font-bold text-rose-600 dark:text-rose-400">Mala (R2):</span> &gt; 10% de células viables.</li>
                            </ul>
                            Esto dicta la agresividad de la consolidación (VAI vs. VAC) y la necesidad de radioterapia.
                        </div>
                    </div>
                </div>
            </div>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>
                        <p class="text-xs text-slate-500 mt-1 italic">Fuente: ${q.source}</p>
                    </div>
                </div>`;

            quizHtml += '</div>';

                nextBtn = `<button class="w-full sm:w-auto bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-emerald-700 transition-all" onclick="showFinalSummary()">Ver Resultados</button>`;

            }

            document.getElementById('module-display').innerHTML = `

                    ${desktopInnerLogoHtml}

                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white pr-0 md:pr-40">${moduleData.title} <span class="text-emerald-500 text-lg align-middle ml-2">(Completado)</span></h2>
                    
                    <div class="mt-4 mb-6 flex flex-col sm:flex-row gap-3">

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" /></svg>
                            Ver Resumen del Módulo
                        </button>
                        
                        <a href="${moduleData.gpcLink}" target="_blank" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold py-3 px-4 rounded-lg border border-slate-200 dark:border-slate-600 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors flex items-center justify-center gap-2">

                            </svg>
                            GPC "Referencia rápida"

                    <div class="mt-6">
                        <h3 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-3">Caso Clínico</h3>

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>
                            <span>${score}/${total}</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-sky-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });
            moduleScoresHtml += '</div>';
            
            const finalPct = totalQuestions > 0 ? Math.round((totalScore/totalQuestions)*100) : 0;

            document.getElementById('module-display').innerHTML = `

                                <div class="grid grid-cols-3 gap-2 mb-6">

            if(!list) return;

            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                if (module) {

                    if (isCompleted) {
                        innerHTML += `

"GPC-IMSS-826-18. Diagnóstico y tratamiento del síndrome nefrítico agudo postestreptocócico en edad pediátrica. 2018.",

"GPC-SS-290-18. Tratamiento de linfoma no Hodgkin en pediatría. 2018.",

            ];
            
            bibliographyContent.innerHTML = '';
            allSources.forEach(citation => {

                item.className = 'bg-slate-100 dark:bg-slate-700 p-3 rounded-lg flex items-start gap-3 text-sm';
                item.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 dark:text-slate-400 flex-shrink-0 mt-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríaIIICourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaIIILastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríaIIICourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríaIIICourseProgress');
            localStorage.removeItem('pediatríaIIILastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-sky-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-sky-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
