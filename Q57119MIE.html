    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [


    {
        id: 1,
        question: "¿Qué variante clínica de hipertermia severa afecta típicamente a pacientes con comorbilidades crónicas, inmunocompromiso o alteraciones anatómicas, desarrollándose por exposición ambiental directa sin requerir actividad física previa?",
        options: ["Variante clásica", "Variante por esfuerzo", "Variante de estadio I", "Variante moderada"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, la patología se divide en dos perfiles epidemiológicos claros: el asociado al ejercicio en jóvenes sanos y la forma clásica en pacientes con vulnerabilidad intrínseca.<br><br>Perla ENARM: Históricamente el golpe de calor se ha clasificado en dos entidades clínicas diferentes, golpe de calor asociado a esfuerzo; y golpe de calor no asociado al ejercicio, el cual se presenta en pacientes susceptibles solo por las temperaturas ambientales altas.<br><br>Análisis de Distractores: La variante por esfuerzo requiere actividad física extenuante previa. Los estadios I y moderado son fases de menor gravedad (agotamiento), no etiologías de la hipertermia extrema.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Diagnóstico, p. 18."
    },
    {
        id: 2,
        question: "Además de los mayores de 65 años, ¿qué grupo etario se considera poblacionalmente vulnerable al estrés térmico y cumple criterio absoluto para traslado inmediato a unidad de cuidados críticos?",
        options: ["Menores de 15 años", "Menores de 12 años", "Menores de 8 años", "Menores de 5 años"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, los extremos de la vida tienen inmadurez o senescencia en las respuestas termorreguladoras, lo que facilita el desarrollo fulminante de disfunción multiorgánica.<br><br>Perla ENARM: Se recomienda trasladar de manera inmediata a los pacientes con edades al extremo de la vida (pacientes mayores de 65 años y menores de 12 años), a un escalón hospitalario que cuente con unidad de cuidados críticos.<br><br>Análisis de Distractores: Las edades de 5, 8 o 15 años no son los puntos de corte establecidos por la guía nacional para la activación de la red de traslado en esta patología.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 25."
    },
    {
        id: 3,
        question: "Ante escenarios donde la temperatura ambiental excede los 30°C, ¿en qué horarios específicos sugiere la norma limitar y concentrar la realización de actividades físicas para evitar la morbilidad térmica?",
        options: ["11 a 16 horas", "10 a 15 horas", "12 a 18 horas", "7 a 8 y 17 a 19 horas"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, restringir el esfuerzo a las ventanas de menor radiación solar e impacto térmico previene la saturación del sistema de disipación calórica.<br><br>Perla ENARM: Se recomienda que siempre que exista un ambiente con temperatura ambiental mayor a 30°C... idealmente no realizar actividades físicas en los horarios donde se incrementa la temperatura, limitando las actividades físicas de 7 a 8 horas, y de 17 a 19 horas.<br><br>Análisis de Distractores: Los rangos intermedios del día (10 a 18 horas) son los momentos de mayor pico de temperatura e insolación directa, por lo que la actividad debe evitarse por completo, no fomentarse.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Prevención, p. 18."
    },
    {
        id: 4,
        question: "Fisiopatológicamente, ¿qué porcentaje de pérdida de volumen respecto al peso corporal total desencadena la disminución crítica de la producción de sudor y del flujo sanguíneo cutáneo?",
        options: ["1 a 2%", "6 a 8%", "3 a 5%", "9 a 11%"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, rebasar este umbral hídrico obliga al organismo a centralizar el volumen circulante, suprimiendo la principal vía de eliminación de calor (evaporación) y acelerando la hipertermia intraabdominal.<br><br>Perla ENARM: La deshidratación reduce el rendimiento... Cuando la pérdida de líquidos consiste en el 3 al 5% del peso corporal, la producción de sudor y el flujo sanguíneo de la piel empiezan a disminuir, reduciendo así la capacidad de disipación del calor.<br><br>Análisis de Distractores: Pérdidas del 1 al 2% causan sed pero mantienen el flujo cutáneo. Pérdidas mayores al 8% indican choque hipovolémico establecido grave, mucho después de que los mecanismos de sudoración han claudicado.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Prevención, p. 17."
    },
    {
        id: 5,
        question: "¿Qué dispositivo físico, comúnmente utilizado en lesiones musculoesqueléticas, está explícitamente contraindicado durante el manejo inicial prehospitalario para el enfriamiento térmico?",
        options: ["Vendas de compresión", "Sábanas de algodón", "Compresas frías", "Ventiladores eléctricos"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, el uso de compresión periférica limita la dilatación de los lechos capilares subcutáneos, atrapando el calor profundo y anulando los beneficios de la convección.<br><br>Perla ENARM: No se recomienda el empleo de vendas de compresión, ventilador de neblina o la toalla de refrigeración.<br><br>Análisis de Distractores: Sábanas ligeras se pueden usar si no son oclusivas. Las compresas frías en sitios clave (axilas/ingle) y los ventiladores eléctricos son la piedra angular de la técnica de enfriamiento por evaporación/conducción.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 22."
    },
    {
        id: 6,
        question: "Durante la reanimación con cristaloides intrahospitalaria, ¿qué triada de variables clínicas dinámicas se indica monitorizar para evaluar la respuesta a volumen y evitar un edema pulmonar yatrogénico?",
        options: ["Gasto cardiaco, saturación y llenado capilar", "Presión venosa central, lactato y diuresis", "Llenado capilar, temperatura y presión arterial", "Presión arterial, frecuencia cardiaca y diuresis"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, la reanimación hídrica debe ser guiada estrechamente por signos vitales básicos y excreta renal, ya que el paciente crítico cursa con vasodilatación extrema que predispone a errores de sobrecarga.<br><br>Perla ENARM: La presión arterial, la frecuencia cardiaca y diuresis guían la respuesta que tiene el paciente a la reposición hídrica, aunque de ser disponibles se sugiere utilizar variables dinámicas durante la reanimación.<br><br>Análisis de Distractores: La PVC, el gasto cardíaco y el lactato son mediciones avanzadas, pero la pauta clínica base para enfermería y piso recomendada explícitamente en esta patología son los signos hemodinámicos tradicionales y la orina.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 28."
    },
    {
        id: 7,
        question: "¿Qué secuencia de abordaje es el punto de partida clínico obligatorio para la estabilización temprana ante cualquier caso presuntivo de hipertermia ambiental extrema en el servicio de urgencias?",
        options: ["Abordaje sistemático ABCDE", "Evaluación escala de Glasgow", "Canalización de accesos venosos", "Medición exacta de temperatura"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, antes de centrarse exclusivamente en la termometría, se debe asegurar la permeabilidad de la vía aérea, oxigenación y perfusión cerebral, previniendo el paro cardiorrespiratorio inminente.<br><br>Perla ENARM: Un enfoque ABCDE (vía aérea / respiración / circulación, déficit neurológico y exposición) debe ser el punto de partida en el manejo de un paciente con golpe de calor, con el fin de identificar de manera oportuna las disfunciones orgánicas.<br><br>Análisis de Distractores: Valorar la temperatura, los accesos IV o el Glasgow son pasos subsecuentes; el protocolo vital universal de reanimación (vía aérea y circulación) siempre precede intervenciones dirigidas.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 24."
    },
    {
        id: 8,
        question: "Aunque el paciente habitualmente se presenta con piel caliente y seca, ¿qué hallazgo dermatológico clásico se observa paradójicamente cuando el paciente entra en la fase de choque cardiogénico/hipovolémico?",
        options: ["Seca y caliente", "Sudorosa y fría", "Pálida y cianótica", "Ictérica y marmórea"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, en etapas de colapso hemodinámico grave, el estado de hipoperfusión tisular induce una respuesta catecolaminérgica profunda que enfría falsamente la periferia sin modificar la temperatura nuclear letal.<br><br>Perla ENARM: En el momento del colapso la presión arterial sistólica menor a 100 mmHg, la taquicardia, la hiperventilación y una apariencia de choque (es decir, la piel sudorosa y fría) son frecuentes.<br><br>Análisis de Distractores: La piel seca y caliente es el hallazgo pre-colapso por falla termorreguladora directa. Cianosis o ictericia no son la manifestación de hipoperfusión inmediata mediada por catecolaminas térmicas.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Diagnóstico, p. 19."
    },
    {
        id: 9,
        question: "Además de los diuréticos y anticolinérgicos, ¿qué otra familia de medicamentos psiquiátricos interfiere directamente con la termorregulación y obliga a proscribir el estrés térmico en quienes los consumen?",
        options: ["Glucocorticoides inhalados", "Macrólidos prolongados", "Inhibidores de proteasa", "Antidepresivos tricíclicos"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, estos fármacos bloquean los receptores muscarínicos periféricos y alteran la respuesta hipotalámica al calor, inhabilitando biológicamente al cuerpo para iniciar la sudoración.<br><br>Perla ENARM: Se recomienda que los pacientes que consuman cualquiera de los siguientes medicamentos, no se sometan a estrés físico intenso o se expongan a altas temperaturas ambientales: ...Antidepresivos tricíclicos.<br><br>Análisis de Distractores: Glucocorticoides, macrólidos y antirretrovirales no tienen acción farmacodinámica probada sobre los centros reguladores térmicos del sistema nervioso central o las glándulas sudoríparas.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Prevención, p. 16."
    },
    {
        id: 10,
        question: "Como parte de la estrategia intrahospitalaria para prevenir la falla orgánica, ¿qué dispositivo invasivo está normado desde el inicio para cuantificar con exactitud la microperfusión sistémica?",
        options: ["Sonda vesical Foley", "Catéter venoso central", "Línea arterial radial", "Sonda nasogástrica"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, el riñón es altamente susceptible al daño por mioglobina (rabdomiólisis) y deshidratación; el gasto urinario continuo es el mejor marcador dinámico de perfusión orgánica.<br><br>Perla ENARM: El apoyo hospitalario dependerá del estado clínico... restaurar el volumen intravascular con una solución cristaloide isotónica intravenosa, colocar un catéter vesical para controlar la salida de orina e iniciar vasopresores para apoyar la sangre.<br><br>Análisis de Distractores: La línea arterial o el CVC se reservan para UCI en refractariedad; la colocación de sonda urinaria es un paso inicial mandatario de monitoreo estricto sin retrasos.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 26."
    },
    {
        id: 11,
        question: "¿Qué intervención prioritaria de enfermería es fundamental ejecutar inmediatamente para garantizar una ruta robusta de reanimación metabólica e hídrica de emergencia?",
        options: ["Vía intraósea tibial", "Vía central subclavia", "Dos vías intravenosas", "Una vía periférica corta"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, la alta probabilidad de requerir flujos rápidos de cristaloides fríos concurrentes con medicamentos vasoactivos o antiepilépticos exige contar con múltiples lumenes venosos gruesos.<br><br>Perla ENARM: Intervenciones de enfermería... Se recomienda iniciar el tratamiento con las siguientes intervenciones: Canalización de 2 vías intravenosas para fluidoterapia.<br><br>Análisis de Distractores: Una vía periférica es insuficiente ante choque. La intraósea o el CVC consumen tiempo vital y son alternativas de segunda línea si el acceso periférico colapsa.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 28."
    },
    {
        id: 12,
        question: "Durante la estabilización prehospitalaria inicial (sombra, desvestir al paciente), se debe aislar físicamente a la víctima del suelo; ¿qué mecanismo físico de transferencia de calor se inhibe con esta acción?",
        options: ["Evaporación", "Radiación", "Conducción", "Convección"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención de golpe de calor, superficies urbanas como el asfalto almacenan grandes cantidades de calor solar; colocar al paciente directamente sobre ellas transferirá energía térmica incesante por contacto directo con los tejidos.<br><br>Perla ENARM: Se recomienda colocar a la víctima en una barrera aislante, como una almohadilla para dormir o una bolsa de dormir, esto disminuye la conducción del calor desde el suelo.<br><br>Análisis de Distractores: La evaporación usa paso a gas (sudor); la radiación es intercambio infrarrojo sin contacto; la convección es movimiento por aire. El suelo caliente trasfiere por conducción directa.",
        source: "GPC-SEMAR-571-19, Prevención, diagnóstico y tratamiento de golpe de calor en adultos, 2019, Tratamiento, p. 22."
    },
    {
        id: 13,
        question: "Independientemente de la gravedad neurológica aparente, ¿qué antecedente médico preexistente es un criterio normativo ineludible para el traslado urgente de la escena a un centro de tercer nivel?",

                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('571Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('571LastQId', currentQuestionId);
                else localStorage.removeItem('571LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('571Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};

    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {

            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
