<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

        <!-- MAIN CONTENT (Scrollable) -->

            <!-- Botón Grid (Tablero) a la Izquierda (Oculto en Inicio) -->
            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-orange-600 dark:hover:text-orange-400 transition-all duration-300" title="Ver Tablero de Preguntas">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <!-- Botón Menú a la Derecha (Oculto en Inicio, visible en desktop y móvil) -->

                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>

            <!-- Barra de Progreso Limpia (Gruesa y sin marca de agua de fondo) -->
            <div id="progress-container" class="hidden w-full max-w-4xl mx-auto bg-slate-200 dark:bg-slate-700 rounded-full mb-4 mt-0 h-6 shadow-inner overflow-hidden relative">

        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Según la GPC de movilización temprana en Artroplastia Total de Rodilla, ¿en qué momento postoperatorio debe iniciar el paciente el apoyo y la marcha asistida con andadera?", 
                options: ["Al primer día postoperatorio", "Al tercer día postoperatorio", "Al quinto día postoperatorio", "Al séptimo día postoperatorio"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Tratamiento con Artroplastia Total de Rodilla, la carga de peso asistida oportuna disminuye drásticamente la tasa de trombosis venosa profunda y promueve la integración funcional, venciendo el espasmo de los cuádriceps.<br><br>Perla ENARM: \"Al tercer día, iniciar el apoyo y la marcha con un auxiliar tipo andadera\".<br><br>Análisis de Distractores: Al primer día sólo se realizan ejercicios isométricos en cama. Retrasar la marcha al quinto o séptimo día favorece la atrofia muscular severa y el tromboembolismo.", 
                source: "GPC-IMSS-435-18, Tratamiento con Artroplastia Total de Rodilla en Pacientes Mayores de 60 años, 2018, Evidencias y Recomendaciones, Página 39." 
            },
            {
                id: 2, 
                question: "¿Cuál es la escala de valoración clínica requerida por la GPC para dictaminar el estado previo de independencia en la toma de decisión quirúrgica de un paciente con fractura intracapsular del extremo proximal del fémur?", 
                options: ["Escala de Barthel", "Escala de Daniels", "Índice de Karnofsky", "Índice de Katz"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas Intracapsulares de Fémur, clasificar si el anciano era funcional (caminaba en calle) o prostrado (confinado a cama/silla) previamente, dictamina el techo terapéutico (poner prótesis total compleja versus osteosíntesis rápida). El índice de Katz permite puntuar y validar una demanda objetiva de movilidad posoperatoria.<br><br>Perla ENARM: \"Se recomienda el uso del Índice de Katz para medir el estado de independencia en las actividades de la vida diaria (puntaje de 0 a 6)\".<br><br>Análisis de Distractores: Barthel (A) evalúa funciones similares en geriatría, pero la GPC cita específicamente en sus anexos al Índice de Katz como herramienta primaria de decisión. Daniels (B) evalúa fuerza muscular aislada. Karnofsky (C) es de uso estandarizado en oncología terminal para medir performance status.", 
                source: "GPC IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Cuadros o figuras (Cuadro II), Página 28." 
            },
            {
                id: 3, 
                question: "A diferencia de una fractura transversal simple, ¿en qué diagnóstico o característica específica de la fractura de antebrazo se justifica el uso de un clavo centromedular en lugar de placa según la GPC?", 
                options: ["Fractura transversal no desplazada", "Fracturas segmentarias o patológicas", "Fractura aislada de radio", "Fractura pediátrica en tallo"], 
                answer: 1, 
                justification: "Justificación: Las placas DCP (compresión) alteran gravemente la perfusión perióstica, lo cual es perjudicial si el hueso está enfermo o hay múltiples niveles de fractura donde abrirlo empeoraría todo. De acuerdo a la GPC de Fracturas de Antebrazo, el clavo tiene nichos restringidos pero claros.<br><br>Perla ENARM: \"Indicaciones de enclavado centro medular: Fracturas segmentarias, Algunas Fracturas patológicas, Falla de placa, Fracturas múltiples\".<br><br>Análisis de Distractores: Una fractura transversal no desplazada (A) se manejaría con inmovilización o placa si se desplaza. En una fractura aislada de radio en adulto (C) el estándar sigue siendo la placa. Una fractura pediátrica (D) requiere manejo ortopédico conservador predominantemente.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, Página 21." 
            }, 
            {
                id: 4, 
                question: "En la evaluación de un paciente con antecedente traumático y sospecha de lesión del Ligamento Cruzado Anterior (LCA), ¿cuál es el hallazgo clínico agudo que integra el diagnóstico presuntivo?", 
                options: ["Derrame articular seroso leve", "Hemartrosis articular a tensión", "Equimosis perirrotuliana difusa", "Bloqueo articular mecánico verdadero"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones Ligamentarias de Rodilla, cerca del 70% de los derrames a tensión con sangre intraarticular tras un traumatismo corresponden a daño del cruzado anterior. El dolor y la incapacidad funcional acompañan este cuadro de forma inmediata.<br><br>Perla ENARM: \"Se recomienda considerar lesiones en el LCA en pacientes con esguince de rodilla cuando presentan hemartrosis\".<br><br>Análisis de Distractores: El derrame seroso (A) es típico de procesos inflamatorios crónicos o derrames reactivos tardíos. La equimosis (C) no es el signo pivote intraarticular. El bloqueo verdadero (D) es el síntoma patognomónico de una lesión de menisco (asa de balde) o cuerpo libre, no del ligamento directamente.", 
                source: "GPC IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Diagnóstico Clínico, Página 12." 
            },
            {
                id: 5, 
                question: "Ante un paciente con gonartrosis moderada a severa, ¿cuál es el estudio de imagen inicial que debe solicitarse para evaluar la disminución del espacio articular previo a una Artroplastia Total de Rodilla?", 
                options: ["Resonancia magnética de rodilla", "Tomografía axial computarizada", "Radiografías de pie con apoyo", "Radiografías en decúbito supino"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Tratamiento con Artroplastia Total de Rodilla, la evaluación de la carga real sobre el espacio articular requiere someter a la extremidad al peso del paciente. Solicitar radiografías en decúbito subestima el grado de artrosis.<br><br>Perla ENARM: \"Realizar estudios de gabinete (Rx AP y lateral de ambas rodillas con el paciente de pie)\".<br><br>Análisis de Distractores: La resonancia y la tomografía no son los estudios iniciales de elección y encarecen el abordaje sin aportar ventaja en la decisión de primera línea. Las radiografías en decúbito no permiten valorar el estrechamiento articular dinámico.", 
                source: "GPC-IMSS-435-18, Tratamiento con Artroplastia Total de Rodilla en Pacientes Mayores de 60 años, 2018, Algoritmo 1, Página 94." 
            },
            {
                id: 6, 
                question: "¿Cuál es el diagnóstico diferencial clave a descartar en un paciente que presenta dolor inguinocrural e imposibilidad a la marcha SIN antecedente aparente de caída, pero con sospecha de fractura intracapsular del extremo proximal del fémur?", 
                options: ["Osteoartritis degenerativa severa", "Fractura por estrés", "Radiculopatía lumbosacra", "Artritis séptica"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas Intracapsulares de Fémur, no todo daño estructural óseo requiere un choque violento. En el hueso del adulto mayor osteoporótico, o tras un cambio de actividad física, las fuerzas mecánicas normales sostenidas logran microfracturas convergentes silentes (fracturas por fragilidad o estrés).<br><br>Perla ENARM: \"Las personas con dolor a nivel de la región inguinocrural sin antecedente de trauma, el diagnóstico presuntivo es fractura por estrés\".<br><br>Análisis de Distractores: La osteoartritis (A) y radiculopatía (C) generan dolor progresivo crónico y claudicación variable, no un bloqueo incapacitante agudo a la marcha simulando fractura en días o semanas. La artritis séptica (D) va invariablemente mediada con fiebre aguda y síndrome de respuesta inflamatoria sistémica (SRIS).", 
                source: "GPC IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Diagnóstico Clínico, Página 11." 
            },
            {
                id: 7, 
                question: "En un paciente con sospecha de fractura diafisaria de antebrazo, ¿cuál es el signo clínico cardinal en la exploración física que integra el diagnóstico presuntivo según la GPC?", 
                options: ["Piel lisa brillante", "Dolor al estiramiento", "Crepitación ósea", "Ausencia de pulsos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas de Antebrazo, el diagnóstico clínico se fundamenta en la integración de síntomas clásicos de pérdida de la continuidad ósea. La crepitación es uno de los hallazgos mecánicos directos durante la exploración.<br><br>Perla ENARM: \"En las fracturas de la diáfisis del cúbito y del radio se encuentran los signos clásicos de las fracturas: Incapacidad funcional, Deformidad, Movilidad anormal, Aumento de volumen, Equimosis, Crepitación ósea\".<br><br>Análisis de Distractores: La piel lisa brillante (A) y el dolor al estiramiento pasivo (B) son signos de alarma clásicos, pero para síndrome compartimental, no para integrar el diagnóstico de la fractura per se. La ausencia de pulsos (D) sugiere lesión arterial severa (Gustilo IIIC) y es una complicación, no el signo diagnóstico primario del hueso.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Diagnóstico Clínico, Página 14." 
            },
            {
                id: 8, 
                question: "En un paciente con fractura de antebrazo, ¿cuál es el dato clínico pronóstico que predice la instauración de un síndrome compartimental y requiere medición de presión intracompartimental según la GPC?", 
                options: ["Equimosis perilesional severa", "Llenado capilar prolongado", "Dolor al estiramiento pasivo", "Presencia de crepitación ósea"], 
                answer: 2, 
                justification: "Justificación: La isquemia muscular produce irritabilidad precoz. Antes de que se pierdan los pulsos periféricos (hallazgo muy tardío e irreversible), el dolor isquémico muscular se desenmascara tensando los tendones. De acuerdo a la GPC de Fracturas de Antebrazo, este hallazgo justifica sospecharlo incluso en obnubilados.<br><br>Perla ENARM: \"La evaluación neurovascular de la extremidad y la presencia de dolor a la extensión pasiva de los dedos son de gran valor para el diagnóstico de síndrome compartamental\".<br><br>Análisis de Distractores: La equimosis (A) y la crepitación (D) son signos esperados de casi cualquier fractura ósea diafisaria estándar. El llenado capilar (B) puede alterarse, pero el dolor exquisito al estiramiento pasivo de los dedos es la bandera roja temprana, cardinal y más sensible antes del daño tisular total.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Diagnóstico Clínico, Página 14." 
            },
            {
                id: 9, 
                question: "De acuerdo a la epidemiología de las lesiones ligamentarias de la rodilla, ¿cuál es el mecanismo de lesión o factor de riesgo más común reportado en las pacientes femeninas?", 
                options: ["Accidentes automovilísticos directos", "Actividades deportivas extremas", "Mecanismo por caídas directas", "Torsión con valgo forzado"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones Ligamentarias de Rodilla, existe una clara diferencia por género en la presentación de esta patología. Mientras que en los hombres predomina la exigencia mecánica de los deportes, en la mujer el trauma de baja energía es preponderante.<br><br>Perla ENARM: \"Los mecanismos de lesión más comunes, en el hombre, son las actividades deportivas y en la mujer, las caídas\".<br><br>Análisis de Distractores: Las actividades deportivas (B) son la causa principal, pero específicamente en varones. Los accidentes automovilísticos (A) son causantes típicos de lesiones del ligamento cruzado posterior por golpe en tablero, pero no el factor número uno en mujeres. La torsión (D) es un mecanismo, no un factor epidemiológico directo mencionado en la GPC para este estrato.", 
                source: "GPC IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Justificación, Página 8." 
            },
            {
                id: 10, 
                question: "¿Cuál es el factor de riesgo reportado con mayor asociación para el desarrollo de complicaciones, dolor postoperatorio residual y limitación de la marcha en un paciente sometido a Artroplastia Total de Rodilla?", 
                options: ["Edad mayor a 85 años", "Índice de masa corporal elevado", "Tabaquismo activo intenso", "Diabetes mellitus controlada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Tratamiento con Artroplastia Total de Rodilla, la obesidad genera una sobrecarga mecánica directa sobre el implante y un estado proinflamatorio crónico que limita drásticamente la funcionalidad postquirúrgica.<br><br>Perla ENARM: \"Personas con obesidad y comorbilidades tienen mayor riesgo quirúrgico, así como más complicaciones trans y postoperatorias\".<br><br>Análisis de Distractores: La edad avanzada y la diabetes controlada son factores a vigilar, pero el IMC >30 kg/m2 está directamente correlacionado con dolor residual y falla biomecánica del implante según los estudios revisados en la guía. El tabaquismo no es el factor mecánicamente más relevante.", 
                source: "GPC-IMSS-435-18, Tratamiento con Artroplastia Total de Rodilla en Pacientes Mayores de 60 años, 2018, Evidencias y Recomendaciones, Página 24." 
            },












        ];

        // ==========================================
        // ==========================================
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ExTYO10LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExTYO10Progress');
                localStorage.removeItem('ExTYO10LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-orange-500 shadow-md z-10 border-orange-500 dark:border-orange-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-red-100 text-red-700 border-red-300 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-orange-50 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-orange-100 dark:border-orange-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-orange-50 has-[:checked]:border-orange-400 dark:has-[:checked]:bg-orange-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-orange-600 focus:ring-orange-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-orange-600 dark:hover:bg-orange-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-red-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-red-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-red-800 dark:text-red-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-orange-600 to-red-600 hover:from-red-600 hover:to-orange-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExTYO10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExTYO10LastQId', currentQuestionId);
                else localStorage.removeItem('ExTYO10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExTYO10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0",
        authDomain: "enarm-lite.firebaseapp.com",
        projectId: "enarm-lite",
        storageBucket: "enarm-lite.firebasestorage.app",
        messagingSenderId: "767032952477",
        appId: "1:767032952477:web:84347320ed3d376f7e7674",
        measurementId: "G-PVR3RBVNSV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.5s ease';

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            
            if(userDocSnap.exists()) {
                document.body.style.opacity = '1';
            } else {
                window.location.href = "index.html"; 
            }
        } else {
            window.location.href = "index.html";
        }
    });
</script>
</body>
</html>
