    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Bajo qué modelo conceptual debe realizarse la valoración inicial del paciente con amputación?",
        options: ["Modelo biomédico tradicional", "Clasificación Internacional del Funcionamiento", "Escala de Independencia Funcional", "Sistema de clasificación de Medicare"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, el manejo rehabilitatorio exige un abordaje biopsicosocial que analice las deficiencias anatómicas, la limitación en la actividad física y las barreras de participación en el entorno, superando el enfoque exclusivamente patológico.<br><br>Perla Quirúrgica: Se recomienda que la valoración inicial de todo paciente con amputación se realice con el enfoque de la CIF, considerando complicaciones como migración del cojinete de tejido blando, problemas de la piel, ulceración o infección en muñón, neuroma, problemas óseos, dolor en el miembro remanente y riesgo de más amputaciones.<br><br>Análisis de Distractores: El modelo biomédico (A) se centra solo en la enfermedad y está obsoleto en rehabilitación integral. La Escala de Independencia Funcional (C) evalúa actividades de la vida diaria, no es el modelo conceptual macro. El sistema de Medicare (D) clasifica niveles de actividad física para prescripción, no es un modelo de evaluación clínica inicial.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación inicial, Página 15."
    },
    {
        id: 2,
        question: "¿En qué momento debe iniciar la movilización y deambulación en el paciente con amputación de extremidad inferior?",
        options: ["A los 14 días posteriores a la cirugía", "Al retirar los puntos de sutura", "Desde el postquirúrgico inmediato", "Una vez completada la cicatrización"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, el reposo prolongado acelera el desacondicionamiento cardiovascular y favorece contracturas articulares limitantes. El estímulo de carga y los traslados deben instaurarse de forma aguda.<br><br>Perla Quirúrgica: Se recomienda favorecer la movilización y deambulación temprana (desde el postquirúrgico inmediato) en pacientes con amputación de miembro inferior, independientemente de la etiología, el nivel de amputación, la edad y presencia de comorbilidades.<br><br>Análisis de Distractores: Esperar al retiro de puntos (B), cumplir dos semanas (A) o aguardar maduración tisular (D) fomenta el desacondicionamiento metabólico severo y complicaciones tromboembólicas.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación inicial, Página 15."
    },
    {
        id: 3,
        question: "Antes de iniciar el proceso de rehabilitación física, ¿qué tipo de comorbilidades deben ser valoradas oportunamente por el especialista debido al alto riesgo?",
        options: ["Oftalmológicas y dermatológicas", "Cardiovasculares, pulmonares y metabólicas", "Renales crónicas y reumatológicas", "Psiquiátricas y gastrointestinales"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, la marcha con una prótesis incrementa drásticamente el gasto metabólico. Iniciar esfuerzo físico en un paciente isquémico, neumópata o descontrolado metabólicamente precipita eventos cardiovasculares agudos.<br><br>Perla Quirúrgica: Los pacientes con amputación de miembro inferior portadores de comorbilidades cardiovasculares, pulmonares y/o metabólicas deben ser valorados de manera oportuna por el especialista correspondiente, idealmente, antes de iniciar el proceso de rehabilitación.<br><br>Análisis de Distractores: Las patologías visuales (A), renales (C) o psiquiátricas (D) interfieren con la rehabilitación y requieren atención, pero no imponen el riesgo inmediato de colapso hemodinámico que genera la falla de bomba cardíaca o respiratoria ante el esfuerzo agudo.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación inicial, Página 16."
    },
    {
        id: 4,
        question: "¿Cuál es el instrumento estandarizado recomendado para orientar la prescripción protésica y evaluar la deambulación funcional temprana sin prótesis?",
        options: ["Índice de Barthel", "Medida de Independencia Funcional", "Predictor de Movilidad de Amputados", "Escala de Equilibrio de Berg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, la prescripción protésica requiere una evaluación biomecánica real del equilibrio y control del tronco. Esta escala predice con precisión si el paciente será capaz de utilizar componentes ortésicos funcionales.<br><br>Perla Quirúrgica: Se recomienda la aplicación temprana de instrumentos estandarizados como el Predictor de Movilidad de Amputados sin uso de prótesis (AMPnoPRO), para guiar la toma de decisiones en el proceso de rehabilitación.<br><br>Análisis de Distractores: El Índice de Barthel (A) y la Medida de Independencia Funcional (B) evalúan autocuidado global, pero no biomecánica de marcha en amputados. La Escala de Berg (D) evalúa equilibrio en población general.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación inicial, Página 21."
    },
    {
        id: 5,
        question: "¿Cuál es la forma geométrica característica que debe presentar un muñón ideal para recibir una adecuada adaptación protésica?",
        options: ["Cilíndrica", "Esférica bulbosa", "Rectangular", "Cónica o semicónica"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, la distribución de la presión hidrostática dentro del encaje (socket) requiere que el volumen vaya de mayor a menor desde la base hasta el ápice, evitando zonas de atrapamiento vascular y facilitando la suspensión.<br><br>Perla Quirúrgica: Características del muñón ideal: Forma cónica o semicónica. Presentar un revestimiento cutáneo bien nutrido, no estando la piel demasiado estirada ni demasiado laxa.<br><br>Análisis de Distractores: La forma cilíndrica (A) dificulta el acople tridimensional al cono de enchufe. Un muñón rectangular (C) o con esférica bulbosa (B) genera zonas de hiperpresión distal e imposibilita la introducción segura a la prótesis.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de miembro inferior, 2021, Evaluación inicial, Página 17."
    },
    {
        id: 6,
        question: "Para prevenir la formación de neuromas superficiales y dolorosos en el muñón, ¿a qué nivel anatómico debe ser seccionado el nervio principal?",
        options: ["A nivel de la cicatriz transversal", "Por debajo de la fascia aponeurótica", "Por encima del nivel de la amputación", "En el borde dérmico suturado"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, cuando el nervio se secciona, forma un neuroma en su intento de regeneración. Al cortarlo con tracción proximal, se retrae y se oculta profundamente en el tejido muscular sano, alejándolo de la zona de apoyo de la prótesis.<br><br>Perla Quirúrgica: El nervio principal debe estar cortado por encima del nivel de la amputación para evitar neuromas superficiales y dolorosos.<br><br>Análisis de Distractores: Dejar el nervio a nivel de la cicatriz (A), subfascial (B) o en el borde dérmico (D) lo expone directamente al cizallamiento y presión axial, condicionando cuadros de hiperestesia que obligan a reintervenir quirúrgicamente.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación inicial, Página 17."
    },
    {
        id: 7,
        question: "¿Qué pruebas clínicas se deben realizar de rutina para identificar alteraciones en la sensibilidad protectora del muñón e interacciones con la prótesis?",
        options: ["Discriminación de 2 puntos y temperatura", "Monofilamento de tacto ligero y percepción de vibración", "Reflejos osteotendinosos y propiocepción", "Sensibilidad dolorosa y tacto grueso"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, la pérdida de retroalimentación somatosensorial predispone a daños inadvertidos por fricción contra los componentes duros de la prótesis. Su cuantificación oportuna previene lesiones dérmicas y úlceras.<br><br>Perla Quirúrgica: Se recomienda realizar de rutina pruebas de sensibilidad como el umbral de percepción de la vibración y umbrales de monofilamento de tacto ligero a todo paciente con amputación, para detectar cambios en la sensibilidad del muñón y el miembro remanente.<br><br>Análisis de Distractores: La discriminación de 2 puntos (A) evalúa tacto fino cortical. Los reflejos y propiocepción (C) se pierden al amputar las articulaciones. La evaluación de tacto ligero (monofilamento) es el estándar universal para pérdida de sensibilidad protectora.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación inicial, Página 21."
    },
    {
        id: 8,
        question: "¿En qué dirección anatómica se debe aplicar el vendaje elástico en el muñón para garantizar el control del edema y preservar la integridad vascular?",
        options: ["De proximal a distal", "En espiga de tracción neutra", "De distal a proximal", "Circular concéntrica uniforme"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, la remodelación del tejido blando postquirúrgico y la prevención del edema requieren un gradiente de presión mayor en el extremo distal para impulsar el líquido intersticial hacia la circulación sistémica.<br><br>Perla Quirúrgica: El vendaje elástico del muñón debe realizarse, previa enseñanza y supervisión, con venda especializada, correcto anclaje (sujeción proximal), dirección distal-proximal, con reajustes necesarios durante el día para garantizar su correcta función.<br><br>Análisis de Distractores: Un vendaje de proximal a distal (A) genera un efecto torniquete isquemiante. La tracción neutra (B) no otorga el gradiente necesario. El vendaje circular (D) impide el retorno venoso y linfático eficiente.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Intervenciones pre-protésicas, Página 34."
    },
    {
        id: 9,
        question: "¿Qué intervención terapéutica adyuvante tiene potencial para reducir la atrofia muscular y minimizar la pérdida de fuerza en el miembro remanente?",
        options: ["Ultrasonido terapéutico", "Terapia de calor profundo", "Estimulación eléctrica neuromuscular", "Crioterapia de compresión continua"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, aplicar pulsos eléctricos exógenos induce contracciones tetánicas pasivas que preservan el trofismo de los grupos musculares clave durante las fases en las que el paciente no tolera el ejercicio activo intenso.<br><br>Perla Quirúrgica: El uso de estimulación eléctrica neuromuscular en combinación con un programa de fisioterapia tiene potencial para reducir la atrofia muscular y minimizar la pérdida de fuerza muscular.<br><br>Análisis de Distractores: El ultrasonido (A) y calor profundo (B) actúan como agentes antiinflamatorios o analgésicos tisulares. La crioterapia (D) controla edema y dolor agudo, pero no posee capacidad fisiológica para reclutar fibras musculares y evitar atrofia.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Intervenciones pre-protésicas, Página 42."
    },
    {
        id: 10,
        question: "Cuál es la duración mínima recomendada para un programa de ejercicios específicos enfocado en resistencia cardiopulmonar, fortalecimiento y equilibrio?",
        options: ["4 semanas", "16 semanas", "12 semanas", "8 semanas"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, las adaptaciones fisiológicas de hipertrofia muscular y reacondicionamiento cardiovascular exigen un estímulo sostenido de sobrecarga progresiva para consolidar resultados funcionales medibles.<br><br>Perla Quirúrgica: Se recomienda establecer un programa de ejercicios específicos de al menos 8 semanas, que incluya tres componentes: 1) resistencia cardiopulmonar, 2) fortalecimiento de tronco y de las extremidades inferiores, 3) equilibrio y coordinación...<br><br>Análisis de Distractores: Intervalos de 4 semanas (A) logran adaptaciones neuronales iniciales, pero carecen de tiempo para consolidar la resistencia metabólica. 12 y 16 semanas (B y C) exceden el umbral mínimo de prescripción estipulado por la evidencia.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Intervenciones pre-protésicas, Página 41."
    },
    {
        id: 11,
        question: "¿Qué combinación farmacológica sistémica ha demostrado eficacia analgésica probada para el tratamiento del dolor de miembro fantasma crónico?",
        options: ["Paracetamol, ibaprofeno y tramadol", "Morfina, gabapentina, ketamina y calcitonina", "Amitriptilina, naproxeno y clonazepam", "Buprenorfina, pregabalina y duloxetina"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Amputación de Extremidad Inferior, el dolor neuropático central por desaferenciación exige un manejo multimodal agresivo que bloquee simultáneamente receptores opioides, canales de calcio y vías glutamatérgicas.<br><br>Perla Quirúrgica: La morfina, la gabapentina y la ketamina en combinación con calcitonina demuestran eficacia analgésica para el tratamiento del dolor de miembro fantasma; sin embargo... estos resultados deben interpretarse con precaución.<br><br>Análisis de Distractores: Fármacos de primer nivel como paracetamol y AINEs (A y C) son inútiles ante sensibilización central severa. Aunque pregabalina y duloxetina (D) se usan en polineuropatías sistémicas, el esquema exacto avalado y jerarquizado por la guía incluye morfina, gabapentina, ketamina y calcitonina.",
        source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Intervenciones analgésicas, Página 101."
    },
    {
        id: 12,
        question: "En pacientes con dolor de miembro fantasma agudo y falta de respuesta a otros tratamientos analgésicos, ¿qué fármaco antagonista representa una opción de rescate?",
        options: ["Haloperidol", "Diazepam", "Ketorolaco", "Memantina"],
        answer: 3,

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";

                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>

                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="BM14018E.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGAMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGAMLastQId', currentQuestionId);
                else localStorage.removeItem('CGAMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGAMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
