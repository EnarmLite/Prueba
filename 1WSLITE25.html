            <div class="flex gap-3">

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán todas tus respuestas y se liberará la justificación médica.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const casesData = [






            {
                id: 1,
                caseText: "Mujer de 78 años, diabética e hipertensa. Inicia hace 60 minutos con disnea súbita, fatiga profunda y dolor en maxilar inferior. Ingresa a urgencias francamente diaforética. Signos vitales: TA 85/50 mmHg, FC 112 lpm, FR 28 rpm, SatO2 86% al aire ambiente. Exploración física: plétora yugular ausente. Ruidos cardiacos rítmicos, taquicárdicos, con aparición de un nuevo soplo sistólico en el ápex. Campos pulmonares con estertores crepitantes bilaterales de predominio basal. Electrocardiograma (realizado a los 5 min): ritmo sinusal, elevación del segmento ST de 2 mm en derivaciones DI, aVL, V5 y V6.",
                source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST.",
                questions: [
                    {
                        question: "¿En qué grupo poblacional la guía exige mantener alta sospecha diagnóstica ante síntomas isquémicos atípicos (equivalentes anginosos) como disnea, fatiga o dolor maxilar, en ausencia de dolor precordial clásico?",
                        options: [
                            "Hombres con edad menor a 40",
                            "Mujeres y pacientes diabéticos",
                            "Pacientes con insuficiencia renal",
                            "Jóvenes con tabaquismo intenso"
                        ],
                        answer: 1,
                        justification: "La presentación clínica del infarto agudo es altamente variable. Los síntomas autonómicos o irradiaciones atípicas sin dolor opresivo retroesternal retrasan el diagnóstico y el tratamiento de reperfusión. Se debe realizar escrutinio electrocardiográfico inmediato ante equivalentes isquémicos en poblaciones vulnerables.<br><br><b>Perla ENARM:</b> \"Los síntomas atípicos como dolor en cuello, tórax posterior, maxilar inferior, así como náusea, debilidad y fatiga, son más frecuentes en mujeres que en hombres. Obligatorio tener alta sospecha en mujeres y pacientes diabéticos\".<br><br><b>Análisis de Distractores:</b> Los hombres jóvenes (A y D) suelen presentarse con dolor precordial típico. Los pacientes con falla renal (C) presentan riesgo alto de isquemia, pero la guía resalta de manera prioritaria a las mujeres y diabéticos por el riesgo de neuropatía autonómica silente."
                    },
                    {
                        question: "Basado en los hallazgos electrocardiográficos descritos (elevación del ST en DI, aVL, V5 y V6), ¿cuál es la arteria coronaria primariamente ocluida?",
                        options: [
                            "Arteria descendente anterior",
                            "Arteria coronaria derecha",
                            "Arteria circunfleja izquierda",
                            "Tronco coronario principal"
                        ],
                        answer: 2,
                        justification: "El electrocardiograma permite establecer una correlación topográfica precisa para predecir el vaso culpable. La elevación del segmento ST en las derivaciones laterales altas (DI, aVL) y laterales bajas (V5, V6) define el infarto de cara lateral, el cual es irrigado primariamente por la arteria circunfleja.<br><br><b>Perla ENARM:</b> \"Cuadro 5. Localización del infarto y correlación con la arteria afectada: Lateral (DI, aVL, V5, V6) - Circunfleja\".<br><br><b>Análisis de Distractores:</b> La descendente anterior (A) se manifiesta en V1-V4 (cara anterior). La coronaria derecha (B) se correlaciona con la cara inferior (DII, DIII, aVF). El tronco coronario principal (D) produce elevación de aVR con infradesnivel generalizado difuso."
                    },
                    {
                        question: "Debido a la hipoxemia documentada (SatO2 86%), usted inicia oxigenoterapia. ¿Cuál es el riesgo fisiopatológico de administrar oxígeno de manera rutinaria a pacientes infartados sin hipoxemia verdadera?",
                        options: [
                            "Produce vasodilatación coronaria paradójica",
                            "Reduce drásticamente la eficacia del fibrinolítico",
                            "Incrementa el daño miocárdico temprano",
                            "Favorece la ruptura aguda de pared libre"
                        ],
                        answer: 2,
                        justification: "La hiperoxia en tejido isquémico genera radicales libres de oxígeno y vasoconstricción coronaria, lo que agrava la perfusión tisular paradójicamente. El oxígeno suplementario está estrictamente reservado para pacientes con franca insuficiencia respiratoria aguda o saturaciones demostrables menores a 90%.<br><br><b>Perla ENARM:</b> \"Si el paciente no tiene hipoxia, la utilización de oxígeno suplementario puede incrementar el daño miocárdico temprano y se asocia con un tamaño de infarto mayor a la evaluación a los 6 meses\".<br><br><b>Análisis de Distractores:</b> La opción A es incorrecta porque la hiperoxia genera vasoconstricción. El oxígeno no interfiere con los fibrinolíticos (B) ni influye directamente sobre el riesgo mecánico de ruptura de pared libre (D), que depende de la necrosis transmural."
                    },
                    {
                        question: "Usted decide iniciar terapia anticoagulante sistémica pre-intervención coronaria. Dada la edad de la paciente (78 años), ¿cuál es la directriz exacta para la administración de enoxaparina?",
                        options: [
                            "Administrar dosis estándar sin ningún ajuste",
                            "Omitir exclusivamente el bolo intravenoso inicial",
                            "Iniciar infusión continua exclusivamente",
                            "Utilizar fondaparinux como primera línea"
                        ],
                        answer: 1,
                        justification: "El metabolismo y excreción de las heparinas de bajo peso molecular decaen con el envejecimiento, incrementando críticamente el riesgo de hemorragia mayor. En senectos se debe evitar la sobre-anticoagulación inicial sin perder el beneficio antitrombótico.<br><br><b>Perla ENARM:</b> \"Se recomienda enoxaparina sobre heparina no fraccionada. En pacientes > 75 años: No se recomienda dar bolo. Empezar la primera dosis s.c. de 0.75 mg/kg con una máxima de 75 mg por dosis cada 12 h s.c.\".<br><br><b>Análisis de Distractores:</b> La dosis estándar (A) expone a un riesgo inaceptable de sangrado intracraneal. La infusión continua (C) es propia de la heparina no fraccionada. Fondaparinux (D) se prefiere únicamente si se reperfunde con estreptoquinasa, no pre-ICP primaria."
                    },
                    {
                        question: "La paciente presenta choque cardiogénico agudo con un nuevo soplo sistólico en el ápex y franco edema agudo pulmonar. ¿Qué complicación mecánica post-infarto debe corroborarse urgentemente con ecocardiograma?",
                        options: [
                            "Rotura del músculo papilar",
                            "Rotura del tabique interventricular",
                            "Rotura de la pared libre",
                            "Formación de pseudoaneurisma ventricular"
                        ],
                        answer: 0,
                        justification: "Las complicaciones mecánicas asocian altísima mortalidad. La correlación semiológica de un infarto reciente que detona súbitamente insuficiencia cardiaca izquierda masiva (edema pulmonar por reflujo retrógrado súbito) y un soplo sistólico mitral es el sello clínico de la disfunción valvular por rotura del aparato subvalvular.<br><br><b>Perla ENARM:</b> \"Insuficiencia mitral aguda severa por rotura o disfunción del músculo papilar... Síntomas: disnea en reposo que puede llegar a ser severa, Signos: hipotensión... soplo sistólico mitral (para la rotura o disfunción del músculo papilar)\".<br><br><b>Análisis de Distractores:</b> La comunicación interventricular (B) genera un soplo rudo holosistólico paraesternal bajo (\"en barra\") con falla derecha. La rotura de pared libre (C) cursa con disociación electromecánica y taponamiento sin soplos. El pseudoaneurisma (D) es una complicación subaguda o crónica."
                    }
                ]
            },


{
                id: 2,
                caseText: "Niño de 4 años es llevado a urgencias por letargo e irritabilidad de 36 horas de evolución. La madre refiere que el cuadro inició con rechazo a la vía oral y vómitos en tres ocasiones. TA 90/55 mmHg, FC 135 lpm, FR 26 rpm, temperatura 39.1 °C. A la exploración física: paciente hipoactivo, con fascies de dolor. Abdomen distendido, con resistencia muscular involuntaria difusa, hiperalgesia generalizada y ruidos peristálticos ausentes. Signo de rebote francamente positivo en el cuadrante inferior derecho y dolor a la percusión. Se establece el diagnóstico clínico de apendicitis aguda con datos de irritación peritoneal.",
                source: "Schwartz's Principles of Surgery, Capítulo 30: The Appendix, 11e, Páginas 9 y 10.",
                questions: [
                    {
                        question: "Según la evidencia epidemiológica en este grupo etario específico, ¿cuál es la probabilidad estadística de que el paciente presente una apendicitis perforada al momento del diagnóstico?",
                        options: [
                            "10 a 20%",
                            "30 a 45%",
                            "51 a 100%",
                            "Menor a 5%"
                        ],
                        answer: 2,
                        justification: "La apendicitis en la población pediátrica presenta retos diagnósticos debido a la incapacidad de los pacientes para articular el dolor clásico. Los lactantes y niños pequeños (preescolares) carecen de un epiplón mayor completamente desarrollado para contener la infección, lo que, sumado a la presentación atípica (letargo, irritabilidad, distensión), retrasa el diagnóstico y eleva drásticamente la tasa de perforación respecto a los adultos.<br><br><b>Perla ENARM:</b> \"De estos, los lactantes y los niños pequeños son los más propensos a presentar enfermedad perforada (51% a 100%), mientras que los niños en edad escolar tienen tasas más bajas de perforación.\"<br><br><b>Análisis de Distractores:</b> Las opciones A, B y D subestiman gravemente la incidencia de perforación en menores de 5 años. Una tasa del 10 a 20% (A) corresponde estadísticamente a la incidencia global de perforación en la población adulta joven. Las tasas más bajas se observan en adolescentes, quienes tienen mayor capacidad de localización anatómica del dolor y comunicación del inicio de los síntomas."
                    },
                    {
                        question: "Usted clasifica el cuadro clínico empleando la Escala de Apendicitis Pediátrica (Pediatric Appendicitis Score). ¿Qué hallazgos otorgan el puntaje máximo (2 puntos cada uno) en esta herramienta de tamizaje?",
                        options: [
                            "Leucocitosis mayor a 10,000 células/mm³ y fiebre",
                            "Dolor en cuadrante inferior derecho y dolor a la tos, percusión o salto",
                            "Anorexia y migración del dolor periumbilical",
                            "Vómito y desviación a la izquierda en el diferencial"
                        ],
                        answer: 1,
                        justification: "La Escala de Apendicitis Pediátrica (PAS) comparte similitudes con la escala de Alvarado pero se adapta a la reactividad infantil. Tiene un valor total de 10 puntos, priorizando los signos de irritación peritoneal focalizada. Un puntaje de 7 o mayor confiere una alta probabilidad diagnóstica (78% a 96%).<br><br><b>Perla ENARM:</b> \"La Escala de Apendicitis Pediátrica... se califica sobre 10 puntos, con el peso máximo (2 puntos cada uno) para la sensibilidad en el cuadrante inferior derecho y el dolor con la tos, la percusión o el salto.\"<br><br><b>Análisis de Distractores:</b> Las opciones A, C y D corresponden a criterios menores que otorgan únicamente 1 punto dentro de la escala PAS. Aunque la fiebre, la leucocitosis (A) o el vómito (D) son hallazgos frecuentes en el cuadro apendicular pediátrico, no poseen el mismo peso predictivo que los signos mecánicos directos de inflamación peritoneal localizada en la fosa ilíaca derecha."
                    },
                    {
                        question: "Los estudios de imagen confirman apendicitis perforada sin evidencia de absceso o plastrón formado. ¿Cuál es el manejo quirúrgico inicial de elección avalado en esta población?",
                        options: [
                            "Drenaje percutáneo con catéter cola de cochino",
                            "Laparotomía exploradora con lavado peritoneal",
                            "Apendicectomía laparoscópica de urgencia",
                            "Apendicectomía abierta por incisión de McBurney"
                        ],
                        answer: 2,
                        justification: "A diferencia de la apendicitis con formación de masa o absceso encapsulado, donde se prefiere el manejo conservador escalonado, la perforación libre sin delimitación del foco requiere extirpación quirúrgica inmediata para controlar la sepsis intraabdominal. La laparoscopia supera al abordaje abierto al permitir un lavado de la cavidad más minucioso con menor morbilidad parietal.<br><br><b>Perla ENARM:</b> \"Para los pacientes con apendicitis complicada, se recomienda la apendicectomía urgente en el escenario de no haber absceso o masa. La apendicectomía laparoscópica parece conservar sus beneficios en este escenario también.\"<br><br><b>Análisis de Distractores:</b> El drenaje percutáneo (A) está absolutamente contraindicado si no existe una colección bien delimitada, ya que no resolverá la peritonitis libre. La laparotomía exploradora (B) es excesiva y aumenta la incidencia de adherencias graves a largo plazo. La apendicectomía abierta (D) es una alternativa válida solo en centros sin infraestructura o experiencia laparoscópica pediátrica, pero no es la primera elección moderna."
                    },
                    {
                        question: "Tras realizar la apendicectomía con éxito, usted establece la prescripción antimicrobiana intravenosa posoperatoria. Según las directrices de la Asociación Americana de Cirugía Pediátrica (APSA), ¿qué duración es la recomendada para este caso?",
                        options: [
                            "Dosis única transoperatoria",
                            "Al menos 3 días, preferentemente 5 días",
                            "Exactamente 7 a 10 días",
                            "14 días continuos"

        let userProgress = {};

        const QUESTIONS_PER_CASE = 5;
        const totalQuestions = casesData.length * QUESTIONS_PER_CASE;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadState();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('simuladorELW3LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const globalId = parseInt(box.dataset.id);
                    const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
                    const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
                    const cData = casesData[caseIdx];
                    
                    if(!cData) return;
                    
                    const qData = cData.questions[qIdx];
                    const matchText = cData.caseText.toLowerCase().includes(term) || qData.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || globalId.toString() === term) ? 'flex' : 'none';
                });
            });

            const modalReset = document.getElementById('reset-modal');
            document.getElementById('cancel-reset').addEventListener('click', () => {
                modalReset.querySelector('div').classList.add('scale-95');
                setTimeout(()=>modalReset.classList.add('hidden'), 300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('simuladorELW3Progress');
                localStorage.removeItem('simuladorELW3LastQId');
                localStorage.removeItem('simuladorELW3ExamState');
                window.location.reload();
            });

            const modalFinish = document.getElementById('finish-modal');
            document.getElementById('cancel-finish').addEventListener('click', () => {
                modalFinish.querySelector('div').classList.add('scale-95');
                setTimeout(()=>modalFinish.classList.add('hidden'), 300);
            });
            document.getElementById('confirm-finish').addEventListener('click', () => {
                finishExam();
                modalFinish.querySelector('div').classList.add('scale-95');
                setTimeout(()=>modalFinish.classList.add('hidden'), 300);
            });

            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        function navigateCase(currentCaseId, direction) {
            let targetCaseId = currentCaseId;
            if (direction === 'prev' && currentCaseId > 1) {
                targetCaseId = currentCaseId - 1;
            } else if (direction === 'next' && currentCaseId < casesData.length) {
                targetCaseId = currentCaseId + 1;
            } else {
                displayQuestion(null); 
                return;
            }
            const targetGlobalQId = (targetCaseId - 1) * QUESTIONS_PER_CASE + 1;
            displayQuestion(targetGlobalQId);
        }

        function getQBoxClass(globalId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-[10px] sm:text-xs cursor-pointer transition-all select-none border ";
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[globalId];
            const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
            const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
            const cData = casesData[caseIdx];
            
            if (!cData) return base + "bg-slate-100 text-slate-300";

            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";
                } else {
                    return base + "bg-slate-600 text-white border-slate-700 dark:bg-slate-700 dark:border-slate-600 shadow-inner";
                }
            } 
            else {
                if (!state || !state.answered) {
                    return base + "bg-slate-100 text-slate-400 border-slate-200 dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700";
                } else {
                    const isCorrect = state.selectedOption === cData.questions[qIdx].answer;
                    if (isCorrect) {
                        return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
                    } else {
                        return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
                    }
                }
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            let boxes = [];
            for (let i = 1; i <= totalQuestions; i++) {
                boxes.push(`<div class="${getQBoxClass(i, i === isActiveIdContext)}" data-id="${i}" onclick="displayQuestion(${i})">${i}</div>`);
            }
            return boxes.join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        function finishExam() {
            examState.isFinished = true;
            localStorage.setItem('simuladorELW3ExamState', JSON.stringify(examState));
            displayQuestion(null);
        }

                    const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;

                    </button>
                `;
            }

            let badgeText = examState.isFinished ? "RETROALIMENTACIÓN COMPLETA" : "ENARM 2026";
            let badgeClass = examState.isFinished ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";

            let statsHTML = examState.isFinished ? `
                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">

                    </div>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                    </div>
                    <div class="px-2">
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                    </div>
                </div>
            ` : `
                <div class="w-full text-center py-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Avance Global del Examen</p>
                    <p class="text-4xl sm:text-5xl font-black text-white">${ans}<span class="text-xl sm:text-2xl text-slate-500">/${totalQuestions}</span></p>
                    <div class="w-full bg-slate-700/50 rounded-full h-2 mt-4 overflow-hidden">
                        <div class="bg-blue-400 h-2 rounded-full shadow-md transition-all duration-300" style="width: ${(ans/totalQuestions)*100}%"></div>
                    </div>
                </div>
            `;

            let legendHTML = examState.isFinished ? `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
            ` : `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-50 border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700/50"></div> Pendiente</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-600 border border-slate-700"></div> Respondida</div>
            `;

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-7xl mx-auto lg:mt-0">
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <span class="inline-flex items-center gap-2 text-slate-400 font-semibold text-sm select-none">
                            
                        </span>
                    </div>

                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500">
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left w-full lg:w-3/5">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass}">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 ${examState.isFinished ? 'text-emerald-400' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium mx-auto lg:mx-0">${descText}</p>
                                <div class="mt-8 flex justify-center lg:justify-start flex-wrap gap-4">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col items-center shadow-2xl w-full lg:w-2/5">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                Tablero del Examen (50 Preguntas)
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                ${legendHTML}
                            </div>
                        </div>
                        <div class="grid gap-2 grid-cols-[repeat(auto-fill,minmax(40px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>
                </div>
            `;
        }

        function displayQuestion(globalId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = globalId ? parseInt(globalId) : null;
                
                if (currentQuestionId) {
                    localStorage.setItem('simuladorELW3LastQId', currentQuestionId);
                } else {
                    localStorage.removeItem('simuladorELW3LastQId');
                }

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');
                    dashboardBtn.classList.add('lg:left-[22rem]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const caseIdx = Math.floor((currentQuestionId - 1) / QUESTIONS_PER_CASE);
                const cData = casesData[caseIdx];
                
                if (!cData) return displayQuestion(null);
                
                renderCaseLayout(cData, currentQuestionId);
                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                setTimeout(() => {
                    const targetCard = document.getElementById(`q-card-${currentQuestionId}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }, 50);

            }, 150); 
        }

        function renderCaseLayout(cData, activeGlobalId) {
            let html = `
                <div class="flex flex-col gap-6 max-w-5xl mx-auto items-center">
                    
                    <!-- COLUMNA: TEXTO DEL CASO CLÍNICO -->
                    <div class="w-full bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-2xl shadow-md border border-slate-200 dark:border-slate-800 transition-all duration-300">
                        <div class="flex items-center justify-between mb-4">
                            <span class="inline-block bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-900/30">
                                Caso Clínico Seriado
                            </span>
                            <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                                Bloque #${cData.id}
                            </span>
                        </div>
                        <p class="text-slate-800 dark:text-slate-200 text-sm sm:text-base leading-relaxed font-medium">
                            ${cData.caseText}
                        </p>
                        ${examState.isFinished ? `
                            <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                <span class="text-slate-500">Bibliografía GPC:</span> ${cData.source}
                            </div>
                        ` : ''}
                    </div>

                    <!-- COLUMNA: BLOQUE DE LAS 5 PREGUNTAS ASOCIADAS -->
                    <div class="w-full space-y-5">
            `;

            cData.questions.forEach((q, idx) => {
                const globalQId = (cData.id - 1) * QUESTIONS_PER_CASE + idx + 1;
                const qState = userProgress[globalQId];
                const hasAnswered = qState && qState.answered;
                const userAnswer = hasAnswered ? qState.selectedOption : null;
                
                let cardStyle = "border-slate-200 dark:border-slate-800/80";
                if (globalQId === activeGlobalId) {
                    cardStyle = "border-blue-500 dark:border-blue-500 ring-2 ring-blue-500/10";
                }
                if (examState.isFinished && hasAnswered) {
                    cardStyle = (userAnswer === q.answer) ? "border-l-4 border-emerald-500" : "border-l-4 border-rose-500";
                }

                html += `
                    <div id="q-card-${globalQId}" class="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-sm border ${cardStyle} transition-all">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700">
                                PREGUNTA ${globalQId}
                            </span>
                        </div>
                        <h3 class="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-100 mb-4 leading-snug">${q.question}</h3>
                        <form id="q-form-${globalQId}" class="space-y-2.5">
                `;

                q.options.forEach((opt, i) => {
                    if (examState.isFinished) {
                        let optClasses = "flex items-start p-3 border rounded-xl text-xs sm:text-sm ";
                        let icon = "";
                        
                        if (i === q.answer) {
                            optClasses += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 font-semibold";
                            icon = `<svg class="w-4 h-4 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
                        } else if (i === userAnswer) {
                            optClasses += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                            icon = `<svg class="w-4 h-4 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                        } else {
                            optClasses += "bg-slate-50 border-slate-100 dark:bg-slate-800/30 dark:border-slate-800/50 opacity-50 text-slate-400";
                        }

                        html += `
                            <div class="${optClasses}">
                                <span class="leading-snug pr-3">${opt}</span>
                                ${icon}
                            </div>
                        `;
                    } else {
                        const checkedStr = (hasAnswered && userAnswer === i) ? 'checked' : '';
                        html += `
                            <label class="flex items-start p-3 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/40 has-[:checked]:bg-blue-50/80 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/20 text-xs sm:text-sm shadow-sm" onclick="autoSaveAnswer(${globalQId})">
                                <input type="radio" name="option" value="${i}" ${checkedStr} class="mt-0.5 h-3.5 w-3.5 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-700 cursor-pointer">
                                <span class="ml-2.5 text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `;
                    }
                });

                html += `</form>`;

                if (examState.isFinished) {
                    html += `
                        <div class="bg-blue-50/60 dark:bg-slate-800/50 border border-blue-100/50 dark:border-slate-800 rounded-xl p-4 text-xs sm:text-sm mt-4">
                            <h4 class="font-bold text-blue-800 dark:text-blue-400 mb-1 flex items-center gap-1 uppercase tracking-wider text-[10px]">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Justificación Médica GPC
                            </h4>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${q.justification}</p>
                        </div>
                    `;
                }

                html += `</div>`;
            });

            const isLastCase = cData.id === casesData.length;

            html += `
                        <!-- CONTROLES DE FLUJO EN CASOS -->
                        <div class="flex justify-between items-center pt-4 mt-6 border-t border-slate-200 dark:border-slate-800">
                            <button onclick="navigateCase(${cData.id}, 'prev')" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                                Caso Anterior
                            </button>
                            
                            ${examState.isFinished ? `
                                ${!isLastCase ? `
                                    <button onclick="navigateCase(${cData.id}, 'next')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5 shadow-sm">
                                        Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                    </button>
                                ` : `
                                    <button onclick="displayQuestion(null)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider shadow-sm">
                                        Ver Calificaciones
                                    </button>
                                `}
                            ` : `
                                <button onclick="navigateCase(${cData.id}, 'next')" class="bg-blue-600 dark:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:bg-blue-700 dark:hover:bg-blue-400 transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5">
                                    Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('module-display').innerHTML = html;
        }

        function autoSaveAnswer(globalId) {
            if(examState.isFinished) return;
            const form = document.getElementById(`q-form-${globalId}`);
            if (!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (selected) {
                userProgress[globalId] = { answered: true, selectedOption: parseInt(selected.value) };
                saveState();
                updateProgressBar();
                renderSidebarGrid();
            }
        }

        function updateProgressBar() {
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = totalQuestions > 0 ? Math.round((ans / totalQuestions) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; 
            }
        }

        function saveState() {
            try { localStorage.setItem('simuladorELW3Progress', JSON.stringify(userProgress)); } catch(e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('simuladorELW3Progress');
                userProgress = saved ? JSON.parse(saved) : {};
                const savedState = localStorage.getItem('simuladorELW3ExamState');
                if (savedState) examState = JSON.parse(savedState);
            } catch(e) { userProgress = {}; examState = { isFinished: false }; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</body>
</html>
