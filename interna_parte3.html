        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Prevención, diagnóstico y control de la Diabetes Mellitus Tipo 2",
    gpcLink: "https://drive.google.com/file/d/1o_9A_zfZRECKhV4Z6GaF9-qHvq7TWaXU/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El ENARM no busca que memorices dosis de todos los antidiabéticos, sino que domines el escalonamiento terapéutico: la <strong class="text-indigo-900 dark:text-indigo-200">Metformina + cambios en el estilo de vida</strong> es la piedra angular del inicio, salvo en situación crítica ("catabolismo" o descontrol extremo) donde la <u class="decoration-indigo-400 decoration-2 font-medium">insulina basal</u> se vuelve la primera elección obligada.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La narrativa de la guía se basa en la evaluación de respuesta en ventanas de tiempo específicas:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Filtro Inicial (Tamizaje vs. Diagnóstico):</strong> Si la HbA1c cae en "Hiperglucemia intermedia" (intolerancia), el manejo <strong class="underline">NO es farmacológico de entrada</strong>; es estricta modificación de estilo de vida y repetir prueba en 3 a 6 meses.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Inicio del Reloj Terapéutico (Monoterapia):</strong> Confirmada la DM2, inicia el estándar: Metformina + Estilo de vida. El "éxito" o "fracaso" se evalúa en un lapso de <strong class="text-rose-600 dark:text-rose-400 font-bold">3 a 6 meses midiendo HbA1c</strong>. No se cambia antes salvo descompensación.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Escalada (Falla Terapéutica):</strong> Si a los 3-6 meses no hay metas, se agrega un 2do fármaco. Si vuelve a fallar, Terapia Triple. El fallo a Terapia Triple dicta el <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">envío inmediato a segundo nivel</strong>.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Metas Clínicas Precisas:</strong> En el paciente con fenotipo metabólico (obesidad/sedentarismo), la intervención no farmacológica exige:
                            <br>- Pérdida ponderal: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">5 al 7% del peso inicial</strong>.
                            <br>- Actividad física: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">150 minutos/semana</strong>.</li>
                        <li><strong>Consecuencia:</strong> Si no se cumplen estas metas clínicas, es probable que la meta de HbA1c tampoco se alcance.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa "Pre-diabetes":</strong> Ante glucosa limítrofe, la respuesta <strong class="font-bold text-rose-600 dark:text-rose-400">NUNCA es iniciar fármacos de inmediato</strong>; es cambios de estilo de vida y repetir en 3-6 meses.</li>
                        <li><strong>Contraindicación Metformina:</strong> Suspender/no iniciar si <u class="decoration-rose-500 decoration-2">TFG &lt; 30 ml/min</u>, falla hepática o falla cardíaca descompensada.</li>
                        <li><strong>El Paciente Catabólico:</strong> Si debuta con síntomas severos (polidipsia, pérdida de peso) o <strong class="font-bold text-rose-600 dark:text-rose-400">HbA1c &ge; 10%</strong>, saltarse los orales y considerar <u class="decoration-rose-500 decoration-2">insulina basal temprana</u>.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-093-19)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Estándar Tamizaje:</strong> La prueba de elección prioritaria es la cuantificación de <strong class="underline">HbA1c</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Binomio Indivisible:</strong> El tratamiento inicial SIEMPRE es <strong class="underline">Metformina + Cambios en estilo de vida</strong> (no uno sin el otro).</li>

                <p>El objetivo central que evalúa el ENARM no es simplemente recomendar "hacer deporte", sino la capacidad para <strong class="text-indigo-900 dark:text-indigo-200">estratificar el riesgo cardiovascular</strong> antes de someter al paciente a estrés metabólico. La piedra angular es discernir quién puede iniciar de inmediato y quién requiere un <u class="decoration-indigo-400 decoration-2 font-medium">tamizaje isquémico avanzado</u> para prevenir la muerte súbita.</p>

                    El Concepto Fundamental
                </h4>
                <p>El dolor lumbar inespecífico es un <strong class="text-indigo-900 dark:text-indigo-200">diagnóstico de exclusión</strong>. El ENARM busca que entiendas que, en un paciente sin "banderas rojas", la conducta correcta es clínica y funcional, evitando la "medicalización" excesiva con estudios de imagen innecesarios o <u class="decoration-indigo-400 decoration-2 font-medium">reposo absoluto</u>, ya que el objetivo es evitar la transición a la cronicidad y la discapacidad.</p>

                <p class="mb-4">El flujo de decisión tiene "compuertas" críticas que cambian el manejo:</p>

                        <div>

    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                [cite_start]<p>La rehabilitación post-EVC no es un proceso tardío, sino una <strong class="text-indigo-900 dark:text-indigo-200">intervención temprana e intrahospitalaria</strong> enfocada en predecir la funcionalidad al alta mediante escalas objetivas (FIM) y <u class="decoration-indigo-400 decoration-2 font-medium">priorizar la estabilidad proximal (control de tronco)</u> antes que la movilidad distal, limitando secuelas críticas como la espasticidad, afasia y depresión[cite: 143, 146, 154].</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                [cite_start]<p class="mb-4">Todo paciente hemodinámicamente estable debe iniciar de inmediato una evaluación funcional intrahospitalaria[cite: 39, 40, 41]:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            [cite_start]<strong class="text-slate-800 dark:text-slate-200">Estratificar Pronóstico:</strong> A través de la <strong class="text-rose-600 dark:text-rose-400 font-bold">Medida de Independencia Funcional (FIM)</strong>, el principal predictor de alta a domicilio[cite: 146]. [cite_start]Al planificar, el algoritmo es jerárquico: el manejo debe enfocarse <strong class="underline">primero en el control de tronco y equilibrio en sedestación</strong> antes de intentar la bipedestación o reentrenar la marcha[cite: 154].
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            [cite_start]<strong class="text-slate-800 dark:text-slate-200">Abordaje Cognitivo (Afasia):</strong> Si se identifica afasia de Broca aguda, se marca un cambio terapéutico indicando el inicio intensivo de terapia de lenguaje sumado al uso del neuromodulador <strong class="text-indigo-600 dark:text-indigo-400 font-bold">Cerebrolysin</strong> para aprovechar la ventana de plasticidad[cite: 211].
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            [cite_start]<strong class="text-slate-800 dark:text-slate-200">Tamizaje Psicoafectivo Continuo:</strong> La GPC exige la aplicación de la Escala Hospitalaria de Ansiedad y Depresión[cite: 69, 70]. [cite_start]Si hay datos clínicos de depresión o ansiedad, el abordaje se vuelve farmacológico inmediato (ISRS) e interdisciplinario[cite: 218].
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        [cite_start]<li><strong>Incontinencia Urinaria Aguda:</strong> Es un <strong class="text-emerald-700 dark:text-emerald-300 font-bold">factor de mal pronóstico funcional</strong> a largo plazo[cite: 143]. [cite_start]Justifica la indicación de estimulación eléctrica neuromuscular (EENM) aunada a ejercicios de piso pélvico[cite: 188].</li>
                        [cite_start]<li><strong>Espasticidad Focal Temprana:</strong> Si se detecta pie equino espástico o distonía focal del MS, la intervención de elección es <u class="decoration-emerald-400 decoration-2 font-bold">Toxina Botulínica tipo A (BoNT-A) en los primeros 3 meses</u>[cite: 184]. [cite_start](El baclofeno intratecal se reserva para casos refractarios [cite: 184]).</li>
                        [cite_start]<li><strong>Potencial de Deambulación:</strong> El estándar para evaluar la marcha comunitaria es la <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Prueba de Caminata de 6 minutos (6MWT)</strong>[cite: 154].</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Trampa Farmacológica (Depresión):</strong> El error más frecuente es prescribir antidepresivos para "prevenir". [cite_start]La GPC es contundente: <strong class="font-bold text-rose-600 dark:text-rose-400">NO se recomienda fluoxetina como profilaxis</strong>[cite: 218]. [cite_start]Los ISRS se inician de forma temprana ÚNICAMENTE con el diagnóstico establecido[cite: 218].</li>
                        <li><strong>Trampa Terapéutica (Espasticidad):</strong> Para contracturas severas, una opción distractora clásica es el "estiramiento pasivo". [cite_start]La Red Flag es que los <u class="decoration-rose-500 decoration-2">estiramientos pasivos con posicionamiento simple como ÚNICA intervención NO se recomiendan</u>[cite: 197]. [cite_start]Deben acompañarse de órtesis o terapia[cite: 197].</li>
                        [cite_start]<li><strong>Confusión de Escalas:</strong> FIM es <strong class="font-bold">predictor de alta</strong>[cite: 146]. [cite_start]Fugl-Meyer (FMA) y Escala de Evaluación Motora (MAS) miden y modifican la <strong class="font-bold">progresión motora</strong> durante el programa[cite: 146].</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC DIF-331-21)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    [cite_start]<li><strong class="text-amber-700 dark:text-amber-500">Escala Predictiva:</strong> Aplica la escala <strong class="underline">FIM de forma rutinaria</strong> para predecir la viabilidad del alta a domicilio[cite: 146].</li>
                    [cite_start]<li><strong class="text-amber-700 dark:text-amber-500">Manejo Inicial Motor:</strong> Las primeras intervenciones motoras siempre deben ir dirigidas a mejorar el <strong class="underline">control de tronco y el equilibrio en sedestación</strong>[cite: 154].</li>
                    [cite_start]<li><strong class="text-amber-700 dark:text-amber-500">Manejo de Espasticidad:</strong> La <strong class="underline">Toxina botulínica tipo A (BoNT-A)</strong> es la elección para la espasticidad focal (ej. pie equino) en los primeros 3 meses[cite: 184].</li>
                    [cite_start]<li><strong class="text-amber-700 dark:text-amber-500">Farmacología Neuro-restaurativa:</strong> El <strong class="underline">Cerebrolysin</strong> se recomienda como auxiliar para potenciar la recuperación exclusivamente en <strong class="underline">afasia de Broca aguda</strong>[cite: 211].</li>
                    [cite_start]<li><strong class="text-amber-700 dark:text-amber-500">Cero Profilaxis Antidepresiva:</strong> Ante el alto riesgo de depresión, <strong class="underline">NO se sugiere el uso profiláctico</strong> de ningún medicamento antidepresivo; su uso es terapéutico[cite: 218].</li>
                </ol>
            </div>
        </div>

                </h4>
                <p>La Enfermedad Arterial Periférica (EAP) no es solo un problema local, sino un marcador de aterosclerosis sistémica. El diagnóstico se confirma con el <strong class="text-indigo-900 dark:text-indigo-200">Índice Tobillo-Brazo (ITB)</strong> y el manejo inicial es eminentemente médico (control de riesgo cardiovascular y ejercicio); la cirugía o intervencionismo se reservan <u class="decoration-indigo-400 decoration-2 font-medium">exclusivamente para la isquemia crítica o la claudicación incapacitante</u> que no responde al tratamiento conservador.</p>

                    El Concepto Fundamental
                </h4>
                <p>El éxito en el manejo del Cáncer de Pulmón de Células No Pequeñas (CPCNP) radica en una <strong class="text-indigo-900 dark:text-indigo-200">estadificación TNM precisa</strong> que dicotomiza la ruta terapéutica: los estadios tempranos (I-II) buscan la curación quirúrgica, mientras que los estadios avanzados exigen un abordaje multimodal o sistémico guiado obligatoriamente por el <u class="decoration-indigo-400 decoration-2 font-medium">perfil molecular (EGFR, PDL-1) y el estado funcional del paciente</u>.</p>

                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Tamizaje y Sospecha (El Filtro):</strong> Paciente de alto riesgo (55 a 74 años con IT &ge; 30). Si es asintomático, va a TAC de baja dosis. Si ya presenta síntomas (tos, hemoptisis), se escala directamente a <strong class="text-rose-600 dark:text-rose-400 font-bold">TAC de tórax contrastada con extensión a abdomen superior</strong>.
                        </div>

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Confirmación y Localización (El Target):</strong> Ante nódulo sospechoso, se debe confirmar histológicamente. La ubicación dicta el método: tumores centrales con broncoscopia; tumores periféricos con <strong class="underline">biopsia percutánea guiada por imagen</strong>.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>

                    El Concepto Fundamental
                </h4>
                <p>El Cor Pulmonale Crónico (CPC) no es una enfermedad cardiaca per se, sino la <strong class="text-indigo-900 dark:text-indigo-200">falla estructural y funcional del ventrículo derecho</strong> (hipertrofia y dilatación) secundaria ineludiblemente a hipertensión pulmonar (HP) causada por patologías que afectan la función o estructura pulmonar (Grupo 3 de Niza), siendo la <u class="decoration-indigo-400 decoration-2 font-medium">EPOC la etiología más frecuente</u>.</p>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríauno3CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríauno3CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríauno3CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-amber-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-amber-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
