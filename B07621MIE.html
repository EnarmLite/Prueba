    <script>
        const questionsData = [

    {
        id: 1,
        question: "¿A partir de qué edad se indica iniciar el tamizaje sistemático para la detección oportuna de hipertensión arterial sistémica?",
        options: ["40 años", "18 años", "30 años", "50 años"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, el tamizaje universal permite detectar la enfermedad a tiempo, iniciar medidas multidisciplinarias tempranas y evitar un deterioro orgánico silencioso a largo plazo.<br><br>Perla ENARM: \"Se recomienda realizar tamizaje para hipertensión arterial en todos los adultos mayores de 18 años de edad, para detectar a tiempo hipertensión arterial, iniciar de forma oportuna el tratamiento multidisciplinario, y evitar ingresos hospitalarios por eventos cardiovasculares.\"<br><br>Análisis de Distractores: Posponer la toma sistemática a los 30, 40 o 50 años dejaría a la población joven sin detección de factores tempranos y sin abordaje de patologías secundarias.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Tamizaje, Página 17."
    },
    {
        id: 2,
        question: "¿Cuál es el factor de riesgo conductual modificable que muestra la mayor asociación estadística para el desarrollo directo de hipertensión arterial sistémica?",
        options: ["Tabaquismo activo", "Sedentarismo crónico", "Dieta rica en grasas", "Dependencia de alcohol"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la evaluación de conductas modificables es el pilar preventivo principal, destacando el alcoholismo sobre el resto por su capacidad de hiperactivación simpática letal.<br><br>Perla ENARM: \"La dependencia de alcohol muestra una mayor probabilidad para el desarrollo de hipertensión.\"<br><br>Análisis de Distractores: El tabaquismo, sedentarismo y la mala dieta incrementan severamente el riesgo cardiovascular general, pero el consumo dependiente de alcohol tiene el mayor peso estadístico aislado documentado para generar elevación tensional.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Prevención, Página 26."
    },
    {
        id: 3,
        question: "¿Qué cifras de presión arterial obtenidas de forma aislada en el consultorio definen el Estadio 2 de la hipertensión arterial sistémica?",
        options: ["140 a 159 y 90 a 99 mmHg", "160 a 179 y 100 a 109 mmHg", "130 a 139 y 85 a 89 mmHg", "≥ 180 y ≥ 110 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la estadificación en consultorio permite decidir la agresividad del abordaje farmacológico inicial a partir del riesgo inminente de daño.<br><br>Perla ENARM: \"Cuadro 1. Hipertensión Estadio 2: Presión Sistólica 160 a 179 mmHg, Presión Diastólica 100 a 109 mmHg.\"<br><br>Análisis de Distractores: Las cifras de 140-159/90-99 corresponden al Estadio 1. Las cifras 130-139/85-89 corresponden al nivel limítrofe o fronterizo. Valores ≥ 180/110 determinan el Estadio 3 o nivel de urgencia/emergencia.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Anexos, Página 75."
    },
    {
        id: 4,
        question: "¿Cuál es el estudio de elección estándar para establecer el diagnóstico definitivo de hipertensión arterial sistémica y evaluar el pronóstico cardiovascular?",
        options: ["Ecocardiograma transtorácico", "Toma seriada en consultorio", "Monitoreo ambulatorio de presión", "Monitoreo domiciliario por bitácora"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la tecnología ambulatoria de 24 horas elimina los sesgos adrenérgicos de la visita médica y determina los patrones de caída nocturna del pulso.<br><br>Perla ENARM: \"El monitoreo de la presión arterial de forma ambulatoria (MAPA) es el método de elección para el diagnóstico de hipertensión, y la evaluación precisa del riesgo cardiovascular en adultos > 18 años.\"<br><br>Análisis de Distractores: La bitácora domiciliaria es una alternativa válida si no se cuenta con el recurso. Las tomas en consultorio tienen alto margen de efecto de bata blanca. El ecocardiograma evalúa exclusivamente daño orgánico secundario.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Diagnóstico, Página 42."
    },
    {
        id: 5,
        question: "Al medir la presión arterial en ambos brazos durante la evaluación inicial, ¿qué diferencia en milímetros de mercurio sugiere alto riesgo de enfermedad ateromatosa vascular?",
        options: ["> 10 mmHg", "> 5 mmHg", "> 20 mmHg", "> 15 mmHg"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la asimetría tensional severa obliga a descartar obstrucción intraluminal aterosclerótica en el arco aórtico o arterias subclavias.<br><br>Perla ENARM: \"Se recomienda medir la presión arterial en ambos brazos al menos en la primera consulta, debido a que una diferencia > 15 mmHg indica enfermedad ateromatosa y se asocia con un aumento del riesgo cardiovascular.\"<br><br>Análisis de Distractores: Diferencias menores a 10 mmHg son hallazgos fisiológicos habituales. Una diferencia entre 10 y 15 mmHg requiere vigilancia, pero el corte para riesgo letal o enfermedad ateromatosa consolidada es estrictamente > 15 mmHg.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Tamizaje, Página 37."
    },
    {
        id: 6,
        question: "En pacientes mayores de 60 años, ¿cuál es el valor de la presión de pulso indicativo de rigidez arterial patológica y daño orgánico temprano?",
        options: ["≥ 60 mmHg", "≥ 50 mmHg", "≥ 40 mmHg", "≥ 70 mmHg"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la calcificación vascular aórtica incrementa la brecha sistólica-diastólica y eleva sustancialmente el trabajo miocárdico.<br><br>Perla ENARM: \"El médico familiar debe buscar de manera intencionada daño a órgano blanco: Rigidez arterial (presión pulso en personas mayores de 60 años, ≥ 60 mmHg).\"<br><br>Análisis de Distractores: Valores de 40 o 50 mmHg son brechas normales para mantener una hemodinámica funcional óptima. El corte de ≥ 70 mmHg no representa el umbral basal para sospechar rigidez patológica inicial en estos pacientes.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Diagnóstico, Página 32."
    },
    {
        id: 7,
        question: "¿Qué combinación farmacológica se prefiere inicialmente al tratar a un paciente con hipertensión arterial sistémica y obesidad concomitante?",
        options: ["Inhibidor de enzima y tiazida", "Calcioantagonista y tiazida", "Inhibidor de enzima y calcioantagonista", "Monoterapia con calcioantagonista"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, en individuos con síndrome metabólico se debe evitar la primera línea con diuréticos por su reconocido potencial adverso sobre el perfil glucémico y lipídico.<br><br>Perla ENARM: \"Si el paciente tiene: síndrome metabólico, obesidad o diabetes mellitus tipo 2 debe preferirse terapia dual con bloqueador de canales de calcio.\"<br><br>Análisis de Distractores: Las combinaciones duales con tiazidas se reservan únicamente para hipertensos sin factores de riesgo metabólico al arranque del algoritmo. La monoterapia casi siempre resulta ineficaz y se limita a hipertensión grado 1 de mínimo riesgo.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Anexos, Página 71."
    },
    {
        id: 8,
        question: "En el tratamiento de hipertensión resistente, ¿qué diurético está indicado agregar al esquema si la tasa de filtrado glomerular cae por debajo de 30 ml/min?",
        options: ["Diurético de asa", "Diurético ahorrador de potasio", "Diurético tiazídico", "Bloqueador alfa"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la caída crítica del filtrado anula la natriuresis en el túbulo distal y exige la transición a compuestos más potentes a nivel del asa de Henle para vencer la sobrecarga hídrica.<br><br>Perla ENARM: \"Si se tiene aclaramiento de creatinina menor a 30 ml/min, se sugiere usar diurético de asa.\"<br><br>Análisis de Distractores: Las tiazidas pierden eficacia de filtración en fases avanzadas. La espironolactona (ahorrador de potasio) está formalmente contraindicada por peligro inminente de hiperkalemia arritmogénica. El bloqueador alfa es de uso residual posterior, no un reemplazo diurético.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Anexos, Página 71."
    },
    {
        id: 9,
        question: "¿Cuál es la meta general de presión arterial a corto plazo para pacientes menores de 80 años sin evidencia previa de daño cardiovascular?",
        options: ["< 130 / 80 mmHg", "< 120 / 80 mmHg", "< 140 / 90 mmHg", "< 150 / 90 mmHg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, se requiere equilibrar la prevención de aterosclerosis sin inducir hipoperfusión cerebral o coronaria con reducciones extremas e injustificadas en población general.<br><br>Perla ENARM: \"Se recomienda que en adultos con hipertensión arterial sistémica menores de 80 años la meta de presión arterial a corto plazo debe ser < 140/90 mmHg.\"<br><br>Análisis de Distractores: Bajar de 130/80 mmHg es la meta rigurosa reservada para riesgo extremo, infartados o diabéticos. Buscar menos de 120/80 mmHg carece de evidencia poblacional universal segura. Cifras laxas de 150/90 mmHg aplican para fragilidad en el adulto mayor.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Tratamiento farmacológico, Página 60."
    },
    {
        id: 10,
        question: "¿Cuál es el objetivo terapéutico de control estricto en la presión arterial para un individuo diagnosticado simultáneamente con diabetes mellitus tipo 2?",
        options: ["< 140 / 90 mmHg", "< 130 / 80 mmHg", "< 150 / 90 mmHg", "< 120 / 80 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la agresividad inflamatoria de la glucotoxicidad sumada a la tensión parietal multiplica el riesgo letal micro y macrovascular, demandando metas inferiores de protección.<br><br>Perla ENARM: \"Se recomienda en adultos con diabetes mellitus e hipertensión, recibir tratamiento y vigilancia para alcanzar una meta < 130/80 mmHg.\"<br><br>Análisis de Distractores: El objetivo < 140/90 mmHg o < 150/90 mmHg resultaría permisivo y facilitaría la progresión de la nefropatía diabética preexistente. Forzar el descenso por debajo de 120/80 mmHg eleva eventos secundarios iatrogénicos.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Tratamiento farmacológico, Página 60."
    },
    {
        id: 11,
        question: "¿Cada cuánto tiempo debe evaluarse médicamente a una persona que presenta cifras tensionales limítrofes entre 130 a 139 y 85 a 89 mmHg en su tamizaje inicial?",
        options: ["Evaluación semanal", "Evaluación semestral", "Evaluación trienal", "Evaluación mensual"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, el estado fronterizo incrementa el riesgo de conversión a enfermedad sostenida a mediano plazo, exigiendo vigilancia sin llegar aún al manejo farmacológico rutinario.<br><br>Perla ENARM: \"Si tienen factores de riesgo para hipertensión o si su presión arterial sistólica es de 120 a 129 mmHg o 130 a 139 mmHg, la reevaluación será semestralmente.\"<br><br>Análisis de Distractores: Las consultas mensuales o semanales aplican para pacientes diagnosticados en fase de titulación de dosis farmacológica. Revisiones muy prolongadas (trienal) se reservan para población joven totalmente asintomática con niveles < 120/80 mmHg.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Tamizaje, Página 37."
    },
    {
        id: 12,
        question: "¿Qué entidad clínica se sospecha inminentemente si la creatinina sérica incrementa más del 30% tras la instauración de un fármaco antagonista de angiotensina?",
        options: ["Apnea obstructiva del sueño", "Aldosteronismo primario tumoral", "Estenosis de arteria renal", "Feocromocitoma suprarrenal"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, el bloqueo abrupto del mecanismo de rescate de la angiotensina II desencadena insuficiencia isquémica grave en la nefrona cuando existe un flujo sanguíneo vascular basal comprometido.<br><br>Perla ENARM: \"El médico familiar debe sospechar de hipertensión secundaria renovascular cuando hay deterioro de la función renal con el uso de inhibidores o antagonistas, sobre todo en casos de estenosis renal bilateral.\"<br><br>Análisis de Distractores: Apnea, feocromocitoma y aldosteronismo no generan un colapso del filtrado hemodinámico exclusivamente condicionado por el consumo de los fármacos del eje renina-angiotensina.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Anexos, Página 65."
    },
    {
        id: 13,
        question: "Dentro de la clasificación de patologías subyacentes, ¿cuál es la causa más común de hipertensión arterial secundaria en la población adulta?",
        options: ["Enfermedad renovascular ateroesclerótica", "Síndrome de apnea obstructiva", "Aldosteronismo primario hiperplásico", "Enfermedad del parénquima renal"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial, la hipoxia crónica nocturna y la disrupción del sueño generan un estado de hiperactividad noradrenérgica sistémica que constituye la causa epidémica subyacente de mayor impacto.<br><br>Perla ENARM: \"Las causas principales de hipertensión secundaria son: Apnea obstructiva del sueño 40-50%, Enfermedad renovascular 5-34%, Aldosteronismo primario 8-20%.\"<br><br>Análisis de Distractores: Los orígenes vasculares y parenquimatosos renales ocupan la segunda o tercera posición en prevalencia global, mientras que las abnormalities neuroendocrinas no superan la abrumadora frecuencia del trastorno del sueño condicionado por la obesidad poblacional.",
        source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento, 2021, Epidemiología, Página 64."
    },
    {
        id: 14,
        question: "¿Qué mediciones tensionales establecen clínicamente el concepto diagnóstico de hipertensión enmascarada peligrosa?",

        function displayQuestion(qId) {

                currentQuestionId = qId ? parseInt(qId) : null;

                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                        dashboardBtn.classList.remove('lg:left-[22rem]');

                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
