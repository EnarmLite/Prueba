            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1,
                question: "¿Cuál es el marcador de pronóstico ultrasonográfico que predice mayor riesgo de mortalidad en una Amenaza de Aborto temprana?",
                options: [
                    "Taquicardia fetal reactiva",
                    "Hemorragia endocervical escasa",
                    "Saco vitelino simétrico ecogénico",
                    "Bradicardia fetal menor 110 lpm"
                ],
                answer: 3,
                justification: "Justificación: De acuerdo a la GPC de Amenaza de aborto, la disminución drástica de los latidos fetales por debajo del percentil mínimo esperado marca un proceso de declive hipóxico o cromosómico severo del embrión, siendo el signo premonitorio ecográfico más ominoso de pérdida inminente.<br><br>Perla ENARM: \"Los marcadores ultrasonograficos que predicen aborto en mujeres con viabilidad fetal confirmada son: Bradicardia fetal (con FCF < 110 lpm, entre la 6 a 14 SDG, Sen 68 y Esp 97%)\".<br><br>Análisis de Distractores: La taquicardia (A) no es mencionada como el marcador pronóstico nefasto por excelencia en el primer trimestre. Un saco vitelino simétrico y ecogénico normoinserto (C) denota normalidad implantatoria y vitelina. La hemorragia (B) predice riesgo clínico, pero la bradicardia es el marcador pronóstico ecográfico directo letal.",
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Pronóstico, Página 17."
            },
            {
                id: 2, 
                question: "En miomatosis uterina, ¿cuál es el criterio clínico o antecedente que integra el diagnóstico presuntivo para proceder al tratamiento quirúrgico definitivo según la Guía de Práctica Clínica?", 
                options: ["Útero mayor a 500 gramos", "Falla al manejo conservador", "Deseo de fertilidad futura", "Sangrado uterino anormal leve"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Histerectomía en patología benigna, el tratamiento quirúrgico radical se reserva estrictamente para aquellas pacientes sintomáticas con paridad satisfecha que no presentaron mejoría tras el uso de alternativas farmacológicas o de mínima invasión.<br><br>Perla ENARM: \"Diagrama de flujo 1. Histerectomía en patología uterina benigna: ¿Es candidata a tratamiento conservador? SI -> Valorar uso de Pesario/Manejo conservador -> ¿Mejoría? NO -> Histerectomía\".<br><br>Análisis de Distractores: El peso uterino (A) no es el indicador primario para decidir extirpar el órgano si hay opciones médicas funcionales. El deseo de fertilidad (C) y un sangrado leve (D) favorecerían la preservación del útero y la vigilancia.", 
                source: "GPC SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Anexos, Página 36." 
            },
            {
                id: 3, 
                question: "¿Cuál es la maniobra de control temporal recomendada en el choque hemorrágico en obstetricia para disminuir el sangrado mientras se espera el efecto farmacológico o el traslado?", 
                options: ["Taponamiento con gasas secas", "Técnica de Zea", "Ligadura de arterias hipogástricas", "Empaquetamiento tipo Mikulicz"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, antes de abrir un abdomen de urgencia, se deben pinzar las arterias uterinas vía vaginal como un \"torniquete\" temporal para estabilizar hemodinámicamente a la mujer en la sala.<br><br>Perla ENARM: \"Se recomienda la técnica de Zea como control temporal de la hemorragia obstetrica, a fin de: Identificar las causas del sangrado, Antes de su traslado a quirófano o a otra unidad hospitalaria\".<br><br>Análisis de Distractores: El taponamiento uterino ideal es con balones (Bakri/Sengstaken), no gasas secas (A) que rasgan el tejido. La ligadura de hipogástricas (C) o el empaquetamiento de Mikulicz (D) son terapias definitivas o de \"control de daños\" que exigen una laparotomía, no una maniobra inicial de puente.", 
                source: "GPC IMSS-162-09, Diagnóstico y tratamiento del choque hemorrágico en obstetricia, 2017, Tratamiento No Farmacológico, Página 26." 
            },
            {
                id: 4, 
                question: "En Sepsis Materna, ¿cuál es el signo clínico o hallazgo que integra el tamizaje positivo según la escala modificada (omqSOFA) recomendada por la GPC?", 
                options: ["Presión arterial sistólica ≤90", "Frecuencia respiratoria ≥22", "Frecuencia cardiaca >100", "Temperatura corporal >38.5°C"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, el embarazo produce cambios cardiovasculares fisiológicos que hacen inexactas las escalas convencionales. Por ello, la evaluación rápida de disfunción orgánica en obstetricia (omqSOFA) ajusta el criterio hemodinámico a una presión sistólica más baja (≤90 mmHg) en conjunto con frecuencia respiratoria ≥25 por minuto y alteración del estado de conciencia.<br><br>Perla ENARM: \"Se recomienda emplear la escala de omqSOFA (puntaje modificado en obstetricia, para la evaluación rápida de la falla orgánica) para el tamizaje de la sepsis materna\".<br><br>Análisis de Distractores: La opción B corresponde al valor de la escala qSOFA para población general, la cual no está ajustada al aumento fisiológico de la ventilación en el embarazo (el corte obstétrico es ≥25). Las opciones C y D pertenecen a los antiguos criterios de SIRS, que la guía aconseja abandonar por su baja especificidad y alta tasa de falsos positivos en la mujer gestante.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Diagnóstico Clínico, Página 15." 
            },
            {
                id: 5, 
                question: "En el contexto de pérdida del bienestar fetal durante el trabajo de parto, ¿cuál es el evento semiológico característico que debe orientar inmediatamente al diagnóstico diferencial de Prolapso de Cordón Umbilical?", 
                options: ["Bradicardia o desaceleraciones fetales súbitas", "Taquicardia fetal sostenida compensatoria", "Disminución crónica de movimientos fetales", "Contracciones uterinas de baja intensidad"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, especialmente posterior a la salida abrupta e intensa del volumen considerable de líquido amniótico que rodea a la presentación (ya sea por ruptura espontánea de bolsas o por ruptura artificial de membranas terapéutica programada), el cordón desciende velozmente arrastrado y empujado hacia el segmento menor para finalmente ser aplastado, pinzado u ocluido físicamente por la dura cabeza fetal que desciende como cuña o tapón contra el anillo rígido cérvico-pélvico o sínfisis púbica materna, cortando inminentemente el flujo de sangre oxigenada oxigenante de las arterias venosas eferentes aferentes y causando un reflejo vagal asfíctico directo secundario intenso al barorreflejo instantáneo y la hipoxia, que se exterioriza visualmente y monitoriza clásicamente en el trazo continuo externo como una caída drástica y repetitiva (dip grave profundo o en V/U) o sostenida letal inmediata (línea plana) en el papel o monitor visual.<br><br>Perla ENARM: \"Las alteraciones en la frecuencia cardiaca fetal (deceleraciones variables, recurrentes, súbitas y con duración mayor a un minuto), por lo general son el primer signo de prolapso de cordón umbilical\".<br><br>Análisis de Distractores: La taquicardia fetal que se exacerba (>160 latidos) compensatoria prolongada y sin variabilidad transitoria suele presentarse frecuentemente en estados de síndrome de respuesta inflamatoria materna por corioamnionitis pélvica instaurada o cuadros secundarios acompañantes de fiebre materna o taquicardias inducidas por simpaticomiméticos tocolíticos, y no primariamente ante la asfixia oclusiva pura directa letal. La disminución crónica severa o la incapacidad materna repentina o silente diaria progresiva paulatina prolongada pre-hospitalaria de percibir o contabilizar clínicamente los movimientos y patadas (C) es un signo de insuficiencia placentaria ateromatosa u obstétrica o restricción subaguda del crecimiento en casa o seguimiento, y no el signo inicial premonitorio directo mecánico asfíctico letal que ocurre tras estallido físico de membranas y compresión vascular intrahospitalaria obstétrica del cordón en minutos agudos transparto. Las contracciones que se presentan o detectan muy disminuidas en amplitud o espaciadas (bajas en tono) o de baja intensidad (D) indican y rigen la pauta de inducción oxitócica trans-hospitalaria de una simple inercia funcional fisiológica distócica en la distocia de dinámica de labor, no un riesgo de obstrucción física aguda o isquémica anóxica per se para requerir estatutariamente y como única terapéutica inmediata la urgente reanimación neonatal ex-utero emergente de urgencia sin retraso del cordón umbilical prolapsado patológico que excede la entrada del canal pélvico inferior en revisión con desgarro vital del soporte funicular biológico extraído del producto intraparto final e irrecuperable por las contracciones intraútero persistentes ocluidas.", 
                source: "GPC IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Prolapso de cordón umbilical, Página 32." 
            },
            {
                id: 6, 
                question: "En una paciente con sospecha de preeclampsia, ¿cuál es el dato clínico que integra el diagnóstico de preeclampsia con datos de severidad aun sin documentar proteinuria, según la Guía de Práctica Clínica?", 
                options: ["Edema severo de miembros inferiores.", "Cefalea leve ocasional.", "Dolor agudo en epigastrio.", "Tensión arterial de 150/90."], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Prevención, Diagnóstico y Tratamiento de la Preeclampsia, el dolor abdominal superior refleja distensión de la cápsula de Glisson por isquemia y edema hepático, fungiendo como un criterio absoluto de daño a órgano blanco.<br><br>Perla ENARM: \"La presencia de hipertensión severa, dolor en epigastrio, dolor en hipocondrio derecho, náusea y vómito severo, aun cuando no se demuestre de manera inmediata proteinuria, incrementan la certeza diagnóstica de preeclampsia y ameritan hospitalización urgente\".<br><br>Análisis de Distractores: El edema clínico ha sido retirado de los criterios de severidad. La cefalea debe ser persistente o de novo con alteraciones visuales, no leve ni ocasional. Una tensión arterial de 150/90 no cumple la meta (>160/110) para considerarse un criterio de severidad de forma aislada.", 
                source: "GPC IMSS-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Diagnóstico Clínico, Página 29." 
            },
            {
                id: 7, 
                question: "En el abordaje de la Ruptura Prematura de Membranas Pretérmino, ¿cuál es el grupo farmacológico cuyo uso no se recomienda de forma profiláctica ni terapéutica porque no mejora los resultados perinatales?", 
                options: ["Antibióticos de amplio espectro", "Terapia con corticosteroides", "Sulfato de magnesio neuroprotector", "Terapia farmacológica con tocolíticos"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, en el contexto donde el feto tiene sus membranas intactas pero presenta actividad uterina (amenaza de parto prematuro), la tocólisis gana tiempo valioso. Sin embargo, en el escenario específico donde las membranas ya están rotas, la tocólisis no solo falla al intentar prevenir el parto, sino que no ofrece ninguna mejora demostrable en los resultados de morbilidad y mortalidad en el neonato pretérmino, pudiendo además enmascarar signos de una infección intraamniótica inminente.<br><br>Perla ENARM: No se recomienda el uso de tocólisis profiláctica ni terapéutica en mujeres con ruptura prematura de membranas pretérmino.<br><br>Análisis de Distractores: Los antibióticos de amplio espectro (A) prolongan eficazmente el embarazo y están muy indicados de forma profiláctica por 7 días. La terapia con corticosteroides (B) como la betametasona tiene enorme evidencia en la reducción del riesgo del síndrome de dificultad respiratoria. El sulfato de magnesio neuroprotector (C) está ampliamente recomendado de la semana 24 hasta la 32 si es inminente el nacimiento.", 
                source: "GPC-SEDENA-446-18, Diagnóstico y Tratamiento de la Ruptura Prematura de Membranas Pretérmino, 2018, Evidencias y Recomendaciones, página 22." 
            },
            {
                id: 8, 
                question: "De acuerdo a los criterios de la guía clínica, ante la sospecha de Hemorragia Postparto, ¿cuál es el volumen de pérdida sanguínea que define a la patología independientemente de la vía de resolución?", 
                options: ["Sangrado mayor 500 mililitros", "Sangrado mayor 1000 mililitros", "Pérdida del 10%", "Caída de 2 gramos "], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, el concepto clínico moderno avalado por el Colegio Americano de Obstetras y Ginecólogos unifica el umbral de sangrado. Fisiológicamente, un volumen de mil mililitros ya representa un impacto hemodinámico importante en la reserva circulatoria materna, independientemente de si el nacimiento fue por vía vaginal o abdominal.<br><br>Perla ENARM: \"Define la hemorragia posparto como pérdida de sangre mayor o igual a 1000 ml o pérdida de sangre con signos o síntomas de hipovolemia dentro de las 24 horas posteriores al parto, ya sea cesárea o parto vaginal\".<br><br>Análisis de Distractores: La opción A es el umbral clásico e histórico solo para parto vaginal, pero no es la definición actual estandarizada. La opción C y D corresponden a descripciones que evalúan complicaciones hemorrágicas secundarias, pero no son el criterio diagnóstico inmediato y universal.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Introducción, Página 14." 
            },
            {
                id: 9, 
                question: "En el contexto del diagnóstico diferencial o abordaje secundario de la Trombosis Venosa Profunda (TVP) en pacientes obstétricas, ¿qué estudio de imagen está contraindicado debido al riesgo de generar afección cutánea/fibrosis o muerte neonatal?", 
                options: ["Angiotomografía pulmonar computarizada.", "Gamagrama de ventilación perfusión.", "Ultrasonido con compresión venosa.", "Resonancia magnética con gadolinio."], 
                answer: 3, 
                justification: "Justificación: Aunque ciertas modalidades de imagen son biológicamente seguras por su ausencia de radiación ionizante (como la Resonancia), el uso de contrastes específicos cruza la placenta comprometiendo la viabilidad y función orgánica fetal. De acuerdo a la GPC de Enfermedad Tromboembólica Venosa Obstétrica, el material de contraste basado en gadolinio asocia fibrosis sistémica nefrogénica, toxicidad cutánea fetal y desenlaces adversos graves.<br><br>Perla ENARM: \"No se recomienda realizar resonancia magnética con gadolinio en pacientes embarazadas con sospecha de TVP\".<br><br>Análisis de Distractores: La angiotomografía pulmonar y el gamagrama son sumamente útiles en TEP y tienen indicaciones válidas (el yodo no causa la toxicidad específica letal del gadolinio) bajo consentimiento informado. El ultrasonido de compresión no utiliza contraste alguno y es el Gold Standard inocuo primario para TVP.", 
                source: "GPC SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Pruebas diagnósticas, Página 25."

            {
                id: 10, 
                question: "En el contexto de Ruptura Uterina, ¿cuál es el hallazgo en la monitorización que integra la alerta diagnóstica más consistente según la Guía de Práctica Clínica?",

                question: "En la sospecha de Preeclampsia, ¿cuál es el hallazgo inicial en tira reactiva de orina que integra el diagnóstico presuntivo y obliga a su confirmación cuantitativa según la GPC?",

                justification: "Justificación: De acuerdo a la GPC de Enfermedades Hipertensivas del Embarazo, el análisis de la tira reactiva en orina es un método semicuantitativo inicial muy popular para evaluar la pérdida de proteínas. Un hallazgo de 1+ en la tira (que equivale aproximadamente a 30-100 mg/dl) es el umbral que alerta sobre daño renal incipiente, obligando a realizar pruebas confirmatorias más precisas como la recolección de orina.<br><br>Perla ENARM: \"Un resultado por tira reactiva de 1+ requiere confirmación a través de recolección de orina de 24 horas para cuantificar la cantidad de proteinuria, debido a que se correlaciona con 0.3 g o más de proteinuria\".<br><br>Análisis de Distractores: Las trazas de proteínas (A) equivalen a 15 a 30 mg/dl y no alcanzan el umbral normativo para obligar a confirmación. Los valores de 2+ y 3+ (C y D) son francamente patológicos e indican mayor severidad (100 a >1000 mg/dl), pero el punto de corte diagnóstico mínimo para iniciar la confirmación es 1+.", 
                source: "GPC IMSS-058-08, Detección, Diagnóstico y Tratamiento de las Enfermedades Hipertensivas del Embarazo, 2017, Diagnóstico, Página 21."

                id: 12, 
                question: "En el diagnóstico diferencial de las medidas terapéuticas, ¿cuál es la intervención que la GPC contraindica explícitamente en el Parto Pretérmino por aumentar el riesgo tromboembólico?", 
                options: ["Hidratación intravenosa rápida", "Reposo estricto en cama", "Administración de nitratos", "Uso de antibióticos profilácticos"],

                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 92 y 93."

                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Diagnóstico clínico y pruebas diagnósticas, Página 15."

                id: 14, 
                question: "En una paciente con sospecha de riesgo de parto pretérmino, ¿cuál es el hallazgo ecográfico que confirma el alto riesgo y la necesidad de prevención secundaria según la GPC?", 
                options: ["Dilatación cervical de 2 cm", "Longitud cervical de 30 mm", "Longitud cervical de 25 mm", "Presencia de fibronectina fetal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, la medición anatómica del cérvix es el predictor más fuerte para falla estructural. Un cérvix corto pierde su capacidad de barrera mecánica y contención, elevando drásticamente el riesgo de expulsión prematura. El punto de corte estricto para definir esta incompetencia o riesgo inminente es de 25 mm o menos, lo cual dicta el inicio inmediato de progesterona.<br><br>Perla ENARM: \"Se recomienda usar el valor de corte de 25 mm o menos de longitud cervical en población de riesgo, principalmente en embarazos menores de 32 semanas de gestación (para evitar la pérdida de pacientes que se beneficien con el tratamiento)\".<br><br>Análisis de Distractores: La dilatación de 2 cm (A) ya es un criterio de trabajo de parto activo, no de tamizaje de riesgo. Un cérvix de 30 mm (B) es considerado normoevolutivo y seguro. La fibronectina fetal (D) tiene alto valor predictivo positivo en pacientes sintomáticas, pero la GPC establece explícitamente que no debe usarse de forma rutinaria como tamizaje primario sobre el ultrasonido.",

            {
                id: 15,

                options: ["Edad materna avanzada", "Antecedente de parto pretérmino", "Infección de vías urinarias", "Diabetes Mellitus tipo 1"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, el historial obstétrico previo es el pilar de la estratificación de riesgo. Fisiopatológicamente, un parto prematuro previo indica una susceptibilidad basal en la paciente (incompetencia cervical anatómica, defectos en la tolerancia inmunológica fetal o alteraciones en la cascada inflamatoria uterina) que persiste en gestaciones subsecuentes.<br><br>Perla ENARM: \"Uno de los factores de riesgo clínico más fuertes para el parto prematuro es el antecedente de parto prematuro. El historial materno de nacimientos prematuros confiere un riesgo 1.5 a 2 veces mayor en un embarazo posterior\".<br><br>Análisis de Distractores: Aunque la edad extrema (A), las infecciones (C) y la diabetes (D) son factores de riesgo reconocidos que exacerban la inflamación sistémica, estadísticamente ninguno supera el peso predictivo de haber tenido un evento prematuro previo.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Prevención Secundaria, Página 23."

                question: "¿Cuál es el antecedente clínico clave que permite suspender definitivamente el tamizaje de lesiones precursoras de cáncer de cuello uterino, diferenciando su manejo de la población general?",

                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Prevención y Suspensión de Tamizaje, Página 34."

                    "Modificaciones cervicales ausentes",

                options: ["Índice de choque mayor 0.9", "Llenado capilar > 3 segundos", "Frecuencia de 120 latidos", "Presión sistólica < 90 mmHg"],

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('Exagyo30Progress');
                localStorage.removeItem('Exagyo30LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {

                        dashboardBtn.classList.remove('lg:left-8');

                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        function goToPreviousQuestion(currentId) {

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {

                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('Exagyo30Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('Exagyo30LastQId', currentQuestionId);
                else localStorage.removeItem('Exagyo30LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('Exagyo30Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</script>
