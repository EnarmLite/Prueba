    <!-- MODAL REINICIAR -->

            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "Edad máxima excepcional para administrar la vacuna contra tuberculosis en población infantil sin factores de riesgo comprobados.",
        options: ["12 meses", "3 años", "Menos de 5 años", "14 años"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Vacunación a lo largo de la vida, la vacuna BCG se aplica de forma rutinaria al nacimiento. Sin embargo, en caso de rezago en infantes sanos, el límite de aplicación excepcional es antes de cumplir los 5 años. La extensión hasta los 14 años se reserva únicamente para escenarios con factores de riesgo específicos.<br><br>Perla ENARM: Se podrá vacunar a niñas y niños menores de 5 años y excepcionalmente a menores de 14 años que no hayan sido vacunados.<br><br>Análisis de Distractores: 12 meses es la edad de aplicación de la primera dosis de SRP, no el límite de BCG. 3 años no representa un corte epidemiológico para vacunación primaria en el esquema nacional. 14 años es el límite, pero exclusivo para población en riesgo, no para la población general sin factores documentados.",
        source: "PRONAM Vacunación a lo largo de la vida, 2025, Sección III (Tabla 1), Página 143."
    },
    {
        id: 2,
        question: "Edad límite estricta permitida para la administración de la segunda dosis de la vacuna contra rotavirus.",
        options: ["7 meses y 29 días", "8 meses y 29 días", "6 meses y 29 días", "11 meses y 29 días"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, la vacuna monovalente contra rotavirus (RV1) se administra a los 2 y 4 meses. Debido al incremento del riesgo de intususcepción intestinal en infantes mayores, existe una contraindicación absoluta para aplicar cualquier dosis posterior a esta edad de corte.<br><br>Perla ENARM: Ninguna persona deberá recibir esta vacuna después de los 7 meses con 29 días de edad.<br><br>Análisis de Distractores: 8 meses y 29 días supera el límite de seguridad comprobado en ensayos clínicos para evitar la intususcepción. 6 meses y 29 días es incorrecto; aún existe un mes de margen operativo para la aplicación rezagada. 11 meses y 29 días es el límite de edad para la dosis cero de sarampión en bloqueos, no aplicable a rotavirus.",
        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.2.2, Página 38."
    },
    {
        id: 3,
        question: "Tiempo máximo que puede utilizarse un frasco multidosis abierto de vacuna contra influenza estacional, asumiendo estrictas medidas de asepsia y temperatura óptima.",
        options: ["6 horas", "12 horas", "14 días", "28 días"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, la política de frascos abiertos establece que las vacunas líquidas multidosis (inactivadas o toxoides) conservan su potencia y seguridad hasta por cuatro semanas tras su apertura, reduciendo el desperdicio biológico intramuros.<br><br>Perla ENARM: Todos los frascos abiertos de vacunas líquidas en presentación multidosis podrán ser utilizados hasta 28 días después de abierto el frasco.<br><br>Análisis de Distractores: 6 horas es el límite de viabilidad para vacunas liofilizadas (vivas atenuadas) tras su reconstitución, como la SRP. 12 horas no corresponde a ninguna métrica temporal de la red de frío nacional. 14 días es un distractor temporal sin base normativa en la gestión de vacunas multidosis.",
        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.1.3, Página 24."
    },
    {
        id: 4,
        question: "Edad de inicio para la aplicación de la dosis cero de vacuna contra sarampión, rubéola y parotiditis ante una situación de bloqueo vacunal por contacto confirmado.",
        options: ["4 meses", "6 meses", "9 meses", "12 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Vacunación a lo largo de la vida, ante un brote o contacto de alto riesgo con sarampión, la inmunidad materna residual decrece significativamente en el segundo semestre de vida. La vacunación adelantada protege a los lactantes expuestos, pero requiere reprogramar el esquema habitual posteriormente.<br><br>Perla ENARM: En situación de brote por sarampión, podrá vacunarse a las niñas y niños de 6 a 11 meses, cuando sean contactos de algún caso confirmado de sarampión.<br><br>Análisis de Distractores: 4 meses es demasiado temprano; los anticuerpos maternos transferidos por la placenta neutralizan la vacuna, haciéndola ineficaz. 9 meses es la edad de aplicación de la vacuna de fiebre amarilla o sarampión en esquemas de otros países, pero el bloqueo en México inicia antes. 12 meses es la edad para la primera dosis del esquema ordinario, no para la intervención extraordinaria de dosis cero.",
        source: "PRONAM Vacunación a lo largo de la vida, 2025, Sección III (Tabla 4), Página 154."
    },
    {
        id: 5,
        question: "Recipiente normado para desechar las jeringas utilizadas en la aplicación de la vacuna contra sarampión, rubéola y parotiditis.",
        options: ["Recipiente rígido rojo", "Bolsa de polietileno transparente", "Bolsa de polietileno roja", "Basurero municipal"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, las jeringas que tuvieron contacto directo con virus vivos atenuados (como SRP, SR, BCG, varicela) se consideran residuos biológico-infecciosos con riesgo de transmisión, por lo que su disposición final requiere inactivación o incineración especializada.<br><br>Perla ENARM: Las jeringas usadas para la aplicación de vacunas virales o bacterianas atenuadas se deben desechar en bolsa de polietileno roja.<br><br>Análisis de Distractores: Recipiente rígido rojo está destinado exclusivamente para materiales punzocortantes (agujas), no para el cuerpo de la jeringa. Bolsa de polietileno transparente se utiliza para frascos de vacunas inactivadas o jeringas usadas en la aplicación de estas últimas. Basurero municipal solo recibe frascos de vacunas inactivadas o jeringas que no tuvieron contacto con atenuados.",
        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.1.4 (Cuadro 3), Página 27."
    },
    {
        id: 6,
        question: "Dosis y esquema recomendado de la vacuna contra hepatitis B para pacientes con enfermedad renal crónica en terapia de hemodiálisis.",
        options: ["10 mcg en 3 dosis a los 0, 1 y 6 meses", "40 mcg en 3 dosis a los 0, 1 y 6 meses", "20 mcg en 2 dosis a los 0 y 1 mes", "40 mcg en 2 dosis a los 0 y 1 mes"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Vacunación a lo largo de la vida, los pacientes inmunosuprimidos y en hemodiálisis presentan menor tasa de seroconversión inmunológica. Por ello, requieren una macrodosis (el cuádruple de la pediátrica o el doble de la estándar de adulto) para lograr una respuesta celular y humoral efectiva.<br><br>Perla ENARM: Personas con diálisis o hemodiálisis: 2 mL (40 mcg) intramuscular, tres dosis al momento 0, 1 y 6 meses.<br><br>Análisis de Distractores: 10 mcg en 3 dosis es el esquema primario para infantes o adolescentes sanos. 20 mcg en 2 dosis es el esquema alternativo acelerado para adolescentes y adultos sanos sin antecedente vacunal. 40 mcg en 2 dosis es un esquema incompleto que no garantiza la memoria inmunológica a largo plazo en pacientes con falla renal.",
        source: "PRONAM Vacunación a lo largo de la vida, 2025, Sección III (Tabla 3), Página 149."
    },
    {
        id: 7,
        question: "Semana de gestación a partir de la cual está indicada la aplicación de la vacuna contra tétanos, difteria y tos ferina acelular en cada embarazo.",
        options: ["12", "16", "24", "20"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, la transferencia transplacentaria de anticuerpos IgG maternos contra la toxina pertussis se optimiza a partir de la segunda mitad del embarazo. Esto confiere inmunidad pasiva a la persona recién nacida durante los primeros meses críticos antes de iniciar su propio esquema.<br><br>Perla ENARM: Aplicar una dosis de Tdpa a partir de la semana 20 de edad gestacional (preferentemente entre la 27 a 36 semanas de gestación).<br><br>Análisis de Distractores: 12 semanas es el fin del primer trimestre; la transferencia de anticuerpos no es óptima y se reserva este periodo para evitar asociaciones con pérdidas gestacionales tempranas. 16 semanas es prematuro respecto a la cinética de transporte activo transplacentario de IgG. 24 semanas es una ventana útil, pero la indicación normativa de inicio es a partir de la semana 20.",
        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.2.3 (Cuadro 8), Página 41."
    },
    {
        id: 8,
        question: "Esquema indicado de la vacuna contra el virus del papiloma humano en personas de 11 a 49 años que viven con el virus de la inmunodeficiencia humana.",
        options: ["3 dosis a los 0, 2 y 6 meses", "Dosis única", "2 dosis a los 0 y 6 meses", "3 dosis a los 0, 1 y 6 meses"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Vacunación a lo largo de la vida, la disfunción linfocitaria en pacientes con VIH compromete la capacidad de generar títulos protectores de anticuerpos duraderos contra antígenos similares a virus (VLPs). Por lo tanto, el esquema requiere tres exposiciones al biológico independientemente del conteo de CD4+.<br><br>Perla ENARM: A personas de 11 a 49 años que viven con VIH, se les aplicarán 3 dosis de 0.5 mL intramuscular con intervalo de 0-2-6 meses.<br><br>Análisis de Distractores: Dosis única es el esquema actual estandarizado en la población general para niñas de quinto grado o de 11 años. 2 dosis a los 0 y 6 meses fue el esquema transitorio para población adolescente sana previo a la actualización monodosis. 3 dosis a los 0, 1 y 6 meses corresponde a la pauta de la vacuna contra la Hepatitis B, no VPH.",
        source: "PRONAM Vacunación a lo largo de la vida, 2025, Sección III (Tabla 6), Página 160."
    },
    {
        id: 9,
        question: "Intervalo mínimo requerido entre la aplicación de la vacuna contra varicela y la vacuna contra sarampión, rubéola y parotiditis en caso de no administrarse de forma simultánea.",
        options: ["2 semanas", "8 semanas", "4 semanas", "6 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, la administración asincrónica de dos vacunas virales vivas atenuadas parenterales en un periodo corto induce interferencia viral e inhibición de la respuesta inmune mediada por interferón, reduciendo la eficacia de la segunda vacuna.<br><br>Perla ENARM: Las vacunas de antígenos atenuados pueden administrarse de forma simultánea; cuando no es posible, el intervalo mínimo de aplicación entre cada una es de 4 semanas.<br><br>Análisis de Distractores: 2 semanas es un intervalo insuficiente que resulta en la inactivación o mala respuesta de la segunda vacuna por el estado antiviral sistémico. 8 semanas es el intervalo mínimo entre dosis primarias de antineumocócica conjugada en mayores de un año, no aplica para SRP/Varicela. 6 semanas no está justificado fisiopatológicamente ni normado para separación de virales atenuadas parenterales.",
        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.1.6, Página 32."
    },
    {
        id: 10,
        question: "Edad límite máxima permitida para la aplicación de la dosis de refuerzo de la vacuna contra difteria, tos ferina y tétanos.",
        options: ["4 años, 11 meses y 29 días", "6 años, 11 meses y 29 días", "5 años, 11 meses y 29 días", "7 años, 11 meses y 29 días"],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Vacunación a lo largo de la vida, la vacuna DPT contiene células enteras de Bordetella pertussis que causan alta reactogenicidad sistémica y neurológica en niños mayores. Pasando este límite, el componente de células enteras representa un riesgo inaceptable de encefalopatía o hipertermia severa.<br><br>Perla ENARM: En aquellos casos en los que no se reciba a los 4 años, la edad de aplicación no debe sobrepasar los 6 años, 11 meses y 29 días.<br><br>Análisis de Distractores: 4 años, 11 meses y 29 días corresponde al límite inferior recomendado, pero no al techo máximo para la recuperación de esquemas. 5 años, 11 meses y 29 días es la edad límite estricta para la hexavalente o para completar los esquemas primarios rezagados de otras vacunas de la primera infancia. 7 años, 11 meses y 29 días supera la restricción de reactogenicidad encefálica del componente de tosferina celular.",
        source: "PRONAM Vacunación a lo largo de la vida, 2025, Sección III (Tabla 3), Página 146."
    },
    {
        id: 11,
        question: "Tiempo máximo de viabilidad para utilizar la vacuna contra sarampión, rubéola y parotiditis tras su reconstitución.",
        options: ["6 horas", "4 horas", "8 horas", "12 horas"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, la estabilidad térmica de las vacunas virales vivas liofilizadas decrece estrepitosamente al mezclarse con el diluyente, lo que incrementa el riesgo de contaminación bacteriana y pérdida del título viral por fotodegradación.<br><br>Perla ENARM: Las vacunas liofilizadas como BCG, varicela, SR y SRP, podrán ser utilizadas hasta 6 horas después de reconstituidas o al finalizar la jornada de trabajo, lo que ocurra primero.<br><br>Análisis de Distractores: 4 horas es el límite exclusivo para la vacuna BCG de la cepa Tokio, debido a su extrema termolabilidad. 8 horas es el tiempo habitual de una jornada completa, pero excede el límite de bioseguridad del liofilizado reconstituido. 12 horas compromete tanto la viabilidad del virus como la seguridad por nula adición de conservadores en el diluyente.",
        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.1.3, Página 24."
    },
    {
        id: 12,
        question: "Plazo máximo normado para realizar la notificación inmediata de un evento supuestamente atribuible a la vacunación o inmunización clasificado como grave.",
        options: ["48 horas", "72 horas", "12 horas", "24 horas"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Lineamientos Generales del PVU, la presentación de un ESAVI que pone en peligro la vida, causa invalidez, prolonga la hospitalización o desencadena la muerte exige un protocolo rápido de contención, investigación clínica y recolección de pruebas de calidad.<br><br>Perla ENARM: ESAVI grave debe notificarse de manera inmediata en las primeras 24 horas posterior al conocimiento por la unidad de salud.<br><br>Análisis de Distractores: 48 horas es el margen permitido para los ESAVI no graves (eventos locales, febrícula), que no alteran drásticamente la salud pública ni requieren hospitalización inminente. 72 horas implica una demora epidemiológica severa ante la posibilidad de un lote contaminado o defecto de programación. 12 horas es un límite logísticamente difícil de estandarizar en todos los niveles operativos del sector salud nacional.",

        source: "Lineamientos Generales del Programa de Vacunación Universal, 2026, Sección 5.2.1.2.1, Página 23."

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="loginlite.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('VACAUNProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('VACAUNLastQId', currentQuestionId);
                else localStorage.removeItem('VACAUNLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('VACAUNProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
