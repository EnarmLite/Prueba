    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es la dosis de oxitocina intramuscular recomendada para el manejo activo del tercer periodo del parto?",
        options: ["5 UI", "10 UI", "15 UI", "20 UI"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, el pilar farmacológico para prevenir la atonía uterina es el uso de uterotónicos inmediatos. La administración intramuscular es segura, rápida y de elección en todos los niveles de atención.<br><br>Perla ENARM: \"Administrar 10 UI de oxitocina por vía intramuscular, es preferido porque es eficaz 2-3 minutos después de la administración, tiene efectos adversos mínimos, y se puede utilizar en todas las mujeres\".<br><br>Análisis de Distractores: La opción A (5 UI) es la dosis que puede utilizarse en infusión en bolo intravenoso lento bajo ciertas directrices, pero no es la dosis estándar IM preventiva. Las opciones C (15 UI) y D (20 UI) exceden la dosis inicial profiláctica recomendada y aumentan el riesgo de efectos adversos cardiovasculares sin beneficio adicional demostrado en prevención primaria.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 34."
    },
    {
        id: 2,
        question: "¿Cuál es el valor mínimo de proteínas en orina de 24 horas para confirmar el diagnóstico de preeclampsia?",
        options: ["≥ 300 mg", "≥ 150 mg", "≥ 500 mg", "≥ 1000 mg"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, la tira reactiva es solo un método de tamizaje; la cuantificación exacta del daño endotelial glomerular requiere recolección cronometrada para evitar falsos positivos por concentración urinaria.<br><br>Perla ENARM: \"El estudio demostró que el estándar de oro requiere una recolección de orina cronometrada, proteinuria significativa mayor de 300 mg/día en 24 horas\".<br><br>Análisis de Distractores: La opción B (≥ 150 mg) es el límite superior normal de excreción de proteínas en población general no gestante. La opción C (≥ 500 mg) no representa un punto de corte diagnóstico inicial. La opción D (≥ 1000 mg) es incorrecta, aunque valores por arriba de 5 g definen criterios de severidad.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 19."
    },
    {
        id: 3,
        question: "¿Qué valor de índice de choque clasifica a una paciente obstétrica directamente en Código Rojo?",
        options: ["> 0.5", "> 0.6", "> 0.7", "> 0.8"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, el índice de choque (frecuencia cardiaca dividida por la presión arterial sistólica) es el mejor predictor temprano de hipovolemia severa antes de la hipotensión franca, ameritando activación del equipo de respuesta inmediata.<br><br>Perla ENARM: \"Signos vitales con cambios graves... Índice de choque > 0.8\".<br><br>Análisis de Distractores: La opción C (> 0.7) corresponde al límite inferior del rango para clasificar a la paciente en Código Amarillo (0.7 a 0.8). Las opciones A y B representan índices de choque dentro de parámetros normales o compensados, sin ameritar activación de emergencia.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Anexos, Página 58."
    },
    {
        id: 4,
        question: "¿En qué periodo se recomienda iniciar dosis bajas de ácido acetilsalicílico en pacientes con factores de riesgo?",
        options: ["8 a 12 semanas", "20 a 32 semanas", "12 a 28 semanas", "24 a 34 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, la antiagregación plaquetaria previene el daño endotelial y favorece la invasión trofoblástica adecuada si se inició de manera temprana en el segundo trimestre.<br><br>Perla ENARM: \"El personal de salud deberá recomendar las dosis bajas de aspirina en mujeres con bajo riesgo, iniciando entre las 12 y 28 semanas de gestación.\"<br><br>Análisis de Distractores: La opción A es prematura y no está sustentada por la evidencia principal para remodelación vascular. Las opciones B y D son tardías; iniciar la profilaxis después de la semana 20 reduce drásticamente su eficacia para modificar la fisiopatología placentaria.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 21."
    },
    {
        id: 5,
        question: "¿Cuál es el primer signo clínico que manifiesta toxicidad por infusión de sulfato de magnesio?",
        options: ["Pérdida de reflejos osteotendinosos", "Depresión respiratoria", "Paro cardiaco", "Oliguria severa"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, la hipermagnesemia provoca un bloqueo neuromuscular progresivo. La abolición de los reflejos rotulianos ocurre a niveles de 10 mEq/L, precediendo a complicaciones mortales.<br><br>Perla ENARM: \"La toxicidad del sulfato de magnesio depende en forma proporcional de la dosis/mEq/L administrados, manifestándose mediante la pérdida de los reflejos tendinosos profundos a los 10 mEq/L\".<br><br>Análisis de Distractores: La opción B (depresión respiratoria) ocurre a niveles más altos (15 mEq/L). La opción C (paro cardiaco) es el evento final catastrófico (niveles >15 mEq/L). La opción D (oliguria severa) no es un signo de toxicidad, sino una contraindicación/precaución que incrementa el riesgo de acumular el fármaco, ya que su excreción es renal.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 28."
    },
    {
        id: 6,
        question: "¿Cuál es la dosis y vía de administración del misoprostol indicada para la prevención de la hemorragia posparto cuando la oxitocina no está disponible?",
        options: ["400 mcg vía sublingual", "800 mcg vía sublingual", "1000 mcg vía rectal", "600 mcg vía oral"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, ante la ausencia de primera línea, el misoprostol es una alternativa de profilaxis altamente efectiva gracias a su estabilidad a temperatura ambiente y rápida absorción.<br><br>Perla ENARM: \"El personal de salud durante la gestión de la tercera etapa del parto administrará una sola dosis de misoprostol de 600 mcg vía oral para reducir la hemorragia postparto\".<br><br>Análisis de Distractores: La opción B (800 mcg vía sublingual) es la dosis indicada para el *tratamiento* de la hemorragia posparto establecida, no para prevención. La opción A (400 mcg) se utiliza como complemento de la oxitocina intracirugía, no profilaxis primaria aislada. La opción C (1000 mcg) excede las dosis farmacológicas estandarizadas en obstetricia.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 47."
    },
    {
        id: 7,
        question: "Durante el control farmacológico de una crisis hipertensiva grave en el embarazo, ¿cuál es el límite mínimo al que se debe descender la presión arterial diastólica?",
        options: ["70 mmHg", "80 mmHg", "90 mmHg", "100 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, descensos abruptos o excesivos en la tensión arterial comprometen severamente el flujo útero-placentario, generando isquemia y sufrimiento fetal agudo.<br><br>Perla ENARM: \"El personal de salud deberá considerar que no es recomendable reducir la presión arterial sistólica a menos de 120 mmHg y la presión arterial diastólica a menos de 80 mmHg, como objetivo del tratamiento farmacológico\".<br><br>Análisis de Distractores: La opción A (70 mmHg) representa un nivel de hipoperfusión placentaria inminente. Las opciones C (90 mmHg) y D (100 mmHg) son cifras en las que aún persiste riesgo de daño a órgano blanco materno si se asocian a sistólicas elevadas.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 41."
    },
    {
        id: 8,
        question: "¿Cuál es el periodo mínimo de espaciamiento intergenésico recomendado después de una cesárea?",
        options: ["6 a 12 meses", "12 a 18 meses", "24 a 36 meses", "18 a 24 meses"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, el tiempo de cicatrización uterina completa y la recuperación de las reservas nutricionales maternas son fundamentales para evitar complicaciones como rotura uterina o acretismo en gestaciones subsecuentes.<br><br>Perla ENARM: \"El personal de enfermería deberá sensibilizar a la población sobre el espaciamiento entre los embarazo de 18 a 24 meses como mínimo antes del siguiente embarazo sobre todo después de una cesárea\".<br><br>Análisis de Distractores: Las opciones A y B exponen a la paciente a un altísimo riesgo de dehiscencia de histerorrafia. La opción C (24 a 36 meses) es un periodo válido pero excede el \"mínimo\" estricto marcado por la recomendación.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 46."
    },
    {
        id: 9,
        question: "¿Antes de qué semana de gestación se debe realizar el tratamiento periodontal no quirúrgico para mejorar los resultados perinatales?",
        options: ["Semana 20", "Semana 24", "Semana 28", "Semana 35"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, la erradicación de bacteriemias de bajo grado provenientes del tejido periodontal reduce la cascada de respuesta hiperinmune que precipita partos prematuros y daño endotelial (preeclampsia).<br><br>Perla ENARM: \"El personal de salud deberá promover el tratamiento periodontal no quirúrgico... antes de la semana 35 de embarazo, con enfoque a los efectos beneficiosos sobre el peso al nacer y parto a término\".<br><br>Análisis de Distractores: Las opciones A, B y C son semanas en las que es totalmente pertinente realizar el manejo, pero el límite temporal marcado textualmente por la guía para garantizar eficacia medible sobre el nacimiento son las 35 SDG.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 20."
    },
    {
        id: 10,
        question: "¿Qué rango de presión arterial corresponde a la clasificación de Código Amarillo en el triage obstétrico?",
        options: ["130/80 a 139/89 mmHg", "140/90 a 159/109 mmHg", "≥ 160/110 mmHg", "≤ 89/50 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, la estratificación visual e inmediata de signos vitales define el grado de urgencia. Las cifras de hipertensión severa o hipotensión franca ameritan Código Rojo, mientras que rangos intermedios permiten una valoración calificada en amarillo.<br><br>Perla ENARM: \"Signos vitales (Código amarillo)... Entre 159/109 mm /Hg y 140/90 mm /Hg\".<br><br>Análisis de Distractores: La opción A es presión arterial limítrofe normal (Código Verde). La opción C (≥ 160/110 mmHg) y la opción D (≤ 89/50 mmHg) son cifras inestables que catalogan directamente en Código Rojo (Emergencia).",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Anexos, Página 60."
    },
    {
        id: 11,
        question: "¿Hasta cuántos días después del parto puede presentarse una infección del tracto genital para ser definida como sepsis puerperal?",
        options: ["10 días", "14 días", "28 días", "42 días"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, el puerperio patológico abarca todo el periodo de involución anatómica y funcional de los órganos reproductores posterior al alumbramiento.<br><br>Perla ENARM: \"Sepsis Puerperal: Infección del tracto genital que ocurre entre el período transcurrido entre la rotura de membranas o el nacimiento y los 42 días postparto\".<br><br>Análisis de Distractores: Las opciones A, B y C son tiempos más cortos; aunque el riesgo de infección grave (ej. endometritis) es mayor en los primeros 10 días, la definición técnica y legal abarca exactamente los 42 días.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Glosario, Página 81."
    },
    {
        id: 12,
        question: "Para una medición correcta de la presión arterial, ¿qué longitud en relación con la circunferencia del brazo debe tener el brazalete?",
        options: ["1.0 veces", "1.5 veces", "2.0 veces", "2.5 veces"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de atención de emergencia obstétrica, el uso de brazaletes subdimensionados en pacientes embarazadas (frecuentemente con ganancia ponderal u obesidad) sobrestima falsamente la tensión arterial sistólica y diastólica, conduciendo a diagnósticos e intervenciones iatrogénicas.<br><br>Perla ENARM: \"utilizando un tamaño apropiado de brazalete en el cual la longitud debe ser 1.5 veces la circunferencia del brazo\".<br><br>Análisis de Distractores: La opción A genera una sobreestimación sistólica de hasta 13 mmHg. Las opciones C y D utilizarían brazaletes demasiado largos, lo que puede infraestimar levemente las cifras o dificultar la técnica auscultatoria.",
        source: "SS-803-17, Intervenciones de Enfermería Para la Atención de la Emergencia Obstétrica En los Tres Niveles de Atención, 2017, Evidencias y Recomendaciones, Página 25."
    },
    {
        id: 13,
        question: "¿Cuál es la dosis de suplementación de calcio indicada para reducir el riesgo de preeclampsia en pacientes de alto riesgo?",
        options: ["1 a 2 g/día", "0.5 a 1 g/día", "2 a 3 g/día", "3 a 4 g/día"],
        answer: 0,

        function displayQuestion(qId) {

            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto

                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ENF4Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ENF4LastQId', currentQuestionId);
                else localStorage.removeItem('ENF4LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ENF4Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
