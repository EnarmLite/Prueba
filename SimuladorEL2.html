<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

    <div id="app-container" class="relative h-full lg:flex">
        
        <!-- SIDEBAR: MAPA DE PREGUNTAS -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 w-80 p-5 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out z-30 shadow-[4px_0_24px_rgba(0,0,0,0.05)] border-r border-slate-200 dark:border-slate-800">
            
            <div class="flex justify-center mb-6 pt-2">
                <div class="flex items-baseline gap-1 bg-slate-50 dark:bg-slate-800 px-4 py-1.5 rounded-full border border-slate-200 dark:border-slate-700">

            <div class="flex-1 overflow-y-auto min-h-0 custom-scrollbar pr-1">
                <div class="mb-4 relative">
                    <input type="text" id="module-search" placeholder="Buscar en casos o preguntas..." class="w-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-lg py-2 pl-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute right-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>

                <!-- Rejilla de 280 preguntas continuas -->
                <div id="sidebar-q-grid" class="grid grid-cols-[repeat(auto-fill,minmax(38px,1fr))] gap-1.5 p-1"></div>
            </div>
            
            <div class="pt-4 border-t border-slate-200 dark:border-slate-800 mt-2 space-y-3">
                <button id="dark-mode-toggle" class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 font-semibold py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Reiniciar Simulador
                </button>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main id="main-content" class="flex-1 h-[100dvh] overflow-y-auto overscroll-y-contain p-4 sm:p-6 lg:p-8 transition-all duration-300 relative bg-slate-50 dark:bg-slate-950">
            
            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300" title="Ver Tablero General">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <button id="menu-toggle" class="hidden fixed top-4 right-4 lg:right-8 bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-blue-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>

            <!-- Barra de Progreso General -->
            <div id="progress-container" class="hidden w-full max-w-5xl mx-auto bg-slate-200 dark:bg-slate-800 rounded-full mb-6 mt-0 h-5 shadow-inner overflow-hidden relative">

            </div>
            
            <div id="module-display" class="transition-opacity duration-300 pb-12"></div>
        </main>
        
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>

    <!-- MODALES -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará todo tu progreso y respuestas de los casos. ¿Deseas empezar desde cero?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán todas tus respuestas y se liberará la justificación médica.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const casesData = [
                {
                id: 1,
                caseText: "Niño de 4 años es llevado a urgencias por letargo e irritabilidad de 36 horas de evolución. La madre refiere que el cuadro inició con rechazo a la vía oral y vómitos en tres ocasiones. TA 90/55 mmHg, FC 135 lpm, FR 26 rpm, temperatura 39.1 °C. A la exploración física: paciente hipoactivo, con fascies de dolor. Abdomen distendido, con resistencia muscular involuntaria difusa, hiperalgesia generalizada y ruidos peristálticos ausentes. Signo de rebote francamente positivo en el cuadrante inferior derecho y dolor a la percusión. Se establece el diagnóstico clínico de apendicitis aguda con datos de irritación peritoneal.",
                source: "Schwartz's Principles of Surgery, Capítulo 30: The Appendix, 11e, Páginas 9 y 10.",
                questions: [
                    {
                        question: "Según la evidencia epidemiológica en este grupo etario específico, ¿cuál es la probabilidad estadística de que el paciente presente una apendicitis perforada al momento del diagnóstico?",
                        options: [
                            "10 a 20%",
                            "30 a 45%",
                            "51 a 100%",
                            "Menor a 5%"
                        ],
                        answer: 2,
                        justification: "La apendicitis en la población pediátrica presenta retos diagnósticos debido a la incapacidad de los pacientes para articular el dolor clásico. Los lactantes y niños pequeños (preescolares) carecen de un epiplón mayor completamente desarrollado para contener la infección, lo que, sumado a la presentación atípica (letargo, irritabilidad, distensión), retrasa el diagnóstico y eleva drásticamente la tasa de perforación respecto a los adultos.<br><br><b>Perla ENARM:</b> \"De estos, los lactantes y los niños pequeños son los más propensos a presentar enfermedad perforada (51% a 100%), mientras que los niños en edad escolar tienen tasas más bajas de perforación.\"<br><br><b>Análisis de Distractores:</b> Las opciones A, B y D subestiman gravemente la incidencia de perforación en menores de 5 años. Una tasa del 10 a 20% (A) corresponde estadísticamente a la incidencia global de perforación en la población adulta joven. Las tasas más bajas se observan en adolescentes, quienes tienen mayor capacidad de localización anatómica del dolor y comunicación del inicio de los síntomas."
                    },
                    {
                        question: "Usted clasifica el cuadro clínico empleando la Escala de Apendicitis Pediátrica (Pediatric Appendicitis Score). ¿Qué hallazgos otorgan el puntaje máximo (2 puntos cada uno) en esta herramienta de tamizaje?",
                        options: [
                            "Leucocitosis mayor a 10,000 células/mm³ y fiebre",
                            "Dolor en cuadrante inferior derecho y dolor a la tos, percusión o salto",
                            "Anorexia y migración del dolor periumbilical",
                            "Vómito y desviación a la izquierda en el diferencial"
                        ],
                        answer: 1,
                        justification: "La Escala de Apendicitis Pediátrica (PAS) comparte similitudes con la escala de Alvarado pero se adapta a la reactividad infantil. Tiene un valor total de 10 puntos, priorizando los signos de irritación peritoneal focalizada. Un puntaje de 7 o mayor confiere una alta probabilidad diagnóstica (78% a 96%).<br><br><b>Perla ENARM:</b> \"La Escala de Apendicitis Pediátrica... se califica sobre 10 puntos, con el peso máximo (2 puntos cada uno) para la sensibilidad en el cuadrante inferior derecho y el dolor con la tos, la percusión o el salto.\"<br><br><b>Análisis de Distractores:</b> Las opciones A, C y D corresponden a criterios menores que otorgan únicamente 1 punto dentro de la escala PAS. Aunque la fiebre, la leucocitosis (A) o el vómito (D) son hallazgos frecuentes en el cuadro apendicular pediátrico, no poseen el mismo peso predictivo que los signos mecánicos directos de inflamación peritoneal localizada en la fosa ilíaca derecha."
                    },
                    {
                        question: "Los estudios de imagen confirman apendicitis perforada sin evidencia de absceso o plastrón formado. ¿Cuál es el manejo quirúrgico inicial de elección avalado en esta población?",
                        options: [
                            "Drenaje percutáneo con catéter cola de cochino",
                            "Laparotomía exploradora con lavado peritoneal",
                            "Apendicectomía laparoscópica de urgencia",
                            "Apendicectomía abierta por incisión de McBurney"
                        ],
                        answer: 2,
                        justification: "A diferencia de la apendicitis con formación de masa o absceso encapsulado, donde se prefiere el manejo conservador escalonado, la perforación libre sin delimitación del foco requiere extirpación quirúrgica inmediata para controlar la sepsis intraabdominal. La laparoscopia supera al abordaje abierto al permitir un lavado de la cavidad más minucioso con menor morbilidad parietal.<br><br><b>Perla ENARM:</b> \"Para los pacientes con apendicitis complicada, se recomienda la apendicectomía urgente en el escenario de no haber absceso o masa. La apendicectomía laparoscópica parece conservar sus beneficios en este escenario también.\"<br><br><b>Análisis de Distractores:</b> El drenaje percutáneo (A) está absolutamente contraindicado si no existe una colección bien delimitada, ya que no resolverá la peritonitis libre. La laparotomía exploradora (B) es excesiva y aumenta la incidencia de adherencias graves a largo plazo. La apendicectomía abierta (D) es una alternativa válida solo en centros sin infraestructura o experiencia laparoscópica pediátrica, pero no es la primera elección moderna."
                    },
                    {
                        question: "Tras realizar la apendicectomía con éxito, usted establece la prescripción antimicrobiana intravenosa posoperatoria. Según las directrices de la Asociación Americana de Cirugía Pediátrica (APSA), ¿qué duración es la recomendada para este caso?",
                        options: [
                            "Dosis única transoperatoria",
                            "Al menos 3 días, preferentemente 5 días",
                            "Exactamente 7 a 10 días",
                            "14 días continuos"
                        ],
                        answer: 1,
                        justification: "El control antimicrobiano en apendicitis perforada pediátrica requiere un balance entre erradicar la infección residual y evitar la disbiosis intestinal o resistencia. Las guías APSA han estandarizado este rango temporal, condicionando la suspensión a la resolución de la fiebre, reanudación del peristaltismo y normalización de la cuenta leucocitaria.<br><br><b>Perla ENARM:</b> \"En el escenario de una perforación, los antibióticos se continúan después de la cirugía durante al menos 3 días, y preferiblemente 5 días (guías de la APSA).\"<br><br><b>Análisis de Distractores:</b> La dosis única transoperatoria (A) es el protocolo estándar, pero exclusivamente para apendicitis aguda no perforada. Terapias prolongadas de 7 a 10 días (C) o 14 días (D) son obsoletas, carecen de beneficio clínico documentado, prolongan innecesariamente la estancia intrahospitalaria y aumentan los costos asociado a la atención."
                    },
                    {
                        question: "Si los padres del paciente hubieran acudido en etapas tempranas de un cuadro no complicado y se optara por un manejo no operatorio exclusivo con antibióticos, ¿cuál es la tasa de recurrencia de apendicitis documentada al año de seguimiento en la población pediátrica?",
                        options: [
                            "10%",
                            "22%",
                            "38%",
                            "50%"
                        ],
                        answer: 1,
                        justification: "El tratamiento médico exclusivo (no operatorio) para la apendicitis aguda pediátrica no complicada es un abordaje validado pero controvertido. Aunque reduce la inflamación inicial de manera exitosa en casi un 90% de los casos, los pacientes se enfrentan a un riesgo estadísticamente comprobado de recaída, obligando a una cirugía posterior en casi un cuarto de los infantes tratados médicamente.<br><br><b>Perla ENARM:</b> \"Esto suele ser eficaz para reducir la inflamación (88% a 92%), pero tiene una tasa de recurrencia del 22% al cabo de 1 año y una mayor utilización de recursos.\"<br><br><b>Análisis de Distractores:</b> Las tasas de 10% (A), 38% (C) y 50% (D) son incorrectas en la evaluación clínica estandarizada. Aunque algunos subgrupos (por ejemplo, aquellos con un apendicolito visualizado en imagen) tienen índices de fracaso de manejo conservador aún más altos y predicen el fallo terapéutico temprano, el número consolidado global de recurrencia tardía es el 22%."
                    }
                ]
            }, 
{
                id: 2,
                caseText: "Mujer de 35 años acude a urgencias por astenia, adinamia, mialgias y pérdida de 8 kg de peso en 3 meses. Refiere apetito por la sal. Exploración física: TA 85/50 mmHg, FC 102 lpm, FR 18 rpm, T 37.8 °C. Mucosa oral con máculas hiperpigmentadas en encías y carrillos. Piel con hiperpigmentación generalizada, acentuada en pliegues palmares, cicatrices y codos. Laboratorios reportan sodio 128 mEq/L, potasio 5.6 mEq/L, glucosa 65 mg/dl y urea 45 mg/dl.",
                source: "Greenspan's Basic & Clinical Endocrinology, Capítulo 9: Glucocorticoids and Adrenal Androgens, 10th Edition, Páginas 26, 31, 35, 37 y 38.",
                questions: [
                    {
                        question: "¿Cuál es la etiología más frecuente asociada al cuadro clínico descrito?",
                        options: [
                            "Tuberculosis suprarrenal",
                            "Adrenalitis autoinmune",
                            "Hemorragia bilateral",
                            "Metástasis suprarrenal"
                        ],
                        answer: 1,
                        justification: "La presentación clínica es clásica de insuficiencia suprarrenal primaria (enfermedad de Addison), evidenciada por deficiencia de glucocorticoides y mineralocorticoides (hipotensión, hiponatremia, hiperpotasemia, hipoglucemia) e hiperpigmentación por elevación compensatoria de hormona adrenocorticotrópica. Desde 1950, la adrenalitis autoinmune causa aproximadamente el 80% de los casos y suele asociarse a síndromes poliglandulares autoinmunes.<br><br><b>Perla ENARM:</b> \"La adrenalitis autoinmune es la etiología más frecuente de la insuficiencia suprarrenal primaria en la actualidad.\"<br><br><b>Análisis de Distractores:</b> La tuberculosis fue la principal causa antes de 1920 y sigue siendo relevante solo en áreas endémicas, pero no es la etiología global más común. La hemorragia bilateral suele presentarse de forma aguda en pacientes con coagulopatías o uso de anticoagulantes. Las metástasis suprarrenales rara vez causan insuficiencia cortical franca, ya que requieren la destrucción de más del 90% de la glándula y ocurren en contextos de neoplasias diseminadas avanzadas."
                    },
                    {
                        question: "¿Cuál es la prueba diagnóstica de primera elección para confirmar la sospecha clínica?",
                        options: [
                            "Prueba de estimulación con corticotropina",
                            "Medición de cortisol libre urinario",
                            "Prueba de supresión con dexametasona",
                            "Determinación basal de aldosterona"
                        ],
                        answer: 0,
                        justification: "La prueba de estimulación rápida con corticotropina sintética (cosintropina 250 mcg) es el estándar inicial para evaluar la reserva suprarrenal. Una respuesta subóptima (incapacidad de elevar el cortisol por encima de 18 a 20 mcg/dl) confirma el diagnóstico de insuficiencia suprarrenal al evidenciar la destrucción de las células corticales.<br><br><b>Perla ENARM:</b> \"La prueba de estimulación rápida con corticotropina es el procedimiento inicial de elección ante la sospecha de insuficiencia suprarrenal primaria o secundaria.\"<br><br><b>Análisis de Distractores:</b> La medición de cortisol libre urinario de 24 horas y la prueba de supresión con dexametasona son estudios empleados para el diagnóstico de síndrome de Cushing (hipercortisolismo), no para estados de deficiencia. La determinación basal de aldosterona no evalúa dinámicamente la reserva de la glándula ni es la prueba confirmatoria de primera línea."
                    },
                    {
                        question: "¿Cuál es el tratamiento inicial de elección para esta paciente?",
                        options: [
                            "Ketoconazol 200 mg vía oral",
                            "Fludrocortisona 0.1 mg vía oral",
                            "Hidrocortisona 100 mg intravenosa",
                            "Dexametasona 8 mg intramuscular"
                        ],
                        answer: 2,
                        justification: "La paciente presenta datos de inestabilidad hemodinámica y metabólica compatibles con una crisis suprarrenal aguda o inminente. El tratamiento farmacológico inmediato es la hidrocortisona intravenosa a dosis altas (50 a 100 mg cada 6 a 12 horas), ya que a estas concentraciones provee un potente efecto glucocorticoide y suficiente retención de sodio (actividad mineralocorticoide cruzada) sin necesidad de fludrocortisona inicial.<br><br><b>Perla ENARM:</b> \"En la crisis suprarrenal aguda, la hidrocortisona intravenosa es el fármaco de elección por su acción glucocorticoide y mineralocorticoide simultánea a dosis altas.\"<br><br><b>Análisis de Distractores:</b> El ketoconazol inhibe las enzimas esteroidogénicas y exacerbaría la crisis; se usa en síndrome de Cushing. La fludrocortisona es exclusivamente para el mantenimiento crónico, no para el evento agudo. La dexametasona carece de actividad mineralocorticoide, por lo que no es el esteroide óptimo para la estabilización hemodinámica inicial en una crisis primaria."
                    },
                    {
                        question: "Durante el seguimiento ambulatorio, ¿cuál es la indicación de ajuste farmacológico ante una enfermedad intercurrente leve?",
                        options: [
                            "Suspender temporalmente el glucocorticoide",
                            "Añadir dosis extras de mineralocorticoide",
                            "Iniciar esquema con antibióticos profilácticos",
                            "Duplicar o triplicar la dosis oral"
                        ],
                        answer: 3,

                    {

                    {

                    {

            {

                caseText: "Hombre de 35 años. Es traído a la sala de urgencias en estado de choque tras sufrir una herida penetrante por aplastamiento severo en la extremidad pélvica derecha con maquinaria agrícola pesada contaminada con tierra hace 24 horas. A la exploración física dirigida se registran signos vitales con TA 80/50 mmHg, FC 125 lpm, FR 26 rpm y temperatura 38.5 °C. La extremidad afectada se encuentra intensamente edematizada, presentando una piel tirante con múltiples bulas tensas de color púrpura que drenan un exudado serosanguinolento fétido. A la palpación profunda de los compartimentos, el paciente presenta un dolor desproporcionado y crepitación tisular franca.",

                questions: [

                        justification: "Las lesiones penetrantes masivas con aplastamiento crean un microambiente anaerobio ideal para Clostridium perfringens debido a dos factores simultáneos y críticos: la contaminación profunda con esporas presentes en la tierra (medio externo) y la isquemia tisular severa derivada de la interrupción del suministro arterial. Este escenario anóxico condiciona la germinación clostridial y la producción fulminante de exotoxinas necrosantes alfa y theta.<br><br><b>Perla ENARM:</b> \"La gangrena gaseosa por lo general sigue a lesiones penetrantes graves que resultan en la interrupción del suministro de sangre y la introducción de tierra en las heridas.\"<br><br><b>Análisis de Distractores:</b> La opción A favorece la celulitis superficial por estasis venosa, no la mionecrosis. La opción B condiciona infecciones agresivas por Aeromonas hydrophila tras laceraciones en lagos o ríos, careciendo de la característica crepitación profunda. La opción C predispone a celulitis por Pasteurella o Capnocytophaga, etiologías asociadas a heridas punzantes superficiales que no ocluyen grandes troncos arteriales ni desarrollan gangrena traumática fulminante."
                    },
                    {
                        question: "En la evaluación por tomografía computarizada de este paciente, ¿qué hallazgo radiológico confirmaría la sospecha diagnóstica diferencial frente a una miositis necrosante primaria estreptocócica?",
                        options: [

                    {

                        options: [

                        justification: "La gangrena gaseosa traumática es una emergencia quirúrgica absoluta. Ningún antibiótico puede penetrar eficazmente en un músculo isquémico y necrótico donde los vasos sanguíneos han sido destruidos o trombosados. La exploración quirúrgica abierta y el desbridamiento radical detienen la diseminación bacteriana y toxigénica, reducen la presión compartimental y son las únicas intervenciones que disminuyen drásticamente el alto riesgo de mortalidad inminente.<br><br><b>Perla ENARM:</b> \"La exploración quirúrgica temprana y agresiva es esencial en casos de sospecha de fascitis necrosante, miositis o gangrena para visualizar las estructuras profundas, extirpar el tejido necrótico, reducir la presión del compartimento y obtener material adecuado para la tinción de Gram.\"<br><br><b>Análisis de Distractores:</b> La opción A está indicada exclusivamente como terapia antitoxina adyuvante sistémica en infecciones severas por Streptococcus pyogenes, no como intervención resolutiva mecánica en gangrena por aplastamiento. La opción B jamás debe emplearse para sustituir ni retrasar la intervención física en quirófano. La opción D representa un procedimiento reconstructivo plástico tardío, el cual fracasaría rotundamente al colocarse sobre tejido isquémico no desbridado."

                    {

                    {

                            "No debe retrasar el desbridamiento quirúrgico indicado.",

                    },
                    {
                        question: "¿Cuál es la complicación neoplásica hepatobiliar con un riesgo de por vida del 10 al 15 % que contraindica absolutamente el trasplante hepático en estos pacientes?",

            {

                questions: [

                    },
                    {
                        question: "¿Cuál es la estrategia de elección para confirmar el diagnóstico etiológico en la fase clínica crónica de este paciente?",
                        options: [
                            "Observación microscópica directa de tripomastigotes tras centrifugación",
                            "Dos pruebas serológicas positivas utilizando diferentes técnicas y antígenos",

                        answer: 1,
                        justification: "En la fase crónica de la tripanosomiasis americana, la parasitemia es indetectable por microscopía, por lo que el estándar de oro depende de la detección de anticuerpos IgG anti-Trypanosoma cruzi. Se requiere obligatoriamente la confirmación con dos pruebas distintas (ej. ELISA e Inmunofluorescencia indirecta) para evitar falsos positivos.<br><br><b>Perla ENARM:</b> \"Una vez que la parasitemia se vuelve indetectable por microscopía, el diagnóstico se basa en pruebas inmunológicas que detectan IgG anti-T. cruzi. Dos pruebas serológicas positivas utilizando diferentes técnicas y dirigidas a diferentes antígenos confirman el diagnóstico de la enfermedad de Chagas durante la fase crónica.\"<br><br><b>Análisis de Distractores:</b> La opción A es exclusiva de la fase aguda o de reactivación inmunosupresora donde la carga parasitaria es alta. La opción C (reacción en cadena de la polimerasa) tiene baja sensibilidad (50 a 80%) en la fase crónica y no se usa para diagnóstico primario, solo para vigilar falla terapéutica. La opción D sirve como tamizaje inicial en zonas de difícil acceso, pero requiere confirmación serológica convencional ineludible."

                    {
                        question: "En adultos con indicación de tratamiento etiológico contra este patógeno, ¿cuál es el fármaco de primera elección debido a su mejor perfil de tolerancia?",

                            "Nifurtimox",

                            "Benznidazol",

                        answer: 2,
                        justification: "Los dos únicos fármacos con eficacia demostrada contra T. cruzi son benznidazol y nifurtimox. Sin embargo, los eventos adversos son sustancialmente más frecuentes en adultos que en niños, lo que aumenta el riesgo de suspensión prematura. El benznidazol se recomienda empíricamente como primera línea en este grupo etario por ser consistentemente mejor tolerado.<br><br><b>Perla ENARM:</b> \"Como el benznidazol parece ser mejor tolerado que el nifurtimox en adultos, es el fármaco de primera línea recomendado en este rango de edad.\"<br><br><b>Análisis de Distractores:</b> El nifurtimox (opción A) es una terapia alternativa real, pero asocia mayores tasas de toxicidad neuropsiquiátrica, pérdida de memoria y malestar gastrointestinal en adultos, relegándolo a segunda opción. La suramina (opción B) es el tratamiento de primera fase para la tripanosomiasis africana aguda por T. b. rhodesiense. La eflornitina (opción D) es altamente efectiva exclusivamente contra T. b. gambiense (enfermedad del sueño), sin utilidad en enfermedad de Chagas."

                    },
                    {
                        question: "Ante el hallazgo ecocardiográfico del aneurisma apical en este paciente, ¿qué medida médica secundaria es imperativa instaurar para evitar complicaciones fatales?",

                questions: [

                    {
                        question: "¿Cuál es el estudio de gabinete de primera elección para confirmar la etiología obstructiva en este escenario clínico?",

                        answer: 2,
                        justification: "El abordaje inicial de todo paciente con sospecha de lesión renal aguda por obstrucción debe incluir imágenes no invasivas del tracto urinario. El ultrasonido es el método de elección al no utilizar radiación ni contraste, permitiendo visualizar la dilatación del sistema colector (hidronefrosis) y la distensión vesical.<br><br><b>Perla ENARM:</b> \"El ultrasonido renal y vesical es el estudio inicial indispensable para investigar obstrucción en pacientes con lesión renal aguda, documentando hidroureteronefrosis o globo vesical.\"<br><br><b>Análisis de Distractores:</b> La tomografía computarizada (A) es útil si se sospecha litiasis ureteral, pero no es el estudio inicial costo-efectivo para una obstrucción baja clínica. La pielografía retrógrada (B) es un procedimiento invasivo reservado para cuando el ultrasonido no es concluyente y persiste alta sospecha de obstrucción alta. La resonancia magnética (D) tiene un costo elevado y no ofrece ventaja sobre el ultrasonido en la urgencia por retención urinaria."
                    },
                    {

                    {
                        question: "Tras la descompresión exitosa de la vía urinaria, ¿qué alteración fisiopatológica requiere vigilancia y reposición hídrica estricta durante el seguimiento?",

                        answer: 3,
                        justification: "El alivio de la obstrucción urinaria suele seguirse de una diuresis masiva fisiológica (\"diuresis posobstructiva\") impulsada por la excreción de urea, sodio y agua retenidos. En casos graves, la disfunción tubular prolongada impide la capacidad de concentrar la orina, manteniendo una poliuria severa que exige reposición intravenosa estricta para evitar choque hipovolémico.<br><br><b>Perla ENARM:</b> \"La resolución de una obstrucción urinaria prolongada puede desencadenar poliuria severa sostenida secundaria a disfunción tubular, requiriendo reposición rigurosa de líquidos y electrolitos.\"<br><br><b>Análisis de Distractores:</b> La descompresión disminuye la volemia, por lo que no se espera hipertensión refractaria (A) sino riesgo de hipotensión. La depuración de solutos mejora inmediatamente, bajando el nitrógeno ureico (B). La diuresis masiva suele arrastrar potasio, provocando hipopotasemia en lugar de hiperpotasemia refractaria (C)."
                    },
                    {
                        question: "En el contexto de un paciente que presenta anuria completa temprana, además de la obstrucción total del tracto urinario, ¿qué complicación o entidad clínica debe sospecharse obligatoriamente?",
                        options: [
                            "Necrosis tubular aguda isquémica",

                            "Nefritis intersticial aguda alérgica",

                        ],
                        answer: 1,
                        justification: "La presentación de anuria completa (ausencia total de orina) es rara en las etapas tempranas de la lesión renal aguda. Clásicamente limita el diagnóstico diferencial a obstrucción completa de la vía urinaria, choque séptico fulminante, necrosis cortical severa, o un evento vascular catastrófico como la oclusión arterial renal bilateral (o unilateral en riñón único).<br><br><b>Perla ENARM:</b> \"La anuria completa temprana en la lesión renal aguda es infrecuente y sugiere etiologías extremas como obstrucción total del tracto urinario, oclusión de la arteria renal o choque profundo.\"<br><br><b>Análisis de Distractores:</b> La necrosis tubular aguda isquémica (A) típicamente cursa con oliguria (menor a 400 ml/día), mas no con anuria completa. La nefritis intersticial aguda (C) suele presentarse como una falla renal no oligúrica (mayor a 400 ml/día). La toxicidad por aminoglucósidos (D) se caracteriza clásicamente por lesión renal aguda poliúrica o no oligúrica, aun con niveles plasmáticos terapéuticos."

                justification: "La obesidad materna altera directamente la fisiología de la contractilidad uterina (disfunción hipotónica), prologando la primera fase del parto e incrementando significativamente la necesidad de intervenciones. Por el contrario, la multiparidad facilita el descenso y no causa disfunción primaria a menos que se asocie a relajación extrema de la pared.<br><br><b>Perla ENARM:</b> \"La obesidad materna alarga las primeras etapas del trabajo de parto de 30 a 60 minutos en mujeres nulíparas, incluso después de ajustar la diabetes asociada, el peso fetal y la paridad.\"<br><br><b>Análisis de Distractores:</b> La multiparidad alta (A) acorta el trabajo de parto bajo condiciones fisiológicas, a menos que se complique con malposiciones. La inserción placentaria fúndica (C) es la localización anatómica normal y no altera la progresión. La talla alta (D) no es de riesgo; es la talla baja en conjunto con diámetros pélvicos estrechos la que eleva el riesgo de desproporción cefalopélvica y distocia secundaria."

            {

                justification: "Los estudios contemporáneos sobre la curva de trabajo de parto demostraron que el progreso se acelera de manera exponencial a partir de los 6 cm. Diagnosticar una detención antes de este punto (basado en curvas antiguas de Friedman) lleva a cesáreas prematuras y evitables.<br><br><b>Perla ENARM:</b> \"Una tercera instrucción aborda el umbral de dilatación cervical que sirve para anunciar el trabajo de parto activo. A saber, una dilatación cervical de 6 cm, no de 4 cm, es ahora el umbral recomendado.\"<br><br><b>Análisis de Distractores:</b> El límite de 4 cm (A) era el umbral histórico obsoleto de la curva de Friedman, lo que sobreestimaba el diagnóstico de distocia. La dilatación de 5 cm (B) es recomendada solo por lineamientos paralelos (como la OMS), pero la literatura norteamericana marca el corte en 6 cm. Esperar hasta 7 cm (D) es incorrecto, pues el diagnóstico formal de fase activa ya está establecido un centímetro antes."

        function setupEventListeners() {

                    const globalId = parseInt(box.dataset.id);
                    const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
                    const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
                    const cData = casesData[caseIdx];
                    
                    if(!cData) return;
                    
                    const qData = cData.questions[qIdx];
                    const matchText = cData.caseText.toLowerCase().includes(term) || qData.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || globalId.toString() === term) ? 'flex' : 'none';

        function navigateCase(currentCaseId, direction) {
            let targetCaseId = currentCaseId;
            if (direction === 'prev' && currentCaseId > 1) {
                targetCaseId = currentCaseId - 1;
            } else if (direction === 'next' && currentCaseId < casesData.length) {
                targetCaseId = currentCaseId + 1;
            } else {
                displayQuestion(null); 
                return;
            }
            const targetGlobalQId = (targetCaseId - 1) * QUESTIONS_PER_CASE + 1;
            displayQuestion(targetGlobalQId);
        }

        function getQBoxClass(globalId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-[10px] sm:text-xs cursor-pointer transition-all select-none border ";
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[globalId];
            const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
            const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
            const cData = casesData[caseIdx];
            
            if (!cData) return base + "bg-slate-100 text-slate-300";

            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";
                } else {
                    return base + "bg-slate-600 text-white border-slate-700 dark:bg-slate-700 dark:border-slate-600 shadow-inner";
                }
            } 
            else {
                if (!state || !state.answered) {
                    return base + "bg-slate-100 text-slate-400 border-slate-200 dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700";
                } else {
                    const isCorrect = state.selectedOption === cData.questions[qIdx].answer;
                    if (isCorrect) {
                        return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
                    } else {
                        return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
                    }
                }
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            let boxes = [];
            for (let i = 1; i <= totalQuestions; i++) {
                boxes.push(`<div class="${getQBoxClass(i, i === isActiveIdContext)}" data-id="${i}" onclick="displayQuestion(${i})">${i}</div>`);
            }
            return boxes.join('');
        }

        function displayQuestion(globalId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = globalId ? parseInt(globalId) : null;
                
                if (currentQuestionId) {
                    localStorage.setItem('simulador1LastQId', currentQuestionId);
                } else {
                    localStorage.removeItem('simulador1LastQId');
                }

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');
                    dashboardBtn.classList.add('lg:left-[22rem]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const caseIdx = Math.floor((currentQuestionId - 1) / QUESTIONS_PER_CASE);
                const cData = casesData[caseIdx];
                
                if (!cData) return displayQuestion(null);
                
                renderCaseLayout(cData, currentQuestionId);
                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                setTimeout(() => {
                    const targetCard = document.getElementById(`q-card-${currentQuestionId}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }, 50);

            }, 150); 
        }

                }

                html += `
                    <div id="q-card-${globalQId}" class="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-sm border ${cardStyle} transition-all">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700">
                                PREGUNTA ${globalQId}
                            </span>
                        </div>
                        <h3 class="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-100 mb-4 leading-snug">${q.question}</h3>
                        <form id="q-form-${globalQId}" class="space-y-2.5">
                `;

                q.options.forEach((opt, i) => {
                    if (examState.isFinished) {
                        let optClasses = "flex items-start p-3 border rounded-xl text-xs sm:text-sm ";
                        let icon = "";
                        
                        if (i === q.answer) {
                            optClasses += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 font-semibold";
                            icon = `<svg class="w-4 h-4 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
                        } else if (i === userAnswer) {
                            optClasses += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                            icon = `<svg class="w-4 h-4 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                        } else {
                            optClasses += "bg-slate-50 border-slate-100 dark:bg-slate-800/30 dark:border-slate-800/50 opacity-50 text-slate-400";
                        }

                        html += `
                            <div class="${optClasses}">
                                <span class="leading-snug pr-3">${opt}</span>
                                ${icon}
                            </div>
                        `;
                    } else {
                        const checkedStr = (hasAnswered && userAnswer === i) ? 'checked' : '';
                        html += `
                            <label class="flex items-start p-3 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/40 has-[:checked]:bg-blue-50/80 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/20 text-xs sm:text-sm shadow-sm" onclick="autoSaveAnswer(${globalQId})">
                                <input type="radio" name="option" value="${i}" ${checkedStr} class="mt-0.5 h-3.5 w-3.5 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-700 cursor-pointer">
                                <span class="ml-2.5 text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `;
                    }
                });

                html += `</form>`;

                if (examState.isFinished) {
                    html += `
                        <div class="bg-blue-50/60 dark:bg-slate-800/50 border border-blue-100/50 dark:border-slate-800 rounded-xl p-4 text-xs sm:text-sm mt-4">
                            <h4 class="font-bold text-blue-800 dark:text-blue-400 mb-1 flex items-center gap-1 uppercase tracking-wider text-[10px]">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Justificación Médica GPC
                            </h4>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${q.justification}</p>
                        </div>
                    `;
                }

                html += `</div>`;
            });

            const isLastCase = cData.id === casesData.length;

            html += `
                        <!-- CONTROLES DE FLUJO EN CASOS -->
                        <div class="flex justify-between items-center pt-4 mt-6 border-t border-slate-200 dark:border-slate-800">
                            <button onclick="navigateCase(${cData.id}, 'prev')" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                                Caso Anterior
                            </button>
                            
                            ${examState.isFinished ? `
                                ${!isLastCase ? `
                                    <button onclick="navigateCase(${cData.id}, 'next')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5 shadow-sm">
                                        Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                    </button>
                                ` : `
                                    <button onclick="displayQuestion(null)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider shadow-sm">
                                        Ver Calificaciones
                                    </button>
                                `}
                            ` : `
                                <button onclick="navigateCase(${cData.id}, 'next')" class="bg-blue-600 dark:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:bg-blue-700 dark:hover:bg-blue-400 transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5">
                                    Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('module-display').innerHTML = html;
        }

        function autoSaveAnswer(globalId) {
            if(examState.isFinished) return;
            const form = document.getElementById(`q-form-${globalId}`);
            if (!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (selected) {
                userProgress[globalId] = { answered: true, selectedOption: parseInt(selected.value) };
                saveState();
                updateProgressBar();
                renderSidebarGrid();
            }
        }

        function updateProgressBar() {
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = totalQuestions > 0 ? Math.round((ans / totalQuestions) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; 
            }
        }

        function saveState() {
            try { localStorage.setItem('simulador1Progress', JSON.stringify(userProgress)); } catch(e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('simulador1Progress');
                userProgress = saved ? JSON.parse(saved) : {};
                const savedState = localStorage.getItem('simulador1ExamState');
                if (savedState) examState = JSON.parse(savedState);
            } catch(e) { userProgress = {}; examState = { isFinished: false }; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
