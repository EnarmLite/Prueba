    <script>

        const questionsData = [

            {
                id: 1, 
                question: "En el abordaje de la Infección de Vías Urinarias pediátrica, ¿cuál es el hallazgo laboratorial en la tira reactiva que integra el diagnóstico presuntivo?", 
                options: ["Glucosa y cetonas positivas", "Proteínas y sangre oculta", "Esterasa leucocitaria y nitritos", "Cilindros hialinos y cristales"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Infección de Vías Urinarias pediátrica, la prueba rápida es la piedra angular del tamizaje inicial. La esterasa leucocitaria refleja de manera indirecta la presencia de piuria (inflamación), mientras que los nitritos confirman la conversión metabólica de nitratos por bacterias Gram negativas, otorgando una alta especificidad diagnóstica cuando ambas son positivas.<br><br>Perla ENARM: \"Se debe diagnosticar IVU con una tira reactiva positiva para esterasa leucocitaria y nitritos\".<br><br>Análisis de Distractores: Las proteínas y la sangre (B) se asocian comúnmente a glomerulopatías o litiasis, no siendo definitorias exclusivas de infección urinaria. La glucosa y cetonas (A) sugieren alteraciones metabólicas como diabetes o ayuno. Los cilindros hialinos (D) son hallazgos inespecíficos que pueden presentarse en deshidratación.", 
                source: "GPC-SS-027-21, Diagnóstico y tratamiento de la infección de vías urinarias no complicada en menores de 18 años, 2021, Diagnóstico, p. 17." 
            },
            {
                id: 2, 
                question: "¿Cuál es el marcador inmunohistoquímico que se expresa intensamente en la superficie celular y permite el diagnóstico diferencial del Sarcoma de Ewing con otras neoplasias?", 
                options: ["Antígeno leucocitario común CD45", "Glicoproteína de superficie CD99", "Miogenina y proteína desmina", "Enolasa específica de neuronas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Sarcoma de Ewing, este tumor pertenece morfológicamente a la familia de tumores de células pequeñas, redondas y azules. Es indispensable la diferenciación inmunohistoquímica celular; su membrana presenta una positividad característica y casi universal estrechamente ligada a su alteración molecular subyacente.<br><br>Perla ENARM: \"La expresión de la glicoproteina CD99 en la superficie celular de manera intensa es característica y son inmunoreactivos a vimentina\".<br><br>Análisis de Distractores: El CD45 o antígeno leucocitario es el marcador empleado para distinguir los linfomas linfoblásticos. La miogenina y la desmina guían hacia un linaje muscular del rabdomiosarcoma, el cual de lo contrario podría confundirse histológicamente. La enolasa específica orienta al neuroblastoma, el cual resulta negativo a vimentina.", 
                source: "GPC-SS-379-18, Diagnóstico y tratamiento del sarcoma de Ewing en pediatría, 2018, Patología, p. 12-13." 
            },
            {
                id: 3, 
                question: "¿Cuál es el dato clínico al interrogatorio que permite distinguir y sospechar de forma precoz una cefalea secundaria a tumor de sistema nervioso central (por hipertensión intracraneal) de una cefalea primaria benigna (ej. migraña o tensional) en un paciente pediátrico?", 
                options: ["Presencia de fotofobia y fonofobia asociada de intensidad severa", "Localización hemicraneal rítmica francamente pulsátil de larga evolución", "Aparición casi exclusiva y predominante en el horario de la tarde escolar", "Alivio parcial o transitorio del dolor y de los síntomas tras presentar vómito espontáneo"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Tumores de Sistema Nervioso, la hipercapnia fisiológica nocturna generada durante el decúbito y el sueño profundo genera una discreta vasodilatación venosa cerebral fisiológica, condicionando un aumento pico de la presión intracraneal al despertar temprano en el niño con un tumor obstructivo. El violento esfuerzo o reflejo autonómico del vómito desencadena una respuesta compensatoria fisiológica de hiperventilación momentánea (barorreflejo) que disminuye discretamente y de forma transitoria esta hipertensión intracraneal aguda, provocando una engañosa o falsa mejoría pasajera matutina del dolor en la cabeza del menor, lo cual constituye una de las \"Banderas Rojas\" (Red Flags) clínicas tumorales por excelencia que no se debe pasar por alto.<br><br>Perla ENARM: \"Se recomienda identificar las características de la cefalea acompañada de datos de alarma (Red Flags), como: ... Vómito recurrente, que al presentarse puede aliviar o reducir parcial y transitoriamente el dolor de cabeza inicial\".<br><br>Análisis de Distractores: La intensa fotofobia reactiva (fotofobia severa) y el característico dolor hemicraneal unilateral de naturaleza rítmica y pulsátil, asociado en ocasiones a auras visuales (A y B), son en realidad los criterios diagnósticos puros y clásicos por excelencia dictados internacionalmente (IHS) para sospechar de la patología vascular de la Migraña común o clásica infantil benigna, no de patología expansiva o destructiva de fosa posterior. Una cefalea de aparición predominantemente vespertina, al final de la jornada escolar (C), se asocia fisiopatológicamente de forma muy estrecha y frecuente a la patología osteomuscular de la cefalea tensional primaria, o a defectos y cansancio por refracción o esfuerzo visual sostenido no corregido durante el día (miopía, astigmatismo prolongado), no al clásico y peligroso dolor neuropático peritumoral despertador matutino de alta presión.", 
                source: "GPC ISSSTE-136-18, Diagnóstico y tratamiento inicial de tumores de sistema nervioso central en pacientes pediátricos en primer y segundo nivel de atención, 2018, Diagnóstico Clínico, Página 13." 
            },
            {
                id: 4, 
                question: "En la evaluación clínica para establecer el diagnóstico presuntivo de sobrepeso y obesidad en niños y adolescentes, ¿cuál es el parámetro antropométrico inicial recomendado por la guía?", 
                options: ["Relación de cintura cadera", "Pesaje hidrostático del paciente", "Medición del pliegue cutáneo", "Índice de Masa Corporal"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Sobrepeso y Obesidad Pediátrica, aunque existen diversas formas de evaluar la composición corporal, el Índice de Masa Corporal es el método indirecto estandarizado por su accesibilidad, bajo costo y reproductibilidad en la consulta de primer nivel para determinar exceso de adiposidad a nivel poblacional.<br><br>Perla ENARM: \"Se recomienda la medición del IMC en niños a partir de los 2 años de edad y adolescentes como criterio diagnóstico para sobrepeso y obesidad\".<br><br>Análisis de Distractores: La medición del pliegue cutáneo y el pesaje hidrostático son herramientas válidas para medir grasa corporal, pero se reservan para escenarios específicos de nutrición clínica o de investigación, no como tamizaje inicial universal en medicina de primer contacto. La relación cintura cadera no está estandarizada como herramienta diagnóstica primaria definitoria en esta población pediátrica.", 
                source: "GPC SS-025-08, Prevención y diagnóstico de sobrepeso y obesidad en niños y adolescentes, 2018, Diagnóstico Clínico, Página 18." 
            },
            {
                id: 5, 
                question: "¿Cuál complicación clínica y de laboratorio permite distinguir la Leucemia Aguda Pediátrica variedad M3 del resto de estirpes?", 
                options: ["Infiltración temprana al cerebro", "Masa de mediastino anterior", "Coagulación intravascular diseminada grave", "Síndrome de lisis tumoral"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Leucemia Aguda Pediátrica, la Leucemia Promielocítica Aguda (LAM M3) está caracterizada por gránulos celulares anormales que, al destruirse, liberan activadores potentes de la cascada de coagulación y fibrinólisis, generando una coagulopatía de consumo fulminante que requiere ácido transretinoico (ATRA) de urgencia.<br><br>Perla ENARM: \"La LAM M3 es una urgencia hematológica, debido al riesgo de progresión y complicaciones hemorrágicas mortales... La hemorragia grave vinculada con CID puede surgir en cualquier tipo de LAM, pero es particularmente común en LAM M3\".<br><br>Análisis de Distractores: La masa mediastinal es típica de la Leucemia Linfoblástica Aguda de estirpe T. La infiltración temprana al SNC es más común en LAL estirpe T o B madura. El síndrome de lisis tumoral se asocia más con linfoma de Burkitt o LAL con altísima carga tumoral, no es patognomónico de la M3.", 
                source: "GPC SS-061-08, Diagnóstico oportuno de la leucemia aguda en pediatría, 2017, Urgencias hemato-oncológicas, Página 31 y 16." 
            },
            {
                id: 6, 
                question: "En la Enfermedad Renal Crónica pediátrica, ¿cuál es el hallazgo en el examen general de orina que sugiere fuertemente daño a la membrana basal glomerular?", 
                options: ["Cilindros granulosos", "Cilindros de glóbulos blancos", "Cilindros eritrocitarios", "Células epiteliales tubulares"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedad Renal Crónica en pacientes menores de 18 años, la presencia de anomalías en el sedimento urinario funciona como marcador temprano de daño renal. La presencia específica de cilindros eritrocitarios (y eritrocitos dismórficos) orienta fisiopatológicamente de forma casi inequívoca hacia alteraciones de la barrera de filtración glomerular, ya que los glóbulos rojos son \"aplastados\" y moldeados al pasar por los túbulos tras fugar del glomérulo dañado.<br><br>Perla ENARM: \"En pacientes menores de 18 años, la presencia en el sedimento urinario de eritrocitos (sobre todo dismórficos), o cilindros permite identificar pacientes con enfermedad renal\".<br><br>Análisis de Distractores: Los cilindros granulosos y las células epiteliales (A, D) se asocian a enfermedades del parénquima profundo o necrosis tubular aguda isquémica/tóxica. Los cilindros de glóbulos blancos (B) son altamente sugestivos de pielonefritis aguda infecciosa o nefritis intersticial alérgica, pero no de daño primario y exclusivo a la membrana basal del glomérulo.", 
                source: "GPC SS-188-18, Prevención, diagnóstico y referencia oportuna de la enfermedad renal crónica en pacientes menores de 18 años, 2018, Diagnóstico Clínico, Página 24." 
            },
            {
                id: 7,
                question: "¿Cuál es el dato clínico diferencial de la laxitud articular fisiológica del recién nacido que obliga a descartar patología y referir por sospecha de Displasia de Cadera?",
                options: ["Persistencia post 4 semanas", "Chasquido audible sin luxación", "Resolución a las 2 semanas", "Limitación pasiva bilateral leve"],
                answer: 0,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Detección del recién nacido de término, las hormonas maternas circulantes generan laxitud ligamentaria universal, pero esta es transitoria. Su cronicidad denota falla del acetábulo.<br><br>Perla ENARM: \"En las primeras semanas de vida la cabeza femoral se encuentra reducida en el acetábulo en reposo, pero puede mostrar un desplazamiento menor (laxitud fisiológica) bajo estrés. Esto debe resolverse por completo a las cuatro semanas de edad.\"<br><br>Análisis de Distractores: Un simple chasquido \"clic\" (B) en ligamentos sin luxación demostrable es comúnmente benigno. La resolución temprana (C) es lo normal. La persistencia de hallazgos después del primer mes de vida demarca la transición del diagnóstico de laxitud fisiológica a una verdadera Displasia.",
                source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de egreso hospitalario del recién nacido de término, 2020, Evidencias y Recomendaciones, página 13."
            },
            {
                id: 8, 
                question: "Ante un recién nacido diagnosticado con labio y paladar hendido unilateral, ¿cuál es el abordaje inicial de primera línea que debe indicarse previo a cualquier intervención quirúrgica según la GPC?", 
                options: ["Cierre de paladar blando", "Ortopedia prequirúrgica", "Queiloplastia primaria", "Gingivoperiostioplastia"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Tratamiento del labio y paladar hendido, el manejo de esta malformación no inicia de inmediato en el quirófano, sino de manera conservadora y temprana (desde el nacimiento) para moldear y alinear activamente los rebordes alveolares y nasales anatómicos deformados, facilitando enormemente la reparación quirúrgica estética posterior sin tensión excesiva en los tejidos.<br><br>Perla ENARM: \"Se sugiere considerar utilizar la ortopedia prequirúrgica desde el nacimiento en pacientes con labio y paladar hendidos, unilateral o bilateral, completo o incompleto\".<br><br>Análisis de Distractores: La queiloplastia primaria (cierre del labio) y el cierre del paladar (blando o duro) son los pasos quirúrgicos biológicos posteriores a realizarse en los meses siguientes según la regla del algoritmo una vez moldeados los tejidos. La gingivoperiostioplastia es un procedimiento ortopédico/quirúrgico que de hecho está expresamente contraindicado en la etapa temprana de esta patología por frenar el desarrollo facial.", 
                source: "GPC SS-807-17, Tratamiento ortopédico y quirúrgico del labio y paladar hendido en niños menores de dos años de edad, 2017, Tratamiento conservador, Página 11." 
            },
            {
                id: 9, 
                question: "En una adolescente mujer con obesidad mórbida que es aprobada y candidata a cirugía bariátrica, ¿cuál es una restricción biológica clave que debe aceptar mediante un compromiso firmado con su familia para evitar letales complicaciones gestacionales y perinatales?", 
                options: ["Evitar embarazo tres meses post-cirugía", "Evitar embarazo seis meses post-cirugía", "Evitar embarazo un año post-cirugía", "Aceptar método anticonceptivo quirúrgico permanente"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Obesidad Mórbida en Adolescentes, la agresiva restricción calórica masiva y la mala absorción de vitaminas (ej. ácido fólico, hierro, calcio) que ocurren ineludiblemente en los primeros 12 meses tras el procedimiento bariátrico, resultan sumamente perjudiciales y potencialmente teratogénicas para un feto en desarrollo, propiciando defectos del tubo neural o restricción del crecimiento intrauterino severa.<br><br>Perla ENARM: Es clara y tajante al indicar como criterio de inclusión forzoso que la paciente y tutores: \"Está de acuerdo en evitar el embarazo durante al menos un año posterior a la cirugía\".<br><br>Análisis de Distractores: Los breves plazos de tres y seis meses (A, B) coinciden exactamente con la peligrosa etapa de máxima privación calórica y pérdida de peso veloz exponencial de la madre, por lo que el riesgo fetal de desnutrición y aborto sigue siendo sumamente alto e inaceptable en esa ventana. No está ni ética ni legalmente justificado obligar o coaccionar a utilizar métodos anticonceptivos de esterilización permanente (D) (como OTB) en pacientes adolescentes nulíparas solo por someterse a cirugía de obesidad.", 
                source: "GPC IMSS-050-08, Tratamiento Quirúrgico de la Obesidad Mórbida en la Población Adolescente, 2018, Tratamiento Quirúrgico (Indicaciones de selección), Página 22." 
            },
            {
                id: 10, 
                question: "En un paciente pediátrico con sospecha de Hemofilia A o B, ¿cuál es el hallazgo inicial de laboratorio que integra el diagnóstico presuntivo?", 
                options: ["TP y TTPa prolongados", "Trombocitopenia y TP normal", "TTPa prolongado aisladamente", "Tiempo de sangrado alterado"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Hemofilia Hereditaria Pediátrica, el pilar diagnóstico inicial es identificar alteraciones exclusivas de la vía intrínseca de la coagulación. El Tiempo de Tromboplastina Parcial activada (TTPa) prolongado, con Tiempo de Protrombina (TP) y conteo plaquetario normales, obliga a realizar una prueba de corrección con plasma fresco para diferenciar deficiencia de inhibidores.<br><br>Perla ENARM: \"Cuando se sospecha hemofilia realizar pruebas de tamizajes: Biometría Hemática Completa (BHC) Tiempo de Tromboplastina Parcial activada (TTPa), Tiempo de Protrombina (TP) y Tiempo de Trombina (TT). Si solo el TTPa está prolongado determinar de FVIII y FIX\".<br><br>Análisis de Distractores: La opción A sugiere una alteración de vía común o deficiencia múltiple (ej. deficiencia severa de Vitamina K, CID o hepatopatía). Las opciones B y D orientan hacia defectos plaquetarios primarios o enfermedad de Von Willebrand sintomática.", 
                source: "GPC IMSS-141-18, Diagnóstico y Tratamiento de Hemofilia Hereditaria en Menores de 16 Años, 2018, Diagnóstico Clínico, Página 24." 
            },
            {
                id: 11, 
                question: "¿Cuál es el dato clínico clave reportado por la GPC que permite distinguir la Primera Crisis Convulsiva de un síncope neurogénico (su principal diagnóstico diferencial)?", 
                options: ["Pérdida súbita de conciencia", "Duración menor a diez segundos", "Presencia de pródromos autonómicos", "Recuperación neurológica postictal lenta"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Primera Crisis Convulsiva, los eventos paroxísticos no epilépticos (EpnE) como el síncope cursan por hipoperfusión transitoria que, al restablecerse (por el decúbito), devuelve inmediatamente el estado de alerta; en contraste, el exceso de descargas eléctricas genera agotamiento metabólico (postictal).<br><br>Perla ENARM: \"Diferencias entre eventos paroxísticos y CC: Recuperación del Síncope neurogénico: Rápida; Recuperación de las Crisis convulsivas: Lenta\".<br><br>Análisis de Distractores: Ambos pueden presentar pérdida súbita de conciencia. El síncope típicamente dura segundos (no exclusivo) y se precede de pródromos autonómicos (mareo, sudoración), pero la clave de la exclusión es el comportamiento tras el cese del evento (la recuperación).", 
                source: "GPC IMSS-244-09, Guía de Práctica Clínica Diagnóstico y Tratamiento de la Primera Crisis Convulsiva, 2017, Cuadro 13, p. 78-80." 
            },
            {
                id: 12, 
                question: "En la Ictericia Neonatal, ¿cuál es el hallazgo paraclínico de tamizaje presuntivo que obliga invariablemente a confirmar el diagnóstico con una prueba sérica según la GPC?", 
                options: ["Tamizaje transcutáneo >14.7 mg/dl", "Prueba de Coombs positivo", "Hemoglobina menor a 10 g/dl", "Conteo de reticulocitos elevado"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Ictericia Neonatal, los métodos de tamizaje como el bilirrubinómetro transcutáneo pierden precisión y dejan de ser clínicamente equivalentes o fiables cuando alcanzan cifras de alto riesgo, requiriendo el paso inmediato al estándar de oro en sangre.<br><br>Perla ENARM: \"Si, una medición con el bilirrubinómetro transcutáneo indica un nivel de bilirrubina mayor de 14.7 mg/dl (250 μmol/l) se deberá verificar el resultado midiendo las bilirrubinas séricas\".<br><br>Análisis de Distractores: La prueba de Coombs (B), la hemoglobina (C) y los reticulocitos (D) son estudios complementarios útiles e indispensables para identificar isoinmunización o hemólisis subyacente (la etiología), pero no son herramientas de \"tamizaje presuntivo\" para medir el nivel de hiperbilirrubinemia, cuyo umbral dictamina el paso al estudio en suero.", 
                source: "GPC IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 19." 
            },
            {
                id: 13, 
                question: "¿Cuál es la complicación principal sistémica que predice el mayor riesgo inminente de mortalidad en un paciente con Estenosis Hipertrófica Congénita de Píloro si retrasa su atención en salud?", 
                options: ["Neumonía por broncoaspiración.", "Perforación gástrica por distensión.", "Choque por deshidratación severa.", "Sepsis de foco intraabdominal."], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Estenosis Hipertrófica de Píloro, el violento vómito gástrico crónico y cada vez más incoercible e iterativo del bebé genera un agotamiento agudo progresivo de todo su volumen extracelular circulante que finalmente y sin remedio precipita una falla hemodinámica letal (choque hipovolémico refractario) si no recibe cristaloides a tiempo en una sala de urgencias.<br><br>Perla ENARM: \"La mortalidad de la Estenosis Hipertrófica de Píloro sin tratamiento se debe casi siempre al choque por deshidratación, la mortalidad es rara después de la piloromiotomía\".<br><br>Análisis de Distractores: Aunque puede existir un indudable riesgo de severa microaspiración pulmonar secundaria al vómito explosivo de retención láctea (A), la norma fisiopatológica estipula textualmente al choque hipovolémico terminal como la causa final y directa del fallecimiento en la evolución natural del cuadro crónico de la enfermedad no diagnosticada u operada. El estómago rara vez se perfora (B) por la hipertrofia mucosa compensatoria que engrosa su pared antes de la falla volumétrica.", 
                source: "GPC IMSS-330-10, Diagnóstico y tratamiento de la Estenosis Hipertrófica Congénita de Píloro, 2017, Justificación, Página 7." 
            },
            {
                id: 14, 
                question: "En el abordaje clínico de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cuál es el hallazgo metabólico asociado secundario a la hiperplasia de los islotes pancreáticos que apoya la presunción de daño severo?", 
                options: ["Hipocalcemia severa de rebote", "Hipoglucemia de difícil control", "Acidosis metabólica láctica severa", "Hipomagnesemia de inicio temprano"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Isoinmunización a Rh Neonatal, el estado de isoinmunización severo y la hemólisis perpetuada intraútero generan un estado de anemia e hipoxia profunda. Esta hipoxia crónica induce una respuesta sistémica fetal compensatoria que involucra el páncreas, condicionando hiperplasia de las células beta e hiperinsulinismo al nacimiento, lo que se traduce en hipoglucemia refractaria.<br><br>Perla ENARM: \"Hipoglucemia secundaría hiperinsulinismo e hipertrofia de los islotes pancreáticos\".<br><br>Análisis de Distractores: La opción A (hipocalcemia) es una complicación directa química pero de la exanguinotransfusión (por citrato), no de la historia natural de la enfermedad in útero. Las opciones C y D son alteraciones metabólicas que pueden presentarse en un neonato grave o prematuro, pero no son el dato fisiopatológico secundario directo a la hipertrofia pancreática descrita textualmente en la patología.", 
                source: "GPC IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Signos y Síntomas, Página 37." 
            },
            {
                id: 15, 
                question: "¿Cuál es el diagnóstico diferencial primario o reumatológico principal de la Pelagra que debe siempre considerarse al observar inicialmente un \"signo de mariposa\" fototóxico en la cara del paciente pediátrico?", 
                options: ["Lupus eritematoso cutáneo agudo o sistémico", "Porfiria cutánea tardía infantil", "Dermatitis por contacto pediátrica aguda", "Enfermedad de Crohn con afección cutánea"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Pelagra en Edad Pediátrica, las características y dolorosas lesiones eritematosas, pruriginosas y simétricas ubicadas prominentemente en el puente nasal y ambas mejillas (\"alas de mariposa\") desencadenadas o exacerbadas por la simple exposición a la luz ultravioleta (fotosensibilidad) obligan invariablemente al médico clínico en urgencias a descartar con laboratorios (ANA, anti-DNA) las letales enfermedades reumatológicas sistémicas o autoinmunes de presentación visual casi idéntica a nivel facial antes de dictaminar avitaminosis.<br><br>Perla ENARM: \"Con las siguientes enfermedades se deberá hacer diagnóstico diferencial, cuando no hay certeza que se trate de Pelagra: Lupus eritematoso cutáneo agudo (ACLE), Lupus eritematoso inducido por fármacos...\".<br><br>Análisis de Distractores: La genética porfiria cutánea tardía (B) causa inmensas e incapacitantes ampollas tensas serosas y una fragilidad dérmica excesiva y cicatrizal casi exclusivamente en el dorso expuesto de las manos o antebrazos, no característicamente el suave eritema maculopapular del signo de mariposa nasal. La dermatitis irritativa por contacto (C) sigue aleatoriamente el caprichoso patrón del roce o escurrimiento del químico o agente externo (ej. cremas), no respeta simétricamente la anatomía ni los surcos nasogenianos como el Lupus o la Pelagra. La enfermedad de Crohn (D) es ciertamente un diferencial obligado por la diarrea crónica y el síndrome de malabsorción grave, pero no genera ni explica jamás el patognomónico eritema facial fijo y fotosensible de las mejillas.", 
                source: "GPC IMSS-430-10, Diagnóstico y Tratamiento de la Pelagra en Edad Pediátrica, 2017, Diagnóstico diferencial, Página 15." 
            },
            {
                id: 16, 
                question: "En la evaluación de un lactante con sospecha de Otitis Media Aguda, ¿cuál es el hallazgo clínico específico a la exploración armada que confirma el diagnóstico presuntivo mediante la integración de derrame?", 
                options: ["Membrana timpánica hiperémica", "Opacidad del cuadrante anteroinferior", "Ausencia de movilidad timpánica", "Nivel hidroaéreo visible"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, la detección de inflamación en la membrana timpánica es un dato sugestivo, pero el diagnóstico de certeza del derrame retrotimpánico requiere la evaluación dinámica con presión de aire.<br><br>Perla ENARM: \"Para el diagnóstico de OMA se recomienda identificar líquido en oído medio, el instrumento recomendado es la otoscopia neumática, con fuente de luz adecuada y especulo sin color con diámetro adecuado a las características anatómicas del conducto auditivo externo (CAE) del niño\".<br><br>Análisis de Distractores: La opción A es incorrecta porque la sola hiperemia (frecuente por llanto) no hace diagnóstico sin confirmar líquido. Las opciones B y D son signos estáticos secundarios, pero carecen de la alta sensibilidad y especificidad diagnóstica que brinda la inmovilidad de la membrana.", 
                source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Diagnóstico Clínico, Página 24." 
            },
            {
                id: 17, 
                question: "Dentro del interrogatorio exhaustivo para los diagnósticos diferenciales del Estreñimiento Funcional, ¿cuál es el antecedente clave del neonato que indica una altísima sospecha de aganglionosis intestinal (Enfermedad de Hirschsprung) y prohíbe tajantemente el uso inicial de laxantes de mantenimiento solos?", 
                options: ["Evacuaciones marcadamente disminuidas al primer mes de edad", "Falla o retraso en el paso de meconio posterior a 48 hrs de nacido", "Llanto por cólico infantil severo y gases por las tardes", "Vómitos posprandiales aislados de contenido lácteo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Estreñimiento Funcional en escolares, el 99% de los recién nacidos sanos logran afortunadamente su primera evacuación negra antes de las primeras 48 horas de vida por motilidad intrínseca normal; el franco y grave retraso de este primer hito del neurodesarrollo intestinal indica casi siempre una severa organicidad obstructiva, fibrótica o neurológica congénita distal en el recto (aganglionosis) que requiere biopsia urgente, no laxantes.<br><br>Perla ENARM: \"Banderas rojas y claves diagnósticas indicativas de condición o alteración subyacente (Estreñimiento no funcional): Inicio desde el nacimiento o primeras semanas de vida... Falla en el paso/eliminación del meconio (más allá de las primeras 48 horas de vida en niños a término)\".<br><br>Análisis de Distractores: Las drásticas modificaciones o aparente retraso del patrón evacuatorio recién al mes de edad biológica (A) suelen coincidir benignamente con cambios en fórmula o con la anatomía inmadura madurativa del suelo pélvico, asociándose comúnmente con cuadros disquéticos inofensivos (disquecia del lactante) que aprenden a pujar. Los cólicos (C) y vómitos aislados (D) requieren el descarte médico de reflujo fisiológico o intolerancias, pero no dictaminan ni apuntan tan certeramente a organicidad retentiva obstructiva o quirúrgica como lo hace la falta de paso del tapón de meconio.", 
                source: "GPC IMSS-643-18, Tratamiento médico del estreñimiento funcional en el escolar y adolescente, 2018, Cuadros y figuras (Cuadro I - Banderas Rojas), Página 82." 
            },
            {
                id: 18, 
                question: "¿Cuál es el antecedente y factor predisponente de mayor asociación (criterio mayor) para el desarrollo de asma en edad pediátrica reportado por la GPC?", 
                options: ["Familiar en primer grado", "Convivencia con mascotas domésticas", "Infección bacteriana recurrente", "Ejercicio físico intenso"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Asma en Edad Pediátrica, la predisposición genética y la atopia son los pilares epidemiológicos de la enfermedad. La presencia de la patología en los padres es el criterio predictivo mayor clásico.<br><br>Perla ENARM: \"Criterios mayores: Historia de padre(s) con asma, Dermatitis atópica diagnosticada por médico, Sensibilización alérgica a ≥ 1 aeroalérgeno.\"<br><br>Análisis de Distractores: La convivencia con mascotas (B) se considera un factor protector en etapas tempranas. Las infecciones virales (no bacterianas, C) son desencadenantes, pero no el factor predisponente genético. El ejercicio (D) desencadena crisis en pacientes ya diagnosticados, pero no causa la enfermedad subyacente.", 
                source: "GPC-SS-009-20, Tratamiento del asma en edad pediátrica, 2020, Anexos: Figuras (Figura 4), Página 35." 
            },
            {
                id: 19, 
                question: "¿Cuál es el criterio etiológico presuntivo fundamental que justifica cambiar la indicación del esquema de primera línea (amoxicilina) y utilizar macrólidos (azitromicina/claritromicina) en la Neumonía Bacteriana Adquirida en la Comunidad (NBAC)?", 
                options: ["Presencia de derrame pleural", "Infección intrahospitalaria previa", "Sospecha de gérmenes atípicos", "Saturación menor a 90%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Neumonía Bacteriana en pediatría, los patógenos intracelulares o carentes de pared celular típica (como Mycoplasma o Chlamydia) no responden a betalactámicos, por lo que la clínica atípica exige la acción de inhibidores de la subunidad ribosomal.<br><br>Perla ENARM: \"Se sugiere que en el caso de sospecha de NBAC severa causada por gérmenes atípicos los pacientes sean tratados con: azitromicina, claritromicina, eritromicina o doxiciclina\".<br><br>Análisis de Distractores: El derrame pleural se maneja con betalactámicos intravenosos o procedimientos invasivos, no con macrólidos. Las infecciones intrahospitalarias sugieren resistencia (se escalan a cefalosporinas). La saturación baja indica severidad clínica pero no la etiología atípica de forma intrínseca.", 
                source: "GPC SS-120-21, Diagnóstico y tratamiento de la neumonía bacteriana adquirida en la comunidad en población menor a 18 años, 2021, Tratamiento, Página 27." 
            },
            {
                id: 20, 
                question: "En la Desnutrición en Menores de Cinco Años, ¿cuál es el hallazgo de laboratorio que se encuentra más frecuentemente y que obliga al tamizaje sistemático según la GPC?", 
                options: ["Anemia microcítica hipocrómica", "Hipoalbuminemia sérica severa", "Hipoglucemia en ayuno", "Leucopenia con linfopenia"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Desnutrición en Menores, todo infante con déficit calórico-proteico tiene alta probabilidad de desarrollar depleción de reservas de hierro, siendo la principal comorbilidad a descartar en el abordaje primario.<br><br>Perla ENARM: \"La anemia microcítica hipocrómica es el hallazgo de laboratorio más frecuentemente encontrado en niños desnutridos\".<br><br>Análisis de Distractores: La hipoalbuminemia (B) es clásica del Kwashiorkor grave, pero no el hallazgo global más frecuente. La hipoglucemia (C) es un signo de choque inminente en urgencias. La leucopenia (D) se asocia a inmunosupresión crónica, no es el tamizaje primario.", 
                source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Evidencias y Recomendaciones, 16." 
            },
            {
                id: 21, 
                question: "¿Cuál es el dato clínico clave que permite distinguir la Diarrea Aguda invasiva de su principal diagnóstico diferencial acuoso justificando el uso de antimicrobianos?", 
                options: ["Dolor abdominal difuso de intensidad leve", "Presencia de moco y sangre", "Duración del cuadro menor a tres", "Fiebre persistente mayor a 38 grados"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Diarrea Aguda Infantil, el síndrome diarreico se divide operativamente en acuoso (fisiopatología secretora u osmótica, usualmente viral o toxigénica) y disentérico. La visualización macroscópica de productos inflamatorios y eritrocitos en la materia fecal traduce daño y penetración de la barrera enterocitaria, siendo indicación estricta para iniciar antibioticoterapia empírica.<br><br>Perla ENARM: \"El uso de antibióticos para el tratamiento de la diarrea aguda sólo es necesario en los casos que se sospeche invasividad, caracterizada clínicamente por evacuaciones con sangre y moco (disentería)\".<br><br>Análisis de Distractores: Las opciones A y D (fiebre y dolor inespecífico) acompañan en un alto porcentaje a las infecciones virales clásicas (como el rotavirus) que no precisan intervención antimicrobiana. La opción C apoya justamente la etiología no complicada de un cuadro autolimitado sin criterios de gravedad que contraindica el uso de fármacos agresivos.", 
                source: "GPC SS-156-18, Prevención, diagnóstico y tratamiento de diarrea aguda en pacientes de 2 meses a 5 años de edad, en el primer y segundo nivel de atención, 2018, Tratamiento, Página 25." 
            },
            {
                id: 22, 
                question: "Según la GPC de Tratamiento de Linfoma No Hodgkin en Pediatría, ¿cuál es el procedimiento quirúrgico inicial de elección para establecer el diagnóstico histopatológico de certeza?", 
                options: ["Aspiración con aguja fina", "Biopsia escisional del tumor", "Punción lumbar diagnóstica", "Aspirado de médula ósea"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Linfoma No Hodgkin Pediátrico, la arquitectura del ganglio y los marcadores de inmunohistoquímica son esenciales para clasificar el linaje del linfoma. Las muestras citológicas pequeñas no brindan la estructura tisular necesaria, lo que retrasa el tratamiento curativo.<br><br>Perla ENARM: \"El diagnóstico se establece en el estudio histopatológico. Es fundamental realizar la biopsia escisional del tumor primario o ganglio para disponer del estudio histológico completo, que incluya además de la variedad histológica, tinciones de inmunohistoquímica y biología molecular\".<br><br>Análisis de Distractores: La opción A (aspiración con aguja fina) está expresamente contraindicada por la guía por su nula utilidad diagnóstica definitiva. Las opciones C y D son fundamentales para la estadificación (buscar diseminación a SNC y médula), pero no son el método para el diagnóstico primario del tumor sólido original.", 
                source: "GPC-SS-290-18, Tratamiento de Linfoma No Hodgkin en Pediatría, 2018, Introducción / Evidencias, Página 8." 
            },
            {
                id: 23, 
                question: "¿Cuál es el contundente e inconfundible dato clínico clave que permite al pediatra urgenciólogo distinguir diferencialmente la destructiva Diabetes Mellitus Tipo 1 de su diagnóstico diferencial principal epidemiológico progresivo (Diabetes Tipo 2) de manera inmediata y empírica al ingreso del menor en la sala de urgencias?", 
                options: ["Medición urgente de niveles de Péptido C residual.", "Positividad a un panel de autoanticuerpos pancreáticos.", "Fenotipo clínico pediátrico, normopeso y cuadro severo de cetosis/CAD.", "Pruebas genéticas moleculares de secuenciación de exoma."], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Diabetes, para no arriesgar ciegamente el estado ácido base y la inminente sobrevida neurológica del infante chocado frente a la natural y obvia tardanza o total falta en piso de pruebas moleculares avanzadas esotéricas, el ojo agudo del especialista determina sabiamente de inmediato el agresivo régimen urgenciólogo insulínico inicial basándose y observando únicamente el fenotipo delgado clásico (normopeso), el rápido debut a edad temprana, la historia súbita sin acantosis, y primariamente las fulminantes crisis acidóticas profundas con simples tiras reactivas de orina con cuerpos cetónicos a tope, diferenciando brillantemente de inicio entre una etiología lítica pancreática carencial de urgencia absoluta (T1) o la etiología crónica insulino-resistente obesa silente no cetósica (T2).<br><br>Perla ENARM: \"No se recomienda medir niveles de péptido C o autoanticuerpos específicos en la presentación inicial (en urgencias) para distinguir diabetes tipo 1 de tipo 2\".<br><br>Análisis de Distractores: Retrasar negligentemente la necesaria infusión hormonal salvadora continua buscando frenéticamente enviar costosos estudios inmunológicos (B) a otro laboratorio de referencia o midiendo torpemente la esporádica proteína C precursora indetectable (A) es una medida desaconsejada por la guía al inicio de los abordajes de reanimación y estabilización de un estado metabólico de CAD con peligro de edema cerebral. Las exóticas pruebas dirigidas específicamente al genoma o ADN (D) son lentos recursos excepcionales y únicos justificados solo en extrañas y muy dudosas etiologías heredadas recesivas no sindrómicas atípicas que no responden a tratamiento común (MODY/Neonatal de meses).", 
                source: "GPC SS-302-21, Diagnóstico y tratamiento de la diabetes mellitus tipo 1 y tipo 2 en paciente pediátrico, 2021, Diagnóstico (Diferencias clínicas), Página 16." 
            },
            {
                id: 24,
                question: "Ante la sospecha clínica de Síndrome de Dificultad Respiratoria en un recién nacido prematuro, ¿cuál es el estudio de imagen inicial para evaluar la extensión de la enfermedad?",
                options: ["Radiografía anteroposterior de tórax", "Ultrasonido pulmonar de rutina", "Tomografía computarizada de tórax", "Ecocardiograma transtorácico funcional"],
                answer: 0,
                justification: "Justificación: De acuerdo a la GPC de Síndrome de Dificultad Respiratoria, aunque el diagnóstico es fundamentalmente clínico, la radiografía tiene alta sensibilidad y especificidad para evaluar las atelectasias (\"vidrio esmerilado\") y descartar complicaciones. El ultrasonido pulmonar es prometedor pero aún no se recomienda de rutina a menos que sea realizado por personal altamente capacitado. La tomografía no está indicada de forma inicial por la radiación y el traslado.<br><br>Perla ENARM: \"En los RNP con SDR la radiografía de tórax tiene sensibilidad del 91% y especificidad del 84%. Las imágenes radiológicas se correlacionan bien con la gravedad clínica de la enfermedad.\"",
                source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Auxiliares Diagnósticos, Página 20."
            },
            {
                id: 25, 
                question: "¿Cuál es la condición clínica o mecanismo etiológico que obliga a diferir el tratamiento quirúrgico 5 días, permitiendo diferenciarla del manejo de una quemadura térmica?", 
                options: ["Quemadura por fuego directo", "Quemadura por contacto químico", "Quemaduras eléctricas", "Quemadura por escaldadura"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, diagnóstico y tratamiento de quemaduras en niños y adolescentes, al recibir una descarga, la corriente aprovecha los haces neurovasculares de baja resistencia, generando necrosis muscular y endotelial difusa y distante a las marcas superficiales (\"lesión en iceberg\"). El daño vascular silente evoluciona hacia trombosis tardías.<br><br>Perla ENARM: \"Se recomienda esperar mínimo 5 días para realizar injertos en niños y adolescentes con quemaduras eléctricas, para establecer el tiempo adecuado de necrosis y recuperación de tejidos\".<br><br>Análisis de Distractores: Una quemadura profunda térmica mediada por fuego directo (A) o escaldadura severa (D) exhibe el 100% de su destrucción coagulativa en el instante del accidente, requiriendo escisión temprana en <72 h. Las sustancias químicas (B) urgen lavado exhaustivo sostenido, pero no obedecen al principio evolutivo engañoso de alto voltaje.", 
                source: "GPC SS-090-18, Prevención, diagnóstico y tratamiento de quemaduras en niños y adolescentes, 2018, Evidencias y Recomendaciones: Tratamiento, Página 36 y 55." 
            },
            {
                id: 26, 
                question: "¿Cuál es el factor de riesgo materno con mayor asociación directa para desarrollar Sepsis Neonatal temprana reportado por la GPC?", 
                options: ["Hiperbilirrubinemia neonatal muy severa", "Peso al nacer alto", "Uso de ceftriaxona materna", "Ruptura de membranas prolongada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Neonatal, los antecedentes perinatales son la piedra angular para identificar el riesgo de infección de inicio temprano. La ruptura prematura de membranas por más de 18 horas, junto con la corioamnionitis y la colonización materna por Estreptococo del Grupo B, abren una vía de ascenso directo para los patógenos vaginales hacia la cavidad amniótica y el feto.<br><br>Perla ENARM: \"Considerar los siguientes datos como factores de riesgo: Falta de cuidados prenatales, Infección invasiva por estreptococos del grupo B en un hijo previo, Colonización materna, Ruptura de membranas antes del trabajo de parto, Parto prematuro, Sospecha o confirmación de ruptura de membranas por más de 18 horas\".<br><br>Análisis de Distractores: La hiperbilirrubinemia es una consecuencia clínica, no un factor de riesgo para desarrollar sepsis. El peso al nacer alto (macrosomía) se asocia a otras complicaciones metabólicas o traumáticas, mientras que el bajo peso es el verdadero factor de riesgo para sepsis. El uso de antibióticos maternos suele ser protector, no un riesgo.", 
                source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 2. Tratamiento, Página 22." 
            },
            {
                id: 27, 
                question: "¿Cuál es el dato fisiopatológico clave que permite distinguir al Choque Séptico Pediátrico tipo \"frío\" de su diagnóstico diferencial principal (choque caliente)?", 
                options: ["Resistencias vasculares sistémicas elevadas", "Gasto cardíaco marcadamente elevado", "Pulsos distales saltones y palpables", "Presión arterial media inusualmente alta"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Choque Séptico Pediátrico, la distinción del patrón hemodinámico es vital para la elección del vasopresor. El choque frío compensa el bajo gasto cardíaco constriñendo los vasos periféricos, lo que clínicamente se traduce en extremidades pálidas, frías y llenado capilar prolongado.<br><br>Perla ENARM: \"Los patrones hemodinámicos de choque pueden ser: Choque frío: Bajo gasto cardiaco y resistencias vasculares sistémicas elevadas\".<br><br>Análisis de Distractores: El gasto cardíaco elevado (B) y los pulsos saltones (C) son las características patognomónicas del patrón hemodinámico opuesto, es decir, el choque de patrón caliente. La presión arterial (D) puede estar conservada o baja en el choque frío, pero el hallazgo pivotante diferencial es la alta resistencia vascular.", 
                source: "GPC SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en pacientes de 1 mes a 18 años de edad en los tres niveles de atención, 2017, Fármacos inótropico/vasopresor, Página 19." 
            },
            {
                id: 28, 
                question: "En la Enterocolitis Necrosante, ¿cuál es el signo clínico característico que integra el diagnóstico presuntivo de sospecha (Estadio I-B) según la GPC?", 
                options: ["Neumatosis intestinal difusa", "Sangre rectal roja viva", "Neumoperitoneo radiológico masivo", "Eritema de pared abdominal"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enterocolitis Necrosante, la clínica inicial en el prematuro puede ser sumamente inespecífica. El estadio I-A (Sospecha) incluye letargia, distensión leve y residuo gástrico, pero la innegable transición clínica al estadio I-B se marca objetivamente por la presencia de sangrado evidente en el pañal derivado de la isquemia de la mucosa.<br><br>Perla ENARM: \"Se considera sospecha (Estadio I-B) al presentar la clínica del estadio I-A sumado a la presencia de sangre rectal rojo vivo\".<br><br>Análisis de Distractores: La neumatosis intestinal visible en radiografía (A) ya define una enfermedad confirmada o Estadio II. El preocupante eritema de la pared abdominal (D) indica una peritonitis inflamatoria subyacente de un estadio avanzado (II-B a III). El franco neumoperitoneo (C) es indicativo inequívoco de perforación intestinal libre en el estadio máximo III-B.", 
                source: "GPC SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido, 2018, Anexos (Algoritmos de Bell), Página 52." 
            },
            {
                id: 29, 
                question: "¿Cuál es el factor clínico al momento del diagnóstico que predice el mayor riesgo de mortalidad y peor pronóstico en un paciente con Sarcoma de Ewing?", 
                options: ["Afección del esqueleto apendicular", "Enfermedad metastásica al diagnóstico", "Volumen tumoral inicial menor", "Respuesta histológica del 90%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Sarcoma de Ewing, a pesar del significativo avance en las terapias multimodales neoadyuvantes, la presencia de diseminación a distancia al momento del diagnóstico clínico sigue siendo la variable biológica que más acorta la supervivencia global del paciente pediátrico.<br><br>Perla ENARM: \"El factor pronóstico más importante en el sarcoma de Ewing es la enfermedad metastásica al diagnóstico. La sobrevida a 5 años en enfermedad localizada es de 70% y de 30% en enfermedad metastásica\".<br><br>Análisis de Distractores: La afección en el esqueleto apendicular (extremidades), a diferencia del axial (pelvis o columna), denota de hecho un pronóstico más favorable para resección. Contar con un volumen tumoral menor a 200 ml y una respuesta histológica a quimioterapia mayor a 90% de necrosis (baja viabilidad celular) son los factores que determinan el \"riesgo estándar\", es decir, de buen pronóstico.", 
                source: "GPC-SS-379-18, Diagnóstico y tratamiento del sarcoma de Ewing en pediatría, 2018, Factores pronósticos, p. 11." 
            },
            {
                id: 30, 
                question: "¿Cuál es el factor de riesgo con mayor asociación estadística (OR >2.0) para el desarrollo de Infección de Vías Urinarias reportado por la guía?", 
                options: ["Vaciamiento vesical infrecuente", "Sexo masculino en preescolares", "Constipación crónica severa", "Uso reciente de antibióticos"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Infección de Vías Urinarias pediátrica, la estasis de la orina es el mecanismo fisiopatológico principal que favorece la colonización bacteriana. El retardo en la micción interrumpe el barrido mecánico natural de la vía urinaria.<br><br>Perla ENARM: \"Los principales factores de riesgo son: sexo femenino (OR 1.8, IC95% 1.08-3.003) y vaciamiento vesical infrecuente (OR 2.073, IC95% 1.027-4.186)\".<br><br>Análisis de Distractores: El sexo masculino (B) es un factor de riesgo limitado primariamente a los primeros meses de vida en niños no circuncidados. La constipación (C) y el uso previo de antibióticos (D) son factores predisponentes reconocidos, pero el vaciamiento infrecuente presenta la mayor asociación estadística (OR 2.073) reportada textualmente.", 
                source: "GPC-SS-027-21, Diagnóstico y tratamiento de la infección de vías urinarias no complicada en menores de 18 años, 2021, Aspectos Generales, p. 8." 
            },
            {
                id: 31, 
                question: "¿Cuál es el dato clínico clave en la evaluación de movimientos que permite al explorador distinguir la Parálisis Cerebral espástica de su diagnóstico diferencial extrapiramidal o funcional?", 
                options: ["Presencia de sutiles movimientos fidgety", "Movimientos de cramped-synchronized", "Ataxia de extremidades inferiores", "Hipotonía axial y periférica severa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Parálisis Cerebral en Lactantes, al emplear precozmente la valiosa herramienta observacional predictiva de \"movimientos generales\" (Prechtl), la alarmante presencia de actividad refleja rígida, espasmódica, que carece por completo de la fluidez y suavidad normal de un recién nacido, y que mueve rígidamente los músculos en bloque tenso, tiene un valor altísimo (casi 100%) para predecir exclusivamente en meses posteriores la aparición de las severas variantes clínicas que cursan con un peligroso aumento de tono motor piramidal clásico de las extremidades (espasticidad).<br><br>Perla ENARM: \"En la diplejía espástica o bilateral se presenta movimientos generales de cramped-synchronized, ausencia de fidgety y una exploración neurológica anormal\".<br><br>Análisis de Distractores: La presencia de fluidos y variables movimientos \"fidgety\" (A) es de hecho un marcador completamente normal o de buen pronóstico y descarta casi definitivamente el diagnóstico de daño piramidal o de la sustancia blanca y Parálisis Cerebral en el futuro. La ataxia (C) corresponde clínica y topográficamente al raro subtipo cerebeloso atáxico (4 al 6% del total), no a la variante de la corteza motora espástica mayoritaria, y la hipotonía severa (D) es un subtipo atónico sumamente infrecuente (2%) que se aleja por completo del comportamiento clínico contracturado, tenso y doloroso \"cramped\" de la espasticidad (85-91% del gran total de pacientes con PC).", 
                source: "GPC DIF-332-18, Evaluación diagnóstica de parálisis cerebral en lactantes, 2018, Diagnóstico Clínico, Página 18." 
            },
            {
                id: 32,
                question: "En el abordaje diagnóstico del abuso físico infantil, ¿cuál es el hallazgo dermatológico que, al asociarse a hematomas, representa el signo clínico con mayor fuerza para el diagnóstico presuntivo?",
                options: ["Borde eritematoso difuso.", "Signo de Nikolsky positivo.", "Presencia de petequias.", "Alopecia por tracción focal."],
                answer: 2,
                justification: "Justificación: De acuerdo a la GPC de Abuso Físico Infantil, cuando se examina la piel de un menor, la simple ausencia de algunos signos no excluye el diagnóstico, pero la coexistencia fisiopatológica de disrupción capilar aguda refleja la fuerza desproporcionada utilizada en el traumatismo.<br><br>Perla ENARM: \"La presencia de petequias en asociación con hematomas, es un fuerte indicador de abuso, sin embargo, su ausencia no puede excluir maltrato.\"<br><br>Análisis de Distractores: El borde eritematoso difuso es inespecífico de celulitis o contusión simple. El signo de Nikolsky es de patologías ampollosas autoinmunes o infecciosas. La alopecia por tracción es un signo de maltrato, pero no es el hallazgo dermatológico asociado directamente con el lecho del hematoma descrito en la regla fundamental dermatológica de la guía.",
                source: "GPC-DIF-400-21, Manifestaciones clínicas para la sospecha del abuso físico en niñas, niños y adolescentes, 2021, Sección Detección, Página 16."
            },
            {
                id: 33, 
                question: "¿Cuál es el dato clínico clave que permite distinguir tempranamente la Mucopolisacaridosis Tipo I de la Tipo II (Síndrome de Hunter) según menciona la GPC?", 
                options: ["Presencia de disostosis múltiple", "Presencia de opacidad corneal", "Elevación de heparán sulfato", "Facies tosca y macroglosia"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Mucopolisacaridosis Tipo I, ambos padecimientos multisistémicos graves (Hurler y Hunter) comparten un genotipo masculino prevalente, una excreción de glucosaminoglucanos idéntica (dermatán y heparán sulfato) y facies dismórficas similares (gargolismo); sin embargo, oftalmológicamente, la MPS II (Hunter) clásicamente cursa con córneas claras o limpias, mientras que la MPS I (Hurler) deposita rápidamente material patológico volviendo la córnea típicamente difusa y totalmente opaca. Disostosis y facies tosca (opciones A, D) suceden invariablemente en ambas y no diferencian los tipos clínicamente.<br><br>Perla ENARM: \"MPS II o síndrome de Hunter. Presenta la misma composición de GAG en la orina. La presencia en la MPS I de opacidades corneales es un signo importante en el diagnóstico diferencial de MPS I y II\".", 
                source: "GPC IMSS-338-10, Diagnóstico y Tratamiento de la Mucopolisacaridosis Tipo I en Edad Pediátrica, 2017, Sección: Diagnóstico Diferencial, Página 22." 
            },
            {
                id: 34, 
                question: "Según la Guía de Práctica Clínica, en un recién nacido prematuro sano, ¿cuál es el peso al nacer o la edad gestacional que establece la indicación absoluta para realizar tamizaje visual para retinopatía del prematuro?", 
                options: ["Menor 1500 gramos o 32 semanas", "Menor 1750 gramos o 34 semanas", "Menor 2000 gramos o 36 semanas", "Menor 2500 gramos o 37 semanas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cuidados del Recién Nacido Prematuro, el riesgo de desarrollo vascular retiniano anómalo (Retinopatía del Prematuro) obliga a una vigilancia estrecha en pacientes inmaduros. La prevalencia es mayor a menor edad gestacional y peso, por lo que la recomendación nacional y del grupo ROP México dicta el cribado oftalmológico estandarizado con esos límites fisiológicos.<br><br>Perla ENARM: Se realizará tamizaje visual para detección oportuna de ROP a todos los RNP de riesgo (Todos los RNP < 34 SDG y/o < 1750 gr de peso al nacimiento).<br><br>Análisis de Distractores: La opción A refleja el límite histórico de peso para incubadora de doble pared, no para tamizaje visual. La opción C es el umbral para aplicación de vacuna BCG y retiro de fortificador de leche materna. La opción D marca la definición limítrofe de bajo peso al nacer general, irrelevante como umbral para ROP.", 
                source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Tamizaje y Vacunación, Página 43." 
            },
            {
                id: 35,
                question: "Para descartar la transmisión de patógenos en una madre donadora que acaba de recibir una vacuna de virus vivos atenuados (ej. rubeola), ¿cuál es el tiempo diferencial de exclusión para donar según la Guía?",
                options: ["Diferir donación 1 semana", "Diferir donación 2 semanas", "Diferir donación 4 semanas", "Diferir donación 6 semanas"],
                answer: 2,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Lactancia materna en el niño con enfermedad, existe evidencia comprobada del paso hacia la circulación mamaria y excreción láctea de cepas vacunales como la del virus de rubeola. El aclaramiento viral o estabilización inmunológica completa requiere un margen prudente de un mes.<br><br>Perla ENARM: Se ha descrito el paso de virus de rubeola tras la vacunación a la leche materna y a los lactantes amamantados, por lo que se recomienda no dar leche humana durante 4 semanas tras la administración de vacunas de virus vivos atenuados.<br><br>Análisis de Distractores: Tiempos cortos como 1 o 2 semanas se asocian con periodos de viremia alta donde el riesgo de exposición para el recién nacido (inmunodeprimido por definición para requerir banco de leche) es inaceptable. 6 semanas exceden innecesariamente el periodo profiláctico documentado por la normativa.",
                source: "GPC-IMSS-704-18, Lactancia materna en el niño con enfermedad. Donación de leche humana, 2018, Criterios de donación de leche humana, Página 71."
            },
            {
                id: 36, 
                question: "En la evaluación inicial de un recién nacido, ¿cuál es el signo clínico que integra el diagnóstico presuntivo de tétanos neonatal según la Guía de Práctica Clínica?", 
                options: ["Vómito biliar en proyectil", "Incapacidad para succionar (trismo)", "Cianosis central al deglutir", "Fiebre mayor a 39°C"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Tétanos Neonatal, esta patología se presenta clásicamente en un neonato que lloró y se alimentó normal los primeros dos días y súbitamente pierde la capacidad de alimentarse. El toxoide tetánico bloquea la liberación de neurotransmisores inhibitorios, causando contracción sostenida (trismo o espasmo maseterino).<br><br>Perla ENARM: \"Definición de caso confirmado de tétanos neonatal. Es todo recién nacido que presenta las tres características siguientes: Alimentación y llanto normales durante los dos primeros días de vida. Comienzo de la enfermedad entre el tercero y el vigésimo octavo día de vida e Incapacidad para succionar (trismo) seguida de rigidez (muscular generalizada) o convulsiones (espasmos musculares)\".<br><br>Análisis de Distractores: El vómito biliar (A) indica obstrucción intestinal baja. La cianosis al deglutir (C) orienta hacia fístula traqueoesofágica o cardiopatía cianógena. La fiebre alta (D) sugiere sepsis neonatal inespecífica, pero el trismo es el dato patognomónico clásico inicial del tétanos.", 
                source: "GPC IMSS-829-18, Detección de Factores de Riesgo y Prevención Primaria del Tétanos Neonatal en el Primer Nivel de Atención Médica, 2018, Glosario, Página 52." 
            },
            {
                id: 37, 
                question: "En un paciente con un tumor de sistema nervioso central que debuta agudamente en urgencias con un estado epiléptico continuo, ¿cuál es la complicación pronóstica exacta dictada por la guía clínica por cada minuto de retraso logístico en el inicio del tratamiento abortivo anticonvulsivante?", 
                options: ["10% de riesgo de muerte súbita arritmogénica", "5% de riesgo acumulativo de prolongación refractaria", "15% de riesgo inminente de herniación uncal masiva", "20% de isquemia cerebral focal irreversible en el hemisferio"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Tumores de Sistema Nervioso, la ventana terapéutica es el pilar de rescate; el \"tiempo es cerebro\". Las crisis convulsivas prolongadas en un tejido parenquimatoso que ya se encuentra pre-comprometido o desplazado por efecto de masa y edema vascular agotan rápidamente los sustratos metabólicos mitocondriales. La literatura avalada indica que no impregnar rápido a estos niños los empuja hacia la temida refractariedad farmacológica sistémica (resistencia a los GABAérgicos).<br><br>Perla ENARM: \"Se recomienda mantener las funciones vitales y controlar las crisis en forma inmediata, ya que por cada minuto de retraso en el inicio de la terapia hay 5% de riesgo acumulativo de que el estado epiléptico tenga una duración mayor a 60 min (refractariedad)\".<br><br>Análisis de Distractores: Las otras cifras expuestas (10% de arritmia, 15% de herniación o 20% de isquemia puramente focal) (A, C, D) son distractores y escenarios biológicos ficticios o imprecisos que no corresponden a la evidencia del texto normativo exacto de resucitación neurocrítica; la métrica estadística de calidad asistencial validada internacionalmente en pediatría evalúa estrictamente este 5% por cada minuto de retraso en perpetuar y prolongar la crisis vital hacia un estado refractario letal que requeriría anestesia general e intubación prolongada.", 
                source: "GPC ISSSTE-136-18, Diagnóstico y tratamiento inicial de tumores de sistema nervioso central en pacientes pediátricos en primer y segundo nivel de atención, 2018, Tratamiento Farmacológico, Página 16." 
            },
            {
                id: 38, 
                question: "¿Cuál es el factor de riesgo obstétrico o materno con mayor asociación para el desarrollo de sobrepeso y obesidad en niños y adolescentes reportado por la evidencia?", 
                options: ["Aumento de peso gestacional", "Ausencia de lactancia materna", "Parto por cesárea iterativa", "Diagnóstico de preeclampsia severa"], 
                answer: 0,

                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Ictericia Neonatal, la ingesta exclusiva de leche materna en los primeros días de vida se correlaciona fisiológicamente con un tránsito intestinal más lento y menor volumen hídrico inicial, lo que prolonga el tiempo de reabsorción enterohepática y eleva las concentraciones séricas (ictericia por lactancia).<br><br>Perla ENARM: \"Hay evidencia consistente procedente de estudios de buena calidad que demuestran que son cuatro los factores asociados con un incremento en el riesgo de hiperbilirrubinemia: Edad gestacional menor de 38 semanas, Presencia de ictericia dentro de las primeras 24 horas de vida, Historia familiar de ictericia que requirió fototerapia, Alimentación exclusiva con leche materna\".<br><br>Análisis de Distractores: La fórmula láctea (B) acelera el tránsito intestinal y aporta mayor volumen de líquidos rápidamente, disminuyendo la circulación enterohepática (es un factor protector, no de riesgo). La ablactación (A) no aplica en el periodo neonatal. La edad a término de 38 a 40 semanas (D) es francamente protectora en comparación con el factor de riesgo real que es la prematurez o el nacimiento pre-término tardío.",

            {
                id: 49, 
                question: "En un paciente crónico con Pelagra severa (3 D's) sin acceso a atención médica o tratamiento, ¿cuál es el desenlace clínico final (4ta D) que sobreviene inminentemente prediciendo la mortalidad generalizada?", 
                options: ["Hemorragia intracraneal masiva hipertensiva", "Insuficiencia cardiaca congestiva de alto gasto", "Falla orgánica múltiple letal por desnutrición", "Perforación gástrica o isquemia intestinal"],

                justification: "Justificación: De acuerdo a la GPC de Pelagra en Edad Pediátrica, la profunda deficiencia celular sistémica de las coenzimas NAD y NADP paraliza letalmente el ciclo de Krebs, la glucólisis y la vital respiración celular (oxidación tisular y generación de ATP). Esto genera un estado de caquexia y desgaste metabólico basal insostenible que culmina trágicamente en la clásica y temida cuarta \"D\" sintomática (Dermatitis, Diarrea, Demencia... Death/Muerte).<br><br>Perla ENARM: \"La Pelagra no tratada conduce a la muerte por falla orgánica múltiple... El estado de desnutrición asociado causa muerte si no se trata\".<br><br>Análisis de Distractores: La incontrolable hemorragia intracraneal o gingival (A) y la insuficiencia cardiaca de altísimo gasto (Beriberi húmedo) (B) son complicaciones clásicas exclusivas de la deficiencia de tiamina (B1) o de la deficiencia de vitamina K por malabsorción, no específicamente de la Pelagra (B3). La perforación intestinal mesentérica aguda (D) ocurre en agudos procesos infecciosos abdominales o isquémicos, no por el simple y crónico adelgazamiento atrófico de las mucosas pelagrosas.",

        let userProgress = {};

            loadTheme();

            let lastQId = null;

            displayQuestion(lastQId ? parseInt(lastQId) : null);

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('Exapedia50Progress');
                localStorage.removeItem('Exapedia50LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

            const isAllCompleted = ans === total && total > 0;

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />

                    <!-- HERO DYNAMIC -->

                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">

                                    <div>

                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">

                            Siguiente EXAMEN
