            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Según la GPC de fractura intracapsular del extremo proximal del fémur, ¿qué característica preexistente del paciente es indicación absoluta para preferir una artroplastia total NO cementada en lugar de una cementada?", 
                options: ["Insuficiencia renal crónica", "Osteoporosis severa no tratada", "Cardiopatía o neumopatía controladas", "Demencia severa incapacitante"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas Intracapsulares de Fémur, la polimerización del cemento óseo (polimetilmetacrilato) en el canal medular libera émbolos de grasa, aire y monómero al torrente sanguíneo, generando hipotensión y síndrome de implantación del cemento. En un anciano con corazón o pulmón lábiles o \"controlados al límite\", este evento embólico transoperatorio suele ser mortal.<br><br>Perla ENARM: \"Se recomienda la ATC no cementada en pacientes de FICEPF con cardiopatías o neumopatías controladas, por el alto riesgo de síndrome de implantación del cemento\".<br><br>Análisis de Distractores: Si existe osteoporosis severa (B), el vástago no cementado no logra \"press-fit\" ni se integra, obligando al uso de cemento para anclaje. La demencia (D) es criterio para un manejo más conservador u osteosíntesis simple, para evitar luxaciones de artroplastia total por falta de cooperación.", 
                source: "GPC IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Tratamiento Quirúrgico, Página 20." 
            },
            {
                id: 2, 
                question: "Además de la edad avanzada y la osteoporosis, ¿cuál es el factor de riesgo de índole social fuertemente asociado a la fractura de antebrazo reportado por la GPC?", 
                options: ["Sedentarismo extremo", "Actividad laboral industrial", "Tabaquismo crónico", "Violencia intrafamiliar"], 
                answer: 3, 
                justification: "Justificación: Las fracturas de antebrazo frecuentemente ocurren como mecanismo de defensa (fractura del bastonazo al cubrirse la cara o el cuerpo). De acuerdo a la GPC de Fracturas de Antebrazo, el médico de primer contacto debe buscar intencionadamente este antecedente.<br><br>Perla ENARM: \"Los factores de riesgo que predisponen la presencia de fractura de antebrazo son: Edad avanzada, Osteoporosis, Mala nutrición, Alteraciones óseas congénitas, Reducción de masa muscular, Violencia intrafamiliar, Antecedente de traumatismo en antebrazo\".<br><br>Análisis de Distractores: Aunque el sedentarismo (A) y el tabaquismo (C) merman la calidad ósea sistémica, la guía destaca explícitamente el contexto de violencia social. La actividad industrial (B) puede generar trauma de alta energía, pero no se enlista textualmente como el principal factor de riesgo predictivo en la GPC.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Factores de Riesgo y Mecanismo de lesión, Página 13." 
            },
            {
                id: 3, 
                question: "Ante una rodilla traumática evaluada en el servicio de urgencias, ¿cuál es el diagnóstico diferencial topográfico que SÍ justifica la solicitud y efectividad diagnóstica de un ultrasonido articular en fase aguda?", 
                options: ["Ruptura del cruzado anterior", "Sospecha de lesiones meniscales", "Lesión del cruzado posterior", "Arrancamiento de espina tibial"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones Ligamentarias de Rodilla, los ligamentos cruzados se localizan en lo profundo de la fosa intercondílea, donde la interposición ósea impide la llegada de la onda ultrasónica. En contraste, las estructuras superficiales y periféricas tienen ventana acústica directa.<br><br>Perla ENARM: \"Se recomienda efectuar estudios de ultrasonografía en pacientes con lesiones ligamentarias en rodilla cuando se sospeche: Lesión en los ligamentos colaterales (medial o lateral) y Lesiones meniscales\".<br><br>Análisis de Distractores: Solicitar ultrasonido para evaluar cruado anterior (A) o cruzado posterior (C) es una mala práctica documentada que agota recursos innecesariamente. El arrancamiento de espina tibial (D) es un diagnóstico estrictamente radiográfico (fragmento óseo avulsionado).", 
                source: "GPC IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Pruebas diagnósticas, Página 14." 
            },
            {
                id: 4, 
                question: "En un paciente con antecedente de cardiopatía isquémica programado para Artroplastia Total de Rodilla, ¿cuál es el abordaje preoperatorio específico adicional que debe solicitarse?", 
                options: ["Gasometría arterial y espirometría", "Ecocardiograma transesofágico", "Radiografía de tórax y electrocardiograma", "Resonancia magnética cardiaca"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Tratamiento con Artroplastia Total de Rodilla, las comorbilidades cardiovasculares en pacientes mayores de 60 años exigen una estadificación del riesgo anestésico y quirúrgico con estudios básicos pero altamente sensibles para eventos isquémicos o falla cardiaca asintomática.<br><br>Perla ENARM: \"En pacientes con enfermedades cardiovasculares que requieren de ATR se recomienda contar con la valoración previa del especialista, así como los estudios auxiliares de diagnóstico específicos (radiografía simple de tórax y electrocardiograma, entre otros)\".<br><br>Análisis de Distractores: El ecocardiograma transesofágico y la resonancia magnética son estudios de tercer nivel que no se solicitan de rutina en el abordaje inicial. La gasometría y espirometría se reservan para patología pulmonar obstructiva (EPOC).", 
                source: "GPC-IMSS-435-18, Tratamiento con Artroplastia Total de Rodilla en Pacientes Mayores de 60 años, 2018, Evidencias y Recomendaciones, Página 26." 
            },
            {
                id: 5, 
                question: "En una paciente anciana con sospecha de fractura intracapsular del extremo proximal del fémur, ¿cuál es el signo clínico clásico que integra el diagnóstico presuntivo a la exploración física según la GPC?", 
                options: ["Alargamiento y rotación interna", "Acortamiento y rotación externa", "Acortamiento y rotación interna", "Alargamiento y rotación externa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas Intracapsulares de Fémur, la presentación clásica del paciente adulto mayor que sufre una caída e imposibilidad para la marcha es el acortamiento y la marcada rotación externa de la extremidad afectada. La deformidad en rotación interna es típica de luxaciones posteriores, no de fracturas.<br><br>Perla ENARM: \"Extremidad afectada con acortamiento y rotación externa\".<br><br>Análisis de Distractores: Las opciones A y C son incorrectas porque las rotaciones internas apuntan hacia luxaciones de cadera. La opción D es falsa porque la musculatura pélvica tracciona el fémur hacia proximal, provocando siempre acortamiento, no alargamiento.", 
                source: "GPC IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Diagnóstico clínico, Página 11." 
            },
            {
                id: 6, 
                question: "Según la GPC de Fracturas de Antebrazo, además del síndrome compartimental, ¿cuál de las siguientes combinaciones de lesiones indica necesidad de tratamiento quirúrgico absoluto en adultos?", 
                options: ["Fractura en rodete", "Fractura de Colles", "Fractura de tercio distal aislada", "Fracturas de Galeazzi y Monteggia"], 
                answer: 3, 
                justification: "Justificación: Las lesiones que involucran diáfisis asociada a luxaciones (radio distal en Galeazzi, cúpula radial proximal en Monteggia) son intrínsecamente inestables y jamás consolidan bien con manejo cerrado en adultos. De acuerdo a la GPC de Fracturas de Antebrazo, estas se enlistan como absolutas para cirugía.<br><br>Perla ENARM: \"Fracturas que necesitan tratamiento quirúrgico: ... Fracturas de Galeazzi y Monteggia\".<br><br>Análisis de Distractores: Las fracturas en rodete (A) son pediátricas e incompletas, con indicación conservadora habitual. Las fracturas de Colles (B) son de la metáfisis radial distal (otra patología y otra guía). Las fracturas aisladas no desplazadas (C) podrían tener chance de inmovilización conservadora bajo estrecha vigilancia.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, Página 20." 
            },
            {
                id: 7, 
                question: "Ante la sospecha clínica aguda de una lesión capsuloligamentaria en la rodilla, ¿cuál es el primer estudio de gabinete que debe solicitarse para el abordaje inicial del paciente?", 
                options: ["Resonancia magnética nuclear", "Radiografías articulares simples", "Ultrasonido de partes blandas", "Tomografía axial computarizada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones Ligamentarias de Rodilla, el abordaje clínico agudo exige descartar patología ósea antes de proceder a pruebas dinámicas complejas o estudios costosos, basándose en las reglas de Ottawa o en la búsqueda de fracturas avulsivas (Segond).<br><br>Perla ENARM: \"El paso inmediato indispensable al recibir en urgencias a un paciente con sospecha de lesión capsuloligamentaria aguda es solicitar radiografías simples\".<br><br>Análisis de Distractores: La resonancia (A) es el estándar de oro para partes blandas pero jamás se pide como estudio inicial en urgencias. El ultrasonido (C) no sirve para ligamentos profundos intracapsulares de manera aguda y primaria. La tomografía (D) solo se utiliza si ya se documentó una fractura articular compleja en la radiografía inicial que requiera planeación preoperatoria.", 
                source: "GPC IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Algoritmos, Página 34." 
            },
            {
                id: 8, 
                question: "En la clasificación y elección anatómica de las prótesis totales de rodilla, ¿qué característica fundamental distingue a una prótesis \"estabilizada\" en la técnica quirúrgica?", 
                options: ["Preserva ligamento cruzado posterior", "Retira ligamento cruzado posterior", "Emplea solo injerto óseo", "No utiliza cemento óseo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Tratamiento con Artroplastia Total de Rodilla, en pacientes con deformidades angulares muy severas donde no es posible balancear los ligamentos, se reseca el cruzado posterior y la estabilización sagital la asume el diseño central (poste) de la prótesis estabilizada.<br><br>Perla ENARM: \"Prótesis totales de rodilla: se clasifican en prótesis que preservan el ligamento cruzado posterior (no estabilizada) y en las que se retira el ligamento cruzado posterior (estabilizadas)\".<br><br>Análisis de Distractores: La prótesis que preserva el ligamento cruzado posterior se llama \"no estabilizada\". El uso de injerto o la decisión de usar cemento no definen el término \"estabilizado\" de la prótesis, el cual es puramente mecánico-ligamentario.", 
                source: "GPC-IMSS-435-18, Tratamiento con Artroplastia Total de Rodilla en Pacientes Mayores de 60 años, 2018, Glosario, Página 107." 
            },
            {
                id: 9, 
                question: "¿Cuál es el factor de riesgo farmacológico con mayor asociación a caídas y fractura intracapsular del extremo proximal del fémur reportado por la GPC?", 
                options: ["Anticoagulantes orales", "Inhibidores de bomba", "Benzodiazepinas y antiepilépticos", "Bloqueadores de calcio"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas Intracapsulares de Fémur, la etiología obedece a mecanismos de baja energía vinculados a factores que alteran el equilibrio y la fuerza. Estos fármacos deprimen el sistema nervioso central, merman los reflejos y facilitan el abatimiento motor.<br><br>Perla ENARM: \"Factores adicionales a los anteriores son el consumo de benzodiazepinas, uso de medicamentos antiepilépticos e hipotiroidismo\".<br><br>Análisis de Distractores: Los anticoagulantes (A) empeoran el sangrado, pero no causan directamente la caída. Los inhibidores de bomba (B) se asocian crónicamente a osteoporosis, pero la guía resalta primariamente a los neuromoduladores. Los bloqueadores de calcio (D) causan hipotensión, pero la GPC es textual con la opción C.", 
                source: "GPC IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Justificación, Página 8." 
            },
            {
                id: 10, 
                question: "En la fisiopatología de la fractura de antebrazo, ¿qué movimiento funcional complejo se busca preservar prioritariamente asumiendo al antebrazo como una sola articulación según la GPC?", 
                options: ["Flexoextensión del codo", "Oposición del pulgar", "Pronosupinación", "Desviación radial cubital"], 
                answer: 2, 
                justification: "Justificación: La conexión anatómica a través de la membrana interósea obliga a que ambos huesos giren sincrónicamente; cualquier discrepancia en longitud, eje o rotación arruina la función de la extremidad. De acuerdo a la GPC de Fracturas de Antebrazo, esta es la base biomecánica para preferir la osteosíntesis.<br><br>Perla ENARM: \"La destreza de la extremidad superior depende de la anatomía del antebrazo para realizar de forma combinada la rotación, específicamente los movimientos de prono-supinación\".<br><br>Análisis de Distractores: La flexoextensión (A) concierne principalmente a la articulación humero-cubital (codo puro). La desviación (D) y oposición (B) conciernen a los huesos del carpo y mano. La pronosupinación es la función nativa primaria del conjunto radiocubital diafisario.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Fisiopatología, Página 12." 
            },
            {
                id: 11, 
                question: "Utilizando la clasificación de la American Medical Association para las lesiones de los ligamentos colaterales de la rodilla, ¿cómo se clasifica a un paciente con una apertura de 7 milímetros en la prueba de estrés en valgo?", 
                options: ["Lesión ligamentaria grado I", "Lesión ligamentaria grado II", "Lesión ligamentaria grado III", "Lesión ligamentaria grado IV"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones Ligamentarias de Rodilla, la medición milimétrica de la apertura del espacio articular (bostezo) con la rodilla en flexión de 30° correlaciona de forma directa con la severidad del desgarro capsuloligamentario.<br><br>Perla ENARM: \"Las lesiones ligamentarias laterales y mediales de la rodilla se clasifica de la siguiente manera... Grado II: apertura de 5 a 10 mm\".<br><br>Análisis de Distractores: El Grado I (A) corresponde a una apertura menor (0 a 5 mm). El Grado III (C) define la ruptura completa con una apertura francamente inestable mayor a 10 mm. El Grado IV (D) no existe en esta clasificación de la American Medical Association.", 
                source: "GPC IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Pruebas diagnósticas, Página 14." 
            },
            {
                id: 12, 
                question: "Utilizando la clasificación de Kellgren-Lawrence modificada para gonartrosis, ¿cómo se clasifica a un paciente cuyas radiografías muestran grandes osteofitos, esclerosis severa y apariencia de \"hueso con hueso\"?", 
                options: ["Grado I", "Grado II", "Grado III", "Grado IV"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Tratamiento con Artroplastia Total de Rodilla, el Grado IV representa el daño terminal del cartílago articular donde el espacio fémoro-tibial desaparece por completo, justificando clínica y radiológicamente el reemplazo articular.<br><br>Perla ENARM: \"Grado IV: Osteofitos grandes, marcada pérdida del espacio articular, esclerosis severa y marcada deformidad de las epífisis de los huesos. Apariencia de hueso-hueso\".<br><br>Análisis de Distractores: El Grado I muestra dudosa disminución del espacio. El Grado II presenta osteofitos definidos pero con espacio conservado. El Grado III presenta esclerosis y pérdida del espacio, pero no la obliteración total (\"hueso con hueso\") que define al estadio terminal IV.", 
                source: "GPC-IMSS-435-18, Tratamiento con Artroplastia Total de Rodilla en Pacientes Mayores de 60 años, 2018, Cuadros o figuras, Página 72." 
            },
            {
                id: 13, 
                question: "En la fractura intracapsular del extremo proximal del fémur, ¿cuál es el sitio anatómico vascular lesionado que describe la GPC para explicar el alto riesgo de falla biológica (necrosis)?", 
                options: ["Vasos ilíacos internos", "Arteria femoral profunda", "Vasos pudendos internos", "Vasos retinaculares e intraóseos"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Fracturas Intracapsulares de Fémur, la precariedad de la red arterial cefálica recae en que atraviesa íntimamente la cápsula y discurre por el cuello óseo; cuando éste se desplaza o angula, las arterias se estiran o cercenan causando isquemia y necrosis avascular irreversible de la cabeza femoral.<br><br>Perla ENARM: \"En una fractura intracapsular se dañan los vasos retinaculares e intraóseos, y puede además lesionarse la arteria del ligamento redondo; lo cual impide la consolidación normal y facilita la necrosis isquémica de la cabeza femoral\".<br><br>Análisis de Distractores: La arteria femoral profunda (B), ilíacos (A) o pudendos (C) son gruesos troncos distantes al espacio intracapsular estricto; su daño representaría un trauma pélvico masivo con riesgo de exanguinación directa, no de necrosis aséptica diferida de la cabeza del fémur.", 
                source: "GPC IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Justificación, Página 7."

                options: ["Tomografía computarizada", "Radiografía anteroposterior y lateral", "Resonancia magnética", "Radiografía oblicua"], 
                answer: 1, 
                justification: "Justificación: El abordaje del trauma apendicular inicia siempre con proyecciones ortogonales simples, que deben incluir las articulaciones adyacentes para descartar luxaciones (Monteggia/Galeazzi). De acuerdo a la GPC de Fracturas de Antebrazo, este es el tamizaje ineludible.<br><br>Perla ENARM: \"Ante la sospecha de fractura de antebrazo solicitar en forma inicial radiografía simple con proyecciones anteroposterior y lateral del antebrazo\".<br><br>Análisis de Distractores: La tomografía computarizada (A) se reserva solo para casos complejos articulares o conminución severa. Las proyecciones oblicuas (D) se piden solo si hay duda diagnóstica tras las proyecciones iniciales. La resonancia magnética (C) no tiene lugar en el abordaje agudo inicial del trauma óseo de este tipo.", 
                source: "GPC IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Pruebas Diagnósticas, Página 15."

        function setupEventListeners() {

                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';

            });

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-red-100 text-red-700 border-red-300 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-orange-50 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-orange-100 dark:border-orange-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-orange-50 has-[:checked]:border-orange-400 dark:has-[:checked]:bg-orange-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-orange-600 focus:ring-orange-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-orange-600 dark:hover:bg-orange-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-red-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-red-50 border-red-200 dark:bg-red-900/20 dark:border-red-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-red-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-red-800 dark:text-red-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-orange-600 to-red-600 hover:from-red-600 hover:to-orange-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExTYO15Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExTYO15LastQId', currentQuestionId);
                else localStorage.removeItem('ExTYO15LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExTYO15Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
