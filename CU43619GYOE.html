    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el trimestre de la gestación que presenta la mayor incidencia para el desarrollo de apendicitis aguda?",
        options: ["Primer trimestre", "Segundo trimestre", "Tercer trimestre", "Puerperio inmediato"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, los cambios de adaptación anatómica y el volumen uterino influyen en la patología apendicular, haciendo que este periodo concentre la mayoría de los casos.<br><br>Perla ENARM: \"La apendicitis aguda, es más común en el segundo trimestre del embarazo.\"<br><br>Análisis de Distractores: El primer trimestre se asocia fuertemente al embarazo ectópico roto. El tercer trimestre es el de mayor riesgo para infarto agudo del miocardio y complicaciones de crisis hipertensiva. El puerperio inmediato se asocia al colapso por embolia de líquido amniótico y hemorragia.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Apendicitis y embarazo, Página 13."
    },
    {
        id: 2,
        question: "Debido a los cambios anatómicos por el aumento del volumen uterino, ¿hacia qué región anatómica migra y se localiza característicamente el dolor de apendicitis aguda en el tercer trimestre?",
        options: ["Hipogastrio", "Fosa iliaca izquierda", "Hipocondrio derecho", "Epigastrio"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, el útero grávido desplaza el ciego y el apéndice en dirección cefálica, modificando el punto clásico de dolor y requiriendo un alto índice de sospecha por parte del médico.<br><br>Perla ENARM: \"El aumento del volumen uterino en el segundo y tercer trimestre de la gestación puede causar la migración caudal del apéndice, por lo que el dolor en caso de apendicitis puede presentarse en la fosa iliaca o hipocondrio derechos.\"<br><br>Análisis de Distractores: El epigastrio puede doler en presentaciones atípicas o crisis hipertensivas graves (epigastralgia). El hipogastrio y la fosa iliaca izquierda no corresponden al eje de migración anatómica de la estructura apendicular durante la gestación.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Apendicitis y embarazo, Página 13."
    },
    {
        id: 3,
        question: "Ante una paciente embarazada con sospecha clínica de apendicitis aguda, ¿cuál es el primer estudio de imagen que debe solicitarse para abordar el diagnóstico?",
        options: ["Resonancia magnética", "Tomografía computarizada", "Radiografía de abdomen", "Ultrasonido abdominal"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, es el método más seguro por su carencia de radiación ionizante, permitiendo evaluar la estructura tubular apendicular inicial.<br><br>Perla ENARM: \"En mujeres embarazadas con dolor abdominal, se recomienda utilizar el ultrasonido como primer estudio de imagen diagnóstica.\"<br><br>Análisis de Distractores: La resonancia magnética es el estándar de oro si el ultrasonido inicial resulta no concluyente. La tomografía computarizada se restringe a casos donde la resonancia no está disponible. La radiografía de abdomen no tiene utilidad para este cuadro agudo en el embarazo.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Apendicitis y embarazo, Página 14."
    },
    {
        id: 4,
        question: "Para integrar de forma objetiva el diagnóstico de hiperémesis gravídica junto con la presencia de náuseas y vómitos incoercibles, ¿qué porcentaje de pérdida del peso pregestacional debe documentarse?",
        options: [">2%", ">5%", ">10%", ">15%"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, el escrutinio de esta entidad demanda una medición física tangible que compruebe la severidad metabólica y la intolerancia oral franca de la gestante.<br><br>Perla ENARM: \"Se recomienda realizar el diagnóstico de hiperémesis gravídica ante la presencia de náuseas y vómitos incoercibles en el embarazo, acompañado de pérdida mayor al 5% del peso pregestacional, deshidratación y/o alteraciones electrolíticas.\"<br><br>Análisis de Distractores: Las opciones >2%, >10% y >15% son valores inventados clínicamente como distractores para el límite de pérdida ponderal. Solo el >5% obliga a iniciar el protocolo de corrección metabólica de urgencia intrahospitalario.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Hiperémesis gravídica, Página 25."
    },
    {
        id: 5,
        question: "¿Cuál es el grupo farmacológico de primera línea recomendado para el manejo sintomático de la náusea y el vómito en una paciente con hiperémesis gravídica?",
        options: ["Antagonistas 5-HT3", "Corticoesteroides", "Antihistamínicos", "Fenotiazinas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, los inhibidores de los receptores H1 poseen el perfil de seguridad y eficacia más alto para iniciar el abordaje farmacológico materno sin exponer al feto a mayores riesgos en la embriogénesis.<br><br>Perla ENARM: \"Para el manejo de la náusea y vómito, se sugiere emplear como fármaco de primera línea, los antihistamínicos (inhibidores de receptores H1).\"<br><br>Análisis de Distractores: Los antagonistas 5-HT3 como el ondansetrón o procinéticos como metoclopramida son el segundo escalón en caso de falla a primera línea. Los corticoesteroides se reservan para fracaso farmacológico total. Las fenotiazinas no figuran en las opciones directas del algoritmo primario.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Hiperémesis gravídica, Página 27."
    },
    {
        id: 6,
        question: "En una paciente ingresada por hiperémesis gravídica grave, ¿qué fármaco preventivo debe administrarse obligatoriamente previo a la infusión de soluciones intravenosas con dextrosa?",
        options: ["Ondansetrón", "Metoclopramida", "Hidrocortisona", "Tiamina"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, el metabolismo agudo de los carbohidratos aportados en la dextrosa consume las reservas críticas de vitamina B1, precipitando el daño neurológico irreversible conocido como encefalopatía de Wernicke.<br><br>Perla ENARM: \"Se recomienda la suplementación con tiamina (oral o intravenosa) a todas las mujeres con hiperémesis gravídica grave, en el momento de su hospitalización y previo a la administración de dextrosa o nutrición parenteral.\"<br><br>Análisis de Distractores: Ondansetrón y metoclopramida actúan en los síntomas digestivos pero no detienen la neurotoxicidad metabólica. La hidrocortisona es para vómitos refractarios, no protege contra la encefalopatía secundaria a glucosa rápida.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Hiperémesis gravídica, Página 27."
    },
    {
        id: 7,
        question: "¿Qué cifras tensionales y durante qué periodo mínimo de tiempo confirman la instauración clínica de una crisis hipertensiva en el embarazo?",
        options: ["≥140/90 mmHg por ≥10 minutos", "≥150/100 mmHg por ≥20 minutos", "≥160/110 mmHg por ≥15 minutos", "≥180/120 mmHg por ≥30 minutos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, este punto de corte sostenido sobrepasa la autorregulación cerebral fisiológica de la mujer embarazada, marcando la frontera de daño a órgano blanco inminente.<br><br>Perla ENARM: \"En mujeres gestantes o puérperas, se recomienda establecer el diagnóstico de crisis hipertensiva ante la presencia de dos cifras tensionales iguales o mayores de 160/110 mmHg en un lapso igual o mayor a 15 minutos.\"<br><br>Análisis de Distractores: ≥140/90 es diagnóstico de hipertensión sin criterios de severidad (no es crisis). Los cortes de ≥150/100 y ≥180/120 son opciones distractivas que no se ajustan a la normativa cronométrica y de presión de la guía.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Crisis hipertensiva en el embarazo, Página 17."
    },
    {
        id: 8,
        question: "¿Cuál es el fármaco de primera línea administrado por vía oral que se recomienda para el tratamiento inmediato de la crisis hipertensiva en la paciente gestante?",
        options: ["Alfametildopa", "Nifedipino", "Labetalol", "Hidralazina"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, este calcioantagonista de liberación inmediata genera un control rápido y efectivo de la tensión arterial previniendo las hemorragias cerebrovasculares.<br><br>Perla ENARM: \"Para el tratamiento inicial de la crisis hipertensiva en el embarazo se podrá considerar como fármacos de primera línea al nifedipino de liberación inmediata vía oral o hidralazina intravenosa.\"<br><br>Análisis de Distractores: La hidralazina es de primera línea pero su vía principal aguda es intravenosa, no oral. La alfametildopa es para control crónico ambulatorio. El labetalol requiere administración intravenosa continua y monitorización estrecha como alternativa.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Crisis hipertensiva en el embarazo, Página 18."
    },
    {
        id: 9,
        question: "En una paciente cursando con crisis hipertensiva ya estabilizada y con pruebas de bienestar fetal normales, ¿por debajo de qué edad gestacional indica la GPC considerar el manejo expectante?",
        options: ["<32 semanas", "<34 semanas", "<36 semanas", "<37 semanas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, si no hay compromiso orgánico inminente ni sufrimiento fetal, prolongar el embarazo hasta esta barrera permite la maduración pulmonar y mejora los desenlaces perinatales en cuidados intensivos neonatales.<br><br>Perla ENARM: \"Se recomienda considerar el manejo expectante en mujeres con embarazo menor de 34 semanas con diagnóstico de crisis hipertensiva, siempre y cuando la paciente cuente con los criterios de selección necesarios.\"<br><br>Análisis de Distractores: Una vez superadas las 34 semanas, la guía ordena el nacimiento inmediato ante crisis estabilizada (opciones C y D son erróneas). Las 32 semanas indican prematurez, pero el corte oficial que sopesa los riesgos y dicta la interrupción protocolaria es a las 34 semanas.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Crisis hipertensiva en el embarazo, Página 20."
    },
    {
        id: 10,
        question: "En la evaluación del área de urgencias de una paciente con cuadro de dolor abdominal agudo en fosa iliaca y prueba de embarazo positiva, ¿cuál es el estudio de imagen de elección inicial para confirmar un embarazo ectópico tubárico?",
        options: ["Tomografía computarizada", "Resonancia magnética", "Ultrasonido abdominal", "Ultrasonido endovaginal"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, esta modalidad permite una visualización temprana y directa de los anexos, identificando sacos gestacionales con o sin embrión fuera del endometrio, así como líquido libre en saco de Douglas.<br><br>Perla ENARM: \"Se recomienda el uso del ultrasonido endovaginal como la herramienta diagnóstica de elección para el diagnóstico de embarazo ectópico tubárico.\"<br><br>Análisis de Distractores: El ultrasonido abdominal se prefiere para apendicitis aguda obstétrica. La resonancia magnética confirma apéndices de difícil visualización o etiologías pélvicas dudosas no urgentes. La tomografía computarizada implica radiación severa no justificada.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Embarazo ectópico roto, Página 21."
    },
    {
        id: 11,
        question: "Durante el tratamiento quirúrgico urgente de un embarazo ectópico roto con inestabilidad, si se observa que la salpinge contralateral se encuentra macroscópicamente sana, ¿qué intervención resolutiva recomienda el documento?",
        options: ["Salpingostomía", "Salpingectomía", "Histerectomía", "Ooforectomía"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, la remoción completa de la trompa fallida protege a la paciente del riesgo de trofoblasto persistente y hemorragia recurrente, preservando íntegra la fertilidad en el anexo funcional opuesto.<br><br>Perla ENARM: \"En presencia de una salpinge contralateral sana se recomienda realizar salpingectomía en vez de salpingostomía.\"<br><br>Análisis de Distractores: La salpingostomía (conservadora) está proscrita ante el anexo roto si la otra trompa sirve, ya que incrementa la recurrencia local. Ooforectomía y la histerectomía resultan mutilantes y desproporcionadas para esta patología exclusiva de la trompa de Falopio.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Embarazo ectópico roto, Página 22."
    },
    {
        id: 12,
        question: "¿Cuáles son los tres signos clínicos que en conjunto integran la tríada clásica de presentación sospechosa ante un embarazo ectópico roto?",
        options: ["Fiebre, leucocitosis y dolor pélvico", "Hipertensión, proteinuria y edema", "Náuseas, vómitos e intolerancia", "Amenorrea, dolor abdominal y sangrado"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, la irrupción en edad reproductiva de cese menstrual junto con disrupción peritoneal y hemorragia vaginal activan instantáneamente el algoritmo de manejo en choque hipovolémico obstétrico.<br><br>Perla ENARM: \"Los signos y síntomas más comunes de embarazo ectópico roto son la triada clásica de amenorrea, dolor abdominal y sangrado transvaginal, en presencia de una prueba de embarazo positiva.\"<br><br>Análisis de Distractores: Fiebre y leucocitosis sugieren enfermedad pélvica inflamatoria o apendicitis. Hipertensión y proteinuria son la antigua tríada de la preeclampsia. Las náuseas severas son el pivote de la hiperémesis gravídica.",
        source: "GPC-IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Embarazo ectópico roto, Página 20."
    },
    {
        id: 13,
        question: "Al evaluar un colapso materno súbito catalogado como embolia de líquido amniótico, ¿qué complicación de orden hematológico temprana es un criterio estricto e indispensable para el diagnóstico?",
        options: ["Trombocitopenia gestacional", "Hemólisis microangiopática", "Coagulación intravascular diseminada", "Trombosis venosa profunda"],
        answer: 2,

                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="DU02008GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoCUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoCULastQId', currentQuestionId);
                else localStorage.removeItem('gyoCULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoCUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
