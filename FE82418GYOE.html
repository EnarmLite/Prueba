    <script>

        const questionsData = [
    {
        id: 1,
        question: "Mujer acude a consulta por presentar inflamación y eritema en su cicatriz de cesárea. ¿Hasta cuántos días posteriores al procedimiento se clasifica como infección del sitio quirúrgico?",
        options: ["14 días", "21 días", "30 días", "42 días"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, el marco temporal es estricto e independiente del alta médica.<br><br>Perla ENARM: \"Infección de localización quirúrgica: secreción purulenta, absceso o celulitis difusa en el sitio de la intervención quirúrgica en el curso de un mes posterior a la cirugía\".<br><br>Análisis de Distractores: 14 y 21 días son ventanas tempranas incompletas para la vigilancia. 42 días corresponde a la duración total del puerperio, pero no a la definición técnica de infección de sitio quirúrgico.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 13."
    },
    {
        id: 2,
        question: "Evalúa a una mujer embarazada para estimar su riesgo de complicaciones intra y posquirúrgicas. ¿Qué hallazgo clínico incrementa de 2 a 7 veces el riesgo de infección de herida quirúrgica?",
        options: ["Hemoglobina ≤ 10 g/dl", "Índice de masa corporal ≥ 35", "Tensión arterial ≥ 140/90 mmHg", "Glucosa en ayuno ≥ 126 mg/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, la obesidad mórbida es uno de los predictores endógenos más fuertes.<br><br>Perla ENARM: \"El personal de enfermería deberá valorar la somatometría durante el control prenatal, el índice de masa corporal de las pacientes embarazadas ya que de 35 o más, tienen un riesgo de infección de herida quirúrgica de 2 a 7 veces más\".<br><br>Análisis de Distractores: La anemia, hipertensión y diabetes son factores de riesgo endógenos reales para infección, pero solo el Índice de Masa Corporal ≥ 35 tiene la cuantificación de riesgo específica documentada.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 11."
    },
    {
        id: 3,
        question: "Valora a una mujer en puerperio mediato con eritema en el sitio de incisión. Identifica un antecedente obstétrico de alto riesgo para el desarrollo de esta complicación.",
        options: ["Distocia de hombros", "Oligohidramnios severo", "Ruptura prematura de membranas", "Periodo intergenésico corto"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, los eventos infecciosos o de colonización previos al nacimiento contaminan el campo quirúrgico.<br><br>Perla ENARM: \"El personal de enfermería deberá identificar factores de riesgo para la infección de herida quirúrgica, principalmente cuando existan antecedentes de trabajo de parto previo o ruptura prematura de membranas\".<br><br>Análisis de Distractores: La distocia de hombros, oligohidramnios y el periodo intergenésico corto son riesgos o complicaciones obstétricas, pero no son factores directos predisponentes a la infección bacteriana de la pared abdominal.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 11."
    },
    {
        id: 4,
        question: "Revisa el reporte quirúrgico de una paciente que cursó con celulitis difusa post cesárea. ¿Qué material de cierre subcuticular se asocia de forma directa con un mayor riesgo de infección?",
        options: ["Grapas quirúrgicas", "Sutura de poliglactina 910", "Sutura de polipropileno", "Adhesivo tisular"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, el material metálico de engrapado es un factor de riesgo exógeno de alto impacto para colonización.<br><br>Perla ENARM: \"El personal de enfermería deberá valorar datos de infección en pacientes con herida donde se utilizaron grapas ya que esta se asocia con un mayor riesgo de infección de la herida quirúrgica\".<br><br>Análisis de Distractores: Las suturas absorbibles, no absorbibles o los adhesivos tisulares tienen perfiles de bioseguridad aceptables y no se asocian con un aumento directo y documentado del riesgo en comparación a las grapas.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 19."
    },
    {
        id: 5,
        question: "Valora a una mujer en su séptimo día post cesárea. ¿Cuáles son los signos clínicos que establecen el diagnóstico inmediato de herida quirúrgica infectada?",
        options: ["Flogosis, crepitación, bulas y necrosis", "Fiebre, taquicardia, leucocitosis y secreción", "Dolor, inflamación, enrojecimiento y calor", "Dehiscencia, sangrado, equimosis y edema"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, el diagnóstico temprano es eminentemente clínico, táctil y focalizado.<br><br>Perla ENARM: \"El personal de enfermería deberá valorar e identificar los siguientes síntomas para el diagnóstico de infección de la herida quirúrgica post cesárea: Dolor, Inflamación, Enrojecimiento, Calor de herida quirúrgica\".<br><br>Análisis de Distractores: La opción A sugiere afección profunda tipo fascitis necrotizante. La opción B incluye datos sistémicos que no son obligatorios para el diagnóstico inicial. La opción D indica complicaciones mecánicas estériles.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 15."
    },
    {
        id: 6,
        question: "Prepara a una paciente para una cesárea electiva. ¿Qué solución antiséptica está indicada para la preparación óptima de la piel en el área quirúrgica?",
        options: ["Cloruro de benzalconio acuoso", "Clorhexidina o yodopovidona alcoholada", "Peróxido de hidrógeno al 3%", "Hipoclorito de sodio diluido"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, la antisepsia preoperatoria debe realizarse preferentemente con soluciones a base de alcohol para mayor eficacia bactericida.<br><br>Perla ENARM: \"El personal de enfermería utilizará clorhexidina, iodo-povidona (isodine), solución yodada con base alcoholada, para la preparación de la piel en el área quirúrgica de forma preoperatoria\".<br><br>Análisis de Distractores: El peróxido y el hipoclorito son agentes cáusticos para limpieza de superficies, no para antisepsia prequirúrgica de rutina. El cloruro de benzalconio no tiene la evidencia profiláctica de primera línea requerida.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 14."
    },
    {
        id: 7,
        question: "Indica profilaxis antibiótica preoperatoria a una mujer programada para cesárea electiva. ¿Cuál es el fármaco de elección recomendado?",
        options: ["Ampicilina en dosis única", "Ceftriaxona en dosis múltiple", "Ciprofloxacino en dosis única", "Meropenem en infusión continua"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, el espectro farmacológico debe cubrir la flora predominante con el menor riesgo posible de resistencia.<br><br>Perla ENARM: \"El personal de enfermería deberá ministrar previa indicación médica profilaxis antibiótica para la prevención de una infección de herida quirúrgica: ampicilina o cefalosporina de 1ª generación, en dosis única\".<br><br>Análisis de Distractores: Ceftriaxona y Meropenem son esquemas de amplio espectro para uso terapéutico, no para prevención rutinaria. Ciprofloxacino no es el agente de primera línea y su uso está limitado en embarazadas.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 17."
    },
    {
        id: 8,
        question: "Una paciente programada para cesárea requiere profilaxis antibiótica, pero tiene antecedente de anafilaxia severa a la penicilina. ¿Qué fármaco está indicado en este escenario?",
        options: ["Clindamicina", "Gentamicina", "Cefazolina", "Vancomicina"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, las alternativas deben evitar reacciones cruzadas mortales manteniendo la cobertura microbiológica necesaria.<br><br>Perla ENARM: \"Si la paciente es alérgica a la penicilina se puede utilizar clindamicina o eritromicina\".<br><br>Análisis de Distractores: La cefazolina tiene riesgo de reactividad cruzada en alergias anafilácticas a la penicilina. La gentamicina carece de cobertura adecuada para anaerobios. La vancomicina se reserva estrictamente para brotes documentados de bacterias multirresistentes.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 17."
    },
    {
        id: 9,
        question: "¿En qué momento exacto debe administrar la dosis de profilaxis antibiótica para maximizar su efectividad en la prevención de la morbilidad post cesárea?",
        options: ["En las primeras 2 horas postoperatorias", "Antes de la incisión cutánea", "Inmediatamente al extraer la placenta", "Durante el lavado quirúrgico"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, el antibiótico debe alcanzar concentraciones tisulares máximas justo antes de la disrupción de la barrera dérmica.<br><br>Perla ENARM: \"El personal de enfermería deberá realizar la administración profiláctica de antibióticos para prevenir la infección en la cesárea electiva, antes de la incisión cutánea o después del pinzamiento del cordón\".<br><br>Análisis de Distractores: Administrarlo horas postoperatorias o tras la extracción placentaria resulta tardío. El lavado quirúrgico es un paso simultáneo al preparativo, la referencia anatómica clave es previa a la incisión.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Evidencias y Recomendaciones, Pág. 17."
    },
    {
        id: 10,
        question: "Analiza las estadísticas de morbimortalidad materna en su hospital de alta especialidad. ¿Qué prevalencia ocupa la infección de herida quirúrgica como complicación del puerperio?",
        options: ["Primera causa", "Segunda causa", "Tercera causa", "Cuarta causa"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, conocer la posición estadística justifica la implementación vigorosa de programas de vigilancia hospitalaria.<br><br>Perla ENARM: \"Las infecciones de herida quirúrgica en pacientes gineco obstétricas son la segunda causa de complicación durante el puerperio\".<br><br>Análisis de Distractores: Las opciones alternas son numéricamente incorrectas respecto a la carga de morbimortalidad infecciosa documentada a nivel poblacional en el puerperio.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Justificación, Pág. 7."
    },
    {
        id: 11,
        question: "Una puérpera será dada de alta tras una evolución favorable de su incisión. ¿Qué medida prioritaria de autocuidado debe prescribirse para la prevención ambulatoria?",
        options: ["Lavado de manos y mantener higiene", "Reposo absoluto en cama por 7 días", "Aplicación de antibiótico tópico profiláctico", "Uso de faja abdominal compresiva estricta"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, las intervenciones higiénicas básicas son las directrices más costo-efectivas para el control intradomiciliario.<br><br>Perla ENARM: En las medidas de \"Autocuidado: Lavado de manos, Mantener higiene corporal, Seguir las precauciones de los medicamentos\".<br><br>Análisis de Distractores: El reposo absoluto fomenta patologías trombóticas. El antibiótico tópico irrita y no está indicado como profilaxis. La faja abdominal puede alterar el microclima de la cicatrización temprana.",
        source: "SS-824-18, Intervenciones de enfermería para la atención de la mujer con herida quirúrgica infectada post cesárea, 2018, Algoritmos, Pág. 20."
    },
    {
        id: 12,
        question: "Atiende a una mujer con inflamación severa en herida post cesárea de evolución tórpida. ¿Cuál es el riesgo orgánico directo de retrasar la instauración terapéutica?",
        options: ["Formación de fístula enterocutánea", "Ingreso a unidad de cuidados intensivos", "Evento vascular cerebral isquémico", "Desarrollo de endometriosis en cicatriz"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infección Post Cesárea, la omisión del tratamiento oportuno condiciona progresión bacteriológica hacia el choque séptico sistémico.<br><br>Perla ENARM: En el flujograma de decisión, una \"Evolución Desfavorable\" exige inmediatamente el paso hacia \"UCI\" por el inminente riesgo de falla orgánica y \"Muerte\".<br><br>Análisis de Distractores: Fístulas o endometriosis son complicaciones tardías. Los eventos embólicos isquémicos no derivan agudamente de forma sistemática por el retraso infeccioso local.",

    },
    {
        id: 13,
        question: "En el abordaje microbiológico de la infección de sitio quirúrgico obstétrico, ¿qué origen patogénico debe asumirse sistemáticamente como el reservorio primario?",
        options: ["Las manos del personal de salud", "Flora endógena de la paciente", "Instrumental quirúrgico contaminado", "Sistemas de ventilación hospitalaria"],

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ENF6Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ENF6LastQId', currentQuestionId);
                else localStorage.removeItem('ENF6LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ENF6Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
