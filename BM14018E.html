            <div class="flex gap-3">

    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿A partir de qué edad está indicado realizar tacto rectal en hombres asintomáticos y sin factores de riesgo genéticos o raciales?",
        options: ["40 años", "45 años", "50 años", "55 años"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, el tamizaje universal mediante exploración física en la población general busca maximizar la sensibilidad diagnóstica en el grupo etario donde la incidencia se eleva estadísticamente, evitando invasiones prematuras en glándulas de bajo riesgo.<br><br>Perla ENARM: El tacto rectal está indicado en todos los pacientes mayores de 55 años, en pacientes con sintomatología urinaria baja sin importar la edad y en pacientes asintomáticos pero con factores de riesgo.<br><br>Análisis de Distractores: Las opciones A y C establecen edades correspondientes al escrutinio bioquímico basal (APE), pero no para la exploración digital obligatoria en población sin riesgo. La opción B no figura como un punto de corte normativo para el tacto rectal universal.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Prevención, Página 14."
    },
    {
        id: 2,
        question: "¿Qué factor dietético presenta una asociación significativa con el incremento de riesgo para desarrollar la enfermedad en una etapa avanzada?",
        options: ["Carbohidratos refinados", "Grasas saturadas", "Proteínas de soya", "Fibra dietética"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, el microambiente sistémico rico en lípidos y el tejido adiposo promueven marcadores proinflamatorios que estimulan el crecimiento y la agresividad de las células prostáticas neoplásicas.<br><br>Perla ENARM: Existe una asociación significativa entre el consumo de grasas saturadas y el aumento en el riesgo de cáncer de próstata avanzado; también se ha encontrado asociación con la ingesta elevada de calcio.<br><br>Análisis de Distractores: Los carbohidratos (opción A) se asocian a síndrome metabólico general pero no son el marcador dietético de mayor impacto oncológico prostático. Las proteínas vegetales y la fibra (opciones C y D) no representan factores de riesgo; históricamente se han evaluado como protectores.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Prevención, Página 13."
    },
    {
        id: 3,
        question: "¿En qué rango de edad se recomienda realizar la determinación basal del Antígeno Prostático Específico para planear el escrutinio individualizado futuro?",
        options: ["30 a 40 años", "40 a 50 años", "50 a 60 años", "60 a 70 años"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, establecer un nivel de referencia bioquímico temprano en la vida del adulto actúa como un potente predictor a largo plazo, permitiendo definir la frecuencia con la que el paciente requerirá estudios de seguimiento en las próximas décadas.<br><br>Perla ENARM: Se recomienda la determinación de un APE basal entre los 40 a 50 años; posteriormente se sugiere planear el tamizaje según resultados y decisión compartida entre el médico-paciente.<br><br>Análisis de Distractores: La opción A expone a la población a mediciones prematuras sin beneficio demostrado. Las opciones C y D superan la ventana de oportunidad óptima para trazar la curva de riesgo basal antes de la aparición de picos oncológicos habituales.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Prevención, Página 14."
    },
    {
        id: 4,
        question: "¿Qué hallazgo serológico confirmado establece una indicación absoluta para realizar una biopsia transrectal independiente de la exploración física?",
        options: ["≥ 4 ng/ml", "≥ 6 ng/ml", "> 10 ng/ml", "> 20 ng/ml"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, al superar este umbral la probabilidad de albergar una neoplasia maligna aumenta exponencialmente (probabilidad > 67%), por lo que es mandatorio proceder a la confirmación histológica tras descartar infecciones o trauma.<br><br>Perla ENARM: Es recomendable realizar biopsia transrectal a pacientes con tacto rectal anormal o APE mayor de 10 ng/ml confirmado (sin factores que condicionen elevación por otra causa diferente al cáncer de próstata).<br><br>Análisis de Distractores: Los valores de 4 y 6 ng/ml (opciones A y B) entran en la \"zona gris\", requiriendo evaluación de riesgo antes de biopsiar. Un valor > 20 ng/ml (opción D) es diagnóstico de alto riesgo oncológico, pero el límite normativo que dispara la invasión biopsica inicia desde los 10 ng/ml.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Diagnóstico, Página 15."
    },
    {
        id: 5,
        question: "Ante un paciente asintomático con tacto rectal normal y Antígeno Prostático Específico de 7 ng/ml, ¿cuál es la conducta clínica indicada de manera inicial?",
        options: ["Estratificación de riesgo", "Biopsia transrectal inmediata", "Tomografía axial computarizada", "Resección transuretral"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, los niveles de marcador entre 4 y 10 ng/ml representan una zona de incertidumbre donde etiologías benignas (crecimiento, inflamación) elevan el marcador frecuentemente. Se deben utilizar calculadoras, fracción libre o densidad antes de someter al paciente al riesgo séptico de una aguja.<br><br>Perla ENARM: Se recomienda ofrecer evaluación y estudios adicionales a hombres asintomáticos con un examen rectal digital normal y un nivel de antígeno prostático específico (PSA) entre 4-10 ng/ml antes de realizar una biopsia de próstata.<br><br>Análisis de Distractores: La biopsia (opción B) directa resulta en sobretratamiento invasivo innecesario en este umbral. La tomografía (opción C) no es útil para escrutinio glandular, sino para etapificación avanzada. La resección transuretral (opción D) es un tratamiento quirúrgico para obstrucción benigna, no un método de cribado.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Diagnóstico, Página 16."
    },
    {
        id: 6,
        question: "¿Cuál es la medida farmacológica indicada invariablemente para prevenir sepsis previo a la realización de una biopsia transrectal?",
        options: ["Heparina de bajo peso", "Profilaxis con antibiótico", "Suspensión de ácido acetilsalicílico", "Administración de enema evacuante"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, la punción a través de la mucosa rectal, altamente contaminada por microbiota fecal, hacia el tejido prostático estéril condiciona un riesgo absoluto de bacteriemia o infección fulminante si el paciente no cuenta con barrera antimicrobiana.<br><br>Perla ENARM: Se debe utilizar profilaxis con antibiótico vía oral o intravenosa en pacientes a los que se les realizará biopsia transrectal de próstata.<br><br>Análisis de Distractores: La anticoagulación (opción A) incrementa el sangrado. La GPC establece textualmente que no se requiere suspender la dosis baja de aspirina (opción C), ni es obligatorio el uso de enemas evacuantes (opción D) para prevenir infecciones.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Diagnóstico, Página 17."
    },
    {
        id: 7,
        question: "Al realizar una biopsia de próstata guiada por ultrasonido por primera vez, ¿cuántos núcleos se deben tomar mediante técnica extendida para maximizar la detección tumoral?",
        options: ["6 núcleos", "8 núcleos", "12 núcleos", "24 núcleos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, los mapeos clásicos en sextantes (6 punciones) omitían carcinomas alojados en las caras laterales y apicales. Aumentar el muestreo estandarizado a esta cifra eleva la concordancia anatomopatológica hasta un 85% respecto a la pieza quirúrgica final.<br><br>Perla ENARM: Se recomienda utilizar una metodología sistemática de muestreo de 12 tomas que incorpore las zonas laterales y apical de la próstata para lograr la máxima detección de cáncer.<br><br>Análisis de Distractores: El muestreo en sextantes (opción A) y octantes (opción B) causa subestadificación severa y está obsoleto como técnica inicial. La saturación prostática (opción D, 24 núcleos) está reservada para abordajes transperineales complejos o re-biopsias muy específicas, no como abordaje primario.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Diagnóstico, Página 17."
    },
    {
        id: 8,
        question: "En un paciente con biopsia previa negativa y elevación persistente del antígeno prostático, ¿cuál es el estudio de imagen de elección para identificar focos sospechosos antes de reintervenir?",
        options: ["Ultrasonido transperineal", "Tomografía por emisión de positrones", "Gammagrama óseo", "Resonancia magnética multiparamétrica"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, cuando los cilindros sistemáticos a ciegas fallan, es necesario localizar metabólica y morfológicamente zonas tumorales ocultas (ej. cara anterior) para guiar de manera directa la aguja de fusión, aumentando drásticamente el rendimiento celular maligno.<br><br>Perla ENARM: Es recomendable realizar una resonancia magnética multi paramétrica de próstata antes de repetir una biopsia guiada por resonancia o guiada por ultrasonido transrectal.<br><br>Análisis de Distractores: El ultrasonido aislado (opción A) posee baja resolución tisular para masas isoecoicas y ya falló en la primera biopsia. El PET y el gammagrama (opciones B y C) buscan metástasis ganglionares u óseas sistémicas, no mapean la arquitectura interna de la glándula viva.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Diagnóstico, Página 18."
    },
    {
        id: 9,
        question: "Al evaluar el reporte histopatológico, ¿qué escala celular clasifica automáticamente a un tumor dentro del grupo de Riesgo Intermedio?",
        options: ["Gleason 6", "Gleason 7", "Gleason 8", "Gleason 9"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, la morfología tisular dicta el comportamiento a distancia. Un puntaje mediano de indiferenciación acinar posiciona la biología del tumor fuera de la indolencia, prohibiendo abordajes conservadores de muy baja intervención y obligando a esquemas radicales inminentes.<br><br>Perla ENARM: Riesgo intermedio se define por la presencia de T2b y/o Gleason 7 y/o antígeno prostático 10 a 20 ng/ml.<br><br>Análisis de Distractores: El Gleason 6 (opción A) es el límite para mantener a un paciente en Bajo Riesgo oncológico. Los puntajes de 8 a 10 (opciones C y D) demuestran anaplasia severa y elevan directamente al enfermo al grupo de Alto Riesgo mortal.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Anexos, Cuadro 5, Página 42."
    },
    {
        id: 10,
        question: "Según el agrupamiento clínico TNM, ¿qué estadio define a un tumor con extensión extracapsular demostrada y ubica al paciente en Alto Riesgo?",
        options: ["T1c", "T2a", "T2c", "T3a"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, la ruptura anatómica de la barrera fibrosa glandular hacia la pelvis representa una fuga agresiva local. Clínicamente esto impide la curación mediante extirpación simple, requiriendo supresión hormonal sistémica junto a bloqueos masivos radioterapéuticos.<br><br>Perla ENARM: El grupo de alto riesgo se caracteriza por la presencia de al menos un parámetro: etapa clínica >T2c o T3a, Escala de Gleason 8 a 10 o Antígeno prostático > 20 ng/ml.<br><br>Análisis de Distractores: T1c (opción A) es una neoplasia invisible por imagen diagnosticada sólo por biopsia. T2a y T2c (opciones B y C) son tumores estrictamente confinados dentro de los límites de la glándula y sus lóbulos.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Anexos, Cuadro 3 y 5, Página 40."
    },
    {
        id: 11,
        question: "¿Cuál es el estudio de imagen recomendado para la estadificación inicial de metástasis apendiculares o axiales en pacientes clasificados en Alto Riesgo?",
        options: ["Resonancia magnética pélvica", "Tomografía axial computarizada", "Gammagrama óseo con tecnecio", "Radiografía simple de pelvis"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, las células malignas escapan por el sistema venoso prevertebral anidándose en la matriz esquelética de manera osteoblástica. El isótopo de tecnecio revela este recambio patológico mineral temprano en toda la anatomía del paciente.<br><br>Perla ENARM: Los pacientes con enfermedad de alto riesgo o de riesgo intermedio, deben ser estadificados para metástasis utilizando el scan óseo de tecnecio.<br><br>Análisis de Distractores: La radiografía (opción D) es el estudio menos sensible y no detecta focos agudos. La tomografía y la resonancia (opciones A y B) son los estándares obligatorios para buscar actividad en ganglios linfáticos pélvicos, pero no evalúan primariamente el esqueleto global de forma temprana funcional.",
        source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Estadificación, Página 21."
    },
    {
        id: 12,
        question: "¿Cuál es la conducta de elección para evitar sobretratamiento en un paciente con cáncer clínicamente localizado de muy bajo riesgo y expectativa de vida < 20 años?",
        options: ["Prostatectomía radical", "Radioterapia externa", "Vigilancia activa", "Bloqueo androgénico neoadyuvante"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cáncer de Próstata, intervenir quirúrgicamente tumores incipientes e inofensivos condena a individuos geriátricos a secuelas urogenitales letales para la calidad de vida, sin generar un impacto mensurable en la supervivencia global dado el comportamiento lento del tumor.<br><br>Perla ENARM: Para hombres con cáncer de próstata de muy bajo riesgo, clínicamente localizado, y con una expectativa de vida de menos de 20 años, se sugiere realizar vigilancia activa en lugar de tratamiento inmediato definitivo.<br><br>Análisis de Distractores: La cirugía de remoción y la radiación ionizante (opciones A y B) ofrecen morbilidad excesiva e injustificada en grupos donde el cáncer no será la causa de defunción. El freno hormonal aislado (opción D) no posee valor oncológico como tratamiento inicial de estadios minúsculos focales.",

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="CM17618E.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGBMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGBMLastQId', currentQuestionId);
                else localStorage.removeItem('CGBMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGBMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
