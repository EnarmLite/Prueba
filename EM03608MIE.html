    <script>
        const questionsData = [

    {
        id: 1,
        question: "¿Cuál es la alteración estructural cardiaca que define la presencia de Cor Pulmonale Crónico?",
        options: ["Hipertrofia del ventrículo derecho", "Dilatación de aurícula izquierda", "Dinfunción del ventrículo izquierdo", "Estenosis de válvula mitral"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, el aumento crónico de la resistencia del lecho vascular pulmonar genera sobrecarga de trabajo mecánico exclusivo a las cámaras derechas, resultando en remodelado anatómico compensatorio.<br><br>Perla ENARM: \"El CP se define como la hipertrofia del ventrículo derecho, dilatación o ámbas, debido a hipertensión pulmonar como resultado de enfermedades que involucran al parénquima pulmonar\".<br><br>Análisis de Distractores: La dilatación auricular izquierda, disfunción ventricular izquierda y patología valvular mitral pertenecen a trastornos del corazón izquierdo (Grupo 2), los cuales excluyen por definición el diagnóstico de esta entidad puramente pulmonar.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Aspectos Generales, Página 12."
    },
    {
        id: 2,
        question: "¿Cuál es la enfermedad subyacente que representa la causa más frecuente de Cor Pulmonale Crónico?",
        options: ["Fibrosis pulmonar idiopática", "Síndrome de apnea obstructiva", "Enfermedad pulmonar obstructiva crónica", "Tromboembolia pulmonar crónica"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, la hipoxia crónica sostenida y la destrucción alveolar generan una vasoconstricción constante, incrementando la poscarga, siendo el enfisema o bronquitis crónica la etiología epidemiológica principal.<br><br>Perla ENARM: \"La causa más frecuente de CP es la enfermedad pulmonar obstructiva crónica (EPOC) secundaria a bronquitis crónica o enfisema\".<br><br>Análisis de Distractores: La fibrosis pulmonar y el síndrome de apnea obstructiva son causas documentadas (Grupo 3) pero con menor prevalencia poblacional. La tromboembolia crónica (Grupo 4) es un mecanismo obstructivo vascular diferente y de menor incidencia global.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 3,
        question: "¿Cuál es el valor de Presión Media de la Arteria Pulmonar en reposo que define a la hipertensión pulmonar secundaria a enfermedades respiratorias?",
        options: ["≥ 15 mmHg", "≥ 20 mmHg", "≥ 25 mmHg", "≥ 30 mmHg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, el diagnóstico hemodinámico requiere comprobación de aumento de presiones en el circuito derecho mediante cateterismo, utilizando un punto de corte absoluto universal.<br><br>Perla ENARM: \"La HP secundaria a enfermedades respiratorias crónicas y que dá lugar a CP crónico, se define como la presencia de presión arteria pulmonar media (PMAP) mayor o igual a 25 mmHg en reposo\".<br><br>Análisis de Distractores: Las presiones menores a 25 mmHg no alcanzan el umbral de hipertensión. Valores de 30 mmHg o superiores indican hipertensión pero el punto de corte diagnóstico preciso validado es a partir de 25.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Aspectos Generales, Página 12."
    },
    {
        id: 4,
        question: "¿Cuál es el mecanismo fisiopatológico predominante que origina la alteración vascular en pacientes con Cor Pulmonale Crónico por neumopatía crónica?",
        options: ["Vasoconstricción pulmonar hipóxica", "Proliferación endotelial primaria", "Trombosis vascular in situ", "Dinfunción diastólica ventricular"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, la deficiencia de oxígeno en los alveolos desencadena un reflejo arteriolar que reduce el flujo hacia zonas no ventiladas, provocando un aumento sostenido de la resistencia vascular pulmonar global.<br><br>Perla ENARM: \"El mecanismo que predomina en las formas con hipoxemia está relacionado a la hipoxia alveolar la cual condiciona vasoconstricción pulmonar hipóxica, disminución de la presión arterial de oxígeno e incremento de la resistencia vascular\".<br><br>Análisis de Distractores: La proliferación endotelial primaria es típica del Grupo 1. La trombosis in situ ocurre primariamente en el Grupo 4. La disfunción diastólica ventricular pertenece a la falla cardiaca izquierda (Grupo 2).",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Aspectos Generales, Página 9."
    },
    {
        id: 5,
        question: "¿Cuál es el estudio inicial recomendado para la evaluación diagnóstica no invasiva ante la sospecha de repercusión hemodinámica derecha?",
        options: ["Gammagrama pulmonar ventilatorio perfusorio", "Ecocardiograma transtorácico", "Angiotomografía de tórax", "Cateterismo cardiaco derecho"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, las pruebas de imagen iniciales deben evaluar directamente el impacto anatómico sobre las cámaras derechas y estimar las presiones sin requerir métodos invasivos.<br><br>Perla ENARM: \"Se recomienda la realización de un ecocardiograma como parte de la evaluación diagnóstica no invasiva de sujetos con sospecha de hipertensión pulmonar\".<br><br>Análisis de Distractores: El gammagrama y la angiotomografía están dirigidos a descartar enfermedad tromboembólica venosa. El cateterismo es el estándar de oro pero es invasivo y no se realiza como abordaje inicial en todos los pacientes.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 19."
    },
    {
        id: 6,
        question: "¿Cuál parámetro ecocardiográfico se utiliza primariamente para calcular indirectamente la presión sistólica de la arteria pulmonar?",
        options: ["Excursión sistólica del anillo tricuspídeo", "Velocidad pico de regurgitación tricuspídea", "Área de la aurícula derecha", "Diámetro de vena cava inferior"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, la diferencia de presiones entre el ventrículo y la aurícula derecha durante la contracción se infiere matemáticamente usando la ecuación de Bernoulli aplicada al flujo del chorro tricuspídeo.<br><br>Perla ENARM: \"El cálculo de la presión sistólica de la arteria pulmonar (PSAP) se basa en la velocidad pico de regurgitación tricuspídea, de acuerdo a la ecuación de Bernoulli simplificada\".<br><br>Análisis de Distractores: La excursión sistólica mide la función contráctil longitudinal. El área auricular y el diámetro de la vena cava inferior estiman cambios anatómicos y presión de retorno, pero no calculan el pico de presión sistólica pulmonar directamente.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 20."
    },
    {
        id: 7,
        question: "Durante la exploración física, ¿cuál signo clínico se asocia independientemente con una menor supervivencia a 5 años?",
        options: ["Plétora yugular", "Soplo holosistólico tricuspídeo", "Reflujo hepatoyugular", "Edema de miembros inferiores"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, la falla progresiva de bomba genera estasis sistémica severa. La incapacidad de manejar volúmenes distales traduce claudicación ventricular avanzada.<br><br>Perla ENARM: \"Se recomienda hacer énfasis en la búsqueda de los siguientes signos que se asocian a hipertensión pulmonar... Edema de miembros inferiores (el cual se asocia con menor supervivencia a 5 años)\".<br><br>Análisis de Distractores: La plétora, soplo y reflujo hepatoyugular son datos universales de congestión derecha, pero la retención hídrica claudicante en miembros pélvicos está específicamente categorizada como factor deletéreo pronóstico a largo plazo.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 17."
    },
    {
        id: 8,
        question: "¿Qué hallazgo de despolarización eléctrica en el electrocardiograma se asocia con mayor mortalidad en pacientes con enfermedad pulmonar subyacente?",
        options: ["Eje de onda P ≥ 90 grados", "Amplitud de onda P > 2.5 milímetros", "Eje de onda P ≤ 60 grados", "Inversión de onda P precordial"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, el remodelado y crecimiento de la aurícula derecha ante las altas presiones desvía el vector de despolarización notoriamente hacia la derecha.<br><br>Perla ENARM: \"La presencia de un eje de P mayor de 90° en el electrocardiograma de sujetos con CP secundario a EPOC se asocia con mayor mortalidad\".<br><br>Análisis de Distractores: La amplitud alta traduce crecimiento auricular pero el eje desviado a ≥ 90 grados está estadificado como predictor formal de mortalidad. Ejes menores a 60 grados o cambios precordiales inespecíficos no tienen este valor pronóstico letal.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 18."
    },
    {
        id: 9,
        question: "¿Cuál es el criterio gasométrico de presión arterial de oxígeno que indica prescribir oxígeno suplementario continuo a largo plazo?",
        options: ["< 50 mmHg", "< 55 mmHg", "< 60 mmHg", "< 65 mmHg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, revertir el gatillo fisiopatológico es la única intervención farmacológica que altera la historia natural y la hemodinámica.<br><br>Perla ENARM: \"La terapia con oxígeno contínuo a largo plazo se recomienda en pacientes con CP cuando la presión de oxígeno en sangre arterial es menor de 60 mmHg o saturación menor de 88%\".<br><br>Análisis de Distractores: Cortar en 50 o 55 retrasa un soporte vital probado. Iniciar en 65 mmHg sobreoxigena a pacientes retenedores de CO2 sin aportar beneficio crónico normado.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 24."
    },
    {
        id: 10,
        question: "¿Cuáles fármacos están indicados como primera línea para el manejo de los signos de retención hídrica sistémica?",
        options: ["Bosentán o ambrisentán", "Furosemida o espironolactona", "Sildenafil o tadalafil", "Nifedipino o diltiazem"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, el fallo ventricular derecho culmina en estasis venosa (hepatomegalia, ascitis, edema), y su manejo sintomático primario exige descongestión mediante deplesión de volumen.<br><br>Perla ENARM: \"Se recomienda tratamiento diurético (furosemide o espironolactona) en pacientes con CP y HAP con signos de retención hídrica y falla del ventrículo derecho\".<br><br>Análisis de Distractores: Bosentán, sildenafil y nifedipino son potentes vasodilatadores del lecho arterial pulmonar, pero no facilitan la excreción renal de volumen ni resuelven el edema agudo periférico.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 24."
    },
    {
        id: 11,
        question: "¿Qué medicamento con propiedades inotrópicas está explícitamente contraindicado en pacientes puramente crónicos para evitar toxicidad?",
        options: ["Dobutamina", "Levosimendán", "Milrinona", "Digoxina"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, a diferencia del fracaso cardiaco izquierdo, los glucósidos carecen de beneficio comprobado para la fracción de expulsión derecha y la hipoxia constante disminuye su umbral tóxico arritmogénico.<br><br>Perla ENARM: \"En el tratamiento del CP por hipertensión pulmonar no se recomienda el uso de medicamentos: ... Digoxina (excepto para el tratamiento de la fibrilación auricular)\".<br><br>Análisis de Distractores: Dobutamina, levosimendán y milrinona son inotrópicos intravenosos para estados de choque, no contraindicados en las listas restrictivas crónicas absolutas como sí lo está la digoxina oral rutinaria.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 26."
    },
    {
        id: 12,
        question: "Qué grupo farmacológico vascular está proscrito en pacientes con patología pulmonar crónica obstructiva debido al empeoramiento del intercambio gaseoso?",
        options: ["Vasodilatadores pulmonares específicos", "Antagonistas de aldosterona", "Anticoagulantes orales", "Diuréticos de asa"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Cor Pulmonale Crónico, la inhibición de la vasoconstricción compensatoria en alvéolos no ventilados genera desequilibrios de la relación ventilación/perfusión (V/Q), empeorando la saturación sistémica.<br><br>Perla ENARM: \"No se recomiendan los vasodilatadores pulmonares específicos en el CP secundario a enfermedad respiratoria como EPOC (Grupo 3 en la clasificación de HP)\".<br><br>Análisis de Distractores: Antagonistas de aldosterona y diuréticos de asa son vitales para el control de la congestión derecha. Los anticoagulantes orales están indicados en etiologías primarias y tromboembólicas.",
        source: "IMSS-036-08, Diagnóstico y tratamiento de Cor Pulmonale Crónico en el segundo y tercer nivel, 2017, Evidencias y Recomendaciones, Página 26."
    },
    {
        id: 13,
        question: "¿A partir de qué porcentaje límite de hematocrito se debe considerar realizar terapia de flebotomía paliativa local?",
        options: ["> 55 %", "> 60 %", "> 65 %", "> 70 %"],

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);

    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {

            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
