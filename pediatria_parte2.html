            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>

                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>

                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Detección, referencia oportuna y pautas de egreso hospitalario del recién nacido de término",
    gpcLink: "https://drive.google.com/file/d/1BOjxRtHCkre4xWZy4jqp1TNugGgqFPoC/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>Para el ENARM se requiere dominar el tamizaje sistemático del recién nacido a término previo a su egreso, identificando anomalías congénitas funcionales o estructurales de forma asintomática, para decidir con precisión clínica <strong class="text-indigo-900 dark:text-indigo-200">cuándo observar, cuándo solicitar estudios de imagen y cuándo referir al especialista</strong>. El objetivo es evitar el egreso de neonatos con condiciones críticas no diagnosticadas.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo marca tiempos y criterios de reevaluación muy específicos para evitar sobrediagnósticos:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Tamiz Cardiológico:</strong> Si el resultado es dudoso (SatO2 90-94% o diferencia >4%), <strong class="text-rose-600 dark:text-rose-400 font-bold">no se asume el diagnóstico de inmediato; se repite la medición estrictamente en 1 hora</strong>. Si persiste la alteración, detona la solicitud de ecocardiograma.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>

                            <strong class="text-slate-800 dark:text-slate-200">Tamiz Urológico:</strong> Criptorquidia unilateral palpable permite una conducta expectante, pero una <strong class="underline">criptorquidia bilateral no palpable</strong> exige referencia urgente a genética/endocrinología para descartar alteraciones del desarrollo sexual.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Tamiz Auditivo:</strong> El fracaso de las emisiones otoacústicas (EOA) iniciales no etiqueta al neonato con sordera; requiere una <strong class="bg-indigo-100 dark:bg-indigo-900/50 px-1 rounded text-indigo-800 dark:text-indigo-300">segunda toma entre la 2ª y 8ª semana</strong> antes de escalar a PEATC.

                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 TEMAS High-Yield</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Tamiz Oftalmológico:</strong> Asimetría, opacidad o ausencia de color en la prueba de <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Brückner (reflejo rojo binocular)</strong> indica bloqueo visual grave (catarata o retinoblastoma) y requiere referencia inmediata.</li>
                        <li><strong>Exploración de Cadera:</strong> Ortolani o Barlow anormal + FR justifica realizar <u class="decoration-emerald-400 decoration-2 font-bold">ultrasonido tempranamente entre la 4ª y 6ª semana</u>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa del Tiempo en Cardiología:</strong> Es un error realizar el tamiz al momento de nacer. Se debe hacer <strong class="font-bold text-rose-600 dark:text-rose-400">después de las 6 horas y antes de las 48 horas</strong> para evitar falsos positivos.</li>
                        <li><strong>La Trampa Quirúrgica Urológica:</strong> Ante criptorquidia unilateral, no ofrecer cirugía neonatal. El tratamiento definitivo se programa a los <u class="decoration-rose-500 decoration-2 font-bold">6 a 12 meses de edad</u>.</li>

                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-226-20)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Tamiz Cardiológico:</strong> Evaluar oximetría en mano y pie derechos <strong class="underline">después de las 6h y antes de las 48h</strong>.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Criterio Positivo:</strong> Una SatO2 de 90-94% o una <strong class="underline">diferencia >4%</strong> obliga a repetir el estudio en 1 hora.</li>
                    <li><strong class="text-amber-700 dark:text-amber-500">Tamiz Auditivo:</strong> Iniciar con <strong class="underline">Emisiones Otoacústicas (EOA)</strong>; ante fallas repetidas, derivar para Potenciales Evocados (PEATC).</li>

                <p>La cirugía bariátrica en adolescentes <strong class="text-indigo-900 dark:text-indigo-200">no es una intervención estética</strong> ni de primera elección; es una medida de rescate metabólico reservada exclusivamente para pacientes con <u class="decoration-indigo-400 decoration-2 font-medium">madurez esquelética completa (Tanner IV-V)</u> en quienes el manejo médico multidisciplinario supervisado ha fracasado. El objetivo es revertir comorbilidades severas que amenazan la vida o la función a corto plazo[cite: 191, 192, 193].</p>

                </h4>
                <p>La Hemofilia es la coagulopatía hereditaria ligada al cromosoma X por excelencia. La competencia crítica para el ENARM no es solo el diagnóstico, sino la capacidad de clasificar la gravedad (<strong class="text-indigo-900 dark:text-indigo-200">&lt; 1% define el fenotipo grave clásico</strong>) y la decisión de <u class="decoration-indigo-400 decoration-2 font-medium">iniciar tratamiento sustitutivo inmediato ante trauma craneal o visceral</u>, incluso antes de tener la confirmación diagnóstica.</p>

                    El Concepto Fundamental
                </h4>
                <p>El núcleo de este tema para el ENARM es la prudencia terapéutica y diagnóstica. Una primera crisis convulsiva <strong class="text-indigo-900 dark:text-indigo-200">NO es sinónimo de epilepsia</strong> y, por lo tanto, <u class="decoration-indigo-400 decoration-2 font-medium">no se inicia tratamiento antiepiléptico de mantenimiento tras un primer evento</u>. El objetivo clínico es diferenciar entre una crisis provocada (aguda/sintomática) y una no provocada, priorizando la estabilización sobre la "batería de estudios indiscriminada".</p>

                    El Concepto Fundamental
                </h4>
                <p>La enfermedad hemolítica por isoinmunización a Rh es una urgencia neonatal predecible y prevenible, donde el objetivo principal es lograr un equilibrio contrarreloj para <strong class="text-indigo-900 dark:text-indigo-200">frenar la destrucción eritrocitaria y evitar el daño neurológico irreversible (kernicterus)</strong>, dictando el pronóstico del paciente mediante el inicio oportuno de la fototerapia o la exanguinotransfusión.</p>

                        <div>

                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">

                    El Concepto Fundamental
                </h4>
                <p>La evaluación para el ENARM sobre Otitis Media Aguda (OMA) exige dominar la estratificación del paciente por edad y gravedad clínica para decidir de forma inmediata entre una conducta expectante o el <strong class="text-indigo-900 dark:text-indigo-200">inicio empírico de Amoxicilina a dosis altas (80-90 mg/kg/día)</strong>, sustentando siempre el diagnóstico en la evidencia objetiva de líquido retrotimpánico mediante la <u class="decoration-indigo-400 decoration-2 font-medium">otoscopía neumática</u>.</p>

                                <li><span class="font-bold text-emerald-600 dark:text-emerald-500">Cuadro Leve (Fiebre &lt; 39°C, otalgia &lt; 48h):</span> Estrategia de observación-vigilancia por 48 a 72 horas con analgesia.</li>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>
                        <p class="text-xs text-slate-500 mt-1 italic">Fuente: ${q.source}</p>

                </div>`;

            quizHtml += '</div>';

                    <div class="mt-4 mb-6 flex flex-col sm:flex-row gap-3">

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" /></svg>
                            Ver Resumen del Módulo

                        <a href="${moduleData.gpcLink}" target="_blank" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold py-3 px-4 rounded-lg border border-slate-200 dark:border-slate-600 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors flex items-center justify-center gap-2">

                            GPC "Referencia rápida"

                    <div class="mt-6">
                        <h3 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-3">Caso Clínico</h3>

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>
                            <span>${score}/${total}</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-sky-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });
            moduleScoresHtml += '</div>';
            
            const finalPct = totalQuestions > 0 ? Math.round((totalScore/totalQuestions)*100) : 0;
            const dateStr = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

            document.getElementById('module-display').innerHTML = `
                <div class="animate-fade-in-up">

                                <svg class="h-16 w-16 text-emerald-600 dark:text-emerald-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                            </div>
                            <h2 class="text-3xl font-bold text-slate-800 dark:text-slate-100">¡Curso Completado!</h2>

                        <div class="grid md:grid-cols-2 gap-8">
                            <div>
                                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200 mb-4 border-b pb-2 dark:border-slate-700">Rendimiento por Dificultad</h3>
                                
                                <div class="grid grid-cols-3 gap-2 mb-6">
                                    <div class="p-2 bg-red-50 dark:bg-red-900/20 rounded-lg text-center border border-red-200 dark:border-red-800">

                                    <div class="p-2 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg text-center border border-yellow-200 dark:border-yellow-800">

                                    </div>
                                    <div class="p-2 bg-green-50 dark:bg-green-900/20 rounded-lg text-center border border-green-200 dark:border-green-800">
                                        <p class="text-[10px] text-green-600 dark:text-green-400 font-bold uppercase">Baja</p>
                                        <p class="text-lg font-bold text-slate-800 dark:text-slate-200">${stats.baja.correct}/${stats.baja.total}</p>
                                    </div>
                                </div>

                                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-200 mb-4 border-b pb-2 dark:border-slate-700">Detalle por Módulo</h3>
                                ${moduleScoresHtml}
                                
                                <div class="mt-6 p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl text-center">

        function renderModuleList() {
            const list = document.getElementById('module-list');
            if(!list) return;
            list.innerHTML = '';

            // MODIFICACIÓN: Iterar sobre la lista COMPLETA de títulos cortos
            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                const li = document.createElement('li');
                
                if (module) {
                    // MÓDULO DISPONIBLE
                    let classes = 'p-3 rounded-lg cursor-pointer transition-all duration-200 flex items-center justify-between gap-3 ';
                    if (isActive) classes += 'bg-sky-600 font-bold text-white shadow-lg';
                    else if (isCompleted) classes += 'bg-emerald-800/80 text-emerald-300 hover:bg-emerald-700/80';
                    else classes += 'bg-slate-700 hover:bg-slate-600 hover:pl-4';

                    li.className = classes;
                    
                    let iconSvg = isCompleted 
                        ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />'
                        : '<path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />';

                    let innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-70" viewBox="0 0 20 20" fill="currentColor">
                                ${iconSvg}
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;

                    if (isCompleted) {
                        innerHTML += `
                            <button onclick="event.stopPropagation(); showModuleSummary(${moduleId})" class="p-1 hover:bg-white/20 rounded-full transition-colors" title="Ver Resumen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        `;
                    }

                    li.innerHTML = innerHTML;
                    li.onclick = () => displayModule(moduleId);
                } else {
                    // MÓDULO NO DISPONIBLE AÚN
                    li.className = 'p-3 rounded-lg flex items-center gap-3 bg-slate-800 text-slate-500 cursor-not-allowed opacity-50';
                    li.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;
                }
                list.appendChild(li);
            });
        }

"GPC-IMSS-244-09. Diagnóstico y tratamiento de la primera crisis convulsiva en niñas, niños y adolescentes primer y segundo nivel de atención. 2017.",

"GPC-IMSS-330-10. Diagnóstico y tratamiento de la estenosis hipertrófica congénita de píloro. 2017.",
"GPC-IMSS-373-18. Diagnóstico y tratamiento de la enfermedad hemolítica por isoinmunización a Rh en el recién nacido. 2018.",
"GPC-IMSS-430-10. Diagnóstico y tratamiento de la pelagra en edad pediátrica. 2017.",

            ];
            
            bibliographyContent.innerHTML = '';

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 dark:text-slate-400 flex-shrink-0 mt-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríaIICourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríaIICourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríaIICourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-sky-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-sky-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
