    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [
            {
                id: 1, 
                question: "Ante la evaluación clínica inicial de un adulto con sobrepeso y obesidad, ¿cuál es el estudio o panel bioquímico indispensable que debe solicitarse para identificar comorbilidades metabólicas según la GPC?", 
                options: ["Insulina sérica y cortisol", "Glucosa y perfil lipídico", "Pruebas de función tiroidea", "Curva de tolerancia oral"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento del Sobrepeso y Obesidad, el abordaje clínico exige descartar alteraciones en el metabolismo de los carbohidratos y las grasas, las cuales justifican el inicio de tratamiento farmacológico temprano si se asocian a un Índice de Masa Corporal > 27.<br><br>Perla ENARM: \"Datos clínicos y de laboratorio para la evaluación del paciente con sobrepeso y obesidad: Triglicéridos séricos mg/dl, Colesterol HDL sérico mg/dl, Glucosa sérica mg/dl.\"<br><br>Análisis de Distractores: Las pruebas tiroideas (C) y el cortisol (A) están indicadas únicamente ante sospecha de obesidad endocrina secundaria (hipotiroidismo o Cushing), no de forma universal. La curva de tolerancia oral (D) es de segunda línea.", 
                source: "GPC-IMSS-046-18, Diagnóstico y Tratamiento del Sobrepeso y Obesidad Exógena, 2018, Anexos (Cuadro 2), p. 37." 
            },
            {
                id: 2, 
                question: "¿Cuál es una de las herramientas recomendadas que predice el riesgo de mortalidad y morbilidad cardiovascular en un paciente con Hipertensión Arterial Sistémica?", 
                options: ["Gráficas de riesgo SCORE", "Escala pronóstica de Balthazar", "Criterios de severidad Ranson", "Escala de Rockall"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Hipertensión Arterial en el Primer Nivel, el manejo antihipertensivo debe ser guiado no solo por los niveles de PA, sino por el riesgo cardiovascular absoluto calculado con validadores validados poblacionalmente.<br><br>Perla ENARM: \"Se recomienda utilizar herramientas pronóstica de riesgo cardiovascular como la escala de riesgo de Framingham... las gráficas de evaluación sistemática de riesgo coronario (SCORE), de la sociedad europea de cardiología, entre otras.\"<br><br>Análisis de Distractores: Balthazar (B) evalúa severidad tomográfica en pancreatitis. Ranson (C) evalúa mortalidad clínica en pancreatitis aguda. Rockall (D) predice resangrado y mortalidad en hemorragia digestiva alta.", 
                source: "GPC-IMSS-076-21, Promoción, Prevención, Diagnóstico y Tratamiento de la Hipertensión Arterial en el Primer Nivel de Atención, 2021, Diagnóstico, Página 33." 
            },
            {
                id: 3, 
                question: "¿Cuál es el factor de riesgo genético o patrón de herencia con mayor asociación a la Enfermedad de Fabry reportado por la guía?", 
                options: ["Autosómico recesivo", "Ligado al cromosoma X", "Autosómico dominante", "Mutación mitocondrial"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedad de Fabry, esta patología se transmite ligada al cromosoma X, lo que explica por qué los hombres (hemicigotos) presentan la variante clásica y más severa de la enfermedad, mientras que las mujeres (heterocigotas) presentan cuadros variables debido a la inactivación aleatoria del cromosoma X (efecto de lyonización).<br><br>Perla ENARM: \"La EF es una enfermedad hereditaria ligada al cromosoma X recesiva, producida por la deficiencia de la enzima lisosomal AGLA, que afecta de forma predominante a los varones.\"<br><br>Análisis de Distractores: Los patrones autosómicos dominante (Opción C) y recesivo (Opción A) no corresponden al gen GLA (Xq22.1). Las mutaciones mitocondriales (Opción D) se transmiten exclusivamente por vía materna a toda la descendencia, lo cual difiere de la herencia ligada al X.", 
                source: "IMSS-165-09, Diagnóstico, Tratamiento y Seguimiento multidisciplinario en enfermedad de Fabry, 2017, Fenotipo, genotipo y consejo genético, Página 16." 
            },
            {
                id: 4, 
                question: "¿Cuál es la patología que debe buscarse anualmente en un paciente de 40 años con Hemofilia por el riesgo asociado a la inactividad y hemartrosis?", 
                options: ["Enfermedad cardiovascular isquémica", "Fibrilación auricular no valvular", "Osteopenia u osteoporosis", "Hemorragia del tracto urinario"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Hemofilia A y B, las comorbilidades ligadas al envejecimiento impactan profundamente. El dolor crónico y la limitación funcional por la artropatía hemofílica reducen drásticamente la actividad física y el soporte de peso (\"weight-bearing\"), lo que agota la matriz ósea precipitando descalcificación.<br><br>Perla ENARM: \"A partir de los 40 años dar seguimiento para detección de osteopenia u osteoporosis y tomar las medidas correspondiente; sí se detecta osteopenia enviarlo a Medicina Física y rehabilitación.\"<br><br>Análisis de Distractores: A (Enfermedad cardiovascular isquémica): Incorrecto, aunque los FRCV deben evaluarse, la hemofilia tiene un perfil \"protector\" biológico parcial, y no hay indicación de un tamizaje específico a los 40 años más allá del escrutinio normal. B (Fibrilación auricular no valvular): Incorrecto, aunque ocurre en población geriátrica y dificulta el manejo anticoagulante, no es una consecuencia directa de la inactividad articular. D (Hemorragia del tracto urinario): Incorrecto, la hematuria espontánea es episódica, manejada con hidratación, no una patología de tamizaje anual crónico.", 
                source: "IMSS-178-09, Diagnóstico y Tratamiento Hemofilia A y B, 2017, Evidencias y Recomendaciones, p. 43." 
            },
            {
                id: 5, 
                question: "Epidemiológicamente, ¿cuál es el material o factor de riesgo asociado con la transmisión percutánea más eficiente en la Exposición Laboral al VIH?", 
                options: ["Aguja maciza de sutura", "Bisturí con sangre visible", "Salpicadura en piel intacta", "Aguja hueca con sangre"], 
                answer: 3, 
                justification: "Justificación: El inóculo necesario para lograr la seroconversión depende fuertemente del volumen de sangre al que se expone el tejido. Los dispositivos canaliculares albergan mayor cantidad de sangre fresca en su interior que los macizos. De acuerdo a la GPC de Exposición Laboral al VIH, la profundidad y el tipo de instrumento determinan el grado de riesgo, siendo máximo con agujas utilizadas en accesos vasculares.<br><br>Perla ENARM: \"La exposición percutánea es más eficiente en la transmisión del VIH que las mucosas, por lo que se deberá evaluar: Tipo de material: Aguja hueca (mayor riesgo).\"<br><br>Análisis de Distractores: La aguja maciza de sutura transmite menor inóculo al ser sólida y limpiarse parcialmente al atravesar los tejidos o guantes. El bisturí produce un corte cortante, pero alberga menos sangre estancada que un lumen hueco. La salpicadura en piel intacta está catalogada como de riesgo nulo (no alto), ya que la barrera epidérmica sana impide la penetración viral.", 
                source: "IMSS-241-12, Prevención, Diagnóstico y Tratamiento de la Exposición Laboral al VIH en Trabajadores de la Salud, 2017, Sección: Diagnóstico de la infección por el VIH, Página 24." 
            },
            {
                id: 6, 
                question: "¿Cuál es el marcador laboratorial utilizado como principal indicador de eficacia y pronóstico de mortalidad en el tratamiento de Infección por el VIH?", 
                options: ["Conteo de linfocitos CD4", "Carga Viral RNA-VIH", "Proteína C Reactiva sérica", "Niveles de Interleucina-6"], 
                answer: 1, 
                justification: "Justificación: El cese de la destrucción inmunológica depende de frenar la replicación del patógeno. De acuerdo a la GPC de Infección por el VIH, observar la caída logarítmica de las copias virales en plasma es el predictor más exacto del futuro éxito o fracaso del manejo instaurado.<br><br>Perla ENARM: \"La cuantificación del RNA del VIH en plasma (carga viral), es el indicador más importante de respuesta al tratamiento ARV y de su eficacia virológica.\"<br><br>Análisis de Distractores: El conteo de CD4 evalúa el grado de inmunosupresión y riesgo de oportunistas, pero su recuperación es lenta y errática, sin reflejar el éxito del fármaco de forma inmediata. La Proteína C Reactiva y la Interleucina-6 son marcadores de inflamación sistémica (\"riesgo no tradicional\"), pero no son el indicador directriz del control de la patología.", 
                source: "IMSS-245-09, Tratamiento Antirretroviral del Paciente Adulto con Infección por el VIH, 2017, Estudios de Laboratorio, Página 50." 
            },
            {
                id: 7, 
                question: "¿Cuál es el factor de riesgo ambiental con mayor asociación para el desarrollo del carcinoma basocelular reportado por la guía clínica?", 
                options: ["Tabaquismo crónico intenso", "Infección por virus papiloma", "Exposición a luz solar", "Inmunosupresión farmacológica prolongada"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Carcinoma Basocelular, aunque el desarrollo del cáncer de piel es multifactorial (incluyendo antecedente genético o inmunosupresión), el factor detonante principal es la radiación ultravioleta.<br><br>Perla ENARM: \"El mayor factor de riesgo de cáncer cutáneo es la exposición a la luz del sol y los antecedentes de quemaduras solares.\"<br><br>Análisis de Distractores: La inmunosupresión farmacológica (D) es un factor de mal pronóstico, pero no el factor de riesgo primario de mayor asociación global. El tabaquismo (A) y el virus papiloma (B) tienen mayor asociación con otras neoplasias como el carcinoma epidermoide.", 
                source: "GPC-IMSS-360-19, Diagnóstico y Tratamiento del Carcinoma Basocelular, 2019, Sección: Introducción, Página 7." 
            },
            {
                id: 8, 
                question: "En la exploración fundoscópica de un paciente que experimenta toxicidad ocular por hidroxicloroquina, ¿cuál es el hallazgo patognomónico indicativo de una atrofia extensa e irreversible del epitelio pigmentado?", 
                options: ["Despigmentación en sal y pimienta", "Hemorragias intrarretinianas difusas", "Maculopatía en ojo de buey", "Membrana neovascular subretiniana"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención de toxicidad ocular por antimaláricos, una vez que el daño del epitelio excede las capacidades celulares de resistencia, el colapso anatómico central se vuelve evidenciable con el oftalmoscopio directo en el consultorio de atención primaria, implicando un punto de no retorno terapéutico para la visión del paciente.<br><br>Perla ENARM: \"Maculopatía del ojo de buey indica toxicidad avanzada: escaso pigmento en la fóvea y despigmentación del epitelio pigmentario de la retina de la mácula. Irreversible en esta etapa.\"<br><br>Análisis de Distractores: El fondo en sal y pimienta (A) alude típicamente a rubéola congénita o sífilis. Las hemorragias intrarretinianas (B) apuntan hacia oclusión venosa o retinopatía diabética de base vascular. Una membrana neovascular (D) obedece al patrón exudativo de la degeneración macular asociada a la edad, no al fenotipo clásico atrófico-tóxico de los derivados de cloroquina.", 
                source: "IMSS-431-11, Prevención de toxicidad ocular por cloroquina e hidroxicloroquina, 2017, Evidencias y Recomendaciones (Diagnóstico), p. 39." 
            },
            {
                id: 9, 
                question: "¿Cuál es el factor de riesgo con mayor asociación con raquitismo carencial en lactantes reportado por la GPC?", 
                options: ["Lactancia sin suplementación", "Uso de fórmulas", "Exposición solar excesiva", "Peso alto al nacer"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Raquitismo Carencial, la leche materna tiene un pobre aporte de Vitamina D (5 a 80 UI/L), insuficiente para los requerimientos del lactante. Por ello, la falta de suplementación exógena es la causa directa más común.<br><br>Perla ENARM: \"Lactancia materna exclusiva sin exposición adecuada al sol, ni suplementación con vitamina D son factores de riesgo para presentar deficiencia de vitamina D\".<br><br>Análisis de Distractores: Las fórmulas lácteas (opción B) suelen estar fortificadas, protegiendo contra la deficiencia. La exposición solar adecuada previene la enfermedad (opción C). El bajo peso al nacer o la prematurez, no el peso alto (opción D), son factores de riesgo por las menores reservas maternas transferidas y falta de exposición solar hospitalaria.", 
                source: "GPC-IMSS-459-19, Prevención, diagnóstico y tratamiento del Raquitismo Carencial, 2019, Prevención, p. 13." 
            },
            {
                id: 10, 
                question: "¿Cuál es el dato clínico clave que permite distinguir la Hipertrigliceridemia por déficit oxidativo de la causada por exceso de carbohidratos en la Nutrición Parenteral?", 
                options: ["Aporte de glucosa >3 g/kg/día", "Presencia de acidosis o insuficiencia renal", "Niveles de Fósforo sérico <2 mEq/L", "Elevación de Bilirrubina Total >3 mg/dL"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Nutrición Parenteral, la hipertrigliceridemia por déficit oxidativo obedece a un defecto en el metabolismo de los lípidos (común en falla renal o acidosis metabólica grave) a causa de un déficit de L-Carnitina adquirida.<br><br>Perla ENARM: \"La hipertrigliceridemia por déficit oxidativo es secundaria a deficiencias enzimáticas o de carnitina... como lo son aquellos con acidosis metabólica e insuficiencia renal\".<br><br>Análisis de Distractores: El aporte excesivo de carbohidratos (>3 g/kg/día) (A) genera hipertrigliceridemia por lipogénesis de novo (\"por exceso\", no \"por déficit\"). La hipofosfatemia (C) señala síndrome de realimentación. La bilirrubina >3 mg/dL (D) habla de colestasis.", 
                source: "GPC-IMSS-556-18, Nutrición Parenteral: Prevención de complicaciones, 2018, Evidencias y Recomendaciones, Página 20." 
            },
            {
                id: 11, 
                question: "En un paciente con requerimiento de apoyo nutricio especializado, ¿cuál es el criterio clínico o hemodinámico que indica el inicio de la nutrición enteral como abordaje principal?", 
                options: ["Inestabilidad hemodinámica severa", "Tracto gastrointestinal funcional", "Falla intestinal aguda", "Hemorragia digestiva activa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Nutrición Enteral, la vía enteral se debe priorizar siempre que la función anatómica y absortiva del tubo digestivo lo permita, garantizando un efecto trófico sobre el enterocito.<br><br>Perla ENARM: \"En los pacientes hemodinámicamente estables y cuyo tracto gastrointestinal esté funcional hay que utilizar la vía enteral\".<br><br>Análisis de Distractores: La inestabilidad hemodinámica severa (A), la falla intestinal aguda (C) y la hemorragia digestiva activa (D) son contraindicaciones absolutas o relativas para el inicio de la vía enteral, requiriendo reanimación hídrica o en su defecto, nutrición parenteral.",

                question: "¿Cuál es el manejo dietético diferencial o fuente proteica de elección en un paciente con Insuficiencia Hepática Crónica pretrasplante que desarrolla intolerancia al nitrógeno, evidenciada por episodios de encefalopatía persistente?",

                source: "GPC IMSS-594-18, Tratamiento nutricional del paciente adulto pretrasplante hepático, 2018, Evidencias y Recomendaciones, p. 54-55." 
            },
            {

                question: "En el paciente oncológico, ¿cuál es el síntoma o alteración psicológica que integra el diagnóstico presuntivo primario de mayor prevalencia a descartar según la GPC?",

                justification: "Justificación: De acuerdo a la GPC de Evaluación y Abordaje Psicooncológico, la asimilación del cáncer genera una alta carga afectiva, siendo las alteraciones adaptativas la principal causa de comorbilidad psiquiátrica. Abordar estos cuadros disminuye la progresión hacia un deterioro funcional severo.<br><br>Perla ENARM: \"Investigar trastornos adaptativos y depresivos en la persona con cáncer que requiere de atención psicológica y psiquiátrica\".<br><br>Análisis de Distractores: El trastorno de estrés postraumático puede verse tras la supervivencia, y la ansiedad generalizada es una presentación clínica frecuente; sin embargo, no son los principales de escrutinio primario global. Los cuadros psicóticos son raros y no representan el volumen crítico de la comorbilidad del paciente con cáncer.",

            {
                id: 14, 
                question: "¿Cuál es el estudio diferencial clave pre-trasplante que permite distinguir clínicamente a la Anemia Aplásica Adquirida de la Hemoglobinuria Paroxística Nocturna?",

            {

                question: "En el abordaje del paciente con sospecha de golpe de calor, ¿cuál es el signo clínico o hallazgo neurológico que integra el diagnóstico presuntivo y lo diferencia del agotamiento por calor?",

            {

            {

            {

                question: "En las estrategias de educación para prevención de Infección por VIH en el primer nivel, ¿cuál es el enfoque metodológico que dictamina la GPC para promover el uso del condón?",

                id: 19, 
                question: "En el abordaje de la Muerte Encefálica, ¿cuál es el hallazgo gasométrico durante la prueba de apnea que integra el diagnóstico clínico confirmatorio según la GPC?",

                source: "GPC-SS-488-19, Diagnóstico de muerte encefálica y manejo del potencial donante de órganos, 2019, Sección: Criterios diagnósticos de muerte encefálica AAN 2010, Página 48." 
            },

                id: 21,

            {
                id: 24, 
                question: "Según la GPC de Hipertensión Arterial Sistémica, ¿cuál es un hallazgo clínico que indica una urgencia mayor con daño a órgano blanco inminente?", 
                options: ["Retinopatía sin exudados", "Disección de aorta torácica", "Cefalea y mareo ocasional", "Presión de 160/100 mmHg"],

            {

            {
                id: 26, 
                question: "¿Cuál es el factor reportado por la GPC que predice el fracaso pronóstico de la profilaxis (mayor tasa de seroconversión) en un trabajador sometido a Exposición Laboral al VIH?", 
                options: ["Fuente con carga viral indetectable", "Inicio después de 45 horas", "Ausencia de sangrado activo", "Exposición a líquido cefalorraquídeo"], 
                answer: 1, 
                justification: "Justificación: El margen de oportunidad para el abordaje del ciclo lítico retroviral es extremadamente estrecho. El virus infecta y destruye células dendríticas primarias y macrófagos en horas, viajando rápidamente hacia los acúmulos linfáticos. De acuerdo a la GPC de Exposición Laboral al VIH, retrasar la impregnación sistémica de la terapia triple propicia una viremia que la profilaxis ya no puede revertir.<br><br>Perla ENARM: \"Son factores asociados con la seroconversión a pesar de la PPE-VIH: inicio tardío de fármacos (>45 horas después de la exposición).\"<br><br>Análisis de Distractores: Una fuente con carga viral indetectable es un factor de bajo riesgo (no nulo, pero bajo), no un predictor de fracaso o mortalidad. La ausencia de sangrado (como en una punción superficial o piel intacta) dismiuye la probabilidad biológica de inocular el virus, marcando buen pronóstico. El LCR tiene riesgo biológico teórico, pero su infectividad es mucho menor en la práctica clínica que la sangre directa.",

                question: "¿Cuál es el factor de riesgo con mayor asociación para el desarrollo de enfermedad renal crónica en un paciente con Infección por el VIH reportado por la GPC?", 
                options: ["Raza caucásica", "Edad menor a 40", "Diabetes Mellitus coexistente", "Uso de Efavirenz"], 
                answer: 2, 
                justification: "Justificación: La nefrotoxicidad puede ser mediada por el propio virus, fármacos o comorbilidades crónico-degenerativas. De acuerdo a la GPC de Infección por el VIH, las condiciones metabólicas crónicas aceleran exponencialmente el daño glomerular y tubular en estos pacientes.<br><br>Perla ENARM: \"En pacientes con infección por el VIH sin experiencia a tratamiento ARV, investigar los siguientes factores de riesgo para desarrollo de enfermedad renal: Comorbilidades: DM y HAS, Edad >55 años, Raza negra.\"<br><br>Análisis de Distractores: La raza caucásica no es factor de riesgo; la guía señala específicamente a la raza negra. La edad avanzada (mayor a 55 años) confiere el riesgo, no la edad joven. El Efavirenz se asocia a toxicidad del Sistema Nervioso Central, mientras que el fármaco asociado clásicamente a daño tubular proximal es el Tenofovir Disoproxil Fumarato.", 
                source: "IMSS-245-09, Tratamiento Antirretroviral del Paciente Adulto con Infección por el VIH, 2017, Función Renal, Página 75."

            {
                id: 28, 
                question: "¿Cuál es el esquema pronóstico de vigilancia secuencial que predice y detecta el mayor número de recurrencias tras el tratamiento de un carcinoma basocelular?", 
                options: ["Mensual el primer año", "3, 6 y 12 meses", "Cada 5 años", "Ante sospecha de recurrencia"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Carcinoma Basocelular, hasta un 40% de los pacientes desarrollarán otro tumor a los 5 años, exigiendo un protocolo cronológico para captar lesiones sincrónicas o recaídas en la fase inicial de máxima probabilidad.<br><br>Perla ENARM: \"El seguimiento algoritmo indica vigilancia a los 3, 6 y 12 meses; posteriormente anual hasta los primeros 5 años para la detección de recurrencias.\"<br><br>Análisis de Distractores: La vigilancia mensual (A) satura los servicios innecesariamente. Vigilarlos cada 5 años (C) o sólo ante sospechas (D) promueve la progresión de recurrencias localmente avanzadas, elevando la morbilidad reconstructiva facial.",

                justification: "Justificación: De acuerdo a la GPC de Prevención de toxicidad ocular por antimaláricos, la dosis de prescripción es el principal factor de riesgo modificable. Dosis elevadas por kilogramo de peso predisponen rápidamente a la acumulación en el epitelio pigmentario.<br><br>Perla ENARM: \"Existe una asociación de toxicidad con dosis diarias de hidroxicloroquina de 6.5 mg/kg de peso corporal (equivalente a cloroquina 3.0 mg/kg).\"<br><br>Análisis de Distractores: El \"Uso menor a cinco años\" (A) es considerado un escenario de bajo riesgo, ya que la toxicidad se asocia típicamente a un uso mayor a 5 a 7 años. La \"Ausencia de enfermedad renal\" (C) es un factor protector; la nefropatía disminuye la depuración del fármaco. La \"Edad menor de 40 años\" (D) no es factor de riesgo; por el contrario, los adultos mayores de 60 años presentan mayor susceptibilidad al daño retiniano tóxico.",

                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `

                        ${qData.options.map((opt, i) => `

                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">

                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI30Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI30LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI30LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI30Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
