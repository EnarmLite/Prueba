                options: ["Cifosis mayor de 70 grados", "Escoliosis menor de 20 grados", "Genu valgo asintomático leve", "Displasia acetabular sin subluxación"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Mucopolisacaridosis Tipo I, las complicaciones óseas (disostosis múltiple) no se detienen ni se revierten con el tratamiento farmacológico y persisten aún con el trasplante medular; las curvaturas raquídeas patológicas toracolumbares extremas (cifosis >70° o escoliosis >50°) o la franca compresión medular con mielopatía son criterios ortopédicos absolutos de instrumentación o fusión espinal quirúrgica para prevenir paraplejia. Las alteraciones leves en miembros inferiores o pelvis sin luxación (opciones B, C y D) se vigilan con manejo conservador rehabilitatorio.<br><br>Perla ENARM: \"Las indicaciones para la cirugía ortopédica variarán en función de la clínica. Existe indicación de tratamiento quirúrgico en: Las cifosis mayores de 70º, Escoliosis mayores de 50º, En presencia de compresión medular\".", 
                source: "GPC IMSS-338-10, Diagnóstico y Tratamiento de la Mucopolisacaridosis Tipo I en Edad Pediátrica, 2017, Sección: Ortopedia, Página 42." 
            },
            {
                id: 60, 
                question: "En la enfermedad por hemorragia intraventricular del recién nacido prematuro sano, ¿cuál es el sitio anatómico de origen fisiopatológico más frecuente descrito por la GPC?", 
                options: ["Plexos coroideos de ventrículos laterales", "Matriz germinal subependimaria cerebral", "Espacio subaracnoideo frontal", "Parénquima cerebeloso basal"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cuidados del Recién Nacido Prematuro, la fragilidad de la red capilar en el cerebro inmaduro, combinada con la falta de autorregulación del flujo sanguíneo cerebral ante los cambios hemodinámicos, propicia la ruptura vascular en un área neurogénica altamente vascularizada propia del feto.<br><br>Perla ENARM: La hemorragia intraventricular es una complicación en el recién nacido prematuro y se origina en la matriz germinal subependimaria, la mayor incidencia ocurre en los menores de 1500 gramos.<br><br>Análisis de Distractores: La opción A describe el sitio de origen habitual del sangrado intraventricular en recién nacidos de término, no en prematuros. Las opciones C y D son sitios de sangrado secundario a trauma obstétrico severo o malformaciones vasculares, ajenas al mecanismo fisiopatológico principal de la prematurez.", 
                source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Tamizaje y Vacunación, Página 44." 
            },
            {
                id: 61,
                question: "Según la Guía de Práctica Clínica, ¿cuál de los siguientes errores innatos del metabolismo representa una contraindicación absoluta para administrar leche materna, requiriendo supresión y fórmula médica?",
                options: ["Fenilcetonuria de diagnóstico neonatal", "Hipotiroidismo congénito de origen central", "Galactosemia clásica confirmada", "Fibrosis quística con afección pancreática"],
                answer: 2,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Lactancia materna en el niño con enfermedad, la incapacidad hepática severa de transformar galactosa-1-fosfato en glucosa lleva a toxicidad fulminante celular (falla hepática, cataratas, sepsis por E. coli) si un neonato recibe lactosa, la cual constituye el carbohidrato principal de la leche humana.<br><br>Perla ENARM: No se indica la leche materna ni otra en pacientes con las enfermedades que se enlistan a continuación... Galactosemia clásica. Se necesita una fórmula especial libre de galactosa.<br><br>Análisis de Distractores: La fenilcetonuria sí permite y, de hecho, exige usar leche materna de forma dosificada para mantener los niveles de fenilalanina basales vitales. La fibrosis quística y el hipotiroidismo central pueden requerir suplementos pancreáticos o levotiroxina sistémica, pero bajo ningún concepto prohíben la lactancia materna por toxicidad del sustrato.",
                source: "GPC-IMSS-704-18, Lactancia materna en el niño con enfermedad. Donación de leche humana, 2018, Errores innatos del metabolismo, Página 54."
            },
            {
                id: 62, 
                question: "Ante la captación de una embarazada de 22 semanas que no cuenta con inmunización previa, ¿cuál es la primera vacuna preventiva contra el tétanos neonatal que debe solicitarse como abordaje inicial?", 
                options: ["Toxoide con fracción acelular pertussis", "Vacuna combinada de virus vivos", "Inmunoglobulina humana antitetánica", "Toxoide tetánico o diftérico (Td)"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Tétanos Neonatal, en mujeres sin antecedente vacunal que llegan en la segunda mitad de la gestación, el algoritmo dicta iniciar inmediatamente el esquema primario con biológicos simples (Td o TT) y reservar intencionadamente la dosis de Tdap (que tiene el componente contra tosferina) para el tercer trimestre, ventana donde maximizará la transferencia de anticuerpos al recién nacido.<br><br>Perla ENARM: \"Aplicar preferentemente 1 dosis de Td o TT a partir de la semana 20 sdg y si es posible una 2da dosis con Tdap entre la semanas 27 y 36 de gestación\".<br><br>Análisis de Distractores: La Tdap (A) se guarda estratégicamente para la ventana óptima de la semana 27 a 36. Los virus vivos (B) suelen estar contraindicados en embarazo por riesgo teratogénico o de infección fetal. La inmunoglobulina (C) se reserva para el manejo pasivo de heridas tetanígenas agudas de alto riesgo en pacientes no inmunizadas, no como prevención primaria rutinaria del control prenatal.", 
                source: "GPC IMSS-829-18, Detección de Factores de Riesgo y Prevención Primaria del Tétanos Neonatal en el Primer Nivel de Atención Médica, 2018, Algoritmos, Página 40." 
            },
            {
                id: 63, 
                question: "En el paciente pediátrico con tumor de sistema nervioso central, ¿cuál es el sitio anatómico intracraneal de presentación más frecuente que explica la alta incidencia inicial de hidrocefalia obstructiva, ataxia de la marcha y vómitos?", 
                options: ["Lóbulo frontal y corteza premotora", "Región supraselar y quiasma óptico", "Fosa posterior y cerebelo", "Médula espinal cervical alta"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Tumores de Sistema Nervioso, la abrumadora mayoría de la carga tumoral anatómica infratentorial sólida en los niños (como astrocitomas pilocíticos, meduloblastomas y ependimomas) crece y comprime muy tempranamente el estrecho piso del cuarto ventrículo o el acueducto de Silvio mesencefálico, causando de forma casi invariable una dilatación ventricular retrógrada rápida (hidrocefalia) y disfunción vestibular/apendicular cerebelosa (ataxia, dismetría).<br><br>Perla ENARM: \"En Pediatría el 60% de los tumores se localiza en fosa posterior, tallo cerebral y cerebelo, presentándose con síntomas relacionados a dichas estructuras... y con alto riesgo de presentar hidrocefalia obstructiva\".<br><br>Análisis de Distractores: Los tumores de la región supraselar y línea media (como el craneofaringioma) (B) debutan clásicamente con alteraciones campimétricas visuales (hemianopsias) o endócrinas tempranas (retraso del crecimiento, diabetes insípida). Las lesiones infiltrativas del lóbulo frontal (A) causan cambios conductuales sutiles, apatía o convulsiones motoras focales. La médula espinal (D) genera síndrome de neurona motora inferior o nivel sensitivo radicular doloroso.", 
                source: "GPC ISSSTE-136-18, Diagnóstico y tratamiento inicial de tumores de sistema nervioso central en pacientes pediátricos en primer y segundo nivel de atención, 2018, Diagnóstico Clínico, Página 15." 
            },
            {
                id: 64, 
                question: "Dentro del manejo integral para combatir el sobrepeso y obesidad en niños y adolescentes, ¿cuál es la prescripción específica de ejercicio aeróbico que establece la GPC?", 
                options: ["150 minutos a la semana", "60 minutos de forma diaria", "30 a 90 minutos trisemanal", "120 minutos en fines semana"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Sobrepeso y Obesidad Pediátrica, para lograr un impacto metabólico lipolítico real sin fatigar o comprometer el apego al tratamiento del menor, la indicación médica de la actividad física debe ser siempre estructurada, divertida y dosificada progresivamente en intensidad y frecuencia semanal.<br><br>Perla ENARM: \"Se recomienda que niños y adolescentes realicen al menos alguna de las siguientes actividades: Ejercicio aeróbico 3 veces por semana 30 a 90 minutos\".<br><br>Análisis de Distractores: Los 150 minutos a la semana de moderada intensidad es la meta clásica cardiovascular descrita exclusivamente para adultos. Los 60 minutos diarios de juego libre es una recomendación general ideal de la OMS para jóvenes, pero la GPC mexicana puntualiza y exige el esquema estructurado de \"3 veces por semana de 30 a 90 minutos\" como prescripción terapéutica. Agrupar todo el estrés de ejercicio físico concentrado solo en fines de semana (guerreros de fin de semana) no genera el mismo efecto fisiológico de sensibilización a la insulina sostenida.", 
                source: "GPC SS-025-08, Prevención y diagnóstico de sobrepeso y obesidad en niños y adolescentes, 2018, Prevención Primaria, Página 21." 
            },
            {
                id: 65, 
                question: "En Leucemia Aguda Pediátrica, ¿cuál es el sitio anatómico que requiere exploración clínica buscando induración por posible infiltración extramedular?", 
                options: ["Testículos", "Glándula tiroides", "Mamas", "Glándulas parótidas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Leucemia Aguda Pediátrica, el testículo y el sistema nervioso central son los \"santuarios\" clásicos de la leucemia (sitios protegidos por barreras tisulares donde la quimioterapia sistémica penetra pobremente). Su infiltración denota enfermedad avanzada.<br><br>Perla ENARM: \"Se debe realizar exploración testicular buscando induración o crecimiento\".<br><br>Análisis de Distractores: Ni la tiroides, ni las mamas, ni las parótidas son sitios característicos de infiltración leucémica o de refugio tumoral (\"santuarios\") que modifiquen radicalmente el pronóstico de la enfermedad en el examen físico de escrutinio.", 
                source: "GPC SS-061-08, Diagnóstico oportuno de la leucemia aguda en pediatría, 2017, Diagnóstico, Página 16." 
            },
            {
                id: 66, 
                question: "Utilizando las tablas de referencia pediátricas para Enfermedad Renal Crónica, ¿cómo se clasifica a un paciente escolar con presión arterial en el percentil 93?", 
                options: ["Presión arterial normal", "Presión arterial elevada", "Hipertensión estadio 1", "Hipertensión estadio 2"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedad Renal Crónica en pacientes menores de 18 años, la antigua categoría confusa de \"prehipertensión\" se reclasificó fisiológicamente en pediatría. Conocer los percentiles exactos es vital para definir de forma temprana el riesgo de hiperfiltración glomerular y daño a órgano blanco incipiente.<br><br>Perla ENARM: \"La PA elevada se define como mayor o igual al percentil 90 hasta menor al percentil 95 o 120/80 mmHg hasta menor al percentil 95 (lo que sea menor)\".<br><br>Análisis de Distractores: La presión normal (A) se considera estrictamente por debajo del percentil 90. La Hipertensión Estadio 1 (C) inicia a partir del percentil 95 hasta el percentil 95 + 12 mmHg. El Estadio 2 (D) de severidad se define cuando se supera ampliamente el percentil 95 por más de 12 mmHg o una cifra absoluta mayor a 140/90.", 
                source: "GPC SS-188-18, Prevención, diagnóstico y referencia oportuna de la enfermedad renal crónica en pacientes menores de 18 años, 2018, Anexos, Página 55." 
            },
            {
                id: 67,
                question: "¿Cuáles son los hallazgos clínicos en la prueba de Brückner que obligan al envío inmediato a un oftalmólogo pediatra por sospecha de Catarata Congénita?",
                options: ["Ausencia o reflejo blanco", "Reflejo rojo intenso bilateral", "Media luna inferior brillante", "Media luna superior brillante"],
                answer: 0,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Detección del recién nacido de término, el test de Brückner (reflejo rojo binocular) busca la transparencia de los medios oculares.<br><br>Perla ENARM: \"Las opacidades dentro del reflejo rojo, un reflejo notablemente disminuido, la presencia de un reflejo blanco (leucocoria) o amarillo o la asimetría de los reflejos rojos se consideran anómalos y se debe referir con el oftalmólogo pediatra.\"<br><br>Análisis de Distractores: El reflejo intenso y simétrico (B) es el hallazgo de un ojo sano. La media luna inferior (C) indica hipermetropía significativa. La media luna superior (D) sugiere miopía significativa; aunque ameritan seguimiento, la leucocoria es una bandera roja para tumores o cataratas mortales/cegantes.",
                source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de egreso hospitalario del recién nacido de término, 2020, Evidencias y Recomendaciones, página 19."
            },
            {
                id: 68,
                question: "Según la estrategia de prevención primaria del Hospital Amigo del Niño, ¿cuál es la medida indicada que mejora las tasas de inicio de Lactancia Materna?",
                options: ["Contacto piel a piel", "Alojamiento conjunto a 24 horas", "Alimentación con sucedáneos inicial", "Lavado gástrico y estimulación"],
                answer: 0,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Detección del recién nacido de término, separar al neonato de la madre genera fracaso en el acoplamiento nutricional.<br><br>Perla ENARM: \"Se recomienda que el contacto piel a piel se realice en la primera hora de vida, si la salud de la madre y el recién nacido lo permiten, independientemente de la forma de nacimiento, ya que reduce la mortalidad neonatal y aumenta el éxito de la lactancia.\"<br><br>Análisis de Distractores: El alojamiento conjunto (B) es válido pero la GPC especifica el contacto inmediato piel a piel como el disparador neurohormonal del éxito. La alimentación con sucedáneos (C) es el principal enemigo del éxito de la lactancia exclusiva. El lavado gástrico (D) es una práctica obsoleta y traumatizante.",
                source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de egreso hospitalario del recién nacido de término, 2020, Evidencias y Recomendaciones, página 35."
            },
            {
                id: 69, 
                question: "En el procedimiento de gastrectomía en manga para el manejo de la obesidad mórbida en adolescentes, ¿qué hormona responsable de la señal del apetito disminuye drásticamente al resecar una porción anatómica específica del estómago?", 
                options: ["Leptina", "Glucagón", "Insulina", "Grelina"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Obesidad Mórbida en Adolescentes, los procedimientos quirúrgicos modernos no solo funcionan por restricción mecánica pura del volumen, sino que tienen mecanismos neurohormonales de saciedad sumados al alterar el eje intestino-cerebro.<br><br>Perla ENARM: Detalla sobre la fisiología de la gastrectomía en manga: \"Es la cirugía que más reduce el apetito ya que se reseca la parte del estómago que produce la grelina, hormona que favorece el apetito\".<br><br>Análisis de Distractores: La leptina (hormona de la saciedad a largo plazo) (A) es sintetizada primordial y periféricamente por los adipocitos maduros, no por el estómago. La insulina y el glucagón (C, B) son hormonas metabólicas sintetizadas exclusivamente a nivel de los islotes del páncreas endocrino, y no directamente en las células parietales u oxínticas del fondo gástrico resecado durante la manga.", 
                source: "GPC IMSS-050-08, Tratamiento Quirúrgico de la Obesidad Mórbida en la Población Adolescente, 2018, Procedimiento Quirúrgico (Manga Gástrica), Página 29." 
            },
            {
                id: 70, 
                question: "¿Cuál es el fármaco de elección para el manejo profiláctico de una extracción dental en un paciente con Hemofilia A leve comprobada sin contraindicaciones?", 
                options: ["Acetato de desmopresina intravenosa", "Ácido tranexámico oral", "Concentrado complejo protrombínico", "Factor IX derivado plasmático"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Hemofilia Hereditaria Pediátrica, la hormona sintética desmopresina (DDAVP) estimula potentemente la liberación endotelial del Factor VIII endógeno residual y del Factor de Von Willebrand almacenado en los cuerpos de Weibel-Palade, triplicando temporalmente sus niveles basales, siendo altamente efectivo y seguro en fenotipos leves para evitar exponer al paciente al uso de riesgosos hemoderivados plasmáticos.<br><br>Perla ENARM: \"Se recomienda el uso de DDAVP en pacientes con hemofilia A leve que responden a la misma\".<br><br>Análisis de Distractores: La opción B (antifibrinolítico) es un excelente coadyuvante local en mucosas, pero el pilar sistémico procoagulante es el DDAVP. Las opciones C y D se utilizan exclusiva y lógicamente para pacientes con deficiencia del Factor IX (Hemofilia B), la DDAVP no tiene absolutamente ninguna utilidad biológica en Hemofilia B.", 
                source: "GPC IMSS-141-18, Diagnóstico y Tratamiento de Hemofilia Hereditaria en Menores de 16 Años, 2018, Tratamiento Farmacológico, Página 76." 
            },
            {
                id: 71, 
                question: "¿Cuál es el criterio clínico o laboratorial cinético utilizado para declarar médicamente el fracaso definitivo del manejo conservador con fototerapia en la Ictericia Neonatal progresiva?", 
                options: ["Bilirrubina indirecta que rebasó los 14 mg/dl", "Transcutáneo estacionado por más de 12 horas", "Aparición de síndrome de bebé bronceado", "Dos incrementos sucesivos en controles séricos"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Ictericia Neonatal, la finalidad fundamental del abordaje con fototerapia es estancar, frenar y disminuir cinéticamente el peso molecular del pigmento; si la fuente de producción endógena (hemólisis) supera numéricamente a la isometrización lumínica en tomas de laboratorio de repetición seriada, indica fehacientemente la imperiosa necesidad de pasar al siguiente rubro de rescate extremo (exanguinotransfusión).<br><br>Perla ENARM: \"Se considera que la fototerapia fracasó, cuando se presentan dos incrementos sucesivos en los controles de bilirrubinas séricas después del inicio de la fototerapia o que el nivel de bilirrubinas séricas alcance el nivel predefinido para realizar exanguinotransfusión\".<br><br>Análisis de Distractores: Los valores fijos aislados como 14 mg/dl (A) carecen de peso fuera de los nomogramas ajustados con las horas y edad gestacional específicas del neonato. El escrutinio del aparato transcutáneo (B) jamás se utiliza formalmente para monitorear o graficar la respuesta al tratamiento debido a la alteración del color de la piel por la luz. El inocuo \"bebé bronceado\" (C) es un leve efecto adverso dermatológico oscuro inofensivo de las lámparas por alteración de porfirinas, no es indicativo de falla terapéutica por ascenso hemolítico fatal.", 
                source: "GPC IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Fototerapia, Página 27." 
            },
            {
                id: 72, 
                question: "¿Cuál es el factor de riesgo exógeno con mayor asociación con la Estenosis Hipertrófica Congénita de Píloro reportado por la guía?", 
                options: ["Uso materno de paracetamol.", "Ingestión temprana de macrólidos.", "Alergia a proteína láctea.", "Sexo femenino y prematurez."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Estenosis Hipertrófica de Píloro, el uso de antibióticos con efecto procinético sobre receptores de motilina en las primeras etapas de la vida detona una fuerte asociación etiológica para el desarrollo de hipertrofia muscular gástrica.<br><br>Perla ENARM: \"La ingestión oral de azitromicina y eritromicina (tanto en la madre como en el neonato) coloca a los niños pequeños en un mayor riesgo de desarrollar estenosis pilórica. Esta asociación es fuerte si la exposición ocurre en las primeras 2 semanas de vida\".<br><br>Análisis de Distractores: El sexo femenino es el menos afectado (la relación epidemiológica hombre:mujer es 4-5 a 1). La alergia a la proteína de la leche es un diagnóstico diferencial sin asociación etiológica confirmada para causar la miopatía estructural. El paracetamol no figura como factor de riesgo documentado.", 
                source: "GPC IMSS-330-10, Diagnóstico y tratamiento de la Estenosis Hipertrófica Congénita de Píloro, 2017, Diagnóstico (Factores de riesgo), Página 10." 
            },
            {
                id: 73, 
                question: "¿Cuál es el marcador laboratorial secundario que predice mayor complicación neurológica posoperatoria y debe medirse obligadamente al finalizar la exanguinotransfusión en un paciente con Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido?", 
                options: ["Glucosa sérica buscando hipoglucemia", "Magnesio sérico buscando hipermagnesemia", "Calcio sérico buscando hipocalcemia", "Sodio sérico buscando hipernatremia"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Isoinmunización a Rh Neonatal, el altísimo volumen de citrato sintético presente e indispensable como anticoagulante universal en los paquetes globulares o sangre reconstituida transfundidos del donador actúa in vivo como un potente y ávido quelante de cationes divalentes al transfundirse, derrumbando secundaria y bruscamente el imprescindible equilibrio electrolítico iónico contráctil cardíaco y muscular del neonato posquirúrgico recién resucitado.<br><br>Perla ENARM: \"Se recomienda que posterior al término de la exanguinotransfusión se mida el calcio sérico, en caso de hipocalcemia indicar tratamiento sustitutivo\".<br><br>Análisis de Distractores: Aunque las opciones A, B y D son iones y sustratos enormemente relevantes de vigilar en cualquier terapia intensiva neonatal aguda o paciente chocado, la letal y específica intoxicación aguda masiva por citrato inherente a grandes y rápidas transfusiones (reemplazar dos veces la sangre del bebé) condiciona siempre y primordialmente un intenso y peligroso secuestro de calcio libre iónico, volviéndolo por la GPC el punto a sustituir de forma controlada o inmediata post-procedimiento para evitar la inminente aparición de arritmias letales, espasmos o convulsiones secundarias.", 
                source: "GPC IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Exanguinotransfusión, Página 65." 
            },
            {
                id: 74, 
                question: "¿Cuál es el factor de riesgo nutricional con mayor asociación con Pelagra reportado por la GPC?", 
                options: ["Consumo prolongado de sorgo", "Dieta basada en trigo", "Consumo excesivo de lácteos", "Ingesta exclusiva de leguminosas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Pelagra en Edad Pediátrica, la enfermedad se detona principalmente por el consumo de dietas monótonas carentes de niacina y de su precursor endógeno. El maíz sin nixtamalizar y el sorgo (cereal de zonas áridas) son granos característicamente deficientes en triptófano, y además el sorgo es rico en leucina, un aminoácido que interfiere y bloquea enzimáticamente la vía metabólica de síntesis vitamínica.<br><br>Perla ENARM: \"Las siguientes condiciones favorecen la presencia de Pelagra en la edad pediátrica: ... Ingestión por tiempo prolongado de sorgo\".<br><br>Análisis de Distractores: El trigo integral (B), los lácteos (C) y las leguminosas (D) no son carenciales en triptófano en el grado que lo son el maíz no tratado y el sorgo; de hecho, la leche, los huevos y las legumbres se recomiendan médicamente como fuentes abundantes de proteínas de alto valor biológico ricas en triptófano para el tratamiento curativo de la patología.", 
                source: "GPC IMSS-430-10, Diagnóstico y Tratamiento de la Pelagra en Edad Pediátrica, 2017, Factores de Riesgo, Página 11." 
            },
            {
                id: 75, 
                question: "¿Cuál es la intervención comprobada de prevención primaria, que actúa como factor protector sistémico al impactar en la epidemiología del patógeno bacteriano principal en Otitis Media Aguda?", 
                options: ["Profilaxis con amoxicilina diaria", "Vacunación contra el neumococo", "Inmunoglobulina intravenosa de rescate", "Aplicación de vacuna BCG"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, la inmunización ha reconfigurado la epidemiología de la enfermedad, reduciendo la incidencia de formas severas e invasivas provocadas por las cepas capsuladas.<br><br>Perla ENARM: \"Se recomienda realizar la vacunación contra neumococo para prevenir el primer episodio de OMA así como recurrencias\".<br><br>Análisis de Distractores: La opción A es una mala práctica que genera alta farmacorresistencia comunitaria. La opción C está reservada únicamente para casos de Inmunodeficiencias Primarias graves confirmadas. La opción D protege contra tuberculosis meníngea/miliar, no tiene injerencia anatómica ótica o nasofaríngea.", 
                source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Prevención, Página 20." 
            }
        ];

        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('Exapedia75LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('Exapedia75Progress');
                localStorage.removeItem('Exapedia75LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">

                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>

                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>

                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>

                                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

                            </div>

                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('Exapedia75Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('Exapedia75LastQId', currentQuestionId);
                else localStorage.removeItem('Exapedia75LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('Exapedia75Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
