            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

    <script>
        // =========================================================
        // DATA: BASE DE DATOS DE PREGUNTAS (AGREGA AQUÍ HASTA 280+)
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el procedimiento terapéutico quirúrgico cuya demora predice un mayor riesgo de complicaciones sistémicas como sepsis, hipermetabolismo y muerte?", 
                options: ["Fasciotomía profiláctica", "Escisión quirúrgica temprana", "Cierre diferido con colgajos", "Aplicación de apósitos sintéticos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, diagnóstico y tratamiento de quemaduras en niños y adolescentes, remover rápidamente toda la carga biológica tóxica del estrato necrótico bloquea de tajo la cascada sistémica de citocinas. Actuar antes del tercer día disminuye contundentemente los reingresos y la mortalidad al acortar los tiempos de catabolismo abierto.<br><br>Perla ENARM: \"Siendo que cuando se demora la escisión e injerto, se puede predisponer al paciente a presentar secuelas funcionales graves, riesgo de presentar infecciones, sepsis, mal manejo de la temperatura corporal, hipermetabolismo e incluso muerte\".<br><br>Análisis de Distractores: La fasciotomía (A) solo se emplea terapéuticamente ante datos patentes de síndrome compartamental, jamás de forma profiláctica global. Prolongar el cierre diferido (C) es precisamente la conducta que promueve el deterioro infeccioso. El uso de apósitos (D) sirve para curación de bajo grado, no sustituye la erradicación del tejido cadavérico en espesor total.", 
                source: "GPC SS-090-18, Prevención, diagnóstico y tratamiento de quemaduras en niños y adolescentes, 2018, Evidencias y Recomendaciones: Tratamiento, Página 35." 
            },
            {
                id: 2, 
                question: "Ante la sospecha clínica de Sepsis Neonatal, ¿cuál es el primer estudio de abordaje que debe solicitarse antes del tratamiento según la GPC?", 
                options: ["Hemocultivo para diagnóstico definitivo", "Proteína C Reactiva seriada", "Tomografía computarizada de cráneo", "Punción lumbar de rutina"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Neonatal, el aislamiento microbiológico sigue siendo el pilar fundamental para guiar y desescalar la terapia antibiótica. A pesar del bajo rendimiento en ciertas situaciones de bajo inóculo, el hemocultivo debe tomarse invariablemente antes de la primera dosis de antibiótico para evitar la negativización de la muestra.<br><br>Perla ENARM: \"Se debe realizar hemocultivo para determinar el diagnóstico definitivo de sepsis neonatal\".<br><br>Análisis de Distractores: La Proteína C Reactiva (PCR) es útil para descartar sepsis a las 24-48 horas o guiar la suspensión del antibiótico, pero no da un diagnóstico definitivo en la evaluación inicial por su elevación fisiológica los primeros 3 días. La punción lumbar de rutina no se recomienda en pacientes asintomáticos, y la tomografía no es un estudio inicial.", 
                source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 17." 
            },
            {
                id: 3, 
                question: "¿Cuál es el marcador laboratorial cuyo comportamiento predice mayor éxito en la reanimación y menor riesgo de mortalidad en Choque Séptico Pediátrico?", 
                options: ["Disminución del 20% del lactato", "Elevación de procalcitonina", "Leucocitosis mayor a 20,000", "Plaquetas mayores a 150,000"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Choque Séptico Pediátrico, el aclaramiento de los productos del metabolismo anaerobio en respuesta a la reanimación hídrica y de aminas refleja la restauración funcional de la microcirculación y la perfusión tisular.<br><br>Perla ENARM: \"La disminución del 20% del valor de los niveles de lactato en 2 horas, durante las primeras 8 horas, en conjunto con la mejora de la ScvO2, se asocian a reducción en la mortalidad\".<br><br>Análisis de Distractores: La procalcitonina y los leucocitos (B y C) evalúan la magnitud de la inflamación/infección, pero su modificación aguda no guía la reanimación hemodinámica. Las plaquetas (D) evalúan la falla hematológica, pero no son el biomarcador predictivo dinámico primario de rescate hídrico a corto plazo.", 
                source: "GPC SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en pacientes de 1 mes a 18 años de edad en los tres niveles de atención, 2017, Monitoreo durante el tratamiento, Página 18." 
            },
            {
                id: 4, 
                question: "¿Cuál es el factor de riesgo intrínseco y extrínseco con mayor asociación etiológica con la Enterocolitis Necrosante reportado en las unidades neonatales por la GPC?", 
                options: ["Edad gestacional de término", "Nacimiento por cesárea", "Alimentación al seno materno exclusivo", "Prematurez y ventilación asistida"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Enterocolitis Necrosante, la inmadurez inmunológica y estructural del intestino (prematurez) sumada a cualquier evento de estrés oxidativo, hipoxia o isquemia esplácnica (ventilación mecánica, choque) detonan la patología obstructiva e inflamatoria.<br><br>Perla ENARM: \"Se debe considerar como factores de riesgo para Enterocolitis Necrosante los siguientes: prematurez, ventilación asistida, sepsis, hipotensión, ruptura prematura de membranas y nacimiento extrahospitalario\".<br><br>Análisis de Distractores: La alimentación con seno materno exclusivo (C) es, de hecho, el factor protector dietético más importante e inmunológico contra la enfermedad. El nacimiento por cesárea electiva sin trabajo de parto (B) ha demostrado asociación con disminución del estrés fetal. Los robustos neonatos de término (A) tienen un riesgo considerablemente e inmensamente menor frente a los prematuros de muy bajo peso.", 
                source: "GPC SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido, 2018, Factores de riesgo, Página 13." 
            },
            {
                id: 5, 
                question: "Según la GPC de Sarcoma de Ewing, al planear el tratamiento local definitivo, ¿cuál es el objetivo quirúrgico primario para minimizar la recurrencia local?", 
                options: ["Curetaje y aplicación de fenol", "Amputación inmediata del miembro", "Resección con márgenes negativos", "Resección intralesional sin bordes"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Sarcoma de Ewing, el control local óptimo busca erradicar la enfermedad residual previniendo recaídas catastróficas; la cirugía de preservación y salvamento de extremidad es preferida únicamente si garantiza extirpar tejido libre de microscopía tumoral.<br><br>Perla ENARM: \"Se deberá realizar una resección amplia del tumor con márgenes sanos, los márgenes quirúrgicos negativos optimizan el control local del tumor y disminuyen la posibilidad de recurrencia local\".<br><br>Análisis de Distractores: La resección intralesional está proscrita por las altas tasas de falla local y diseminación. La amputación se relega a casos donde el tumor abarca estructuras neurovasculares vitales sin posibilidad de salvamento. El curetaje se reserva para lesiones benignas de hueso.", 
                source: "GPC-SS-379-18, Diagnóstico y tratamiento del sarcoma de Ewing en pediatría, 2018, Tratamiento Quirúrgico, p. 33-34." 
            },
            {
                id: 6, 
                question: "Ante la confirmación clínica de un primer episodio febril de Infección de Vías Urinarias en un lactante menor de dos años, ¿cuál es el primer estudio de imagen que debe solicitarse?", 
                options: ["Gamagrama renal con DMSA", "Ultrasonido de tracto urinario", "Cistouretrografía miccional seriada", "Urografía excretora intravenosa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infección de Vías Urinarias pediátrica, todo paciente menor de dos años con su primer episodio febril requiere descartar de forma no invasiva la presencia de anomalías anatómicas, obstrucción aguda o abscesos renales.<br><br>Perla ENARM: \"Se recomienda realizar ultrasonido de tracto urinario a los niños menores de 2 años o con IVU atípica durante la infección aguda para identificar anomalías estructurales del tracto urinario\".<br><br>Análisis de Distractores: El gamagrama con Ácido Dimercaptosuccínico (DMSA) (A) no se recomienda en la fase aguda (0-4 semanas). La cistouretrografía miccional (C) se reserva para detectar reflujo cuando hay alteraciones en el ultrasonido o episodios recurrentes. La urografía excretora (D) no es el tamizaje inicial de elección por la exposición a radiación.", 
                source: "GPC-SS-027-21, Diagnóstico y tratamiento de la infección de vías urinarias no complicada en menores de 18 años, 2021, Diagnóstico, p. 24." 
            },
            {
                id: 7, 
                question: "En Parálisis Cerebral, ¿cuál es el signo clínico del neurodesarrollo que integra el diagnóstico presuntivo a los 9 meses de edad?", 
                options: ["Ausencia de sonrisa social", "Falta de sedestación independiente", "Empuñamiento persistente de manos", "Pérdida de reflejos primitivos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Parálisis Cerebral en Lactantes, el diagnóstico clínico se basa fuertemente en la vigilancia de los hitos del neurodesarrollo en la consulta de atención primaria. Aunque hay varios signos de alarma precoces, la incapacidad motora de mantener el tronco y sentarse sin apoyo a los 9 meses de edad cronológica o corregida es el dato clínico integrador que establece la sospecha firme de la enfermedad.<br><br>Perla ENARM: \"El médico debe estar alerta ante el retraso de los hitos motores principalmente persistencia de reflejos primitivos, falta de control cefálico, ausencia de sonrisa, presencia de movimientos asimétricos de las manos, persistencia de empuñamiento y falta de sedestación a los 9 meses\".<br><br>Análisis de Distractores: Las opciones A y C son datos clínicos válidos de alarma neuromotora, pero suelen manifestarse o evaluarse en etapas cronológicas mucho más tempranas (como la sonrisa social a los 2-3 meses o el empuñamiento a los 4 meses). La opción D es incorrecta y lo contrario fisiopatológicamente: en esta patología ocurre que los reflejos primitivos persisten patológicamente, no se pierden tempranamente.", 
                source: "GPC DIF-332-18, Evaluación diagnóstica de parálisis cerebral en lactantes, 2018, Diagnóstico Clínico, Página 14." 
            },
            {
                id: 8,
                question: "Según la epidemiología descrita por la GPC, ¿cuál es el factor de riesgo en los padres o cuidadores que muestra mayor asociación documentada para ejercer abuso físico infantil?",
                options: ["Edad materna muy avanzada.", "Antecedente de maltrato infantil.", "Nivel socioeconómico medio-alto.", "Familia extensa habitando junta."],
                answer: 1,
                justification: "Justificación: De acuerdo a la GPC de Abuso Físico Infantil, la transmisión transgeneracional del trauma altera la respuesta al estrés en los cuidadores, predisponiéndolos a repetir ciclos de violencia debido a deficiencias en el apego y la crianza.<br><br>Perla ENARM: \"Se debe sospechar de maltrato infantil en su variedad abuso físico si se identifican: Recursos parentales limitados, Estrés crónico en los padres derivado de situaciones sistémicas, Abuso de sustancias, Habilidades para la crianza deficientes, Historia de maltrato en la infancia de los padres o cuidadores.\"<br><br>Análisis de Distractores: La familia extensa actúa como un factor protector externo, no de riesgo. La edad materna y el nivel socioeconómico no son los factores determinantes primarios descritos en la lista prioritaria de la directriz clínica, donde predominan la salud mental, el estrés y el uso de sustancias.",
                source: "GPC-DIF-400-21, Manifestaciones clínicas para la sospecha del abuso físico en niñas, niños y adolescentes, 2021, Sección Detección, Página 26."
            },
            {
                id: 9, 
                question: "¿Cuál es el marcador de pronóstico pre-quirúrgico que predice el mejor resultado a largo plazo en un paciente con Mucopolisacaridosis Tipo I sometido a trasplante según la GPC?", 
                options: ["Opacidad corneal unilateral leve", "Edad mayor a 5 años", "Cociente intelectual mayor 70", "Hernia umbilical no complicada"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Mucopolisacaridosis Tipo I, el éxito del trasplante de células hematopoyéticas (TCH) depende enteramente de ganarle al inexorable y devastador daño neurológico de la variante Hurler. Aquellos pacientes que llegan al procedimiento precozmente con su coeficiente intelectual aún preservado (>70) consolidan y garantizan el mejor pronóstico funcional general e inserción social. Evaluar la córnea o las hernias (opciones A y D) revela estatus sistémico pero no refleja el estatus cognitivo central limitante pre-trasplante.<br><br>Perla ENARM: \"Un análisis retrospectivo multicentrico de 217 pacientes con MPS I sometidos a TCH (...) encontró que: La prontitud del TCH y la función cognitiva son los mejores predictores del resultado (...) Niños con determinación basal de CD/CI mayor de 70 frente presentaron menor daño cognitivo\".", 
                source: "GPC IMSS-338-10, Diagnóstico y Tratamiento de la Mucopolisacaridosis Tipo I en Edad Pediátrica, 2017, Sección: Trasplante de Células Hematopoyéticas, Página 36." 
            },
            {
                id: 10, 
                question: "¿En qué momento clínico se debe suspender la fortificación de leche humana en el manejo nutricional del recién nacido prematuro sano hospitalizado?", 
                options: ["Alcanzar 1500 gramos de peso", "Alcanzar 1800 gramos de peso", "Alcanzar 2000 gramos de peso", "Al egreso hospitalario a domicilio"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cuidados del Recién Nacido Prematuro, los lactantes muy pequeños tienen reservas nutricionales limitadas y altas demandas metabólicas para equiparar la velocidad de crecimiento intrauterina (acreción de proteínas y minerales). La leche materna exclusiva no cubre estos requerimientos en la etapa de mayor crecimiento celular, por lo que se fortifica tempranamente y se retira al rebasar el hito antropométrico de estabilidad nutricional basal.<br><br>Perla ENARM: Se recomienda alimentar con leche humana fortificada a los RNP con peso menor de 2000 gr y suspender al alcanzar dicho peso siempre que mantenga un crecimiento adecuado.<br><br>Análisis de Distractores: La opción A es el peso límite para sacar al neonato de una incubadora de doble pared. La opción B corresponde al peso mínimo aceptado como criterio de egreso a domicilio. La opción D es incorrecta porque el retiro depende del peso y no de la estancia hospitalaria.", 
                source: "GPC-IMSS-362-18, Cuidados del Recién Nacido Prematuro Sano Hospitalizado, 2018, Sección: Cuidados del RNP Sano Hospitalizado, Página 29." 
            },
            {
                id: 11,
                question: "Ante un neonato en Terapia Intensiva con antecedente de inestabilidad hemodinámica severa, ¿cuál es el tiempo de espera estricto que marca la Guía de Práctica Clínica para iniciar la vía enteral?",
                options: ["Diferir vía por 24 horas", "Diferir vía por 48 horas", "Diferir vía por 72 horas", "Diferir vía por 12 horas"],
                answer: 0,
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Lactancia materna en el niño con enfermedad, un paciente chocado redirigió sangre de su mesenterio a órganos blancos. Una vez remontado el evento hemodinámico de choque, se obliga un periodo de reposo biológico al intestino para descartar necrosis microvascular o sangrado isquémico antes de forzar su función peristáltica y de absorción.<br><br>Perla ENARM: La alimentación en el recién nacido con inestabilidad hemodinámica debe diferirse por 24 hrs, después de haber logrado estabilizarlos.<br><br>Análisis de Distractores: Las 12 horas de diferimiento aplican para escenarios de hipoxia focal o bajo flujo preventivo (uso de indometacina o asfixia) pero sin inestabilidad hemodinámica global o choque. Tiempos de 48 y 72 horas no son protocolarios de primer escalón de espera y conllevan riesgo inminente de atrofia gastrointestinal.",
                source: "GPC-IMSS-704-18, Lactancia materna en el niño con enfermedad. Donación de leche humana, 2018, Lactancia materna en el paciente de terapia intensiva neonatal, Página 58."
            },
            {
                id: 12, 
                question: "¿Cuál es el factor de riesgo materno con mayor asociación epidemiológica para adquirir tétanos neonatal reportado en México por la Guía de Práctica Clínica?", 
                options: ["Atención hospitalaria en zona rural", "Infección activa por VIH", "Corte de cordón no estéril", "Parto por cesárea electiva"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Tétanos Neonatal, las prácticas obstétricas inseguras tradicionales, especialmente fuera de los hospitales, incrementan la inoculación directa de las esporas ambientales del *Clostridium tetani* en el muñón umbilical del neonato desprotegido.<br><br>Perla ENARM: \"En México, Gutiérrez reportó que el factor de riesgo más frecuente fue el corte de cordón umbilical con objeto no estéril siendo un 75.6%\".<br><br>Análisis de Distractores: La atención empírica o rural (A) es un factor sociodemográfico de riesgo, pero el mecanismo físico directo de entrada letal es el uso del objeto no estéril. El VIH (B) es una condición materna inmunosupresora que interfiere en la respuesta de anticuerpos, pero no es la vía de entrada al neonato. La cesárea (D) en condiciones de quirófano (técnica aséptica) disminuye el riesgo.", 
                source: "GPC IMSS-829-18, Detección de Factores de Riesgo y Prevención Primaria del Tétanos Neonatal en el Primer Nivel de Atención Médica, 2018, Prevención Primaria, Página 15." 
            },
            {
                id: 13, 
                question: "Según la guía, para un paciente pediátrico con tumor de sistema nervioso central de fosa posterior e hidrocefalia obstructiva severa aguda, ¿cuál es el procedimiento neuroquirúrgico de urgencia de elección inicial para evitar la diseminación tumoral extraneural secundaria hacia otras cavidades corporales?", 
                options: ["Craneotomía descompresiva temporal amplia", "Punción lumbar evacuadora de líquido cefalorraquídeo", "Derivación ventrículo-peritoneal con válvula unidireccional", "Tercer ventriculostomía endoscópica"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Tumores de Sistema Nervioso, fenestrar o comunicar el sistema ventricular internamente (del tercer ventrículo hacia las cisternas basales) permite derivar y resolver temporalmente la urgencia hipertensiva intracraneal preoperatoria sin crear una vía o conducto físico anatómico falso hacia el abdomen de la paciente, previniendo eficientemente las siembras peritoneales o intraabdominales de células altamente malignas viables (como las del meduloblastoma o tumores atípicos teratoides) que viajarían por un catéter peritoneal.<br><br>Perla ENARM: \"Es preferible el manejo endoscópico de la hidrocefalia (tercer ventriculostomía), ya que evita la diseminación tumoral fuera del sistema nervioso central, en comparación con la colocación de una válvula de derivación ventrículo-peritoneal\".<br><br>Análisis de Distractores: La derivación ventrículo-peritoneal permanente clásica (C) aumenta históricamente de un 5 a 7% el riesgo comprobado de diseminación peritoneal neoplásica y metástasis extraneurales. La punción lumbar (B) está formal y absolutamente contraindicada si existe un tumor expansivo de fosa posterior o hidrocefalia obstructiva aguda en las neuroimágenes por el altísimo riesgo inminente de herniación amigdalina letal a través del agujero magno y paro respiratorio súbito. La craniectomía descompresiva masiva (A) se reserva para edema citotóxico hemisférico intratable (ej. trauma severo, infarto maligno de la arteria cerebral media), no para descomprimir primariamente los ventrículos dilatados por líquido acumulado en bloqueos centrales.", 
                source: "GPC ISSSTE-136-18, Diagnóstico y tratamiento inicial de tumores de sistema nervioso central en pacientes pediátricos en primer y segundo nivel de atención, 2018, Tratamiento Quirúrgico, Página 21." 
            },
            {
                id: 14, 
                question: "Ante la confirmación de sobrepeso y obesidad en niños y adolescentes mediante antropometría anormal en la primera consulta, ¿cuál es el primer estudio que debe solicitarse para guiar la conducta?", 
                options: ["Referencia a Endocrinología Pediátrica", "Bioimpedancia eléctrica del paciente", "Glucosa sérica y lípidos", "Inicio de programa nutricional"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Sobrepeso y Obesidad Pediátrica, todo paciente que se clasifica con antropometría anormal y clínica de sobrepeso/obesidad (luz roja en el algoritmo) debe obligatoriamente someterse a escrutinio metabólico de laboratorio antes de ser referido o tratado, para descartar daño orgánico silencioso ya establecido como dislipidemias o resistencia a la insulina.<br><br>Perla ENARM: Algoritmo 1: \"Paciente con antropometría anormal -> Realizar estudio bioquímico (glucosa sérica y perfil de lípidos)\".<br><br>Análisis de Distractores: La referencia a pediatría o endocrinología solo procede si esos laboratorios confirman fehacientemente Síndrome Metabólico o Diabetes. La bioimpedancia eléctrica es de utilidad para pacientes dudosos con IMC normal o deportistas. Iniciar un programa nutricional intensivo sin tener un panel de laboratorios base retrasa peligrosamente el diagnóstico y estadiaje de las letales comorbilidades cardiometabólicas ocultas.", 
                source: "GPC SS-025-08, Prevención y diagnóstico de sobrepeso y obesidad en niños y adolescentes, 2018, Algoritmos, Página 25." 
            },
            {
                id: 15, 
                question: "Según la GPC de Leucemia Aguda Pediátrica, ¿cuál hallazgo clínico indica la necesidad de iniciar tratamiento sustitutivo renal inmediatamente?", 
                options: ["Oliguria persistente al manejo", "Hematuria macroscópica sin coágulos", "Ácido úrico de 8", "Dolor lumbar severo intermitente"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Leucemia Aguda Pediátrica, el Síndrome de Lisis Tumoral genera precipitación aguda de cristales de ácido úrico y fosfato de calcio en los túbulos renales. Si la hiperhidratación y el alopurinol fracasan y se instaura una lesión renal aguda anúrica u oligúrica, el único método para depurar las toxinas amenazantes para la vida es la diálisis.<br><br>Perla ENARM: \"Si el paciente persiste con oliguria a pesar del tratamiento médico se sugiere valorar el tratamiento sustitutivo renal (diálisis/hemodiálisis)\".<br><br>Análisis de Distractores: El ácido úrico de 8 es un criterio diagnóstico bioquímico de lisis tumoral (criterios de Cairo-Bishop), pero se maneja médicamente de inicio. La hematuria o el dolor lumbar son signos inespecíficos que no representan una falla de filtración terminal inminente como la oliguria refractaria.", 
                source: "GPC SS-061-08, Diagnóstico oportuno de la leucemia aguda en pediatría, 2017, Urgencias hemato-oncológicas, Página 24." 
            },
            {
                id: 16, 
                question: "Ante la sospecha familiar de malformaciones asociadas a Enfermedad Renal Crónica, ¿a partir de qué momento gestacional debe solicitarse el tamizaje ultrasonográfico fetal estructural?", 
                options: ["12 semanas de gestación", "18 semanas de gestación", "20 semanas de gestación", "24 semanas de gestación"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedad Renal Crónica en pacientes menores de 18 años, el abordaje inicial profiláctico exige visualizar el tracto urinario tempranamente para detectar displasias o hidronefrosis severas que requieran derivación oportuna in utero (ej. válvulas de uretra posterior) o para planear un manejo experto multidisciplinario inmediatamente al nacer.<br><br>Perla ENARM: \"Se recomienda realizar USG prenatal a partir de la semana 18 de gestación, con búsqueda intencionada de malformaciones del parénquima renal y del tracto urinario\".<br><br>Análisis de Distractores: La semana 12 (A) es el momento ideal del tamizaje de translucencia nucal para cromosomopatías. Las semanas 20 a 24 (C, D) suelen usarse para el tamizaje anatómico estructural general y cardíaco detallado, pero la directriz estricta para el riñón marca que debe y puede vigilarse obligatoriamente de forma efectiva desde la semana 18.", 
                source: "GPC SS-188-18, Prevención, diagnóstico y referencia oportuna de la enfermedad renal crónica en pacientes menores de 18 años, 2018, Prevención Primaria, Página 14."

            {

                question: "Según la GPC, en un paciente con Criptorquidia unilateral palpable persistente, ¿cuál es el tiempo cronológico límite y definitivo que indica la necesidad de orquidopexia?",

                source: "GPC-SS-226-20, Detección, referencia oportuna y pautas de egreso hospitalario del recién nacido de término, 2020, Algoritmos, página 43."

            {
                id: 18, 
                question: "En relación a la epidemiología descriptiva del labio y paladar hendido, ¿cuál es la variante anatómica de la patología que se presenta con mayor frecuencia en pacientes del género femenino?", 
                options: ["Fisuras aisladas de paladar", "Labio hendido bilateral", "Labio y paladar completos", "Hendidura alveolar aislada"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Tratamiento del labio y paladar hendido, existe un claro dimorfismo sexual clínico en la presentación y severidad fenotípica de los defectos de la línea media facial y fusión de los procesos maxilares. Mientras los infantes varones sufren estadísticamente más del síndrome conjunto complejo (labio y paladar completos severos), las mujeres predominan francamente en el defecto restrictivo anatómico posterior (solo el paladar).<br><br>Perla ENARM: \"El labio y paladar hendidos es más frecuente en el género masculino, mientras que las fisuras aisladas de paladar son más frecuentes en el género femenino, con una relación hombre/mujer de 1:1.5\".<br><br>Análisis de Distractores: Las opciones de labio hendido bilateral (B) y labio y paladar completos o combinados (C) son fenotipos severos que, de forma general poblacional, predominan estadísticamente en el género masculino, por lo que son incorrectas en este contexto clínico diferencial.", 
                source: "GPC SS-807-17, Tratamiento ortopédico y quirúrgico del labio y paladar hendido en niños menores de dos años de edad, 2017, Justificación, Página 7." 
            },
            {
                id: 19, 
                question: "Según la GPC para el abordaje de la obesidad mórbida en adolescentes, ¿cuál de las siguientes situaciones clínicas extremas se considera una contraindicación mayor absoluta para realizar la cirugía bariátrica?", 
                options: ["Índice de Masa Corporal estancado en 38", "Cierre epifisiario óseo prematuro", "Falla orgánica múltiple activa", "Hernia hiatal gigante asintomática"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Obesidad Mórbida en Adolescentes, el equipo multidisciplinario debe descartar las condiciones basales donde el inmenso impacto y estrés fisiológico del acto quirúrgico y anestésico supere con creces cualquier beneficio metabólico o ponderal a futuro, llevando al paciente a una muerte segura en quirófano o terapia intensiva.<br><br>Perla ENARM: Cataloga y enlista explícitamente las contraindicaciones mayores absolutas prequirúrgicas, incluyendo: \"Falla orgánica múltiple, neoplasia o metástasis no controlada, o enfermedad psiquiátrica severa inestable\".<br><br>Análisis de Distractores: Un alto Índice de Masa Corporal estancado en 38 (A) con comorbilidades asociadas sí cumple a la perfección los criterios de inclusión para autorizar la cirugía. El cierre epifisiario documentado en radiografías (B) demuestra franca madurez ósea y puberal y es un requisito altamente deseable, no contraindicado. La presencia anatómica de una hernia hiatal (D) se puede reparar y corregir anatómicamente con cruroplastia sin problemas durante el mismo acto quirúrgico bariátrico laparoscópico.", 
                source: "GPC IMSS-050-08, Tratamiento Quirúrgico de la Obesidad Mórbida en la Población Adolescente, 2018, Contraindicaciones Quirúrgicas, Página 42." 
            },
            {
                id: 20, 
                question: "Utilizando la clasificación de gravedad laboratorial para Hemofilia A, ¿cómo se clasifica a un paciente con hemartrosis ocasionales por trauma leve y un nivel de Factor VIII del 3%?", 
                options: ["Hemofilia A grave", "Portador asintomático", "Hemofilia A leve", "Hemofilia A moderada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Hemofilia Hereditaria Pediátrica, la severidad pronóstica de la enfermedad se define y clasifica estrictamente por el porcentaje biológico de actividad del factor deficiente circulante en plasma. El rango limítrofe de 1% a menos del 5% cataloga invariablemente al paciente como fenotipo moderado, quienes suelen sangrar ante traumas menores o cirugías, pero rara vez de forma espontánea.<br><br>Perla ENARM: \"Realizar el diagnóstico de hemofilia, A o B, y la clasificación de la gravedad, de acuerdo al nivel plasmático de actividad del FVIII o IX: Grave- < 1%, Moderado-1 a <5%, Leve- > 5 a 40 %\".<br><br>Análisis de Distractores: La opción A (grave) requiere obligatoriamente niveles virtualmente indetectables <1% (sangran espontáneamente). La opción C (leve) se sitúa con seguridad entre >5% y 40% (solo sangran ante traumas mayores). La opción B no aplica clínicamente, los hombres siempre expresan fenotípicamente la enfermedad si heredan el gen.", 
                source: "GPC IMSS-141-18, Diagnóstico y Tratamiento de Hemofilia Hereditaria en Menores de 16 Años, 2018, Diagnóstico Clínico, Página 27." 
            },
            {
                id: 21, 
                question: "Según la GPC de Primera Crisis Convulsiva, ¿cuál es el criterio clínico o temporal normativo absoluto que indica la necesidad de hospitalización del paciente para observación?", 
                options: ["Edad mayor a cinco años", "Presencia de fiebre de 38°C", "Estado postictal mayor a 30 minutos", "Crisis clónicas de dos minutos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Primera Crisis Convulsiva, un cerebro que no recobra sus funciones superiores en media hora sugiere un agotamiento patológico grave, disfunción estructural subyacente o un estatus epiléptico no convulsivo en curso.<br><br>Perla ENARM: \"Aplicar los criterios de hospitalización en personas que presentaron una crisis convulsiva, en las siguientes condiciones: [...] estado postictal 30 minutos, posterior al evento convulsivo\".<br><br>Análisis de Distractores: La fiebre en un niño de preescolar con crisis autolimitada es de manejo ambulatorio (crisis febril). Convulsiones de 2 minutos no indican hospitalización obligada si hay recuperación total íntegra.", 
                source: "GPC IMSS-244-09, Guía de Práctica Clínica Diagnóstico y Tratamiento de la Primera Crisis Convulsiva, 2017, Criterios de referencia y contrarreferencia." 
            },
            {
                id: 22, 
                question: "Ante la sospecha clínica de Ictericia Neonatal en un paciente mayor de 35 semanas de gestación después de sus primeras 24 horas de vida, ¿cuál es el primer abordaje o estudio de tamizaje que debe solicitarse?", 
                options: ["Medición de bilirrubinas séricas", "Prueba de antiglobulina directa", "Bilirrubina en cordón umbilical", "Uso de bilirrubinómetro transcutáneo"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Ictericia Neonatal, siempre que el recién nacido no esté en su primer día de vida (donde toda ictericia es patológica) y no tenga prematurez extrema (<35 sdg), el abordaje diagnóstico inicial debe ser amigable, rápido y no invasivo para evitar dolor, sangrado y estrés innecesario al binomio.<br><br>Perla ENARM: \"Usar un bilirrubinómetro transcutáneo en recién nacidos con edad gestacional de ≥35 semanas y edad postnatal mayor de 24 horas\".<br><br>Análisis de Distractores: Las bilirrubinas séricas (A) se reservan obligatoriamente como paso inicial cruento únicamente si el paciente tiene <35 semanas o <24 horas de vida. La prueba de Coombs (B) y la sangre de cordón umbilical (C) están explícitamente no recomendadas como métodos iniciales de rutina universal para predecir la gravedad de la hiperbilirrubinemia en el algoritmo de tamizaje poblacional.", 
                source: "GPC IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 18." 
            },
            {
                id: 23, 
                question: "En la Estenosis Hipertrófica Congénita de Píloro, ¿cuál es el mecanismo fisiopatológico microscópico y anatómico central que describe la guía para explicar los intensos síntomas obstructivos?", 
                options: ["Atrofia de mucosa gástrica.", "Agenesia del plexo mientérico.", "Hiperplasia de capa muscular.", "Inflamación por metaplasia intestinal."], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Estenosis Hipertrófica de Píloro, la brusca disminución u obliteración total de la luz intestinal (canal pilórico) ocurre estricta y puramente por alteraciones desproporcionadas en el crecimiento de las células de la pared muscular circular (y en menor grado longitudinal) de la región antro-pilórica gástrica, generando un obstáculo dinámico y anatómico infranqueable para el bolo lácteo.<br><br>Perla ENARM: \"La Estenosis Hipertrófica Congénita de Píloro es la disminución de la luz intestinal a nivel del píloro debido a hipertrofia e hiperplasia de la capa muscular de la porción antro-pilórica del estómago\".<br><br>Análisis de Distractores: La letal agenesia agangliónica del plexo mientérico y submucoso (B) es la fisiopatología característica pero de la Enfermedad de Hirschsprung (megacolon agangliónico), típicamente de la región recto-sigmoidea. Las raras atrofias (A) o inflamaciones crónicas de la mucosa no originan potentes masas obstructivas palpables pétreas (\"olivas\") en el abdomen durante el primer mes de vida.", 
                source: "GPC IMSS-330-10, Diagnóstico y tratamiento de la Estenosis Hipertrófica Congénita de Píloro, 2017, Introducción, Página 6." 
            },
            {
                id: 24, 
                question: "En el espectro severo de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cómo se clasifica clínicamente al paciente que cursa con volumen excesivo de líquido en pleura y pericardio in útero?", 
                options: ["Síndrome de hemólisis masiva", "Encefalopatía aguda por bilirrubina", "Hídrops fetalis por isoinmunización", "Kernicterus de inicio temprano"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Isoinmunización a Rh Neonatal, la destrucción severa y sostenida de eritrocitos genera anemia profunda, descompensación cardíaca con falla sistémica y extravasación capilar masiva de líquidos (edema generalizado) que compromete drásticamente la vida fetal y neonatal inmediata.<br><br>Perla ENARM: \"La forma grave de la isoinmunización a factor Rh se conoce como hídrops fetalis la cual por lo general produce la muerte del feto in útero... se puede encontrar como consecuencia de volumen excesivo de líquido en dos o más de los siguientes compartimentos fetales: Piel, Pleura, Pericardio, Peritoneo\".<br><br>Análisis de Distractores: La opción A es un término fisiopatológico inespecífico. Las opciones B y D se refieren estricta y neurológicamente a la letal toxicidad por depósitos de bilirrubina indirecta en el tejido cerebral de ganglios basales (que ocurre post-nacimiento al fallar el aclaramiento placentario), no al acúmulo de líquido en serosas fetales por falla cardiaca anémica.", 
                source: "GPC IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Signos y Síntomas, Página 37." 
            },
            {
                id: 25, 
                question: "Según el estricto manejo clínico y dietético de la Pelagra aguda, ¿cuál es el hallazgo o grave complicación en la mucosa digestiva alta que indica ineludiblemente la prescripción inmediata de una dieta líquida o blanda fría?", 
                options: ["Diarrea crónica intratable con sangre", "Glositis severa dolorosa con disfagia", "Queilosis angular y sangrado gingival", "Adelgazamiento cutáneo generalizado"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Pelagra en Edad Pediátrica, el pavoroso daño atrófico y estructural celular al epitelio de rápido recambio gastrointestinal comienza tempranamente y es más visible desde la mucosa de la cavidad oral. La inflamación edematosa y dolorosa severa de la lengua (clásica glositis rojo intenso y brillante, \"lengua de vaca\") imposibilita mecánicamente y por intenso dolor la masticación o deglución de alimentos sólidos calientes o ácidos, llevando a la anorexia del niño.<br><br>Perla ENARM: \"Cuidados adicionales: En caso de glositis severa se requiere una dieta blanda (sin irritantes) para superar la disfagia\".<br><br>Análisis de Distractores: La profusa diarrea crónica pelagrosa (A) se controla sistémicamente al suplementar la niacina faltante, pero no justifica ni requiere mecánicamente prescribir una dieta licuada o blanda de inicio (se darían astringentes). La queilosis (C) (fisuras en comisuras labiales) duele intensamente pero no impide primariamente el tránsito o constricción esofágica. El adelgazamiento cutáneo dérmico (D) requiere cremas emolientes y zinc, no modificaciones mecánicas en la consistencia espesa de la dieta hospitalaria.", 
                source: "GPC IMSS-430-10, Diagnóstico y Tratamiento de la Pelagra en Edad Pediátrica, 2017, Tratamiento Nutricional y Cuidados, Página 18." 
            },
            {
                id: 26, 
                question: "Ante un paciente pediátrico con Otitis Media Aguda que súbitamente desarrolla aumento de volumen retroauricular, fiebre de difícil control y eritema local, ¿cuál es el primer estudio de imagen que debe solicitarse para orientar el abordaje quirúrgico?", 
                options: ["Tomografía computarizada de mastoides", "Radiografía simple de cráneo", "Resonancia magnética con gadolinio", "Ultrasonido de tejidos blandos"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, el cuadro clínico es clásicamente sugestivo de mastoiditis aguda (complicación intratemporal). La evaluación de la erosión ósea y la extensión del absceso requiere cortes de alta resolución del hueso temporal.<br><br>Perla ENARM: \"En casos de OMA con complicación intratemporal el estudio de elección es la TC de cortes finos\".<br><br>Análisis de Distractores: La opción B es un estudio deficiente para evaluar complicaciones supurativas. La opción C es el estándar de oro exclusivamente para descartar complicaciones intracraneales (meningitis, trombosis del seno). La opción D es útil para evaluar colecciones cervicales, pero nada útil para la anatomía intratemporal.",

            {
                id: 27, 
                question: "¿Cuál es la validada escala radiológica estandarizada recomendada universalmente por la guía para predecir el pronóstico, evaluar el daño estructural y tomar decisiones funcionales anuales en un paciente mayor de 8 años con artropatía por Hemofilia?",

            {
                id: 31, 
                question: "¿Cuál es el marcador antropométrico que predice mayor riesgo de mortalidad en un paciente pediátrico con Diarrea Aguda reportado en la Guía de Práctica Clínica?",

                source: "GPC SS-156-18, Prevención, diagnóstico y tratamiento de diarrea aguda en pacientes de 2 meses a 5 años de edad, en el primer y segundo nivel de atención, 2018, Pronóstico, Página 35."

            {
                id: 32, 
                question: "En el contexto del Linfoma No Hodgkin en pediatría, ¿cuál es la infección viral con mayor asociación etiológica a la variedad endémica de Burkitt reportada por la GPC?",

            {

                question: "¿Cuál es el invaluable marcador laboratorial multianual que predice inobjetablemente el riesgo a largo plazo de desarrollar morbilidad severa irreversible micro y macrovascular (ceguera, diálisis, infartos) en un paciente con Diabetes Mellitus?", 
                options: ["Curva de tolerancia oral a la glucosa repetida.", "Hemoglobina Glucosilada capilar o sérica (HbA1c).", "Péptido C sérico postprandial.", "Fructosamina sérica mensual."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Diabetes y múltiples estudios poblacionales globales (DCCT/UKPDS), este indestructible e inalterable biomarcador exhibe matemáticamente de forma brillante y retrospectiva la inmensa carga real de hiperglucemia, estrés oxidativo y daño crónico silencioso que han soportado obligadamente los frágiles epitelios mesangiales renales y los finos capilares retinianos, midiendo meses ininterrumpidos (120 días) de control metabólico fraccionado total y posicionándose indiscutiblemente como la escala pronóstica celular de mayor contundencia y rigor médico del mundo actual.<br><br>Perla ENARM: \"Conocer el nivel de HbA1c, permite predecir la presencia de complicaciones crónicas; por lo que el automonitoreo de la glucosa capilar puede predecir el nivel de HbA1c\".<br><br>Análisis de Distractores: Las invasivas pruebas funcionales provocadas (como la curva tolerante de la glucosa o CTOG) (A) únicamente encasillan al paciente en un inestable estatus diagnóstico agudo pre-clínico o límite, sin ninguna proyección a futuro. El polipéptido inactivo fraccionado pancreático (Péptido C endógeno) (C) sirve magníficamente para medir las escasas reservas beta latentes de vida productiva pancreática residual y clasificar el tipo de diabetes, pero no predice la retinopatía letal vascular. La inestable medición sérica de la albúmina humana modificada y glicada (Fructosamina) (D) resulta clínicamente irrelevante y ociosa como parámetro de pronóstico multianual definitivo al describir tan solo con torpeza el fugaz control agudo subagudo oscilante muy reciente (15-20 días).", 
                source: "GPC SS-302-21, Diagnóstico y tratamiento de la diabetes mellitus tipo 1 y tipo 2 en paciente pediátrico, 2021, Monitoreo del paciente y complicaciones, Página 24."

            {

                question: "Utilizando la Clasificación Radiológica del Síndrome de Dificultad Respiratoria, ¿cómo se clasifica a un recién nacido prematuro con broncograma aéreo visible que sobrepasa la silueta cardíaca?",

            {
                id: 36, 
                question: "En la Encefalopatía Hipóxico-Isquémica, ¿cuál es el hallazgo gasométrico en sangre de cordón umbilical que integra el diagnóstico presuntivo de asfixia perinatal según la Guía de Práctica Clínica?", 
                options: ["pH arterial menor a 7.20", "Presión de dióxido normal", "Lactato sérico mayor a 5", "Déficit de base mayor a 12"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Encefalopatía Hipóxico-Isquémica, el diagnóstico de asfixia se confirma objetivamente al nacimiento mediante parámetros gasométricos estrictos que reflejan el metabolismo anaerobio prolongado in útero. Un déficit de base igual o mayor a 12 mmol/L, o un pH de 7.00 o menor, son los marcadores absolutos que evidencian un alto componente isquémico intraparto severo.<br><br>Perla ENARM: \"Con pH menor de 7.0 en sangre de la arteria umbilical o déficit de base mayor o igual de 12 mmol / L o ambos, aumenta la probabilidad de que la encefalopatía neonatal, haya tenido un componente hipóxico durante el parto\".<br><br>Análisis de Distractores: El pH para normar criterio diagnóstico estricto de asfixia debe ser $\\le$ 7.00; si el pH está por arriba de 7.20 (A) es poco probable que la hipoxia pura sea la causa primaria de la encefalopatía (buscar infecciones o malformaciones). La PCO2 no es el criterio inicial de asfixia metabólica (B), y el lactato, aunque es un biomarcador de isquemia útil, no funge como el criterio operativo de inclusión en los algoritmos nacionales (C).", 
                source: "GPC IMSS-371-10, Diagnóstico, Tratamiento y Pronóstico de la Encefalopatía Hipóxico-Isquémica, 2017, Criterios Diagnósticos, Página 27."

            {

                question: "¿Cuál es el factor de riesgo con mayor asociación y el mecanismo más frecuente de quemaduras en niños menores de 5 años reportado por la GPC?", 
                options: ["Corriente eléctrica en exteriores", "Escaldadura en la cocina", "Fuego directo en recámara", "Sustancias químicas en baño"],

                source: "GPC SS-090-18, Prevención, diagnóstico y tratamiento de quemaduras en niños y adolescentes, 2018, Justificación, Página 13." 
            },
            {
                id: 38, 
                question: "¿Cuál es el dato clínico o paraclínico clave que permite distinguir el Choque por Sepsis Neonatal de los errores innatos del metabolismo (su principal diagnóstico diferencial)?", 
                options: ["Aumento del lactato sérico", "Hiperamonemia en pruebas sanguíneas", "Acidosis metabólica muy severa", "Taquicardia de difícil control"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Neonatal, los errores innatos del metabolismo de presentación temprana (como los defectos del ciclo de la urea o acidemias orgánicas) comparten un fenotipo letárgico idéntico al choque séptico. Sin embargo, encontrar niveles marcadamente anormales de amonio sérico (hiperamonemia) o hipoglucemia intratable orientan casi en exclusiva a un defecto metabólico primario, cambiando por completo el pronóstico y el tratamiento.<br><br>Perla ENARM: \"Los errores innatos del metabolismo pueden simular el choque séptico, como resultado de la hiperamonemia o de la hipoglucemia, por lo que se deben de realizar las pruebas de laboratorio apropiadas para descartar estas condiciones\".<br><br>Análisis de Distractores: El aumento de lactato, la acidosis metabólica y la taquicardia son datos universales del metabolismo anaerobio e hipoperfusión celular, por lo que estarán presentes tanto en la sepsis franca como en las crisis metabólicas, sin aportar valor discriminatorio diferencial.", 
                source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 4. Choque Séptico, Página 42." 
            },
            {
                id: 39, 
                question: "En Sepsis Pediátrica, ¿cuál es el marcador bioquímico de inflamación que, aún reportado como negativo, imposibilita descartar el diagnóstico presuntivo?", 
                options: ["Proteína C Reactiva", "Procalcitonina sérica", "Conteo de leucocitos", "Dímero D sérico"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Sepsis Pediátrica, los marcadores bioquímicos de inflamación suelen ser sensibles, pero carecen de especificidad. Al evaluar a un paciente pediátrico, el hallazgo de procalcitonina negativa no es suficiente para omitir el abordaje diagnóstico, ya que no descarta la presencia de infección bacteriana subyacente.<br><br>Perla ENARM: \"Procalcitonina (≥ 2 SD) esta prueba se considera herramienta de utilidad en infecciones bacterianas por lo que al estar negativa no se pueden descartar otras etiologías\".<br><br>Análisis de Distractores: La Proteína C Reactiva también se utiliza, pero la guía hace el señalamiento específico y directo sobre la procalcitonina y su nulo valor para \"descartar\" etiologías de forma aislada. El conteo de leucocitos y el Dímero D forman parte de los criterios de disfunción o de sospecha, pero no tienen esta acotación clínica específica en el documento.", 
                source: "GPC SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en pacientes de 1 mes a 18 años de edad en los tres niveles de atención, 2017, Diagnóstico de Sepsis, Página 12." 
            },
            {
                id: 40, 
                question: "¿Cuál es el útil marcador laboratorial inflamatorio de seguimiento que predice o se asocia estadísticamente a un mayor riesgo biológico de desarrollar \"estenosis intestinal\" fibrótica como severa secuela a largo plazo en los supervivientes de Enterocolitis Necrosante?", 
                options: ["Niveles de Procalcitonina basales muy elevados", "Proteína C Reactiva (PCR) persistentemente elevada", "Trombocitopenia de consumo masiva menor a 50,000", "Leucocitos reactivos y en banda mayores a 25,000"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enterocolitis Necrosante, un alto, persistente y silente grado de inflamación focalizada sostenida en la mucosa (medible en sangre) genera a la larga una mala cicatrización fibrótica y retráctil y una reducción del lumen del tejido intestinal necrosado que intentó curarse, originando estenosis y nueva obstrucción mecánica.<br><br>Perla ENARM: \"Se sugiere monitorizar los niveles de Proteína C Reactiva (PCR) en los neonatos con ECN por el riesgo de desarrollo de estenosis intestinal. Los pacientes que desarrollan estenosis presentan niveles persistentemente más elevados de PCR\".<br><br>Análisis de Distractores: Aunque la temida trombocitopenia de consumo por microtrombos (C) y la aparatosa leucocitosis (D) son excelentes marcadores agudos de una gravedad generalizada o franca sepsis y peritonitis en la fase aguda inestable, la GPC vincula y asocia clínica, específica y estadísticamente el incremento crónico y persistente de la Proteína C Reactiva (B) con la aparición de la estenosis tubular tardía como un invaluable punto de buena práctica médica para programar contrastes fluoroscópicos de seguimiento.", 
                source: "GPC SS-481-18, Diagnóstico y Tratamiento de la Enterocolitis Necrosante del Recién Nacido, 2018, Diagnóstico (Estenosis post-ECN), Página 40." 
            },
            {
                id: 41, 
                question: "En el Sarcoma de Ewing pediátrico, ¿cuál es el hallazgo radiológico clásico que integra el diagnóstico presuntivo según la GPC?", 
                options: ["Reacción perióstica en sol naciente", "Imagen en capas de cebolla", "Lesión lítica en sacabocados", "Triángulo de Codman invertido"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Sarcoma de Ewing, la evaluación inicial mediante imagenología simple revela signos sugestivos de agresividad ósea. La reacción perióstica es producida por el tumor, generando hueso reactivo visible como lamelas concéntricas o \"capas de cebolla\".<br><br>Perla ENARM: \"El primer estudio que se debe solicitar es una radiografía comparativa del hueso afectado... la reacción perióstica característica produce capas de hueso reactivo, descrito como imagen en capas de cebolla\".<br><br>Análisis de Distractores: La imagen en sol naciente es típica del osteosarcoma, el cual es su principal diagnóstico diferencial radiológico. Las lesiones líticas en sacabocados se asocian al mieloma múltiple. El triángulo de Codman (no invertido) también puede presentarse, pero la imagen en capas de cebolla es la descripción más clásica para esta patología.", 
                source: "GPC-SS-379-18, Diagnóstico y tratamiento del sarcoma de Ewing en pediatría, 2018, Diagnóstico, p. 10." 
            },
            {
                id: 42, 
                question: "¿Cuál es el dato clínico definitorio que permite distinguir rápidamente la Infección de Vías Urinarias de una bacteriuria asintomática en la evaluación de un paciente pediátrico?", 
                options: ["Presencia de múltiples patógenos", "Signos de respuesta inflamatoria", "pH urinario marcadamente alcalino", "Densidad urinaria muy elevada"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Infección de Vías Urinarias pediátrica, aislar microorganismos no virulentos o comensales que no generan activación de células blancas, fiebre o síntomas irritativos del urotelio caracteriza el perfil no infeccioso de la bacteriuria asintomática, y su tratamiento no confiere ningún beneficio.<br><br>Perla ENARM: \"La bacteriuria asintomática se define como la presencia de microorganismos en el tracto urinario sin que se presenten síntomas ni signos de respuesta inflamatoria en las vías urinarias\".<br><br>Análisis de Distractores: El desarrollo de múltiples patógenos (A) es característico de muestras contaminadas por una técnica de recolección ineficiente, no de un estado diagnóstico fisiológico. El pH alcalino (C) y la densidad (D) varían según el estado metabólico y nutricional, sin definir el umbral sintomático infeccioso.",

            {

                question: "¿Cuál es el puntaje cuantitativo numérico de la escala pronóstica pediátrica de Hammersmith que confirma o predice el diagnóstico inequívoco de Parálisis Cerebral?",

                source: "GPC DIF-332-18, Evaluación diagnóstica de parálisis cerebral en lactantes, 2018, Diagnóstico Clínico, Página 16."

                question: "Ante la sospecha clínica de trauma craneal por abuso físico infantil en un lactante menor de 3 meses con apnea y letargo sin antecedente traumático claro, ¿cuál es el primer estudio de imagen indicado según la GPC?",

                justification: "Justificación: De acuerdo a la GPC de Asma en Edad Pediátrica, prescribir LABA sin un corticoesteroide inhalado concomitante genera enmascaramiento de la inflamación subyacente y tolerancia a receptores, aumentando drásticamente la mortalidad o recaída aguda.<br><br>Perla ENARM: \"No se encontró evidencia del uso de los β2-agonistas de acción prolongada (LABA, por sus siglas en inglés), como monoterapia de rescate, porque aumentan el riesgo de crisis asmática. Solo se debe iniciar LABA en pacientes que usan corticoesteroide de mantenimiento.\"<br><br>Análisis de Distractores: Usarlos como terapia de mantenimiento (A) o en conjunto con corticoesteroides inhalados (C) es exactamente la indicación oficial a partir del paso 3. Su uso general en mayores de doce años (D) no está contraindicado.",

            {

                question: "Según el estricto algoritmo para \"días de enfermedad intercurrente\" en un paciente con Diabetes Mellitus Tipo 1, ante un paciente infectado con fiebre, hiporexia, glucemia capilar de 200 mg/dl y con presencia en tirilla de cetonas moderadas/altas (>1.5 mmol/L), ¿cuál es el manejo terapéutico correctivo de urgencia en casa?",
