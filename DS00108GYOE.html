    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿En qué grupo etario el Cáncer de Mama ocupa el primer lugar de mortalidad por tumor maligno en mujeres mexicanas?", 
                options: ["Mayores de 25 años", "Mayores de 40 años", "Mayores de 50 años", "Mayores de 65 años"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, esta patología ha presentado una transición epidemiológica crítica, superando al cáncer cervicouterino en etapas más tempranas de la vida adulta.<br><br>Perla ENARM: \"...ocupa el primer lugar de mortalidad, por tumor maligno en mujeres mayores de 25 años de edad, desplazando al cáncer cervicouterino.\"<br><br>Análisis de Distractores: Las edades de 40, 50 y 65 años marcan pautas para tamizaje y picos de incidencia, pero la mortalidad como primera causa global tumoral se registra a partir de los 25 años en la demografía mexicana actual.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Justificación, p. 12." 
            },
            {
                id: 2, 
                question: "¿Cuál de las siguientes condiciones en la historia clínica confiere un riesgo relativo de 4.0 para el desarrollo de Cáncer de Mama?", 
                options: ["Obesidad postmenopáusica", "Nuliparidad", "Hiperplasia atípica confirmada", "Menarca antes de 12 años"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la presencia de alteraciones proliferativas previas comprobadas por histología es uno de los factores biológicos con mayor peso para una progresión a malignidad franca, cuadruplicando el riesgo basal.<br><br>Perla ENARM: \"Riesgo relativo 4.0: Mutación en los genes BRCA1 y BRCA2, Dos o más familiares de primer grado..., Historia personal de cáncer de mama, Hiperplasia atípica confirmada con biopsia.\"<br><br>Análisis de Distractores: La obesidad postmenopáusica, la nuliparidad y la menarca temprana son factores de riesgo menores bien documentados, pero otorgan un riesgo relativo que oscila únicamente entre 1.1 a 2.0.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Cuadro 1, p. 51." 
            },
            {
                id: 3, 
                question: "En la evaluación de un hallazgo palpable focal, ¿en qué estado fisiológico el estudio de imagen inicial de elección es el ultrasonido mamario?", 
                options: ["Menopausia temprana", "Periodo de lactancia", "Densidad mamográfica baja", "Premenopausia sintomática"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, los cambios hipertróficos y galactofóricos propios de la gestación y el puerperio disminuyen severamente la sensibilidad de la mastografía, volviendo a la sonografía el método inicial más seguro y efectivo.<br><br>Perla ENARM: \"¿Está embarazada o lactando? SI -> Ultrasonido mamario.\"<br><br>Análisis de Distractores: La menopausia temprana y premenopausia no contraindican la mastografía como método diagnóstico primario si la paciente es mayor de 40 años. Una densidad mamográfica baja favorece aún más el uso de mastografía.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Algoritmo 3, p. 56." 
            },
            {
                id: 4, 
                question: "¿A partir de cuánto tiempo de uso continuo la terapia de reemplazo hormonal se considera un factor de riesgo para el desarrollo de la enfermedad?", 
                options: ["> 1 año", "> 3 años", "> 5 años", "> 10 años"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la exposición prolongada a estrógenos/progestágenos exógenos en edades avanzadas promueve estímulos proliferativos que incrementan la incidencia del cáncer, por lo que siempre se sugiere el uso más breve posible.<br><br>Perla ENARM: \"Factores de riesgo: Uso de terapia de remplazo hormonal de largo plazo en edades avanzadas (>5 años).\"<br><br>Análisis de Distractores: Las opciones de 1 o 3 años no superan el umbral documentado de riesgo clínico significativo en la guía. Un periodo de 10 años es un riesgo comprobado, pero el punto de corte epidemiológico exacto es 5 años.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Detección, p. 16." 
            },
            {
                id: 5, 
                question: "Ante la presencia de signos y síntomas francos sugestivos de malignidad en la exploración primaria, ¿cuál debe ser el manejo inmediato?", 
                options: ["Biopsia en el consultorio", "Ultrasonido mamario urgente", "Mastografía con conos", "Referir sin estudios confirmatorios"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, cuando la evidencia clínica es altamente sugestiva (ej. úlcera, retracción, piel de naranja), solicitar gabinete en primer nivel genera una demora burocrática inaceptable en el pronóstico oncológico.<br><br>Perla ENARM: \"Se recomienda que al establecer clínicamente la sospecha de tumor maligno de la mama, será motivo de referencia inmediata al nivel de referencia superior... sin solicitar estudios confirmatorios para no retrasar la atención.\"<br><br>Análisis de Distractores: La biopsia en consultorio no está indicada en el primer nivel. Solicitar ultrasonido o mastografía retrasaría el envío a la clínica de mama donde se realizarán de manera integral y simultánea al abordaje oncológico.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Referencia, p. 17." 
            },
            {
                id: 6, 
                question: "¿Cuál es el porcentaje esperado de posibilidad de malignidad para una lesión mamaria estratificada como categoría ACR BI-RADS 4?", 
                options: ["≤ 2%", "> 2% y < 95%", "≥ 95%", "0%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la categoría 4 abarca un espectro muy amplio de lesiones sospechosas (subdivididas en A, B y C) que justifican invariablemente la obtención de tejido para análisis histopatológico.<br><br>Perla ENARM: \"4 Sospechoso: > 2 % y < 95 % de sospecha de malignidad. Diagnóstico histológico.\"<br><br>Análisis de Distractores: El porcentaje ≤ 2 % corresponde a una lesión probablemente benigna (BI-RADS 3). El porcentaje ≥ 95 % define a la categoría 5 (altamente sugestivo de malignidad). El 0 % pertenece a las categorías 1 o 2.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Cuadro 2, p. 51." 
            },
            {
                id: 7, 
                question: "¿Qué intervención sobre el estilo de vida ha demostrado, con nivel de evidencia alto, una disminución significativa del riesgo de Cáncer de Mama?", 
                options: ["Abstinencia total de lactosa", "Dieta vegetariana estricta", "Actividad física aeróbica frecuente", "Suplementación de vitamina D"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, el control del peso y el ejercicio físico regular modulan la exposición estrogénica endógena periférica, impactando directamente en la prevención primaria.<br><br>Perla ENARM: \"Las guías para actividad física de los Estados Unidos, recomiendan que los adultos realicen al menos 150 minutos por semana de actividad física. Este nivel... ha demostrado reducción de las tasas de mortalidad prematura.\"<br><br>Análisis de Distractores: Las dietas estrictas sin lactosa o vegetarianas no figuran como recomendación primaria de la GPC. La suplementación vitamínica carece de soporte contundente frente al beneficio comprobado del ejercicio.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Promoción de la salud, p. 19." 
            },
            {
                id: 8, 
                question: "¿Cuál es la conducta de seguimiento temporal para una paciente cuyo reporte mastográfico es interpretado como BI-RADS 3?", 
                options: ["Biopsia por escisión", "Mastografía bilateral al año", "Intervención temprana a 6 meses", "Resonancia magnética basal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, las lesiones probablemente benignas requieren comprobar su estabilidad a corto plazo; si existe progresión en esos meses, se deriva a biopsia, limitando los falsos negativos.<br><br>Perla ENARM: \"3 Probablemente benigno: Intervención temprana (6 meses) seguimiento con mastografía.\"<br><br>Análisis de Distractores: La biopsia se reserva para categorías 4 o superiores. La vigilancia anual se aplica al tamizaje en lesiones BI-RADS 1 o 2. La resonancia magnética tiene indicaciones muy limitadas por genotipo o radioterapia previa, no por una categoría 3 rutinaria.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Cuadro 2, p. 51." 
            },
            {
                id: 9, 
                question: "¿Qué categoría ACR BI-RADS se define obligatoriamente como un reporte \"incompleto\" que requiere proyecciones adicionales antes de establecer un diagnóstico?", 
                options: ["Categoría 0", "Categoría 1", "Categoría 3", "Categoría 4"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, esta clasificación alerta al médico de que el estudio es insuficiente (por superposición de tejido o técnica) y es un error clínico dar de alta o enviar a biopsia sin resolver la insuficiencia de imagen.<br><br>Perla ENARM: \"0 Incompleto: Se necesita evaluación adicional de imagen y/o mastografías previas para comparar.\"<br><br>Análisis de Distractores: La categoría 1 es un estudio completo y negativo. La categoría 3 ya integró un hallazgo probable benigno. La categoría 4 integró un hallazgo sospechoso que requiere biopsia.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Cuadro 2, p. 51." 
            },
            {
                id: 10, 
                question: "¿Cuál de las siguientes características se incluye dentro del catálogo de lesiones de la categoría ACR BI-RADS 2?", 
                options: ["Microcalcificaciones lineales", "Nódulos con bordes espiculados", "Fibroadenomas calcificados", "Masa de densidad heterogénea"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, existen hallazgos estructurales que, a pesar de ser detectados, su morfología confirma una naturaleza inocua y no requieren vigilancia extraordinaria.<br><br>Perla ENARM: \"Estudio negativo con hallazgos benignos... incluye fibroadenomas calcificados, calcificaciones de la piel, cuerpos extraños metálicos y lesiones como quistes, lipomas...\"<br><br>Análisis de Distractores: Las microcalcificaciones lineales y los nódulos espiculados son datos altamente sospechosos (categorías 4 o 5). Una masa de densidad heterogénea no categorizada normalmente requiere valoración adicional (BI-RADS 0) o vigilancia estricta (BI-RADS 3) dependiendo de sus bordes.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Cuadro 3, p. 52." 
            },
            {
                id: 11, 
                question: "En el abordaje preventivo, ¿cuál es uno de los factores nutricionales específicos que ha reportado un efecto protector (RR de 0.85) contra el Cáncer de Mama?", 
                options: ["Aceite de oliva", "Lácteos enteros", "Alimentos sin gluten", "Frutos rojos secos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, algunos meta-análisis han sugerido que el consumo alto de productos derivados de la leche interfiere favorablemente en la disminución del riesgo a largo plazo.<br><br>Perla ENARM: \"Un metanálisis de 18 estudios... reportó un RR de 0.85 para el consumo alto de alimentos lácteos enteros comparado con el consumo más bajo, indicando disminución significativa del riesgo de cáncer de mama...\"<br><br>Análisis de Distractores: Aunque el aceite de oliva pertenece a dietas cardioprotectoras, la guía detalla el hallazgo estadístico específico de los lácteos enteros. El gluten y los frutos rojos no están enmarcados en la GPC como los protectores primarios documentados.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Factores de riesgo, p. 22." 
            },
            {
                id: 12, 
                question: "Según la evidencia disponible, ¿cuál alteración ósea en pacientes postmenopáusicas se considera un factor de riesgo para el desarrollo de Cáncer de Mama (RR 2.1 a 4.0)?", 
                options: ["Osteopenia leve aislada", "Osteoporosis generalizada", "Alta densidad ósea", "Fracturas vertebrales previas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la alta masa ósea posterior a la menopausia es un marcador indirecto de mayores niveles sostenidos de estrógenos endógenos a lo largo del tiempo, lo cual correlaciona directamente con el estímulo tumoral en mama.<br><br>Perla ENARM: \"Riesgo relativo 2.1 a 4 ... altas dosis de radiación en tórax, alta densidad ósea postmenopáusica.\"<br><br>Análisis de Distractores: La osteoporosis y la osteopenia o las fracturas se relacionan al déficit estrogénico que caracteriza la menopausia típica, no suponiendo un aumento de riesgo proliferativo en la mama.", 
                source: "S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama, 2017, Cuadro 1, p. 51." 
            },
            {
                id: 13, 
                question: "En pacientes evaluadas por tamizaje radiológico, ¿cuál es el nivel de atención médica definitivo al que se debe referir un resultado mastográfico BI-RADS 5?", 
                options: ["Centro de salud familiar", "Consulta externa de medicina general", "Segundo nivel de atención", "Tercer nivel o clínica especializada"],

        function displayQuestion(qId) {

            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoDProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoDLastQId', currentQuestionId);
                else localStorage.removeItem('gyoDLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoDProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
