    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál de las siguientes alteraciones endocrino metabólicas es considerada directamente como un factor de riesgo para el desarrollo de hepatocarcinoma en pacientes adultos?",
        options: ["Hipotiroidismo subclínico", "Diabetes mellitus", "Dislipidemia mixta", "Hiperuricemia crónica"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, el daño metabólico sistémico promueve un estado proinflamatorio crónico y esteatosis que culmina en oncogénesis, siendo indispensable su escrutinio clínico.<br><br>Perla ENARM: \"Se recomienda que los médicos busquen en los pacientes adultos los factores de riesgo asociados a HCC (cirrosis hepática, hepatitis C, hepatitis B, alcoholismo, exposición a aflatoxinas y diabetes mellitus).\"<br><br>Análisis de Distractores: El hipotiroidismo (A), la dislipidemia (C) y la hiperuricemia (D) son alteraciones de riesgo cardiovascular, pero no se asocian en la literatura oficial de la guía como detonadores directos y primarios de transformación maligna en el hepatocito.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Prevención, Página 18."
    },
    {
        id: 2,
        question: "¿Cuál es la intervención profiláctica específica de inmunización que se debe aplicar de manera universal para disminuir significativamente la incidence poblacional de hepatocarcinoma?",
        options: ["Vacuna contra hepatitis A", "Vacuna contra hepatitis B", "Inmunoglobulina G humana", "Vacuna contra neumococo"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, la integración del virus en el genoma celular tiene un alto poder mutagénico; cortar la cadena de transmisión desde la infancia previene el desarrollo de cronicidad hepática maligna.<br><br>Perla ENARM: \"Se recomienda aplicar la vacuna contra hepatitis B de acuerdo a los lineamientos de la OMS, ya vertidos en las cartillas nacionales de salud y verificar su aplicación en las mismas.\"<br><br>Análisis de Distractores: La hepatitis A (A) provoca enfermedad aguda autolimitada sin progresión a cirrosis. La inmunoglobulina (C) es profilaxis pasiva pos-exposición, no prevención primaria poblacional. La vacuna contra neumococo (D) previene sepsis en el cirrótico pero no el desarrollo oncológico.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Prevención, Página 20."
    },
    {
        id: 3,
        question: "¿Cuál es el estudio de imagen de elección que debe solicitarse para realizar la vigilancia preventiva en pacientes adultos asintomáticos con enfermedad hepática crónica?",
        options: ["Tomografía computarizada multifásica", "Gammagrama hepático con tecnecio", "Ultrasonido hepático convencional", "Resonancia magnética dinámica"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, el rastreo poblacional oncológico requiere un método sensible, de bajo costo y libre de radiación que pueda repetirse periódicamente sin daño acumulativo al paciente.<br><br>Perla ENARM: \"Se sugiere realizar vigilancia con ultrasonido con una frecuencia entre 6 a 12 meses en pacientes adultos con enfermedad hepática que incremente el riesgo de HCC.\"<br><br>Análisis de Distractores: La tomografía (A) y la resonancia (D) son estudios confirmatorios de segunda línea para caracterizar nódulos detectados, no de escrutinio. El gammagrama (B) tiene muy baja resolución anatómica para tamizaje milimétrico.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Diagnóstico, Página 23."
    },
    {
        id: 4,
        question: "Ante la sospecha clínica de una lesión maligna en el hígado, ¿cuál es el número de fases de contraste que se sugiere solicitar en la tomografía computarizada para establecer el diagnóstico radiológico?",
        options: ["1 fase", "2 fases", "3 fases", "4 fases"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, el patrón vascular diagnóstico (hipercaptación arterial rápida y lavado o \"wash-out\" venoso) solo puede evidenciarse si el barrido radiológico incluye los tiempos simple, arterial, portal y tardío.<br><br>Perla ENARM: \"Se sugiere realizar cuatro fases en la tomografía computarizada para el diagnóstico de HCC, si este método diagnóstico fue el elegido.\"<br><br>Análisis de Distractores: Realizar el estudio en 1 a 3 fases omitiría tiempos circulatorios críticos, resultando en un diagnóstico incompleto o falsamente negativo para neoangiogénesis tumoral.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Diagnóstico, Página 21."
    },
    {
        id: 5,
        question: "En un paciente adulto con indicación de etapificación imagenológica tumoral, ¿qué condición clínica obliga a elegir la resonancia magnética con contraste dinámico en lugar de la tomografía computarizada?",
        options: ["Insuficiencia cardiaca congestiva", "Alergia al medio de contraste", "Enfermedad pulmonar obstructiva", "Encefalopatía hepática crónica"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, ambos estudios poseen rendimiento diagnóstico similar para estratificar el tumor; sin embargo, el riesgo de anafilaxia por yodo tomográfico obliga a cambiar la modalidad de imagen hacia el uso de gadolinio.<br><br>Perla ENARM: \"Se recomienda realizar resonancia magnética con contraste dinámico en pacientes con sospecha de HCC alérgicos al medio de contraste que se usa en la tomografía.\"<br><br>Análisis de Distractores: La insuficiencia cardiaca (A), EPOC (C) y la encefalopatía (D) no son contraindicaciones absolutas directas que obliguen normativamente a preferir la resonancia magnética sobre la tomografía multifásica.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Diagnóstico, Página 21."
    },
    {
        id: 6,
        question: "Si un paciente con diagnóstico establecido no puede someterse a estudios de imagen con contraste para vigilancia clínica, ¿cuál es el marcador tumoral que se recomienda evaluar para su seguimiento?",
        options: ["Antígeno carcinoembrionario", "Alfa fetoproteína sérica", "Antígeno carbohidrato 19 9", "Antígeno prostático específico"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, aunque los marcadores séricos no deben usarse de forma asilada para el diagnóstico inicial, su elevación cuantitativa en el paciente ya diagnosticado es fundamental para detectar recaída cuando la imagen radiológica vascular está contraindicada.<br><br>Perla ENARM: \"Se recomienda realizar los niveles de AFP para el seguimiento de pacientes con HCC que no puedan realizar estudios de imagen con contraste.\"<br><br>Análisis de Distractores: El antígeno carcinoembrionario (A) rastrea el cáncer colorrectal. El CA 19 9 (C) evalúa tumores de vía biliar o páncreas. El antígeno prostático (D) es exclusivo de neoplasias de próstata.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Diagnóstico, Página 23."
    },
    {
        id: 7,
        question: "Cuál es el sistema de clasificación anatómica obligatorio para definir la extensión prequirúrgica de los tumores hepáticos malignos en la población pediátrica?",
        options: ["Criterios de Milán", "Escala de Child Pugh", "Clasificación de PRETEXT", "Clasificación de Barcelona"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, el abordaje pediátrico difiere del adulto al evaluar cuántos sectores hepáticos contiguos están libres de tumor, determinando así la factibilidad técnica de la cirugía inicial frente a la quimioterapia.<br><br>Perla ENARM: \"La ventaja de la estadificación PRETEXT es la de clasificar a los pacientes para un tratamiento quirúrgico más efectivo... dividiendo a los pacientes según el número de lóbulos no involucrados.\"<br><br>Análisis de Distractores: Los Criterios de Milán (A), la escala de Child Pugh (B) y la Clasificación de Barcelona o BCLC (D) son escalas validadas y utilizadas exclusivamente para dirigir la conducta oncológica en el paciente adulto con cirrosis.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Introducción y Anexos, Página 9 y 54."
    },
    {
        id: 8,
        question: "Utilizando la estadificación del cáncer de hígado de la Clínica de Barcelona (BCLC), ¿qué alteración clínica clasifica de manera automática al paciente en el Estadio D (terminal)?",
        options: ["Invasión de vena porta", "Metástasis pulmonar bilateral", "Nódulo tumoral ≥ 10 cm", "Estado funcional Child Pugh C"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, a diferencia de otras neoplasias, el tratamiento y la supervivencia en esta patología están limitados por la pérdida absoluta de la reserva funcional del órgano, invalidando las terapias antineoplásicas agresivas.<br><br>Perla ENARM: \"Estadio D: Carcinoma hepatocelular en etapa terminal (estado de desempeño deficiente o estado funcional del hígado Child-Pugh C).\"<br><br>Análisis de Distractores: La invasión portal (A) y las metástasis (B) catalogan al tumor en Estadio C avanzado. Un nódulo masivo ≥ 10 cm (C) por sí solo no vuelve la enfermedad terminal si la función hepática global (Child-Pugh A o B) aún está preservada.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Anexos (Cuadro 5), Página 55."
    },
    {
        id: 9,
        question: "Al realizar el cálculo pronóstico con la clasificación de Child Pugh, ¿qué característica clínica en la acumulación de líquido peritoneal otorga el puntaje máximo (3 puntos) para severidad?",
        options: ["Ascitis leve", "Ascitis moderada", "Ascitis tensa", "Ascitis tratada"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, la hipertensión portal descontrolada y la hipoalbuminemia severa generan un tercer espacio masivo que compromete la hemodinamia y la mecánica ventilatoria, marcando un estadio de fallo hepático terminal inminente.<br><br>Perla ENARM: \"Cuadro 6. Clasificación de Child-Pugh: Criterio Ascitis, 3 puntos corresponde a Tensa (III o IV).\"<br><br>Análisis de Distractores: La ascitis moderada (B) otorga únicamente 2 puntos a la suma total. Las categorías \"leve\" (A) o \"tratada\" (D) no corresponden a la nomenclatura oficial de gradación estricta de esta escala internacional.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Anexos (Cuadro 6), Página 55."
    },
    {
        id: 10,
        question: "De acuerdo con los criterios de Milán, ¿cuál es el diámetro máximo tolerated en una lesión tumoral única para que el paciente adulto sea candidato aceptable a trasplante hepático?",
        options: ["< 2 cm", "< 3 cm", "< 5 cm", "< 7 cm"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, extirpar todo el órgano garantiza la curación oncológica siempre y cuando el tamaño tumoral sea lo suficientemente pequeño como para asegurar que no ha ocurrido invasión microvascular silente que provoque recaída postoperatoria.<br><br>Perla ENARM: \"Criterios de Milán: Lesión única de menos de 5 cm de diámetro.\"<br><br>Análisis de Distractores: El límite de < 3 cm (B) aplica estrictamente cuando existen lesiones múltiples (hasta 3). Los nódulos < 2 cm (A) se clasifican como estadio muy temprano (BCLC 0). Diámetros de 7 cm (D) rebasan los criterios de intención curativa por alto riesgo de falla.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Anexos (Cuadro 4), Página 55."
    },
    {
        id: 11,
        question: "Para minimizar el riesgo de insuficiencia hepática aguda fulminante postquirúrgica, ¿cuál es el porcentaje mínimo de volumen remanente que se debe asegurar al realizar una resección en el adulto?",
        options: ["> 20 %", "> 30 %", "> 40 %", "> 50 %"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, el parénquima afectado por cirrosis tiene una tasa regenerativa y capacidad metabólica severamente depletada, exigiendo la preservación de un lecho de tejido residual mayor al que se requeriría en un paciente con hígado sano.<br><br>Perla ENARM: \"Se recomienda realizar resección quirúrgica en pacientes adultos con HCC resecable, adecuado estado funcional, buena reserva hepática, futuro remanente hepático suficiente (más de 40%)...\"<br><br>Análisis de Distractores: Remanentes del 20% (A) o 30% (B) son volúmenes tolerables exclusivamente tras donación en hígados completamente sanos, no en cirróticos. Un margen > 50% (D) no es obligatorio y excluiría a muchos pacientes de un manejo curativo viable.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Tratamiento, Página 36."
    },
    {
        id: 12,
        question: "¿Cuál es el tratamiento farmacológico de primera línea recomendado para el paciente adulto con enfermedad no resecable, estado funcional ECOG 0 y reserva hepática adecuada?",
        options: ["Sorafenib sistémico", "Regorafenib sistémico", "Cisplatino intravenoso", "Bevacizumab monoclonal"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de hepatocarcinoma, bloquear de manera sistémica los receptores de neoangiogénesis (VEGFR) y proliferación celular frena la progresión tisular irresecable, impactando positivamente en la sobrevida global del paciente.<br><br>Perla ENARM: \"Se recomienda usar sorafenib o lenvatinib en pacientes con HCC no resecable, no candidatos a terapia de control locorregional, con buen estado funcional (ECOG 0 y 1).\"<br><br>Análisis de Distractores: El regorafenib (B) se administra exclusivamente en segunda línea tras falla. El cisplatino (C) no es terapia estándar de adultos, sino componente del esquema pediátrico PLADO. El bevacizumab (D) no es monoterapia de primera elección en esta guía.",
        source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Tratamiento, Página 44."
    },
    {
        id: 13,
        question: "En un paciente adulto con enfermedad avanzada que se encuentra recibiendo tratamiento sistémico, ¿qué fármaco se debe emplear como terapia de segunda línea si presenta progresión clínica?",

            displayArea.classList.add('opacity-0');

                currentQuestionId = qId ? parseInt(qId) : null;

                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');

                    document.getElementById('main-content').classList.add('lg:ml-80');

                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGFMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGFMLastQId', currentQuestionId);
                else localStorage.removeItem('CGFMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGFMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
