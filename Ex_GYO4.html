                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "En una paciente obstétrica con sospecha clínica de Trombosis Venosa Profunda (TVP), ¿cuál es el estudio de imagen inicial que integra el diagnóstico presuntivo según la Guía de Práctica Clínica?", 
                options: ["Angiotomografía pulmonar computarizada.", "Ultrasonido con compresión venosa.", "Resonancia magnética sin contraste.", "Gamagrama de ventilación perfusión."], 
                answer: 1, 
                justification: "Justificación: El abordaje inicial ante una paciente con clínica clásica de trombosis en extremidades (aumento de volumen, dolor) busca evitar la exposición a radiación ionizante siempre que sea posible. De acuerdo a la GPC de Enfermedad Tromboembólica Venosa Obstétrica, el estándar inicial ante la sintomatología periférica no es un estudio avanzado de tórax, sino la evaluación directa del sistema venoso de la extremidad.<br><br>Perla ENARM: \"Se recomienda realizar ultrasonido con compresión en pacientes embarazadas con sospecha de TVP\".<br><br>Análisis de Distractores: La angiotomografía pulmonar y el gamagrama son estudios para confirmar la Tromboembolia Pulmonar (TEP), no la TVP inicial. La resonancia magnética no es el estudio de primera línea por costo y accesibilidad, reservándose para dudas diagnósticas posteriores.", 
                source: "GPC SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Pruebas diagnósticas, Página 25." 
            },
            {
                id: 2, 
                question: "Según la estrategia de prevención primaria (manejo activo) para la Hemorragia Postparto, además de la administración del uterotónico y el masaje uterino, ¿cuál es la medida física complementaria indicada universalmente?", 
                options: ["Extracción manual de placenta", "Compresión bimanual del segmento", "Revisión instrumentada de cavidad", "Tracción controlada del cordón"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, el manejo profiláctico integral busca acelerar el desprendimiento y expulsión completa de la placenta. La tracción firme, sostenida y combinada con contrapresión suprapúbica (maniobra de Brandt-Andrews) previene que queden restos que impidan la correcta retracción uterina o que ocurra una inversión uterina por esfuerzo inadecuado.<br><br>Perla ENARM: \"Se recomienda realizar manejo activo (uso de uterotónico, tracción del cordón umbilical y masaje uterino) del tercer periodo del trabajo de parto en todas las pacientes\".<br><br>Análisis de Distractores: La opción A se indica solo cuando la placenta no se expulsa (alumbramiento retenido) y es una retención franca comprobada. La opción B es ya un manejo agudo de tratamiento cuando hay atonía confirmada. La opción C no está indicada de manera rutinaria profiláctica ya que eleva el riesgo de infección y perforación.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Prevención, Página 19." 
            },
            {
                id: 3, 
                question: "¿Cuál es el dato clínico clave durante la monitorización que permite distinguir con claridad la Ruptura Uterina frente a un Desprendimiento Prematuro de Placenta (DPPNI)?", 
                options: ["Hemorragia transvaginal abundante", "Presencia de taquicardia materna", "Cese de actividad uterina", "Alteración del registro cardiotocográfico"], 
                answer: 2, 
                justification: "Justificación: Desde la lógica fisiopatológica, el músculo rasgado pierde la capacidad de contraerse en bloque. De acuerdo a la GPC de Ruptura Uterina, esta paciente cursa con un útero repentinamente \"silencioso\", en agudo contraste con el útero hipertrófico y leñoso (hipertonía) característico del DPPNI.<br><br>Perla ENARM: Se debe realizar cesárea de emergencia o laparotomía posparto, ante la posibilidad de una ruptura uterina en mujeres con factores de riesgo, con la siguiente sintomatología: Cese de la actividad uterina previamente eficiente.<br><br>Análisis de Distractores: La hemorragia (A), la taquicardia (B) por choque hipovolémico y la bradicardia/alteración fetal (D) son datos cardinales y comunes en el colapso que comparten ambas emergencias obstétricas. Ninguno de estos tres permite discriminar clínicamente entre el desprendimiento y el estallamiento uterino, a diferencia de la dinámica de las contracciones.", 
                source: "GPC SS-296-10, Prevención, diagnóstico y manejo oportuno de la ruptura uterina, 2017, Diagnóstico clínico, Página 27." 
            },
            {
                id: 4, 
                question: "Según la GPC de Enfermedades Hipertensivas del Embarazo, ¿cuál de los siguientes hallazgos clínicos representa una \"Complicación Severa\" e indica la necesidad inminente de nacimiento?", 
                options: ["Cefalea frontoparietal muy severa", "Edema agudo pulmonar", "Tensión arterial de 150/100", "Proteinuria de 300 miligramos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedades Hipertensivas del Embarazo, la incapacidad cardiaca grave ante las elevadísimas resistencias vasculares desencadena la fuga masiva de líquidos a los alvéolos. Representa una inestabilidad que compromete mortalmente la oxigenación materna y fuerza el cese inmediato de la gestación para aliviar el vasoespasmo global y salvar la vida de la madre y del feto suboxigenado.<br><br>Perla ENARM: \"Complicaciones Severas (Que indican el nacimiento): Cardiorrespiratorio... Saturación de oxigeno de menos del 90%, intubación, edema pulmonar\".<br><br>Análisis de Distractores: La cefalea aislada (A) funge estrictamente como una \"Condición Adversa\"; advierte sobre una franca progresión del riesgo de eclampsia futura pero permite manejo médico intermedio. La tensión arterial de 150/100 mmHg (C) y la proteinuria cualificada en 300 miligramos diarios (D) cumplen los mínimos para integrar diagnóstico patológico en etapas que aún permiten la terapia expectante prudente en aras de la madurez fetal.", 
                source: "GPC IMSS-058-08, Detección, Diagnóstico y Tratamiento de las Enfermedades Hipertensivas del Embarazo, 2017, Anexos (Cuadro 3), Página 40." 
            },
            {
                id: 5, 
                question: "Ante la duda diagnóstica de Amenaza de Parto Pretérmino sin cambios francos, ¿cuál es el estudio inicial indicado por la GPC para definir la hospitalización?", 
                options: ["Exploración cervical digital", "Medición de longitud cervical", "Cultivo de exudado cervicovaginal", "Índice de líquido amniótico"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, la exploración digital (tacto vaginal) subestima la longitud real del cérvix y es un pobre predictor temprano. El estándar de oro para decidir el ingreso hospitalario en zonas grises es la ecografía transvaginal.<br><br>Perla ENARM: \"Es recomendable realizar medición de la longitud cervical cuando la actividad uterina no es franca y existe duda de los cambios cervicales. Si la longitud es ≥ 30 milímetros se puede excluir el diagnóstico y como causa única no está indicada la hospitalización.\"<br><br>Análisis de Distractores: La exploración digital (Opción A) es poco confiable y la GPC recomienda no utilizarla como predictor principal. El cultivo cervicovaginal (Opción C) busca agentes etiológicos pero no define el ingreso inminente. El índice de líquido amniótico (Opción D) evalúa bienestar fetal, no el riesgo de nacimiento inminente.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Diagnóstico, Página 81." 
            },  
            {
                id: 6, 
                question: "Según la GPC de Candidosis Vulvovaginal, ¿qué hallazgo microbiológico indica la necesidad de prolongar el tratamiento de inducción con Nistatina por 21 días?", 
                options: ["Identificación de Candida albicans", "Infección por Candida glabrata", "Aislamiento de Trichomonas vaginalis", "Infección por Gardnerella vaginalis"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal; la especie albicans responde a ciclos cortos o de 14 días en fase de inducción, mientras que glabrata es notablemente tenaz y requiere una extensión temporal de la terapia poliánica para asegurar erradicación micótica previo al mantenimiento.<br><br>Perla ENARM: \"Candidosis vulvovaginal recurrente. Tratamiento de inducción: Nistatina 100 000 U, una tableta u óvulo vaginal, por vía vaginal durante 14 días, o durante 21 días en caso de enfermedad por C. glabrata\".<br><br>Análisis de Distractores: La opción A se trata con un régimen estándar o corto. Las opciones C y D causan otras entidades (Tricomoniasis y Vaginosis) para las que no se utiliza Nistatina en lo absoluto, sino Metronidazol o Tinidazol.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Tratamiento Farmacológico, Página 22." 
            },
            {
                id: 7, 
                question: "Ante la sospecha clínica de Cáncer de Mama en una mujer sintomática de 28 años, ¿cuál es el primer estudio de imagen que debe solicitarse según la GPC?", 
                options: ["Resonancia magnética contrastada", "Tomosíntesis mamaria", "Ultrasonido mamario bilateral", "Mastografía diagnóstica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la densidad del tejido mamario en mujeres jóvenes disminuye severamente la sensibilidad de la mastografía, por lo que el ultrasonido es el método de elección inicial.<br><br>Perla ENARM: \"Estudio inicial en la evaluación de anormalidades clínicas en mujeres menores de 30 años de edad, así como las que están lactando o embarazadas\".<br><br>Análisis de Distractores: La mastografía (D) está indicada como abordaje inicial en mayores de 40 años o 30 años dependiendo el contexto, pero no en menores de 30. La resonancia (A) se reserva para pacientes con muy alto riesgo genético o antecedente de radiación. La tomosíntesis (B) no es el estudio de primera línea evaluado.", 
                source: "GPC S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención, 2017, Ultrasonido, Página 33." 
            },
            {
                id: 8, 
                question: "Según la GPC de parto pretérmino, ¿cuál es el esquema farmacológico indicado para la maduración pulmonar fetal en nacimientos inminentes?", 
                options: ["Dexametasona intramuscular dosis única", "Betametasona intramuscular cada 24 horas", "Hidrocortisona intravenosa cada 8 horas", "Betametasona intramuscular dosis única"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, los corticoesteroides sintéticos fluorados (betametasona o dexametasona) cruzan fácilmente la placenta y estimulan a los neumocitos tipo II del feto para que sinteticen surfactante pulmonar, previniendo el Síndrome de Dificultad Respiratoria aguda.<br><br>Perla ENARM: \"Se recomienda el esquema de maduración pulmonar fetal, si el primero tiene más de siete días previos al nacimiento, dicho esquema consiste en dos dosis de betametasona de 12 mg, con intervalo de 24 horas\".<br><br>Análisis de Distractores: La dexametasona (A) es una alternativa de segunda línea, pero el esquema implica 4 dosis de 6mg cada 12 hrs, no dosis única. La hidrocortisona (C) no cruza de manera eficiente la placenta por la enzima placentaria 11 beta-hidroxiesteroide deshidrogenasa tipo 2. Una sola dosis de betametasona (D) genera un efecto incompleto.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Tratamiento, Página 28." 
            },
            {
                id: 9, 
                question: "Ante la sospecha clínica y escrutinio de lesiones precursoras del cáncer de cuello uterino en una mujer de 38 años, ¿cuál es la prueba de tamizaje primario recomendada?", 
                options: ["Citología cervical convencional", "Detección biomolecular de VPH", "Inspección con ácido acético", "Toma de biopsia dirigida"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones precursoras del cáncer cervical, la estrategia de tamizaje cambia según el grupo etario. Mientras que en mujeres de 25 a 34 años se indica la citología cervical, en las mujeres de 35 a 69 años de edad se asume un mayor riesgo de persistencia viral, por lo que la detección biomolecular de VPH-AR sola o en combinación con citología (cotesting) se convierte en la prueba de elección para el tamizaje primario.<br><br>Perla ENARM: \"En el grupo de 35 a 69 años, la detección biomolecular de VPH-AR sola o combinada con citología (cotesting) son las pruebas de elección para tamizaje primario\".<br><br>Análisis de Distractores: La citología convencional (A) queda reservada como tamizaje primario exclusivo para menores de 35 años o en unidades donde no se disponga de biología molecular. La inspección visual (C) se reserva para áreas de alta marginación o falta de insumos. La biopsia (D) es un estudio confirmatorio, nunca de tamizaje inicial.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Detección oportuna, Página 23." 
            },
            {
                id: 10, 
                question: "Ante la necesidad de tratamiento psiquiátrico inmediato y severo en una mujer gestante, ¿cuál estabilizador del estado de ánimo debe evitarse rigurosamente en el primer trimestre por su asociación a defectos cardiacos severos?", 
                options: ["Clorhidrato de amitriptilina", "Ácido valproico continuo", "Carbonato de litio", "Bromhidrato de citalopram"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Depresión prenatal y posparto, el uso de esta medicación psiquiátrica en el momento de la organogénesis cardiovascular (primer trimestre) induce daño directo en el desarrollo valvular derecho, configurando un cuadro fetal con potencial mortalidad o necesidad quirúrgica cardíaca neonatal temprana.<br><br>Perla ENARM: \"Se recomienda evitar el uso de Litio durante el primer trimestre del embarazo (...) sólo existe un riesgo absoluto pequeño de anomalía de Epstein\".<br><br>Análisis de Distractores: La opción B (Ácido Valproico) está contraindicado todo el embarazo, no sólo en el primer trimestre, y su patología diana son los defectos del tubo neural, no los defectos cardíacos per se. La opción A se asocia a parto prematuro. La opción D es un antidepresivo sin asociación comprobada a anomalía de Ebstein.", 
                source: "GPC SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Pronóstico, Página 27." 
            },
            {
                id: 11, 
                question: "Ante una paciente en su primera consulta prenatal, ¿cuál es el estudio de tamizaje de primera línea que debe solicitarse para detectar Bacteriuria Asintomática según la GPC?", 
                options: ["Tira reactiva de orina", "Examen general de orina", "Tinción de Gram urinaria", "Urocultivo de tamizaje"],

                question: "Según la GPC de Cáncer de Mama, ¿cuál es el tratamiento quirúrgico absoluto e inmediato indicado en todo paciente masculino diagnosticado?",

                justification: "Justificación: De acuerdo a la GPC de Tratamiento del Cáncer de Mama, la escasa glándula mamaria del varón y la localización típicamente central o retroareolar de sus tumores hace imposible lograr buenos márgenes conservando tejido estético funcional. La extirpación radical unilateral de la mama y la estadificación axilar es el manejo definitivo innegociable.<br><br>Perla ENARM: Registra en el expediente clínico el tratamiento quirúrgico realizado para el cáncer de mama en el hombre (mastectomía total con mapeo linfático o disección radical de axila).<br><br>Análisis de Distractores: Los abordajes de conservación como la lumpectomía (A) o cuadrantectomía (C) son exclusivos de la anatomía femenina en estadios tempranos. La mastectomía contralateral (B) solo aplicaría ante síndromes genéticos comprobados.",

            {

                question: "Ante la sospecha clínica de Cáncer Cervicouterino temprano, ¿cuál es el estándar de oro inicial aceptado por la Federación Internacional de Ginecología y Obstetricia para establecer la estadificación?",

                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Cáncer Cervicouterino, a diferencia de la mayoría de las neoplasias modernas, el estadiaje basal para determinar si un tumor es resecable o no depende estrictamente de la inspección y palpación directa (como el tacto rectovaginal). \"La estadificación clínica del cáncer cervico-uterino utiliza los criterios de la Federación Internacional de Gineco-obstetricia (FIGO), la cual no toma en cuenta los resultados de tomografía axial computada (TC), resonancia magnética nuclear (RMN) ni Tomografía por emisión de positrones (PET)\".<br><br>Análisis de Distractores: La tomografía por emisión (B), la resonancia magnética (C) y la tomografía axial computarizada (D) son estudios útiles en países de altos recursos o situaciones selectas (embarazo, sospecha de ganglios paraaórticos), pero la guía enfatiza explícitamente que la estadificación FIGO universal no se basa en ellos para asignar la etapa inicial en todos los centros hospitalarios.",

                question: "Según los criterios de la GPC para Vasa Previa, ¿cuál es el hallazgo clínico o evento que indica la necesidad inminente de tratamiento quirúrgico mediante cesárea de urgencia?",

                options: [

                id: 19, 
                question: "Ante la sospecha clínica y decisión de histerectomía en una paciente con patología benigna que cursa con pérdida involuntaria de orina, ¿cuál es el estudio que debe solicitarse obligatoriamente antes?",

                question: "Según la GPC de choque hemorrágico en obstetricia, ¿cuál es el hallazgo clínico absoluto que indica tratamiento quirúrgico con histerectomía total (contraindicando la subtotal)?",

                justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, extirpar solo el cuerpo del útero (subtotal) deja el segmento inferior sangrante intacto cuando la patología reside en una implantación placentaria baja y anómala.<br><br>Perla ENARM: \"Es recomendable realizar histerectomia total en casos de: Placenta previa central o total, Sospecha de acretismo placentario... La histerectomia subtotal no se recomienda en estos casos\".<br><br>Análisis de Distractores: En la atonía uterina pura (A), retirar el cuerpo atónico (subtotal) puede ser suficiente para salvar la vida y se realiza más rápido. Las laceraciones (C) y restos (D) responden a suturas locales y legrados, no a histerectomía de primera intención.",

            {
                id: 21, 
                question: "Ante la sospecha clínica de Sepsis Materna, ¿cuál es la primera escala o herramienta clínica que debe aplicarse para el abordaje rápido según la GPC?", 
                options: ["Escala qSOFA clásica", "Criterios de SIRS", "Escala omqSOFA", "Escala SOFA completa"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, el reconocimiento temprano dictamina la sobrevida. La herramienta de primer contacto validada para esta población en específico es la escala omqSOFA (obstetric modified quick SOFA), ya que la escala clásica no toma en cuenta los cambios del embarazo y la evaluación SOFA completa requiere estudios de laboratorio que retrasan el reconocimiento inicial a pie de cama.<br><br>Perla ENARM: \"Se recomienda emplear la escala de omqSOFA (puntaje modificado en obstetricia, para la evaluación rápida de la falla orgánica) para el tamizaje de la sepsis materna\".<br><br>Análisis de Distractores: La opción A no es específica para obstetricia. La opción B (SIRS) se considera obsoleta por su falta de precisión (AUROC 0.589). La opción D se utiliza para confirmar y clasificar la falla orgánica una vez que el tamizaje inicial resulta positivo o al ingreso a UCI, no como el abordaje clínico de primer minuto en urgencias.",

            {
                id: 22, 
                question: "En el abordaje diagnóstico del Infarto Agudo del Miocardio, ¿cuál es la razón fisiopatológica por la que se desaconseja guiarse exclusivamente por los niveles de creatinin cinasa (CK/CK-MB)?", 
                options: ["Liberación por las contracciones uterinas", "Disminución de la depuración renal", "Aumento del volumen plasmático materno", "Isquemia placentaria aguda y secundaria"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, la mujer gestante representa un reto diagnóstico cardiológico, pues sus biomarcadores de lisis y daño celular de rutina no aplican a la población estándar. El grueso e hipertrófico músculo liso miometrial (como muchos otros tejidos corporales sometidos a trabajo exhaustivo) posee altas concentraciones y niveles intracelulares basales de esta enzima citosólica inespecífica (CK), por lo que el simple e intenso estrés mecánico del fórceps contráctil durante las fases de la labor del trabajo de parto la eleva masivamente en el torrente sanguíneo circulante de la paciente, produciendo inevitables falsos positivos de lesión estructural cardiaca. El estándar diagnóstico actual estricto recae por su exquisita sensibilidad en las Troponinas I o T altamente sensibles.<br><br>Perla ENARM: \"Ante la paciente con sospecha de infarto agudo del miocardio, se prefiere la medición de la troponina (c-Tn) sobre la creatinin kinasa (CK), pues esta última puede elevarse debido a las contracciones uterinas\".<br><br>Análisis de Distractores: La falla funcional o lesión renal aguda concomitante (B) puede elevar los niveles básales de Troponinas por falta de aclaramiento, pero no explica ni exime el pico de falso positivo enzimático universal y fisiológico de la isoforma de la CK o CK-MB durante el parto por origen muscular. Los volúmenes plasmáticos hiperdinámicos elevados de la gestante (C) generarían hemodilución del marcador (falsos negativos), no falsos positivos por concentración. La isquemia franca o infarto de un lecho trofoblástico placentario dañado por un desprendimiento (D) elevaría característicamente otros marcadores inflamatorios o de fibrinólisis masiva tisular inespecíficos como el dímero D o la LDH, pero no reporta característicamente a la fracción MB muscular como simulador directo en los protocolos diagnósticos de sospecha de infarto coronario isquémico en UCI.", 
                source: "GPC IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Infarto agudo del miocardio en el embarazo, Página 29."

            {
                id: 23, 
                question: "¿Cuál es el fármaco de elección para el manejo antihipertensivo oral inicial de la preeclampsia en una paciente ambulatoria y estable, según la Guía de Práctica Clínica?", 
                options: ["Alfametildopa.", "Hidralazina intravenosa rápida.", "Nifedipino de acción corta.", "Labetalol intravenoso directo."], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Prevención, Diagnóstico y Tratamiento de la Preeclampsia, los agonistas alfa-2 de acción central han acumulado la mayor evidencia histórica de seguridad sobre el flujo y hemodinamia uteroplacentaria en México, siendo ideales para tomas diarias.<br><br>Perla ENARM: \"La prescripción de antihipertensivos orales será de acuerdo a las características clínicas de la paciente, contraindicaciones, y preferencias del médico, siendo de primer línea el uso de metildopa sola o asociado a otros fármacos\".<br><br>Análisis de Distractores: La hidralazina intravenosa, el labetalol intravenoso y las cápsulas de nifedipino de acción corta representan los fármacos pilares pero para las emergencias o crisis hipertensivas intrahospitalarias agudas, no son la elección crónica de base descrita en la guía mexicana.", 
                source: "GPC IMSS-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Tratamiento Farmacológico, Página 34." 
            },
            {
                id: 24, 
                question: "Según la Guía de Práctica Clínica de preeclampsia, ¿cuál es el hallazgo clínico o imagenológico fetal que representa un criterio absoluto para la resolución quirúrgica o abdominal inmediata?", 
                options: ["Oligohidramnios moderado.", "Cefalea occipital materna refractaria.", "Onda A reversa ductus venoso.", "Restricción simétrica del crecimiento fetal."], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Prevención, Diagnóstico y Tratamiento de la Preeclampsia, el patrón reverso del flujo indica acidosis tisular fetal con falla inminente miocárdica derecha y es antesala a la muerte fetal intrauterina por asfixia si no se interrumpe de urgencia.<br><br>Perla ENARM: \"Causas fetales de resolución del embarazo vía abdominal en mujeres con preeclampsia: Onda A reversa del ductus venoso\".<br><br>Análisis de Distractores: La cefalea materna refractaria implica preeclampsia severa materna, pero no es la causa \"fetal\". El oligohidramnios y la restricción del crecimiento obligan vigilancia mediante perfil biofísico, pero toleran, en pacientes muy estables, una ventana de maduración pulmonar sin ser criterios netos de resolución súbita quirúrgica per se.", 
                source: "GPC IMSS-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Anexos, Página 67." 
            },
            {
                id: 25, 
                question: "Ante la sospecha clínica de Ruptura Prematura de Membranas Pretérmino en el abordaje inicial, ¿cuál es el estudio de imagen que debe solicitarse para evaluar la condición fetal según la GPC?", 
                options: ["Resonancia magnética pélvica", "Radiografía simple de abdomen", "Tomografía axial computarizada", "Ultrasonido obstétrico"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, una vez establecido el diagnóstico clínico, es mandatorio realizar un abordaje ultrasonográfico. Este estudio es accesible, no emite radiación ionizante para el feto y permite determinar puntos esenciales para la toma de decisiones obstétricas: edad gestacional real, presentación fetal, cálculo del índice de líquido amniótico y evaluar el bienestar fetal de forma dinámica.<br><br>Perla ENARM: Se debe efectuar ultrasonido para determinar la edad gestacional, presentación fetal, cantidad de líquido amniótico y realizar pruebas de bienestar fetal.<br><br>Análisis de Distractores: La resonancia magnética pélvica (A) podría evaluar anormalidades placentarias profundas, pero no es de primera línea ni tiene utilidad práctica para confirmar edad gestacional en urgencias. La tomografía (C) y radiografía simple de abdomen (B) emiten radiación ionizante perjudicial y no aportan datos sobre el volumen de líquido amniótico o bienestar fetal de manera adecuada frente a un estudio ecográfico.", 
                source: "GPC-SEDENA-446-18, Diagnóstico y Tratamiento de la Ruptura Prematura de Membranas Pretérmino, 2018, Evidencias y Recomendaciones, página 13 y 17." 
            },
            {
                id: 26, 
                question: "En una paciente con inestabilidad hemodinámica por Hemorragia Postparto que será referida a tercer nivel, ¿cuál es el dispositivo de contención temporal no invasivo recomendado durante su traslado?", 
                options: ["Balón hidrostático de Bakri", "Traje antichoque no neumático", "Empaquetamiento pélvico de Mickulicz", "Pinzamiento vaginal de Zea"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, este dispositivo es vital en los entornos prehospitalarios. Al ejercer una contrapresión controlada externa sobre los segmentos inferiores y la pelvis, autotransfunde el volumen circulatorio remanente hacia el compartimento central (cerebro, corazón y riñones), comprime el lecho uterino y permite ganar tiempo valioso durante el traslado sin requerir personal quirúrgico.<br><br>Perla ENARM: \"Se sugiere el uso de pantalón antichoque no neumático como medida temporal en caso de HPP para traslado de paciente a unidad con mayor capacidad de resolución\".<br><br>Análisis de Distractores: La opción A y D son medidas invasivas que requieren la colocación intracavitaria o vaginal experta. La opción C implica abrir el abdomen (cirugía de control de daños) que se hace ya en quirófano o en una terapia intensiva quirúrgica.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento No Farmacológico, Página 32." 
            },
            {
                id: 27, 
                question: "¿Qué intervención quirúrgica permite el control de daños en una Hemorragia Postparto secundaria a coagulopatía mixta sistémica, donde el sangrado es difuso y las ligaduras vasculares fracasan?", 
                options: ["Sutura compresiva de Haymann", "Histerectomía obstétrica de urgencia", "Empaquetamiento tipo Mickulicz", "Colocación de balón hidrostático"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, ante el desarrollo de coagulopatía de consumo y dilucional profunda (por pérdida severa de factores y reposición masiva de cristaloides), ninguna intervención anatómica vascular será efectiva (los tejidos sangran difusamente \"en napa\"). La aplicación intraabdominal de compresas pélvicas genera una presión física directa y contundente que bloquea el exudado pasivo capilar mientras se cierra temporalmente el abdomen, estabilizando a la paciente y permitiendo recuperar los factores de coagulación en la unidad de cuidados intensivos.<br><br>Perla ENARM: \"Realizó empaquetamiento abdomino-pélvico (tipo Mickulicz) en pacientes con HPP persistente que se asocia a coagulopatía secundaria mixta (dilucional y por consumo)\".<br><br>Análisis de Distractores: La opción A (sutura compresiva uterina) no detiene el sangrado microvascular sistémico pélvico o retroperitoneal. La opción B (histerectomía) empeorará mortalmente a la paciente en estado de coagulopatía (triada letal) al generar amplios y extensos lechos quirúrgicos expuestos sin factores de coagulación para cicatrizar, ocasionando desangramiento terminal seguro. La opción D ejerce presión exclusivamente intrauterina y es útil para sangrado proveniente de la cavidad endometrial o atonía, no de la vasculatura retroperitoneal pélvica difusa por el agotamiento de trombina.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento Quirúrgico (Control de daños), Página 33." 
            },
            {

                question: "De acuerdo con la Guía de Práctica Clínica, ¿cuál es el factor de riesgo preexistente con mayor asociación para el desarrollo de Enfermedad Tromboembólica Venosa (ETEV) en el embarazo?",

            {

                question: "¿Cuál es el diagnóstico neonatal o pronóstico adverso más comúnmente asociado al insulto hemodinámico y anóxico de la Ruptura Uterina en el producto?",

            },

                question: "En las Enfermedades Hipertensivas del Embarazo, ¿cuál es el mecanismo fisiopatológico primario que describe la GPC para explicar el origen materno-fetal sistémico?",

                justification: "Justificación: De acuerdo a la GPC de Amenaza de aborto, las maniobras clínicas requieren el binomio innegable de comprobación imagenológica y el respaldo de la cinética de actividad metabólica trofoblástica para dictar si el embarazo incierto será viable o no.<br><br>Perla ENARM: \"Se necesita la evaluación exhaustiva para hacer el diagnóstico definitivo. La historia clínica completa junto con la exploración física adecuada en combinación con el ultrasonido y las pruebas de β-hCG\".<br><br>Análisis de Distractores: La progesterona (C) no dicta viabilidad de rutina como marcador primario. La especuloscopía (B) excluye patología cervical extrínseca pero no evalúa al embrión. La resonancia (D) no es el estudio de primera ni segunda línea en el primer trimestre.",
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Criterios de Referencia, Página 20."
            },
            {
                id: 45, 
                question: "Utilizando la clasificación de vías de abordaje para histerectomía por patología benigna, ¿cuál se recomienda como primera opción quirúrgica en pacientes con paridad satisfecha?", 
                options: ["Histerectomía asistida por robot", "Histerectomía laparoscópica", "Histerectomía total abdominal", "Histerectomía vaginal"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Histerectomía en patología benigna, extraer el útero a través del canal del parto natural evita incisiones abdominales, reduce el riesgo de hernias, íleo paralítico y disminuye el requerimiento analgésico de forma drástica, siendo el gold standard si la anatomía lo permite.<br><br>Perla ENARM: \"En mujeres que presentan patología uterina benigna, se recomienda como primera opción de tratamiento quirúrgico la realización de histerectomía vaginal, por que se asocia a menor número de complicaciones, se realiza más rápido y con menos morbilidad\".<br><br>Análisis de Distractores: La vía laparoscópica (B) es la segunda línea (cuando la vaginal falla o está contraindicada). La vía abdominal (C) se reserva para úteros gigantes o múltiples adherencias severas donde el abordaje vaginal es imposible. La cirugía robótica (A) tiene un costo elevadísimo y no es el estándar primario en patología benigna.", 
                source: "GPC SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 19." 
            },
            {
                id: 46, 
                question: "En el abordaje diagnóstico del choque hemorrágico en obstetricia, ¿cuál es la nemotecnia anatómica y fisiopatológica recomendada para evaluar rápidamente la etiología?", 
                options: ["Nemotecnia de las 4 T", "Regla de los treinta", "Escala modificada de alerta", "Esquema de reanimación ABCDEF"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, frenar la etiología específica es la mitad del tratamiento. Este esquema mental organiza la búsqueda secuencial de la causa: Tono, Tejido, Trauma y Trombina (Trombosis/Coagulopatía).<br><br>Perla ENARM: \"En la mujer con hemoragia obstétrica es conveniente evaluar su causa utilizando la nomotécnica de las “4 T”: Tono (atonia uterina), Tejido (retención de restos placentararios), Trauma (lesion cervical o vaginal durante el parto) y Trombosis (desordenes de coagulación)\".<br><br>Análisis de Distractores: La regla de los 30 (B) estima la pérdida de volumen, no la causa. La escala de alerta (MEOWS) (C) anticipa la morbilidad por signos vitales. El ABCDEF (D) es el algoritmo de soporte vital avanzado, no etiológico.", 
                source: "GPC IMSS-162-09, Diagnóstico y tratamiento del choque hemorrágico en obstetricia, 2017, Diagnóstico Clínico, Página 18." 
            },
            {
                id: 47, 
                question: "Utilizando la escala de omSOFA para Sepsis Materna, ¿cómo se clasifica a una paciente que presenta un recuento plaquetario de 120,000/mm3?", 
                options: ["Cero puntos", "Un punto", "Dos puntos", "Tres puntos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, la evaluación de daño a órgano blanco modificado para la paciente obstétrica (omSOFA) estipula que un recuento plaquetario entre 100,000 y 150,000/mm3 otorga 1 punto de severidad, lo que alerta sobre el inicio de una coagulopatía de consumo o falla hematológica leve.<br><br>Perla ENARM: \"La escala de omSOFA es una herramienta útil para la evaluación de la disfunción orgánica en la mujer embarazada o puérpera\".<br><br>Análisis de Distractores: La opción A correspondería a plaquetas normales (≥150,000/mm3). La opción C aplicaría si las plaquetas cayeran por debajo de 100,000/mm3 (2 puntos). La opción D no existe en la escala omSOFA, ya que esta herramienta simplificó la clásica de 0 a 4 puntos para calificar las variables de 0 a 2 puntos como máximo para mayor rapidez clínica.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Cuadros o figuras (Cuadro 2), Página 30." 
            },
            {
                id: 48, 
                question: "Ante la duda en el ultrasonido inicial, ¿cuál es el estudio de gabinete de mayor rendimiento diagnóstico (estándar de imagen) para confirmar la Apendicitis Aguda en el embarazo según la GPC?", 
                options: ["Resonancia magnética sin gadolinio", "Tomografía computarizada con contraste", "Radiografía simple de abdomen", "Gammagrafía con leucocitos marcados"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, el ultrasonido abdominal presenta severas limitantes técnicas dependientes del operador para localizar el ciego, ya que el útero grávido desplaza cráneo-lateralmente al apéndice en el tercer trimestre y el panículo o la distensión de asas impiden la visualización de un diámetro >6 mm. El estudio avanzado de elección que garantiza una muy alta sensibilidad y especificidad anatómica (cercana al 97.9%) para visualizar de forma multiplanar el apéndice cecal edematoso o perforado, sin someter ni exponer a la madre o al feto en desarrollo al riesgo mutagénico o teratogénico de las radiaciones ionizantes, es la resonancia.<br><br>Perla ENARM: \"Se recomienda el uso de la resonancia magnética (sin gadolinio intravenoso), por encima de la tomografía computarizada, para establecer el diagnóstico de apendicitis aguda en cualquier momento del embarazo\".<br><br>Análisis de Distractores: La tomografía computarizada abdominopélvica (B) posee una altísima certeza diagnóstica, pero solo debe indicarse excepcionalmente en el abordaje como último recurso si la paciente está sumamente inestable, la resonancia física y operativamente no está disponible en la institución, o existe discordancia letal, debido a la inevitable y deletérea carga de radiación pélvica al producto. La radiografía simple de abdomen en bipedestación o decúbito (C) carece totalmente de valor diagnóstico agudo sensible o específico (solo muestra íleo regional o excepcionalmente un fecalito radiopaco) para la confirmación de la patología apendicular en un adulto grávido. La gammagrafía especializada (D) somete innecesariamente a la paciente a material biológico radiactivo de eliminación prolongada y no es un método estandarizado para patología focal abdominal urgente.", 
                source: "GPC IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Apendicitis y embarazo, Página 14." 
            },
            {
                id: 49, 
                question: "¿Cuál es la contraindicación absoluta del grupo farmacológico comúnmente usado para la hipertensión, debido a malformaciones renales fetales en la preeclampsia?", 
                options: ["Bloqueadores de canales de calcio.", "Inhibidores de enzima convertidora.", "Betabloqueadores como el metoprolol.", "Agonistas alfa adrenérgicos centrales."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Prevención, Diagnóstico y Tratamiento de la Preeclampsia, la interrupción exógena del sistema renina-angiotensina-aldosterona compromete directamente la nefrogénesis y dinámica tubular fetal, derivando en oligohidramnios y falla funcional severa.<br><br>Perla ENARM: \"El uso de inhibidores de la enzima convertidora de angiotensina y los antagonistas de los receptores de angiotensina incrementan el riesgo de anormalidades congénitas (renales) si son administrados durante el embarazo\".<br><br>Análisis de Distractores: Los bloqueadores de canales de calcio (nifedipino), los betabloqueadores (metoprolol) y los agonistas alfa centrales (alfametildopa) sí están indicados y su perfil toxicológico materno-fetal los convierte en las recomendaciones pilares de la guía.", 
                source: "GPC IMSS-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Tratamiento Farmacológico, Página 36." 
            },
            {
                id: 50, 
                question: "Según la GPC de Ruptura Prematura de Membranas Pretérmino, ¿cuál es el punto de corte en la edad gestacional que indica fuertemente la necesidad de interrupción del embarazo sobre el manejo expectante?", 
                options: ["Mayor a 32 semanas", "Mayor a 36 semanas", "Mayor a 34 semanas", "Mayor a 28 semanas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, prolongar el embarazo tras la rotura de membranas en fetos mayores a 34 semanas expone a la madre a un riesgo innecesario de corioamnionitis e infección sistémica. A partir de las 34 semanas de gestación, el riesgo de hipoplasia pulmonar neonatal o membrana hialina es minúsculo, y los beneficios de un manejo expectante son completamente superados por las elevadas tasas de sepsis intrauterina que incrementan la morbimortalidad materna y fetal.<br><br>Perla ENARM: En la ruptura prematura de membranas pretérmino que se presenta después de la semana 34 de gestación se recomienda la interrupción del embarazo.<br><br>Análisis de Distractores: Un embarazo de mayor a 32 semanas (A) puede requerir inducción únicamente si se documenta madurez pulmonar fetal mediante estudios de líquido amniótico, pero normativamente el manejo conservador se mantiene si no se prueba. Entre las 28 semanas (D), los fetos son severamente prematuros, y el retraso del parto es prioritario. A las 36 semanas (B) es ya un límite muy tardío para la intervención recomendada (debe interrumpirse desde que alcanza la 34).", 
                source: "GPC-SEDENA-446-18, Diagnóstico y Tratamiento de la Ruptura Prematura de Membranas Pretérmino, 2018, Evidencias y Recomendaciones, página 24." 
            },
            {
                id: 51, 
                question: "Ante la necesidad de prevenir complicaciones de morbimortalidad por Hemorragia Postparto desde el control prenatal, ¿cuál es el parámetro de tamizaje y su punto de corte que obliga a iniciar tratamiento según la GPC?", 
                options: ["Ferritina menor 30 microgramos", "Hematocrito menor 30 por ciento", "Fibrinógeno menor 200 miligramos", "Hemoglobina menor 11 gramos"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, detectar y tratar la anemia en la mujer gestante es vital porque una reserva de oxígeno y masa eritrocitaria baja disminuye drásticamente la capacidad de tolerar la pérdida sanguínea fisiológica o patológica en el momento del parto, precipitando el choque hemorrágico mucho más rápido.<br><br>Perla ENARM: \"Se sugiere realizar tamizaje de anemia (Hb menor o igual a 11 g/dl) en mujeres embarazadas\".<br><br>Análisis de Distractores: La opción A es confirmatoria para deficiencia de hierro una vez hallada la anemia, pero no es el tamizaje primario. La opción C es una meta de reanimación aguda intrahospitalaria en pleno choque, no de tamizaje prenatal.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Prevención, Página 18." 
            },
            {
                id: 52, 
                question: "En la farmacología de la Enfermedad Tromboembólica Venosa (ETEV), ¿qué parámetro de laboratorio NO requiere monitoreo rutinario cuando se utiliza tratamiento con Heparina de Bajo Peso Molecular (HBPM)?", 
                options: ["Tiempo de tromboplastina parcial.", "Recuento de plaquetas.", "Fibrinógeno sérico.", "Tiempo de protrombina."], 
                answer: 1, 
                justification: "Justificación: Una de las máximas ventajas de las HBPM sobre la heparina convencional es la disminución drástica de complicaciones autoinmunes (Trombocitopenia Inducida por Heparina - TIH), lo que reduce la carga hospitalaria en pruebas de control. De acuerdo a la GPC de Enfermedad Tromboembólica Venosa Obstétrica, el riesgo es tan bajo con HBPM que exime su vigilancia si no hay exposición previa a HNF.<br><br>Perla ENARM: \"No se sugiere el recuento plaquetario rutinario en pacientes que empleen heparina como tromboprofilaxis de TEP\".<br><br>Análisis de Distractores: Aunque las HBPM tampoco requieren medir rutinariamente el TTPa (opción A, el cual es propio del ajuste de HNF), la recomendación puntual (\"Perla\") en la guía que recalca un cese de monitoreo por efectos adversos (que solía ser una regla de oro) se enfoca explícitamente en el recuento de plaquetas para TIH.", 
                source: "GPC SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Prevención Secundaria, Página 42." 
            },
            {
                id: 53, 
                question: "Utilizando la clasificación de pérdida sanguínea del Soporte Vital Avanzado en Trauma mencionada en la GPC para Ruptura Uterina, ¿cómo se clasifica a una paciente con pérdida del 35 por ciento, frecuencia cardiaca de 130 latidos por minuto e hipotensión?", 
                options: ["Hemorragia Clase I", "Hemorragia Clase II", "Hemorragia Clase III", "Hemorragia Clase IV"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Uterina y la clasificación de pérdida sanguínea, una hemorragia Clase III se define por una pérdida de volumen del 30 al 40 por ciento (1500 a 2000 ml), taquicardia mayor a 120 latidos por minuto e hipotensión manifiesta, encajando perfectamente en este escenario clínico de choque avanzado.<br><br>Perla ENARM: Para el diagnóstico y tratamiento de la hemorragia obstétrica, se sugiere consultar las GPC correspondientes en el Catálogo Maestro del CENETEC.<br><br>Análisis de Distractores: La Clase I (A) supone pérdida menor al 15 por ciento sin alteraciones hemodinámicas. La Clase II (B) tiene taquicardia leve pero mantiene presión arterial normal. La Clase IV (D) es la hemorragia exanguinante con pérdida mayor al 40 por ciento, anuria y letargia profunda.", 
                source: "GPC SS-296-10, Prevención, diagnóstico y manejo oportuno de la ruptura uterina, 2017, Anexos, Página 37." 
            },
            {
                id: 54, 
                question: "Ante la búsqueda temprana de riesgo para Enfermedades Hipertensivas del Embarazo, ¿cuál es el primer estudio de tamizaje por imagen que debe solicitarse tempranamente según la GPC?", 
                options: ["Flujometría de arteria cerebral", "Doppler de arteria umbilical", "Índice de pulsatilidad uterina", "Ultrasonido estructural fetal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedades Hipertensivas del Embarazo, la predicción y el abordaje temprano buscan identificar de forma preventiva la resistencia de los vasos maternos a la invasión trofoblástica mediante el ultrasonido en el primer trimestre. El uso de Doppler de las arterias uterinas combinado con factores maternos tiene una gran tasa de detección temprana.<br><br>Perla ENARM: \"Se recomienda la medición del índice de pulsatilidad de las arterias uterinas y cálculo de IP medio entre la semana 11-13.6, en caso de contar con los recursos\".<br><br>Análisis de Distractores: El Doppler de arteria umbilical (B) evalúa la hemodinamia fetal ante un compromiso ya establecido, teniendo un valor limitado después de las 36 semanas. El ultrasonido estructural (D) y la flujometría cerebral (A) no forman parte del algoritmo predictivo validado de primer trimestre para cribado temprano de trastornos hipertensivos.", 
                source: "GPC IMSS-058-08, Detección, Diagnóstico y Tratamiento de las Enfermedades Hipertensivas del Embarazo, 2017, Predicción, Página 19." 
            },
            {
                id: 55, 
                question: "Según la GPC de Prevención del Parto Pretérmino, ¿cuál es el hallazgo clínico en seguimiento que indica la colocación de cerclaje cervical de emergencia?", 
                options: ["Dilatación mayor 1 cm", "Índice de Bishop 8", "Antecedente de cono cervical", "Longitud cervical de 20 mm"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, cuando existe franca incapacidad esfinteriana del cérvix (evidenciada por la apertura física del conducto) y se ha estabilizado a la paciente farmacológicamente, el cerclaje funciona mecánicamente para evitar la protrusión de las membranas.<br><br>Perla ENARM: \"Las pacientes que hayan cursado con síntomas de parto pretérmino, que ameritaron tratamiento tocolítico y que en el seguimiento posterior se determine dilatación cervical mayor a 1 cm y menor a 3 cm o cérvix ≤ 15 milímetros es recomendable la colocación de cerclaje cervical de emergencia.\"<br><br>Análisis de Distractores: Una longitud de 20 mm sin síntomas (Opción D) es indicación primaria de progesterona vaginal. El antecedente asintomático de cono cervical (Opción C) exige vigilancia ecográfica, mas no un cerclaje de primera intención a ciegas.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 255." 
            },
            {
                id: 56, 
                question: "Ante la sospecha clínica de Candidosis Vulvovaginal grave (eritema vulvar extenso y fisuras), ¿cuál es el estudio indispensable que debe solicitarse además del examen en fresco?", 
                options: ["Medición de pH vaginal", "Cultivo de exudado vaginal", "Prueba de aminas", "Frotis con tinción Gram"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, ante un cuadro con datos de severidad (fisuras, escoriaciones, edema intenso) la enfermedad se reclasifica como complicada. En estos escenarios, el tratamiento empírico es insuficiente y es obligatorio identificar la especie exacta, dado el riesgo de estar frente a cepas no albicans (ej. C. glabrata) que requieren esquemas terapéuticos distintos y prolongados.<br><br>Perla ENARM: \"A todas las pacientes con cuadro clínico que sugiera CVV es necesario muestra de exudado vaginal para examen en fresco y ante la sospecha de una CVV complicada es indispensable la toma de cultivo de exudado vaginal\".<br><br>Análisis de Distractores: La opción A y C son utilizadas para el diagnóstico diferencial (vaginosis). La opción D tiene mejor sensibilidad que el examen en fresco, pero no permite tipificar la especie de levadura como lo hace el cultivo, por lo que no cumple el requisito indispensable de la forma complicada.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Diagnóstico clínico y pruebas diagnósticas, Página 17." 
            },
            {
                id: 57, 
                question: "¿Cuál es el factor pronóstico que eleva significativamente el riesgo relativo (hasta 8.0) de desarrollar un nuevo Cáncer de Mama en mujeres menores de 40 años?", 
                options: ["Densidad mamográfica aumentada", "Antecedente personal de cáncer mamario", "Obesidad mórbida postmenopáusica", "Tabaquismo activo intenso"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, haber cursado previamente con la enfermedad en edad joven demuestra una base genético-molecular muy agresiva, volviéndolo el factor predictivo clínico de mayor peso para una recurrencia o un segundo primario.<br><br>Perla ENARM: \"Antecedente personal de cáncer de mama, en mujeres mayores de 40 años con antecedente personal de cáncer de mama, el riesgo relativo de un nuevo cáncer de mama fluctúa entre 1.7 y 4.5, si la mujer es menor de 40 años en riesgo relativo se eleva a 8.0\".<br><br>Análisis de Distractores: La densidad mamaria aumentada (A) es factor de riesgo (RR ~2 a 4) pero no alcanza el 8.0. La obesidad (C) y el tabaquismo (D) son factores de riesgo menores asociados al estilo de vida, con impacto clínico mucho menor que un cáncer previo.", 
                source: "GPC S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención, 2017, Factores de riesgo mayores, Página 20." 
            },
            {
                id: 58, 
                question: "En la evaluación de la amenaza de parto pretérmino en centros de primer nivel sin recursos ecográficos, ¿cuál es la escala recomendada por la GPC para normar la conducta clínica?", 
                options: ["Índice de Bishop", "Criterios de ACOG", "Índice de madurez fetal", "Índice de Gruber-Baumgarten"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, en el contexto de atención primaria donde el estándar de oro (ultrasonido endovaginal) no está disponible, se requiere una herramienta clínica estandarizada. Este índice evalúa factores tangibles (actividad uterina, ruptura de membranas, hemorragia y dilatación cervical) asignando un puntaje que predice el éxito de la tocólisis.<br><br>Perla ENARM: \"Es de gran utilidad para el tamizaje el índice de Gruber Baumgarten, para evitar el uso excesivo del ultrasonido para medir el cérvix, así como estrategia en los centros que no cuenten con estudios de gabinete\".<br><br>Análisis de Distractores: El Índice de Bishop (A) evalúa la favorabilidad cervical para la inducción del parto a término, no el riesgo de parto pretérmino. Los criterios de ACOG (B) son guías, no una escala pronóstica de tamizaje. El índice de madurez fetal (C) evalúa líquido amniótico, no la clínica materna de la amenaza.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Tamizaje, Página 26." 
            },
            {
                id: 59, 
                question: "Según la GPC de lesiones precursoras del cáncer de cuello uterino, ¿cuál hallazgo clínico o citológico indica la necesidad de realizar un cono con bisturí frío en lugar de una escisión electroquirúrgica?", 
                options: ["Lesión confinada al ectocérvix", "Sospecha de Adenocarcinoma in situ", "Presencia de verrugas genitales", "Lesión de bajo grado persistente"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones precursoras del cáncer cervical, el Adenocarcinoma in situ (AIS) se origina en las glándulas, puede extenderse profundamente hacia el canal endocervical de forma silente y suele ser multifocal o en forma de \"salto\". El uso de escisión electroquirúrgica (LEEP) en estos casos quema los bordes y no proporciona un cilindro suficientemente profundo o térmicamente íntegro para garantizar un borde negativo sano.<br><br>Perla ENARM: \"Se recomienda realizar CBF (Cono con Bisturí Frío) de la zona de transformación como tratamiento para las mujeres con AIS confirmado mediante histología. La muestra debe presentar márgenes interpretables para la evaluación histológica\".<br><br>Análisis de Distractores: Una lesión ectocervical (A) o de bajo grado persistente (D) son indicaciones clásicas para ablación o LEEP (asa diatermica), ya que no requieren tanta profundidad de estroma. Las verrugas (C) son tratadas médica o ablativamente de forma muy superficial.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Tratamiento del AIS, Página 41." 
            },
            {
                id: 60, 
                question: "Ante el tamizaje inicial de una paciente con sospecha de depresión perinatal mediante la Escala de Edimburgo, ¿qué hallazgo específico obliga a realizar una evaluación médica de inmediato?", 
                options: ["Puntuación total de 10", "Llanto la mayor parte", "Puntuación total de 15", "Pregunta 10 mayor a 0"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Depresión prenatal y posparto, la ideación suicida es una urgencia psiquiátrica absoluta. Independientemente del puntaje total obtenido en la prueba, la positividad en el ítem que evalúa pensamientos de autolesión anula el manejo conservador o de vigilancia y exige protección inmediata a la madre y al recién nacido.<br><br>Perla ENARM: \"Cualquier número que se escoja que no sea el 0 en la pregunta 10 significa que es necesario hacer evaluaciones adicionales de inmediato\".<br><br>Análisis de Distractores: Las opciones A y C indican probabilidad de depresión y ameritan inicio de tratamiento psicoterapéutico, pero no representan una emergencia inmediata vital como el ítem 10. La opción B es un síntoma clásico (anhedonia/tristeza) pero no representa un riesgo inminente de muerte.", 
                source: "GPC SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Cuadros o figuras (Anexo 4.3), Página 31."

            {

                question: "En la Infección de Vías Urinarias, ¿cuál es el principal mecanismo hormonal o anatómico que describe la GPC para explicar el desarrollo de estasis e hidronefrosis en el embarazo?", 
                options: ["Relajación ureteral por progesterona", "Aumento de peristalsis ureteral", "Contracción del músculo liso", "Estrechez del esfínter vesical"],

                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, el medio gestacional rico en esta hormona compromete el componente muscular del uréter mientras el útero comprime anatómicamente el flujo inferior, perpetuando bacterias en la vía.<br><br>Perla ENARM: \"relajación del músculo liso de los uréteres, compresión mecánica del útero grávido que incrementa el fenómeno de hidronefrosis... esto anterior se debe probablemente al aumento en la concentración de progesterona\".<br><br>Análisis de Distractores: El peristaltismo ureteral disminuye (no aumenta), el músculo liso sufre relajación y reducción de tono (no contracción), y el esfínter ureteral se relaja progresivamente, no se hipertrofia ni se estrecha.",

            {
                id: 62,
                question: "¿Cuál es el factor de riesgo con mayor asociación para el desarrollo de Diabetes Mellitus Gestacional catalogado como de \"Riesgo Alto\" en la evaluación inicial de una mujer embarazada?",
                options: ["Edad materna > 25 años", "Obesidad severa", "Tabaquismo activo", "Nuliparidad"],

                justification: "Justificación: De acuerdo a la GPC de Control Prenatal, la estratificación del riesgo es el paso más importante en la primera consulta para definir el momento de la curva de tolerancia a la glucosa oral. La obesidad severa y los antecedentes patológicos directos colocan a la paciente en el nivel máximo de riesgo de forma automática.<br><br>Perla ENARM: \"Riesgo alto: Mujeres que presentan cualquiera de las siguientes características: Obesidad severa, Diabetes conocida en familiares de primer grado, Antecedente de alteración en el metabolismo de la glucosa.\"<br><br>Análisis de Distractores: La edad menor de 25 años es factor de riesgo bajo, por ende, mayor a 25 años confiere riesgo, pero no es exclusivo de \"Alto Riesgo\" sin otras comorbilidades. El tabaquismo (C) y nuliparidad (D) son factores de riesgo para restricción de crecimiento intrauterino y preeclampsia, pero no clasifican primariamente en riesgo alto para Diabetes Gestacional en el algoritmo de esta GPC.",

            },
            {

            {

                question: "Ante la sospecha clínica de Cáncer de Mama en una paciente gestante, ¿cuál es el primer estudio de imagen que debe solicitarse de forma segura?", 
                options: ["Mastografía con protección abdominal", "Resonancia magnética sin gadolinio", "Ultrasonido mamario bilateral", "Tomografía por emisión focal"],

                justification: "Justificación: De acuerdo a la GPC de Tratamiento del Cáncer de Mama, el incremento en la densidad mamaria y en la vascularidad durante la gestación reduce la sensibilidad de la mastografía, además de implicar una exposición a la radiación. El estudio de ondas sonoras es la elección primaria por su nulo riesgo fetal y excelente capacidad para discernir masas sólidas.<br><br>Perla ENARM: Para iniciar el estudio de un nódulo mamario durante el embarazo, se recomienda como primera opción el ultrasonido mamario.<br><br>Análisis de Distractores: La mastografía con protección (A) solo se utiliza si el ultrasonido es sospechoso y es indispensable. La resonancia magnética (B) y la tomografía (D) están contraindicadas o no recomendadas en el embarazo por la retención de contraste fetal y la radiación.",

            },
            {
                id: 65, 
                question: "Según la guía de Cáncer Cervicouterino, ¿cuál es el procedimiento quirúrgico de elección indicado para tratar a una paciente en estadio IA2 (sin contraindicación) que desea fervientemente preservar su fertilidad?", 
                options: ["Histerectomía extrafascial tipo A", "Conización cervical quirúrgica simple", "Exenteración pélvica anterior", "Traquelectomía radical más linfadenectomía"],

                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Cáncer Cervicouterino, el estadio IA2 acarrea un riesgo del 3 al 7% de afectación ganglionar pélvica. Para mantener el útero intacto pero ofrecer seguridad oncológica contra las metástasis linfáticas ocultas, se reseca el cérvix de forma radical y se barren los ganglios bilatereales. \"Se recomienda como opciones terapéuticas: Cono cervical más LPB (en pacientes sin contraindicación quirúrgica) o Traquelectomía radical con linfadenectomía pélvica bilateral laparoscópica o abierta\".<br><br>Análisis de Distractores: La histerectomía extrafascial tipo A (A) arruina por definición la posibilidad de un embarazo futuro al extraer el útero completo. La conización cervical simple (B) está indicada para etapas in situ o IA1, pero se vuelve incompleta en un IA2 al no mapear los ganglios pélvicos. La exenteración pélvica anterior (C) es un procedimiento de rescate ultrarradical para recurrencias masivas a vejiga, extirpando todo el piso pélvico.",

            {

                question: "Ante la sospecha clínica inicial de Placenta Previa o Acretismo en una paciente asintomática con factores de riesgo durante el segundo trimestre, ¿cuál es el primer estudio de imagen de tamizaje que debe solicitarse?", 
                options: ["Ultrasonido abdominal", "Resonancia magnética", "Tomografía computarizada pélvica", "Radiografía simple de abdomen"],

            {

            {
                id: 69, 
                question: "Según la guía, ¿cuál es el criterio clínico absoluto para indicar histerectomía como tratamiento para la endometriosis pélvica grave?", 
                options: ["Diagnóstico inicial de endometriosis", "Deseo de fertilidad futura", "Endometriosis pélvica asintomática", "Falla a tratamientos conservadores"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Histerectomía en patología benigna, remover el útero (y comúnmente los ovarios) en mujeres en edad reproductiva genera un impacto sistémico y emocional severo, por lo que esta entidad inflamatoria crónica primero exige un escalonamiento terapéutico prolongado con AINEs, progestinas, danazol o análogos de GnRH, o cirugías de ablación láser antes de sentenciar al órgano a la ablación quirúrgica radical definitiva.<br><br>Perla ENARM: \"Se recomienda la histerectomía como tratamiento de última elección en pacientes que presentan endometriosis grave, asociada a sintomatología incapacitante y con falla de otros tratamientos, siempre y cuando la paciente cuente con fertilidad satisfecha\".<br><br>Análisis de Distractores: El diagnóstico reciente (A) o la paciente asintomática (C) justifican vigilancia estrecha y terapia hormonal supresiva inicial. Si existe deseo ferviente de fertilidad (B), la escisión laparoscópica minuciosa de implantes endometriósicos (cirugía conservadora) es la norma absoluta, prohibiendo categóricamente la extirpación del útero de inicio.", 
                source: "GPC SS-295-10, Indicaciones y contraindicaciones de la histerectomía en mujeres con patología benigna en el segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 18." 
            },
            {
                id: 70, 
                question: "Ante la sospecha clínica de choque hemorrágico en obstetricia, ¿cuál es la técnica recomendada de primera línea para estimar la pérdida sanguínea inicial de manera objetiva?", 
                options: ["Estimación visual directa", "Pesar gasas y compresas", "Fotocolorimetría de paños", "Medición de hemoglobina sérica"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, cuantificar adecuadamente previene el retraso en la reanimación hídrica. La gravimetría (pesar insumos) reduce significativamente el margen de error comparado con otros métodos clínicos.<br><br>Perla ENARM: \"Se recomienda pesar las gasas y compresas secas previo y posteriormente a la atención obstetrica. La diferencia de dichos pesos determina los militros de perdida sanguínea aproximado\".<br><br>Análisis de Distractores: La estimación visual (A) subestima el sangrado hasta en un 50%. La fotocolorimetría (C) es exacta pero cara y restringida a la investigación clínica. La hemoglobina sérica (D) inicial es engañosa por la hemoconcentración transitoria post-sangrado.", 
                source: "GPC IMSS-162-09, Diagnóstico y tratamiento del choque hemorrágico en obstetricia, 2017, Diagnóstico Clínico, Página 24." 
            },
            {
                id: 71, 
                question: "Según la GPC de Sepsis Materna, ¿cuáles son los hallazgos clínicos que indican la necesidad de tratamiento quirúrgico u obstétrico inmediato absoluto de la gestación independientemente de la prematurez?", 
                options: ["Maduración pulmonar fetal exclusiva", "Interrupción urgente del embarazo", "Tocolíticos y antibiótico profiláctico", "Cerclaje cervical de emergencia"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, el control del foco infeccioso (Source Control) es el pilar anatómico de la curación en la sepsis. Cuando el origen anatómico de la infección diseminada reside directamente en la cavidad uterina (ej. corioamnionitis severa, absceso intraamniótico, retención de óbito), la única forma de detener la tormenta citocínica y salvar la vida de la madre es vaciar el contenido uterino de manera impostergable.<br><br>Perla ENARM: \"En caso de sepsis intrauterina se debe considerar la interrupción urgente del embarazo, independientemente de la edad gestacional\".<br><br>Análisis de Distractores: Las opciones A y C (maduración pulmonar y tocolisis) buscan prolongar o detener la labor de parto y ganar tiempo, una conducta proscrita cuando la cavidad uterina está activamente infectada. La opción D (cerclaje) está contraindicada en infección, pues retendría mecánicamente el tejido purulento empeorando la morbimortalidad.", 
                source: "GPC-IMSS-272-18, Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, 2018, Tratamiento Quirúrgico, Página 20."

            {
                id: 72, 
                question: "Ante la sospecha clínica aguda de Hiperémesis Gravídica, además del examen general de orina para objetivar cetonuria, ¿cuál es el abordaje inicial de laboratorio imperativo para clasificar la severidad metabólica según la GPC?", 
                options: ["Electrolitos séricos y creatinina", "Tomografía simple de abdomen", "Radiografía de tránsito intestinal", "Resonancia magnética de abdomen"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, la deshidratación severa originada por los vómitos incoercibles y la intolerancia a la vía oral provoca alteraciones hidroelectrolíticas agudas (hipopotasemia, hiponatremia, alcalosis metabólica) y falla prerrenal, siendo urgente su documentación y corrección para evitar desenlaces letales como falla renal aguda, arritmias o mielinólisis central pontina.<br><br>Perla ENARM: \"En mujeres con sospecha clínica de hiperémesis gravídica se sugiere solicitar: biometría hemática completa, pruebas de función hepática, pruebas de coagulación, perfil tiroideo, electrólitos séricos, urea, creatinina y evaluación del equilibrio ácido-base, así como ultrasonido obstétrico y examen general de orina\".<br><br>Análisis de Distractores: La tomografía implica dosis de radiación ionizante no justificada inicialmente en la paciente embarazada con vómitos no complicados de primer trimestre. La radiografía no evalúa el estado metabólico-electrolítico agudo y expone al embrión. La resonancia magnética es el estándar de imagen para descartar patología abdominal estructural (ej. apendicitis dudosa), no para evaluar la repercusión sistémica primaria de la hiperémesis.", 
                source: "GPC IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Hiperémesis gravídica, Página 27." 
            },
            {
                id: 73, 
                question: "En la fisiopatología de la Ruptura Prematura de Membranas Pretérmino, ¿cuál es el mecanismo celular o patológico que describe la GPC asociado con la activación de colagenasas para provocar la ruptura?", 
                options: ["Necrosis tisular focal", "Apoptosis celular", "Hiperplasia del endometrio", "Edema del estroma cervical"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Ruptura Prematura de Membranas Pretérmino, la integridad de las membranas corioamnióticas depende de un delicado equilibrio entre la formación y la destrucción de la matriz extracelular (colágeno). Procesos infecciosos, inflamatorios y deficiencias nutricionales provocan muerte celular programada de los fibroblastos que dan sostén a la estructura. Este adelgazamiento microscópico precede a la rotura física por las contracciones.<br><br>Perla ENARM: La apoptosis, la activación de enzimas catabólicas como las colagenasas y fuerzas mecánicas resultan en la ruptura de membranas.<br><br>Análisis de Distractores: La necrosis tisular focal (A) involucra un proceso desordenado con isquemia tisular que no es el mecanismo fisiopatológico mediado enzimáticamente en las membranas. La hiperplasia del endometrio (C) es una patología tumoral o dependiente de estrógenos que no tiene relación anatómica ni fisiológica con la ruptura del amnios. El edema del estroma cervical (D) puede estar en modificaciones por insuficiencia istmico-cervical, pero no es el mecanismo destructivo intrínseco de las colagenasas en las membranas.", 
                source: "GPC-SEDENA-446-18, Diagnóstico y Tratamiento de la Ruptura Prematura de Membranas Pretérmino, 2018, Justificación, página 9." 
            },
            {
                id: 74, 
                question: "Utilizando la clasificación de riesgo para Hemorragia Postparto, ¿cómo se cataloga a una paciente en trabajo de parto que tiene el antecedente comprobado de placenta previa o defectos de la coagulación?", 
                options: ["Riesgo alto", "Riesgo intermedio", "Riesgo bajo", "Riesgo inminente"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, la estratificación del riesgo dicta la preparación preoperatoria (ej. reserva de sangre, personal capacitado). Condiciones que predisponen a sangrado anatómico directo o falla de coagulación no pueden modificarse rápidamente, por lo que clasifican a la paciente en la categoría más alta de peligro.<br><br>Perla ENARM: \"Clasificación de riesgo para presentar HPP... Alto riesgo: Placenta previa, acreta, increta y percreta. Hematocrito menor de 30. Sangrado vaginal a su ingreso. Defectos en la coagulación ya conocidos\".<br><br>Análisis de Distractores: Las opciones C y B incluyen a pacientes sin antecedentes, con multiparidad baja o miomatosis sencilla (riesgo medio). \"Riesgo inminente\" (Opción D) no es una categoría reconocida en la matriz oficial de la GPC.", 
                source: "GPC-SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadro 9, Página 87." 
            },
            {
                id: 75, 
                question: "Según la GPC de Ruptura Uterina, ¿cuál hallazgo documentado sobre la cicatriz uterina previa indica la prohibición absoluta de prueba de trabajo de parto?", 
                options: ["Incisión segmentaria transversa baja", "Incisión clásica o en T", "Incisión de Pfannenstiel previa", "Incisión de Joel Cohen"], 
                answer: 1, 
                justification: "Justificación: Las incisiones corporales (verticales clásicas o en T invertida) involucran fibras miometriales gruesas del cuerpo uterino superior, el cual soporta la máxima presión y contracción durante el trabajo de parto. Su riesgo de dehiscencia es insostenible (4 al 9%). De acuerdo a la GPC de Ruptura Uterina, la inducción del trabajo de parto con este antecedente representa impericia médica.<br><br>Perla ENARM: Se recomienda desaconsejar la prueba de trabajo de parto o la inducción del parto en pacientes con antecedente de incisión en clásica o incisión en \"T\".<br><br>Análisis de Distractores: La incisión segmentaria transversa baja (A) es la única incisión que, bajo consentimiento y monitoreo continuo, permite intentar una prueba de trabajo de parto segura. Pfannenstiel (C) y Joel Cohen (D) son tipos de incisión en la pared abdominal superficial, no en el miometrio.",

                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
