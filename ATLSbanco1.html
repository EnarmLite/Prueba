<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                <button id="dark-mode-toggle" class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 font-semibold py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Reiniciar Examen

            </div>
        </aside>

        <!-- MAIN CONTENT (Scrollable) -->
        <main id="main-content" class="flex-1 h-[100dvh] overflow-y-auto overscroll-y-contain p-4 sm:p-6 lg:p-8 transition-all duration-300 relative bg-slate-50 dark:bg-slate-950">
            
            <!-- Botón Grid (Tablero) a la Izquierda (Oculto en Inicio) -->

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <!-- Botón Menú a la Derecha (Oculto en Inicio, visible en desktop y móvil) -->

                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>

            <!-- Barra de Progreso Limpia (Gruesa y sin marca de agua de fondo) -->

                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-green-500 h-full transition-all duration-500 flex items-center justify-center text-[11px] font-bold text-white leading-none relative z-10" style="width:0%">0%</div>

            <div id="module-display" class="transition-opacity duration-300 pb-12"></div>

        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>
    </div>
    
    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
            {
                id: 1, 
                question: "¿Cómo se estima la profundidad adecuada en cm para la inserción del tubo endotraqueal desde las encías en un paciente pediátrico?", 
                options: ["Dos veces el diámetro del tubo", "Tres veces el diámetro del tubo", "Cuatro veces el diámetro del tubo", "Cinco veces el diámetro del tubo"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los niños presentan una tráquea proporcionalmente más corta, lo que predispone a la intubación inadvertida del bronquio principal derecho. Una estimación razonable y rápida de la profundidad adecuada del tubo endotraqueal desde las encías, en cm, equivale a multiplicar por tres el diámetro interno del tubo seleccionado.<br><br>Perla ENARM: La regla del \"tres veces el diámetro\" previene el volutrauma selectivo y la intubación monobronquial en la reanimación de la vía aérea pediátrica.<br><br>Análisis de Distractores: La opción A deja el tubo en posición muy proximal con alto riesgo de extubación accidental o lesión de cuerdas vocales. Las opciones C y D garantizan una intubación selectiva del bronquio principal derecho, colapsando el pulmón izquierdo y empeorando la hipoxia.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 2, 
                question: "¿Cuál es el volumen inicial de concentrado eritrocitario indicado en un paciente pediátrico que no responde a la reanimación con cristaloides?", 
                options: ["10 ml/kg", "20 ml/kg", "30 ml/kg", "40 ml/kg"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el uso de estrategias de reanimación equilibradas en niños dicta que si un paciente no demuestra una respuesta sostenida a un bolo inicial de cristaloide (20 ml/kg), se debe administrar de forma inmediata 10 a 20 ml/kg de glóbulos rojos empaquetados o sangre entera en lugar de administrar cristaloides adicionales.<br><br>Perla ENARM: La reanimación transfusional pediátrica por pérdida de respuesta a cristaloides se inicia con dosis de 10 ml/kg de hemoderivados para evitar la hemodilución y exacerbar la coagulopatía.<br><br>Análisis de Distractores: La opción B corresponde a la dosis inicial en bolo de líquido cristaloide isotónico. Las opciones C y D representan una sobrecarga de volumen masiva e inapropiada en una sola exhibición, aumentando el riesgo de falla cardíaca y edema pulmonar hidrostático.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 3, 
                question: "¿Cuál es la longitud de aguja recomendada para realizar la descompresión pleural de un neumotórax a tensión en el paciente pediátrico?", 
                options: ["1.0 a 2.0 cm", "2.5 a 4.5 cm", "5.0 a 7.0 cm", "7.5 a 9.0 cm"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el grosor de la pared torácica infantil requiere una selección cuidadosa del material. La aguja para descompresión pleural (calibre 16 a 22) debe tener una longitud de 2.5 a 4.5 cm, optimizando la penetración en la cavidad pleural y minimizando el riesgo de daño a los vasos intercostales o estructuras intratorácicas profundas.<br><br>Perla ENARM: Las agujas de 2.5 a 4.5 cm de longitud aseguran una toracostomía con aguja exitosa en pediatría, evitando la lesión iatrogénica del parénquima pulmonar.<br><br>Análisis de Distractores: La opción A es insuficiente para atravesar la musculatura y la pleura parietal. Las opciones C y D son agujas excesivamente largas, habitualmente utilizadas en adultos obesos (5 a 8 cm), las cuales en un niño causarían laceración pulmonar o lesión cardíaca directa.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 4, 
                question: "¿Cuál es la complicación principal que presenta una incidencia de hasta el 30% en pacientes geriátricos con fracturas costales?", 
                options: ["Neumotórax a tensión", "Hemotórax masivo", "Neumonía intrahospitalaria", "Síndrome de distrés respiratorio agudo"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los adultos mayores tienen una distensibilidad torácica disminuida y pobre reflejo tusígeno. El dolor de las fracturas costales causa hipoventilación y atelectasias, predisponiendo fuertemente al desarrollo de neumonía en el parénquima susceptible, cuya incidencia alcanza hasta el 30% en esta población.<br><br>Perla ENARM: El riesgo de mortalidad en el anciano aumenta linealmente con cada costilla adicional fracturada, siendo la neumonía la principal y más letal complicación tardía.<br><br>Análisis de Distractores: Las opciones A y B son complicaciones mecánicas agudas directas del trauma, pero no tienen la alta incidencia del 30% característica de la infección pulmonar secundaria en geriatría. La opción D es una respuesta inflamatoria sistémica severa que puede ocurrir, pero la neumonía focal secundaria a hipoventilación es la complicación clásica más prevalente.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 5, 
                question: "¿Cuál es el agente de reversión y su dosis para un paciente geriátrico traumatizado tratado con heparina de bajo peso molecular en las últimas ocho horas?", 
                options: ["Vitamina K 10 mg intravenosos", "Andexanet alfa 400 mg en bolo", "Concentrado de complejo protrombínico 50 unidades", "Sulfato de protamina 1 mg por mg"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la heparina de bajo peso molecular (como la enoxaparina) tiene un efecto parcialmente reversible con el sulfato de protamina. La dosificación clínica indicada es de 1 mg de protamina por cada 1 mg de enoxaparina si se administra dentro de las primeras 8 horas desde la última dosis del anticoagulante.<br><br>Perla ENARM: El sulfato de protamina es el agente de reversión (aunque parcial) de primera línea para las heparinas de bajo peso molecular en el entorno del trauma agudo geriátrico.<br><br>Análisis de Distractores: La opción A revierte exclusivamente los antagonistas de vitamina K (warfarina). La opción B es el antídoto directo para los inhibidores del Factor Xa (rivaroxabán, apixabán). La opción C se emplea para warfarina o como opción no autorizada para fondaparinux, no es la terapia directa para enoxaparina.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 6, 
                question: "¿Cuál es el umbral de dosis de radiación por debajo del cual existe un riesgo nulo o mínimo de teratogenicidad en la paciente embarazada traumatizada?", 
                options: ["5 rads", "10 rads", "15 rads", "20 rads"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., avalado por el American College of Obstetricians and Gynecologists, la exposición fetal a radiación inferior a 5 rads (50 mGy) no se asocia con un riesgo demostrable de anomalías congénitas o pérdida fetal. Las tomografías computarizadas de rutina en trauma generan dosis acumuladas muy por debajo de este límite.<br><br>Perla ENARM: Ninguna radiografía o tomografía computarizada necesaria para la evaluación de la madre traumatizada debe retrasarse, ya que la exposición habitual nunca supera el umbral teratogénico de 5 rads.<br><br>Análisis de Distractores: Las opciones B, C y D representan niveles elevados de radiación acumulada. Efectos severos sobre el sistema nervioso central fetal se observan con umbrales que superan los 20 a 40 rads, pero el límite universal de seguridad total es de 5 rads.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 7, 
                question: "¿A los cuántos minutos de reanimación cardiopulmonar sin retorno de circulación espontánea se debe considerar la cesárea con reanimación en una gestante traumatizada?", 
                options: ["1 minuto", "3 minutos", "5 minutos", "10 minutos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., si la paciente permanece en paro materno y sin retorno de la circulación espontánea tras 5 minutos de reanimación adecuada y el útero se encuentra a la altura del ombligo o superior, está indicada la cesárea con reanimación. Esto alivia la compresión aortocava y mejora significativamente las probabilidades de retorno de la circulación materna.<br><br>Perla ENARM: La cesárea con reanimación al minuto 5 de un paro cardíaco materno es una intervención primordial para salvar la vida de la madre al mejorar el retorno venoso al corazón.<br><br>Análisis de Distractores: Las opciones A y B representan tiempos prematuros donde las maniobras de soporte vital avanzado aún tienen alta eficacia intrínseca sin cirugía. La opción D es un retraso crítico que incrementa drásticamente la mortalidad materna y el daño anóxico cerebral irreversible.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 8, 
                question: "¿Cuál es el valor fisiológico esperado de la presión parcial de dióxido de carbono en sangre arterial durante la última etapa del embarazo?", 
                options: ["41 a 45 mmHg", "35 a 40 mmHg", "33 a 34 mmHg", "27 a 32 mmHg"], 
                answer: 3, 
                justification: "Justificación: El aumento de la progesterona promueve una hiperventilación alveolar compensatoria. De acuerdo al ATLS 11.ª ed., la paciente embarazada sana cursa con una alcalosis respiratoria crónica, manteniendo una PaCO2 fisiológica basal de 27 a 32 mmHg.<br><br>Perla ENARM: En una paciente en el tercer trimestre, un valor de PaCO2 \"normal\" (35-40 mmHg) indica fatiga de los músculos accesorios e insuficiencia respiratoria inminente.<br><br>Análisis de Distractores: La opción A representa una retención aguda de CO2 indicativa de asfixia. La opción B es el rango normal para un adulto no gestante, pero en la embarazada es un signo premonitorio de claudicación respiratoria. La opción C es un estado intermedio de transición no considerado el rango metabólico basal esperado.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 9, 
                question: "¿Cuál es la vida media de eliminación del monóxido de carbono cuando el paciente con lesión por inhalación respira oxígeno al 100%?", 
                options: ["10 a 20 minutos", "40 a 50 minutos", "90 a 120 minutos", "240 a 300 minutos"], 
                answer: 1, 
                justification: "Justificación: La carboxihemoglobina bloquea la entrega de oxígeno celular al desviar la curva de disociación a la izquierda. De acuerdo al ATLS 11.ª ed., la vida media del monóxido de carbono respirando aire ambiental es de 4 horas (240 minutos), pero disminuye rápida y drásticamente a 40-50 minutos al administrar una fracción inspirada de oxígeno del 100%.<br><br>Perla ENARM: Todo paciente rescatado de un incendio en un recinto cerrado requiere oxígeno suplementario al 100% inmediato para forzar la eliminación competitiva del monóxido de carbono en menos de 50 minutos.<br><br>Análisis de Distractores: La opción A es un tiempo de aclaramiento subestimado e irreal fisiológicamente. La opción C ocurre en pacientes sometidos a concentraciones submáximas de oxígeno. La opción D corresponde a la vida media de eliminación natural respirando aire atmosférico (21% de oxígeno).", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 10, 
                question: "¿Cuál es la constante numérica para calcular el volumen de reanimación hídrica en 24 horas para pacientes pediátricos menores de 13 años con quemaduras térmicas?", 
                options: ["1 mililitro de cristaloide", "2 ml de cristaloide", "3 ml de cristaloide", "4 ml de cristaloide"], 
                answer: 2, 
                justification: "Justificación: Las necesidades hídricas difieren por la mayor superficie de evaporación relativa en la infancia. De acuerdo al ATLS 11.ª ed., el cálculo en niños menores de 13 años se ajusta a 3 ml de Ringer Lactato multiplicado por el peso en kg y por el porcentaje de superficie corporal total quemada, buscando una diuresis de 1 ml/kg/h.<br><br>Perla ENARM: La constante multiplicadora para trauma térmico pediátrico es invariablemente 3 ml, diferenciándose de los 2 ml que se emplean para pacientes adultos.<br><br>Análisis de Distractores: La opción A causa reanimación insuficiente rápida. La opción B es la constante estándar exclusiva para adolescentes mayores de 13 años y adultos. La opción D se emplea universalmente solo en el contexto de quemaduras de etiología eléctrica de alto voltaje, independientemente de la edad.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 11, 
                question: "¿Cuál es la temperatura constante del agua indicada para la inmersión y el recalentamiento rápido de una extremidad con lesión por congelación?", 
                options: ["32 grados centígrados", "36 grados centígrados", "40 grados centígrados", "44 grados centígrados"], 
                answer: 2, 
                justification: "Justificación: El rescate de tejido isquémico congelado se basa en la restauración rápida y controlada del flujo capilar. De acuerdo al ATLS 11.ª ed., la inmersión debe realizarse en un recipiente con agua de recirculación mantenida a una temperatura constante de 40 °C (104 °F) durante 20 a 30 minutos hasta restaurar la perfusión y la coloración rosada.<br><br>Perla ENARM: El recalentamiento hídrico a 40 °C es el estándar de oro del tratamiento de lesiones por frío; el calor seco directo o el masaje están absolutamente contraindicados.<br><br>Análisis de Distractores: La opción A mantiene a la extremidad en el espectro térmico de hipotermia tisular. La opción B causa un recalentamiento lento y prolonga la cristalización y muerte celular. La opción D produce quemaduras térmicas de espesor variable debido a la anestesia y falta de sensibilidad en la extremidad congelada.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 12, 
                question: "¿En qué situación clínica está contraindicada la inserción de una sonda nasogástrica durante la revisión secundaria por riesgo de paso intracraneal?", 
                options: ["Fractura de la placa cribiforme", "Fractura del hueso maxilar inferior", "Hematoma septal nasal bilateral", "Fractura de la órbita ocular"], 
                answer: 0,

            {

                justification: "Justificación: El occipucio prominente del niño fuerza mecánicamente al cuello a flexionarse cuando yace plano sobre una camilla dura, exacerbando la seudosubluxación anterior de C2 sobre C3. De acuerdo al ATLS 11.ª ed., elevar el torso colocando una capa de acolchado de 1 pulgada debajo del paciente desde los hombros hasta las caderas neutraliza el eje cervical e identifica si el desplazamiento es falso.<br><br>Perla ENARM: El acolchado toraco-pélvico restablece el eje neutral en pediatría y diferencia la seudosubluxación anatómica de una fractura cervical verdadera sin necesidad de tomografías innecesarias.<br><br>Análisis de Distractores: La opción A es peligrosa e iatrogénica si existe inestabilidad ligamentaria. La opción B empeora drásticamente la hiperflexión del cuello y ocluye la vía aérea aguda. La opción D restringe el movimiento pero no modifica el eje geométrico del cuello en flexión forzada.",

        function setupEventListeners() {

                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');

        }

            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS01Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS01LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS01LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS01Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</script>
