            </div>

    <script>
        // =========================================================
        // DATA: BASE DE DATOS DE PREGUNTAS (AGREGA AQUÍ HASTA 280+)
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Basado en la GPC de Ictericia Neonatal, ¿cuál es el estudio de laboratorio que funge como estándar de oro y normatiza el tratamiento definitivo?", 
                options: ["Medición de bilirrubina transcutánea", "Prueba de Coombs directo", "Medición de bilirrubinas séricas", "Frotis de sangre periférica"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Ictericia Neonatal, las pruebas visuales o transcutáneas tienen limitaciones por el tono de piel o la edad gestacional, por lo que todo manejo debe fundamentarse en las determinaciones en suero. \"La determinación de bilirrubinas séricas es el estándar de oro para conocer el grado de hiperbilirrubinemia\".<br><br>Análisis de Distractores: La bilirrubina transcutánea (A) es un método de escrutinio útil pero pierde precisión con niveles altos (>14.7 mg/dl) o en prematuros. La prueba de Coombs (B) y el frotis (D) ayudan a identificar la etiología (hemólisis) pero no establecen el diagnóstico de hiperbilirrubinemia en sí mismo ni la severidad cuantitativa.", 
                source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 17." 
            },
            {
                id: 2, 
                question: "En el contexto de la Primera Crisis Convulsiva en México, ¿cuál es el diagnóstico o factor precipitante más frecuente reportado en el grupo etario de lactantes y preescolares?", 
                options: ["Epilepsias generalizadas idiopáticas", "Hemorragia intraparenquimatosa aguda", "Crisis febriles simples", "Intoxicación por metales pesados"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Primera Crisis Convulsiva, la epidemiología varía radicalmente según la edad del paciente. En lactantes y preescolares, la inmadurez termorreguladora y el desarrollo cerebral los hace particularmente susceptibles a la fiebre como estímulo excitatorio. Entre 2 y 5% de las niñas y niños experimentan al menos una crisis febril antes de los 5 años, siendo el tipo de crisis más frecuente en este grupo de pacientes.<br><br>Análisis de Distractores: Las epilepsias generalizadas idiopáticas y las intoxicaciones cobran mayor relevancia en la etapa escolar y adolescente. Las hemorragias intraparenquimatosas son causas estructurales graves pero estadísticamente raras frente a los procesos febriles.", 
                source: "IMSS-244-09, Guía de Práctica Clínica Diagnóstico y Tratamiento de la Primera Crisis Convulsiva en Niñas, Niños y Adolescentes, 2017, Detección, p. 29." 
            },
            {
                id: 3, 
                question: "Ante la sospecha clínica de Estenosis Hipertrófica Congénita de Píloro, ¿cuál es el primer estudio de imagen o tamizaje que debe solicitarse según el algoritmo de la GPC?", 
                options: ["Ultrasonido de abdomen superior.", "Serie esófago gastro duodenal.", "Radiografía simple de abdomen.", "Endoscopía gastrointestinal superior."], 
                answer: 0, 
                justification: "De acuerdo a la GPC de Estenosis Hipertrófica de Píloro, la ecografía es el estándar no invasivo inicial cuando no se palpa la oliva pilórica.<br><br>Perla ENARM: \"Ante la sospecha de EHP en un lactante el estudio de imagen que se debe realizar como primera elección es el ultrasonido abdominal.\"<br><br>Análisis de Distractores: La serie esófago-gastro-duodenal es el estudio de \"segunda elección\", reservada para cuando el ultrasonido no es concluyente o no hay equipo. La endoscopía solo se usa en casos atípicos donde los primeros dos estudios fallaron. La radiografía simple carece de sensibilidad para la confirmación anatómica.", 
                source: "IMSS-330-10, Diagnóstico y tratamiento de la Estenosis Hipertrófica Congénita de Píloro, 2017, Auxiliares Diagnósticos, Página 17." 
            },
            {
                id: 4, 
                question: "Utilizando la evaluación clínica de Enfermedad Hemolítica por Isoinmunización a Rh, ¿cómo se clasifica a un paciente fetal con hallazgos de volumen excesivo de líquido en pericardio y peritoneo?", 
                options: ["Síndrome de hemólisis leve controlada", "Anemia grave con hiperplasia focal", "Síndrome del bebé bronceado agudo", "Hídrops fetalis por isoinmunización severa"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Enfermedad Hemolítica por Isoinmunización a Rh... la insuficiencia cardíaca descompensada a raíz de la anemia masiva intrauterina condiciona fuga de líquido al tercer espacio, traduciendo el cuadro más catastrófico de la patología.<br><br>Perla ENARM: \"La forma grave de la isoinmunización a factor Rh se conoce como hídrops fetalis la cual por lo general produce la muerte del feto in útero... se puede encontrar como consecuencia de volumen excesivo de líquido en dos o más de los siguientes compartimentos fetales: Piel, Pleura, Pericardio, Peritoneo.\"<br><br>Análisis de Distractores: Las opciones A y B son rubros del espectro de la enfermedad donde el mecanismo compensatorio evita el derrame a cavidades. La opción C es una complicación directa del uso de fototerapia en presencia de colestasis, totalmente ficticia como clasificación diagnóstica inicial.", 
                source: "GPC-IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Sección: Signos y Síntomas, Página 37." 
            },
            {
                id: 5, 
                question: "Ante la sospecha clínica de Otitis Media Aguda, ¿cuál es el primer estudio de imagen o tamizaje que debe solicitarse según el algoritmo de la GPC si la otoscopía no es concluyente?", 
                options: ["Tomografía computarizada de mastoides", "Timpanometría de alta frecuencia", "Emisiones otoacústicas evocadas", "Audiometría tonal convencional"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Otitis Media Aguda... cuando el conducto es estrecho, hay impactación de cerumen o el lactante no tolera la exploración neumática, se requiere un método objetivo que evalúe la complianza de la membrana timpánica para descartar derrame.<br><br>Perla ENARM: \"Efectuar timpanometría de alta frecuencia en menores de 6 meses en los que se deba investigar OMD y que ésta no se haya logrado confirmar o descartar después de valoración clínica y realización de otoscopia neumática\".<br><br>Análisis de Distractores: La opción A se reserva exclusivamente para sospecha de complicaciones severas intratemporales (mastoiditis). Las opciones C y D son estudios audiológicos útiles para evaluar secuelas o pérdidas auditivas, pero no son el abordaje inicial en el evento agudo para determinar derrame.", 
                source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Diagnóstico Clínico, Página 24." 
            },
            {
                id: 6, 
                question: "De acuerdo a los criterios de la guía de práctica clínica, ¿cuál es el tiempo que define al Estreñimiento Funcional como crónico?", 
                options: ["Mayor a dos semanas", "Mayor a cuatro semanas", "Mayor a seis semanas", "Mayor a ocho semanas"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Estreñimiento Funcional... establecer esta ventana de tiempo permite separar cuadros transitorios (secundarios a fisuras agudas o infecciones virales) de las dinámicas crónicas de retención voluntaria que requieren mantenimiento farmacológico a largo plazo.<br><br>\"Estreñimiento crónico: aquel mayor a 8 semanas\".<br><br>Análisis de Distractores: Los plazos de dos, cuatro y seis semanas son temporalidades utilizadas en otros cuadros gastrointestinales agudos o subagudos, pero no alcanzan el umbral estricto para clasificar el síndrome como crónico según el glosario de esta normativa.", 
                source: "GPC-IMSS-643-18, Tratamiento médico del estreñimiento funcional en el escolar y adolescente, 2018, Glosario, Página 124." 
            },
            {
                id: 7, 
                question: "¿Cuál es el fármaco de elección para el manejo inicial de rescate del asma en edad pediátrica en un paciente sin contraindicaciones?", 
                options: ["Salbutamol en dosis medida", "Bromuro de ipratropio nebulizado", "Montelukast por vía oral", "Omalizumab por vía subcutánea"], 
                answer: 0, 
                justification: "De acuerdo a la GPC de Asma en Edad Pediátrica, los agonistas beta-2 de acción corta (SABA) son la piedra angular en la reversión aguda del broncoespasmo por su rapidez y relación riesgo-beneficio.<br><br>Perla ENARM: \"El salbutamol, es el medicamento de primera línea para el tratamiento del asma, vía inhalatoria, por su mayor efectividad y menos efectos secundarios; solo se nebulizará si se necesita administrar oxígeno.\"<br><br>Análisis de Distractores: El bromuro de ipratropio (B) es un adyuvante en crisis severas, pero nunca el agente inicial en monoterapia a menos que haya contraindicación para SABA. El montelukast (C) es de mantenimiento, no de rescate. El Omalizumab (D) es un biológico reservado para asma grave alérgica (paso 5).", 
                source: "GPC-SS-009-20, Tratamiento del asma en edad pediátrica, 2020, Evidencias y Recomendaciones: Tratamiento, Página 19." 
            },
            {
                id: 8, 
                question: "¿Cuál es el esquema antibiótico intravenoso de primera elección para el manejo de Infección de Vías Urinarias en un lactante menor de tres meses con afectación del estado general?", 
                options: ["Ampicilina y gentamicina", "Nitrofurantoína vía oral", "Cefalexina y fosfomicina", "Trimetoprima con sulfametoxazol"], 
                answer: 0, 
                justification: "De acuerdo a la GPC de Infección de Vías Urinarias, los lactantes menores de tres meses tienen inmadurez inmunológica y alta incidencia de bacteriemia concomitante, por lo que requieren cobertura sinérgica intravenosa contra enterobacterias y cocos Gram positivos (Enterococcus).<br><br>Perla ENARM: \"En recién nacidos y lactantes menores de 2 meses se recomienda terapia con antibióticos parenterales... Se recomienda usar como primera elección los antibióticos tipo penicilina y aminoglucósidos para el tratamiento intravenoso de pielonefritis\".<br><br>Análisis de Distractores: La nitrofurantoína (B) está contraindicada en menores de un mes y no alcanza niveles terapéuticos en sangre para pielonefritis/sepsis. La cefalexina (C) y el TMP-SMX (D) son alternativas exclusivas para la vía oral en niños mayores de 3 meses en manejo ambulatorio.", 
                source: "GPC-SS-027-21, Diagnóstico y tratamiento de la infección de vías urinarias no complicada en menores de 18 años, 2021, Tratamiento, p. 33." 
            },
            {
                id: 9, 
                question: "Ante la sospecha diagnóstica de una Desnutrición en Menores de Cinco Años (grado leve), ¿cuál es el primer estudio paraclínico que debe solicitarse obligatoriamente según el algoritmo de primer nivel?", 
                options: ["Examen general de orina", "Química sanguínea de seis", "Radiografía de huesos largos", "Biometría hemática"], 
                answer: 3, 
                justification: "De acuerdo a la GPC de Desnutrición Infantil, todo cuadro carencial agudo o crónico obliga a descartar la deficiencia de micronutrientes concomitante (anemia ferropénica), lo cual cambia diametralmente el abordaje terapéutico inicial si se requiere restitución de hierro.<br><br>Perla ENARM: \"Desnutrición leve: Solicitar biometría hemática y estudios disponibles. ¿Diagnóstico de Anemia?\".<br><br>Análisis de Distractores: La radiografía (C) para edad ósea o el EGO (A) para infecciones urinarias subclínicas son pertinentes en estudios de talla baja crónica por endocrinología, no son el tamizaje hematológico obligatorio del algoritmo inicial de desnutrición leve.", 
                source: "SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años en el primer nivel de atención, 2018, Algoritmo 1." 
            },
            {
                id: 10, 
                question: "¿Cuál es la terapia de elección para el manejo inicial de Diarrea Aguda en un paciente sin signos de deshidratación?", 
                options: ["Lactato de Ringer intravenoso", "Solución salina al cero nueve", "Vida Suero Oral fraccionado", "Loperamida en dosis única"], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Diarrea Aguda Infantil... el pilar en pacientes pediátricos sin deshidratación evidente (Plan A) es la reposición de las pérdidas continuas para evitar la progresión al déficit hídrico. Se prefiere emplear soluciones de baja osmolaridad.<br><br>Perla ENARM: En México, el Vida Suero Oral (VSO) de baja osmolaridad es recomendado como tratamiento preventivo y de primera línea en niños con diarrea aguda.<br><br>Análisis de Distractores: Las opciones A y B representan el Plan C de hidratación parenteral, el cual está proscrito y sería iatrogénico en un niño tolerando la vía oral sin choque. La opción D está absolutamente contraindicada en pediatría debido al riesgo de efectos adversos severos como íleo paralítico.", 
                source: "SS-156-18, Prevención, Diagnóstico y tratamiento de Diarrea Aguda en pacientes de 2 meses a 5 años de edad, 2018, Tratamiento, Página 19 y 30." 
            },
            {
                id: 11, 
                question: "¿Cuál es el fármaco de elección para el manejo anticongestivo inicial de la Comunicación Interventricular en un lactante?", 
                options: ["Betabloqueadores y calcioantagonistas", "Diuréticos e inhibidores enzimáticos", "Vasodilatadores pulmonares directos", "Anticoagulantes orales directos"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Defectos del Tabique Cardíaco... en lactantes con CIV de moderada a grande que presentan datos de insuficiencia cardiaca, el objetivo inicial es disminuir la precarga y la poscarga para optimizar el estado clínico antes de un cierre definitivo.<br><br>Perla ENARM: \"En los pacientes con datos clínicos de insuficiencia cardiaca congestiva, mientras se lleva a cabo el tratamiento correctivo de la CIV, se debe optimizar la nutrición e iniciar tratamiento anticongestivo con diuréticos como furosemide o espironolactona e inhibidores de la enzima convertidora de angiotensina como captopril o enalapril, así como digoxina.\"<br><br>Análisis de Distractores: Los betabloqueadores y calcioantagonistas (Opción A) no son de primera línea en insuficiencia por sobrecarga de volumen por cortocircuito de izquierda a derecha. Los vasodilatadores pulmonares directos (Opción C) se usan exclusivamente en hipertensión arterial pulmonar confirmada con presiones muy altas. No existe indicación para anticoagulación oral directa (Opción D) de forma inicial en este contexto.", 
                source: "SS-482-18, Diagnóstico y Tratamiento de los Defectos de los Tabiques Interauricular e Interventricular en menores de 18 años en segundo y tercer nivel de atención, 2018, Tratamientos para resolver la CIV, Página 27." 
            },
            {
                id: 12,

                id: 30, 
                question: "De acuerdo a los criterios ecográficos de la GPC, ¿cuál es el valor de longitud específico que define a la Estenosis Hipertrófica Congénita de Píloro como patológica?", 
                options: ["Longitud mayor diecisiete milímetros.", "Longitud menor diez milímetros.", "Espesor menor tres milímetros.", "Diámetro menor diez milímetros."], 
                answer: 0, 
                justification: "De acuerdo a la GPC de Estenosis Hipertrófica de Píloro, la tríada ecográfica diagnóstica se basa en medidas estrictas para diferenciar un espasmo de una verdadera hipertrofia del canal pilórico.<br><br>Perla ENARM: \"Se considera positivo en presencia de: [...] Longitud mayor de 17 mm.\"<br><br>Análisis de Distractores: Medidas menores de 10 mm de longitud o menores de 3 mm de espesor son hallazgos normales o inespecíficos; seleccionar estas opciones descarta automáticamente la hipertrofia muscular anatómica que caracteriza a la enfermedad.", 
                source: "IMSS-330-10, Diagnóstico y tratamiento de la Estenosis Hipertrófica Congénita de Píloro, 2017, Auxiliares Diagnósticos, Página 16." 
            }
        ];

        // ==========================================
        // LÓGICA DE LA APLICACIÓN 
        // ==========================================
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ELex2LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ELex2Progress');
                localStorage.removeItem('ELex2LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

        function displayWelcomeScreen() {
            // Ocultar botones flotantes en la pantalla de inicio
            document.getElementById('dashboard-button').classList.add('hidden');
            document.getElementById('menu-toggle').classList.add('hidden');
            
            const displayArea = document.getElementById('module-display');
            const total = questionsData.length;
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const correct = Object.keys(userProgress).filter(id => userProgress[id].isCorrect).length;
            const successRate = total > 0 && ans > 0 ? Math.round((correct / ans) * 100) : 0;

                ? `<button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white border border-white/30 px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Reiniciar Examen</button>`
                : `<button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-blue-600 hover:to-cyan-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-900/30 transition-transform hover:-translate-y-0.5">Continuar Aprendiendo</button>`;

            // Lógica para cambiar a estado de finalizado

            let badgeClass = isAllCompleted ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";
            let titleText = isAllCompleted ? "¡Examen Finalizado!" : "PREPARACIÓN ENARM 2026";

                ? "Has completado con éxito todas las preguntas. Revisa tus las respuestas correctas/incorrectas en el tablero."

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-6xl mx-auto lg:mt-0">
                    
                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>

                        </a>
                    </div>

                    <!-- HERO DYNAMIC -->
                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500 ${isAllCompleted ? 'ring-2 ring-emerald-500/50' : ''}">
                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

                            </h2>

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="pronam_proximamente.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ELex2Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ELex2LastQId', currentQuestionId);
                else localStorage.removeItem('ELex2LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ELex2Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
