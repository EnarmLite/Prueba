                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [

    {
        id: 1,
        question: "¿Cuál es el criterio espirométrico post-broncodilatador para confirmar la limitación irreversible del flujo aéreo?",
        options: ["Volumen espiratorio forzado < 80%", "Capacidad vital forzada < 50%", "Relación VEF1/CVF < 0.70", "Reversibilidad bronquial > 200 ml"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, la demostración objetiva de la obstrucción requiere identificar una disminución en el flujo de aire espiratorio que no se normaliza tras la administración de un fármaco dilatador.<br><br>Perla ENARM: \"Se confirma EPOC cuando una persona con síntomas compatibles presenta una limitación irreversible del flujo aéreo (por ej. una relación FEV1/FVC < 0.7) y no existe otra explicación alterna para los síntomas\".<br><br>Análisis de Distractores: El volumen espiratorio forzado < 80% (A) define el grado de severidad en la escala GOLD 2 o peor, pero no el diagnóstico inicial. La capacidad vital forzada < 50% (B) indica un patrón restrictivo pulmonar grave. La reversibilidad > 200 ml (D) es el criterio clásico diagnóstico de asma bronquial.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Diagnóstico por laboratorio e imagenología, pág. 23."
    },
    {
        id: 2,
        question: "¿Cuál es el factor de riesgo ambiental con mayor asociación para el desarrollo de la enfermedad en pacientes no fumadores?",
        options: ["Contaminación atmosférica urbana", "Humo de combustibles de biomasa", "Exposición a polvos industriales", "Tabaquismo pasivo de segunda mano"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, en entornos de países en vías de desarrollo, la exposición intra-domiciliaria al quemar madera o carbón representa una carga de morbilidad enorme, explicando hasta el 53.85% de los casos en ciertas poblaciones.<br><br>Perla ENARM: \"Se debe evitar la exposición a humo de combustibles de biomasa (cocinar con carbón o leña) ya que esto disminuye de forma importante el riesgo de desarrollar EPOC\".<br><br>Análisis de Distractores: La contaminación urbana (A), polvos industriales (C) y el tabaquismo pasivo (D) son factores ambientales comprobados, pero su peso epidemiológico y fuerza de asociación es menor frente a la alta toxicidad prolongada de cocinar con leña en espacios cerrados.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Prevención de otros factores de riesgo, pág. 18."
    },
    {
        id: 3,
        question: "Según los estudios epidemiológicos en Latinoamérica, ¿qué porcentaje aproximado de pacientes diagnosticados con la enfermedad reportan exposición a combustibles de biomasa?",
        options: ["10%", "20%", "40%", "66%"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, el estudio PUMA evidenció la magnitud regional de este factor ambiental en la atención primaria, diferenciando radicalmente la epidemiología latinoamericana frente a los países europeos.<br><br>Perla ENARM: \"El estudio PUMA... en Latinoamérica mostró que el 40% de personas con EPOC reportaron exposición a combustibles de biomasa comparados con el 30% de personas sin EPOC\".<br><br>Análisis de Distractores: El 10% (A) y 20% (B) subestiman severamente el problema regional. El 66% (D) corresponde a la proporción de pacientes con la patología que fumaban más de 30 paquetes al año en el mismo estudio, no a la exposición a leña.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Prevención de otros factores de riesgo, pág. 17."
    },
    {
        id: 4,
        question: "¿Cuál es el síntoma de presentación temprana más frecuente que obliga al paciente a buscar atención médica inicial?",
        options: ["Disnea con el ejercicio", "Tos productiva matutina", "Opresión torácica nocturna", "Hemoptisis de inicio súbito"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, aunque la tos suele aparecer primero cronológicamente como la llamada \"tos de fumador\", es la limitación física por falta de aire al esfuerzo lo que motiva la primera consulta, marcando el declive de la calidad de vida funcional.<br><br>Perla ENARM: \"Los tres síntomas cardinales de EPOC son: disnea, tos crónica, y producción de esputo y el síntoma de presentación temprana más común es disnea con el ejercicio\".<br><br>Análisis de Distractores: La tos productiva (B) es común pero subestimada por el paciente (\"tos normal\"). La opresión torácica nocturna (C) es un dato intermitente más indicativo de hiperreactividad mixta o falla cardiaca. La hemoptisis (D) es un dato de alarma absoluto para descartar cáncer broncogénico, no un síntoma típico basal.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Diagnóstico clínico, pág. 20."
    },
    {
        id: 5,
        question: "¿Cuál es el cuestionario validado y recomendado para identificar tempranamente la enfermedad no diagnosticada y el riesgo de exacerbaciones en la atención primaria?",
        options: ["Cuestionario respiratorio Saint George", "Índice pronóstico multidimensional BODE", "Cuestionario de tamizaje CAPTURE", "Escala modificada del Medical Research Council"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, se necesita una herramienta ágil en el primer nivel para captar pacientes subdiagnosticados expuestos a factores de riesgo antes de enviar a espirometría.<br><br>Perla ENARM: \"Cuestionario CAPTURE (Chronic obstructive pulmonary disease Assessment in Primary care To identify Undiagnosed Respiratory disease and Exacerbation risk) para identificar pacientes con enfermedad respiratoria y riesgo de exacerbaciones en atención primaria\".<br><br>Análisis de Distractores: El cuestionario Saint George (A) evalúa calidad de vida detallada post-diagnóstico. El índice BODE (B) es pronóstico de mortalidad que requiere la prueba de caminata. La escala mMRC (D) cuantifica el nivel subjetivo de disnea una vez establecida la enfermedad.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Anexos, pág. 47."
    },
    {
        id: 6,
        question: "¿Cuál es la indicación absoluta para solicitar una tomografía computarizada de tórax en el paciente estable?",
        options: ["Confirmación del diagnóstico espirométrico límite", "Valorar abordaje de reducción de volumen", "Descartar la existencia de hipertensión pulmonar", "Medición exacta del diámetro anteroposterior torácico"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, la tomografía no es una herramienta de escrutinio ni de seguimiento rutinario debido al costo y la radiación. Solo se requiere para plantear anatomía quirúrgica o descartar diagnósticos alternos letales.<br><br>Perla ENARM: \"Se debe realizar tomografía computarizada de tórax únicamente... cuando se esté considerando realizar cirugía para reducir el volumen pulmonar, válvulas endobronquiales, o trasplante pulmonar\".<br><br>Análisis de Distractores: El diagnóstico siempre se confirma con fisiología (espirometría) y no con anatomía (A). La hipertensión pulmonar (C) se evalúa con ecocardiograma transtorácico. El diámetro anteroposterior (D) es un dato de la simple clínica y radiografía convencional.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Diagnóstico por laboratorio e imagenología, pág. 24."
    },
    {
        id: 7,
        question: "Durante la exploración física, ¿qué hallazgo extrapulmonar es característico del estadio terminal con hipercapnia severa?",
        options: ["Sibilancias espiratorias forzadas", "Aumento de la resonancia percutoria", "Asterixis o temblor aleteante", "Hipocratismo digital pronunciado"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, la retención progresiva de bióxido de carbono induce encefalopatía hipercápnica, que neurológicamente se manifiesta por incapacidad de mantener el tono postural distal.<br><br>Perla ENARM: \"En etapas terminales los pacientes pueden presentarse encorvados... usar músculos accesorios, el signo de Hoover, cianosis, asterixis, y con distensión de las venas del cuello\".<br><br>Análisis de Distractores: Las sibilancias (A) y la resonancia aumentada (B) son signos bronquiales y torácicos presentes desde etapas moderadas, no exclusivamente terminales. El hipocratismo digital (D) nunca es un signo de esta patología per se y obliga a buscar cáncer o bronquiectasias.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Diagnóstico clínico, pág. 21."
    },
    {
        id: 8,
        question: "¿Cuál es la meta terapéutica estricta de saturación de oxígeno medida por oximetría de pulso durante una agudización intrahospitalaria?",
        options: ["85 a 88%", "88 a 92%", "93 a 95%", "96 a 100%"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, el uso de altas fracciones inspiradas de oxígeno en pacientes retenedores crónicos suprime el reflejo respiratorio medular mediado por hipoxia, conduciendo a narcosis por bióxido de carbono.<br><br>Perla ENARM: \"Se recomienda administrar oxígeno de bajo flujo para los pacientes con hipoxemia debida a una exacerbación... Se sugiere que el objetivo sea alcanzar una saturación de oxígeno de 88 a 92%\".<br><br>Análisis de Distractores: Las saturaciones inferiores al 88% (A) mantienen al paciente en riesgo de isquemia miocárdica y disfunción orgánica. Valores de 93 a 95% (C) o mayores a 96% (D) incrementan estadísticamente el riesgo de acidosis respiratoria y necesidad de ventilación mecánica invasiva.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Tratamiento de Exacerbación de EPOC, pág. 35."
    },
    {
        id: 9,
        question: "¿Qué agente etiológico viral es el detectado con mayor frecuencia como desencadenante primario de las exacerbaciones agudas?",
        options: ["Virus sincitial respiratorio", "Rinovirus o picornavirus", "Virus de la influenza A", "Adenovirus y coronavirus"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, aunque la carga bacteriana (Haemophilus, Neumococo, Moraxella) justifica el antibiótico en caso de esputo purulento, los paneles moleculares documentan que el rinovirus (picornavirus) lidera la epidemiología infecciosa viral global.<br><br>Perla ENARM: \"La prevalencia media ponderada de infecciones respiratorias virales... el picornavirus fue el más comúnmente detectado con un 17.3%, seguido de influenza con 7.4%\".<br><br>Análisis de Distractores: El virus sincitial (A) representa un 5.3% de las exacerbaciones virales. La influenza (C) abarca el 7.4% de los episodios detectados. Los adenovirus/coronavirus (D) agrupan porcentajes menores al 4%.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Factores desencadenantes, pág. 33."
    },
    {
        id: 10,
        question: "¿Cuál es la complicación y causa independiente de letalidad intrahospitalaria más frecuente en un paciente admitido por agudización de la enfermedad?",
        options: ["Tromboembolia pulmonar aguda", "Falla cardiaca descompensada", "Neumonía nosocomial severa", "Neumotórax secundario a bulas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, la hiperinsuflación aguda y la hipoxemia imponen una sobrecarga brutal a la función ventricular (cor pulmonale agudo o descompensación de miocardiopatía isquémica previa).<br><br>Perla ENARM: \"Las complicaciones más comunes fueron falla cardiaca (37.2%), tromboembolia pulmonar (20.9%), neumonía (27.9%) y neumotórax... se debe realizar diagnóstico diferencial\".<br><br>Análisis de Distractores: La tromboembolia pulmonar (A) es causante del 20.9% de los decesos. La neumonía (C) explica el 27.9%. El neumotórax (D) ocurre por ruptura de un espacio aéreo distal, pero es numéricamente la menos frecuente de las 4 principales.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Tratamiento de Exacerbación de EPOC, pág. 34."
    },
    {
        id: 11,
        question: "¿Cuál es el fármaco, dosis y duración exacta de primera línea con glucocorticoides sistémicos recomendados en una agudización moderada a grave?",
        options: ["Metilprednisolona 1 gramo diario por 3 días", "Dexametasona 8 mg dosis única intravenosa", "Hidrocortisona 100 mg intravenosa cada 8 horas", "Prednisona 40 mg diarios por 5 a 7 días"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de EPOC en adultos, la terapia antiinflamatoria sistémica acorta el periodo de hospitalización y acelera la recuperación del flujo aéreo, limitándose a ciclos cortos para minimizar inmunosupresión y miopatía.<br><br>Perla ENARM: \"Corticoesteroides: considerar nebulizaciones y/o prednisona 40 mg/d por 5-7 días o IV con las dosis en correspondencia a la de la prednisona\".<br><br>Análisis de Distractores: La metilprednisolona en pulsos (A) se utiliza para actividad inmunológica fulminante, no para la vía aérea. La dexametasona (B) no es el régimen estandarizado para este contexto. La hidrocortisona (C) tiene indicación franca en crisis adrenal o como choque refractario.",
        source: "GPC-IMSS-037-21, Diagnóstico y Tratamiento de la Enfermedad Pulmonar Obstructiva Crónica, 2021, Anexos, pág. 44."
    },
    {
        id: 12,
        question: "Según el análisis de una gasometría arterial en una exacerbación, ¿cuál hallazgo dictamina la indicación para instaurar ventilación mecánica no invasiva (BiPAP)?",
        options: ["PaO2 < 55 mmHg al aire ambiente", "pH < 7.30 o PaCO2 > 45 mmHg", "Bicarbonato sérico estándar < 18 mEq/L", "Gradiente alvéolo-arterial > 20 mmHg"],
        answer: 1,

                                <svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('372Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('372LastQId', currentQuestionId);
                else localStorage.removeItem('372LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('372Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
