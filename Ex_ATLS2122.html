                justification: "Justificación: De acuerdo al ATLS 11.ª ed., si es posible colocar un dedo entre el torniquete y la piel, el dispositivo es ineficaz, ya que ocluye selectivamente el retorno venoso periférico sin lograr detener la presión arterial sistólica entrante. Esto lo convierte en un \"torniquete venoso\" que exacerba exponencialmente la hemorragia tisular.<br><br>Perla ENARM: Un torniquete insuficiente actúa como una banda constrictiva venosa, atrapando el flujo arterial de entrada y agravando el sangrado de la extremidad.<br><br>Análisis de Distractores: La necrosis tisular isquémica (A) y la lesión del nervio (D) son complicaciones derivadas del exceso de compresión o del tiempo prolongado, no de la aplicación holgada. El síndrome compartimental (B) se deriva de isquemia-reperfusión o fracturas, pero su agravante agudo prehospitalario es el mal control del sangrado continuo.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 46, 
                question: "En un paciente con traumatismo cerrado, ¿qué signo clínico se asocia a la presencia de neumomediastino por lesión traqueobronquial?", 
                options: ["Ausencia de murmullo vesicular", "Ingurgitación yugular bilateral", "Pulso paradójico de Kussmaul", "Crujido sincrónico con el corazón"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el aire que diseca el mediastino desde el árbol traqueobronquial o esófago puede auscultarse directamente sobre el esternón como un crujido sordo sincronizado anatómicamente con el ciclo de los latidos cardíacos, hallazgo semiológico denominado signo de Hamman.<br><br>Perla ENARM: El signo de Hamman (crujido rítmico cardíaco torácico) es el marcador clínico patognomónico de la disección de aire mediastinal o neumomediastino agudo.<br><br>Análisis de Distractores: La ingurgitación yugular (B) orienta a taponamiento cardíaco o neumotórax a tensión. El pulso paradójico (C) es indicativo de taponamiento cardíaco o fisiología restrictiva. La simple ausencia de murmullo (A) es inespecífica e indica neumotórax o hemotórax simple.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 47, 
                question: "En un traumatismo torácico penetrante, ¿qué áreas incluye el área precordial expandida para mantener alta sospecha de lesión cardíaca?", 
                options: ["Tórax anterior, espalda y líneas axilares", "Base del cuello y mediastino superior", "Región retroesternal inferior", "Cuadrantes abdominales superiores"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la definición anatómica clínica del área precordial expandida, de vital importancia en heridas por arma de fuego, engloba de manera circunferencial el tórax anterior, la espalda posterior y se extiende lateralmente hasta englobar las líneas axilares anteriores y posteriores.<br><br>Perla ENARM: Las heridas por proyectil no respetan las barreras lineales; cualquier herida en el área precordial expandida que circunda el tórax completo exige descartar penetración miocárdica oculta.<br><br>Análisis de Distractores: Restringir la alerta clínica solo a la región retroesternal (C) o la base del cuello (B) ignora la altísima incidencia de trayectorias oblicuas y tangenciales de los proyectiles de alta energía provenientes de los flancos. Los cuadrantes abdominales (D) dirigen el diagnóstico primario hacia el diafragma e hígado.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 48, 
                question: "En la evaluación radiológica del paciente con heridas por arma de fuego, ¿qué intervención previa mejora la identificación de trayectorias?", 
                options: ["Inserción de sondas radiopacas", "Aplicación de clips en las heridas", "Inyección de azul de metileno", "Uso de contraste baritado oral"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., colocar marcadores radiopacos cutáneos (como clips de papel o electrodos de electrocardiograma) directamente sobre los orificios de bala identificados antes de adquirir radiografías simples, es vital para aclarar e interpretar correctamente las relaciones de las estructuras internas lesionadas con la cinemática y trayectoria espacial del proyectil.<br><br>Perla ENARM: El uso universal de marcadores de plomo o metálicos sobre la piel herida optimiza el rendimiento del técnico radiólogo para determinar la línea balística sin movilizar al paciente.<br><br>Análisis de Distractores: Insertar sondas (A) en las heridas o inyectar fluidos (C) empuja coágulos, exacerba el sangrado e introduce bacterias masivamente en un lecho estéril profundo. El bario oral (D) interfiere irreversiblemente con las tomografías o angiografías subsiguientes.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 49, 
                question: "¿Qué hallazgo radiológico orienta a una perforación esofágica tardía con desarrollo de mediastinitis tras un proyectil transmediastinal?", 
                options: ["Gas y líquido periesofágico", "Desviación traqueal a la derecha", "Capuchón apical izquierdo extrapleural", "Elevación del hemidiafragma izquierdo"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la necrosis tisular esofágica por cavitación de proyectiles puede arrojar perforaciones subagudas. La tomografía detectará tempranamente la colección patológica de aire extraluminal, niveles de gas-líquido mediastínico o acumulaciones periesofágicas que confirman la comunicación séptica con el mediastino.<br><br>Perla ENARM: El gas y líquido periesofágico no explicable por vía aérea en un paciente con fiebre postrauma torácico es patognomónico de ruptura esofágica inminente.<br><br>Análisis de Distractores: El capuchón apical (C) y la desviación traqueal (B) son signos clásicos formales del hematoma expansivo por ruptura contenida de la aorta torácica. La elevación diafragmática (D) sugiere parálisis del nervio frénico o ruptura diafragmática.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 50, 
                question: "¿Qué lesión sutil exige un seguimiento ambulatorio obligatorio tras 24 horas de observación por herida penetrante en el flanco?", 
                options: ["Perforación del intestino delgado", "Contusión del parénquima renal", "Laceración esplénica grado I", "Lesiones colónicas retroperitoneales"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el manejo no operatorio de heridas en el dorso o flanco requiere extrema cautela. En raras ocasiones, el grueso muscular oculta lesiones retroperitoneales del colon ascendente o descendente que escapan a la detección de la tomografía inicial y el LPD, lo que exige seguimiento estrecho precoz después del alta a las 24 horas.<br><br>Perla ENARM: Toda herida en flanco tratada de forma conservadora acarrea el riesgo clínico de peritonitis fístulosa tardía por lesión inadvertida de la cara retroperitoneal del colon.<br><br>Análisis de Distractores: El intestino delgado (A) y el bazo (C) son enteramente intraperitoneales, dando signos precoces detectables en los lavados y ecografías en el área de urgencias. El riñón (B) presenta hematuria microscópica o cambios contrastados inmediatos muy sensibles en la primera ventana de escrutinio.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            }
        ];

        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ExaATLS501LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExaATLS501Progress');
                localStorage.removeItem('ExaATLS501LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

        function displayWelcomeScreen() {
            // Ocultar botones flotantes en la pantalla de inicio
            document.getElementById('dashboard-button').classList.add('hidden');
            document.getElementById('menu-toggle').classList.add('hidden');
            
            const displayArea = document.getElementById('module-display');
            const total = questionsData.length;
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const correct = Object.keys(userProgress).filter(id => userProgress[id].isCorrect).length;
            const successRate = total > 0 && ans > 0 ? Math.round((correct / ans) * 100) : 0;
            const isAllCompleted = ans === total && total > 0;
            
            let firstUncompletedId = questionsData.find(q => !userProgress[q.id]?.answered)?.id;
            
            let actionBtn = isAllCompleted 
                ? `<button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white border border-white/30 px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Reiniciar Examen</button>`
                : `<button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-green-500 to-indigo-600 hover:from-indigo-600 hover:to-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-900/30 transition-transform hover:-translate-y-0.5">Continuar Aprendiendo</button>`;

            // Lógica para cambiar a estado de finalizado
            let blur1 = isAllCompleted ? "bg-emerald-500/30" : "bg-green-900/40";
            let blur2 = isAllCompleted ? "bg-indigo-500/30" : "bg-green-900/30";
            let badgeText = isAllCompleted ? "¡100% Completado! ENARM 2026" : "PREPARACIÓN ENARM 2026";
            let badgeClass = isAllCompleted ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";
            let titleText = isAllCompleted ? "¡Examen Finalizado!" : "ATLS";
            let descText = isAllCompleted 
                ? "Has completado con éxito todas las preguntas. Revisa tus las respuestas correctas/incorrectas en el tablero." 
                : "Preguntas diseñadas para fortalecer tus conocimientos con reactivos de alta exigencia y enfoque clínico tipo ENARM basadas en la última edición del ATLS (11.ª ed., 2025).";

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-6xl mx-auto lg:mt-0">
                    
                    <!-- BREADCRUMB (Centrado en móvil, no hay botones flotantes interrumpiendo) -->
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Regresar al Panel
                        </a>
                    </div>

                    <!-- HERO DYNAMIC -->
                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500 ${isAllCompleted ? 'ring-2 ring-emerald-500/50' : ''}">
                        <div class="absolute top-0 right-0 w-64 h-64 ${blur1} rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none transition-colors duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-48 h-48 ${blur2} rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none transition-colors duration-500"></div>
                        
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass} transition-colors duration-500">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 transition-colors duration-500 ${isAllCompleted ? 'text-emerald-400 drop-shadow-md' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium max-w-lg mx-auto lg:mx-0 transition-colors duration-500">${descText}</p>
                                
                                <div class="mt-8 flex justify-center lg:justify-start">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="Ex_PEDIA30.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS501Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS501LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS501LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS501Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
