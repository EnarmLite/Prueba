<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

        <!-- MAIN CONTENT (Scrollable) -->

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>

            </button>

            <!-- Barra de Progreso Limpia (Gruesa y sin marca de agua de fondo) -->

        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el órgano intrabdominal lesionado con mayor frecuencia en pacientes que sufren un traumatismo cerrado?", 
                options: ["Hígado", "Páncreas", "Bazo", "Intestino delgado"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., en los pacientes que sufren un traumatismo cerrado, el bazo es el órgano intraabdominal más afectado, presentándose en el 40 a 55% de los casos. La compresión y el aplastamiento deforman este órgano sólido, provocando su ruptura y hemorragia secundaria.<br><br>Perla ENARM: El bazo es el órgano sólido más frecuentemente lesionado en el trauma abdominal cerrado, seguido por el hígado.<br><br>Análisis de Distractores: El hígado (A) es el segundo más frecuente (35-45%). El intestino delgado (D) ocurre en un 5-10%. El páncreas (B) se lesiona por golpes directos epigástricos pero con una frecuencia mucho menor.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 2, 
                question: "¿Cuál de los siguientes parámetros clínicos suma un punto en la escala de Evaluación del Consumo de Sangre?", 
                options: ["Traumatismo cerrado de abdomen", "Frecuencia cardíaca de 110 latidos por minuto", "Resultado positivo en el examen ecográfico", "Presión arterial sistólica de 100 mmHg"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la puntuación ABC (Evaluación del Consumo de Sangre) utiliza parámetros sencillos para predecir la necesidad de transfusión masiva. Un examen FAST (ecografía focalizada en trauma) positivo otorga un punto en esta escala.<br><br>Perla ENARM: Una puntuación ABC igual o mayor a 2 aumenta significativamente la probabilidad de requerir un protocolo de transfusión masiva.<br><br>Análisis de Distractores: La presión arterial sistólica debe ser menor o igual a 90 mmHg (D) para sumar un punto. La frecuencia cardíaca debe ser mayor o igual a 120 latidos por minuto (B). El traumatismo debe ser penetrante en el torso, no cerrado (A).", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 3, 
                question: "¿Cuál es la meta de presión arterial sistólica en el manejo inicial de una lesión aórtica por traumatismo cerrado?", 
                options: ["Menor a 90 mmHg", "Menor a 100 mmHg", "Menor a 110 mmHg", "Menor a 120 mmHg"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., en las lesiones grado I y II de la aorta, el control riguroso de la presión arterial y la frecuencia cardíaca disminuye el riesgo de ruptura inminente, siendo la meta mantener la tensión sistólica por debajo de 100 mmHg empleando betabloqueadores de acción corta como el esmolol.<br><br>Perla ENARM: El tratamiento inicial de la lesión aórtica traumática cerrada requiere mantener la presión arterial sistólica por debajo de 100 mmHg y la frecuencia cardíaca menor a 100 latidos por minuto.<br><br>Análisis de Distractores: Valores como 110 (C) o 120 mmHg (D) superan la meta terapéutica aumentando la tensión parietal y el riesgo de ruptura libre. Menor a 90 mmHg (A) no es el umbral estricto definido por el manual, pudiendo comprometer la perfusión sistémica si desciende drásticamente en un paciente politraumatizado.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 4, 
                question: "En la evaluación del traumatismo torácico penetrante, ¿qué estructura anatómica define el límite superior del área precordial?", 
                options: ["Línea del pezón", "Clavículas", "Escotadura esternal", "Cartílago cricoides"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el área precordial se define anatómicamente como la zona comprendida entre los pezones lateralmente, los márgenes costales en la región inferior y las clavículas en la parte superior. Las heridas en este cuadrante obligan a descartar una lesión cardíaca subyacente.<br><br>Perla ENARM: Toda lesión penetrante ubicada entre las clavículas, los márgenes costales y los pezones debe manejarse con un alto índice de sospecha de lesión cardíaca.<br><br>Análisis de Distractores: La escotadura esternal (C) y el cartílago cricoides (D) son referencias de las zonas cervicales. La línea del pezón (A) delimita la región toracoabdominal, no el límite superior del área precordial.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 5, 
                question: "¿En qué sitio anatómico se debe centrar la fijación de una faja para controlar la hemorragia por fractura pélvica?", 
                options: ["Crestas ilíacas", "Sínfisis del pubis", "Espinas ilíacas anterosuperiores", "Trocánteres mayores"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la estabilización mecánica temporal del anillo pélvico para disminuir el volumen y controlar la hemorragia se logra centrando el dispositivo de compresión exactamente sobre los trocánteres mayores del fémur.<br><br>Perla ENARM: La faja pélvica debe colocarse siempre a nivel de los trocánteres mayores y nunca sobre las crestas ilíacas para asegurar una adecuada reducción del volumen pélvico.<br><br>Análisis de Distractores: Colocar la faja sobre las crestas ilíacas (A), las espinas ilíacas (C) o la sínfisis del pubis (B) es ineficaz y puede agravar la deformidad rotacional, empeorando el sangrado retroperitoneal al aumentar el volumen de la cavidad.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 6, 
                question: "¿Cuál es el órgano intraabdominal afectado con mayor frecuencia por heridas de arma de fuego?", 
                options: ["Bazo", "Hígado", "Intestino delgado", "Colon"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las heridas por arma de fuego causan daño extenso por cavitación y fragmentación, lesionando el intestino delgado en aproximadamente el 50% de los casos, seguido del colon y el hígado.<br><br>Perla ENARM: El intestino delgado es la estructura abdominal más lesionada en el trauma penetrante por arma de fuego.<br><br>Análisis de Distractores: El colon (D) se lesiona en el 40% de los casos. El hígado (B) en un 30%. El bazo (A) es el órgano más afectado en trauma cerrado, no por mecanismo penetrante.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 7, 
                question: "En el abordaje de una sospecha de lesión uretral, ¿qué volumen de contraste se instila para la uretrografía retrógrada?", 
                options: ["10 a 15 ml", "30 a 35 ml", "50 a 60 ml", "350 a 400 ml"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., para realizar una uretrografía retrógrada adecuada, se utiliza un catéter de 8 French en el meato y se instilan suavemente 30 a 35 ml de material de contraste sin diluir, obteniendo una radiografía para documentar el flujo hacia la vejiga.<br><br>Perla ENARM: La confirmación de una uretra intacta mediante uretrografía (instilando 30 a 35 ml de contraste) es obligatoria antes de colocar un catéter urinario si hay presencia de sangre en el meato.<br><br>Análisis de Distractores: Un volumen de 350 ml (D) es el requerido para un cistograma en la evaluación de ruptura de la vejiga, no de la uretra. Las cantidades de 10-15 ml (A) y 50-60 ml (C) no corresponden al volumen estandarizado requerido para evaluar el tracto uretral.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 8, 
                question: "¿Cuál de los siguientes hallazgos clínicos representa un signo duro de lesión vascular en un traumatismo penetrante?", 
                options: ["Murmullo vascular", "Pulso disminuido", "Hematoma no expansivo", "Déficit neurológico"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los signos duros de lesión vascular exigen exploración quirúrgica urgente o angiografía e incluyen sangrado pulsátil activo, isquemia aguda, falta de pulso, hematoma expansivo y murmullo vascular.<br><br>Perla ENARM: La presencia de signos duros de lesión vascular dicta la necesidad ineludible de exploración vascular o intervención quirúrgica inmediata.<br><br>Análisis de Distractores: El pulso disminuido (B), el hematoma no expansivo (C) y el déficit neurológico (D) son considerados signos blandos, los cuales avalan la obtención de estudios de imagen adicionales, como el cálculo del índice tobillo-brazo, para confirmar lesión.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 9, 
                question: "¿En qué localización anatómica ocurre con mayor frecuencia el desgarro diafragmático traumático cerrado?", 
                options: ["Hemidiafragma derecho posterolateral", "Hemidiafragma izquierdo posterolateral", "Hemidiafragma derecho anteromedial", "Hemidiafragma izquierdo anteromedial"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las fuerzas de desaceleración y compresión en el trauma cerrado provocan con mayor frecuencia desgarros de 5 a 10 cm en el hemidiafragma izquierdo posterolateral. El lado derecho se encuentra mayormente protegido por la masa hepática.<br><br>Perla ENARM: La ruptura diafragmática por trauma cerrado afecta de manera predominante el lado izquierdo en su topografía posterolateral.<br><br>Análisis de Distractores: El hemidiafragma derecho (A, C) raramente presenta desgarros gracias a la protección absorbente del hígado. La porción anteromedial (D) no es el punto de máxima tensión estructural anatómica durante la compresión.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 10, 
                question: "¿Qué volumen de aspiración de sangre en un lavado peritoneal diagnóstico es indicación para laparotomía urgente?", 
                options: ["5 cc", "10 cc", "15 cc", "20 cc"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la recuperación inmediata de contenido gastrointestinal, bilis o 10 cc o más de sangre macroscópica al realizar la aspiración inicial en un lavado peritoneal diagnóstico es indicación absoluta de laparotomía exploradora en un paciente hemodinámicamente inestable.<br><br>Perla ENARM: La obtención de 10 cc o más de sangre libre durante el lavado peritoneal diagnóstico confirma hemorragia intraabdominal clínicamente significativa y de resolución quirúrgica inmediata.<br><br>Análisis de Distractores: Volúmenes menores a 10 cc (A) dictan continuar el procedimiento instilando líquido para lavar. Cifras como 15 cc (C) o 20 cc (D) sobrepasan el umbral de positividad diagnóstica estandarizado.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 11, 
                question: "¿Cuál es el tiempo límite seguro de isquemia al utilizar un torniquete sin asociarse a complicaciones graves?", 
                options: ["1 hora", "2 horas", "3 horas", "4 horas"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., en entornos con recursos limitados o prehospitalarios, la hemorragia exanguinante debe tratarse con un torniquete. Tiempos de isquemia menores a 2 horas no han demostrado estar asociados a complicaciones críticas por uso del dispositivo.<br><br>Perla ENARM: El empleo del torniquete es altamente seguro para frenar hemorragias de extremidades, siempre que su retiro o conversión se logre antes de las 2 horas de isquemia continua.<br><br>Análisis de Distractores: Un límite de 1 hora (A) subestima la ventana terapéutica útil. Dejar el dispositivo por 3 (C) o 4 horas (D) incrementa exponencialmente el peligro de necrosis, daño neuromuscular y síndrome compartimental.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 12, 
                question: "¿Cuál es el mecanismo responsable de fractura pélvica más frecuente durante una colisión de vehículo motorizado?", 
                options: ["Compresión anteroposterior", "Cizallamiento vertical", "Compresión lateral", "Fuerza combinada"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la fuerza dirigida lateralmente hacia la pelvis causa la rotación interna de la hemipelvis. Este mecanismo de compresión lateral es el más prevalente en ocupantes que sufren accidentes de tránsito e impactan de lado.<br><br>Perla ENARM: La compresión lateral es la etiología más frecuente de disrupción del anillo pélvico en choques de vehículos de motor.<br><br>Análisis de Distractores: La compresión anteroposterior (A) genera lesión en \"libro abierto\". El cizallamiento vertical (B) ocurre típicamente en caídas de pie. La fuerza combinada (D) se presenta en cinemáticas extremadamente complejas o volcaduras, pero el mecanismo aislado dominante estadísticamente en estos accidentes es la compresión lateral pura.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 13, 
                question: "¿Cuál de las siguientes condiciones clínicas representa una contraindicación relativa para un lavado peritoneal diagnóstico?", 
                options: ["Fractura pélvica abierta", "Embarazo de primer trimestre", "Cirrosis avanzada", "Lesión de uretra"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las contraindicaciones relativas al lavado peritoneal diagnóstico incluyen factores que aumentan la probabilidad de iatrogenia o falsos positivos, tales como cirrosis avanzada, coagulopatía existente, obesidad mórbida y laparotomías previas.<br><br>Perla ENARM: La obesidad extrema, la cirrosis hepática avanzada y las cirugías previas contraindican de forma relativa la ejecución de un LPD.<br><br>Análisis de Distractores: La fractura de pelvis (A) obliga a usar un abordaje supraumbilical, pero no contraindica la prueba. El embarazo tardío (no el primer trimestre, B) requiere modificar el punto de incisión. La lesión uretral (D) contraindica el catéter transuretral, mas no el lavado peritoneal percutáneo.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 14, 
                question: "En un paciente con múltiples heridas por arma de fuego, ¿qué hallazgo radiológico indica probable embolización balística?", 
                options: ["Ausencia de orificio de salida", "Presencia de fragmentos óseos", "Suma par de heridas y proyectiles", "Suma impar de heridas y proyectiles"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la sumatoria de todas las heridas de la piel (entrada y salida) más los proyectiles identificados en imagen debe originar un número par. Si el resultado es impar, existe altísima sospecha de embolización intraluminal a tubo digestivo o sistema vascular.<br><br>Perla ENARM: Un recuento impar entre los orificios cutáneos y las balas radiopacas obliga a ampliar intencionadamente el campo de los estudios de imagen.<br><br>Análisis de Distractores: Una suma par (C) afirma que todos los trayectos encuentran coherencia. La simple falta de orificio de salida (A) se compensa si en la placa localizas el proyectil. Los fragmentos secundarios (B) complican la biomecánica, pero no entran en la contabilidad primaria de la regla balística.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 15, 
                question: "¿Qué lesión intraabdominal se encuentra clásicamente asociada a una fractura vertebral de Chance?", 
                options: ["Ruptura esplénica", "Laceración hepática", "Avulsión de la vejiga", "Lesión de intestino delgado"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el patrón de restricción del cinturón de seguridad que propicia fracturas lumbares por distracción (fractura de Chance) está indisolublemente ligado al desgarro o avulsión transversal del intestino delgado y su respectivo mesenterio.<br><br>Perla ENARM: Identificar una fractura vertebral de Chance por desaceleración en radiología exige investigar perforación o disrupción isquémica de intestino delgado concomitante.<br><br>Análisis de Distractores: El bazo (A) y el hígado (B) representan los órganos sólidos de impacto general en el trauma global, pero sin vinculación biomecánica directa a fracturas de flexión lumbar. La vejiga (C) se relaciona a la inestabilidad de la sínfisis púbica o traumas de decúbito.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 16, 
                question: "¿En cuántos segundos pierde un paciente el 20% de su volumen sanguíneo ante una lesión de la aorta ascendente?", 
                options: ["2.5 segundos", "4.6 segundos", "10.5 segundos", "14.6 segundos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el gasto cardíaco de un adulto es masivo bajo estrés adrenérgico. Ante una injuria transmural de la aorta ascendente, un adulto de 80 kg sufre la pérdida del 20% de su volumen sanguíneo circulante en apenas 4.6 segundos debido a la presión eyectiva central.<br><br>Perla ENARM: La exanguinación de 1 litro de sangre a través de la raíz aórtica traumatizada ocurre en menos de 5 segundos.<br><br>Análisis de Distractores: Valores como 2.5 segundos (A) no se sustentan en los estudios balísticos promedio descritos. Referencias de 10.5 (C) y 14.6 segundos (D) otorgan un sesgo irreal a la extrema letalidad vascular expuesta en el traumatismo central penetrante.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 17, 
                question: "¿Cuál es la dosis de yodo requerida para realizar un pielograma intravenoso de detección rápida ante trauma genitourinario?", 
                options: ["100 mg/kg", "150 mg/kg", "200 mg/kg", "250 mg/kg"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., si la tomografía computarizada no se encuentra disponible, se instila una inyección de dosis alta para el pielograma (\"PIV de detección\") calculada a 200 mg de yodo por kilogramo, visualizando los cálices en una sola placa a los 2 minutos.<br><br>Perla ENARM: La prueba de excreción de emergencia para trauma renal utiliza 200 mg de yodo por kilogramo inyectados en bolo para comprobar función bilateral rápida.<br><br>Análisis de Distractores: Dosis de 100 (A) y 150 mg/kg (B) ofrecen concentraciones infraóptimas que limitan la utilidad diagnóstica de la excreción inmediata. Concentraciones como 250 mg/kg (D) resultan innecesarias y aumentan los riesgos contrastados renales.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 18, 
                question: "¿A qué porcentaje asciende la mortalidad fetal en una paciente gestante que sufre un traumatismo abdominal penetrante?", 
                options: ["10 a 25%", "20 a 35%", "40 a 65%", "70 a 85%"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., al crecer y ascender a la cavidad abdominal, el útero funciona como un amplio escudo tisular que absorbe las energías de los objetos penetrantes protegiendo a la madre, pero exponiendo al feto a una mortalidad intrauterina de 40 a 65%.<br><br>Perla ENARM: Las heridas penetrantes abdominales en estadios tardíos del embarazo asocian un riesgo catastrófico letal fetal que ronda el 40 al 65%.<br><br>Análisis de Distractores: Cifras de 10-25% (A) o 20-35% (B) menosprecian la inmensa letalidad de la transferencia térmica y de corte directa al feto. Las mortalidades de 70-85% (D) sólo aplican individualmente ante heridas de arma de fuego del útero (70%), pero no representa el promedio total conjunto del trauma penetrante general.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 19, 
                question: "¿Qué órgano intrabdominal es lesionado con mayor frecuencia por heridas de arma blanca?", 
                options: ["Intestino delgado", "Hígado", "Diafragma", "Colon"],

                source: "ATLS 11.ª ed., 2025, Capítulo 21."

            {
                id: 20, 
                question: "¿Qué estructura anatómica delimita el borde inferior de la Zona II en el cuello traumatizado?", 
                options: ["Base del cráneo", "Escotadura esternal", "Ángulo de la mandíbula", "Cartílago cricoides"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la topografía de la Zona II se delimita inferiormente desde una línea horizontal al nivel del cartílago cricoides, prolongándose de manera superior hasta el margen del ángulo de la mandíbula. Esta área contiene la carótida común y la yugular interna.<br><br>Perla ENARM: La región de mayor exposición quirúrgica (Zona II del cuello) está situada verticalmente entre el cartílago cricoides y el ángulo mandibular.<br><br>Análisis de Distractores: La escotadura esternal (B) delimita la raíz torácica o base caudal de la Zona I. El ángulo de la mandíbula (C) es el tope superior de la propia Zona II, no el inferior. La base del cráneo (A) remata la anatomía de la Zona III cervical.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 21, 
                question: "¿Qué procedimiento está indicado para el control agudo de hemorragia por fractura pélvica si la angioembolización no está disponible?", 
                options: ["Empaquetamiento preperitoneal", "Laparotomía exploradora", "Lavado peritoneal", "Fijación interna ósea"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el empaquetamiento preperitoneal es un método eficaz e indicado para controlar la hemorragia pélvica masiva, funcionando como abordaje primario o como técnica de rescate ante el retraso o la falta de disponibilidad de la angioembolización.<br><br>Perla ENARM: El empaquetamiento preperitoneal y la angioembolización son las piedras angulares definitivas para la contención de la hemorragia pélvica arterial severa en pacientes refractarios a estabilización mecánica con faja.<br><br>Análisis de Distractores: La laparotomía exploradora (B) aisla la cavidad peritoneal, pero no entra al hematoma retroperitoneal originado por la pelvis ósea, de hecho, abrir el peritoneo puede despresurizar el hematoma pélvico empeorando el sangrado. El lavado peritoneal (C) es diagnóstico, no terapéutico. La fijación interna (D) no es una medida de control de daños en fase aguda.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 22, 
                question: "¿Qué estructura ósea define el límite anatómico inferior de la Zona III en el cuello traumatizado?", 
                options: ["Base del cráneo", "Cartílago cricoides", "Escotadura esternal", "Ángulo de la mandíbula"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la topografía cervical divide al cuello en tres zonas anatómicas. La Zona III tiene su origen inferior directamente en la línea trazada sobre el ángulo de la mandíbula y se extiende de forma cefálica hasta alcanzar la base del cráneo.<br><br>Perla ENARM: La Zona III del cuello se sitúa entre el ángulo mandibular y la base craneal, albergando estructuras de difícil acceso quirúrgico abierto como las carótidas distales y los nervios craneales IX-XII.<br><br>Análisis de Distractores: La base del cráneo (A) es el límite superior de la Zona III. El cartílago cricoides (B) es el límite superior de la Zona I y límite inferior de la Zona II. La escotadura esternal (C) marca la base inferior de la Zona I.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 23, 
                question: "¿Cuál región anatómica se incluye de manera estándar en el rastreo ecográfico focalizado para trauma?", 
                options: ["Espacio subfrénico anterior", "Corredera parietocólica derecha", "Saco retrovesical posterior", "Fosa esplenorrenal"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el examen ultrasonográfico FAST evalúa sistémicamente cuatro regiones anatómicas clave en búsqueda de líquido libre: el saco pericárdico, la fosa hepatorrenal, la fosa esplenorrenal y la pelvis (saco de Douglas).<br><br>Perla ENARM: La evaluación FAST debe ineludiblemente examinar las ventanas pericárdica, hepatorrenal, esplenorrenal y pélvica para lograr su validez diagnóstica completa.<br><br>Análisis de Distractores: El espacio subfrénico anterior (A), la corredera parietocólica (B) y el saco retrovesical posterior aislado (C) no son las ventanas ecográficas primarias canonizadas por el protocolo FAST, aunque el saco de Douglas engloba genéricamente el fondo de saco pélvico.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 24, 
                question: "En el traumatismo vascular penetrante, ¿cuál hallazgo clínico es considerado un signo blando de lesión?", 
                options: ["Palidez de la extremidad", "Sangrado pulsátil activo", "Isquemia tisular aguda", "Ausencia de pulso"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los signos blandos obligan a una evaluación secundaria minuciosa (estudios de imagen) e incluyen hipotensión persistente, pulso disminuido, hematoma no expansivo, palidez de la extremidad y déficit neurológico leve.<br><br>Perla ENARM: Ante la presencia de un signo blando como la palidez regional, se debe solicitar un índice tobillo-brazo o imagen vascular sin requerir exploración quirúrgica emergente e inmediata.<br><br>Análisis de Distractores: El sangrado pulsátil (B), la isquemia aguda inminente (C) y la ausencia completa de pulso (D) se categorizan formalmente como signos duros, constituyendo indicación irrefutable de exploración quirúrgica vascular de urgencia.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 25, 
                question: "¿Qué volumen de contraste hidrosoluble se debe instilar inicialmente para evaluar una ruptura vesical mediante cistografía?", 
                options: ["150 mililitros", "250 mililitros", "350 mililitros", "450 mililitros"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el cistograma o la cistografía por tomografía requieren instilar a gravedad 350 mililitros de medio de contraste hidrosoluble a la vejiga hasta que el flujo cese, y posteriormente inyectar 50 mililitros adicionales para garantizar la distensión máxima evaluable.<br><br>Perla ENARM: Para excluir o documentar certeramente una ruptura intraperitoneal o extraperitoneal, la vejiga debe estar completamente distendida con un aproximado mínimo de 350 a 400 mililitros de líquido radiopaco.<br><br>Análisis de Distractores: Volúmenes de 150 ml (A) o 250 ml (B) infra-distienden las paredes vesicales y fácilmente ocultan laceraciones de tamaño mediano arrojando un cistograma falsamente negativo. Iniciar con 450 ml (D) excede el volumen umbral estandarizado del manual.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 26, 
                question: "¿Cuál es el efecto vascular primario del balón de reanimación aórtico endovascular en el choque por fractura pélvica?", 
                options: ["Aumentar el retorno venoso", "Detener el flujo aórtico", "Dilatar el lecho esplácnico", "Reducir la presión hidrostática"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el dispositivo REBOA detiene o ralentiza drásticamente el flujo sanguíneo sistémico dentro de la aorta, limitando selectivamente la perfusión arterial hacia las zonas caudales lesionadas, mitigando la exanguinación pélvica.<br><br>Perla ENARM: El uso del REBOA está diseñado exclusivamente como una maniobra puente intraaórtica para detener el flujo y permitir estabilización mientras se coordina la hemostasia quirúrgica definitiva en el mismo centro.<br><br>Análisis de Distractores: El balón no tiene el propósito fisiológico de mejorar el retorno venoso periférico (A) ni reducir presiones hidrostáticas regionales (D). Su efecto sobre el lecho esplácnico tiende a ser oclusivo e isquémico temporalmente, no dilatador (C).", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 27, 
                question: "¿En qué porcentaje de casos de heridas abdominales por arma de fuego se documenta lesión anatómica del colon?", 
                options: ["15%", "25%", "30%", "40%"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la energía cinética transperitoneal por un impacto de bala daña múltiples estructuras. Anatómicamente se lesiona el intestino delgado en un 50% de los casos, seguido por el intestino grueso o colon en el 40% de las heridas por arma de fuego.<br><br>Perla ENARM: Las heridas abdominales penetrantes por proyectil de arma de fuego lesionan el intestino delgado (50%) y el colon (40%) de forma predominante en la patología del trauma general.<br><br>Análisis de Distractores: El 15% (A) corresponde a la frecuencia de lesión de colon secundaria a herida por arma blanca, no de fuego. Un 25% (B) refleja las lesiones a estructuras vasculares intraabdominales. Un 30% (C) representa la afectación del hígado en heridas por armas de fuego.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 28, 
                question: "¿Por debajo de qué referencia anatómica anterior una herida torácica penetrante eleva el riesgo de lesión visceral intraabdominal?", 
                options: ["Línea de las clavículas", "Apófisis xifoides", "Línea de los pezones", "Reborde costal inferior"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., durante la espiración completa, el músculo diafragmático se eleva hasta el nivel del cuarto espacio intercostal anatómico. Por ende, cualquier herida penetrante ubicada por debajo de la línea del pezón puede penetrar vísceras intraabdominales.<br><br>Perla ENARM: Toda lesión torácica penetrante localizada por debajo del nivel mamilar anterior o infraescapular posterior debe sospecharse como traumatismo toracoabdominal concomitante.<br><br>Análisis de Distractores: Las clavículas (A) representan un nivel puramente cervical-mediastinal. La apófisis xifoides (B) y el reborde costal inferior (D) ya se encuentran inmersos de forma topográfica dentro de la cavidad abdominal primaria subyacente.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 29, 
                question: "¿Qué alteración radiológica en una proyección inicial de tórax orienta de manera directa a una ruptura diafragmática traumática?", 
                options: ["Borramiento del hemidiafragma", "Mediastino superior ensanchado", "Desviación traqueal derecha", "Capuchón apical izquierdo"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las fuerzas cerradas sobre el abdomen desgarran preferentemente el diafragma posterolateral izquierdo. Un hemidiafragma irregular, elevado, la presencia de una sonda gástrica en el tórax o el \"borramiento\" estructural de la silueta diafragmática en la radiografía son signos clásicos de ruptura.<br><br>Perla ENARM: El borramiento de un hemidiafragma o la observación de las asas gástricas a nivel torácico en la radiografía exigen descartar una lesión contusa al hemidiafragma izquierdo.<br><br>Análisis de Distractores: El ensanchamiento del mediastino (B), la desviación traqueal con efecto de masa (C) y el capuchón extrapleural apical izquierdo (D) son los estigmas radiológicos patognomónicos de la lesión de la aorta torácica, no del diafragma.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 30, 
                question: "¿Qué grosor del ensanchamiento mediastínico en una radiografía de tórax en posición supina indica posible lesión aórtica cerrada?", 
                options: ["Mayor a 4 centímetros", "Mayor a 6 centímetros", "Mayor a 8 centímetros", "Mayor a 10 centímetros"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los signos radiológicos clásicos para detectar un hematoma contenido por lesión aórtica incluyen un mediastino ensanchado, definido estrictamente como una dimensión mayor a 8 cm si la placa se toma en decúbito supino, o mayor a 6 cm si el paciente se encuentra de pie.<br><br>Perla ENARM: Un ancho mediastinal que rebase los 8 cm en una radiografía torácica supina obliga a solicitar de urgencia una angiografía por tomografía computarizada para evaluar la aorta.<br><br>Análisis de Distractores: Cifras de 4 cm (A) o 6 cm (B, aplica solo de pie) descartan la anormalidad en el posicionamiento supino estándar de reanimación. Dimensiones mayores a 10 cm (D) no son el punto de corte umbral internacionalizado por las guías del ATLS.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 31, 
                question: "¿Cuál es la conducta terapéutica de elección ante un objeto punzocortante empalado firmemente en el tórax?", 
                options: ["Retirar en el sitio del accidente", "Retirar en el área de urgencias", "Estabilizar y retirar en quirófano", "Rotar y extraer manualmente"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., un objeto empalado actúa como un tapón vascular vital que comprime la estructura vascular lesionada y limita la exanguinación externa; por tanto, bajo ninguna circunstancia se debe retirar en el cubículo, sino únicamente en quirófano.<br><br>Perla ENARM: El objeto empalado dictamina exploración quirúrgica formal; su extracción solo se permite en el escenario quirúrgico con control hemostático proximal y distal a disposición.<br><br>Análisis de Distractores: Extraer el objeto en el sitio prehospitalario (A) o en urgencias (B) desata hemorragia masiva incontrolable sin el instrumental quirúrgico listo. Rotar y extraer manualmente (D) desgarra activamente el parénquima y la íntima vascular circundante, agravando irreversiblemente el daño anatómico original.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 32, 
                question: "¿Hasta cuántas horas después del traumatismo puede una tomografía computarizada con contraste arrojar falsos negativos para lesión pancreática significativa?", 
                options: ["2 horas", "4 horas", "6 horas", "8 horas"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la tomografía computarizada es frecuentemente insuficiente e incapaz de distinguir la inflamación del edema peripancreático del trauma pancreático agudo significativo durante las primeras 8 horas posteriores al golpe inicial, por lo que suele requerirse repetir el estudio.<br><br>Perla ENARM: Ante la persistencia de dolor o incremento de marcadores séricos (amilasa), una tomografía inicial normal obtenida antes de las 8 horas postraumáticas no descarta fractura glandular pancreática.<br><br>Análisis de Distractores: Tiempos cortos de 2 (A), 4 (B) o 6 horas (C) entran en la ventana de falsa negatividad, pero el umbral oficial delineado en las guías en donde la especificidad de imagen adquiere mejor validación para edema pancreático consolidado es a partir de las 8 horas.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 33, 
                question: "¿Qué herramienta endoscópica permite identificar con máxima sensibilidad una lesión esofágica en el paciente hemodinámicamente estable?", 
                options: ["Laringoscopia directa rígida", "Esofagoscopia con poco aire", "Broncoscopia de fibra óptica", "Endoscopia por cápsula"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., para pacientes asintomáticos o estables postraumatismo transmediastinal, la esofagoscopia (o endoscopia superior) realizada con delicadeza inflando mínimo aire reduce el riesgo de desgarrar o transformar una perforación contenida en un mediastino contaminado fulminante.<br><br>Perla ENARM: El diagnóstico directo de la perforación de la mucosa esofágica postraumática amerita esofagoscopia con leve inflación neumática combinada con fluoroscopia contrastada acuosa.<br><br>Análisis de Distractores: La laringoscopia (A) o la broncoscopia (C) evalúan prioritariamente los componentes funcionales de la vía aérea y el árbol traqueobronquial, no el tracto digestivo de forma íntegra. Las cápsulas endoscópicas (D) están contraindicadas ante la alta sospecha de fuga parietal intestinal libre.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 34, 
                question: "¿Qué vector de fuerza traumática genera separación rotacional externa de la sínfisis del pubis y ruptura del complejo ligamentoso pélvico?", 
                options: ["Compresión lateral", "Cizallamiento vertical", "Compresión anteroposterior", "Mecanismo combinado mixto"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la fuerza directa frontoposterior condiciona rotación externa de las alas de la hemipelvis y rotura masiva de los ligamentos sacroilíacos posteriores (fenómeno en libro abierto), desencadenando hemorragia intrapélvica crítica.<br><br>Perla ENARM: La luxación de la sínfisis del pubis (anillo pélvico en libro abierto) se deriva invariablemente de una lesión por compresión anteroposterior pura.<br><br>Análisis de Distractores: El cizallamiento vertical (B) desvía la hemipelvis superiormente por fuerzas axiales. La compresión lateral (A) rota internamente a la pelvis comprimiendo el pubis. El mecanismo combinado (D) asocia múltiples vectores, pero la apertura clásica en libro abierto exige la presencia de un vector anteroposterior estricto predominante.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 35, 
                question: "¿Cuál valor del índice tobillo-brazo justifica una investigación vascular radiológica extensa en una extremidad con traumatismo penetrante?", 
                options: ["Menor a 0.8", "Menor a 0.9", "Menor a 1.0", "Menor a 1.1"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., si la toma comparativa del flujo tisular del índice de la extremidad lesionada (o índice tobillo-brazo) determina un registro numérico menor a 0.9, el algoritmo exige proseguir el rastreo vascular con angiografía por TAC para descartar daño arterial oculto.<br><br>Perla ENARM: Un índice tobillo-brazo inferior a 0.9 posterior a trauma penetrante extremidad funciona como marcador centinela asintomático de déficit oclusivo arterial agudo.<br><br>Análisis de Distractores: Un valor menor a 0.8 (A) ya exhibe isquemia manifiesta ineludible. Cifras como 1.0 (C) o 1.1 (D) implican simetría y normalidad reológica fisiológica frente a la tensión arterial sistémica basal, excluyendo la obstrucción estructural grave de los troncos vasculares grandes.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 36, 
                question: "¿Qué variante de disrupción anatómica mesentérica ocurre clásicamente por desaceleración focal generada por un cinturón de seguridad?", 
                options: ["Lesión en asa de balde", "Desgarro del epiplón mayor", "Avulsión de la arteria mesentérica", "Ruptura de la vena esplénica"],

                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 37, 
                question: "¿Qué intervención puente previene la exanguinación por una herida cervical penetrante angosta que no responde a presión manual externa?", 
                options: ["Taponamiento con gasa yugular", "Cierre percutáneo con grapas", "Pinzamiento a ciegas en la zona", "Taponamiento con catéter de balón"],

                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 38, 
                question: "¿Qué signo perineal aislado sugiere con gran peso una disrupción uretral tras un accidente de vehículo motorizado?", 
                options: ["Ausencia de reflejo bulbocavernoso", "Equimosis en el escroto", "Relajación del esfínter anal", "Secreción purulenta en meato"],

                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las sospechas sólidas que definen un trauma urológico asocian sangre rutilante en el meato, incapacidad para orinar y el desarrollo de equimosis profunda en escroto o perineo.<br><br>Perla ENARM: La observación de equimosis escrotal o un hematoma en forma de alas de mariposa en el perineo postrauma contraindican tajantemente la inserción urinaria inicial.<br><br>Análisis de Distractores: La relajación del esfínter anal (C) y la pérdida del reflejo bulbocavernoso (A) diagnostican lesión medular espinal caudal o choque neurogénico profundo. La secreción purulenta (D) advierte de un proceso de uretritis crónica infecciosa, ajeno al contexto de hemorragia aguda por trauma de alta energía.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21."

            {
                id: 39, 
                question: "¿Aproximadamente qué proporción de individuos con traumatismo penetrante en la cavidad torácica ameritará una intervención quirúrgica formal?", 
                options: ["5 al 10%", "15 al 30%", "35 al 50%", "55 al 70%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., a diferencia del trauma torácico cerrado donde el requerimiento operatorio formal representa apenas el <10%, el traumatismo penetrante transfiere lesiones focales profundas en pulmón o grandes vasos torácicos que empujan la necesidad de una toracotomía resolutiva hacia un margen del 15% al 30% del total de incidencias.<br><br>Perla ENARM: Hasta el 85% de los traumatismos torácicos responden satisfactoriamente al soporte con la inserción de una sonda pleural de avenamiento, sin requerir toracotomía.<br><br>Análisis de Distractores: Ratios del 5-10% (A) pertenecen de manera nativa a la cinemática del tórax cerrado. Tasas del 35-50% (C) o 55-70% (D) están por encima del promedio, la mayoría de los casos de penetración son solucionables y resolubles con la rápida descompresión e inserción de la sonda pleural primaria de gran calibre.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22."

            {

                question: "¿Cuál abordaje de incisión se prefiere obligatoriamente para realizar un lavado peritoneal en la embarazada con lesión uterina inminente?",

                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },

                question: "¿Cuál es el riesgo principal de manipular manualmente y de forma repetida una pelvis con sospecha de fractura?", 
                options: ["Desgarro del esfínter anal", "Perforación vesical ósea", "Desplazamiento de un coágulo", "Lesión del plexo lumbosacro"],

                source: "ATLS 11.ª ed., 2025, Capítulo 21."

            {
                id: 42, 
                question: "¿Qué complicación local es más probable al explorar o sondear a ciegas el trayecto de una herida por arma de fuego?",

                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., las heridas por arma de fuego jamás deben examinarse o sondearse a ciegas introduciendo instrumentos o dedos. El sondeo proporciona información anatómica nula y puede desalojar trombos frágiles, exacerbando el sangrado y diseminando la contaminación de la herida hacia planos limpios.<br><br>Perla ENARM: La evaluación táctil a ciegas de los trayectos balísticos está estrictamente contraindicada por el altísimo riesgo de reactivar una hemorragia exanguinante previamente taponada.<br><br>Análisis de Distractores: La embolización grasa (B) proviene de fracturas de huesos largos, no de la herida blanda en sí. Las fístulas (C) se forman por la cavitación crónica entre una arteria y vena adyacentes. El reflejo vagal (D) carece de relación directa de alta frecuencia con el lecho tisular periférico explorado.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 22." 
            },
            {
                id: 43, 
                question: "¿Qué mecanismo de lesión cerrado es clásicamente responsable de producir una ruptura duodenal en el paciente traumatizado?",

                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la compresión focalizada contra la columna vertebral provocada por golpes epigástricos directos, clásicamente descrita al impactar contra el manubrio de una bicicleta o en conductores sin cinturón que golpean el volante, es la cinemática prototípica de la ruptura duodenal y la fractura pancreática.<br><br>Perla ENARM: El mecanismo clásico patognomónico a buscar en todo paciente con lesión duodenal contusa es el golpe directo epigástrico contra un manubrio o volante.<br><br>Análisis de Distractores: Las caídas de pie (C) predisponen a cizallamiento vertical de la pelvis y calcáneo. La compresión anteroposterior de pelvis (B) genera apertura en libro abierto. El impacto lateral (A) vulnera el hemidiafragma, el bazo y el anillo pélvico rotacionalmente, no el retroperitoneo central.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 44, 
                question: "Si una tomografía computarizada revela líquido libre intraabdominal sin evidencia de lesión en hígado o bazo, ¿qué estructura se asume lesionada?",

                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., en ausencia de lesiones parenquimatosas en órganos sólidos (hígado, bazo o riñón), la presencia incidental de líquido libre en la cavidad abdominal en una tomografía computarizada es un signo centinela que sugiere altamente una lesión del tracto gastrointestinal y/o un desgarro de su mesenterio.<br><br>Perla ENARM: El líquido libre aislado en una tomografía sin daño visceral macizo es una indicación que justifica la intervención quirúrgica temprana por altísima sospecha de perforación entérica.<br><br>Análisis de Distractores: La ruptura vesical extraperitoneal (A) genera filtración al espacio de Retzius, no líquido libre peritoneal clásico. El páncreas (C) puede tener líquido peripancreático tardío pero de difícil visualización temprana. La lesión aórtica (D) produce hematoma retroperitoneal fulminante de magnitud masiva.", 
                source: "ATLS 11.ª ed., 2025, Capítulo 21." 
            },
            {
                id: 45, 
                question: "En el manejo de hemorragia de extremidades, ¿cuál es la consecuencia hemodinámica de un torniquete aplicado de forma holgada?",
