            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>

    <script>

        const questionsData = [
{
                id: 1, 
                question: "¿Cuál es el grado de clasificación para un paciente con fractura de anillo pélvico que presenta inestabilidad hemodinámica severa?", 
                options: ["Grado I", "Grado II", "Grado III", "Grado IV"], 
                answer: 3, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., los matices anatómicos de los tipos de fractura son secundarios frente a un sangrado activo y compromiso hemodinámico. La World Society of Emergency Surgery recomienda clasificar a cualquier paciente hemodinámicamente inestable con una fractura pélvica como Grado IV para guiar el tratamiento hemostático agresivo temprano (faja pélvica, REBOA, empaquetamiento preperitoneal).<br><br>Perla ENARM: Cualquier paciente hemodinámicamente inestable por una fractura pélvica se clasifica como grado IV, independientemente del tipo anatómico de fractura.<br><br>Análisis de Distractores: Las opciones A, B y C representan grados de fracturas en pacientes con estado hemodinámico normal (estable o transitoriamente inestable), donde se evalúa el tipo de compresión mecánica (lateral, anteroposterior o cizallamiento) para el manejo de rutina.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 2, 
                question: "¿En qué intervalo de tiempo se debe considerar aflojar de forma controlada un torniquete prehospitalario para reevaluar el sangrado arterial continuo?", 
                options: ["30 a 60 minutos", "60 a 90 minutos", "90 a 120 minutos", "120 a 150 minutos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., cuando el tiempo de isquemia del torniquete supera los 90 a 120 minutos, es clínicamente apropiado aflojar el dispositivo de manera controlada bajo vigilancia estrecha. Esto permite reevaluar la hemostasia espontánea o la viabilidad de usar vendajes compresivos para salvar el tejido isquémico.<br><br>Perla ENARM: Las decisiones de mantener o liberar un torniquete entre los 90 y 120 minutos dependen de la evaluación continua del sangrado, siendo el límite superior seguro para prevenir necrosis irreversible.<br><br>Análisis de Distractores: Las opciones A y B son tiempos tempranos donde el coágulo inicial puede no estar consolidado, favoreciendo el resangrado agudo. La opción D es un tiempo de isquemia prolongada que eleva severamente el riesgo de pérdida de extremidad o síndrome de reperfusión al retirar la compresión.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 3, 
                question: "¿Cuál es el método de transporte indicado para una extremidad con amputación traumática buscando preservar su viabilidad para reimplante?", 
                options: ["Inmersión directa en hielo", "Inmersión en agua estéril", "Bolsa sellada sobre hielo", "Envoltura térmica seca"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la parte amputada debe lavarse con solución isotónica, envolverse en gasa o toalla húmeda estéril, colocarse en una bolsa de plástico sellada y luego transportarse en una nevera con hielo picado.<br><br>Perla ENARM: Es fundamental no sumergir la parte amputada directamente en hielo o agua para evitar el daño térmico por congelación o la maceración tisular que contraindicaría el reimplante.<br><br>Análisis de Distractores: La opción A provoca necrosis por congelación irreversible. La opción B macera el tejido e impide la viabilidad vascular. La opción D no disminuye el metabolismo tisular para prolongar el tiempo de isquemia fría permisible.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 4, 
                question: "¿Cuál es el esquema antibiótico profiláctico sistémico indicado para una fractura abierta grado III de Gustilo-Anderson sin contaminación acuosa?", 
                options: ["Cefazolina más gentamicina", "Piperacilina con tazobactam", "Cefazolina más metronidazol", "Vancomicina más clindamicina"], 
                answer: 0, 
                justification: "Justificación: Las fracturas grado III presentan alta energía, daño masivo de tejidos blandos y alto riesgo de infección por bacterias grampositivas y gramnegativas. De acuerdo al ATLS 11.ª ed., el régimen de elección es una cefalosporina de primera generación (Cefazolina 2 g IV cada 8 h) sumada a un aminoglucósido (Gentamicina 5 mg/kg IV cada 24 h) o Ceftriaxona sola como alternativa.<br><br>Perla ENARM: Las fracturas grado III de Gustilo-Anderson exigen cobertura temprana de grampositivos sumada a gramnegativos de forma inmediata a la llegada al servicio de urgencias.<br><br>Análisis de Distractores: La opción B está indicada exclusivamente si hay contaminación con agua dulce o salada. La opción C omite la cobertura antipseudomónica y antiaerobia obligatoria en grado III. La opción D es un esquema alternativo exclusivo para pacientes con hipersensibilidad grave a los betalactámicos.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 5, 
                question: "¿Qué presión diferencial o Delta P confirma clínicamente el diagnóstico de síndrome compartimental inminente en una extremidad inferior?", 
                options: ["Menor a 20 mmHg", "Menor a 30 mmHg", "Mayor a 30 mmHg", "Mayor a 40 mmHg"], 
                answer: 1, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el Delta P se calcula restando la presión del compartimento de la presión arterial diastólica. Un gradiente estrecho disminuye la presión de perfusión capilar. Un valor inferior a 30 mmHg es patognomónico y aumenta la confirmación de síndrome compartimental agudo, justificando la fasciotomía.<br><br>Perla ENARM: El cálculo de Delta P menor a 30 mmHg o presiones absolutas del compartimento superiores a 30 mmHg sugieren un flujo sanguíneo críticamente comprometido.<br><br>Análisis de Distractores: La opción A es un valor de isquemia avanzada e irreversible, el diagnóstico debe hacerse antes. Las opciones C y D indican un gradiente de perfusión normal o compensado, sin compromiso isquémico tisular compartimental.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 6, 
                question: "¿Qué nivel sérico de creatina cinasa establece el diagnóstico bioquímico de rabdomiólisis traumática con riesgo de lesión renal aguda?", 
                options: ["Superior a 1,000 U/L", "Superior a 5,000 U/L", "Superior a 10,000 U/L", "Superior a 50,000 U/L"], 
                answer: 2, 
                justification: "Justificación: El síndrome de aplastamiento genera destrucción del sarcolema con fuga masiva de mioglobina. De acuerdo al ATLS 11.ª ed., un nivel de creatina cinasa superior a 10,000 U/L sirve como marcador fidedigno de rabdomiólisis severa cuando no se puede medir directamente la mioglobina en orina.<br><br>Perla ENARM: La administración temprana de líquidos es el pilar para mitigar el daño tubular por precipitación de cilindros en niveles de creatina cinasa mayores a 10,000 U/L.<br><br>Análisis de Distractores: Las opciones A y B son elevaciones menores que suelen resolverse espontáneamente sin generar falla renal por nefropatía por pigmentos. La opción D representa un cuadro catastrófico, pero el umbral diagnóstico y de acción clínica empieza en 10,000 U/L.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 7, 
                question: "¿Qué nervio periférico resulta lesionado con mayor frecuencia como complicación directa de una luxación anterior de la articulación del hombro?", 
                options: ["Nervio radial", "Nervio mediano", "Nervio axilar", "Nervio cubital"], 
                answer: 2, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., la cabeza humeral dislocada anteriormente comprime directamente las estructuras que atraviesan el espacio cuadrangular. El nervio axilar es el más susceptible, manifestando debilidad en el músculo deltoides y pérdida de sensibilidad en la cara lateral del hombro.<br><br>Perla ENARM: La evaluación de la fuerza del deltoides y la sensibilidad del hombro lateral es imperativa antes y después de reducir una luxación anterior de hombro.<br><br>Análisis de Distractores: La opción A se asocia típicamente a fracturas de la diáfisis humeral distal. La opción B se lesiona más frecuentemente en luxaciones o fracturas de la muñeca. La opción D es característico en traumatismos severos o fracturas del codo.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 8, 
                question: "¿Cuál es el volumen sanguíneo circulante estimado en un paciente pediátrico lactante para establecer las metas de reanimación hídrica?", 
                options: ["60 ml/kg", "70 ml/kg", "75 ml/kg", "80 ml/kg"], 
                answer: 3, 
                justification: "Justificación: La reanimación pediátrica exige un conocimiento estricto del volumen vascular basal. De acuerdo al ATLS 11.ª ed., el volumen total de sangre circulante se estima en 80 ml/kg para un lactante, lo que explica por qué pérdidas absolutas pequeñas pueden representar un gran porcentaje de sangrado causante de choque.<br><br>Perla ENARM: El volumen circulante estimado es de 80 ml/kg en lactantes, 75 ml/kg de 1 a 3 años, y 70 ml/kg a partir de los tres años de edad.<br><br>Análisis de Distractores: La opción A subestima drásticamente la volemia pediátrica. La opción B corresponde al volumen sanguíneo circulante de un niño mayor de 3 años o un adulto. La opción C es el volumen estimado para un infante en edad preescolar (1 a 3 años).", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 9, 
                question: "¿Cuál es el gasto urinario mínimo esperado que asegura una perfusión tisular adecuada en un niño escolar politraumatizado?", 
                options: ["1.0 ml/kg/h", "1.5 ml/kg/h", "2.0 ml/kg/h", "0.5 ml/kg/h"], 
                answer: 0, 
                justification: "Justificación: De acuerdo al ATLS 11.ª ed., el objetivo de gasto urinario varía con la edad: en lactantes es de 1 a 2 ml/kg/h, en niños desde 1 año hasta la edad escolar es de 1.0 a 1.5 ml/kg/h, y en adolescentes desciende a 0.5 ml/kg/h. Para un escolar, 1.0 ml/kg/h es la meta inferior óptima.<br><br>Perla ENARM: La medición de la diuresis es el método clínico no invasivo más fiable para determinar la idoneidad de la reanimación con volumen en pediatría.<br><br>Análisis de Distractores: La opción B es el límite superior para lactantes o preescolares. La opción C es la meta exclusiva para recién nacidos o lactantes menores que requieren alta depuración de líquidos. La opción D corresponde a la meta normal para pacientes adolescentes o adultos.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 10, 
                question: "¿La presencia de fracturas costales o craneales en un paciente de qué límite de edad obliga al clínico a investigar maltrato infantil?", 
                options: ["Menor de 12 meses", "Menor de 24 meses", "Menor de 36 meses", "Menor de 48 meses"], 
                answer: 1, 
                justification: "Justificación: La elasticidad de la caja torácica y la plasticidad craneal en niños muy pequeños hacen que sea extremadamente infrecuente la fractura por mecanismos casuales. De acuerdo al ATLS 11.ª ed., identificar fracturas de costillas o cráneo en niños menores de 24 meses de edad es un criterio absoluto de alta sospecha de trauma no accidental.<br><br>Perla ENARM: Las fracturas de huesos largos en menores de 36 meses, y fracturas craneales o costales en menores de 24 meses son marcadores críticos de maltrato infantil.<br><br>Análisis de Distractores: La option A deja fuera a lactantes mayores que siguen en máximo riesgo. La opción C aplica primariamente a fracturas de huesos largos. La opción D abarca a pacientes preescolares, en los que la incidencia de caídas causantes de lesión ósea es mayor y no excluye el abuso, pero no es el límite del patrón clásico patognomónico.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 11, 
                question: "¿Qué segmento de la columna cervical presenta subluxación anatómica fisiológica hasta en un 40% de los niños menores de 7 años?", 
                options: ["C2 sobre C3", "C3 sobre C4", "C4 sobre C5", "C5 sobre C6"], 
                answer: 0, 
                justification: "Justificación: El tamaño proporcional de la cabeza y la laxitud de los ligamentos generan hipermobilidad cervical. De acuerdo al ATLS 11.ª ed., la seudosubluxación cervical dificulta la evaluación radiográfica; cerca del 40% de los menores de 7 años muestran desplazamiento anterior de C2 sobre C3, el cual se corrige colocando al paciente en posición neutral con realce torácico.<br><br>Perla ENARM: La seudosubluxación pediátrica se observa clásicamente en C2 sobre C3 y se exacerba con la flexión del cuello en decúbito supino en la tabla rígida.<br><br>Análisis de Distractores: La opción B puede ocurrir pero con mucha menor frecuencia (menos del 14%). Las opciones C y D son sitios comunes de lesión traumática real en adultos o adolescentes, no de seudosubluxación fisiológica en la infancia temprana.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 12, 
                question: "¿Cuál es el umbral de presión arterial sistólica para catalogar hipotensión y choque oculto en un paciente traumatizado mayor de 65 años?", 
                options: ["90 mmHg", "100 mmHg", "110 mmHg", "120 mmHg"], 
                answer: 2, 
                justification: "Justificación: Los adultos mayores frecuentemente tienen una presión arterial basal elevada y no desarrollan la respuesta taquicárdica típica por el uso de medicamentos bloqueadores beta o fibrosis cardíaca. De acuerdo al ATLS 11.ª ed., una presión sistólica que parece \"normal\" (menor a 110 mmHg) en mayores de 65 años indica fuertemente hipotensión sistémica y perfusión orgánica limítrofe.<br><br>Perla ENARM: El umbral de presión arterial sistólica de 110 mmHg identifica el choque oculto y exige el inicio de reanimación hídrica agresiva en población geriátrica.<br><br>Análisis de Distractores: La opción A es el umbral clásico de hipotensión para adultos jóvenes, pero es demasiado bajo para el anciano y condena a un retraso en la reanimación. Las opciones B y D no están avaladas por los consensos de trauma geriátrico para inicio de protocolo transfusional.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 13, 
                question: "¿A partir de qué valor el índice de choque predice alta especificidad para requerir transfusión sanguínea en mayores de 65 años?", 
                options: ["Mayor a 0.5", "Mayor a 0.6", "Mayor a 0.7", "Mayor a 0.9"], 
                answer: 2, 
                justification: "Justificación: El índice de choque (frecuencia cardíaca dividida por la presión arterial sistólica) es un marcador precoz de hipovolemia. De acuerdo al ATLS 11.ª ed., un índice de choque mayor o igual a 0.7 tiene una especificidad del 83% para predecir la necesidad inminente de transfusión de hemoderivados en pacientes de la tercera edad.<br><br>Perla ENARM: La detección de hipoperfusión celular en geriatría depende de calculadoras dinámicas como un índice de choque ≥ 0.7 o un lactato sérico ≥ 2.4.<br><br>Análisis de Distractores: Las opciones A y B representan estados hemodinámicos normales y compensados. La opción D es el umbral universal de gravedad y alta mortalidad en población adulta general, pero en geriatría la señal de alarma salta en valores más bajos (0.7).", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 14, 
                question: "¿Cuál es el agente de reversión farmacológica específico indicado para un paciente geriátrico con trauma craneoencefálico que toma dabigatrán?", 
                options: ["Andexanet alfa", "Vitamina K", "Idarucizumab", "Sulfato de protamina"], 
                answer: 2, 
                justification: "Justificación: El trauma en pacientes anticoagulados demanda corrección hemostática aguda para prevenir expansión de hematomas. De acuerdo al ATLS 11.ª ed., el idarucizumab (dosis de 5 g IV) es el agente de reversión monoclonal directo y específico para inhibidores de la trombina como el dabigatrán, logrando eficacia casi inmediata.<br><br>Perla ENARM: La reversión temprana y agresiva de la anticoagulación directa en el trauma intracraneal disminuye la morbilidad neurológica y la mortalidad.<br><br>Análisis de Distractores: La opción A es el antídoto específico para los inhibidores del Factor Xa (rivaroxabán, apixabán). La opción B revierte los antagonistas de la vitamina K (warfarina) con acción lenta. La opción D revierte exclusivamente la heparina no fraccionada.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 15, 
                question: "¿En qué espacio intercostal debe insertarse el tubo de toracostomía en una paciente gestante en el tercer trimestre para drenar un neumotórax?", 
                options: ["Segundo espacio", "Cuarto espacio", "Quinto espacio", "Sexto espacio"], 
                answer: 0, 
                justification: "Justificación: Las alteraciones anatómicas del tercer trimestre incluyen la elevación del diafragma grávido hasta 4 cm cefálicamente. De acuerdo al ATLS 11.ª ed., la colocación del tubo de tórax debe efectuarse en un nivel más alto que el habitual (idealmente en el segundo o tercer espacio intercostal) para evitar la penetración inadvertida en la cavidad intraabdominal o lesión visceral.<br><br>Perla ENARM: Toda intervención torácica en el embarazo tardío debe considerar el desplazamiento diafragmático ajustando el nivel de incisión 1 a 2 espacios intercostales por arriba del nivel estándar.<br><br>Análisis de Distractores: Las opciones B y C representan la vía de inserción estándar en la línea axilar media en pacientes no embarazadas (cuarto o quinto espacio), lo que en la gestante causaría catástrofe abdominal. La opción D perforaría inevitablemente el hígado, el bazo o el útero.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 16, 
                question: "¿Cuántos grados de inclinación lateral garantizan la descompresión aortocava y optimizan el gasto cardíaco en la embarazada traumatizada?", 
                options: ["10 a 15 grados", "15 a 30 grados", "30 a 45 grados", "45 a 60 grados"], 
                answer: 1, 
                justification: "Justificación: A partir de las 18 semanas de gestación, el útero comprime la vena cava inferior en decúbito supino, disminuyendo el retorno venoso y el gasto cardíaco hasta en un 30%. De acuerdo al ATLS 11.ª ed., se debe inclinar a la paciente de 15 a 30 grados hacia la izquierda o desplazar manualmente el útero para revertir el choque obstructivo funcional y recuperar la perfusión placentaria.<br><br>Perla ENARM: La inclinación lateral izquierda de 15 a 30 grados incrementa inmediatamente el gasto cardíaco materno en un 25%.<br><br>Análisis de Distractores: La opción A no es suficiente para desplazar el peso del útero grávido fuera de la columna lumbar. Las opciones C y D causan inestabilidad biomecánica en la camilla de trauma y comprometen la protección de la columna cervical.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 17, 
                question: "¿Qué concentración sérica de fibrinógeno indica coagulación intravascular diseminada inminente en una paciente durante el tercer trimestre?", 
                options: ["Menor a 400 mg/dl", "Menor a 300 mg/dl", "Menor a 200 mg/dl", "Menor a 100 mg/dl"], 
                answer: 2, 
                justification: "Justificación: El embarazo normal es un estado protrombótico con elevación fisiológica del fibrinógeno (400-450 mg/dl). De acuerdo al ATLS 11.ª ed., una caída del fibrinógeno por debajo de 200 mg/dl, aunque sería un nivel aceptable en población general, en la paciente obstétrica es un signo de alarma temprano para choque hemorrágico, coagulopatía por consumo y desprendimiento de placenta.<br><br>Perla ENARM: Un nivel de fibrinógeno inferior a 200 mg/dl en el tercer trimestre es un marcador analítico de coagulopatía por consumo inminente inducida por trauma.<br><br>Análisis de Distractores: La opción A es el rango normal fisiológico del embarazo tardío. La opción B representa un consumo leve pero no el umbral diagnóstico de falla. La opción D es un estadio terminal de afibrinogenemia donde la hemorragia es casi irreversible.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 18, 
                question: "¿Cuál es la constante numérica utilizada para estimar el volumen de reanimación hídrica en 24 horas para adultos con quemaduras térmicas?", 
                options: ["1 ml de cristaloide", "2 ml de cristaloide", "3 ml de cristaloide", "4 ml de cristaloide"], 
                answer: 1, 
                justification: "Justificación: La reanimación inicial por quemaduras restringe el exceso de cristaloides para prevenir sobrecarga y edema compartimental. De acuerdo al ATLS 11.ª ed., el cálculo total ajustado en 24 horas para adultos y niños mayores de 13 años se realiza multiplicando 2 ml de Ringer Lactato por el peso en kilogramos, por el porcentaje de la superficie corporal total quemada.<br><br>Perla ENARM: Las guías actuales dictan 2 ml x kg x % SCT para quemaduras térmicas en adultos, mientras que las quemaduras eléctricas requieren 4 ml.<br><br>Análisis de Distractores: La opción A no suple las fugas masivas al tercer espacio capilar. La opción C es la constante de cálculo específica y exclusiva para pacientes pediátricos menores de 13 años. La opción D se emplea únicamente en quemaduras por corriente eléctrica de alto voltaje.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 19, 
                question: "¿Cuál es el antídoto intravenoso específico recomendado ante la sospecha de toxicidad sistémica por inhalación de cianuro?", 
                options: ["Hidroxocobalamina", "Tiosulfato de sodio", "Nitrito de amilo", "Azul de metileno"], 
                answer: 0, 
                justification: "Justificación: La toxicidad aguda por cianuro se manifiesta por acidosis metabólica severa e hipotensión refractaria en el contexto de quemaduras en espacios cerrados. De acuerdo al ATLS 11.ª ed., la administración empírica del antídoto de hidroxocobalamina es el tratamiento de primera línea que neutraliza el cianuro uniéndose a él para formar cianocobalamina (vitamina B12) excretable en orina.<br><br>Perla ENARM: Los candidatos presuntivos para tratamiento con hidroxocobalamina presentan pérdida de conciencia, lactato >10 y exposición a fuego en lugar cerrado.<br><br>Análisis de Distractores: Las opciones B y C son componentes del kit clásico de cianuro, pero inducen hipotensión y metahemoglobinemia, empeorando el estado de choque y la entrega de oxígeno (contraindicado relativo en trauma térmico). La opción D es el antídoto específico para la metahemoglobinemia adquirida, no para cianuro.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9."

                id: 20, 
                question: "¿A partir de cuántas horas de la colocación de un torniquete se contraindica absolutamente su aflojamiento en urgencias por alto riesgo isquémico?", 
                options: ["2 horas", "4 horas", "6 horas", "8 horas"], 
                answer: 2, 
                justification: "Justificación: La isquemia celular sostenida altera las bombas de membrana y el metabolismo basal muscular. De acuerdo al ATLS 11.ª ed., los torniquetes colocados durante más de 6 horas ocasionan la formación de tejido isquémico severo; su liberación repentina provoca un síndrome de reperfusión letal por lavado de potasio y mioglobina sistémicos.<br><br>Perla ENARM: La conversión o retiro de torniquetes que superan la ventana isquémica de 6 horas resultará en falla multiorgánica o pérdida de la extremidad; la cirugía ortopédica es requerida antes de cualquier liberación.<br><br>Análisis de Distractores: La opción A es el umbral seguro en donde el retiro y conversión en la sala de trauma es mandatario. La opción B representa isquemia intermedia donde todavía es negociable su retiro de forma cuidadosa. La opción D es un evento que ya superó el umbral biológico máximo, pero el límite es 6 horas.",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExaATLS02Progress');
                localStorage.removeItem('ExaATLS02LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {

                        dashboardBtn.classList.remove('lg:left-8');

                        dashboardBtn.classList.remove('lg:left-[22rem]');

                    }

                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

            const currentIndex = questionsData.findIndex(q => q.id === currentId);

                displayQuestion(questionsData[currentIndex - 1].id);

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS02Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS02LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS02LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS02Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</script>
