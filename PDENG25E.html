    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "En la evaluación epidemiológica de una enfermedad transmitida por vector, se identifica la circulación simultánea de diversos serotipos virales. ¿Cuál fue el serotipo predominante asociado a la cifra histórica de casos a nivel nacional reportada en el año 2024?",
        options: ["DENV-1", "DENV-2", "DENV-3", "DENV-4"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, el año 2024 registró el mayor número de casos en la historia del país (327,756 casos), con un predominio absoluto del serotipo DENV-3 y una letalidad del 0.85% en las formas clínicas con signos de alarma y casos graves.<br><br>Perla ENARM: \"El año 2024, ha sido el de mayor número de casos reportados en la historia del país... con predominio del serotipo DENV-3\".<br><br>Análisis de Distractores: DENV-1 predominó históricamente en 2009 (>80%), mientras que DENV-2 tuvo predominancia durante los incrementos de formas graves reportados en el año 2019. DENV-4 circula en el país, pero no figuró como el dominante en la epidemia histórica más reciente.",
        source: "PRONAM Dengue, 2026, Epidemiología, Página 6."
    },
    {
        id: 2,
        question: "Un paciente masculino de 34 años con antecedente de dengue hace 5 años acude por un nuevo cuadro febril agudo. Evoluciona rápidamente a inestabilidad hemodinámica. Fisiopatológicamente, ¿qué mecanismo celular explica el aumento de la permeabilidad vascular en esta infección secundaria?",
        options: ["Neutralización viral directa por anticuerpos IgG.", "Inhibición de la producción de interleucina 6.", "Replicación viral exclusiva en linfocitos T citotóxicos.", "Entrada celular masiva por receptores Fc."],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, en infecciones secundarias se presenta el fenómeno de potenciación dependiente de anticuerpos (ADE). Los anticuerpos no neutralizantes de la primera infección facilitan la entrada del nuevo serotipo viral a los monocitos y macrófagos a través de los receptores Fc (FcγR), aumentando dramáticamente la carga viral y la fuga capilar.<br><br>Perla ENARM: \"Los anticuerpos de unión no neutralizantes... facilitan la entrada del virus en células mieloides a través de receptores Fc, aumentando la carga viral y la gravedad clínica\".<br><br>Análisis de Distractores: La neutralización directa evitaría la infección sistémica. La interleucina 6 no se inhibe, sino que su producción se dispara masivamente junto con el TNF-α. El virus se replica primordialmente en el sistema mononuclear fagocítico (monocitos/macrófagos), no en los linfocitos T.",
        source: "PRONAM Dengue, 2026, Fisiopatología del dengue, Página 24."
    },
    {
        id: 3,
        question: "Durante la reevaluación clínica de una paciente femenina de 28 años en la transición hacia la etapa afebril, se busca intencionadamente descartar progresión clínica. ¿Cuál de los siguientes hallazgos se clasifica como un signo de alarma?",
        options: ["Exantema maculopapular morbiliforme.", "Hepatomegalia mayor a 2 cm.", "Leucopenia progresiva en biometría.", "Mialgias y artralgias incapacitantes."],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, la hepatomegalia > 2 cm es un criterio mayor para reclasificar a un paciente como dengue con signos de alarma (DCSA), indicando la necesidad de hospitalización obligatoria para manejo intravenoso.<br><br>Perla ENARM: \"Todo caso de dengue que cerca de y especialmente a la caída de la fiebre presenta uno o más de los siguientes signos... Hepatomegalia > 2 cm\".<br><br>Análisis de Distractores: El exantema maculopapular, la leucopenia progresiva, así como las mialgias y artralgias, son criterios definitorios de la fase febril de un dengue sin signos de alarma (DSSA), pero no determinan gravedad ni fuga capilar inminente.",
        source: "PRONAM Dengue, 2026, Definiciones, fases y clasificación, Página 21."
    },
    {
        id: 4,
        question: "Un paciente de 41 años acude a consulta externa al tercer día de haber iniciado con cefalea, dolor retroocular y fiebre de 39 °C. Refiere vivir en una zona endémica. Para establecer la confirmación virológica oportuna en este momento, ¿cuál es el estudio de laboratorio de elección?",
        options: ["Detección de antígeno NS1.", "Anticuerpos IgM en suero.", "Anticuerpos IgG en suero.", "Cultivo viral en sangre celular."],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, durante los primeros 5 días de evolución clínica (fase febril aguda), los estudios indicados para la confirmación diagnóstica son la detección del antígeno NS1 o la prueba molecular RT-PCR, ya que los anticuerpos aún no alcanzan títulos detectables.<br><br>Perla ENARM: \"Para escoger la prueba diagnóstica correcta... durante la fase febril, es más conveniente solicitar RT-PCR o detección de antígeno NS1\".<br><br>Análisis de Distractores: Los anticuerpos IgM comienzan a elevarse a partir del día 6 de iniciados los síntomas. Los anticuerpos IgG en una sola muestra indican infección previa y requieren muestras pareadas para confirmar seroconversión aguda. El cultivo viral no es una herramienta de abordaje diagnóstico rutinario recomendada.",
        source: "PRONAM Dengue, 2026, Diagnóstico por laboratorio, Página 26."
    },
    {
        id: 5,
        question: "Se evalúa a un paciente pediátrico con peso de 20 kg diagnosticado con dengue sin signos de alarma. Se decide iniciar manejo ambulatorio del síndrome febril. ¿Cuál es la pauta posológica inicial recomendada para el paracetamol en este paciente?",
        options: ["15 mg/kg/dosis cada 8 horas.", "5 mg/kg/dosis cada 4 horas.", "10 mg/kg/dosis cada 6 horas.", "20 mg/kg/dosis cada 12 horas."],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, la analgesia y el control térmico en población pediátrica deben manejarse estrictamente con paracetamol a una dosis protocolizada de 10 mg/kg/dosis administrada vía oral cada 6 horas para evitar toxicidad hepática.<br><br>Perla ENARM: \"El tratamiento farmacológico consiste en paracetamol... Niños: 10 mg/kg/dosis, vía oral, cada 6 horas\".<br><br>Análisis de Distractores: Las dosis de 15 mg/kg u horarios más prolongados o acortados no corresponden a la pauta de titulación exacta establecida en el PRONAM para el control sintomático del dengue pediátrico. Dosis excesivas elevan el riesgo de falla hepática, confundiendo el cuadro clínico.",
        source: "PRONAM Dengue, 2026, Tratamiento para el grupo A, Página 41."
    },
    {
        id: 6,
        question: "El periodo de mayor vulnerabilidad hemodinámica inicia cuando el paciente presenta la defervescencia térmica. Clínicamente, ¿cuánto tiempo suele durar esta fase caracterizada por el incremento de la permeabilidad vascular?",
        options: ["12 a 24 horas.", "24 a 48 horas.", "48 a 72 horas.", "72 a 96 horas."],
        answer: 1,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, la fase crítica señala el inicio del periodo de mayor riesgo por extravasación de líquidos y aumento paralelo del hematocrito. Este margen temporal de inestabilidad endotelial dura característicamente entre 24 y 48 horas.<br><br>Perla ENARM: \"Esto señala el inicio del periodo de mayor riesgo, que suele durar de 24 a 48 horas y dependiendo del grado de lesión endotelial pueden presentarse los signos de alarma\".<br><br>Análisis de Distractores: El lapso de 48 a 72 horas corresponde fisiológicamente a la fase de recuperación (reabsorción de líquidos). Periodos menores a 24 horas o mayores a 72 horas no describen la ventana temporal clásica de choque hipovolémico por fuga plasmática en dengue.",
        source: "PRONAM Dengue, 2026, Definiciones, fases y clasificación, Página 16."
    },
    {
        id: 7,
        question: "Se recibe en urgencias a una paciente de 55 años con diagnóstico previo de dengue. A la exploración presenta alteración del estado de alerta y saturación de oxígeno del 82% al aire ambiente. En la radiografía de tórax se observa derrame pleural bilateral masivo. ¿Qué criterio categoriza a este paciente directamente como dengue grave?",
        options: ["Ascitis sin dificultad respiratoria.", "Sangrado transvaginal no menstrual.", "Hepatomegalia mayor a 2 cm.", "Dificultad respiratoria por extravasación."],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, la presencia de dificultad respiratoria debida a la extravasación grave de plasma clasifica automáticamente el cuadro clínico como dengue grave (Grupo C), requiriendo ingreso urgente a cuidados intensivos.<br><br>Perla ENARM: \"Todo caso de dengue que tiene una o más de las siguientes manifestaciones: Choque o dificultad respiratoria debido a extravasación grave de plasma\".<br><br>Análisis de Distractores: La hepatomegalia > 2 cm y el sangrado transvaginal fuera del periodo menstrual son signos de alarma (DCSA), no criterios directos de gravedad extrema aislados. La ascitis sin compromiso respiratorio se considera acúmulo de líquidos (signo de alarma), pero requiere generar choque o distrés para brincar a la clasificación de dengue grave.",
        source: "PRONAM Dengue, 2026, Definiciones, fases y clasificación, Página 22."
    },
    {
        id: 8,
        question: "Durante la evaluación hematológica de un paciente adulto en el segundo día de fiebre de origen a determinar en zona endémica, se busca intencionadamente el primer indicio laboratorial de infección por virus del dengue. ¿Cuál es la anomalía más temprana observable en la biometría hemática?",
        options: ["Disminución progresiva de leucocitos.", "Trombocitopenia severa.", "Aumento progresivo del hematocrito.", "Prolongación de tiempos de coagulación."],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, el descenso en el recuento total de glóbulos blancos (leucopenia) antecede a cualquier otra alteración hematológica durante la fase febril inicial, siendo un pivote diagnóstico de gran utilidad.<br><br>Perla ENARM: \"La primera anomalía del hemograma, es una disminución progresiva del recuento total de glóbulos blancos; las plaquetas se encuentran normales\".<br><br>Análisis de Distractores: La caída plaquetaria ocurre típicamente hacia el final de la etapa febril o al inicio de la defervescencia. El aumento del hematocrito es el evento cardinal pero exclusivo de la fase crítica. Las alteraciones de la coagulación son fenómenos tardíos de la forma grave.",
        source: "PRONAM Dengue, 2026, Definiciones, fases y clasificación, Página 15."
    },
    {
        id: 9,
        question: "Se decide prescribir metamizol como analgésico y antipirético de segunda opción para un paciente adulto con diagnóstico de dengue sin signos de alarma que presenta intolerancia al paracetamol. ¿En qué escenario clínico está formalmente contraindicado el uso de este fármaco?",
        options: ["Infección secundaria heterotípica.", "Paciente adulto mayor de 65 años.", "Durante el periodo de lactancia.", "Presencia de diabetes mellitus."],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, el uso de metamizol para el control térmico y analgésico es una alternativa válida, sin embargo, posee una contraindicación específica y absoluta para su prescripción en mujeres durante la etapa de lactancia.<br><br>Perla ENARM: \"Metamizol... Lactancia: Evite el uso de metamizol durante la lactancia\".<br><br>Análisis de Distractores: La diabetes mellitus y la edad mayor a 65 años ubican al paciente en el Grupo B1, requiriendo vigilancia, pero no contraindican la molécula. El antecedente de infección secundaria aumenta el riesgo de gravedad (ADE), pero no es una contraindicación farmacológica directa para el antipirético.",
        source: "PRONAM Dengue, 2026, Tratamiento para el grupo A, Página 41."
    },
    {
        id: 10,
        question: "Se evalúa a un paciente hospitalizado por dengue con signos de alarma. Presenta mejoría general, incremento del apetito y parámetros hemodinámicos estables. ¿Cuál es el criterio clínico febril exacto que debe cumplirse para considerar un egreso seguro?",
        options: ["24 horas sin fiebre y con antipiréticos.", "48 horas sin fiebre y con antipiréticos.", "24 horas sin fiebre y sin antipiréticos.", "48 horas sin fiebre y sin antipiréticos."],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, el alta médica de cualquier paciente que cursó con dengue exige corroborar la ausencia total de episodios febriles durante un periodo íntegro de 48 horas, condicionado a la suspensión absoluta de todo medicamento antipirético.<br><br>Perla ENARM: \"Los criterios de alta médica para los pacientes con dengue son los siguientes... Criterios clínicos: Ausencia de fiebre por 48 horas sin administración de antipiréticos\".<br><br>Análisis de Distractores: Tiempos menores a 48 horas o el uso enmascarador de antipiréticos mantienen al paciente en riesgo latente de estar cursando la ventana silente de la fase crítica y de presentar complicaciones súbitas en domicilio.",
        source: "PRONAM Dengue, 2026, Criterios de alta médica, Página 45."
    },
    {
        id: 11,
        question: "Durante la viremia inicial por virus del dengue, el patógeno es fagocitado por monocitos, lo que desencadena la respuesta inmunopatogénica celular. ¿Cuáles son las citocinas específicas responsables de incrementar directamente la permeabilidad vascular?",
        options: ["Factor de necrosis tumoral alfa e interleucina 6.", "Interferón gamma e interleucina 10.", "Interleucina 2 y factor transformador de crecimiento.", "Factor activador de plaquetas e interleucina 4."],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de Dengue, tras la replicación viral intracelular en los monocitos, se induce una tormenta inflamatoria selectiva donde la liberación de TNF-α e IL-6 media directamente la disfunción endotelial, favoreciendo la fuga de plasma al tercer espacio.<br><br>Perla ENARM: \"Este proceso induce la producción de factor de necrosis tumoral alfa (TNF-α) e interleucina-6 (IL-6), mediadores que incrementan la permeabilidad vascular y favorecen la fuga de líquido\".<br><br>Análisis de Distractores: Aunque el interferón gamma (IFN-γ) participa en la respuesta primaria temprana, el eje patogénico de la disrupción de las uniones capilares se basa en TNF-α e IL-6. Las otras citocinas (IL-10, IL-2, IL-4) regulan otras vías de inmunomodulación que no son el blanco primario de la fuga plasmática en dengue.",
        source: "PRONAM Dengue, 2026, Fisiopatología del dengue, Página 24."
    },
    {
        id: 12,
        question: "Un escolar de 9 años en seguimiento domiciliario por dengue sin signos de alarma inicia con episodios eméticos. Su madre acude a urgencias solicitando valoración. Para clasificar el vómito como un signo de alarma formal, ¿qué patrón clínico debe cumplir?",
        options: ["≥ 2 episodios en 1 hora.", "≥ 5 episodios en 6 horas.", "≥ 3 episodios en 1 hora.", "≥ 4 episodios en 2 horas."],
        answer: 2,

        question: "En la zona fronteriza de México con Estados Unidos, se reporta un brote estacional de síndromes febriles con exantema. Un paciente de dicha región con contacto intradomiciliario con caninos presenta este cuadro clínico. ¿Cuál es el principal diagnóstico diferencial a descartar que obligaría al uso empírico de doxiciclina?",

    {

        question: "Un paciente ingresa en estado de choque hipovolémico avanzado. Tras la reanimación inicial, los laboratorios revelan creatinina sérica de 3.5 mg/dl, BUN elevado y anuria persistente. ¿Qué clasificación de gravedad otorga esta falla anatómica al caso de dengue?",

        question: "A diferencia de las pruebas moleculares de fase aguda, el uso de las titulaciones de anticuerpos IgG exige un abordaje metódico para validar el diagnóstico definitivo de la infección activa en áreas altamente endémicas. ¿Qué requerimiento procedimental es indispensable para confirmar el caso usando la prueba de IgG?",
        options: ["Demostrar la seroconversión con muestras pareadas.", "Detectar niveles en muestra única mayor a 1:160.", "Positividad conjunta obligatoria con antígeno NS1.", "Extracción antes del cuarto día de fiebre."],

        options: ["Aumento de la presión de pulso y no requiere envío.", "Disminución de la presión venosa y exige profilaxis antibiótica.", "Acortamiento de la presión de pulso y obliga al envío a segundo nivel.", "Presión de perfusión óptima sin modificaciones al tratamiento de piso."],

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('dengueeProgress');
                localStorage.removeItem('dengueeLastQId');
                window.location.reload();
            });

                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {

                        dashboardBtn.classList.remove('lg:left-[22rem]');

                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });

                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="loginlite.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('dengueeProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('dengueeLastQId', currentQuestionId);
                else localStorage.removeItem('dengueeLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('dengueeProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
