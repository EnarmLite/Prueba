    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [

    {
        id: 1,
        question: "¿Cuál es el mecanismo fisiopatológico principal que define al infarto agudo de miocardio clasificado como tipo 1?",
        options: ["Vasoespasmo coronario agudo", "Rotura de placa aterosclerótica", "Trombosis aguda del stent", "Desequilibrio de aporte miocárdico"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, la clasificación universal del infarto estratifica la etiología del evento isquémico para guiar el tratamiento. El tipo 1 es el escenario clásico ocasionado por aterotrombosis.<br><br>Perla ENARM: \"Tipo 1: Rotura o erosión de la placa de aterosclerosis y formación de un trombo oclusivo o suboclusivo. Incremento de los valores de troponina por arriba del percentil 99 del límite superior de referencia aunado al contexto clínico de isquemia miocárdica... Etiología más frecuente\".<br><br>Análisis de Distractores: La opción A y D corresponden a la definición del infarto tipo 2 (desequilibrio isquémico o vasoespasmo). La opción C describe de manera explícita al infarto tipo 4b.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 2), Página 73."
    },
    {
        id: 2,
        question: "¿Qué condición clínica o intervencionista establece el diagnóstico del infarto agudo de miocardio clasificado como tipo 4b?",
        options: ["Trombosis documentada del stent", "Relacionado a cirugía coronaria", "Reestenosis clínica del stent", "Desequilibrio del aporte miocárdico"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, las complicaciones directas del intervencionismo percutáneo tienen clasificaciones específicas para el registro y manejo pronóstico.<br><br>Perla ENARM: \"Tipo 4b: Relacionado con trombosis del stent. Confirmado a través de angiografía coronaria o autopsia en el contexto clínico de isquemia miocárdica y con aumento de los títulos de biomarcadores cardiacos con al menos un valor por arriba del percentil 99 del límite superior de referencia\".<br><br>Análisis de Distractores: La opción B corresponde al infarto tipo 5. La opción C (reestenosis) define al infarto tipo 4c. La opción D describe al infarto tipo 2.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 2), Página 73."
    },
    {
        id: 3,
        question: "¿Cuál es la utilidad clínica principal de las escalas de riesgo CRUSADE y ACTION en la valoración del paciente infartado?",
        options: ["Estimar riesgo de sangrado mayor", "Predecir mortalidad intrahospitalaria", "Evaluar la disfunción sistólica", "Predecir la insuficiencia cardiaca"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, el tratamiento intensivo con antitrombóticos y anticoagulantes expone al paciente a complicaciones hemorrágicas que deben predecirse y mitigarse desde el ingreso.<br><br>Perla ENARM: \"CRUSADE y ACTION: Escalas de mayor capacidad predictiva para el riesgo de sangrado\".<br><br>Análisis de Distractores: La opción B es la utilidad principal de las escalas GRACE y TIMI. La opción C se evalúa directamente mediante ecocardiografía, no por escalas clínicas de riesgo. La opción D corresponde a la escala de Zwolle.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Aspectos Generales (Sistemas de Clasificación), Página 8."
    },
    {
        id: 4,
        question: "¿Qué complicación cardiovascular a largo plazo discrimina con mayor capacidad predictiva la escala clínica de Zwolle?",
        options: ["Trombosis aguda del stent", "Mortalidad global a diez años", "Aparición de choque cardiogénico", "Hospitalización por insuficiencia cardiaca"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, la falla de bomba y el remodelado ventricular son los determinantes principales de reingreso, y su riesgo puede estratificarse matemáticamente.<br><br>Perla ENARM: \"La escala de Zwolle fue la única escala que tuvo una capacidad discriminatoria de hospitalización por insuficiencia cardiaca de hasta dos años (ROC 0.80–0.83). Los investigadores concluyen que la escala GRACE es la de mejor capacidad para evaluar el riesgo de eventos cardiovasculares... asi como la escala de Zwolle para la predicción de hospitalización por falla cardiaca\".<br><br>Análisis de Distractores: Las opciones A y C no son los eventos primarios evaluados ni discriminados por esta escala. La opción B corresponde al espectro predictivo cubierto principalmente por la escala GRACE.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Evidencias y Recomendaciones (Estratificación), Página 59."
    },
    {
        id: 5,
        question: "¿Cuál es el punto de corte electrocardiográfico diagnóstico de nueva elevación del segmento ST en derivaciones V2 y V3 para mujeres de cualquier edad?",
        options: ["≥ 1 mm", "≥ 1.5 mm", "≥ 2 mm", "≥ 2.5 mm"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, los criterios de voltaje en la cara anterior tienen diferencias dependientes del sexo para mejorar la sensibilidad y especificidad diagnóstica.<br><br>Perla ENARM: \"Nueva elevación del segmento ST en por lo menos dos derivaciones electro-anatómicas contiguas con los siguientes puntos de corte: ≥ 0.15 mV en mujeres (cualquier edad) en V2 y V3\". (1 mm equivale a 0.1 mV).<br><br>Análisis de Distractores: La opción A es el corte estándar para todas las demás derivaciones que no sean V2 y V3. La opción C es el corte exclusivo para hombres de 40 años o mayores. La opción D es el corte para hombres menores de 40 años.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 3), Página 74."
    },
    {
        id: 6,
        question: "¿Cuál es el punto de corte electrocardiográfico diagnóstico de nueva elevación del segmento ST en derivaciones V2 y V3 para hombres mayores o iguales a 40 años?",
        options: ["≥ 1 mm", "≥ 1.5 mm", "≥ 2 mm", "≥ 2.5 mm"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, a medida que avanza la edad en el hombre, la exigencia de voltaje en cara anterior disminuye frente a la de pacientes jóvenes.<br><br>Perla ENARM: \"Nueva elevación del segmento ST en por lo menos dos derivaciones electro-anatómicas contiguas con los siguientes puntos de corte: ≥ 0.20 mV en hombres con edad ≥ 40 años en V2 y V3\".<br><br>Análisis de Distractores: La opción A aplica para las derivaciones fuera de V2 y V3. La opción B es el criterio universal de voltaje en cara anterior para mujeres. La opción D es el umbral para hombres menores de 40 años.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 3), Página 74."
    },
    {
        id: 7,
        question: "En presencia de un bloqueo de rama izquierda, ¿qué relación milimétrica define el criterio de Sgarbossa modificado para aumentar la sensibilidad del diagnóstico de oclusión coronaria aguda?",
        options: ["Relación ≤ -0.25", "Relación ≥ 0.50", "Relación ≤ -0.10", "Relación ≥ 0.80"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, el criterio modificado de Smith-Sgarbossa mejora drásticamente la sensibilidad diagnóstica midiendo la proporcionalidad de la discordancia del segmento ST respecto a la onda S.<br><br>Perla ENARM: \"El diagnóstico de IAM CEST por ECG puede hacerse con los criterios de Sgarbossa y Sgarbossa modificado (relación ST/S ≤ -0.25 tiene 99% de especificidad), que muestran la presencia de elevación del segmento ST concordante\".<br><br>Análisis de Distractores: Las opciones B, C y D presentan valores matemáticos falsos que no figuran dentro del constructo del algoritmo de Sgarbossa modificado para documentar isquemia con complejos anchos.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Aspectos Generales (Electrocardiograma), Página 10 y 25."
    },
    {
        id: 8,
        question: "¿Qué grado de elevación del segmento ST en la derivación V4R es necesario para confirmar un infarto de ventrículo derecho en hombres menores de 30 años?",
        options: ["≥ 0.5 mm", "≥ 1 mm", "≥ 1.5 mm", "≥ 2 mm"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, las derivaciones derechas también requieren un ajuste fino por edad para evitar sobrediagnósticos por variantes de normalidad en varones muy jóvenes.<br><br>Perla ENARM: \"En pacientes con IAM inferior, el registrar las derivaciones precordiales derechas (V3R y V4R), en busca de la elevación del segmento ST (≥ 1 mV en varones de menos de 30 años y ≥ 0.5 mV en el resto de la población) sirve para identificar el infarto del ventrículo derecho concomitante\".<br><br>Análisis de Distractores: La opción A es el criterio aplicable a las mujeres y a los varones de 30 años o más. Las opciones C y D son voltajes que superan la exigencia diagnóstica de la guía para la cámara ventricular derecha.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Evidencias y Recomendaciones (Diagnóstico), Página 24."
    },
    {
        id: 9,
        question: "¿Cuál es la arritmia responsable de la principal causa de mortalidad extrahospitalaria en el infarto agudo de miocardio con elevación del segmento ST?",
        options: ["Taquicardia ventricular polimórfica", "Fibrilación auricular rápida", "Fibrilación ventricular", "Bloqueo auriculoventricular completo"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, la inestabilidad eléctrica temprana del miocardio isquémico degenera rápidamente a un ritmo de paro no perfusivo, justificando la necesidad del uso temprano de desfibriladores.<br><br>Perla ENARM: \"La fibrilación ventricular se constituye como la principal causa de muerte extrahospitalaria por IAM CEST\".<br><br>Análisis de Distractores: La opción A es una arritmia grave pero epidemiológicamente menos frecuente como causa directa de muerte súbita inicial extrahospitalaria en masa. La opción B desencadena insuficiencia cardiaca pero rara vez muerte súbita extrahospitalaria. La opción D produce compromiso hemodinámico manejable con marcapasos.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Complicaciones Eléctricas), Página 77."
    },
    {
        id: 10,
        question: "¿Cuál es la dosis de carga de clopidogrel vía oral estrictamente recomendada como terapia adjunta a la fibrinólisis en pacientes menores de 75 años?",
        options: ["Dosis de 75 miligramos", "Dosis de 150 miligramos", "Carga de 300 miligramos", "Carga de 600 miligramos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, la carga del inhibidor P2Y12 se ajusta según la estrategia de reperfusión; en fibrinólisis se utiliza una dosis media para balancear el riesgo de sangrado intrínseco del trombolítico.<br><br>Perla ENARM: \"Terapia antiplaquetaria adjunta a la Terapia Fibrinolítica... Clopidogrel: Dosis de carga de 300 mg oral, seguida de dosis de mantenimiento de 75 mg día\".<br><br>Análisis de Distractores: La opción A es la dosis de mantenimiento estándar o la dosis de inicio exclusiva para mayores de 75 años. La opción B no corresponde a ninguna recomendación actual. La opción D es la dosis de carga utilizada cuando la estrategia es una intervención coronaria percutánea (hemodinamia), no fibrinólisis.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 10), Página 80."
    },
    {
        id: 11,
        question: "¿Cuál es el ajuste de dosificación inicial de clopidogrel como coadyuvante de terapia fibrinolítica en pacientes mayores de 75 años?",
        options: ["Dosis de inicio de 75 miligramos", "Dosis de carga de 150 miligramos", "Dosis de carga de 300 miligramos", "Dosis de carga de 600 miligramos"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, la población senecta presenta un riesgo prohibitivo de hemorragia mayor, particularmente intracraneal, por lo que se omite la dosis de impregnación masiva del antiagregante.<br><br>Perla ENARM: \"En pacientes > 75 años, dosis de carga de 75 mg seguida de una dosis de mantenimiento de 75 mg día\" (lo que operativamente significa iniciar directo con la dosis de mantenimiento sin impregnación).<br><br>Análisis de Distractores: La opción C es la dosis para menores de 75 años en fibrinólisis. La opción D es la carga agresiva reservada para intervencionismo percutáneo primario en adultos no senectos. La opción B carece de sustento en la norma.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 10), Página 80."
    },
    {
        id: 12,
        question: "¿Qué ajuste posológico es obligatorio al administrar terapia fibrinolítica con tenecteplase en pacientes mayores de 75 años?",
        options: ["Administrar en infusión continua", "Omitir bolo intravenoso inicial", "Duplicar la dosis ponderal", "Reducir la dosis a la mitad"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Infarto Agudo de Miocardio, el envejecimiento incrementa severamente la tasa de hemorragia intracraneal letal ante fibrinolíticos específicos para fibrina.<br><br>Perla ENARM: \"Cuadro 9. Terapia Fibrinolítica Intravenosa. Tenecteplase (TNK-tPA): Para mayores de 75 años reducir la dosis a la mitad\".<br><br>Análisis de Distractores: La opción A contradice el mecanismo del tenecteplase, que está diseñado específicamente para darse en bolo único. La opción B aplica para la enoxaparina en mayores de 75 años, no para el tenecteplase. La opción C empeoraría radicalmente el riesgo de muerte por sangrado.",
        source: "GPC-IMSS-357-21, Diagnóstico y Tratamiento del Infarto Agudo de Miocardio con Elevación del Segmento ST, 2021, Cuadros o Figuras (Cuadro 9), Página 79."
    },
    {
        id: 13,

                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-purple-100 dark:border-purple-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-400 dark:has-[:checked]:bg-purple-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-purple-600 dark:hover:bg-purple-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
