    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            </div>
        </div>
    </div>

    <script>
        const questionsData = [
    {
        id: 1,
        question: "En la prevención de la Ictericia Neonatal, ¿cuál es el factor nutricional con evidencia consistente que incrementa significativamente el riesgo de hiperbilirrubinemia?",
        options: ["Alimentación complementaria temprana", "Alimentación exclusiva con leche materna", "Alimentación con fórmula de inicio", "Ayuno durante las primeras 12 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, la ingesta exclusiva de seno materno en los primeros días se asocia con un tránsito intestinal lento, prolongando la circulación enterohepática del pigmento.<br><br>Perla ENARM: \"Hay evidencia consistente procedente de estudios de buena calidad que demuestran que son cuatro los factores asociados con un incremento en el riesgo de hiperbilirrubinemia: Edad gestacional menor de 38 semanas, Presencia de ictericia dentro de las primeras 24 horas de vida, Historia familiar de ictericia que requirió fototerapia, Alimentación exclusiva con leche materna\".<br><br>Análisis de Distractores: La fórmula láctea (C) y la alimentación temprana (A) aceleran el tránsito intestinal, disminuyendo la reabsorción. El ayuno (D) es un factor patológico de riesgo general pero la guía enfatiza epidemiológicamente la lactancia exclusiva como el principal factor nutricional de alto riesgo para requerir tratamiento.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Factores de riesgo, Página 14."
    },
    {
        id: 2,
        question: "En el tamizaje de Ictericia Neonatal con bilirrubinómetro transcutáneo, ¿a partir de qué nivel de corte se pierde la confiabilidad y se debe verificar obligatoriamente con prueba sérica?",
        options: [">5.8 mg/dl", ">8.8 mg/dl", ">11.7 mg/dl", ">14.7 mg/dl"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, los aparatos cutáneos dejan de ser clínicamente equivalentes en concentraciones altas de riesgo.<br><br>Perla ENARM: \"Si, una medición con el bilirrubinómetro transcutáneo indica un nivel de bilirrubina mayor de 14.7 mg/dl (250 μmol/l) se deberá verificar el resultado midiendo las bilirrubinas séricas\".<br><br>Análisis de Distractores: Las opciones 5.8 (A), 8.8 (B) y 11.7 (C) correlacionan con las zonas anatómicas de Kramer 1, 2 y 3, pero en este rango el dispositivo transcutáneo mantiene precisión operativa para tamizaje inicial.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 19."
    },
    {
        id: 3,
        question: "En el escrutinio diagnóstico de la Ictericia Neonatal, ¿cuál es el estudio considerado como estándar de oro para conocer el grado exacto del trastorno?",
        options: ["Bilirrubinometría transcutánea frontal", "Prueba de antiglobulina directa", "Medición de bilirrubinas séricas", "Cuantificación de reticulocitos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, toda decisión basada en nomogramas requiere el nivel absoluto en suero por su exactitud irrefutable ante la clínica limitante.<br><br>Perla ENARM: \"La determinación de bilirrubinas séricas es el 'estándar de oro' para conocer el grado de hiperbilirrubinemia\".<br><br>Análisis de Distractores: El método transcutáneo (A) es sólo escrutinio inicial. La prueba de Coombs (B) y reticulocitos (D) son vitales para identificar la etiología subyacente (isoinmunización), pero no para cuantificar la magnitud de la hiperbilirrubinemia per se.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 18."
    },
    {
        id: 4,
        question: "Al interpretar el perfil bioquímico en un paciente con Ictericia Neonatal, ¿qué práctica matemática está strictly contraindicada al tomar decisiones terapéuticas?",
        options: ["Restar la bilirrubina conjugada de la total", "Graficar niveles según edad gestacional", "Utilizar la bilirrubina total en nomogramas", "Calcular en miligramos en lugar de micromoles"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, los umbrales gráficos de neurotoxicidad que deciden inicio de lámpara o recambio se diseñaron considerando exclusivamente el peso total del pigmento sin descuentos.<br><br>Perla ENARM: \"No reste la bilirrubina conjugada de la bilirrubina sérica total cuando tome decisiones sobre el manejo de la hiperbilirrubinemia\".<br><br>Análisis de Distractores: Graficar por edad gestacional (B) y usar la bilirrubina total absoluta (C) son mandatos obligatorios. Las conversiones matemáticas de unidades (D) son irrelevantes mientras se use el nomograma correspondiente.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Tratamiento, Página 24."
    },
    {
        id: 5,
        question: "En la valoración clínica inicial de Ictericia Neonatal, ¿cuál es la utilidad normativa permitida para el uso de la escala de progresión de Kramer?",
        options: ["Indicar terapia lumínica múltiple", "Decidir suspensión de manejo", "Predecir neurotoxicidad cerebral", "Determinar presencia de ictericia"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, la apreciación cefalocaudal tiene variaciones masivas por tono de piel o inexperiencia, descalificándola como predictor analítico.<br><br>Perla ENARM: \"Se recomienda usar la escala de Kramer solo para determinar la ausencia o presencia de ictericia (sobre todo en primer nivel de atención)\".<br><br>Análisis de Distractores: Utilizar la simple visión para decidir lámparas (A), retirar tratamiento (B) o predecir toxicidad (C) es negligencia médica; estos pasos exigen niveles séricos exactos referenciados en gráficas por horas de vida.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Cuadros o figuras, Página 17."
    },
    {
        id: 6,
        question: "Si la exploración visual detecta Ictericia Neonatal evidente dentro de las primeras 24 horas de vida, ¿cuál es el tiempo máximo de urgencia para registrar los niveles en sangre?",
        options: ["Menos de 2 horas", "Menos de 6 horas", "Menos de 12 horas", "Menos de 24 horas"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, la pigmentación en el primer día es patológica obligatoria y advierte una hemólisis galopante inminente al kernicterus.<br><br>Perla ENARM: \"Mida y registre el nivel de bilirrubina sérica dentro de las siguientes dos horas\".<br><br>Análisis de Distractores: Medir a las 6 horas (B) es el seguimiento para un paciente ya en fototerapia. Demorar 12 o 24 horas (C, D) en el primer día de vida expone al neonato a falla terapéutica por retraso y daño cerebral irreversible.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 19."
    },
    {
        id: 7,
        question: "En el manejo de la Ictericia Neonatal, ¿cuál es la longitud de onda y el tipo lumínico que posee mayor eficacia física comprobada para alterar la molécula?",
        options: ["Luz verde de 520 nm", "Luz blanca de 600 nm", "Luz azul de 460 nm", "Luz ultravioleta de 350 nm"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, el pico de máxima absorción fotónica del pigmento cutáneo recae en el espectro azulado, isometrizando la molécula eficientemente.<br><br>Perla ENARM: \"La luz fluorescente y en especial la 'luz azul' es la más eficaz y debe ser utilizada cuando se requiere fototerapia intensiva... con longitud de onda de 460 nm absorbe la mayoría del pigmento\".<br><br>Análisis de Distractores: La luz verde (A) penetra pero causa fatiga extrema al personal de salud. La luz blanca (B) es útil pero menos eficaz que el espectro azul concentrado. La luz ultravioleta (D) está explícitamente contraindicada por riesgo letal de quemadura epidérmica.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Fototerapia, Página 25."
    },
    {
        id: 8,
        question: "En la Ictericia Neonatal con riesgo de daño encefalopático, al indicar exanguinotransfusión en un prematuro, ¿cuál es la constante empleada para el recambio de doble volumen?",
        options: ["70 ml/kg por 2", "80 ml/kg por 2", "90 ml/kg por 2", "100 ml/kg por 2"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, el volumen circulante ajustado difiere en la prematurez, exigiendo una cuota más alta para garantizar el barrido de 2 volemias completas.<br><br>Perla ENARM: \"El doble volumen para la exanguinotransfusión se calcula de la siguiente forma: Recién nacido pretermino (90ml/kg) x 2\".<br><br>Análisis de Distractores: 80 ml/kg (B) es la constante estricta para recién nacidos a término. Las constantes de 70 y 100 ml/kg (A, D) no figuran normativamente en el algoritmo de cálculo hemodinámico para esta enfermedad.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Exanguinotransfusión, Página 36."
    },
    {
        id: 9,
        question: "Para prevenir la inestabilidad hemodinámica letal durante una exanguinotransfusión por Ictericia Neonatal severa, ¿cuál es el ritmo de infusión normado?",
        options: ["1 a 2 ml/kg/min", "2 a 3 ml/kg/min", "4 a 5 ml/kg/min", "6 a 8 ml/kg/min"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, oscilaciones en la volemia comprometen el gasto cardíaco y la presión venosa central.<br><br>Perla ENARM: \"Estas oscilaciones se reducen si el recambio sanguíneo se realiza a una velocidad de 2-3 ml/kg/min\".<br><br>Análisis de Distractores: Una velocidad inferior (A) prologan innecesariamente el acto invasivo. Las tasas superiores a 3 ml/kg/min (C, D) inducen falla de bomba aguda por cambios súbitos de precarga en la aurícula derecha.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Exanguinotransfusión, Página 35."
    },
    {
        id: 10,
        question: "En la monitorización seriada por Ictericia Neonatal, ¿qué disminución sérica obligatoria dictamina el retiro absoluto de las lámparas de luz?",
        options: ["Caer debajo del umbral inicial", "Caída del cincuenta por ciento", "Menos de 2.92 mg/dl del umbral", "Reducción a percentil cincuenta"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, la fisiología advierte un rebote inherente tras cesar el estímulo, por lo que apagar la lámpara al primer contacto con el límite expone a retorno rápido a la toxicidad.<br><br>Perla ENARM: \"Detenga la fototerapia una vez que la bilirrubina sérica haya descendido a un nivel al menos 2.92 mg/dl (50 μmol/l) por debajo del umbral para inicio de fototerapia\".<br><br>Análisis de Distractores: Detener apenas tocando el umbral (A) carece de margen de seguridad. Las cifras porcentuales absolutas o rangos poblacionales (B, D) ignoran el peso relativo a las horas de vida del paciente particular.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Auxiliares diagnósticos, Página 21."
    },
    {
        id: 11,
        question: "En el espectro crónico grave de la Ictericia Neonatal (Kernicterus), ¿cuál es el sitio anatómico focal de depósito de pigmento documentado anatomopatológicamente?",
        options: ["Globo pálido", "Médula espinal", "Cerebelo anterior", "Lóbulo prefrontal"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, la toxicidad indirecta predilecta la invasión directa y destructiva en los ganglios basales motores, generando atetosis permanente.<br><br>Perla ENARM: \"La bilirrubina se deposita principalmente, que en una parte del cerebro conocida como globo pálido. En el examen anatomopatológico del cerebro se reconoce por la tinción amarilla que produce\".<br><br>Análisis de Distractores: La médula, cerebelo o regiones prefrontales (B, C, D) se ven afectadas en intoxicaciones difusas, pero la lesión patognomónica central descrita y priorizada por la evidencia recae strictly en el globo pálido.",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Daño neurológico por hiperbilirrubinemia, Página 41."
    },
    {
        id: 12,
        question: "Según los criterios cinéticos de la Ictericia Neonatal, ¿qué incremento sérico exige iniciar fototerapia múltiple continua de inmediato?",
        options: ["Mayor a 0.1 mg/dl/hora", "Mayor a 0.2 mg/dl/hora", "Mayor a 0.5 mg/dl/hora", "Mayor a 0.9 mg/dl/hora"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Ictericia Neonatal, una velocidad superior marca una hemólisis severa incontrolable, por lo que la lámpara sencilla fracasará inevitablemente.<br><br>Perla ENARM: \"Se recomienda iniciar fototerapia múltiple en todos los recién nacidos con alguna de las siguientes condiciones: Bilirrubinas séricas aumentando rápidamente, más de 0.5 mg/dl/hora\".<br><br>Análisis de Distractores: Incrementos leves como 0.1 o 0.2 (A, B) son esperados fisiológicamente y responden a esquema simple. Valores casi de un miligramo entero (D) son letales y ya justifican el pase directo a recambio masivo (exanguinotransfusión).",
        source: "GPC-IMSS-262-19, Diagnóstico y Tratamiento de la Ictericia Neonatal, 2019, Sección: Fototerapia, Página 31."
    },
    {
        id: 13,
        question: "En un neonato con Ictericia Neonatal y niveles límite, ¿qué manifestación clínica indica exanguinotransfusión urgente independientemente de los nomogramas?",

                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('26219Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('26219LastQId', currentQuestionId);
                else localStorage.removeItem('26219LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('26219Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</body>
</html>
