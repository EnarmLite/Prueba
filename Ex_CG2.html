            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>

                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>

    <script>
        const questionsData = [
            {
                id: 1, 
                question: "En el tamizaje de Cáncer de Próstata, ¿cuál es el nivel de Antígeno Prostático Específico (APE) inicial que integra el diagnóstico presuntivo y obliga a repetir la prueba en 1 a 3 meses?", 
                options: ["Mayor a 2.5 ng/ml.", "Mayor a 5.5 ng/ml.", "Mayor a 3.0 ng/ml.", "Mayor a 4.0 ng/ml."], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Prevención y detección temprana del cáncer de próstata, un nivel por encima de este umbral no es indicativo de biopsia inmediata, sino que requiere confirmación temporal para descartar elevaciones benignas o transitorias (como prostatitis).<br><br>Perla ENARM: \"A los hombres de 50 a 69 años de edad, con riesgo promedio y con resultado del APE inicial mayor a 3.0 ng/ml, se les debe repetir la cuantificación sérica de APE de 1 a 3 meses después del resultado inicial.\"<br><br>Análisis de Distractores: La opción A (2.5 ng/ml) es el umbral para acortar el seguimiento a un año. La opción B (5.5 ng/ml) es el corte de la prueba repetida que obliga al envío directo a biopsia. La opción D es un valor ficticio en este paso del algoritmo.", 
                source: "GPC IMSS-021-18, Prevención y detección temprana del cáncer de próstata en el primer nivel de atención, 2018, Evidencias y Recomendaciones, p. 24." 
            },
            {
                id: 2,
                question: "Qué hallazgo clínico constituye el criterio principal para sospechar una Infección de Sitio Quirúrgico (ISQ) de acuerdo con la GPC",
                options: [
                    "Aislamiento por cultivo negativo",
                    "Salida de material purulento",
                    "Dehiscencia profunda sin dolor",
                    "Albúmina sérica muy baja"
                ],
                answer: 1,
                justification: "El diagnóstico de esta patología es eminentemente clínico y se basa en la observación directa de la herida. De acuerdo a la GPC de Prevención de Infección Quirúrgica, no es imperativo contar con un cultivo positivo para iniciar el manejo si la clínica es franca.<br><br>Perla ENARM: \"Se recomienda hacer el diagnóstico basado en la profundidad de afectación y en los datos clínicos: presencia de descarga purulenta, identificación del microorganismo por cultivo, datos clínicos de inflamación (dolor, hipersensibilidad, inflamación localizada, rubor, calor)\".<br><br>Análisis de Distractores: El aislamiento por cultivo negativo (A) no integra el diagnóstico a menos que el cirujano reabra la herida deliberadamente; la dehiscencia (C) es un criterio, pero se acompaña de síntomas como fiebre o dolor; y la albúmina sérica (D) es un factor nutricional que la GPC explícitamente prohíbe usar para retrasar la cirugía, no es un criterio diagnóstico.",
                source: "GPC-IMSS-827-18, Prevención y diagnóstico de la infección del sitio quirúrgico, 2018, Evidencias y Recomendaciones, Página 24."
            },
            {
                id: 3, 
                question: "En la sospecha de cáncer de testículo, ¿cuál es el signo clínico que integra el diagnóstico presuntivo principal?", 
                options: ["Dolor escrotal agudo intenso", "Aumento de volumen indoloro", "Sensación de pesantez bilateral", "Adenopatías inguinales dolorosas palpables"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Cáncer de Testículo, la presentación clásica que debe alertar al médico de primer contacto es una masa testicular sólida y dura que no genera dolor al palparse. El dolor agudo es característico de patologías inflamatorias o isquémicas (torsión testicular, epididimitis).<br><br>Perla ENARM: \"Se debe buscar durante la exploración física del paciente con sospecha de cáncer testicular: aumento del volumen testicular (habitualmente unilateral y no doloroso)...\".<br><br>Análisis de Distractores: El dolor escrotal agudo orienta a torsión testicular o proceso infeccioso agudo. La pesantez puede existir, pero el signo pivote es la masa indolora. Las adenopatías inguinales son extremadamente raras en etapas iniciales porque el drenaje linfático testicular va hacia el retroperitoneo, no a la región inguinal.", 
                source: "GPC SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Evidencias y Recomendaciones, Página 14." 
            },
            {
                id: 4, 
                question: "En un paciente postoperado de amputación de extremidad inferior, ¿cuál es el hallazgo clínico en la exploración física que integra el diagnóstico presuntivo de un muñón ideal para protetización?", 
                options: ["Forma cilíndrica uniforme", "Forma cónica o semicónica", "Edema moderado con fóvea", "Presencia de hiperemia distal"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Amputación de Extremidad Inferior, la evaluación clínica del muñón es el primer paso para una rehabilitación exitosa. Un muñón ideal debe garantizar la distribución adecuada de cargas y la adaptación al socket sin generar zonas de presión excesiva que deriven en úlceras. Fisiopatológicamente, la forma cónica facilita el acoplamiento tridimensional y evita el conflicto de volumen.<br><br>Perla ENARM: \"Entre las características del muñón ideal se incluye presentar una forma cónica o semicónica, además de un revestimiento cutáneo bien nutrido, ausencia de edema severo y una cicatriz correcta.\"<br><br>Análisis de Distractores: La forma cilíndrica (Opción A) dificulta el encaje y la suspensión por falta de un gradiente de presión. El edema (Opción C) y la hiperemia (Opción D) son signos de inmadurez del muñón o inflamación aguda que contraindican la toma del molde protésico inicial.", 
                source: "GPC-SNDIF-257-21, Rehabilitación interdisciplinaria en personas de 18 a 59 años con amputación de extremidad inferior, 2021, Evaluación Inicial, Página 15." 
            },
            {
                id: 5, 
                question: "En la sospecha de cáncer de próstata, ¿cuál es el hallazgo clínico o de laboratorio que indica de manera absoluta realizar una biopsia transrectal?", 
                options: ["Antígeno Prostático > 10 ng/ml", "Velocidad de Antígeno > 0.75", "Antígeno Prostático 4-10 ng/ml", "Edad mayor a 65 años"], 
                answer: 0, 
                justification: "De acuerdo a la Guía de Práctica Clínica de Cáncer de Próstata, la decisión de realizar un procedimiento invasivo no debe tomarse a la ligera y requiere parámetros definidos para evitar sobretratamientos o complicaciones innecesarias. Un valor confirmatorio elevado, descartando causas benignas (infección, trauma), es criterio absoluto para avanzar a la histología.<br><br>Perla ENARM: Es recomendable realizar biopsia transrectal a pacientes con tacto rectal anormal o Antígeno Prostático Específico mayor de 10 ng/ml confirmado (sin factores que condicionen elevación por otra causa diferente al cáncer de próstata).<br><br>Análisis de Distractores: La opción B y C requieren estratificación de riesgo adicional o hallazgos agregados (como el porcentaje de fracción libre o tacto anormal) antes de biopsiar. La opción D es un factor de riesgo epidemiológico, no una indicación absoluta de biopsia.", 
                source: "GPC-IMSS-140-18, Diagnóstico y Tratamiento del Cáncer de Próstata, 2018, Diagnóstico, Página 15." 
            },
            {
                id: 6, 
                question: "En un paciente con síntomas del tracto urinario inferior por sospecha de crecimiento prostático benigno, ¿cuál es la maniobra clínica indispensable para integrar el diagnóstico presuntivo según la GPC?", 
                options: ["Medición de antígeno prostático", "Tacto rectal digital", "Ultrasonido prostático transabdominal", "Uroflujometría con orina residual"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de STUI asociados a Crecimiento Prostático, la evaluación inicial se centra en una historia clínica detallada y la exploración física dirigida. El examen digital permite estimar el volumen prostático, forma, consistencia y la presencia de nódulos sugestivos de malignidad.<br><br>Perla ENARM: \"Se debe realizar el examen rectal digital a todo aquel paciente con STUI.\"<br><br>Análisis de Distractores: El antígeno prostático (A) y la uroflujometría (D) son estudios de apoyo o seguimiento que no sustituyen la exploración física inicial obligatoria. El ultrasonido (C) permite una estimación de volumen más precisa, pero el tacto rectal es el filtro inicial costo-efectivo indispensable.", 
                source: "IMSS-176-06, Diagnóstico y Tratamiento de STUI asociados a Crecimiento Prostático, 2018, Evaluación inicial, p. 16." 
            },
            {
                id: 7, 
                question: "En el primer evento clínico de Nefrolitiasis, ¿cuál es el estudio de laboratorio sérico indicado para el abordaje diagnóstico inicial además de la creatinina y el ácido úrico?", 
                options: ["Magnesio sérico", "Calcio ionizado", "Oxalato sérico", "Fósforo inorgánico"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Nefrolitiasis en adultos, el abordaje diagnóstico basal en el primer evento de la enfermedad debe incluir obligatoriamente el examen general de orina, creatinina sérica, ácido úrico sérico y calcio ionizado, además del análisis del lito. Las otras opciones son parámetros que se evalúan en estudios metabólicos avanzados, no en el tamizaje inicial general.<br><br>Perla ENARM: Después del primer evento de litiasis, cada paciente se clasifica adecuadamente mediante un análisis básico que incluye examen general de orina, creatinina sérica, ácido úrico y calcio ionizado.<br><br>Análisis de Distractores: El magnesio, oxalato y fósforo son iones que se cuantifican en recolecciones de orina de 24 horas durante la evaluación metabólica específica en pacientes de alto riesgo, no en el escrutinio inicial primario.", 
                source: "GPC SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, Página 19." 
            },
            {
                id: 8, 
                question: "En el seguimiento de un paciente postoperado de cirugía bariátrica por obesidad mórbida, ¿cuál es el signo clínico o antecedente patológico que obliga a iniciar empíricamente la reposición inmediata de tiamina según la GPC?", 
                options: ["Anemia megaloblástica no ferropénica.", "Pica y disgeusia significativa.", "Vómitos persistentes y severos.", "Pérdida masiva de cabello."], 
                answer: 2, 
                justification: "De acuerdo a la GPC de Tratamiento quirúrgico de la obesidad, la neuropatía por deficiencia aguda de tiamina (Wernicke) es una urgencia neurológica; la intolerancia a la vía oral y la émesis frecuente son los gatillos principales. La reposición no debe esperar a niveles séricos de laboratorio.<br><br>Perla ENARM: \"La suplementación con tiamina oral o parenteral debe comenzar con oportunidad en los pacientes que presentan vómitos persistentes, lo suficientemente graves como para interferir con la nutrición regular, incluso en ausencia o antes de datos confirmatorios de laboratorio\".<br><br>Análisis de Distractores: La pica, disgeusia y pérdida de cabello obligan a investigar deficiencia de zinc. La anemia megaloblástica orienta primariamente a un déficit de vitamina B12 o ácido fólico, los cuales no requieren tratamiento empírico inmediato sin estudios de confirmación en este contexto.", 
                source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Evidencias y Recomendaciones, Página 32." 
            },
            {
                id: 9, 
                question: "En un paciente adulto con cirrosis, ¿cuál es el hallazgo por ultrasonido que integra el diagnóstico presuntivo de Hepatocarcinoma para solicitar una imagen dinámica?", 
                options: ["Nódulo menor a 1 cm", "Nódulo mayor de 1 cm", "Múltiples quistes simples", "Engrosamiento de la vesícula"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Hepatocarcinoma, el tamaño de la lesión detectada en el tamizaje inicial dicta el abordaje. Un nódulo menor a 1 cm obliga a vigilancia estrecha en 6 meses, pero un nódulo que supera este límite requiere confirmación radiológica inmediata debido a la alta probabilidad de malignidad en un hígado enfermo.<br><br>Perla ENARM: \"En pacientes con hígado cirrótico o antecedentes de hepatitis B o C y un nódulo mayor de 1 cm por ultrasonido, realizar TAC o RM para confirmación diagnóstica\".<br><br>Análisis de Distractores: El nódulo menor a 1 cm (A) solo indica repetir el ultrasonido en 6 meses sin pasar a tomografía de inmediato. Los quistes simples (C) son lesiones benignas anecoicas. El engrosamiento (D) es un dato de colecistopatía o inflamación, no sugestivo primariamente de hepatocarcinoma.", 
                source: "GPC-SS-582-19, Prevención, diagnóstico y tratamiento del hepatocarcinoma, 2019, Anexos (Algoritmo 2), Página 50." 
            },
            {
                id: 10, 
                question: "En el abordaje del Cólico Renoureteral agudo, ¿cuál es el hallazgo paraclínico inicial que apoya el diagnóstico presuntivo clínico según la GPC?", 
                options: ["Leucocitosis mayor a 12,000", "Hematuria macro o microscópica", "Nitritos positivos en orina", "Proteinuria en rango nefrótico"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Cólico Renoureteral, el dolor severo en flanco se acompaña frecuentemente de sangre en la orina. La hematuria tiene una sensibilidad diagnóstica inicial del 95% en los primeros días del cuadro agudo.<br><br>Perla ENARM: \"Se debe solicitar examen general de orina a los pacientes que se presentan al servicio de urgencias con cuadro de cólico renoureteral como estudio de apoyo para descartar la presencia de infección y hematuria, y si no se cuenta con él, se solicitará estudio con tira reactiva\".<br><br>Análisis de Distractores: La leucocitosis (A) y los nitritos positivos (C) orientan a una complicación por infección de vías urinarias (urosepsis), no al diagnóstico presuntivo per se del lito. La proteinuria (D) no es un hallazgo patognomónico o esperado en urolitiasis aguda.", 
                source: "GPC-IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Evidencias y Recomendaciones, Página 19." 
            },
            {
                id: 11,
                question: "En la Cirugía de Control de Daños por trauma abdominal por proyectil de arma de fuego, ¿cuál es el hallazgo de laboratorio transoperatorio que integra el diagnóstico objetivo fisiológico para su institución inmediata según la GPC?",
                options: [
                    "Lactato sérico mayor a 1.5 mEq/L",
                    "Bicarbonato sérico menor a 15 mEq/L",
                    "Déficit de base menor a -5.0 mEq/L",
                    "Fibrinógeno sérico menor a 100 mg/dL"
                ],
                answer: 1,

                question: "¿Cuál es el fármaco indicado específicamente como terapia adjunta para evitar progresión en pacientes con Nefrolitiasis por infección y pH urinario mayor a 6.8?", 
                options: ["L-metionina oral", "Ácido acetohidroxámico", "Citrato alcalino", "Bicarbonato de sodio"], 
                answer: 1, 
                justification: "De acuerdo a la GPC de Nefrolitiasis en adultos, cuando el tratamiento erradicador con antibióticos y cirugía se dificulta, se utilizan inhibidores químicos de la enzima bacteriana para evitar la alcalinización patológica.<br><br>Perla ENARM: Para el manejo de litos asociados a infección, se indica el uso de inhibidores de ureasa como el ácido acetohidroxámico a dosis de 15mg/kg/d.<br><br>Análisis de Distractores: La L-metionina oral se usa para acidificar orina en cálculos puros de fosfato de calcio. El citrato alcalino y bicarbonato empeorarían el problema, pues su objetivo es alcalinizar aún más la orina.", 
                source: "GPC SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Figura 4, Página 33." 
            },
            {
                id: 30, 
                question: "Ante la sospecha clínica de síntomas del tracto urinario inferior asociados a crecimiento prostático en un hombre de 60 años, ¿cuál es el primer estudio de laboratorio que debe solicitarse en el abordaje inicial según la GPC?", 
                options: ["Examen general de orina", "Creatinina sérica basal", "Antígeno prostático específico", "Cultivo de secreción prostática"], 
                answer: 0, 
                justification: "De acuerdo a la GPC de STUI asociados a Crecimiento Prostático, la prueba inicial más inocua y costo-efectiva es el examen de orina. Su objetivo principal es hacer un diagnóstico diferencial de forma temprana con diabetes, obstrucción vesical, infecciones o microhematuria.<br><br>Perla ENARM: \"Se recomienda hacer un examen general de orina con microscopía a todo hombre con STUI.\"<br><br>Análisis de Distractores: La creatinina sérica (B) solo se solicita si hay sospecha de daño renal (vejiga palpable, litiasis). El antígeno prostático específico (C) no se usa como escrutinio general, sino de forma individualizada si cambiará el manejo. El cultivo (D) se reserva para sospecha de prostatitis crónica.", 
                source: "IMSS-176-06, Diagnóstico y Tratamiento de STUI asociados a Crecimiento Prostático, 2018, Diagnóstico, p. 18." 
            }                       
        ];
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('ECG30LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ECG30Progress');
                localStorage.removeItem('ECG30LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-teal-500 shadow-md z-10 border-teal-500 dark:border-teal-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">

                                    </div>

                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>

                    </div>

                                <svg class="w-5 h-5 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

                            </div>

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ECG30Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ECG30LastQId', currentQuestionId);
                else localStorage.removeItem('ECG30LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ECG30Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
