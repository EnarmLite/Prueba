    <script>
        const questionsData = [
    {
        id: 1,
        question: "En la etiopatogenia del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿cuál es el mecanismo fisiopatológico principal causante del colapso alveolar?",
        options: ["Aspiración de líquido meconial", "Hiperplasia del ventrículo izquierdo", "Deficiencia pulmonar de surfactante", "Retención de líquido pulmonar"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la inmadurez de los neumocitos tipo II genera una deficiencia cuantitativa y cualitativa de surfactante (fosfolípidos y proteínas), lo que incrementa la tensión superficial y provoca el colapso de los alvéolos al final de la espiración, alterando el intercambio gaseoso.<br><br>Perla ENARM: \"El Síndrome de Dificultad Respiratoria (SDR) es la causa más frecuente de insuficiencia respiratoria en el recién nacido prematuro (RNP) por deficiencia de surfactante.\"<br><br>Análisis de Distractores: La retención de líquido pulmonar (opción D) es el mecanismo de la taquipnea transitoria. La aspiración de líquido meconial (opción A) ocluye vías aéreas en neonatos a término. La hipoplasia del ventrículo izquierdo (opción B) es estructural y no alveolar.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Introducción, Página 11."
    },
    {
        id: 2,
        question: "En la prevención primaria del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿cuál es el esquema de maduración pulmonar materno de primera elección en amenaza de parto prematuro?",
        options: ["Betametasona 12 mg de forma intravenosa", "Dexametasona 6 mg de forma intramuscular", "Sulfato de magnesio 4 g intravenoso", "Indometacina 100 mg por vía rectal"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la administración de corticosteroides a la madre acelera la maduración pulmonar fetal induciendo la síntesis de surfactante. El esquema recomendado es la dexametasona intramuscular dividida en 4 dosis.<br><br>Perla ENARM: \"Dexametasona intramuscular 4 dosis de 6 mg con espacio de administración de 12 horas. Un solo ciclo de corticosteroides prenatales en mujeres con amenaza de parto prematuro acelera la maduración pulmonar del feto.\"<br><br>Análisis de Distractores: El sulfato de magnesio (opción C) se emplea para neuroprotección fetal, no para maduración pulmonar. La betametasona (opción A) exige la vía intramuscular, no la intravenosa. La indometacina (opción D) es tocolítico.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Factores Protectores, Página 17."
    },
    {
        id: 3,
        question: "En el diagnóstico clínico del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿cuáles son los signos cardinales presentes típicamente desde los primeros minutos de vida?",
        options: ["Estridor inspiratorio y tos", "Quejido espiratorio y cianosis", "Estertores y sibilancias difusas", "Abdomen escafoide y ruidos hidroaéreos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, el cuadro clínico clásico se instaura de forma temprana con signos progresivos de falla ventilatoria, incluyendo taquipnea, incremento del trabajo respiratorio (aleteo nasal, retracción xifoidea), cianosis central y quejido espiratorio.<br><br>Perla ENARM: \"La dificultad respiratoria puede presentarse desde los primeros minutos de vida y progresar en las siguientes 24 a 48 horas. Los signos que se presentan son: Taquipnea, Quejido espiratorio, Incremento del trabajo respiratorio, Cianosis, Apnea.\"<br><br>Análisis de Distractores: Las sibilancias (opción C) reflejan obstrucción bronquial. El estridor y tos (opción A) son típicos de laringotraqueítis (Crup). El abdomen escafoide (opción D) delata una hernia diafragmática congénita.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Cuadro Clínico, Página 18."
    },
    {
        id: 4,
        question: "Durante la estabilización en sala de partos del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿cuál es la presión inicial exacta para iniciar la presión positiva continua (CPAPn)?",
        options: ["4 cm H2O", "6 cm H2O", "8 cm H2O", "10 cm H2O"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la intervención primordial ante la presencia de esfuerzo respiratorio espontáneo es el soporte no invasivo temprano para mantener la capacidad residual funcional, estandarizando la presión basal inicial para optimizar el reclutamiento sin causar barotrauma agudo.<br><br>Perla ENARM: \"Iniciar CPAP en los primeros 15 min de vida con: Presión de 6 cm H2O.\"<br><br>Análisis de Distractores: Una presión de 4 cm H2O (opción A) es insuficiente para reclutar alvéolos colapsados. Presiones de 8 o 10 cm H2O (opciones C y D) se titulan ante falla progresiva, pero no corresponden al valor inicial normado.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Diagrama de Flujo 1, Página 87."
    },
    {
        id: 5,
        question: "Para prevenir complicaciones por pérdida de calor en el Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿cuál es el límite de edad gestacional para introducir al paciente en una bolsa de polietileno sin secado previo?",
        options: ["menor de 34 semanas", "menor de 32 semanas", "menor de 30 semanas", "menor de 28 semanas"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la hipotermia aguda inhibe la síntesis de surfactante y aumenta el consumo de oxígeno. En los prematuros extremos, el tejido adiposo pardo es nulo y la epidermis es inmadura, por lo que el secado convencional es insuficiente y la envoltura plástica inmediata es la recomendación normativa.<br><br>Perla ENARM: \"Después del nacimiento el recién nacido menor de 28 SEG debe colocarse en una bolsa de polietileno transparente y debajo de una cuna de calor radiante.\"<br><br>Análisis de Distractores: Las edades gestacionales menores a 34, 32 y 30 semanas (opciones A, B y C) corresponden a prematuros moderados o tardíos donde el secado convencional con campos precalentados suele ser suficiente.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Estabilización en sala de parto, Página 27."
    },
    {
        id: 6,
        question: "En la de estabilización temprana de la dificultad respiratoria en un recién nacido menor de 32 semanas, ¿cuál es la meta exacta de de saturación de oxígeno a los 5 minutos de de vida?",
        options: ["≥ 95 %", "≥ 90 %", "≥ 80 %", "≥ 70 %"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la transición fisiológica de la oxigenación es gradual. Forzar una saturación superior al 90% en los primeros minutos causa daño oxidativo masivo. Alcanzar al menos 80% al quinto minuto es el marcador de éxito en la adaptación sin inducir toxicidad.<br><br>Perla ENARM: \"En RNP <32 SEG se debe alcanzar SpO2 ≥80% y FC >100/min en un plazo de 5 min. después del nacimiento.\"<br><br>Análisis de Distractores: Las metas ≥ 95% (opción A) o ≥ 90% (opción B) al quinto minuto indican hiperoxia asociada a retinopatía del prematuro. Una saturación del 70% (opción D) es aceptable al minuto 2 o 3, pero baja al minuto 5.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Estabilización en sala de parto, Página 32."
    },
    {
        id: 7,
        question: "Utilizando la clasificación radiológica del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿qué hallazgo anatómico define específicamente al estadio II (moderado)?",
        options: ["Broncograma aéreo discreto", "Broncograma sobrepasa silueta cardíaca", "Borramiento total de hemidiafragmas", "Ausencia total de aire pulmonar"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la escala de severidad radiológica es progresiva. El estadio II se diferencia del I por la extensión del daño alveolar, haciendo que el broncograma aéreo sea muy visible rebasando los límites mediastínicos y proyectándose hacia el parénquima.<br><br>Perla ENARM: \"Estadio II (Moderada) - La imagen reticulogranular se extiende a través de todo el campo pulmonar. Broncograma aéreo muy visible y sobrepasa los límites de la silueta cardíaca.\"<br><br>Análisis de Distractores: El broncograma discreto (opción A) es propio del estadio I (leve). El borramiento total diafragmático y pulmón blanco (opciones C y D) describen el estadio IV (muy grave).",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Auxiliares Diagnósticos, Página 20."
    },
    {
        id: 8,
        question: "En el manejo no invasivo del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿qué requerimiento de fracción inspirada de oxígeno (FiO2) determina falla terapéutica e indicación para aplicar surfactante?",
        options: ["≥ 21 %", "≥ 30 %", "≥ 40 %", "≥ 50 %"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, la necesidad precoz de superar el 30% de aporte de oxígeno suplementario bajo presión continua demuestra el fracaso de la ventilación no invasiva aislada, justificando la terapia de reemplazo para evitar el progreso a ventilación mecánica prolongada.<br><br>Perla ENARM: \"Se recomienda administrar surfactante en los RNP que tienen una o más de las siguientes condiciones: Necesidad de aumento en los parámetros de CPAPn: 1. FiO2 ≥30%, 2. Presión ≥ 8 cm H2O.\"<br><br>Análisis de Distractores: Esperar requerimientos de 40% (opción C) o 50% (opción D) retrasa la instilación y perpetúa la inflamación por atelectotrauma. Un nivel del 21% (opción A) es la concentración ambiental base (éxito).",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Surfactante, Página 43."
    },
    {
        id: 9,
        question: "En la terapia de reemplazo del Síndrome de Dificultad Respiratoria del recién nacido prematuro, ¿cuál es el fármaco y la dosis inicial de primera elección recomendada?",
        options: ["Poractant alfa 200 mg/kg", "Beractant 100 mg/kg", "Calfactant 105 mg/kg", "Poractant alfa 100 mg/kg"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, el surfactante porcino administrado a dosis altas (200 mg/kg) optimiza la vida media del fármaco en el alvéolo y se asocia estadísticamente con menores tasas de redosificación y mortalidad respecto a las preparaciones bovinas o dosis estándar.<br><br>Perla ENARM: \"Recomendaciones para la Administración de la primera dosis de Surfactante: Primera opción 200 mg/kg/dosis Poractant alfa (2.5 ml/Kg).\"<br><br>Análisis de Distractores: Beractant a 100 mg/kg (opción B) y Poractant alfa a 100 mg/kg (opción D) están clasificados específicamente como esquemas de segunda opción. Calfactant (opción C) no es superior a Poractant.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Surfactante, Página 48."
    },
    {
        id: 10,
        question: "En el esquema de de redosificación de la de dificultad respiratoria del prematuro, ¿cuál es la de dosis acumulativa de máxima de permitida de surfactante exógeno?",
        options: ["200 mg/kg", "300 mg/kg", "400 mg/kg", "600 mg/kg"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, el volumen hídrico instilado y la carga proteica extrínseca limitan la cantidad total segura a administrar, fraccionándose habitualmente en una dosis inicial fuerte (200) y hasta dos de rescate (100 c/u).<br><br>Perla ENARM: \"La administración de una segunda y tercera dosis de surfactante debe guiarse por la recomendación de dosis acumulativa máxima de 400mg/kg.\"<br><br>Análisis de Distractores: Un límite menor (opciones A y B) infratrataría al neonato privándolo de rescates. Una dosis de 600 mg/kg (opción D) excede el volumen alveolar seguro, promoviendo edema pulmonar e interrupción obstructiva física.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Surfactante, Página 51."
    },
    {
        id: 11,
        question: "En el de tratamiento de la de dificultad respiratoria del prematuro, ¿cuál es la de indicación precisa de para la de administración de del citrato de de cafeína respecto de a la de técnica LISA?",
        options: ["Iniciar 24 horas después", "Iniciar posterior a extubación", "Iniciar previo al surfactante", "Iniciar solo ante apnea"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Síndrome de Dificultad Respiratoria, para el éxito de los métodos de instilación mínimamente invasivos que evitan la intubación y ventilación con presión (LISA o InSurE), es indispensable maximizar el estímulo del centro respiratorio de forma anticipada.<br><br>Perla ENARM: \"Cafeína - Iniciar antes si se aplica surfactante con técnica LISA o InSurE.\"<br><br>Análisis de Distractores: Iniciar el citrato horas después (opción A), posterior a una extubación tardía (opción B) o como rescate reactivo (opción D) desprotege la vía aérea del paciente, propiciando apneas durante el procedimiento de cateterismo glótico.",
        source: "GPC IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Diagrama de Flujo 2, Página 88."
    },
    {
        id: 12,
        question: "En el de paciente con de dificultad respiratoria de que mantiene de esfuerzo respiratorio espontáneo, ¿cuál es la de técnica de de primera elección de para la de instilación de de surfactante?",

                            <!-- Tarjeta de Estadísticas Modificada -->
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col sm:flex-row items-center shadow-2xl w-full lg:max-w-md">
                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('13721Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('13721LastQId', currentQuestionId);
                else localStorage.removeItem('13721LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('13721Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
