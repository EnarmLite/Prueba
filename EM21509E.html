    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el procedimiento quirúrgico de elección recomendado para pacientes con nefrolitiasis y litos menores a 2 cm?",
        options: ["Nefrolitotomía percutánea", "Cirugía intrarrenal retrógrada", "Litotripsia extracorpórea", "Nefrectomía parcial"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, el tamaño del lito dicta la vía de abordaje, prefiriendo técnicas menos invasivas retrógradas cuando la masa litiásica no excede los 2 cm. La percutánea o Mini-Perc se dejan para litos de mayor tamaño.<br><br>Perla ENARM: Se recomienda realizar cirugía intrarenal retrógrada o ureteroscopia flexible en pacientes con nefrolitiasis con litos menores a 2 cm, cuando se cuente con los recursos necesarios.<br><br>Análisis de Distractores: La nefrolitotomía percutánea se reserva para litos complejos mayores a 2 cm. La litotripsia extracorpórea no es la primera recomendación principal del algoritmo de la GPC para este corte anatómico exacto. La nefrectomía es un manejo radical no justificado para litiasis simple.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Anexos, 37."
    },
    {
        id: 2,
        question: "¿Cuál es la indicación dietética respecto al consumo diario de sodio para la prevención de recurrencia en nefrolitiasis?",
        options: ["Menos de 2 g al día", "Menos de 4 g al día", "Menos de 6 g al día", "Dieta libre de sodio"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, la ingesta elevada de sodio incrementa la excreción de calcio urinario por arrastre tubular, por lo que su restricción moderada disminuye el riesgo de cristalización de sales de calcio. Una restricción más estricta afectaría el apego terapéutico sin evidencia de mayor beneficio claro.<br><br>Perla ENARM: Se sugiere una dieta con menos de 4 g al día de sodio en pacientes con nefrolitiasis.<br><br>Análisis de Distractores: Una dieta menor a 2 g o completamente libre de sodio disminuye dramáticamente el apego nutricional del paciente y no es la meta específica establecida. El consumo de 6 g excede ampliamente el umbral de protección litiásica recomendado.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 21."
    },
    {
        id: 3,
        question: "¿Cuál es la cantidad de proteínas de origen animal recomendada diariamente en pacientes formadores de litos?",
        options: ["0.4 a 0.6 g/kg", "0.8 a 1 g/kg", "1.2 a 1.5 g/kg", "1.5 a 2 g/kg"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, el exceso de purinas proveniente de proteínas animales provee una carga ácida que disminuye el pH urinario y aumenta la excreción urinaria de ácido úrico y calcio, promoviendo la litogénesis.<br><br>Perla ENARM: Se sugiere ingesta de 0.8 a 1 g/kg/día de proteínas de origen animal en pacientes con nefrolitiasis.<br><br>Análisis de Distractores: Valores menores a 0.8 g/kg predisponen al paciente a desnutrición proteico-calórica a largo plazo. Valores superiores a 1.2 o 1.5 g/kg incrementan progresivamente el riesgo metabólico de recurrencia por acidosis metabólica leve y uricosuria.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 21."
    },
    {
        id: 4,
        question: "¿Qué técnica diagnóstica es la indicada como escrutinio inicial para determinar la composición de un lito tras su expulsión?",
        options: ["Análisis químico cualitativo", "Espectroscopia infrarroja", "Cristalografía óptica simple", "Tomografía axial computarizada"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, la identificación exacta de la estructura mineral es obligatoria para clasificar correctamente al paciente y dictar la terapia metabólica a seguir, requiriendo métodos de alta precisión física para evitar errores.<br><br>Perla ENARM: Después del primer evento de litiasis, cada paciente se clasifica adecuadamente y se analiza el lito por espectroscopia infrarroja o difracción por rayos X.<br><br>Análisis de Distractores: El análisis químico cualitativo o la cristalografía óptica tienen una alta tasa de error y ya no están normados en el flujograma diagnóstico inicial. La tomografía permite identificar la presencia del cálculo in vivo, pero no su composición química detallada ex vivo.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 19."
    },
    {
        id: 5,
        question: "¿Cuántos días deben transcurrir como mínimo tras un cuadro agudo para realizar una recolección metabólica de orina confiable?",
        options: ["5 días", "10 días", "20 días", "30 días"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, la recolección de orina requiere que el paciente retome su estado fisiológico, dieta habitual y resuelva la inflamación post-obstructiva aguda para evitar falsas alteraciones o retención de solutos evaluados.<br><br>Perla ENARM: Para el abordaje metabólico inicial las GPC sugieren que los pacientes lleven su dieta habitual y que hayan transcurrido 20 días del último episodio de litiasis.<br><br>Análisis de Distractores: Realizar el estudio prematuramente a los 5 o 10 días refleja el estrés metabólico, alteraciones por el dolor y los medicamentos administrados en urgencias. Esperar 30 días es un retraso terapéutico innecesario para iniciar la prevención secundaria.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 19."
    },
    {
        id: 6,
        question: "¿Cuál es el pH urinario objetivo específico para lograr la quimiolisis en un paciente con litos de ácido úrico preexistentes?",
        options: ["5.8 a 6.2", "6.2 a 6.8", "7.0 a 7.2", "Mayor a 7.5"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, la alcalinización intensa aumenta la solubilidad del ácido úrico de forma logarítmica, permitiendo disolver químicamente el cálculo in situ, a diferencia de niveles más bajos que solo actúan de forma preventiva.<br><br>Perla ENARM: El algoritmo de litos de ácido úrico establece para Quimiolitolisis un pH urinario objetivo 7.0 - 7.2.<br><br>Análisis de Distractores: El rango de 6.2 a 6.8 se utiliza únicamente para profilaxis o prevención de formación de nuevos litos. Un pH menor a 6.2 perpetúa el riesgo urítico, y niveles de pH mayores a 7.5 favorecen dramáticamente la precipitación secundaria de cálculos por fosfato de calcio.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Anexos, 32."
    },
    {
        id: 7,
        question: "¿En qué situación clínica o antecedente se indica explícitamente realizar dilatación gradual durante el acceso de una nefrolitotomía percutánea?",
        options: ["Riñón virgen sin cirugías", "Riesgo alto de sangrado", "Cirugías previas o fibrosis", "Litos coraliformes completos"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, el tejido cicatricial perirrenal previo aumenta la resistencia física y el riesgo de desgarros durante la punción, haciendo inseguro el acceso directo, por lo que el cirujano debe expandir el tracto por pasos.<br><br>Perla ENARM: Se recomienda no realizar dilatación en un solo disparo en pacientes con cirugías previas o con sospecha fibrosis perirrenal importante.<br><br>Análisis de Distractores: En un riñón sin intervenciones (virgen) está plenamente indicada y es segura la dilatación de un solo disparo. El tamaño de la piedra (coraliforme) o un riesgo hematológico inespecífico no son el factor anatómico tisular que dicta la técnica mecánica de la dilatación del tracto.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 17."
    },
    {
        id: 8,
        question: "¿Qué hallazgo en el lito o antecedente clínico clasifica de forma automática a un paciente como portador de alto riesgo de recurrencia metabólica?",
        options: ["Ser de género masculino", "Litos compuestos de brucita", "Edad mayor a 65 años", "Enfermedad renal crónica"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, ciertas etiologías anatómicas o componentes minerales demandan un estudio metabólico profundo por su alta agresividad y riesgo de daño renal inminente, como la formación de brucita en pacientes monorrenos.<br><br>Perla ENARM: Se sugiere considerar alto riesgo de recurrencia para... pacientes monorrenos con litos de brucita.<br><br>Análisis de Distractores: La edad avanzada o el género masculino no constituyen criterios de alto riesgo metabólico explícitos en el documento. La enfermedad renal crónica es una consecuencia terminal de la litiasis no tratada, no un criterio inicial para la clasificación metabólica preventiva de recurrencia.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 19."
    },
    {
        id: 9,
        question: "¿A las cuántas semanas de iniciar terapia farmacológica litiásica preventiva se debe realizar la recolección de orina de 24 horas de control?",
        options: ["2 a 4 semanas", "4 a 6 semanas", "8 a 12 semanas", "16 a 24 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, este intervalo de tiempo permite que el metabolismo inducido por el fármaco alcance un estado de equilibrio en la excreción urinaria, permitiendo al clínico medir metas reales y ajustar dosis de forma segura.<br><br>Perla ENARM: El seguimiento se realizará después de 8 a 12 semanas de haber iniciado el tratamiento farmacológico, ya que esto permitirá el ajuste de dosis.<br><br>Análisis de Distractores: Evaluar orinas antes de las 8 semanas arroja resultados de una homeostasis que aún está fluctuante. Posponer el examen hasta las 16 semanas retrasa inaceptablemente un ajuste terapéutico, dejando al paciente sin protección óptima.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 18."
    },
    {
        id: 10,
        question: "¿Cuál es el fármaco preventivo de elección normado en un paciente con hipercalciuria recurrente documentada mayor a 8 mmol/día?",
        options: ["Alopurinol", "Citrato de potasio", "Clortalidona", "Piridoxina"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, los diuréticos de la familia de las tiazidas elevan el rescate de calcio en el túbulo contorneado distal, disminuyendo significativamente el volumen de calciuria y previniendo la nucleación de cristales calcáreos en la luz.<br><br>Perla ENARM: Se sugiere administrar tiazida en pacientes con nefrolitiasis con litos compuestos de calcio y alto riesgo de recurrencia. (La clortalidona es la tiazida listada en el algoritmo específico).<br><br>Análisis de Distractores: El alopurinol se prescribe exclusivamente ante perfiles de hiperuricosuria mayor a 4 mmol/d. El citrato de potasio corrige los estados aislados de hipocitraturia. La piridoxina es la piedra angular farmacológica para la hiperoxaluria primaria.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 23."
    },
    {
        id: 11,
        question: "¿Qué efecto secundario o parámetro fisiológico exige imperativamente valorar la suspensión de la terapia preventiva con tiazidas?",
        options: ["Hipertensión ortostática", "Hipocalemia sintomática", "Dislipidemia leve", "Hipercalcemia transitoria"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, el mecanismo de acción tiazídico provoca intercambio tubular perdedor de potasio y depleción del volumen vascular; si se tornan sintomáticos y severos, o existe falla renal, el riesgo vital excede el beneficio preventivo litiásico.<br><br>Perla ENARM: Se recomienda valorar suspender el tratamiento con tiazidas en pacientes con deterioro progresivo de la función renal, hipotensión ortostática o hipocalemia.<br><br>Análisis de Distractores: Las tiazidas producen reducción de la tensión (hipotensión), no cuadros de hipertensión. La hipercalcemia generada es por su mecanismo hipocalciúrico y la dislipidemia suele ser un efecto menor que no indica suspensión absoluta en el protocolo primario.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 23."
    },
    {
        id: 12,
        question: "¿Qué estudio de laboratorio se debe vigilar de forma rutinaria y estricta en pacientes litiásicos tratados crónicamente con alopurinol?",
        options: ["Pruebas de función hepática", "Perfil de lípidos completo", "Biometría hemática", "Electrocardiograma de reposo"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nefrolitiasis en el adulto, la administración sostenida de inhibidores de la xantina oxidasa asocia un riesgo temido de inducir discrasias sanguíneas severas idiosincráticas, siendo vital detectar precozmente la agranulocitosis o la aplasia medular.<br><br>Perla ENARM: Se recomienda realizar seguimiento clínico y por exámenes de laboratorio (biometría hemática) de los posibles eventos adversos relacionados al uso de alopurinol.<br><br>Análisis de Distractores: Si bien el metabolismo hepático importa, la directriz prioriza el control de series hematológicas. El perfil lipídico metabólico o el electrocardiograma basal no forman parte del escrutinio toxicológico monitorizado para este medicamento.",
        source: "SS-215-09, Tratamiento y prevención secundaria de la nefrolitiasis en el adulto, 2017, Evidencias y Recomendaciones, 24."
    },
    {
        id: 13,
        question: "En pacientes con múltiples episodios de formación de litos, ¿cuál es la recomendación universal respecto al aporte dietético de calcio?",
        options: ["Dieta baja en calcio", "Dieta libre de lácteos", "Dieta normal en calcio", "Suplementación masiva de calcio"],
        answer: 2,

    {

    {

    {

        function displayQuestion(qId) {

                    dashboardBtn.classList.add('hidden');

                    return;

                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);

                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGEMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGEMLastQId', currentQuestionId);
                else localStorage.removeItem('CGEMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGEMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);

    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
