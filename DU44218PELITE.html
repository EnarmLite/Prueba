    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el punto de corte temporal máximo para clasificar fisiopatológicamente a una hipoglucemia neonatal como transitoria?",
        options: ["Primeras 72 horas", "Primeros 7 días", "Primeras 48 horas", "Primeras 24 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, este trastorno obedece a los cambios metabólicos adaptativos tras el cese del aporte nutricional materno. Cualquier evento que no logre la estabilización de los circuitos de contrarregulación en este periodo exige replantear el abordaje hacia causas estructurales o genéticas.<br><br>Perla ENARM: \"Se conoce como hipoglucemia neonatal transitoria la que ocurre dentro de las 48 horas posteriores al nacimiento... La hipoglucemia que persiste más allá de las 48 horas de vida deja de considerarse transitoria\".<br><br>Análisis de Distractores: Las 72 horas indican el punto de persistencia para referir a subespecialidad. Los 7 días marcan la cronicidad referida como \"resistente\" frente al soporte endovenoso. Las 24 horas son insuficientes para la maduración total de la gluconeogénesis y cetogénesis adaptativa.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 21."
    },
    {
        id: 2,
        question: "¿Cuál es el estándar de oro bioquímico aceptado para la confirmación diagnóstica laboratorial de la hipoglucemia neonatal?",
        options: ["Glucosa capilar por tira reactiva", "Espectrometría de masas plasmática", "Detección de cuerpos cetónicos urinarios", "Método enzimático con hexocinasa"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, la variabilidad preanalítica condiciona diagnósticos erróneos, por lo que la confirmación requiere procesamiento central. Las determinaciones enzimáticas en suero o plasma eliminan los sesgos por hemólisis o alteraciones del hematocrito capilar.<br><br>Perla ENARM: \"El estándar de oro para la determinación sérica es el que utiliza enzimas como hexocinasa o glucosa oxidasa, condición que no se puede adicionar con el glucómetro\".<br><br>Análisis de Distractores: La tira reactiva capilar es útil exclusivamente para tamizaje de cama (Point-of-Care) pero carece de precisión confirmatoria. La espectrometría se utiliza para el tamiz metabólico ampliado. Los cuerpos cetónicos reflejan metabolismo lipídico secundario, no diagnostican niveles glucémicos directos.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 51."
    },
    {
        id: 3,
        question: "Ante un recién nacido de término asintomático con factores de riesgo maternos, ¿en qué momento exacto se debe realizar la primera determinación de escrutinio?",
        options: ["A las 2 horas de vida", "A los 30 minutos de vida", "Inmediatamente al nacer", "A las 24 horas de vida"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, el paciente sin alteraciones neurológicas no requiere medición inmediata, ya que registrará caídas fisiológicas normales durante los primeros minutos de transición. Se debe dar prioridad al contacto materno y alimentación enteral, midiendo la glucosa posteriormente.<br><br>Perla ENARM: \"En los recién nacidos que tienen factores de riesgo para hipoglucemia y no presentan signos sugestivos de esta se les medirá la glucemia en sangre 2 horas después del nacimiento después de haber iniciado la alimentación\".<br><br>Análisis de Distractores: Inmediatamente al nacer es la indicación absoluta pero solo para pacientes que debutan sintomáticos. A los 30 minutos es el margen para iniciar el apego y la primera toma de seno materno. A las 24 horas resulta en un retraso inaceptable que propicia secuelas irreversibles.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 54."
    },
    {
        id: 4,
        question: "¿Cuál es el margen de variabilidad esperado de las concentraciones de glucosa capilar por glucómetro en comparación con el plasma real?",
        options: ["25 a 30 % más bajas", "10 a 15 % más bajas", "10 a 15 % más altas", "25 a 30 % más altas"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, las muestras capilares siempre subestiman la concentración glucémica real en comparación con el territorio arterial o venoso central, esto derivado del consumo metabólico tisular periférico y la lisis eritrocitaria al exprimir el lecho ungueal.<br><br>Perla ENARM: \"Tener en mente que la glucosa venosa o arterial son 15 % más altas que la sangre capilar... la glucosa sanguínea son 10 % más bajas que las concentraciones plasmáticas\".<br><br>Análisis de Distractores: La glucometría nunca reporta valores sistemáticamente más altos que el plasma; fisiológicamente el tejido periférico ya consumió parte del sustrato. Variaciones mayores al 25 % sugieren falla en la calibración del equipo o tira caducada, no variación fisiológica pre-analítica.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 51."
    },
    {
        id: 5,
        question: "Utilizando la estratificación de riesgo, ¿cuál es el nivel crítico de glucosa en un neonato asintomático que obliga a iniciar manejo intravenoso directo?",
        options: ["Menor a 25 mg/dl", "Menor a 45 mg/dl", "Menor a 35 mg/dl", "Menor a 50 mg/dl"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, la decisión terapéutica se guía por umbrales de severidad. Si el neonato asintomático cruza la línea crítica inferior de 25 mg/dl, el margen de seguridad cerebral se agota, obligando a suspender la vía oral exclusiva y escalar a infusión farmacológica aguda.<br><br>Perla ENARM: \"Se debe iniciar tratamiento en los recién nacidos con hipoglucemia asintomática en las siguientes condiciones: Glucosa plasmática < 25 mg/dl. Iniciar solución glucosada 10 % de 6-8 mg/kg/min y continuar manejo como hipoglucemia sintomática\".<br><br>Análisis de Distractores: El umbral menor a 45 mg/dl (rango 25-45) permite iniciar manejo conservador con alimentación oral (fórmula o seno materno) si está asintomático. Valores de 50 mg/dl en adelante corresponden a la meta terapéutica de destete, no a la indicación de inicio intravenoso.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 61."
    },
    {
        id: 6,
        question: "¿Cuál es el tratamiento intravenoso inicial de primera línea (bolo) para el paciente con manifestaciones de neuroglucopenia?",
        options: ["Solución glucosada al 50 % a 1 ml/kg", "Solución glucosada al 10 % a 5 ml/kg", "Solución glucosada al 10 % a 2 ml/kg", "Solución glucosada al 5 % a 4 ml/kg"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, la presencia de estupor, letargo o convulsiones exige la corrección rápida con dextrosa. El bolo debe aportar exactamente 200 mg/kg de glucosa, lo cual se logra de manera óptima y segura con la dilución al 10 % para evitar flebitis y picos hiperglucémicos rebote.<br><br>Perla ENARM: \"Tratamiento de la hipoglucemia sintomática: Administrar bolo de solución glucosada 10 % 2 ml/kg (200 mg/kg)\".<br><br>Análisis de Distractores: La dextrosa al 50 % está proscrita en neonatología periférica por su osmolaridad extrema que esclerosa vasos y precipita liberación insulínica masiva. Volúmenes mayores de 5 ml/kg sobrecargan el compartimento intravascular sin beneficio adicional.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 60."
    },
    {
        id: 7,
        question: "En el abordaje nutricional preventivo del recién nacido con factores de riesgo, ¿en qué lapso se debe establecer el primer contacto con el seno materno?",
        options: ["Primeras 2 horas", "Primeros 30 a 60 minutos", "Primeros 5 a 10 minutos", "Primeras 2 a 4 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, el estímulo entérico provee sustrato y favorece el reflejo neuroendocrino en el binomio. Retrasar este proceso en hijos de madres diabéticas o con restricción del crecimiento facilita el agotamiento de glucógeno y precipita el daño tisular.<br><br>Perla ENARM: \"Sigue las recomendaciones de manejo del recién nacido con factores de riesgo para hipoglucemia... Iniciar la alimentación durante los primeros 30-60 minutos de vida, siendo preferente el seno materno\".<br><br>Análisis de Distractores: Antes de los 10 minutos el neonato se encuentra en secado, valoración Apgar y estabilización transicional inicial. Esperar 2 o 4 horas induce neuroglucopenia severa en poblaciones vulnerables por ayuno iatrogénico.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 46."
    },
    {
        id: 8,
        question: "¿Cuál es la dosis inicial recomendada para la infusión intravenosa continua de mantenimiento en el tratamiento de la hipoglucemia sintomática?",
        options: ["2 a 4 mg/kg/minuto", "10 a 12 mg/kg/minuto", "6 a 8 mg/kg/minuto", "12 a 15 mg/kg/minuto"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, inmediatamente después de administrar el bolo de rescate, el soporte metabólico basal exige una infusión (VIG) estandarizada para equiparar la tasa fisiológica de producción hepática de glucosa fetal y prevenir recaídas clínicas.<br><br>Perla ENARM: \"Indica bolo de solución glucosada 10 % 2 ml/kg (200 mg/kg) seguido de; Infusión intravenosa de solución glucosada 10 % 6-8 mg/kg/min\".<br><br>Análisis de Distractores: Las tasas de 2 a 4 mg/kg/min corresponden a fases de destete progresivo. Las dosis de 10 a 12 mg/kg/min son incrementos escalonados en pacientes que no responden a la dosis basal. Tasas superiores a 12 mg/kg/min denotan cuadros refractarios graves.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 60."
    },
    {
        id: 9,
        question: "¿Cuál es la pauta correcta para realizar el descenso (destete) de la velocidad de infusión de glucosa y evitar un rebote insulínico?",
        options: ["4 mg/kg/minuto cada 12 horas", "1 mg/kg/minuto cada 8 horas", "3 mg/kg/minuto cada 24 horas", "2 mg/kg/minuto cada 6 horas"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, una vez que el neonato tolera adecuadamente la vía oral y demuestra euglucemia sostenida, el retiro brusco de la dextrosa precipita crisis por falta de adaptación pancreática. El descenso normado exige micro-ajustes periódicos.<br><br>Perla ENARM: \"Si después de 24 horas de terapia intravenosa se obtienen > 50 mg/dl de glucosa en 2 o más determinaciones consecutivas, disminuir la infusión 2 mg/kg/min cada 6 horas, continuando con la vigilancia\".<br><br>Análisis de Distractores: Descensos mayores a 2 mg/kg/min resultan agresivos para el islote pancreático neonatal. Alargar los descensos a 12 o 24 horas retrasa injustificadamente la remoción de catéteres y prolonga la estancia intrahospitalaria.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 60."
    },
    {
        id: 10,
        question: "Para considerar clínicamente seguro el inicio del destete de la infusión intravenosa, ¿cuál es el nivel mínimo sostenido de glucosa a documentar?",
        options: ["Mayor a 70 mg/dl", "Mayor a 50 mg/dl", "Mayor a 45 mg/dl", "Mayor a 25 mg/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, el clínico debe comprobar al menos dos determinaciones consecutivas estables por encima de la barrera metabólica de riesgo en un lapso de 24 horas para comenzar a restar aportes exógenos.<br><br>Perla ENARM: \"Si después de 24 horas de terapia intravenosa se obtienen > 50 mg/dl de glucosa en 2 o más determinaciones consecutivas, disminuir la infusión\".<br><br>Análisis de Distractores: Los 45 mg/dl fungen como el umbral de alarma en el monitoreo del paciente asintomático, pero no garantizan reserva para destete. Los 70 mg/dl representan el nivel de confort a buscar a largo plazo (superadas las 72 horas), no el requisito mínimo de corte agudo.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 60."
    },
    {
        id: 11,
        question: "¿Cuál es el punto de corte en la velocidad de infusión de glucosa que obliga a clasificar el cuadro como refractario y derivar a endocrinología?",
        options: ["Mayor a 12 mg/kg/minuto", "Mayor a 10 mg/kg/minuto", "Mayor a 8 mg/kg/minuto", "Mayor a 15 mg/kg/minuto"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Hipoglucemia Neonatal Transitoria, sobrepasar los aportes endovenosos escalonados sin respuesta favorable delata la incapacidad intrínseca del organismo para generar euglucemia basal, traduciendo patologías como hiperinsulinismo o bloqueos metabólicos severos.<br><br>Perla ENARM: \"Se deberá consensar con el neonatólogo o pediatra la necesidad de valoración por endocrinología pediátrica u otra subespecialidad de acuerdo a... Necesidad de > 12 mg/kg/min de glucosa intravenosa\".<br><br>Análisis de Distractores: Infusiones de 8 a 10 mg/kg/min se encuentran dentro del rango de ajuste permisible en el primer nivel de choque (hasta el tope de 12) tras la falta de respuesta del bolo inicial y no exigen traslado primario inmediato si logran la estabilización.",
        source: "GPC-IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Evidencias y Recomendaciones, página 77."
    },
    {
        id: 12,
        question: "¿Cuál es la prevalencia esperada de hipoglucemia en la población de recién nacidos que presentan factores de riesgo clínicos documentados?",
        options: ["16.9 %", "26 %", "72 %", "81 %"],
        answer: 2,

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');

            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            displayArea.classList.add('opacity-0');

                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');

                        dashboardBtn.classList.remove('lg:left-[22rem]');

                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');

                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ELex2Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ELex2LastQId', currentQuestionId);
                else localStorage.removeItem('ELex2LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ELex2Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
</body>
</html>
