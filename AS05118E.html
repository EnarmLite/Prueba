    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el tiempo mínimo indispensable de fracaso al tratamiento médico documentado para considerar a un paciente como candidato a cirugía bariátrica?",
        options: ["3 meses", "6 meses", "12 meses", "24 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la intervención quirúrgica requiere demostrar la refractariedad a las medidas conservadoras supervisadas antes de someter al paciente al riesgo operatorio. El establecimiento de este límite temporal busca salvaguardar al binomio coste-beneficio antes de proponer cambios anatómicos permanentes e invasivos.<br><br>Perla Quirúrgica: Se sugiere considerar la realización de procedimientos de cirugía bariátrica en pacientes, entre 18 y 65 años, con obesidad de larga evolución (3-5 años) y que tienen documentado el fracaso al tratamiento médico-dietético por un especialista, durante un lapso de 6 meses.<br><br>Análisis de Distractores: Los 3 meses (A) son insuficientes para evaluar la adherencia metabólica real y consolidar cambios de conducta. Los cortes de 12 o 24 meses (C y D) retrasan el beneficio sobre el riesgo cardiovascular de manera innecesaria según la normativa.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Evaluación, p. 41."
    },
    {
        id: 2,
        question: "¿Cuál es el objetivo anatómico principal al indicar una dieta preoperatoria muy baja en calorías de 600 kcal/día?",
        options: ["Disminuir grasa subcutánea", "Vaciar el contenido gástrico", "Reducir el volumen hepático", "Incrementar la masa magra"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la esteatosis y hepatomegalia dificultan la retracción del hígado durante la laparoscopía en el piso supramesocólico. La restriction calórica severa agota el glucógeno y lípidos hepáticos rápidamente, facilitando la visualización del ángulo de His.<br><br>Perla Quirúrgica: Se sugiere una dieta muy baja en calorías (600 kcal/día) previo a la cirugía para reducir el peso corporal and el volumen hepático del paciente.<br><br>Análisis de Distractores: La pérdida de grasa subcutánea (A) y el aumento de masa magra (D) requieren de meses de intervención y balances calóricos distintos. El vaciamiento gástrico (B) se logra con el ayuno de 8 horas prequirúrgico regular.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Evaluación, p. 51."
    },
    {
        id: 3,
        question: "¿Cuál es la dosis máxima de insulina basal indicada a la que se debe ajustar el manejo 24 horas antes de la cirugía bariátrica en pacientes con diabetes mellitus?",
        options: ["0.1 UI/kg", "0.3 UI/kg", "0.5 UI/kg", "0.7 UI/kg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, el ayuno y el estrés quirúrgico exigen mantener un aporte basal que prevenga la cetoacidosis sin precipitar hipoglucemias transanestésicas. El control estricto mitiga fallas en la cicatrización tisular de las grapas.<br><br>Perla Quirúrgica: Glitazonas, glinidas e inhibidores de la dipeptidil-dipeptidasa 4, se deben suspender 24 horas antes de la cirugía con una reducción de la dosis de insulina a 0.3 unidades/kg.<br><br>Análisis de Distractores: Una dosis de 0.1 UI/kg (A) resulta subóptima y predispone a descontrol hiperglucémico por estrés. Dosis de 0.5 o 0.7 UI/kg (C y D) son riesgosas por la alta probabilidad de hipoglucemia severa intraoperatoria en ausencia de aporte enteral.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Evaluación, p. 45."
    },
    {
        id: 4,
        question: "¿A qué intervalo de tiempo previo a la inducción anestésica se indica la administración intravenosa de 8 mg de dexametasona para prevención de náuseas y vómitos?",
        options: ["30 minutos", "60 minutos", "90 minutos", "120 minutos"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, el uso de corticosteroides mitiga la respuesta inflamatoria sistémica y el reflejo emético postoperatorio al alcanzar su pico de concentración plasmática idónea en este lapso. Esto es un pilar fundamental en protocolos de recuperación rápida.<br><br>Perla Quirúrgica: Se recomienda administrar 8 mg de dexametasona por vía intravenosa, preferiblemente 90 minutos antes de la inducción de la anestesia para reducir las náuseas y vómitos posoperatorios, así como la respuesta inflamatoria.<br><br>Análisis de Distractores: Las opciones A, B y D no cumplen con los protocolos farmacocinéticos estandarizados por las vías de recuperación acelerada (ERAS) aplicadas a la cirugía gastrointestinal bariátrica.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Tratamiento, p. 55."
    },
    {
        id: 5,
        question: "¿Cuál es el requerimiento diario de aporte proteico establecido durante las primeras 2 semanas de dieta líquida en el postoperatorio inmediato?",
        options: ["30 g/día", "60 g/día", "90 g/día", "120 g/día"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la restricción severa de la capacidad volumétrica gástrica induce un estado hipercatabólico que consume tejido magro, el cual debe detenerse con densidad proteica específica en líquidos claros para evitar sarcopenia aguda.<br><br>Perla Quirúrgica: Se recomienda que la dieta postoperatoria inmediata durante las primeras dos semanas se realice con una dieta líquida, que aporte 60 g/día de proteínas.<br><br>Análisis de Distractores: Administrar 30 g/día (A) precipita desnutrición proteica aguda y retraso en la cicatrización. Intentar forzar 90 o 120 g/día (C y D) en las fases iniciales provoca distensión, náuseas e intolerancia a la vía oral en el nuevo e inmaduro reservorio.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 81."
    },
    {
        id: 6,
        question: "¿Cuál es el grupo de macronutrientes cuyo consumo debe evitarse estrictamente posterior al bypass gástrico en Y de Roux para minimizar el riesgo de síndrome de dumping?",
        options: ["Fibras insolubles", "Proteínas animales", "Grasas saturadas", "Azúcares simples"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la llegada rápida de solutos de alta osmolaridad al yeyuno genera un desplazamiento masivo de líquidos al lumen intestinal y liberación de incretinas, causando hipoglucemia reactiva y síntomas vasomotores.<br><br>Perla Quirúrgica: Se debe evitar el consumo de dulces, posterior al bypass gástrico en Y de Roux, para minimizar los síntomas del síndrome de dumping, así como después de cualquier procedimiento bariátrico.<br><br>Análisis de Distractores: Las grasas, proteínas y fibras (A, B y C) requieren procesos digestivos de mayor duración y no poseen la carga hiperosmolar súbita necesaria para desencadenar la clínica clásica de dumping temprano o tardío.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 83."
    },
    {
        id: 7,
        question: "¿Cuál es el intervalo temporal exacto recomendado para la ingesta de líquidos posterior al consumo de alimentos sólidos en el paciente postoperado?",
        options: ["10 minutos", "30 minutos", "60 minutes", "120 minutos"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la anatomy gástrica alterada no permite la acomodación simultánea de volumen líquido y sólido; el vaciamiento precipitado de la mezcla al yeyuno induce vómito o síndrome vasomotor agudo.<br><br>Perla Quirúrgica: Los líquidos se deben ingerir lentamente, preferiblemente 30 minutos después de las comidas para prevenir síntomas gastrointestinales y en cantidades suficientes para mantener una hidratación adecuada.<br><br>Análisis de Distractores: Esperar solo 10 minutos (A) no permite el aclaramiento gástrico funcional del sólido ingerido. Retrasar los líquidos por 60 o 120 minutos (C y D) dificulta alcanzar el objetivo diario de 1.5 litros de hidratación sistémica.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 83."
    },
    {
        id: 8,
        question: "¿Durante qué lapso postoperatorio se debe evitar invariablemente el embarazo en la mujer sometida a cirugía bariátrica?",
        options: ["3 a 6 meses", "6 a 9 meses", "12 a 18 meses", "24 a 36 meses"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, el periodo inicial cursa con deficiencias agudas de micronutrientes y pérdida acelerada de peso, lo cual compromete el entorno fisiológico fetal de implantación e incrementa el riesgo de defectos del desarrollo embrionario.<br><br>Perla Quirúrgica: En toda mujer candidata a cirugía bariátrica, se sugiere evitar el embarazo previo a la cirugía y entre 12 y 18 meses posteriores a la cirugía.<br><br>Análisis de Distractores: Ventanas menores a un año (A y B) exponen al producto a un pico máximo de deficiencia de folatos y vitamina B12. Restringir el embarazo por hasta tres años (D) limita de forma innecesaria la fertilidad una vez estabilizado el estado nutricional y ponderal.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Evaluación, p. 57."
    },
    {
        id: 9,
        question: "¿En qué ventana de tiempo postoperatorio se debe iniciar la aplicación de heparina de bajo peso molecular para profilaxis de trombosis venosa profunda?",
        options: ["Primeras 12 horas", "Primeras 24 horas", "Primeras 48 horas", "Primeras 72 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, el riesgo trombótico asociado a la estasis venosa por adiposidad pélvica y el factor tisular liberado por el corte quirúrgico abdominal amerita una cobertura farmacológica oportuna para mitigar tromboembolias fatales.<br><br>Perla Quirúrgica: Las opciones incluyen: [...] heparina de bajo peso molecular dentro de las primeras 24 horas posteriores a la cirugía bariátrica.<br><br>Análisis de Distractores: Retrasar el inicio hasta las 48 o 72 horas (C y D) expone al paciente a una brecha protrombótica intrahospitalaria peligrosa. Iniciar de forma sistemática antes de las 12 horas (A) eleva el riesgo de hemorragia temprana de las líneas de engrapado.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 106."
    },
    {
        id: 10,
        question: "¿Cuál es el fármaco profiláctico indicado para disminuir la formación de cálculos biliares posterior a un bypass gástrico en pacientes sin colecistectomía previa?",
        options: ["Ácido ursodesoxicólico", "Subsalicilato de bismuto", "Pantoprazol sódico", "Fumarato ferroso"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la pérdida rápida de peso induce inercia vesicular y aumento en la saturación de colesterol en la bilis. Este fármaco mantiene solubles los lípidos en la vesícula, evitando la nucleación de litos.<br><br>Perla Quirúrgica: Se puede considerar la administración de ácido ursodesoxicólico, al menos 300 mg/día en dosis divididas, en pacientes sometidos a bypass gástrico en Y de Roux, que no tienen colecistectomía.<br><br>Análisis de Distractores: El pantoprazol (C) protege la mucosa contra úlceras. El fumarato (D) es un suplemento para la eritropoyesis. El subsalicilato (B) es un agente antidiarreico. Ninguno ejerce acción preventiva en la vía biliar.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 111."
    },
    {
        id: 11,
        question: "¿Cuáles son las manifestaciones clínicas tempranas que obligan a sospechar y tratar deficiencia de zinc tras un procedimiento malabsortivo?",
        options: ["Parestesias, glositis y ataxia", "Petequias, gingivorragia y fatiga", "Alopecia, pica y disgeusia", "Xeroftalmia, nistagmo y ceguera"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la exclusión del yeyuno proximal altera la absorción de oligoelementos que fungen como cofactores enzimáticos esenciales para el recambio dérmico, folicular capilar y las terminales gustativas periféricas.<br><br>Perla Quirúrgica: Se debe considerar la probabilidad de deficiencia de zinc en los pacientes con pérdida de cabello, pica, disgeusia significativa, o en pacientes varones con disfunción eréctil o hipogonadismo.<br><br>Análisis de Distractores: La ataxia y parestesias (A) junto con el nistagmo (D) apuntan a deficiencias del complejo B (Tiamina, B12). Las petequias y gingivorragia (B) son signos clásicos de escorbuto por déficit de vitamina C.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 92."
    },
    {
        id: 12,
        question: "En el paciente postoperado clínicamente estable con sospecha de fuga anastomótica aguda, ¿cuál es el estudio de imagen inicial de elección?",
        options: ["Radiografía simple abdominal", "Ultrasonido de vías biliares", "Serie con contraste hidrosoluble", "Resonancia magnética abdominal"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, para confirmar la pérdida de continuidad del tracto digestivo de manera segura se debe instilar material inocuo al peritoneo bajo control fluoroscópico o tomográfico, evitando el uso inicial de bario espeso.<br><br>Perla Quirúrgica: Ante el paciente con sospecha de fuga anastomótica y clínicamente estable, se debe considerar estudios con contraste hidrosoluble seguido de bario o tomografía axial computarizada.<br><br>Análisis de Distractores: La radiografía simple (A) y la ecografía (B) tienen muy baja sensibilidad analítica para microfugas en asas proximales. La resonancia magnética (D) es prolongada de adquirir e impráctica en escenarios agudos.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 108."
    },
    {
        id: 13,
        question: "¿Cuál es el estudio de imagen indicado para evaluar obstrucción intestinal ante un paciente postoperado de cirugía bariátrica que presenta dolor periumbilical de inicio súbito?",
        options: ["Tomografía abdominopélvica", "Serie con contraste de bario", "Ultrasonografía doppler", "Radiografía simple abdominal"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la creación de defectos en el mesenterio (ej. espacio de Petersen) propicia hernias internas que generan isquemia y torsión en espiral del intestino, observables como remolinos mesentéricos en el escáner.<br><br>Perla Quirúrgica: Ante el paciente con dolor periumbilical de inicio súbito y grave o episodios recurrentes de dolor abdominal intenso, en cualquier momento posterior a la cirugía bariátrica, deben ser evaluados con una tomografía abdominopélvica para investigar complicaciones potencialmente mortales.<br><br>Análisis de Distractores: El ultrasonido (C) y la radiografía simple (D) son ciegos frente a estrangulaciones intestinales iniciales sin dilatación avanzada de asas. La serie baritada (B) es útil para estenosis anastomóticas fijas, no hernias dinámicas.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el Adulto, 2018, Seguimiento, p. 112."
    },
    {
        id: 14,
        question: "¿A qué día postoperatorio es seguro reiniciar la administración oral de metformina asumiendo una función renal estable?",
        options: ["Primer día", "Tercer día", "Séptimo día", "Decimocuarto día"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, una vez resuelto el estrés hemodinámico agudo perioperatorio y corroborado el filtrado glomerular normal, la reintroducción de biguanidas optimiza el perfil metabólico sin inducir acidosis láctica.<br><br>Perla Quirúrgica: En pacientes con diabetes mellitus, se puede reiniciar la administración de metformina en dosis de 850 mg dos veces el día, a partir del tercer día posterior a la cirugía, siempre y cuando la función renal sea estable.<br><br>Análisis de Distractores: Forzar el reinicio el primer día (A) arriesga nefrotoxicidad posquirúrgica subclínica. Retrasarlo de 1 a 2 semanas (C y D) expone a hiperglucemias que perjudican directamente la cicatrización de las anastomosis.",

    {

    {

        question: "Cuál es la ruta de administración obligatoria para prescribir bifosfonatos en un paciente con osteoporosis secundario a bypass gástrico?",

    {
        id: 17,
        question: "¿Cuál es la meta final de actividad física aeróbica moderada a la semana para asegurar el mantenimiento terapéutico del peso corporal a mediano plazo?",
        options: ["150 minutos", "200 minutos", "250 minutos", "300 minutos"],

        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, el ajuste metabólico exige incrementar el gasto energético y favorecer el desarrollo muscular contra resistencia para evitar el fenómeno adaptativo de reganancia ponderal en los años posteriores.<br><br>Perla Quirúrgica: Posterior a la cirugía bariátrica, se debe recomendar realizar actividad física regular, incorporando actividad física aeróbica moderada con un mínimo de 150 min/semana y una meta de 300 min/semana.<br><br>Análisis de Distractores: 150 minutos (A) es la meta base preventiva general para la población general, no el objetivo terapéutico avanzado bariátrico. Las opciones de 200 y 250 minutos (B y C) carecen de sustento rector específico en este apartado.",

    {
        id: 18,
        question: "¿Cuál es la posición obligatoria requerida para suministrar el soporte de oxígeno profiláctico durante la recuperación inicial en pacientes obesos sin apnea del sueño documentada?",
        options: ["Decúbito lateral", "Posición semisentada", "Decúbito supino", "Posición de Trendelenburg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de obesidad en el adulto, la carga masiva de tejido adiposo toracoabdominal limita la expansion restrictiva del diafragma, colapsando los volúmenes residuales basales alveolares y predisponiendo atelectasias agudas inmediatas en decúbito plano.<br><br>Perla Quirúrgica: Durante el posoperatorio inmediato, los pacientes con obesidad sin apnea obstructiva del sueño, deben recibir oxígeno profiláctico en posición semisentada o con la cabeza elevada.<br><br>Análisis de Distractores: Las posiciones planas como el decúbito supino (C) o lateral (A), además del declive en Trendelenburg (D), sofocan la dinámica ventilatoria por el peso visceral contra la pleura, aumentando el desequilibrio ventilación/perfusión.",

    {

    {
        id: 20,
        question: "¿Cuál es el volumen mínimo de procedimientos por año que requiere una unidad médica para no elevar exponencialmente sus tasas de mortalidad asociadas a intervenciones bariátricas?",

    {
        id: 21,
        question: "¿Cuál es el Índice de Masa Corporal mínimo indispensable para considerar cirugía bariátrica en un paciente con al menos una comorbilidad grave asociada?",
        options: ["≥ 30 kg/m2", "≥ 35 kg/m2", "≥ 40 kg/m2", "≥ 45 kg/m2"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, la presencia de enfermedades sistémicas derivadas del exceso de peso justifica reducir el umbral de masa corporal para intervenir al paciente de manera temprana y detener el daño a órgano blanco.<br><br>Perla Quirúrgica: La cirugía bariátrica se debe considerar en individuos con un IMC de ≥ 40 Kg/m2 y en aquellos con un IMC de ≥ 35 Kg/m2 que tienen comorbilidad asociada, con el propósito de lograr la remisión o mejoría de las enfermedades asociadas.<br><br>Análisis de Distractores: El corte de ≥ 40 kg/m2 (C) aplica como indicación absoluta de forma aislada, sin importar si el paciente es sano metabólicamente. Los valores de ≥ 30 y ≥ 45 (A y D) no representan los puntos de corte pivotales establecidos para normar la conducta quirúrgica en México.",

    },
    {

    {

        question: "¿Durante qué lapso postoperatorio se debe continuar de manera obligatoria el uso de presión positiva continua de la vía aérea (CPAP) en pacientes con antecedente conocido de apnea obstructiva del sueño?",
        options: ["1 a 2 meses", "3 a 6 meses", "9 a 12 meses", "12 a 18 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, la reducción de la adiposidad faríngea es un proceso celular paulatino y la arquitectura del cuello requiere soporte ventilatorio continuo durante el primer semestre para evitar colapsos letales nocturnos.<br><br>Perla Quirúrgica: Inmediatamente después de la cirugía y durante 3-6 meses posteriores, los pacientes con apnea obstructiva del sueño deben continuar la CPAP o la terapia BiPAP. Posterior a dicho período, se sugiere valoración por especialista.<br><br>Análisis de Distractores: Suspenderlo de forma precoz (A) expone al paciente a hipoxemia crítica en las noches más vulnerables del postoperatorio. Prolongarlo ciegamente un año o más (C y D) ignora la tasa alta de curación anatómica lograda por la pérdida ponderal masiva a los 6 meses.",

    {

        options: ["1 semana", "1 ciclo", "3 meses", "6 meses"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, los estrógenos exógenos agudizan el riesgo protrombótico basal de la paciente obesa, y su depuración endovascular debe completarse semanas previas al traumatismo mayor de los tejidos.<br><br>Perla Quirúrgica: Previo a la cirugía bariátrica, se recomienda suspender la terapia con estrógenos (1 ciclo de anticonceptivos orales en mujeres pre menopáusica y al menos 3 semanas de reemplazo hormonal en mujeres postmenopáusicas), con el propósito de disminuir el riesgo de tromboembolismo.<br><br>Análisis de Distractores: Una ventana de 1 semana (A) es ineficaz para revertir los cambios hepáticos en la síntesis de factores de coagulación. Suspenderlos 3 a 6 meses antes (C y D) expone a un periodo riesgoso de embarazo no deseado previo al quirófano, sin beneficio hemorreológico adicional.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Evaluación, p. 57."
    },
    {

    {

        question: "En el paciente postoperado bariátrico que utiliza crónicamente metformina o inhibidores de la bomba de protones, ¿con qué frecuencia se debe realizar la detección sérica de vitamina B12 durante el primer año?",

        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Seguimiento, p. 90."

    {

        question: "En un paciente adulto con diabetes mellitus tipo 2 que presenta un control glucémico deficiente a pesar de tratamiento médico óptimo, ¿qué rango de Índice de Masa Corporal califica directamente para cirugía metabólica?",

        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, la pérdida del cuidado estricto intrahospitalario, la disminución de la deambulación activa en el hogar y el estado protrombótico post-incisional sostenido concentran la morbimortalidad hemorreológica fuera del nosocomio.<br><br>Perla Quirúrgica: El riesgo global de tromboembolismo venoso posterior a la cirugía fue de 0,42% y, el 73% de estos eventos ocurrieron posterior al egreso, principalmente dentro de los primeros 30 días.<br><br>Análisis de Distractores: Durante el periodo intraoperatorio y en el primer día en sala (A y B), el paciente se encuentra monitorizado bajo efectos continuos de tromboprofilaxis subcutánea y medias de compresión intermitente. Tras un año (D), la drástica reducción de peso devuelve la presión venosa de extremidades a parámetros protectores.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Seguimiento, p. 71."

    {

        question: "¿Cuál es el tratamiento médico de primera línea indicado ante la confirmación de una úlcera anastomótica marginal con prueba negativa para infección por Helicobacter pylori?",

        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, la mucosa yeyunal expuesta en la unión engrapada se deteriora al carecer de moco defensivo natural, lo que exige suprimir brutalmente la secreción clorhídrica y revestir físicamente el cráter isquémico.<br><br>Perla Quirúrgica: Las úlceras anastomóticas, deben ser tratadas con bloquadores H2, inhibidor de bomba de protones, sucralfato y si H. pylori está presente hay que iniciar terapia de erradicación...<br><br>Análisis de Distractores: Remodelar quirúrgicamente el lecho (A) se reserva solo si hay perforación inminente o sangrado incontrolable. Los corticoesteroides (D) son fuertemente ulcerogénicos. Fármacos análogos sin neutralización ácida plena (B) son subóptimos frente a la hostilidad de la bolsa gástrica operada.",

    {

        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, esta meta preparatoria es crucial porque desintoxica la grasa visceral, demuestra disciplina conductual del individuo y encoje la glándula hepática, disminuyendo de forma comprobada las complicaciones del evento.<br><br>Perla Quirúrgica: Previo a la cirugía bariátrica, se sugiere que el paciente logre una pérdida de peso entre 6-10%, en un período de 6 a 12 meses.<br><br>Análisis de Distractores: Modificaciones menores al 3% (A) carecen de impacto orgánico e intraabdominal relevante para los trocares. Exigir pérdidas exageradas del 20% o 25% (C y D) usando puros medios conservadores es irreal en pacientes súperobesos y retrasaría el tiempo a la intervención definitiva.",

    {
        id: 31,
        question: "¿Cuál es el tratamiento específico indicado en un paciente postoperado que reporta hemoglobina de 9.5 g/dl, ferritina disminuida e intolerancia comprobada a tabletas orales?",
        options: ["Transfusión de concentrado eritrocitario", "Hierro intravenoso semanal", "Eritropoyetina recombinante", "Vitamina B12 intramuscular"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Tratamiento Quirúrgico de la Obesidad, un duodeno desviado hace biológicamente inútil seguir forzando sales férricas orales (que causan pirosis y dolor sin absorción), dictaminando el paso directo al compartimento endovascular.<br><br>Perla Quirúrgica: En caso de anemia (Hb < 10 g/dl) y/o ferropenia e intolerancia oral o no respuesta al tratamiento oral, se recomienda la administración de hierro intravenoso (dextrano, carboximaltosa) en dosis de hasta 1000 mg/semanal.<br><br>Análisis de Distractores: Sin datos de choque hipovolémico, las transfusiones (A) son inapropiadas y riesgosas. Los estimuladores medulares como eritropoyetina (C) requieren hierro circulante para fabricar glóbulos. La cianocobalamina (D) trata anemias macrocíticas, no el desgaste crónico de ferritina microcítica.",
        source: "GPC-IMSS-051-18, Tratamiento quirúrgico de la obesidad en el adulto, 2018, Seguimiento, p. 104."

        question: "¿Cuál es la dosis mínima preventiva de ácido fólico que debe prescribirse sin interrupción a toda paciente postoperada en edad reproductiva?",

                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGASProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGASLastQId', currentQuestionId);
                else localStorage.removeItem('CGASLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGASProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
