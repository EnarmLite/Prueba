        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Tromboprofilaxis en fibrilación auricular en mayores de 18 años",
    gpcLink: "https://drive.google.com/file/d/1U9qCmq7ko81kcxhHr-0M9mEABVGNntAa/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>La piedra angular del manejo en la Fibrilación Auricular (FA) no es solo el control del ritmo, sino la <strong class="text-indigo-900 dark:text-indigo-200">estratificación obligatoria del riesgo trombótico (CHA2DS2-VASc) frente al riesgo hemorrágico (HAS-BLED)</strong> para iniciar, en la mayoría de los casos (Score ≥2), anticoagulación oral inmediata, <u class="decoration-indigo-400 decoration-2 font-medium">priorizando los Anticoagulantes Orales Directos (ACOD) sobre la Warfarina</u> en pacientes sin válvulas mecánicas.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">El algoritmo mental que debes seguir en el examen tiene tres "semáforos" críticos:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">¿Valvular o No Valvular?</strong> Si el paciente tiene una válvula mecánica protésica, el camino se cierra hacia los Antagonistas de la Vitamina K (Warfarina); los nuevos orales están contraindicados.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">La Matemática del Riesgo (CHA2DS2-VASc):</strong>
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong class="font-bold text-emerald-600 dark:text-emerald-500">0 (Bajo riesgo):</strong> Generalmente no requiere tratamiento o se considera aspirina.</li>
                                <li><strong class="font-bold text-rose-600 dark:text-rose-400">≥2 (Riesgo moderado/alto):</strong> Indicación absoluta de Anticoagulación Oral, favoreciendo los <strong class="underline">ACOD</strong> por su perfil de seguridad.</li>
                            </ul>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">3</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Momento de la Cardioversión:</strong> Si está <strong class="font-bold">inestable</strong>: cardioversión inmediata. Si está <strong class="font-bold text-rose-600 dark:text-rose-400">estable >48 horas o inicio desconocido</strong>: anticoagular 3 semanas antes y 4 semanas después, o realizar un ETE para descartar trombos.
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Reflejo Inmediato:</strong> La correlación crítica para el examen es: <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Diagnóstico de FA = Cálculo inmediato de CHA2DS2-VASc</strong>.</li>
                        <li><strong>Tipos de FA:</strong> No importa si es paroxística, persistente o permanente; el riesgo se basa en la escala clínica, no en la carga de la arritmia.</li>
                        <li><strong>Escala de Sangrado:</strong> Para predecir riesgo hemorrágico, la escala <u class="decoration-emerald-400 decoration-2 font-bold">HAS-BLED es superior</u> a ATRIA o HEMORR2HAGES.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>La Trampa de la "Bioprótesis":</strong> En pacientes con bioprótesis valvulares <strong class="font-bold text-rose-600 dark:text-rose-400">NO se utiliza anticoagulación oral de rutina</strong>, a diferencia de las mecánicas.</li>
                        <li><strong>Cirugía de "Bajo Riesgo":</strong> Si el paciente va a cirugía de catarata o procedimiento cutáneo menor, la respuesta correcta es <u class="decoration-rose-500 decoration-2">NO suspender la anticoagulación oral</u>.</li>
                        <li><strong>El Mito de la Aspirina:</strong> En pacientes con CHA2DS2-VASc alto, la aspirina NO es sustituto de la anticoagulación.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC SS-014-18)
                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Estándar de Oro para Riesgo:</strong> Se recomienda utilizar la escala <strong class="underline">CHA2DS2-VASc</strong> en todos los pacientes >18 años con FA no valvular.</li>

                    El Concepto Fundamental
                </h4>
                <p>El objetivo central del tratamiento no es la normoglucemia rápida, sino la <strong class="text-indigo-900 dark:text-indigo-200">seguridad osmolar y electrolítica</strong>. El ENARM evalúa que sepas que la insulina es una herramienta terapéutica que debe detenerse o titularse agresivamente basándose en dos variables críticas de seguridad: <u class="decoration-indigo-400 decoration-2 font-medium">el Potasio sérico (para evitar arritmias letales) y la Osmolaridad (para evitar edema cerebral)</u>.</p>

                    El Concepto Fundamental
                </h4>
                <p>El ENARM busca que entiendas que el Síndrome de Apnea Obstructiva del Sueño (SAOS) es una patología donde la clínica es muy sugestiva pero <strong class="text-indigo-900 dark:text-indigo-200">jamás diagnóstica por sí sola; la confirmación es obligatoriamente instrumental</strong> y el abordaje cambia radicalmente si el paciente es un niño (foco en hipertrofia adenoamigdalina) o un adulto (foco en <u class="decoration-indigo-400 decoration-2 font-medium">obesidad y comorbilidades cardiovasculares</u>).</p>

        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>En el ENARM, el manejo hemático del paciente no se trata de "saber cuándo transfundir", sino de <strong class="text-indigo-900 dark:text-indigo-200">evitar a toda costa la transfusión innecesaria</strong> mediante la optimización preoperatoria (corrigiendo la anemia), la reanimación hemostática guiada por metas (reanimación restrictiva) y el <u class="decoration-indigo-400 decoration-2 font-medium">uso precoz de antifibrinolíticos</u>, entendiendo que la sangre alogénica incrementa la morbimortalidad si no está estrictamente justificada.</p>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura el manejo en escenarios donde la conducta cambia drásticamente:</p>

                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">Preoperatorio (Detección de Anemia):</strong> Si hay deficiencia de hierro, el manejo cambia inmediatamente a <strong class="text-rose-600 dark:text-rose-400 font-bold">reposición con hierro intravenoso</strong>. En pacientes con cáncer, se prohíbe el uso rutinario de estimulantes de eritropoyesis (AEE).

                            <strong class="text-slate-800 dark:text-slate-200">El evento agudo (Choque Hemorrágico):</strong> Olvida los grandes bolos de cristaloides. La GPC exige una <strong class="underline">terapia hídrica restrictiva y el inicio temprano de vasopresores</strong> para alcanzar la presión arterial media sin exacerbar el sangrado por hemodilución.
                        </div>

                    <ul class="space-y-3 text-sm">

                </h4>
                <ol class="list-decimal pl-5 space-y-2 font-medium text-slate-800 dark:text-slate-200">
                    <li><strong class="text-amber-700 dark:text-amber-500">Regla de oro de anemia preoperatoria:</strong> Tratar deficiencia de hierro idealmente con <strong class="underline">hierro intravenoso</strong> y evitar el uso de AEE en oncológicos.</li>

                    <li><strong class="text-amber-700 dark:text-amber-500">Reanimación Hídrica Restrictiva:</strong> En choque hemorrágico, usar terapia restrictiva y <strong class="underline">vasopresores de forma temprana</strong>.</li>
                </ol>

{
    id: 10,
    title: "Módulo 10: Diagnóstico y tratamiento de várices esofágicas en el adulto",
    gpcLink: "https://drive.google.com/file/d/1iizkgrNjxfDkqySsH7mEC2tZVUUnDxVY/view?usp=sharing",
    summary: `
        <div class="space-y-6 text-sm sm:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
            
            <div class="bg-indigo-50 dark:bg-indigo-900/20 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-sm">
                <h4 class="font-bold text-indigo-800 dark:text-indigo-300 text-lg mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    El Concepto Fundamental
                </h4>
                <p>El manejo de la hemorragia variceal no es solo detener el sangrado, es una <strong class="text-indigo-900 dark:text-indigo-200">resucitación hemodinámica restrictiva combinada con terapia farmacológica inmediata</strong> (vasoconstrictores esplácnicos + antibióticos) y tratamiento endoscópico; el éxito depende de <u class="decoration-indigo-400 decoration-2 font-medium">evitar la sobretransfusión que aumenta la presión portal y prevenir la infección que dispara la mortalidad</u>.</p>
            </div>

            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-xl shadow-sm">
                <h4 class="font-bold text-slate-800 dark:text-slate-100 text-lg mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">🔄 FLUJO de MANEJO</h4>
                <p class="mb-4">La GPC estructura el pensamiento clínico en dos escenarios diametralmente opuestos donde el manejo cambia radicalmente:</p>
                
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">1</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Escenario Preventivo (El paciente estable):</strong> La decisión se basa en el tamaño de la varice y la reserva hepática. Várices pequeñas (<5mm) en Child-Pugh A = Observación. Si el paciente es Child-Pugh B/C o las várices son <strong class="text-rose-600 dark:text-rose-400 font-bold">grandes (>5mm)</strong>, es obligatorio iniciar Betabloqueadores no cardioselectivos o ligadura variceal.
                        </div>
                    </div>
                    
                    <div class="flex gap-4">
                        <div class="flex-shrink-0 w-8 h-8 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 rounded-full flex items-center justify-center font-bold shadow-sm">2</div>
                        <div>
                            <strong class="text-slate-800 dark:text-slate-200">El Escenario Agudo (El paciente en choque):</strong>
                            <ul class="mt-2 space-y-1 ml-4 list-[circle] text-sm">
                                <li><strong class="font-bold">Estabilización (ABC):</strong> Asegurar vía aérea y hemodinamia.</li>
                                <li><strong class="font-bold text-emerald-600 dark:text-emerald-500">Fármacos PRE-Endoscopia:</strong> Iniciar <strong class="underline">vasoconstrictores y antibióticos</strong> sin esperar confirmación visual.</li>
                                <li><strong class="font-bold">Terapia Endoscópica:</strong> Una vez estable, se realiza el procedimiento. Si falla, se utiliza el balón de Sengstaken-Blakemore como puente (máximo 24 horas).</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-50 dark:bg-emerald-900/10 border-t-4 border-emerald-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-emerald-800 dark:text-emerald-400 text-lg mb-3">📈 Correlación "High-Yield"</h4>
                    <ul class="space-y-3 text-sm">
                        <li><strong>Tríada de Transfusión Restrictiva:</strong>
                            <br>- <strong class="text-emerald-700 dark:text-emerald-300 font-bold">Hemoglobina:</strong> Mantener entre <u class="decoration-emerald-400 decoration-2 font-bold">7 y 8 g/dL</u>.
                            <br>- <strong>Plaquetas:</strong> Solo si hay sangrado activo y < 50,000/µl.
                            <br>- <strong>Coagulopatía:</strong> PFC si INR > 1.5 o fibrinógeno < 1g/L.
                        </li>
                        <li><strong>Estratificación de Riesgo:</strong> Correlacionar clínica y laboratorio para el <strong class="font-bold">Child-Pugh</strong>. Para pronóstico de mortalidad a corto plazo (3 meses) y resangrado se usa el <strong class="font-bold">MELD</strong>.</li>
                    </ul>
                </div>

                <div class="bg-rose-50 dark:bg-rose-900/10 border-t-4 border-rose-500 p-5 rounded-b-xl shadow-sm">
                    <h4 class="font-bold text-rose-800 dark:text-rose-400 text-lg mb-3">🚩 "Red Flags" y Trampas ENARM</h4>
                    <ul class="space-y-2 text-sm">
                        <li><strong>Varices Gástricas:</strong> Si son várices en el fondo gástrico (IGV1 o GOV2), la ligadura es insuficiente. La respuesta correcta cambia a <strong class="font-bold text-rose-600 dark:text-rose-400">adhesivos tisulares (N-butilcianoacrilato)</strong>.</li>
                        <li><strong>Profilaxis Secundaria:</strong> Un paciente que ya sangró requiere terapia combinada: <u class="decoration-rose-500 decoration-2">Betabloqueadores + Ligadura variceal</u>. Usar solo uno es una respuesta incompleta en este contexto.</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-amber-100 to-yellow-50 dark:from-amber-900/30 dark:to-yellow-900/10 p-5 rounded-xl border border-amber-200 dark:border-amber-800/50 shadow-sm">
                <h4 class="font-bold text-amber-900 dark:text-amber-400 text-lg mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z" /></svg>
                    Las 5 Perlas de Oro (GPC IMSS-087-08)

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>

            }

                            Ver Resumen del Módulo

        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>

                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-amber-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;

            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;

                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />
                    </svg>
                    <span>${citation}</span>
                `;
                bibliographyContent.appendChild(item);
            });
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríauno7CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríauno7CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríauno7CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-amber-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-amber-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
