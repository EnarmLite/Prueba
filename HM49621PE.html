    <script>
        const questionsData = [

    {
        id: 1,
        question: "En la Otitis Media Aguda pediátrica, ¿cuál es el agente bacteriano causante documentado en menos del 5% de los episodios clínicos?",
        options: ["Streptococcus pneumoniae", "Haemophilus influenzae no tipificable", "Moraxella catarrhalis", "Streptococcus pyogenes"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, la etiología predominante está dominada por neumococo y patógenos productores de betalactamasas, dejando a los estreptococos del grupo A como una causa infrecuente en la actualidad.<br><br>Perla ENARM: \"El Streptococcus pyogenes (estreptococo B-hemolítico del grupo A) se presenta en menos del 5% de los casos\".<br><br>Análisis de Distractores: Las opciones A, B y C son incorrectas porque conforman la triada bacteriana clásica que causa más del 95% de los episodios purulentos, siendo el blanco del tratamiento empírico de primera y segunda línea.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Introducción, Página 8."
    },
    {
        id: 2,
        question: "En un paciente pediátrico con sospecha de Otitis Media Aguda, ¿cuál es el instrumento clínico recomendado como estándar para prevenir el retraso diagnóstico e identificar eficientemente líquido en el oído medio?",
        options: ["Otoscopio estático convencional", "Otoscopio neumático", "Timpanómetro de impedancia", "Diapasón de 512 Hz"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, la capacidad de evaluar dinámicamente la membrana timpánica mediante insuflación de aire otorga una sensibilidad del 94% para la detección de derrame.<br><br>Perla ENARM: \"Para el diagnóstico de OMA se recomienda identificar líquido en oído medio, el instrumento recomendado es la otoscopia neumática, con fuente de luz adecuada y especulo sin color\".<br><br>Análisis de Distractores: La opción A no permite valorar la movilidad (estático). La opción C es un estudio de gabinete (no el instrumento clínico de exploración primaria). La opción D se usa para hipoacusia neurosensorial/conductiva en niños mayores o adultos, no evidencia derrame agudo directamente.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Diagnóstico Clínico, Página 24."
    },
    {
        id: 3,
        question: "En lactantes menores de 6 meses de edad en quienes no se logra confirmar o descartar derrame ótico por clínica, ¿cuál es la especificación técnica del estudio audiológico a solicitar?",
        options: ["Timpanometría de 226 Hz", "Timpanometría de 1000 Hz", "Audiometría tonal pura", "Logoaudiometría convencional"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, los lactantes pequeños poseen una complianza del conducto auditivo diferente que vuelve ineficaz la frecuencia estándar, obligando al uso de alta frecuencia para superar esta barrera anatómica.<br><br>Perla ENARM: \"Efectuar timpanometría de alta frecuencia (1,000 Hz) en menores de 6 meses en los que se deba investigar OMD y que ésta no se haya logrado confirmar o descartar después de valoración clínica\".<br><br>Análisis de Distractores: La opción A es la frecuencia utilizada en niños mayores y adultos, pero poco sensible en <6 meses. Las opciones C y D requieren cooperación neurocognitiva avanzada, aplicables únicamente a partir de los 4 años de edad.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Diagnóstico Clínico, Página 23."
    },
    {
        id: 4,
        question: "Epidemiológicamente en la Otitis Media Aguda, ¿cuál es el factor de riesgo modificable asociado a la exposición temprana a otopatógenos que incrementa hasta cinco veces el riesgo de desarrollar la enfermedad?",
        options: ["Alimentación con fórmulas lácteas", "Tabaquismo pasivo intradomiciliario", "Asistencia a guarderías", "Uso constante de chupón"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, el hacinamiento y la convivencia masiva exponen a la población pediátrica a cargas bacterianas y virales que colonizan la nasofaringe, disparando la incidencia.<br><br>Perla ENARM: \"Los estudios sobre asistencia a guardería fueron concordantes acerca de la presencia de una fuerte asociación con un incremento de riesgo para OMA debido a la exposición a los principales colonizadores otopatógenos y agentes virales\".<br><br>Análisis de Distractores: Las opciones A, B y D son factores de riesgo reales mencionados en la guía, sin embargo, la estadística enfatiza explícitamente a las guarderías con el nivel de incremento de riesgo mayor (OR: 5.0) por el contagio directo.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Promoción, Página 17."
    },
    {
        id: 5,
        question: "Para clasificar clínicamente un episodio de Otitis Media Aguda como de severidad grave, ¿cuál es el punto de corte térmico establecido que determina el abordaje farmacológico?",
        options: ["Fiebre ≥ 38.0 °C", "Fiebre ≥ 38.5 °C", "Fiebre ≥ 39.0 °C", "Fiebre ≥ 39.5 °C"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, alcanzar o superar este umbral térmico define automáticamente un estado de alta toxicidad sistémica que anula la posibilidad de observación clínica e impone la antibioticoterapia inmediata.<br><br>Perla ENARM: \"Otitis Media Aguda grave se define por fiebre ≥ 39°C, otalgia de intensidad severa o una evolución de los síntomas mayor a 48 horas\".<br><br>Análisis de Distractores: Las opciones A y B reflejan fiebre o febrícula, pero catalogan el episodio como leve si no se acompañan de dolor intenso. La opción D es un valor por encima del corte oficial de la escala de severidad.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Definición, Detección y Clasificación, Página 8."
    },
    {
        id: 6,
        question: "En un paciente pediátrico diagnosticado con Otitis Media con Derrame sin factores de riesgo concurrentes, ¿cuál es el tiempo mínimo indicado para mantener una conducta de vigilancia exclusiva antes de escalar manejo?",
        options: ["1 mes", "2 meses", "3 meses", "6 meses"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, la mayoría de los derrames residuales post-infecciosos o inflamatorios en pacientes sanos logran una reabsorción fisiológica espontánea dentro de este trimestre, evitando el sobretratamiento.<br><br>Perla ENARM: \"Mantener conducta de vigilancia en el paciente pediátrico con OMD sin factores o condiciones de riesgo, durante al menos 3 meses a partir del inicio de la enfermedad o del diagnóstico\".<br><br>Análisis de Distractores: Las opciones A y B son lapsos insuficientes donde el derrame residual es aún esperado y normal. La opción D retrasará la intervención si el derrame persiste, arriesgando secuelas conductivas y del lenguaje permanentes.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Pronóstico, Página 34."
    },
    {
        id: 7,
        question: "En un paciente de 18 meses con Otitis Media Aguda de primer contacto, ¿cuál es el fármaco antimicrobiano empírico de elección sustentado por su eficacia y perfil de seguridad?",
        options: ["Claritromicina", "Amoxicilina", "Ceftriaxona", "Cefuroxima"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, el uso de aminopenicilinas aisladas garantiza un espectro suficiente contra el principal patógeno invasivo, promoviendo mejor tolerancia gástrica y menor disbiosis intestinal.<br><br>Perla ENARM: \"La amoxicilina es el antibiótico de primera elección por su eficacia, seguridad, bajo costo, buen sabor y espectro antibiótico... garantizando una eficacia similar a antibióticos de mayor espectro con menor incidencia de efectos secundarios\".<br><br>Análisis de Distractores: La opción A se reserva para hipersensibilidad comprobada a penicilinas. La opción C es de uso intramuscular/intravenoso exclusivo para fracaso terapéutico severo o vómito intratable. La opción D es una segunda línea oral para falla.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Tratamiento, Página 28."
    },
    {
        id: 8,
        question: "En el tratamiento de la Otitis Media Aguda, ¿cuál es la justificación microbiológica directa para implementar dosis elevadas de amoxicilina de 80 a 90 mg/kg/día?",
        options: ["Erradicar cepas de Haemophilus influenzae productoras de betalactamasas", "Vencer cepas de Streptococcus pneumoniae con resistencia intermedia", "Inhibir el desarrollo de colesteatoma y fístula laberíntica", "Eliminar cepas de Moraxella catarrhalis multirresistente"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, la saturación farmacocinética eleva la concentración en el oído medio superando la concentración mínima inhibitoria alterada de las proteínas fijadoras de penicilina (PBP) del neumococo.<br><br>Perla ENARM: \"Aumentar la dosis a 80-90 mg/kg/día de amoxicilina se asocia con un aumento de la concentración... asegurando eficacia contra la mayoría de las cepas de S. pneumoniae, incluidos aquellos con resistencia intermedia\".<br><br>Análisis de Distractores: Las opciones A y D refieren bacterias que destruyen enzimáticamente la amoxicilina, por lo que aumentar la dosis es inútil (requieren el inhibidor ácido clavulánico). La opción C es el propósito del tratamiento quirúrgico (tubos de ventilación), no un efecto farmacológico.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Tratamiento, Página 28."
    },
    {
        id: 9,
        question: "En el cuadro clínico de Otitis Media Aguda asociado de forma simultánea a conjuntivitis purulenta, ¿cuál es el esquema antimicrobiano empírico de primera línea indicado?",
        options: ["Amoxicilina a dosis altas", "Cefuroxima en suspensión", "Amoxicilina con ácido clavulánico", "Claritromicina por vía oral"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, el síndrome \"otitis-conjuntivitis\" es ocasionado típicamente por H. influenzae no tipificable, microorganismo productor de betalactamasas que inactiva regímenes de penicilinas sin inhibidores enzimáticos.<br><br>Perla ENARM: \"Algunos autores consideran esta combinación [amoxicilina-ácido clavulánico] preferible en niños que han recibido antibióticos en los últimos 30 días, en aquellos con síntomas graves y/o conjuntivitis purulenta\".<br><br>Análisis de Distractores: La opción A fracasará clínicamente por la lisis del anillo betalactámico mediada por el patógeno causal. Las opciones B y D no son la primera indicación sindromática, reservándose para allergies o fracaso comprobado a la aminopenicilina combinada.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Tratamiento, Página 28."
    },
    {
        id: 10,
        question: "En la inmunización primaria contra patógenos causantes de Otitis Media Aguda, ¿cuál serotipo capsular altamente invasivo y resistente es cubierto exclusivamente por la vacuna conjugada de 13 valencias?",
        options: ["Serotipo 14", "Serotipo 19A", "Serotipo 23F", "Serotipo 6B"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, el recambio ecológico posterior a las vacunas de 7 valencias generó predominancia de este serotipo, responsable de fallas terapéuticas severas y mastoiditis.<br><br>Perla ENARM: \"La VCN13 contiene 6 serotipos adicionales a la VCN7, es la única que incluye serotipo 19A, identificado como la causa más importante de enfermedad invasiva por neumococo, incluyendo mastoiditis\".<br><br>Análisis de Distractores: Las opciones A, C y D corresponden a serotipos inmunogénicos que ya estaban cubiertos previamente por la VCN7; la \"novedad\" clínica y perla de examen radica en el de impacto directo del serotipo 19A agregado a la de 13 valencias.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Prevención, Página 20."
    },
    {
        id: 11,
        question: "En la evaluación terapéutica de la Otitis Media Aguda, ¿cuál es la edad mínima del paciente pediátrico para aplicar la estrategia de \"espera-vigilancia\" inicial con revaloración en 48 a 72 horas?",
        options: ["Mayores de 6 meses", "Mayores de 12 meses", "Mayores de 24 meses", "Mayores de 36 meses"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, a partir de los dos años de edad el sistema inmunológico alcanza la madurez suficiente para autolimitar la de inflamación sin alto riesgo de de diseminación invasiva por microorganismos capsulados.<br><br>Perla ENARM: \"La de estrategia de de observación-vigilancia involucra la de observación... debe considerarse únicamente si el de diagnóstico es de confirmado y de se toman en cuenta: edad del de niño (sobre los de 2 años), severidad del de episodio y de si uno o de ambos oídos están de afectados\".<br><br>Análisis de Distractores: Las opciones A y B engloban lactantes donde el de inicio temprano y de obligatorio de de antibióticos es de inapelable. La de opción D es de un grupo que de aplica la de vigilancia, pero no es el de límite de de corte mínimo oficial de marcado por el de algoritmo.",
        source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Tratamiento, Página 26."
    },
    {
        id: 12,
        question: "En un episodio de Otitis Media Aguda, ¿cuál antecedente o hallazgo clínico se clasifica como factor de riesgo para incrementar la duración del esquema antibiótico entre 10 y 14 días?",

                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('49621Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('49621LastQId', currentQuestionId);
                else localStorage.removeItem('49621LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('49621Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
