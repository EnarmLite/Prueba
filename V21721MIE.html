    {

        question: "¿Cuál es la conformación estructural y genómica del agente etiológico responsable del Herpes Zóster?",

        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, el microorganismo patógeno pertenece a la familia Herpesviridae. Su estructura molecular contiene una nucleocápside icosaédrica cubierta por una envoltura lipídica con un genoma de doble cadena.<br><br>Perla ENARM: El virus “varicela zoster” (VVZ) es un alfa-herpesvirus... con un tamaño de casi 180 a 200 nm y un ADN bicatenario de localización central.<br><br>Análisis de Distractores: Las opciones con ARN corresponden a otros patógenos virales (ej. retrovirus o paramixovirus). El tamaño específico y la doble cadena de ADN son distintivos obligatorios de esta familia viral.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Introducción, Página 7."
    },
    {
        id: 2,
        question: "¿Cuál es el principal sitio anatómico tisular donde el virus de la varicela zóster permanece latente previo a su reactivación?",
        options: ["Ganglios linfáticos regionales", "Células epidérmicas basales", "Ganglios de raíces dorsales", "Médula ósea y bazo"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, tras la primoinfección, el virus evade la respuesta inmune y migra de forma retrógrada por los nervios sensitivos, estableciendo su reservorio crónico.<br><br>Perla ENARM: Posterior a la primoinfección el VVZ permanece latente en las neuronas de los ganglios de las raíces dorsales, los ganglios autónomos incluyendo intestinales y los nervios craneales.<br><br>Análisis de Distractores: Las células epidérmicas albergan la replicación activa y formación de vesículas agudas, pero no la latencia. Los ganglios linfáticos y la médula ósea participan en la defensa inmunitaria, mas no son el santuario neurológico del virus.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Introducción, Página 7."
    },
    {
        id: 3,
        question: "¿Cuál es el porcentaje de incidencia de Neuralgia Postherpética reportado en pacientes > 70 años que no reciben tratamiento antiviral oportuno?",
        options: ["27 %", "35 %", "47 %", "73 %"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, el daño neuroquímico crónico es directamente proporcional al envejecimiento del sistema nervioso y la inmunosenescencia, volviéndose la regla general en el paciente geriátrico no tratado.<br><br>Perla ENARM: La NPH se puede presentar en el 27 %, el 47 % y el 73 % de los adultos no tratados con antivirales de más de 55, 60 y 70 años respectivamente.<br><br>Análisis de Distractores: 27 % corresponde a la incidencia en pacientes > 55 años, y 47 % a pacientes > 60 años. 35 % no es un valor de corte epidemiológico validado por la normativa.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Pronóstico, Página 15."
    },
    {
        id: 4,
        question: "¿A partir de qué edad está estrictamente indicada la vacunación primaria para la prevención de esta patología?",

        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, la intervención profiláctica es costo-efectiva a partir de la quinta década de la vida, reduciendo tanto el evento agudo como la morbilidad a largo plazo.<br><br>Perla ENARM: Prevención del HZ en personas mayores de 50 años. No está indicada para la prevención de la infección primaria por varicela.<br><br>Análisis de Distractores: Los cortes de 60 y 65 años rigen otras inmunizaciones (ej. neumococo), pero retrasan inútilmente la protección contra reactivaciones zóster. El corte de 40 años no tiene sustento en los picos epidemiológicos.",

    },
    {

        question: "¿Qué porcentaje de reducción en la incidencia de la Neuralgia Postherpética otorga la aplicación de la vacuna con cepa OKA?",

        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Prevención, Página 12."
    },
    {
        id: 6,
        question: "¿Qué antecedente patológico representa una contraindicación absoluta para la administración de la vacuna preventiva de Herpes Zóster?",

        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, al tratarse de un biológico elaborado a partir de cepas vivas atenuadas, la inmunosupresión primaria o adquirida desencadena riesgo de enfermedad diseminada letal.<br><br>Perla ENARM: Contraindicaciones: Estados de inmunodeficiencia primaria o adquiridos debido a: a) Leucemia aguda o crónica. b) Linfoma. c) Inmunosupresión por VIH/SIDA.<br><br>Análisis de Distractores: La hipertensión y disfunción renal exigen ajuste de fármacos pero no comprometen la inmunidad celular al grado de prohibir virus vivos. La normativa contraindica su uso en tuberculosis activa, no latente.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Anexos, Página 20."
    },
    {
        id: 7,
        question: "Previo a la aplicación de la vacuna preventiva contra el Herpes Zóster en adultos, ¿qué estudio paraclínico debe solicitarse obligatoriamente?",

        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, dada la alta prevalencia de contacto previo en la población general, retrasar la inmunización esperando confirmación laboratorial carece de utilidad clínica.<br><br>Perla ENARM: Los pacientes pueden ser vacunados sin realizar test serológicos ni considerar los antecedentes sobre haber padecido varicela o HZ ni enfermedades crónicas.<br><br>Análisis de Distractores: La solicitud de anticuerpos o biología molecular incrementa costos y retrasa la protección primaria. La biometría hemática no rige la viabilidad de la vacunación en población abierta.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Prevención, Página 13."
    },
    {
        id: 8,
        question: "¿Cuál es el tiempo máximo de evolución del exantema en el que está justificado iniciar terapia antiviral oral para garantizar su eficacia?",

        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Anexos, Página 19."
    },
    {
        id: 9,
        question: "¿Cuál es la dosificación y frecuencia del fármaco antiviral de primera línea (Aciclovir) para un adulto con depuración de creatinina > 25 ml/min?",

        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Anexos, Página 19."
    },
    {

        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, este profármaco alcanza mayor biodisponibilidad enteral, lo que permite espaciar las tomas mejorando el apego terapéutico, pero exige dosis netas altas.<br><br>Perla ENARM: Valaciclovir 1000 mg 3 veces al día por 7 días.<br><br>Análisis de Distractores: 500 mg es una dosis baja o reservada para disfunción renal grave. 800 mg corresponde exclusivamente a los comprimidos de Aciclovir.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Anexos, Página 19."
    },
    {
        id: 11,
        question: "¿Cuál es el ajuste de dosis obligatorio normado para Aciclovir oral en pacientes que cursan con una depuración de creatinina < 10 ml/min?",
        options: ["400 mg cada 12 horas", "800 mg cada 8 horas", "800 mg 5 veces al día", "800 mg cada 12 horas"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, este medicamento cristaliza fácilmente en el túbulo renal, por lo que en escenarios de falla grave se debe mantener el volumen de dosis pero ampliar agresivamente el intervalo para evitar toxicidad.<br><br>Perla ENARM: Dosis ajustadas para la función renal. Aciclovir: < 10 ml/min 800 mg/12 h.<br><br>Análisis de Distractores: Bajar los miligramos (ej. 400 mg) resulta en concentraciones subóptimas y fracaso virológico. 800 mg cada 8 horas es el ajuste indicado para filtrados intermedios (10-24 ml/min).",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Anexos, Página 20."
    },
    {
        id: 12,
        question: "¿Cuál es el ajuste de dosis estricto para Valaciclovir en pacientes que presentan una depuración de creatinina < 10 ml/min?",
        options: ["500 mg cada 24 horas", "1000 mg cada 24 horas", "500 mg cada 12 horas", "1000 mg cada 12 horas"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, ante insuficiencia renal terminal, la eliminación del metabolito activo se prolonga críticamente, obligando a reducir a la mitad la dosis mínima y administrarla una sola vez al día.<br><br>Perla ENARM: Dosis ajustadas para la función renal. Valaciclovir: < 10 ml/min 500 mg/24 h.<br><br>Análisis de Distractores: 1000 mg cada 24 horas es la pauta para pacientes con depuración entre 10-29 ml/min. 500 mg cada 12 horas y 1000 mg cada 12 horas provocarían neurotoxicidad grave en anuria o falla terminal.",
        source: "GPC-SS-217-21, Prevención y tratamiento del herpes zóster en el adulto, 2021, Anexos, Página 20."
    },
    {

        question: "Aplicando la escalera analgésica de la Organización Mundial de la Salud, ¿cuál es el fármaco obligatorio para el primer paso terapéutico del dolor?",

        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Prevención y tratamiento del herpes zóster en el adulto, el abordaje del dolor debe ser estructurado, evitando fármacos de alto riesgo toxicológico inicial, utilizando la base analgésica no opioide a dosis techo.<br><br>Perla ENARM: Primer paso: paracetamol. En pacientes con dolor leve a moderado, vía oral 500-1000 mg cada 6 a 8 horas. Se sugiere no usar opioides de primera intención para el manejo del dolor.<br><br>Análisis de Distractores: El tramadol corresponde al segundo escalón (opioides débiles). La morfina pertenece al tercer escalón (opioides potentes). La gabapentina es un adyuvante para dolor crónico neuropático, no el fármaco pilar del primer escalón.",

                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-fuchsia-600 hover:to-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExMI10Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExMI10LastQId', currentQuestionId);
                else localStorage.removeItem('ExMI10LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExMI10Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
