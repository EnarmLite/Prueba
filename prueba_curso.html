            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
                id: 1,
                title: "Módulo 1: Detección, diagnóstico y tratamiento de las enfermedades hipertensivas del embarazo",
                gpcLink: "https://drive.google.com/file/d/1X_n67Panz8VBVq5t0CAnaKLNN3a9UsqE/view?usp=sharing",
                summary: `<div class="space-y-6 text-sm md:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
                    
                    <div class="bg-pink-50 dark:bg-pink-900/20 p-5 rounded-lg border-l-4 border-pink-500 shadow-sm">
                        <h4 class="font-extrabold text-pink-700 dark:text-pink-400 mb-2 text-lg">1. El Concepto Fundamental</h4>
                        <p>El ENARM busca que comprendas que la <u class="font-bold decoration-pink-500 decoration-2 underline-offset-2">Preeclampsia es una falla endotelial sistémica</u> que se define por <strong>hipertensión (≥140/90 mmHg) de novo después de la semana 20</strong> de gestación, acompañada tradicionalmente de <strong>proteinuria</strong>, o en su defecto, de <strong>daño a órgano blanco</strong> (condiciones adversas).</p>
                        <p class="mt-2">Tu prioridad es distinguir entre una paciente estable (<span class="text-emerald-600 dark:text-emerald-400 font-bold">manejo expectante</span>) y una con Criterios de Severidad que requiere <span class="text-red-600 dark:text-red-400 font-bold">interrupción inmediata</span>.</p>
                    </div>

                    <div>
                        <h4 class="font-bold text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2 mb-3 text-lg">2. FLUJO de MANEJO</h4>
                        <p class="mb-3">El abordaje se divide en tres momentos cronológicos decisivos:</p>
                        <ul class="space-y-4 pl-2">
                            <li class="pl-4 border-l-2 border-slate-300 dark:border-slate-600">
                                <strong class="text-slate-900 dark:text-white">Tamizaje y Prevención (Semanas 11-16):</strong> El algoritmo inicia temprano. Si detectas alto riesgo (ej. Doppler alterado), inicias <mark class="bg-yellow-200 dark:bg-yellow-800/60 dark:text-yellow-100 px-1 rounded font-semibold">Ácido Acetilsalicílico (AAS) 80-150 mg</mark> nocturno <u>antes de la semana 16</u>. Si hay dieta pobre en calcio (≤600 mg/día), suplementas con 1 g/día.
                            </li>
                            <li class="pl-4 border-l-2 border-slate-300 dark:border-slate-600">
                                <strong class="text-slate-900 dark:text-white">El Diagnóstico (La barrera de las 20 semanas):</strong>
                                <ul class="list-disc pl-5 mt-2 space-y-1">
                                    <li>Antes de semana 20: <strong>Hipertensión Crónica</strong>.</li>
                                    <li>Después de semana 20: <strong>Preeclampsia o HTN Gestacional</strong>.</li>
                                    <li><span class="text-pink-600 dark:text-pink-400 font-bold">Punto de Quiebre:</span> Tira reactiva 1+ <u>NO es diagnóstico definitivo</u>, te obliga a confirmar con recolección de orina de 24 horas (≥300 mg).</li>
                                </ul>
                            </li>
                            <li class="pl-4 border-l-2 border-slate-300 dark:border-slate-600">
                                <strong class="text-slate-900 dark:text-white">El Manejo y Resolución (Semáforo de severidad):</strong>
                                <ul class="list-none pl-2 mt-2 space-y-2">
                                    <li>🟢 <span class="text-emerald-600 dark:text-emerald-400 font-bold">Verde (Controlada):</span> Inducción del parto hasta la semana 38.</li>
                                    <li>🟡 <span class="text-amber-600 dark:text-amber-400 font-bold">Amarillo (Condiciones Adversas):</span> Cefalea, síntomas visuales, creatinina elevada o plaquetas &lt;100k = Vigilancia estrecha.</li>
                                    <li>🔴 <span class="text-red-600 dark:text-red-400 font-bold">Rojo (Complicaciones Severas):</span> Eclampsia, ceguera, desprendimiento de retina, plaquetas &lt;50k o HTN descontrolada con 3 fármacos = <u>Nacimiento inminente</u>.</li>
                                </ul>
                            </li>
                        </ul>
                    </div>

                    <div class="bg-slate-50 dark:bg-slate-900/50 p-5 rounded-lg border border-slate-200 dark:border-slate-700">
                        <h4 class="font-bold text-slate-800 dark:text-slate-100 mb-3 text-lg">3. Correlación "High-Yield": Clínica y Gabinete</h4>
                        <p class="mb-3 italic text-slate-600 dark:text-slate-400">La clínica manda sobre el laboratorio, pero el laboratorio confirma la gravedad.</p>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>El ojo clínico:</strong> La cefalea y los acúfenos son datos de vasoespasmo cerebral (Condiciones Adversas). Te dice que la paciente se está deteriorando.</li>
                            <li><strong>La correlación renal:</strong> Una tira 1+ es señal de alarma, pero el estándar es <u class="font-semibold">orina de 24h ≥300 mg</u>. Si la creatinina sérica sube (&gt;1.1 mg/dl o se duplica), es <span class="font-bold text-red-500">Daño Renal Agudo</span> (Complicación Severa).</li>
                            <li><strong>El feto como paciente:</strong> En pruebas de bienestar fetal, si el Doppler muestra <mark class="bg-pink-100 dark:bg-pink-900/50 dark:text-pink-200 px-1 rounded">flujo reverso en diástole</mark>, es indicación de nacimiento (Complicación Severa).</li>
                        </ul>
                    </div>

                    <div>
                        <h4 class="font-bold text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2 mb-3 text-lg">4. Diferenciales y "Red Flags" (Trampas del Examen)</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="p-4 bg-white dark:bg-slate-800 rounded shadow-sm border border-slate-100 dark:border-slate-600">
                                <strong class="text-pink-600 dark:text-pink-400">HTN Crónica vs Gestacional</strong>
                                <p class="mt-1 text-sm">La clave es la <strong>semana 20</strong>. Cuidado con la "Preeclampsia Sobreagregada" (paciente crónica que desarrolla nueva proteinuria o resistencia al tratamiento).</p>
                            </div>
                            <div class="p-4 bg-white dark:bg-slate-800 rounded shadow-sm border border-slate-100 dark:border-slate-600">
                                <strong class="text-pink-600 dark:text-pink-400">Bata Blanca vs Enmascarada</strong>
                                <p class="mt-1 text-sm"><u>Bata Blanca</u>: Alta en consultorio, normal en casa. <u>Enmascarada</u>: Normal en consultorio, alta en casa (muy peligrosa por pasar desapercibida).</p>
                            </div>
                        </div>
                        <div class="mt-4 p-4 bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-200 border-l-4 border-red-500 rounded">
                            <strong>⚠️ Preeclampsia SIN Proteinuria:</strong> Puedes diagnosticar Preeclampsia sin proteinuria si hay hipertensión + una condición adversa (ej. trombocitopenia). No te cases con la orina si la clínica grita peligro.
                        </div>
                    </div>

                    <div class="bg-indigo-50 dark:bg-indigo-900/20 p-5 rounded-lg border border-indigo-100 dark:border-indigo-800">
                        <h4 class="font-bold text-indigo-800 dark:text-indigo-300 mb-3 text-lg">5. Las 5 Perlas de Oro</h4>
                        <ol class="list-decimal pl-5 space-y-2 font-medium text-indigo-900 dark:text-indigo-200">
                            <li><strong>Fármaco Preventivo:</strong> AAS 80-150 mg nocturno iniciado antes de la sem 16.</li>

                summary: `<div class="space-y-6 text-sm md:text-base text-slate-700 dark:text-slate-300 leading-relaxed">
                    
                    <div class="bg-pink-50 dark:bg-pink-900/20 p-5 rounded-lg border-l-4 border-pink-500 shadow-sm">
                        <h4 class="font-extrabold text-pink-700 dark:text-pink-400 mb-2 text-lg">1. El Concepto Fundamental</h4>
                        <p>El "corazón" de este tema en el ENARM es el triaje adecuado mediante la medición de la <strong>longitud cervical</strong>. El objetivo <u class="font-bold decoration-pink-500 decoration-2 underline-offset-2">no es detener todo el trabajo de parto</u>, sino identificar con precisión a la paciente con <strong>Amenaza de Parto Pretérmino (APP) real</strong> para ganar las 48 horas críticas necesarias para la <mark class="bg-pink-200 dark:bg-pink-800/60 dark:text-pink-100 px-1 rounded font-semibold">maduración pulmonar y la neuroprotección</mark>.</p>
                        <p class="mt-2 text-slate-600 dark:text-slate-400 italic">Esto evita intervenciones inútiles (como reposo o tocolisis prolongada) en quienes no nacerán pronto.</p>
                    </div>

                    <div>
                        <h4 class="font-bold text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2 mb-3 text-lg">2. FLUJO de MANEJO</h4>
                        <p class="mb-3">La narrativa de la GPC se divide en dos escenarios:</p>
                        <ul class="space-y-4 pl-2">
                            <li class="pl-4 border-l-2 border-slate-300 dark:border-slate-600">
                                <strong class="text-slate-900 dark:text-white">El Cribado (Escenario Preventivo):</strong> 
                                <p class="mt-1">Clasificar el riesgo. Si hay Factores de Riesgo (FR) (historia de parto pretérmino, pérdidas recurrentes, embarazo múltiple), realizar medición de Longitud Cervical (LC) por USG endovaginal (14-24 SDG).</p>
                                <div class="mt-2 p-3 bg-emerald-50 dark:bg-emerald-900/20 border-l-4 border-emerald-500 rounded text-sm">
                                    <span class="font-bold text-emerald-700 dark:text-emerald-400">1:</span> Si la LC es corta (&lt;25 mm a las 20-24 SDG o &lt;15 mm a las 14-15 SDG) ➡️ <strong>Progesterona Vaginal</strong>. Si hay historia de parto pretérmino previo + cérvix corto ➡️ <strong>Cerclaje</strong>.
                                </div>
                            </li>
                            <li class="pl-4 border-l-2 border-slate-300 dark:border-slate-600">
                                <strong class="text-slate-900 dark:text-white">La Crisis (Escenario Sintomático - APP):</strong>
                                <p class="mt-1">No basta con dolor. Se requiere el índice de Gruber Baumgarten &gt;5 o cambios cervicales.</p>
                                <ul class="list-disc pl-5 mt-2 space-y-2">
                                    <li><span class="text-amber-600 dark:text-amber-400 font-bold">2 (Diagnóstico):</span> ¿Duda Diagnóstica? Si tiene contracciones pero poca dilatación (&lt;3 cm), la GPC exige objetividad: <strong>Medición de LC o Fibronectina Fetal</strong>. Si LC &lt;15 mm o fibronectina (+), se ingresa. Si no, alta (alto VPN).</li>
                                    <li><span class="text-pink-600 dark:text-pink-400 font-bold">3 (Manejo):</span> Ingresada, el reloj corre. <strong>Tocolisis por 48h + Corticoides</strong>. Si &lt;32 semanas (24-31 SDG para MgSO4) ➡️ Neuroprotección. Si dilatación avanza a ≥4 cm ➡️ suspender tocolisis y atender parto.</li>
                                </ul>
                            </li>
                        </ul>
                    </div>

                    <div class="bg-slate-50 dark:bg-slate-900/50 p-5 rounded-lg border border-slate-200 dark:border-slate-700">
                        <h4 class="font-bold text-slate-800 dark:text-slate-100 mb-3 text-lg">3. Correlación "High-Yield": Clínica y Gabinete</h4>
                        <p class="mb-3 italic text-slate-600 dark:text-slate-400">La perla clínica reside en definir cuándo una "contracción" se convierte en una "amenaza".</p>
                        <ul class="list-disc pl-5 space-y-2">
                            <li><strong>Clínica:</strong> Contracciones regulares (2 en 10 min o 4 en 20 min) + Modificaciones cervicales.</li>
                            <li><strong>Gabinete:</strong> La Ecografía Transvaginal es el estándar de oro.</li>
                            <li><strong>La Correlación (Zona Gris):</strong> Dilatación de 1-2 cm. La respuesta NUNCA es "observar", es medir la LC. <u class="font-semibold text-red-500 dark:text-red-400">LC &lt; 15 mm = altísimo riesgo (Ingreso y tx)</u>. Fibronectina Fetal (+) tiene el mismo valor.</li>
                            <li><mark class="bg-indigo-100 dark:bg-indigo-900/50 dark:text-indigo-200 px-1 rounded font-semibold">Concepto Clave:</mark> El diagnóstico de Parto Pretérmino establecido es actividad uterina regular + Dilatación ≥3 cm o borramiento ≥80%.</li>
                        </ul>
                    </div>

                    <div>
                        <h4 class="font-bold text-slate-800 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700 pb-2 mb-3 text-lg">4. Diferenciales y "Red Flags" (Trampas del Examen)</h4>
                        <p class="mb-4">El ENARM suele poner opciones obsoletas. Identifícalas:</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="p-4 bg-white dark:bg-slate-800 rounded shadow-sm border border-slate-100 dark:border-slate-600">
                                <strong class="text-amber-600 dark:text-amber-400">Trampa 1: Reposo</strong>
                                <p class="mt-1 text-sm">"Hidratación y Reposo absoluto". <strong>Realidad: Contraindicado.</strong> No disminuyen el parto y aumentan riesgo de trombosis (Grado A).</p>
                            </div>
                            <div class="p-4 bg-white dark:bg-slate-800 rounded shadow-sm border border-slate-100 dark:border-slate-600">
                                <strong class="text-amber-600 dark:text-amber-400">Trampa 2: Antibióticos</strong>
                                <p class="mt-1 text-sm">"Para prolongar el embarazo". <strong>Realidad: No rutinarios.</strong> Solo si hay vaginosis bacteriana sintomática o profilaxis SGB intraparto.</p>
                            </div>
                            <div class="p-4 bg-white dark:bg-slate-800 rounded shadow-sm border border-slate-100 dark:border-slate-600">
                                <strong class="text-amber-600 dark:text-amber-400">Trampa 3: Tocolisis Larga</strong>
                                <p class="mt-1 text-sm">"Mantenimiento hasta 37 sdg". <strong>Realidad: Error grave.</strong> Solo 48 horas para esteroides y traslado.</p>
                            </div>
                        </div>
                        <div class="mt-4 p-4 bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-200 border-l-4 border-red-500 rounded">
                            <strong>⚠️ Red Flag (Contraindicación de Tocolisis):</strong> Si el caso clínico menciona Corioamnionitis, DPPNI, Preeclampsia severa o dilatación avanzada (≥5 cm), la respuesta es <u>dejar evolucionar el parto</u>, nunca tocohibir.
                        </div>
                    </div>

                    <div class="bg-indigo-50 dark:bg-indigo-900/20 p-5 rounded-lg border border-indigo-100 dark:border-indigo-800">
                        <h4 class="font-bold text-indigo-800 dark:text-indigo-300 mb-3 text-lg">5. Las 5 Perlas de Oro</h4>
                        <ol class="list-decimal pl-5 space-y-2 font-medium text-indigo-900 dark:text-indigo-200">
                            <li><strong>Maduración Pulmonar (Grado A):</strong> Betametasona 12 mg IM c/24h (2 dosis) o Dexametasona 6 mg c/12h (4 dosis). De viabilidad a 34 SDG.</li>

                        </ol>
                    </div>

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        function showActiveModule(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            let quizHtml = `<form class="quiz-form space-y-6 mt-8" id="quiz-form-${moduleId}">`;
            moduleData.quiz.forEach((q, index) => {
                quizHtml += `
                <div id="q-container-${index}" class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 transition-all duration-300">

                    <div class="space-y-3">
                        ${q.options.map((opt, i) => `

            // Validación añadida en onClick
            quizHtml += `<button type="button" class="w-full sm:w-auto bg-pink-600 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:bg-pink-700 transition-all mt-6" onclick="submitQuiz(${moduleId})">Validar Respuestas</button></form>`;

            const displayArea = document.getElementById('module-display');
            displayArea.innerHTML = `

                        <h3 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-4">Autoevaluación</h3>

            `;
        }

        function showCompletedModule(moduleId) {
            updateMobileLogoState(true);
            const moduleData = courseModules.find(m => m.id === parseInt(moduleId));
            const progressData = userProgress[moduleId];
            const nextModuleId = parseInt(moduleId) + 1;
            const nextModule = courseModules.find(m => m.id === nextModuleId);

            // Verificamos si todos los modulos DISPONIBLES están completados
            const definedModules = courseModules.map(m => m.id);
            const allCompleted = definedModules.every(id => userProgress[id]?.completed);

            let quizHtml = '<div class="space-y-8 mt-6">';
            moduleData.quiz.forEach((q, index) => {
                const userAnswer = progressData.answers ? progressData.answers[index] : null;
                const isCorrect = userAnswer === q.answer;
                
                quizHtml += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow border dark:border-slate-700">
                    <p class="font-semibold text-slate-800 dark:text-slate-200 mb-3">${index+1}. ${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map((opt, i) => {
                            let classes = "p-3 rounded border flex justify-between items-center ";
                            let icon = "";
                            if(i === q.answer) { 
                                classes += "bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-900 dark:text-emerald-100"; // Emerald 100 for better dark mode readability
                                if(i === userAnswer) icon = "✓";
                            } else if(i === userAnswer) {
                                classes += "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-100";
                                icon = "✕";
                            } else {
                                classes += "bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-60 text-slate-700 dark:text-white";
                            }
                            return `<div class="${classes}"><span>${opt}</span><span class="font-bold">${icon}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="mt-4 p-4 rounded bg-slate-50 dark:bg-slate-700/50 border-l-4 ${isCorrect ? 'border-emerald-500' : 'border-red-500'}">
                        <p class="text-sm text-slate-700 dark:text-white"><strong>${isCorrect ? 'Correcto' : 'Incorrecto'}.</strong> ${q.justification}</p>
                        <p class="text-xs text-slate-500 mt-1 italic">Fuente: ${q.source}</p>
                    </div>
                </div>`;

            quizHtml += '</div>';

            let nextBtn = "";

                nextBtn = `<button class="w-full sm:w-auto bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-emerald-700 transition-all" onclick="showFinalSummary()">Ver Resultados</button>`;

            }

                            Ver Resumen del Módulo
                        </button>
                        
                        <!-- BOTÓN GPC AÑADIDO (Sólo aparece al completar) -->

        }

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>
                            <span>${score}/${total}</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5">
                            <div class="bg-pink-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });
            moduleScoresHtml += '</div>';
            
            const finalPct = totalQuestions > 0 ? Math.round((totalScore/totalQuestions)*100) : 0;

                                <button onclick="displayModule(null)" class="w-full bg-white dark:bg-slate-700 text-slate-700 dark:text-white font-bold py-3 px-4 rounded-lg shadow border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">
                                    Volver al Menú
                                </button>
                                <!-- BOTON REINICIAR -->
                                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-300 font-bold py-3 px-4 rounded-lg shadow border border-red-200 dark:border-red-800 hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors text-sm">
                                    Reiniciar Curso Completo
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderModuleList() {
            const list = document.getElementById('module-list');
            if(!list) return;
            list.innerHTML = '';

            // MODIFICACIÓN: Iterar sobre la lista COMPLETA de títulos cortos
            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                const li = document.createElement('li');
                
                if (module) {
                    // MÓDULO DISPONIBLE
                    let classes = 'p-3 rounded-lg cursor-pointer transition-all duration-200 flex items-center justify-between gap-3 ';
                    if (isActive) classes += 'bg-pink-600 font-bold text-white shadow-lg';
                    else if (isCompleted) classes += 'bg-emerald-800/80 text-emerald-300 hover:bg-emerald-700/80';
                    else classes += 'bg-slate-700 hover:bg-slate-600 hover:pl-4';

                    li.className = classes;
                    
                    let iconSvg = isCompleted 
                        ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />'
                        : '<path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />';

                    let innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-70" viewBox="0 0 20 20" fill="currentColor">
                                ${iconSvg}
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;

                    if (isCompleted) {
                        innerHTML += `
                            <button onclick="event.stopPropagation(); showModuleSummary(${moduleId})" class="p-1 hover:bg-white/20 rounded-full transition-colors" title="Ver Resumen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        `;
                    }

                    li.innerHTML = innerHTML;
                    li.onclick = () => displayModule(moduleId);
                } else {
                    // MÓDULO NO DISPONIBLE AÚN
                    li.className = 'p-3 rounded-lg flex items-center gap-3 bg-slate-800 text-slate-500 cursor-not-allowed opacity-50';
                    li.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;
                }
                list.appendChild(li);
            });
        }

        // --- FUNCIONES RESTANTES ---

        function renderBibliography() {
            const bibliographyContent = document.getElementById('bibliography-content');
            if (!bibliographyContent) return;

            const allSources = [
                "GPC IMSS-058-08: Detección, diagnóstico y tratamiento de las enfermedades hipertensivas del embarazo. (2017)",
                "GPC IMSS-063-08: Prevención, diagnóstico y tratamiento del parto pretérmino. (2017)",
                "GPC IMSS-609-19: Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad. (2019)",
                "GPC S-001-08: Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención. (2017)",
                "GPC SS-118-18: Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención. (2018)",
                "GPC SS-146-18: Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer del cuello cérvicouterino en primer y segundo nivel de atención. (2018)",
                "GPC SS-666-21: Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención. (2021)",
                "GPC SS-831-21: Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo. (2021)",
                "GPC IMSS-028-08: Control prenatal con atención centrada en la paciente. (2017).",
                "GPC IMSS-052-19: Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo.  (2019)."
            ];
            
            bibliographyContent.innerHTML = '';
            allSources.forEach(citation => {
                const item = document.createElement('div');
                item.className = 'bg-slate-100 dark:bg-slate-700 p-3 rounded-lg flex items-start gap-3 text-sm';
                item.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 dark:text-slate-400 flex-shrink-0 mt-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />
                    </svg>
                    <span>${citation}</span>
                `;
                bibliographyContent.appendChild(item);
            });
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatría11CourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatría11CourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatría11CourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-pink-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-pink-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
