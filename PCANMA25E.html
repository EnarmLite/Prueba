    <script>

        const questionsData = [
    {
        id: 1,
        question: "Edad indicada para iniciar el tamizaje con resonancia magnética de mama en pacientes portadoras de la variante patogénica BRCA1.",
        options: ["30 años", "35 años", "40 años", "25 años"],
        answer: 3,
        justification: "Justificación: La detección temprana es una herramienta indispensable en poblaciones de alto riesgo genético debido a la elevada penetrancia de mutaciones germinales. De acuerdo al PRONAM de Cáncer de mama, el escrutinio en este grupo debe anticiparse significativamente en comparación con la población de riesgo promedio, integrando la resonancia magnética por su alta sensibilidad.<br><br>Perla ENARM: Variante patogénica en BRCA1 o BRCA2: RM de mama con contraste + mastografía digital alternadas cada 6 meses, iniciando RM desde los 25 años en portadoras BRCA1.<br><br>Análisis de Distractores: La opción de 30 años está indicada para el inicio de mastografía en síndrome de Li-Fraumeni y otras mutaciones (PALB2). Los 40 años corresponden al inicio de tamizaje en población de riesgo promedio. Los 35 años marcan la edad para considerar quimioprevención o cirugía reductora de riesgo ovárico.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Tamizaje, Página 11 y 12."
    },
    {
        id: 2,
        question: "Valor Predictivo Positivo (VPP) que otorga un reporte mastográfico categorizado como BI-RADS 3.",
        options: ["< 2 %", "0 %", "2 - ≤ 10 %", "> 95 %"],
        answer: 0,
        justification: "Justificación: La asignación de la categoría BI-RADS 3 implica un hallazgo con alta probabilidad de benignidad, justificando una conducta conservadora. De acuerdo al PRONAM de Cáncer de mama, este porcentaje define la indicación de no realizar procedimientos invasivos inmediatos y optar por la vigilancia clínica e imagenológica estrecha.<br><br>Perla ENARM: BI-RADS 3 Probablemente benigno presenta un VPP < 2 % y amerita seguimiento con imagen a corto plazo (6 meses) en ausencia de signos y síntomas.<br><br>Análisis de Distractores: El VPP de 0 % corresponde a las categorías BI-RADS 1 y 2. El rango de 2 a ≤ 10 % es específico del BI-RADS 4A, el cual ya obliga a realizar biopsia. El > 95 % define al BI-RADS 5, altamente sugestivo de malignidad.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) de Cáncer de mama, 2026, Abordaje diagnóstico, Página 24 y 25."
    },
    {
        id: 3,
        question: "Fármaco y dosis de elección indicados para quimioprevención en pacientes postmenopáusicas con alto riesgo de desarrollar carcinoma mamario.",
        options: ["Tamoxifeno 5 mg/día", "Raloxifeno 60 mg/día", "Exemestano 20 mg/día", "Anastrozol 5 mg/día"],
        answer: 1,
        justification: "Justificación: El manejo farmacológico para la reducción de riesgo difiere según el estado menopáusico de la persona. De acuerdo al PRONAM de Cáncer de mama, el uso de moduladores selectivos de receptores estrogénicos está justificado para impactar en la incidencia de lesiones invasoras en perfiles específicos.<br><br>Perla ENARM: Intervención Farmacológica: raloxifeno a dosis de 60 mg/día en pacientes postmenopáusicas, por un total de 5 años.<br><br>Análisis de Distractores: El tamoxifeno a 5 mg/día es válido por 3 años, pero principalmente en otros escenarios de bajo riesgo u otras edades. El exemestano se utiliza a 25 mg/día (no 20 mg) y el anastrozol a 1 mg/día (no 5 mg).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Quimioprevención, Página 15."
    },
    {
        id: 4,
        question: "Tiempo máximo de isquemia fría permitido antes de la inmersión de una biopsia mamaria en formol al 10 %.",
        options: ["30 minutos", "2 horas", "1 hora", "6 horas"],
        answer: 2,
        justification: "Justificación: El manejo preanalítico del tejido es crítico para garantizar la fidelidad de la evaluación morfológica y la inmunohistoquímica. De acuerdo al PRONAM de Cáncer de mama, los retrasos en la fijación provocan la degradación de proteínas, resultando en pérdida de la expresión de receptores hormonales y falsos negativos en HER2.<br><br>Perla ENARM: El tiempo de isquemia fría, tiempo entre la toma de la muestra y la inmersión en formol al 10 % amortiguado con pH 7, debe ser menor de 1 hora.<br><br>Análisis de Distractores: 30 minutos es un tiempo excelente pero el límite técnico estricto es 1 hora. Tiempos prolongados como 2 o 6 horas causan daño tisular irreversible e invalidan los estudios moleculares predictivos. Las 6 horas representan el tiempo mínimo (no máximo) recomendado de fijación.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Tipos de Biopsia, Página 27."
    },
    {
        id: 5,
        question: "Subtipo histológico de cáncer de mama caracterizado por patrón celular \"en fila india\" y pérdida de E-cadherina.",
        options: ["Carcinoma medular", "Carcinoma tubular", "Carcinoma mucinoso", "Carcinoma lobulillar invasor"],
        answer: 3,
        justification: "Justificación: La arquitectura tisular define patrones de infiltración y diseminación. De acuerdo al PRONAM de Cáncer de mama, la mutación en el gen CDH1 provoca la disfunción de las moléculas de adhesión celular, originando fenotipos morfológicos infiltrantes singulares y multifocales.<br><br>Perla ENARM: El Carcinoma lobulillar invasor se caracteriza por células pequeñas, monomorfas, dispuestas en patrón lineal o “en fila india”, con pérdida de E-cadherina por alteración del gen CDH1.<br><br>Análisis de Distractores: El carcinoma medular presenta láminas sólidas con linfocitos infiltrantes. El carcinoma tubular muestra estructuras glandulares bien formadas (> 90 %). El carcinoma mucinoso exhibe lagos de mucina extracelular.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Subtipos de cáncer de mama y biomarcadores, Página 29."
    },
    {
        id: 6,
        question: "Intervención clínica obligatoria ante un estudio de imagen reportado como BI-RADS 5.",
        options: ["Biopsia con aguja de corte", "Resonancia magnética", "Mastectomía profiláctica", "Seguimiento en 6 meses"],
        answer: 0,
        justification: "Justificación: Toda lesión altamente sugestiva de malignidad (> 95 % de VPP) requiere comprobación histológica para guiar el tratamiento definitivo. De acuerdo al PRONAM de clasificación BI-RADS, la aspiración con aguja fina o el tratamiento empírico están contraindicados sin un diagnóstico de certeza previo.<br><br>Perla ENARM: Categoría BI-RADS 5 Altamente sugestivo de malignidad: Biopsia obligatoria con aguja de corte guiada por imagen.<br><br>Análisis de Distractores: La resonancia magnética no sustituye a la biopsia diagnóstica ante la alta sospecha. La mastectomía sin reporte histopatológico es una mala praxis clínica absoluta. El seguimiento a 6 meses es la indicación exclusiva para el BI-RADS 3.",
        source: "Clasificación BI-RADS, 2026, Tabla Categoría Hallazgos, Página 2."
    },
    {
        id: 7,
        question: "Criterio clínico considerado como contraindicación absoluta para realizar una cirugía conservadora de mama.",
        options: ["Tumor luminal de 2 cm", "Microcalcificaciones extensas y difusas", "Axila clínicamente positiva (cN1)", "Antecedente heredofamiliar de cáncer"],
        answer: 1,
        justification: "Justificación: El objetivo de la preservación glandular es lograr el control oncológico local con un resultado estético óptimo. De acuerdo al PRONAM de Cáncer de mama, cuando las lesiones afectan extensamente el parénquima y es técnicamente imposible obtener márgenes negativos, el procedimiento pierde su sustento terapéutico.<br><br>Perla ENARM: Contraindicaciones absolutas para Cirugía conservadora de mama: Microcalcificaciones extensas y difusas, afectación cutánea difusa, imposibilidad de recibir radioterapia.<br><br>Análisis de Distractores: Un tumor de 2 cm (T1c) suele ser candidato ideal a cirugía conservadora. Una axila cN1 no contraindica el procedimiento mamario per se. Un antecedente familiar no es una restricción quirúrgica local.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Cirugía conservadora de mama, Página 39."
    },
    {
        id: 8,
        question: "Tiempo máximo recomendado para que una persona con alteración clínica sospechosa reciba abordaje diagnóstico completo en una unidad médica.",
        options: ["15 días", "30 días", "10 días", "60 días"],
        answer: 2,
        justification: "Justificación: La reducción en los tiempos de tránsito clínico impacta directamente en la supervivencia de las pacientes. De acuerdo al PRONAM de Cáncer de mama, el envío debe ser inmediato y la confirmación debe agilizarse sin tratamientos empíricos de por medio.<br><br>Perla ENARM: Una vez identificada una lesión sospechosa de cáncer de mama, debe referirse a la persona a una unidad de acto único para realizar el abordaje diagnóstico en un periodo menor a 10 días.<br><br>Análisis de Distractores: 15 días es el tiempo para entregar resultados de imagen BI-RADS. 60 días es la meta general del pilar de Diagnóstico Oportuno para iniciar el tratamiento. 30 días no representa un punto de corte estándar en esta etapa específica del flujograma.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Exploración clínica de mamas, Página 20."
    },
    {
        id: 9,
        question: "Procedimiento diagnóstico considerado como el estándar actual para el abordaje inicial de lesiones mamarias sospechosas.",
        options: ["Biopsia por aspiración con aguja fina", "Biopsia escisional directa", "Resección quirúrgica guiada", "Biopsia con aguja gruesa"],
        answer: 3,
        justification: "Justificación: La obtención de tejido debe asegurar la preservación arquitectural para estudios complementarios precisos. De acuerdo al PRONAM de Cáncer de mama, los métodos citológicos carecen de la capacidad de distinguir invasión, por lo cual están en desuso para el diagnóstico de tumores primarios mamarios.<br><br>Perla ENARM: La biopsia con aguja gruesa (BAG) es el método estándar actual para el diagnóstico inicial de lesiones sospechosas en la mama ya que permite preservar la arquitectura del tejido y realizar inmunohistoquímica.<br><br>Análisis de Distractores: La aspiración con aguja fina no distingue in situ de invasor y actualmente no se recomienda. La biopsia quirúrgica o escisional directa está prohibida de primera intención, limitándose solo a casos de discordancia clínica o imagenológica severa.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Tipos de Biopsia, Página 26 y 27."
    },
    {
        id: 10,
        question: "Conducta obligatoria ante el reporte de un estudio mastográfico categorizado como BI-RADS 0.",
        options: ["Repetir o completar con otra técnica de imagen", "Iniciar tratamiento quirúrgico conservador", "Referir para biopsia con aguja de corte", "Mantener conducta expectante por 6 meses"],
        answer: 0,
        justification: "Justificación: La ausencia de visualización adecuada o la superposición de tejidos impiden una catalogación de riesgo concluyente. De acuerdo al PRONAM de clasificación BI-RADS, un estudio incompleto exige maniobras técnicas adicionales (como compresión focal, ultrasonido) dentro de un marco de 15 días para poder clasificar verdaderamente la lesión.<br><br>Perla ENARM: BI-RADS 0 Incompleto: Repetir estudio o completar con otra técnica como ultrasonido. La persona deberá ser citada a revisión en un máximo de 15 días naturales.<br><br>Análisis de Distractores: La biopsia con aguja se realiza a partir de la categoría 4A. La vigilancia a 6 meses pertenece exclusivamente a la categoría 3. El abordaje quirúrgico no se justifica sin una categorización final y posterior confirmación tisular.",
        source: "Clasificación BI-RADS, 2026, Tabla Categoría Hallazgos, Página 1."
    },
    {
        id: 11,
        question: "Fármaco de primera línea para el tratamiento sistémico de pacientes con cáncer de mama HER2 positivo y metástasis activas sintomáticas en sistema nervioso central.",
        options: ["Pertuzumab", "Trastuzumab deruxtecan", "Trastuzumab emtansina", "Lapatinib"],
        answer: 1,
        justification: "Justificación: La penetración al tejido cerebral y la alta eficacia intracraneal han posicionado a las nuevas generaciones de conjugados anticuerpo-fármaco. De acuerdo al PRONAM de Cáncer de mama, el cambio de paradigma exige el uso de este agente específico ante actividad neurológica secundaria a enfermedad metastásica.<br><br>Perla ENARM: En el caso de enfermedad a Sistema Nervioso Central activa (sintomática) se recomienda como primera línea de tratamiento sistémico el uso de Trastuzumab deruxtecan (T-DXd).<br><br>Análisis de Distractores: Trastuzumab emtansina (T-DM1) es una alternativa de segunda línea o ante contraindicación, pero no la primera elección sintomática. Pertuzumab se emplea en primera línea sistémica en ausencia de crisis central activa. Lapatinib se reserva para combinaciones tardías.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Pacientes con metástasis en sistema nervioso central, Página 56."
    },
    {
        id: 12,
        question: "Duración del uso de terapia hormonal de reemplazo identificada como factor de riesgo modificable para desarrollar cáncer de mama.",
        options: ["Uso intermitente por 2 años", "Uso continuo durante el embarazo", "Uso por 5 años continuos o más", "Uso exclusivo de progestágenos"],
        answer: 2,
        justification: "Justificación: La exposición prolongada a estrógenos exógenos altera el ciclo de proliferación epitelial del tejido mamario. De acuerdo al PRONAM de Cáncer de mama, la ventana temporal de daño clínico está claramente establecida dentro de los factores hormonales y reproductivos.<br><br>Perla ENARM: Los factores no modificables/hormonales incluyen: menarca temprana, menopausia tardía, y terapia hormonal de reemplazo por 5 años continuos o más.<br><br>Análisis de Distractores: El riesgo significativo y documentado en las guías se consolida a partir de los 5 años continuos de exposición hormonal sustitutiva. Periodos más cortos o usos no especificados no se clasifican como el factor clínico principal de riesgo epidemiológico en este apartado.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Cáncer de mama, 2026, Factores de riesgo, Página 6."
    },
    {
        id: 13,
        question: "Intervención reductora de riesgo fuertemente recomendada en pacientes portadoras de la mutación BRCA1 entre los 35 y 40 años.",

                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";

                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CAMAPROProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CAMAPROLastQId', currentQuestionId);
                else localStorage.removeItem('CAMAPROLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CAMAPROProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
