    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
    {
        id: 1,
        question: "¿A partir de qué volumen de pérdida sanguínea se define de forma absoluta una hemorragia obstétrica mayor en ausencia inicial de signos clínicos de hipoperfusión tisular?",
        options: ["≥ 500 ml", "> 1000 ml", "≥ 1500 ml", "> 2000 ml"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, la definición cuantitativa estricta categoriza la gravedad de la pérdida de volumen circulante para activar alertas. Las pérdidas menores son de 500 a 1000 ml, pero superar el litro marca el umbral de riesgo inminente, aun si la paciente está compensada.<br><br>Perla ENARM: \"La hemorragia obstétrica es dividida en menor cuando la perdida oscila entre los 500 y los 1000 ml y mayor cuando es más de 1000 ml\".<br><br>Análisis de Distractores: La opción A (≥ 500 ml) define hemorragia obstétrica general, no la \"mayor\". La opción C (≥ 1500 ml) no es un punto de corte clasificatorio en esta guía. La opción D (> 2000 ml) corresponde específicamente a la subclasificación de hemorragia severa.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Introducción, Página 19."
    },
    {
        id: 2,
        question: "¿Qué hallazgo en el examen neurológico clasifica a la paciente inmediatamente en un grado de choque hemorrágico severo, indicando una pérdida de volumen superior al 40%?",
        options: ["Ansiedad", "Confusión", "Estupor", "Letargia"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, la perfusión cerebral es uno de los últimos mecanismos en fallar gracias a la redistribución de flujo. Cuando el estado de alerta decae a estupor o coma, la pérdida hemática ha rebasado el 40% (> 2800 ml), representando un colapso inminente.<br><br>Perla ENARM: \"Choque severo: Pérdida > 40%, frecuencia cardíaca > 140 lpm, presión sistólica < 90 mmHg, estupor o coma\".<br><br>Análisis de Distractores: La ansiedad (A) y la confusión (B) se presentan en etapas más tempranas de hipoperfusión (choque leve a moderado). La letargia (D) sugiere hipoperfusión, pero el \"estupor o coma\" (escala de Glasgow ≤ 10) es el criterio clínico absoluto para choque severo en la tabla de severidad.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Cuadro 3, Página 41."
    },
    {
        id: 3,
        question: "¿A qué dosis inicial y de primera elección está indicada la infusión de cristaloides balanceados para la reanimación hídrica de la paciente inestable?",
        options: ["10 ml/kg", "20 ml/kg", "30 ml/kg", "40 ml/kg"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, la reanimación inicial exige una restitución de la precarga que no desencadene coagulopatía dilucional ni sobrecarga pulmonar. La dosis estándar para el bolo inicial es precisa.<br><br>Perla ENARM: \"Se recomienda el empleo de solucion cristaloide a una dosis de 30ml/kg en la fase de resucitación en el manejo de la paciente con hemorragia obstetrica y choque hipovolemico\".<br><br>Análisis de Distractores: Las dosis de 10 ml/kg (A) y 20 ml/kg (B) son subóptimas para el estado de hipervolemia basal modificado por el embarazo. La dosis de 40 ml/kg (D) incrementa el riesgo de edema agudo pulmonar y edema tisular sin mejorar la sobrevida.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 31."
    },
    {
        id: 4,
        question: "¿A qué etiología específica corresponde la letra \"T\" de Tejido dentro de la evaluación nemotécnica primaria del origen del sangrado obstétrico?",
        options: ["Atonía uterina", "Laceración cervical", "Retención de restos", "Desórdenes de coagulación"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, organizar la etiología permite enfocar rápidamente el manejo médico o quirúrgico. La regla de las 4 T abarca las causas más frecuentes en order secuencial.<br><br>Perla ENARM: \"En la mujer con hemoragia obstétrica es conveniente evaluar su causa utilizando la nomotécnica de las “4 T”: Tono (atonia uterina), Tejido (retención de restos placentarios), Trauma (lesion cervical o vaginal durante el parto) y Trombosis (desordenes de coagulación)\".<br><br>Análisis de Distractores: La atonía uterina (A) corresponde a Tono. La laceración cervical (B) corresponde a Trauma. Los desórdenes de coagulación (D) corresponden a Trombosis (o Trombina).",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 18."
    },
    {
        id: 5,
        question: "Durante la fase de reanimación temprana con fluidoterapia, ¿cuál es la meta terapéutica de presión arterial sistólica que debe mantenerse en la paciente?",
        options: ["70 a 80 mmHg", "80 a 90 mmHg", "90 a 100 mmHg", "100 a 110 mmHg"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, la hipotensión permisiva temporal previene que el aumento hidrostático \"bote\" el coágulo en formación, garantizando simultáneamente perfusión a órganos vitales.<br><br>Perla ENARM: \"Se recomienda que durante la fase de resucitación se alcancen cifras de presion arterial sistólica de 80-90 mmHg y mantener el índice de choque menor de 0.9\".<br><br>Análisis de Distractores: Un rango de 70 a 80 mmHg (A) es insuficiente para asegurar el flujo renal y cerebral (riesgo de Sheehan o necrosis tubular). Valores de 90 a 100 mmHg (C) y 100 a 110 mmHg (D) son normales pre-sangrado, pero buscarlos activamente con sobrecarga hídrica causa hemodilución severa y sangrado por rebote.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 32."
    },
    {
        id: 6,
        question: "En una paciente en la que ya se detuvo el sangrado y no existe evidencia de hipoperfusión tisular aguda, ¿cuál es el umbral estricto de hemoglobina para indicar estrategias restrictivas de transfusión?",
        options: ["6 a 8 g/dl", "7 a 9 g/dl", "8 a 10 g/dl", "> 10 g/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, si la paciente ya no cursa con hemorragia activa, transfundir para normalizar la hemoglobina a cifras fisiológicas es innecesario e incrementa las tasas de infección y lesión pulmonar (TRALI).<br><br>Perla ENARM: \"En las pacientes que no tengan sangrado activo, recomendamos transfusión de concentrados eritrocitarios para mantener una meta de hemoglobina de entre 7 a 9 g / dl\".<br><br>Análisis de Distractores: Los rangos menores a 7 g/dl (A) comprometen la oxigenación tisular. Mantener valores de 8 a 10 g/dl (C) o mayores a 10 g/dl (D) correspondía a estrategias liberales obsoletas, las cuales demostraron mayor mortalidad perioperatoria.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 35."
    },
    {
        id: 7,
        question: "¿Qué fármaco específico se recomienda administrar de forma profiláctica inmediatamente después de la salida del hombro anterior fetal durante el nacimiento?",
        options: ["Ergonovina", "Misoprostol", "Oxitocina", "Ácido tranexámico"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, el manejo activo de la tercera etapa reduce drásticamente el riesgo de atonía. La oxitocina (o carbetocina) es el uterotónico preventivo de elección y actúa favoreciendo la contracción sostenida del miometrio.<br><br>Perla ENARM: \"Administración profiláctica de uterotónicos posterior a la expulsión del hombro anterior del producto, por ejemplo, oxitocina o carbetocina\".<br><br>Análisis de Distractores: La ergonovina (A) tiene riesgos hipertensivos severos (contraindicada en preeclampsia). El misoprostol (B) es de segunda línea y genera picos febriles. El ácido tranexámico (D) es un antifibrinolítico usado en tratamiento de hemorragia instalada, no de rutina profiláctica para atonía.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 18."
    },
    {
        id: 8,
        question: "¿Qué complicación orgánica grave contraindica explícitamente el uso de expansores plasmáticos sintéticos tipo hidroxietilalmidón en el manejo de estas pacientes?",
        options: ["Insuficiencia cardiaca", "Insuficiencia hepática", "Insuficiencia respiratoria", "Insuficiencia renal"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, los almidones impactan directamente a nivel del glomérulo, depositándose y precipitando el fracaso orgánico en el enfermo crítico sin aportar beneficios hemodinámicos sobre los cristaloides.<br><br>Perla ENARM: \"No se recomienda emplear soluciones de hidroxietilalmidon en la reanimación de la paciente criticamente enferma, debido a que su uso se asocia a una mayor morbimortalidad por insuficiencia renal\".<br><br>Análisis de Distractores: La insuficiencia cardiaca (A) y la insuficiencia respiratoria (C) se asocian a la sobrecarga por exceso de volumen en general (TACO, edema agudo), no exclusivamente al efecto tóxico del almidón. La falla hepática (B) no es el daño limitante principal dictado en la normativa.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 31."
    },
    {
        id: 9,
        question: "En el control del sangrado mediante abordaje vaginal, ¿cuánto tiempo máximo debe mantenerse el pinzamiento de arterias uterinas por la técnica de Zea mientras inician su acción los uterotónicos?",
        options: ["5 a 10 minutos", "10 a 20 minutos", "20 a 30 minutos", "30 a 40 minutos"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, esta maniobra interrumpe de manera transitoria la principal afluencia arterial al lecho endometrial. Se utiliza como terapia puente para permitir que los fármacos contraigan la fibra muscular.<br><br>Perla ENARM: \"En caso de atonia uterina, a fin de esperar el efecto de los fármacos uterotónicos, es recomendable mantener el pinzamiento por técnica Zea por 10-20 minutos\".<br><br>Análisis de Distractores: Un periodo de 5 a 10 minutos (A) no otorga tiempo suficiente para la vida media de inicio de acción farmacológica (ej. misoprostol rectal). Sobrepasar los 20 minutos (C y D) incrementa el riesgo de necrosis del tejido urológico o vaginal comprimido sin control visual directo.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 26."
    },
    {
        id: 10,
        question: "¿Qué patología documentada en el embarazo representa el principal factor de riesgo preoperatorio e independiente para requerir una transfusión sanguínea masiva durante una cesárea?",
        options: ["Macrosomía", "Preeclampsia", "Polihidramnios", "Placenta previa"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, la invasión anómala del trofoblasto en el segmento uterino inferior (zona de baja contractilidad) garantiza un lecho sangrante de difícil control médico post-alumbramiento.<br><br>Perla ENARM: \"La anemia preoperatoria (hematrocrito <25%), la anestesia general y placenta previa, aumentan la posibilidad de transfusión en pacientes sometidas a nacimiento por operación cesárea\".<br><br>Análisis de Distractores: La macrosomía (A) y el polihidramnios (C) favorecen la sobredistensión uterina y la posterior atonía, pero no requieren rutinariamente cruce globular preoperatorio masivo. La preeclampsia (B) requiere control tensional, no es per se la entidad de mayor hemorragia masiva directa intraquirúrgica frente a una placenta previa.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 17."
    },
    {
        id: 11,
        question: "Durante la corrección de la coagulopatía dilucional, ¿cuál es el valor mínimo de laboratorio específico para fibrinógeno que predice hemostasia adecuada y se establece como meta?",
        options: ["> 100 mg/dl", "> 150 mg/dl", "> 200 mg/dl", "> 300 mg/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, el fibrinógeno se agota rápidamente debido al estado procoagulante del embarazo. Niveles debajo de 200 mg/dl correlacionan directamente con falla para formar el coágulo firme e incremento de la mortalidad.<br><br>Perla ENARM: \"En pacientes con hemorragia obstétrica y choque hipovolémico moderado a severo se recomienda mantener un nivel de fibrinogeno mayor a 200 mg / dl\".<br><br>Análisis de Distractores: Las cifras de 100 (A) o 150 mg/dl (B) se usan para pacientes en cirugía general o trauma adulto, pero son insuficientes en la mujer gestante. Un nivel superior a 300 mg/dl (D) es normal en el embarazo sano, pero como meta crítica emergente se exigen los 200 mg/dl mediante crioprecipitados.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Evidencias y Recomendaciones, Página 36."
    },
    {
        id: 12,
        question: "Ante el fracaso del manejo farmacológico, ¿en qué condición clínica se encuentra contraindicada explícitamente la histerectomía subtotal debido a su ineficacia para detener el sangrado?",
        options: ["Atonía uterina", "Acretismo placentario", "Laceración vaginal", "Hematoma vulvar"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, el espectro de placenta acreta envuelve al segmento inferior y el cérvix. Una histerectomía supracervical (subtotal) deja el lecho vascularizado intacto, perpetuando el estado de choque fatal.<br><br>Perla ENARM: \"Es recomendable realizar histerectomia total en casos de: Placenta previa central o total, Sospecha de acretismo placentario... La histerectomia subtotal no se recomienda en estos casos\".<br><br>Análisis de Distractores: En una atonía uterina pura (A), remover el cuerpo es curativo en la mayoría de los casos y es técnicamente más rápido. Las laceraciones (C) y hematomas (D) se suturan localmente y drenan, y no justifican una extirpación del órgano pélvico superior.",

                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoAUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoAULastQId', currentQuestionId);
                else localStorage.removeItem('gyoAULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoAUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
