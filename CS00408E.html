    <script>
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuáles son los dedos específicos indicados para realizar la palpación de la superficie durante la maniobra de autoexploración testicular?", 
                options: ["Pulgar, índice y medio", "Índice, medio y anular", "Pulgar, índice y anular", "Pulgar, medio y meñique"],

                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Anexos, Página 16." 
            },
            {
                id: 2, 
                question: "¿Cuál es el paso inicial anatómico y técnico que el paciente debe ejecutar al realizar la maniobra de autoexploración testicular?", 
                options: ["Palpar el epidídimo", "Estabilizar el testículo", "Traccionar el escroto", "Buscar ganglios inguinales"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, antes de iniciar la palpación de la superficie, el órgano debe fijarse con una mano para evitar su desplazamiento en la bolsa escrotal y permitir una evaluación táctil precisa.<br><br>Perla ENARM: \"Use una mano para estabilizar el testículo\".<br><br>Análisis de Distractores: Palpar el epidídimo es un paso secundario. Traccionar el escroto dificulta la palpación profunda por tensión cutánea. Buscar ganglios no forma parte de la autoexploración testicular primaria.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Anexos, Página 16." 
            },
            {
                id: 3, 
                question: "¿Qué alteración funcional de la fertilidad representa un factor de riesgo directo para el desarrollo de cáncer de testículo?", 
                options: ["Disfunción eréctil", "Varicocele bilateral", "Espermatogénesis alterada", "Eyaculación retrógrada"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, los síndromes de disgenesia testicular y los defectos en la línea germinal que causan infertilidad comparten vías fisiopatológicas con la transformación maligna celular.<br><br>Perla ENARM: \"Antecedentes: Infertilidad (espermatogénesis alterada)\".<br><br>Análisis de Distractores: La disfunción eréctil y la eyaculación retrógrada son problemas mecánicos o neurológicos. El varicocele causa infertilidad por estrés térmico, pero no es un factor de riesgo oncogénico directo.",

            },
            {
                id: 4, 
                question: "¿Qué malformación urogenital congénita se establece explícitamente en el interrogatorio como factor de riesgo para cáncer de testículo?", 
                options: ["Epispadias", "Fimosis severa", "Hipospadias", "Hidrocele comunicante"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, las hipospadias forman parte del espectro del síndrome de disgenesia testicular, asociado a una disrupción endocrina in utero que predispone a la malignidad futura.<br><br>Perla ENARM: \"Antecedentes: Criptorquidia, Hipospadias, Infertilidad\".<br><br>Análisis de Distractores: Las epispadias se asocian a extrofia vesical. La fimosis es riesgo para cáncer de pene. El hidrocele es una acumulación de líquido benigno sin potencial oncogénico per se.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 5, 
                question: "Ante la sospecha diagnóstica de cáncer de testículo, ¿qué hallazgo clínico sugiere metástasis a los ganglios linfáticos retroperitoneales?",

                answer: 0,

            },
            {
                id: 6, 
                question: "¿Qué manifestación endocrinológica se presenta como signo cardinal de sospecha de cáncer de testículo en pacientes en edad pediátrica?", 
                options: ["Retraso del crecimiento", "Pubertad temprana", "Hypotiroidismo subclínico", "Acantosis nigricans"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, los tumores de células de Leydig y otros del estroma pueden producir andrógenos, desencadenando virilización prematura en niños.<br><br>Perla ENARM: \"Signos clínicos a evaluar: Pubertad temprana, Ginecomastia\".<br><br>Análisis de Distractores: El retraso del crecimiento y el hipotiroidismo corresponden a déficits hormonales. La acantosis nigricans es un marcador de resistencia a la insulina, ajeno a tumores testiculares.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 7, 
                question: "¿Qué síntoma local de evolución crónica suele referir el paciente como la primera alteración sugestiva de una tumoración testicular?",

                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, el reemplazo del parénquima normal por tejido neoplásico denso aumenta el peso del testículo, generando tracción del cordón espermático.<br><br>Perla ENARM: \"Sintomatología: Sensación pesantez escrotal\".<br><br>Análisis de Distractores: El dolor perineal es clásico de prostatitis. El prurito indica dermatofitosis. El ardor corresponde a infecciones del tracto urinario o de transmisión sexual.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 8, 
                question: "¿A qué edad se debe instruir iniciar la autoexploración preventiva para la detección oportuna del cáncer de testículo?", 
                options: ["12 años", "15 años", "18 años", "21 años"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, la incidencia de tumores germinales se eleva dramáticamente a partir de la adolescencia tardía, por lo que el tamizaje debe coincidir con este pico.<br><br>Perla ENARM: \"Hacerlo una vez al mes a partir de los 15 años en adelante\".<br><br>Análisis de Distractores: Los 12 años preceden al pico de mayor riesgo. A los 18 o 21 años, se pierde la ventana de detección temprana en pacientes que ya pudieron desarrollar carcinomas agresivos.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Anexos, Página 16."

            {
                id: 9, 
                question: "¿Con qué frecuencia cronológica estricta se debe realizar la maniobra de autoexploración testicular en hombres a partir de los 15 años?",

                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, el intervalo de 30 días es el equilibrio óptimo para detectar cambios volumétricos sin generar alteraciones por palpación excesiva.<br><br>Perla ENARM: \"Hacerlo una vez al mes a partir de los 15 años en adelante\".<br><br>Análisis de Distractores: Semanalmente dificulta notar crecimientos insidiosos. Trimestral o anual otorga demasiado tiempo a un tumor agresivo para metastatizar.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Anexos, Página 16." 
            },
            {
                id: 10, 
                question: "¿Qué signo de deterioro orgánico sistémico debe documentarse como marcador de enfermedad oncológica diseminada?", 
                options: ["Ataque al estado general", "Hipertensión arterial sistémica", "Bradicardia sinusal", "Ictericia conjuntival"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, la pérdida de peso, caquexia y fatiga extrema reflejan la alta carga tumoral propia de la enfermedad metastásica avanzada.<br><br>Perla ENARM: \"Datos de diseminación a investigar: Ataque al estado general, Disnea\".<br><br>Análisis de Distractores: La hipertensión y bradicardia no son típicos de esta entidad. La ictericia requeriría falla hepática terminal, pero el ataque al estado general es el marcador primario.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 11, 
                question: "¿Qué conglomerado linfático debe explorarse dirigidamente por ser un sitio clásico de diseminación a distancia?", 
                options: ["Adenopatías inguinales", "Adenopatías axilares", "Adenopatías cervicales", "Adenopatías supraclaviculares"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, el drenaje linfático asciende por el retroperitoneo y conducto torácico, desembocando en el ganglio supraclavicular izquierdo (Ganglio de Virchow).<br><br>Perla ENARM: \"Buscar: Adenopatías supraclaviculares\".<br><br>Análisis de Distractores: Las inguinales solo ocurren si se invade piel escrotal. Los relevos axilares y cervicales no pertenecen a la vía linfática de drenaje testicular primaria.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 12, 
                question: "¿Qué síntoma respiratorio se asocia directamente con la diseminación hematógena del cáncer de testículo?",

                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, los pulmones son el sitio más frecuente de metástasis viscerales, comprometiendo el intercambio gaseoso.<br><br>Perla ENARM: \"Datos clínicos de diseminación a buscar: Ataque al estado general, Disnea\".<br><br>Análisis de Distractores: La tos ferina es infecciosa. La hemoptisis puede presentarse pero la guía marca la disnea como síntoma pivotal. El estridor indica obstrucción de vía aérea superior.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 13, 
                question: "En el algoritmo diagnóstico, ¿qué característica clínica obliga a desviar el flujograma hacia un tratamiento antibiótico inicial?",

                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            },
            {
                id: 14, 
                question: "¿Cuál es el hallazgo a la autoexploración testicular que representa la indicación absoluta para consulta médica inmediata?",

                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, cualquier irregularidad, protuberancia o zona indurada en la superficie del testículo debe considerarse cáncer hasta demostrar lo contrario.<br><br>Perla ENARM: \"Consulte si nota cambios de tamaño, nódulos o protuberancias\".<br><br>Análisis de Distractores: La sensibilidad leve es normal. La hiperpigmentación es fisiológica. Que un testículo cuelgue asimétricamente es una variante anatómica esperada.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Anexos, Página 16." 
            },
            {
                id: 15, 
                question: "¿Qué alteración somática del interrogatorio orienta a la existencia de una masa retroperitoneal voluminosa?",

                answer: 1,

                justification: "Justificación: De acuerdo a la GPC de Cáncer de Testículo, el flujograma parte de determinar si el cuadro cursa con dolor o no, estableciendo la brecha entre urgencia inflamatoria y neoplasia silente.<br><br>Perla ENARM: \"Dolor escrotal SÍ -> Realizar diagnóstico diferencial; NO -> Tercer nivel para evaluar tratamiento quirúrgico radical\".<br><br>Análisis de Distractores: Pubertad, tumor abdominal y pesantez son datos de apoyo, pero no el nodo de bifurcación algorítmica principal.", 
                source: "SS-004-08, Diagnóstico oportuno del cáncer de testículo en el primer y segundo nivel de atención, 2017, Diagramas de flujo, Página 15." 
            }
        ];
        
        let userProgress = {};
        let currentQuestionId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadProgress();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('CGCSLastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('CGCSProgress');
                localStorage.removeItem('CGCSLastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);
            }
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-teal-500 shadow-md z-10 border-teal-500 dark:border-teal-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // --- PANTALLAS ---

                                <svg class="w-5 h-5 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGCSProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGCSLastQId', currentQuestionId);
                else localStorage.removeItem('CGCSLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGCSProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
