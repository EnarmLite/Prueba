    <script>
        const questionsData = [
    {
        id: 1,
        question: "En la evaluación paraclínica de Sepsis Neonatal, ¿cuál es el punto de corte de la relación de neutrófilos inmaduros/totales (I/T) útil para descartar el diagnóstico?",
        options: ["Mayor a 0.2", "Menor a 0.5", "Mayor a 0.8", "Menor a 0.1"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la biometría hemática por sí sola carece de precisión absoluta, pero el índice de neutrófilos inmaduros sobre totales posee un alto valor predictivo negativo. Encontrar una relación I/T mayor a 0.2 ayuda de forma consistente a descartar la patología de inicio temprano cuando se asocia a baja sospecha clínica.<br><br>Perla ENARM: La relación I/T > 0.2 puede ser útil para descartar sepsis neonatal temprana, sin embargo, no sirve para el diagnóstico de confirmación por sí sola de manera directa.<br><br>Análisis de Distractores: Las opciones B, C y D presentan valores numéricos fuera del estándar biológico de referencia. Un índice I/T menor a 0.2 es el parámetro basal normal esperado, mientras que variaciones de 0.5 o 0.8 representan desviaciones extremas.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 22."
    },
    {
        id: 2,
        question: "En el de abordaje de de Sepsis Neonatal, ¿en de qué de intervalo de de tiempo se de considera que de el conteo de celular leucocitario de posee su de mayor valor predictivo?",
        options: ["Primeras 2 horas", "Entre 6 y 12 horas", "A las 24 horas", "Después de 72 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la dinámica de la respuesta hematopoyética del recién nacido sufre variaciones agudas durante el parto y el inicio de la transición. La leucocitosis reactiva fisiológica disminuye la especificidad de las muestras arteriales o venosas extraídas inmediatamente al nacer.<br><br>Perla ENARM: Considerar el conteo celular leucocitario obtenido entre las 6 h y 12 h de nacido como más predictivo de sepsis temprana que el obtenido inmediatamente después del nacimiento.<br><br>Análisis de Distractores: Muestras en las primeras 2 horas (A) arrojan falsos positivos por el estrés del trabajo obstétrico. Citas a las 24 horas (C) o después de 72 horas (D) son tardías para pautar el antibiótico inicial.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 18."
    },
    {
        id: 3,
        question: "Durante el de seguimiento de de Sepsis Neonatal de temprana, ¿en de qué de ventana temporal de se debe de medir la de Proteína C de Reactiva para de evaluar el de retiro seguro de del manejo de antibiótico empírico?",
        options: ["12 a 24 horas", "72 a 96 horas", "5 a 7 días", "36 a 48 horas"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la Proteína C Reactiva (PCR) posee una cinética de elevación retardada respecto a la lesión endotelial. Su medición entre las 36 y 48 horas de vida confiere un valor predictivo de descarte cercano al 98% si se asocia a hemocultivos estériles.<br><br>Perla ENARM: La PCR puede usarse durante el seguimiento para evaluar el retiro del manejo antibiótico, dentro de las 36 h a 48 h.<br><br>Análisis de Distractores: Antes de las 24 horas (A), la síntesis de reactantes aún es inmadura. Prolongar los fármacos empíricos a 72 horas o 5 días (B, C) sin cultivos positivos altera la microbiota.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 19."
    },
    {
        id: 4,
        question: "En el estudio de integral de de Sepsis Neonatal de temprana, ¿cuál de es la de recomendación sobre de la de toma de de urocultivo de de rutina?",
        options: ["No tomar de rutina", "Toma mediante punción suprapúbica", "Toma por cateterismo vesical", "Toma en bolsa recolectora"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, el desarrollo de infecciones de vías urinarias en las primeras 72 horas es anecdótico al ser una patología de transmisión vertical ascendente o hematógena pulmonar. Solicitarlo rutinariamente carece de costo-efectividad clínica.<br><br>Perla ENARM: No tomar urocultivo de rutina como parte del estudio del RN con sospecha de sepsis neonatal temprana.<br><br>Análisis de Distractores: El cateterismo (C) y la punción (B) son las maniobras correctas para obtener muestras estériles en infecciones tardías nosocomiales, pero están proscritos como protocolo general de entrada temprana. La bolsa (D) genera contaminación.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 21."
    },
    {
        id: 5,
        question: "En el de contexto de de Sepsis Neonatal, ¿cuáles interleucinas se de recomiendan como de apoyo junto de con los de datos clínicos de para el de diagnóstico temprano?",
        options: ["Interleucinas 1 y 2", "Interleucinas 4 y 10", "Interleucinas 6 y 8", "Interleucinas 12 y 17"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, estas citocinas proinflamatorias de respuesta inmediata se elevan de forma precoz antes del incremento proteico de la PCR, permitiendo captar la cascada inflamatoria sistémica activa en fases preclínicas.<br><br>Perla ENARM: Determinar las interleucinas (IL) 6 y 8 (en caso de tenerlas disponibles), como apoyo junto con los datos clínicos para el diagnóstico de sepsis.<br><br>Análisis de Distractores: Las IL-4 e IL-10 (B) tienen funciones antiinflamatorias inmunológicas. Las opciones A y D listan citocinas implicadas en inmunidad celular específica de memoria o autoinmune retardada.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 1. Diagnóstico, Página 20."
    },
    {
        id: 6,
        question: "Según los de criterios de clínicos para de Sepsis Neonatal de de inicio tardío, ¿cuál de de las siguientes de patologías se de considera un de factor de de riesgo para de su desarrollo?",
        options: ["Hipertrofia pilórica infantil", "Conducto arterioso permeable", "Comunicación interventricular apical", "Atresia esofágica aislada"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la persistencia hemodinámica del cortocircuito de izquierda a derecha prolonga el soporte de ventilación mecánica invasiva y la necesidad de accesos venosos centrales, rompiendo barreras cutáneas biológicas ante gérmenes intrahospitalarios.<br><br>Perla ENARM: Considerar como factores de riesgo para sepsis tardía alguno de los siguientes: [...] Conducto arterioso permeable.<br><br>Análisis de Distractores: Las opciones A, C y D representan malformaciones estructurales o quirúrgicas que, si bien son complejas, no se asocian de manera transversal e independiente con el retraso del cierre ductal en la UCIN.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 2. Tratamiento, Página 24."
    },
    {
        id: 7,
        question: "En Sepsis Neonatal de complicada con de infección nosocomial de asociada a de cuidados de de la salud de y aislamiento de de Candida spp, ¿cuál de es el de antifúngico de de primera elección de terapéutica?",
        options: ["Fluconazol profiláctico", "Caspofungina intravenosa", "Anfotericina B liposomal", "Ketoconazol vía oral"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la fungemia sistémica exige la remoción del patógeno con agentes de amplio espectro fungicida. La formulación lipídica de la anfotericina B minimiza la toxicidad en las células del túbulo renal inmaduro neonatal.<br><br>Perla ENARM: En caso de identificarse Candida spp, debe usarse anfotericina B, de preferencia liposomal o de dispersión coloidal.<br><br>Análisis de Distractores: El fluconazol (A) es una estrategia profiláctica de prevención en prematuros de muy bajo peso, no de rescate curativo. Caspofungina (B) es alternativa de segunda línea. El ketoconazol oral (D) no posee absorción sistémica útil.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 2. Tratamiento, Página 28."
    },
    {
        id: 8,
        question: "En pacientes de con Sepsis de Neonatal y de resistencia confirmada de que impida de usar aminoglucósidos de o cefalosporinas, ¿qué de fármaco se de recomienda como de monoterapia de de rescate?",
        options: ["Eritromicina intravenosa", "Clindamicina dosis alta", "Linezolid infusión continua", "Piperacilina con tazobactam"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, ante brotes intrahospitalarios por bacterias gramnegativas productoras de betalactamasas de espectro extendido (BLEE), la adición de este inhibidor enzimático acoplado a penicilina provee amplio espectro de protección.<br><br>Perla ENARM: Considerar el uso de amikacina o de piperacilina con tazobactam como monoterapia en los casos de resistencia conocida al tratamiento estándar.<br><br>Análisis de Distractores: Linezolid (C) y clindamicina (B) actúan exclusivamente contra cocos grampositivos. La eritromicina (A) no posee espectro para infecciones sistémicas por enterobacterias de origen entérico.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 2. Tratamiento, Página 27."
    },
    {
        id: 9,
        question: "En recién de nacidos prematuros de con Sepsis de Neonatal, ¿cuál de terapia adyuvante de cuenta con de evidencia de de recomendación fuerte de en caso de de disponer del de recurso?",
        options: ["Inmunoglobulina G humana", "Factores estimulantes granulocíticos", "Pentoxifilina intravenosa", "Transfusión de plasma fresco"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, este inhibidor de la fosfodiesterasa modula la cascada proinflamatoria al suprimir los niveles séricos de factor de necrosis tumoral alfa, demostrando en metaanálisis una reducción de la mortalidad en prematuros.<br><br>Perla ENARM: La pentoxifilina puede considerarse, en caso de contar con el recurso, como terapia adyuvante en el RN prematuro con sepsis neonatal.<br><br>Análisis de Distractores: La GPC desaconseja el uso rutinario de inmunoglobulinas inespecíficas (A) o factores de crecimiento de colonias (B) por nulo impacto clínico demostrado. El plasma (D) se limita a coagulopatía de consumo.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 2. Tratamiento, Página 31."
    },
    {
        id: 10,
        question: "En pacientes de con Choque de Séptico Neonatal de en fase de de reanimación aguda, ¿cuál de es la de solución de de elección inicial de para la de expansión de de volumen?",
        options: ["Solución glucosada 10%", "Albúmina humana 5%", "Gelatinas polimerizadas", "Solución salina 0.9%"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la expansión volumétrica de primera intención exige cristaloides isotónicos neutros para restaurar la precarga cardíaca de forma rápida y costo-efectiva, minimizando los riesgos de desplazamiento osmótico intersticial.<br><br>Perla ENARM: Se recomienda el uso de cristaloides (solución salina al 0.9%, entre otros) en bolos de 10 ml/kg, máximo 40 a 60 ml/kg en la primera hora.<br><br>Análisis de Distractores: La albúmina y coloides (B, C) pueden fugar al espacio alvéolo-capilar pulmonar, agravando la hipoxia. La solución glucosada (A) se usa para mantenimiento metabólico, mas causaría desastres de osmolaridad celular en reanimación.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 4. Choque Séptico, Página 36."
    },
    {
        id: 11,
        question: "En Sepsis de Neonatal, ¿qué de parámetro de de gasometría arterial de se considera de básico ante de la sospecha de de estado de de choque para de evaluar el de metabolismo anaerobio?",
        options: ["Presión parcial de dióxido", "Saturación de hemoglobina", "Lactato sérico elevado", "Exceso de base positivo"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, la hipoxia tisular prolongada desplaza el metabolismo hacia la vía anaerobia glucolítica, elevando la concentración de ácido láctico en plasma. Su aclaramiento monitoriza de forma objetiva la respuesta hídrica.<br><br>Perla ENARM: Deben considerarse los siguientes estudios como básicos ante la sospecha de choque séptico: Gases sanguíneos arteriales (gasometría), Lactato sérico, Conteo sanguíneo completo...<br><br>Análisis de Distractores: Un exceso de base positivo (D) implicaría alcalosis. La pCO2 (A) y la saturación de O2 (B) evalúan la de ventilación y hematosis mecánica pulmonar, pero no registran directamente el metabolismo anaerobio tisular.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 4. Choque Séptico, Página 36."
    },
    {
        id: 12,
        question: "En el de abordaje de terapéutico del de Choque Séptico de Neonatal, ¿qué de hallazgo ecocardiográfico de obliga al de inicio inmediato de de infusión con de prostaglandina E1?",
        options: ["Hipertrofia concéntrica ventricular", "Cardiopatía congénita dependiente de conducto", "Insuficiencia tricuspídea severa", "Disfunción diastólica primaria"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de Sepsis Neonatal, anomalías estructurales obstructivas del arco aórtico o mezcla de vasos simulan un choque distributivo al cerrarse el conducto arterioso; mantener permeable esta estructura conserva la perfusión sistémica terminal.<br><br>Perla ENARM: Se debe iniciar prostaglandina E1, en infusión, hasta que se descarte cardiopatía congénita compleja dependiente de conducto en cualquier RN con choque.<br><br>Análisis de Distractores: Las opciones A, C y D corresponden a disfunciones intrínsecas o valvulares que se optimizan con soporte inotrópico o diuréticos, mas no responden fisiológicamente a la reapertura del conducto.",
        source: "GPC-SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, 4. Choque Séptico, Página 35."
    },
    {

                        <a href="login.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('28319Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('28319LastQId', currentQuestionId);
                else localStorage.removeItem('28319LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('28319Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
