                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "En una paciente con contracciones uterinas regulares, ¿cuál es el hallazgo clínico que establece el diagnóstico de amenaza de parto pretérmino?", 
                options: ["Borramiento cervical de 80%", "Dilatación cervical de 5 cm", "Dilatación cervical ≤ 3 cm", "Índice de Bishop > 8"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, las modificaciones cervicales tempranas son el pilar para diferenciar una amenaza de un trabajo de parto activo e irreversible, determinando así la utilidad de la tocolisis.<br><br>Perla ENARM: \"Se establece diagnóstico de amenaza de parto pretérmino con presencia de contracción uterinas con una frecuencia de 2 en 10 minutos o 4 en 20 minutos y 8 en 60 minutos acompañadas de cualquiera de los siguientes: Dilatación cervical ≤3 centímetros, borramiento ≤50% o cambios cervicales por medición de longitud cervical.\"<br><br>Análisis de Distractores: Las opciones A y B corresponden a criterios de parto pretérmino establecido o avanzado, contraindicando el uso de tocolíticos. La opción D evalúa favorabilidad cervical para inducción, pero no define el cuadro de amenaza agudo.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Diagnóstico, Página 80." 
            },
            {
                id: 2, 
                question: "¿Cuál es el factor de riesgo epidemiológico más importante y con mayor peso predictivo para presentar un parto pretérmino recurrente en mujeres multíparas?", 
                options: ["Antecedente de parto pretérmino", "Vaginosis bacteriana asintomática", "Periodo intergenésico < 18 meses", "Tabaquismo > 10 cigarrillos/día"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la historia reproductiva adversa clasifica inmediatamente a la mujer en la categoría de riesgo alto, aumentando la probabilidad de recurrencia de 1.5 a 2 veces por cada evento previo.<br><br>Perla ENARM: \"En el estudio de Mercer y Goldenberg, el factor de riesgo más importante para parto pretérmino recurrente en mujeres multíparas fue tener historia de PP previo < 37 semanas.\"<br><br>Análisis de Distractores: Las opciones B, C y D son factores documentados en la guía clínica, pero están catalogados estrictamente como factores de \"Riesgo bajo\" en aislamiento.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Prevención, Página 65." 
            },
            {
                id: 3, 
                question: "¿Cuál es el método de imagen de elección que supera a la exploración digital para evaluar la longitud cervical y predecir el riesgo de parto prematuro?", 
                options: ["Exploración cervical digital", "Ecografía transabdominal", "Ecografía transvaginal", "Resonancia magnética pélvica"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la evaluación anatómica directa por vía endovaginal permite identificar el acortamiento antes de que ocurra incapacidad esfinteriana franca, superando el error de la estimación manual.<br><br>Perla ENARM: \"Un estudio observacional determinó que la estimación de la longitud cervical por ultrasonido es más confiable para establecer el diagnóstico de parto pretérmino, comparada con la exploración digital. Debido a que se subestima la medida de longitud cervical en aproximadamente 14mm a través de la exploración digital.\"<br><br>Análisis de Distractores: La opción A subestima el daño. La opción B sobreestima la longitud (hasta por 8 mm) dando falsos negativos. La opción D no tiene indicación para tamizaje estructural dinámico del cérvix.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Prevención, Página 68." 
            },
            {
                id: 4, 
                question: "¿Cuál es el punto de corte ecográfico absoluto que define un cérvix corto a las 22 a 24 semanas de gestación?", 
                options: ["< 35 mm", "< 15 mm", "< 30 mm", "< 25 mm"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la competencia cervical decrece a medida que avanza la edad gestacional, y alcanzar este límite a la mitad del embarazo duplica exponencialmente el riesgo de nacimiento prematuro.<br><br>Perla ENARM: \"Se recomienda tomar como punto de corte en la medición de la longitud cervical por ecografía de: <15mm a las 14-15 semanas de gestación, <25mm a las 22-24 semanas de gestación.\"<br><br>Análisis de Distractores: La opción B aplica para gestaciones muy tempranas (14-15 semanas) o como umbral de hospitalización inminente. Las opciones A y C se consideran valores protectores (percentiles más altos con alto valor predictivo negativo).", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Prevención, Página 55." 
            },
            {
                id: 5, 
                question: "¿A partir de qué concentración cuantitativa en secreción cervicovaginal la prueba de fibronectina fetal se considera positiva?", 
                options: ["> 10 ng/ml", "> 50 ng/ml", "> 100 ng/ml", "> 150 ng/ml"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la detección de niveles masivos de esta glicoproteína adhesiva después de la semana 22 traduce una disrupción patológica de la interfase coriodecidual por fuerza mecánica o inflamatoria.<br><br>Perla ENARM: \"Una prueba de fibronectina positiva (50ng/dl) en una paciente con síntomas de parto pretérmino ha sido asociada con un incremento en el riesgo de nacimiento <34 semanas entre 7 a 14 días posteriores a la prueba.\"<br><br>Análisis de Distractores: Los niveles mostrados en las opciones A, C y D no corresponden al umbral estandarizado mundialmente para categorizar el riesgo en la zona gris clínica.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Diagnóstico, Página 87." 
            },
            {
                id: 6, 
                question: "¿Cuál es el puntaje del índice tocolítico de Gruber-Baumgarten que indica altas posibilidades de éxito clínico para iniciar la uteroinhibición?", 
                options: ["< 4 puntos", "> 5 puntos", "≥ 7 puntos", "10 puntos"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, evaluar parámetros como ruptura de membranas, hemorragia y dilatación permite objetivar si el tejido miometrial responderá a fármacos o si el parto es un proceso biológico ya irreversible.<br><br>Perla ENARM: \"La tocolisis puede ser considerada para las mujeres con sospecha de parto prematuro que han tenido un embarazo sin complicaciones... Posibilidades de éxito de uteroinhibición (Índice de Gruber-Baumgarten <4).\"<br><br>Análisis de Distractores: Las opciones B y C reflejan un trabajo de parto muy avanzado donde la tocolisis pierde eficacia y aumenta morbimortalidad. La opción D corresponde a la escala de Papiernik para riesgo epidemiológico, no al índice de manejo de urgencias.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Anexo 5.3 Cuadro 7, Página 149." 
            },
            {
                id: 7, 
                question: "¿Qué fármaco tocolítico de primera línea se asocia a una reducción significativa del riesgo de enterocolitis necrotizante y hemorragia intraventricular neonatal?", 
                options: ["Indometacina", "Nifedipino", "Atosiban", "Orciprenalina"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, el antagonismo de los canales de calcio no solo paraliza la fibra miometrial de forma costo-efectiva vía oral, sino que impacta indirectamente en morbilidades clásicas del prematuro, superando el perfil de seguridad de los betamiméticos.<br><br>Perla ENARM: \"En comparación con los β-miméticos, el nifedipino se asocia con una reducción significativa en los riesgos de enterocolitis necrotizante, hemorragia intraventricular y síndrome de dificultad respiratoria aguda.\"<br><br>Análisis de Distractores: La opción D (orciprenalina) causa severa taquicardia fetal e hipokalemia materna. Las opciones A y C son tocolíticos eficaces, pero el beneficio neonatal incidental descrito en la literatura base está etiquetado para el calcioantagonista.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 100." 
            },
            {
                id: 8, 
                question: "¿Cuál es el límite de edad gestacional máxima que establece la contraindicación absoluta para el uso de indometacina como tocolítico?", 
                options: ["> 24 semanas", "> 28 semanas", "> 32 semanas", "> 34 semanas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la sensibilidad de los receptores del conducto arterioso fetal a la caída de prostaglandinas aumenta en el tercer trimestre tardío, ocasionando falla cardíaca derecha fetal si se expone a bloqueadores de la COX.<br><br>Perla ENARM: \"La indometacina es usualmente administrada por vía oral a dosis inicial de 50mg seguida de 25 a 50mg cada 6 horas por 48 horas. Su uso esta limita a gestaciones menores de 32 semanas.\"<br><br>Análisis de Distractores: Antes de las 32 semanas (Opciones A y B), el ductus es refractario a la exposición farmacológica y el riesgo es mínimo, haciéndolo un tocolítico seguro. Después de la semana 34 (Opción D), la tocolisis rara vez está indicada globalmente.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 103." 
            },
            {
                id: 9, 
                question: "¿Cuál es el objetivo principal y la duración máxima recomendada para mantener la terapia tocolítica farmacológica?", 
                options: ["Prolongar el embarazo 48 horas", "Detener contracciones por 7 días", "Mantener el embarazo hasta 37 semanas", "Retrasar el parto 24 horas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, relajar el miometrio no cura la causa etiológica del parto (infección, isquemia, sobredistensión); solo otorga una ventana puente esencial para aplicar el estándar de oro biológico (maduración y traslado).<br><br>Perla ENARM: \"La evidencia apoya el uso de fármacos tocolíticos a corto plazo (48 horas) para prolongar el embarazo durante al menos 48 horas que permita la administración de esteroides prenatales y que pueda permitir el transporte de la madre a un centro de atención terciaria.\"<br><br>Análisis de Distractores: Mantener el fármaco hasta las 37 semanas (Opción C) o por 7 días (Opción B) expone a toxicidad (edema pulmonar) sin mejorar el resultado neonatal. Las 24 horas (Opción D) son insuficientes para la transcripción proteica pulmonar inducida por corticoides.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 105." 
            },
            {
                id: 10, 
                question: "¿Cuál es el esquema de primera elección estandarizado con betametasona para la inducción de maduración pulmonar fetal?", 
                options: ["6 mg vía intramuscular cada 12 horas por 4 dosis", "12 mg vía intravenosa cada 24 horas por 2 dosis", "12 mg vía intramuscular cada 24 horas por 2 dosis", "24 mg vía intramuscular en dosis única"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la vía y los intervalos son estrictos para generar niveles séricos meseta que actúen sobre los neumocitos tipo II fetales sin causar picos tóxicos inmediatos.<br><br>Perla ENARM: \"Betametasona. 2 dosis: cada una de 12 miligramos cada 24 horas. Vía Intramuscular.\"<br><br>Análisis de Distractores: La opción A corresponde al esquema de Dexametasona. La opción B indica la vía intravenosa, la cual genera depuración rápida ineficaz para la transcripción. La opción D usa una sobredosis única que no otorga la exposición en el tiempo ideal.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Anexo 5.3 Cuadro 9, Página 151." 
            },
            {
                id: 11, 
                question: "¿Cuál es el intervalo mínimo de tiempo que debe transcurrir desde el esquema inicial para considerar administrar una dosis de rescate de corticoesteroides?", 
                options: ["> 7 días", "> 14 días", "> 21 días", "> 28 días"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, se prohibieron los ciclos repetitivos rutinarios por el alto riesgo de falla suprarrenal fetal y parálisis cerebral. Solo se reserva una dosis extra si la labor resurge agudamente semanas después.<br><br>Perla ENARM: \"La terapia antenatal con corticoesteroides de rescate (ciclo de 12 miligramos de betametasona) de forma única... se recomienda limitándolo a embarazo con riesgo elevado de nacimiento en los próximos 7 días y con antecedente de haber recibido terapia antenatal (última dosis en más de 14 días).\"<br><br>Análisis de Distractores: La opción A expone a sobrecarga del neurodesarrollo. Las opciones C y D superan el margen estricto, ya que el descenso del efecto enzimático pulmonar justifica la reintervención a partir del día 14.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 113." 
            },
            {
                id: 12, 
                question: "¿Qué fármaco intravenoso se debe administrar específicamente para reducir el riesgo de parálisis cerebral en fetos con nacimiento inminente entre las 24 y 31 semanas?", 
                options: ["Fenobarbital intravenoso", "Atosiban en infusión", "Sulfato de magnesio", "Dexametasona intramuscular"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la inmadurez de la matriz germinal neuronal requiere un bloqueo temporal de receptores NMDA excitatorios para soportar la hipoxia e inflamación propia de la vía de parto prematuro.<br><br>Perla ENARM: \"La administración prenatal de sulfato de magnesio intravenoso antes de las 32 semanas reduce la parálisis cerebral y los trastornos del desarrollo motor en la persona recién nacida prematura.\"<br><br>Análisis de Distractores: La opción A carece de evidencia de neuroprotección preventiva en este contexto. La opción B es un tocolítico y la opción D es primariamente para maduración pulmonar e intraventricular (pero el esquema \"neuroprotector\" directo se etiqueta al magnesio).", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 121." 
            },
            {
                id: 13, 
                question: "¿Cuál es el manejo farmacológico profiláctico indicado en una paciente asintomática con embarazo único y cérvix corto diagnosticado por ecografía?",

                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la reposición exógena hormonal promueve la integridad mecánica y bioquímica en las fibras de colágeno del cuello, suprimiendo la expresión de receptores para estímulos contráctiles.<br><br>Perla ENARM: \"Es recomendable, de contar con el recurso, la prescripción de progesterona micronizada natural administrada vaginalmente diario durante un máximo de 36 semanas para mujeres asintomáticas con embarazo único, sin antecedentes de parto prematuro y una longitud cervical inferior a 20 mm entre las 16-24 semanas.\"<br><br>Análisis de Distractores: La opciones A y C son tocolíticos indicados para crisis en pacientes sintomáticas (amenaza real), no asintomáticas profilácticas. La opción D no tiene aval en membranas íntegras y asintomáticas.",

            {

                id: 32, 
                question: "De acuerdo al sistema de estratificación clínica de Papiernik, modificado por Gonik-Creasy, ¿qué parámetro de peso materno otorga 3 puntos de riesgo para parto pretérmino?", 
                options: ["Ganancia de peso < 13 kg", "Peso materno < 45 kg", "Pérdida de peso > 2 kg", "Obesidad extrema"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la desnutrición preconcepcional basal incapacita al sistema cardiovascular materno para expandir su volumen plasmático al nivel que exige el feto en el tercer trimestre, derivando en isquemia y contracción prematura.<br><br>Perla ENARM: \"Cuadro 1. Estratificación de Riesgo Papiernik- Berhauer modificado por Gonik- Creasy... Puntaje 3: Muy bajo nivel socioeconómico, Talla < 150 cm, Peso < 45 kg.\"<br><br>Análisis de Distractores: La ganancia deficiente (Opción A) otorga 2 puntos en esta escala específica. La pérdida de peso abrupta (Opción C) representa una desestabilización aguda más severa y otorga 4 puntos. La obesidad (Opción D) es un factor de bajo riesgo individual en la guía, pero no otorga 3 puntos fijos en la clásica tabla de Gonik-Creasy.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Anexo 5.3 Cuadro 1, Página 140." 
            },
            {
                id: 33, 
                question: "¿Cuál es la duración de tratamiento antibiótico recomendada por la GPC para una bacteriuria asintomática e infección urinaria en la embarazada?", 
                options: ["Dosis única fosfomicina", "4 a 7 días", "10 a 14 días", "Infusión hasta la resolución"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, se debe erradicar la colonización vesical para evitar la liberación de citoquinas inflamatorias y prostaglandinas que activan el miometrio, evitando ciclos empíricos largos que fomenten la resistencia de la flora.<br><br>Perla ENARM: \"El análisis de orina para detectar infecciones urinarias debe ser rutinario y el tratamiento antibiótico debe proporcionarse durante un período de 4-7 días si es necesario en las mujeres con colonización bacteriana.\"<br><br>Análisis de Distractores: La monodosis (Opción A) tiene altas tasas de recurrencia en el éxtasis urinario de la gestante. Tratamientos de 10 a 14 días (Opción C) o indefinidos (Opción D) someten al feto a mayor exposición farmacológica sin beneficio bacteriológico superior en cistitis simple.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 95." 
            },
            {
                id: 34, 
                question: "Durante la infusión continua de sulfato de magnesio, ¿cuál es la dosis de mantenimiento máxima por hora tolerada antes de suspender por riesgo tóxico materno?", 
                options: ["2 g/hora", "4 g/hora", "6 g/hora", "8 g/hora"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, rebasar el umbral máximo en el intento de frenar las contracciones empuja los niveles de magnesio sérico a franjas letales que suprimen los reflejos osteotendinosos y paralizan el diafragma materno.<br><br>Perla ENARM: \"La dosis de carga son 4-6 g en solución al 10% -20% durante 30 minutos, seguida por una solución en infusión continua de 2 g por hora, hasta alcanzar un máximo de 4 g / hora o hasta que la paciente presente menos de una contracción por 10 minutos.\"<br><br>Análisis de Distractores: 2 g/hora (Opción A) es la velocidad de infusión ideal de inicio, no el tope. Valores de 6 u 8 g/hora (Opciones C y D) causarán paro cardiorrespiratorio agudo sin duda en la paciente.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 100." 
            },
            {
                id: 35, 
                question: "Tras aplicar corticoesteroides antenatales a la madre, ¿cuántos días toma revertir la pérdida de variabilidad transitoria en la frecuencia cardíaca fetal?", 
                options: ["2 días", "4 días", "7 días", "14 días"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la impregnación de glucocorticoides induce un letargo fisiológico temporal en el sistema nervioso autónomo fetal; ignorar esta ventana expone a cirugías por \"falsos positivos\" de asfixia en el registro cardiotocográfico.<br><br>Perla ENARM: \"La administración de terapia antenatal con corticoesteroides se asocia con cambios transitorios en la frecuencia cardiaca fetal, y cambios en la variabilidad del registro cardiotocográfico los cuales revierten 4 días después de la primera dosis de corticoesteroide.\"<br><br>Análisis de Distractores: El punto de máxima depresión biológica ocurre al día 2 o 3 (Opción A), pero su reversión total exige 96 horas. Los días 7 y 14 (Opciones C y D) son ventanas metabólicas relevantes para la hiperglucemia materna y la aplicación de dosis de rescate, no para el patrón fetal monitorizado.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 114." 
            },
            {
                id: 36, 
                question: "En la etiopatogenia clínica, ¿cuál es el mecanismo directo por el que el sangrado transvaginal antes de las 28 semanas precipita el parto pretérmino?", 
                options: ["Ruptura prematura de membranas", "Maduración temprana del cuello uterino", "Infección intraamniótica ascendente", "Depleción de líquido amniótico"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la formación de coágulos en el segmento inferior libera altas dosis de trombina, la cual actúa sobre los receptores del cérvix estimulando la producción de proteasas que degradan el colágeno estructural.<br><br>Perla ENARM: \"El sangrado vaginal (< 28 semanas) probablemente indica una alteración de la circulación uteroplacentaria y por otro lado favorece la maduración temprana del cuello uterino.\"<br><br>Análisis de Distractores: Aunque el sangrado predispone secundariamente a inflamación y ruptura (Opción A e infección Opción C), el vínculo fisiopatológico directo resaltado en la directriz como promotor motor biológico de labor pretérmino es el reblandecimiento (maduración) cervical.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Promoción a la salud, Página 46." 
            },
            {
                id: 37, 
                question: "Al vigilar a una paciente de alto riesgo, ¿cuál es la tasa promedio de acortamiento de la longitud cervical documentada por la guía clínica?", 
                options: ["1 mm por semana", "3 mm por semana", "5 mm por semana", "8 mm por semana"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la incompetencia esfinteriana del cuello uterino en el segundo trimestre no es un proceso estático; la pérdida de firmeza avanza a una velocidad que exige ultrasonidos quincenales para no perder la ventana terapéutica.<br><br>Perla ENARM: \"Un estudio de cohortes en 2003 que estudió 144 pacientes, demostró que en promedio la tasa de acortamiento cervical es de 5mm por semana.\"<br><br>Análisis de Distractores: En pacientes sanas el cérvix puede acortarse a razón de 1 mm por semana (Opción A), pero en portadoras de patología el colapso se quintuplica. Opciones de 3 u 8 mm (B y D) carecen de sustento en las cohortes pivotales referenciadas por el documento nacional.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Prevención, Página 73." 
            },
            {
                id: 38, 
                question: "¿Cuál es el riesgo neurológico catastrófico que incrementa hasta 5 veces en fetos expuestos a ciclos repetidos rutinarios (≥4) de corticoesteroides?", 
                options: ["Parálisis cerebral", "Hemorragia intraventricular grado IV", "Convulsiones neonatales intratables", "Ceguera por retinopatía aguda"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, la saturación perpetua de receptores esteroideos interrumpe gravemente la arborización dendrítica, la mielinización del SNC en desarrollo y suprime el eje suprarrenal del neonato sin otorgar madurez pulmonar extra.<br><br>Perla ENARM: \"El riesgo de parálisis cerebral en fetos expuestos a múltiples ciclos de corticoesteroides se calcula en 5 veces mayor. (RR 5.7 IC95% 0.7-46.7) así como un incremento en el riesgo de infección y supresión de la función suprarrenal.\"<br><br>Análisis de Distractores: Un solo ciclo inicial correcto de esteroides en realidad prevendrá de forma masiva la hemorragia intraventricular (Opción B). La ceguera (Opción D) es una falla del control en la terapia de oxígeno neonatal.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 115." 
            },
            {
                id: 39, 
                question: "En consejería de planificación familiar, ¿cuál es el periodo intergenésico mínimo considerado protector contra la recurrencia de un parto pretérmino?", 
                options: ["Mayor a 6 meses", "Mayor a 12 meses", "Mayor a 18 meses", "Mayor a 36 meses"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del Parto Pretérmino, espaciar adecuadamente los nacimientos permite a la madre regenerar sus depósitos de hierro y folato, estabilizar el lecho endometrial y recuperar la capacidad tensil del esfínter cervical.<br><br>Perla ENARM: \"Es recomendable informar a las pacientes esperar entre un año y medio a dos años entre el término de un embarazo y el inicio del siguiente, para disminuir el riesgo de parto pretérmino.\"<br><br>Análisis de Distractores: Las gestaciones con intervalos menores de 6 o 12 meses (Opciones A y B) mantienen a la madre en un estado inflamatorio crónico que detona la prematurez temprana. Esperar 3 años (Opción D) resulta innecesario bajo este criterio predictivo puntual.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Promoción a la salud, Página 48." 
            },

                id: 40, 
                question: "¿A partir de qué valor negativo se considera el Alto Valor Predictivo Negativo de la prueba de fibronectina fetal para descartar parto inminente a 7 días?", 
                options: ["Menor a 10 ng/ml", "Menor a 25 ng/ml", "Menor a 50 ng/ml", "Menor a 100 ng/ml"],

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {

                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });

                localStorage.removeItem('gyoBProgress');
                localStorage.removeItem('gyoBLastQId');
                window.location.reload();
            });

            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoBProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoBLastQId', currentQuestionId);
                else localStorage.removeItem('gyoBLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoBProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
