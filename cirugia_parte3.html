            .internal-logo .logo-enarm { font-size: 1.4rem; }
            .internal-logo .logo-Lite { font-size: 1.1rem; }

    <script>

                </div>

        // --- DATA DE LOS MÓDULOS ---
        const summaryContentHtml = `
            <div class="space-y-6">
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Fisiología y Control Prenatal</h4>
                    <p>La <strong>HCG</strong> alcanza su pico en la semana 10. Cambios fisiológicos incluyen anemia dilucional (Hb ~11 g/dl) y aumento del gasto cardíaco. Suplementar con ácido fólico (400 µg) y hierro (>20 sem). Vacuna Tdpa (>20 sem). Gammaglobulina anti-D a las 28 semanas en Rh- no sensibilizadas.</p>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Hemorragias</h4>
                    <ul class="list-disc pl-5 mt-2 space-y-1">
                        <li><strong>1er Trimestre:</strong> Ectópico (ampular, β-HCG >1500 sin saco, Tx Metotrexato). Mola (imagen "copos de nieve", β-HCG >100k).</li>
                        <li><strong>3er Trimestre:</strong> Placenta Previa (sangrado rojo brillante, indoloro, NO tacto). Abruptio (dolor, útero de madera, HTA). Vasa Previa (sufrimiento fetal tras amniorrexis).</li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold text-slate-800 dark:text-slate-200">Patología Médica y Parto</h4>
                    <p><strong>Preeclampsia:</strong> TA ≥ 140/90 + Proteinuria. Severidad: HELLP, síntomas neuro. Tx: Labetalol/Nifedipino y Sulfato de Magnesio.</p>
                    <p><strong>Parto Pretérmino:</strong> Corticoides (24-34 sem). <strong>Hemorragia Posparto:</strong> Atonía es la causa #1.</p>
                </div>
            </div>
        `;
        
        const courseModules = [
{
    id: 1,
    title: "Módulo 1: Diagnóstico y tratamiento de fracturas intracapsulares de fémur proximal",
    gpcLink: "https://drive.google.com/file/d/1BU4Zzc_MHsp-SMAiovuNYimjSPYzc6Xc/view?usp=sharing",
    summary: `
        <div class="max-w-5xl mx-auto space-y-6 text-slate-700 dark:text-slate-300 text-base leading-relaxed font-sans">
            
            <section class="bg-gradient-to-br from-rose-50 to-fuchsia-100 dark:from-rose-900/20 dark:to-fuchsia-900/20 p-5 sm:p-6 rounded-2xl shadow-sm border-t-4 border-rose-500">
                <h3 class="font-black text-rose-900 dark:text-rose-400 text-lg mb-4 flex items-center gap-2">
                    <svg class="w-6 h-6 text-rose-600 dark:text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Definición y Clasificación
                </h3>
                
                <div class="grid lg:grid-cols-2 gap-5 text-sm font-medium">
                    <div class="space-y-4 flex flex-col">
                        <div class="bg-emerald-50/90 dark:bg-emerald-900/30 p-4 rounded-xl border border-emerald-200/50 dark:border-emerald-800/50 shadow-sm flex-grow">
                            <strong class="text-emerald-800 dark:text-emerald-300 block mb-1 uppercase tracking-wide text-xs">Definición Operativa</strong>
                            <p class="text-emerald-950 dark:text-emerald-100">Solución de continuidad ósea desde la superficie articular de la cabeza femoral hasta la inserción capsular intertrocantérea. Incluye fracturas <strong class="bg-emerald-200 dark:bg-emerald-800/60 px-1 rounded">capitales y cervicales</strong> (subcapital, transcervical y base cervical).</p>
                        </div>
                        <div class="bg-emerald-50/90 dark:bg-emerald-900/30 p-4 rounded-xl border border-emerald-200/50 dark:border-emerald-800/50 shadow-sm">
                            <strong class="text-emerald-800 dark:text-emerald-300 block mb-1 uppercase tracking-wide text-xs">Escalas de Funcionalidad</strong>
                            <p class="text-emerald-950 dark:text-emerald-100">Uso del <strong class="text-emerald-700 dark:text-emerald-400 font-bold border-b-2 border-emerald-400">Índice de Katz</strong> (independencia en AVD, 0-6 pts), fundamental para decidir entre osteosíntesis o artroplastia.</p>
                        </div>
                    </div>

                    <div class="bg-amber-50/90 dark:bg-amber-900/30 p-4 rounded-xl border border-amber-200/50 dark:border-amber-800/50 shadow-sm">
                        <strong class="text-amber-800 dark:text-amber-300 block mb-3 uppercase tracking-wide text-xs border-b border-amber-200/50 dark:border-amber-800/50 pb-1">Sistemas de Clasificación</strong>
                        
                        <div class="space-y-3 text-amber-950 dark:text-amber-100">
                            <div class="bg-white/60 dark:bg-black/20 p-2.5 rounded-lg border border-amber-100 dark:border-amber-800/30">
                                <strong class="text-amber-900 dark:text-amber-200 block text-[10px] uppercase mb-1 font-bold">Clasificación de Garden (Desplazamiento)</strong>
                                <ul class="space-y-0.5 text-xs">
                                    <li><strong class="text-amber-700 dark:text-amber-500">I:</strong> Incompleta o impactada en valgo.</li>
                                    <li><strong class="text-amber-700 dark:text-amber-500">II:</strong> Completa SIN desplazamiento.</li>
                                    <li><strong class="text-amber-700 dark:text-amber-500">III:</strong> Completa, parcial desplazada (< 50%).</li>
                                    <li><strong class="text-amber-700 dark:text-amber-500">IV:</strong> Completa con desplazamiento TOTAL.</li>
                                </ul>
                            </div>
                            <div class="bg-white/60 dark:bg-black/20 p-2.5 rounded-lg border border-amber-100 dark:border-amber-800/30">
                                <strong class="text-amber-900 dark:text-amber-200 block text-[10px] uppercase mb-1 font-bold">Pauwels (Inestabilidad / Cizallamiento)</strong>
                                <ul class="space-y-0.5 text-xs">
                                    <li><strong class="text-amber-700 dark:text-amber-500">I:</strong> Ángulo < 30° (Compresión/valgo).</li>
                                    <li><strong class="text-amber-700 dark:text-amber-500">II:</strong> Ángulo 30° - 50°.</li>
                                    <li><strong class="text-amber-700 dark:text-amber-500">III:</strong> Ángulo > 70° (Fuerzas de cizallamiento).</li>
                                </ul>
                            </div>
                            <p class="text-xs mt-1"><strong class="text-amber-800 dark:text-amber-300">Clasificación AO:</strong> Segmento 31-B.</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-gradient-to-br from-indigo-50 to-purple-100 dark:from-indigo-900/20 dark:to-purple-900/20 p-5 sm:p-6 rounded-2xl shadow-sm border-t-4 border-indigo-500">
                <h3 class="font-black text-indigo-900 dark:text-indigo-400 text-lg mb-4 flex items-center gap-2">
                    <svg class="w-6 h-6 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H14"></path></svg>
                    Epidemiología, Fisiopatología y Clínica
                </h3>
                
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 text-sm font-medium">
                    <div class="bg-teal-50/90 dark:bg-teal-900/30 p-4 rounded-xl border border-teal-200/50 dark:border-teal-800/50 shadow-sm flex flex-col justify-center">
                        <strong class="text-teal-800 dark:text-teal-300 block mb-2 uppercase tracking-wide text-xs border-b border-teal-200/50 dark:border-teal-800/50 pb-1">Epidemiología y Etiología</strong>
                        <p class="text-teal-950 dark:text-teal-100 mb-2">Predomina en mujeres (3:1). Pico de incidencia a los <strong class="text-teal-700 dark:text-teal-400 font-bold">80 años</strong> (corresponde al 53% del fémur proximal).</p>
                        <p class="text-teal-950 dark:text-teal-100"><strong class="text-teal-700 dark:text-teal-400">Etiología:</strong> Caídas de su propia altura (baja energía) en adultos mayores. En jóvenes: alta energía.</p>
                    </div>

                    <div class="bg-orange-50/90 dark:bg-orange-900/30 p-4 rounded-xl border border-orange-200/50 dark:border-orange-800/50 shadow-sm lg:col-span-2">
                        <span class="bg-orange-600 text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-2 inline-block shadow-sm">Dato ENARM: Fisiopatología</span>
                        <ul class="space-y-2 text-orange-950 dark:text-orange-100">
                            <li>El daño principal es la lesión de los <strong class="bg-orange-200 dark:bg-orange-800/60 px-1 rounded">vasos retinaculares e intraóseos</strong>, comprometiendo gravemente la vascularidad de la cabeza femoral.</li>
                            <li><strong class="text-orange-800 dark:text-orange-300">Si hay rotación:</strong> Se lesiona la arteria del ligamento redondo.</li>
                            <li class="bg-white/60 dark:bg-black/20 p-2 rounded border border-orange-100 dark:border-orange-700/50 mt-2 text-xs">
                                Esto explica el altísimo riesgo de <strong class="text-rose-600 dark:text-rose-400 font-bold">necrosis avascular y falla de consolidación (no unión)</strong>.
                            </li>
                        </ul>
                    </div>

                    <div class="bg-orange-100/80 dark:bg-orange-900/40 p-4 rounded-xl border border-orange-200/50 dark:border-orange-800/50 shadow-sm md:col-span-2 lg:col-span-3 grid sm:grid-cols-2 gap-4">
                        <div>
                            <strong class="text-orange-900 dark:text-orange-400 block mb-1 uppercase text-xs">Cuadro Clásico</strong>
                            <p class="text-orange-950 dark:text-orange-100">Adulto mayor tras caída con dolor severo en cadera e imposibilidad para bipedestación. <strong class="bg-orange-200 dark:bg-orange-800/60 px-1 rounded">Acortamiento y rotación externa</strong>.</p>

        <div class="max-w-5xl mx-auto space-y-6 text-slate-700 dark:text-slate-300 text-base leading-relaxed font-sans">

                <h3 class="font-black text-sky-900 dark:text-sky-400 text-lg mb-4 flex items-center gap-2">

                    Definición y Clasificación
                </h3>
                
                <div class="grid lg:grid-cols-2 gap-5 text-sm font-medium">
                    <div class="bg-amber-50/90 dark:bg-amber-900/30 p-4 rounded-xl border border-amber-200/50 dark:border-amber-800/50 shadow-sm flex flex-col justify-center">
                        <strong class="text-amber-800 dark:text-amber-300 block mb-2 uppercase tracking-wide text-xs">Definición Operativa</strong>
                        <p class="text-amber-950 dark:text-amber-100 mb-2"><strong class="text-amber-700 dark:text-amber-400">Urolitiasis:</strong> Agregación de cristales en la orina (oxalato de calcio el más frecuente).</p>
                        <p class="text-amber-950 dark:text-amber-100 bg-white/60 dark:bg-black/20 p-2.5 rounded-lg border border-amber-100 dark:border-amber-700/50">
                            <strong class="text-amber-700 dark:text-amber-400">Cólico renoureteral:</strong> Presentación clínica aguda, dolor de gran intensidad secundario a la <strong>obstrucción</strong> del tracto urinario.
                        </p>
                    </div>

                    <div class="bg-rose-50/90 dark:bg-rose-900/30 p-4 rounded-xl border border-rose-200/50 dark:border-rose-800/50 shadow-sm">
                        <strong class="text-rose-800 dark:text-rose-300 block mb-2 uppercase tracking-wide text-xs border-b border-rose-200/50 dark:border-rose-800/50 pb-1">Composición Litiásica y Clínica</strong>
                        <div class="grid sm:grid-cols-2 gap-3 text-rose-950 dark:text-rose-100">
                            <div>
                                <strong class="text-rose-700 dark:text-rose-400 block text-[10px] uppercase mb-0.5">Radiopacidad</strong>
                                <ul class="space-y-0.5 text-[11px]">
                                    <li>• <strong class="font-bold">Radiopacos:</strong> Oxalato y Fosfato de Ca.</li>
                                    <li>• <strong class="font-bold">Pobre opacidad:</strong> Estruvita y Apatita.</li>
                                    <li>• <strong class="font-bold">Radiolúcidos:</strong> Ác. úrico, Urato y Cistina.</li>
                                </ul>
                            </div>
                            <div>
                                <strong class="text-rose-700 dark:text-rose-400 block text-[10px] uppercase mb-0.5">Clínica (Tamaño)</strong>
                                <ul class="space-y-0.5 text-[11px]">
                                    <li><strong class="font-bold text-rose-800 dark:text-rose-300">I:</strong> Piélicos/caliciales < 3 cc.</li>
                                    <li><strong class="font-bold text-rose-800 dark:text-rose-300">II:</strong> Entre 3 y 7 cc.</li>
                                    <li><strong class="font-bold text-rose-800 dark:text-rose-300">III:</strong> 3-7 cc + dilatación crónica.</li>
                                    <li><strong class="font-bold text-rose-800 dark:text-rose-300">IV a/b:</strong> Coraliformes o > 7 cc (> 4 cm).</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="bg-violet-50/90 dark:bg-violet-900/30 p-4 rounded-xl border border-violet-200/50 dark:border-violet-800/50 shadow-sm lg:col-span-2">
                        <span class="bg-violet-600 text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-2 inline-block shadow-sm">Escala de Hidronefrosis por USG</span>
                        <p class="text-violet-950 dark:text-violet-100 text-sm">Va desde el <strong>Grado 0</strong> (complejo ecogénico central sin separación) hasta el <strong>Grado III</strong> (reemplazo de la mayor parte de las porciones del seno renal y discontinuidad ecogénica).</p>

            <section class="bg-gradient-to-br from-purple-50 to-violet-100 dark:from-purple-900/20 dark:to-violet-900/20 p-5 sm:p-6 rounded-2xl shadow-sm border-t-4 border-purple-500">

                    Epidemiología y Fisiopatología
                </h3>
                
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 text-sm font-medium">
                    <div class="bg-lime-50/90 dark:bg-lime-900/30 p-4 rounded-xl border border-lime-200/50 dark:border-lime-800/50 shadow-sm flex flex-col">
                        <strong class="text-lime-800 dark:text-lime-300 block mb-2 uppercase tracking-wide text-xs border-b border-lime-200/50 dark:border-lime-800/50 pb-1">Epidemiología Básica</strong>
                        <ul class="space-y-2 text-lime-950 dark:text-lime-100 flex-grow">
                            <li><strong class="text-lime-700 dark:text-lime-400">Prevalencia:</strong> Incidencia a lo largo de la vida del 12%. Predomina en hombres (3:1).</li>
                            <li><strong class="text-lime-700 dark:text-lime-400">Pico de Edad:</strong> 4ta y 5ta década (31 a 50 años).</li>
                            <li><strong class="text-lime-700 dark:text-lime-400">Etiología:</strong> El <strong class="bg-lime-200 dark:bg-lime-800/60 px-1 rounded">80%</strong> son de calcio (monohidrato/dihidrato de oxalato).</li>
                        </ul>

                    <div class="bg-sky-50/90 dark:bg-sky-900/30 p-4 rounded-xl border border-sky-200/50 dark:border-sky-800/50 shadow-sm flex flex-col justify-center">

                        <div class="space-y-2 text-sky-950 dark:text-sky-100">
                            <p>• <strong class="text-sky-700 dark:text-sky-400">Baja ingesta:</strong> 82% consume < 2 L/día.</p>
                            <p>• <strong class="text-sky-700 dark:text-sky-400">Metabólicos:</strong> Obesidad, DM, HAS, antecedente familiar.</p>
                            <p>• <strong class="text-sky-700 dark:text-sky-400">pH urinario:</strong> < 5.5 promueve litos de ácido úrico.</p>
                            <p>• <strong class="text-sky-700 dark:text-sky-400">Infeccioso:</strong> Estruvita se asocia a patógenos productores de ureasa (Proteus, Klebsiella).</p>

                        <span class="bg-orange-600 text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-2 inline-block shadow-sm">Dato ENARM: Fisiopatología</span>
                        <strong class="text-orange-800 dark:text-orange-400 block mb-1 uppercase tracking-wide text-xs">Mecanismo del Dolor</strong>
                        <p class="text-orange-950 dark:text-orange-100">La sintomatología álgica aguda NO proviene del uréter en sí, sino de la <strong class="bg-orange-200 dark:bg-orange-800/60 px-1 rounded">obstrucción del flujo urinario</strong> que provoca dilatación retrógrada e importante distensión de la cápsula renal.</p>

                <h3 class="font-black text-emerald-900 dark:text-emerald-400 text-lg mb-4 flex items-center gap-2">
                    <svg class="w-6 h-6 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Manifestaciones Clínicas
                </h3>
                
                <div class="grid lg:grid-cols-2 gap-5 text-sm font-medium">
                    <div class="bg-indigo-50/90 dark:bg-indigo-900/30 p-4 rounded-xl border border-indigo-200/50 dark:border-indigo-800/50 shadow-sm flex flex-col justify-center">
                        <strong class="text-indigo-800 dark:text-indigo-400 block mb-2 uppercase tracking-wide text-xs">Cuadro Clínico y Temporalidad</strong>
                        <p class="text-indigo-950 dark:text-indigo-100 mb-2">Súbito dolor muy intenso, agudo y paroxístico en fosa renal/flanco. <strong class="text-indigo-700 dark:text-indigo-400 font-bold border-b-2 border-indigo-400">Irradiación característica:</strong> abdomen inferior, ingle o genitales (testículo/labios menores).</p>

                            <span class="text-indigo-800 dark:text-indigo-300 block text-[10px] uppercase font-bold mb-1">Temporalidad</span>
                            <p class="text-indigo-950 dark:text-indigo-100">Alcanza picos de máxima intensidad (paroxismos) de <strong class="bg-indigo-200 dark:bg-indigo-800/60 px-1 rounded">20 a 60 minutos</strong>.</p>

                    <div class="bg-amber-50/90 dark:bg-amber-900/30 p-4 rounded-xl border border-amber-200/50 dark:border-amber-800/50 shadow-sm flex flex-col justify-center">
                        <strong class="text-amber-800 dark:text-amber-400 block mb-2 uppercase tracking-wide text-xs">Signos Cardinales y Acompañantes</strong>
                        <ul class="space-y-2 text-amber-950 dark:text-amber-100">
                            <li><strong class="text-amber-700 dark:text-amber-500">Exploración:</strong> Franca agitación psicomotriz, diaforético e <strong>incapaz de encontrar posición antiálgica</strong> (de confort).</li>
                            <li><strong class="text-amber-700 dark:text-amber-500">Reflejo Vagales:</strong> Náusea y vómito en 50% de pacientes.</li>

                    Diagnóstico
                </h3>
                
                <div class="grid lg:grid-cols-2 gap-5 text-sm font-medium">
                    <div class="bg-fuchsia-50/90 dark:bg-fuchsia-900/30 p-4 rounded-xl border border-fuchsia-200/50 dark:border-fuchsia-800/50 shadow-sm flex flex-col">
                        <strong class="text-fuchsia-800 dark:text-fuchsia-400 block mb-3 uppercase tracking-wide text-xs border-b border-fuchsia-200/50 dark:border-fuchsia-800/50 pb-1">Laboratorios Obligatorios</strong>
                        <div class="space-y-3 text-fuchsia-950 dark:text-fuchsia-100 flex-grow">
                            <div class="bg-white/60 dark:bg-black/20 p-2.5 rounded-lg border border-fuchsia-100 dark:border-fuchsia-700/50">
                                <strong class="text-fuchsia-700 dark:text-fuchsia-400 block mb-0.5">EGO / Tira Reactiva</strong>
                                <p class="text-xs">Mandatorio para constatar hematuria y descartar infección oculta (piuria > 5 leuco/campo).</p>

                                <strong class="text-fuchsia-700 dark:text-fuchsia-400 block mb-0.5">Biometría Hemática</strong>
                                <p class="text-xs">Obligada; disminuye 14% riesgo de recaídas al descartar tempranamente infección sistémica.</p>
                            </div>
                            <div class="bg-white/60 dark:bg-black/20 p-2.5 rounded-lg border border-fuchsia-100 dark:border-fuchsia-700/50">
                                <strong class="text-fuchsia-700 dark:text-fuchsia-400 block mb-0.5">Creatinina Sérica</strong>
                                <p class="text-xs">Elevación brusca es <strong class="text-red-600 dark:text-red-400 font-bold">SIGNO DE ALARMA</strong>: obstrucción bilateral o paciente monorreno.</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-cyan-50/90 dark:bg-cyan-900/30 p-4 rounded-xl border border-cyan-200/50 dark:border-cyan-800/50 shadow-sm flex flex-col justify-center">

                        <div class="space-y-3 text-cyan-950 dark:text-cyan-100">

                                <span class="bg-cyan-600 text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-1 inline-block shadow-sm">Estudio Inicial de Elección</span>
                                <p><strong class="text-cyan-700 dark:text-cyan-400">Ultrasonido Renal y de Vías Urinarias.</strong> 1ra línea en urgencias, sin radiación. Detecta signos indirectos (hidronefrosis).</p>
                            </div>

                                <span class="bg-cyan-600 text-white px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-1 inline-block shadow-sm">Estándar de Oro</span>
                                <p><strong class="text-cyan-700 dark:text-cyan-400">TAC Helicoidal Simple (Sin Contraste).</strong> Mayor rendimiento. Solicitar ante duda o previo a manejo definitivo.</p>
                            </div>
                            <div class="bg-white/60 dark:bg-black/20 p-2.5 rounded-lg border border-cyan-100 dark:border-cyan-700/50 mt-2">
                                <p class="text-[11px]"><strong class="text-cyan-800 dark:text-cyan-400">Radiografía Simple (KUB):</strong> Baja sensibilidad, uso limitado al seguimiento de litos radiopacos.</p>

                        </div>

            </section>

            <section class="bg-gradient-to-br from-indigo-50 to-blue-100 dark:from-indigo-900/20 dark:to-blue-900/20 p-5 sm:p-6 rounded-2xl shadow-sm border-t-4 border-indigo-500">
                <h3 class="font-black text-indigo-900 dark:text-indigo-400 text-lg mb-4 flex items-center gap-2">
                    <svg class="w-6 h-6 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    Tratamiento y Manejo
                </h3>
                
                <div class="grid lg:grid-cols-2 gap-5 mb-5 text-sm font-medium">
                    <div class="bg-rose-50/90 dark:bg-rose-900/30 p-4 rounded-xl border border-rose-200/50 dark:border-rose-800/50 shadow-sm flex flex-col justify-center">

        function displayModule(moduleId) {
            const homeButton = document.getElementById('home-button');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const menuToggle = document.getElementById('menu-toggle');
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');

            if (!displayArea) return;
            // Scroll to top when loading new module
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0,0);
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentModuleId = moduleId ? parseInt(moduleId) : null;
                saveProgress();

                if (!currentModuleId) {
                    homeButton.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    // Resetear barra lateral a estado desplegado (por defecto al salir)
                    sidebar.classList.remove('lg:translate-x-0');
                    mainContent.classList.remove('lg:ml-80');
                    homeButton.classList.remove('lg:left-[21rem]', 'left-4');
                    progressContainer.classList.add('hidden');

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    return;
                }
                
                // MÓDULO ACTIVO
                updateMobileLogoState(true);

                homeButton.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                
                // Asegurar que el sidebar se expanda siempre al entrar a un módulo en desktop
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    mainContent.classList.add('lg:ml-80');
                    homeButton.classList.add('lg:left-[21rem]');
                    homeButton.classList.remove('left-4');
                }

                progressContainer.classList.remove('hidden');
                
                const moduleData = courseModules.find(m => m.id === currentModuleId);
                if (!moduleData) {
                    displayModule(null);
                    return;
                }
                
                if (userProgress[currentModuleId] && userProgress[currentModuleId].completed) {
                    showCompletedModule(currentModuleId);
                } else {
                    showActiveModule(currentModuleId);
                }

                renderModuleList();
                displayArea.classList.remove('opacity-0');
            }, 200);
        }

        // --- SISTEMA DE CERTIFICADO ---
        function showFinalSummary() {
            updateMobileLogoState(false); // Ocultar logo barra móvil
            
            // SCROLL AUTOMÁTICO AL INICIO DE LA PÁGINA
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
            
            let totalScore = 0;
            let totalQuestions = 0;
            
            let stats = {
                alta: { correct: 0, total: 0 },
                media: { correct: 0, total: 0 },
                baja: { correct: 0, total: 0 }
            };

            let moduleScoresHtml = '<div class="space-y-3 mt-4 max-h-60 overflow-y-auto pr-2">';

            courseModules.forEach(module => {
                if (userProgress[module.id]?.completed) {
                    const answers = userProgress[module.id].answers;
                    const score = userProgress[module.id].score;
                    const total = module.quiz.length;
                    
                    totalScore += score;
                    totalQuestions += total;
                    const pct = (score/total)*100;

                    module.quiz.forEach((q, index) => {
                        let diffType = 'media'; 
                        if (index === 1 || index === 4) diffType = 'baja';
                        else if (index === 0 || index === 3) diffType = 'media';
                        else if (index === 2) diffType = 'alta';

                        stats[diffType].total++;
                        if (answers[index] === q.answer) {
                            stats[diffType].correct++;
                        }
                    });
                    
                    moduleScoresHtml += `
                    <div class="text-sm">
                        <div class="flex justify-between mb-1 text-slate-700 dark:text-slate-300">
                            <span class="truncate pr-4">${module.title.split(':')[0]}</span>

                            <div class="bg-teal-600 h-1.5 rounded-full" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                }
            });

            const finalPct = totalQuestions > 0 ? Math.round((totalScore/totalQuestions)*100) : 0;

                </div>`;
        }

        function renderModuleList() {
            const list = document.getElementById('module-list');
            if(!list) return;
            list.innerHTML = '';

            // MODIFICACIÓN: Iterar sobre la lista COMPLETA de títulos cortos
            allModuleShortTitles.forEach((shortTitle, index) => {
                const moduleId = index + 1;
                // Buscar si el módulo existe en la variable courseModules (módulo disponible)
                const module = courseModules.find(m => m.id === moduleId);
                const isCompleted = userProgress[moduleId]?.completed;
                const isActive = moduleId === currentModuleId;

                const li = document.createElement('li');
                
                if (module) {
                    // MÓDULO DISPONIBLE
                    let classes = 'p-3 rounded-lg cursor-pointer transition-all duration-200 flex items-center justify-between gap-3 ';
                    if (isActive) classes += 'bg-teal-600 font-bold text-white shadow-lg';
                    else if (isCompleted) classes += 'bg-emerald-800/80 text-emerald-300 hover:bg-emerald-700/80';
                    else classes += 'bg-slate-700 hover:bg-slate-600 hover:pl-4';

                    li.className = classes;
                    
                    let iconSvg = isCompleted 
                        ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />'
                        : '<path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />';

                    let innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-70" viewBox="0 0 20 20" fill="currentColor">
                                ${iconSvg}
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;

                    if (isCompleted) {
                        innerHTML += `
                            <button onclick="event.stopPropagation(); showModuleSummary(${moduleId})" class="p-1 hover:bg-white/20 rounded-full transition-colors" title="Ver Resumen">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        `;
                    }

                    li.innerHTML = innerHTML;
                    li.onclick = () => displayModule(moduleId);
                } else {
                    // MÓDULO NO DISPONIBLE AÚN
                    li.className = 'p-3 rounded-lg flex items-center gap-3 bg-slate-800 text-slate-500 cursor-not-allowed opacity-50';
                    li.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                            <span class="truncate text-sm">${shortTitle}</span>
                        </div>
                    `;
                }
                list.appendChild(li);
            });
        }

        function renderBibliography() {
            const bibliographyContent = document.getElementById('bibliography-content');
            if (!bibliographyContent) return;

            const allSources = [
"GPC-IMSS-115-08. Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal de fémur. 2017.",
"GPC-IMSS-193-08. Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio. 2017.",
"GPC-IMSS-388-10. Diagnóstico y tratamiento de las lesiones ligamentarias traumáticas en rodilla. 2017.",
"GPC-IMSS-635-19. Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias. 2019.",
"GPC-SEDENA-445-18. Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen. 2018."
            ];
            
            bibliographyContent.innerHTML = '';
            allSources.forEach(citation => {
                const item = document.createElement('div');
                item.className = 'bg-slate-100 dark:bg-slate-700 p-3 rounded-lg flex items-start gap-3 text-sm';
                item.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500 dark:text-slate-400 flex-shrink-0 mt-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 16c1.255 0 2.443-.29 3.5-.804V4.804zM14.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 0114.5 16c1.255 0 2.443-.29 3.5-.804v-10A7.968 7.968 0 0014.5 4z" />
                    </svg>
                    <span>${citation}</span>
                `;
                bibliographyContent.appendChild(item);
            });
        }

        function updateProgressBar() {
            const totalDefined = courseModules.length; 
            const completed = Object.keys(userProgress).filter(id => parseInt(id) <= totalDefined && userProgress[id].completed).length;
            const pct = totalDefined > 0 ? Math.round((completed / totalDefined) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) {
                bar.style.width = pct + '%';
                bar.textContent = pct + '%';
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('pediatríadosCourseProgress', JSON.stringify(userProgress));
                if(currentModuleId) localStorage.setItem('pediatríaLastModuleId', currentModuleId);
                else localStorage.removeItem('pediatríaLastModuleId');
            } catch(e) { console.error("Error saving progress", e); }
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('pediatríadosCourseProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { 
                console.error("Error loading progress", e);
                userProgress = {}; 
            }
            updateProgressBar();
        }

        function resetProgress() {
            localStorage.removeItem('pediatríadosCourseProgress');
            localStorage.removeItem('pediatríaLastModuleId');
            window.location.reload();
        }

        function submitQuiz(moduleId) {
            const moduleData = courseModules.find(m => m.id === moduleId);
            const form = document.getElementById('quiz-form-' + moduleId);
            
            if(!moduleData) return;

            const totalQuestions = moduleData.quiz.length;
            
            // MODIFICACIÓN: LÓGICA PARA SCROLLEAR A LA PRIMERA PREGUNTA SIN CONTESTAR (Sin Alert)
            let firstUnansweredIndex = -1;
            
            for (let i = 0; i < totalQuestions; i++) {
                const isAnswered = form.querySelector(`input[name="q${i}"]:checked`);
                if (!isAnswered) {
                    firstUnansweredIndex = i;
                    break;
                }
            }

            if (firstUnansweredIndex !== -1) {
                const questionEl = document.getElementById(`q-container-${firstUnansweredIndex}`);
                if (questionEl) {
                    // Mueve silenciosamente la pantalla a la pregunta
                    questionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Resalta el contenedor momentáneamente
                    questionEl.classList.add('ring-4', 'ring-teal-500/50');
                    setTimeout(() => questionEl.classList.remove('ring-4', 'ring-teal-500/50'), 1500);
                }
                // No mostrar alert, simplemente retornar y no evaluar
                return;
            }

            let score = 0;
            let userAnswers = {};

            moduleData.quiz.forEach((q, index) => {
                const selected = form.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    const val = parseInt(selected.value);
                    userAnswers[index] = val;
                    if (val === q.answer) score++;
                }
            });

            if (!userProgress[moduleId]) userProgress[moduleId] = {};
            userProgress[moduleId].completed = true;
            userProgress[moduleId].score = score;
            userProgress[moduleId].answers = userAnswers;

            saveProgress();
            updateProgressBar();
            showCompletedModule(moduleId);
            renderModuleList();
            
            document.getElementById('main-content').scrollTop = 0;
            window.scrollTo(0, 0);
        }

        function loadTheme() {
            // Predeterminado: Modo Diurno. Solo si el usuario forzó 'dark' anteriormente se usa dark.
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
