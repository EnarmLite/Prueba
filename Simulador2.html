        justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, el destete del ventilador debe ser dinámico pero seguro para evitar una re-intubación traumática del lactante. Los criterios oficiales de extubación exigen una Presión Media de Vía Aérea baja (<7 cmH2O) y la capacidad del prematuro para mantener oximetrías funcionales normales requiriendo un apoyo suplementario inspiratorio muy leve, fijado estrictamente en requerir oxígeno (FiO2) menor al 30%.<br><br>Perla ENARM: Criterios de retiro de VM: PMVA <7 cm H2O, FiO2 <30%, Mantener PEEP en 6 cm H2O. Cuando se llega a estos parámetros extubar de inmediato con pasar a CPAP.<br><br>Análisis de Distractores: A) Menor a 35% es incorrecto; destetar prematuramente tolerando un 35% enuncia una dependencia alveolar limítrofe persistente y alto riesgo de fatiga diafragmática al extubar y pasar la carga ventilatoria pasiva al bebé. B) Menor a 25% es incorrecto; es un margen muy exigente (prácticamente aire ambiente 21%), esperar hasta alcanzarlo expone al niño innecesariamente a los riesgos nocivos crónicos del tubo plástico (displasia broncopulmonar y neumonía). C) Menor a 40% es incorrecto; este límite alto representa toxicidad oxidativa ocular e indica daño reactivo en curso; el neonato requiere apoyo avanzado sin retirar la máquina invasiva.",
        source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido, 2021, Algoritmo 7. Criterios de Retiro, Página 12."
    },
    {
        id: 108,
        question: "Posterior a la institución de cirugía de control de daños con abdomen abierto en un herido por arma de fuego, el paciente ingresa a la Unidad de Cuidados Intensivos. ¿Cuál es un indicador clínico-metabólico estricto que determina que el paciente se encuentra listo para la intervención quirúrgica planeada de reconstrucción definitiva?",
        options: ["Elevación de la presión intraabdominal", "Reversión parcial de la hipotermia", "Normalización de la oxidinamia", "Gasto urinario mayor a 0.5 ml/kg/h"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de cirugía de control de daños, la fase en la UCI no es de reposo, sino de reanimación agresiva para corregir la deuda de oxígeno (triada letal). La decisión de re-ingresar al paciente a la sala para una \"Intervención quirúrgica planeada\" (cierre de estomas, anastomosis definitivas o retiro de empaquetamiento) se rige formal y obligatoriamente por demostrar que las mitocondrias respiran adecuadamente, es decir, existe una estricta \"Normalización de la oxidinamia\" y aclaramiento láctico total.<br><br>Perla ENARM: Indicadores para intervención planeada (Cierre abdominal o reconstrucción de lesiones): Normalización de la oxidinamia, Reversión total de la acidosis, hipotermia y coagulopatía.<br><br>Análisis de Distractores: A) Elevación de la presión intraabdominal es incorrecto; al contrario, es una complicación mortal (Síndrome Compartimental Abdominal) que dicta intervención \"A Demanda\" de urgencia para abrir más y liberar órganos infartados, no para cerrar de forma programada y segura. B) Reversión parcial de la hipotermia es incorrecto; reintervenir a un paciente con parámetros \"parciales\" desencadena inmediatamente coagulopatía al exponer la cavidad al frío del quirófano. La reversión debe ser absoluta y documentada a parámetros fisiológicos torácicos (>36°C). D) Gasto urinario mayor a 0.5 ml/kg/h es incorrecto; aunque es un criterio de piso mínimo de perfusión orgánica en reanimación hídrica, la cirugía mayor secundaria planeada gástrica-intestinal exige estabilidad tisular sistémica macro e índice cardiaco restaurado, englobada en la \"Oxidinamia\" global.",
        source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Indicadores para intervención planeada, Página 45."
    },
    {
        id: 109,
        question: "Durante la ecografía renal de un varón de 30 años con cólico ureteral, el radiólogo describe textualmente: \"Separación de los ecos del seno renal de configuración ovoidea, sin embargo, continúa ecogénico la periferia del seno\". ¿A qué grado de hidronefrosis ecográfica corresponde este hallazgo?",
        options: ["Grado 0", "Grado III", "Grado I", "Grado II"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de cólico renoureteral, la escala de evaluación hidronefrótica por ultrasonografía en urgencias es imperativa para justify derivaciones. El \"Grado I\" se identifica primariamente cuando el espasmo ha comenzado a retener líquidos, distanciando o separando los ecos nativos centrales en forma de un huso u \"ovoidea\", pero la cápsula y la periferia del complejo ecogénico se mantienen preservadas y respetadas sin daño directo.<br><br>Perla ENARM: Clasificación de hidronefrosis. Grado I: Separación de los ecos del seno renal de configuración ovoidea, continúa ecogénico la periferia del seno.<br><br>Análisis de Distractores: A) Grado 0 es incorrecto; el ultrasonido en este grado se visualiza completamente normal, existiendo un complejo del seno renal central homogéneo sin ningún grado de separación o líquido hipoecoico intrapielocalicial enclavado. B) Grado III es incorrecto; representa el daño terminal sin tratar del parénquima donde existe el reemplazo total y la destrucción diseminada por presión hídrica de la ecogenicidad periférica calicial con pérdida del manto funcional. D) Grado II es incorrecto; su hallazgo pivote visual exige la distensión en \"forma redondeada de los cálices conectando con la pelvis\", marcando un avance severo de retención comparado con el simple óvalo temprano del número I.",
        source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Cuadro 6. Clasificación de hidronefrosis, Página 34."
    },
    {
        id: 110,
        question: "En la reanimación cardiopulmonar de una mujer en el tercer trimestre de embarazo que requiere manejo avanzado de la vía aérea, ¿cuál es la posición anatómica recomendada de la cabeza materno-cervical para alinear los ejes y facilitar la intubación endotraqueal considerando la biomecánica grávida?",
        options: ["Hiperextensión cervical forzada", "Oreja alineada a la muesca esternal (posición en rampa)", "Tracción mandibular pura en decúbito plano", "Posición de olfateo clásica con cojín occipital"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de paro cardiorrespiratorio y reanimación avanzada, el embarazo avanzado modifica la anatomía torácica por aumento del volumen mamario e hipertrofia del cuello. Para alinear exitosamente los ejes orofaríngeo y laríngeo (y evitar la intubación fallida en una paciente con alto riesgo de broncoaspiración), se estipula la maniobra específica de \"Rampa\" utilizando cojines escapulares traseros hasta lograr empatar horizontalmente el lóbulo de la oreja con el hueco de la muesca esternal.<br><br>Perla ENARM: Manejo avanzado de la vía aérea en el paciente con anatomía desfavorable: Elevar la cabeza para posicionar en “rampa” u Oreja alineada a la muesca esternal en pacientes grávidas u obesos.<br><br>Análisis de Distractores: A) Hiperextensión cervical forzada es incorrecto; es perjudicial para la visualización directa con laringoscopio al angular patológicamente la glotis anterior, y está proscrita ante riesgos o sospechas traumáticas cervicales previas al paro. C) Tracción mandibular pura en decúbito plano es incorrecto; se indica exclusivamente como medida básica de apertura aérea subluxando la mandíbula cuando existe sospecha comprobada de lesión medular espinal en choque automovilístico, pero el plano horizontal colapsa a la embarazada. D) Posición de olfateo clásica con cojín occipital es incorrecto; aunque excelente para el adulto estándar magro, la paciente obstétrica choca el mango del laringoscopio con el tejido mamario edematizado, requiriendo obligadamente alzar desde los omoplatos (rampa total) y no solo la cabeza.",
        source: "IMSS-633-13, Prevención, Diagnóstico y Tratamiento del Paro Cardiorrespiratorio en Adultos, 2013, Anexos Figuras Visuales de Vía aérea, Página 64."
    },
    {
        id: 111,
        question: "Al evaluar clínicamente la recuperación de un lactante con lesión del plexo braquial, se utiliza la escala de movimientos activos del Hospital de los Enfermos. Si el paciente logra realizar contracción muscular con movimiento menor o igual a la mitad del rango articular una vez eliminando la fuerza de gravedad, ¿qué gradación muscular se le asigna?",
        options: ["3", "4", "1", "2"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de lesión obstétrica del plexo braquial, la escala del Hospital de los Enfermos mide objetivamente la evolución del lactante en rehabilitación periférica. Una parálisis flácida inicial transita primero a contracciones invisibles (Grado 1), y cuando el niño ya es capaz de generar movimiento visible y útil pero limitado (menor o igual a la mitad o 50% de la circunferencia articular) con el brazo apoyado en la cama sin luchar contra la gravedad, asienta estadísticamente un Grado 2 firme de reinervación media temprana.<br><br>Perla ENARM: Escala de Movimientos Activos del Hospital de los Enfermos: Eliminando la gravedad, Movimiento ≤ 1/2 del rango articular, se gradúa con 2.<br><br>Análisis de Distractores: A) 3 es incorrecto; este grado corresponde a un movimiento articular favorable de tipo completo, pero siempre \"mayor\" a la mitad de su arco limitante, aplanado en la camilla y libre del peso gravitacional. B) 4 es incorrecto; designa al paciente funcional basal puro que logra el \"movimiento completo\" de manera dinámica al 100% de la amplitud a pesar de anularse la tracción de gravedad. C) 1 es incorrecto; se reserva estrictamente al hallazgo físico de fibrilación sutil (\"Contracción sin movimiento\") donde el vientre muscular tironea pero la biomecánica palanca tendinosa es cero, manteniendo la articulación fija paralítica in situ.",
        source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Tabla 8. Escala de movimientos activos, Página 4."
    },
    {
        id: 112,
        question: "En el manejo analgésico postoperatorio de una mujer de 68 años con un peso de 58 kg intervenida por fractura intracapsular del fémur, ¿cuál es la dosis de paracetamol recomendada por la guía clínica como coadyuvante primario?",
        options: ["750 miligramos cada 12 horas", "1 gramo cada 6 horas", "500 miligramos cada 8 horas", "1 gramo cada 8 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas intracapsulares del fémur, la población geriátrica es vulnerable a los efectos deletéreos de altas dosis de opioides puros (delirium, estreñimiento, falla respiratoria) y antiinflamatorios (sangrado). La piedra angular multimodal para mitigar el dolor post-quirúrgico dicta exprimir el poder de impregnación con techo antiálgico de un gramo exacto de paracetamol inyectable u oral de manera obligada y protocolaria a cuatro dosis diarias (cada 6h) mientras superen los 50 kg biológicos.<br><br>Perla ENARM: Analgesia postoperatoria FICEPF: Se recomienda el uso de paracetamol en pacientes con peso mayor a 50 kg, a dosis de 1 gramo cada 6 horas.<br><br>Análisis de Distractores: A) 750 miligramos cada 12 horas es incorrecto; estas dosificaciones erráticas dejan a la paciente sin cobertura (\"valle terapéutico\") en el postoperatorio óseo mediato, fomentando la taquicardia refleja y el dolor agudo. C) 500 miligramos cada 8 horas es incorrecto; esta subdosificación del margen farmacocinético es la comúnmente recetada en consultorio para resfriados o dolor somático leve adulto menor de 50 kg, ineficaz para suprimir el estímulo doloroso incisional de recambio protésico de cadera en fémur o perforación por tornillos. D) 1 gramo cada 8 horas es incorrecto; aunque el gramo está correcto, la ventana horaria se estandariza en dosis tope de 4 gramos al día (cada 6 horas) en este abordaje agudo GPC postquirúrgico y no en régimen crónico de 3 gramos (cada 8 h).",
        source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Tratamiento Profiláctico y Analgesia, Página 7."
    },
    {
        id: 113,
        question: "En el manejo hemodinámico del paciente pediátrico en estado de choque, los agentes vasoactivos tienen perfiles farmacológicos distintos. De acuerdo a la GPC, ¿cuál es el agente inotrópico que eleva marcadamente el volumen latido (VL) sin generar ningún efecto sobre las resistencias vasculares sistémicas ni pulmonares?",
        options: ["Dopamina", "Dobutamina", "Milrinona", "Epinefrina"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de sepsis neonatal/pediátrica, la dobutamina es un inotrópico sintético derivado catecolamínico predominantemente beta-1 adrenérgico puro y sin acción periférica alfa o vasoconstrictora reactiva. Al administrarse, la fuerza y la frecuencia del músculo cardiaco en pediatría mejoran el volumen latido eyectado vigorosamente (VL), siendo ideal para fallas miocárdicas disfuncionales, pero se distingue exactamente porque mantiene neutral (\"sin efecto\") el tono de las resistencias capilares arteriales (RVS) nativas intacto a nivel tisular o alveolar pulmonar.<br><br>Perla ENARM: Perfil del agente Dobutamina: Aumenta el volumen latido (↑↑VL) y tiene perfil \"Sin efecto\" fisiológico para con las Resistencias Vasculares Sistémicas y Pulmonares.<br><br>Análisis de Distractores: A) Dopamina es incorrecto; la dopamina a dosis medias y altas estimula agresivamente potentes cascadas adrenérgicas periféricas que elevan drásticamente las tres determinantes conjuntas (volumen latido, resistencias de todo el sistema humano y cierre alveolar pulmonar masivo). C) Milrinona es incorrecto; es un fármaco inhibidor de la fosfodiesterasa que si bien eleva el volumen cardiaco contractil, tiene acción \"vasodilatadora\" profunda, que relaja y deprime marcadamente hacia la caída o hipotensión las resistencias de la vasculatura de los vasos de pulmón y sistema capilar periférico. D) Epinefrina es incorrecto; la adrenalina inyectada intravenosa posee potencia sistémica alfa-1 pura concomitante e irrefutable en las terminaciones sinápticas lisas por lo que triplica la fuerza miocárdica sí, pero dispara severamente con gran intensidad el espasmo y contracción a la resistencia del circuito vascular sistémico.",
        source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Anexo Farmacológico Tabla Receptores, Página 68."
    },
    {
        id: 114,
        question: "Acude al servicio de urgencias una embarazada estable con disnea súbita y taquicardia, refiriendo además dolor y aumento de volumen asimétrico en la extremidad pélvica izquierda. Ante la sospecha clínica de tromboembolia pulmonar en este escenario, ¿cuál es la conducta diagnóstica inicial recomendada para limitar la exposición a radiación de la madre y el feto?",
        options: ["Iniciar con ultrasonido bidimensional y doppler de miembros pélvicos", "Solicitar gammagrama pulmonar ventilatorio-perfusorio", "Realizar tomografía helicoidal contrastada de tórax", "Indicar resonancia magnética nuclear torácica y pélvica"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica, si un émbolo originó disnea desde un lecho pélvico inflamado a nivel gemelar comprobable (TVP acompañante sintomática), el hallazgo confirmatorio por ecoscopia venosa profunda no invasiva de la pierna es evidencia clínica y etiológica resolutiva innegable. Tratar una trombosis venosa profunda equivale a tratar indirectamente el mismo fenómeno embólico en curso, validando iniciar de inmediato la heparina intravenosa sin irradiar al bebé realizando escaneos de tórax innecesarios.<br><br>Perla ENARM: Se sugiere que en embarazadas con sospecha de TEP que presentan signos y síntomas de TVP, se les realice un ultrasonido doppler de miembros pélvicos; de ser positivo, se iniciará tratamiento y se considerará no realizar más estudios pulmonares de confirmación (TEP) para limitar la dosis de radiación.<br><br>Análisis de Distractores: B) Solicitar gammagrama pulmonar ventilatorio-perfusorio es incorrecto; a pesar de ser el paso de oro seguro a seguir frente al fracaso doppler, la lógica clínica exige primero escudriñar la vena afectada superficial barata si ya presenta sintomatología en la pierna visible para ahorrarse todo radiotrazador de medicina nuclear o radionúclido sobre senos y tiroides grávido materno si no hiciera falta. C) Realizar tomografía helicoidal contrastada de tórax es incorrecto; somete al embrión a dosis destructivas de rems radioactivos e hiperosmolaridad de contraste denso yodado aloplástico nefrotóxico que cruza la barrera basal fetoplacentaria si no existe colapso o choque que justifique el riesgo ciego e inminente de vida materna de primera línea. D) Indicar resonancia magnética nuclear torácica y pélvica es incorrecto; si bien es inocua para el tejido ovárico y evita el uso de radiación fotónica tipo x para un coágulo, los protocolos de la directriz mexicana obstétrica estipulan formalmente el transductor de compresiones ultrasónico vascular Doppler como nivel evidente primario C para un triaje accesible.",
        source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Diagnóstico TEP, Página 7."
    },
    {
        id: 115,
        question: "Tras el control de un evento de hemorragia postparto mayor, la paciente se encuentra estable y en la Unidad de Cuidados Intensivos bajo monitoreo. De acuerdo a la GPC para la terapia transfusional, ¿qué valor de laboratorio se establece como el umbral mínimo de hemoglobina para indicar la transfusión de concentrados eritrocitarios en el puerperio?",
        options: ["8 g/dl", "6 g/dl", "7 g/dl", "9 g/dl"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, las políticas restrictivas de transfusión han demostrado mayor sobrevida en unidades de cuidado agudo frente a la hipertransfusión histórica que provoca lesión pulmonar aguda asociada (TRALI). El margen de tolerancia del déficit crónico postquirúrgico oxigenativo del puerperio ha sido avalado para limitar y abstenerse de abrir paquetes de banco, tolerando niveles basales bajos, siendo la barrera crítica restrictiva para detonar perfusión de sangre homologada los \"7 g/dL\".<br><br>Perla ENARM: Umbral transfusional Hemocomponentes: Se sugiere considerar como umbral mínimo, hemoglobina de 7 g/dl, para transfusión de concentrados eritrocitarios de manera general en HPP.<br><br>Análisis de Distractores: A) 8 g/dl es incorrecto; aunque el nivel biológico ideal histórico médico sea transfundir paquetes al cruzar los \"8 y treinta por ciento\", en la modernidad actual y Nivel De Buena Práctica (PBP) este número somete a multíparas sanas a sensibilización serológica evitable con morbimortalidades por aloinmunización innecesaria transfusional que podrían recuperarse con hierro dietético. B) 6 g/dl es incorrecto; descender la cifra celular de recambio gaseoso hematológico hasta límites subcríticos del seis condena al tejido hepático de la mujer a necrosis isquémica y desencadena infarto y atrofia silente del miocardio de demanda y la adenohipófisis materna. D) 9 g/dl es incorrecto; niveles cercanos a la normalidad grávida base, transfundir un globo rojo con este conteo numérico de citometría está estrictamente penado e injustificado de manera clínica.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento Transfusional General y Componentes, Página 57."
    },
    {
        id: 116,
        question: "En la evaluación radiológica de una fractura del extremo proximal del fémur, se aplica el sistema alfanumérico AO. Si la lesión es clasificada con el código 31-B3.3, ¿a qué morfología específica corresponde de acuerdo a esta normatividad?",
        options: ["Fractura medio cervical con trazo en cizallamiento", "Fractura subcapital con marcado desplazamiento", "Fractura subcapital con moderado desplazamiento vertical", "Fractura impactada en valgo mayor o igual a 15 grados"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas intracapsulares, el código AO define topografía y severidad. La familia 31-B engloba cuellos anatómicos, mientras el grado 3 determina a las luxaciones puras \"subcapitales con gran o marcado desplazamiento\". La subcategorización exacta (.3) sella su estatus de severidad máxima o \"marcado\" desplazamiento global en varo profundo perdiendo absolutamente la congruencia osteosintética y la supervivencia del riego arterial.<br><br>Perla ENARM: Clasificación Universal Internacional de las fracturas del fémur y la cabeza (31-B3): 31-B3.3 corresponde y designa textualmente a un trazo anatómico subcapital con marcado desplazamiento articular focal del hueso.<br><br>Análisis de Distractores: A) Fractura medio cervical con trazo en cizallamiento es incorrecto; este trazo morfológico diafisiario transitorio a la porción media está designada oficialmente en la codificación radiológica al bloque del \"31-B2\" y su número punto subcodificado \"3\" (31-B2.3). C) Fractura subcapital con moderado desplazamiento vertical es incorrecto; aunque pertenece biológicamente a la sección principal masiva del B3 (subcapital), su menor o moderado grado biológico de desplazamiento axial ascendente asienta con el numeral inferior específico codificado al \"31-B3.2\". D) Fractura impactada en valgo mayor o igual a 15 grados es incorrecto; esto describe funcionalmente al escalón leve o impactado mínimo protector de Pauwels I del código menor puro clasificado normativamente por el subíndice B1 (31-B1.1).",
        source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Cuadro I Topográfico Descriptivo, Página 9."
    },
    {
        id: 117,
        question: "El equipo de neonatología se prepara para recibir a un prematuro extremo de 26 semanas de gestación con alto riesgo de desarrollar Síndrome de Dificultad Respiratoria. Con el fin de evitar la hipotermia profunda y estabilizar la transición, ¿en qué rango estricto debe ajustarse la temperatura ambiental de la sala de parto?",
        options: ["Entre 23 y 25 °C", "Entre 26 y 28 °C", "Entre 25 y 26 °C", "Entre 22 y 24 °C"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, la pérdida aguda de calorías deprime la síntesis endógena química natural de líquido surfactante a nivel de los neumocitos tipo II. El enfriamiento súbito es la principal causa de falla reanimatoria del recién nacido. El personal pediátrico intensivista debe asegurar e intruir climas hospitalarios cerrados y controlados; si la inmadurez dictamina un peso y maduración muy baja (pretérminos extremos menores a 28 SDG cronológicas) la sala de choque o tocoquirúrgica debe obligatoriamente ajustarse alta entre los \"25 y 26°C\".<br><br>Perla ENARM: Control Clínico: La temperatura ambiente en la sala de parto se ajustará considerando la edad de RNP que está por nacer. En RNP menores de 28 SEG (Semanas de Gestación) mantener obligadamente el clima cerrado y termostatado ambiental del área entre los 25 y 26°C.<br><br>Análisis de Distractores: A) Entre 23 y 25 °C es incorrecto; a pesar de ser la temperatura termoneutra natural de nacimiento de adaptación controlada, este umbral bajo aplicable en el aire del cuarto quirúrgico se exige estrictamente para nacimientos o producto neonato maduro y fisiológico general mayor o pre-término tardío a la semana 28 de gestación que sí cuenta con barrera grasa y queratinizada y no cede calor corporal masivo en segundos al frío del aire circundante. B) Entre 26 y 28 °C es incorrecto; mantener áreas de nacimiento superior a los veintiséis grados sofoca y asfixia laboralmente a los tres o cuatro cirujanos o médicos enguantados obstetras en pabellones herméticos arriesgando infecciones endógenas intraoperatorias e insolación sudorosa contaminante de campos estériles sin justificación real. D) Entre 22 y 24 °C es incorrecto; niveles bajos que sumados al baño de líquido amniótico congelarán en breves minutos y descompensarán hacia el choque inminente circulatorio neonatal el control bulbar o térmico transitorio termorregulatorio de los prematuros tempranos limítrofes delgados y menores de 1 kg.",
        source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido, 2021, Tratamiento. Temperatura de la sala de parto, Página 14."
    },
    {
        id: 118,
        question: "Durante la reanimación de control de daños en una paciente obstétrica con exanguinación activa guiada por tromboelastometría, se valora la integridad de la lisis del coágulo (Módulo EXTEM). ¿Cuál es el punto de corte diagnóstico de la Lisis Máxima (ML) a los 60 minutos que indica hiperfibrinólisis y exige la aplicación de ácido tranexámico?",
        options: ["Mayor o igual al 20%", "Mayor o igual al 15%", "Mayor o igual al 5%", "Mayor o igual al 10%"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la tromboelastometría (ROTEM) analiza la firmeza y vida media del andamio hemostático. Si en los canales funcionales el porcentaje paramétrico del ML (\"Maximum Lysis\" o Lisis Máxima en el módulo EXTEM) sufre un declive y supera el margen limítrofe anormal de 5% al cerrar la observación de la hora o los primeros minutos resolutivos, evidencia lisis patológica activa y prematura de las redes de fibrina; el coágulo formado se derretirá y la exanguinación uterina continuará, exigiendo terapia antifibrinolítica inyectable rápida biológica con ampolletas de ácido tranexámico.<br><br>Perla ENARM: Parámetro ROTEM: En el Algoritmo (Reanimación de control daños guiada por tromboelastometría). Ante A5EX < 35 mm o un reporte de ML ≥ 5% (dentro de 60 min), se debe iniciar y administrar Ácido Tranexámico 1 g en bolo.<br><br>Análisis de Distractores: A) Mayor o igual al 20% es incorrecto; esperar destrucciones lisosómicas enzimáticas masivas de más de 20 por ciento retrasa o inhibe la ventana biológica resolutiva letal para detener la enzima pro-inflamatoria y proteolítica natural plasmina. B) Mayor o igual al 15% es incorrecto; aunque niveles mayores demuestran sangrado masivo difuso franco que sí demanda dosis de choque general, la GPC mexicana en anestesiología obstétrica estipula la diana de control y detección de falla lítica prematura temprana reanimadora en tan solo un nivel o umbral de cinco de porcentaje métrico de la caida ROTEM para salvaguardar la reserva y disparar la alarma. D) Mayor o igual al 10% es incorrecto; el diez conformaría una falla rotunda irreversible o subaguda instalada, requiriendo infusión ya continua en UCI y sobrepasando el límite ideal de abordaje o tratamiento profiláctico agresivo a de las tres horas intraquirúrgicas pélvicas del inicio.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Algoritmo 10. Reanimación de control daños, Página 12."
    },
    {
        id: 119,
        question: "En un paciente masculino adulto que sufre una fractura diafisiaria de antebrazo, el estándar de oro es la fijación con placa de compresión dinámica. Sin embargo, ¿en cuál de las siguientes situaciones biomecánicas la GPC indica el uso alternativo de enclavado centromedular?",
        options: ["Fractura transversa pura aislada", "Fractura expuesta Gustilo II", "Fracturas asociadas a luxación articular", "Fracturas segmentarias o múltiples"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, la placa de compresión atornillada al hueso cortical lateral estabiliza de manera perfecta dos segmentos de adulto rectos, sin embargo en traumatismos con estallamiento \"segmentario\" masivo (focos intermedios paralelos o tres bloques en cuña) clavar placas inmensas destruiría todo el paquete muscular de recubrimiento y nervios adyacentes periostales; para lo que se requiere un abordaje biológico de invasión cerrada \"endomedular\", pasando clavos centrales internos telescópicos por la médula hueca esponjosa que formen un puente interno sin abrir longitudinalmente fascias musculares enteras.<br><br>Perla ENARM: Excepciones de Placa / Tratamiento quirúrgico: Las indicaciones de enclavado centromedular del diáfisis óseo en cúbito o radio recaen y se reservan específicamente en: Fracturas segmentarias, Algunas Fracturas patológicas neoplásicas, Falla de placa en la re-osteosíntesis, o las Fracturas múltiples de alta energía.<br><br>Análisis de Distractores: A) Fractura transversa pura aislada es incorrecto; siendo este el mejor trazo geométrico y biológico ideal curativo para aplastar de manera directa los cabos entre ambos bordes sanos del corte transversal aplicando férreamente \"fijación anatómica absoluta rígida compresiva\" obligatoriamente utilizando tornillos corticales de Nivel De Compresión Dinámico. B) Fractura expuesta Gustilo II es incorrecto; en heridas externas perimetrales laceradas contaminadas la guía clínica obliga debridar e instalar el protocolo provisional por tornillo de \"Fijadores Externos\" extracutáneos temporales sin meter pernos al lecho medular ni placas puras, hasta limpiar control infeccioso o estabilizar. C) Fracturas asociadas a luxación articular es incorrecto; conocidas como las inestables equivalencias masivas de luxo-fractura de los síndromes eponímicos clásicos inestables articulares radiocubitales de (Monteggia / Galeazzi); debido a la luxación del arco pronador anatómico del radio demandan indefectiblemente el control total tridimensional milimétrico restrictivo abierto y placa ortopédica forzosa reconstructiva anatómica abierta e instrumentada que el clavo liso es incapaz de sostener por carecer de rotación.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Alternativas Tratamiento Quirúrgico, Página 23."
    },
    {
        id: 120,
        question: "Ingresa a la sala de urgencias tocoquirúrgicas una paciente con choque hipovolémico hemorrágico clasificado como severo, con inestabilidad inminente y pérdida activa. A la par de la reanimación volumétrica, y en lo que el banco de sangre tipifica su muestra, ¿cuál es el grupo sanguíneo eritrocitario universal que debe transfundirse de manera inmediata para evitar la muerte tisular materno-fetal?",
        options: ["O positivo", "A negativo", "O negativo", "AB negativo"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de choque hemorrágico obstétrico, la exanguinación o choque G-IV priva al neuroeje central y renal del oxígeno inminente en segundos; aguardar entre 30 a 60 minutos técnicos de un laboratorio especializado en aglutinación (pruebas serológicas cruzadas de fenotipo para compatibilidad de ABO de grupo de banco) resulta letal. Iniciar infusiones agudas del paquete o donador tipo \"O negativo\" evita hemólisis autoinmunes graves en caso de que la grávida tuviese Rh negativos con anticuerpos perjudiciales, sirviendo como donador libre universal celular emergente irrestricto de antígenos inmunitarios periféricos de membrana.<br><br>Perla ENARM: Reanimación Sanguínea Aguda (PBP Institucional C): Pacientes con hemorragia obstétrica que se clasifiquen como choque hipovolémico severo, requieren de transfusión inmediata de concentrados eritrocitarios sin reserva; por tanto se debe utilizar e instalar de inicio inmediato unidades \"O negativo\".<br><br>Análisis de Distractores: A) O positivo es incorrecto; si la madre fenotípica fuera genéticamente A o B negativo (homocigota) al transfundirle 2 litros en urgencia de sangre \"Positiva\" el factor Rh detonaría a los diez días aglutinaciones secundarias severas con hemólisis orgánica renal de tubos bloqueados y exponiendo la inmunización perenne de toda descendencia en el futuro obstétrico a enfermedades abortivas de eritroblastosis fetal severa natural (isoinmunización por memoria). B) A negativo es incorrecto; tiene el factor rhesus protector pero la membrana transporta receptores antígenos o polisacáridos glucoproteicos \"A\" expuestos en superficie letales para receptores de sangre u origen \"B\", destruyéndose el paquete y coagulando in situ a la madre con trombos fulminantes al ser introducida endovenosa. D) AB negativo es incorrecto; este subtipo hematológico natural de banco de sangre humano puro funge como el receptor universal general estandarizado (solo puede recibir de todos sin atacar) pero no es ideal al transfundir al poseer dobles antígenos foráneos destructivos de choque de barrera ABO, reservándose exclusivamente para donar derivados en fase de subproducto celular libre de proteínas (plasma fresco plasmático purificado).",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Tratamiento de restitución / Concentrados Eritrocitarios, Página 18."
    },
    {
        id: 121,
        question: "Un paciente adulto con diagnóstico crónico de cirrosis hepática ingresa a la sala de urgencias presentando un evento agudo de hematemesis abundante secundaria a ruptura de várices esofágicas. ¿Cuál es el tratamiento antibiótico profiláctico sistémico de primera línea recomendado desde su ingreso para disminuir el riesgo de morbimortalidad y re-sangrado?",
        options: ["Ceftriaxona 1 gramo", "Ciprofloxacino 500 miligramos", "Metronidazol 500 miligramos", "Rifaximina 400 miligramos"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de várices esofágicas, la translocación bacteriana derivada del choque hipovolémico esplácnico y la descompresión vascular del paciente cirrótico propician sepsis generalizada fulminante que empeora la falla hepática e interrumpe la hemostasia. La norma estandariza el inicio de cefalosporinas de tercera generación vía intravenosa de manera prioritaria desde la admisión, mucho antes del control endoscópico, por su amplio perfil contra flora entérica.<br><br>Perla ENARM: Se recomienda instaurar la terapia antibiótica para todos los pacientes con sospecha o confirmación de sangrado variceal de manera ideal desde su ingreso (antes de la endoscopia). Se recomienda administrar ceftriaxona 1 gr/día vía intravenosa por 7 días.<br><br>Análisis de Distractores: B) Ciprofloxacino 500 miligramos es incorrecto; aunque las fluoroquinolonas eran el estándar histórico, la guía actual mexicana restringe su uso inicial debido a la altísima prevalencia endémica en nuestros centros de enterobacterias resistentes a quinolonas. C) Metronidazol 500 miligramos es incorrecto; la cobertura anaeróbica pura no es suficiente como profilaxis global contra los gramnegativos primarios de la flora intestinal responsable de la peritonitis bacteriana espontánea. D) Rifaximina 400 miligramos es incorrecto; este antibiótico de nula absorción luminal se destina como pilar fundamental crónico en la prevención y tratamiento ambulatorio de la encefalopatía hepática amoniacal, mas no para el control agudo de sepsis post-hemorrágica en piso.",
        source: "IMSS-087-08, Diagnóstico y Tratamiento de Várices Esofágicas en el Adulto, 2017, Tratamiento Médico, Página 17."
    },
    {
        id: 122,
        question: "En una gestante de 31 semanas con preeclampsia, el equipo médico evalúa la interrupción inmediata del embarazo por sospecha de desarrollo de complicaciones severas que amenazan la vida. De acuerdo a los criterios hematológicos absolutos, ¿qué nivel de conteo plaquetario circulante dictamina formalmente la indicación inminente del nacimiento?",
        options: ["Menor a 100,000 /microlitro", "Menor a 50,000 /microlitro", "Menor a 75,000 /microlitro", "Menor a 20,000 /microlitro"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de preeclampsia, la disfunción microangiopática toxémica origina consumo plaquetario acelerado. Aunque un nivel menor a 100,000 documenta daño a órgano diana que clasifica a la enfermedad \"con datos de severidad\", la verdadera barrera crítica o \"Condición Severa que indica el nacimiento\" obligando a evacuar el útero de emergencia se alcanza drásticamente al descender a las 50,000 plaquetas, donde la hemorragia intracraneal y el sangrado letal hepático son inminentes.<br><br>Perla ENARM: Complicaciones severas (que indican el nacimiento) Hematológico: Conteo plaquetario menor a 50,000 / microlitro.<br><br>Análisis de Distractores: A) Menor a 100,000 /microlitro es incorrecto; esta cifra cataloga la enfermedad como una \"condición adversa\" (preeclampsia con criterios de severidad), pero permite aún el manejo expectante vigilado en Terapia Intensiva con maduradores si el bebé tiene extrema prematurez. C) Menor a 75,000 /microlitro es incorrecto; representa un deterioro progresivo laboratorial que exige cruzar unidades de aféresis preventivas pero que no ha quebrado matemáticamente la línea rectora de corte absoluto oficial de las 50,000. D) Menor a 20,000 /microlitro es incorrecto; aplazar el nacimiento hasta niveles de 20,000 expone irreversiblemente a la mujer a hematomas subcapsulares rotos y la inhabilita por completo para recibir cualquier técnica de anestesia neuroaxial resolutiva.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en segundo y tercer nivel de atención, 2017, Cuadro 2 Condiciones Adversas y Complicaciones Severas, Página 274."
    },
    {
        id: 123,
        question: "Para facilitar el retiro progresivo de la ventilación mecánica invasiva en un recién nacido prematuro de 1,100 gramos que desarrolló Síndrome de Dificultad Respiratoria, se indica el inicio de estimulación central. ¿Cuál es la dosis de impregnación intravenosa exacta estandarizada de citrato de cafeína?",
        options: ["10 miligramos por kilogramo", "5 miligramos por kilogramo", "20 miligramos por kilogramo", "15 miligramos por kilogramo"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, las metilxantinas como la cafeína ejercen un potente antagonismo sobre los receptores de adenosina medulares, estimulando directamente el centro respiratorio bulbar e incrementando la sensibilidad al dióxido de carbono. El esquema terapéutico vital en la ventana de las primeras 48 horas impone saturar rápidamente los receptores con una fuerte \"Dosis de impregnación\" inicial de 20 mg/kg administrada como dosis única.<br><br>Perla ENARM: Cafeína: Dosis Impregnación: 20 mg/kg/dosis única. Mantenimiento: 5 a 10 mg/kg/día cada 24 horas.<br><br>Análisis de Distractores: A) 10 miligramos por kilogramo es incorrecto; es la dosis máxima del rango establecido únicamente para el esquema de \"mantenimiento\" continuo diario, posterior a la impregnación. B) 5 miligramos por kilogramo es incorrecto; conforma el límite bajo recomendado del soporte de mantenimiento paulatino cada 24 horas. D) 15 miligramos por kilogramo es incorrecto; no figura dentro de los esquemas terapéuticos institucionales validados para rescate central respiratorio.",
        source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido Prematuro, 2021, Algoritmo 1 Tratamiento Integral, Página 45."
    },
    {
        id: 124,
        question: "Un futbolista aficionado sufre un traumatismo lateral directo en la rodilla presentando dolor agudo y hemartrosis. Durante la exploración física, el médico documenta una apertura anormal de la interlínea articular medial de 12 milímetros al aplicar la maniobra de estrés en valgo con la rodilla en extensión. Según la clasificación de la Asociación Médica Americana (AMA), ¿qué grado estricto de lesión presenta el ligamento colateral medial?",
        options: ["Grado I", "Grado IV", "Grado II", "Grado III"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de lesiones ligamentarias de rodilla, la laxitud estructural o \"bostezo\" provocado por el médico clasifica la ruptura del complejo fibrilar estabilizador periférico. Un bostezo en valgo masivo que registre una apertura cuantitativa mayor a los 10 milímetros evidencia una avulsión completa y destrucción total del tejido ligamentoso (Grado III), implicando inestabilidad severa de la rodilla frente a la carga e indicación de cirugía u órtesis articulada prolongada.<br><br>Perla ENARM: Cuadro 1. Clasificación de American Medical Association de las lesiones ligamentarias: Grado III: apertura > 10 mm.<br><br>Análisis de Distractores: A) Grado I es incorrecto; se diagnostica cuando existe dolor por distensión fibrilar mínima sin rotura macroscópica, evidenciándose una apertura prácticamente fisiológica cerrada entre los 0 a 5 milímetros. B) Grado IV es incorrecto; la escala universal clínica topográfica de la AMA para bostezo de apertura colateral se limita exclusivamente a 3 grados progresivos (Leve, Moderado, Severo). C) Grado II es incorrecto; corresponde al desgarro fibrilar parcial o incompleto y cursa con una apertura franca de cajón articular medial mesurada en la franja comprendida entre los 5 y los 10 milímetros.",
        source: "IMSS-388-10, Diagnóstico y tratamiento de las lesiones ligamentarias, 2010, Cuadro 1 Clasificación de American Medical Association, Página 166."
    },
    {
        id: 125,
        question: "Durante el desarrollo del protocolo de neuroprotección con hipotermia terapéutica sistémica en un recién nacido de 38 semanas con encefalopatía hipóxico-isquémica severa, ¿cuál es el rango de temperatura central estricto que el termostato debe alcanzar y sostener invariablemente durante las 72 horas de la fase de mantenimiento?",
        options: ["32 a 33 °C", "34 a 35 °C", "33 a 34 °C", "31 a 32 °C"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de asfixia neonatal, la hipotermia terapéutica disminuye la tasa metabólica del encéfalo, atenúa el estrés oxidativo pos-reperfusión y frena la cascada apoptótica del calcio. El grado de enfriamiento central es milimétrico; se debe fijar la sonda térmica esofágica en el umbral protector validado de entre 33 y 34 °C, dado que el beneficio antinflamatorio cerebral es máximo y los efectos deletéreos vasculares son tolerables.<br><br>Perla ENARM: Fase de mantenimiento: La duración de la hipotermia, debe ser igual a 72 h. Una vez alcanzada la temperatura de 33-34 °C, el objetivo es mantener esta sin oscilaciones importantes.<br><br>Análisis de Distractores: A) 32 a 33 °C es incorrecto; inducir temperaturas que rayen el umbral inferior de 32 grados sumerge al neonato en riesgo de fibrilación ventricular inducida por frío y coagulopatía enzimática profunda. B) 34 a 35 °C es incorrecto; mantener el grado de enfriamiento tan leve no alcanza el efecto \"desacoplador\" metabólico sobre la glía, permitiendo que la neurotoxicidad por asfixia celular continúe su ciclo expansivo destructivo de la sustancia blanca. D) 31 a 32 °C es incorrecto; el algoritmo prohíbe formalmente descender de la barrera de 32°C de manera central porque el miocardio pediátrico se paraliza isquémicamente de forma inminente (límite de seguridad).",
        source: "IMSS-371-10, Diagnóstico y tratamiento de Asfixia Neonatal, 2010, Cuadro 3 Hipotermia Terapéutica, Página 158."
    },
    {
        id: 126,
        question: "Una paciente en el área de toco-cirugía desarrolla un cuadro de atonía uterina persistente refractaria a la profilaxis manual y farmacológica con infusión rápida de oxitocina. Se decide cambiar la estrategia a un análogo sintético de larga duración. ¿Cuál es la dosis endovenosa y posología exacta recomendada en la guía para la aplicación de la carbetocina?",
        options: ["100 microgramos en dosis única", "50 microgramos repetida a las 2 horas", "200 microgramos en dosis única", "20 microgramos en infusión continua"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la carbetocina es un medicamento lipofílico sintético estructuralmente similar a la oxitocina, pero que ejerce una acción contráctil tónica prolongada en el lecho miometrial (hasta por 120 minutos tras inyección endovenosa) impidiendo la relajación del útero en etapas críticas. Su indicación oficial exige aplicarse en un bolo lento de rescate a una dosis inamovible de 100 microgramos una sola vez.<br><br>Perla ENARM: Agentes uterotónicos: Carbetocina 100 microgramos vía intravenosa lenta (Dosis única).<br><br>Análisis de Distractores: B) 50 microgramos repetida a las 2 horas es incorrecto; la posología fraccionada o repetida es ineficaz y no forma parte del esquema nacional obstétrico. C) 200 microgramos en dosis única es incorrecto; sobredosificar análogos ocitócicos dispara reflejos hemodinámicos vasodepresores provocando colapso hipotensivo grave con taquicardia paradójica en la madre que ya de por sí se encuentra hipovolémica. D) 20 microgramos en infusión continua es incorrecto; a diferencia de la oxitocina nativa (vida media de minutos) que sí exige goteo para sostener la contracción, la carbetocina no se infunde, sino que su potencia farmacocinética se otorga exclusivamente en carga de impacto lento directa.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadro 3 Agentes uterotónicos, Página 329."
    },
    {
        id: 127,
        question: "Una mujer embarazada de 24 semanas de gestación ingresa a triage con fiebre y defensa abdominal, en quien el ultrasonido primario institucional no logra delimitar ni aislar de manera concluyente el apéndice cecal. Ante la sospecha diagnóstica persistente de apendicitis aguda, ¿qué estudio imagenológico de segunda línea avala directamente la guía como alternativa superior a la radiación ionizante?",
        options: ["Gammagrafía abdominal", "Laparoscopia diagnóstica", "Resonancia magnética", "Radiografía de abdomen en bipedestación"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de emergencias obstétricas, cuando el ultrasonido falla en visualizar focos inflamatorios apendiculares desplazados por el útero grávido, evitar radiar el feto (efectos teratogénicos y mielosupresión por tomografía) es imperativo. La imagenología predilecta por el colegio interamericano obstétrico para dirimir abdomen agudo oculto es la Resonancia Magnética (sin contraste de gadolinio) por su alta especificidad anatómica inocua de tejidos blandos.<br><br>Perla ENARM: Se recomienda el uso de la resonancia magnética (sin gadolinio intravenoso), por encima de la tomografía computarizada, para establecer el diagnóstico de apendicitis aguda en cualquier momento del embarazo.<br><br>Análisis de Distractores: A) Gammagrafía abdominal es incorrecto; utilizar isotopos radioactivos o leucocitos marcados carece de justificación de urgencias, es lento, y deposita material reactivo tiroideo corporal sistémico en la placenta. B) Laparoscopia diagnóstica es incorrecto; es la pauta de abordaje y resolución terapéutica operatoria final (escalón de tercera línea) \"en caso de no contar con estudios de imagen\". Antes de abrir quirúrgicamente un abdomen ciego estandarizado a nivel dos, la RM es la prioridad diagnóstica a agotar. D) Radiografía de abdomen en bipedestación es incorrecto; expone al bebé a fotones y su utilidad es ínfima, ya que apenas visualiza un apendicolito en menos del 5% de los cuadros o distensión de asas inespecífica sin dar diagnóstico apendicular real.",
        source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Apendicitis y embarazo, Página 178."
    },
    {
        id: 128,
        question: "En el soporte de un paciente adulto crítico ingresado a la UCI y que cursa la primera semana de requerimiento total de nutrición parenteral exclusiva por un intestino no funcionante. Al calcular el componente calórico no proteico, ¿cuál es el límite o dosis máxima estipulada de emulsiones lipídicas basadas en aceite de soya por semana para mitigar hepatotoxicidad?",
        options: ["Máximo 100 gramos", "Máximo 200 gramos", "Máximo 150 gramos", "Máximo 50 gramos"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de nutrición enteral y parenteral, las soluciones grasas puras de primera generación (aceite de soya) contienen altos niveles de ácidos grasos poliinsaturados omega-6, que en el enfermo crítico disparan potentes vías proinflamatorias inmunosupresoras y daño oxidativo hepático (esteatosis parenteral). Para subsanar la necesidad calórica sin intoxicar, la normativa impone restringir su límite tope a un volumen neto máximo de 100 gramos fraccionados por semana durante los primeros 7 días de estrés agudo.<br><br>Perla ENARM: Limitar el uso de emulsiones lipídicas intravenosas basadas en aceite de soya durante la primera semana de inicio de la nutrición parenteral en el paciente critico a un máximo de 100 g/semana, dividido en 2 dosis/semana, si se sospecha de deficiencia de ácidos grasos esenciales.<br><br>Análisis de Distractores: B) Máximo 200 gramos es incorrecto; administrar esta cantidad de triglicéridos exógenos de cadena larga a un macrófago paralizado en UCI deprime por completo el sistema reticuloendotelial del bazo y congestiona la bilis. C) Máximo 150 gramos es incorrecto; aunque el metabolismo graso es alto en el ayuno, el tope regulatorio estricto establecido en la medicina crítica mexicana se fija de forma cortada al nivel de los 100 g. D) Máximo 50 gramos es incorrecto; infradosificar los lípidos en una fórmula completa por debajo de los aportes mínimos somete al paciente a déficit letal de ácidos grasos esenciales (linoleico y araquidónico) induciendo descamación dérmica, plaquetopenia y retardo cicatricial.",
        source: "IMSS-818-17, Nutrición parenteral y enteral en el paciente adulto en estado crítico, 2017, Parenteral, Página 233."
    },
    {
        id: 129,
        question: "Un paciente sobrevivió a una laparotomía de control de daños con abdomen abierto secundario a sepsis por perforación por arma de fuego. Tras superar el evento crítico, el intestino se granuló y se planifica una técnica de hernia ventral planeada. ¿En qué margen exacto de tiempo post-evento ordena el abordaje oficial realizar el Cierre Definitivo del Abdomen (CDA)?",
        options: ["De 6 a 12 meses", "De 3 a 6 meses", "De 1 a 3 meses", "De 12 a 18 meses"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de cirugía de control de daños, la cicatrización profunda visceral de las fascias en retracción y de la pared expuesta (formación de la membrana fibrosa) transita por estadios hipertróficos acartonados iniciales intratables. Operar precozmente conlleva perforaciones iatrogénicas masivas al disecar. Programar la disección y rotación de colgajos miofasciales de una \"Hernia Ventral Planeada\" exige aguardar el periodo de oro biológico de maduración y ablandamiento del bloque fibrocicatricial a un rango comprendido estrictamente de los 6 a los 12 meses posteriores al trauma.<br><br>Perla ENARM: En pacientes con contaminación grave o persistente de la cavidad, portadores de fístula enteroatmosférica o pacientes en estado crítico por tiempo prolongado, debe proyectarse el desarrollo de una hernia ventral planeada (HVP) y llevar a cabo el Cierre Definitivo del Abdomen (CDA) 6 a 12 meses después de haberse resuelto la condición aguda y grave del paciente.<br><br>Análisis de Distractores: B) De 3 a 6 meses es incorrecto; el paciente cursa por la etapa proliferativa máxima llamada \"abdomen congelado\"; la disección de adherencias firmes terminará desgarrando el tracto digestivo de manera catastrófica e indetectable. C) De 1 a 3 meses es incorrecto; la pared abdominal se encuentra bajo máxima inflamación latente sistémica posquirúrgica y carece de elasticidad muscular fascial para permitir avances aponeuróticos laterales. D) De 12 a 18 meses es incorrecto; posponer más de un año deteriora crónicamente la calidad de vida de la víctima por dependencia incapacitante de bolsas, retracción atrófica bilateral del oblicuo mayor y deformidad severa vertebral postural de por vida.",
        source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Tratamiento, Página 288."
    },
    {
        id: 130,
        question: "A sabiendas que las heparinas de bajo peso molecular (HBPM) representan la piedra angular universal preventiva en toda mujer embarazada susceptible a trombosis, la guía estipula escenarios excepcionales con riesgo letal en los cuales están insuficientemente probadas. ¿En qué condición clínica específica avala la normativa médica destinar el uso farmacológico restringido de warfarina oral prescrita a lo largo de la gestación?",
        options: ["Trombofilia homocigota de alto riesgo", "Portadoras de válvulas cardíacas mecánicas", "Antecedente de embolismo pulmonar masivo", "Síndrome antifosfolípidos con pérdida fetal"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica en la paciente obstétrica, si bien los derivados dicumarínicos (warfarina/acenocumarina) atraviesan agresivamente el lecho placentario condicionando alta embriopatía teratogénica y abortos hemorrágicos (Categoría X fetal), la heparina es netamente ineficaz para evitar la coagulación catastrófica a alta presión de las valvas protésicas cardiacas de metal implantadas en el corazón. Suspender la warfarina en estas madres desencadena la falla protésica letal, por lo que el riesgo biológico está forzosamente justificado.<br><br>Perla ENARM: Se sugiere que el uso de warfarina en el embarazo se limite a las pocas situaciones en las que la heparina se considera inadecuada (por ejemplo, mujeres con válvulas cardíacas mecánicas).<br><br>Análisis de Distractores: A) Trombofilia homocigota de alto riesgo es incorrecto; la heparina de bajo peso molecular aplicada a dosis altas ajustadas por peso o terapéuticas controla perfectamente las alteraciones de la coagulación heredada como el factor V de Leiden, sin someter al feto al estrés dicumarínico. C) Antecedente de embolismo pulmonar masivo es incorrecto; estos escenarios se controlan firmemente y con alta evidencia de protección utilizando inyecciones de heparina desde el primer trimestre (profilaxis secundaria). D) Síndrome antifosfolípidos con pérdida fetal es incorrecto; el esquema profiláctico de oro en este trastorno autoinmune es la combinación estandarizada de heparina subcutánea sumada a la dosis baja profiláctica de ácido acetilsalicílico, proscribiéndose la warfarina.",
        source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Prevención, Página 396."
    },
    {
        id: 131,
        question: "En la evaluación diurna de un paciente pediátrico ingresado en Terapia Intensiva con diagnóstico de falla multiorgánica por sepsis, el médico tratante advierte oliguria progresiva y edema intersticial severo. ¿Qué cálculo matemático normado utiliza la GPC para diagnosticar fehacientemente y cuantificar en porcentaje el grado exacto de sobrecarga hídrica causante de la Lesión Renal Aguda en piso?",
        options: ["Déficit de base y lactato", "Fracción de excreción de sodio", "Ingresos menos egresos entre el peso", "Gradiente trans-tubular de potasio"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de lesión renal aguda pediátrica, el exceso de hidratación (reanimación entusiasta o choque prolongado sin diuresis) empantana la microvasculatura interlobulillar del parénquima renal, desencadenando hipoxia intrínseca. Para evitar esta variable de mortalidad independiente, todo preescolar en UCI oligúrico debe vigilarse mediante la fórmula clínica dorada de retención: [Líquidos ingresados totales diarios menos Líquidos egresados totales diarios] / Peso del menor al momento del ingreso. El resultado multiplicado por 100 dicta la alarma si la sobrecarga de hídrica corporal total excede el 10% de volumen acumulado peligroso.<br><br>Perla ENARM: Se debe realizar en pacientes con riesgo de LRA un balance de líquidos exacto y calcular diariamente el porcentaje de sobrecarga hídrica (% SH). Fórmula: % sobrecarga hídrica = Suma diaria (Ingresos líquidos total - Egresos líquidos total CLt) x 100 / Peso al ingreso UCI (kg).<br><br>Análisis de Distractores: A) Déficit de base y lactato es incorrecto; aunque estos predicen la reanimación macrohemodinámica anaerobia u oxigenación defectuosa durante la hora dorada de choque vascular en sala de trauma, no cuantifican matemáticamente la retención de agua hidrostática tisular ni en gramos ni en litros del compartimento intersticial. B) Fracción de excreción de sodio es incorrecto; el FENa orienta la etiología patológica entre un origen puramente prerrenal funcional (<1%) y necrosis tubular aguda estructural establecida (>2%), mas es inútil para medir los litros totales excedentes estancados en el niño chocado. D) Gradiente trans-tubular de potasio es incorrecto; valora indirectamente el efecto mineralocorticoide tubular colector distal aldosterónico basal pero carece de papel y sensibilidad alguna en la vigilancia macro de sobrecarga hídrica de la Unidad de Cuidados Intensivos.",
        source: "SS-231-18, Prevención, diagnóstico y tratamiento de la Lesión Renal Aguda, 2018, Tratamiento, Página 341."
    },
    {
        id: 132,
        question: "Durante su turno en la sala de ortopedia de urgencias recibe a un paciente masculino de 50 años que sufrió trauma contuso antebraquial. Usted diagnostica una fractura diafisiaria de la cortical cubital y visualiza en la extremidad una laceración cutánea asociada puntiforme de 5 milímetros. A la exploración, el lecho muestra nula contusión circundante y los músculos están limpios y funcionales. De acuerdo a la clasificación de Gustilo-Anderson, ¿qué estadio preciso caracteriza morfológicamente este trazo inicial?",
        options: ["Tipo IIIA", "Tipo I", "Tipo II", "Tipo IIIB"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, las lesiones expuestas exigen graduar el compromiso blando para decidir desbridamiento. La tipificación base leve o inicial del traumatismo de \"Baja Energía\", como el provocado habitualmente por agujas óseas de adentro hacia afuera que se limitan a producir heridas cerradas menores a los 10 milímetros (1 centímetro) con bordes sin abrasión y mínima destrucción periostia perimetral se cataloga internacional e infaliblemente bajo el grado romano Gustilo Tipo I.<br><br>Perla ENARM: Clasificación de heridas expuestas de acuerdo a Gustilo-Anderson. Tipo I: La herida es pequeña, < 10 mm generalmente puntiforme, con escasa contusión o deterioro de las partes blandas. El traumatismo es de baja energía.<br><br>Análisis de Distractores: A) Tipo IIIA es incorrecto; describe heridas agresivas en colgajos desvascularizados y aplastamientos por alta energía cinemática que obligatoriamente deben rebasar la marca límite grave de los diez centímetros superficiales. C) Tipo II es incorrecto; abarca el estadio con exposición profunda progresiva a nivel musculoesquelético evidente entre la franja numérica intermedia abierta de más de 1 centímetro (10 mm) pero menos de la laceración letal superior de 10 centímetros. D) Tipo IIIB es incorrecto; conforma un desastre anatómico contaminado masivo con arrancamiento fascio-muscular sin lecho de recubrimiento que arranca el periostio condenando al cirujano a implantes microvasculares libres para ocultar el hueso muerto pelado.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Cuadro III Escala Gustilo, Página 111."
    },
    {
        id: 133,
        question: "A un lactante menor de 40 días de vida extrauterina ingresado a choque pediátrico por cuadro de deterioro súbito con fiebre, se le diagnostica clínicamente sepsis comunitaria fulminante de origen no determinado. En lo que el panel de hemocultivos documenta la cepa causal de diseminación invasiva, ¿cuál es el régimen antibiótico endovenoso empírico específico que demanda el algoritmo de GPC iniciar?",
        options: ["Vancomicina y meropenem", "Cefotaxima y vancomicina", "Ampicilina y cefotaxima", "Dicloxacilina y amikacina"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de sepsis en pediatría, el grupo etario particular pos-natal mayor de 7 días pero menor al trimestre de madurez (Neonatos > 7 días a < 3 meses) presenta un traslape microbiológico atípico de riesgo que abarca patógenos del canal de parto (L. monocytogenes) sumados a gérmenes comunitarios respiratorios capsulados tempranos (Neumococo, H. influenzae). La normativa de oro exige la instauración sinérgica combinada de Ampicilina (para barrer cepas atípicas listeriales y grampositivas entéricas) unida fuertemente al espectro purificado y excelente penetración de la Cefotaxima o Ceftriaxona de tercera generación a meninges, garantizando supervivencia.<br><br>Perla ENARM: Tratamiento empírico en sepsis: Neonatos > 7 días y < 3 meses: Ampicilina 160-200 mg/kg/24hr cada 6hr más Ceftriaxona 50 mg/kg/12-24hr ó Cefotaxima 50-75 mg/kg/6-8 hr.<br><br>Análisis de Distractores: A) Vancomicina y meropenem es incorrecto; el salto desmedido o irrestricto directo hacia carbapenémicos de ultra-amplio espectro en un bebé sano procedente de su domicilio fomentará drásticamente el desarrollo intrahospitalario irreversible de flora multirresistente productora de BLEE de la microbiota residente y no está autorizado empíricamente como terapia 1 a menos que sea neutropenia nosocomial tardía oncológica. B) Cefotaxima y vancomicina es incorrecto; la guía relega esta combinación altamente agresiva estafilocócica intencional solo cuando la sospecha clínica dicta involucro avanzado claro de meningitis neumocócica en escolares sanos arriba del 3er mes vital de consolidación inmunológica o enfermedad grave por cocos comunitarios agresivos MRSA, obviando la ampicilina clave para la franja frágil listerial previa a los 90 días. D) Dicloxacilina y amikacina es incorrecto; es un esquema histórico empírico con pobre biodisponibilidad y potencia cerebral penetrante limitada central durante el choque, útil solo para focos cutáneos purulentos leves o artritis inicial periférica y no catalogado normativamente para la primera línea de bacteriemia neonatal generalizada a partir del mes por falta de aval.",
        source: "SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad, 2017, Cuadro de Tratamiento Empírico, Página 379."
    },
    {
        id: 134,
        question: "Durante su guardia ingresa en piso un paciente varón de 40 años que se retuerce de dolor agudo lancinante en el flanco derecho (10/10 en EVA). El diagnóstico clínico corrobora cólico renoureteral unilateral litiásico en fase expulsiva sin estigmas febriles asociados. De acuerdo a la normativa universal institucional de analgesia de choque urgente, ¿qué AINE y dosis se consolida como el pilar endovenoso agudo preferente para relajar y desinflamar la obstrucción ureteral y el cápsula capsular del parénquima?",
        options: ["Ketorolaco 30 miligramos", "Diclofenaco 75 miligramos", "Clonixinato de lisina 100 miligramos", "Ibuprofeno 400 miligramos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de cólico renoureteral, las potentes contracciones isquémicas del músculo liso ureteral en respuesta a la obstrucción generan la cascada patológica aguda severa de liberación inflamatoria mediada por ácido araquidónico. Romper la liberación de prostaglandinas aferentes medulares se consigue más eficientemente con diclofenaco parenteral. Las guías señalan de primera elección estricta infundir en bolsa rápida una ampolleta pura y resolutiva de Diclofenaco a dosis tope de 75 miligramos IV.<br><br>Perla ENARM: Se debe iniciar tratamiento con AINES, por vía intravenosa, para control del dolor en pacientes con cólico renoureteral. Se puede utilizar diclofenaco 75 mg Intravenoso, o como segunda opción el metamizol sódico 2 gr intravenoso, pero con infusión lenta.<br><br>Análisis de Distractores: A) Ketorolaco 30 miligramos es incorrecto; a pesar de ser popular y de excelente poder, su toxicidad intrínseca parenquimatosa nefronal es alta ante un riñón en éstasis hipoperfundido, por lo que las guías mexicanas optan de primera instancia explícita por la potencia del diclofenaco como fármaco A de urología analgésica. C) Clonixinato de lisina 100 miligramos es incorrecto; posee moderada selectividad COX tisular visceral baja y su perfil antiespasmódico crónico oral o leve posoperatorio resulta clínicamente insuficiente para combatir frontalmente de urgencia la intensidad de las contracciones y descargas nociceptivas 10/10 de un lito migratorio del espasmo renal alto. D) Ibuprofeno 400 miligramos es incorrecto; se confiere principalmente como pilar inflamatorio analgésico y antipirético ambulatorio estandarizado recetado vía oral de egreso al irse de alta tras romper el ciclo doloroso y no como molécula endovenosa rápida de control del estallamiento de sala médica de urgencias en choque por dolor.",
        source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Tratamiento, Página 206."
    },
    {
        id: 135,
        question: "Un cirujano introduce trócares abdominales durante el abordaje de emergencia de un embarazo ectópico tubárico no roto pero sumamente edematizado alojado en el tercio ampular izquierdo. De acuerdo al protocolo estricto normado en las decisiones preservadoras, ¿qué hallazgo anatómico condiciona a tener que realizar una resección terminal o salpingectomía quirúrgica definitiva sobre la intervención conservadora reparadora de la anatomía tubárica (salpingostomía)?",
        options: ["Integridad de la salpinge contralateral sana", "Inserción del trofoblasto en la porción fimbrial", "Presencia de un saco gestacional multilobulado", "Adherencias pélvicas por endometriosis severa"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de emergencias obstétricas, intentar \"limpiar\" endoscópicamente la luz de una trompa dañada de Falopio extrañando el trofoblasto y suturando el lumen (salpingostomía) expone a sangrado secundario y sobre todo a altas tasas de una repetición futura del ectópico tubárico por fibrosis silente de la mucosa ciliar, si bien preserva la fertilidad si el lado opuesto falla. La regla biológica universal del Colegio de Ginecología dicta realizar ablación pura total en bloque y seccionamiento permanente con ligadura o salpingectomía del área afectada en todos los escenarios si el equipo logra corroborar de antemano el buen funcionamiento, anatomía y sanidad completa de la trompa contra-lateral restante ovárica, logrando embarazo a futuro sin riesgo isquémico.<br><br>Perla ENARM: En presencia de una salpinge contralateral sana, se recomienda realizar salpingectomía en vez de salpingostomía.<br><br>Análisis de Distractores: B) Inserción del trofoblasto en la porción fimbrial es incorrecto; de hecho, una anidación abortada distal que se asoma libremente por el orificio de la fimbria se trata de oro \"ordeñándola\" y aspirándola directamente a través de ella como \"aborto tubario fimbrial extraído\", sin alterar quirúrgicamente ni arrancar de base ligando ningún tercio sano proximal. C) Presencia de un saco gestacional multilobulado es incorrecto; las anomalías internas quísticas del diámetro placentario ectópico fungen de relevancia biológica puramente ecográfica en tamaño (menor o mayor a 4cm) no obligando a seccionar quirúrgicamente por su conformación de saco la pared trompal frente a factores patológicos opuestos de reserva sana anexial. D) Adherencias pélvicas por endometriosis severa es incorrecto; un campo pélvico destructivo \"congelado\" de forma severa y bilateral dificulta per se cualquier embarazo pélvico uterino deseado, en el que caso contrario al enunciado y si el órgano contra-lateral no está sano, se debe en este punto extremo preservar forzadamente el conducto conservadoramente sin amputación porque ambas presentan enfermedad por defecto inflamatorio isquémico de fibrosis.",
        source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Tratamiento Quirúrgico Ectópico, Página 181."
    },
    {
        id: 136,
        question: "A la unidad de terapia neonatológica ingresa un recién nacido macrosómico producto de fórceps con lesión obstétrica grave del plexo braquial. Durante la exploración se documenta parálisis flácida total en reposo (ausencia de contracción muscular del hombro, muñeca y mano global), asociada de manera ipsilateral a la presencia inconfundible de ptosis, miosis palpebral y anhidrosis de la hemicara superior (Síndrome de Horner positivo). Según el pronóstico por la escala descriptiva formal de Narakas, ¿qué grupo clasifica este desastre medular periférico?",
        options: ["Grupo II", "Grupo IV", "Grupo I", "Grupo III"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de lesión de plexo braquial obstétrica, la implicación clínica preoperatoria inicial requiere diferenciar una caída radicular funcional aislada temporal a una tragedia axonal destructiva. Cuando la flacidez abarca el plexo en su totalidad (raíces desde C5 hasta T1) y además la última raíz de T1 afecta la inervación simpática ganglionar cervicotorácica desencadenando un \"Síndrome de Horner\", nos encontramos ante el estadio máximo e irreversible clasificado rígidamente como Grupo IV, marcando el pronóstico más sombrío, sentenciado a deformidad secuelar de por vida si no se realiza intervención inmediata de injerto libre.<br><br>Perla ENARM: Tabla 7. Escala de clasificación Narakas. IV: Parálisis total con síndrome de Horner C5, C6, C7, C8, T1. Parálisis flácida completa con síndrome de Horner. De peor pronóstico. Si no se interviene quirúrgicamente deja secuelas severas en la función del miembro superior.<br><br>Análisis de Distractores: A) Grupo II es incorrecto; el número dos encuadra la patología en la fase de \"Parálisis superior extensa (Erb de C5-C6 agregando el pilar central motor C7)\" que cursa en presentación idéntica de mano funcional y pronosupinación alterada del miembro y codo, pero sin datos autonómicos oftalmológicos vegetativos y conservando la movilidad fina inferior. C) Grupo I es incorrecto; designa invariablemente la patología más frecuente paralítica obstétrica y benigna pura alta de restitución natural favorable \"Erb (C5-C6)\", con mano biológicamente sana con reflejo opresivo funcional del recién nacido intacto sin problemas focales. D) Grupo III es incorrecto; señala clínicamente a la parálisis general de la extremidad entera total y completa caída o extendida que si bien inmoviliza al niño en las cinco raíces del plexo no abarca ni desprende la cuerda neural torácica simpática accesoria en ganglio estrellado T1 inferior (Sin Horner Positivo) esperando función o rehabilitación en el cincuenta por ciento natural.",
        source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Tabla 7 Clasificación Narakas, Página 9."
    },
    {
        id: 137,
        question: "En el área de choque reciben de manera ambulatoria a un cocinero que accidentalmente vertió líquido hirviendo directo a su piel provocando lesiones tipo escaldaduras de espesor parcial. Al evaluar el mapa corporal, las zonas quemadas ocupan aproximadamente solo el 8% de la superficie total, sin embargo, el patrón inflamatorio compromete circunferencialmente y en su totalidad los pliegues de flexión del cuello frontal y abarcan su cara. Ante estas características topográficas de presentación agudas dictaminadas, ¿cuál es la conducta inmediata primaria que le obliga llevar a cabo la guía de buena práctica resolutiva?",
        options: ["Solicitar valoración por cirujano plástico", "Aplicar ungüento de sulfadiazina de plata", "Manejar ambulatoriamente con apósitos", "Iniciar aseo general solo con agua inyectable"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de quemaduras y reanimación térmica cutánea, la superficie corporal quemada total dicta el abordaje general hemodinámico grave (a partir del quince por ciento pediátrico), no obstante en casos de porcentajes bajos aparentemente benévolos, el área cutánea que recubre las articulaciones o zonas funcionales de alto costo estético y respiratorio (ej. cara, palmas y cuello) exige, al ser involucradas, una prohibición absoluta en su abordaje al médico primer contacto y requiere derivación al sub-especialista, impidiendo la contractura cicatricial por segunda intención restrictiva del manejo de vía aérea y desfiguración maxilofacial crónica secundaria de alta letalidad psicológica.<br><br>Perla ENARM: Algoritmo 7. Criterios para valoración por cirujano plástico o cirujano con entrenamiento en quemaduras: Quemadura circunferencial o Quemadura en áreas especiales que involucran cara, mano, pliegues del cuerpo, o región anatómica del cuello.<br><br>Análisis de Distractores: B) Aplicar ungüento de sulfadiazina de plata es incorrecto; la aplicación de pastas de sulfa genera desvitalización tópica de epitelio pseudo-cicatrizante blanco en el estrato dañado o enrojecido de cara con alta toxicidad cosmética macular de absorción estipulándose proscrito de urgencias primarias de áreas finas estéticas maxilofaciales que requieren xenoinjerto. C) Manejar ambulatoriamente con apósitos es incorrecto; el cuello circunferencial engrosado se edematizará y estrangulará oclusionando las vías traqueales aéreas centrales sofocando en horas agudas al individuo en su hogar exigiendo escarotomía relajante pre-aponeurótica temprana quirúrgica descompresiva del servicio plástico reconstructivo interno hospitalario. D) Iniciar aseo general solo con agua inyectable es incorrecto; enfriar los tejidos detiene la onda y calor primarios en campo o primer respondiente socorrista y no sustituye al inminente y fundamental paso crítico resolutivo hospitalario resolutorio de referir y asignar a servicio reconstructivo que el dictamen exige en cara afectada por calor húmedo hirviendo generalizado.",
        source: "SS-090-18, Diagnóstico y tratamiento de quemaduras, 2018, Algoritmo 7, Página 291."
    },
    {
        id: 138,
        question: "De acuerdo al protocolo estricto postquirúrgico y vigilancia integral en una paciente femenina adulto mayor sometida a una intervención ortopédica de fijación ósea o reemplazo de articulación con prótesis o artroplastia por haber sufrido una fractura intracapsular del fémur agudizada. ¿En qué franja o ventana cronológica específica recomienda en días postquirúrgicos el consenso normado sostener e instituir de manera inamovible todo su tratamiento y profilaxis anticoagulante sistémico con inyección o heparina de bajo peso molecular subcutánea a fin de detener trombos letales pulmonares secundarios en el lecho vascular óseo de cadera?",
        options: ["Entre 2 y 3 semanas", "Entre 4 y 5 semanas", "Durante 1 a 2 semanas", "Durante 8 a 10 semanas"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas intracapsulares del extremo proximal de fémur geriátrico, los factores pro-coagulantes del trauma quirúrgico óseo mayor con exposición a médula ósea grasosa combinados con el decúbito estático posoperatorio del paciente mayor prolongan el alto estado pro-trombogénico natural hasta un mes después de la herida resolutiva. Las regulaciones institucionales internacionales dictaminan para seguridad general vital que se obligue y extienda el blindaje químico medicamentoso celular venoso de heparinas subcutáneas o trombo-profilaxis abarcando el estricto rango del mes cumplido de los 28 hasta los 35 días como meta total, sumando los ejercicios continuos tempranos diarios.<br><br>Perla ENARM: Manejo postoperatorio: Utilizar tromboprofilaxis en pacientes postoperados de osteosíntesis de FICEPF, artroplastía de cadera o ambos por 4-5 semanas posteriores a evento quirúrgico, y movilización temprana de cadera.<br><br>Análisis de Distractores: A) Entre 2 y 3 semanas es incorrecto; este número intermedio protege falsamente con carencias la mitad inferior del curso trombótico, exponiendo y abandonando súbitamente al paciente al síndrome tromboembólico periférico de pierna tardío a los picos de máxima viscosidad pro trombótica aguda reaccional osteo articular inflamatoria sub aguda profunda pélvica femoral. C) Durante 1 a 2 semanas es incorrecto; representa un esquema profiláctico sub estándar e ineficaz aplicado de manera general en paciente adulto ingresado y medicamente enfermo hospitalizado en base no operado asintomático del servicio interno general sin injurias mayores pélvicas articulares abiertas, dictaminando un cese y retiro prematuro del agente anti hemostático peligroso ortopédicamente en el egreso rápido. D) Durante 8 a 10 semanas es incorrecto; exceder los márgenes máximos instituidos prolongan el sangrado yatrogénico de herida, la atrición plaquetaria inducida secundaria por alergias heparínicas prolongadas de fármacos sin mayor evidencia o aval y aumento crónico del desarrollo de osteopenia paralela o sangrado difuso intraluminal gástrico posquirúrgico con costos económicos abismales prohibitivos institucionales injustificables para un mes de alta sin daño documentado en extremidades funcionales deambulatorias pélvicas en sala y con ultrasonido basal libre y sano en extremidad sin coágulo venoso activo.",
        source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Manejo Postoperatorio, Página 31."
    },
    {
        id: 139,
        question: "En el desarrollo de complicaciones derivadas del nacimiento un paciente entra a unidad de terapia crítica desarrollando una infección generalizada peripélvica con bacteriemia confirmada, evolucionando inminentemente al estado de choque vasopléjico celular inestable. Después de que a la paciente obstétrica séptica se le instaura de forma plena el algoritmo de volumen endovenoso cristaloide rápido sin llegar ni rebasar a las metas prefijadas y sosteniendo de manera constante presión arterial media en rangos colapsados a 50 mmHg perdiendo circulación efectiva vital en el cerebro basal y oxigenación tisular general. ¿De qué fármaco específico vasopresor dictamina inyectar y apoyarse como la indicación exclusiva médica institucional pura endovenosa el abordaje normado GPC de primera línea con el cual se logrará restaurar con urgencia y éxito el vasoespasmo tono simpático a la extremidad femenina sin colapsar el pulso fetal?",
        options: ["Dobutamina", "Dopamina", "Vasopresina", "Norepinefrina"],
        answer: 3,
