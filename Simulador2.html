  {
    id: 44,
    question: "En un paciente adulto con diagnóstico confirmado de cólico renoureteral e indicación de manejo ambulatorio al que se le detecta un lito de 6 milímetros en el trayecto ureteral. ¿Qué fármaco bloqueador alfa está indicado como terapia expulsiva médica de primera elección y a qué dosis?",
    options: [
      "Tamsulosina 0.4 mg por día",
      "Terazosina 2 mg por día",
      "Prazosina 1 mg por día",
      "Doxazosina 5 mg por día"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, la relajación del músculo liso en la unión ureterovesical (rica en receptores adrenérgicos alfa-1D) es indispensable para el paso espontáneo de litos distales menores a 10 mm. La tamsulosina, a dosis diaria única de 0.4 mg, ha demostrado alta eficacia acortando los días de expulsión litiásica y disminuyendo la severidad de los cólicos intermitentes en la población adulta.<br><br>Perla ENARM: Se deben utilizar bloqueadores alfa como tratamiento para la expulsión del lito. Se recomienda el uso de Tamsulosina 0.4 mg por día.<br><br>Análisis de Distractores: B) Terazosina 2 mg por día es incorrecto; aunque es un alfabloqueante usado para hiperplasia prostática benigna, la indicación y dosis oficial documentada como Nivel de Evidencia A en la GPC para litiasis es tamsulosina. C) Prazosina 1 mg por día es incorrecto; su vida media corta y perfil cardiovascular la relegan al manejo de hipertensión resistente o feocromocitoma, sin aval clínico en urolitiasis. D) Doxazosina 5 mg por día es incorrecto; no figura dentro de los algoritmos de expulsión expedita de lito renoureteral de las guías de urgencia institucionales mexicanas.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Tratamiento, Página 48."
  },
  {
    id: 45,
    question: "Una paciente de 35 semanas de embarazo que ingresó con cifras tensionales de 165/115 mmHg y sintomatología vasospástica requiere prevención inmediata de eclampsia. ¿Qué medicamento anticonvulsivante de primera línea debe instaurarse forzosamente para proteger el sistema nervioso central materno?",
    options: [
      "Fenitoína intravenosa",
      "Diazepam endovenoso",
      "Sulfato de magnesio",
      "Levetiracetam oral"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de emergencias obstétricas, el sulfato de magnesio actúa como neuroprotector inhibiendo competitivamente los receptores NMDA del glutamato en el cerebro y estabilizando la membrana neuronal ante el vasospasmo isquémico generalizado de la preeclampsia con características de severidad. Su uso reduce a la mitad el riesgo de desarrollo de crisis convulsivas tónico-clónicas en comparación a fenitoína o benzodiacepinas.<br><br>Perla ENARM: Se recomienda administrar sulfato de magnesio para la prevención y tratamiento de eclampsia en mujeres embarazadas o puérperas con crisis hipertensiva.<br><br>Análisis de Distractores: A) Fenitoína intravenosa es incorrecto; en la obstetricia moderna se reserva exclusivamente como fármaco de segunda línea (alternativa) cuando el sulfato de magnesio está estrictamente contraindicado (ej. miastenia gravis grave). B) Diazepam endovenoso es incorrecto; tiene alto riesgo de depresión respiratoria severa del binomio y su capacidad preventiva para la eclampsia de novo es netamente inferior, por lo que es una mala praxis de primera línea. D) Levetiracetam oral es incorrecto; aunque es útil en epilepsias crónicas durante el embarazo de forma ambulatoria, carece de acción aguda neuroestabilizadora para las crisis por preeclampsia severa.",
    source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Algoritmo 1.2, Página 4."
  },
  {
    id: 46,
    question: "Tras ocurrir un evento traumático en un paciente de 55 años sin alteraciones funcionales previas, se solicita una radiografía simple anteroposterior y lateral. Si se visualiza un trazo completo y desplazado en el fémur proximal intracapsular, ¿en qué condición clínica estaría estrictamente indicado evitar la artroplastia y decantarse por el tratamiento conservador?",
    options: [
      "Paciente con trazo basicervical e impactación a 30 grados",
      "Paciente hipertenso con antecedente de tabaquismo activo",
      "Paciente menor de 65 años con osteopenia detectada",
      "Paciente mayor de 80 años con comorbilidades y riesgo de mortalidad elevado"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de fracturas intracapsulares del fémur, todo trazo intracapsular desplazado requiere un evento quirúrgico (fijación u artroplastia) dado su alto índice de necrosis avascular. Sin embargo, existe una excepción fundamental donde someter al anciano con múltiples comorbilidades (ej. demencia, postrado, falla cardiaca severa) a la anestesia y cirugía mayor superaría el beneficio ortopédico arriesgando su vida de manera aguda, por lo cual se indica manejo conservador y control del dolor.<br><br>Perla ENARM: Emplear el manejo no quirúrgico en pacientes de más de 80 años con diagnóstico de FICEPF y que presenten comorbilidades con elevado riesgo de mortalidad.<br><br>Análisis de Distractores: A) Paciente con trazo basicervical e impactación a 30 grados es incorrecto; las fracturas tipo Pauwels I (valgo, compactadas) a cualquier edad tienen alto éxito de consolidación con tornillos canulados o material de fijación local de invasión mínima. B) Paciente hipertenso con antecedente de tabaquismo activo es incorrecto; estos factores no confieren un riesgo quirúrgico/anestésico prohibitivo que obligue a condenar a un adulto de 55 años a la inmovilidad de por vida. C) Paciente menor de 65 años con osteopenia detectada es incorrecto; los adultos jóvenes y maduros exigen una restitución anatómica inmediata y pronta rehabilitación, obligando al manejo quirúrgico forzoso.",
    source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Tratamiento Conservador, Página 6."
  },
  {
    id: 47,
    question: "En un lactante al que se le dio diagnóstico presuntivo temprano de lesión obstétrica del plexo braquial, ¿cuál de los siguientes tratamientos de neuromodulación farmacológica está indicado añadir al esquema para mitigar el dolor, la inflamación y la hemorragia local de las raíces espinales avulsionadas?",
    options: [
      "Ibuprofeno y lidocaína",
      "Morfina y clonazepam",
      "Paracetamol y gabapentina",
      "Diclofenaco y pregabalina"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de lesión de plexo braquial, el traumatismo neuro-traccional obstétrico al desprender o estirar las fibras de C5-T1 desencadena de manera local inflamación intensa y descargas ectópicas de los axones sensitivos residuales, lo que condiciona irritabilidad extrema y dolor neuropático refractario en el neonato/lactante. La guía estipula el uso escalonado de analgésicos de acción central periférica (Paracetamol) y neuromoduladores puros (Gabapentina) para abatir este arco reflejo nociceptivo durante las primeras etapas.<br><br>Perla ENARM: Tratamiento Médico (Lesión del plexo braquial): Toxina botulínica, Paracetamol: En caso de presentar dolor, edema y hemorragia, y Gabapentina.<br><br>Análisis de Distractores: A) Ibuprofeno y lidocaína es incorrecto; la lidocaína parches o local no tiene penetrancia profunda a cordones medulares braquiales y los AINEs no controlan el componente neuropático principal de la radiculopatía. B) Morfina y clonazepam es incorrecto; utilizar opioides puros o benzodiacepinas en lactantes con lesión radicular periférica deprime el control respiratorio bulbar y empeora la hipotonía inicial sin focalizarse en la neuromodulación de la desmielinización axónica. D) Diclofenaco y pregabalina es incorrecto; aunque la pregabalina se emplea en neuropatía diabética de adulto, la normatividad estandarizada para este modelo pedíátrico-neonatal particular en la GPC recomienda gabapentina.",
    source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Algoritmo 3, Tratamiento Médico, Página 1."
  },
  {
    id: 48,
    question: "Paciente adulto joven masculino que acude por presentar fractura de ambos huesos del antebrazo con una herida contaminada masiva expuesta de 11 centímetros con pérdida de cobertura (Gustilo IIIB). ¿Cuál es el tratamiento antibiótico recomendado de primera línea al ingreso para profilaxis de infección ósea?",
    options: [
      "Penicilina y doxiciclina",
      "Cefalosporina de 3ra generación",
      "Vancomicina y metronidazol",
      "Cefalosporina de 1ra generación y un aminoglucósido"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, la invasión bacteriana en heridas expuestas profundas exige cobertura agresiva grampositiva (habitualmente cefalotina o cefazolina) e inmediata cobertura gramnegativa enérgica (ej. amikacina o gentamicina) debido al trauma de alta energía y la desvitalización tisular que facilita un microambiente propicio a bacterias patógenas terrestres.<br><br>Perla ENARM: Se recomienda el siguiente esquema antimicrobiano: Fracturas expuestas III agregar un aminoglucósido (a las cefalosporinas de primera generación).<br><br>Análisis de Distractores: A) Penicilina y doxiciclina es incorrecto; la penicilina es sugerida en trauma agrícola puro para profilaxis antitetánica o anaerobios, pero la base grampositiva del humano debe cubrir Staphylococcus con cefalosporinas. B) Cefalosporina de 3ra generación es incorrecto; el uso único de ceftriaxona desprotege notablemente contra cepas estafilocócicas resistentes cutáneas que colonizan agresivamente en las primeras 6 horas del trauma abierto. C) Vancomicina y metronidazol es incorrecto; esta combinación intrahospitalaria de muy alto espectro es el tratamiento para osteomielitis crónica o intrahospitalaria severa, no un esquema profiláctico temprano de trauma al momento de la admisión.",
    source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento antimicrobiano, Página 22."
  },
  {
    id: 49,
    question: "Se activa el código mater al recibir a una gestante en estado de choque séptico originado por corioamnionitis severa. Al calcular la terapia endovenosa, ¿qué dosis volumétrica de cristaloides exige el protocolo aplicar dentro de las primeras tres horas para optimizar el gasto cardiaco y revertir la hipoxia tisular?",
    options: [
      "10 ml/kg",
      "20 ml/kg",
      "30 ml/kg",
      "40 ml/kg"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de sepsis materna, el embarazo asocia un estatus fisiológico de vasodilatación que se profundiza catastróficamente con la cascada de las citocinas en sepsis. Las nuevas normativas universales y nacionales estipulan una reanimación hídrica asertiva basada en un bolo inicial de cristaloides a razón de 30 mililitros por kilogramo de peso real, el cual debe infundirse a lo largo de las primeras tres horas de sospecha para evitar sobrecargas yugulares.<br><br>Perla ENARM: Manejo inicial (Sepsis materna): Reanimación con soluciones cristaloides (30 ml/kg) en las primeras tres horas.<br><br>Análisis de Distractores: A) 10 ml/kg es incorrecto; es una sub-reanimación peligrosa, catalogada de ineficaz ante una madre con taquicardia refleja que puede enmascarar pérdidas volumétricas masivas a un tercer espacio. B) 20 ml/kg es incorrecto; este margen posológico volumétrico corresponde puntualmente a los niños (en bolos en 20 min) debido a la resiliencia miocárdica pedíatrica; el adulto gestante exige la barrera de 30 ml/kg institucional. D) 40 ml/kg es incorrecto; este nivel representa un riesgo directo latente para desencadenar edema agudo de pulmón iatrogénico (congestión alveolocapilar) por insuficiencia del ventrículo derecho para manejar fluidos desmedidos en corto tiempo.",
    source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Algoritmo 2, Página 25."
  },
  {
    id: 50,
    question: "Tras recibir a un recién nacido producto de un parto fortuito en vía pública de 25 horas de evolución, se sospecha cuadro inminente de sepsis temprana. Además del ampicilina para cobertura de L. monocytogenes, ¿cuál es el segundo antibiótico obligado en el esquema empírico institucional en nuestro país?",
    options: [
      "Amikacina o gentamicina",
      "Cefotaxima o ceftriaxona",
      "Meropenem o imipenem",
      "Vancomicina o teicoplanina"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de sepsis neonatal, los gérmenes invasivos provenientes del canal vaginal materno involucran clásicamente a Streptococcus del grupo B, E. coli y enterobacterias gramnegativas. El tratamiento con antibióticos empíricos de primera fase busca sinergia absoluta: La ampicilina detiene la pared bacteriana permitiendo el ingreso celular letal e inhibición ribosómica bacteriana 30S por parte del aminoglucósido (amikacina o gentamicina) erradicando la colonización temprana sin inducir resistencia secundaria.<br><br>Perla ENARM: Se recomienda iniciar en el RN pretérmino y a término como esquema antibiótico inicial (empírico) para infección neonatal temprana: ampicilina más un aminoglucósido (gentamicina o amikacina).<br><br>Análisis de Distractores: B) Cefotaxima o ceftriaxona es incorrecto; las cefalosporinas de tercera generación en combinación con ampicilina se reservan solo si el paciente presenta datos de alarma focalizados con involucro al sistema nervioso central (sospecha altísima de meningitis neonatal). C) Meropenem o imipenem es incorrecto; los carbapenémicos se consideran rescate de tercer escalón reservados para sepsis nosocomial tardía o unidades de terapia intensiva con gérmenes multirresistentes probados (BLEE). D) Vancomicina o teicoplanina es incorrecto; estos fármacos antidisrruptivos grampositivos se escalan ante la presencia de cultivos positivos de estafilococos en catéteres prolongados de sepsis neonatal \"tardía\", no temprana.",
    source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Tratamiento, Página 76."
  },
  {
    id: 51,
    question: "En la exploración ecográfica transvaginal de una paciente con amenorrea y dolor pélvico persistente, no se encuentra el embrión in utero y hay presencia de masa anexial. Si el equipo médico considera la resolución quirúrgica ante el diagnóstico de embarazo ectópico tubárico por estado inestable o fallo sistémico, ¿qué modalidad terapéutica endovenosa queda directamente contraindicada?",
    options: [
      "Ácido fólico",
      "Danazol",
      "Metotrexato",
      "Misoprostol"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de emergencias obstétricas, el manejo médico sistémico del embarazo ectópico tiene reglas estrictas. El metotrexato, potente antagonista del ácido fólico que detiene la proliferación trofoblástica, está contraindicado y es clínicamente inútil frente a un abdomen agudo con dolor grave o inestabilidad vascular (ectópico roto inminente). En esos escenarios, o cuando se opta por laparotomía, el metotrexato queda suspendido por alta ineficacia en salvar a la paciente del hemoperitoneo.<br><br>Perla ENARM: Diagnóstico y tratamiento inicial de embarazo ectópico roto: Manejo inmediato con laparoscopia/laparotomía sin considerar metotrexato.<br><br>Análisis de Distractores: A) Ácido fólico es incorrecto; su interrupción es secundaria, pero el fármaco citotóxico clave a suspender en la emergencia es el antimetabolito antineoplásico. B) Danazol es incorrecto; se usa para patología androgénica (endometriosis crónica), no tiene indicación alguna en el control de embarazos ectópicos. D) Misoprostol es incorrecto; al ser un análogo de la prostaglandina E1 se emplea para evacuar producto retenido en el interior de la cavidad uterina normal, pero no incide en la viabilidad de un blastocisto anexial en la trompa.",
    source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Algoritmo 1.3, Página 5."
  },
  {
    id: 52,
    question: "Durante el seguimiento anual en consulta pediátrica de un niño en edad preescolar con antecedente de haber cursado con hipoglucemia neonatal transitoria de predominio asintomático en las primeras 48 horas de vida, ¿hacia qué área del crecimiento se orienta el tamizaje para detección y atención oportuna?",
    options: [
      "Crecimiento volumétrico craneal y cierre sutural",
      "Alteraciones endócrinas de la hipófisis",
      "Desarrollo neuropsicológico y rendimiento escolar",
      "Tasa de desarrollo pondo-estatural óseo"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de hipoglucemia neonatal transitoria, el cerebro inmaduro de un bebé durante el período de adaptación neonatal es excepcionalmente dependiente de un suministro constante de glucosa. La neuroglucopenia, incluso cuando inicialmente silente (asintomática), genera pequeños focos cicatriciales de apoptosis neuronal, los cuales clínicamente aflorarán durante la primera infancia e inicio de vida académica manifestándose con déficits cognitivos crónicos o pobre rendimiento intelectual.<br><br>Perla ENARM: Los recién nacidos que presentaron hipoglucemia transitoria sintomática o asintomática deberán tener seguimiento del desarrollo neuropsicológico, en particular del rendimiento escolar durante todo el periodo de crecimiento y desarrollo.<br><br>Análisis de Distractores: A) Crecimiento volumétrico craneal y cierre sutural es incorrecto; es la variable de seguimiento estricta fundamental para recién nacidos egresados después de haber recibido tratamiento para asfixia perinatal (encefalopatía hipóxico-isquémica severa). B) Alteraciones endócrinas de la hipófisis es incorrecto; los infartos hipofisiarios con panhipopituitarismo agudo son un escenario clásico materno secundario a choque hemorrágico (Síndrome de Sheehan), no pediátrico primario a hipoglucemia aislada. D) Tasa de desarrollo pondo-estatural óseo es incorrecto; a pesar de ser monitoreada en cualquier niño sano de manera universal, la meta obligatoria patológica en estos casos es la madurez y cognición del parénquima cerebral, no la función osteogénica periférica.",
    source: "IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Seguimiento, Página 42."
  },
  {
    id: 53,
    question: "Un residente recibe a un masculino que se presenta retorciéndose de dolor en fosa renal irradiado hacia la zona inguinal; él solicita una biometría hemática completa de urgencia. De acuerdo con la pauta de buena práctica para litiasis, ¿cuál es la utilidad clínica real y el grado de indicación oficial de este estudio en este contexto agudo?",
    options: [
      "Detecta leucopenia precoz, pilar del tratamiento antibiótico empírico inmediato",
      "Excluye obstrucción renal y elimina necesidad de estudios de orina",
      "Descarta invariablemente la presencia de un origen de cólico extra-urológico",
      "No debe usarse aisladamente para diferenciar litiasis no complicada de complicada con infección"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, la elevación de glóbulos blancos circulantes en un cólico puede deberse al puro estrés sistémico adrenérgico del dolor extremo e inflamación focal obstructiva. Por ende, la normativa estandariza que el examen hematológico es meramente suplementario y nunca diagnosticará fehacientemente \"urosepsis\" por litiasis complicada sin el pilar fundamental que es el análisis de orina y cultivo confirmatorio para tomar decisiones antimicrobianas.<br><br>Perla ENARM: No se debe utilizar únicamente la biometría hemática para diferenciar la urolitiasis complicada con infección de una litiasis no complicada; se debe de utilizar como un suplemento para la toma de decisiones.<br><br>Análisis de Distractores: A) Detecta leucopenia precoz, pilar del tratamiento antibiótico empírico inmediato es incorrecto; el estrés intenso suele disparar leucocitosis (no leucopenia) reaccional, lo cual es inespecífico y no dictamina instauración urgente empírica sin datos genitourinarios francos. B) Excluye obstrucción renal y elimina necesidad de estudios de orina es incorrecto; un simple análisis serológico es ciego ante la dilatación mecánica retrógrada hidronefrótica calicial detectada solo en ultrasonografía o tomografía. C) Descarta invariablemente la presencia de un origen de cólico extra-urológico es incorrecto; patologías extra-urológicas como apendicitis retrocecal aguda pueden dar también leucocitosis sistémica inespecífica confundiendo el abordaje.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Diagnóstico, Página 46."
  },
  {
    id: 54,
    question: "Tras revisar una tira reactiva positiva en orina obtenida de una mujer en trabajo de parto sospechosa de enfermedad preeclámptica agudizada severa, la ginecóloga sabe que una tira negativa no exime de una determinación de confirmación. Si a nivel institucional no puede solicitarse proteína urinaria en orina de 24 horas y solo en recolecciones cortas, ¿qué examen validado se sugiere realizar?",
    options: [
      "Depuración de creatinina fraccionada en 6 horas",
      "Filtración tubular pasiva mediante nitrógeno ureico",
      "Cociente albúmina/creatinina a las 12 horas",
      "Cociente proteínas/creatinina en una muestra al azar"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de preeclampsia, recolectar 24 horas de orina es inviable y peligroso en escenarios de triaje y progresión acelerada. La filtración macromolecular anormal se demuestra confiablemente analizando una toma de muestra asilada, comparando de forma directa la eliminación global de las proteínas totales con la de un metabolito estable no sujeto a picos hemodinámicos severos.<br><br>Perla ENARM: Cociente proteínas/Creatinina urinaria en una muestra de orina al azar mayo o igual a 0.26.<br><br>Análisis de Distractores: A) Depuración de creatinina fraccionada en 6 horas es incorrecto; no se valida como cribado agudo, y requiere infusión estricta de solutos, consumiendo las críticas horas donde la placenta ya entra en espasmo. B) Filtración tubular pasiva mediante nitrógeno ureico es incorrecto; el BUN evalúa injuria intraparenquimatosa renal generalizada o hipovolemia prerrenal, sin perfilar a la lesión glomerular de podocitos propia del edema preeclámptico. C) Cociente albúmina/creatinina a las 12 horas es incorrecto; este cociente es la perla médica de monitoreo de control general del paciente crónico en enfermedad de Diabetes Mellitus de inicio temprano (microalbuminuria), mas la preeclampsia excreta cadenas grandes (proteínas totales), no solo fraccionamientos puros de albúmina en tiempos reducidos a la mitad.",
    source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en segundo y tercer nivel de atención, 2017, Diagnóstico, Página 54."
  },
  {
    id: 55,
    question: "Al evaluar a un paciente que sufrió accidente laboral cayendo de dos metros y soportando el peso de su cuerpo con su brazo derecho, las radiografías no muestran luxación pero sí un trazo aislado y transversal sin desplazamiento del hueso cubital con una angulación de 6 grados. ¿Qué conducta de manejo clínico dicta la guía que es factible emplear?",
    options: [
      "Colocación de placa de compresión dinámica de 4.5 mm",
      "Manejo conservador con reducción cerrada e inmovilización",
      "Instalación de fijador externo híbrido al olécranon",
      "Reconstrucción articular del codo con prótesis"

    answer: 1,
    justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, cuando la integridad estructural aislada es superior (como un radio intacto sirviendo de pilar nativo natural de soporte) y la angulación pura del cúbito no excede la barrera biomecánica límite de los 10 grados tolerables, se prohíbe exponer al paciente a estrés de placa compresiva abierta, instaurando una consolidación cerrada clásica en adulto con aparato o férula rígida.<br><br>Perla ENARM: Fracturas que pueden recibir manejo conservador (reducción cerrada e inmovilización con férula o yeso): Fracturas no desplazadas de cubito en adultos con angulación menor a 10 grados.<br><br>Análisis de Distractores: A) Colocación de placa de compresión dinámica de 4.5 mm es incorrecto; la cirugía de osteosíntesis con placa de 3.5 mm se exige inminentemente cuando el trazo del adulto es inestable, con fracturas de ambos huesos, expuestas o anguladas con magnitud superior a los 10 grados que deforman la prono-supinación del arco anatómico. C) Instalación de fijador externo híbrido al olécranon es incorrecto; se indica forzosamente en politraumatizados inestables para cirugía control de daños o contaminadas expuestas agresivas (Gustilo II y III). D) Reconstrucción articular del codo con prótesis es incorrecto; el trazo descrito se limita al eje diafisiario central preservando sin lesión o luxación aparente las carillas radiocubitales de la articulación proximal olecraneana.",
    source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Conservador, Página 19."
  },
  {
    id: 56,
    question: "En el abordaje temprano de un paciente adulto crítico ingresado a Terapia Intensiva en sus primeras 24 horas, ¿qué índice o ecuación predictiva validada aconseja la guía clínica implementar para el despistaje de una lesión renal aguda severa inminente?",
    options: [
      "Ecuación matemática de Schwartz modificada",
      "Ecuación CKD-EPI en orina aislada",
      "Índice validado de angina renal",
      "Escala internacional de pRIFLE"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de lesión renal aguda, así como el dolor torácico predice infarto antes del daño bioquímico total y la necrosis visible en un EKG, el concepto pre-funcional de \"angina renal\" clasifica variables estresoras dinámicas (ej. oliguria latente, variaciones crípticas de depuración o toxinas) en la cabecera del paciente intubado en unidad crítica. Al puntuar elevado este índice de cribado estresante se debe asumir prevención hemodinámica masiva mucho antes de la fase terminal dialítica oligúrica.<br><br>Perla ENARM: Se recomienda utilizar el índice de angina renal en la predicción y el diagnóstico temprano de la LRA severa.<br><br>Análisis de Distractores: A) Ecuación matemática de Schwartz modificada es incorrecto; se usa para estimar y ajustar la Tasa de Filtrado Glomerular basándose en la talla e inmadurez fisiológica del parénquima de la población específicamente pediátrica. B) Ecuación CKD-EPI en orina aislada es incorrecto; este cálculo avanzado estandariza grados progresivos de daño filtrante, pero pertenece al paciente asintomático estable en enfermedad crónica renal periférica. D) Escala internacional de pRIFLE es incorrecto; la modificación de RIFLE (Risk, Injury, Failure, Loss, ESRD) pediátrica no engloba parámetros de predicción presintomática inmediata sino estadificación fisiológica ya manifestada.",
    source: "SS-231-18, Prevención, diagnóstico y tratamiento de la Lesión Renal Aguda, 2018, Diagnóstico temprano, Página 74."
  },
  {
    id: 57,
    question: "Una paciente con atonía uterina ingresa a quirófano y desarrolla un paro cardiorrespiratorio masivo, la hemorragia es incontenible cuantificando más de 5500 ml perdidos y requiere transfusiones constantes. Ante este escenario, ¿cuál debe ser la estrategia obligatoria para preservar la vida materna posponiendo todo acto de reparación completa e iterativa?",
    options: [
      "Intervención histeroscópica ambulatoria para debridamiento y electrocoagulación",
      "Procedimiento radical de histerectomía total anatómica",
      "Institución forzosa de cirugía de control de daños",
      "Angioembolización selectiva en sala de radiología intervencionista"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de cirugía de control de daños e indicadores obstétricos, cuando un paciente quirúrgico traumatizado o con evento obstétrico agudo presenta un colapso hemodinámico letal objetivado como pérdida estimada de sangre mayor a 5 litros, la acidosis grave, el enfriamiento celular y la falla plaquetaria paralizan todo beneficio de la cirugía anatómica reparadora. Abandonar la anatomía para aplicar control de daños (empaquetamiento compresivo transitorio y estabilización en terapia intensiva) es el estándar universal salvavidas para detener la \"tríada letal\".<br><br>Perla ENARM: Indicadores fisiológicos transoperatorios para instituir CCD: Pérdida estimada de sangre > 5000 ml.<br><br>Análisis de Distractores: A) Intervención histeroscópica ambulatoria para debridamiento y electrocoagulación es incorrecto; el endoscopio uterino a través de la vagina es inviable e ineficaz para un abdomen agudo bañado en 5 litros de sangrado activo franco con paro inminente vascular. B) Procedimiento radical de histerectomía total anatómica es incorrecto; disecar pedículos y tejidos pélvicos anatómicamente invierte tiempo invaluable en hemostasias delicadas que fracasarán porque los hilos no sujetan tejido edematoso sin factores de coagulación activados. D) Angioembolización selectiva en sala de radiología intervencionista es incorrecto; exige tener a un paciente hemodinámicamente tolerante que aguante ser movilizado por pasillos sin riesgo a que su circulación colapse bajo el equipo portátil vascular, proscrito en un sangrado de más de 5000ml en evolución activa aguda.",
    source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Indicadores fisiológicos transoperatorios, Página 62."
  },
  {
    id: 58,
    question: "Una mujer es llevada al centro de salud de la comunidad rural reportando sangrado profuso a una hora de su parto en casa por partera no certificada, cursando con clínica de hipoperfusión. En espera del traslado tardío en ambulancia terrestre, ¿cuál de las siguientes opciones constituye la maniobra de supervivencia recomendada y validada en su nivel de contención primaria de acuerdo a la GPC?",
    options: [
      "Instauración rápida de un clampaje profiláctico aórtico transcutáneo local",
      "Colocación de traje o pantalón antichoque no neumático",
      "Cierre oclusivo de labios mayores y maniobra de Hamilton",
      "Ligadura quirúrgica abierta de las venas iliacas primitivas"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de hemorragia postparto, cuando un escenario obstétrico de primer nivel rural carece de recursos como derivados o cirugía, el uso estratégico del Traje Antichoque No Neumático (TAN) ha comprobado estabilizar eficientemente a la madre. Su compresión circunferencial graduada ascendente del lecho esplácnico y pélvico inferior autotransfunde selectivamente el volumen vascular periférico hacia los núcleos vitales (corazón/cerebro) comprando hasta 48 horas valiosas para concretar traslados o cirugías referidas mayores.<br><br>Perla ENARM: Se sugiere el uso de pantalón antichoque no neumático como medida temporal en caso de HPP para traslado de paciente a unidad con mayor capacidad de resolución.<br><br>Análisis de Distractores: A) Instauración rápida de un clampaje profiláctico aórtico transcutáneo local es incorrecto; el dispositivo de compresión aórtica externo existe (ej. balón endovascular REBOA o manual rústico), pero el estándar profiláctico integral dictaminado para la movilización prehospitalaria inicial de sangrado pélvico es el traje de neopreno. C) Cierre oclusivo de labios mayores y maniobra de Hamilton es incorrecto; la retención del charco de sangre oculto en la cavidad vaginal (empaquetamiento mal hecho) desestima la cuantificación objetiva de las pérdidas, y Hamilton se usa para inducción del parto raspando membranas, no en sangrados masivos. D) Ligadura quirúrgica abierta de las venas iliacas primitivas es incorrecto; el abordaje laparotómico de un sistema venoso central profundo exige habilidad subespecializada supra-institucional en quirofanos nivel III y desvía el protocolo conservador temporal apegado al Triage.",
    source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento Quirúrgico, Página 17."
  },
  {
    id: 59,
    question: "Un paciente del área rural presenta el primer episodio agudo de retención litiásica sin complicaciones infecciosas en un centro general sin laboratorios, el médico sospecha cólico renoureteral unilateral y prescribe infusión rápida de abundantes litros de solución fisiológica pensando en forzar el paso del lito por volumen o flujo de lavado. ¿Qué directriz específica emite la GPC mexicana en cuanto a esta praxis muy difundida?",
    options: [
      "Es el pilar fundamental que acelera el tiempo de expulsión sin fármacos coadyuvantes",
      "Se recomienda administrar hasta un máximo estricto de 2 litros endovenosos para hidratación",
      "Constituye una mala práctica formalmente contraindicada porque eleva agudamente la presión pélvica de la unidad renal",
      "Disminuye considerablemente el umbral del cólico frente a terapia antiinflamatoria sin efecto adverso"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, la \"hidratación agresiva\" (hidroterapia forzada intermitente intravenosa u oral) se pensaba históricamente que \"empujaba\" físicamente el cálculo. No obstante, en un sistema de conducto tubular ya impactado, exacerbar diuresis súbita sobrecarga al riñón distendiendo dramáticamente el uréter y la cápsula renal sin poder drenar por la litiasis impactada, exacerbando severamente el dolor cólico y el daño al nefrón silente por presión intrapielocalicial en cascada patológica retrógrada.<br><br>Perla ENARM: Los pacientes con cólico renoureteral no deben ser manejados con terapia de líquidos o soluciones de alto volumen.<br><br>Análisis de Distractores: A) Es el pilar fundamental que acelera el tiempo de expulsión sin fármacos coadyuvantes es incorrecto; este enunciado falso refuta la verdadera base de evidencia clínica mexicana universal de protección renal por reposo que prohíbe las sobrecargas. B) Se recomienda administrar hasta un máximo estricto de 2 litros endovenosos para hidratación es incorrecto; la normativa no recomienda ninguna reanimación base mayor al requerimiento basal que reemplace pérdidas si no hay choque ni hipotensión, dictaminando prohibición directa de cualquier terapia en bolo masiva de \"lavado\" o de alto volumen agudo. D) Disminuye considerablemente el umbral del cólico frente a terapia antiinflamatoria sin efecto adverso es incorrecto; este volumen hídrico distiende el sistema hidronefrótico multiplicando severa y agudamente el dolor originado del espasmo isquémico intrarrenal u obstrucción focal.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Tratamiento, Página 48."
  },
  {
    id: 60,
    question: "En un neonato pretérmino extubado que desarrolló un evento agudo de infección temprana y choque séptico refractario a los inotrópicos con insuficiencia de las catecolaminas para levantar la presión sistólica, el intensivista considera la insuficiencia suprarrenal absoluta pediátrica secundaria y decide uso de corticoesteroide coadyuvante. ¿Qué medicamento es el considerado de elección para esta etapa agónica?",
    options: [
      "Beclometasona inhalada o Dexametasona sistémica 2 mg/kg",
      "Fludrocortisona transdérmica a requerimiento de bomba celular",
      "Hidrocortisona a dosis de estrés de 50 mg/m²sc/día",
      "Betametasona a dosis repetida única o pauta profiláctica respiratoria"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de sepsis pediátrica/neonatal, la glándula suprarrenal virgen o en fase inmadura del pretérmino sometido al \"huracán séptico\" puede sufrir hemorragias o infartos subyacentes causando un déficit absoluto de secreción de cortisol nativo impidiendo al miocardio o a la vasorreactividad vascular responder ante catecolaminas inyectadas por vías periféricas. Para reactivar receptores adrenérgicos y proveer rescate glucocorticoideo de emergencia vital estresora se reserva la dosis exógena pura de hidrocortisona por kilo o superficie corporal al día.<br><br>Perla ENARM: Se sugiere hidrocortisona a dosis de estrés (50mg/m2sc/día) únicamente en niños con choque séptico resistente a catecolaminas, en riesgo o diagnóstico de insuficiencia suprarrenal absoluta.<br><br>Análisis de Distractores: A) Beclometasona inhalada o Dexametasona sistémica 2 mg/kg es incorrecto; corticoides de vía inhalatoria resuelven procesos inflamatorios obstructivos crónicos locales (ej. displasia broncopulmonar leve y temprana en estabilización), no colapsos macrodinámicos mortales, y dexametasona no provee mineralocorticoides óptimos. B) Fludrocortisona transdérmica a requerimiento de bomba celular es incorrecto; es un mineralocorticoide puro sin actividad central de estrés de primera respuesta requerida ante un estado deficiente multisistémico. D) Betametasona a dosis repetida única o pauta profiláctica respiratoria es incorrecto; se administra primariamente a la madre en la ventana preparto para inducción pulmonar surfactante fisiológica fetal (esquema de maduración), no funciona agudamente para choque hemodinámico refractario postnatal de horas.",
    source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Otras intervenciones, Página 79."
  },
  {
    id: 61,
    question: "Durante la laparotomía de urgencia en una paciente con hemorragia postparto persistente asociada a coagulopatía secundaria mixta de consumo, el control vascular primario falla. ¿Qué técnica quirúrgica mecánica de compresión pélvica está indicada como recurso hemostático de acuerdo a la GPC?",
    options: [
      "Empaquetamiento tipo B-Lynch",
      "Empaquetamiento tipo Mickulicz",
      "Empaquetamiento de Bakri",
      "Empaquetamiento tipo Posadas"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de hemorragia postparto, el agotamiento de los factores de la cascada de coagulación impide la efectividad de las suturas compresivas tisulares o ligaduras vasculares. Cuando existe una hemorragia en \"capa\" diseminada por coagulopatía dilucional, se requiere instituir una compresión extrínseca masiva de las superficies sangrantes contra las paredes óseas, lográndose eficazmente con lienzos quirúrgicos a través de la técnica de Mickulicz antes de trasladar a cuidados intensivos.<br><br>Perla ENARM: Se sugiere el empaquetamiento abdomino-pélvico (tipo Mickulicz) en pacientes con HPP persistente que se asocia a coagulopatía secundaria mixta (dilucional y por consumo).<br><br>Análisis de Distractores: A) Empaquetamiento tipo B-Lynch es incorrecto; B-Lynch es una sutura compresiva miometrial hemostática (no un empaquetamiento con compresas) útil en atonía uterina antes del desarrollo de coagulopatía severa. C) Empaquetamiento de Bakri es incorrecto; el balón de Bakri efectúa taponamiento hidrostático intrauterino (vía vaginal), inútil para una hemorragia de cavidad abdominal originada por coagulopatía abierta. D) Empaquetamiento tipo Posadas es incorrecto; la técnica de Posadas refiere a la desarterialización (ligadura) de las ramas uterinas posteriores, no a una técnica de empaquetamiento pélvico con textiles.",
    source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento Quirúrgico, Página 28."
  },
  {
    id: 62,
    question: "Al evaluar el riesgo tromboembólico en el puerperio de una paciente hospitalizada para determinar el plan de alta, ¿cuál es el puntaje mínimo en la escala de estratificación validada que establece la indicación de tromboprofilaxis con heparina por al menos 10 días?",
    options: [
      "Mayor o igual a 2 puntos",
      "Mayor o igual a 3 puntos",
      "Mayor o igual a 4 puntos",
      "Mayor o igual a 1 punto"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica, los cambios fisiológicos de hipercoagulabilidad persisten en las semanas subsecuentes al alumbramiento. Sumar variables clínicas y obstétricas (ej. edad mayor a 35, obesidad, inmovilidad o infección sistémica) permite identificar el riesgo puerperal temprano. Sumar 2 puntos en el periodo postnatal exige iniciar indefectiblemente el soporte profiláctico subcutáneo por una ventana mínima de 10 días.<br><br>Perla ENARM: Si el puntaje es ≥ 2 postnatal, tromboprofilaxis por al menos 10 días.<br><br>Análisis de Distractores: B) Mayor o igual a 3 puntos es incorrecto; aunque 3 puntos ameritan intervención indudable, el umbral de corte límite estricto establecido para comenzar acciones en el puerperio es desde los 2 puntos. C) Mayor o igual a 4 puntos es incorrecto; este puntaje aplica como umbral absoluto pero durante la etapa \"prenatal\" (embarazo) para instaurar protección anticoagulante desde el primer trimestre. D) Mayor o igual a 1 punto es incorrecto; la presencia de un factor de riesgo menor aislado (1 punto) se vigila clínicamente y con deambulación temprana, sin exponer innecesariamente al riesgo de sangrado de las heparinas.",
    source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Cuadro 3, Página 14."
  },
  {
    id: 63,
    question: "Posterior a una cirugía de sustitución artroscópica del ligamento cruzado anterior de la rodilla, ¿a las cuántas semanas del postoperatorio recomienda la normatividad iniciar con el programa formal de rehabilitación funcional?",
    options: [
      "A las 2 semanas",
      "A las 6 semanas",
      "A las 4 semanas",
      "A las 8 semanas"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de lesiones ligamentarias, el neoligamento implantado sufre un periodo inicial de revascularización y \"ligamentización\" crítico donde sus fijaciones óseas (túneles) son biomecánicamente inestables. Forzar rangos de movilidad o carga temprana arriesga el aflojamiento del injerto, por lo que la fisioterapia activa y progresiva debe retrasarse e iniciar de manera protocolizada hasta la cuarta semana de cicatrización local.<br><br>Perla ENARM: Se recomienda en el postoperatorio a las 4 semanas: Iniciar con el programa de rehabilitación en pacientes operados de sustitución del LCA.<br><br>Análisis de Distractores: A) A las 2 semanas es incorrecto; la movilidad pasiva asistida muy leve puede permitirse, pero el \"programa de rehabilitación\" formal está contraindicado por altísima tasa de ruptura o elongación del injerto. B) A las 6 semanas es incorrecto; esperar más del mes fomenta fuertemente la rigidez articular, fibrosis del tejido periarticular y atrofia severa e irreversible del cuádriceps ipsilateral. D) A las 8 semanas es incorrecto; la inmovilidad prolongada de la articulación produce acortamiento adaptativo del tendón rotuliano, prolongando la discapacidad laboral sin justificación biológica.",
    source: "IMSS-388-10, Diagnóstico y tratamiento de las lesiones ligamentarias, 2010, Tratamiento de Rehabilitación, Página 15."
  },
  {
    id: 64,
    question: "Un paciente masculino presenta un cálculo piélico de 2.5 centímetros cúbicos de volumen. La vía excretora y la función renal se reportan normales. De acuerdo a la clasificación clínica de litiasis, ¿qué tratamiento inicial está estandarizado para este cuadro Tipo I?",
    options: [
      "Nefrolitotomía percutánea",
      "Colocación de catéter doble J",
      "Extracción endoscópica ureteral",
      "Litotricia extracorpórea con ondas"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, la estratificación clínica divide la conducta terapéutica en base a la masa del cálculo y la anatomía renal. El \"Tipo I\" agrupa litos pequeños o medianos (menores a 3 cc) con riñones morfológicamente sanos, convirtiéndolos en candidatos biológicos ideales para la fragmentación no invasiva a través de ondas de choque acústicas (LEOC) para su subsecuente expulsión fisiológica natural.<br><br>Perla ENARM: Clasificación clínica Tipo I: Cálculos piélicos o caliciales menores de 2.6-3 cc vía excretora y función renal normal. Tratamiento: LEOC (litotricia extracorpórea con ondas de choque).<br><br>Análisis de Distractores: A) Nefrolitotomía percutánea es incorrecto; este abordaje quirúrgico intraparenquimatoso se reserva como primera elección en el manejo de litiasis masiva Tipo III o coraliformes completos (Tipo IV) que rebasan los 3 a 7 cc. B) Colocación de catéter doble J es incorrecto; derivar la vía urinaria es un adyuvante indispensable si hay urosepsis o dilatación obstructiva grave previa a LEOC (Tipo II o III), pero no es el tratamiento destructivo per se del lito. C) Extracción endoscópica ureteral es incorrecto; la ureteroscopia flexible es el tratamiento de elección para cálculos impactados en el tercio distal o medio del uréter, no para masas flotantes dentro del cáliz o pelvis renal (piélicos).",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Cuadro 4, Página 18."
  },
  {
    id: 65,
    question: "En la valoración inicial de triage para pacientes con heridas abdominales penetrantes por proyectil de arma de fuego, ¿qué situación organizativa externa al paciente es un indicador técnico preoperatorio válido para planificar una cirugía de control de daños y evitar reconstrucciones definitivas?",
    options: [
      "Arribo masivo de víctimas",
      "Ausencia de cirujano vascular",
      "Fallo del equipo de laparoscopia",
      "Carencia temporal de hemoderivados"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de cirugía de control de daños, el abordaje abreviado salva la vida del herido grave, pero también protege los recursos limitados del centro de trauma. Frente a un escenario de desastre con \"arribo masivo de víctimas\", emplear 4 horas en una reconstrucción intestinal compleja de un solo paciente condena a muerte por exanguinación en sala de espera a otros lesionados. Empaquetar y derivar permite liberar quirófanos ágilmente.<br><br>Perla ENARM: Indicadores objetivos técnicos preoperatorios para instituir la CCD: Arribo masivo de víctimas.<br><br>Análisis de Distractores: B) Ausencia de cirujano vascular es incorrecto; el cirujano general de trauma capacitado debe realizar derivaciones o ligaduras de emergencia sin requerir al subespecialista; esto no es criterio normativo para abandonar la cirugía y empaquetar si el paciente está estable. C) Fallo del equipo de laparoscopia es incorrecto; toda herida por arma de fuego abdominal inestable requiere primariamente laparotomía exploradora abierta y amplia, haciendo irrelevante la torre de invasión mínima. D) Carencia temporal de hemoderivados es incorrecto; no es un indicador técnico normado. La falta de sangre es una falla del sistema crítico, pero el parámetro fisiológico evaluado en cirugía es el consumo mayor a 3,000 ml en el paciente, no el stock del banco.",
    source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Algoritmo, Página 22."
  },
  {
    id: 66,
    question: "En el seguimiento neurológico de un paciente pediátrico con lesión obstétrica del plexo braquial, ¿a partir de qué edad cronológica es obligatorio derivar a tratamiento quirúrgico si persiste la ausencia total de la función muscular del bíceps, tríceps o deltoides?",
    options: [
      "A los 6 meses",
      "A los 3 meses",
      "A los 9 meses",
      "A los 12 meses"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de lesión de plexo braquial, la recuperación espontánea de los axones neuropraxiados ocurre en los primeros 90 días de vida. Si a los 3 meses existe parálisis flácida total en el territorio de C5, C6 y C7 (sin contracción de deltoides, tríceps ni bíceps), se asume clínicamente que el nervio presenta axonotmesis severa o avulsión radicular completa y la microcirugía injertiva es urgente antes de la degeneración irreversible de la placa motora.<br><br>Perla ENARM: Se debe derivar a tratamiento quirúrgico a todo paciente mayor o igual a 3 meses de edad con ausencia de función muscular de deltoides, tríceps o bíceps.<br><br>Análisis de Distractores: A) A los 6 meses es incorrecto; aplazar la derivación disminuye la tasa de éxito de neurotización quirúrgica y permite contracturas estructurales irreductibles y deformidades articulares. C) A los 9 meses es incorrecto; en esta etapa, el daño a la inervación de la extremidad es permanente y se ha perdido la ventana de neuroplasticidad periférica temprana. D) A los 12 meses es incorrecto; un año de inactividad denervatoria atrofia la miofibrilla sustituyéndola por grasa, haciendo que incluso un injerto exitoso no logre recuperar el brazo paralítico.",
    source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Criterios de Referencia Quirúrgica, Página 4."
  },
  {
    id: 67,
    question: "En el monitoreo continuo de signos vitales de un recién nacido a término de 40 semanas de gestación ingresado a cuidados intensivos, ¿cuál es el rango fisiológico esperado de la presión arterial media (PAM) estipulado en la guía?",
    options: [
      "Entre 60 y 80 mmHg",
      "Entre 40 y 60 mmHg",
      "Entre 30 y 50 mmHg",
      "Entre 50 y 70 mmHg"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, el neonato a término posee una red vascular periférica y adaptativa distinta al prematuro. La parametrización normativa establece que a las 40 semanas cronológicas, el ventrículo izquierdo maneja presiones mayores para vencer el cierre ductal y resistencias sistémicas crecientes, estandarizando su rango vital y meta de normotensión en un margen de presión arterial media de 60 a 80 mmHg.<br><br>Perla ENARM: Parámetros normales: Semana 40: PAM 60 a 80 mmHg.<br><br>Análisis de Distractores: B) Entre 40 y 60 mmHg es incorrecto; este rango tensional inferior es aplicable y esperado únicamente para neonatos pretérmino de entre 30 y 34 semanas de gestación. C) Entre 30 y 50 mmHg es incorrecto; una presión arterial media tan baja en un neonato a término es diagnóstico absoluto e inequívoco de estado de choque descompensado profundo. D) Entre 50 y 70 mmHg es incorrecto; aunque se superpone levemente, representa primariamente los niveles meta requeridos en las etapas prematuras tardías o limítrofes, no las de madurez funcional cardiaca de las 40 a 44 semanas.",
    source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido, 2021, Anexo Semana 40, Página 11."
  },
  {
    id: 68,
    question: "De acuerdo a los criterios unificados del Síndrome de Respuesta Inflamatoria Sistémica (SRIS) pediátrico, ¿qué signos pivote exige la normatividad clínica de manera indispensable (al menos uno de ellos) para sustentar el diagnóstico ante sospecha de sepsis?",
    options: [
      "Hipotensión refractaria o taquicardia",
      "Alteración del estado mental o llenado capilar",
      "Temperatura anormal o cuenta leucocitaria alterada",
      "Elevación de procalcitonina o proteína C reactiva"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de sepsis pediátrica, el diagnóstico de SRIS en el niño requiere estricta rigurosidad para no sobretratar virosis triviales. La condición sine qua non es la demostración objetiva de disregulación central sistémica (Temperatura >38.5 °C o <36 °C) o en su defecto, disfunción en la producción hemática medular (leucocitosis o leucopenia anormal para la edad). Debe sumarse a la taquicardia o taquipnea, pero jamás puede diagnosticarse solo con signos vitales dinámicos.<br><br>Perla ENARM: Síndrome de Respuesta Inflamatoria Sistémica (SRIS): Presencia de Temperatura anormal ó cuenta leucocitaria alterada mas uno de cuatro de los siguientes criterios.<br><br>Análisis de Distractores: A) Hipotensión refractaria o taquicardia es incorrecto; la hipotensión es un signo inminente de choque séptico descompensado, pero no forma parte del criterio inicial base inflamatorio, y la taquicardia por sí sola puede deberse al llanto o miedo en el preescolar. B) Alteración del estado mental o llenado capilar es incorrecto; representan criterios clínicos de hipoperfusión tisular o choque compensado, valiosos en el algoritmo de gravedad, pero no definitorios básicos de SRIS temprano. D) Elevación de procalcitonina o proteína C reactiva es incorrecto; los reactantes de fase aguda laboratoriales apoyan fuertemente la etiología bacteriana del cuadro, pero no integran el puntaje validado internacional para encuadrar SRIS normativo.",
    source: "SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad, 2017, Cuadro 4, Página 33."
  },
  {
    id: 69,
    question: "Dentro de las intervenciones protocolarias inmediatas durante el puerperio para prevenir y diagnosticar el origen retentivo de una hemorragia postparto, ¿qué procedimiento de inspección visual debe realizarse de forma rutinaria y exhaustiva tras el alumbramiento?",
    options: [
      "Medición volumétrica del cordón umbilical",
      "Tinción de membranas corioamnióticas",
      "Pesaje de los cotiledones aislados",
      "Examen de integridad de la placenta"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de hemorragia postparto, la hemorragia originada por retención de restos frena la capacidad contráctil total del miometrio, evitando el cierre de las ligaduras vivas de Pinard. El reconocimiento macroscópico directo de los surcos cotiledonarios, buscando la ausencia de lóbulo placentario rasgado o bordes incompletos, determina la necesidad inmediata de exploración y legrado digital instrumentado de la cavidad para frenar la exanguinación materna.<br><br>Perla ENARM: Se sugiere realizar examen de integridad de la placenta de forma protocolaria como prevención y vigilancia de la hemorragia postparto (ver Figura 4. Examen de integridad de la placenta).<br><br>Análisis de Distractores: A) Medición volumétrica del cordón umbilical es incorrecto; solo se evalúa la presencia de 2 arterias y 1 vena para descartar anomalías urológicas fetales, pero carece de importancia clínica para el control del choque puerperal materno. B) Tinción de membranas corioamnióticas es incorrecto; las tinciones histológicas se solicitan de forma diferida en el departamento de patología ante sospecha de corioamnionitis severa post-ómito, no en la sala tocoquirúrgica. C) Pesaje de los cotiledones aislados es incorrecto; aunque el peso de la torta placentaria en conjunto da idea clínica del trofismo o edema general, no dictamina de manera aguda la retención de membranas o tejido causantes del sangrado.",
    source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Figura 4, Página 30."
  },
  {
