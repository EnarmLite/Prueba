<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

    <div id="app-container" class="relative h-full lg:flex">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 w-80 p-5 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out z-30 shadow-[4px_0_24px_rgba(0,0,0,0.05)] border-r border-slate-200 dark:border-slate-800">
            
            <div class="flex justify-center mb-6 pt-2">
                <div class="flex items-baseline gap-1 bg-slate-50 dark:bg-slate-800 px-4 py-1.5 rounded-full border border-slate-200 dark:border-slate-700">
                    <span class="logo-enarm text-base">ENARM</span>
                    <span class="logo-Lite text-sm">Lite<sup>®</sup></span>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto min-h-0 custom-scrollbar pr-1">
                <div class="mb-4 relative">
                    <input type="text" id="module-search" placeholder="Buscar número o texto..." class="w-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-lg py-2 pl-3 pr-10 focus:outline-none focus:ring-2 focus:ring-pink-500 transition-colors text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 absolute right-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>

                <div id="sidebar-q-grid" class="grid grid-cols-[repeat(auto-fill,minmax(40px,1fr))] gap-2 p-2"></div>
            </div>
            
            <div class="pt-4 border-t border-slate-200 dark:border-slate-800 mt-2 space-y-3">
                <button id="dark-mode-toggle" class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 font-semibold py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema
                </button>

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Reiniciar Simulador
                </button>
            </div>
        </aside>

        <main id="main-content" class="flex-1 h-[100dvh] overflow-y-auto overscroll-y-contain p-4 sm:p-6 lg:p-8 transition-all duration-300 relative bg-slate-50 dark:bg-slate-950">
            
            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-pink-600 dark:hover:text-pink-400 transition-all duration-300" title="Ver Tablero General">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </button>

            <button id="menu-toggle" class="hidden fixed top-4 right-4 lg:right-8 bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-pink-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
            </button>

            <div id="progress-container" class="hidden w-full max-w-4xl mx-auto bg-slate-200 dark:bg-slate-700 rounded-full mb-4 mt-0 h-6 shadow-inner overflow-hidden relative">
                <div id="progress-bar" class="bg-gradient-to-r from-pink-500 to-rose-500 h-full transition-all duration-500 flex items-center justify-center text-[11px] font-bold text-white leading-none relative z-10" style="width:0%">0%</div>
            </div>
            
            <div id="module-display" class="transition-opacity duration-300 pb-12"></div>
        </main>
        
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-20 backdrop-blur-sm"></div>
    </div>
    
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará todo tu progreso y calificación. ¿Deseas empezar desde cero?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán tus respuestas y no podrás modificarlas después.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "En un recién nacido con antecedente de lesión obstétrica del plexo braquial, ¿a qué edad cronológica se recomienda realizar el estudio de electromiografía de seguimiento para establecer el pronóstico de recuperación?",
        options: ["3 y 6 meses", "1 y 2 meses", "6 y 12 meses", "9 y 18 meses"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de lesión de plexo braquial, el seguimiento electromiográfico es fundamental para evaluar la regeneración del nervio periférico tras el trauma obstétrico. La reevaluación a los 3 y 6 meses permite identificar de manera objetiva los patrones de reinervación, diferenciando un bloqueo temporal fisiológico (neuropraxia) de un daño estructural mayor (axonotmesis o neurotmesis) que limite la funcionalidad motora y requiera intervención avanzada.<br><br>Perla ENARM: Se recomienda realizar EMG de seguimiento a los 3 y 6 meses con la finalidad de identificar la evolución de los patrones electromiográficos, debido a que puedes ser de ayuda para establecer un pronóstico.<br><br>Análisis de Distractores: B) 1 y 2 meses es incorrecto; aunque la electroneuromiografía diagnóstica inicial se indica de los 7 días a las 4 semanas, el seguimiento pronóstico se realiza más adelante. C) 6 y 12 meses es incorrecto; esperar 12 meses retrasa de forma inaceptable las decisiones terapéuticas y quirúrgicas si la reinervación no ocurre. D) 9 y 18 meses es incorrecto; este intervalo supera las ventanas de plasticidad y reparación nerviosa crítica para establecer un pronóstico funcional temprano.",
        source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Diagnóstico, Página 4."
    },
    {
        id: 2,
        question: "En una paciente que desarrolla choque hipovolémico severo por hemorragia obstétrica, ¿cuál es la relación de transfusión recomendada de concentrados eritrocitarios, plasma fresco congelado y plaquetas dentro del protocolo de reanimación masiva?",
        options: ["1:1:1", "2:1:1", "2:2:1", "1:2:1"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de choque hemorrágico obstétrico, la terapia de reemplazo sanguíneo agresiva es crucial frente a pérdidas masivas. Una estrategia de reanimación controlada con una proporción de 2 unidades de concentrados eritrocitarios, 1 unidad de plasma fresco congelado y 1 unidad de concentrado plaquetario (1:1:2 en orden inverso plaquetas:plasma:eritrocitos) busca restituir la capacidad de transporte de oxígeno simultáneamente con la prevención y manejo directo de la coagulopatía dilucional y de consumo.<br><br>Perla ENARM: Los concentrados plaquetarios, plasma fresco congelado y concentrados eritrocitarios deben ser parte de la reanimación en las pacientes con choque hipovolémico severo guardando una relación de una unidad de concentrado de plaquetas, por una unidad de plasma fresco congelado y 2 unidades de concentrados eritrocitarios como parte del protocolo de transfusión masiva (1:1:2).<br><br>Análisis de Distractores: A) 1:1:1 es incorrecto; es un esquema de transfusión utilizado rutinariamente en trauma civil y militar general, pero la guía obstétrica mexicana estandariza la proporción 2:1:1 para este escenario. C) 2:2:1 es incorrecto; esta proporción sobrecarga inútilmente el volumen intravascular con plasma y no es la estandarizada en la normatividad. D) 1:2:1 es incorrecto; no garantiza el incremento primario de hemoglobina que requiere la reanimación con hipoxia tisular severa.",
        source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Tratamiento, Página 31."
    },
    {
        id: 3,
        question: "En el abordaje de una gestante durante la segunda mitad del embarazo, ¿cuál es el criterio clínico preciso de tensión arterial y tiempo para confirmar el diagnóstico de crisis hipertensiva?",
        options: ["≥140/90 mmHg por 10 minutos", "≥150/100 mmHg por 30 minutos", "≥160/110 mmHg por 15 minutos", "≥180/120 mmHg por 20 minutos"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de emergencias obstétricas, el diagnóstico de crisis hipertensiva se define con absoluta precisión cronológica y tensional para evitar el riesgo inminente de evento vascular cerebral hemorrágico materno. Estas cifras exigen inicio de antihipertensivos parenterales o de acción rápida de manera inmediata, puesto que representan una urgencia letal para el binomio.<br><br>Perla ENARM: En mujeres gestantes o puérperas, se recomienda establecer el diagnóstico de crisis hipertensiva ante la presencia de 2 cifras tensionales iguales o mayores de 160/110 mmHg en un lapso igual o mayor a 15 minutos.<br><br>Análisis de Distractores: A) ≥140/90 mmHg por 10 minutos es incorrecto; estas cifras corresponden a hipertensión gestacional o preeclampsia sin datos de severidad, no a una crisis. B) ≥150/100 mmHg por 30 minutos es incorrecto; subestima el punto de corte sistólico y diastólico que tipifica el riesgo inminente de daño orgánico vascular. D) ≥180/120 mmHg por 20 minutos es incorrecto; aunque estas cifras son una emergencia hipertensiva indudable en el adulto no gestante, en el contexto obstétrico el umbral de crisis es mucho menor (160/110 mmHg).",
        source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Crisis hipertensiva en el embarazo, Página 10."
    },
    {
        id: 4,
        question: "¿Cuál es la dosis y vía de administración recomendada de la carbetocina para la prevención profiláctica de la hemorragia posparto durante el nacimiento por cesárea?",
        options: ["10 microgramos intravenosos", "25 microgramos intravenosos", "50 microgramos intravenosos", "100 microgramos intravenosos"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la carbetocina es un agonista sintético de acción prolongada de la oxitocina, el cual favorece la contractilidad uterina sostenida con una sola dosis. Es superior en vida media y previene la atonía uterina disminuyendo la necesidad de administrar uterotónicos adicionales o realizar masajes uterinos repetidos, siendo de alta recomendación en nacimientos abdominales.<br><br>Perla ENARM: Carbetocina 100 microgramos vía intravenosa lenta (recomendada en cesárea).<br><br>Análisis de Distractores: A) 10 microgramos intravenosos es incorrecto; corresponde habitualmente a la indicación y dosis posológica en UI de la oxitocina (10 UI). B) 25 microgramos intravenosos es incorrecto; esta dosificación subóptima no desencadena el efecto tónico requerido sobre los receptores uterinos. C) 50 microgramos intravenosos es incorrecto; es la mitad de la dosis farmacológica estandarizada universalmente para lograr una hemostasia por contracción efectiva.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadros (Cuadro 1), Página 21."
    },
    {
        id: 5,
        question: "En un neonato que presenta estado de choque catalogado como \"frío\", el cual persiste refractario a la administración de líquidos y dosis tope de dopamina, ¿cuál es el agente inotrópico de primera elección a instaurar?",
        options: ["Epinefrina", "Norepinefrina", "Milrinona", "Vasopresina"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de sepsis neonatal, el choque \"frío\" se caracteriza por bajo gasto cardíaco y altas resistencias vasculares sistémicas (clínicamente: pulsos débiles y llenado capilar prolongado). Cuando la dopamina falla, la epinefrina es el vasoactivo-inotrópico ideal ya que sus potentes efectos beta-1 y alfa-1 incrementan drásticamente el volumen latido y el tono inotrópico para vencer el choque refractario.<br><br>Perla ENARM: Choque frío: Primera elección: Iniciar con infusión de Epinefrina (Adrenalina) 0.05-0.3 mcg/kg/min.<br><br>Análisis de Distractores: B) Norepinefrina es incorrecto; es el vasopresor de primera elección para el choque neonatal tipo \"caliente\" (vasodilatado, pulsos saltones, llenado capilar corto). C) Milrinona es incorrecto; es un inodilatador que se reserva para cuadros con disfunción miocárdica probada o hipertensión pulmonar en fases más avanzadas. D) Vasopresina es incorrecto; se usa como rescate extremo en choque vasodilatado refractario a catecolaminas, no en choque frío primario.",
        source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Diagrama 1, Página 139."
    },
    {
        id: 6,
        question: "¿Cuál es el estudio de gabinete diagnóstico inicial de elección ante una paciente obstétrica con factores de riesgo que presenta clínica sospechosa de trombosis venosa profunda?",
        options: ["Resonancia magnética", "Ultrasonido con compresión", "Pletismografía de impedancia", "Venografía contrastada"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica venosa, el abordaje diagnóstico de la TVP durante el embarazo exige un estudio no invasivo, con alta sensibilidad y libre de radiación ionizante. La incapacidad de colapsar la vena venosa profunda a la compresión con el transductor ecográfico es el signo patognomónico directo y el estándar de oro inicial para la patología.<br><br>Perla ENARM: Se recomienda realizar ultrasonido con compresión en pacientes embarazadas con sospecha de TVP.<br><br>Análisis de Distractores: A) Resonancia magnética es incorrecto; es un estudio de segunda línea que solo se solicita cuando la sospecha clínica persiste alta pero el ultrasonido no es concluyente o afecta venas pélvicas aisladas. C) Pletismografía de impedancia es incorrecto; es una técnica históricamente descontinuada con alta tasa de falsos positivos en el embarazo debido a la compresión fisiológica del útero. D) Venografía contrastada es incorrecto; estudio invasivo con riesgo de flebitis química y exposición a radiación teratogénica, obsoleto como primera línea diagnóstica en obstetricia.",
        source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Diagnóstico, Página 5."
    },
    {
        id: 7,
        question: "De acuerdo a la clasificación de Pauwels para fracturas intracapsulares del cuello femoral, ¿qué ángulo en el trazo de fractura corresponde específicamente a un Tipo I?",
        options: ["10 grados", "20 grados", "30 grados", "50 grados"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de fracturas intracapsulares del fémur, la clasificación de Pauwels orienta sobre la inestabilidad biomecánica basada en el ángulo de la fractura respecto a la horizontal. Un ángulo igual o menor a 30 grados (Tipo I) favorece fuerzas de compresión axial que estabilizan los fragmentos de forma natural, otorgando un pronóstico más favorable en comparación a trazos más verticales sujetos a fuerzas de cizallamiento.<br><br>Perla ENARM: Clasificación de Pauwels Tipo I: 30 grados. Trazo de fractura inferior a 30 grados, es una fractura “en valgo” y la fuerza de carga procede a aplicar la cabeza del fémur sobre el cuello femoral.<br><br>Análisis de Distractores: A) 10 grados es incorrecto; el punto de corte establecido en la clasificación original de Pauwels para el primer escalón es de 30 grados, no 10. B) 20 grados es incorrecto; aunque mecánicamente menor a 30 grados entra en esta categoría funcional, el grado numérico exacto que divide y define la clasificación es 30. D) 50 grados es incorrecto; un trazo de 50 grados se corresponde con un Pauwels Tipo II, donde incrementan las fuerzas patológicas de cizallamiento e inestabilidad vascular.",
        source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Cuadro II, Página 18."
    },
    {
        id: 8,
        question: "Para confirmar el diagnóstico de choque séptico en una paciente obstétrica que presenta hipotensión refractaria a la reanimación inicial con líquidos, ¿por debajo de qué valor numérico se encuentra la presión arterial media?",
        options: ["Menor a 75 mmHg", "Menor a 70 mmHg", "Menor a 60 mmHg", "Menor a 65 mmHg"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de sepsis materna, el choque séptico se instaura cuando existen anormalidades circulatorias agudas mediadas por vasoplejía. Se define formalmente por la persistencia de una presión arterial media por debajo de 65 mmHg o elevación de lactato sérico ≥2 mmol/L pese a la administración correcta de una expansión volumétrica inicial de 30 ml/kg.<br><br>Perla ENARM: En caso de no contar con ácido láctico sérico, se podrá considerar el diagnóstico de choque séptico ante la presencia de criterios clínicos de sepsis e hipotensión persistente (presión arterial media menor de 65 mmHg), a pesar de la reanimación hídrica y uso de vasopresores.<br><br>Análisis de Distractores: A) Menor a 75 mmHg es incorrecto; valores entre 65 y 75 mmHg garantizan una adecuada perfusión en los lechos esplácnico, renal y placentario, por lo que no configuran choque. B) Menor a 70 mmHg es incorrecto; según el puntaje omSOFA, un valor menor a 70 mmHg otorga puntos, pero la definición técnica de choque refractario exige un corte preciso menor a 65 mmHg. C) Menor a 60 mmHg es incorrecto; esperar hasta la caída por debajo de 60 mmHg retrasa peligrosamente el diagnóstico oportuno y la terapia vasoactiva que compromete la viabilidad fetal.",
        source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Diagnóstico, Página 45."
    },
    {
        id: 9,
        question: "En el tratamiento quirúrgico de un paciente adulto con fractura diafisiaria desplazada de antebrazo, ¿cuál es el material de osteosíntesis considerado de primera elección?",
        options: ["Placa de compresión dinámica", "Clavo centromedular elástico", "Fijador externo monoplanar", "Agujas de Kirschner"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, el radio y el cúbito exigen una restauración anatómica estricta (alineación de longitud, eje y rotación) para preservar la prono-supinación funcional. La fijación rígida con placa de compresión dinámica de 3.5 mm ofrece la estabilidad biomecánica absoluta necesaria y es el gold standard quirúrgico en adultos, logrando contacto interfragmentario bajo tensión.<br><br>Perla ENARM: Para fijar las fracturas de antebrazo en el adulto, las placas de compresión dinámica de 3.5 mm son las de primera elección.<br><br>Análisis de Distractores: B) Clavo centromedular elástico es incorrecto; se indica exclusivamente como primera línea en población pediátrica en crecimiento o en adultos con fracturas segmentarias severas donde falla la placa. C) Fijador externo monoplanar es incorrecto; se reserva estrictamente para fracturas expuestas con alta contaminación (Gustilo III) o síndrome compartimental en control de daños. D) Agujas de Kirschner es incorrecto; este sistema percutáneo no brinda la estabilidad compresiva requerida en diáfisis de adulto y favorece rotaciones anómalas o pseudoartrosis.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento, Página 36."

        question: "¿Cuál de las siguientes cirugías previas se considera una contraindicación absoluta para permitir una prueba de trabajo de parto vaginal en una paciente gestante?",

        source: "SS-296-10, Diagnóstico y Tratamiento de la Ruptura Uterina, 2010, Algoritmo 1, Página 141."
    },
    {

        question: "En la evaluación radiográfica inicial de un paciente que acude al servicio de urgencias por cólico renoureteral, ¿qué tipo de litiasis no será visualizada por tener una composición radiolúcida?",

        question: "Durante la reanimación inicial de un paciente con trauma de tórax que desarrolla un neumotórax simple confirmado, ¿cuál es el tamaño indicado de la sonda endopleural para la pleurostomía?",

    {

        question: "En un paciente adulto cursando en estado crítico, ¿al alcanzar qué porcentaje de los requerimientos calóricos totales por vía enteral se debe suspender definitivamente el apoyo de nutrición parenteral?",

        answer: 0,
        justification: "Justificación: De acuerdo GPC de nutrición en estado crítico, la transición dietética es un proceso de traslape escalonado. Mantener la vía parenteral retrasa el trofismo del enterocito y predispone a translocación bacteriana e infecciones por catéter; por ende, al asegurar que el intestino absorbe funcionalmente más de la mitad basal del gasto energético total (60%), la parenteral se vuelve clínicamente innecesaria y riesgosa.<br><br>Perla ENARM: El apoyo nutricio por vía parenteral debe suspenderse en cuanto la nutrición enteral cubra el 60% de los requerimientos calóricos.<br><br>Análisis de Distractores: B) 70 % es incorrecto; este porcentaje de tolerancia sobrepasa la barrera de seguridad, manteniendo innecesariamente infusión lipídica intravenosa de alto riesgo metabólico. C) 80 % es incorrecto; aguardar a alcanzar esta meta tan alta aumenta exponencialmente los días de estancia y las complicaciones infecciosas del acceso central. D) 90 % es incorrecto; es una meta conservadora y errónea que expone al paciente a sobrecarga metabólica y atrofia de vellosidades intestinales al prolongar el destete parenteral.",

        id: 14,
        question: "Si una paciente cursa con paro cardiorrespiratorio y tiene un embarazo con tamaño uterino palpable por arriba de la cicatriz umbilical, ¿qué intervención anatómica es obligatoria para optimizar la reanimación?",
        options: ["Inclinación lateral derecha completa", "Desplazamiento manual uterino izquierdo", "Elevación pélvica de 45 grados", "Compresión fúndica sostenida"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de reanimación, el útero grávido masivo colapsa la vena cava inferior y la aorta abdominal en decúbito supino, disminuyendo dramáticamente el retorno venoso y el gasto cardíaco durante las compresiones. Desplazar manualmente el útero hacia la izquierda descomprime los grandes vasos permitiendo un volumen sistólico adecuado y mejorando la calidad mecánica del masaje cardíaco sin alterar la superficie plana que requiere el tórax.<br><br>Perla ENARM: Se debe mantener desplazamiento manual uterino hacia la izquierda en pacientes embarazadas durante la RCP en pacientes con útero palpable para evitar la compresión aortocaval.<br><br>Análisis de Distractores: A) Inclinación lateral derecha completa es incorrecto; inclinar a la paciente lateraliza el peso del útero hacia la derecha empeorando severamente la compresión de la vena cava inferior y volviendo ineficaces las compresiones torácicas. C) Elevación pélvica de 45 grados es incorrecto; alzar la pelvis compromete mecánicamente el esfuerzo del reanimador torácico e incrementa la compresión del diafragma, reduciendo los volúmenes corrientes ventilatorios. D) Compresión fúndica sostenida es incorrecto; se contraindica absolutamente, ya que la presión hacia el fondo pélvico colapsa más el lecho esplácnico y vascular retroperitoneal y no favorece retorno al corazón.",
        source: "IMSS-633-13, Prevención, Diagnóstico y Tratamiento del Paro Cardiorrespiratorio en Adultos, 2013, Tratamiento, Página 70."

        id: 15,
        question: "En el abordaje diagnóstico temprano de una paciente gestante con hipertensión de novo, ¿cuál es el punto de corte del cociente proteínas/creatinina urinaria que confirma daño endotelial preeclámptico?",

        question: "Durante la evaluación transoperatoria de un paciente laparotomizado por herida de proyectil de arma de fuego, ¿qué hallazgo fisiológico objetivo establece la indicación ineludible de instaurar cirugía de control de daños?",

        question: "Según la clasificación KDIGO neonatal para el diagnóstico temprano de lesión renal aguda, ¿qué parámetro serológico de creatinina define formalmente el establecimiento del Estadio 1?",
        options: ["Incremento de creatinina ≥ 0.3 mg/dl en 48 horas", "Elevación de la creatinina a 3.0 veces de la basal", "Disminución absoluta del 50% del valor basal", "Creatinina estable pero gasto urinario < 2 ml/kg/h"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de lesión renal aguda, los riñones neonatales tienen vulnerabilidad isquémico-nefrotóxica rápida. La escalada numérica leve de los azoados, definida específicamente por un aumento absoluto igual o mayor a 0.3 mg/dL en una ventana de 48 horas (o una elevación porcentual de 1.5 a 1.9 de la basal), tipifica el inicio orgánico de la injuria (Estadio 1) permitiendo ajuste hídrico y retiro de nefrotóxicos profilácticos.<br><br>Perla ENARM: KDIGO Neonatal Estadio 1: Elevación de Creatinina sérica ≥ 0.3mg/dl en 48 hrs o Elevación de creatinina sérica ≥ 1.5-1.9 veces la creatinina basal en 7 días.<br><br>Análisis de Distractores: B) Elevación de la creatinina a 3.0 veces de la basal es incorrecto; esta elevación masiva define directamente un Estadio 3 (falla grave) o anuria inminente, no la fase inicial. C) Disminución absoluta del 50% del valor basal es incorrecto; las reducciones séricas implican aclaramiento y filtración óptima (mejoría), contrarias diametralmente al concepto de retención aguda por lesión tubular. D) Creatinina estable pero gasto urinario < 2 ml/kg/h es incorrecto; el estadio 0 (normalidad en este grupo) requiere gasto >0.5 ml/kg/h. Un gasto <2 pero >0.5 no es criterio de oliguria aguda (el punto corte por oliguria estadio 1 es <0.5 ml/kg/h por 6-12h).",

    {
        id: 18,
        question: "En la sala de urgencias se recibe un paciente de 4 años con evidencia clínica de choque séptico. ¿Cuál es la dosis volumétrica y el tiempo máximo indicado para la primera carga rápida de reanimación hídrica?",
        options: ["10 ml/kg en 30 minutos", "20 ml/kg en no más de 20 minutos", "30 ml/kg en 15 minutos", "40 ml/kg en 60 minutos"],

        justification: "Justificación: De acuerdo GPC de sepsis en pediatría, la primera hora o \"golden hour\" requiere agresividad volumétrica para recuperar de manera expedita la precarga perdida por vasodilatación y fuga capilar endotelial. La reanimación inicial mandataria emplea soluciones cristaloides isotónicas infundidas en bolos dinámicos de 20 ml/kg, observando respuesta clínica (pulsos, llenado capilar, FC) antes de sobrecargar la compliance miocárdica en un tiempo menor a 20 minutos.<br><br>Perla ENARM: Solución cristaloide (salina/Ringer): 1era carga 20 ml/kg en un tiempo no mayor de 20 min.<br><br>Análisis de Distractores: A) 10 ml/kg en 30 minutos es incorrecto; es una dosis de mantenimiento cautelosa ineficaz para estabilizar un choque distributivo pediátrico franco. C) 30 ml/kg en 15 minutos es incorrecto; en pediatría, los bolos iniciales se fraccionan a 20 ml/kg para evitar congestión pulmonar o falla diastólica ventricular aguda. El volumen de 30 ml/kg es el pilar restrictivo en el adulto. D) 40 ml/kg en 60 minutos es incorrecto; retrasar el volumen de reanimación hasta en una hora completa incrementa notablemente la morbimortalidad por isquemia orgánica.",

        question: "¿Qué herramienta de validación objetiva debe aplicarse a una paciente cursando las 9 semanas de embarazo para clasificar clínicamente la severidad ante náuseas y vómitos incoercibles?",
        options: ["Escala de Glasgow", "Escala de Alvarado", "Escala PUQE", "Escala de SOFA"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hiperémesis gravídica, las herramientas que cuantifican empíricamente los síntomas son fundamentales para distinguir el malestar matutino fisiológico de un trastorno metabólicamente activo. El puntaje PUQE (Pregnancy-Unique Quantification of Emesis and Nausea) estratifica las horas de náusea y frecuencia de emesis, definiendo el inicio de un soporte antiemético intravenoso escalonado o la necesidad de ingreso hospitalario con hidratación enérgica parenteral.<br><br>Perla ENARM: Se recomienda emplear una escala validada para evaluar las náuseas y el vómito en el embarazo (como la escala PUQE), para poder establecer la severidad del estado clínico.<br><br>Análisis de Distractores: A) Escala de Glasgow es incorrecto; sirve para estatus neurológico y traumatismo craneoencefálico, careciendo de ítems que midan morbilidad digestiva. B) Escala de Alvarado es incorrecto; su utilidad diagnóstica radica en la estratificación de riesgo de abdomen agudo por apendicitis, frecuentemente confundida pero diferente fisiopatológicamente. D) Escala de SOFA es incorrecto; está destinada al cribado rápido y diagnóstico de disfunción multiorgánica secundario a síndromes infecciosos sistémicos graves.",

    {
        id: 20,
        question: "Al activar el protocolo de transfusión en una reanimación de control de daños obstétrica guiada por laboratorio convencional, ¿cuál es el nivel meta de fibrinógeno sérico que garantiza una hemostasia eficaz?",
        options: ["> 100 mg/dl", "> 150 mg/dl", "> 250 mg/dl", "> 200 mg/dl"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la coagulopatía obstétrica devora rápidamente el factor I circulante debido a la separación placentaria y hemorragia del lecho. Si el nivel cae, el sangrado es incoercible; mantener la meta firme superior a los 200 mg/dL asegura un sustrato estructural sólido para la polimerización del coágulo, dictando la ministración oportuna de crioprecipitados o concentrado liofilizado.<br><br>Perla ENARM: Reanimación de control de daños guiado con pruebas de laboratorio estándar. Nivel de fibrinógeno: Meta > 200 mg/dl.<br><br>Análisis de Distractores: A) > 100 mg/dl es incorrecto; este límite dictamina riesgo severo inminente de exanguinación y obliga a transfundir de manera aguda 6 gramos extra de concentrado. B) > 150 mg/dl es incorrecto; aunque en población quirúrgica general no gestante puede ser un límite hemostático \"aceptable\", en obstetricia no garantiza la inhibición del sangrado masivo. C) > 250 mg/dl es incorrecto; excede los objetivos profilácticos racionales del protocolo y favorece una sobretransfusión de hemoderivados injustificada.",

  {

    question: "En un paciente pediátrico escolar que es ingresado a urgencias con fiebre, taquicardia y alteración del estado de alerta, confirmándose el diagnóstico clínico de sepsis sistémica, ¿cuál es el tiempo máximo recomendado para la administración de la terapia antimicrobiana empírica?",
    options: [

      "Durante la primera hora",
      "Durante las primeras 2 horas",

    answer: 1,
    justification: "Justificación: De acuerdo GPC de sepsis en pediatría, el tiempo puerta-aguja para la instaturación de la terapia antimicrobiana en los estados sépticos con y sin choque es el factor pronóstico modificable más importante. Cada hora de retraso en la cobertura antibiótica tras el reconocimiento del cuadro incrementa la mortalidad exponencialmente por la falta de control del foco primario y la perpetuación de la cascada inflamatoria, debiendo aplicarse indefectiblemente en los primeros 60 minutos.<br><br>Perla ENARM: Terapia antimicrobiana: Se debe administrar durante la 1era hora del reconocimiento. Toma de cultivo antes del inicio de antibióticos si no retrasa la administración.<br><br>Análisis de Distractores: A) Durante los primeros 30 minutos es incorrecto; aunque es un escenario ideal para choque séptico fulminante en terapia intensiva, la ventana normativa estandarizada a nivel nacional es de una hora para englobar el circuito de toma de cultivos y preparación del fármaco. C) Durante las primeras 2 horas es incorrecto; esperar más de 60 minutos rompe la ventana crítica de la \"hora dorada\" pediátrica. D) Durante las primeras 3 horas es incorrecto; es la meta de tiempo que la campaña mundial de supervivencia a la sepsis establecía anteriormente para el control del adulto de bajo riesgo, pero es inadmisible y letal en pediatría.",

    question: "Una gestante de 32 semanas de embarazo desarrolla colapso cardiovascular e hipoxemia refractaria en la sala de labor. El ecocardiograma de urgencia reporta disfunción ventricular derecha aguda. Ante el diagnóstico de tromboembolia pulmonar grave, ¿cuál es el anticoagulante de primera línea recomendado para el tratamiento inicial?",
    options: [
      "Heparina de bajo peso molecular",
      "Warfarina a dosis respuesta",
      "Fondaparinux subcutáneo",
      "Heparina no fraccionada intravenosa"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica venosa, cuando un evento embólico pulmonar cursa con inestabilidad hemodinámica y falla del ventrículo derecho, la absorción del tejido celular subcutáneo es errática por la mala perfusión. La heparina no fraccionada se prefiere en casos graves debido a su rápida biodisponibilidad vascular, su corta vida media que permite intervenciones quirúrgicas de rescate (embolectomía) y su fácil reversión con sulfato de protamina.<br><br>Perla ENARM: Se recomienda que en embarazadas con sospecha de TEP grave (por ejemplo pacientes con colapso cardiovascular, hipoxemia refractaria, disfunción ventricular derecha, evaluada mediante ecocardiograma) se ministre como tratamiento inicial HNF intravenosa.<br><br>Análisis de Distractores: A) Heparina de bajo peso molecular es incorrecto; es el fármaco de primera elección absoluta, pero exclusivamente para eventos leves o moderados (paciente hemodinámicamente estable). B) Warfarina a dosis respuesta es incorrecto; atraviesa la barrera placentaria y es altamente teratogénica, induciendo embriopatía por warfarina; su uso se restringe a portadoras de válvulas mecánicas bajo consentimiento. C) Fondaparinux subcutáneo es incorrecto; se reserva para escenarios alérgicos específicos como la trombocitopenia inducida por heparina, sin ser de primera línea en colapso vascular.",
    source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Tratamiento TEP, Página 10."

    justification: "Justificación: De acuerdo GPC de hemorragia postparto, los cambios aislados en la presión arterial y la frecuencia cardiaca en la paciente obstétrica suelen ser tardíos debido a la hipervolemia fisiológica compensatoria del embarazo. La conjugación del índice de choque (Frecuencia cardiaca/Tensión arterial sistólica) con la medición gasométrica de la perfusión celular (déficit de base y elevación de lactato) brinda el reflejo más temprano y exacto de la hipoxia tisular silente y predice la gravedad o muerte inminente.<br><br>Perla ENARM: Se sugiere utilizar el índice de choque, déficit de base y medición de lactato (en conjunto) como predictores de morbi-mortalidad en paciente con HPP (mayores de 1500 ml), ya que estos son imprecisos si se utilizan de forma independiente.<br><br>Análisis de Distractores: B) Frecuencia cardíaca, bicarbonato y hematocrito es incorrecto; el hematocrito no refleja de forma aguda las pérdidas sanguíneas por el fenómeno de hemoconcentración transitorio previo a la reanimación hídrica. C) Tensión arterial media, diuresis y fibrinógeno es incorrecto; aunque útiles en el monitoreo integral del estado de choque, carecen de la validación conjunta específica como determinantes de mortalidad en HPP masiva. D) Llenado capilar, exceso de base y plaquetas es incorrecto; el recuento plaquetario disminuye en etapas dilucionales de consumo (CID), pero no es un marcador de hipoperfusión precoz como el lactato.",

    question: "En un paciente masculino de 45 años que acude a urgencias por el primer episodio clínico de dolor agudo tipo cólico en flanco izquierdo irradiado a ingle, la normativa exige realizar una evaluación metabólica sérica. Además de la creatinina y electrolitos estándar (Na, K, Cl, HCO3), ¿qué parámetro es imperativo medir en este abordaje inicial?",

    justification: "Justificación: De acuerdo GPC de cólico renoureteral, identificar alteraciones primarias en la primera presentación de la litiasis ayuda a detectar trastornos sistémicos que obligan a tratamientos urgentes adicionales. Puesto que cerca del 80% de los litos están conformados por sales de calcio (oxalato/fosfato), la medición de calcio sérico evalúa la presencia de hipercalcemia primaria, descartando urgencias oncológicas, hiperparatiroidismo o alteraciones absortivas graves.<br><br>Perla ENARM: Se debe realizar una evaluación metabólica inicial a los pacientes que se presentan por primera vez a urgencias con cólico renoureteral, esta evaluación debe incluir: Examen general de orina, Electrolitos séricos, Calcio sérico y Creatinina sérica.<br><br>Análisis de Distractores: A) Magnesio es incorrecto; si bien ejerce un papel protector urinario al unirse al oxalato (impidiendo su precipitación), su medición sérica no forma parte de la batería bioquímica exigida de urgencia. B) Fósforo es incorrecto; puede solicitarse posteriormente en el estudio metabólico integral en la consulta externa por parte del urólogo o nefrólogo, pero no altera el manejo del servicio de emergencias. C) Ácido úrico es incorrecto; aunque fundamenta la etiología radiolúcida (10% de los litos), no se estipula como obligatorio en las primeras horas de reanimación hospitalaria del cólico aislado frente a la determinación de calcio total.",

    question: "En el transoperatorio de un paciente con trauma penetrante de abdomen con hemorragia incoercible, el anestesiólogo reporta una gasometría de control arterial. ¿Qué hallazgo gasométrico documentado establece formalmente el criterio para abandonar el procedimiento e instituir una cirugía de control de daños?",

    question: "Una paciente de 36 semanas de gestación ingresa con dolor opresivo retroesternal, diaforesis y disnea. Ante la sospecha diagnóstica de infarto agudo del miocardio, ¿cuál es el biomarcador sérico recomendado debido a que no presenta falsas elevaciones vinculadas al embarazo?",

      "Deshidrogenasa láctica",

    answer: 3,
    justification: "Justificación: De acuerdo GPC de emergencias obstétricas, el músculo liso uterino contiene isoenzimas de creatinina cinasa (CK y CK-MB). Durante el embarazo avanzado, el trabajo de parto o las contracciones aisladas, estas isoenzimas miometriales se liberan al torrente sanguíneo otorgando falsos positivos de lesión isquémica cardíaca. La medición estricta de las troponinas séricas cardiacas (c-Tn) garantiza alta especificidad y sensibilidad en la población gestante para el diagnóstico real de un infarto.<br><br>Perla ENARM: Ante la paciente con sospecha de infarto agudo del miocardio, se prefiere la medición de la troponina (c-Tn) sobre la creatinina kinasa (CK), pues esta última puede elevarse debido a las contracciones uterinas.<br><br>Análisis de Distractores: A) Creatinina cinasa MB es incorrecto; su utilidad es escasa en la recta final del embarazo, ya que el estrés fisiológico uterino y la placenta pueden liberar fracciones de la isoenzima mimetizando un IAM ausente. B) Mioglobina es incorrecto; es un marcador sérico no específico liberado durante cualquier injuria tisular músculo-esquelética o esfuerzo miometrial obstétrico intenso. C) Deshidrogenasa láctica es incorrecto; se eleva en trastornos preeclámpticos, hemólisis y daño hepático grave del embarazo (Síndrome HELLP), no discriminando isquemia miocárdica pura.",

    question: "En el manejo estrecho de una gestante ingresada en la Unidad de Terapia Intensiva por choque secundario a neumonía lobar con disfunción orgánica, ¿a partir de qué límite de glucemia basal plasmática en muestras consecutivas se debe iniciar la terapia intravenosa con insulina?",

    justification: "Justificación: De acuerdo GPC de sepsis materna, la hiperglucemia de estrés en estado crítico fomenta la inmunoparálisis celular, altera la fagocitosis de los neutrófilos e incrementa las tasas de infección y mortalidad. Si bien la paciente gestante tiene un estado metabólico peculiar, se recomienda el inicio de insulina de acción rápida cuando los registros periféricos cruzan la barrera persistente de los 180 mg/dl, buscando una meta objetivo menos estricta para evitar los episodios de hipoglucemia severa.<br><br>Perla ENARM: Se recomienda la administración de insulina cuando los niveles de glucemia consecutivos sean mayores de 180 mg/dl.<br><br>Análisis de Distractores: B) Mayores a 140 mg/dl es incorrecto; en obstetricia rutinaria ambulatoria o de piso general, la diabetes gestacional tiene metas bajas, pero en sepsis materna grave, buscar menos de 140 mg/dl aumenta la mortalidad global por hipoglucemias. C) Mayores a 160 mg/dl es incorrecto; es un nivel tolerable frente a la liberación contrarreguladora de cortisol, catecolaminas y glucagón de la infección sistémica, que no amerita inicio de goteo protocolario continuo. D) Mayores a 200 mg/dl es incorrecto; esperar hasta superar los 200 mg/dl para actuar terapéuticamente causa diuresis osmótica franca, daño al glucocálix endotelial e hipercoagulabilidad yatrogénica.",

  {

    question: "Un recién nacido a término de 38 semanas con diagnóstico clínico de encefalopatía hipóxico-isquémica severa es sometido al protocolo normativo de hipotermia terapéutica inducida. ¿Con qué intervalo de frecuencia exacta exige la guía de buena práctica realizar un control ecográfico transfontanelar estructural?",

    answer: 1,
    justification: "Justificación: De acuerdo GPC de asfixia neonatal, la hipotermia terapéutica induce neuroprotección al desacelerar el metabolismo cerebral, disminuyendo la muerte celular programada y el edema. Durante las 72 horas totales de enfriamiento progresivo y recalentamiento posterior, la microcirculación cerebral cambia drásticamente. Realizar ecografía transfontanelar repetida cada 24 horas detecta oportunamente complicaciones estructurales mortales como hemorragias masivas, edema fulminante o infartos organizados que pudieran indicar modificación del plan terapéutico.<br><br>Perla ENARM: Ultrasonido transfontanelar cada 24 horas durante las 72 h de manejo con hipotermia.<br><br>Análisis de Distractores: A) Cada 12 horas es incorrecto; a menos que haya deterioro neurológico evidente o disautonomía refractaria de novo, no se justifica movilizar ni manipular la bóveda craneal del neonato enfriado tan frecuentemente. C) Cada 48 horas es incorrecto; aplazar el estudio permite que eventos de sangrado oculto intraparenquimatoso asintomático evolucionen a hernias o convulsiones letales silentes. D) Cada 72 horas es incorrecto; una sola medición al final del tratamiento desprotege el monitoreo dinámico estructural que exige este soporte avanzado de tercera generación neurológica.",

    question: "Durante la evaluación hemodinámica de la reposición de volumen en una paciente que presentó un evento hemorrágico obstétrico agudo por desgarro cervical en la primera fase del parto, ¿por debajo de qué valor numérico se debe establecer y mantener la meta del índice de choque?",

    justification: "Justificación: De acuerdo GPC de choque hemorrágico obstétrico, el índice de choque (Frecuencia cardíaca dividida entre Presión Arterial Sistólica) valora la estabilidad ventricular global independientemente de la edad gestacional. Un resultado fisiológico en la paciente normal suele oscilar entre 0.7-0.9; por ende, reanimar al paciente hasta lograr disminuir esta constante por debajo de 0.9 ratifica que el relleno venoso compensó la vasorreactividad refleja y la macrohemodinamia está resuelta.<br><br>Perla ENARM: Se recomienda mantener el índice de choque por debajo de 0.9 en la paciente con hemorragia obstétrica a través de una reanimación efectiva.<br><br>Análisis de Distractores: A) 0.7 es incorrecto; es un valor equivalente a la basal de un adulto no grávido sano sin estrés, forzar volumen hídrico hasta este nivel expone a la mujer con reanimación masiva a desarrollar edema agudo de pulmón por sobrecarga derecha. B) 0.8 es incorrecto; es una franja normal baja, sin embargo, el nivel umbral técnico dictado universalmente como la \"meta límite\" superior resolutiva en esta guía mexicana es 0.9. C) 1.0 es incorrecto; si el índice de choque es mayor a 1.0 (ej. FC de 100 lpm y TAS de 90 mmHg), advierte pérdida persistente grave y obliga a transfundir o activar el protocolo transfusional masivo sin considerarse estable.",

    options: [

    justification: "Justificación: De acuerdo GPC de lesión obstétrica de plexo braquial, la llamada \"Prueba de la Galleta\" es una herramienta clínica dinámica simple pero de alta efectividad predictiva. Demuestra reinervación progresiva de los flexores del codo (bíceps braquial inervado primariamente por el nervio musculocutáneo C5-C6) venciendo la gravedad sin necesidad de aplicar fuerza refleja del esternocleidomastoideo del cuello. Pasarla elimina la necesidad de microcirugía nerviosa.<br><br>Perla ENARM: Si el niño logra alcanzar la boca con la galleta, entonces pasa la prueba de la galleta y usualmente se recomienda el tratamiento no quirúrgico.<br><br>Análisis de Distractores: A) Activar el protocolo neurológico y programar EMG temprana es incorrecto; al existir flexión muscular espontánea evidente, la inervación estructural motora avanza, posponiendo métodos invasivos dolorosos pronósticos para otra etapa. B) Remitir de urgencia para reconstrucción de nervio mediano es incorrecto; la cirugía reconstructiva se indica cuando hay flexión nula antes del sexto o noveno mes que condena a la parálisis permanente de la extremidad. D) Instaurar uso prolongado de toxina botulínica es incorrecto; la toxina se restringe para co-contracciones anómalas o espasticidad secundaria, no en casos con recuperación motora funcional activa y progresiva.",

    question: "Una paciente en la tercera semana de puerperio ingresa al programa de seguimiento anticoagulante debido a una historia confirmada de un tromboembolismo venoso en el embarazo previo y trombofilia identificada. ¿Cuál es el tiempo mínimo mandatorio que debe durar la tromboprofilaxis postnatal ininterrumpida?",

      "Al menos 2 semanas",

    justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica, las mujeres puérperas tienen un estado de hipercoagulabilidad secundario a la liberación de factor tisular placentario y atonía del lecho que dura alrededor de la llamada \"cuarentena\". En el rubro de riesgo catalogado como \"Muy alto\" (pacientes con TVP previo documentado o trombofilia probada de riesgo mayor), el uso ininterrumpido de heparina de bajo peso molecular se extiende firmemente a un mes y medio posparto para evitar recurrencias pulmonares letales.<br><br>Perla ENARM: Muy alto riesgo (TEV previo o Tx anticoagulación oral): Recomendado altas dosis de HBPM prenatal y HBPM al menos 6 semanas postnatal o hasta que regrese a anticoagulación oral.<br><br>Análisis de Distractores: B) Al menos 2 semanas es incorrecto; este periodo es insuficiente y deja a la paciente de muy alto riesgo desprotegida durante los picos de máxima hiperviscosidad hemática del final del puerperio mediato. C) Al menos 4 semanas es incorrecto; aunque el estado estrogénico va declinando durante las cuatro semanas postparto, la meta preventiva de seguridad nacional requiere llegar a las seis semanas de protección demostrada clínica y laboratorialmente. D) Al menos 8 semanas es incorrecto; sobrepasar las seis semanas de inyección subcutánea diaria incrementa costos orgánicos, dolor en la paciente y el riesgo de reacciones osteopénicas relacionadas con heparina sin beneficio hemorrágico adyacente demostrado.",

  {
    id: 34,
    question: "Una paciente diagnosticada con inercia uterina hemorrágica severa es llevada a laparotomía debido al fallo del taponamiento con balón hidrostático intrauterino. Durante el abordaje, el cirujano aplica la técnica quirúrgica de Posadas. ¿Cuál es la rama vascular en la que se ejecuta el anclaje transfictivo con sutura reabsorbible?",
    options: [
      "Arterias ováricas",
      "Arterias uterinas",
      "Arterias pudendas",
      "Arterias arcuatas"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de hemorragia postparto, los algoritmos escalonados del tratamiento quirúrgico conservador (aquellos que preservan el útero y la fertilidad futura) buscan disminuir la presión capilar de la zona de inserción de la placenta. La técnica de Posadas consiste de forma obligatoria y puntual en exteriorizar el útero y ubicar bilateralmente su cara posterior, donde se coloca un anclaje transfictivo asfixiante que liga de manera directa las arterias uterinas mayores causantes del 90% del flujo al órgano.<br><br>Perla ENARM: Descripción de la técnica Posadas: Realizar un punto transfictivo de las arterias uterinas con sutura de ácido poliglicólico (en cara posterior).<br><br>Análisis de Distractores: A) Arterias ováricas es incorrecto; aunque ligar el plexo infundibulopélvico ovárico es una medida escalonada de rescate coadyuvante en la técnica clásica de Zea, la técnica posadas recae exclusivamente sobre la irrigación caudal del miometrio. C) Arterias pudendas es incorrecto; estas arterias irrigan perineo, labios mayores y clítoris inferior, no intervienen de ninguna forma en la reanimación quirúrgica del cuerpo o fondo uterino y no se ligan intraabdominalmente. D) Arterias arcuatas es incorrecto; son ramas delgadas intramiometriales inalcanzables a la ligadura macroquirúrgica por estar entrelazadas y profundas en la estructura tridimensional del útero grávido masivo.",
    source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadro 4, Página 23."
  },

    question: "Durante la ronda médica, se decide instituir nifedipino oral a una gestante de 32 semanas de embarazo internada con diagnóstico establecido de preeclampsia sin datos de severidad. De acuerdo a la meta farmacológica, ¿en qué margen exacto de valores se debe estabilizar la presión arterial sistólica?",
    options: [
      "Entre 120 y 135 mmHg",
      "Entre 130 y 140 mmHg",
      "Entre 140 y 160 mmHg",
      "Entre 130 y 155 mmHg"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de preeclampsia, sobretratar a una mujer gestante en etapa moderada sin lesión multiorgánica reduce severamente el caudal en las arterias espirales produciendo restricción del crecimiento intrauterino iatrogénica por hipoperfusión placentaria. Se prohíbe forzar los registros hacia el estado no grávido; las guías marcan un nivel de resiliencia cerebral materno que tolera el margen sistólico moderadamente alto manteniendo seguro al bebé frente a la asfixia.<br><br>Perla ENARM: En pacientes con preeclampsia sin comorbilidad, la terapia antihipertensiva se indicará para mantener presión diastólica entre 80 y 105 mm Hg, y sistólica entre 130 a 155 mm Hg.<br><br>Análisis de Distractores: A) Entre 120 y 135 mmHg es incorrecto; este rango \"normal\" subestima el requerimiento funcional hemodinámico elevado en los cuadros de placenta en isquemia en progresión y deprime la vitalidad doppler fetal. B) Entre 130 y 140 mmHg es incorrecto; representa un margen demasiado estrecho y restrictivo que ocasiona fluctuaciones agresivas en la perfusión placentaria ante cambios hormonales leves y que carece de soporte orgánico real. C) Entre 140 y 160 mmHg es incorrecto; tolerar niveles sobre los 160 mmHg (Límite superior de crisis y daño orgánico) aumenta el riesgo directo inminente del desencadenamiento de eclampsia (convulsiones tónico-clónicas) y evc.",
    source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en segundo y tercer nivel de atención, 2017, Tratamiento Farmacológico, Página 13."
  },
  {
    id: 36,
    question: "Una primigesta en el primer trimestre acude al triage obstétrico por presentar vómitos intensos incontrolables y signos evidentes de deshidratación. El servicio la estadifica clínicamente y diagnostica hiperémesis gravídica. ¿Qué grupo farmacológico dicta la guía clínica utilizar como primera línea de manejo?",
    options: [
      "Inhibidores de la bomba de protones",
      "Antagonistas dopaminérgicos",
      "Inhibidores de receptores H1",
      "Antagonistas serotoninérgicos"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de emergencias obstétricas, los antihistamínicos H1 tienen efectos directos depresores del centro del vómito bulbar y actividad sedativa suave con nulo potencial teratogénico probado (Categoría A/B FDA) durante las críticas semanas de organogénesis inicial. Fármacos como la doxilamina y meclizina, a menudo con piridoxina asociada, son el primer pilar de manejo en náusea y vómito persistente sin etiología subyacente.<br><br>Perla ENARM: Para el manejo de la náusea y vómito, se sugiere emplear como fármaco de primera línea, los antihistamínicos (inhibidores de receptores H1).<br><br>Análisis de Distractores: A) Inhibidores de la bomba de protones es incorrecto; omeprazol u homólogos neutralizan la acidez relacionada con gastritis y enfermedad de reflujo gastroesofágico, que aunque puede coincidir, no frenan la cascada fisiopatológica neurológica hormonal de hiperémesis mediada por HGC y estrógenos altos. B) Antagonistas dopaminérgicos es incorrecto; la metoclopramida, potente antiemético procinético gástrico, es indicada rigurosamente como fármaco de segunda línea (rescate) y se asocia a distonías o crisis extrapiramidales con su abuso. D) Antagonistas serotoninérgicos es incorrecto; el ondansetrón, antagonista 5-HT3 utilizado en náusea quimioterapéutica, se relega al nivel de escalón de segunda opción si falla el antihistamínico debido a riesgos infrecuentes pero debatidos sobre labio paladar hendido en el primer trimestre.",
    source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Hiperémesis, Página 12."
  },
  {
    id: 37,
    question: "Al estratificar dinámicamente la disfunción endotelial en una puérpera con clínica de choque de etiología endometrial a través de la escala de falla orgánica modificada en obstetricia (omSOFA), ¿qué nivel absoluto en el conteo de plaquetas penaliza la herramienta brindando el puntaje máximo (2 puntos)?",
    options: [
      "Menores a 100,000 /mm³",
      "Menores a 150,000 /mm³",
      "Menores a 50,000 /mm³",
      "Menores a 120,000 /mm³"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de sepsis materna, el consumo periférico anormal de factores de coagulación mediado por endotoxinas activa la coagulación intravascular. La escala omSOFA cataloga como fracaso clínico hemático (otorgando el máximo de penalidad posible por ítem = 2 puntos) a un reporte laboratorial objetivo en plaquetas inferior a 100,000/mm³, dictando la urgente necesidad de frenar el estado hiperfibrinolítico antes de una trombocitopenia letal en el lecho pélvico.<br><br>Perla ENARM: Escala omSOFA (puntos = 2): Plaquetas <100 000/mm3.<br><br>Análisis de Distractores: B) Menores a 150,000 /mm³ es incorrecto; el límite entre 100,000 y 150,000 otorga solo 1 punto y se reconoce como el límite inferior esperable del decremento fisiológico secundario a secuestro e hipervolemia del embarazo no complicado tardío. C) Menores a 50,000 /mm³ es incorrecto; en la escala general de adulto SOFA no obstétrica otorga puntajes mayores, pero la escala reducida y calibrada omSOFA obstétrica cierra su peor criterio en <100,000. D) Menores a 120,000 /mm³ es incorrecto; esta disminución se engloba dentro de la categoría penalizada de 1 punto al ubicarse en el margen comprendido entre los rangos de 100 y 150 mil.",
    source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Cuadro 3, Página 24."
  },
  {
    id: 38,
    question: "Un paciente ingresado al servicio de emergencias con hallazgos ecográficos sugerentes de litiasis en trayecto ureteral recibe su reporte radiológico. El radiólogo constata: \"Reemplazo de la mayor parte de las porciones del seno renal, y discontinuidad grave de la ecogenicidad periférica\". Según la clasificación morfológica, ¿a qué grado estricto corresponde esta descripción?",
    options: [
      "Grado I",
      "Grado III",
      "Grado 0",
      "Grado II"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, la obstrucción sostenida del trayecto por un lito enclavado genera un aumento en la presión retrógrada y un daño directo en el parénquima funcional. La escala de graduación ecográfica clasifica como Grado III (la máxima severidad sin perfusión de orina en estasis) cuando la hidronefrosis deforma las cálices deformándolos gravemente y empujando las matrices periféricas ecogénicas (atrofia del manto y seno renal borrado por líquido anecoico).<br><br>Perla ENARM: Grados de hidronefrosis ecográfica: Grado III: Reemplazo de la mayor parte de las porciones del seno renal, discontinuidad de la ecogenicidad de la periferia del seno.<br><br>Análisis de Distractores: A) Grado I es incorrecto; se describe ecográficamente únicamente como separación de ecos del seno renal en configuración de huso/ovoidea, sin borramiento de las fronteras limítrofes anatómicas. C) Grado 0 es incorrecto; el grado normal u obstuido temprano donde no existe hidronefrosis dilatada detectable (el complejo seno-renal se observa normal y sin la separación hídrica en estasis). D) Grado II es incorrecto; aunque el cáliz dilatado de Grado II toca la pelvis en forma de un \"guante de box\", no reemplaza de manera destructiva ni borra la ecogenicidad periférica, manteniéndose los bordes íntegros.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Anexo Cuadro 7, Página 39."
  },
  {
    id: 39,
    question: "Al analizar una radiografía simple anteroposterior de cadera de un anciano en camilla, se observa un trazo fracturario en el cuello anatómico del fémur derecho. El cirujano ortopedista documenta un ángulo inestable aproximadamente a 70 grados con respecto a la horizontal. ¿A qué grado corresponde en el modelo clásico propuesto por Pauwels?",
    options: [      "Tipo I",      "Tipo II",      "Tipo IV",      "Tipo III"    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de fracturas intracapsulares del fémur proximal, el pronóstico pre-quirúrgico está dictado por las leyes biomecánicas puras y su grado inestabilidad. Un trazo vertical inclinado mayor o igual a 70 grados permite que las intensas y repetitivas fuerzas patológicas de inflexión y de cizallamiento superen a las fuerzas protectoras de compresión axial, por lo cual abre perpetuamente el foco de consolidación e interrumpe agresivamente la precaria red reticular vascular cefálica, sentenciando a la prótesis de reemplazo.<br><br>Perla ENARM: Clasificación de Pauwels Tipo III (70 grados): Trazo de fractura en ángulo aproximadamente a 70 grados, las fuerzas de cizallamiento y de inflexión tienden a abrir el foco de fractura.<br><br>Análisis de Distractores: A) Tipo I es incorrecto; los trazos clasificados como Tipo I poseen un ángulo oblicuo inferior a los 30 grados, el cual es funcionalmente protector porque compacta y aplasta las fracturas una contra otra, mejorando consolidación. B) Tipo II es incorrecto; abarca el espectro de trazos de entre 30 y 50 grados, categorizando a la cadera en riesgo intermedio con desplazamiento franco a la carga en \"varo\" antes que en rotación completa o cizallamiento puro. C) Tipo IV es incorrecto; este sistema clásico histórico cuenta fundamentalmente con 3 grados basados en el eje longitudinal, careciendo formalmente de un nivel IV en el catálogo oficial ortopédico estandarizado en el temario.",
    source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Cuadro II, Página 18."
  },
  {
    id: 40,
    question: "Al evaluar a un preescolar en un centro de atención de urgencias básicas que cursa con un síndrome febril tóxico e hipotensión, el algoritmo de abordaje diagnostica sepsis severa inminente y exige considerar un traslado de la institución a una unidad de cuidados intensivos. Además del estado mental alterado, ¿la necesidad empírica de mantener la saturación de oxígeno por arriba de qué meta porcentual estipulada se clasifica como criterio directo para la referencia?",
    options: [      "Mayor al 88%",      "Mayor al 92%",      "Mayor al 90%",      "Mayor al 94%"    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de sepsis pediátrica, el choque disfuncional deteriora el intercambio de membrana alvéolo-capilar secundario al inicio de fuga líquido a intersticio (desarrollo inminente del Síndrome de Dificultad Respiratoria Aguda-SDRA en el lactante). Un niño que, para mantener sus mucosas periorales rosadas y evitar hipoxia del tronco encefálico (Saturación mínima > 90%), requiera suplemento alto externo por puntas nasales o mascarilla en un triage primario, agota tempranamente sus reservas y requiere forzosamente unidad de choque e intubación controlada en tercer nivel.<br><br>Perla ENARM: Referir a los pacientes pediátricos (Sospecha de sepsis) que presenten evidencia de: Alteración del estado mental, Necesidad de Aporte de oxigeno elevado para mantener SO2 > 90%, y Trastornos de la conducta, irritabilidad.<br><br>Análisis de Distractores: A) Mayor al 88% es incorrecto; este porcentaje de tolerancia extrema se permite solo en neonatos frágiles pretérmino y cardiópatas estructurales con cortocircuito veno-arterial establecido y no reacciona al requerimiento de transferencia pediátrica universal de una vía respiratoria competente a falla pulmonar inminente. B) Mayor al 92% es incorrecto; si la meta para un niño sano en urgencias (sin patologías ventilatorias agregadas) habitualmente ronda los >92-94%, la guía de supervivencia por sepsis fija el umbral real crónico limítrofe en <90% como de alarma de traslado a segundo piso UCI pediátrica. D) Mayor al 94% es incorrecto; tratar de llegar a picos suprafisiológicos en el niño chocado es inútil y confunde el triage del centro referenciador subestimando la hipoxemia refractaria y letal verdadera de menos del 90%.",
    source: "SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad, 2017, Algoritmo, Página 136."
  },
  {
    id: 41,
    question: "En un paciente prematuro intubado en la Unidad de Cuidados Intensivos que cursa con Síndrome de Dificultad Respiratoria y que cumple criterios radiográficos y gasométricos para la aplicación de una tercera dosis de surfactante pulmonar, ¿cuál es la dosis ponderal exacta de Poractant alfa recomendada?",
    options: [

      "100 mg/kg",

      "200 mg/kg"

    answer: 1,
    justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, la terapia de reemplazo en esquema de dosis múltiples exige precisión para evitar el barotrauma o la inactivación. Para la tercera dosis de rescate, en presencia de opacificación pulmonar refractaria, la dosificación de Poractant alfa (al igual que la del Beractant) desciende respecto a las impregnaciones iniciales, estandarizándose en 100 mg/kg para mantener el reclutamiento alveolar sin generar taponamiento masivo de la vía aérea.<br><br>Perla ENARM: Administrar tercera dosis de surfactante (Poractant alfa 100 mg/Kg o Beractant 100 mg/Kg). Administrar la dosis ponderal exacta.<br><br>Análisis de Distractores: A) 50 mg/kg es incorrecto; es una subdosificación ineficaz para vencer la tensión superficial de los alvéolos colapsados terminales. C) 150 mg/kg es incorrecto; excede la recomendación normada para la fase tardía de maduración artificial del pulmón prematuro. D) 200 mg/kg es incorrecto; corresponde habitualmente a la dosis masiva inicial (primera dosis) de Poractant alfa para saturar el lecho alveolar virgen, pero no a las dosis de mantenimiento o terceras aplicaciones.",
    source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido, 2021, Algoritmo 1, Página 11."

  {
    id: 42,
    question: "En la reanimación de choque hipovolémico severo por hemorragia obstétrica en una gestante de 38 semanas, ¿cuál es la dosis volumétrica y el tipo de solución de primera línea recomendada para instituir la carga hídrica rápida inicial?",
    options: [
      "Coloides a 10 ml/kg",
      "Hemoderivados a 20 ml/kg",
      "Cristaloides a 30 ml/kg",
      "Salina hipertónica a 4 ml/kg"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de choque hemorrágico en obstetricia, la piedra angular de la reposición inicial ante el colapso circulatorio materno es la expansión agresiva e inmediata del compartimento intravascular mediante soluciones isotónicas. Se recomienda una carga en bolo de cristaloides calculada estrictamente a 30 ml/kg, con la finalidad de restituir transitoriamente la precarga para perfundir órganos vitales mientras se alistan los hemoderivados estandarizados.<br><br>Perla ENARM: Los concentrados plaquetarios, plasma fresco congelado y concentrados eritrocitarios deben ser parte de la reanimación en pacientes que persisten con hipoperfusión tisular posterior a una carga de 30ml/kg de cristaloides.<br><br>Análisis de Distractores: A) Coloides a 10 ml/kg es incorrecto; los coloides (ej. albúmina o gelatinas) no son de primera línea inicial por su alto costo, el riesgo de reacciones anafilácticas y la falta de superioridad demostrada en morbimortalidad frente a cristaloides en trauma obstétrico. B) Hemoderivados a 20 ml/kg es incorrecto; aunque la sangre es el fluidoterápico ideal en hemorragia, el paso inmediato universal en triage es el cristaloide mientras los cruces sanguíneos se liberan del banco de sangre. D) Salina hipertónica a 4 ml/kg es incorrecto; reservada para escenarios críticos muy específicos como el control del edema cerebral agudo en trauma craneoencefálico grave, no indicada como reanimador de primera intención en choque obstétrico.",
    source: "IMSS-162-09, Diagnóstico y Tratamiento del Choque Hemorrágico en Obstetricia, 2017, Tratamiento, Página 17."
  },
  {
    id: 43,
    question: "Se presenta en el servicio de urgencias un paciente preescolar con fiebre de 40 °C, alteración del estado mental, pulsos saltones, llenado capilar inmediato (menor a 1 segundo) y piel rubicunda y caliente. El equipo establece diagnóstico de choque séptico refractario a volumen y categoriza un patrón hemodinámico caliente. ¿Cuál es el vasoactivo inicial de elección?",
    options: [
      "Epinefrina",
      "Milrinona",
      "Dopamina",
      "Norepinefrina"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de sepsis pediátrica, el \"choque caliente\" es un estado distributivo caracterizado por resistencias vasculares periféricas anormalmente bajas (vasoplejía), manifestado clínicamente por pulsos saltones y piel hiperémica. Ante el fracaso de los cristaloides, el medicamento indicado debe poseer un potente efecto agonista alfa-1 para recuperar el tono arterial periférico de inmediato. La norepinefrina, administrada a dosis de 0.05-1 µg/kg/min, es el pilar estandarizado para contrarrestar este colapso vasopléjico.<br><br>Perla ENARM: Se debe categorizar el patrón hemodinámico del paciente para decidir el soporte inotrópico o vasopresor adecuado: En choque caliente iniciar norepinefrina a dosis de 0.05-1 µg/kg/min.<br><br>Análisis de Distractores: A) Epinefrina es incorrecto; con su efecto primario alfa y beta, es el medicamento inotrópico de elección para el choque neonatal \"frío\" o pediatría con bajo gasto cardiaco y llenado capilar prolongado. B) Milrinona es incorrecto; inodilatador fosfodiesterásico tipo III; su potente efecto vasodilatador empeoraría catastróficamente la vasoplejía e hipotensión en un choque caliente. C) Dopamina es incorrecto; históricamente usada, hoy en día sus efectos son erráticos y arritmogénicos en pediatría grave, considerándose de rescate solo si no hay epinefrina/norepinefrina disponible.",
    source: "SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad, 2017, Algoritmo 3, Página 80."
