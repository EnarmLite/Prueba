    question: "Además del tratamiento farmacológico inyectable de primera línea instaurado en una paciente gestante diagnosticada con trombosis venosa profunda aguda, ¿qué método adyuvante de presoterapia se recomienda incorporar como parte del manejo integral?",
    options: [
      "Medias de compresión",
      "Bomba de compresión neumática",
      "Vendaje elástico multicapa",
      "Filtro de vena cava inferior"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica, las medias de compresión graduada (usualmente de 30-40 mmHg de presión a nivel del tobillo) ejercen un soporte mecánico que colapsa el sistema venoso superficial empujando la volemia hacia los planos profundos, lo que acelera el flujo venoso de retorno reduciendo la éstasis, el edema local doloroso de la extremidad y el temido síndrome postrombótico futuro en las embarazadas.<br><br>Perla ENARM: Se sugiere usar medias de compresión como parte del tratamiento integral en pacientes obstétricas con TVP.<br><br>Análisis de Distractores: B) Bomba de compresión neumática es incorrecto; se recomienda para pacientes confinados en cama con alto riesgo de TVP que tienen contraindicación absoluta para el uso de heparinas profilácticas (ej. trombocitopenia severa u hemorragia activa). C) Vendaje elástico multicapa es incorrecto; es la piedra angular del tratamiento de las úlceras de insuficiencia venosa crónica periférica en población adulta mayor (clase C6 de CEAP), sin aval de primera intención en TVP aguda. D) Filtro de vena cava inferior es incorrecto; recurso altamente invasivo endovascular. Solo se instala ante TEP masivas recurrentes que fallan a niveles supra-terapéuticos de anticoagulación o en pacientes inestables que irán a cesárea en horas y requieren suspensión de heparina.",
    source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Tratamiento, Página 34."
  },
  {
    id: 71,
    question: "De acuerdo a la clasificación alfanumérica universal AO para fracturas ortopédicas de huesos largos, ¿qué código topográfico y morfológico corresponde de manera específica a una fractura subcapital del cuello femoral con mínimo desplazamiento?",
    options: [
      "31-A1",
      "31-B1",
      "32-B2",
      "31-C1"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de fracturas intracapsulares, el sistema AO (Arbeitsgemeinschaft für Osteosynthesefragen) es el lenguaje radiológico internacional. El número 3 designa al fémur, el 1 a su zona proximal (31), la letra B designa al cuello femoral anatómico, y el número final subdivide la gravedad o trazo: El número 1 refleja un trazo limpio subcapital con poco nivel de inestabilidad y mínimo desplazamiento de los fragmentos óseos.<br><br>Perla ENARM: Clasificación AO de las fracturas del extremo proximal del fémur: Al extremo proximal del fémur corresponde el número 31. Al cuello femoral corresponde la letra B. 1 subcapital con mínimo desplazamiento (31-B1).<br><br>Análisis de Distractores: A) 31-A1 es incorrecto; la letra A en el segmento proximal del fémur engloba a la zona extracapsular, designando específicamente a las fracturas trocantéricas o pertrocantéricas simples. C) 32-B2 es incorrecto; el número \"2\" designa al segmento diafisiario central del hueso, refiriéndose a una fractura en cuña flexional del cuerpo del fémur. D) 31-C1 es incorrecto; la letra C en este segmento (31-C) cataloga el trauma más severo del cuello superior apuntando directamente a las fracturas intrarticulares parcelares severas de la misma cabeza femoral.",
    source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Cuadro II, Página 10."
  },
  {
    id: 72,
    question: "Al planificar y prescribir un abordaje quirúrgico programado para la reconstrucción del ligamento cruzado anterior, ¿qué factor psicosocial y funcional constituye el principal determinante recomendado en la guía para decidir la utilización de un injerto autólogo frente a un aloinjerto?",
    options: [
      "La capacidad adquisitiva del paciente",
      "El índice de masa corporal actual",
      "Las necesidades laborales y físicas",
      "La edad biológica del individuo"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de lesiones ligamentarias, los injertos autólogos (propios del paciente: semitendinoso/recto interno o HTH) proporcionan una fijación ósea más rígida y veloz, demandada por atletas de alto rendimiento o trabajadores de fuerza pesada, pero prolongan la morbilidad de la zona donante. Los aloinjertos (banco de tejidos heterólogo) permiten movilización sin dolor colateral, útiles en oficinistas o adultos con bajas demandas de carga. La decisión depende de a qué vida se va a reincorporar.<br><br>Perla ENARM: Para la elección de injerto autólogo o heterólogo se recomienda considerar: Las necesidades laborales y físicas de la persona para reincorporarse, a su vida diaria.<br><br>Análisis de Distractores: A) La capacidad adquisitiva del paciente es incorrecto; los comités éticos de medicina institucional proscriben basar las directrices de reemplazo tisular ortopédico vital fundamentándose en el extracto socioeconómico. B) El índice de masa corporal actual es incorrecto; a pesar de influir estadísticamente en el desgaste patelofemoral posterior o gonartrosis crónica, no es el pilar rector que prohíbe obtener isquiotibiales autólogos. D) La edad biológica del individuo es incorrecto; si bien la elasticidad disminuye con la edad, una persona mayor muy activa requiere reconstrucción homóloga fuerte, siendo el requerimiento de carga (no su simple edad en papel) la métrica funcional definitoria.",
    source: "IMSS-388-10, Diagnóstico y tratamiento de las lesiones ligamentarias, 2010, Tratamiento, Página 15."
  },
  {
    id: 73,
    question: "Durante el proceso diagnóstico en el servicio de urgencias de un individuo que se presenta con dolor insoportable en fosa lumbar, se deben considerar diversas patologías sistémicas urológicas. ¿Cuál de las siguientes entidades hemodinámicas constituye un cuadro clínico que simula con alta similitud un cólico renal?",
    options: [
      "Aneurisma de la arteria esplénica",
      "Infarto agudo mesentérico",
      "Trombosis de la vena gonadal",
      "Trombosis de la vena renal"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, la obstrucción brusca del flujo sanguíneo eferente del riñón provoca ingurgitación parenquimatosa venosa intensa y distensión aguda dolorosa de la cápsula de Gerota, proyectando isquemia neural y simulando el espasmo clásico ureteral (dolor fulminante unilateral). Excluirla es vital mediante ecoscopia Doppler color ante falta de litos radiográficos, puesto que su desenlace sin tratamiento es el infarto y pérdida del riñón afectado.<br><br>Perla ENARM: Cuadros clínicos que pueden presentarse simulando un cólico renal: Carcinoma renal, Carcinoma urotelial y Trombosis de vena renal.<br><br>Análisis de Distractores: A) Aneurisma de la arteria esplénica es incorrecto; la rotura de esta anomalía vascular deforma el flanco superior izquierdo, pero se manifiesta predominantemente con colapso cardiogénico franco masivo, abdomen agudo letal y signo de Kehr, no como un cólico ondulante inferior. B) Infarto agudo mesentérico es incorrecto; origina dolor abdominal peri-umbilical desproporcionado respecto a los hallazgos físicos superficiales sumado a heces en jalea de grosella en etapas avanzadas, distinto al patrón lumbar descendente urológico. C) Trombosis de la vena gonadal es incorrecto; si bien puede presentarse en mujeres postparto, se caracteriza radiando su dolor al margen pélvico profundo sin alterar las presiones excretoras del cáliz renal simulando apendicitis o EPI grave más que un lito alto.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Cuadro 5, Página 20."
  },
  {
    id: 74,
    question: "Al encontrarse frente a una laparotomía exploradora en un paciente agredido por proyectil de arma de fuego abdominal, el cirujano evidencia la rotura concomitante severa de la bóveda diafragmática exigiendo extensión superior. De acuerdo a la GPC, la necesidad intraoperatoria ineludible de realizar una toracotomía constituye una indicación técnica absoluta para:",
    options: [
      "Institución de cirugía de control de daños",
      "Cierre definitivo de la pared abdominal",
      "Colocación de mallas biológicas de tensión",
      "Angioembolización selectiva vascular diferida"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de cirugía de control de daños, abrir el tórax para tratar un trauma masivo cruzado con el abdomen provoca inestabilidad hemodinámica profunda debido a cambios en la presión intratorácica y exposición al frío del medio ambiente en dos cavidades abiertas simultáneamente. Por normativa institucional estricta, la sola necesidad de añadir la toracotomía cataloga al trauma como \"multisistémico de alta energía letal\", forzando el abandono abdominal mediante control de daños (taponamiento pélvico-abdominal) para centrarse y culminar la reparación ventilatoria vital inminente.<br><br>Perla ENARM: Indicadores objetivos técnicos transoperatorios para instituir la CCD: Necesidad intraoperatoria de toracotomía, por cualquier indicación.<br><br>Análisis de Distractores: B) Cierre definitivo de la pared abdominal es incorrecto; tratar de aproximar aponeurosis y fascias en un enfermo al cual simultáneamente se le operan los pulmones eleva gravemente la tasa de síndrome compartimental abdominal o evisceración. C) Colocación de mallas biológicas de tensión es incorrecto; el abdomen en el contexto de control de daños agudo de dos cavidades requiere terapia de presión negativa intermitente (bolsa de Bogotá o cierre vacío VAC), prohibiéndose injertar mallas permanentes biológicas contaminadas en el primer abordaje. D) Angioembolización selectiva vascular diferida es incorrecto; esto forma parte de los protocolos preoperatorios hemodinámicos complementarios o adjuntos para fracturas de pelvis en \"libro abierto\", no una consecuencia directa de la indicación técnica torácica.",
    source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Indicadores técnicos, Página 24."
  },
  {
    id: 75,
    question: "En el manejo terapéutico inicial de un recién nacido vivo con diagnóstico clínico concluyente de lesión obstétrica del plexo braquial tipo superior, ¿qué indicación restrictiva o medida de terapia física debe dictaminarse durante la primera semana de vida?",
    options: [
      "Iniciar estimulación eléctrica transcutánea",
      "Realizar ejercicios de resistencia progresiva",
      "Evitar los movimientos del miembro afectado",
      "Aplicar movilización pasiva del hombro y codo"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de lesión de plexo braquial, en los primeros siete días posteriores al traumatismo de nacimiento la inflamación del tejido perineural es aguda y se encuentra rodeada de hematoma. Iniciar maniobras enérgicas somete a las raíces nerviosas edematizadas a nuevas fuerzas perjudiciales de estiramiento y tracción, provocando mayor microavulsión que agrava el pronóstico. El reposo pasivo y alineación funcional estática de soporte es la conducta de oro exigida.<br><br>Perla ENARM: Se recomienda que durante la primera semana posterior a la lesión se deben evitar los movimientos del miembro afectado con el fin de no traccionar el plexo.<br><br>Análisis de Distractores: A) Iniciar estimulación eléctrica transcutánea es incorrecto; las modalidades eléctricas son contraindicadas en la etapa aguda hiperreactiva y solo se consideran ante atrofias crónicas dolorosas disfuncionales si el paciente no ejerce ningún tono neuromuscular meses más tarde. B) Realizar ejercicios de resistencia progresiva es incorrecto; el paciente neonato carece de colaboración consciente para ejercicios activos-resistidos. Estos se indican fundamentalmente para mejorar densidad mineral ósea a lo largo de los años en rehabilitación pediátrica tardía. D) Aplicar movilización pasiva del hombro y codo es incorrecto; aunque será el pilar de la terapia de arco de movilidad para prevenir contracturas y rigidez articular, debe posponerse explícitamente hasta pasada la fase aguda de tracción (a partir de los 7-10 días).",
    source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Tratamiento de rehabilitación, Página 3."
  },
  {
    id: 76,
    question: "Tras la activación del código institucional mater por hemorragia postparto masiva e inestabilidad hemodinámica, las guías clínicas dictaminan el abordaje normado del personal de enfermería. ¿Cuál es el calibre mínimo y cantidad de accesos venosos periféricos que deben colocarse inmediatamente para garantizar la reanimación con derivados y cristaloides?",
    options: [
      "Dos catéteres calibre 16 Fr",
      "Dos catéteres calibre 14 Fr",
      "Dos catéteres calibre 18 Fr",
      "Dos catéteres calibre 20 Fr"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de hemorragia postparto, el choque agudo requiere flujos y volúmenes masivos insostenibles por venoclisis rutinarias. Aplicando la Ley de Poiseuille (el flujo es directamente proporcional a la cuarta potencia del radio del catéter), la norma de oro exige instalar de inmediato dos accesos venosos gruesos, cortos y de calibre máximo funcional (14 French/Gauge) que aseguren infundir cargas hídricas mayores a un litro por minuto y hemoderivados sin restricción celular por lisis mecánica en el plástico del trayecto.<br><br>Perla ENARM: Se sugiere al personal de enfermería establecer un plan de cuidados, en el que incluya: Colocar dos catéteres venosos periféricos calibre 14 fr.<br><br>Análisis de Distractores: A) Dos catéteres calibre 16 Fr es incorrecto; a pesar de ser un grosor limítrofe funcional (aguja gris) excelente, la recomendación estricta de mayor poder para el manejo \"ideal y óptimo\" normativo del colapso materno exanguinante está anclado en 14 Fr (aguja naranja). C) Dos catéteres calibre 18 Fr es incorrecto; el lumen verde habitualmente estándar en hospitalización general restringe dramáticamente el torrente pasivo requiriendo compresión o infusión presurizada externa (bolsas presurizadoras) retrasando el aporte volumétrico agudo en el código. D) Dos catéteres calibre 20 Fr es incorrecto; aguja pediátrica o venoclisis fina (rosa), la viscosidad de los concentrados de plaquetas o la densidad de paquetes globulares fríos obstruiría la luz e invalidaría por completo el protocolo transfusional.",
    source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento general, Página 27."
  },
  {
    id: 77,
    question: "De acuerdo al esquema estandarizado del proceso de transferencia y entrega-recepción del paciente en paro cardiorrespiratorio llevado por urgencias prehospitalarias con retorno a la circulación espontánea, ¿qué acciones directas definen la etapa inmediata final categorizada como \"Resolución\" de la emergencia?",
    options: [
      "Las herramientas diagnósticas, EKG y signos vitales",
      "El tiempo de maniobras prehospitalarias in situ",
      "La regulación de acuerdo a la condición de base",
      "La prioridad del paciente y unidad de reanimación"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de paro cardiorrespiratorio en adultos, la transición ininterrumpida de cuidados entre paramédicos de la ambulancia y sala de choque evita reincidencias de arritmias ventriculares. En el algoritmo hospitalario validado, el evento final de \"Resolución\" o transferencia estipula dictaminar expeditamente la prioridad y asentar fisiológicamente a la víctima en el módulo formal de la \"Unidad de Reanimación\", asegurando el eslabón de soporte pos-paro antes del cateterismo definitivo en UCI.<br><br>Perla ENARM: Proceso de transferencia y entrega-recepción del paciente: Resolución: Prioridad del paciente, Unidad de Reanimación.<br><br>Análisis de Distractores: A) Las herramientas diagnósticas, EKG y signos vitales es incorrecto; estas intervenciones mecánicas integran la base procedimental evaluativa de la fase prehospitalaria y monitoreo inicial en sala, no conforman la etapa conclusiva que emite la transferencia del destino. B) El tiempo de maniobras prehospitalarias in situ es incorrecto; este dato esencial representa el apartado de recolección informativa perteneciente exclusivamente a la evaluación del alertamiento o \"Incorporación inicial\" para estimar isquemia del tronco cerebral y pronóstico. C) La regulación de acuerdo a la condición de base es incorrecto; \"alertamiento y regulación\" del paramédico componen el punto de entrada o \"Incorporación y llegada\" al hospital en la cadena de diagramas.",
    source: "IMSS-633-13, Prevención, Diagnóstico y Tratamiento del Paro Cardiorrespiratorio en Adultos, 2013, Algoritmos, Figura 1, Página 17."
  },
  {
    id: 78,
    question: "Al calcular empíricamente la estratificación de riesgo inicial en una mujer cursando el segundo mes de embarazo con factores personales desfavorables, ¿qué umbral numérico en la escala clínica exige institucionalmente el inicio continuo de tromboprofilaxis con enoxaparina desde este primer trimestre?",
    options: [
      "Mayor o igual a 4 puntos",
      "Mayor o igual a 3 puntos",
      "Mayor o igual a 2 puntos",
      "Mayor o igual a 5 puntos"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica obstétrica, no todas las pacientes ameritan pinchazos abdominales diarios durante 9 meses. El sistema validado de puntaje prenatal penaliza severamente padecimientos como síndrome antifosfolípido, trombofilias o eventos tromboembólicos antiguos. Alcanzar o superar el límite absoluto de \"4 puntos\" enaltece el estado de hipercoagulabilidad de tal manera que contraindica la vigilancia conservadora indicando inicio de dosis heparínicas desde la confirmación temprana gestacional.<br><br>Perla ENARM: Interpretación: Si el puntaje total es ≥ 4 prenatal, tromboprofilaxis desde el primer trimestre.<br><br>Análisis de Distractores: B) Mayor o igual a 3 puntos es incorrecto; este número intermedio marca la pauta oficial normativa para retrasar el abordaje inyectable y esperar a dar inicio terapéutico de tromboprofilaxis estrictamente a partir del tercer trimestre (semana 28 de gestación). C) Mayor o igual a 2 puntos es incorrecto; este puntaje determina el comienzo de anticoagulación puerperal o \"postnatal\" obligatoria durante un margen de al menos 10 días tras el alumbramiento o cesárea, pero no ampara intervencionismo en una mujer sana gestando. D) Mayor o igual a 5 puntos es incorrecto; esperar que la paciente rebase la sumatoria de 5 subestima los picos hormonales precoces exponiéndola a embolismos pulmonares o abortos espontáneos trombóticos en la matriz endometrial.",
    source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Cuadro de Evaluación Prenatal, Página 35."
  },
  {
    id: 79,
    question: "Un paciente acude con daño parenquimatoso severo detectándose un gran lito en modelo de asta de ciervo (\"coraliforme\") que dilata por completo la estructura calicial midiendo 5 centímetros totales. ¿De acuerdo a su clasificación Tipo IVa, cuál es el protocolo de abordaje de primera línea indicado para salvaguardar la unidad renal?",
    options: [
      "Litotricia extracorpórea exclusiva y catéter doble J",
      "Extracción endoscópica retrógrada intrarrenal",
      "Cirugía renal percutánea y litotricia extracorpórea",
      "Cirugía abierta de flanco con lumbotomía clásica"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, las masivas calcificaciones coraliformes conllevan carga séptica alta en su matriz intercristalina (Struvita-Proteus) y rebasan toda capacidad de extracción simple. El \"Tipo IVa\" se define como cálculos obstructivos masivos mayores a 7cc; la indicación resolutiva sin nefrectomía exige un abordaje agresivo combinado o \"sándwich\": perforación translumbar directa al cáliz (nefrolitotomía percutánea) para extraer el tallo central masivo, asistida posteriormente con impactos sonoros (LEOC) para triturar cálices y restos periféricos inaccesibles.<br><br>Perla ENARM: Cálculos de gran masa de 7cc o mas (> 4cm) que obstruyen y dilatan la vía urinaria, generalmente son coraliformes o seudocoraliformes. Tratamiento (Tipo IV a): Cirugía renal percutánea y litotricia extracorpórea se reduce masa y se aplican ondas en los fragmentos.<br><br>Análisis de Distractores: A) Litotricia extracorpórea exclusiva y catéter doble J es incorrecto; aplicar bombardeo sonoro exclusivo a masas hiperdensas coraliformes fracciona el lito en gravilla masiva (\"Calle empedrada\") provocando un choque obstructivo distal ureteral catastrófico e insuficiencia post-renal anúrica aguda. B) Extracción endoscópica retrógrada intrarrenal es incorrecto; la cirugía intrauréteral flexible carece de pinzas o láser con potencia suficiente para triturar de forma viable 5 centímetros de masa sólida sin causar estenosis térmica irreversible del urotelio ureteral superior. D) Cirugía abierta de flanco con lumbotomía clásica es incorrecto; los abordajes a cielo abierto incisional retroperitoneales son relegados por invasivos y destructivos, clasificándose actualmente en el último eslabón terapéutico como \"Tipo IV b\" solo aplicables ante anormalidades anatómicas donde falla el acceso percutáneo endourológico.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Cuadro 4 Clasificación clínica, Página 19."
  },
  {
    id: 80,
    question: "Durante el acto anestésico en la laparotomía de un adulto masivamente herido y chocado secundario a balística múltiple, los intensivistas exigen el control bioquímico. ¿Qué volumen específico cuantificado de infusión de hemoderivados aislados infundidos en sala exige detener el evento y pasar a técnica de control de daños para no agravar la cascada letal?",
    options: [
      "Transfusión mayor a 1000 ml",
      "Transfusión mayor a 3000 ml",
      "Transfusión mayor a 2000 ml",
      "Transfusión mayor a 5000 ml"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de cirugía de control de daños, la reposición exógena aguda con paquetes y hemoderivados de banco (desprovistos de temperatura y calcio normal, y ricos en citrato estabilizador) paraliza gravemente el tono enzimático de los factores naturales restantes del paciente. Una infusión transoperatoria desproporcionada, catalogada rígidamente por encima de los 3000 ml en hemoderivados o de 4000 ml en sangre total pura, advierte de una diátesis hemorrágica irremediable que exige empaquetar de inmediato las estructuras.<br><br>Perla ENARM: Indicadores objetivos fisiológicos transoperatorios de institución de CCD: Transfusión >3000 ml de hemoderivados aislados o la suma de cualesquiera de ellos.<br><br>Análisis de Distractores: A) Transfusión mayor a 1000 ml es incorrecto; equivale habitualmente a reponer el déficit aproximado normal transitorio prequirúrgico de un choque inicial G-II sin desencadenar las respuestas letales dilucionales e hipotérmicas extremas del control de daños puro. C) Transfusión mayor a 2000 ml es incorrecto; este parámetro se queda corto como umbral estricto normado en la guía de trauma militar SEDENA como indicativo per se de interrupción de cirugía. D) Transfusión mayor a 5000 ml es incorrecto; este volumen de 5 litros conforma el criterio indicador absoluto para el cálculo fisiológico pero del parámetro de \"sangre natural calculada perdida\" o exanguinada durante la herida/quirófano, no del margen artificial sustituido transfundido en venoclisis.",
    source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Indicadores fisiológicos, Página 22."
  },
  {
    id: 81,
    question: "En un recién nacido con antecedente de depresión cardiorrespiratoria al nacer, ¿qué valor gasométrico estandarizado en la sangre de cordón umbilical es un criterio bioquímico fundamental para confirmar el diagnóstico de asfixia perinatal severa e instituir hipotermia?",
    options: [
      "pH menor a 7.15 y exceso de base -10",
      "pH menor a 7.10 y exceso de base -12",
      "pH menor a 7.00 y déficit de base -16",
      "pH menor a 7.20 y déficit de base -8"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de asfixia neonatal, la injuria hipóxico-isquémica severa requiere la comprobación objetiva del fracaso metabólico anaerobio fetal para justificar protocolos agresivos como el enfriamiento cerebral progresivo. El criterio cardinal que indica acidosis metabólica letal intraparto de alto riesgo se establece de forma categórica con un pH igual o menor a 7.00, acompañado de un déficit de base profundo de -16 mEq/L o más en arteria umbilical.<br><br>Perla ENARM: Gasometría de cordón umbilical con pH ≤ 7.00 y/o déficit de base ≥ -16 mmol/L como criterio diagnóstico estandarizado de asfixia.<br><br>Análisis de Distractores: A) pH menor a 7.15 y exceso de base -10 es incorrecto; estos parámetros determinan un estado de asfixia o hipoxia leve transitoria intraparto que generalmente responde rápidamente a las maniobras de insuflación inicial sin requerir soporte neurológico avanzado. B) pH menor a 7.10 y exceso de base -12 es incorrecto; aunque representan daño intermedio, no alcanzan el umbral catastrófico tisular estipulado por la academia para obligar a paralizar el metabolismo central mediante el protocolo de hipotermia en Terapia Intensiva. D) pH menor a 7.20 y déficit de base -8 es incorrecto; es un valor fisiológicamente alterado de forma común posterior al estrés natural expulsivo de un trabajo de parto prolongado pero sin disfunción de órganos blanco en el neonato.",
    source: "IMSS-371-10, Diagnóstico y tratamiento de Asfixia Neonatal, 2010, Criterios diagnósticos, Página 12."
  },
  {
    id: 82,
    question: "Durante la reanimación quirúrgica de un paciente agredido por proyectil de arma de fuego abdominal, se lleva el registro estricto de los líquidos infundidos por el anestesiólogo. ¿Qué umbral volumétrico intraoperatorio total exige detener el procedimiento anatómico y aplicar control de daños?",
    options: [
      "Mayor a 8,000 ml",
      "Mayor a 12,000 ml",
      "Mayor a 10,000 ml",
      "Mayor a 6,000 ml"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de cirugía de control de daños, la reanimación masiva descontrolada desencadena edema intersticial sistémico profundo y grave síndrome compartimental abdominal intrínseco. El indicador fisiológico transoperatorio que dictamina formalmente la interrupción ineludible de la reparación anatómica definitiva es una infusión de líquidos combinada que exceda los 12,000 ml, sumando cristaloides, coloides, sangre total y derivados, para evitar un cierre a tensión letal en la pared del enfermo.<br><br>Perla ENARM: Indicadores objetivos fisiológicos transoperatorios de institución de CCD: Infusión intraoperatoria de volumen >12,000 ml sumando cristaloides, coloides, sangre total y hemoderivados.<br><br>Análisis de Distractores: A) Mayor a 8,000 ml es incorrecto; infundir 8 litros en un evento de trauma mayor de horas de evolución es común en reanimaciones extensas sin obligar normativamente al abandono quirúrgico preventivo. C) Mayor a 10,000 ml es incorrecto; esta barrera de diez litros confiere alta morbilidad a nivel esplácnico pero carece de la validación matemática oficial asentada en el algoritmo militar como línea límite de control total de daños. D) Mayor a 6,000 ml es incorrecto; subestimaría un reemplazo volumétrico aceptable que requiere un individuo en choque hemorrágico grado III o IV durante una laparotomía exploradora rutinaria resuelta a tiempo.",
    source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Indicadores fisiológicos, Página 22."
  },
  {
    id: 83,
    question: "En una paciente primigesta internada con diagnóstico establecido de preeclampsia con datos de severidad, que se encuentra estabilizada hemodinámicamente y con maduración pulmonar fetal completa administrada, ¿cuál es la edad gestacional a partir de la cual la indicación absoluta es la interrupción del embarazo?",
    options: [
      "Mayor o igual a 34 semanas",
      "Mayor o igual a 37 semanas",
      "Mayor o igual a 36 semanas",
      "Mayor o igual a 32 semanas"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de preeclampsia, la patología hipertensiva endotelial es progresiva y médicamente incurable. Prolongar el embarazo de manera conservadora más allá de la semana 34 en presencia de datos de severidad o daño a órgano blanco expone a la madre a eclampsia inminente o hemorragia hepática severa, sin otorgar un beneficio madurativo o de sobrevida fetal sustancial. Llegada esta fecha, la balanza de riesgo-beneficio obliga a la cesárea o inducción.<br><br>Perla ENARM: En mujeres con preeclampsia severa con un embarazo ≥ 34 semanas de gestación, se recomienda la resolución del embarazo, para reducir el riesgo de morbilidad materna.<br><br>Análisis de Distractores: B) Mayor o igual a 37 semanas es incorrecto; esta es la meta de resolución protocolaria recomendada exclusivamente para pacientes con trastornos hipertensivos del embarazo de espectro leve o preeclampsia sin datos de severidad agregados. C) Mayor o igual a 36 semanas es incorrecto; someter a la unidad fetoplacentaria vasospástica y al encéfalo de la madre a semanas extra de hipoxia isquémica una vez pasadas las 34 incrementa notablemente las tasas de desprendimiento de placenta normoinserta. D) Mayor o igual a 32 semanas es incorrecto; en semanas previas a la 34 (ej. 32 semanas) la conducta se basa en el manejo expectante activo intrahospitalario estricto para ganar los días vitales que confieren los corticoides exógenos, en medida que la madre permanezca estable orgánicamente.",
    source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en segundo y tercer nivel de atención, 2017, Tratamiento obstétrico, Página 24."
  },
  {
    id: 84,
    question: "En el neonato crítico, ¿cuál es el biomarcador sérico que presenta una elevación fisiológica normal durante las primeras 48 horas de vida extrauterina, lo que causa frecuentes diagnósticos falsos positivos si se utiliza como tamizaje temprano para descartar infección?",
    options: [
      "Procalcitonina",
      "Proteína C reactiva",
      "Interleucina 6",
      "Velocidad de sedimentación"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de sepsis neonatal, la procalcitonina es un excelente reactante de fase aguda contra bacterias, sin embargo, experimenta un potente pico de elevación endógeno fisiológico no infeccioso mediado por el estrés del alumbramiento y adaptación pulmonar en los neonatos sanos entre las primeras 24 a 48 horas. Carece de especificidad inicial, por lo que se recomienda interpretar con extrema precaución o preferir la elevación seriada retardada de la proteína C reactiva en la sospecha temprana.<br><br>Perla ENARM: La procalcitonina tiene una elevación fisiológica las primeras 48h de vida, lo cual hace difícil la interpretación de este biomarcador sérico para establecer el diagnóstico de sepsis neonatal en etapa precoz.<br><br>Análisis de Distractores: B) Proteína C reactiva es incorrecto; aunque también tiene cinéticas de tiempo (tarda en elevarse entre 12 a 24 horas posterior a la invasión antigénica), no tiene el rebote o elevación \"fisiológica normal\" masiva posnatal que sí experimenta la cadena de procalcitonina de manera adaptativa. C) Interleucina 6 es incorrecto; es un mediador inmunológico precoz de hiper-respuesta (aparece en las primeras horas), pero su costoso procesamiento limita su uso estandarizado y no se enlista como el falso positivo basal primario del escrutinio nacional. D) Velocidad de sedimentación es incorrecto; parámetro en desuso por su extrema lentitud en modificarse en el cuadro séptico y su alta variabilidad frente a la simple anemia dilucional pediátrica.",
    source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Pruebas diagnósticas, Página 22."
  },
  {
    id: 85,
    question: "A la sala de urgencias ingresa un paciente con cólico renoureteral al cual se le evidencia por tomografía un lito radioopaco en la pelvis renal de 5 cc de volumen, de consistencia dura y con riñón contralateral sano. De acuerdo a la clasificación morfológica, ¿cuál es la conducta terapéutica de primera intención indicada para este cálculo Tipo II?",
    options: [
      "Cirugía renal percutánea y derivación ureteral",
      "Litotricia extracorpórea previa colocación de catéter",
      "Nefrolitotomía abierta por lumbotomía lateral",
      "Extracción endoscópica con láser ureteral holmium"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de cólico renoureteral, los litos de volumen intermedio (3 a 7 cc) o aquellos de consistencia dura clasificados como \"Tipo II\" conllevan un alto riesgo de obstruir masivamente el uréter inferior al fragmentarse durante la fase expulsiva. Por ende, la Litotricia Extracorpórea con Ondas de Choque (LEOC) es válida y altamente resolutiva, pero exige forzosamente la colocación profiláctica previa de un catéter endoureteral doble J simple, asegurando el drenaje urinario y previniendo la urgencia por \"calle empedrada\".<br><br>Perla ENARM: Tratamiento Litiasis Tipo II (Cálculos entre 3 y 7 cc, o menores pero duros o monorrenos): LEOC previa colocación endoureteral simple de derivación.<br><br>Análisis de Distractores: A) Cirugía renal percutánea y derivación ureteral es incorrecto; el acceso transfistular percutáneo de grueso calibre se reserva estrictamente como pilar de oro para el volumen de los cálculos \"Tipo III\" o los coraliformes masivos del \"Tipo IV a\". C) Nefrolitotomía abierta por lumbotomía lateral es incorrecto; como técnica invasiva y destructora de parénquima de la última línea \"Tipo IV b\", se limita a riñones excluidos o estenosis severas de la anatomía pélvica que impidan cualquier instrumento moderno no invasivo. D) Extracción endoscópica con láser ureteral holmium es incorrecto; las sondas retrógradas flexibles de láser carecen del poder ablativo generalizado sin sobrecalentar el área en masas libres alojadas masivamente en el cáliz (pelvis) mayores a 3 cc sin demorar horas transoperatorias letales en anestesia.",
    source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Cuadro 4 de Manejo Quirúrgico, Página 19."
  },
  {
    id: 86,
    question: "Durante la interpretación acelerada de los módulos de tromboelastometría (ROTEM) en una paciente con exanguinación obstétrica, se reporta una marcada disminución de las amplitudes A5 y A10 con alteraciones severas concurrentes en el módulo de FIBTEM. ¿A qué trastorno coagulopático específico dictamina este patrón analítico funcional?",
    options: [
      "Hiperfibrinólisis fulminante local",
      "Déficit de plaquetas puro y secuestro",
      "Déficit agudo de fibrinógeno consumido",
      "Deficiencia de factor de von Willebrand"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de hemorragia postparto, la tromboelastometría es la herramienta \"Point of Care\" predilecta para guiar la reanimación fisiológica dirigida. El reactivo específico \"FIBTEM\" bloquea e inhibe químicamente a las plaquetas con citocalasina D, revelando en tiempo real y exclusivo el estado puro de polimerización del coágulo de fibrina celular. Si la amplitud reportada a los cinco minutos (A5) es deficiente y cae bruscamente, diagnostica una hipofibrinogenemia profunda y marca la inyección bolo de liofilizado o crioprecipitados.<br><br>Perla ENARM: Interpretación tromboelastometría (Déficit de fibrinógeno): Existen disminución de la A5 y A10 y MCF y con alteraciones en estos parámetros en el módulo de FIBTEM A5 por lo que indica hipofibrinogenemia.<br><br>Análisis de Distractores: A) Hiperfibrinólisis fulminante local es incorrecto; el patrón de fibrinólisis se detecta mediante la alteración y caída en picada en forma de gota del parámetro \"Lisis Máxima\" o ML en los últimos minutos del trazo gráfico y exige la ministración exclusiva de ácido tranexámico. B) Déficit de plaquetas puro y secuestro es incorrecto; se diagnostica cuando hay decremento franco en la curva global (A5, A10) pero con el módulo FIBTEM completamente normal y respetado (sin alteración fibrilar dependiente), lo que evidencia que la falla estructural y retráctil fue netamente de consumo plaquetario y no proteico. D) Deficiencia de factor de von Willebrand es incorrecto; las coagulopatías congénitas de factores leves no se evalúan con un ROTEM en el servicio de emergencia de sala de choque durante el desastre, y no se reflejan patognomónicamente en un colapso del trazado de fibrina gruesa en FIBTEM.",
    source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadro 7, Página 34."
  },
  {
    id: 87,
    question: "En un paciente de 4 años de edad en el servicio de ortopedia pediátrica en seguimiento de valoración de secuelas crónicas por lesión obstétrica del plexo braquial en nacimiento complicado, ¿cuál es la escala clínica cualitativa validada de recomendación que el especialista aplica para evaluar la función biomecánica abductora y rotadora de la extremidad?",
    options: [
      "Escala de Mallet modificada",
      "Escala de Daniels y Worthingham",
      "Escala de Campbell pediátrica",
      "Clasificación funcional de Narakas"
    ],
    answer: 0,
    justification: "Justificación: De acuerdo GPC de lesión del plexo braquial, en la etapa tardía preescolar y escolar la evaluación de los grados articulares sustituye a la del tono aislado. La escala modificada de Mallet es el estándar de oro cualitativo ortopédico visual que puntúa (Grado I a V) la simetría y competencia para realizar maniobras activas complejas de la vida diaria: abducción, rotación externa de hombro, y el acto de llevar la mano a la nuca, espalda y boca, sentando indicación de transposición paliativa musculotendinosa.<br><br>Perla ENARM: Se sugiere emplear la escala de Mallet modificada, que es en niños en edades preescolar y escolar para la evaluación objetiva de la lesión del plexo braquial.<br><br>Análisis de Distractores: B) Escala de Daniels y Worthingham es incorrecto; se aplica de forma histórica en neurología y rehabilitación global generalizada para otorgar valores numéricos crudos (0 a 5) a la contractilidad manual aislada sinérgica en adultos o enfermedades sistémicas paralíticas, careciendo de sensibilidad funcional biomecánica pura de hombro. C) Escala de Campbell pediátrica es incorrecto; un distractor ortopédico. Campbell representa tratados enciclopédicos quirúrgicos y no una escala de medición validada universal específica para reevaluación funcional del neonato. D) Clasificación funcional de Narakas es incorrecto; es un modelo pronóstico de tipificación descriptiva pero aplicado exclusivamente de las 2 a 3 primeras semanas de nacido (Neonato), caracterizando la radiculopatía topográfica (Ej. Grupo I: Erb, C5-C6) no a los 4 años.",
    source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Diagnóstico clínico, Página 11."
  },
  {
    id: 88,
    question: "Al explorar físicamente la rodilla de un deportista amateur de 22 años posterior a sufrir un traumatismo directo en mecanismo de valgo severo, ¿cuál de las siguientes maniobras semiológicas clínicas se considera el estándar ideal por tener la mayor sensibilidad y especificidad en la rotura de ligamento cruzado anterior aguda?",
    options: [
      "Prueba de compresión de Apley",
      "Prueba de pinzamiento de McMurray",
      "Prueba de abducción rotacional varo",
      "Prueba clínica de estrés de Lachman"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de lesiones ligamentarias, aunque el cajón anterior ha sido popularmente divulgado, la prueba de Lachman (tracción anterior de la tibia con respecto al fémur estando la rodilla flexionada estrictamente a 30 grados) neutraliza eficientemente el espasmo protector de los isquiotibiales paralizados por el dolor en la urgencia y aísla casi al 100% la competencia del haz principal de contención, siendo la maniobra con el mayor valor predictivo en rodillas edematizadas.<br><br>Perla ENARM: La prueba de Lachman es la más sensible y específica para detectar lesiones del ligamento cruzado anterior y preferible a la prueba del \"Cajón anterior\" en la fase aguda.<br><br>Análisis de Distractores: A) Prueba de compresión de Apley es incorrecto; el paciente en decúbito prono con presión axial trituradora evalúa el atrapamiento e integridad cartilaginosa estructural de los cuernos meniscales, no las cuerdas de sostén ligamentarias mediales cruzadas. B) Prueba de pinzamiento de McMurray es incorrecto; consiste en rotación lateral o medial forzada desde la flexión profunda, siendo el estándar de oro pero para el diagnóstico y resalte clásico \"clic\" audible del desgarro en cuerpo o cuerno del menisco. C) Prueba de abducción rotacional varo es incorrecto; estresar mecánicamente la rodilla traccionando de la rodilla en varo evidencia la laxitud pura bostezoide del ligamento colateral lateral externo periférico aislado, muy distante del eje intrarticular profundo central.",
    source: "IMSS-388-10, Diagnóstico y tratamiento de las lesiones ligamentarias, 2010, Diagnóstico Clínico, Página 10."
  },
  {
    id: 89,
    question: "Un recién nacido prematuro de 31 semanas de gestación ingresa con quejido espiratorio franco y se decide iniciar soporte respiratorio inicial continuo ante sospecha de inmadurez de neumocitos. ¿Cuál es el nivel programado de presión positiva de distensión (CPAP) de inicio estandarizado que se indica normativamente?",
    options: [
      "3 a 5 cm H2O",
      "5 a 8 cm H2O",
      "7 a 10 cm H2O",
      "2 a 4 cm H2O"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, la aplicación precoz del CPAP nasal continuo estabiliza funcionalmente la caja torácica previene el colapso alveolar terminal asimétrico, y moviliza las escasas reservas de fosfolípidos endógenos hacia la superficie de los macrófagos. Se ordena comenzar el soporte ventilatorio con presiones limítrofes basales de 5 a 8 cm H2O; presiones de alta insuflación generan barotrauma iatrogénico, atrapamiento aéreo asimétrico e impiden el llenado de las cavidades cardiacas disminuyendo el gasto venoso cerebral.<br><br>Perla ENARM: Se recomienda iniciar el uso de CPAP en neonatos pretérmino con SDR incipiente o en riesgo de padecerlo con presión de 5 a 8 cm de H2O.<br><br>Análisis de Distractores: A) 3 a 5 cm H2O es incorrecto; es una presión subóptima y superficial en pediatría neonatal que no logra contrarrestar el vector elástico de colapso de la membrana hialina de las atelectasias primarias masivas en déficit de tensoactivos. C) 7 a 10 cm H2O es incorrecto; este rango superior corresponde al modo de ventilación mecánica invasiva intermitente avanzada o PEEP con TET en casos de SDR refractarios severos de placa blanca, nunca como soporte basal en puntas inicial. D) 2 a 4 cm H2O es incorrecto; es la presión positiva endógena residual o resistencia que puede ofrecer a nivel pediátrico una mascarilla pasiva de oxígeno conectada a un flujómetro libre, inútil para la apertura alveolar sostenida alveolar activa.",
    source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido, 2021, Tratamiento No invasivo, Página 15."
  },
  {
    id: 90,
    question: "En la estadificación pronóstica de una paciente gestante que desarrolla sepsis urinaria grave, se aplica el sistema de puntuación para disfunción orgánica modificado para obstetricia (omSOFA). ¿A partir de qué valor en el reporte químico sérico de creatinina materna se penaliza formalmente el parámetro de falla renal con 1 punto positivo de deterioro inminente?",
    options: [
      "Mayor a 1.0 mg/dl",
      "Mayor a 1.5 mg/dl",
      "Mayor a 1.2 mg/dl",
      "Mayor a 0.8 mg/dl"
    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de sepsis materna, el aclaramiento dinámico renal gestacional aumenta hasta en un 50% creando un estado crónico de hiperfiltración hemodinámica que disminuye artificialmente la creatinina sérica esperada para el metabolismo. Por ello, la escala obstétrica omSOFA ajusta el margen de alerta y penaliza drásticamente niveles que en mujer no gestante serían considerados de piso. Un nivel numérico documentado superior a 1.2 mg/dl es prueba indudable de fracaso tubular por citocinas, agregando puntos de letalidad o transferencia a UCI.<br><br>Perla ENARM: Escala omSOFA obstétrica: Se consideran puntos positivos en falla renal cuando la Creatinina es mayor a 1.2 mg/dl.<br><br>Análisis de Distractores: A) Mayor a 1.0 mg/dl es incorrecto; aunque el rango normal del embarazo oscila debajo de 0.8 mg/dL, el 1.0 se mantiene en el margen de reserva compensatoria limítrofe sin clasificar objetivamente en el instrumento validado la disfunción absoluta orgánica per se. B) Mayor a 1.5 mg/dl es incorrecto; este número se alinea mejor con los criterios generales para el diagnóstico en pacientes sépticos varones o mujeres no grávidas (escala SOFA adultos original clásica), ignorando los cambios volumétricos pélvicos. D) Mayor a 0.8 mg/dl es incorrecto; este es el umbral superior de referencia esperado y fisiológico de un embarazo sano. Penalizar como daño a la mujer a partir de aquí llenaría falsamente de puntos a mujeres compensadas saturando terapias intensivas.",
    source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Cuadro 3 Criterios Clínicos y Paraclínicos SOFA, Página 24."
  },
  {
    id: 91,
    question: "En la reevaluación seriada de un paciente adulto de 50 años intubado en la Unidad de Terapia Intensiva con nutrición enteral establecida por evento de trauma masivo de cráneo, ¿cuál es el rango meta u objetivo estricto de glucemia sérica que exige el control normado para reducir neuroinflamación y sobrevida metabólica?",
    options: [
      "80 a 110 mg/dl",
      "100 a 120 mg/dl",
      "120 a 150 mg/dl",
      "140 a 180 mg/dl"
    ],
    answer: 3,
    justification: "Justificación: De acuerdo GPC de nutrición enteral y parenteral, la doctrina histórica del \"control estricto\" de la glucemia con límites restrictivos similares a una persona sana demostró, en macro estudios poblacionales intensivos (NICE-SUGAR), incrementar trágicamente las defunciones hospitalarias por episodios de hipoglucemias cerebrales yatrogénicas inadvertidas en el sujeto anestesiado. El consenso vigente e indicación exige tolerar el estrés metabólico natural catecolaminérgico persiguiendo siempre la banda de los 140 a 180 mg/dL, frenando la inmunosupresión hiperglucémica sin matar de hambre celular al sistema nervioso.<br><br>Perla ENARM: En los pacientes críticos ingresados a la UCI el control de la glucosa sérica total debe mantenerse en el rango de los 140 a 180 mg/dl con aporte nutricional e insulina pautada.<br><br>Análisis de Distractores: A) 80 a 110 mg/dl es incorrecto; esto es un control restrictivo que somete a los pacientes críticos a una exigencia imposible sin causar depleción grave de las reservas de glycogeno y muerte celular programada oculta a nivel glial. B) 100 a 120 mg/dl es incorrecto; las infusiones de propofol y aminas adrenérgicas requeridas en trauma impiden mantener la glucosa central en números tan estrechos del sujeto fisiológico base exento de hormonas contrarreguladoras inflamatorias elevadas. C) 120 a 150 mg/dl es incorrecto; a pesar de ser un excelente objetivo intermedio deseable o límite inferior de la ventana prudencial permisiva, la directriz institucional explícitamente se alarga y amplifica en la superioridad numérica del nivel oficial hasta 180 para asegurar resguardo general.",
    source: "IMSS-818-17, Nutrición parenteral y enteral en el paciente adulto en estado crítico, 2017, Tratamiento Glucémico Metabólico, Página 75."
  },
  {
    id: 92,
    question: "Durante el aseo quirúrgico inicial tras sufrir de atropellamiento por vehículo en movimiento, el cirujano ortopedista categoriza una lesión radial grave y visualiza extensa sección profunda de planos subcutáneos midiendo una herida abierta sangrante de 12 centímetros de extensión; sin embargo, al terminar el lavado con pulso, la aponeurosis y colgajos dérmicos logran proteger a los fragmentos óseos completamente. Según el sistema de Gustilo-Anderson, ¿qué clasificación final corresponde?",
    options: [
      "Tipo II",
      "Tipo IIIA",
      "Tipo IIIB",
      "Tipo IIIC"
    ],
    answer: 1,
    justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, el estatus de la herida abierta dicta empíricamente el tiempo y pauta profiláctica del foco óseo expuesto. Toda agresión de la cobertura mayor a los 10 centímetros con mecanismo sucio severo o trauma triturante entra irremediablemente a la categoría de alta energía Tipo III. Su subdivisión en la letra \"A\" deriva explícitamente del hallazgo operatorio favorable de mantener periostio sano y piel capaz de suturarse por segunda intención ofreciendo recubrimiento natural adecuado directo sobre el armazón sin recurrir al desgaste extenuante del cirujano plástico reconstructivo.<br><br>Perla ENARM: Fracturas expuestas Gustilo Tipo IIIA: Laceración extensa de partes blandas >10cm, con adecuada cobertura ósea conservada y local de la diáfisis.<br><br>Análisis de Distractores: A) Tipo II es incorrecto; define el daño intermedio con una herida perforante lineal que comprende un rango métrico estricto posicionado entre 1 y 10 centímetros con grado modesto de avulsión del tejido perimetral periférico. C) Tipo IIIB es incorrecto; el rubro \"B\" implica una verdadera catástrofe de las fascias perdiendo gran masa o arrancamiento traumático, dejando el tejido óseo desnudo (pelado) e indicando inminentemente colgajos libres fascio-cutáneos para lograr su cierre eventual. D) Tipo IIIC es incorrecto; está dictaminado únicamente por el parámetro de compromiso o destrucción directa del paquete vascular arterial principal que nutre al miembro, independientemente del tamaño en centímetros y que precisa bypass de revascularización.",

    question: "En el abordaje preestablecido de una gestante de 28 semanas con clínica asintomática de edema pero disnea paroxística súbita, taquicardia y alteración respiratoria sugestivas de un evento de tromboembolia pulmonar masivo en curso, la radiografía protocolaria de tórax reporta parénquima y campos pulmonares normales. ¿Cuál es el estudio de imagen y gabinete confirmatorio de elección dictado en la paciente grávida en ausencia de un colapso inestable total?",

del parénquima de respiración central.",

    question: "Al coordinar con los técnicos de transfusión el suministro urgente del banco durante una emergencia por hemorragia obstétrica persistente letal en expulsivo, se debe categorizar volumétricamente el caso del paciente. ¿Cuál parámetro en la transfusión clínica de soporte emite normativamente el criterio oficial absoluto para instituir de inmediato un protocolo institucional de \"transfusión masiva\" sin reserva?",

    justification: "Justificación: De acuerdo GPC de choque hemorrágico obstétrico, perder litros enteros devasta las variables y la termodinámica natural materna induciendo falla hemodinámica fulminante de reanimación tardía. Los hospitales exigen detonadores numéricos incuestionables para brincarse los perfiles retardados convencionales de grupo sanguíneo cruzado y abrir protocolos a la infusión empírica O negativo. Perfundir a tal celeridad incontrolable como lo es gastar de forma forzosa aguda 4 bolsas o unidades concentradas frías empaquetadas en tan solo 60 minutos delinea indiscutiblemente pérdida vascular en curso insostenible apegándose al estándar descriptivo exigido.<br><br>Perla ENARM: Definiciones obstétricas (Criterios para Transfusión Masiva Activa): Reemplazo biológico de 1 volumen sanguíneo base de paciente en 24h, pérdida acelerada del >50% de volumen de volemia sanguínea en 3h, o el requerimiento intrahospitalario emergente de 4 concentrados eritrocitarios transfundidos en 1 hora.<br><br>Análisis de Distractores: A) Hemorragia postparto mayor a los 1,000 ml en 12 horas es incorrecto; mil mililitros definen históricamente la categoría inicial obstétrica posparto en parto abdominal o cesárea de definición de la hemorragia anormal, mas una instauración esparcida a lo largo de docenas de horas está diametralmente lejos del grado cataclísmico exanguinante del protocolo inminente masivo. B) Caída en porcentaje del 30% del volumen corporal total es incorrecto; entraría en un choque compensado grado intermedio II que responde usualmente en su fase primaria hídrica con cristaloides tibios resucitadores y control vascular oportuno sin llegar a agotar obligadamente depósitos de banco celular en minutos. D) Necesidad demostrada de aplicar 2 plasmas congelados de refuerzo es incorrecto; reanimar el pool deficitario secundario del sistema homeostático materno pos-dilución a una infusión media cristalina empleando dosis estables plasmáticas de profilaxis o por alteración PT/PTT basal no categoriza sangrado terminal per se.",

    question: "Durante una sesión general matutina en imagenología geriátrica, al evaluar a una paciente con postración y dolor limitante pélvico postcaída menor, se discuten los ejes articulares corticales evidenciando fractura intracapsular del cuello femoral. La lesión radiográfica es sutil y la cortical inferior del cuello proximal se mantiene sin desgarro y anatómicamente continua sin embargo el cuello ha modificado su eje estructural abriéndose en angulación externa o abducción. ¿A qué estadio predictivo cerrado de inestabilidad obedece el hallazgo con el sistema morfológico clínico de Garden?",

    justification: "Justificación: De acuerdo GPC de fracturas intracapsulares del fémur, este trauma en ancianos divide su pronóstico en el desgarro biomecánico del suministro de perfusión terminal a las arterias de la cápsula cefálica por luxación anatómica de espigas óseas. El nivel clasificatorio \"Tipo I\" del modelo histórico vigente denota la variante anatómica con menor daño vascular local en la cual las fibras de contención superior presentan fisuras o cizallamiento con impacto firme pero de forma subcapital incompleta hacia las trabéculas inferiores cerradas conservadas fuertemente, generando la abducción clásica en valgo con acortamiento e imposibilidad de pérdida y rotación libre fragmentaria.<br><br>Perla ENARM: Clasificación morfológica funcional en urgencias por criterios de Garden: Tipo I: Fractura del cuello femoral incompleta o compactada en abducción (frecuentemente denominada impactada en valgo).<br><br>Análisis de Distractores: A) Tipo II es incorrecto; las fracturas del grado dos cruzan en corte ambas corticales de polo a polo perdiendo el soporte bisagra pero sin que el trazo y músculos desplacen ningún milímetro el fragmento suelto en angulaciones varo o valgo (completa pero indemne in situ sin bostezo). B) Tipo IV es incorrecto; señala la etapa extrema triturada articular máxima y con pérdida absoluta de contacto óseo congruente residual e isquemia irreversible en el anciano con luxación completa radiológica intraacetabular exigiendo obligadamente extracción articular y prótesis de fémur cabeza/bipolar directa para salvataje biomecánico. C) Tipo III es incorrecto; señala la fractura total pero solo con desplazamiento del eje femoral parcial con rotación interna o hundimiento clásico con varo manifiesto sin dejar libre las líneas del trocánter, requiriendo cirugías reconstructivas rápidas por alto porcentaje destructivo vascular inminente.",

    question: "Al egresar a un niño macrosómico tras parto precipitado en área de urgencias pediátricas, las enfermeras programan su estricta curva de escrutinio hemostático periférico de acuerdo a protocolos por alteración en su adaptación homeostática y metabolismo hepático a su segunda hora fuera del vientre con toma capilar asintomática sin llanto. ¿A partir de qué valor biométrico laboratorial puntual establece la pediatría nacional objetivamente la confirmación franca del dictamen en descontrol metabólico por patología de hipoglucemia limitante tisular sin convulsión ni temblor en neonatología clínica?",

egligencias de reanimación pediátricas al tardarse demasiadas horas preciosas de función cerebral mielínica o perfusión isquémica focal de la base cortical subestimando patologías letales de hiperinsulinismo en infantes limítrofes sin tratamiento correctivo rápido y prematuros inmaduros por dejar descender y cruzar el borde de cincuenta al extremo biológico riesgoso de 40mg.",

    question: "Un paciente escolar en estado de choque descompensado de terapia intensiva pediátrica muestra signos terminales letargos, edema fulminante y anuria por complicación de nefritis parenquimatosa refractaria a manejo farmacológico sin orinar por tres días, las resistencias metabólicas agudas exigen filtrado. Al valorar los criterios agudos de emergencia orgánicos bioquímicos en el paciente que cursa en anuria y fracaso, ¿qué hallazgo en la química del panel de potasio se instaura universalmente como criterio formal normado para arrancar hemodiálisis pediátrica innegociable inminente por lesión renal aguda?",

nico especializado nefrótico como Nivel Evidencial universal resolutivo con catéter Mahurkar obliga al corte superior estricto del medio punto a los 6.5 equivalentes de gravedad institucional.",
    source: "SS-231-18, Prevención, diagnóstico y tratamiento de la Lesión Renal Aguda, 2018, Tratamiento Específico Cuadro de Reemplazo, Página 82."

  {
    id: 99,
    question: "En una paciente joven con sangrado silencioso, abdomen agudo súbito y dolor con prueba positiva urinaria reactiva hormonal se le pide marcadores de la gonadotropina y en seguida acude al gabinete de visualización pélvica ginecológica en búsqueda de exclusión clínica de abortos naturales y control diagnóstico presuntivo transvaginal. ¿Cuál debe ser estrictamente en las normativas actuales la lectura inferior del reporte de marcador hormonal de beta de hormona gonadotropina coriónica milimétrica que si no se encuentra preñez confirmada interior dentro del revestimiento de la bolsa uterina confirmará un crecimiento silente ectópico grave de las trompas pélvicas rotas o distendidas y obligará a revisión instrumentada sin más demora resolutiva inminente y laparoscópica referida de alta especialidad?",
    options: [

    justification: "Justificación: De acuerdo GPC de diagnóstico inicial de emergencias obstétricas prenatales, todo embrión con capacidad sintética vital produce fracciones hormonales crecientes aceleradas a nivel de células de la membrana trofoblástica tempranas en nidación. Para proteger intervencionismos erróneos tempranos (como raspar una matriz limpia pero que es tan temprana que en el eco pélvico ni siquiera visualizamos un diminuto y minúsculo saco viable aún porque su medición en días cuenta apenas micro unidades imperceptibles en milímetros del útero a nivel de la lente de visualización de transductores ultrasonográficos intravaginales finos del servicio), el consenso dictamina la \"cifra de la visualización biológica obligatoria\". Un escaneo vacío o limpio interiormente de la cavidad endouterina pero poseyendo su sangre serológica sistémica en picos titulatorios altos del orden estandarizado numéricamente a la cifra superior limítrofe validada del nivel de 1,500 o los 2,000 mil unidades, descarta el pseudo embarazo temprano en ovulación, diagnosticando inequívocamente presencia ectópica riesgosa escondida peritoneal o tubaria amenazando a rotura silente peritoneal ovárica grave o exanguinante del cuerno materno si la paciente tiene sintomatología sospechosa aguda adjunta grave abdominal pélvica lateral en consulta en observación y no presenta menstruación y descargas cervicales.<br><br>Perla ENARM: Se considera que debe de identificarse con el equipo estandarizado en el ultrasonido transvaginal un saco o vesícula de embarazo intrauterino siempre con niveles absolutos de hormona gonadotropina coriónica (HGC) estandarizada medible y comprendida superiormente entre el límite en corte de diagnóstico de las 1500 mUI/ml.<br><br>Análisis de Distractores: B) 1,000 mUI/ml es incorrecto; los embarazos uterinos saludables y normo-posicionados con esta lectura hormonal pueden no ser aún visualizados morfológicamente, diagnosticando erróneamente con una falsa alarma iatrogénica de aborto ectópico al saco del cigoto invisible a su ojo óptico microscópico. C) 2,500 mUI/ml es incorrecto; diferir las cirugías urgentes o metotrexato farmacológico de contención tubárica exigiendo el parámetro ascendente de los 2500 como validación condena el órgano pélvico fimbrial al estallamiento catastrófico con alto índice de salpingectomías quirúrgicas totales letales inevitables perdiendo por completo del órgano tubárico de la fecundidad para futuro orgánico grávido. D) 3,000 mUI/ml es incorrecto; estos rangos superan con amplia creces la cuota inferior normada universal validatoria en México para la técnica de imagen obstétrica de resolución vaginal ecográfica estándar básica de hospital o triaje institucional ginecológico que aísla visualizaciones directas claras.",
    source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Diagnóstico Ultrasonográfico, Página 62."

    question: "En el triaje de atención pediátrica se recibe niño chocado que presenta compromiso somnoliento por síndrome infeccioso severo postraumático. Al evaluar la integridad neurológica de la sedación cerebral empleando en el lactante su instrumento con el puntaje calificado de la escala clásica modificada y estandarizada general de coma en Glasgow para infantes pediátricos pre-lingüísticos menores del primer año vital de desarrollo sin cognición conversacional. ¿Qué reacción en la respuesta vocal infantil cataloga y penaliza dramáticamente como puntuación extrema grave brindando estrictamente el peor y menor estado antes de la ausencia o un 2 sobre su hoja general?",
    options: [
      "Llora al dolor",

    ],
    answer: 2,
    justification: "Justificación: De acuerdo GPC de sepsis pélvica generalizada pediátrica, las limitantes comunicativas primitivas restringen calificar los balbuceos lactantes con el Glasgow regular adulto conversacional verbal normal que demanda orientación estructurada analítica compleja, siendo obligatorio sustituir la \"confusión\" de los mayores por el simple \"llanto ruidoso\" infantil. En este desglose validado y modificado internacional estricto neonatal la vocalización deficiente y sorda que cataloga como el escalón 2 del puntaje de peor pronóstico grave es el lactante que ante las maniobras pélvicas y tracción algesiva extrema (dolor de maniobras o pinchazos de resucitación y canalización periférica aguda) se comporta sumido y letárgico imposibilitado de alzar el grito reaccionario, arrojando lúgubremente y de manera primitiva únicamente quejidos tenues, gemidos ahogados bajos o gruñidos sordos de origen de espasmo del reflejo bulbar.<br><br>Perla ENARM: Escala de coma de Glasgow Modificada para Niños. Evaluación de respuesta verbal del paciente menor de 1 año (Lactantes pre-lingüísticos): 5 Puntos con balbuceo espontáneo, 4 con llora normal y activo, 3 para aquel que llora al dolor severo, el 2 si apenas y se queja sordo, gruñe o gime bruscamente y 1 por completo con una inactividad sin la menor de las respuestas vitales vocales foniátricas.<br><br>Análisis de Distractores: A) Llora al dolor es incorrecto; este estado reactivo superior confiere o suma objetivamente una valoración un punto arriba, sumando en la hoja del pediatra intensivista el valor pronóstico intermedio y mejor de un estado de \"3\" a la variable verbal inestable sedante. B) Emite sonidos incomprensibles es incorrecto; califica idénticamente al rubro verbal del estrato clínico superior modificado para pacientes mayores verbales o niños preescolares (2 a 5 años del colegio) o para todo paciente adulto mayor sano general accidentado pre hospitalario estándar sin uso restrictivo en lactantes, que sí comprende y debería hablar articuladamente fonemas normales de acuerdo a su biológico encéfalo sin embargo solo produce ruidos secos de desubicación. D) Palabras inadecuadas es incorrecto; este rubro clasifica la franja clínica y vocal de niño que balbucea o en el grupo superior maduro lingüístico superior escolar pediátrico asignado a la respuesta desorientada leve que sumaría habitualmente en la tabla normal general un \"3\" en niños prescolares con capacidad léxica pero que sufren disociación ambiental aguda central sin afasia de habla puramente biológica y del tracto faríngeo sano.",
    source: "SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad, 2017, Anexo Escalas de Coma Valoración Pediátrica Verbal, Página 115."
  },
    {
        id: 101,
        question: "En un paciente que ingresa a la unidad de quemados con lesiones de espesor total que abarcan el 65% de la superficie corporal total, y en quien el lecho de la herida está en condiciones óptimas para cobertura, ¿qué técnica quirúrgica específica de injerto recomienda la GPC por el grado de extensión?",
        options: ["Colgajos pediculados locales", "Expansión tisular tradicional", "Técnica de Meek", "Injerto autólogo en malla"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de quemaduras, la disponibilidad de piel donante sana en pacientes con lesiones térmicas masivas es extremadamente limitada. Cuando la superficie corporal quemada supera la barrera crítica del 60%, las técnicas estándar de mallado son insuficientes para expandir la cobertura, por lo que la directriz normativa dicta utilizar la técnica de microinjertos expansivos de Meek o apoyarse con piel de cadáver/apósitos biológicos.<br><br>Perla ENARM: Algoritmo de cobertura: Más de 60% de superficie corporal quemada, realizar injerto con técnica de Meek, utilizar piel de cadáver o apósitos de acuerdo a criterio.<br><br>Análisis de Distractores: A) Colgajos pediculados locales es incorrecto; son técnica de cirugía plástica reconstructiva reservada para áreas focales articulares complejas o tendones expuestos, inviables y ausentes en un quemado masivo del 65%. B) Expansión tisular tradicional es incorrecto; esta técnica está avalada y estandarizada como el pilar resolutivo autólogo primario pero estrictamente en pacientes que tienen \"Menos del 60%\" de superficie quemada. D) Injerto autólogo en malla es incorrecto; aunque el mallado aumenta el tamaño del injerto (1:3 o 1:4), en el gran quemado (>60%) se queda corto biológicamente y la guía redirecciona explícitamente hacia el sistema Meek (que logra expansiones hasta 1:9).",
        source: "SS-090-18, Diagnóstico y tratamiento de quemaduras, 2018, Algoritmo 7. Tratamiento quirúrgico en quemaduras de espesor total, Página 47."
    },
    {
        id: 102,
        question: "En el protocolo de seguimiento neurobiológico de un recién nacido que fue sometido exitosamente a hipotermia terapéutica por encefalopatía hipóxico-isquémica, ¿cuál es la ventana de tiempo recomendada para la evaluación estructural anatómica definitiva mediante Imagen por Resonancia Magnética (IRM)?",
        options: ["Entre 48 y 72 horas", "Entre 7 y 21 días", "Entre 25 y 40 días", "Entre 1 y 6 días"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de asfixia neonatal, la fase aguda de neurotoxicidad y edema por reperfusión distorsiona las interfaces de señal de las vías neuronales durante la primera semana. Realizar la resonancia magnética entre el día 7 y 21 de vida extrauterina provee el contraste óptimo mielínico para mapear el infarto verdadero de ganglios basales o de sustancia blanca consolidando el pronóstico del neurodesarrollo a futuro.<br><br>Perla ENARM: Seguimiento: Todo niño tratado con hipotermia debe ser incluido en un programa de seguimiento para evaluar su neurodesarrollo. Evaluación de la imagen por resonancia magnética (IRM) entre 7 y 21 días.<br><br>Análisis de Distractores: A) Entre 48 y 72 horas es incorrecto; durante estas horas el neonato se encuentra en la fase pico del recalentamiento de la hipotermia asistida, por lo que movilizarlo al magneto lo inestabiliza térmicamente sin proveer imágenes claras (edema agudo difuso en T2). C) Entre 25 y 40 días es incorrecto; retrasar el escrutinio retrasa la integración temprana al programa de estimulación e intervención fisioterapéutica temprana. D) Entre 1 y 6 días es incorrecto; en esta ventana de tiempo tan precoz, el escrutinio estructural se reserva universalmente para el Ultrasonido Transfontanelar (USG) a la cabecera del paciente para detectar hemorragias ventriculares masivas.",
        source: "IMSS-371-10, Diagnóstico y tratamiento de Asfixia Neonatal, 2010, Seguimiento, Página 26."
    },
    {
        id: 103,
        question: "En el triage obstétrico, se atiende a una primigesta de 36 semanas con cefalea y tensión arterial de 150/95 mmHg. Al no contar con métodos cuantitativos urinarios inmediatos, se utiliza una tira reactiva para escrutinio. ¿Cuál es el valor mínimo de cruces positivas en este método cualitativo de muestra aislada que la guía acepta provisionalmente para orientar el diagnóstico de proteinuria preeclámptica?",
        options: ["1+", "2+", "3+", "Trazas"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de preeclampsia, aunque el estándar de oro confirmatorio exige la depuración en 24 horas o el cociente proteína/creatinina, los centros de primer contacto o áreas de urgencias rápidas dependen del urianálisis. Un hallazgo aislado de \"1+ (una cruz)\" en la lectura colorimétrica de la tira sumergida ya correlaciona positivamente con una excreción patológica superior a 300 mg/dL, debiendo detonar alarmas toxémicas inminentes y justificar su ingreso precautorio.<br><br>Perla ENARM: Criterios diagnósticos: Presencia de 1+ en tira reactiva en una muestra tomada al azar. (Utilizar solo si los métodos cuantitativos no están disponibles).<br><br>Análisis de Distractores: B) 2+ es incorrecto; exigir dos cruces para activar el abordaje subestima gran cantidad de pacientes con daño podocitario temprano latente que excretan niveles clínicamente significativos diagnosticados en la primera cruz. C) 3+ es incorrecto; estas lecturas masivas implican un rango nefrótico florido (>5 gramos de proteína) en fases avanzadas muy tardías y graves de descompensación renal de la preeclampsia. D) Trazas es incorrecto; la lectura de simples \"trazas\" en una orina concentrada de gestante no es categórica ni normada como umbral positivo diagnóstico provisional debido a la contaminación del flujo o leucorrea vaginal fisiológica.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en segundo y tercer nivel de atención, 2017, Cuadro de Criterios Diagnósticos, Página 37."
    },
    {
        id: 104,
        question: "En un paciente adulto con diagnóstico de cirrosis hepática que presenta un episodio agudo de hemorragia por várices esofágicas, ¿qué escala de estatificación pronóstica recomienda específicamente la GPC utilizar para estimar el riesgo de resangrado y la mortalidad a 6 semanas?",
        options: ["Escala de Child-Pugh", "Clasificación de Forrest", "Escala de MELD", "Escala de Rockall"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hemorragia digestiva, la disfunción metabólica del hígado (evaluada objetivamente mediante bilirrubina, INR y creatinina) dicta el fracaso hemostático endógeno por encima de los hallazgos endoscópicos aislados. La escala Model for End-Stage Liver Disease (MELD) ha demostrado superioridad estadística validada en el paciente cirrótico para perfilar directamente qué individuo resangrará en el plazo de mes y medio, indicando un seguimiento intensivo o la colocación de un shunt (TIPS) anticipado.<br><br>Perla ENARM: Se recomienda utilizar la escala de MELD para estimar el riesgo de resangrado y la mortalidad a 6 semanas.<br><br>Análisis de Distractores: A) Escala de Child-Pugh es incorrecto; es la escala histórica tradicional para clasificar el estadio terminal cirrótico y planear la sobrevida basal, pero MELD la desplazó como predictor agudo de mortalidad hemorrágica variceal a corto plazo. B) Clasificación de Forrest es incorrecto; estratifica puramente la actividad de la úlcera péptica gástrica o duodenal no variceal en la mucosa, determinando riesgo de resangrado de acuerdo a fibrina, coágulo o chorro arterial. D) Escala de Rockall es incorrecto; se aplica en escenarios de sangrado de tubo digestivo alto de origen general (no cirrótico) combinando variables clínicas de edad, choque y lesiones endoscópicas globales estandarizadas de riesgo.",
        source: "IMSS-087-08, Diagnóstico y tratamiento de várices esofágicas, 2017, Pronóstico y Seguimiento, Página 6."
    },
    {
        id: 105,
        question: "Durante una cesárea programada en una paciente con diagnóstico de placenta previa sin datos de acretismo, se presenta hemorragia del lecho de inserción refractaria a uterotónicos. ¿Qué medida mecánica de primera línea sugiere la GPC utilizar en este escenario transoperatorio?",
        options: ["Empaquetamiento de Mickulicz", "Colocación de balón hidrostático intrauterino", "Pinzamiento de arterias ováricas", "Aplicación de cera para hueso"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la porción del segmento inferior uterino donde se implanta una placenta previa posee deficiente red de miofibrillas entrecruzadas, por lo cual los uterotónicos sistémicos fallan en cohibir el sangrado en capa al no existir \"ligaduras vivas\". Insertar un balón y distenderlo transoperatoriamente comprime uniformemente los capilares venosos del lecho abierto contra la pared pélvica rígidamente, resolviendo mecánicamente la atonía focal.<br><br>Perla ENARM: Se sugiere el uso de balón hidrostático intrauterino en caso de HPP debida a placenta previa (sin acretismo) durante la cesárea.<br><br>Análisis de Distractores: A) Empaquetamiento de Mickulicz es incorrecto; las compresas textiles se reservan como medida extracavitaria masiva (abdomen abierto) en casos de coagulopatía de consumo dilatacional, no como primer tope mecánico endocavitario focal en cesárea. C) Pinzamiento de arterias ováricas es incorrecto; ocluir temporalmente los infundíbulos no detiene el abasto primario centrípeto de sangre que mana en el segmento inferior, dependiente fuertemente de las colaterales cervicales y la arteria uterina descendente principal. D) Aplicación de cera para hueso es incorrecto; no tiene cabida anatómica ni aprobación biológica en tejidos blandos miometriales mucosos obstétricos; se utiliza en sangrado de superficies esponjosas ortopédicas o esternales.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento Quirúrgico / Alternativas Conservadoras, Página 54."
    },
    {
        id: 106,
        question: "En el abordaje en urgencias de un paciente con una fractura diafisiaria de cúbito expuesta (Gustilo II) secundaria a accidente de motocicleta, ¿cuál es el tiempo máximo recomendado desde el momento del traumatismo en el que debe realizarse el desbridamiento del tejido blando y reducción en quirófano para abatir las complicaciones infecciosas?",
        options: ["4 horas", "8 horas", "6 horas", "12 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, el hueso expuesto pierde rápidamente su viabilidad y es colonizado por bacterias ambientales y nosocomiales. La regla biológica dorada estandariza la \"ventana de las 6 horas\"; rebasar este límite cronológico sin lavar abundantemente y arrastrar detritos necrosados multiplica exponencialmente las tasas de osteomielitis profunda purulenta y consolidación viciosa en el adulto.<br><br>Perla ENARM: La debridación del tejido blando lesionado y la reducción de la fractura se debe realizar en quirófano dentro de las 6 horas posteriores al momento en que se produjo la fractura, por la relación que existe entre el tiempo de exposición y la infección.<br><br>Análisis de Distractores: A) 4 horas es incorrecto; aunque es un lapso excelente para el lavado, la pauta limitante universal ortopédica tolerada y registrada oficialmente en los estatutos nacionales de traumatología marca 6 horas. B) 8 horas es incorrecto; sobrepasar el umbral de las 6 horas desprotege la cortical ósea frente a la colonización de grampositivos y bacilos gramnegativos que forman un biofilm irreversible a los antibióticos tópicos. D) 12 horas es incorrecto; esta demora se considera negligencia grave en una lesión expuesta de alta energía y requiere irremediablemente desbridamientos mucho más radicales, condena a cierre por segunda intención diferido.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, Página 22."
    },
    {
        id: 107,
        question: "Un recién nacido pretérmino en ventilación mecánica por Síndrome de Dificultad Respiratoria ha presentado mejoría gasométrica sostenida. De acuerdo a los criterios normados para retiro de la fase invasiva y paso a CPAP, ¿qué parámetro máximo de fracción inspirada de oxígeno (FiO2) debe tolerar el paciente para proceder con la extubación?",
        options: ["Menor a 35%", "Menor a 25%", "Menor a 40%", "Menor a 30%"],
        answer: 3,
