        justification: "Justificación: De acuerdo GPC de la atención del abordaje a la disfunción infecciosa y choque de etiología por sepsis y estado agudo febril de la madre y del embarazo, la cascada fulminante masiva endotoxica provoca hipoperfusión extrema vasodilatadora. Para lograr asegurar un retorno inmediato del vector perfusorio cardiaco de presión hidrostática media superior al de la barrera cerebral resolutiva dictaminada en 65mm Hg contrarrestando la fuga sistémica de líquido al espacio celular colapsado se exige inyectar inotrópico endovenoso vasopresor de alto poder y el consenso actual lo determina unánimemente para seguridad materna del primer escalón vital a la Norepinefrina continua al cuerpo receptor adrenérgico sin discusión frente a aminas dopaminérgicas erráticas taquicardizantes previas proscritas en la actual medicina obstétrica de choque letal y urgencia coronaria.<br><br>Perla ENARM: Tratamiento: En pacientes con choque séptico que requieran vasopresores, se recomienda mantener una presión arterial media (PAM) mayor de 65 mmHg y en caso de ser necesario tras las fallas del uso estandarizado volumétrico de la infusión salina pura a 30ml/kg, se recomienda el uso central de la norepinefrina continua farmacológica inyectada al torrente sanguíneo vital circulatorio materno como el agente vasopresor adrenérgico de estricta elección inamovible de supervivencia universal.<br><br>Análisis de Distractores: A) Dobutamina es incorrecto; actúa como inotrópico y no como el presor principal vasorrestringente agudo requerido para chocar y aplastar mecánicamente a las redes dilatadas del choque materno arterial puramente vasopléjico sino como soporte cardiaco bombeador inotrópico pasivo aórtico general del corazón deficiente descompensado terminal pos-infarto al reanimarlo o frío neonatal. B) Dopamina es incorrecto; históricamente un agente intermedio pro y vaso dilatador esplácnico según su uso métrico pero desbancada universal y drásticamente y contraindicada en choques profundos sépticos puros calientes femeninos y pedíatricos del siglo veintiuno de primera etapa por carecer del rescate veloz vasopresor sin dañar arritmias rápidas reflejas o taquicardias letales auriculares isquémicas del músculo miocárdico gestacional en su intento de soporte circulatorio inestable de presión basal general requerida del cerebro isquémico. C) Vasopresina es incorrecto; análogo endocrino de rescate puro reservado para unidades hospitalarias en escenarios limitantes refractarios crónicos terminales pos-aminas o para deficiencias primarias severas antidiuréticas que de ser empleado inicialmente cerraría agresiva e irreversiblemente y necrosaría vasos placentarios desprendiendo micro infartos del parénquima esplácnico basal intestinal secundario privando oxigenación fetal subyacente sin aportar el beneficio del impulso central de norepinefrina de receptor base hemodinámico universal A.",
        source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Manejo Hemodinámico, Página 121."
    },
    {
        id: 140,
        question: "Al atender en unidad de reanimación hospitalaria intensiva postparo a un paciente que recuperó el retorno de la circulación aórtica espontánea, se evidencia un estado de deterioro cerebral secundario en recuperación pero súbitamente desencadena alteraciones musculares, fasciculaciones distales musculares atípicas erráticas y disfunción refractaria sin recuperación de orientación tras horas. En este caso y a sabiendas que el post-paro produce crisis neurológicas complejas motoras silentes agudas, ¿cuál de los siguientes estudios complementarios ordenan invariablemente en su normativa ejecutar para identificar, y de ser caso monitorizar activamente y revertir la actividad y daño eléctrico neuronal celular estatus latente disfuncional isquémico en la unidad de terapia cerebral de acuerdo a la GPC para dictaminar el tratamiento resolutorio clínico?",
        options: ["Potenciales evocados somatosensoriales", "Electroencefalograma continuo", "Tomografía computada cerebral simple", "Resonancia magnética de difusión"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de prevención y diagnóstico pos-paro cardiorrespiratorio clínico vital, el cerebro sometido a isquemia celular grave y reperfusión aguda desencadena alteraciones despolarizantes convulsivas destructoras subyacentes epilépticas ocultas que deprimen el despertar anestésico sin presentarse necesariamente el temblor o \"convulsión tónico-clónica\" masiva motora muscular exterior típica. Para la prevención, el estatus patológico de la vía debe registrarse con la detección, monitorización estricta diagnóstica ininterrumpida y trazado de gráfica central u onda eléctrica neuronal colocando y manteniendo invariablemente activo para su seguimiento una electroencefalografía que garantice medicar y confirmar la neuro-excitotoxicidad y estatus en el paciente sedado paralizado de la cama del paciente de los cuidados integrales avanzados del servicio y que evalúe y confirme o niegue de facto la supresión de ondas para establecer recuperación orgánica o en su caso pronóstico médico sombrío central irreversible vegetativo permanente neurológico de la base encefálica.<br><br>Perla ENARM: Postparo cardiorrespiratorio: Se recomienda realizar e interpretar lo antes posible un electroencefalograma para detectar actividad epiléptica en pacientes con manifestaciones clínicas de crisis convulsivas y, en su caso, considerar obligatoriamente y prescribir siempre la electroencefalografía continua permanente médica en sala clínica de piso con fin estricto para monitorizar y abordar al enfermo general grave a los pacientes anestesiados intubados diagnosticados neurológicamente con un estatus agudo letal eléctrico patológico pos-isquémico silente epiléptico.<br><br>Análisis de Distractores: A) Potenciales evocados somatosensoriales es incorrecto; estos abordan reflejos somáticos medulares o radiculares de cordón que apoyan un pronóstico de coma en el despertar diferido del cuarto o quinto día, y no diagnostican per se el brote convulsivo agudo y la onda eléctrica epiléptica aguda tratable o el estatus eléctrico convulsionante epiléptico activo cerebral despolarizante silente de UCI primario post evento desfibrilable coronario agudo o asfixiante sub-agudo en las horas de recuperación orgánicas. C) Tomografía computada cerebral simple es incorrecto; el tejido en estatus post-paro de urgencia mostrará de entrada edema hipóxico generalizado difuso de pérdida de surcos base o hallazgos limpios normales estructurales pero carece de total sensibilidad para registrar los eventos químicos despolarizantes bioeléctricos de estado convulsivo silente que deforma el registro visual fisiológico medible del paciente estático chocado por horas, solo un infarto crónico. D) Resonancia magnética de difusión es incorrecto; aísla o localiza macroinfartos arteriales purulentos organizados u hemorrágicos focales en horas o días del trauma y daño o encéfalo pero es ciega e incapaz de diagnosticar al instante funcionalmente de manera paralela continua por horas el foco de estatus cortical epiléptico reactivo que produce parálisis metabólica de despertar clínico en unidad post evento inmediato.",
        source: "IMSS-633-13, Prevención, Diagnóstico y Tratamiento del Paro Cardiorrespiratorio en Adultos, 2013, Tratamiento Integral Algoritmo Avanzado, Página 200."
    },
    {
        id: 141,
        question: "En el área de urgencias se recibe a un preescolar en estado de choque séptico de origen comunitario. Al descartar clínicamente datos de hepatomegalia o ritmo de galope que sugieran una disfunción miocárdica cardiogénica, ¿cuál es el volumen exacto y el tiempo de infusión indicado para la primera carga de cristaloides en la fase de reanimación inicial?",
        options: ["10 ml/kg administrados en 30 minutos", "20 ml/kg administrados en 5 a 10 minutos", "30 ml/kg administrados en 20 a 30 minutos", "40 ml/kg administrados en 60 minutos"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de sepsis pediátrica, el pilar hemodinámico primario frente a un niño chocado (sin signos de falla de ventrículo o sobrecarga derecha) exige expandir agresivamente el lecho vascular para restituir la perfusión capilar. El consenso nacional e internacional dictamina utilizar bolos de cristaloides isotónicos rápidos, empujados manualmente mediante jeringa (\"push\") a dosis de 20 ml/kg en una ventana perentoria y acelerada de 5 a 10 minutos, para observar respuesta al volumen antes de escalar a aminas.<br><br>Perla ENARM: Reanimación hídrica: El manejo de la primera hora implica la administración de bolos de líquidos a 20 ml/kg en 5 a 10 minutos.<br><br>Análisis de Distractores: A) 10 ml/kg administrados en 30 minutos es incorrecto; este volumen restringido y lento se reserva estrictamente ante la sospecha de cardiopatía congénita, miocarditis o cor pulmonale (choque cardiogénico), donde la distensión diastólica aguda fulminaría al paciente. C) 30 ml/kg administrados en 20 a 30 minutos es incorrecto; esta parametrización (30 ml/kg) corresponde a la indicación universal para el protocolo de choque séptico en el adulto o paciente obstétrica, no en pediatría. D) 40 ml/kg administrados en 60 minutos es incorrecto; carece de velocidad de rescate vital en pediatría; infundir en una hora permite que la fuga capilar anule el efecto presor en el compartimento intravascular.",
        source: "SS-291-10, Diagnóstico y tratamiento de sepsis y choque séptico en paciente de 1 mes a 18 años de edad, 2017, Tratamiento hemodinámico, Página 63."
    },
    {
        id: 142,
        question: "Un paciente adulto de 70 kg es ingresado a la unidad de terapia intensiva tras sufrir una quemadura eléctrica de alta tensión, presentando orina marcadamente pigmentada por mioglobinuria. Para prevenir el desarrollo inminente de necrosis tubular aguda, ¿cuál es la meta estricta de gasto urinario horario que debe mantenerse con los líquidos de reanimación?",
        options: ["0.5 a 1 ml/kg/h", "1.5 a 2 ml/kg/h", "3.0 a 4.5 ml/kg/h", "0.1 a 0.2 ml/kg/h"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de quemaduras, la destrucción muscular masiva profunda (rabdomiólisis) secundaria al paso de corriente eléctrica libera cilindros de mioglobina que obstruyen y destruyen mecánicamente la nefrona. A diferencia de una quemadura térmica convencional (donde 0.5 ml/kg/h basta), la quemadura eléctrica requiere un \"lavado renal\" vigoroso, fijando normativamente el objetivo del gasto urinario entre 1.5 a 2 ml/kg/h (aprox. 75 a 100 ml por hora en un adulto) hasta el aclaramiento macroscópico del pigmento.<br><br>Perla ENARM: La meta de gasto urinario en las quemaduras eléctricas es de 1.5 a 2 ml/kg/hr o 75 a 100 ml/hr.<br><br>Análisis de Distractores: A) 0.5 a 1 ml/kg/h es incorrecto; es la meta de reanimación hídrica basal y estándar esperada para quemaduras térmicas por flama o escaldadura, pero insuficiente ante carga de mioglobina. C) 3.0 a 4.5 ml/kg/h es incorrecto; forzar diuresis a estos niveles masivos requiere sobrecargas hídricas desmedidas que desencadenan edema agudo de pulmón y síndrome compartimental abdominal yatrogénico en el paciente gran quemado. D) 0.1 a 0.2 ml/kg/h es incorrecto; representa un estado de falla renal instalada u oliguria severa, signo cardinal de sub-reanimación hipovolémica que condena al paciente a diálisis.",
        source: "SS-090-18, Diagnóstico y tratamiento de quemaduras, 2018, Tratamiento reanimación, Página 32."
    },
    {
        id: 143,
        question: "Ingresa a choque una paciente primigesta de 36 semanas cursando con crisis hipertensiva al registrar presión arterial de 170/115 mmHg y sintomatología vasospástica neurológica franca. Para evitar un evento vascular cerebral, ¿cuál es el fármaco de primera línea con acción rápida recomendado por la GPC que puede administrarse por vía oral en lo que se asegura el acceso endovenoso?",
        options: ["Alfametildopa", "Losartán potásico", "Nifedipino", "Captopril"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de preeclampsia, la urgencia hipertensiva severa (>160/110) exige reducción controlada inmediata. El nifedipino en cápsulas de acción rápida (oral, no sublingual) actúa bloqueando los canales de calcio vasculares y logra reducciones tensionales eficaces en 15 a 30 minutos sin requerir venoclisis, compartiendo el escalón de primera línea universal absoluta junto al labetalol y la hidralazina intravenosa.<br><br>Perla ENARM: Tratamiento de la crisis hipertensiva en el embarazo: Se recomienda Nifedipino oral (capsulas de acción corta), Hidralazina intravenosa o Labetalol intravenoso como medicamentos de primera línea.<br><br>Análisis de Distractores: A) Alfametildopa es incorrecto; es un agonista alfa-2 central de acción lenta (su pico de acción demora de 4 a 6 horas), siendo el pilar del control crónico ambulatorio, inútil para la crisis hipertensiva inminente en Triage. B) Losartán potásico es incorrecto; los antagonistas de los receptores de angiotensina II (ARA II) y los IECA están estrictamente contraindicados (Categoría X) durante todo el embarazo por teratogenicidad y anuria fetal severa. D) Captopril es incorrecto; inhibidor de la ECA, cruza la barrera placentaria y provoca hipoplasia de la bóveda craneal e insuficiencia renal fetal oligohídrica, proscrito en obstetricia.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en segundo y tercer nivel de atención, 2017, Tratamiento Farmacológico, Página 24."
    },
    {
        id: 144,
        question: "En la evaluación radiográfica en el servicio de urgencias de un paciente con un traumatismo directo en el brazo (\"fractura por bastonazo\"), se visualiza un trazo diafisiario transverso asilado en el hueso cúbito. Según la directriz técnica de ortopedia, ¿cuál es el porcentaje límite máximo de desplazamiento de las corticales que autoriza implementar el manejo conservador cerrado con yeso?",
        options: ["Menor al 10%", "Menor al 50%", "Menor al 25%", "Menor al 75%"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, el cúbito aislado posee tolerancia de consolidación sin fijación abierta si el daño biológico es menor. Se dictamina que el abordaje ortopédico conservador (reducción y férula) es seguro y aplicable exclusivamente si el hueso muestra angulaciones menores a 10 grados y los cabos óseos mantienen un contacto cortical donde el desplazamiento sea menor al 50% del diámetro total de la diáfisis.<br><br>Perla ENARM: Fracturas que pueden recibir manejo conservador: Fracturas no desplazadas o con desplazamiento menor al 50% de la diáfisis de cúbito en adultos con angulación menor a 10 grados.<br><br>Análisis de Distractores: A) Menor al 10% es incorrecto; someter la indicación a un contacto casi perfecto (90% de afrontamiento) llevaría innecesariamente a quirófano fracturas de cúbito funcionales del 20 o 30% que cicatrizarían sólidamente con yeso. C) Menor al 25% es incorrecto; aunque es un margen muy seguro, la guía establece el límite matemático permisivo máximo de corte en la mitad exacta (50%) de la aposición del diámetro. D) Menor al 75% es incorrecto; un desplazamiento superior al 50% carece de estabilidad biomecánica de la bisagra perióstica, condicionando una pseudoartrosis inminente o consolidación viciosa que alterará la articulación radiocubital distal.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Conservador, Página 19."
    },
    {
        id: 145,
        question: "Una gestante hospitalizada con diagnóstico de trombosis venosa profunda activa se encuentra recibiendo tratamiento pleno con enoxaparina a dosis terapéutica (1 mg/kg cada 12 horas). Al presentar inicio de trabajo de parto inminente, ¿cuál es el tiempo mínimo de suspensión de la heparina que debe acatarse por seguridad antes de permitir al anestesiólogo realizar un bloqueo neuroaxial regional?",
        options: ["12 horas", "6 horas", "24 horas", "48 horas"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica, las punciones espinales o epidurales bajo efecto anticoagulante pleno desencadenan hematomas espinales compresivos que producen paraplejia irreversible. Mientras que para la dosis \"profiláctica\" baja basta con esperar 12 horas, la normatividad anestésica exige un retiro absoluto de al menos 24 horas cuando el paciente se encuentra bajo infusión de heparinas de bajo peso molecular a dosis \"terapéuticas\" curativas.<br><br>Perla ENARM: Se sugiere que en pacientes que reciban HBPM a dosis terapéuticas, el bloqueo neuroaxial no debe de realizarse sino hasta 24 h posteriores a la administración de la última dosis de HBPM.<br><br>Análisis de Distractores: A) 12 horas es incorrecto; es la ventana horaria estipulada y permitida únicamente para las pacientes que cursan con dosis bajas de tipo preventivo o \"profiláctico\" de HBPM (ej. 40 mg diarios). B) 6 horas es incorrecto; corresponde al margen de suspensión exigido para la heparina no fraccionada (HNF) aplicada vía intravenosa, dado que su vida media es mucho más corta y posee reversión rápida. D) 48 horas es incorrecto; retrasar el bloqueo o prolongar el ayuno analgésico por dos días completos expone a la madre a dolor extremo, sin conferir mayor seguridad medular demostrada a las 24 horas del aclaramiento renal.",
        source: "SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Manejo Anestésico, Página 66."
    },
    {
        id: 146,
        question: "Tras el fracaso del tratamiento médico y quirúrgico conservador por una hemorragia postparto en una mujer joven hemodinámicamente estable que desea vehementemente preservar su fertilidad, el comité decide implementar terapia endovascular invasiva. ¿Qué vaso principal es el blanco anatómico protocolario de la embolización selectiva en este escenario?",
        options: ["Arteria ovárica accesoria", "Arteria iliaca interna", "Arteria iliaca externa", "Arteria aorta abdominal infrarenal"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, cuando el abordaje médico cede ante la exanguinación pero la madre no cursa en paro o colapso inestable, la radiología intervencionista funge como la alternativa de oro de salvataje de órgano. La canulación trans-femoral busca inyectar el material oclusivo gelatinoso focalmente en las \"Arterias Iliacas Internas\" (hipogástricas) o directamente en su rama anterior de las uterinas, lo que detiene el flujo colateral a presión hacia el útero sin recurrir a la histerectomía extirpadora.<br><br>Perla ENARM: Se sugiere la embolización arterial en pacientes con HPP que no respondieron a tratamiento médico y quirúrgico conservador y se desea preservar la fertilidad, cuando se cuente con los recursos. El blanco de canalización son las arterias iliacas internas o uterinas.<br><br>Análisis de Distractores: A) Arteria ovárica accesoria es incorrecto; su embolización primaria no detiene la exanguinación miometrial masiva puesto que el 90% del suplemento volumétrico grávido depende del polígono vascular iliáco inferior. C) Arteria iliaca externa es incorrecto; ocluir intencionalmente la arteria iliaca externa produce isquemia aguda, necrosis y pérdida de la extremidad inferior ipsilateral (pierna) sin tener injerencia anatómica en la irrigación pélvica central del útero. D) Arteria aorta abdominal infrarenal es incorrecto; el clampaje masivo aórtico o compresión aórtica (REBOA) es un puente transitorio de reanimación crítica de minutos en choque profundo letal, pero no se inyecta material embolizante permanente ciego a la aorta.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Tratamiento Quirúrgico, Página 56."
    },
    {
        id: 147,
        question: "Acude al servicio de urgencias un paciente obeso de 55 años con antecedente de gota crónica. Se detecta un lito obstructivo piélico de 1.5 cm que en la tomografía simple muestra una densidad menor a 400 Unidades Hounsfield (radiolúcido). El abordaje se orientará a la disolución médica. ¿Cuál es el compuesto farmacológico oral de elección para lograr la quimiolisis de primera intención de esta piedra?",
        options: ["Citrato de potasio", "D-penicilamina", "Ácido acetohidroxámico", "Hidroclorotiazida"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de cólico renoureteral, las piedras asociadas a síndromes metabólicos con densidad tomográfica blanda (<400 UH) o invisibles a los rayos X simples corresponden químicamente a cálculos de ácido úrico. Estos litos se forman en orinas extremadamente ácidas. La directriz de quimiolisis exige la alcalinización activa y constante de la orina (llevando el pH por arriba de 6.5) utilizando sales orales de Citrato de Potasio para disolver la matriz de urato.<br><br>Perla ENARM: Quimiolisis: Los litos de ácido úrico (radiolúcidos) pueden disolverse mediante la alcalinización de la orina utilizando citrato de potasio.<br><br>Análisis de Distractores: B) D-penicilamina es incorrecto; es un agente quelante que disuelve el enlace disulfuro, y se reserva exclusivamente como fármaco huérfano para el tratamiento crónico metabólico genético en pacientes formadores de cálculos de Cistina. C) Ácido acetohidroxámico es incorrecto; es un potente inhibidor enzimático de la ureasa bacteriana, indicado como terapia supresiva frente a litos infecciosos coraliformes compuestos de Estruvita (Fosfato amónico magnésico) en riñones cronicamente colonizados por Proteus. D) Hidroclorotiazida es incorrecto; es un diurético útil en el escrutinio de litos radioopacos por hipercalciuria idiopática (oxalto de calcio) ya que reduce la excreción renal de calcio, mas no tiene capacidad química para disolver uratos radiolúcidos.",
        source: "IMSS-635-19, Diagnóstico y Tratamiento del Cólico Renoureteral en el Servicio de Urgencias, 2019, Tratamiento Quimiolisis, Página 23."
    },
    {
        id: 148,
        question: "Durante el seguimiento pediátrico en el departamento de rehabilitación de un menor diagnosticado con lesión obstétrica del plexo braquial, se documenta una detención del arco de movilidad secundaria a co-contracción antagonista severa entre el bíceps y tríceps que impide la extensión activa del codo. ¿Qué agente terapéutico está indicado aplicar localmente para relajar temporalmente el grupo hipertrófico y permitir el desarrollo funcional del músculo débil?",
        options: ["Toxina botulínica", "Baclofeno intratecal", "Metilprednisolona", "Hialuronidasa focal"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de lesión de plexo braquial, la recuperación aberrante de los axones puede generar inervación cruzada, donde la orden cerebral flexora dispara ambos vientres simultáneamente (co-contracción de bíceps/tríceps) limitando la biomecánica en un arco fijo y causando luxación secundaria por espasmo sostenido de rotadores internos. La aplicación inyectable local de la \"Toxina Botulínica\" denerva temporalmente la placa presináptica del antagonista hiperreactor, otorgando una ventana de meses para que la fisioterapia fortalezca el músculo parético.<br><br>Perla ENARM: Tratamiento Médico: La Toxina botulínica se indica en caso de presentar co-contracciones articulares y/o limitación restrictiva por rotación interna.<br><br>Análisis de Distractores: B) Baclofeno intratecal es incorrecto; la infusión espinal antiespástica sistémica del baclofeno se restringe al manejo del tono piramidal central destructivo de la parálisis cerebral infantil (PCI) con diplejía espástica, sin cabida para radiculopatías flácidas periféricas limitadas de un solo brazo. C) Metilprednisolona es incorrecto; los bolos intra-articulares esteroideos suprimen los brotes de artritis inflamatoria autoinmune (artritis idiopática juvenil), careciendo de acción farmacológica relajante sobre la placa motora neuromuscular contraída de la co-contracción. D) Hialuronidasa focal es incorrecto; enzima de degradación del tejido conectivo para esparcir líquidos extravasados o edemas postquirúrgicos, no tiene efecto neurolítico ni inhibe la acetilcolina responsable del espasmo antagonista.",
        source: "DIF-565-18, Diagnóstico y tratamiento de la lesión obstétrica del plexo braquial, 2018, Tratamiento Médico Algoritmo, Página 32."
    },
    {
        id: 149,
        question: "Un adulto masculino cursa con paro cardiorrespiratorio en urgencias; el trazo del monitor muestra fibrilación ventricular persistente. Se han proporcionado compresiones continuas, se administró adrenalina y ha recibido tres descargas eléctricas asincrónicas sin éxito en retornar el pulso. De acuerdo al algoritmo de soporte avanzado vital, ¿cuál es la dosis farmacológica inicial obligatoria del agente antiarrítmico de primera elección a inyectar en este momento?",
        options: ["Amiodarona 300 mg en bolo", "Amiodarona 150 mg en infusión lenta", "Lidocaína 1 mg/kg en bolo", "Sulfato de magnesio 2 gramos rápidos"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de paro cardiorrespiratorio, ante un ritmo desfibrilable refractario (Fibrilación Ventricular o Taquicardia Ventricular sin pulso que sobrevive a 3 choques), el miocardio requiere estabilización eléctrica del potencial de acción. La amiodarona se consolida como la piedra angular antiarrítmica. El protocolo internacional e institucional estandariza una dosis agresiva inicial de primera carga dictaminada matemáticamente en 300 miligramos IV en bolo puro rápido para abatir la arritmia, reservando una segunda carga eventual menor (150 mg) si el trazo no cede más adelante.<br><br>Perla ENARM: Algoritmo de RCP Avanzada: Fibrilación Ventricular Refractaria / TV sin pulso. Terapia Antiarrítmica: Amiodarona Primera Dosis 300 mg en bolo IV/IO. Segunda Dosis 150 mg.<br><br>Análisis de Distractores: B) Amiodarona 150 mg en infusión lenta es incorrecto; este esquema (150 mg pasados en 10 min) es aplicable exclusivamente en el paciente consciente con pulso vivo que cursa con taquicardia ventricular estable hemodinámicamente, proscrito en paro agudo. C) Lidocaína 1 mg/kg en bolo es incorrecto; aunque la lidocaína funge como sustituto viable ante la carencia del primer medicamento, no es la droga biológicamente prioritaria \"de primera elección\" general en el consenso mexicano actual sobre amiodarona. D) Sulfato de magnesio 2 gramos rápidos es incorrecto; este catión electrolítico antiarrítmico de rescate se restringe a un patrón electrocardiográfico oscilante específico documentado de \"Torsades de Pointes\" (Taquicardia ventricular polimorfa), no para una fibrilación aleatoria fina base.",
        source: "IMSS-633-13, Prevención, Diagnóstico y Tratamiento del Paro Cardiorrespiratorio en Adultos, 2013, Tratamiento Algoritmo, Página 65."
    },
    {
        id: 150,
        question: "En la unidad de cuidados intensivos neonatales, un prematuro extubado sometido a Presión Positiva Continua en la Vía Aérea (CPAP) por Síndrome de Dificultad Respiratoria experimenta desaturación súbita al 84%. Se eleva el soporte inspiratorio, sin embargo, el neonato claudica. De acuerdo a los parámetros gasométricos oficiales, ¿qué valores en sangre arterial dictaminan el diagnóstico inminente de \"Falla al CPAP\" y obligan a la re-intubación endotraqueal?",
        options: ["pCO2 mayor a 60 mmHg y pH menor a 7.20", "pO2 menor a 50 mmHg y pH menor a 7.30", "pCO2 mayor a 45 mmHg y HCO3 menor a 15", "pO2 menor a 80 mmHg y pCO2 mayor a 50 mmHg"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, sostener de manera prolongada y viciosa un CPAP que no logra insuflar los pulmones asfixia y fatiga los músculos respiratorios inmaduros de la pared del prematuro. El criterio gasométrico de acidosis respiratoria severa descompensada que dictamina normativamente la \"Falla objetiva a CPAP\" y frena el esfuerzo pasivo se define estrictamente ante una retención carbónica letal (pCO2 >60 mmHg) vinculada a una caída acidótica del pH (menor a 7.20), lo que fuerza la conexión a ventilador invasivo.<br><br>Perla ENARM: Criterios de Falla a CPAP e indicación de Intubación y Ventilación Mecánica Invasiva: Requerimiento de FiO2 > 40% para mantener SpO2 en margen o pCO2 mayor a 60 mm Hg asociado a acidosis con pH menor de 7.20.<br><br>Análisis de Distractores: B) pO2 menor a 50 mmHg y pH menor a 7.30 es incorrecto; estos márgenes toleran aún la intervención con optimización superficial de presiones, sin recaer en la barrera límite crítica del 7.20 que sí exige la inserción del tubo plástico alveolar inminente. C) pCO2 mayor a 45 mmHg y HCO3 menor a 15 es incorrecto; un pCO2 de 45 es prácticamente normocapnia en un pulmón microatelectásico compensado, por lo que no es un indicador ineludible o de falla de bomba que condene obligadamente al paciente al tubo invasor. D) pO2 menor a 80 mmHg y pCO2 mayor a 50 mmHg es incorrecto; los prematuros extremos viven saludablemente estandarizados con pO2 arterial de 50 a 60 mmHg (para evitar retinopatía y displasia fibrosa); esperar a oxigenarlo en parámetros \"sanos\" de 80-90 hiperoxigena con radicales libres al ojo, y el carbónico en 50 es tolerado en modo permisivo.",
        source: "IMSS-137-21, Síndrome de Dificultad Respiratoria en el Recién Nacido, 2021, Algoritmo 4 Falla CPAP, Página 15."
    },
    {
        id: 151,
        question: "Al preparar el egreso hospitalario de un paciente cirrótico compensado que ingresó hace una semana por su primer episodio de sangrado agudo variceal esofágico. De acuerdo a la directriz nacional de gastroenterología, ¿cuál es el esquema terapéutico crónico estándar de oro indicado para la prevención secundaria obligatoria del resangrado portal en este paciente?",
        options: ["Ligadura variceal endoscópica combinada con betabloqueador no selectivo", "Escleroterapia inyectable seriada y nitrato de acción prolongada", "Derivación portosistémica transyugular (TIPS) profiláctica", "Betabloqueador cardioselectivo a dosis máxima tolerada"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de várices esofágicas, el paciente sobreviviente porta un riesgo del 60% de volver a exanguinarse en su domicilio durante el primer año. Ninguna intervención aislada protege tanto como el ataque mecánico y hemodinámico en sinergia. El tratamiento instituido de base exige combinar la obstrucción elástica del lumen residual intraluminal (Ligadura endoscópica) con la reducción permanente y de por vida del flujo sanguíneo vasocongestivo portal del paciente mediante propanolol o nadolol (Betabloqueador no selectivo).<br><br>Perla ENARM: Tratamiento prevención secundaria. Se recomienda el uso de ligadura endoscópica con betabloqueadores no selectivos a todo paciente que se presenta con sangrado por ruptura de várices esofágicas tan pronto como le sea posible.<br><br>Análisis de Distractores: B) Escleroterapia inyectable seriada y nitrato de acción prolongada es incorrecto; la escleroterapia ha sido superada globalmente por la ligadura debido al alto índice de complicaciones cicatriciales (estenosis esofágica y úlceras sangrantes yatrogénicas post-inyección). C) Derivación portosistémica transyugular (TIPS) profiláctica es incorrecto; el TIPS (puente de stent recubierto intrahepático) es la terapia de rescate avanzada reservada únicamente ante la \"falla\" demostrada del tratamiento combinado profiláctico o en varices fundicas gástricas letales intratables, no como prevención base rutinaria ambulatoria. D) Betabloqueador cardioselectivo a dosis máxima tolerada es incorrecto; se exige usar bloqueadores \"no selectivos\" (B1 y B2) para asegurar simultáneamente la reducción del gasto cardíaco y la importantísima vasoconstricción visceral vascular periférica de la cama esplácnica abdominal, que el B1 puro omite.",
        source: "IMSS-087-08, Diagnóstico y Tratamiento de Várices Esofágicas en el Adulto, 2017, Tratamiento de Prevención Secundaria, Página 21."
    },
    {
        id: 152,
        question: "Al examinar un cuadro de dolor pélvico temprano en una nulípara estable de 20 años de edad sin sangrado vaginal, el ultrasonido documenta presencia de embarazo ectópico tubárico no roto asociado a un reporte de BhCG de 1,200 UI/L. El equipo evalúa instaurar el fármaco citotóxico de metotrexato como medida puramente conservadora. ¿Qué hallazgo radiológico visual es un criterio anatómico de idoneidad estricta para garantizar el éxito del medicamento en sala?",
        options: ["Saco gestacional menor a 4 centímetros sin actividad cardiaca fetal", "Grosor del endometrio decidualizado menor a 15 milímetros", "Ausencia total de quistes foliculares luteínicos ipsilaterales", "Trompa uterina con un diámetro transversal de 6 centímetros"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de emergencias obstétricas, el antagonista del ácido fólico (metotrexato) es altamente curativo siempre que la carga celular mitótica del trofoblasto sea reducida. La guía es inamovible en los criterios de indicación médica morfológica: la masa o saco no debe rebasar el rango de los 3.5 a 4 cm milimétricos en el escáner, y vitalmente no debe mostrar latido ni pulso cardiaco embrionario activo; romper estas reglas de oro somete a un embarazo avanzado fimbrial ciegamente al fallo médico en casa y estallido mortífero agudo pélvico en el baño de la paciente.<br><br>Perla ENARM: Indicaciones para el tratamiento médico sistémico de embarazo ectópico: Saco gestacional (masa ectópica) con un tamaño ecográfico menor a 4 cm, sin evidencia transvaginal de actividad cardiaca embrionaria, y una cifra de de BhCG menor de 2000 mUI/ml en pacientes estables.<br><br>Análisis de Distractores: B) Grosor del endometrio decidualizado menor a 15 milímetros es incorrecto; la reacción del recubrimiento interno Arias-Stella o decidua engrosada refleja impregnación sistémica progestágena secundaria global paralela pero no es un factor pronóstico inhibitorio normado que impida per se reventar un ovulo fallido salpingeo distanciado con citotóxico fólico. C) Ausencia total de quistes foliculares luteínicos ipsilaterales es incorrecto; la presencia del cuerpo lúteo quístico nutricional residual adyacente que sostiene el inicio gestacional de manera hormonal no prohíbe ni es criterio de contraindicación endoscópica anatómica para abortar un embrión extrauterino invasivo en la extremidad tubaria. D) Trompa uterina con un diámetro transversal de 6 centímetros es incorrecto; toda retención gestacional dilatada u obstruida mayormente a 4 centímetros expone fibras tan adelgazadas en la ampolla tubárica que fallarán catastróficamente provocando hemorragia intra-abdominal exanguinante a los pocos días del fármaco, exigiendo pasar obligadamente al bisturí laparoscópico inminente de tercer nivel.",
        source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas, 2019, Tratamiento Médico Cuadro, Página 180."
    },
    {
        id: 153,
        question: "Un paciente masculino de 72 años ha sido preparado y programado para someterse a intervención quirúrgica ortopédica definitiva con la finalidad de restituir una cadera tras fractura intracapsular del fémur proximal secundaria a osteoporosis. De acuerdo a la guía de prevención infecciosa perioperatoria de buena práctica, ¿cuál debe ser el fármaco intravenoso indicado 60 minutos previos al corte inicial incisional?",
        options: ["Amikacina en infusión rápida", "Cefalotina o Cefuroxima", "Clindamicina o Lincomicina", "Ceftriaxona o Cefotaxima"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas intracapsulares, todo hueso que se aborda invasivamente o en el cual se inserta un implante o placa foránea protésica se encuentra sumamente predispuesto a desarrollar bio-films bacterianos originados de cocos cutáneos locales intraquirúrgicos estafilocócicos. La primera y principal línea farmacológica preventiva validada indica la administración exclusiva de cefalosporinas tempranas de 1era o 2da generación, idealmente la profilaxis profiláctica venosa con Cefalotina o Cefuroxima para blindar al organismo óseo en el corte.<br><br>Perla ENARM: Tratamiento Profiláctico de heridas de FICEPF: Se recomienda para los pacientes preoperados la administración profiláctica endovenosa antes de incisión quirúrgica (1 hora previa) de antibióticos parenterales como lo son la Cefalotina, o alternativamente la Cefuroxima.<br><br>Análisis de Distractores: A) Amikacina en infusión rápida es incorrecto; los aminoglucósidos no fungen perfil de oro como profilaxis estéril programada peri-cutánea ortopédica base asintomática, y su velocidad pasiva intrarrenal condena a nefrotoxicidad aguda letal en paciente longevo. C) Clindamicina o Lincomicina es incorrecto; aunque cubren con poder a grampositivos del tejido y esqueleto oseo subyacente y cutáneo en casos crónicos crípticos o alérgicos, se asocian al desarrollo adverso inminente nocivo del Clostridium difficile en el íleon del postrado post-fracturado adulto si no es estrictamente imperioso suplir la primera línea dorada Cefalotínica. D) Ceftriaxona o Cefotaxima es incorrecto; su alto espectro céfalosporinico gramnegativo avanzado generaliza resistencia nosocomial intrahospitalaria BLEE destructiva y abandona las brechas defensivas focalizadas cocoides estafilocócicas de barrera protectora de colonización quirúrgica limpia ortopédica estandarizada superficial in vivo.",
        source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del extremo proximal del fémur, 2017, Tratamiento Profiláctico Antinfeccioso, Página 7."
    },
    {
        id: 154,
        question: "Al valorar en sala de yesos la imagenología radiográfica simple (proyección anteroposterior) de un futbolista que cursó con torsión severa y hemartrosis masiva rápida de rodilla con incapacidad de deambulación, el especialista ortopedista visualiza el desprendimiento cortical óseo lateral de la meseta tibial (Fractura de Segond). Este hallazgo radiológico avalado y documentado implica la presencia de una lesión biológica patognomónica e invariable de:",
        options: ["Ligamento colateral lateral", "Ligamento cruzado anterior", "Cuerno posterior de menisco medial", "Complejo osteoligamentario de la rótula"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de lesiones ligamentarias, el daño a las estructuras ligamentosas medulares no es visible a los rayos X simples iniciales del cuarto de trauma, mas la mecánica avulsiva del trauma capsular es intensa. El desprendimiento microscópico traccional óseo periférico visualizado en el platillo tibial marginal lateral es conocido clásicamente como la fractura eponímica de Segond, considerándose internacional e irrefutablemente el signo patognomónico estricto de la rotura interna completa y masiva subyacente del ligamento cruzado anterior, determinando resonancia y cirugía posterior inmediata.<br><br>Perla ENARM: Hallazgos radiológicos urgencias: En la radiografía AP simple de rodilla lastimada la pequeña avulsión focal anatómica patognomónica del platillo de la meseta tibial lateral (Fractura de Segond) indica indiscutiblemente la Ruptura inminente general del Ligamento Cruzado Anterior.<br><br>Análisis de Distractores: A) Ligamento colateral lateral es incorrecto; los colaterales laterales sufren desgarros a partir de traumas directos y bostezos de laxitud externa media sin arrancar necesariamente el complejo profundo del ligamento central o la meseta tibial avulsiva típica focal anterolateral cruzada en estrés rotacional extremo deportivo descrito de Segond. C) Cuerno posterior de menisco medial es incorrecto; una rotura de cartílago fibroso posterior intra-articular requiere la maniobra compresiva dolorosa rotacional activa algesica aguda al pisar el cuarto (test McMurray audible), nunca un levantamiento o astillado agudo visible de cortical ósea ósea gruesa lateral al plano fotográfico rayo de frente de platillo anatómico tibial en placa base inactiva. D) Complejo osteoligamentario de la rótula es incorrecto; una fractura transarticular de choque del tendón de protección patelar superior originaría alteraciones ecográficas del tendón rotuliano visible o un ascenso clásico retráctil de la patela central alta por fuerza tendinosa de cuádriceps perdiendo la línea articular, lejos de un estillamiento lateral cortical oculto minúsculo transversal bajo.",
        source: "IMSS-388-10, Diagnóstico y tratamiento de las lesiones ligamentarias, 2010, Estudios Gabinete Radiológicos, Página 12."
    },
    {
        id: 155,
        question: "Se recibe en incubadora a un recién nacido con peso normal producto de parto distócico vaginal prolongado asfixiante con antecedente de circular de cordón. Al evaluarlo se observa flacidez sistémica o hipotonía clara general, estado neuro-deprimido manifestado en letargo pronunciado, pupilas en miosis reactiva lenta, así como la instauración transitoria inicial de crisis convulsivas paroxísticas focalizadas mioclónicas tempranas periféricas. ¿A qué estadio de pronóstico enuncia este cuadro de acuerdo a la escala clínica predictiva estandarizada oficial del encefalopatía Sarnat?",
        options: ["Sarnat I", "Sarnat IV", "Sarnat II", "Sarnat III"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de asfixia neonatal, clasificar tempranamente el colapso hipóxico agudo celular central del encéfalo infantil divide la intervención a seguir terapéutica y neuroprotectiva clínica. El \"Estadio II\" o moderado estipula la progresión sintomatológica a disfunción del tallo basal encefálico (aparición de miosis o pupilas puntiformes vegetativas, e hipotonía muscular profunda franca sin reflejos) acompañada siempre de la desorganización eléctrica epiléptica activa con crisis convulsivas presentes en el infante asfixiado pero preservando respiración, haciéndolo candidato fundamental absoluto de primera intención al enfriamiento artificial orgánico normado salvavidas del cerebro por hipotermia de 72 horas para detener parálisis o muerte subsecuente.<br><br>Perla ENARM: Cuadro Evaluación Sarnat y Sarnat: Encefalopatía Hipóxico isquémica neonatal Estadio o Nivel II (Moderado): Presenta Letargo, Hipotonía del tono, Postura distal en flexión marcada, Presencia ineludible constante de Crisis convulsivas, y pupilas reactivas fijas con la Miosis.<br><br>Análisis de Distractores: A) Sarnat I es incorrecto; describe el estado reflejo hiper-excitatorio simpático leve de corta duración e insomnio ansioso. El neonato se muestra hiperalerta, irritable por hipertonía ansiosa, y con pupilas reactivas en midriasis sin padecer nunca convulsión de origen cortical estructural orgánico epiléptico de daño central transitorio grave a letárgico pasivo terminal del grupo segundo en daño hipóxico neuronal agudo. B) Sarnat IV es incorrecto; la clasificación base pronóstica de Sarnat, así como sus subdivisiones mundiales adaptadas solo evalúa los grados en 3 estadios clínicos evolutivos secuenciales anatómicos agudos base en los neonatos, no conteniendo escala del cuatro en su medición base del examen pediátrico físico primario neurológico del área general tococirúrgica intubadora vital. D) Sarnat III es incorrecto; estadio masivo profundo (severo grave). Señala un compromiso destructivo bulbar con muerte terminal del tallo neurológico paralizado en estado comatoso flácido arreactivo cadavérico que carece en su totalidad por destrucción neuronal de descargas biológicas que organicen o disparen crisis convulsivas focales tónicas vivas motoras con las pupilas del todo intermedias irregulares arrefléxicas y carencia y parálisis autonómica del impulso respiratorio dependiente totalmente invasiva de máquina ventiladora a presión permanente vital obligatoria en UCIN letal pos-infartado en base craneal.",
        source: "IMSS-371-10, Diagnóstico y tratamiento de Asfixia Neonatal, 2010, Cuadro de Evaluación y Escala Sarnat, Página 20."
    },
    {
        id: 156,
        question: "Durante la evaluación bioquímica consecutiva diaria de reanimación pediátrica a un niño en etapa preescolar, el nefrólogo tratante asienta el dictamen positivo analítico documentado y definitivo de Lesión Renal Aguda sustentado en la parametrización de las escalas universales KDIGO de función de filtrado glomerular tóxica celular pediátrica infantil en curso. ¿Qué margen exacto y milimétrico mínimo estricto de elevación plasmática de la creatinina sérica documentada exige registrar esta norma en un lapso transitorio estricto en la ventana biológica evaluativa de 48 horas como mínimo general comprobatorio indispensable del fallo inminente funcional de barrera tisular orgánico basal excretor al ingreso orgánico basal estresor vascular del shock?",
        options: ["Incremento mayor a 0.5 mg/dL", "Incremento mayor a 1.0 mg/dL", "Incremento de 0.1 mg/dL progresivo", "Incremento mayor o igual a 0.3 mg/dL"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de lesión renal aguda, las etapas incipientes de isquemia silente cortical en un niño con hipermetabolismo subyacente hemodinámico demandan vigilancia numérica matemática estricta a mínimos porcentajes retenidos ante la caída aguda en el ritmo circadiano filtrado medular. La definición y categorización internacional base aceptada normativamente exige obligatoriamente solo documentar la subida mínima en sangre bioquímica aislada \"mayor o igual a los 0.3 mg/dL\" del nivel referencial originario inicial basal de ingreso comparado puramente contra el subsecuente re-evaluado medido extraído serológicamente a los dos días exactos posteriores u ventana cronológica intrahospitalaria de las primeras 48 h.<br><br>Perla ENARM: Definición de Falla según Criterios KDIGO (Kidney Disease Improving Global Outcomes): Documentar aumento medible clínico de creatinina sérica mayor o igual a 0.3 mg/dl en un periodo estrecho de tiempo comprobado a 48 horas o incremento progresivo a más de 1.5 veces el valor real sérico original en siete días agudos de internamiento.<br><br>Análisis de Distractores: A) Incremento mayor a 0.5 mg/dL es incorrecto; exigir y posponer diagnóstico obligando y demorando esperar al nivel de medio miligramo libre tóxico puesto que retrasa la entrada a protocolo KDIGO I subestimando las etapas de pre-fallo incipientes en riñones funcionales pero estresados hiper-filtrantes letales que la GPC previene e identifica agresivamente con subidas imperceptibles primarias en cifras precisas limitantes fraccionadas en punto y tres de la tabla de orina pediátrica y volumen urinario menor del punto cinco mililitros vital en terapia estricta pediátrica controlada del adulto basal crítico medido en orina uremia retentiva basal central urinaria perjudicial del síndrome orgánico pre renal choque pediátrico central renal y no posrenal. B) Incremento mayor a 1.0 mg/dL es incorrecto; incremento macizo y masivo con uremia extrema o letal grave para las etapas primarias diagnosticas obligatorias del tamiz que ya asientan el estadío máximo letal de fracaso 3 donde el metabolismo se paraliza originando ya daño e intoxicación hiperkalémica letal cardiotóxica sistémica de retraso del pediatra general con encefalopatías con asterixis tardías que no identificaron la alza de los punto tres mg/dl y que ya son tratadas dialíticamente a nivel veno-venoso directo por filtro temporal a demanda de nefrología y UCI obligatoria resolutiva clínica de catéter Mahurkar percutáneo extracorpóreo yugo venoso de depuración hemofílica de barrera de urgencia y retención y depuración peritoneal técnica restrictiva sin función fisiológica diurética. C) Incremento de 0.1 mg/dL progresivo es incorrecto; varianzas limítrofes inofensivas hidratables o hemodilucionales asintomáticas transitorias dependientes de una comida pesada cárnica natural nocturna proteínica postprandial pediátrica proteínica pura base fisiológica.",
        source: "SS-231-18, Prevención, diagnóstico y tratamiento de la Lesión Renal Aguda, 2018, Diagnóstico y Criterios KDIGO, Página 16."
    },
    {
        id: 157,
        question: "Al encontrarse frente a una hemorragia por trauma vascular abdominal penetrante en un varón, se registran variables en el monitor de signos y gasometría transoperatoria en quirófano de la Unidad Quirúrgica de reanimación hospitalaria de primera atención de guerra institucional militar. A fin de dictaminar sin titubear o suspender el manejo clásico reparatorio sutural intestinal que fracasará con anastomosis en tejido desvitalizado perdiendo los pulsos esplácnicos letales agudos con el enfriamiento anatómico corporal y evitar un deceso por parálisis química coagulopatía masiva inducida (Tríada mortal de reanimación exanguinante del choque hemorrágico) se asientan protocolos técnicos. ¿Qué indicador objetivo fisiológico gasométrico acídico avala la GPC como parámetro límite normado obligatorio para decidir parar la cirugía definitiva para instituir un empaquetamiento abdominal general transitorio masivo como de cirugía de control de daños puro urgente de la víctima abdominal?",
        options: ["Bicarbonato sérico en 18 mEq/L", "pCO2 sistémico mayor a 50 mmHg", "Exceso de base en -5 mmol/L", "pH menor a 7.2 o Bicarbonato <15 mEq/L"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de cirugía de control de daños por proyectil abdominal, la acidosis metabólica progresiva inactiva y desnaturaliza proteicamente las enzimas claves de las vías finales cascada de coagulación periférica general de la cascada intrínseca hepática, inutilizando las plaquetas infundidas sintéticas al organismo. Cuando el laboratorio transoperatorio confirma la aparición de un cuadro de acidosis severa irrefutable, cuantificada numéricamente o definida de manera matemática clara en los registros arteriales como un Bicarbonato plasmático barrido estricto \"menor a los 15 mEq/L\", o un registro del logaritmo hidrogeniónico \"pH que cae debajo del letal 7.2\", se tiene indicación legal transoperatoria absoluta GPC fisiológica validada en reanimación y anestesiología militar nacional institucional de detener el quirófano y dejar el abdomen abierto del paciente o empaquetar con compresas o bolsas sin anastomosis en choque de sala a terapia de recuperación central inmediata metabólica intensiva con manta térmica estricta pos-laparotomía inicial agresiva.<br><br>Perla ENARM: Indicadores objetivos fisiológicos transoperatorios de la institución inminente y obligatoria resolutiva de CCD (Cirugía Control Daños): Aparición de una acidosis sistémica orgánica metabólica letal y significativa comprobada y definida métricamente por bicarbonato sérico < 15 mEq/L o pH central crítico capilar gasométrico medido menor estricto de < 7.2 de caída ácida.<br><br>Análisis de Distractores: A) Bicarbonato sérico en 18 mEq/L es incorrecto; aunque demuestra un consumo de bases por compensación del choque y acidosis subclínica que debe reanimarse agresivamente y observar su descenso seriado del cuarto de hora en UCI y no es el marcador o detonante o gatillo final pre-escrito limitante normativo y matemático avalado a los quince de la directriz restrictiva. B) pCO2 sistémico mayor a 50 mmHg es incorrecto; señala fallo ventilatorio primario en tubo o anestesia respiratoria pulmonar alveolar de presión o de la fase oxigenaría alveolar o parénquima contuso en ARDS del tórax mas no dictamina indicativo per se formal universal de falla química sanguínea mortal intrínseca destructiva general isquémica pélvica de hipoperfusión anaerobia del musculo base aórtico isquémico pélvico o muscular anaerobio dependiente puro del consumo celular general en estatus isquémico y láctico acídico. C) Exceso de base en -5 mmol/L es incorrecto; aunque el déficit numérico -5 alerta y se asocia en general a choque moderado temprano transitorio pre-choque metabólico tratable con simple reposición infusional, el protocolo limitante crítico de los daños absolutos no se detona hasta no agotar las reservas mortales o superar el daño del estado ácido base severamente general terminal o limítrofe sin perfusión sistémica del sistema orgánico humano yugular y no el déficit base puro asilado basal críptico o gasométrico -5 aislado del inicio precoz en hora de trauma 1 sin control letal base orgánico final o descompensación química ácida terminal documentable profunda y desestructurante general aguda a -10 o menor o lactatos persistentes isquémicos arteriales mayores terminales e indicadores.",
        source: "SEDENA-445-18, Indicadores e institución de la cirugía de control de daños en pacientes con herida por proyectil de arma de fuego en abdomen, 2018, Indicadores Fisiológicos Transoperatorios, Página 22."
    },
    {
        id: 158,
        question: "En urgencias, tras corroborar datos de infección pélvica febril e hipotensión (choque) se activa un código mater. Al integrar un esquema de metas para evitar la progresión catastrófica de las toxinas microbianas generalizadas sistémicas que colapsan y dañan permanentemente la resistencia vascular periférica endógena fisiológica materna y fetal. ¿Cuál es el margen estandarizado biológico estricto o ventana dorada máxima que establece universalmente la guía clínica y la normativa mundial de reanimación intensiva y sepsis ginecológica y general crítica para la aplicación perentoria infusional resolutiva base del antimicrobiano de primera línea y primera carga amplia de espectro endovenoso intrahospitalario en piso o el servicio que evite muerte de tejido tisular?",
        options: ["En la primera hora", "En las primeras tres horas", "En las primeras doce horas", "Al obtener resultados de cultivo"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de sepsis materna y protocolos Surviving Sepsis en la embarazada, cada hora de demora en frenar la carga microbiana (control del agente o toxina general bacteriemica celular gram-negativa) duplica porcentualmente los índices mundiales de mortalidad en choque tóxico profundo inestable hipotensivo orgánico microvascular con microtrombos capilares generalizados de consumo y exanguinación de daño subyacente. La \"Reanimación en la primera hora\" (1-Hour Bundle o metas de oro doradas tempranas) demanda indiscutiblemente obtener lactatos base, extraer si es posible hemocultivos inmediatos y no demorar la inyección empírica intravenosa \"dentro de la 1era hora de la sospecha e inicio resolutivo\" clínica basal general protocolaria de diagnóstico a antibióticos profilácticos intravenosos en pacientes en Triage y Urgencia para estabilizar hemodinámicamente el cuadro pre-anestésico a cirugía.<br><br>Perla ENARM: Metas de tratamiento oportunas (Primeras metras reanimadoras y manejo de oro en sepsis general inicial de primer escalón de rescate materno prequirúrgico u obstétrica de la mujer y binomio vital) y en las primeras intervenciones agudas de oro universales: Administración forzosa e indiscutible del antimicrobiano base de alto espectro endovenoso de rescate de Triage o choque antes que rebase y corra sin dudar o retraso máximo posible y estrictamente en la \"primera hora\" cronológica a su puerta hospitalaria diagnóstica prequirúrgica hospitalaria u obstétrica temprana.<br><br>Análisis de Distractores: B) En las primeras tres horas es incorrecto; se refiere tradicionalmente al margen tolerado laxo y ventana del tiempo para completar los paquetes hídricos de reanimación en choque asintomático inicial o toma gasométrica y no al antibiótico empírico fulminante inicial generalizado del primer abordaje urgente y limitante del daño invasor a circulación o torrente basal endovenoso del toxico invasivo bacteriano. C) En las primeras doce horas es incorrecto; se refiere o evalúa metas quirúrgicas finales puramente focales resectivas obstétricas (control quirúrgico anatómico operatorio local del origen o apéndice u útero necrotizado) de segunda fase o etapa central pos-reanimadora invasiva laparoscópica referida de alta especialidad ginecológica diferida (Control Focal), no al antimicrobiano de urgencias base celular inicial y choque celular preoperativo basal urgente sistémico vascular de ingreso en vena pre operatorio empírico de triage sin retraso general vital de urgencia o salvaguardia al bebé prequirúrgica. D) Al obtener resultados de cultivo es incorrecto; dictamen de altísima y reprobable negligencia médica; los hemocultivos incubados demoran en reportar microbiología positiva de 2 a 5 días biológicos; retrasar antibiótico de espectro ciego por esperar a teñir una bacteria permite o condiciona letalmente al desarrollo generalizado diseminado del SRIS masivo general irreversible fulminando la microvasculatura tisular orgánica de paciente y su embrión.",
        source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Tratamiento inicial, Página 28."
    },
    {
        id: 159,
        question: "El paciente adulto de 50 años que padece de ventilación mecánica invasiva ha superado el colapso circulatorio hemodinámico del politrauma del fin de semana con estabilización de sus inotrópicos con vasopresores a la baja, encontrándose aún sedado y sin distensión intestinal o globo agudo abdominal. Considerando el rol crítico para prevenir desnutrición endógena inmunológica y evitar atrofia total epitelial del intestino de barrera estéril que trasloque flora bacteriana sistémica hacia la vena porta mesentérica letal por reposo prolongado asintomático hospitalario intubado postrado inerte crítico orgánico. ¿A las cuántas horas recomienda la guía clínica y el soporte crítico metabólico que se instaure perentoriamente y de forma protocolizada y vital temprana por infusión nasogástrica entérica el aporte nutricional de tracto base enteral activo?",
        options: ["En las primeras 6 a 12 horas", "Entre el tercer y cuarto día", "A partir de los siete días", "Dentro de las primeras 24 a 48 horas"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de nutrición enteral y parenteral, el epitelio intestinal velloso sin contacto o aporte intraluminal de aminoácidos atrofia agresivamente en escasos tres días rompiendo sus barreras de hermetismo bacteriano de defensa celular innata en la cavidad visceral. Para atajar este catabolismo destructor estresor o de desnutrición aguda intubada, la normativa en el enfermo crítico intubado o ingresado grave sin contraindicaciones quirúrgicas gástricas mecánicas anatómicas exige de primera línea siempre que es un acto y medida forzada prioritaria el instituir y sondar gástricamente alimentación e inicio de la \"Nutrición enteral temprana (NET)\" forzosa metabólica, obligatoria cronológicamente sin fallar a ser instaurada sistemáticamente de forma institucional \"dentro del primer y segundo día u horas 24 a 48\" del paciente crítico de unidad invasiva.<br><br>Perla ENARM: Soporte Metabólico Recomendación Base 1: Se sugiere iniciar obligadamente Nutrición Enteral Temprana (NET) dentro de las primeras 24 a 48 horas de la admisión hospitalaria en UCI o intubación crítica general asilada sin isquemia, siempre tras y subsecuente obligadamente de que el enfermo cuente con resucitación lograda satisfactoriamente estable y completa en perfusión tisular general basal y con los vasopresores o fármacos aminérgicos ya reducidos o estables en dosis funcionales en control.<br><br>Análisis de Distractores: A) En las primeras 6 a 12 horas es incorrecto; intentar el vaciamiento estomacal gástrico y digestión duodenal intestinal tan agudamente e inminentemente sobre una mucosa intestinal recién reperfundida pélvica pos-trauma genera infarto paralitico digestivo agudo (isquemia no oclusiva intestinal tóxica gástrica yatrogénica isquémica del paciente inestable sin pulso vasopresor final). B) Entre el tercer y cuarto día es incorrecto; el paciente y cuerpo sometido a desgaste consume todas sus reservas orgánicas y glúcidos hepáticos musculares antes del cuarto día, propiciando daño metabólico crónico y desnutrición catabólica inmunosupresora iatrogénica por inanición letal proteínica evitable sistémica grave sin aportar material energético vital al enfermo inconsciente y sin razón médica pre o quirúrgica base restrictora. C) A partir de los siete días es incorrecto; reservar el inicio intestinal asintomático más de una semana transgrede los algoritmos de la nutrición en terapia y abandona por completo el aparato digestivo; los suplementos tras una semana (NPT) exigen solo indicarse en pacientes con resección intestinal o intestinos cortos operados sin anastomosis funcionante temporal o con fistulas y alto gasto no operables ni factibles anatómicamente.",
        source: "IMSS-818-17, Nutrición parenteral y enteral en el paciente adulto en estado crítico, 2017, Nutrición Enteral Temprana NET, Página 15."
    },
    {
        id: 160,
        question: "En la sala de pediatría se asiste a un neonato producto de madre diabética descontrolada, que a la toma rápida de glucemia capilar reporta una cifra bioquímica en caída franca patológica documentada con un umbral extremo peligroso menor de 35 mg/dl (hipoglucemia sintomática general) que ha desencadenado deterioro letárgico fulminante subyacente y la instauración de una crisis convulsiva tónica central prolongada no febril de origen hipóxico dismetabólica celular. ¿Cuál es el tratamiento agudo endovenoso institucional y farmacológico que indica la GPC en infusión rápida tipo mini-bolo rescate vital estricto sin retraso y antes de intubar para detener el catabolismo y estallido orgánico asfíctico celular y central convulsivo paroxístico originado por esta causa metabólica en pediatría de cuidados neonatales base institucional nacional general y pediátrica temprana y urgente resolutiva prequirúrgica e intensiva del menor crítico lactante menor del servicio de reanimación hospitalaria de transición a piso general?",
        options: ["Glucagón intramuscular dosis única 1 mg", "Solución glucosada al 10% a dosis de 2 ml/kg", "Solución glucosada al 50% en bolo lento 1 ml/kg", "Hidrocortisona en dosis de estrés de 50 mg/m²"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de hipoglucemia neonatal transitoria, una cifra laboratorial inferior a la crítica meta (<47 mg/dL) ligada a desregulación bulbar o cortico espinal grave aguda severa (crisis convulsiva letárgica pediátrica isquémica) constituye neuro-infarto glucopénico cerebral neonatal agudo e inminente (riesgo de retraso mental parálisis severa), forzando el protocolo y prohibiendo vías orales. La piedra resolutiva empírica médica mexicana para recuperar en microsegundos o breves minutos al sensorio inmaduro consiste en la inyección de azúcar concentrada purificada osmolar de forma central e intravenosa controlada periférica de \"Solución glucosada 10% (SG10%)\" a un volumen de carga minibolo de puramente exactos \"2 ml por kilogramo del menor\" (lo que aporta una equivalencia rápida pura y matemática salvavidas celular basal rápida y calculada biológica idónea exacta de sus 200 mg/kg puros corporales generales reanimadores de la célula cerebral base inestable descompensada metabólica epiléptica).<br><br>Perla ENARM: Tratamiento Urgente e intervención médica farmacológica pediátrica en las Hipoglucemias Neonatales o Lactantes: En todos aquellos los recién nacidos ingresados en Triage de Choque que presenten signos sintomáticos neurológicos claros biológicos como crisis convulsivas se les debe de administrar e indicar como protocolo normado resolutivo la instilación por bolo de \"2 ml/kg\" de líquidos concentrados o \"Solución Glucosada al 10%\".<br><br>Análisis de Distractores: A) Glucagón intramuscular dosis única 1 mg es incorrecto; esta inyección agota bruscamente cualquier mínima y mermada reserva de glucógeno y se emplea mayormente para adultos obesos hipoglucémicos en casa u diabéticos tipo 1 con terapia insulínica de acción ambulatoria sin vía, su tiempo en bebé es lento (minutos largos) y no ofrece la recuperación plasmática súbita letal milisegunda a flujo continuo que protege del daño convulsivo celular por hora prolongado destructivo central. C) Solución glucosada al 50% en bolo lento 1 ml/kg es incorrecto; utilizar soluciones hiperosmolares altísimas de \"cincuenta o del cincuenta por ciento puros sin diluir\" queman o necrosan tromboflebitícamente la delgada vena pediátrica inmadura y generan un letal aumento de osmolaridad central que deshidrata el encéfalo e induce además hemorragias germinales interventriculares destructivas letales intraparenquimatosas en cabecitas infantiles de bebés pretérmino sanos del parénquima subyacente. D) Hidrocortisona en dosis de estrés de 50 mg/m² es incorrecto; si bien las hormonas de rescate o contrarreguladoras (corticoides inyectables vitales de rescate o dosis altas purificadas de soporte mineral/glucocorticoide sistémicas aminergicas pediátricas purificadas y del control hemodinámico y endócrinas suprarrenales o inotropismo adyacente del volumen) se destinan en fallas miocárdicas agudas crípticas refractarias puras e isquémicas del choque caliente séptico del paciente crítico del servicio UCI y aminas inestables y refractarias del paciente no en simples rescates hipoglucémicos convulsivos aislados pediátricos asintomáticos tempranos iniciales dependientes directos puros exógenos o primarios resolutivos de primer contacto.",
        source: "IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal Transitoria, 2018, Tratamiento Urgente Minibolo Algoritmo Pediátrico Central, Página 16."

        question: "En un joven operado de reconstrucción de ligamento cruzado anterior de rodilla mediante artroscopia y autoinjerto, ¿en qué semana postquirúrgica está normado el inicio del programa de rehabilitación focal y carga?",

        question: "Al estratificar el riesgo tromboembólico en una paciente gestante en su control prenatal, ¿cuántos puntos de riesgo penaliza la normativa por cursar exclusivamente con antecedente de preeclampsia en el embarazo actual?",

        question: "Al interpretar la tromboelastometría en una paciente con hemorragia obstétrica, ¿qué trastorno coagulopático subyacente indica un reporte de \"Amplitud Máxima\" (MA) o \"Firmeza Máxima\" débil o disminuida?",

        question: "Durante la reanimación prequirúrgica de un hombre herido por proyectil de arma de fuego abdominal, se registra la temperatura central. ¿Qué valor termométrico oficial indica normativamente el abandono del cierre definitivo para instituir una cirugía de control de daños?",

        options: ["Dopamina", "Vasopresina", "Norepinefrina", "Dobutamina"],
        answer: 1,

        question: "Durante el abordaje tomográfico y radiográfico simple de un paciente con cólico renoureteral recidivante, el estudio de laboratorio confirma la presencia de un lito radiolúcido. Por su composición atómica, ¿qué mineral conforma característicamente esta piedra invisible a los rayos X?",

    {

        question: "Paciente postraumático crítico en ayuno que tolera nutrición enteral hipocalórica insuficiente. ¿A partir de cuántos días se dictamina iniciar Nutrición Parenteral Suplementaria si el aporte calórico no logra rebasar el 60% del objetivo basal?",

        question: "Un preescolar politraumatizado ingresa a urgencias con escala de coma de Glasgow pediátrica de 8 puntos, anisocoria y pérdida del reflejo tusígeno. ¿Qué medida inmediata de aseguramiento respiratorio es obligatoria?",

        question: "Una mujer sometida a fertilización in vitro cursa con dolor pélvico. El ultrasonido reporta gestación intrauterina de 7 semanas y un saco gestacional tubárico derecho (Embarazo heterotópico). ¿Qué factor contraindica absolutamente el uso de metotrexato conservador en ella?",

        question: "Al indicar tromboprofilaxis a dosis \"terapéutica\" (curativa) con heparina de bajo peso molecular en una gestante diagnosticada con trombosis venosa profunda activa. ¿Qué parámetro clínico determina estrictamente el cálculo de la posología del fármaco inyectable (ej. enoxaparina 1 mg/kg cada 12 hrs)?",

    {

        question: "Ingresa a la sala de urgencias un varón adulto tras sufrir quemaduras térmicas por flama en el 40% de su superficie corporal. Para el cálculo del volumen de cristaloides requeridos en las primeras 24 horas, ¿cuál es el factor multiplicador ponderal inicial normado y actualizado para evitar sobrecarga (fluid creep)?",

        source: "SS-090-18, Diagnóstico y tratamiento de quemaduras, 2018, Tratamiento Reanimación Hídrica, Página 31."

        question: "Un lactante de 24 horas de vida extrauterina, internado por encefalopatía hipóxico-isquémica severa, presenta paroxismos convulsivos sutiles y movimientos de pedaleo. ¿Cuál es el fármaco antiepiléptico de primera elección indicado para la impregnación intravenosa de estas crisis neonatales?",

        justification: "Justificación: De acuerdo GPC de asfixia neonatal, los receptores GABA inmaduros responden óptimamente a los barbitúricos. El fenobarbital a 20 mg/kg es el pilar de oro mundial histórico y actual para deprimir el foco cortical isquémico infantil.<br><br>Perla ENARM: Tratamiento de crisis convulsivas en encefalopatía hipóxico-isquémica neonatal: Fenobarbital es el fármaco de primera línea.<br><br>Análisis de Distractores: A) Difenilhidantoína es incorrecto; se consolida estrictamente como el anticonvulsivante de segunda línea en neonatos que no remiten tras la impregnación con fenobarbital. B) Midazolam es incorrecto; benzodiacepina de rescate de tercera línea o en infusión continua refractaria, suprime la respiración severamente. C) Levetiracetam es incorrecto; aunque neuroprotector, carece de aprobación institucional normativa como droga primaria aguda de sala de choque en asfixia perinatal severa.",

        question: "Al evaluar a un recién nacido macrosómico con parálisis del brazo izquierdo tras distocia de hombros, se documenta la tríada ipsilateral de ptosis, miosis y anhidrosis facial. Anatómicamente, este Síndrome de Horner traduce avulsión o daño severo radicular específico en:",

        question: "En la unidad de terapia intensiva pediátrica, un niño con lesión renal aguda oligúrica presenta retención de potasio refractaria a diuréticos y resinas. ¿Cuál de los siguientes niveles séricos dictamina una indicación absoluta y de urgencia para terapia de reemplazo renal (diálisis)?",

        justification: "Justificación: De acuerdo GPC de lesión renal aguda, los niveles tóxicos que amenazan la conducción miocárdica con arritmias letales inminentes (T picudas o ensanchamiento de QRS) fungen como criterio dialítico irrefutable e impostergable.<br><br>Perla ENARM: Criterios absolutos de diálisis en LRA: Sobrecarga hídrica >10%, hipercalemia >6.5 mEq/L refractaria, y uremia severa.<br><br>Análisis de Distractores: B) Hipercalemia > 5.0 mEq/L es incorrecto; es un valor limítrofe alto o hipercalemia leve, manejable con restricción dietética y salbutamol nebulizado. C) Hipercalemia > 5.5 mEq/L es incorrecto; requiere inicio de gluconato de calcio estabilizador y diuréticos de asa, pero no exigen forzosamente la máquina invasiva de depuración. D) Hipercalemia > 4.5 mEq/L es incorrecto; este rango recae dentro de la normalidad fisiológica del potasio sérico.",

    {
        id: 216,
        question: "Un varón en UCI post-cirugía de control de daños se mantiene con técnica de empaquetamiento y abdomen abierto. Tras superar el estado de choque y revertir la acidosis, ¿en qué ventana de tiempo (días post-evento) recomienda la guía realizar el cierre fascial primario temprano definitivo?",

        answer: 3,
        justification: "Justificación: De acuerdo GPC de cirugía de control de daños, la retracción lateral aponeurótica se vuelve irreversible tras la primera semana. Si las condiciones vitales lo permiten, la resolución anatómica debe efectuarse antes del día 7.<br><br>Perla ENARM: Plan de Cierre Definitivo Temprano en CCD: Se recomienda realizar el cierre fascial primario del abdomen idealmente entre los 4 a 7 días posteriores a la cirugía inicial.<br><br>Análisis de Distractores: A) Entre el día 14 y 21 es incorrecto; la pared abdominal se encuentra bajo inflamación cicatricial rígida, impidiendo cualquier aproximación quirúrgica (abdomen congelado). B) Dentro de las primeras 24 horas es incorrecto; el paciente cursa por la etapa máxima de reanimación hídrica e hipertonía intestinal, cerrar aquí genera síndrome compartimental fulminante. C) Entre los 30 y 60 días es incorrecto; es la etapa de transición fibrosa. Una vez rebasada la ventana temprana (4-7 días), el cierre debe posponerse forzosamente de 6 a 12 meses como hernia ventral planeada.",

    {

        question: "En sala de trauma se atiende a un paciente con luxación posterior de rodilla tras accidente vehicular. Para descartar la isquemia aguda por compresión de la arteria poplítea (complicación letal asociada), ¿cuál es el estudio de imagen y escrutinio funcional no invasivo de primera línea a solicitar?",

    {
        id: 219,
        question: "En el servicio de ortopedia, un escolar que sufrió una caída sobre la mano presenta deformidad del antebrazo. Las radiografías revelan una fractura aislada del tercio proximal del cúbito, cursando concomitantemente con una luxación de la cabeza del radio en el codo. ¿Qué epónimo clásico define normativamente esta lesión inestable?",

    {
        id: 220,
        question: "Un paciente adulto sobrevive a una taquicardia ventricular sin pulso tras maniobras avanzadas de reanimación. En la terapia de cuidados post-paro, se mantiene en coma. ¿En qué rango estricto de temperatura central se debe instituir la hipotermia terapéutica para frenar la neurotoxicidad por reperfusión?",
        options: ["36 a 38 °C", "32 a 36 °C", "30 a 32 °C", "28 a 30 °C"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de reanimación cardiopulmonar, el enfriamiento controlado del paciente comatoso post-paro disminuye el metabolismo y estrés oxidativo basal cerebral. La meta validada por las asociaciones cardiológicas internacionales para adultos se ajusta matemáticamente a un umbral constante de entre 32 y 36 °C por 24 horas.<br><br>Perla ENARM: Cuidados Post-paro Cardíaco: Se recomienda el Manejo Específico de Temperatura (Hipotermia Terapéutica) manteniéndola constante entre 32 y 36°C durante al menos 24 hrs.<br><br>Análisis de Distractores: A) 36 a 38 °C es incorrecto; representa normotermia y fiebre perjudicial yatrogénica que acelera el consumo de oxígeno de las neuronas isquémicas. C) 30 a 32 °C es incorrecto; descender la temperatura por debajo de 32 °C precipita inestabilidad de la membrana de Purkinje y arranca focos arritmogénicos ventriculares refractarios inducidos por frío. D) 28 a 30 °C es incorrecto; estado de congelación profunda que paraliza el miocardio en paro asistólico permanente intratable, causando muerte y coagulopatía masiva.",

    {

        question: "Ingresa a urgencias una paciente obstétrica con choque hipovolémico hemorrágico moderado. Si persiste con hipoperfusión tisular tras el protocolo de resucitación hídrica base, ¿cuál fue el volumen inicial exacto de la carga de cristaloides que debió administrarse antes de activar la transfusión masiva?",

        options: ["Posición de olfateo", "Decúbito lateral izquierdo", "Posición de rampa", "Trendelenburg invertido"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la anatomía de la mujer embarazada (mamas ingurgitadas, edema faríngeo, obesidad) impide la laringoscopia directa tradicional.<br><br>Perla ENARM: Manejo de la vía aérea en paciente obstétrica crítica: Para facilitar la visualización se recomienda utilizar la posición de “rampa” (oreja alineada a la muesca esternal).<br><br>Análisis de Distractores: A) Posición de olfateo es incorrecto; es la técnica clásica en pacientes no grávidos, insuficiente en embarazadas por el diámetro torácico y mamario. B) Decúbito lateral izquierdo es incorrecto; se usa para liberar el retorno venoso cavo, pero dificulta severamente el paso del laringoscopio. D) Trendelenburg invertido es incorrecto; disminuye la presión intragástrica, pero no alinea el eje orofaríngeo y laríngeo.",

        question: "En la ecografía renal de un paciente con dolor en flanco por cólico renoureteral, se observa separación de los ecos del seno central de configuración redondeada y cálices dilatados conectando con la pelvis renal, pero continúa ecogénica la periferia del seno. ¿A qué grado de hidronefrosis corresponde?",

        question: "Durante la evaluación neurológica de un lactante con lesión obstétrica del plexo braquial, se documenta la presencia de contracción del bíceps, pero sin generar desplazamiento o movimiento de la articulación del codo. Según la Escala de Movimientos Activos del Hospital de los Enfermos, ¿qué grado muscular le corresponde?",

    {
        id: 226,
        question: "Al evaluar la radiografía de un paciente geriátrico con dolor de cadera tras una caída, se dictamina una fractura intracapsular del fémur proximal. El trazo es incompleto y se encuentra anatómicamente impactado en valgo. Según la clasificación de Garden, ¿qué estadio preciso caracteriza esta lesión?",

        answer: 0,
        justification: "Justificación: De acuerdo GPC de fracturas intracapsulares, Garden estratifica el riesgo de necrosis isquémica. Las fracturas Tipo I conservan irrigación retinacular gracias a su impactación en valgo (incompletas), permitiendo fijación conservadora con tornillos percutáneos.<br><br>Perla ENARM: Clasificación de Garden: Tipo I corresponde a fractura incompleta o en abducción (impactada en valgo).<br><br>Análisis de Distractores: B) Tipo II es incorrecto; es una fractura completa del cuello femoral, pero estrictamente \"no desplazada\". C) Tipo III es incorrecto; es una fractura completa que se asocia a un desplazamiento parcial, alterando las trabéculas. D) Tipo IV es incorrecto; es la avulsión total con desplazamiento completo, donde la cabeza femoral pierde contacto absoluto con el cuello y su vascularidad.",
        source: "IMSS-115-08, Diagnóstico y tratamiento de fracturas intracapsulares del fémur, 2017, Cuadro II Clasificaciones, Página 11."
    },
    {

        question: "Se recibe en sala de choque a un masculino herido por proyectil de arma de fuego en abdomen. Según la GPC, ¿qué eventualidad logística externa se considera un indicador técnico preoperatorio absoluto para instituir cirugía de control de daños y evitar la reparación primaria?",
