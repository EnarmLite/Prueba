    {
        id: 228,
        question: "En la terapia intensiva neonatal, un paciente con sepsis cursa con choque frío y bajo gasto cardíaco. Se instaura infusión de milrinona. ¿Cuál es el perfil hemodinámico puro de este inhibidor de la fosfodiesterasa según el consenso clínico?",
        options: ["Aumenta el volumen latido y aumenta resistencias sistémicas", "Aumenta el volumen latido y disminuye resistencias pulmonares", "Disminuye el volumen latido y disminuye resistencias sistémicas", "Sin efecto sobre volumen latido y disminuye resistencias sistémicas"],
        answer: 1,

        source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Perfiles hemodinámicos, Página 33."
    },
    {

        question: "Un escolar de 12 años acude a urgencias por traumatismo directo sobre el antebrazo, detectándose fractura del tercio distal del radio asociada a luxación de la articulación radiocubital inferior (muñeca). ¿Qué epónimo ortopédico recibe anatómicamente esta lesión inestable?",

    {
        id: 230,
        question: "En una paciente con hemorragia postparto persistente, refractaria a uterotónicos y balones intrauterinos, sometida a laparotomía exploradora de urgencia en donde se corrobora coagulopatía por consumo y deterioro hemodinámico inestable intratable. ¿Qué procedimiento primario de cirugía de control de daños ordena instituir la guía antes de enviarla a la unidad de cuidados intensivos?",
        options: ["Histerectomía total abdominal", "Ligadura bilateral de arterias hipogástricas", "Empaquetamiento abdomino-pélvico tipo Mickulicz", "Sutura compresiva de B-Lynch"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, la paciente con tríada letal intraoperatoria (acidosis, hipotermia y coagulopatía mixta) fracasará ante cualquier sutura anatómica (ligaduras o B-Lynch). El manejo perentorio obliga a abortar disecciones, empaquetar fuertemente la cavidad con compresas (Mickulicz) para compresión hidrostática pasiva y reanimar metabólicamente en la UCI.<br><br>Perla ENARM: PBP Quirúrgico: Se sugiere el empaquetamiento abdomino-pélvico (tipo Mickulicz) en pacientes con HPP persistente que se asocia a coagulopatía secundaria mixta (dilucional y por consumo).<br><br>Análisis de Distractores: A) Histerectomía total abdominal es incorrecto; la cirugía extirpatoria larga en una paciente desangrada exacerba la hipotermia y garantiza muerte en quirófano. B) Ligadura bilateral de arterias hipogástricas es incorrecto; la disección retroperitoneal requiere tiempo y normocoagulación, factores ausentes en la paciente exanguinada inestable. D) Sutura compresiva de B-Lynch es incorrecto; es útil preventivamente en úteros atónicos estables, pero inútil frente a una coagulopatía general de consumo donde los capilares rezuman.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Intervenciones Quirúrgicas, Página 29."
    },
    {
        id: 231,
        question: "En el servicio de urgencias se presenta un adulto en estado post-paro tras taquicardia ventricular. El equipo documenta su regreso a la circulación espontánea, manteniéndose sin embargo en coma. Se decide iniciar traslado bajo reanimación de alta calidad. Según las metas de oxigenación, ¿cuál es el porcentaje máximo de saturación de oxígeno permitido para evitar el daño neuronal por hiperoxia?",

        source: "IMSS-633-13, Prevención, Diagnóstico y Tratamiento del Paro Cardiorrespiratorio, 2013, Tratamiento Integral Algoritmo, Página 72."
    },
    {
        id: 232,
        question: "En el escrutinio de un embarazo ectópico tubárico que no presenta datos de ruptura peritoneal, la evaluación de la localización anatómica predice el comportamiento biológico adverso. ¿Qué porción estricta de la trompa de Falopio alberga invariablemente la gran mayoría (>70%) de estas gestaciones aberrantes?",
        options: ["Istmo", "Intersticial", "Fimbria", "Ámpula"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de emergencias obstétricas, el diámetro luminal y la densidad ciliar de la porción ampular detienen el tránsito del cigoto anómalo, convirtiéndola biológicamente en la zona de anidación ectópica por excelencia estadística (70 a 80%).<br><br>Perla ENARM: Sitio de implantación ectópica: El ámpula tubárica es la localización anatómica más frecuente de los embarazos ectópicos (>70%).<br><br>Análisis de Distractores: A) Istmo es incorrecto; ocupa el segundo lugar en frecuencia (12%), pero sus rupturas son las más precoces y violentas por la estrechez muscular. B) Intersticial es incorrecto; se implanta a nivel del cuerno uterino (2%), provocando rupturas tardías (hasta 16 semanas) con hemorragias exanguinantes fulminantes. C) Fimbria es incorrecto; tiene una incidencia marginal (5%) y usualmente termina en un \"aborto tubario\" que cae a la cavidad pélvica conservando la trompa.",

        question: "Un preescolar politraumatizado ingresa con Escala de Coma de Glasgow pediátrica de 12 puntos y estado hemodinámico limítrofe. Al explorar los reflejos pupilares se documenta midriasis derecha arreactiva (anisocoria súbita). ¿Cuál es la indicación absoluta normativa de rescate para el manejo respiratorio de este niño?",
        options: ["Oxigenación pasiva por puntas nasales", "Intubación endotraqueal inmediata", "Observación y control tomográfico", "Inducción de hiperventilación con bolsa mascarilla"],

        justification: "Justificación: De acuerdo GPC de trauma craneoencefálico, aunque un Glasgow de 12 es \"TCE moderado\", la presencia de anisocoria traduce biológicamente herniación uncal inminente del tallo cerebral por hipertensión intracraneal masiva. Esta es una indicación primaria irrefutable de asegurar invasivamente la vía aérea para control de CO2.<br><br>Perla ENARM: Indicaciones absolutas de intubación en TCE: Glasgow menor o igual a 8, disminución en la escala mayor a 3 puntos, o presencia de anisocoria (signos de herniación).<br><br>Análisis de Distractores: A) Oxigenación pasiva por puntas nasales es incorrecto; es ineficaz para controlar y abatir el CO2 capilar responsable de la vasodilatación cerebral letal en curso. C) Observación y control tomográfico es incorrecto; trasladar a un paciente con herniación activa en progreso al tomógrafo sin aislamiento de la vía aérea culminará en paro cardiorrespiratorio en radiología. D) Inducción de hiperventilación con bolsa mascarilla es incorrecto; la presión externa gástrica provocará broncoaspiración, y la hiperventilación ciegamente manual induces isquemia cerebral secundaria extrema.",

        question: "En el contexto de un varón de 28 años con lesión no tratada y crónica del ligamento cruzado anterior de la rodilla derecha de más de un año de evolución, se somete a artroscopia diagnóstica. ¿Qué estructura anatómica es la que sufre mayormente por la traslación tibial anterior y representa la lesión secundaria degenerativa asociada más frecuente?",

        question: "En un paciente adulto con quemadura térmica profunda extensa, se decide instituir terapia intravenosa. Durante el seguimiento de las primeras horas de reanimación hídrica formal en UCI, ¿cuál es el nivel estricto inferior de la Presión Arterial Media (PAM) que confirma una hemodinamia visceral óptima sin condicionar fluid creep?",

        options: ["Uresis menor a 0.5 ml/kg/h durante 6 a 12 horas", "Uresis menor a 0.3 ml/kg/h durante 24 horas", "Anuria total durante más de 12 horas", "Uresis menor a 0.5 ml/kg/h por más de 12 horas"],

        question: "Durante el control prequirúrgico de un paciente de 40 años que ingresa con diagnóstico de apendicitis aguda confirmada y programado para abordaje quirúrgico, ¿cuál es el régimen profiláctico endovenoso bactericida de primera intención recomendado por las guías a infundir una hora antes del bisturí si cursa con antecedente grave de alergia a los betalactámicos?",
        options: ["Amikacina sumado a Ampicilina", "Clindamicina asociado con Levofloxacino", "Metronidazol asociado con Cefuroxima", "Amoxicilina con ácido clavulánico"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de urgencias, en peritonitis o inflamación apendicular intestinal donde confluyen anaerobios y gramnegativos agresivos (E. coli, Bacteroides), la profilaxis dorada recae sobre las cefalosporinas de primera/segunda línea con metronidazol. Ante la restricción restrictiva por reacción anafiláctica a derivados penicilínicos (betalactámicos), la alternativa de sustitución total indica fluoroquinolonas más un bacteriostático anaerobio.<br><br>Perla ENARM: Tratamiento profiláctico apendicular en caso de pacientes con hipersensibilidad a betalactámicos: Utilizar el esquema preoperatorio con Ciprofloxacino o Levofloxacino, sumados fuertemente al espectro de Clindamicina intravenosa.<br><br>Análisis de Distractores: A) Amikacina sumado a Ampicilina es incorrecto; utilizar ampicilina en un paciente estrictamente etiquetado como alérgico mayor a betalactámicos causará broncoespasmo letal anafiláctico preanestésico agudo intra-quirófano. C) Metronidazol asociado con Cefuroxima es incorrecto; la cefuroxima es un agente antimicrobiano betalactámico cefalosporínico (anillo cruzado reactivo 15%), exponiendo un alto cruce inmunológico perjudicial proscrito en choque previo al corte. D) Amoxicilina con ácido clavulánico es incorrecto; la base del medicamento es la amoxicilina (una aminopenicilina primaria), que inducirá una reacción anafiláctica inmediata.",
        source: "IMSS-436-19, Diagnóstico y Tratamiento Inicial de las Emergencias Obstétricas (Sección Apendicitis), 2019, Terapia profiláctica antimicrobiana, Página 181."

        options: ["Presencia de temblores distales o hiperreflexia", "Cifras limítrofes basales de glucosa capilar", "Evaluación de hipotonía masiva y depresión respiratoria", "Cierre asimétrico de la fontanela anterior"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de preeclampsia, la molécula del catión del magnesio atraviesa libre y velozmente las vellosidades terminales. En el recién nacido inmaduro, niveles altos sistémicos inhiben pasivamente la placa motora colinérgica y el bulbo, desencadenando parálisis asfíctica por bloqueo del centro respiratorio central del bulbo raquídeo de la paciente pediátrica.<br><br>Perla ENARM: En madres de hijos de eclampsia tratadas con dosis tóxicas de sulfato de magnesio, el personal médico pediátrico del área debe obligatoriamente vigilar el desarrollo inminente agudo de la hipotonía severa de la unión motora y parálisis o depresión respiratoria asfíctica por bloqueo de sustrato en el feto nacido.<br><br>Análisis de Distractores: A) Presencia de temblores distales o hiperreflexia es incorrecto; esto es característico del síndrome de abstinencia neonatal o hipocalcemia crónica convulsiva asilada periférica temprana y no refleja la sobredosis de magnesio que provoca \"ausencia de reflejos\". B) Cifras limítrofes basales de glucosa capilar es incorrecto; monitoriza el daño letal pos-insulínico del feto obeso macrosómico materno de gestante diabética o hipoxia estresora, pero carece de un link enzimático con la infusión exógena mineral profiláctica anticonvulsiva de la terapia de la crisis general eclámptica materna. D) Cierre asimétrico de la fontanela anterior es incorrecto; evalúa los síndromes estériles por defectos crónicos tempranos formativos de las suturas craneales sinostóticas intra-gestacionales a semanas prenatales del desarrollo craneal base orgánico pediátrico sin conexión aguda química respiratoria base posicional.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia en el segundo nivel de atención, 2017, Cuidados Posnatales fetales, Página 30."

    {
        id: 239,
        question: "Se evalúa a un preescolar en terapia pediátrica por sepsis. Al instaurar el manejo de la primera hora, la GPC exige obtener exámenes bioquímicos antes de la inyección de antibióticos empíricos. ¿Qué prueba obligada se considera el marcador serológico hemodinámico pronóstico central de macro y micro perfusión celular para guiar el tratamiento?",
        options: ["Procalcitonina", "Ácido Láctico sérico", "Proteína C Reactiva", "Ferritina basal"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de sepsis pediátrica, el choque hipóxico cambia el metabolismo celular a vía anaerobia (produciendo lactato). Medir el láctico al minuto cero y monitorizar su depuración es el predictor biológico vital de falla general para documentar que las cargas hídricas logran oxigenar los capilares estancados.<br><br>Perla ENARM: Manejo en la primera hora: Medir obligatoriamente los niveles basales iniciales del lactato sanguíneo sérico central en todos los pacientes con sospecha o infección séptica infantil para estimar la severidad vasopléjica del choque metabólico instaurado a piso.<br><br>Análisis de Distractores: A) Procalcitonina es incorrecto; es un biomarcador agudo para identificar la etiología infecciosa bacteriana sobre causas virales, pero no dictamina matemáticamente la perfusión de O2 en choque microvascular. C) Proteína C Reactiva es incorrecto; reactante inflamatorio crónico hepático lento asintomático del segundo o tercer día útil de control del tratamiento infeccioso empírico pero inútil en predecir falla cardiorrespiratoria de reanimación por falta de especificidad celular tisular basal aeróbica láctica temprana. D) Ferritina basal es incorrecto; proteína base de la lisis aguda eritrocitaria celular o del depósito nutricional férrico orgánico sin respuesta biológica central del intercambio respiratorio celular general.",
        source: "SS-291-10, Diagnóstico y Tratamiento de Sepsis y Choque Séptico Pediátrico, 2017, Manejo Inicial Hemodinámico, Página 48."

    {

        question: "Durante la vigilancia endoscópica digestiva a un paciente en urgencias por un cuadro hemorrágico esofágico resuelto por banda ligadura variceal. La directriz clínica estipula que en escenarios refractarios masivos prequirúrgicos se instituyan técnicas transitorias compresivas del lumen esofágico con sonda. ¿Cuál es el nombre estandarizado de oro del tubo de rescate del balón indicado por la GPC para taponamiento directo?",

        justification: "Justificación: De acuerdo GPC de várices esofágicas, cuando falla el control primario, se gana tiempo valioso insertando un doble balón insuflado que ejerce isquemia gástrica fundica y esofágica lateral restrictiva exanguinante salvavidas como medida de puente transitoria temporal en terapia intensiva de control del choque (TIPS o cirugía).<br><br>Perla ENARM: Tratamiento de rescate: En hemorragia variceal refractaria masiva o no controlable se recomienda en UCI utilizar una sonda estandarizada compresión gástrica de Sengstaken-Blakemore o tipo Minnesota por un máximo agudo estricto general no prolongado a veinticuatro horas de isquemia mucosal.<br><br>Análisis de Distractores: A) Sonda de Foley gástrica es incorrecto; es un catéter urinario diseñado de balones asimétricos mínimos (10cc) biológicos disfuncionales para ejercer los cien o doscientos mililitros esofágicos compresores masivos tubulares concéntricos torácicos. C) Sonda naso-yeyunal doble lumen enteral es incorrecto; sondaje alimenticio sin sistema distal expansivo de neumático que logre compresión variceal intraluminal. D) Catéter Fogarty de oclusión venosa es incorrecto; se introduce exclusivamente endovascular dentro de venas y arterias para extraer coágulos o trombos de extremidad vascular por angiología y no tubo gástrico digestivo esofágico ciego.",

        question: "En la evaluación integral de una paciente con preeclampsia, se buscan intencionadamente signos de disfunción orgánica múltiple. Según los criterios clínicos de severidad del Colegio Americano, ¿qué parámetro neurológico estricto categoriza a la enfermedad como condición grave inminente de falla central?",

        options: ["Presión media menor a 9 cm H2O y FiO2 menor a 40%", "Presión media menor a 5 cm H2O y FiO2 menor a 21%", "Presión media menor a 7 cm H2O y FiO2 menor a 30%", "Presión media menor a 8 cm H2O y FiO2 menor a 35%"],

        options: ["Frecuencia cardiaca en el percentil 95", "Presión arterial diastólica en el percentil 50", "Diferencia de 1 °C entre temperatura central y periférica", "Diferencia > 3 °C entre temperatura central y periférica"],

        question: "Al documentar diariamente la reducción del gasto urinario y alteración bioquímica de azoados en la terapia intensiva, ¿qué escala predictiva funcional estandariza la guía clínica de forma exclusiva para estadificar la Lesión Renal Aguda en el grupo etario neonatal?",

        answer: 2,
        justification: "Justificación: De acuerdo GPC de lesión renal aguda, los marcadores y el peso varían biológicamente. La clasificación se estandariza obligatoriamente por edades, asignando la herramienta AKIN (Acute Kidney Injury Network) al período puramente neonatal.<br><br>Perla ENARM: Diagnóstico LRA en pediatría: Se recomienda en neonatos utilizar AKIN, en lactantes pRIFLE, y KDIGO para mayores de un año.<br><br>Análisis de Distractores: A) pRIFLE es incorrecto; su uso está validado exclusivamente para la franja pediátrica de \"lactantes\", evaluando el clearance estimado por la fórmula de Schwartz. B) RIFLE es incorrecto; es la escala histórica original diseñada matemáticamente para pacientes adultos. D) KDIGO es incorrecto; el consenso normativo restringe y enfoca su uso pediátrico estricto a infantes mayores de 12 meses de edad cronológica.",

        question: "Una embarazada en labor de parto activo sufre ruptura artificial de membranas amnióticas, presentando de manera súbita desaceleraciones profundas y patrón anormal en el trazo de la frecuencia cardiaca fetal. Ante la sospecha de compresión funicular extrínseca, ¿cuál es el diagnóstico de emergencia obstétrica inminente a descartar?",

        question: "Se atiende en urgencias a un politraumatizado con abolición de los ruidos respiratorios del hemitórax izquierdo y choque hipovolémico. Tras realizar la pleurostomía y colocación de sonda endopleural con sello de agua, ¿qué volumen de sangrado continuo hemático dicta el protocolo para catalogarlo como hemotórax masivo quirúrgico (toracotomía)?",

        question: "En la reanimación de un lactante con hipoglucemia sintomática (menor a 45 mg/dl), se administró el minibolo de Solución Glucosada al 10%. A los 30 minutos de control, la glucemia central persiste refractaria por debajo del umbral de seguridad. ¿Qué ajuste milimétrico dicta el algoritmo realizar a la carga de Glucosa Kilogramo Minuto (GKM)?",
        options: ["Incrementar la GKM de 5 en 5", "Incrementar la GKM de 1 en 1", "Incrementar la GKM de 2 en 2", "Incrementar la GKM de 4 en 4"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hipoglucemia neonatal transitoria, el hiperinsulinismo de rebote agota velozmente los sustratos venosos. Ante el fracaso del rescate inicial, el aumento progresivo del goteo osmolar debe ser cauteloso para no desencadenar descargas hiperglucémicas letales, estandarizándose en bloques estrictos de 2 mg/kg/min hasta un tope biológico de 12.<br><br>Perla ENARM: Algoritmo de manejo de Hipoglucemia refractaria: Si a los 30 min la glucosa es < 45 mg/dl, incrementar aporte de GKM de 2 en 2 mg/kg/min hasta máximo de 12 mg/kg/min.<br><br>Análisis de Distractores: A) Incrementar la GKM de 5 en 5 es incorrecto; escaladas agresivas propician hiperosmolaridad de la sangre del menor induciendo hemorragias intraventriculares. B) Incrementar la GKM de 1 en 1 es incorrecto; retrasaría la corrección metabólica prolongando la isquemia glucopénica bulbar. D) Incrementar la GKM de 4 en 4 es incorrecto; el ajuste institucional endovenoso no avala brincos vasculares superiores a las dos unidades.",
        source: "IMSS-442-18, Diagnóstico y Tratamiento de la Hipoglucemia Neonatal, 2018, Algoritmo Modificación de Tratamiento, Página 19."
    },
    {
        id: 253,
        question: "Un obrero ingresa al servicio de trauma con fractura de ambos huesos del antebrazo con un área muscular aplastada y exposición ósea masiva. A la exploración distal la mano se encuentra fría y el Doppler documenta ausencia total de flujo vascular. De acuerdo a la clasificación universal de heridas expuestas de Gustilo-Anderson, ¿qué estadio describe un trauma con compromiso arterial reparable?",
        options: ["Tipo IIIA", "Tipo IIIC", "Tipo IIIB", "Tipo II"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de fracturas de antebrazo, el daño máximo a una extremidad es la interrupción de su árbol vascular primario. Independientemente del tamaño del orificio cutáneo, si el trazo fracturario arrancó o seccionó la arteria principal requiriendo injerto vascular o puente de anastomosis, clasifica invariablemente como IIIC.<br><br>Perla ENARM: Clasificación de Gustilo y Anderson: Tipo IIIC corresponde a la lesión vascular que requiere reparación quirúrgica.<br><br>Análisis de Distractores: A) Tipo IIIA es incorrecto; describe cobertura de partes blandas adecuada sobre hueso a pesar del alta energía y las laceraciones amplias de tejido celular subcutáneo. C) Tipo IIIB es incorrecto; indica pérdida extensiva muscular y perióstica que requiere colgajos rotacionales o injertos libres de piel para tapar el hueso, pero con arterias funcionales. D) Tipo II es incorrecto; es una herida moderada limpia entre 1 y 10 cm con mínima lesión de músculo sin alterar flujos.",
        source: "IMSS-193-08, Fracturas de Antebrazo, 2017, Cuadro Clasificación de Gustilo-Anderson, Página 11."
    },
    {
        id: 254,
        question: "En el proceso de alta hospitalaria de una paciente puérpera, se re-estratifica su nivel de riesgo de tromboembolismo venoso (TEV) integrando la obesidad, cesárea de emergencia y hemorragia en el parto. ¿Cuál es la sumatoria mínima de riesgo \"postnatal\" que dicta la prescripción de profilaxis farmacológica heparínica por al menos 10 días en su domicilio?",
        options: ["Mayor o igual a 2", "Mayor o igual a 1", "Mayor o igual a 4", "Mayor o igual a 3"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de enfermedad tromboembólica, los cambios inflamatorios, el estancamiento pélvico postquirúrgico y el hipercoagulabilidad de rebote hacen al puerperio la etapa más peligrosa. El umbral para proteger farmacológicamente a la mujer se reduce matemáticamente a tan solo 2 puntos posnatales para instaurar las inyecciones protectoras.<br><br>Perla ENARM: Interpretación del puntaje trombofílico: Si el puntaje es mayor o igual a 2 postnatal, se indica profilaxis por al menos 10 días de puerperio.<br><br>Análisis de Distractores: B) Mayor o igual a 1 es incorrecto; un punto aislado (ej. IMC 31 o venas varicosas simples) prescribe movilización mecánica temprana sin punción química forzosa ambulatoria. C) Mayor o igual a 4 es incorrecto; es el umbral normado pero de la valoración \"prenatal\" (inicio de gestación), no aplicable al algoritmo del puerperio sensible. D) Mayor o igual a 3 es incorrecto; con tres puntos en el postnatal se extiende la cobertura, pero el umbral de disparo o \"disparador clínico inicial\" base estricto se fija en 2 puntos.",
        source: "SS-544-20, Prevención de enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Cuadro de Factores Postnatales, Página 14."
    },
    {
        id: 255,
        question: "En el apoyo nutricional endovenoso de un paciente críticamente enfermo intubado con diagnóstico de síndrome metabólico de estrés, el uso de carbohidratos debe ajustarse rigurosamente. ¿Cuál es la tasa de oxidación máxima de glucosa tolerada por infusión que prohíbe rebasar la GPC para evitar esteatosis hepática y retención de CO2 alveolar?",
        options: ["2 mg/kg/min", "10 mg/kg/min", "5 mg/kg/min", "8 mg/kg/min"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de nutrición en el estado crítico, la mitocondria asfixiada del paciente en choque posee una capacidad enzimática topada para procesar azúcares. Infundir glucosa intravenosa por arriba de su margen fisiológico máximo (4 a 7) ocasiona que el exceso se almacene como grasa tóxica visceral y dispare hipercapnia asfixiando el ventilador.<br><br>Perla ENARM: Requerimientos de Hidratos de Carbono: En pacientes con estrés la oxidación máxima de glucosa es de 4-7 mg/kg/min, por lo que se recomienda no exceder de 5 mg/kg/minutos.<br><br>Análisis de Distractores: A) 2 mg/kg/min es incorrecto; es la tasa inicial cautelosa prescrita para arrancar soporte en el \"paciente diabético\" inestable, pero no representa el tope metabólico anatómico general restrictivo (5). B) 10 mg/kg/min es incorrecto; sobrecarga calórica masiva letal de nutrición total iatrogénica del siglo pasado que promueve infiltración grasa celular aguda. D) 8 mg/kg/min es incorrecto; se encuentra por encima del margen metabólico oxidativo real del adipocito/músculo chocado descrito por el consenso internacional ASPEN/ESPEN.",
        source: "IMSS-818-17, Nutrición parenteral y enteral en el paciente adulto en estado crítico, 2017, Requerimientos Hidratos de Carbono, Página 26."
    },
    {
        id: 256,
        question: "Una mujer gestante en Terapia Intensiva cursa con disfunción general por sepsis de foco urinario. Se encuentra ventilada y con manejo antimicrobiano de alto espectro sin evidencia de hemorragia aguda activa o hipoxemia severa. ¿Cuál es el nivel de hemoglobina que condiciona perentoriamente la transfusión restrictiva de concentrados globulares?",
        options: ["Menor de 8.0 g/dl", "Menor de 7.0 g/dl", "Menor de 9.0 g/dl", "Menor de 6.0 g/dl"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de sepsis materna, el paradigma transfusional liberal ha sido superado. Administrar sangre acarrea inmunosupresión y riesgo de lesión pulmonar TRALI que empeora la sepsis. En toda paciente séptica estable sin pérdida de volumen rojo aguda, se sostiene una tolerancia estricta baja.<br><br>Perla ENARM: Hemoderivados en sepsis materna: Se recomienda la transfusión de concentrados globulares exclusivamente cuando la concentración de hemoglobina sea menor de 7.0 g/dl, en ausencia de hemorragia aguda o isquemia.<br><br>Análisis de Distractores: A) Menor de 8.0 g/dl es incorrecto; es la meta de mantenimiento una vez que la paciente cae a 6.9, no el límite gatillo de la indicación transfusional. C) Menor de 9.0 g/dl es incorrecto; forzar hemoderivados a este nivel somete a la madre a antígenos letales innecesarios y sobrecarga cardiaca aguda derecha. D) Menor de 6.0 g/dl es incorrecto; permitir este grado de isquemia global frena por completo el metabolismo aeróbico materno-fetal, provocando acidosis irreversible sistémica en choque.",
        source: "IMSS-272-18, Prevención, diagnóstico y tratamiento de la sepsis materna, 2018, Manejo Hemodinámico Hemoderivados, Página 18."
    },
    {
        id: 257,
        question: "Al instaurar reanimación hídrica urgente en un neonato en la Unidad de Terapia Intensiva con diagnóstico de choque séptico tardío y llenado capilar prolongado. ¿Cuál es el volumen estricto recomendado para cada \"carga rápida\" (bolo) individual de cristaloides que dicta la normativa pediátrica?",
        options: ["30 ml/kg", "25 ml/kg", "20 ml/kg", "10 ml/kg"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de sepsis neonatal, el miocardio del infante pretérmino o recién nacido posee nula distensibilidad diastólica y se congestiona ante masas hídricas, desarrollando falla cardiaca congestiva fulminante. El volumen universal de infusión en la hora dorada se acorta a la mitad estricta de la del preescolar para ser seguro.<br><br>Perla ENARM: Reanimación inicial de choque séptico neonatal: Administrar la primera carga rápida con volumen reducido de solución cristaloide isotónica a 10 ml/kg en un tiempo de 15 a 20 minutos.<br><br>Análisis de Distractores: A) 30 ml/kg es incorrecto; bolo de expansión de trauma agudo del adulto, inyectar esto paraliza por sobredistensión las aurículas del neonato inmaduro. B) 25 ml/kg es incorrecto; dosis no avalada por los consensos pediátricos de resucitación de urgencia vital hemodinámica en neonatología. C) 20 ml/kg es incorrecto; este volumen es la dosis inicial estándar de reanimación asignada para el choque séptico, pero exclusivamente del paciente \"pediátrico o lactante mayor/escolar\", no del neonato recién nacido.",
        source: "SS-283-19, Diagnóstico, tratamiento y pronóstico de la sepsis neonatal, 2019, Algoritmo de Choque Séptico, Página 46."
    },
    {
        id: 258,
        question: "En el quirófano de emergencia, durante la laparotomía exploradora de un soldado con herida por proyectil de arma de fuego en abdomen, los cirujanos pierden el control del sangrado de grandes vasos pélvicos. ¿Qué cantidad de pérdida sanguínea transoperatoria estimada funge como el indicador logístico resolutivo normado para obligar al empaquetamiento temprano tipo Control de Daños (CCD)?",
        options: ["Mayor a 1500 ml", "Mayor a 1000 ml", "Mayor a 500 ml", "Mayor a 2000 ml"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de cirugía de control de daños abdominal, transfundir masivamente sobre un paciente perdiendo su reserva roja precipita la letal \"coagulopatía por dilución y consumo\". Al llegar a la cuota estandarizada de mil quinientos mililitros perdidos, las anastomosis gástricas cederán y las suturas intestinales fallarán, obligando a cerrar la herida en bolsa de Bogotá de rescate vital.<br><br>Perla ENARM: Indicadores transoperatorios de CCD: Pérdida transoperatoria estimada masiva de sangre aguda documentada superior a 1500 ml.<br><br>Análisis de Distractores: B) Mayor a 1000 ml es incorrecto; representa un sangrado venoso o mesentérico profuso pero anatómico, que el anestesiólogo puede reponer con dos paquetes eritrocitarios sin que el cirujano detenga su reparación focal curativa de vísceras. C) Mayor a 500 ml es incorrecto; es un sangrado quirúrgico intermedio esperado en resecciones hepáticas, sin amenazar con triada letal al paciente militar varón compensado. D) Mayor a 2000 ml es incorrecto; si se retrasa la orden de empaquetamiento abdominal hasta exanguinar el total de la mitad circulatoria (2L), el individuo cursará irremediablemente con paro cardiaco isquémico sobre la mesa operatoria perdiendo ventana de intervención.",
        source: "SEDENA-445-18, Cirugía de control de daños en herida por arma de fuego en abdomen, 2018, Indicadores Transoperatorios, Página 22."
    },
    {
        id: 259,
        question: "En el manejo de la hemorragia postparto masiva con coagulopatía de consumo guiada por tromboelastometría rotacional (ROTEM). Si el trazado refleja disminución de la amplitud a los 5 minutos (A5) en todos los módulos generales (EXTEM) pero se asocia primordial y causalmente a una disminución del grosor y alteraciones específicas detectadas en el canal FIBTEM (A5 disminuido), ¿cuál es el déficit molecular puro diagnosticado que obliga su reposición inminente?",
        options: ["Déficit plaquetario primario", "Fibrinolisis secundaria por plasmina", "Hipofibrinogenemia", "Disfunción plaquetaria uremica"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, el canal rotacional \"FIBTEM\" neutraliza y destruye en el aparato la agregación de las plaquetas vivas mediante citocalasina D para aislar puramente la función y fuerza estructural de las redes de fibrina (fibrinógeno transformado). Su desplome dictamina escasez de esta proteína del hígado que obliga su reposición con crioprecipitados.<br><br>Perla ENARM: Interpretación de Tromboelastometría (ROTEM): Existen disminución de A5, A10 y MCF de base y con alteraciones en estos parámetros dependientes en el módulo específico de FIBTEM A5; el resultado indica Hipofibrinogenemia severa en consumo.<br><br>Análisis de Distractores: A) Déficit plaquetario primario es incorrecto; se diagnóstica solo cuando el parámetro del canal general (EXTEM A5) es débil pero el FIBTEM graficado aislado de fibrina arroja curvas normales fuertes y perfectas conservando el grosor proteico intacto hepático. B) Fibrinolisis secundaria por plasmina es incorrecto; las lisis del trombo biológico maduro se grafican temporalmente hacia el final terminal al medir índices degradativos LY30 o el parámetro de lisis máxima (ML) a la media hora, no en las fuerzas tempranas de agregación de A5 iniciales del grosor formativo. D) Disfunción plaquetaria uremica es incorrecto; se detecta mediante mapeos inhibidores de agregometría plaquetaria de membrana, pero su etiología no colapsaría el FIBTEM diseñado puramente como medidor de factores solubles inertes purificados fibrinosos de banco hemostático libre de células.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Cuadro 7 Interpretación ROTEM, Página 47."
    },
    {
        id: 260,
        question: "Al cumplir los criterios de retiro de ventilación mecánica en un prematuro con Síndrome de Dificultad Respiratoria y realizar el paso resolutivo a soporte no invasivo por tubo CPAP. ¿Qué parámetro de Presión Positiva al Final de la Espiración (PEEP) exige normativamente mantener fijo el equipo médico transitoriamente para evitar la letal atelectasia alveolar del pulmón inmaduro?",
        options: ["Mantener el PEEP en 10 cm H2O", "Mantener el PEEP en 8 cm H2O", "Mantener el PEEP en 4 cm H2O", "Mantener el PEEP en 6 cm H2O"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de síndrome de dificultad respiratoria, durante el salto extubador el lactante pierde la prótesis que dilata la epiglotis de manera constante. Proveer una distensión presurizada pasiva estandarizada basal de 6 es el número para no dañar los capilares pero imposibilitar el cierre biológico de las paredes distales surfactantes carentes del neonato extubado.<br><br>Perla ENARM: Criterios de retiro de VM invasiva: Disminuir parámetros y mantener en todo momento el PEEP en 6 cm H2O (para evitar atelectasia post-extubación).<br><br>Análisis de Distractores: A) Mantener el PEEP en 10 cm H2O es incorrecto; este PEEP restrictivo es un grado de presión positiva altísima limitante que reventará la pleura inmadura y condicionará en minutos el desarrollo de neumotórax yatrogénico a tensión alveolar en preescolares estables de piso no invasivo. B) Mantener el PEEP en 8 cm H2O es incorrecto; representa una fase invasiva alta y sostenida en patologías restrictivas crónicas fibróticas ventilatorias pero no la meta desescalonada basal fisiológica exigida del destete final pasivo para el soporte por cánula nasal. C) Mantener el PEEP en 4 cm H2O es incorrecto; el consenso contraindica formal y unánimemente reducir o indicar parámetros menores a los cinco centímetros de agua (5 cmH2O) porque el pulmón sin material de sostén neumático colapsa inminentemente desarrollando atelectrauma por fricción o agitación con fracaso del CPAP.",
        source: "IMSS-137-21, Diagnóstico y Tratamiento del Síndrome de Dificultad Respiratoria en Neonato, 2021, Criterios de Retiro, Página 11."
    },
    {
        id: 261,
        question: "Paciente adulto con fracturas costales múltiples y dolor severo que limita la mecánica ventilatoria. Para prevenir atelectasia e infección pulmonar secundaria, ¿cuál es el manejo analgésico de elección recomendado en trauma torácico cerrado?",
        options: ["Analgesia epidural continua", "AINEs orales a dosis tope", "Opioides intravenosos en bolo", "Infiltración lidocaínica percutánea"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de traumatismo de tórax, el dolor torácico severo impide la expansión de la caja torácica. El catéter peridural proporciona un bloqueo segmentario sensitivo excelente que permite al paciente toser y ventilar sin depresión respiratoria central.<br><br>Perla ENARM: Se recomienda la analgesia epidural en pacientes con fracturas costales múltiples para mejorar la mecánica respiratoria y evitar complicaciones.<br><br>Análisis de Distractores: B) AINEs orales a dosis tope es incorrecto; son insuficientes para el control del dolor óseo torácico múltiple agudo en trauma. C) Opioides intravenosos en bolo es incorrecto; su uso sistémico masivo produce depresión del centro respiratorio bulbar, empeorando la ventilación y retención de CO2. D) Infiltración lidocaínica percutánea es incorrecto; requiere punciones repetitivas de vida media corta, siendo menos eficaz y con riesgo de neumotórax yatrogénico comparado con el catéter epidural.",

    },
    {
        id: 262,
        question: "En el manejo activo del tercer periodo del trabajo de parto, ¿cuál es el tiempo normado para realizar el pinzamiento tardío del cordón umbilical en un neonato de término con esfuerzo respiratorio vigoroso?",
        options: ["A los 30 segundos", "A los 5 minutos", "Inmediatamente tras la expulsión", "Entre 1 y 3 minutos"],
        answer: 3,
        justification: "Justificación: De acuerdo GPC de hemorragia postparto, el pinzamiento tardío permite la transfusión placentaria fisiológica de hierro al recién nacido. La guía estandariza el corte superado el primer minuto, siempre y cuando el bebé respire adecuadamente y no requiera reanimación.<br><br>Perla ENARM: Manejo activo del 3er periodo: Realizar tracción controlada y pinzamiento tardío del cordón umbilical, idealmente entre 1 a 3 minutos post-expulsión.<br><br>Análisis de Distractores: A) A los 30 segundos es incorrecto; se considera un pinzamiento precoz que priva al neonato de volumen sanguíneo y reservas férricas. B) A los 5 minutos es incorrecto; demorar excesivamente el pinzamiento incrementa el riesgo de policitemia neonatal e ictericia severa. C) Inmediatamente tras la expulsión es incorrecto; esta acción se reserva exclusivamente para neonatos deprimidos que requieren traslado urgente a la cuna térmica para reanimación avanzada.",
        source: "SS-103-21, Prevención y manejo de la hemorragia postparto, 2021, Manejo Activo 3er Periodo, Página 32."
    },
    {
        id: 263,
        question: "Un neonato fue sometido a hipotermia terapéutica por encefalopatía hipóxico-isquémica. Para evaluar las secuelas estructurales y establecer su pronóstico del neurodesarrollo, ¿en qué ventana de tiempo estricta se debe realizar la resonancia magnética (IRM)?",
        options: ["A las 48 horas de vida", "Entre 7 y 21 días", "A los 3 a 5 días", "Después de 30 días"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de asfixia neonatal, la imagen cerebral temprana (<7 días) puede enmascarar o infraestimar la extensión real del infarto por el edema agudo. El periodo óptimo de definición tisular pos-isquémica es a partir de la primera a tercera semana.<br><br>Perla ENARM: Seguimiento de encefalopatía: Todo niño tratado con hipotermia requiere evaluación de la imagen por resonancia magnética (IRM) idealmente entre los 7 y 21 días.<br><br>Análisis de Distractores: A) A las 48 horas de vida es incorrecto; el paciente aún se encuentra cursando el protocolo estricto de enfriamiento continuo a 33.5°C (el cual dura 72 horas). C) A los 3 a 5 días es incorrecto; corresponde a la fase de recalentamiento metabólico, el cerebro cursa con hiperemia reactiva no valorable anatómicamente. D) Después de 30 días es incorrecto; la cicatrización glial tardía difumina las zonas isquémicas agudas y retrasa la intervención de rehabilitación neurosensorial.",
        source: "IMSS-371-10, Asfixia Neonatal, 2010, Seguimiento, Página 19."
    },
    {
        id: 264,
        question: "En el tamizaje de preeclampsia en una unidad de primer nivel sin disponibilidad de pruebas cuantitativas de orina, ¿qué resultado mínimo en la tira reactiva de orina tomada al azar se acepta provisionalmente como documentatorio de proteinuria significativa?",
        options: ["Trazas", "2+ o más", "1+ o más", "3+ o más"],
        answer: 2,
        justification: "Justificación: De acuerdo GPC de preeclampsia, aunque la tira reactiva es inexacta y debe confirmarse, ante la carencia de laboratorios el algoritmo valida temporalmente la presencia de una cruz (1+) para activar las medidas preventivas.<br><br>Perla ENARM: Diagnóstico de proteinuria: Presencia de 1+ en tira reactiva en una muestra tomada al azar (Utilizar solo si los métodos cuantitativos no están disponibles).<br><br>Análisis de Distractores: A) Trazas es incorrecto; se considera un hallazgo fisiológico gestacional por hiperfiltración glomerular que no categoriza daño endotelial. B) 2+ o más es incorrecto; aunque es fuertemente indicativo, la guía baja el umbral diagnóstico de escrutinio a tan solo 1+ para no perder pacientes en riesgo. D) 3+ o más es incorrecto; representa un síndrome nefrótico inminente masivo, esperar a este valor omite la etapa precoz de la patología.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la preeclampsia, 2017, Criterios diagnósticos, Página 27."
    },
    {
        id: 265,
        question: "Durante el soporte metabólico de un paciente crítico intubado, se evalúa el inicio de nutrición por sonda. ¿Qué condición clínica del tracto gastrointestinal establece una contraindicación absoluta para iniciar Nutrición Enteral Temprana?",
        options: ["Obstrucción intestinal mecánica", "Ausencia de ruidos peristálticos", "Diarrea con gasto de 200 ml/día", "Uso estable de vasopresores a dosis bajas"],
        answer: 0,
        justification: "Justificación: De acuerdo GPC de nutrición en paciente crítico, infundir volumen osmolar proximal a un bloqueo físico genera dilatación retrógrada, perforación gástrica de la pared intestinal y peritonitis letal yatrogénica.<br><br>Perla ENARM: Contraindicaciones de la Nutrición Enteral: Obstrucción intestinal mecánica, isquemia intestinal aguda y fístulas de alto gasto no puentables.<br><br>Análisis de Distractores: B) Ausencia de ruidos peristálticos es incorrecto; el íleo paralítico auditivo fisiológico post-sedación no contraindica la nutrición gástrica si no existe distensión abdominal severa documentada. C) Diarrea con gasto de 200 ml/día es incorrecto; es un volumen bajo tolerable que responde a ajuste en el tipo de fórmula y no prohíbe la vía digestiva. D) Uso estable de vasopresores a dosis bajas es incorrecto; una vez lograda la reanimación macrohemodinámica, las dosis bajas de norepinefrina no contraindican la infusión trófica intestinal.",
        source: "IMSS-818-17, Nutrición parenteral y enteral en el adulto crítico, 2017, Nutrición Enteral, Página 18."
    },
    {
        id: 266,
        question: "En el diagrama del proceso de transferencia y entrega-recepción de un paciente con paro cardiorrespiratorio o retorno a la circulación, ¿qué herramientas de evaluación diagnóstica son asignadas exclusivamente a la \"Fase Prehospitalaria\" antes del arribo a urgencias?",
        options: ["EKG, monitor, signos vitales", "Ecocardiograma transtorácico y lactato", "Gasometría arterial y panel de electrolitos", "Enzimas cardiacas troponinas"],
        answer: 0,

        question: "En un lactante que cursó con tracción radicular cervical durante el nacimiento (lesión obstétrica del plexo braquial). ¿A partir de qué edad cronológica estipula la guía clínica que debe aplicarse la escala de Narakas para dictaminar el pronóstico de recuperación motora?",

        question: "Durante el tamizaje por imagen y orina de un paciente adulto con cuadro agudo de dolor en flanco con irradiación testicular. ¿Cuál es el diagnóstico diferencial oncológico clásico primario del riñón que simula idénticamente un \"cólico renoureteral\" según la GPC?",

    {

        question: "En la reanimación de un preescolar en choque séptico con perfusión disminuida, se decide iniciar inotrópico con dobutamina de soporte. ¿Cuál es el perfil hemodinámico fisiológico esperado de esta amina sobre las resistencias vasculares sistémicas (RVS) y pulmonares (RVP)?",

    {

        question: "En la sala de urgencias, ingresa un joven con fractura transversa diafisiaria de cúbito y radio (ambos huesos) secundaria a maquinaria pesada. Al realizar la evaluación, se documenta palidez total de la mano y llenado capilar nulo. ¿Qué estudio de gabinete normado se solicita obligadamente para dictaminar la extensión del daño en este escenario?",

        question: "Al clasificar el grado de severidad y disfunción orgánica en el paciente pediátrico ingresado por sepsis comunitaria. ¿Qué alteración en los niveles del perfil de función hepática dicta un estado de Falla Orgánica Hepática pura instalada?",

        question: "Una mujer de 25 años ingresa al quirófano exanguinada por choque hemorrágico obstétrico severo. Por la premura del sangrado activo, no es posible esperar los tiempos de laboratorio para las pruebas cruzadas. ¿Qué grupo de unidades de concentrados eritrocitarios estandariza la guía inyectar de manera universal salvavidas de inicio?",

        question: "En un soldado reanimado metabólicamente en la terapia intensiva que mantiene el abdomen abierto tras una laparotomía de control de daños (CCD). El cirujano evaluará si la fisiología autoriza proceder con la reconstrucción intestinal secuencial en quirófano. ¿Qué parámetro clínico sistémico estricto funciona como indicador objetivo de éxito para realizar este cierre definitivo programado?",

        question: "Al atender a una paciente gestante en Triage del servicio de urgencias por un cuadro febril de etiología incierta. Se dictamina evaluar la escala clínica rápida del Quick SOFA (qSOFA). ¿Qué puntaje mínimo sumatorio de esta herramienta desencadena obligatoriamente la vía crítica de evaluación obstétrica por alta sospecha de sepsis?",

        justification: "Justificación: De acuerdo GPC de sepsis materna, el qSOFA evalúa la tensión arterial sistólica inferior a 100, frecuencia respiratoria alta y el estado de alerta general adormecido. Al acumular dos alteraciones de estas tres áreas somáticas, la predicción del choque séptico inminente o deterioro basal metabólico orgánico materno es ineludible en el Triage.<br><br>Perla ENARM: Algoritmo de sepsis materna. Paciente con sospecha clínica: Calcular qSOFA. Si tiene un qSOFA mayor o igual a 2 puntos en embarazo, realizar inmediata evaluación obstétrica y reanimación general.<br><br>Análisis de Distractores: B) Mayor o igual a 1 punto es incorrecto; una paciente con taquipnea aislada secundaria al dolor de labor de parto no cataloga como choque o sepsis multiorgánica por esta pura alteración singular. C) Mayor o igual a 3 puntos es incorrecto; la paciente cursaría con hipotensión profunda y alteraciones de alerta y respiratorias simultáneas. Es el estatus terminal de un choque no identificado temprano. D) Mayor o igual a 4 puntos es incorrecto; el instrumento rápido \"qSOFA\" carece de un valor de sumatoria máxima a 4, pues evalúa únicamente 3 rubros absolutos fisiológicos básicos al ingreso de camilla de urgencias.",

        options: ["PRICE (Protección, Reposo, Hielo, Compresión, Elevación)", "MOVE (Movilidad, Ortesis, Volumen, Ejercicio)", "FAST (Focal, Articular, Soporte, Tensión)", "AINE (Antiinflamatorios no esteroideos sistémicos)"],

        question: "En la Unidad de Cuidados Neonatales, al preparar a un recién nacido estable y sano para la punción de talón o toma de tamiz. ¿Qué medida analgésica preventiva no farmacológica de primera elección estipula la guía instaurar dos minutos antes del estímulo nociceptivo dermo-doloroso?",
        options: ["Masaje profundo del gastrocnemio ipsilateral", "Solución glucosada y succión no nutritiva", "Administración sublingual rápida de paracetamol", "Inmovilización estricta de extremidades pélvicas"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de dolor en neonatos, el circuito gustativo del azúcar interactúa directamente con los receptores opiáceos endógenos de la médula neonatal deprimiendo fuertemente la transmisión del dolor por las fibras C periféricas durante las punciones venosas estériles menores repetitivas o extracciones metabólicas base.<br><br>Perla ENARM: Medidas no farmacológicas de prevención del dolor: Se recomienda de forma rutinaria y preferente administrar la combinación analgésica de Succión No Nutritiva y Solución de Sacarosa o Glucosa dos minutos pre-punción capilar.<br><br>Análisis de Distractores: A) Masaje profundo del gastrocnemio ipsilateral es incorrecto; manipular o sobar el miembro de la pierna carece de propiedades bioquímicas analgésicas y entorpece asilando la maniobra del talón en camilla térmica y dolor percutáneo pediátrico. C) Administración sublingual rápida de paracetamol es incorrecto; es analgésico de orden farmacológico sistémico (fármaco), cuyo efecto oral o gástrico no logra su pico en dos minutos procedimentales transitorios de urgencias punzocortantes. D) Inmovilización estricta de extremidades pélvicas es incorrecto; someter por contención estricta obligada sin calmar química o metabólicamente el estrés del infante solo evita el movimiento, causando llanto y bradicardia por dolor profundo reactivo de estrés del cortisol infantil.",

        options: ["Forzar aclaramiento sérico en riñón tóxico", "Tratar el estado de sobrecarga hídrica", "Aumentar la tasa de filtrado glomerular", "Prevenir la aparición de nefrotoxicidad"],
        answer: 1,
        justification: "Justificación: De acuerdo GPC de lesión renal aguda, los diuréticos forzados no mejoran la supervivencia del túbulo ni evitan que un riñón fracase ni lo curan. Su única función avalada y lícita universalmente en nefrología crítica es extraer el volumen sobrante (edema agudo de pulmón) en un enfermo oligúrico intoxicado de líquidos pasivos antes de recurrir a la diálisis extracorpórea.<br><br>Perla ENARM: Indicaciones de diuréticos de asa en Lesión Renal Aguda: Se recomienda no utilizar los diuréticos de asa para prevenir el daño orgánico pre-renal y limitar su uso exclusivo en la clínica al tratamiento puramente paliativo de alivio para pacientes con estado de sobrecarga de volumen vascular y respiratorio.<br><br>Análisis de Distractores: A) Forzar aclaramiento sérico en riñón tóxico es incorrecto; lavar toxinas asiladas por diuresis química pasiva medicamentosa no limpia uremia verdadera celular profunda general en tubos necróticos isquémicos no funcionales intrarrenales paralizados de choque tóxico de sepsis. C) Aumentar la tasa de filtrado glomerular es incorrecto; los diuréticos bloquean la bomba Na-K-2Cl en el túbulo intermedio asintomático, pero carecen de efecto intrínseco estimulador vasoactivo en la perfusión microcapilar aferente arteriolar base u oxígeno o flujo cortical. D) Prevenir la aparición de nefrotoxicidad es incorrecto; estipulado explícitamente en el manual como contraindicado para \"prevención de falla\", puesto que su uso empírico pre-choque agudiza paradójicamente la lesión de pre-isquemia nefronal base general a daño general crónico instaurado en horas.",
        source: "SS-231-18, Prevención, diagnóstico y tratamiento de Lesión Renal Aguda, 2018, Tratamiento Farmacológico Restrictivo, Página 24."
    }
        ];


        let userProgress = {};
        let currentQuestionId = null;
        let examState = { isFinished: false };

        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadState();
            
            let lastQId = null;
            try { lastQId = localStorage.getItem('simulador2LastQId'); } catch (e) {}
            displayQuestion(lastQId ? parseInt(lastQId) : null);
            setupEventListeners();
        });

        function setupEventListeners() {
            // Buscador del Sidebar
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            // Modales
            const modalReset = document.getElementById('reset-modal');
            document.getElementById('cancel-reset').addEventListener('click', () => {
                modalReset.querySelector('div').classList.add('scale-95');
                setTimeout(()=>modalReset.classList.add('hidden'), 300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('simulador2Progress');
                localStorage.removeItem('simulador2LastQId');
                localStorage.removeItem('simulador2ExamState');
                window.location.reload();
            });

            const modalFinish = document.getElementById('finish-modal');
            document.getElementById('cancel-finish').addEventListener('click', () => {
                modalFinish.querySelector('div').classList.add('scale-95');
                setTimeout(()=>modalFinish.classList.add('hidden'), 300);
            });
            document.getElementById('confirm-finish').addEventListener('click', () => {
                finishExam();
                modalFinish.querySelector('div').classList.add('scale-95');
                setTimeout(()=>modalFinish.classList.add('hidden'), 300);
            });

            // Menús
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegación
        function navigateQuestion(currentId, direction) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (direction === 'prev' && currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else if (direction === 'next' && currentIndex < questionsData.length - 1) {
                displayQuestion(questionsData[currentIndex + 1].id);
            } else {
                displayQuestion(null); // Tablero
            }
        }

        // Lógica de colores del Grid dependiente del estado del examen
        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            
            // FASE 1: SIMULADOR EN CURSO (Sin retroalimentación)
            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";
                } else {
                    // Marcamos que ya se contestó, pero sin decir si es correcto o no
                    return base + "bg-slate-600 text-white border-slate-700 dark:bg-slate-700 dark:border-slate-600 shadow-inner";
                }
            } 
            // FASE 2: EXAMEN FINALIZADO (Mostrar Calificación)
            else {
                if (!state || !state.answered) {
                    return base + "bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700";
                } else {
                    const isCorrect = state.selectedOption === questionsData.find(q=>q.id === qId).answer;
                    if (isCorrect) {
                        return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
                    } else {
                        return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
                    }
                }
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        // Finalizar y Calificar
        function finishExam() {
            examState.isFinished = true;
            localStorage.setItem('simulador2ExamState', JSON.stringify(examState));
            displayQuestion(null);
        }

        // --- PANTALLA PRINCIPAL (TABLERO) ---
        function displayWelcomeScreen() {
            document.getElementById('dashboard-button').classList.add('hidden');
            document.getElementById('menu-toggle').classList.add('hidden');
            
            const displayArea = document.getElementById('module-display');
            const total = questionsData.length;
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            
            let correct = 0;
            if (examState.isFinished) {
                correct = Object.keys(userProgress).filter(id => {
                    const qData = questionsData.find(q => q.id === parseInt(id));
                    return userProgress[id].answered && userProgress[id].selectedOption === qData.answer;
                }).length;
            }

            const successRate = total > 0 && ans > 0 ? Math.round((correct / ans) * 100) : 0;
            const allAnswered = ans === total;
            let firstUncompletedId = questionsData.find(q => !userProgress[q.id]?.answered)?.id || 1;

            // Textos y estados visuales dinámicos
            let titleText = examState.isFinished ? "¡Simulador Finalizado!" : "Simulador ENARM";
            let descText = examState.isFinished 
                ? "Has completado la evaluación. Revisa tu desempeño y analiza la justificación clínica de cada caso en el tablero general." 
                : "La calificación y la justificación clínica se mostrará hasta que decidas finalizar el examen.";
            
            let actionBtn = "";
            if (examState.isFinished) {
                actionBtn = `<button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white border border-white/30 px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Reiniciar Simulador</button>`;
            } else {
                actionBtn = `
                    <button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-900/30 transition-transform hover:-translate-y-0.5 mr-3">
                        ${ans === 0 ? 'Iniciar Simulador' : 'Continuar Examen'}
                    </button>
                    <button onclick="document.getElementById('finish-modal').classList.remove('hidden')" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-rose-900/30 transition-transform hover:-translate-y-0.5">
                        Finalizar y Calificar
                    </button>
                `;
            }

            let badgeText = examState.isFinished ? "RESULTADOS DISPONIBLES" : "Guías de Práctica Clínica";
            let badgeClass = examState.isFinished ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";

            // Renderizado Estadísticas (Oculto si no ha finalizado)
            let statsHTML = "";
            if (examState.isFinished) {
                statsHTML = `
                    <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                        <div>
                            <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                            <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                        </div>
                        <div>
                            <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                            <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                        </div>
                        <div class="px-2">
                            <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                            <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                            <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos / Respondidas</p>
                        </div>
                    </div>
                `;
            } else {
                statsHTML = `
                    <div class="w-full text-center py-4">
                        <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Avance General</p>
                        <p class="text-4xl sm:text-5xl font-black text-white">${ans}<span class="text-xl sm:text-2xl text-slate-500">/${total}</span></p>
                        <div class="w-full bg-slate-700/50 rounded-full h-2 mt-4 overflow-hidden">
                            <div class="bg-blue-400 h-2 rounded-full" style="width: ${(ans/total)*100}%"></div>
                        </div>
                    </div>
                `;
            }

            // Leyendas del tablero dinámicas
            let legendHTML = examState.isFinished ? `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
            ` : `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-50 border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700/50"></div> Pendiente</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-600 border border-slate-700"></div> Respondida</div>
            `;

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-6xl mx-auto lg:mt-0">
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <a href="login.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 font-semibold transition-colors text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                            Regresar al Menú Principal
                        </a>
                    </div>

                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500">
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left w-full lg:w-3/5">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass}">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 ${examState.isFinished ? 'text-emerald-400' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium mx-auto lg:mx-0">${descText}</p>
                                <div class="mt-8 flex justify-center lg:justify-start flex-wrap gap-4">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col items-center shadow-2xl w-full lg:w-2/5">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">

                            </h2>

                                ${legendHTML}
