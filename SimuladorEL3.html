<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

        <!-- CONTENIDO PRINCIPAL -->

            <button id="dashboard-button" onclick="displayQuestion(null)" class="hidden fixed top-4 left-4 lg:left-[22rem] bg-white dark:bg-slate-800 p-2.5 rounded-full shadow-md border border-slate-200 dark:border-slate-700 z-40 text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300" title="Ver Tablero General">

                </svg>

    <!-- MODALES -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará todo tu progreso y respuestas de los casos. ¿Deseas empezar desde cero?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán todas tus respuestas y se liberará la justificación médica.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const casesData = [
            {
                id: 1,
                caseText: "Hombre de 65 años con diabetes mellitus tipo 2 de 15 años de evolución, acude por úlcera plantar en el pie derecho de 3 semanas de progresión. Exploración física: presión arterial 135/85 mmHg, FC 88 lpm, FR 16 rpm, temperatura 37.8 °C. Se observa úlcera de 3 centímetros de diámetro en la cabeza del primer metatarsiano derecho, con bordes eritematosos y secreción purulenta. La base de la úlcera es profunda y al explorar con instrumento romo estéril se palpa tejido óseo. Hay ausencia bilateral de sensibilidad protectora y reflejo aquileo abolido. Los pulsos pedios están presentes pero disminuidos.",
                source: "Harrison's Principles of Internal Medicine, 22nd Edition, Capítulo 417.",
                questions: [
                    {
                        question: "¿Cuál es el instrumento clínico de tamizaje recomendado anualmente para detectar la pérdida de la sensibilidad protectora en este paciente?",
                        options: [
                            "Diapasón de 512 Hertz",
                            "Monofilamento de 10 gramos",
                            "Martillo de reflejos de Taylor",
                            "Aguja estéril de un solo uso"
                        ],
                        answer: 1,
                        justification: "La detección temprana de la pérdida de la sensibilidad protectora es vital para prevenir ulceraciones. El tamizaje anual universal mediante el monofilamento de 10 gramos evalúa el riesgo clínico derivado de la polineuropatía simétrica distal, siendo la prueba más validada para este fin.<br><br><b>Perla ENARM:</b> \"El tamizaje anual para la polineuropatía simétrica distal debe comenzar al momento del diagnóstico de la diabetes tipo 2... Esta prueba está dirigida a detectar la pérdida de sensación protectora causada por la neuropatía diabética utilizando un monofilamento de 10 g.\"<br><br><b>Análisis de Distractores:</b> El diapasón recomendado para sensibilidad vibratoria es el de 128 Hertz, no el de 512 Hertz (usado en audiometría). El martillo de reflejos evalúa arcos reflejos tendinosos (daño de fibra larga), no sensibilidad protectora directa. La aguja evalúa la sensibilidad al dolor (pinprick), pero carece de la estandarización del monofilamento de 10 gramos para dictar el riesgo biomecánico de ulceración."
                    },
                    {
                        question: "Con base en la exploración física de la úlcera descrita, ¿cuál es el estudio de imagen con mayor especificidad para confirmar la complicación infecciosa subyacente?",
                        options: [
                            "Resonancia magnética",
                            "Radiografía simple de pie",
                            "Tomografía computarizada",
                            "Gammagrafía ósea con tecnecio"
                        ],
                        answer: 0,
                        justification: "La palpación de hueso al explorar una úlcera profunda con un instrumento romo es altamente sugestiva de osteomielitis subyacente. Para su confirmación definitiva y planeación quirúrgica, la resonancia magnética representa el estudio de imagen con la mayor especificidad diagnóstica.<br><br><b>Perla ENARM:</b> \"Una herida que al ser explorada permite palpar el hueso tiene una alta probabilidad de tener osteomielitis subyacente... La imagen por resonancia magnética es la modalidad más específica.\"<br><br><b>Análisis de Distractores:</b> La radiografía simple se solicita habitualmente como abordaje inicial, pero su especificidad y sensibilidad son muy bajas en fases tempranas (el daño óseo tarda semanas en ser visible). La tomografía y la gammagrafía tienen menor especificidad que la resonancia magnética para diferenciar entre infección activa (osteomielitis) y neuroartropatía de Charcot."
                    },
                    {
                        question: "Además de la prescripción de antibióticos sistémicos y el desbridamiento quirúrgico, ¿cuál es la intervención inicial demostrada más eficaz para promover la cicatrización de esta lesión plantar?",
                        options: [
                            "Oxigenación hiperbárica sistémica",
                            "Administración de factores de crecimiento",
                            "Evitación completa del apoyo de peso",
                            "Aplicación de antibióticos tópicos"
                        ],
                        answer: 2,
                        justification: "La cicatrización de una úlcera neuropática plantar requiere retirar el trauma biomecánico constante que perpetúa la lesión. La descarga del peso es una intervención cardinal de primera línea con gran eficacia demostrada, sin la cual cualquier otra medida fracasará.<br><br><b>Perla ENARM:</b> \"Las intervenciones con eficacia demostrada en úlceras de pie diabético o heridas incluyen: (1) descarga (evitación completa del apoyo de peso sobre la úlcera, lo cual elimina el trauma mecánico que retrasa la cicatrización)...\"<br><br><b>Análisis de Distractores:</b> La oxigenación hiperbárica y la administración de factores de crecimiento son terapias avanzadas que se reservan estrictamente como tratamiento de segunda línea ante la falla del manejo convencional. La aplicación de antibióticos tópicos tiene un valor clínico muy limitado y no sustituye al control biomecánico del peso."
                    },
                    {
                        question: "Si la herida no muestra una mejoría clínica significativa a pesar del manejo óptimo establecido, ¿cuál es el tiempo de espera recomendado para considerar el inicio de terapias avanzadas de cicatrización?",
                        options: [
                            "1 semana",
                            "2 semanas",
                            "3 semanas",
                            "4 semanas"
                        ],
                        answer: 3,
                        justification: "El manejo de primera línea (descarga, desbridamiento, control de infección, revascularización y apósitos) requiere un margen de tiempo razonable para inducir tejido de granulación. Si tras 4 semanas de terapia óptima la úlcera no mejora, se justifica escalar a medidas de salvamento costosas y avanzadas.<br><br><b>Perla ENARM:</b> \"Si una herida no muestra una mejoría significativa después de 4 semanas de manejo de la herida con estas cinco recomendaciones, se debe considerar la terapia avanzada para heridas que puede incluir factores de crecimiento tópicos, terapia de oxígeno hiperbárico...\"<br><br><b>Análisis de Distractores:</b> Considerar 1, 2 o 3 semanas constituye un tiempo de espera insuficiente para evaluar de forma objetiva la falla al tratamiento fisiológico estándar. Escalar prematuramente a terapias avanzadas no tiene evidencia sólida que lo respalde en las guías actuales."
                    },
                    {
                        question: "¿Cuál de las siguientes comorbilidades incrementa de forma más contundente el riesgo absoluto de que este paciente requiera una amputación de la extremidad inferior?",
                        options: [
                            "Retinopatía diabética no proliferativa",
                            "Hipotiroidismo subclínico no tratado",
                            "Enfermedad renal crónica en diálisis",
                            "Neuropatía autonómica sudomotora"
                        ],
                        answer: 2,
                        justification: "La progresión a amputación en el contexto de úlceras del pie diabético está dictada por factores predisponentes catastróficos. La nefropatía diabética, particularmente cuando se encuentra en estadio terminal (diálisis), multiplica de forma crítica el riesgo de calcificación vascular severa, isquemia y pérdida de la extremidad.<br><br><b>Perla ENARM:</b> \"Los factores de riesgo para úlceras en los pies o amputación incluyen sexo masculino, diabetes por más de 10 años, neuropatía periférica... enfermedad arterial periférica, tabaquismo... pobre control glucémico y nefropatía diabética, especialmente diálisis.\"<br><br><b>Análisis de Distractores:</b> La retinopatía y el hipotiroidismo no figuran como marcadores de alto impacto hemodinámico o biomecánico de amputación local. La neuropatía autonómica sudomotora favorece la resequedad de la piel (fisuras), facilitando una úlcera inicial, pero la falla renal terminal con necesidad de hemodiálisis es un factor independiente muchísimo más letal para el pronóstico de la extremidad."
                    }
                ]
            },
            {
                id: 2,
                caseText: "Lactante masculino de 8 meses es traído a urgencias por cuadro de 12 horas de evolución. Inició con episodios súbitos de llanto intenso, palidez y flexión de las extremidades inferiores sobre el abdomen, intercalados con periodos de letargo. Refieren antecedente de infección respiratoria hace 1 semana. Hace 2 horas presentó una evacuación con moco y sangre. A la exploración física: TA 90/60 mmHg, FC 150 LPM, FR 35 RPM, Temperatura 37.8 °C. Abdomen distendido y doloroso a la palpación profunda en el cuadrante superior derecho, donde se palpa una masa firme con forma de salchicha. Resto sin alteraciones.",
                source: "Current Diagnosis & Treatment: Pediatrics, Capítulo 21: Gastrointestinal Tract, 27th Edition, Página 19.",
                questions: [
                    {
                        question: "En este grupo etario, ¿cuál es el factor desencadenante anatómico más frecuentemente asociado a la fisiopatología de esta enfermedad?",
                        options: [
                            "Pólipo juvenil",
                            "Linfoma intestinal",
                            "Hipertrofia de placas de Peyer",
                            "Divertículo de Meckel"
                        ],
                        answer: 2,
                        justification: "La invaginación intestinal (intususcepción) es la causa más común de obstrucción intestinal en los primeros 2 años de vida. El 85% de los casos en lactantes son idiopáticos, sin embargo, el factor primario implicado es la hipertrofia de las placas de Peyer secundaria a una enteritis viral (frecuentemente por adenovirus o rotavirus), la cual actúa como punto de guía para el telescopaje ileocólico.<br><br><b>Perla ENARM:</b> \"La invaginación intestinal idiopática en lactantes está fuertemente asociada a la hipertrofia linfoide (placas de Peyer) secundaria a infecciones virales recientes.\"<br><br><b>Análisis de Distractores:</b> El divertículo de Meckel (D) y los pólipos juveniles (A) son causas anatómicas (puntos de guía) demostrables en una minoría de los casos, usualmente en preescolares o escolares con cuadros atípicos o recurrentes. El linfoma intestinal (B) es la causa principal de invaginación, pero exclusivamente en niños mayores de 6 años, no en lactantes."
                    },
                    {
                        question: "Ante la sospecha clínica, ¿cuál es el estudio de imagen anatómico con mayor sensibilidad y especificidad para confirmar el diagnóstico?",
                        options: [
                            "Radiografía simple de abdomen en bipedestación",
                            "Tomografía computarizada de abdomen con contraste",
                            "Resonancia magnética abdominal",
                            "Ultrasonido abdominal"
                        ],
                        answer: 3,
                        justification: "El diagnóstico de la invaginación intestinal se confirma mediante ultrasonido abdominal, el cual es la modalidad diagnóstica más sensible (98 a 100%) y específica. Los hallazgos clásicos incluyen el signo de la \"diana\" o \"tiro al blanco\" en un corte transversal y el signo del \"pseudo-riñón\" en un corte longitudinal.<br><br><b>Perla ENARM:</b> \"El ultrasonido abdominal es el estudio de imagen de elección por contar con una sensibilidad y especificidad cercana al 100% para la detección de intususcepción.\"<br><br><b>Análisis de Distractores:</b> La radiografía simple de abdomen (A) tiene una sensibilidad muy pobre para el diagnóstico definitivo, aunque sirve inicialmente para descartar perforación. La tomografía computarizada (B) y la resonancia magnética (C) implican radiación, sedación o retraso en el manejo y no superan el rendimiento diagnóstico y la accesibilidad del ultrasonido en el abordaje agudo de esta patología."
                    },
                    {
                        question: "Confirmado el diagnóstico y con el paciente estable, ¿cuál es el tratamiento de primera elección para la resolución de este cuadro?",
                        options: [
                            "Reducción hidrostática con enema de aire",
                            "Resección intestinal con anastomosis primaria",
                            "Laparotomía exploradora de urgencia",
                            "Reducción manual guiada por laparoscopia"
                        ],
                        answer: 0,
                        justification: "El tratamiento estándar de oro para la intususcepción no complicada en pacientes hemodinámicamente estables es la reducción neumática (enema de aire) o hidrostática bajo guía fluoroscópica o ecográfica. El enema de aire tiene una tasa de éxito terapéutico que alcanza el 75%, evitando la necesidad de un procedimiento quirúrgico invasivo y sus complicaciones asociadas.<br><br><b>Perla ENARM:</b> \"El enema de aire es el abordaje terapéutico de elección en el paciente estable, resolviendo exitosamente hasta el 75% de los episodios de invaginación.\"<br><br><b>Análisis de Distractores:</b> La laparotomía exploradora (C) y la reducción laparoscópica (D) son intervenciones quirúrgicas que se reservan estrictamente para pacientes en los que falla la reducción por enema o que presentan inestabilidad clínica inicial. La resección con anastomosis (B) solo se justifica como medida transquirúrgica cuando se documenta isquemia, necrosis irreversible o la presencia anatómica de un punto de plomo tumoral o diverticular."
                    },
                    {
                        question: "¿Cuál de las siguientes condiciones clínicas representa una indicación quirúrgica primaria absoluta e impide la realización del tratamiento de primera elección?",
                        options: [
                            "Edad de presentación menor a 12 meses",
                            "Evacuaciones con aspecto de jalea de grosella",
                            "Evidencia de perforación intestinal o choque",
                            "Masa palpable en el cuadrante superior derecho"
                        ],
                        answer: 2,
                        justification: "La reducción mediante enema está absolutamente contraindicada si el paciente presenta signos francos de toxicidad sistémica, choque, peritonitis o evidencia radiográfica de perforación intestinal (neumoperitoneo). En estos escenarios, el tejido isquémico o perforado aumentaría catastróficamente el riesgo de contaminación de la cavidad abdominal al insuflar presión. La cirugía primaria es obligatoria.<br><br><b>Perla ENARM:</b> \"La presencia de peritonitis, choque o perforación intestinal es contraindicación absoluta para el enema reductivo y obliga al tratamiento quirúrgico emergente.\"<br><br><b>Análisis de Distractores:</b> La edad menor a 12 meses (A) es la epidemiología clásica de presentación y favorece el éxito del enema. Las evacuaciones en \"jalea de grosella\" (B) y la masa palpable en cuadrante superior derecho (D) son signos patognomónicos clásicos de la intususcepción que apoyan el diagnóstico clínico temprano y no contraindican el manejo inicial conservador con enema guiado."
                    },
                    {
                        question: "Si este mismo cuadro clínico se presentara como el primer episodio en un paciente de 7 años de edad, ¿cuál es la etiología anatómica (\"foco rojo\") que debe sospecharse obligatoriamente?",
                        options: [
                            "Linfoma intestinal",
                            "Pólipos hamartomatosos",
                            "Fibrosis quística severa",

                    {

                    {

{

                questions: [

                    {

                    {

                    {
                        question: "Además del alto riesgo de muerte súbita por arritmias ventriculares, ¿cuál es la complicación estructural miocárdica clásica de esta patología que incrementa fuertemente la indicación de anticoagulación profiláctica?",

                    {

                    {
                        question: "Dado el estado de choque hipovolémico, hemoperitoneo masivo y hallazgos de presunta ruptura, ¿cuál es la intervención quirúrgica de elección para el manejo resolutivo en este nivel de atención?",

                    {

                    },
                    {
                        question: "A diferencia de los embarazos tubáricos distales, ¿cuál es el factor anatomofisiológico determinante por el cual la ruptura de esta patología ocurrió de forma tardía (a las 12 semanas de amenorrea)?",

                questions: [
                    {

                    {

                    {
                        question: "Tras 5 años de evolución y después de una resección ileal por obstrucción, la paciente debuta con cólico renoureteral unilateral agudo. ¿Cuál es el mecanismo fisiopatológico directo que propició esta nueva complicación?",
                        options: [
                            "Absorción colónica excesiva de oxalato no unido a calcio",
                            "Secreción intestinal de bilis litogénica por agotamiento",
                            "Depósito de proteína amiloide por inflamación sistémica",
                            "Excreción tubular aumentada de ácido úrico y fosfato"
                        ],
                        answer: 0,
                        justification: "Tras una resección ileal, se genera mala absorción de sales biliares y ácidos grasos. Estos ácidos grasos libres en la luz colónica se unen ávidamente al calcio. Como resultado, el oxalato de la dieta (que normalmente se uniría al calcio para excretarse en las heces) queda libre, se absorbe masivamente por el colon y precipita en la orina formando cálculos de oxalato de calcio (hiperoxaluria entérica).<br><br><b>Perla ENARM:</b> \"La nefrolitiasis por oxalato de calcio es una complicación clásica posquirúrgica de la enfermedad de Crohn secundaria a hiperoxaluria entérica.\"<br><br><b>Análisis de Distractores:</b> La secreción de bilis litogénica por la depleción del fondo común de sales biliares en el íleon resecado genera colelitiasis (cálculos biliares), no nefrolitiasis. El depósito de proteína amiloide (amiloidosis secundaria) provoca proteinuria y falla renal crónica indolente, sin presentarse como cólico agudo. La excreción de ácido úrico da lugar a litos radiolúcidos típicos de la gota o pérdida crónica de volumen, pero el mecanismo principal aquí es el oxalato."

            {
                id: 42,
                caseText: "Hombre de 55 años, hospitalizado por leucemia mieloide aguda en fase de inducción a la remisión. Cursa con neutropenia profunda de 12 días de evolución. Inicia con fiebre persistente que no cede a antimicrobianos de amplio espectro, tos seca, dolor torácico pleurítico y disnea progresiva. TA 110/70 mmHg, FC 110, FR 24, Temp 38.5 °C, SatO2 92% al aire ambiente. La exploración física destaca palidez de tegumentos y estertores crepitantes focales en hemitórax derecho. Laboratorios revelan 400 leucocitos/μL, con 50 neutrófilos absolutos. La tomografía computarizada de tórax evidencia un nódulo pulmonar focal rodeado por un área de atenuación en vidrio esmerilado localizado en el lóbulo superior derecho.",
                source: "Harrison's Principles of Internal Medicine, Capítulo 223: Aspergillosis, 22nd Edition, Páginas 2, 4, 7 y 9.",
                questions: [
                    {
                        question: "En este paciente, ¿cuál es el factor de riesgo primario más importante para el desarrollo de la infección fúngica invasiva descrita?",
                        options: [
                            "Uso crónico de inhibidores de la bomba de protones",
                            "Neutropenia profunda y prolongada",
                            "Edad cronológica mayor a 50 años",
                            "Exposición reciente a palomas o murciélagos"
                        ],
                        answer: 1,
                        justification: "La aspergilosis invasiva aguda ocurre casi exclusivamente en pacientes con compromiso inmunológico severo, en donde la falla de la inmunidad innata celular permite la proliferación del hongo. En este caso clínico, la neutropenia profunda (menor a 100 células/μL) inducida por la quimioterapia para leucemia es el factor predisponente cardinal que permitió la invasión tisular y angioinvasión por Aspergillus.<br><br><b>Perla ENARM:</b> \"Los factores de riesgo primarios para la aspergilosis invasiva son la neutropenia profunda, el uso de glucocorticoides y la enfermedad respiratoria subyacente\".<br><br><b>Análisis de Distractores:</b> El uso de inhibidores de la bomba de protones (opción A) predispone a infecciones entéricas como Clostridioides difficile, pero no a patología fúngica invasiva pulmonar. La edad mayor a 50 años (opción C) no es un estado de inmunosupresión profunda per se que explique esta infección oportunista grave. La exposición a palomas o murciélagos (opción D) es el antecedente epidemiológico clásico para infecciones por Histoplasma o Cryptococcus, no para Aspergillus, el cual es ubicuo en el medio ambiente y materia en descomposición."
                    },
                    {
                        question: "¿Qué nombre recibe el hallazgo tomográfico clásico descrito en este paciente, el cual representa un infarto hemorrágico rodeando un nódulo?",
                        options: [
                            "Signo del halo",
                            "Signo de la media luna de aire",
                            "Signo del anillo de sello",
                            "Signo del camalote"
                        ],
                        answer: 0,
                        justification: "El \"signo del halo\" es una manifestación tomográfica temprana y altamente sugestiva de aspergilosis pulmonar invasiva en pacientes neutropénicos. Fisiopatológicamente, las hifas invaden los vasos sanguíneos pulmonares (angioinvasión), provocando trombosis e infarto del parénquima; el nódulo central representa el tejido infartado y el halo de vidrio esmerilado corresponde a la hemorragia alveolar circundante.<br><br><b>Perla ENARM:</b> \"La mayoría de los diagnósticos de aspergilosis invasiva se infieren de menos datos, incluyendo la presencia del signo del halo en una tomografía computarizada de tórax: una apariencia de vidrio esmerilado localizada que representa un infarto hemorrágico y rodea un nódulo o consolidación\".<br><br><b>Análisis de Distractores:</b> El signo de la media luna de aire (opción B) también se asocia a aspergilosis, pero es un hallazgo tardío que aparece durante la recuperación de los neutrófilos, cuando el tejido necrótico se retrae. El signo del anillo de sello (opción C) es patognomónico de las bronquiectasias. El signo del camalote (opción D) es un hallazgo clásico de la ruptura de un quiste hidatídico pulmonar (Echinococcus)."
                    },
                    {
                        question: "¿Cuál es el tratamiento farmacológico de primera elección indicado para la aspergilosis pulmonar invasiva aguda en este escenario?",
                        options: [
                            "Caspofungina intravenosa",
                            "Fluconazol intravenoso",
                            "Voriconazol intravenoso",
                            "Anfotericina B deoxicolato"
                        ],
                        answer: 2,
                        justification: "Los azoles con actividad contra mohos son el pilar del tratamiento. El voriconazol intravenoso es el estándar de oro y agente de primera línea, habiendo demostrado una tasa de respuesta superior en un 20% y menor toxicidad en comparación con la terapia histórica basada en anfotericina B deoxicolato. Su inicio debe ser inmediato ante la sospecha clínica y radiológica.<br><br><b>Perla ENARM:</b> \"El voriconazol, el isavuconazol y el posaconazol son los agentes preferidos para la aspergilosis invasiva\".<br><br><b>Análisis de Distractores:</b> La caspofungina (opción A) posee actividad contra Aspergillus, pero está relegada a ser un agente de segunda línea o de rescate. El fluconazol (opción B) carece por completo de actividad contra hongos filamentosos (mohos) como Aspergillus. La anfotericina B deoxicolato (opción D) es nefrotóxica y ha sido desplazada como terapia de primera línea por los triazoles de nueva generación; en caso de requerirse, se prefieren las formulaciones lipídicas de anfotericina B."
                    },
                    {
                        question: "En caso de que el paciente presente toxicidad hepática severa que obligue a suspender el fármaco de primera línea, ¿cuál de las siguientes opciones constituye un agente de segunda línea validado para su manejo?",
                        options: [
                            "Itraconazol oral",
                            "Flucitosina intravenosa",
                            "Terbinafina oral",
                            "Micafungina intravenosa"
                        ],
                        answer: 3,
                        justification: "Las equinocandinas, como la micafungina y la caspofungina, actúan inhibiendo la síntesis del 1,3-beta-D-glucano en la pared celular del hongo. Son agentes intravenosos efectivos y bien tolerados que se utilizan como alternativas de segunda línea en aspergilosis invasiva cuando existe intolerancia, toxicidad grave (como hepatotoxicidad severa por azoles) o falla clínica a los fármacos de primera elección.<br><br><b>Perla ENARM:</b> \"La caspofungina, la micafungina y la anfotericina B asociada a lípidos son agentes de segunda línea\".<br><br><b>Análisis de Distractores:</b> El itraconazol oral (opción A) no es apropiado como terapia de rescate intravenosa en el paciente crítico, usándose típicamente en formas crónicas o alérgicas. La flucitosina (opción B) es útil en criptococosis y candidiasis, pero carece de actividad contra Aspergillus. La terbinafina (opción C) es un agente antifúngico oral reservado casi exclusivamente para infecciones por dermatofitos en piel y uñas (onicomicosis)."
                    },
                    {
                        question: "Durante su evolución intrahospitalaria, el paciente presenta convulsiones, cambios de humor rápidos y focalización neurológica. ¿Qué complicación devastadora, producto de la patogenia angioinvasiva, se debe sospechar inmediatamente?",
                        options: [
                            "Meningitis aséptica progresiva",
                            "Infarto hemorrágico y absceso cerebral",
                            "Atrofia cortical difusa acelerada",
                            "Trombosis del seno venoso dural"
                        ],
                        answer: 1,
                        justification: "La diseminación hematógena hacia el sistema nervioso central ocurre en pacientes con inmunosupresión profunda y aspergilosis invasiva, cursando con alta mortalidad. La afinidad del hongo por la invasión de los vasos sanguíneos resulta invariablemente en trombosis e infartos hemorrágicos cerebrales, los cuales progresan rápidamente hacia la formación de abscesos cerebrales que justifican el cuadro convulsivo y la focalización neurológica.<br><br><b>Perla ENARM:</b> \"La diseminación hematógena al cerebro es una complicación devastadora de la aspergilosis invasiva. En la enfermedad aguda, el infarto hemorrágico es el más típico, y el absceso cerebral es común\".<br><br><b>Análisis de Distractores:</b> La meningitis aséptica progresiva (opción A) no corresponde al patrón destructivo e infartante del hongo filamentoso. La atrofia cortical (opción C) es un hallazgo crónico neurodegenerativo, no una complicación aguda focalizante. La trombosis de senos durales (opción D) es característica de infecciones contiguas de macizo facial o por otras micosis angioinvasivas rino-órbito-cerebrales (mucormicosis), pero en la aspergilosis hematógena el patrón clásico son los infartos intraparenquimatosos con abscedación."
                    }
                ]

            {
                id: 43,
                caseText: "Hombre de 65 años con diabetes mellitus tipo 2 de 20 años de evolución, acude por fatiga progresiva, disnea de medianos esfuerzos y prurito generalizado. TA 160/90 mmHg, FC 88 lpm, FR 18 rpm, T 36.8°C. Exploración: palidez de tegumentos, escarcha urémica ausente, edema de extremidades inferiores ++, fondo de ojo con retinopatía proliferativa. Laboratorios: hemoglobina 9.5 g/dl, volumen corpuscular medio 90 fl, creatinina 4.8 mg/dl, nitrógeno ureico 92 mg/dl, potasio 5.9 mEq/L, calcio 7.8 mg/dl, fósforo 6.5 mg/dl y albúmina 3.1 g/dl. Tasa de filtración glomerular estimada 12 ml/min/1.73m². Examen general de orina con relación albúmina/creatinina de 800 mg/g. Electrocardiograma con criterios de hipertrofia ventricular izquierda.",
                source: "Harrison's Principles of Internal Medicine, Capítulo 322, 22nd Edition, Páginas 1, 5, 10, 14 y 15.",
                questions: [
                    {
                        question: "Para predecir el riesgo de progresión a enfermedad renal en etapa terminal en este paciente, además de la tasa de filtración glomerular, la edad, el sexo y la región geográfica, ¿qué parámetro se incluye en la escala de cálculo KFR (Kidney Failure Risk)?",
                        options: [
                            "Urea sérica",
                            "Índice de masa corporal",
                            "Relación albúmina/creatinina",
                            "Hemoglobina glucosilada"
                        ],
                        answer: 2,
                        justification: "La ecuación Kidney Failure Risk (KFR) es la herramienta validada para predecir el riesgo de progresión a diálisis en pacientes con enfermedad renal crónica. Utiliza variables demográficas y de laboratorio clave: edad, sexo, región, tasa de filtración glomerular y la relación albúmina/creatinina (UACR).<br><br><b>Perla ENARM:</b> \"La medición de la relación albúmina/creatinina urinaria es fundamental para monitorizar el daño nefronal, estadificar el riesgo de progresión y guiar el inicio del tratamiento reno-protector.\"<br><br><b>Análisis de Distractores:</b> La urea sérica (A) es un marcador inespecífico de uremia, pero no forma parte de la escala de riesgo KFR. El índice de masa corporal (B) es un factor de riesgo poblacional para el desarrollo de enfermedad renal, mas no predice progresión a etapa terminal en esta escala puntual. La hemoglobina glucosilada (D) dicta el control glucémico, pero la UACR es el predictor directo de daño estructural y progresión en nefropatía diabética."
                    },
                    {
                        question: "Con base en los niveles de función renal y proteinuria de este paciente, ¿cuál es la estadificación diagnóstica correcta según la clasificación internacional?",
                        options: [
                            "Estadio 4 con albuminuria A2",
                            "Estadio 5 con albuminuria A3",
                            "Estadio 4 con albuminuria A3",
                            "Estadio 5 con albuminuria A2"
                        ],
                        answer: 1,
                        justification: "La clasificación se divide en categorías de Filtración Glomerular (G) y Albuminuria (A). Una tasa de filtración glomerular estimada menor a 15 ml/min/1.73m² clasifica al paciente en estadio G5 (falla renal terminal). Una relación albúmina/creatinina urinaria mayor a 300 mg/g lo clasifica en categoría A3 (albuminuria severamente incrementada).<br><br><b>Perla ENARM:</b> \"La combinación de estadio G5 y albuminuria A3 confiere el riesgo máximo de mortalidad cardiovascular, mortalidad por todas las causas y necesidad inminente de reemplazo renal.\"<br><br><b>Análisis de Distractores:</b> El estadio 4 (A, C) corresponde a una tasa de filtración glomerular entre 15 y 29 ml/min/1.73m². La categoría A2 (A, D) corresponde a una microalbuminuria moderadamente incrementada (30 a 299 mg/g). El paciente presenta filtración de 12 y albuminuria de 800 mg/g, lo que descarta inequívocamente el resto de combinaciones."
                    },
                    {
                        question: "El paciente presenta fósforo de 6.5 mg/dl y calcio de 7.8 mg/dl. ¿Cuál es la medida farmacológica de primera elección para el manejo inicial de sus alteraciones minerales?",
                        options: [
                            "Quelantes de fósforo con los alimentos",
                            "Calcitriol intravenoso en días alternos",
                            "Cinacalcet en dosis escalonada",
                            "Bicarbonato de sodio intravenoso"
                        ],
                        answer: 0,
                        justification: "La hiperfosfatemia es un estimulador clave para el desarrollo de hiperparatiroidismo secundario y enfermedad ósea de alto recambio. El manejo inicial exige el uso de quelantes de fósforo (acetato de calcio, carbonato de calcio, sevelamer) ingeridos estrictamente con las comidas para unirse al fósforo dietético en el tracto gastrointestinal y limitar su absorción sistémica.<br><br><b>Perla ENARM:</b> \"La retención de fósforo estimula la síntesis de FGF-23 y hormona paratiroidea, por lo que su control dietético y quelación farmacológica son la piedra angular del tratamiento del metabolismo mineral en nefropatía crónica.\"<br><br><b>Análisis de Distractores:</b> El calcitriol (B) agravaría la hiperfosfatemia al aumentar la absorción intestinal de fósforo y está contraindicado como terapia inicial sin control previo del mismo. El cinacalcet (C) es un calcimimético útil para hiperparatiroidismo severo, pero puede exacerbar la hipocalcemia aguda subyacente. El bicarbonato de sodio (D) corrige la acidosis metabólica, no el producto calcio-fósforo."
                    },
                    {
                        question: "Se decide iniciar terapia con agentes estimulantes de la eritropoyesis tras descartar deficiencia de hierro. Según las guías clínicas, ¿cuál es la cifra meta de hemoglobina en este escenario?",
                        options: [
                            "12.0 a 13.5 g/dl",
                            "Mayor a 13.0 g/dl",
                            "9.0 a 10.0 g/dl",
                            "10.0 a 11.5 g/dl"
                        ],
                        answer: 3,
                        justification: "El uso de agentes estimulantes de eritropoyesis mejoró drásticamente el manejo de la anemia urémica; sin embargo, ensayos clínicos aleatorizados demostraron que la normalización de la hemoglobina a niveles fisiológicos no mejora los desenlaces y aumenta el riesgo de eventos tromboembólicos y eventos vasculares cerebrales.<br><br><b>Perla ENARM:</b> \"La práctica clínica actual dicta como objetivo terapéutico mantener una concentración de hemoglobina entre 100 y 115 g/L (10.0 a 11.5 g/dl) en pacientes con enfermedad renal crónica para evitar complicaciones cardiovasculares.\"<br><br><b>Análisis de Distractores:</b> Intentar llevar la hemoglobina a rangos de normalidad poblacional (A, B) incrementa directamente el riesgo de isquemia miocárdica y mortalidad por trombosis de accesos vasculares. Una hemoglobina menor a 10 g/dl (C) perpetúa la isquemia tisular, el gasto cardíaco elevado y la fatiga sintomática, fallando en el objetivo primario de la terapia eritropoyética."
                    },
                    {
                        question: "En su seguimiento, el paciente cursa con dolor torácico intenso que empeora a la inspiración y en decúbito. A la auscultación presenta frote sistólico-diastólico. ¿Cuál es la intervención terapéutica inmediata para esta complicación?",
                        options: [
                            "Iniciar terapia con colchicina e ibuprofeno",
                            "Realizar ventana pericárdica quirúrgica",
                            "Iniciar terapia de reemplazo renal urgente",
                            "Administrar esteroides sistémicos a dosis altas"
                        ],
                        answer: 2,
                        justification: "La pericarditis urémica es una manifestación del síndrome urémico avanzado. Se presenta clínicamente con frote pericárdico y dolor pleurítico, pudiendo complicarse con taponamiento cardíaco si hay derrame hemorrágico. Su aparición es un criterio absoluto de falla multiorgánica tóxica.<br><br><b>Perla ENARM:</b> \"La pericarditis urémica es una indicación absoluta e innegable para el inicio urgente de diálisis o la intensificación de la dosis en pacientes que ya la reciben (hemodiálisis sin heparina).\"<br><br><b>Análisis de Distractores:</b> Los antiinflamatorios no esteroideos (A) empeorarían la función renal residual y elevarían el riesgo de sangrado sin tratar la toxina uremica causante. La ventana pericárdica (B) se reserva exclusivamente para derrames pericárdicos recurrentes o taponamiento cardíaco inminente refractario. Los esteroides sistémicos (D) se utilizan en pericarditis autoinmunes o idiopáticas, no en etiología urémica donde el tratamiento es la depuración extracorpórea."
                    }
                ]
            },


            {

                    {

                            "10 a 15%",

                    {
                        question: "¿Cuál es el estudio de laboratorio de primera elección por su mayor sensibilidad para confirmar la etiología de las lesiones activas en esta paciente?",

                        justification: "Las pruebas virológicas directas son esenciales para las lesiones mucocutáneas. La amplificación de ácidos nucleicos ha superado al cultivo celular tradicional debido a su rapidez y capacidad superior de detección, incluso cuando las vesículas comienzan a ulcerarse o encostrarse.<br><br><b>Perla ENARM:</b> \"Para las lesiones mucocutáneas, los ensayos de reacción en cadena de la polimerasa son más sensibles, los resultados generalmente están disponibles en 1 a 2 días y el manejo de las muestras es más fácil.\"<br><br><b>Análisis de Distractores:</b> El cultivo celular (opción A) tiene una sensibilidad relativamente baja y los resultados tardan hasta 14 días. La serología para IgM (opción C) no es útil por reactividad cruzada y elevación en recurrencias. La serología IgG (opción D) confirmaría exposición pasada, pero no diagnostica directamente la actividad viral de la lesión actual."
                    },
                    {
                        question: "Ante los hallazgos en la exploración física y el trabajo de parto activo, ¿cuál es la conducta obstétrica de elección para prevenir la transmisión vertical?",
                        options: [
                            "Amniotomía temprana y parto eutócico",
                            "Parto vaginal instrumentado con fórceps",
                            "Operación cesárea de urgencia",
                            "Administración de valaciclovir y parto eutócico"
                        ],
                        answer: 2,
                        justification: "El contacto directo del feto con la mucosa vaginal y vulvar infectada por lesiones vesiculares activas representa el principal mecanismo de transmisión periparto. La vía abdominal evita el canal de parto contaminado y reduce drásticamente el riesgo de infección neonatal, independientemente del tiempo de ruptura de membranas.<br><br><b>Perla ENARM:</b> \"El parto por cesárea está indicado para mujeres con lesiones genitales sospechosas o síntomas prodrómicos.\"<br><br><b>Análisis de Distractores:</b> Permitir el parto eutócico (opciones A y D) o instrumentado (opción B) somete al feto a una exposición directa e innecesaria a las vesículas con alta carga viral. La amniotomía temprana y los procedimientos invasivos como el uso de fórceps aumentan el riesgo de microabrasiones fetales, facilitando la inoculación del virus."

                    {

                    },
                    {
                        question: "Si el neonato adquiriera la infección al paso por el canal de parto y desarrollara enfermedad diseminada con afección multiorgánica, ¿cuál es la tasa de mortalidad aproximada incluso con tratamiento antiviral?",
                        options: [

            {

                caseText: "Mujer de 24 años acude a urgencias por dolor pélvico agudo en fosa ilíaca derecha de inicio súbito e intensidad severa, intermitente, acompañado de náuseas y vómitos de 4 horas de evolución. Signos vitales: TA 130/80 mmHg, FC 110 lpm, FR 20 rpm, Temperatura 37.8 °C. Exploración física: Abdomen doloroso a la palpación profunda en el cuadrante inferior derecho, sin franca resistencia muscular ni signos de irritación peritoneal. El tacto bimanual revela una masa anexial derecha de consistencia quística, de aproximadamente 8 cm de diámetro, exquisitamente dolorosa a la movilización bimanual. Laboratorios: Leucocitos 11,500/mm³. Prueba inmunológica de embarazo en orina negativa.",
                source: "Williams Gynecology, Capítulo 10: Benign Adnexal Mass, 4th Edition.",
                questions: [
                    {
                        question: "¿Cuál de los siguientes factores anatómicos o patológicos representa el mayor riesgo para desarrollar el compromiso vascular que presenta la paciente?",
                        options: [
                            "Masa ovárica unilateral de 6 a 10 cm",
                            "Adherencias pélvicas por enfermedad inflamatoria severa",
                            "Uso continuo prolongado de anticonceptivos orales",
                            "Presencia del tumor primario en el anexo izquierdo"
                        ],
                        answer: 0,
                        justification: "La torsión anexial requiere cierta movilidad de las estructuras pélvicas para que el ovario y la trompa giren sobre su propio ligamento infundibulopélvico. Las masas anexiales de tamaño intermedio (6 a 10 cm) escapan de los confines pélvicos óseos y se elevan hacia la falsa pelvis, aumentando drásticamente su riesgo de rotación, a diferencia de tumores muy grandes que quedan fijos. Asimismo, el lado derecho se afecta con mayor frecuencia (hasta un 60-70 %) debido a que el colon sigmoides limita la movilidad del anexo izquierdo.<br><br><b>Perla ENARM:</b> \"La torsión ovárica ocurre con mayor frecuencia en presencia de masas unilaterales que miden entre 6 y 10 cm de diámetro, y compromete predominantemente al anexo derecho debido a la contención anatómica que ejerce el colon sigmoides sobre el lado contralateral.\"<br><br><b>Análisis de Distractores:</b> Las adherencias pélvicas severas (Opción B) fijan los tejidos y actúan como factor protector mecánico contra la rotación libre. El uso de anticonceptivos orales (Opción C) previene la formación de quistes funcionales (cuerpo lúteo, foliculares) y por ende, reduce la incidencia de torsión anexial. La localización en el anexo izquierdo (Opción D) es el sitio menos frecuente para una torsión por la limitación de espacio ya descrita."
                    },
                    {
                        question: "Ante la alta sospecha diagnóstica, ¿cuál es el hallazgo ecográfico patognomónico que apoya la confirmación etiológica en este escenario de urgencia?",
                        options: [
                            "Líquido libre ecogénico abundante en fondo de saco",
                            "Quiste unilocular con pared fina menor a 3 mm",
                            "Múltiples folículos periféricos y signo de remolino",
                            "Nódulo mural hiperecogénico con sombra acústica"
                        ],
                        answer: 2,
                        justification: "El diagnóstico por imagen de la torsión anexial se fundamenta en los signos de congestión venosa y edema estromal (inflow arterial inicial conservado con bloqueo del drenaje venoso). Esto empuja a los folículos ováricos hacia la periferia, produciendo el signo del \"collar de perlas\" o múltiples folículos periféricos. La evaluación con Doppler color o escala de grises muestra el pedículo torcido como un área de anillos concéntricos hipo o hiperecogénicos (\"signo del remolino\" o \"whirlpool sign\"), confirmando el compromiso vascular.<br><br><b>Perla ENARM:</b> \"El signo ecográfico del remolino (\"whirlpool\") sumado a folículos ováricos desplazados hacia la periferia por el marcado edema estromal, son hallazgos altamente sugestivos y clásicos de la torsión anexial.\"<br><br><b>Análisis de Distractores:</b> El líquido libre ecogénico (Opción A) sugiere hemoperitoneo (típico de embarazo ectópico roto o quiste hemorrágico complicado), no exclusividad de isquemia. Un quiste simple unilocular (Opción B) carece de características agudas de complicación morfológica. Un nódulo mural hiperecogénico (Rokitansky) con sombra acústica (Opción D) diagnostica la presencia de un teratoma (que es factor de riesgo), pero por sí solo no diagnostica que este se haya torcido o accidentado."
                    },
                    {
                        question: "Tras confirmar el diagnóstico integral, ¿cuál es el abordaje terapéutico de primera línea para restablecer el flujo sanguíneo de la paciente?",
                        options: [
                            "Salpingooforectomía derecha programada mediante laparotomía",
                            "Laparoscopia urgente con destorsión del pedículo vascular",
                            "Drenaje percutáneo del quiste ovárico guiado por ecografía",
                            "Histerectomía total con anexectomía unilateral derecha"
                        ],
                        answer: 1,
                        justification: "El abordaje actual estándar de oro y de primera línea ante una sospecha de torsión anexial, particularmente en mujeres jóvenes y en edad reproductiva, es la intervención quirúrgica de urgencia mediante abordaje mínimamente invasivo (Laparoscopia). El pilar del tratamiento no es extirpar el órgano, sino la destorsión (desenrollar) inmediata del pedículo para intentar restaurar la perfusión de las estructuras isquémicas y proceder posteriormente a la exéresis del quiste o tumor causal.<br><br><b>Perla ENARM:</b> \"La laparoscopia de urgencia para la destorsión anexial, con preservación del ovario independiente de su aspecto isquémico inicial, es el tratamiento de elección para maximizar la conservación de la función reproductiva.\"<br><br><b>Análisis de Distractores:</b> La resección inmediata (Opción A) se consideraba la técnica clásica por temor a la tromboembolia, dogma actualmente descartado y que mutila injustificadamente a mujeres jóvenes. El drenaje percutáneo (Opción C) no revierte la causa mecánica del estrangulamiento vascular y está proscrito en isquemia pura. La histerectomía (Opción D) es una medida radical, innecesaria y fútil frente a un compromiso vascular aislado de un solo anexo."
                    },
                    {
                        question: "Durante el procedimiento, tras liberar mecánicamente la obstrucción, se observa que la gónada mantiene una coloración negro-azulada persistente. ¿Cuál es la conducta quirúrgica recomendada?",
                        options: [
                            "Resecar la gónada inmediatamente por isquemia irreversible",
                            "Efectuar biopsia en cuña para descartar un proceso maligno",
                            "Administrar profilaxis antibiótica intraoperatoria y amputar",
                            "Conservar la estructura anatómica y mantener actitud expectante"
                        ],
                        answer: 3,
                        justification: "Existe evidencia contundente de que el aspecto macroscópico de un ovario torcido (incluso su color negro azulado, cianótico y edematoso) no guarda una correlación directa e infalible con el daño celular irreversible. Múltiples series demuestran que, tras la destorsión, los ovarios oscuros logran recuperar su funcionalidad endocrina y folicular a largo plazo en casi el 95% de los casos. La amputación inmediata basándose únicamente en la apariencia intraoperatoria se asocia con tasas inaceptables de pérdida de fertilidad innecesaria.<br><br><b>Perla ENARM:</b> \"Una coloración negro-azulada persistente posdestorsión no es patognomónica de necrosis irreversible; la conducta indicada exige el manejo conservador, preservando el anexo en mujeres en edad reproductiva.\"<br><br><b>Análisis de Distractores:</b> Amputar o resecar el anexo (Opciones A y C) viola el principio de conservación de fertilidad actual. Realizar biopsias en cuña (Opción B) en un ovario intensamente isquémico, edematoso y friable incrementa masivamente el riesgo de daño tisular, hemorragia incoercible postoperatoria y futura adherencia, sin proporcionar información útil en el momento agudo."
                    },
                    {
                        question: "Si se comprueba que el tumor subyacente es un teratoma quístico maduro y este se rompe de forma incidental durante la manipulación, ¿qué complicación inminente requiere intervención activa?",
                        options: [
                            "Trombosis venosa pélvica masiva por compresión",
                            "Encefalitis fulminante mediada por anticuerpos receptores",
                            "Peritonitis química que exige lavado peritoneal copioso",
                            "Choque anafiláctico refractario a fluidoterapia intravenosa"
                        ],
                        answer: 2,
                        justification: "Los teratomas quísticos maduros (quistes dermoides) contienen material espeso, sebo, queratina, pelo y detritos celulares. Si durante la cistectomía o manipulación el quiste se derrama hacia la cavidad abdominal, sus componentes actúan como agentes biológicos altamente irritantes. Esto precipita una inflamación pélvica estéril muy sintomática y grave conocida como peritonitis química o granulomatosa. La indicación transoperatoria para mitigar este riesgo consiste en realizar un lavado peritoneal exhaustivo y copioso con abundante solución fisiológica tibia.<br><br><b>Perla ENARM:</b> \"El derrame intraoperatorio del contenido de un teratoma quístico maduro causa peritonitis granulomatosa aguda, siendo imperativo efectuar un lavado peritoneal copioso para prevenir cuadros adherenciales severos.\"<br><br><b>Análisis de Distractores:</b> La encefalitis anti-NMDA (Opción B) es un raro síndrome paraneoplásico neurológico provocado sistémicamente por la mera presencia del teratoma, no es una urgencia detonada por su rotura. La trombosis venosa (Opción A) es una complicación mecánica vinculada al efecto de masa o al antecedente de isquemia, no mediada por derrames quísticos. El contenido del teratoma causa franca inflamación granulomatosa, no una reacción de hipersensibilidad tipo I o choque anafiláctico (Opción D)."
                    }
                ]
            },

            {
                id: 49,
                caseText: "Mujer de 65 años hospitalizada por neumonía, en tratamiento actual con levofloxacino. Antecedente de hipertensión arterial. Enfermería avisa por pérdida súbita del estado de alerta. Exploración física previa: TA 110/70 mmHg, FC 50 lpm, FR 16 rpm. El electrocardiograma de ingreso mostraba ritmo sinusal y un intervalo QT corregido de 550 milisegundos. Al monitorizarla, se evidencia una taquicardia con complejos QRS anchos que cambian continuamente de morfología y eje, rotando sobre la línea isoeléctrica. La arritmia fue precedida por un latido ventricular prematuro, seguido de una pausa compensatoria y un latido sinusal posterior donde la onda T es interrumpida por el primer complejo de la arritmia.",
                source: "Harrison's Principles of Internal Medicine, Capítulo 262: Polymorphic Ventricular Tachycardia and Ventricular Fibrillation, 22nd Edition, Páginas 1 y 2.",
                questions: [
                    {
                        question: "Además de la bradicardia y el uso de antibióticos fluoroquinolonas, ¿cuál alteración electrolítica representa un factor de riesgo documentado para la prolongación del intervalo QT y el desarrollo de esta arritmia?",
                        options: [
                            "Hipercalcemia",
                            "Hipokalemia",
                            "Hipernatremia",
                            "Hipermagnesemia"
                        ],
                        answer: 1,
                        justification: "El síndrome de QT largo adquirido se debe frecuentemente a la combinación de fármacos que bloquean las corrientes repolarizantes de potasio (como los macrólidos y fluoroquinolonas) y factores predisponentes como la bradicardia o alteraciones electrolíticas específicas. Las deficiencias de potasio, magnesio y calcio prolongan el potencial de acción y predisponen a posdespolarizaciones tempranas.<br><br><b>Perla ENARM:</b> \"Las causas de la prolongación del intervalo QT incluyen anomalías electrolíticas (hipokalemia, hipomagnesemia, hipocalcemia), bradicardia y una serie de medicamentos que bloquean las corrientes repolarizantes de potasio.\"<br><br><b>Análisis de Distractores:</b> La hipercalcemia (A) produce acortamiento del intervalo QT, no prolongación. La hipernatremia (C) tiene manifestaciones predominantemente neurológicas y no afecta directamente la fase de repolarización ventricular de manera arritmogénica. La hipermagnesemia (D) puede causar bloqueos auriculoventriculares y depresión respiratoria, pero es la hipomagnesemia la que desencadena la arritmia descrita."
                    },
                    {
                        question: "Con base en el patrón de inicio (latido prematuro, pausa, latido sinusal con onda T interrumpida) y la morfología rotatoria del QRS, ¿cuál es el diagnóstico electrocardiográfico de esta entidad?",
                        options: [
                            "Síndrome de Brugada",
                            "Fibrilación ventricular",
                            "Taquicardia ventricular polimórfica tipo torsades des pointes",
                            "Taquicardia ventricular monomórfica sostenida"
                        ],
                        answer: 2,
                        justification: "La torsades des pointes es una taquicardia ventricular polimórfica asociada a la prolongación del intervalo QT. Se caracteriza clásicamente por una morfología de QRS que \"gira\" alrededor de la línea isoeléctrica y un inicio dependiente de pausa, desencadenado por una secuencia de intervalo largo-corto (fenómeno R sobre T).<br><br><b>Perla ENARM:</b> \"La taquicardia ventricular a menudo tiene una secuencia de inicio característica de un latido ventricular prematuro que induce una pausa, seguido de un latido sinusal que tiene un intervalo QT más largo y la interrupción de la onda T por la contracción ventricular prematura que es el primer latido de la taquicardia ventricular polimórfica.\"<br><br><b>Análisis de Distractores:</b> El síndrome de Brugada (A) causa taquicardia polimórfica, pero se asocia a elevación del segmento ST cóncava en V1-V3, no a QT largo ni morfología rotatoria dependiente de pausa. La fibrilación ventricular (B) carece de complejos QRS identificables y muestra actividad eléctrica caótica total. La taquicardia monomórfica (D) presenta complejos QRS idénticos entre sí, indicando un circuito reentrante fijo por cicatriz, diferente a la morfología cambiante de este caso."
                    },
                    {
                        question: "Si la paciente recupera el pulso espontáneamente, además de suspender el levofloxacino, ¿cuál es el tratamiento farmacológico intravenoso de primera línea indicado para suprimir las recurrencias agudas?",
                        options: [
                            "Sulfato de magnesio 1 a 2 gramos",
                            "Amiodarona 300 miligramos",
                            "Lidocaína 100 miligramos",
                            "Sulfato de atropina 1 miligramo"
                        ],
                        answer: 0,
                        justification: "El magnesio es el tratamiento de elección para estabilizar la membrana miocárdica y suprimir las posdespolarizaciones tempranas en la torsades des pointes inducida por QT largo adquirido, independientemente de los niveles séricos de magnesio del paciente.<br><br><b>Perla ENARM:</b> \"La administración intravenosa de 1 a 2 gramos de sulfato de magnesio generalmente suprime los episodios recurrentes.\"<br><br><b>Análisis de Distractores:</b> La amiodarona (B) es un antiarrítmico de clase III que bloquea los canales de potasio, prolongando aún más el intervalo QT; administrarla en esta paciente exacerbaría la arritmia y está contraindicada. La lidocaína (C) es útil en taquicardias isquémicas, pero ineficaz en torsades des pointes. La atropina (D) puede acelerar la FC, pero no es el estabilizador de membrana de primera línea para suprimir la arritmia de inmediato."
                    },
                    {
                        question: "Si el tratamiento inicial falla y la paciente continúa presentando episodios repetitivos de la arritmia, ¿cuál es la intervención médica de segunda línea para acortar el intervalo QT y prevenir los eventos?",
                        options: [
                            "Ablación con catéter epicárdico",
                            "Administración de sotalol intravenoso",
                            "Cardioversión con propafenona",
                            "Infusión de isoproterenol para 100 a 120 lpm"
                        ],
                        answer: 3,
                        justification: "El intervalo QT se acorta fisiológicamente al aumentar la FC. Si el magnesio fracasa, se debe utilizar isoproterenol (un agonista beta no selectivo) o estimulación con marcapasos transitorio para aumentar la frecuencia y suprimir los latidos ectópicos que inician la arritmia dependiente de pausa.<br><br><b>Perla ENARM:</b> \"Si el magnesio por sí solo es ineficaz, el aumento de la FC con infusión de isoproterenol o estimulación, a una frecuencia de 100 a 120 despolarizaciones por minuto según sea necesario para suprimir las contracciones ventriculares prematuras, generalmente suprime las recurrencias de la taquicardia ventricular.\"<br><br><b>Análisis de Distractores:</b> La ablación con catéter (A) está indicada en síndromes arrítmicos focales o cicatriciales crónicos, no en un evento agudo secundario a toxicidad farmacológica. El sotalol (B) es un antiarrítmico clase III que agravaría fatalmente la prolongación del QT. La propafenona (C) es un agente clase 1C con propiedades proarrítmicas que no tiene lugar en el manejo de QT largo adquirido."
                    },
                    {
                        question: "Si esta arritmia no se autolimita rápidamente en la cama del hospital, ¿hacia qué ritmo letal degenerará de forma casi invariable obligando a la desfibrilación inmediata?",
                        options: [
                            "Degeneración a fibrilación ventricular",
                            "Asistolia refractaria",
                            "Actividad eléctrica sin pulso",
                            "Bloqueo auriculoventricular de tercer grado"
                        ],
                        answer: 0,
                        justification: "La taquicardia ventricular polimórfica representa una activación ventricular continuamente cambiante y altamente inestable. A diferencia de las formas monomórficas que pueden tolerarse hemodinámicamente por horas, las formas polimórficas evolucionan rápidamente hacia el colapso circulatorio y ritmos de paro letales por desorganización total de los frentes de onda.<br><br><b>Perla ENARM:</b> \"La taquicardia ventricular polimórfica sostenida generalmente degenera en fibrilación ventricular.\"<br><br><b>Análisis de Distractores:</b> La asistolia (B) y la actividad eléctrica sin pulso (C) son ritmos de paro no desfibrilables que ocurren habitualmente como etapa final de hipoxia, isquemia prolongada o causas metabólicas graves, no como transición electromecánica primaria de una taquicardia polimórfica. El bloqueo auriculoventricular (D) es un problema de conducción y una bradiarritmia, la cual fue el desencadenante inicial, pero no la consecuencia hemodinámica final de la taquicardia."
                    }
                ]
            },
            {
                id: 50,
                caseText: "Mujer de 26 años, gesta 1, con embarazo gemelar de 20 semanas de gestación. Acude a valoración. TA 110/70 mmHg, FC 80 lpm, FR 16 rpm, temperatura 36.5 °C. Exploración física: fondo uterino mayor al esperado para la edad. Ultrasonido obstétrico reporta embarazo gemelar monocorial biamniótico. El feto 1 presenta una bolsa vertical máxima de líquido amniótico de 1.5 cm y vejiga visible ecográficamente. El feto 2 presenta una bolsa vertical máxima de 9.5 cm, vejiga distendida y fetocardia normal. Estudio Doppler de arteria umbilical, ductus venoso y vena umbilical sin alteraciones en ambos fetos. No se observa hidrops fetal.",
                source: "Williams Obstetrics, Capítulo 48: Multifetal Pregnancy, 26th Edition.",
                questions: [
                    {
                        question: "¿Cuál es el hallazgo ecográfico de primera elección en el primer trimestre para determinar la corionicidad de esta paciente?",
                        options: [
                            "Signo de la lambda",
                            "Signo de la T",
                            "Grosor de la membrana mayor a 2 milímetros",
                            "Presencia de dos sacos vitelinos"
                        ],
                        answer: 1,
                        justification: "La evaluación de la membrana divisoria en el primer trimestre establece la corionicidad en más del 99% de los embarazos. El signo de la T representa la relación entre las membranas y la placenta sin extensión aparente del tejido placentario entre ellas, confirmando invariablemente un embarazo monocorial.<br><br><b>Perla ENARM:</b> \"La evaluación de la membrana divisoria y la presencia del signo de la T en el primer trimestre establecen de forma definitiva el diagnóstico de embarazo monocorial biamniótico.\"<br><br><b>Análisis de Distractores:</b> El signo de la lambda (A) y un grosor de membrana mayor a 2 milímetros (C) son hallazgos indicativos de un embarazo dicorial (por el tejido placentario insinuado entre las membranas). La presencia de dos sacos vitelinos (D) puede observarse tanto en embarazos dicoriales como monocoriales biamnióticos, por lo que no discrimina la corionicidad con la misma precisión que la inserción de la membrana divisoria."
                    },
                    {
                        question: "De acuerdo con los hallazgos ecográficos, ¿en qué estadio de la clasificación de Quintero se encuentra esta patología?",
                        options: [
                            "Estadio 1",
                            "Estadio 2",
                            "Estadio 3",
                            "Estadio 4"
                        ],
                        answer: 0,
                        justification: "El cuadro clínico corresponde al síndrome de transfusión feto-feto. El estadio 1 se define estrictamente por la presencia de volúmenes de líquido amniótico discordantes (bolsa vertical máxima menor a 2 cm en el donante y mayor a 8 cm en el receptor), pero manteniendo la orina visible ecográficamente dentro de la vejiga del gemelo donante.<br><br><b>Perla ENARM:</b> \"El estadio 1 de Quintero se caracteriza por oligohidramnios y polihidramnios discordantes, manteniendo la visualización ecográfica de la vejiga en el feto donante.\"<br><br><b>Análisis de Distractores:</b> El estadio 2 (B) se diagnostica cuando la vejiga del feto donante ya no es visible por anuria severa. El estadio 3 (C) requiere documentar alteraciones hemodinámicas avanzadas como flujo diastólico ausente o reverso en el Doppler de la arteria umbilical, ductus venoso o vena umbilical. El estadio 4 (D) implica la presencia de derrames cavitarios, ascitis o hidrops franco en cualquiera de los dos fetos."
                    },
                    {
                        question: "¿Cuál es el tratamiento quirúrgico de primera línea recomendado para esta complicación?",
                        options: [
                            "Septostomía amniótica",
                            "Feticidio selectivo",
                            "Ablación láser de anastomosis placentarias",
                            "Amnioreducción seriada"
                        ],
                        answer: 2,
                        justification: "En el síndrome de transfusión feto-feto, la ablación fetoscópica con láser de las anastomosis vasculares placentarias ecuatoriales es la intervención terapéutica de elección absoluta, ya que interrumpe directamente la fisiopatología subyacente (la transfusión hemodinámica desequilibrada). Logra las mejores tasas de supervivencia global y reduce críticamente la morbilidad neurológica.<br><br><b>Perla ENARM:</b> \"La ablación láser de anastomosis vasculares placentarias es el tratamiento de primera elección para el síndrome de transfusión feto-feto al erradicar la comunicación vascular patológica.\"<br><br><b>Análisis de Distractores:</b> La amnioreducción seriada (D) es un abordaje paliativo que drena el exceso de líquido amniótico para aliviar síntomas maternos, pero no corrige la causa hemodinámica. El feticidio selectivo (B) se reserva como último recurso para estadios terminales irreversibles. La septostomía amniótica (A) crea un orificio temporal en la membrana divisoria para equilibrar pasivamente el líquido, pero ha caído en desuso frente a la evidencia y superioridad de la terapia láser."
                    },
                    {
                        question: "¿Qué complicación iatrogénica se debe vigilar estrechamente en las 5 semanas posteriores al tratamiento quirúrgico de elección?",
                        options: [
                            "Secuencia de perfusión arterial reversa",
                            "Mola hidatidiforme parcial coexistente",
                            "Restricción del crecimiento intrauterino selectivo",
                            "Secuencia anemia policitemia gemelar"
                        ],
                        answer: 3,
                        justification: "La secuencia anemia policitemia gemelar iatrogénica puede desarrollarse hasta en un 13% de los embarazos tratados con ablación láser. Ocurre típicamente dentro de las 5 semanas posteriores al procedimiento y es secundaria a anastomosis vasculares minúsculas residuales que no fueron fotocoaguladas, provocando que el antiguo feto receptor se vuelva crónicamente anémico y el antiguo donante policitémico.<br><br><b>Perla ENARM:</b> \"La secuencia anemia policitemia gemelar es una complicación iatrogénica documentada que ocurre hasta en el 13% de los embarazos tras someterse a ablación láser.\"<br><br><b>Análisis de Distractores:</b> La secuencia de perfusión arterial reversa (A) es una anomalía vascular letal (\"gemelo acardio\"), no una complicación post-quirúrgica iatrogénica. La restricción del crecimiento intrauterino selectivo (C) ocurre tempranamente por un reparto desigual de la masa placentaria y no es consecuencia directa de la cirugía. La mola coexistente (B) es un defecto primario en el proceso de fertilización."
                    },
                    {
                        question: "¿Cuál es la principal complicación neurológica asociada a la inestabilidad hemodinámica e isquemia en los fetos sobrevivientes?",
                        options: [
                            "Leucomalacia periventricular hemorrágica",
                            "Parálisis cerebral y encefalomalacia multiquística",
                            "Displasia septo óptica congénita",
                            "Hemorragia subaracnoidea intrauterina"
