                return;
            }
            const targetGlobalQId = (targetCaseId - 1) * QUESTIONS_PER_CASE + 1;
            displayQuestion(targetGlobalQId);
        }

        function getQBoxClass(globalId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-[10px] sm:text-xs cursor-pointer transition-all select-none border ";
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[globalId];
            const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
            const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
            const cData = casesData[caseIdx];
            
            if (!cData) return base + "bg-slate-100 text-slate-300";

            if (!examState.isFinished) {
                if (!state || !state.answered) {
                    return base + "bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-200 dark:bg-slate-800/50 dark:text-slate-500 dark:border-slate-700/50 dark:hover:bg-slate-700";
                } else {
                    return base + "bg-slate-600 text-white border-slate-700 dark:bg-slate-700 dark:border-slate-600 shadow-inner";
                }
            } 
            else {
                if (!state || !state.answered) {
                    return base + "bg-slate-100 text-slate-400 border-slate-200 dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700";
                } else {
                    const isCorrect = state.selectedOption === cData.questions[qIdx].answer;
                    if (isCorrect) {
                        return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
                    } else {
                        return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
                    }
                }
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            let boxes = [];
            for (let i = 1; i <= totalQuestions; i++) {
                boxes.push(`<div class="${getQBoxClass(i, i === isActiveIdContext)}" data-id="${i}" onclick="displayQuestion(${i})">${i}</div>`);
            }
            return boxes.join('');
        }

        function renderSidebarGrid() {
            document.getElementById('sidebar-q-grid').innerHTML = renderGridHTML(currentQuestionId);
        }

        function finishExam() {
            examState.isFinished = true;
            localStorage.setItem('simuladorEL3ExamState', JSON.stringify(examState));
            displayQuestion(null);
        }

        function displayWelcomeScreen() {
            document.getElementById('dashboard-button').classList.add('hidden');
            document.getElementById('menu-toggle').classList.add('hidden');
            
            const displayArea = document.getElementById('module-display');
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            
            let correct = 0;
            if (examState.isFinished) {
                correct = Object.keys(userProgress).filter(id => {
                    const globalId = parseInt(id);
                    const caseIdx = Math.floor((globalId - 1) / QUESTIONS_PER_CASE);
                    const qIdx = (globalId - 1) % QUESTIONS_PER_CASE;
                    const cData = casesData[caseIdx];
                    return cData && userProgress[id].answered && userProgress[id].selectedOption === cData.questions[qIdx].answer;
                }).length;
            }

            const successRate = totalQuestions > 0 && ans > 0 ? Math.round((correct / ans) * 100) : 0;
            let firstUncompletedId = 1;
            for(let i = 1; i <= totalQuestions; i++){
                if(!userProgress[i]?.answered){
                    firstUncompletedId = i;
                    break;
                }
            }
            
            let titleText = examState.isFinished ? "¡Simulador Evaluado!" : "Simulador ENARM";
            let descText = examState.isFinished 
                ? "Simulación concluida con éxito. Analiza el rendimiento global y la justificación clínica detallada de cada reactivo seriado." 
                : "La calificación definitiva y la retroalimentación por pregunta se mostrarán tras presionar 'Finalizar y Calificar'.";
            
            let actionBtn = "";
            if (examState.isFinished) {
                actionBtn = `<button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full md:w-auto bg-white/20 hover:bg-white/30 text-white border border-white/30 px-8 py-3 rounded-xl font-bold transition-colors shadow-sm">Reiniciar Simulador</button>`;
            } else {
                actionBtn = `
                    <button onclick="displayQuestion(${firstUncompletedId})" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-900/30 transition-transform hover:-translate-y-0.5 mr-3">
                        ${ans === 0 ? 'Iniciar Examen' : 'Continuar Simulador'}
                    </button>
                    <button onclick="document.getElementById('finish-modal').classList.remove('hidden')" class="bg-rose-500 hover:bg-rose-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-rose-900/30 transition-transform hover:-translate-y-0.5">
                        Finalizar y Calificar
                    </button>
                `;
            }

            let badgeText = examState.isFinished ? "RETROALIMENTACIÓN COMPLETA" : "ENARM 2026";
            let badgeClass = examState.isFinished ? "bg-emerald-500/20 border-emerald-500/30 text-emerald-300" : "bg-white/10 border-white/10 text-white";

            let statsHTML = examState.isFinished ? `
                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${totalQuestions}</span></p>
                    </div>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                    </div>
                    <div class="px-2">
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                    </div>
                </div>
            ` : `
                <div class="w-full text-center py-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Avance Global del Examen</p>
                    <p class="text-4xl sm:text-5xl font-black text-white">${ans}<span class="text-xl sm:text-2xl text-slate-500">/${totalQuestions}</span></p>
                    <div class="w-full bg-slate-700/50 rounded-full h-2 mt-4 overflow-hidden">
                        <div class="bg-blue-400 h-2 rounded-full shadow-md transition-all duration-300" style="width: ${(ans/totalQuestions)*100}%"></div>
                    </div>
                </div>
            `;

            let legendHTML = examState.isFinished ? `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
            ` : `
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-50 border border-slate-200 dark:bg-slate-800/50 dark:border-slate-700/50"></div> Pendiente</div>
                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-600 border border-slate-700"></div> Respondida</div>
            `;

            displayArea.innerHTML = `
                <div class="flex flex-col gap-6 max-w-7xl mx-auto lg:mt-0">
                    <div class="flex justify-center sm:justify-start items-center mb-1 mt-4 lg:mt-0">
                        <span class="inline-flex items-center gap-2 text-slate-400 font-semibold text-sm select-none">
                            
                        </span>
                    </div>

                    <div class="relative bg-slate-900 dark:bg-slate-950 rounded-[2rem] p-8 md:p-12 shadow-xl text-white overflow-hidden border border-slate-800 transition-colors duration-500">
                        <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-8">
                            <div class="text-center lg:text-left w-full lg:w-3/5">
                                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 border ${badgeClass}">
                                    ${badgeText}
                                </span>
                                <h1 class="text-3xl md:text-4xl lg:text-4xl font-extrabold tracking-tight mb-3 ${examState.isFinished ? 'text-emerald-400' : ''}">${titleText}</h1>
                                <p class="text-slate-300 text-base md:text-lg font-medium mx-auto lg:mx-0">${descText}</p>
                                <div class="mt-8 flex justify-center lg:justify-start flex-wrap gap-4">
                                    ${actionBtn}
                                </div>
                            </div>
                            
                            <div class="flex-shrink-0 bg-slate-800/50 backdrop-blur-md border border-slate-700/50 rounded-2xl p-6 flex flex-col items-center shadow-2xl w-full lg:w-2/5">
                                ${statsHTML}
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                Tablero del Examen (280 Preguntas)
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                ${legendHTML}
                            </div>
                        </div>
                        <div class="grid gap-2 grid-cols-[repeat(auto-fill,minmax(40px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>
                </div>
            `;
        }

        function displayQuestion(globalId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = globalId ? parseInt(globalId) : null;
                
                if (currentQuestionId) {
                    localStorage.setItem('simuladorEL3LastQId', currentQuestionId);
                } else {
                    localStorage.removeItem('simuladorEL3LastQId');
                }

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                if (window.innerWidth >= 1024) {
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');
                    dashboardBtn.classList.add('lg:left-[22rem]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const caseIdx = Math.floor((currentQuestionId - 1) / QUESTIONS_PER_CASE);
                const cData = casesData[caseIdx];
                
                if (!cData) return displayQuestion(null);
                
                renderCaseLayout(cData, currentQuestionId);
                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                setTimeout(() => {
                    const targetCard = document.getElementById(`q-card-${currentQuestionId}`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }, 50);

            }, 150); 
        }

        function renderCaseLayout(cData, activeGlobalId) {
            let html = `
                <div class="flex flex-col gap-6 max-w-5xl mx-auto items-center">
                    
                    <!-- COLUMNA: TEXTO DEL CASO CLÍNICO -->
                    <div class="w-full bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-2xl shadow-md border border-slate-200 dark:border-slate-800 transition-all duration-300">
                        <div class="flex items-center justify-between mb-4">
                            <span class="inline-block bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-900/30">
                                Caso Clínico Seriado
                            </span>
                            <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                                Bloque #${cData.id}
                            </span>
                        </div>
                        <p class="text-slate-800 dark:text-slate-200 text-sm sm:text-base leading-relaxed font-medium">
                            ${cData.caseText}
                        </p>
                        ${examState.isFinished ? `
                            <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                <span class="text-slate-500">Bibliografía GPC:</span> ${cData.source}
                            </div>
                        ` : ''}
                    </div>

                    <!-- COLUMNA: BLOQUE DE LAS 5 PREGUNTAS ASOCIADAS -->
                    <div class="w-full space-y-5">
            `;

            cData.questions.forEach((q, idx) => {
                const globalQId = (cData.id - 1) * QUESTIONS_PER_CASE + idx + 1;
                const qState = userProgress[globalQId];
                const hasAnswered = qState && qState.answered;
                const userAnswer = hasAnswered ? qState.selectedOption : null;
                
                let cardStyle = "border-slate-200 dark:border-slate-800/80";
                if (globalQId === activeGlobalId) {
                    cardStyle = "border-blue-500 dark:border-blue-500 ring-2 ring-blue-500/10";
                }
                if (examState.isFinished && hasAnswered) {
                    cardStyle = (userAnswer === q.answer) ? "border-l-4 border-emerald-500" : "border-l-4 border-rose-500";
                }

                html += `
                    <div id="q-card-${globalQId}" class="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-sm border ${cardStyle} transition-all">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[9px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700">
                                PREGUNTA ${globalQId}
                            </span>
                        </div>
                        <h3 class="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-100 mb-4 leading-snug">${q.question}</h3>
                        <form id="q-form-${globalQId}" class="space-y-2.5">
                `;

                q.options.forEach((opt, i) => {
                    if (examState.isFinished) {
                        let optClasses = "flex items-start p-3 border rounded-xl text-xs sm:text-sm ";
                        let icon = "";
                        
                        if (i === q.answer) {
                            optClasses += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 font-semibold";
                            icon = `<svg class="w-4 h-4 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
                        } else if (i === userAnswer) {
                            optClasses += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                            icon = `<svg class="w-4 h-4 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                        } else {
                            optClasses += "bg-slate-50 border-slate-100 dark:bg-slate-800/30 dark:border-slate-800/50 opacity-50 text-slate-400";
                        }

                        html += `
                            <div class="${optClasses}">
                                <span class="leading-snug pr-3">${opt}</span>
                                ${icon}
                            </div>
                        `;
                    } else {
                        const checkedStr = (hasAnswered && userAnswer === i) ? 'checked' : '';
                        html += `
                            <label class="flex items-start p-3 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/40 has-[:checked]:bg-blue-50/80 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/20 text-xs sm:text-sm shadow-sm" onclick="autoSaveAnswer(${globalQId})">
                                <input type="radio" name="option" value="${i}" ${checkedStr} class="mt-0.5 h-3.5 w-3.5 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-700 cursor-pointer">
                                <span class="ml-2.5 text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `;
                    }
                });

                html += `</form>`;

                if (examState.isFinished) {
                    html += `
                        <div class="bg-blue-50/60 dark:bg-slate-800/50 border border-blue-100/50 dark:border-slate-800 rounded-xl p-4 text-xs sm:text-sm mt-4">
                            <h4 class="font-bold text-blue-800 dark:text-blue-400 mb-1 flex items-center gap-1 uppercase tracking-wider text-[10px]">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Justificación Médica GPC
                            </h4>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${q.justification}</p>
                        </div>
                    `;
                }

                html += `</div>`;
            });

            const isLastCase = cData.id === casesData.length;

            html += `
                        <!-- CONTROLES DE FLUJO EN CASOS -->
                        <div class="flex justify-between items-center pt-4 mt-6 border-t border-slate-200 dark:border-slate-800">
                            <button onclick="navigateCase(${cData.id}, 'prev')" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                                Caso Anterior
                            </button>
                            
                            ${examState.isFinished ? `
                                ${!isLastCase ? `
                                    <button onclick="navigateCase(${cData.id}, 'next')" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5 shadow-sm">
                                        Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                    </button>
                                ` : `
                                    <button onclick="displayQuestion(null)" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-6 rounded-xl transition-colors text-xs uppercase tracking-wider shadow-sm">
                                        Ver Calificaciones
                                    </button>
                                `}
                            ` : `
                                <button onclick="navigateCase(${cData.id}, 'next')" class="bg-blue-600 dark:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-md hover:bg-blue-700 dark:hover:bg-blue-400 transition-colors text-xs uppercase tracking-wider flex items-center gap-1.5">
                                    Siguiente Caso <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('module-display').innerHTML = html;
        }

        function autoSaveAnswer(globalId) {
            if(examState.isFinished) return;
            const form = document.getElementById(`q-form-${globalId}`);
            if (!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (selected) {
                userProgress[globalId] = { answered: true, selectedOption: parseInt(selected.value) };
                saveState();
                updateProgressBar();
                renderSidebarGrid();
            }
        }

        function updateProgressBar() {
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = totalQuestions > 0 ? Math.round((ans / totalQuestions) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; 
            }
        }

        function saveState() {
            try { localStorage.setItem('simuladorEL3Progress', JSON.stringify(userProgress)); } catch(e) {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('simuladorEL3Progress');
                userProgress = saved ? JSON.parse(saved) : {};
                const savedState = localStorage.getItem('simuladorEL3ExamState');
                if (savedState) examState = JSON.parse(savedState);
            } catch(e) { userProgress = {}; examState = { isFinished: false }; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
