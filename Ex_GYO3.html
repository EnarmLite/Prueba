            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es el nombre de la escala clínica validada de interrogatorio sugerida por la norma para estratificar objetivamente la severidad de la Hiperémesis Gravídica?", 
                options: ["Escala validada de PUQE", "Escala pronóstica de Alvarado", "Escala de coma de Glasgow", "Escala de SOFA obstétrico"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, puntuar y llevar un registro pormenorizado del número de episodios de vómitos francos reportados, contabilizar las horas continuas de náusea debilitante percibida y cuantificar las veces que se presentan arcadas o returgitaciones secas diarias en la madre mediante el instrumento clínico internacional especializado (Pregnancy-Unique Quantification of Emesis) permite al médico o ginecólogo de primer y segundo nivel de atención clasificar la severidad de la entidad y decidir de forma no arbitraria e imparcial si la paciente amerita un simple manejo higiénico-dietético en casa con fármacos orales ambulatorios o si es impostergable su internamiento al área de urgencias o medicina interna para reposición hidroelectrolítica agresiva, rehidratación intrahospitalaria parenteral y escalamiento de antieméticos endovenosos en el piso.<br><br>Perla ENARM: \"Se recomienda emplear una escala validada para evaluar las náuseas y el vómito en el embarazo (como la escala PUQE), para poder establecer la severidad del estado clínico\".<br><br>Análisis de Distractores: La escala estandarizada clásica predictiva y probabilística inflamatoria de Alvarado o de MANTRELS (B) evalúa la posibilidad diagnóstica del dolor migratorio de la apendicitis aguda, descartando u operando al paciente por su puntaje. El índice internacional validado clínico de respuesta motora, verbal y ocular estandarizado del estado de alerta y vigilia, o Glasgow (C), clasifica la respuesta al dolor y obediencia de órdenes para medir un deterioro neurológico encefálico traumático o tóxico en coma o choque severo, no midiendo de ninguna forma el espectro gastrointestinal patológico. La variante de SOFA obstétrico o modificado para la disfunción orgánica secuencial pélvica de UCI y reanimación rápida inicial (D) determina el grado inminente de falla de los parénquimas principales fisiológicos sistémicos como la vía hematológica o renal en el choque distributivo, en cuadros o torbellinos sépticos floridos maternos de UCI o en las secuelas agudas graves letales de preeclampsia tardía complicada severa; no cuantificando la intensidad en horas, intensidad y frecuencia diaria agobiante clínica puramente digestiva aislada de la emesis incoercible del embarazo en etapa inicial antes de presentar falla a órgano blanco severa limitante de resucitación.", 
                source: "GPC IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Hiperémesis gravídica, Página 26." 
            },
            {
                id: 2, 
                question: "Ante la sospecha de alto riesgo para desarrollar preeclampsia, ¿cuál es el primer estudio de tamizaje hemodinámico que debe solicitarse en el primer trimestre según la Guía de Práctica Clínica?", 
                options: ["Flujometría de arteria umbilical.", "Índice de pulsatilidad uterina.", "Flujometría del ductus venoso.", "Ultrasonido estructural modo B."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Prevención, Diagnóstico y Tratamiento de la Preeclampsia, evaluar las resistencias de la vasculatura a través del índice de pulsatilidad uterina permite detectar tempranamente la falla en la placentación y la invasión del trofoblasto.<br><br>Perla ENARM: \"En pacientes con embarazo y alto riesgo de preeclampsia, es recomendable realizar determinación del IP de la arteria uterina en primer y segundo trimestre\".<br><br>Análisis de Distractores: La flujometría de la arteria umbilical y el ductus venoso se emplean durante el tercer trimestre para categorizar el compromiso y asfixia fetal (restricción del crecimiento). El ultrasonido modo B es morfológico o estructural, no es un predictor hemodinámico primario para esta patología.", 
                source: "GPC IMSS-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Tamizaje, Página 23." 
            },
            {
                id: 3, 
                question: "En una paciente obstétrica diagnosticada con Tromboembolia Pulmonar (TEP) que desarrolla colapso cardiovascular e hipotensión sostenida (TEP grave), ¿cuál es el tratamiento farmacológico inicial indicado que predice mayor supervivencia?", 
                options: ["Heparina de bajo peso molecular.", "Heparina no fraccionada intravenosa.", "Trombólisis con alteplasa.", "Antagonistas de vitamina K."], 
                answer: 1, 
                justification: "Justificación: La TEP grave (masiva) y el estado de choque hipoperfusivo anulan la ventana de absorción predecible subcutánea y la seguridad de las heparinas de depósito, demandando un fármaco de vida media ultracorta, control intravenoso inmediato y fácilmente reversible en caso de catástrofe hemorrágica. De acuerdo a la GPC de Enfermedad Tromboembólica Venosa Obstétrica, es el único escenario de inicio agudo donde se abandona la HBPM.<br><br>Perla ENARM: \"Se recomienda que en embarazadas con sospecha de TEP grave (por ejemplo pacientes con colapso cardiovascular, hipoxemia refractaria, disfunción ventricular derecha...) se ministre como tratamiento inicial HNF intravenosa\".<br><br>Análisis de Distractores: La Heparina de Bajo Peso Molecular es el oro para TEP no grave o estable. La trombólisis sistémica no se marca como el inicio de primera intención en el abordaje general normativo de TEP grave sin haber considerado la HNF, debido al riesgo hemorrágico obstétrico masivo. Los antagonistas de la Vitamina K son teratogénicos y de lentísimo inicio de acción.", 
                source: "GPC SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Tratamiento farmacológico, Página 51." 
            },
            {
                id: 4, 
                question: "¿Cuál es el factor de riesgo con mayor asociación para presentar Ruptura Uterina documentado por la GPC?", 
                options: ["Edad materna muy avanzada", "Cicatriz de cesárea previa", "Producto macrosómico al nacer", "Trabajo de parto prolongado"], 
                answer: 1, 
                justification: "Justificación: El factor de riesgo unívoco y de mayor peso para la aparición de esta catástrofe obstétrica es la existencia de una incisión uterina previa. Las pacientes sin cicatrices tienen un riesgo sumamente bajo confinado a eventos raros o de gran multiparidad. De acuerdo a la GPC de Ruptura Uterina, se debe interrogar intencionadamente este antecedente desde el primer nivel.<br><br>Perla ENARM: Durante el Triage obstétrico en primer nivel de atención se deben de identificar intencionadamente los factores de riesgo en toda mujer embarazada: Cirugía uterina previa, Miomectomía, Cesárea Anterior.<br><br>Análisis de Distractores: Aunque la edad materna (A) y la macrosomía (C) pueden complicar un parto, y el parto prolongado (D) somete al útero a estrés, ninguno de estos supera matemáticamente el riesgo que otorga la pérdida de continuidad del miometrio por una incisión previa.", 
                source: "GPC SS-296-10, Prevención, diagnóstico y manejo oportuno de la ruptura uterina, 2017, Prevención y Factores de Riesgo, Página 15." 
            },
            {
                id: 5, 
                question: "¿Cuál es el resultado de la escala pronóstica de Perfil Biofísico que predice la mayor tasa de mortalidad fetal sin intervención a una semana en un embarazo complicado con Preeclampsia?", 
                options: ["Ocho de diez puntos", "Seis de diez puntos", "Cuatro de diez puntos", "Cero de diez puntos"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedades Hipertensivas del Embarazo, un útero crónicamente mal perfundido deprime todas las respuestas biológicas y reflejos autonómicos del feto, derivando progresivamente a hipoxia y asfixia celular. Un puntaje totalmente negativo revela que los centros neurológicos han cesado sus funciones ante la falta severa de oxígeno placentario, dictaminando nacimiento forzado sin demora por altísimo riesgo de óbito.<br><br>Perla ENARM: \"0/10 Alta certeza de asfixia fetal. Mortalidad fetal sin intervención a 1 semana: 600/1000. Manejo: Nacimiento por indicación fetal\".<br><br>Análisis de Distractores: Ocho puntos (A) se considera normal o sugerente de compromiso temprano leve si falla el líquido amniótico. Seis puntos (B) establece una dudosa asfixia inicial que requiere observación repetida (mortalidad 89/1000). Cuatro puntos (C) advierte de muy alta probabilidad de daño fetal severo (91/1000), pero ninguna puntuación superará la letalidad predicha por una abolición biológica total del cero (600 muertes de cada mil fetos a la semana).", 
                source: "GPC IMSS-058-08, Detección, Diagnóstico y Tratamiento de las Enfermedades Hipertensivas del Embarazo, 2017, Anexos (Cuadro 6), Página 46." 
            },
            {
                id: 6, 
                question: "En el contexto del Parto Pretérmino, ¿cuál es el factor de riesgo con mayor asociación y riesgo de recurrencia según la GPC?", 
                options: ["Vaginosis bacteriana asintomática", "Periodo intergenésico corto", "Antecedente de parto pretérmino", "Infección de vías urinarias"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, la historia reproductiva de la mujer es el predictor epidemiológico más fuerte. El riesgo de recurrencia incrementa de 1.5 a 2 veces por cada evento previo, catalogando a la paciente inmediatamente como de \"Riesgo Alto\".<br><br>Perla ENARM: \"La GPC clasifica como Riesgo Alto a mujeres que presenten al menos uno de los siguientes factores de riesgo: Antecedente de parto pretérmino previo, Antecedente de 3 pérdidas ó antecedente de parto pretérmino espontáneo menor a 34 semanas.\"<br><br>Análisis de Distractores: La vaginosis bacteriana y el periodo intergenésico corto menor a 18 meses (Opciones A y B) son factores de riesgo clasificados como de \"Riesgo Bajo\" por la GPC. Las infecciones urinarias (Opción D) deben tratarse, pero no superan el peso estadístico del antecedente obstétrico directo.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Anexo 5.3 Cuadro 2, Página 142." 
            },
            {
                id: 7, 
                question: "¿Cuál es la comorbilidad metabólica que clasifica a la paciente como \"hospedero susceptible\" requiriendo esquemas de inducción oral de 3 dosis?", 
                options: ["Hipotiroidismo subclínico", "Síndrome de Cushing", "Resistencia a la insulina", "Diabetes mellitus descontrolada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, la inmunosupresión endógena provocada por los desórdenes glucémicos clasifica inmediatamente el cuadro como \"complicado\", invalidando las terapias de \"dosis única\". El ambiente hiperglucémico perpetúa la colonización, por lo que se exige control estricto de la patología de base y esquemas agresivos intermitentes en la primera semana.<br><br>Perla ENARM: \"La CVV en hospederos con enfermedades subyacentes: diabetes, VIH, manejo con corticoesteroides... No prescribir tratamiento corto... O fluconazol 100 mg, 150 mg o 200 mg por vía bucal cada tercer día por tres dosis (días 1, 4 y 7)\".<br><br>Análisis de Distractores: Las opciones A, B y C son alteraciones endocrinas, pero la guía especifica enfáticamente a la Diabetes Mellitus como el factor metabólico predisponente clásico asociado al cuadro complicado de la vulvovaginitis fúngica.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Tratamiento Farmacológico, Página 23." 
            },
            {
                id: 8, 
                question: "¿Cuál es el factor de riesgo biológico con mayor asociación para el desarrollo de Cáncer de Mama según la GPC?", 
                options: ["Menarca después de 12 años", "Mutaciones en BRCA 1 y 2", "Lactancia materna prolongada", "Multiparidad"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, las mutaciones genéticas de alta penetrancia son el factor de riesgo mayor más contundente, especialmente para desarrollar la enfermedad a edades tempranas.<br><br>Perla ENARM: \"Son factores de riesgo mayor para cáncer de mama: Las portadoras de mutaciones de alta penetrancia en los genes BRCA 1 y BRCA 2, además de otras mutaciones en otros genes aún desconocidos\".<br><br>Análisis de Distractores: La menarca tardía (A) y la multiparidad (D) son factores protectores, no de riesgo. La lactancia prolongada (C) es uno de los principales factores protectores descritos en la prevención primaria.", 
                source: "GPC S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención, 2017, Factores de riesgo, Página 20." 
            },
            {
                id: 9, 
                question: "En el manejo del parto pretérmino inminente, ¿cuál es la intervención intravenosa indicada específicamente para proveer neuroprotección y disminuir la parálisis cerebral?", 
                options: ["Infusión de atosibán", "Profilaxis con ampicilina", "Sulfato de magnesio intravenoso", "Administración de betametasona"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, la inestabilidad hemodinámica e inflamación en la circulación fetal prematura daña los oligodendrocitos y la matriz germinal. El magnesio antagoniza a los receptores NMDA del cerebro fetal, bloqueando la toxicidad mediada por calcio y glutamato, estabilizando así las membranas neuronales.<br><br>Perla ENARM: \"Considerar el sulfato de magnesio intravenoso para la neuroprotección del neonato para las mujeres entre 30 y 33.6 semanas de gestación\".<br><br>Análisis de Distractores: El atosibán (A) funciona únicamente como tocolítico, sin efecto neuroprotector documentado. La ampicilina (B) previene la sepsis por SGB. La betametasona (D) provee madurez pulmonar y disminuye la hemorragia intraventricular en general, pero la \"neuroprotección\" farmacológica protocolizada para la parálisis cerebral corresponde al Magnesio.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Manejo Terapéutico, Página 32." 
            },
            {
                id: 10, 
                question: "¿Cuál es el factor de riesgo fuertemente asociado con la persistencia de las lesiones precursoras del cáncer de cuello uterino según la GPC?", 
                options: ["Multiparidad", "Tabaquismo activo", "Uso de dispositivo intrauterino", "Infección persistente por VPH"], 
                answer: 3,

                question: "¿Cuál es la etiología estructural con mayor asociación a sangrado anormal por la que se realiza histerectomía según la Guía de Práctica Clínica?",

            {

                question: "¿Cuál es el factor de riesgo con mayor asociación para desarrollar Sepsis Materna según la GPC?", 
                options: ["Obesidad materna grado III", "Cesárea de urgencia", "Anemia materna severa", "Más de 5 tactos"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento de la Sepsis Materna, aunque la obesidad, la anemia y las exploraciones vaginales repetidas contribuyen al riesgo infeccioso, la cesárea no programada o de urgencia representa el factor independiente más importante, incrementando dramáticamente el riesgo (OR de 8.06) de morbilidad infecciosa severa al romperse las barreras naturales en un evento no estéril programado.<br><br>Perla ENARM: \"La cesárea no programada (de urgencia) es el factor de riesgo independiente más importante para sepsis materna\".<br><br>Análisis de Distractores: La opción A (obesidad) tiene un OR de 1.85, la opción C (anemia) un OR de 3.4 y la opción D (múltiples tactos vaginales) un OR de apenas 1.09. Ninguno supera el peso estadístico de la intervención quirúrgica de urgencia.",

                question: "Según la GPC para la resolución del Infarto Agudo del Miocardio con elevación del segmento ST (IAMCEST) durante el embarazo, ¿cuál es el procedimiento de reperfusión absoluto de elección?", 
                options: ["Angioplastia coronaria percutánea transluminal", "Trombolisis sistémica con alteplasa intravenosa", "Cirugía de revascularización miocárdica abierta", "Tratamiento médico conservador exclusivo paliativo"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Emergencias Obstétricas, abrir, destapar o restaurar mecánicamente el lumen del vaso coronario culpable de la lesión en hemodinamia o sala de cateterismo utilizando un abordaje endovascular mínimamente invasivo (stent o balón) logra recuperar el flujo de oxígeno miocárdico y salva el tejido isquémico mientras evita cuidadosamente someter a toda la red circulatoria del lecho placentario altamente vascularizado e inestable de la madre al brutal efecto catalítico de los potentes fármacos líticos enzimáticos fibrinolíticos (rt-PA), minimizando así las posibles catástrofes hemorrágicas irreversibles (hemorragia intrauterina, desprendimiento agudo placentario fatal o hemorragia de SNC fetal/materno) en la paciente gestante grave crítica.<br><br>Perla ENARM: \"Durante el embarazo, la angioplastia coronaria es el tratamiento de reperfusión preferido para el infarto agudo del miocardio con elevación del ST\".<br><br>Análisis de Distractores: La infusión endovenosa de terapias líticas potentes farmacológicas de rescate como la trombolisis (B) tiene un riesgo altísimo de provocar choque hemorrágico obstétrico letal o la pérdida definitiva del producto, por lo que su indicación se relega estrictamente como rescate de vida si la paciente carece de acceso físico a cateterismo en más de 120 minutos en centros alejados y la inestabilidad es mortal. La cirugía de derivación aórtico-coronaria (bypass) (C) expone inminentemente a la paciente a los embates fisiológicos del uso obligado de bomba de circulación de perfusión cardiopulmonar extracorpórea, ocasionando severa hipoperfusión placentaria con una inaceptablemente alta morbilidad y letalidad para el feto no reanimable. El manejo sintomático pasivo con opiáceos, nitratos o bloqueadores y manejo médico conservador (D) está absolutemente proscrito y contraindicado por negligencia flagrante en un paciente con isquemia transmural aguda extensa o supra desnivel del ST activo, ya que condenaría irreversiblemente al miocardio materno viable a necrosis masiva y dilatación, con falla cardíaca sistólica aguda secundaria.", 
                source: "GPC IMSS-436-19, Diagnóstico y tratamiento inicial de las emergencias obstétricas, 2019, Infarto agudo del miocardio en el embarazo, Página 30."

            {

                question: "¿Cuál es el dato clínico materno que, en conjunto con otros signos, predice mayor riesgo de infección intraamniótica severa en una paciente con Ruptura Prematura de Membranas Pretérmino?",

                question: "¿Cuál es el factor de riesgo con mayor asociación para presentar Hemorragia Postparto secundaria a la sobredistensión anatómica de la fibra miometrial según la GPC?",

                justification: "Justificación: De acuerdo a la GPC de Prevención y manejo de la hemorragia postparto, el principal mecanismo de hemostasia post-alumbramiento es la contracción de la red de fibras musculares miometriales (ligaduras vivas de Pinard) que ocluyen los vasos. La sobredistensión provocada por un feto muy grande (macrosomía), gestación múltiple o polihidramnios sobredistira y agota la fibra muscular, impidiendo su retracción mecánica eficaz (atonía).<br><br>Perla ENARM: \"Sobredistención uterina: Polihidramnios, gestación múltiple, macrosomía fetal. Clasificación de riesgo medio\".<br><br>Análisis de Distractores: La opción B y D causan atonía por relajación funcional/anatómica o alteraciones de los receptores, no por estiramiento mecánico directo. La opción A se asocia a otras patologías del embarazo pero no genera sobredistensión directa.",

                question: "Según la Guía de Práctica Clínica, si se requiere tratamiento quirúrgico inmediato mediante un filtro de vena cava para prevenir TEP fatal, ¿qué tipo de dispositivo estructural se sugiere utilizar para minimizar complicaciones críticas como la penetración?", 
                options: ["Filtro cónico de vena cava.", "Filtro no cónico.", "Filtro temporal de vena cava.", "Trombectomía intervencionista temprana."], 
                answer: 1, 
                justification: "Justificación: La anatomía y los cambios hemodinámicos gestacionales exigen el uso de aditamentos específicos que eviten el daño estructural a largo plazo en la vena cava inferior distendida. De acuerdo a la GPC de Enfermedad Tromboembólica Venosa Obstétrica, los dispositivos no cónicos asocian un perfil menor de penetración a órganos adyacentes y complicaciones severas secundarias al dispositivo.<br><br>Perla ENARM: \"Se sugiere utilizar el filtro no cónico comparado con el filtro cónico de vena cava para prevenir desenlaces en pacientes obstétricas con ETEV\".<br><br>Análisis de Distractores: Los filtros cónicos asocian mayores tasas de migración y perforación según la evidencia revisada. Los filtros temporales y la trombectomía temprana son conceptos válidos pero no abordan la especificación estructural clave (cónico vs no cónico) evaluada directamente en el grado de recomendación de esta norma.", 
                source: "GPC SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Tratamiento no farmacológico, Página 29." 
            },
            {
                id: 28, 
                question: "Ante la sospecha clínica de Ruptura Uterina en una paciente hemodinámicamente inestable, ¿cuál es el primer estudio de imagen que debe solicitarse según la GPC?", 
                options: ["Ultrasonido obstétrico de urgencia", "Tomografía abdominopélvica con contraste", "Radiografía simple de abdomen", "Ninguno, requiere manejo quirúrgico"], 
                answer: 3, 
                justification: "Justificación: En el abordaje inicial de la paciente con descompensación hemodinámica secundaria a sospecha de Ruptura Uterina, está formalmente contraindicado retrasar la intervención terapéutica para realizar estudios de gabinete. La prioridad es el abordaje quirúrgico inmediato para salvaguardar el binomio.<br><br>Perla ENARM: Ante la paciente hemodinámicamente inestable no se retrasará el tratamiento para la realización de un ultrasonido.<br><br>Análisis de Distractores: El ultrasonido (A) solo tiene utilidad para predecir el riesgo midiendo el grosor del miometrio de manera prenatal, no en agudo. La tomografía (B) y radiografía (C) suponen una pérdida de tiempo invaluable y no tienen cabida en el algoritmo de urgencia obstétrica inestable.", 
                source: "GPC SS-296-10, Prevención, diagnóstico y manejo oportuno de la ruptura uterina, 2017, Diagnóstico clínico, Página 28." 
            },
            {
                id: 29, 
                question: "Según la GPC, ¿cuál es el factor de riesgo con mayor asociación estadística para el desarrollo de Preeclampsia?", 
                options: ["Obesidad materna severa", "Hipertensión arterial crónica", "Embarazo múltiple", "Lupus Eritematoso Sistémico"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Enfermedades Hipertensivas del Embarazo, los factores de riesgo reconocidos incluyen elementos personales, cardiovasculares, metabólicos y de desórdenes de la coagulación. Las enfermedades autoinmunes como el Lupus Eritematoso Sistémico y el Síndrome de Anticuerpos Antifosfolípidos presentan el Riesgo Relativo (RR) más elevado documentado en la normatividad, con un valor de 9.72 para el desarrollo de la enfermedad.<br><br>Perla ENARM: \"Se recomienda la búsqueda intencionada de los siguientes factores de riesgo asociados a trastornos hipertensivos asociados al embarazo... Trastornos inmunológicos (LES, SAAF)\".<br><br>Análisis de Distractores: El embarazo múltiple (C) confiere un RR de 2.9. La obesidad materna con un Índice de Masa Corporal mayor a 30 kg/m2 (A) presenta un RR de 2.47. La Hipertensión arterial pre-existente o crónica (B) otorga un RR de 3.6. Ninguno supera el gran impacto epidemiológico de las patologías autoinmunes.", 
                source: "GPC IMSS-058-08, Detección, Diagnóstico y Tratamiento de las Enfermedades Hipertensivas del Embarazo, 2017, Anexos (Cuadro 1), Página 37." 
            },
            {
                id: 30, 
                question: "¿Cuál es el fármaco intravenoso indicado por la GPC que reduce el riesgo de parálisis cerebral (neuroprotección) en un neonato prematuro extremo?", 
                options: ["Betametasona intramuscular dosis única", "Atosiban en infusión continua", "Dexametasona dosis múltiples", "Sulfato de Magnesio intravenoso"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, el Magnesio estabiliza las membranas neuronales y bloquea los receptores excitatorios, disminuyendo las lesiones isquémicas y hemorrágicas del sistema nervioso central en productos en extrema inmadurez que nacen inminentemente.<br><br>Perla ENARM: \"La administración prenatal de sulfato de magnesio intravenoso antes de las 32 semanas reduce la parálisis cerebral y los trastornos del desarrollo motor en la persona recién nacida prematura.\"<br><br>Análisis de Distractores: La Betametasona y Dexametasona (Opciones A y C) son los esteroides elegidos para la inducción de maduración pulmonar y reducción de hemorragia intraventricular, pero su uso cardinal no se define bajo el título aislado de \"neuroprotección\". El Atosiban (Opción B) es tocolítico estricto.", 
                source: "IMSS-063-08, Prevención, Diagnóstico y Tratamiento del Parto Pretérmino, 2017, Tratamiento, Página 121." 
            },
            {
                id: 31, 
                question: "En el contexto de la Candidosis Vulvovaginal, ¿cuál es el único factor de riesgo con asociación positiva directa según la GPC?", 
                options: ["Infección por VIH", "Diabetes mellitus descontrolada", "Embarazo normoevolutivo", "Uso de corticoesteroides"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Candidosis Vulvovaginal, aunque clínicamente se enumeran múltiples factores de riesgo como inmunosupresión o uso de antibióticos, la evidencia actual demuestra que el estado gestacional es el que tiene la correlación positiva estadísticamente más consistente para desarrollar la patología, debido al desequilibrio hormonal (dominancia de progesterona) que disminuye el pH y aumenta el glucógeno tisular.<br><br>Perla ENARM: \"De acuerdo a la evidencia revisada, a excepción del embarazo el resto de los factores mencionados no son consistentes como factor de riesgo para el desarrollo de la CVV\".<br><br>Análisis de Distractores: Las opciones A, B y D son condiciones que predisponen a cuadros complicados o recurrentes de la enfermedad (hospederos susceptibles), pero metodológicamente la guía destaca que el embarazo es el único consistentemente correlacionado de forma positiva en la literatura analizada para su desarrollo general.", 
                source: "GPC-IMSS-609-19, Diagnóstico y tratamiento de candidosis vulvovaginal en mujeres mayores a 12 años de edad, 2019, Prevención Primaria: Factores de riesgo y Clasificación, Página 13." 
            },
            {
                id: 32, 
                question: "¿Cuál es el estudio de gabinete clave que permite distinguir el Cáncer de Mama de su principal diagnóstico diferencial benigno (quiste simple) en la evaluación de una masa palpable?", 
                options: ["Mastografía con conos de compresión", "Resonancia magnética contrastada", "Biopsia incisional abierta", "Ultrasonido mamario"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Cáncer de Mama, la ecografía tiene la capacidad física de diferenciar las características acústicas (sólido vs. líquido), siendo vital para evitar intervenciones en quistes simples benignos.<br><br>Perla ENARM: \"El ultrasonido, es la modalidad de elección para evaluar masas palpables en la lactancia... estos podrían ser quistes simples, conglomerado de microquistes y quistes sebáceos. También es útil como guía para la toma de biopsia con aguja gruesa y otras técnicas, así como para diferenciar un quiste de una masa sólida\".<br><br>Análisis de Distractores: La mastografía (A) detecta asimetrías y microcalcificaciones, pero es deficiente para diferenciar líquido de tejido sólido circunscrito. La resonancia (B) es innecesaria y excesiva para evaluar un quiste simple. La biopsia incisional (C) es un procedimiento invasivo que justamente se evita gracias a esta diferenciación sonográfica.", 
                source: "GPC S-001-08, Prevención, tamizaje y referencia oportuna de casos sospechosos de cáncer de mama en el primer nivel de atención, 2017, Ultrasonido, Página 33." 
            },
            {
                id: 33, 
                question: "Ante la necesidad de tamizaje en una gestante para predecir el parto pretérmino, ¿cuál es el abordaje inicial de imagen que debe solicitarse a partir de la semana 24 de gestación según la GPC?", 
                options: ["Medición cervical por ultrasonido", "Ecografía transabdominal rutinaria", "Monitoreo de actividad uterina", "Examen digital del cérvix"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Prevención del parto pretérmino, el tacto vaginal es subjetivo y carece de sensibilidad para detectar acortamientos sutiles del cérvix interno. La ecografía transvaginal es el único método validado que permite una evaluación objetiva y reproducible del canal endocervical, visualizando el \"funneling\" (tunelización) antes de que sea clínicamente evidente.<br><br>Perla ENARM: \"El uso de la medición cervical a partir de la semana 24 de gestación puede ayudar a disminuir el sobrediagnóstico y el tratamiento innecesario del parto pretérmino\".<br><br>Análisis de Distractores: La ecografía transabdominal (B) es imprecisa por la sombra acústica de partes fetales y la vejiga. El monitoreo uterino (C) no previene el parto, solo documenta contracciones. El examen digital (D) está explícitamente desaconsejado como método de tamizaje rutinario en asintomáticas.", 
                source: "GPC-SS-118-18, Prevención primaria y tamizaje del parto pretérmino en el primer nivel de atención, 2018, Tamizaje, Página 24." 
            },
            {
                id: 34, 
                question: "¿Cuál es el marcador inmunohistoquímico de tinción dual que predice mayor riesgo de progresión y mejora la especificidad en una paciente con lesiones precursoras del cáncer de cuello uterino?", 
                options: ["CA 125 y antígeno carcinoembrionario", "Anticuerpos anti-citoplasma de neutrófilos", "Proteína C reactiva de alta sensibilidad", "Biomarcadores p16 y Ki-67"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Lesiones precursoras del cáncer cervical, cuando el VPH oncogénico infecta una célula y evade el control del ciclo celular (sobreexpresando oncoproteínas E6 y E7), se produce un bloqueo en las vías de supresión tumoral que resulta en la acumulación de la proteína p16 y el marcador de proliferación celular Ki-67. Detectar ambas simultáneamente garantiza que hay una verdadera transformación celular subyacente y no solo una infección pasajera productiva.<br><br>Perla ENARM: \"Se recomienda realizar la técnica de inmunohistoquímica para la detección de biomarcadores p16/Ki-67, como sustitución de la técnica de citología convencional, ya que es una técnica que aumenta la sensibilidad y presenta igual especificidad para NIC de alto grado sobre todo en mujeres jóvenes\".<br><br>Análisis de Distractores: El CA-125 (A) es un marcador serológico para cáncer de ovario seroso. Los ANCA (B) son para vasculitis autoinmunes. La PCR (C) es un reactante de fase aguda inespecífico sistémico.", 
                source: "GPC-SS-146-18, Prevención, detección, diagnóstico y tratamiento de lesiones precursoras del cáncer de cuello uterino en primer y segundo nivel de atención, 2018, Diagnóstico y triaje de lesiones de bajo grado, Página 30." 
            },
            {
                id: 35, 
                question: "¿Cuál es el factor de riesgo con mayor asociación para el desarrollo de depresión perinatal según la Guía de Práctica Clínica?", 
                options: ["Consumo de sustancias tóxicas", "Depresión previa al embarazo", "Tristeza materna transitoria", "Violencia intrafamiliar severa"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Depresión prenatal y posparto, aunque existen múltiples condicionantes psicosociales (como violencia o bajo nivel socioeconómico), el historial psiquiátrico es el predictor biológico y clínico más determinante para una recaída o un nuevo episodio durante el puerperio.<br><br>Perla ENARM: \"Los principales factores de riesgo para la depresión posparto es tener antecedente de este trastorno previamente al embarazo, depresión anteriormente y carecer de mecanismos de apoyo eficaces\".<br><br>Análisis de Distractores: Las opciones A, C y D son factores de riesgo reales y documentados en el texto, pero la guía especifica explícitamente que la historia previa de depresión es el antecedente más fuerte y de mayor impacto.", 
                source: "GPC SS-666-21, Prevención, diagnóstico y manejo de la depresión prenatal y posparto en el primer y segundo niveles de atención, 2021, Introducción, Página 9." 
            },
            {
                id: 36, 
                question: "Según la GPC de Infección de Vías Urinarias en el embarazo, ¿cuál es la presentación patológica que amerita indicación absoluta de manejo intrahospitalario y antibiótico intravenoso?", 
                options: ["Pielonefritis aguda", "Cistitis aguda", "Bacteriuria asintomática", "Infección por enterobacteria BLEE"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Infecciones Urinarias en el Embarazo, ante la invasión del tracto superior y el severo riesgo sistémico (choque séptico y SDRA), las formulaciones orales no garantizan picos en la perfusión tisular que reviertan la urosepsis.<br><br>Perla ENARM: \"Pielonefritis. Ertapenem 1 gramo cada 24 horas durante 10-14 días o Ceftriaxona... El tratamiento debe de ser intrahospitalario\".<br><br>Análisis de Distractores: La cistitis y la bacteriuria asintomática son de tratamiento empírico estrictamente ambulatorio con fármacos de concentración urinaria. El hallazgo de BLEE solo dicta que la terapia debe orientarse con antibiograma, no el sitio físico donde el paciente debe estar.", 
                source: "GPC-SS-831-21, Prevención, abordaje y manejo de bacteriuria asintomática e infección de vías urinarias durante el embarazo, 2021, Herramientas, Página 37." 
            },
            {
                id: 37,
                question: "En la Supervisión del Embarazo Normal, ¿cuál es el estudio de laboratorio de primera línea que integra el tamizaje inicial de bacteriuria asintomática según la GPC?",
                options: ["Urocultivo con antibiograma", "Tira reactiva de orina", "Examen general de orina", "Cultivo de exudado vaginal"],
                answer: 2,
                justification: "Justificación: De acuerdo a la GPC de Control Prenatal, toda mujer embarazada debe ser tamizada para identificar infecciones asintomáticas del tracto urinario, ya que su tratamiento disminuye el riesgo de pielonefritis y amenaza de parto pretérmino. Aunque el urocultivo es confirmatorio, el tamizaje inicial a nivel poblacional se realiza de manera accesible con el EGO.<br><br>Perla ENARM: \"Realizar tamizaje para bacteriuria asintomática con Examen General de Orina (EGO) entre las 12 y las 16 semanas de la gestación.\"<br><br>Análisis de Distractores: La tira reactiva de orina (B) tiene una sensibilidad muy baja, especialmente si hay leucorrea, por lo que está contraindicada como tamizaje. El urocultivo (A) es el estándar de oro diagnóstico, pero no el estudio de \"tamizaje\" rutinario inicial mencionado para EGO a las 12-16 semanas. El exudado vaginal (D) tamiza vaginosis, no bacteriuria.",
                source: "GPC IMSS-028-08, Control prenatal con atención centrada en la paciente, 2017, Tamizaje de Patologías, Página 73."
            },
            {
                id: 38, 
                question: "¿Cuál es la intervención rutinaria que predice el mayor riesgo pronóstico de desarrollar endometritis posparto tras el trabajo de parto?", 
                options: ["Revisión manual de cavidad", "Administración de oxitocina intrahospitalaria", "Acompañamiento continuo del parto", "Tacto vaginal cada cuatro horas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Trabajo de parto de bajo riesgo, la revisión manual sistemática posterior al alumbramiento arrastra inóculos bacterianos de la vagina hacia la cavidad uterina estéril, multiplicando drásticamente el riesgo de infección puerperal y endometritis. Por esto, a menos de que se sospeche retención de restos, hipertonía sangrante o histerorrafia previa, su uso está proscrito en pacientes sanas.<br><br>Perla ENARM: Evidencia de un estudio observacional retrospectivo muestra que los principales factores asociados a endometritis posparto fueron: revisión manual de cavidad uterina, por lo que no se aconseja realizarla de forma rutinaria.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 65." 
            },
            {
                id: 39, 
                question: "¿Cuál es el factor de riesgo con mayor asociación para justificar una mastectomía bilateral profiláctica en Cáncer de Mama?", 
                options: ["Edad mayor a 60 años", "Carcinoma ductal in situ", "Uso previo de tamoxifeno", "Alto riesgo de cáncer hereditario"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Tratamiento del Cáncer de Mama, la decisión de realizar una cirugía radical en ambas mamas no se toma a la ligera en cualquier paciente; se reserva específicamente para aquellas con un perfil genético (como mutaciones BRCA) o antecedentes familiares que eleven drásticamente la probabilidad de un segundo tumor primario.<br><br>Perla ENARM: En la persona con alto riesgo de cáncer de mama hereditario puede considerarse la mastectomía bilateral.<br><br>Análisis de Distractores: La edad avanzada (A) o el carcinoma in situ unilateral (B) favorecen el uso de cirugía conservadora. El tamoxifeno (C) es un factor protector que disminuye el riesgo de recurrencia, no una indicación para amputación glandular.", 
                source: "GPC IMSS-232-09, Tratamiento del Cáncer de Mama en Segundo y Tercer Nivel de Atención, 2017, Tratamiento Carcinoma ductal In Situ, Página 38." 
            },
            {
                id: 40, 
                question: "¿Cuál es la escala o sistema de criterios pronósticos utilizado para evaluar el riesgo de recurrencia y que dictamina la necesidad de radioterapia post-quirúrgica en una paciente con Cáncer Cervicouterino temprano?", 
                options: ["Criterios quirúrgicos de Piver", "Escala tomográfica de Balthazar", "Criterios de Sedlis y Peters", "Clasificación de Querleu-Morrow"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Cáncer Cervicouterino, el reporte final de la pieza de histerectomía puede revelar factores de \"riesgo intermedio\" (combinaciones de tamaño, invasión profunda y permeación linfovascular) o de \"alto riesgo\" (márgenes o ganglios positivos). Este ensamble de variables define si es vital consolidar el lecho pélvico con radioterapia externa para prevenir recaídas. \"En pacientes con cáncer cervicouterino en etapa temprana que se trataron de forma inicial con cirugía, el tratamiento adyuvante se debe administrar si los hallazgos histopatológicos presentan factores pronóstico adverso. (Ver Anexo 5.3, Cuadro 3: Grupo de riesgo de recurrencia... Sedlis y Peters)\".<br><br>Análisis de Distractores: Los Criterios de Piver (A) y la Clasificación de Querleu-Morrow (D) no evalúan el riesgo de recurrencia, sino que estratifican el nivel de radicalidad técnica de las histerectomías (ej. Tipo I a V). La escala tomográfica de Balthazar (B) es el índice de severidad inflamatoria utilizado universalmente en casos de pancreatitis aguda, sin relación alguna con el territorio oncológico.", 
                source: "GPC IMSS-333-09, Tratamiento del Cáncer Cervicouterino en Segundo y Tercer nivel de atención, 2017, Indicaciones de adyuvancia después de cirugía, p. 23 y Anexos, p. 48." 
            },
            {
                id: 41, 
                question: "¿Cuál es el factor de riesgo con el mayor nivel de asociación y riesgo para desarrollar Anomalías de la Inserción Placentaria en la gestación actual?", 
                options: ["Cesárea previa", "Edad materna avanzada", "Tabaquismo activo", "Tratamientos de infertilidad"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Anomalías de Inserción Placentaria, el daño endometrial y los procesos de cicatrización aumentan el riesgo de alteraciones en la migración del trofoblasto. Estadísticamente, la manipulación de la cavidad en procesos de fertilización in vitro confiere el mayor nivel de riesgo aislado documentado en la tabla de riesgo.<br><br>Perla ENARM: \"Principales factores de riesgo para alteraciones de la placentación: Tratamientos de infertilidad OR 1.97; IC 95% 1.45–2.66; P < 0.001\".<br><br>Análisis de Distractores: La cesárea previa (Opción A) es fundamental para sospechar acretismo, pero su OR es de 1.76, ligeramente menor. El tabaquismo activo (Opción C) presenta un OR de 1.42 y la edad materna avanzada (Opción B) de 1.08, contribuyendo al riesgo pero en menor magnitud que los métodos de reproducción asistida.", 
                source: "GPC IMSS-589-19, Diagnóstico y manejo de las anomalías en la inserción placentaria y vasa previa, 2019, Cuadros o figuras (Cuadro 2), Página 40." 
            },
            {
                id: 42,
                question: "Aunque no se indica de rutina, ¿qué grupo de paraclínicos refleja tempranamente el riesgo pronóstico y la respuesta al tratamiento en la osteoporosis posmenopáusica?",
                options: ["Niveles de calcio sérico", "Telopéptido sérico C terminal", "Fosfatasa alcalina total sérica", "Vitamina D sérica inactiva"],
                answer: 1,
                justification: "Justificación: De acuerdo a la GPC de Osteoporosis posmenopáusica, los marcadores de recambio (tanto de formación como de resorción) cambian a los pocos meses de iniciado el fármaco, a diferencia de la densitometría que requiere 1 o 2 años.<br><br>Análisis de Distractores: El calcio (opción A) y la vitamina D (opción D) evalúan homeostasis pero no directamente el recambio trabecular específico, mientras que la fosfatasa total (opción C) es inespecífica sin su isoforma ósea.<br><br>Perla ENARM: \"Se han propuesto el propéptido de colágeno tipo I (s-PINP), como marcador de formación, y el telopéptido de colágeno tipo I (s-CTX), como marcador de resorción.\"",
                source: "GPC-IMSS-673-18, Diagnóstico y Tratamiento de Osteoporosis en Mujeres Posmenopáusicas, 2018, Evidencias y Recomendaciones, Página 62."
            },
            {
                id: 43,
                question: "¿Cuál es el factor de riesgo materno con mayor asociación con la Amenaza de Aborto según la GPC?",
                options: [
                    "Obesidad grado III",
                    "Infección de vías urinarias",
                    "Tabaquismo activo intenso",
                    "Edad materna avanzada"
                ],
                answer: 3,
                justification: "Justificación: De acuerdo a la GPC de Amenaza de aborto, la edad materna avanzada tiene la correlación clínica más fuerte con anomalías cromosómicas, causantes del 50 por ciento de las pérdidas tempranas; el riesgo aumenta abruptamente hasta un 80 por ciento a los 45 años.<br><br>Perla ENARM: \"Los factores de riesgo más comunes identificados en las mujeres con perdida temprana del embarazo son: la edad materna avanzada y el antecedente de pérdida temprana del embarazo\".<br><br>Análisis de Distractores: Aunque la obesidad (A) impacta en fertilidad, y el tabaquismo (C) modula el riesgo, la guía enfatiza a la edad materna y el antecedente de pérdida como los determinantes primordiales.",
                source: "GPC-SS-026-20, Prevención, diagnóstico, tratamiento y referencia de la paciente con amenaza de aborto, 2020, Factores de Riesgo, Página 10."
            },
            {
                id: 44, 
                question: "¿Cuál es el factor clínico principal que el ginecólogo debe evaluar rigurosamente antes de decidir realizar ooforectomía profiláctica rutinaria en pacientes premenopáusicas con patología benigna?", 
                options: ["Individualizar riesgo de cáncer", "Presencia de miomatosis uterina", "Riesgo de sangrado transoperatorio", "Antecedente de cirugías previas"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Histerectomía en patología benigna, inducir la menopausia quirúrgica temprana (castración) priva a la mujer bruscamente de protección estrogénica endógena, aumentando significativamente el riesgo a corto y largo plazo de morbimortalidad cardiovascular, deterioro cognitivo y osteoporosis grave, lo cual a menudo supera con creces el beneficio teórico de prevenir un futuro cáncer anexial. Por esto, la decisión nunca es \"de rutina\".<br><br>Perla ENARM: \"No existe suficiente evidencia para emitir una recomendación sobre la realización de ooforectomía en mujeres premenopáusicas, siempre se deberá individualizar tomando en cuenta el riesgo de cada paciente\".<br><br>Análisis de Distractores: La miomatosis (B) y las cirugías previas o adherencias pélvicas (D) condicionan la dificultad técnica del abordaje del anexo, pero no indican médicamente que los ovarios sanos de una mujer joven deban ser sacrificados profilácticamente sin un análisis riguroso de su historia heredofamiliar oncológica o mutaciones genéticas (BRCA).",

            {

                justification: "Justificación: De acuerdo a la GPC de Choque Hemorrágico en Obstetricia, conocer la epidemiología permite prever complicaciones graves. El estado hemodinámico deficiente previo (anemia) y las anomalías de implantación (placenta previa) conforman el escenario de más alto riesgo perioperatorio.<br><br>Perla ENARM: \"Un estudio prospectivo... demostró, que la anemia preoperatoria (hematrocrito <25%), la anestesia general y placenta previa, aumentan la posibilidad de transfusión en pacientes sometidas a nacimiento por operación cesárea\".<br><br>Análisis de Distractores: La macrosomía (A), preeclampsia (B) y el parto rápido (D) son factores de riesgo conocidos para atonía uterina, pero la guía resalta estadísticamente a la placenta previa y la anemia como los principales disparadores independientes de requerimiento transfusional en cesárea.",

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('Exagyo50Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('Exagyo50LastQId', currentQuestionId);
                else localStorage.removeItem('Exagyo50LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('Exagyo50Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    onAuthStateChanged(auth, async (user) => {

            if(userDocSnap.exists()) {
                document.body.style.opacity = '1';
            } else {
                window.location.href = "index.html"; 
            }
        } else {
            window.location.href = "index.html";
        }
    });
</script>
