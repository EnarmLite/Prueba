    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es la mediana de edad de diagnóstico en meses reportada para los pacientes con retinoblastoma bilateral?",
        options: ["14", "28", "23", "12"],
        answer: 0,
        justification: "Justificación: De acuerdo al PRONAM de retinoblastoma, el tiempo de presentación clínica guarda una estrecha correlación con la etiología y lateralidad del tumor. El retinoblastoma bilateral, que en su mayoría corresponde a la forma hereditaria con un primer golpe germinal y mutación de novo, se manifiesta en edades más tempranas debido a la predisposición genética subyacente. La edad media de diagnóstico general es a los 2 años, sin embargo, al estratificar por lateralidad, la mediana se establece en 28 meses para casos unilaterales y en 14 meses para los bilaterales.<br><br>Perla ENARM: \"Una edad media de diagnóstico de 28 meses para retinoblastoma unilateral y 14 meses para retinoblastoma bilateral.\"<br><br>Análisis de Distractores: 28 meses es la mediana de presentación para la enfermedad unilateral esporádica, donde se requiere la acumulación temporal de dos mutaciones somáticas. 23 meses es la edad de corte promediada en algunas literaturas de países de altos ingresos, pero no corresponde al valor numérico preciso del documento para enfermedad bilateral. 12 meses es el corte etario donde cambia el síntoma principal (estrabismo a leucocoria), pero no es la mediana estadística de diagnóstico bilateral.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Datos clínicos, Página 3."
    },
    {
        id: 2,
        question: "¿Cuál es la manifestación clínica de presentación inicial más frecuente en pacientes menores de 1 año con retinoblastoma?",
        options: ["Glaucoma neovascular", "Leucocoria", "Estrabismo", "Buftalmos"],
        answer: 2,
        justification: "Justificación: La sintomatología cardinal del retinoblastoma varía en función de la edad anatómica del globo ocular y la progresión del tumor. De acuerdo al PRONAM de retinoblastoma, aunque la leucocoria es el signo clínico más frecuente a nivel global (56%) y en México (79.3%), cuando se estratifica a la población menor a un año de edad, la pérdida de la fijación visual por involucro macular genera estrabismo como manifestación principal y más precoz.<br><br>Perla ENARM: \"Las manifestaciones clínicas son similares en todos los grupos de edad, sin embargo, en pacientes menores de 1 año es más común que el síntoma principal sea estrabismo, a diferencia de los mayores de 1 año, en los que el síntoma principal es la leucocoria.\"<br><br>Análisis de Distractores: El glaucoma neovascular indica enfermedad ocular extensa (estadio E de la ICRB) por isquemia intraocular crónica, presentándose en etapas avanzadas (7%), no como signo inicial. La leucocoria es el signo principal, pero en los niños mayores de 1 año, donde el reflejo pupilar es más evidente para los padres al tomar fotografías con flash. El buftalmos forma parte del síndrome orbitario extraocular crónico, indicando tumor masivo que altera la presión intraocular y deforma la esclerótica elástica del lactante.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Datos clínicos, Página 2."
    },
    {
        id: 3,
        question: "¿Cuál es la alteración genética reportada hasta en el 5% de los pacientes con retinoblastoma que no presentan mutación clásica en el gen RB1?",
        options: ["Deleción del cromosoma 13q", "Trimetilación de histonas H3K4", "Amplificación del oncogén N-myc", "Mutación del oncogén SYK"],
        answer: 2,
        justification: "Justificación: La fisiopatología molecular del retinoblastoma trasciende el clásico modelo del \"doble golpe\" propuesto por Knudson. De acuerdo al PRONAM de retinoblastoma, la inactivación bialélica de RB1 es necesaria pero a menudo insuficiente para la malignidad pura (desarrollando solo retinomas benignos sin mutaciones adicionales). Sin embargo, existe un subgrupo clínico muy particular donde las pruebas moleculares de alta sensibilidad dictaminan alelos RB1 completamente normales. En estos pacientes, el evento desencadenante de la oncogénesis recae de forma exclusiva y agresiva en la amplificación del oncogén N-myc.<br><br>Perla ENARM: \"En los casos donde no se identifica la mutación del gen RB1, se ha reportado la amplificación del gen N-myc, lo cual ocurre en hasta el 5% de los casos.\"<br><br>Análisis de Distractores: La deleción del cromosoma 13q es la causa de un síndrome genético que incluye la pérdida del gen RB1 (localizado en 13q14), cursando con fenotipo dismórfico. La trimetilación H3K4 es un evento epigenético secundario que acompaña a la mutación RB1 para que progrese a malignidad plena, no una vía aislada. La expresión alterna del oncogén SYK también requiere como prerrequisito la pérdida de la función de RB1 para inducir la transformación celular retiniana.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Genética en el retinoblastoma, Página 1."
    },
    {
        id: 4,
        question: "¿Cuál es el estudio de imagen más sensible e indispensable para evaluar de manera integral la extensión tumoral extraocular al nervio óptico y extensión intracraneal?",
        options: ["Tomografía axial computarizada", "Tomografía por emisión de positrones", "Ultrasonido ocular modo B", "Resonancia magnética de órbitas"],
        answer: 3,
        justification: "Justificación: La estadificación por imagen es un pilar decisivo entre el rescate del globo ocular o la enucleación. De acuerdo al PRONAM de retinoblastoma, el estudio gold standard para determinar con exactitud la infiltración a tejidos blandos, compromiso de los planos retrobulbares y diseminación leptomeníngea es la resonancia magnética en secuencias simple y contrastada bajo sedación. Su alta resolución de contraste de tejidos blandos supera a cualquier otra modalidad para detectar diseminación a lo largo del trayecto del nervio óptico.<br><br>Perla ENARM: \"En todos los casos se deberá realizar resonancia magnética de órbitas, simple y contrastada; descrito como el método más sensible para evaluar la posibilidad de extensión del tumor de manera extraocular a tejidos blandos, así como la extensión de la enfermedad al nervio óptico ipsilateral y la extensión intracraneal.\"<br><br>Análisis de Distractores: La tomografía axial computarizada expone al paciente pediátrico a radiación ionizante (peligroso en pacientes con mutación RB1) y tiene menor sensibilidad para diferenciar tejidos blandos del nervio óptico. La tomografía por emisión de positrones (PET/CT) se reserva exclusivamente para abordar sospecha de infiltración hematógena o extensión hepática en enfermedad diseminada. El ultrasonido ocular es excelente para evaluar las calcificaciones intratumorales intraoculares y sombras acústicas al momento del diagnóstico clínico, pero inútil para la vía retrobulbar e intracraneal.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Diagnóstico, Página 3."
    },
    {
        id: 5,
        question: "¿En qué escenario clínico es indispensable incluir la consolidación con trasplante de células progenitoras hematopoyéticas dentro del abordaje terapéutico inicial?",
        options: ["Invasión poslaminar del nervio óptico", "Retinoblastoma intraocular bilateral", "Enfermedad orbitaria recurrente", "Enfermedad metastásica confirmada"],
        answer: 3,
        justification: "Justificación: El manejo terapéutico del retinoblastoma escala en agresividad según el nivel de diseminación. De acuerdo al PRONAM de retinoblastoma, cuando las células tumorales sobrepasan las barreras orbitarias, la quimioterapia convencional resulta insuficiente para garantizar la supervivencia a largo plazo. Por ende, la enfermedad en estadios hematógenos, óseos o del sistema nervioso central requiere el protocolo COG ARET 0321, el cual impone inducción sistémica intensiva seguida ineludiblemente por mieloablación y consolidación mediante trasplante de células progenitoras.<br><br>Perla ENARM: \"El tratamiento deberá incluir trasplante de células progenitoras hematopoyéticas cuando se trate de enfermedad metastásica.\"<br><br>Análisis de Distractores: La invasión poslaminar del nervio óptico (Estadio E enucleado con factores de alto riesgo) indica adyuvancia con 4 a 6 ciclos de quimioterapia VCE, no trasplante. La enfermedad intraocular bilateral (estadios B, C, D) se maneja con 6 ciclos de quimioterapia sistémica sustituyendo etopósido por ciclofosfamida al tercer mes, más terapia local. La enfermedad orbitaria extraocular (no metastásica) exige neoadyuvancia con ICE por 4 ciclos, enucleación al segundo ciclo y radioterapia local (45 Gy), el trasplante no es de primera línea.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento, Página 9."
    },
    {
        id: 6,
        question: "Según la Clasificación Internacional de Retinoblastoma Intraocular (ICRB), ¿qué criterio clínico categoriza directamente a la neoplasia dentro del grupo E de muy alto riesgo?",
        options: ["Siembras subretinianas localizadas menores a 3 mm", "Localización tumoral yuxtapapilar a 1.5 mm del disco", "Ocupación tumoral mayor al 50% de la cavidad vítrea", "Presencia de siembras vítreas difusas mayores a 3 mm"],
        answer: 2,
        justification: "Justificación: La ICRB estratifica los ojos desde lesiones pequeñas factibles de terapia focal láser (Grupo A) hasta ojos irreparables (Grupo E). De acuerdo al PRONAM de retinoblastoma, un ojo entra a la categoría de riesgo máximo \"E\" (extenso) ante la presencia de destrucción de la anatomía intraocular y nula probabilidad de conservar la función visual, lo cual incluye invasión masiva de la cavidad vítrea (>50%), neovascularización difusa (glaucoma), hifema no traumático o invasión al nervio óptico, obligando invariablemente a la enucleación primaria.<br><br>Perla ENARM: \"Grupo E Retinoblastoma extenso: Extenso retinoblastoma que ocupa >50% de la cavidad vítrea ó Glaucoma neovascular, medio opaco proveniente de hemorragia de cámara anterior, vítreo o espacio subretiniano ó Invasión post laminar del nervio óptico.\"<br><br>Análisis de Distractores: Las siembras menores a 3 mm (localizadas) son el criterio exacto que define a la enfermedad intraocular Grupo C. La localización yuxtapapilar (<1.5 mm) o macular (<3 mm de la fóvea) eleva una lesión pequeña a riesgo visual inminente, catalogándola como Grupo B. Las siembras difusas mayores a 3 mm que flotan en el vítreo o espacio subretiniano caracterizan a los pacientes del Grupo D.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Sistemas de estadificación, Página 5."
    },
    {
        id: 7,
        question: "¿Cuál es la segunda neoplasia maligna que desarrollan con mayor frecuencia los supervivientes portadores de retinoblastoma en su forma hereditaria?",
        options: ["Leucemia linfoblástica aguda", "Melanoma cutáneo", "Osteosarcoma", "Sarcoma de tejidos blandos"],
        answer: 2,
        justification: "Justificación: La mutación constitucional del gen RB1, responsable del retinoblastoma hereditario (usualmente bilateral), suprime un punto de control maestro del ciclo celular indispensable no solo en la retina, sino en múltiples tejidos mesenquimales. De acuerdo al PRONAM de retinoblastoma, los sobrevivientes se enfrentan a un riesgo genético de por vida de padecer tumores no oculares, siendo el cáncer óseo el más letal y frecuente, por lo cual se exige seguimiento oncológico continuo estricto.<br><br>Perla ENARM: \"Los pacientes que tienen diagnóstico de retinoblastoma hereditario, tienen un riesgo elevado de desarrollo de segundas neoplasias. Las más comunes reportadas son: osteosarcoma hasta en un 30% de los pacientes, sarcomas de tejidos blandos y melanoma.\"<br><br>Análisis de Distractores: Las leucemias no forman parte del espectro fenotípico tumoral derivado directamente por la supresión del gen RB1 a largo plazo. El melanoma ocupa el tercer lugar de riesgo genético tras la pérdida somática concurrente del segundo alelo en melanocitos expuestos. Los sarcomas de tejidos blandos representan la segunda neoplasia secundaria en incidencia, por detrás del desarrollo de hueso maligno.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Seguimiento en pacientes, Página 19."
    },
    {
        id: 8,
        question: "En el manejo sistémico del retinoblastoma intraocular bilateral, ¿qué fármaco se introduce en sustitución del etopósido posterior al tercer ciclo de tratamiento?",
        options: ["Ciclofosfamida", "Cisplatino", "Ifosfamida", "Doxorubicina"],
        answer: 0,
        justification: "Justificación: La preservación ocular dual requiere inducción médica intensa con balance estricto de morbilidad. De acuerdo al PRONAM de retinoblastoma, los pacientes con afectación sincrónica inician el esquema VCE (Vincristina, Carboplatino y Etopósido) por un total de 6 ciclos. Sin embargo, para minimizar el riesgo acumulativo de malignidad secundaria inducida por los inhibidores de topoisomerasa (etopósido) en un terreno genéticamente predispuesto, se realiza el cambio de la plataforma farmacológica a la mitad de los cursos terapéuticos utilizando un agente alquilante no neurotóxico directo.<br><br>Perla ENARM: \"Posterior a tercer curso, el Etopósido será sustituido por Ciclofosfamida 300 mg/m²/do D1.\"<br><br>Análisis de Distractores: El cisplatino conforma el esquema de inducción intensiva (COG ARET 0321) reservado para estadios metastásicos, debido a su severa ototoxicidad demostrada. La ifosfamida es parte del esquema neoadyuvante ICE utilizado estrictamente frente a enfermedad extraocular confinada a la órbita anatómica, no en enfermedad intraocular bilateral. La doxorubicina no forma parte de la primera o segunda línea de abordaje estandarizado dentro de los regímenes quimioterapéuticos oncológicos para esta patología según el protocolo vigente.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento, Página 11."
    },
    {
        id: 9,
        question: "¿Qué variedad de tumor primitivo neuroectodérmico caracteriza de forma típica y sincrónica al síndrome de retinoblastoma trilateral?",
        options: ["Meduloblastoma", "Ependimoma supratentorial", "Astrocitoma pilocítico", "Pineoblastoma"],
        answer: 3,
        justification: "Justificación: El tejido de la glándula pineal comparte profundas homologías embrionarias y fotorreceptoras con la retina neural. De acuerdo al PRONAM de retinoblastoma, el retinoblastoma trilateral afecta hasta el 4% de los portadores de mutaciones germinales (bilaterales), manifestándose como una neoplasia de línea media histológicamente idéntica al tumor retiniano primario pero de localización intracraneal asintomática en estadios tempranos, lo que fundamenta el escrutinio periódico del neuroeje en este subgrupo particular de niños.<br><br>Perla ENARM: \"Existe el retinoblastoma trilateral, caracterizado por la aparición de un tumor neuroectodérmico intracraneal (generalmente pineoblastoma) en un paciente con retinoblastoma bilateral, con una incidencia aproximada del 4%.\"<br><br>Análisis de Distractores: El meduloblastoma es un PNET infratentorial cerebeloso, pero carece de asociación directa con las mutaciones mendelianas de la proteína supresora retiniana. El ependimoma se deriva de las células ependimales ventriculares, cursando sin correlación con el tejido fotorreceptor retiniano. El astrocitoma es un tumor glial de bajo grado que carece de origen embrionario neuroectodérmico indiferenciado.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Genética y lateralidad, Página 2."
    },
    {
        id: 10,
        question: "¿Cuáles son los tres componentes metodológicos que debe incluir de forma obligatoria la exploración oftalmológica bajo anestesia (EBA)?",
        options: ["Campimetría visual, biomicroscopia y prueba de refracción", "Agudeza visual, oftalmoscopia directa y gonioscopia", "Tomografía de coherencia, tonometría y fondo de ojo", "Tonometría, lámpara de hendidura y oftalmoscopia indirecta"],
        answer: 3,
        justification: "Justificación: El diagnóstico y estadificación primarios requieren inmovilidad total del paciente pediátrico para asegurar un mapeo completo de la ora serrata en los 360 grados sin puntos ciegos. De acuerdo al PRONAM de retinoblastoma, todos los casos deben ser sometidos a EBA en quirófano de manera protocolizada para determinar invasión a cámara anterior (lámpara), descartar glaucoma hipertensivo neovascular (tonometría) y contabilizar el número y margen de las siembras tumorigénicas periféricas (oftalmoscopia indirecta profunda).<br><br>Perla ENARM: \"Todas las niñas, niños y adolescentes deben someterse a una exploración bajo anestesia con profesionales especializados en oftalmología pediátrica, que incluya tonometría, examen con lámpara de hendidura y oftalmoscopia indirecta.\"<br><br>Análisis de Distractores: La campimetría y refracción requieren colaboración cognitiva del paciente despierto, siendo imposibles bajo anestesia general y clínicamente irrelevantes en la estadificación aguda del cáncer intraocular. La oftalmoscopia directa no ofrece campo visual suficiente (solo 15 grados) para visualizar la retina periférica, punto anatómico donde ocurren siembras y focos múltiples letales. La tomografía de coherencia óptica (OCT) se utiliza como estudio auxiliar avanzado ambulatorio, pero no sustituye al estándar de oro presencial de los tres pasos clínicos mandatorios de la EBA.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Sistemas de estadificación, Página 4."
    },
    {
        id: 11,
        question: "En el paciente con enfermedad confinada a la órbita (extraocular orbitario) tratado con protocolo neoadyuvante ICE, ¿en qué momento exacto está indicada la enucleación del globo ocular?",
        options: ["Previo al primer ciclo de quimioterapia", "Al finalizar el cuarto ciclo de inducción", "Posterior al segundo ciclo de quimioterapia", "Después de terminar el rescate hematopoyético"],
        answer: 2,
        justification: "Justificación: La invasión de las estructuras de la órbita requiere control de la micrometástasis hematógena previa a la remoción mecánica y un encogimiento tumoral que asegure márgenes limpios. De acuerdo al PRONAM de retinoblastoma, la resección quirúrgica masiva de inicio está proscrita ante infiltración tisular. Se administran 4 ciclos totales del esquema ICE (Ifosfamida, Carboplatino, Etopósido), intercalando el procedimiento quirúrgico de enucleación radical exactamente a la mitad del régimen citotóxico (segundo ciclo), rematando con radioterapia al cierre sistémico.<br><br>Perla ENARM: \"Retinoblastoma orbitario: Se utilizará protocolo a base de Ifosfamida, Carboplatino y Etopósido, 4 cursos totales [...] posterior a los primeros dos cursos de quimioterapia sistémica se debe programar enucleación.\"<br><br>Análisis de Distractores: La resección primaria sin control del borde peritumoral orbitario condiciona un índice catastrófico de siembra neoplásica sistémica perioperatoria y recaída inminente intraorbitaria. Retrasar la extirpación quirúrgica de la masa primaria hasta finalizar todo el tratamiento (ciclo 4) fomenta la aparición de focos clónales quimiorresistentes in situ e incrementa toxicidad adyuvante. El TCPH (trasplante) es un arma terapéutica exclusiva de los estadios metastásicos a distancia (COG ARET 0321) y no tiene indicación formal en la enfermedad locoregional orbitaria en primera línea.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento extra ocular, Página 12."
    },
    {
        id: 12,
        question: "¿Cuál es la tasa de supervivencia global a 5 años documentada epidemiológicamente para los pacientes diagnosticados con retinoblastoma en México?",
        options: ["85%", "70%", "95%", "50%"],
        answer: 0,
        justification: "Justificación: A pesar de ser altamente curable (>95% en naciones de primer mundo), las disparidades en los sistemas de salud marcan una brecha pronóstica importante. De acuerdo al PRONAM de retinoblastoma, casi la mitad (47%) de los casos pediátricos mexicanos debutan en estadios extraoculares o avanzados D/E debido a retrasos en la referencia y falta de tamizaje ocular rutinario, lo que disminuye el éxito sistémico limitando el porcentaje de curación en nuestra población comparado a las cifras óptimas internacionales.<br><br>Perla ENARM: \"La supervivencia global a 5 años en México, se estima en un 85%, con tasas de mortalidad reportadas entre el 9.1% y el 16%. Estas cifras son comparables a las de otros centros de referencia en Latinoamérica.\"<br><br>Análisis de Distractores: 70% refleja estadísticas históricas de mortalidad sin protocolos unificados intraarteriales, pero no las tasas de centros pediátricos referenciales actualizados a nivel nacional en la última década. 95% es la supervivencia de excelencia exclusiva de países de altos ingresos con sistemas de atención médica oftalmológica temprana. 50% es el margen de salvamento ocular anatómico (preservación del globo) reportado en naciones de primer mundo, no la tasa de supervivencia global del individuo.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Epidemiología, Página 1."
    },
    {
        id: 13,
        question: "¿Qué fenotipo clínico dismórfico caracteriza clásicamente el desarrollo de retinoblastoma asociado al síndrome de deleción 13q?",
        options: ["Lóbulos auriculares antevertidos, frente prominente y retraso mental", "Microcefalia severa, labio paladar hendido y micrognatia", "Clinodactilia de quinto dedo, cuello alado y epicanto bilateral", "Implantación baja de cabello, macroglosia y hemihipertrofia"],
        answer: 0,
        justification: "Justificación: En un porcentaje minúsculo de infantes, el retinoblastoma no es una entidad aislada sino la manifestación patognomónica de una anomalía cromosómica masiva contigua. De acuerdo al PRONAM de retinoblastoma, cuando un niño hereda la macrodeleción del brazo largo del cromosoma 13 que amputa múltiples loci adyacentes al gen RB1, exhibe alteraciones graves del desarrollo neurocognitivo y facial detectables clínicamente en el consultorio desde el nacimiento previo al deterioro oftalmológico.<br><br>Perla ENARM: \"Cuando el retinoblastoma se encuentra asociado al síndrome de deleción 13q, se presentan características dismórficas como lóbulos auriculares antevertidos, frente prominente y retraso mental grave.\"<br><br>Análisis de Distractores: El paladar hendido y microcefalia orientan a trisomía 13 (Síndrome de Patau), entidad cromosómica fatal a corto plazo que no es sinónimo clínico de la deleción 13q14 localizada. El cuello alado y epicanto integran parte del espectro clínico del Síndrome de Turner (45,X) o de mutaciones en vía RAS (Síndrome de Noonan). La macroglosia y hemihipertrofia corporal son hallazgos cardinales del Síndrome de Beckwith-Wiedemann, que predispone clásicamente al desarrollo de Tumor de Wilms y Hepatoblastoma, no neoplasia retiniana.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Datos clínicos, Página 3."
    },
    {
        id: 14,
        question: "Durante la evaluación ultrasonográfica, ¿qué patrón de invasión intraocular se origina en las capas externas retinianas y causa desprendimiento con exudado?",
        options: ["Endofítico", "Nodular", "Exofítico", "Difuso"],
        answer: 2,
        justification: "Justificación: El tejido fotorreceptor se compone de diversas láminas celulares que dictan el comportamiento macroscópico y quirúrgico de la masa tumoral en el USG modo B. De acuerdo al PRONAM de retinoblastoma, los tumores de crecimiento exofítico tienen su génesis en los fotorreceptores profundos adyacentes a la coroides, por lo cual, al ganar volumen, empujan la integridad retiniana despegándola del epitelio pigmentario, formando un desprendimiento exudativo rico en proteínas que a menudo obstaculiza la visualización directa en la EBA.<br><br>Perla ENARM: \"Los tumores exofíticos se originan en las capas externas y crecen en el espacio subretiniano, lo que provoca un desprendimiento de retina con exudado subretiniano y provoca la siembra de tumores subretinianos.\"<br><br>Análisis de Distractores: El patrón endofítico emana desde la superficie interna retiniana, rompiendo la barrera limitante hacia el cuerpo vítreo libre, donde genera fragmentación celular y siembras flotantes indolentes. El crecimiento nodular describe descripciones genéricas macroscópicas, no es la definición tomográfica ni anatómica técnica del pronóstico del tumor primario. El retinoblastoma infiltrante difuso es una variante atípica rara en niños mayores de 5 años que crece como placas planas en la retina sin masa evidente, simulando falsamente síndromes inflamatorios ucrónicos (uveítis).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Diagnóstico, Página 3."
    },
    {
        id: 15,
        question: "En pacientes sometidos a quimioterapia para retinoblastoma metastásico, ¿qué criterio clínico neurológico obliga a realizar el cambio al esquema de inducción alterna?",
        options: ["Neuropatía periférica distal ascendente mayor a grado 3", "Pérdida de audición mayor a 20 decibeles de 400-500 Hz", "Aparición de crisis convulsivas tónico clónicas focales", "Alteración de la tasa de filtrado glomerular a menos del 50%"],
        answer: 1,
        justification: "Justificación: El régimen ARET 0321 para curar metástasis incluye cisplatino a altas dosis. De acuerdo al PRONAM de retinoblastoma, esta molécula tiene toxicidad irreversible directa sobre las células ciliadas del órgano de Corti pediátrico inmaduro. En niños en edad de adquisición del lenguaje, la sordera bilateral representa una discapacidad mayor, por lo que el monitoreo audiológico periódico es mandatario; si el daño se objetiva, el cisplatino se suspende en los ciclos 3 y 4 siendo reemplazado por carboplatino.<br><br>Perla ENARM: \"En caso de presentar las siguientes características se administrará la inducción alterna: Paciente con pérdida de la audición mayor o igual a 20 Db a 400-500 Hz en cualquier oído posterior a la administración de cisplatino.\"<br><br>Análisis de Distractores: La neuropatía periférica es un efecto tóxico intrínseco de la vincristina (incluida en todos los ciclos), cuya dosificación se ajusta, pero no constituye el criterio formal del documento para \"inducción alterna\" de platino. Las crisis convulsivas representan diseminación letal tumoral activa leptomeníngea o neurotoxicidad letal, no un criterio predefinido programático para atenuar platinos por inducción alterna. La nefrotoxicidad tubular exige mitigación de daño y ajuste de diuresis, pero la inducción alterna estandarizada por el COG responde exclusivamente al fracaso otológico.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento metastásico, Página 13."
    },
    {
        id: 16,
        question: "Posterior a la enucleación primaria por retinoblastoma unilateral estadio E, ¿qué factor patológico específico fundamenta la administración posterior de quimioterapia sistémica adyuvante?",
        options: ["Compromiso intralaminar focal de la papila óptica", "Afección de esclera en dos tercios de su espesor", "Presencia de tumor neuroectodérmico sincrónico", "Invasión celular confinada a la cámara anterior vítrea"],
        answer: 1,
        justification: "Justificación: Extraer un globo ocular categoría E elimina la masa macroscópica, pero el análisis del patólogo revela si existieron puentes biológicos de microinfiltración locoregional. De acuerdo al PRONAM de retinoblastoma, los pacientes con invasión intraescleral profunda (2/3 sin alcanzar la epiesclera), invasión masiva de la coroides mayor a 3 mm o infiltración de la lámina cribosa poslaminar tienen el riesgo inminente de desarrollar recidiva orbitaria letal. En consecuencia, están obligados a recibir entre 4 y 6 ciclos profilácticos agresivos del esquema sistémico profiláctico VCE.<br><br>Perla ENARM: \"Se deberá analizar la presencia de factores de alto riesgo histopatológico para recaída: Afección de esclera en 2/3 del espesor, sin afección de epiesclera [...] se deberá valorar la administración de 4-6 cursos de quimioterapia sistémica.\"<br><br>Análisis de Distractores: El compromiso estrictamente prelaminar o intralaminar de la papila no traspasa la lámina cribosa y se clasifica de bajo riesgo pT1/pT2, curado exclusivamente con el acto quirúrgico sin requerir toxicidad sistémica. La presentación de un tumor neuroectodérmico intracraneal (pineoblastoma) es retinoblastoma trilateral, entidad sistémica letal que no depende de las capas histopatológicas esclerales del ojo enucleado. La ocupación vítrea anterior extensa define al Grupo E clínico que obligó a enuclear el globo, pero en sí misma no indica adyuvancia si la esclera o nervio están histológicamente libres e indemnes de invasión.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento intraocular, Página 10."
    },
    {
        id: 17,
        question: "En el algoritmo de etapificación por imagen del paciente pediátrico, ¿ante qué sospecha diagnóstica extraocular está indicado realizar la tomografía por emisión de positrones con FDG (PET/CT)?",
        options: ["Tumor intraocular localizado yuxtapapilar", "Diseminación a líquido cefalorraquídeo", "Metástasis exclusivas al tejido óseo", "Sospecha de enfermedad metastásica a hígado"],
        answer: 3,
        justification: "Justificación: La extensión hematógena silenciosa marca un pronóstico sombrío e impone esquemas de consolidación ablativa y TCPH desde el día cero. De acuerdo al PRONAM de retinoblastoma, mientras el gamagrama óseo abarca adecuadamente el estatus esquelético periférico y la RMN de neuroeje escanea metástasis leptomeníngeas de LCR, la búsqueda metabólica de alta precisión con un radiotrazador de glucosa PET/CT se reserva de forma estrictamente justificada para la evaluación funcional invasiva de parénquima profundo como el tejido hepático.<br><br>Perla ENARM: \"Gamagrama óseo y en caso de sospechar no solo metástasis óseas sino también a hígado se deberá realizar PET/CT con FDG.\"<br><br>Análisis de Distractores: La tumoración yuxtapapilar confinada representa enfermedad ICRB Grupo B, abordada meramente con RMN orbitaria basal simple y contrastada de protocolo primario. La invasión al sistema ventricular leptomeníngeo obliga al análisis citológico por punción lumbar diagnóstica y RMN con gadolinio de neuroeje, no a rastreo por positrones hepáticos. La afectación metastásica ósea exclusiva y estándar se diagnostica primero mediante gamagrama óseo convencional y biopsia de cresta ilíaca bilateral (médula ósea).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Estudios de extensión requeridos, Página 4."
    },
    {
        id: 18,
        question: "Según la Clasificación Internacional de Retinoblastoma Intraocular (ICRB), ¿cuál es el margen cuantitativo de líquido subretiniano máximo permitido para considerar a un tumor dentro del grupo B?",
        options: ["Menor a 3 mm del margen tumoral", "Mayor a 3 mm del margen tumoral", "Menor a 1.5 mm de la lámina cribosa", "Ocupación mayor al 50% de la cavidad vítrea"],
        answer: 0,
        justification: "Justificación: El grupo B delinea las lesiones oculares que sobrepasan el tamaño trivial pero mantienen su confinamiento anatómico altamente recuperable mediante preservación del ojo. De acuerdo al PRONAM de retinoblastoma, un tumor entra en la categoría B si excede los 3 mm de volumen, si amenaza la funcionalidad visual de la fóvea o de la cabeza del nervio (yuxtapapilar <1.5 mm), o si el desprendimiento exudativo inicial (líquido subretiniano) no rebasa los 3 mm de distancia visible contados desde el margen físico estricto de la base anatómica de la masa neoplásica.<br><br>Perla ENARM: \"Grupo B: Líquido claro subretiniano < 3 mm del margen.\"<br><br>Análisis de Distractores: Si el líquido subretiniano es masivo o presenta siembras tumorales exofíticas satélites que exceden la barrera dimensional de los 3 mm alejados del cuerpo principal, clasifica inmediatamente a la enfermedad como estadios superiores avanzados difusos (C y D). El diámetro de 1.5 milímetros se utiliza estadísticamente como perímetro limítrofe radiológico para lesiones yuxtapapilares (cercanía a la inserción del nervio o disco). La destrucción masiva y un volumen ocupante >50% representan el estadio final intraocular terminal (Grupo E) de alta indicación para cirugía ablativa (enucleación).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Sistemas de estadificación, Página 5."
    },
    {
        id: 19,
        question: "¿Cuál es la periodicidad de control por imagen de la resonancia magnética de órbitas indicada estrictamente durante el primer año de seguimiento de los pacientes sobrevivientes de estadios extraoculares?",
        options: ["Cada 3 meses", "Cada 4 meses", "Cada 6 meses", "De forma anual"],
        answer: 0,
        justification: "Justificación: La agresividad y capacidad clónogenica celular del retinoblastoma sistémico exigen vigilancia radiológica de ventana muy estrecha durante la fase de máximo riesgo de recaída temprana. De acuerdo al PRONAM de retinoblastoma, a diferencia de la enfermedad confinada y removida con éxito (Estadios enucleados oculares) que se vigila cada 4 meses, los pacientes de muy alto riesgo extraocular son citados obligatoriamente a escáner de resonancia cada 3 meses ininterrumpidos para interceptar infiltración de partes blandas o progresión fatal leptomeníngea periórbita de manera precoz en su primer año de gracia.<br><br>Perla ENARM: \"En el caso de estadios extra oculares se realizará RMN de órbitas cada 3 meses el primer año de vigilancia, posteriormente cada 4 meses el segundo año de vigilancia, cada 6 meses el tercer año de vigilancia y finalmente anual hasta cumplir 5 años de vigilancia.\"<br><br>Análisis de Distractores: Realizar imagen de escrutinio cada 4 meses es la indicación inicial para el grupo con un tumor intraocular masivo intraorbitario enucleado pT3 pero sin infiltración de diseminación (Estadio retinoblastoma ocular de alto riesgo). Espaciar el mapeo neuroimagenológico cada 6 meses es permitido de forma paulatina para el tercer año de supervivencia de enfermedad extraocular o al segundo año intraocular. El seguimiento anual se instituye exclusivamente hasta que el infante supera su vigilancia crítica trimestral intensiva (tras el cuarto o quinto año de consolidación negativa para focos oncológicos).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Seguimiento en pacientes, Página 19."
    },
    {
        id: 20,
        question: "En el tratamiento definitivo del paciente portador de retinoblastoma extraocular orbitario no metastásico, ¿cuál es la dosis fraccionada de consolidación de radioterapia indicada tras finalizar su quimioterapia sistémica?",
        options: ["36 Gy", "50.4 Gy", "45 Gy", "25 Gy"],
        answer: 2,
        justification: "Justificación: Las celdillas de la grasa orbitaria y los músculos extraoculares albergan restos tumorales remanentes después de extirpar el globo principal. De acuerdo al PRONAM de retinoblastoma, el protocolo curativo impone irradiar con acelerador lineal el lecho enucleado de las cuencas orbitarias comprometidas dentro de los primeros 42 días críticos del fin del régimen (ICE). Se debe esterilizar el sitio mediante radioterapia externa profunda sumando un total objetivo estandarizado de 45 Grays locales biológicos, impidiendo la reactivación intracavitaria.<br><br>Perla ENARM: \"Posterior a los 4 cursos de quimioterapia se administrará Radioterapia. La radioterapia se deberá iniciar dentro de los 42 días posteriores al inicio del cuarto ciclo de quimioterapia. La dosis a administrar será de 45 Gy.\"<br><br>Análisis de Distractores: La dosis de 36 Gy está reservada estrictamente en enfermedad diseminada sistémicamente, como irradiación de rescate paliativo curativo para neuroeje y cordón de la médula espinal. La dosimetría intensificada de 50.4 Grays se aplica a tumores intraaxiales resistentes de tejido profundo, como las metástasis glandulares específicas a localización de la glándula pineal. La cifra reducida de 25 Gy carece de dosis letal tumoricida completa (DL) en radioncología oncopediátrica formal contra masas esclerales orbitarias o clones agresivos RB1 suprimidos.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Retinoblastoma estadio extra ocular, Página 12."
    },
    {
        id: 21,
        question: "¿Qué porcentaje de los pacientes pediátricos diagnosticados con retinoblastoma en México se presenta en estadios clínicos avanzados?",
        options: ["25%", "88%", "47%", "15%"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de retinoblastoma, la epidemiología nacional exhibe una marcada disparidad en la detección oportuna frente a países de altos ingresos. Se documenta que casi la mitad de la población pediátrica mexicana es diagnosticada de forma tardía, impactando severamente el pronóstico de supervivencia y preservación ocular.<br><br>Perla ENARM: \"En un porcentaje significativo de los casos (aproximadamente 47%), se observa una edad de presentación más tardía y un diagnóstico en estadios avanzados.\"<br><br>Análisis de Distractores: 25% es la proporción de pacientes que manifiestan la enfermedad de forma bilateral y hereditaria del total de casos. 88% corresponde al porcentaje de retinoblastomas unilaterales que se detectan en estadios D o E porque el ojo contralateral sano enmascara el déficit visual. 15% representa la incidencia de casos unilaterales que tienen un origen genético hereditario (mutación germinal).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Epidemiología, Página 5."
    },
    {
        id: 22,
        question: "En la etiología general del retinoblastoma, ¿cuál es la presentación clínica predominante que conforma la mayor proporción de los casos totales?",
        options: ["Bilateral hereditario", "Unilateral hereditario", "Trilateral sincrónico", "Unilateral esporádico"],
        answer: 3,
        justification: "Justificación: De acuerdo al PRONAM de retinoblastoma, la distribución etiológica de esta patología demuestra que la mayoría absoluta de los tumores no guardan relación con herencia mendeliana, presentándose con mutaciones somáticas adquiridas que confinan la neoplasia a un solo globo ocular sin predisposición a segundas neoplasias sistémicas.<br><br>Perla ENARM: \"En el 60% de los pacientes se tratará de casos esporádicos, 40% será hereditario. De todos los casos, el 60% será unilateral esporádico.\"<br><br>Análisis de Distractores: El patrón bilateral hereditario abarca únicamente el 25% del total de diagnósticos. El patrón unilateral de origen hereditario comprende la minoría de la estadística genética con un 15%. El síndrome trilateral (asociado a PNET intracraneal) ocurre en apenas el 4% de los niños con mutaciones germinales bilaterales.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Genética en el retinoblastoma, Página 6."
    },
    {
        id: 23,
        question: "De acuerdo al Sistema de Estadificación Patológica de la AJCC, ¿qué hallazgo histológico define a un tumor primario como pT3a tras la enucleación?",
        options: ["Invasión masiva de la coroides mayor a 3 milímetros", "Compromiso del grosor total de la esclerótica externa", "Invasión focal prelaminar de la papila óptica", "Tumor en los espacios meníngeos peri nervio óptico"],
        answer: 0,
        justification: "Justificación: La evaluación patológica del globo enucleado dicta el riesgo de recidiva y la necesidad de quimioterapia adyuvante. De acuerdo al PRONAM de retinoblastoma, clasificar un tumor como pT3 indica un alto riesgo local; específicamente la subcategoría pT3a exige demostrar que la masa rompió la barrera retiniana y se infiltró profunda o extensamente en el lecho vascular coroideo.<br><br>Perla ENARM: \"pT3a: Invasión masiva de la coroides (>3 mm en su diámetro más grande o focos múltiples de compromiso coroideo focal que afecte en total >3 mm, o cualquier compromiso que abarque el grosor total de la coroides).\"<br><br>Análisis de Distractores: La invasión del grosor total escleral o canal emisario cataloga al tumor en una etapa localmente más grave como pT3d. El compromiso focal prelaminar corresponde a una etapa confinada incipiente catalogada estrictamente como pT1 o pT2a. La presencia de tumor en las meninges del nervio óptico evidencia diseminación extraocular inminente, clasificándose como pT4.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Estadificación Histopatológica de acuerdo a la AJCC, Página 15."
    },
    {
        id: 24,
        question: "En el protocolo de quimioterapia sistémica, ¿cuál es la dosis y esquema de administración del factor estimulante de colonias de granulocitos (Filgrastim) indicado para prevenir neutropenia?",
        options: ["10 mcg/kg/do por 5 días", "5 mcg/kg/do por 10 días", "15 mcg/kg/do por 7 días", "2 mcg/kg/do por 14 días"],
        answer: 1,
        justification: "Justificación: Los regímenes intensivos (VCE o ICE) utilizados para rescatar la funcionalidad ocular o tratar diseminación inducen mielosupresión profunda limitante. De acuerdo al PRONAM de retinoblastoma, el soporte hematopoyético es obligatorio al finalizar la infusión citotóxica de cada curso para garantizar la recuperación de neutrófilos, acortar la estancia intrahospitalaria y mantener la densidad de dosis del tratamiento oncológico.<br><br>Perla ENARM: \"Posterior a cada curso de quimioterapia sistémica se deberá administrar Filgrastim 5 mcg/kg/do por 10 días.\"<br><br>Análisis de Distractores: Dosis utilizada en esquemas de movilización acelerada pre-aféresis en adultos, no en el soporte estándar post-quimioterapia pediátrica del PRONAM. Dosis excesiva que incrementa el riesgo de dolor óseo por hiperplasia mieloide reactiva sin aportar beneficio profiláctico adicional. Dosis subterapéutica que no logra revertir la fase de nadir inducida por medicamentos como etopósido o carboplatino.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento intraocular, Página 25."
    },
    {
        id: 25,
        question: "Durante el régimen COG ARET 0321 para enfermedad metastásica, ¿qué porcentaje de la dosis total de ciclofosfamida se debe calcular para administrar Mesna como uromitigación?",
        options: ["20%", "40%", "60%", "100%"],
        answer: 2,
        justification: "Justificación: Las dosis masivas de agentes alquilantes como la ciclofosfamida liberan acroleína, un metabolito altamente tóxico para el urotelio que condiciona cistitis hemorrágica fulminante. De acuerdo al PRONAM de retinoblastoma, el uso de Mesna es imperativo para neutralizar esta molécula en vejiga, requiriendo una dosimetría estricta calculada sobre el peso del alquilante administrado para proteger eficazmente la vía urinaria del lactante.<br><br>Perla ENARM: \"MESNA: Administrar el 60% de la dosis total de CFM.\"<br><br>Análisis de Distractores: 20% es la fracción correspondiente a una sola de las tres dosis divididas del esquema completo de uromitigación, no la dosis total calculada. 40% representa una dosis subterapéutica insuficiente para saturar y neutralizar el pico de excreción renal de la acroleína. 100% es el esquema utilizado para la administración de Ifosfamida en el régimen ICE, no para la ciclofosfamida en el protocolo COG ARET 0321.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tratamiento metastásico, Página 31."
    },
    {
        id: 26,
        question: "¿Bajo qué criterio clínico está indicada la enucleación definitiva de un globo ocular catalogado previamente como Grupo D de la Clasificación ICRB?",
        options: ["Ocupación mayor al 50% de la cavidad vítrea en el ecosonograma", "Presencia de siembras difusas sin resolución inicial", "Ausencia de visión tras dos cursos de quimioterapia", "Elevación de la presión intraocular resistente a beta bloqueadores"],
        answer: 2,
        justification: "Justificación: El salvamento ocular tiene como meta prioritaria conservar agudeza visual útil. De acuerdo al PRONAM de retinoblastoma, un ojo en estadio D (lesión extensa con siembras difusas) es candidato a prueba quimioterapéutica intraarterial o sistémica. Sin embargo, si fracasa en reducir el daño macular y se constata ceguera irreversible tras el segundo ciclo, mantener el órgano inútil solo incrementa el riesgo biológico de diseminación letal y toxicidad inútil.<br><br>Perla ENARM: \"En el caso de los estadios D sin presencia de visión o sin respuesta a tratamiento posterior a dos cursos de quimioterapia ya sea intra arterial o sistémica, deberán ser enucleados.\"<br><br>Análisis de Distractores: La ocupación mayor al 50% reclasifica al globo directamente como estadio E, cuya conducta dicta enucleación primaria inminente desde el diagnóstico. Las siembras vítreas difusas son la definición basal del Grupo D y son la razón por la que inician quimioterapia prolongada (6 ciclos), no una indicación inmediata de ablación. El glaucoma neovascular hipertensivo irreversible es un criterio definitorio de estadio E y de destrucción neurosensorial grave, no el algoritmo de falla para un ojo D.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Retinoblastoma estadio ocular, Página 26."
    },
    {
        id: 27,
        question: "En pacientes con retinoblastoma metastásico a sistema nervioso central (Estadio 4b), ¿cuál es la dosis fraccionada total de radioterapia de consolidación indicada para la glándula pineal?",
        options: ["50.4 Gy", "45 Gy", "36 Gy", "25 Gy"],
        answer: 0,
        justification: "Justificación: El manejo de la metástasis intracraneal exige ablación celular agresiva en compartimientos anatómicos santuario. De acuerdo al PRONAM de retinoblastoma, las dosis de irradiación pediátrica se ajustan topográficamente; mientras el neuroeje y encéfalo global reciben dosis estándar, las metástasis glandulares profundas (glándula pineal), que a menudo representan focos quimiorresistentes del tumor neuroectodérmico, exigen intensificación focalizada post-trasplante.<br><br>Perla ENARM: \"En caso de metástasis a SNC (estadios 4b) la dosis a Médula espinal será de 36 Gy, encéfalo 45 Gy y pineal 50.4 Gy.\"<br><br>Análisis de Distractores: 45 Gy es la dosimetría límite de irradiación panencefálica (encéfalo total) o la estandarizada para enfermedad de lecho orbitario. 36 Gy es el objetivo dosimétrico indicado estrictamente para tratar el cordón de la médula espinal o metástasis fuera del neuroeje (hueso, hígado). 25 Gy es una dosis profiláctica baja que carece de evidencia tumoricida definitiva para el rescate de masa neoplásica franca retiniana.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Retinoblastoma metastásico, Página 35."
    },
    {
        id: 28,
        question: "Según las escalas del Protocolo ARET 0321 para enfermedad extraocular, ¿qué porcentaje de disminución tumoral bidimensional en imagen define la \"Respuesta Parcial\"?",
        options: ["Reducción menor al 50%", "Disminución entre el 50% y 90%", "Contracción mayor al 90%", "Resolución total macroscópica"],
        answer: 1,
        justification: "Justificación: La evaluación objetiva de la carga neoplásica dicta el futuro del abordaje neoadyuvante (continuidad o cambio a terapia paliativa). De acuerdo al PRONAM de retinoblastoma, los criterios RECIST modificados para esta enfermedad categorizan el encogimiento de las masas sólidas detectadas por TAC/RMN. Una contracción de al menos la mitad del volumen basal pero sin llegar a la casi erradicación marca el rango técnico de efectividad parcial, indicando quimiosensibilidad activa.<br><br>Perla ENARM: \"Respuesta parcial: Disminución de 50-90% en la suma de mediciones bidimensionales del tumor en estudios de imagen (TAC y/o RMN). Médula ósea sin presencia de infiltración.\"<br><br>Análisis de Distractores: Una reducción menor al 50% (sin aumentar el 25%) categoriza al tumor como \"Enfermedad estable\", sugiriendo estancamiento quimioterapéutico. Una disminución mayor al 90% de la carga basal define el estatus de \"Muy buena respuesta\", acercándose a la curación radiológica. La resolución total radiológica e histológica define el estado oncológico de \"Respuesta completa\".",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Criterios de respuesta extra ocular, Página 37."
    },
    {
        id: 29,
        question: "En el Sistema de Estadificación Internacional de Retinoblastoma (IRSS), ¿qué criterio anatomopatológico establece que el paciente cursa con un Estadio II?",
        options: ["Extensión tumoral regional orbitaria manifiesta", "Tumor intraocular localizado sin invasión a esclera", "Diseminación a ganglio linfático preauricular", "Ojo enucleado y tumor residual microscópico"],
        answer: 3,
        justification: "Justificación: El IRSS clasifica pragmáticamente la neoplasia post-cirugía guiando la adyuvancia sistémica. De acuerdo al PRONAM de retinoblastoma, el estadio 0 y I representan cirugía curativa (limitado o con resección total). Sin embargo, cuando el análisis patológico revela que los márgenes de corte quirúrgico (como la sección del nervio óptico) tienen microinfiltración imperceptible a simple vista, el paciente escala a Estadio II, marcando un riesgo inminente de recidiva.<br><br>Perla ENARM: \"Estadio II: Ojo enucleado y tumor residual microscópico.\"<br><br>Análisis de Distractores: La extensión orbitaria manifiesta (macro invasión de tejidos blandos perioculares) representa diseminación locoregional grave catalogada como Estadio IIIa. La enfermedad confinada dentro del globo sin compromiso de márgenes tras resección se estadifica oncológicamente como Estadio I (resección completa). La diseminación hacia la cadena ganglionar preauricular o cervical evidencia enfermedad linfática regional progresiva, clasificándose como Estadio IIIb.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Sistema de Estadificación Internacional (IRSS), Página 19."
    },
    {
        id: 30,
        question: "En pacientes con estadio ocular de alto riesgo sometidos a enucleación, ¿cuál es la frecuencia indicada para realizar la resonancia magnética de órbitas durante su primer año de vigilancia?",
        options: ["Cada 4 meses", "Cada 2 meses", "Cada 6 meses", "De forma mensual"],
        answer: 0,
        justification: "Justificación: El monitoreo imagenológico es vital para detectar recaídas tempranas tratables. De acuerdo al PRONAM de retinoblastoma, a diferencia de la agresiva diseminación extraocular (que exige escaneo cada 3 meses), el paciente al que se le extirpó un globo ocular de alto riesgo patológico (por invasión de nervio óptico) requiere una ventana de escrutinio contrastado de la cavidad vacía y quiasma cada cuatrimestre, optimizando la detección de micrometástasis orbitaria residual.<br><br>Perla ENARM: \"En el caso de los estadios oculares enucleados con invasión post laminar del nervio óptico, se sugiere realizar RMN de órbitas contrastada cada 4 meses el primer año de vigilancia.\"<br><br>Análisis de Distractores: Los intervalos bimestrales no forman parte del algoritmo estándar de seguimiento por imagen, exponiendo al paciente a estrés y uso de gadolinio innecesario. El escaneo cada 6 meses corresponde a la frecuencia estandarizada para el segundo año de seguimiento, donde la curva de riesgo de recaída comienza a aplanarse. La revisión mensual está indicada exclusivamente de forma clínica oftalmológica para el escrutinio de niños sanos hijos de padres con antecedente genético.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Seguimiento en pacientes, Página 42."
    },
    {
        id: 31,
        question: "Durante el abordaje de extensión sistémica, ¿en qué situación clínica está indicada la realización de una resonancia magnética de neuroeje simple y contrastada?",
        options: ["Confirmación de retinoblastoma bilateral incipiente", "Sospecha de metástasis a sistema nervioso central", "Antecedente heredofamiliar directo del gen RB1", "Diagnóstico inicial de enfermedad confinada a la retina"],
        answer: 1,
        justification: "Justificación: El mapeo del sistema nervioso central completo es un procedimiento de alta exigencia logística en infantes. De acuerdo al PRONAM de retinoblastoma, la RMN de órbitas basal es obligatoria para todos los casos; no obstante, extender la imagen magnética a lo largo de toda la columna vertebral (neuroeje) se reserva estrictamente ante el hallazgo clínico o citológico (por punción lumbar) de siembra en el líquido cefalorraquídeo o leptomeninges.<br><br>Perla ENARM: \"En caso de que el paciente presente metástasis a SNC, será necesario complementar con resonancia magnética de neuroeje simple y contrastada.\"<br><br>Análisis de Distractores: La enfermedad bilateral requiere quimioterapia sistémica VCE pero no justifica mapeo de neuroeje de rutina si no hay signos de diseminación extraocular basal. La genética hereditaria justifica el análisis molecular o escrutinio oftalmológico mensual postnatal temprano, no resonancias magnéticas espinales preventivas. Un tumor intraocular Group A o B se estudia basalmente solo con RMN de órbitas para planificar la preservación ocular, sin necesidad de extenderse al cordón espinal.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Estudios de extensión requeridos, Página 10."
    },
    {
        id: 32,
        question: "En el paciente metastásico que no logró respuesta completa y requiere radioterapia post trasplante de células progenitoras (TCPH), ¿cuál es el límite de tiempo máximo para iniciar la irradiación?",
        options: ["Día 14 post TCPH", "Día 21 post TCPH", "Día 42 post TCPH", "Día 60 post TCPH"],
        answer: 2,
        justification: "Justificación: La transición entre la consolidación mieloablativa y la radioterapia esterilizadora no debe retrasarse, ya que permite la repoblación de clones tumorales de crecimiento ultra-rápido. De acuerdo al PRONAM de retinoblastoma, la radioterapia debe planificarse e iniciarse ineludiblemente dentro de un margen biológico crítico de 42 días tras la infusión de rescate celular, asegurando la sinergia destructiva y evitando la recaída fulminante en el santuario neural.<br><br>Perla ENARM: \"La radioterapia se deberá iniciar dentro del día +42 días post TCPH, cuando no cumplan lo anterior mencionado.\"<br><br>Análisis de Distractores: El día 14 post trasplante coincide con el nadir celular crítico y periodo de máxima aplasia e inmunosupresión profunda, haciendo letal cualquier toxicidad actínica concurrente. El día 21 es el intervalo estándar de separación temporal entre ciclos convencionales de quimioterapia neoadyuvante sistémica (ICE/VCE), no de radioterapia ablativa. Retrasar la inducción radiológica hasta los dos meses (día 60) confiere un índice inaceptable de falla terapéutica por recuperación y mutación del tejido neoplásico residual.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Retinoblastoma metastásico, Página 35."
    },
    {
        id: 33,
        question: "¿Cuál es el hallazgo clásico y patognomónico documentado en el ultrasonido modo B del paciente pediátrico con retinoblastoma?",
        options: ["Engrosamiento plano e hipoecoico de la coroides periférica", "Masa ecogénica heterogénea con calcificaciones y sombra acústica", "Masa quística anecoica con múltiples tabiques de tracción", "Lesión homogénea hipervascularizada sin atenuación sónica posterior"],
        answer: 1,
        justification: "Justificación: El ecosonograma es el primer abordaje instrumental de gabinete ante leucocoria. De acuerdo al PRONAM de retinoblastoma, la necrosis tumoral rápida que supera a la neovascularización en el retinoblastoma fomenta el depósito de calcio distrófico dentro del estroma de la masa; estos focos cálcicos bloquean el paso del haz de ultrasonido, dibujando un patrón ecográfico altamente específico de masa sólida brillante con sombreado posterior.<br><br>Perla ENARM: \"Se describe una masa irregular, más ecogénica que el cuerpo vítreo, con calcificaciones finas que generan una sombra acústica característica.\"<br><br>Análisis de Distractores: El engrosamiento difuso simula uveítis autoinmune crónico, no la masa exofítica/endofítica cálcica típica del cáncer pediátrico retiniano. La morfología anecoica corresponde a colecciones líquidas puras (quistes intraoculares congénitos), excluyendo la sólida celularidad de un blastoma maligno. La falta de sombra acústica indica ausencia de calcificación, orientando el diagnóstico oftalmológico diferencial hacia otras patologías como la enfermedad de Coats o retinopatía del prematuro.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Diagnóstico, Página 9."
    },
    {
        id: 34,
        question: "En las evaluaciones formales sobre la calidad de vida de los infantes sobrevivientes a retinoblastoma, ¿cuáles son los dos componentes que se reportan estadísticamente con mayor grado de afectación?",
        options: ["Emocionales y familiares", "Físicos y escolares", "Psicológicos y sociales", "Nutricionales y cognitivos"],
        answer: 1,
        justification: "Justificación: Las secuelas oncológicas en la edad pediátrica trascienden el aspecto biológico puro. De acuerdo al PRONAM de retinoblastoma, el deterioro de la función visual o la mutilación facial tras una enucleación limitan gravemente el desarrollo psicomotriz fino y la movilidad espacial del niño. Esto se traduce de forma medible en un impacto paralizante sobre el desplazamiento motor (actividad física) y condena al infante al aislamiento académico derivado del ausentismo y discapacidad visual.<br><br>Perla ENARM: \"En el análisis de resultados de este tipo de cuestionarios, los componentes físicos y escolares resultan ser los más afectados. Los supervivientes tienen complicaciones para realizar actividades físicas, incluido el desplazarse a sus escuelas, resultando en ausentismo y retraso académico.\"<br><br>Análisis de Distractores: Si bien el núcleo familiar y emocional sufren desgaste agudo por el diagnóstico de cáncer, a largo plazo la reinserción mecánica (física) al ambiente es la que puntúa la máxima afección. Las esferas psicológicas se ven mermadas por el impacto del seguimiento médico intensivo, pero la dependencia para desplazarse físicamente lidera la caída en las métricas estandarizadas de bienestar. La nutrición no sufre afectación a largo plazo como secuela estricta de la ceguera o pérdida del globo ocular en la fase de sobreviviente curado.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Calidad de vida, Página 44."
    },
    {
        id: 35,
        question: "Según la Clasificación ICRB, ¿qué hallazgo clínico sitúa a un retinoblastoma intraocular directamente dentro de la categoría C?",
        options: ["Tumor localizado a menos de 1.5 milímetros del nervio óptico", "Ocupación mayor al 50% del volumen total de la cavidad vítrea", "Siembras subretinianas localizadas menores a 3 milímetros", "Presencia de siembras vítreas difusas mayores a 3 milímetros"],
        answer: 2,
        justification: "Justificación: La presencia de siembras altera drásticamente el modelo de tratamiento, forzando quimioterapia sistémica intensiva. De acuerdo al PRONAM de retinoblastoma, un tumor sobrepasa los grupos A/B cuando libera material neoplásico (cúmulos celulares) hacia las cavidades subyacentes. El Grupo C aglomera estrictamente a los pacientes que han formado siembras satélites vítreas o subretinianas en un halo estrecho muy localizado (focalizadas) midiendo menos de 3 milímetros desde la base principal.<br><br>Perla ENARM: \"Grupo C, Subgrupo C1/C2/C3: Retinoblastoma con siembras subretinianas, vítreas o ambas < 3 mm.\"<br><br>Análisis de Distractores: La cercanía a zonas nobles vitales (mácula <3 mm o yuxtapapilar <1.5 mm) clasifica al tumor inmediatamente como Grupo B de amenaza inminente a la función. La destrucción anatómica y volumen invasor vítreo >50% es criterio directo de ojo irrecuperable Grupo E (enucleación). Las siembras difusas que flotan libres alejadas a más de 3 mm de la lesión primaria marcan una enfermedad extendida ICRB Grupo D.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Tabla 1. Clasificación ICRB, Página 12."
    },
    {
        id: 36,
        question: "¿Cuál es la terapia neoadyuvante de elección utilizada para reducir la masa primaria en pacientes diagnosticados con retinoblastoma orbitario previo a la cirugía?",
        options: ["Terapia combinada con vincristina y doxorrubicina", "Régimen VCE (Vincristina, Carboplatino y Etopósido)", "Régimen COG ARET 0321 con trasplante celular", "Esquema ICE (Ifosfamida, Carboplatino y Etopósido)"],
        answer: 3,
        justification: "Justificación: La invasión de las barreras periorbitarias demanda máxima citotoxicidad regional para asegurar un margen quirúrgico libre y abatir la infiltración escleral externa. De acuerdo al PRONAM de retinoblastoma, el régimen indicado como estándar para tratar la extensión circunscrita confinada a la fosa orbitaria (previo a enuclear) no se basa en VCE, sino que emplea una combinación reforzada de tres agentes (Ifosfamida, Carboplatino, Etopósido) soportado con Uromitigación y filgrastim, permitiendo reducir la carga tumoral extraocular in situ.<br><br>Perla ENARM: \"Retinoblastoma orbitario: Se utilizará protocolo a base de Ifosfamida, Carboplatino y Etopósido, 4 cursos totales.\"<br><br>Análisis de Distractores: La doxorrubicina (antraciclina) no forma parte del catálogo farmacológico primario aprobado para el manejo de retinoblastoma en México. El esquema VCE está estandarizado como terapia sistémica para salvar globos oculares (enfermedad intraocular bilateral) y para profilaxis de alto riesgo post-enucleación pT3, no para masas francas orbitarias. El COG ARET 0321 con trasplante está reservado como la última línea de rescate sistémico curativo exclusivamente para enfermedad metastásica a distancia (LCR, hueso, hígado).",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Retinoblastoma estadio extra ocular, Página 29."
    },
    {
        id: 37,
        question: "En el protocolo de tamizaje preventivo, ¿cuál es la frecuencia indicada de revisión oftalmológica para infantes sanos menores a 1 año de edad nacidos de padres con antecedente de retinoblastoma?",
        options: ["Cada mes", "Cada 3 meses", "Cada 6 meses", "De forma anual"],
        answer: 0,
        justification: "Justificación: El riesgo de portar la mutación del gen supresor tumoral (RB1) obliga a la cacería precoz de malignidad. De acuerdo al PRONAM de retinoblastoma, la ventana fenotípica de aparición del tumor es sumamente temprana en portadores germinales hereditarios (mediana 14 meses), por lo cual el flujograma clínico de prevención impone exploraciones pediátricas oculares exhaustivas mes con mes durante los primeros 12 meses críticos de vida para preservar la máxima capacidad visual al primer signo oncogénico.<br><br>Perla ENARM: \"Hijas e hijos de madres y padres con antecedente de retinoblastoma: seguimiento por oftalmología pediátrica cada mes hasta el año de edad, cada 2 meses hasta los 2 años...\"<br><br>Análisis de Distractores: El intervalo de revisión trimestral (cada 3 meses) se relaja y se aplica únicamente en los infantes que ya alcanzaron y superaron los dos años de edad sin datos patológicos. La frecuencia de vigilancia semestral (cada 6 meses) está indicada para los preescolares de entre 4 y 7 años, donde el pico estadístico de transformación de retinoblastos embrionarios ha finalizado casi por completo. La vigilancia anual es insuficiente para un recién nacido de altísimo riesgo genético y resultaría en el descubrimiento de un ojo irrecuperable categoría E al primer control.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Algoritmo 2. Abordaje y tratamiento, Página 15."
    },
    {
        id: 38,
        question: "¿Cuál es la dosis de consolidación con radioterapia dirigida al cordón espinal en pacientes con retinoblastoma diseminado con infiltración leptomeníngea comprobada?",
        options: ["45 Gy", "25 Gy", "36 Gy", "50.4 Gy"],
        answer: 2,
        justification: "Justificación: La curación de la invasión oculta al neuroeje es mandataria tras la quimioterapia de inducción. De acuerdo al PRONAM de retinoblastoma, la tolerancia del tejido medular es menor a la del encéfalo supratentorial o la órbita. Por tanto, para esterilizar el trayecto de la médula espinal de siembras malignas en LCR post-trasplante celular, se limita estrictamente la dosis biológica total a 36 Grays estandarizados, previniendo radionecrosis incapacitante medular.<br><br>Perla ENARM: \"En caso de metástasis a SNC (estadios 4b) la dosis a Médula espinal será de 36 Gy.\"<br><br>Análisis de Distractores: La dosimetría de 45 Gy se utiliza para el tejido encefálico general del cráneo y las estructuras blandas de la fosa orbitaria enucleada. La dosis de 25 Gy no figura dentro de los algoritmos de ablación curativa en los protocolos oncológicos para neoplasia neuroectodérmica agresiva. La dosis focal intensificada de 50.4 Gy está indicada de manera selectiva frente a tumor residual de tipo trilateral que comprometa la glándula pineal intracraneal.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Retinoblastoma, 2024, Retinoblastoma metastásico, Página 35."
    },
    {
        id: 39,
        question: "En el paciente metastásico fuera del sistema nervioso central (hueso o hígado), ¿cuál es la condición clínica que permite excluir y evitar el uso de radioterapia local de consolidación?",
        options: ["Imposibilidad técnica para planificar radioterapia por metástasis hepática difusa", "Fracaso del trasplante de células progenitoras hematopoyéticas previo", "Tumor residual menor a 5 milímetros o remisión completa en la planeación", "Ausencia confirmada molecularmente de mutación en el oncogén RB1"],
        answer: 2,

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
