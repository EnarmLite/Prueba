<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 h-[100dvh] overflow-hidden">

                    <svg id="sun-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="moon-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                    Alternar Tema

                <button onclick="document.getElementById('reset-modal').classList.remove('hidden')" class="w-full bg-white dark:bg-slate-800 text-red-500 border border-red-200 dark:border-red-900/50 font-semibold py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

            <!-- Botón Grid (Tablero) a la Izquierda (Oculto en Inicio) -->

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
{
                id: 1, 
                question: "¿Qué hallazgo específico en un estudio de imagen confirma de manera confiable una lesión articular abierta que exige consulta ortopédica temprana?", 
                options: ["Derrame articular loculado", "Edema de tejidos blandos", "Gas intraarticular en tomografía", "Lipohemartrosis en radiografía"], 
                answer: 2, 
                justification: "Justificación: Las lesiones articulares penetrantes crean una comunicación con el entorno externo y un alto riesgo de sepsis articular. De acuerdo al ATLS 11.ª ed., la detección de gas intraarticular en los estudios de imagen como la tomografía computarizada es un indicador fiable y diagnóstico de una lesión articular abierta, requiriendo intervención quirúrgica.<br><br>Perla ENARM: La presencia de gas intraarticular en la tomografía computarizada confirma la penetración del espacio articular y dicta el inicio de cobertura antibiótica y lavado quirúrgico.<br><br>Análisis de Distractores: Las opciones A, B y D son hallazgos clásicos de trauma articular cerrado (como fracturas intracapsulares o desgarros de ligamentos cruzados) que generan sangrado y exudado, pero no implican una brecha con el exterior ni contaminación bacteriana directa.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 2, 
                question: "¿Cuál es el esquema antibiótico sistémico profiláctico de elección para una fractura abierta grado I o II de Gustilo-Anderson sin contaminación acuosa?", 
                options: ["Piperacilina con tazobactam", "Cefazolina 2 g cada 8 horas", "Ceftriaxona más metronidazol", "Cefazolina más gentamicina"], 
                answer: 1, 
                justification: "Justificación: Las heridas de menor grado requieren cobertura primaria contra cocos grampositivos de la piel. De acuerdo al ATLS 11.ª ed., para las fracturas grado I y II de Gustilo-Anderson, la prescripción preferida es Cefazolina 2 g IV cada 8 horas.<br><br>Perla ENARM: El uso exclusivo de una cefalosporina de primera generación es el estándar profiláctico inicial para fracturas abiertas grados I y II, suspendida a las 24 horas del cierre de la herida.<br><br>Análisis de Distractores: La opción A está indicada en contaminación severa por agua dulce o salada. La opción C es un régimen ampliado para sospecha de anaerobios en heridas con tierra en grados superiores. La opción D (adición de un aminoglucósido) es el paso obligatorio para fracturas grado III.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 3, 
                question: "En el síndrome de aplastamiento prolongado, ¿qué alteración electrolítica se libera bruscamente durante la reperfusión y posee alto riesgo de causar paro cardíaco?", 
                options: ["Hipocalcemia refractaria", "Hipernatremia progresiva", "Hiperpotasemia aguda", "Hipomagnesemia severa"], 
                answer: 2, 
                justification: "Justificación: La necrosis muscular acumula metabolitos intracelulares. De acuerdo al ATLS 11.ª ed., el aumento repentino de los niveles de potasio hacia la circulación sistémica que ocurre exactamente durante la reperfusión de una extremidad isquémica interrumpe la conducción miocárdica, originando arritmias letales y paro.<br><br>Perla ENARM: La hiperpotasemia por lavado de potasio intracelular durante el rescate de una extremidad aplastada requiere vigilancia electrocardiográfica inmediata y estabilización de la membrana miocárdica.<br><br>Análisis de Distractores: La opción A ocurre en el síndrome de aplastamiento por depósito de calcio en el músculo necrótico, pero no es la causa de paro súbito por reperfusión. Las opciones B y D no son los principales iones intracelulares liberados masivamente durante la lisis del sarcolema.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 10." 
            },
            {
                id: 4, 
                question: "¿Qué referencia anatómica del paciente se utiliza clínicamente para estimar de forma rápida el diámetro externo adecuado del tubo endotraqueal en pediatría?", 
                options: ["Diámetro del lóbulo auricular", "Punta del dedo meñique", "Grosor del puente nasal", "Longitud de la falange distal"], 
                answer: 1, 
                justification: "Justificación: El tamaño de la vía aérea infantil guarda proporción con las extremidades distales. De acuerdo al ATLS 11.ª ed., una técnica sencilla para estimar el tamaño del tubo endotraqueal necesario es aproximar el diámetro de la punta del dedo más pequeño (meñique) del niño, o el diámetro de sus fosas nasales externas.<br><br>Perla ENARM: El diámetro de la punta del dedo meñique o de las narinas externas son los marcadores anatómicos visuales más fiables para la selección del tubo endotraqueal en emergencias pediátricas.<br><br>Análisis de Distractores: Las opciones A, C y D no guardan ninguna correlación validada geométricamente con el diámetro del anillo cricoideo o de la glotis infantil en las guías de reanimación.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 5, 
                question: "¿Cuál es el volumen exacto de la primera carga de líquido cristaloide isotónico recomendado en un paciente pediátrico con datos clínicos de choque?", 
                options: ["10 ml/kg", "20 ml/kg", "30 ml/kg", "40 ml/kg"], 
                answer: 1, 
                justification: "Justificación: La reposición inicial en niños busca restaurar rápidamente el retorno venoso. De acuerdo al ATLS 11.ª ed., la estrategia inicial de reanimación con líquidos para niños lesionados en estado de choque es un bolo único de 20 ml/kg de cristaloide tibio. Si no hay respuesta sostenida, se transita directamente a hemoderivados.<br><br>Perla ENARM: La reanimación hídrica contemporánea en trauma pediátrico indica un solo bolo de cristaloide a 20 ml/kg; los bolos repetidos incrementan la mortalidad por coagulopatía.<br><br>Análisis de Distractores: La opción A es el volumen establecido estrictamente para la reanimación con glóbulos rojos empacados o sangre entera (10 ml/kg). Las opciones C y D causan sobrecarga hídrica, edema intersticial y hemodilución severa, empeorando el estado de choque.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 6, 
                question: "¿Qué forma geométrica describe anatómicamente el cartílago cricoides en lactantes y niños pequeños, contradiciendo el concepto histórico de forma de embudo?", 
                options: ["Forma cónica", "Forma elíptica", "Forma cilíndrica", "Forma triangular"], 
                answer: 1, 
                justification: "Justificación: El concepto del cricoides ha evolucionado con la visualización moderna. De acuerdo al ATLS 11.ª ed., estudios recientes sugieren que la laringe pediátrica no tiene forma de embudo o cónica, sino que el cartílago cricoides es de forma elíptica en lactantes y niños más pequeños, y crece hasta volverse circular en la edad adulta.<br><br>Perla ENARM: La morfología elíptica del cricoides pediátrico es la justificación anatómica moderna por la cual la Asociación Americana del Corazón avala el uso de tubos endotraqueales con balón en niños para lograr un sellado óptimo.<br><br>Análisis de Distractores: Las opciones A y D son representaciones clásicas superadas por la tomografía tridimensional. La opción C es la anatomía propia y exclusiva del paciente adulto con el anillo completamente formado.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 11." 
            },
            {
                id: 7, 
                question: "¿Cuál es la causa principal de lesiones y mortalidad traumática que se presenta con mayor frecuencia en adultos mayores de 65 años?", 
                options: ["Quemaduras térmicas", "Colisiones vehiculares", "Caídas de propia altura", "Lesiones penetrantes"], 
                answer: 2, 
                justification: "Justificación: La disminución de la estabilidad postural dinámica y el equilibrio condicionan alta vulnerabilidad. De acuerdo al ATLS 11.ª ed., la probabilidad de sufrir una caída aumenta con la edad, y las caídas de propia altura son la principal causa de lesiones mortales entre los adultos mayores, seguidas en segundo lugar por las colisiones vehiculares.<br><br>Perla ENARM: El mecanismo aparentemente menor de una caída de propia altura en un anciano suele resultar en lesiones graves (TCE y fracturas cervicales) debido a la fragilidad, osteoporosis y uso de anticoagulantes.<br><br>Análisis de Distractores: Las opciones A y D son mecanismos reales y presentes, pero estadísticamente muy inferiores en prevalencia. La opción B representa la segunda causa de morbilidad en geriatría, pero la primera causa indiscutible de fatalidad son las caídas.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 8, 
                question: "¿Qué síndrome incompleto de la médula espinal es clásico en el adulto mayor con estenosis cervical preexistente tras sufrir un trauma de hiperextensión del cuello?", 
                options: ["Síndrome medular central", "Síndrome de Brown-Séquard", "Síndrome de la cola de caballo", "Síndrome medular anterior"], 
                answer: 0, 
                justification: "Justificación: Los cambios crónicos degenerativos estrechan el canal espinal. De acuerdo al ATLS 11.ª ed., la compresión mecánica aguda de la médula en un paciente anciano con estenosis produce característicamente el síndrome de la médula central, donde el déficit motor y debilidad de las extremidades superiores es francamente mayor que el de las extremidades inferiores.<br><br>Perla ENARM: Las caídas con impacto facial anterior en ancianos producen hiperextensión cervical y compresión de los tractos motores centrales, afectando severamente el movimiento de brazos y manos con preservación relativa de las piernas.<br><br>Análisis de Distractores: La opción B ocurre por hemisección medular (típicamente trauma penetrante). La opción C se asocia a hernias discales masivas o fracturas lumbares bajas. La opción D ocurre por isquemia de la arteria espinal anterior secundaria a compresión por fragmentos óseos anteriores.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 9, 
                question: "¿Qué alteración en la función pulmonar asociada al envejecimiento disminuye la reserva fisiológica y predispone a insuficiencia respiratoria aguda?", 
                options: ["Aumento de la distensibilidad torácica", "Disminución de la capacidad residual funcional", "Incremento del volumen corriente basal", "Aceleración del aclaramiento mucociliar"], 
                answer: 1, 
                justification: "Justificación: El envejecimiento disminuye la elasticidad intrínseca del parénquima pulmonar y aumenta la rigidez de la pared torácica. De acuerdo al ATLS 11.ª ed., se produce una reducción de la capacidad residual funcional, una disminución del retroceso elástico y un deterioro del intercambio de gases, factores que combinados elevan significativamente el riesgo de insuficiencia respiratoria súbita ante el trauma.<br><br>Perla ENARM: La disminución de la capacidad residual funcional en el anciano reduce su tolerancia a la apnea durante el manejo de la vía aérea, requiriendo preoxigenación agresiva.<br><br>Análisis de Distractores: La opción A es incorrecta; la pared torácica se vuelve rígida y calcificada (menor distensibilidad). La opción C suele estar disminuida, no incrementada, debido a la cifoescoliosis. La opción D disminuye con la edad, facilitando el desarrollo del 30% de neumonía en fracturas costales.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 12." 
            },
            {
                id: 10, 
                question: "¿En qué edad gestacional aproximada el útero abandona la protección de la pelvis ósea para convertirse en un órgano abdominal vulnerable a trauma cerrado?", 
                options: ["8 semanas", "12 semanas", "16 semanas", "20 semanas"], 
                answer: 1, 
                justification: "Justificación: El crecimiento del útero sigue un patrón de elevación cefálica predecible. De acuerdo al ATLS 11.ª ed., el útero sigue siendo un órgano intrapélvico de paredes gruesas hasta aproximadamente la 12.ª semana de gestación. A partir de entonces, se agranda más allá de la ubicación pélvica protegida y asciende convirtiéndose en un órgano abdominal.<br><br>Perla ENARM: Antes de las 12 semanas el feto está protegido de trauma abdominal cerrado por la pelvis materna; a partir de las 20 semanas alcanza el ombligo y sufre riesgo máximo de transferencia de energía.<br><br>Análisis de Distractores: La opción A sitúa al útero profundamente enclavado en el canal pélvico inferior. Las opciones C y D marcan una etapa donde el útero ya es francamente abdominal e intermedio en su viaje hacia el ombligo.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 11, 
                question: "¿Cuál hallazgo electrocardiográfico de desviación se considera fisiológico y esperado en una paciente sana cursando la última mitad del embarazo?", 
                options: ["Desviación del eje a la derecha", "Ondas T acuminadas precordiales", "Elevación del segmento ST", "Desviación del eje a la izquierda"], 
                answer: 3, 
                justification: "Justificación: El volumen abdominal empuja pasivamente al diafragma y a las estructuras mediastínicas. De acuerdo al ATLS 11.ª ed., en la última mitad del embarazo el corazón se desplaza cefálicamente y hacia la izquierda. En el electrocardiograma es fisiológico y normal observar una desviación del eje a la izquierda y ondas T aplanadas o invertidas en las derivaciones III y aVF.<br><br>Perla ENARM: En el trauma obstétrico del tercer trimestre, la desviación del eje a la izquierda y el aplanamiento de ondas T en derivaciones inferiores no deben confundirse con isquemia miocárdica aguda.<br><br>Análisis de Distractores: Las opciones A y B son signos de sobrecarga ventricular derecha aguda, cor pulmonale o hiperpotasemia, siempre patológicos en la gestación. La opción C es patognomónica de un infarto agudo de miocardio transmural.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 12, 
                question: "¿Cuál es el hemoderivado empírico de elección para transfundir a una paciente embarazada con choque hemorrágico severo sin pruebas cruzadas disponibles?", 
                options: ["Glóbulos rojos O positivos", "Glóbulos rojos O negativos", "Sangre total AB negativa", "Plasma fresco O negativo"], 
                answer: 1, 
                justification: "Justificación: La sensibilización de una madre Rh-negativa a la sangre Rh-positiva causa eritroblastosis fetal en embarazos subsecuentes. De acuerdo al ATLS 11.ª ed., se prefieren los productos sanguíneos O-negativos de liberación de emergencia para evitar la aloinmunización Rh en mujeres en edad reproductiva.<br><br>Perla ENARM: Si no se dispone de sangre O-negativa en un choque exanguinante, es preferible transfundir sangre O-positiva para salvar a la madre que permitir el paro cardíaco, tratando la sensibilización posteriormente con Inmunoglobulina Rh.<br><br>Análisis de Distractores: La opción A provoca alo-sensibilización letal en mujeres Rh-negativo, solo permitida como rescate extremo en agotamiento del banco. La opción C no es donador universal para eritrocitos. La opción D no provee capacidad de transporte de oxígeno.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 13." 
            },
            {
                id: 13, 
                question: "¿Qué región anatómica, al sufrir una herida por arma blanca, genera la más alta sospecha de lesión diafragmática oculta y hemoneumotórax asociado?", 
                options: ["Región toracoabdominal izquierda", "Región interescapular dorsal", "Cuadrante inferior derecho", "Región epigástrica superior"], 
                answer: 0, 
                justification: "Justificación: La penetración del límite entre el tórax y el abdomen atraviesa capas críticas con órganos contiguos. De acuerdo al ATLS 11.ª ed., una herida por arma blanca en el área toracoabdominal izquierda tiene una alta probabilidad de penetrar simultáneamente la cavidad torácica, causar laceración del diafragma izquierdo, perforar el bazo e inducir un hemoneumotórax complejo.<br><br>Perla ENARM: Toda herida punzocortante debajo de la línea del pezón (cuarto espacio intercostal) hasta el margen costal debe obligar a descartar intencionadamente una lesión diafragmática izquierda.<br><br>Análisis de Distractores: La opción B puede dañar pulmón y médula espinal torácica, pero no diafragma ni bazo. La opción C es estrictamente intraabdominal (ciego e íleon). La opción D penetra al lóbulo hepático izquierdo o estómago, pero no es la localización clásica de lesión hemidiafragmática aislada sin protección hepática.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 14." 
            },
            {
                id: 14, 
                question: "Al realizar la revisión secundaria, se detecta sangre en el meato urinario. ¿Qué estudio radiológico debe preceder a la inserción de un catéter transuretral?", 
                options: ["Tomografía computarizada pélvica", "Uretrografía retrógrada", "Cistoscopia directa", "Pielografía intravenosa"], 
                answer: 1, 
                justification: "Justificación: Los pacientes con fractura pélvica o de periné corren un alto riesgo de laceración o transección uretral. De acuerdo al ATLS 11.ª ed., si en el examen físico hay evidencia de lesión uretral como sangre en el meato o equimosis perineal, no se debe intentar la cateterización transuretral sin la confirmación anatómica mediante una uretrografía retrógrada.<br><br>Perla ENARM: Insertar a ciegas una sonda Foley ante un meato con sangre puede convertir una laceración uretral parcial en una transección total irreversible.<br><br>Análisis de Distractores: La opción A diagnostica fracturas óseas, pero no delinea el lumen uretral membranoso con contraste bajo presión. La opción C empeoraría mecánicamente el desgarro. La opción D evalúa la excreción renal y uréteres proximales, la concentración del medio de contraste no dibuja adecuadamente a la uretra distal.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 14." 
            },
            {
                id: 15, 
                question: "¿Cómo se evalúa rápidamente la agudeza visual de forma funcional durante el examen ocular de la revisión secundaria en la sala de urgencias?", 
                options: ["Usando un oftalmoscopio directo portátil", "Evaluando la respuesta pupilar a la luz", "Pidiendo al paciente leer material impreso", "Realizando la prueba del reflejo corneal"], 
                answer: 2, 
                justification: "Justificación: La agudeza visual es el signo vital de la integridad del ojo. De acuerdo al ATLS 11.ª ed., la agudeza visual de un paciente traumatizado consciente se puede evaluar de manera sencilla, eficiente y rápida pidiéndole al paciente que lea algún material impreso disponible, como el texto en el envase de algún equipo médico o bata.<br><br>Perla ENARM: Evaluar la agudeza visual funcional con material impreso detecta fallas graves en la retina o el nervio óptico (Par Craneal II) antes de que el edema palpebral cierre masivamente el ojo.<br><br>Análisis de Distractores: La opción A requiere dilatación y no evalúa la capacidad de interpretación cortical. La opción B evalúa la vía aferente del II par y eferente del III par (tronco cerebral), pero puede ser normal en ceguera cortical o desprendimiento macular. La opción D evalúa los pares craneales V y VII.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 14." 
            },
            {
                id: 16, 
                question: "¿Cuál es el rango de altura establecido como la dosis letal 50 (LD50) para la mortalidad en adultos que sufren una caída libre desde la altura?", 
                options: ["5 a 10 metros", "11 a 18 metros", "20 a 25 metros", "30 a 35 metros"], 
                answer: 1, 
                justification: "Justificación: La cinética del impacto con el suelo dicta la disrupción aórtica y el estallido visceral. De acuerdo al ATLS 11.ª ed., la dosis letal 50 (LD50), definida como la altura a la que el 50% de los pacientes adultos que caen fallecen por el traumatismo, es de 36 a 60 pies (equivalente a 11 a 18 metros o aproximadamente 4 a 6 pisos de un edificio).<br><br>Perla ENARM: Considerar cualquier caída por arriba de 11 metros como un traumatismo contuso multisistémico crítico que frecuentemente asocia choque vascular masivo o trauma cerebral irreversible.<br><br>Análisis de Distractores: La opción A es un mecanismo de alto riesgo, pero no alcanza la estadística del 50% de mortalidad absoluta en la población sana. Las opciones C y D representan caídas catastróficas donde la tasa de supervivencia es prácticamente nula y superan ampliamente la LD50 calculada.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 14." 
            },
            {
                id: 17, 
                question: "¿Qué porcentaje de la superficie corporal total equivale aproximadamente la medida de la mano completa del paciente (palma y dedos unidos)?", 
                options: ["1%", "3%", "5%", "9%"], 
                answer: 0, 
                justification: "Justificación: La medición manual es útil para calcular quemaduras dispersas o en parches de forma irregular. De acuerdo al ATLS 11.ª ed., la superficie de la mano del propio paciente (incluyendo la palma de la mano y los dedos juntos) representa aproximadamente el 1% de su superficie corporal total y sirve como unidad de medida geométrica de rescate.<br><br>Perla ENARM: Utilizar la palma y dedos como un 1% de superficie corporal evita errores crasos al sumar múltiples salpicaduras térmicas pequeñas fuera de la regla de los nueves.<br><br>Análisis de Distractores: Las opciones B y C son sobreestimaciones que, de usarse para calcular, causarían una infusión letal de volumen cristaloide iatrogénico. La opción D es la constante modular utilizada en la regla de los nueves (ej. extremidad superior completa).", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 18, 
                question: "¿Qué hallazgo clínico tisular marca la progresión o clasificación diagnóstica de una lesión de congelación (frostbite) de primer grado hacia el segundo grado?", 
                options: ["Aparición de hiperemia con edema leve", "Necrosis dérmica con exudado oscuro", "Formación de vesículas grandes transparentes", "Aparición de vesículas hemorrágicas tensas"], 
                answer: 2, 
                justification: "Justificación: Las temperaturas gélidas destruyen el estrato córneo separándolo de las capas vasculares basales. De acuerdo al ATLS 11.ª ed., la congelación de segundo grado se diagnostica por la formación patognomónica de vesículas grandes y transparentes que acompaña a la hiperemia y el edema, indicando necrosis cutánea de espesor parcial.<br><br>Perla ENARM: Las vesículas de líquido claro indican lesión de espesor parcial (segundo grado) recuperable; las vesículas con líquido hemorrágico oscuro denotan un grado III con destrucción capilar severa subyacente.<br><br>Análisis de Distractores: La opción A describe exactamente la congelación de primer grado (reversible sin necrosis). La opción D corresponde a la congelación profunda de tercer grado con daño al plexo capilar subdérmico. La opción B ocurre en estadios isquémicos terminales profundos con ulceración (cuarto grado).", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 19, 
                question: "¿Bajo qué escenario clínico exclusivo se encuentra indicada la administración rápida de líquidos en bolo intravenoso en la reanimación aguda por quemaduras térmicas?", 
                options: ["Ausencia de pulsos distales palpables", "Presencia de hipotensión arterial", "Gasto urinario menor al fisiológico", "Presencia de taquicardia sostenida"], 
                answer: 1, 
                justification: "Justificación: El choque térmico se debe a extravasación capilar masiva, no a pérdida externa en las primeras horas. De acuerdo al ATLS 11.ª ed., los líquidos intravenosos se inician a tasas fijas reguladas; la administración de bolos hídricos adicionales está contraindicada a menos que el paciente se encuentre hipotenso, lo cual delata choque franco y reanimación deficiente inicial.<br><br>Perla ENARM: Administrar bolos de líquidos en pacientes con quemaduras que están normotensos promueve edema severo (tercer espacio) y propicia síndrome compartimental letal, por lo cual los bolos se limitan solo al paciente hipotenso.<br><br>Análisis de Distractores: La opción A sugiere síndrome compartimental o escaras constrictivas y demanda escarotomía urgente, no bolos hídricos. La opción C se maneja incrementando cuidadosamente la tasa basal en un 10-30%, no infundiendo un bolo rápido. La opción D es una respuesta metabólica y del dolor universal en el paciente quemado, esperada y no corregible con bolos.", 
                source: "ATLS 11.ª edición, 2025, Capítulo 9." 
            },
            {
                id: 20, 
                question: "¿A partir de qué nivel de concentración sérica la carboxihemoglobina bloquea masivamente el oxígeno y causa coma por anoxia profunda en la intoxicación por monóxido de carbono?", 
                options: ["10 a 20%", "20 a 30%", "30 a 40%", "40 a 60%"], 
                answer: 3, 
                justification: "Justificación: El monóxido de carbono tiene una afinidad 200 veces mayor por la hemoglobina, desplazando letalmente al oxígeno. De acuerdo al ATLS 11.ª ed., la progresión neurológica depende de la saturación: un nivel de carboxihemoglobina sérica del 40 al 60% produce bloqueo cerebral anóxico induciendo estado de coma clínico, siendo antes de este nivel una fase de confusión (30-40%).<br><br>Perla ENARM: Cualquier nivel de carboxihemoglobina superior al 10% requiere tratamiento inmediato; sin embargo, cifras mayores al 40% originan estado de coma y niveles superiores al 60% resultan en muerte fulminante sin oxígeno al 100%.<br><br>Análisis de Distractores: La opción A puede presentarse asintomática o generar signos extremadamente sutiles de somnolencia. La opción B produce característicamente cefalea intensa occipital y náuseas periféricas. La opción C se caracteriza por agitación y confusión mental severa, pero no abatimiento motor del coma profundo y descerebración.",

        function setupEventListeners() {
            document.getElementById('module-search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.q-box-item').forEach(box => {
                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            document.getElementById('cancel-reset').addEventListener('click', () => {
                const m = document.getElementById('reset-modal'); m.querySelector('div').classList.add('scale-95');
                setTimeout(()=>m.classList.add('hidden'),300);
            });
            document.getElementById('confirm-reset').addEventListener('click', () => {
                localStorage.removeItem('ExaATLS05Progress');
                localStorage.removeItem('ExaATLS05LastQId');
                window.location.reload();
            });
            
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const overlay = document.getElementById('sidebar-overlay');
            const dashboardBtn = document.getElementById('dashboard-button');
            
            menuToggle.addEventListener('click', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.toggle('lg:translate-x-0');
                    mainContent.classList.toggle('lg:ml-80');
                    
                    // Reposicionar el botón del tablero dependiendo de si el sidebar está abierto
                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    sidebar.classList.toggle('-translate-x-full');
                    overlay.classList.toggle('hidden');
                }
            });
            
            overlay.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            });

            document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
        }

        // Navegar a pregunta anterior
        function goToPreviousQuestion(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex > 0) {
                displayQuestion(questionsData[currentIndex - 1].id);
            } else {
                displayQuestion(null);

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-indigo-500 shadow-md z-10 border-indigo-500 dark:border-indigo-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

        function renderGridHTML(isActiveIdContext = null) {
            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-indigo-100 dark:border-indigo-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-indigo-50 has-[:checked]:border-indigo-400 dark:has-[:checked]:bg-indigo-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-indigo-600 dark:hover:bg-indigo-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-indigo-50 dark:bg-slate-800/80 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-indigo-900 dark:text-indigo-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-indigo-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-indigo-600 to-green-600 hover:from-green-600 hover:to-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('ExaATLS05Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('ExaATLS05LastQId', currentQuestionId);
                else localStorage.removeItem('ExaATLS05LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('ExaATLS05Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>

</script>
