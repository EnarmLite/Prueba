    {
        id: 1,
        question: "¿Qué estructura ligamentaria se encuentra lesionada en el 70% de los pacientes que presentan hemartrosis posterior a un esguince articular?",
        options: ["Ligamento cruzado posterior", "Ligamento colateral medial", "Ligamento colateral lateral", "Ligamento cruzado anterior"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, el sangrado intraarticular abundante a tensión posterior al trauma es el dato clínico principal orientador hacia la disrupción vascular de los ligamentos centrales, predominantemente el anterior.<br><br>Perla ENARM: \"Cerca de 70% de las hemartrosis de rodilla se asocian con lesiones en el LCA; y es el dato clínico principal de la lesión en ligamentos cruzados.\"<br><br>Análisis de Distractores: Los ligamentos colaterales (medial y lateral) son estructuras extraarticulares que no provocan hemartrosis franca. El ligamento cruzado posterior puede sangrar, pero epidemiológicamente el anterior conforma la abrumadora mayoría de los casos presentados en agudo.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 12."
    },
    {
        id: 2,
        question: "¿Cuál es el rango de sensibilidad diagnóstica reportado para la prueba de Lachman al evaluar inestabilidad anterior?",
        options: ["80 a 99%", "35 a 98%", "22 a 95%", "50 a 100%"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, esta prueba desplaza el fémur respecto a la tibia a 30º de flexión, eludiendo en gran medida la contractura protectora muscular, lo que le confiere la mayor sensibilidad global para escrutinio primario.<br><br>Perla ENARM: \"Prueba de Lachman, con sensibilidad de 80-99% y especificidad del 95%.\"<br><br>Análisis de Distractores: El rango de 35 a 98% corresponde a la prueba de pivote (alta especificidad, pero sensibilidad variable por dolor reactivo). El rango de 22 a 95% evalúa el comportamiento de la prueba de cajón anterior. El margen de 50 a 100% no es un rango avalado biométricamente en el documento.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 12."
    },
    {
        id: 3,
        question: "¿Qué prueba clínica para inestabilidad rotatoria anterior presenta una especificidad clínica mayor a 98%?",
        options: ["Prueba de Lachman", "Prueba de cajón anterior", "Prueba de pivote", "Prueba de cajón posterior"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, esta maniobra reproduce de manera dinámica el fallo cinemático exacto de la rodilla, logrando una altísima especificidad para predecir subluxación patológica.<br><br>Perla ENARM: \"Prueba de Pivote (Pivot Shift), con sensibilidad del 35-98.4% y especificidad >98%.\"<br><br>Análisis de Distractores: La prueba de Lachman tiene una especificidad documentada del 95%. La prueba de cajón anterior alcanza >97%. La prueba de cajón posterior se usa exclusivamente en disrupciones del cruzado posterior, no para la biomecánica de rotación anterior.",

    },
    {
        id: 4,
        question: "¿Qué alteración estructural se debe sospechar inminentemente ante una prueba de estrés en varo que resulta positiva con la extremidad a 0º de extensión?",
        options: ["Lesión de menisco medial", "Lesión aislada de ligamento cruzado", "Lesión grave de esquina posterolateral", "Lesión de ligamento colateral medial"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, cuando la rodilla claudica y se abre en extensión completa, donde la cápsula posterior y ambos cruzados brindan máxima firmeza fisiológica, el hallazgo se traduce en una falla masiva y combinada de todo el compartimento.<br><br>Perla ENARM: \"Ante una prueba de estrés positiva a 0º se recomienda sospechar lesión grave de esquina posterolateral con compromiso del ligamento cruzado.\"<br><br>Análisis de Distractores: Las lesiones aisladas o esguinces de colaterales no logran un bostezo articular a 0º porque los ligamentos cruzados secundarios actúan como topes. Las rupturas meniscales no condicionan inestabilidad coronal directa.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 5,
        question: "Durante la realización de la prueba clínica \"dial test\", ¿qué incremento en la rotación externa respecto al lado sano confirma patología de la esquina posterolateral?",
        options: ["4 a 9º", "16 a 20º", "21 a 25º", "10 a 15º"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, al evaluar la asimetría de rotación con las rodillas a 30º de flexión, la pérdida del tendón poplíteo y colateral peroneo rompe el candado capsular natural, marcando un aumento angular diagnóstico estricto.<br><br>Perla ENARM: \"Un aumento de 10º a 15º de rotación externa a 30º de flexión de la rodilla comparada con el lado contra lateral indica una lesión posterolateral concurrente.\"<br><br>Análisis de Distractores: Las diferencias menores a 9º se consideran dentro del margen normal elástico fisiológico. Incrementos mayores a 16º implican catástrofes articulares luxantes mucho más severas y no definen el punto de corte diagnóstico base de la prueba.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Glosario, Página 38."
    },
    {
        id: 6,
        question: "Según la American Medical Association, ¿qué grado de severidad corresponde a un paciente con apertura articular exacta de 8 mm en la prueba de estrés coronal?",
        options: ["Grado I", "Grado II", "Grado III", "Grado IV"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, la medición milimétrica pura del bostezo determina de forma objetiva la continuidad mecánica de las fibras colaterales, siendo decisiva para normar una conducta conservadora frente a quirúrgica.<br><br>Perla ENARM: \"Las lesiones ligamentarias laterales y mediales de la rodilla se clasifica de la siguiente manera... Grado II: apertura de 5 a 10 mm.\"<br><br>Análisis de Distractores: El Grado I ampara el esguince leve con aperturas de 0 a 5 mm. El Grado III implica la ruptura completa e incompetente del ligamento con mediciones mayores a 10 mm. El Grado IV no está fundamentado en este catálogo métrico.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 13."
    },
    {
        id: 7,
        question: "¿Para la evaluación diagnóstica de qué estructura anatómica está específicamente indicado el ultrasonido de urgencia en la fase aguda del trauma?",
        options: ["Cartílago patelofemoral", "Ligamento cruzado anterior", "Ligamentos colaterales y meniscos", "Ligamento cruzado posterior"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, la limitante anatómica condílea no frena a las ondas ecográficas en las regiones periféricas y superficiales de la articulación, siendo el método no invasivo excelente para los retenes extraarticulares.<br><br>Perla ENARM: \"Se recomienda efectuar estudios de ultrasonografía en pacientes con lesiones ligamentarias en rodilla cuando se sospeche: Lesión en los ligamentos colaterales (medial o lateral) o Lesiones meniscales.\"<br><br>Análisis de Distractores: La fosa intercondílea es inalcanzable para un mapeo acústico útil, aunlando el valor diagnóstico de este estudio para el cruzado anterior y posterior. La condromalacia o cartílago articular se reserva para el estándar de resonancia magnética.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 8,
        question: "¿En cuál de los siguientes escenarios traumáticos se debe evitar absolutamente la solicitud de una evaluación ecográfica articular por su nula precisión anatómica?",
        options: ["Lesiones en los meniscos", "Lesión del ligamento colateral medial", "Sospecha de lesiones de ligamentos cruzados", "Derrame por líquido sinovial anecoico"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, la presencia de líquido inflamatorio y el engrosamiento capsular obliteran por completo la exploración de los pivotajes profundos intraarticulares, condicionando a un retraso de referencia.<br><br>Perla ENARM: \"Evitar la realización de estudios de ultrasonografía en la fase aguda, cuando se sospecha lesión en LCA y LCP.\"<br><br>Análisis de Distractores: Ecografiar derrames, meniscos y colaterales internos es una práctica avalada, pues estas patologías reaccionan emitiendo cambios medibles hipoecoicos o directos a la ventana transductora.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 14."
    },
    {
        id: 9,
        question: "¿Qué porcentaje de especificidad diagnóstica estadísticamente documentada ofrece la resonancia magnética nuclear en pacientes con rupturas del ligamento cruzado anterior?",
        options: ["94%", "97%", "100%", "87%"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, a pesar de poseer una imagen excepcional del edema ligamentario o el muñón retraído, su capacidad de validación global carece de la exactitud confirmatoria absoluta que otorga un hallazgo artroscópico directo.<br><br>Perla ENARM: \"Los estudios de Resonancia Magnética Nuclear (RMN) muestran sensibilidad de 97% y especificidad alrededor de 87% para identificar lesiones de LCA.\"<br><br>Análisis de Distractores: El 97% se refiere a su sensibilidad para detectar pacientes enfermos (LCA). Para el cruzado posterior los rangos aumentan de 94 a 100% en sensibilidad, pero no corresponde al anterior y no refleja la especificidad en este contexto.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 15."
    },
    {
        id: 10,
        question: "¿Cuál es la conducta de primera línea para una paciente femenina con diagnóstico establecido de lesión en la esquina posterolateral categorizada como grado II?",
        options: ["Inmovilización en extensión por 3 semanas", "Inmovilización en flexión por 6 semanas", "Tratamiento quirúrgico artroscópico temprano", "Terapia física de carga axial inmediata"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, este esquema preserva la viabilidad mecánica limitando las inserciones en posición tensa, evitando una elongación curativa laxa que produciría inestabilidad permanente.<br><br>Perla ENARM: \"En lesiones grado I y grado II de la esquina posterolateral se recomienda inmovilizar en extensión la extremidad afectada, por 3 semanas, en promedio.\"<br><br>Análisis de Distractores: Las correcciones en flexión desbalancean la contracción tendinosa local. La restitución quirúrgica está dictada rigurosamente para el grado III destructivo. Liberar carga precoz arranca y debilita las fibras colagenosas nacientes.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 15."
    },
    {
        id: 11,
        question: "¿Qué modificación de la conducta terapéutica está estrictamente indicada ante un hallazgo imagenológico aislado que detalla lesión completa de ligamento cruzado posterior en paciente asintomático rotacionalmente?",
        options: ["Sustitución artroscópica con autoinjerto", "Plastía quirúrgica con aloinjerto", "Tratamiento no quirúrgico con rehabilitación", "Inmovilización prolongada rígida exclusiva"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, la anatomía gruesa y el abundante revestimiento sinovial vascular del cruzado posterior fungen como coadyuvantes intrínsecos de consolidación biológica sin necesidad de intromisión instrumental en lesiones aisladas.<br><br>Perla ENARM: \"Las lesiones del LCP cuando son completas, se recomienda tratamiento no quirúrgico (conservador con un programa de rehabilitación).\"<br><br>Análisis de Distractores: El autoinjerto y el aloinjerto se recomiendan al identificar lesiones multiligamentarias asociadas. Ordenar la inmovilización sin trabajo isométrico temprano consolida atrofia cuadricipital rápida sin beneficios estabilizadores.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 16."
    },
    {
        id: 12,
        question: "En qué escenario fisiopatológico documentado durante el seguimiento de una lesión de ligamento cruzado posterior es imperativo el cambio de manejo hacia una terapia quirúrgica?",
        options: ["Lesión completa aislada aguda", "Presencia de inestabilidad o artrosis patelofemoral", "Paciente sedentario mayor de 65 años", "Esguince posterior de grado histológico I"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de lesiones ligamentarias en rodilla, un fallo tensional del eje sagital que arrastra y expone las superficies hialinas rotulianas al fémur conduce velozmente a un proceso degenerativo articular prematuro y álgido incontrolable.<br><br>Perla ENARM: \"El tratamiento quirúrgico es la alternativa para las lesiones graves o complejas del LCP, así como para aquellas, en las que exista inestabilidad o artrosis patelofemoral, a pesar de un programa de rehabilitación.\"<br><br>Análisis de Distractores: A la fase aguda sin luxación franca responde de forma sobresaliente el manejo en terapia. Ni la edad senil (que desaconseja cirugía mayor de no ser vital) ni la gradación tisular I justifican por sí solas la entrada a quirófano profiláctica.",
        source: "IMSS-388-10, Diagnóstico y Tratamiento de las Lesiones Ligamentarias Traumáticas en Rodilla, 2017, Evidencias y Recomendaciones, Página 15."
    },
    {
        id: 13,
        question: "En un paciente masculino diagnosticado mediante clínica y gabinete con ruptura total del ligamento cruzado anterior y limitación en su vida diaria, ¿cuál es el abordaje médico ineludible estipulado?",

                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;

                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta

                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');

                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);

                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CGCUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CGCULastQId', currentQuestionId);
                else localStorage.removeItem('CGCULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CGCUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
