            </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál circunferencia de cintura establece riesgo metabólico para daño renal en población masculina?",
        options: ["≥ 88 cm", "≥ 90 cm", "≥ 94 cm", "≥ 102 cm"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Enfermedad Renal Crónica, la obesidad central desencadena resistencia a la insulina y lipotoxicidad sistémica, impactando directamente la hemodinámica glomerular. En población mexicana, los puntos de corte antropométricos son estrictos para definir síndrome metabólico e intervenir tempranamente.<br><br>Perla ENARM: \"Síndrome metabólico: resistencia a la insulina, dislipidemia, hiperglucemia y obesidad central o abdominal (circunferencia de cintura ≥ 88 cm en mujeres y ≥ 94 cm en hombres)\".<br><br>Análisis de Distractores: A) Criterio correcto para población femenina, no para población masculina. B) Valor sin relevancia clínica específica para la definición de síndrome metabólico en México. D) Corte clásico internacional obsoleto o aplicable a otras poblaciones, desplazado por los criterios actuales de la Secretaría de Salud.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección II. Antecedentes, Página 3."
    },
    {
        id: 2,
        question: "¿Qué temporalidad mínima de alteraciones estructurales o funcionales define la cronicidad de esta patología?",
        options: [">3 meses", ">6 meses", ">12 meses", ">4 semanas"],
        answer: 0,
        justification: "Justificación: El tejido renal tiene capacidad de regeneración tubular tras agresiones agudas. De acuerdo al PRONAM de Enfermedad Renal Crónica, la persistencia del daño más allá de este periodo indica una reparación fallida con esclerosis irreversible, independientemente del factor etiológico inicial.<br><br>Perla ENARM: \"La ERC se define como la presencia de alteraciones en la estructura o función renal, durante un periodo superior a 3 meses, con implicaciones para la salud\".<br><br>Análisis de Distractores: B) Rango de tiempo utilizado en patologías hepáticas crónicas, incorrecto en nefrología. C) Criterio temporal empleado en otras definiciones sistémicas, pero retrasa injustificadamente el diagnóstico de daño renal. D) Periodo asociado a lesión renal aguda o procesos glomerulares subagudos reversibles.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección III. Definición, Detección y Clasificación, Página 4."
    },
    {
        id: 3,
        question: "¿Qué meta de ingesta proteica se recomienda en pacientes clasificados en estadio G3a a G5?",
        options: ["1.2 g/kg/día", "1.0 g/kg/día", "1.3 g/kg/día", "0.8 g/kg/día"],
        answer: 3,
        justification: "Justificación: La restricción proteica moderada reduce la carga de solutos nitrogenados, mitigando la hiperfiltración compensatoria de las nefronas remanentes. De acuerdo al PRONAM de Enfermedad Renal Crónica, esta medida frena la velocidad de esclerosis sin inducir catabolismo proteico severo.<br><br>Perla ENARM: \"Se sugiere mantener una ingesta proteica de 0.8 g/kg de peso corporal en adultos con ERC G3a-G5\".<br><br>Análisis de Distractores: A) Cifra recomendada en pacientes sometidos a terapias de reemplazo renal continuo para compensar las pérdidas del dializado. B) Rango fisiológico superior que puede acelerar la progresión del daño crónico si el filtrado se encuentra disminuido. C) El documento nacional marca explícitamente que es vital evitar una ingesta proteica superior a 1.3 g/kg/día para no generar nefrotoxicidad metabólica.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 8."
    },
    {
        id: 4,
        question: "¿Qué posología está indicada para la inmunización contra el virus de la Hepatitis B en estos pacientes?",
        options: ["Dosis de 20 mcg al mes 0 y 6", "Dosis de 40 mcg a los meses 0, 1, 2 y 6", "Dosis de 20 mcg a los meses 0, 1 y 6", "Dosis de 40 mcg anual como refuerzo"],
        answer: 1,
        justification: "Justificación: El síndrome urémico altera la presentación antigénica y deprime la inmunidad celular adaptativa. De acuerdo al PRONAM de Enfermedad Renal Crónica, los esquemas estándar no logran una seroconversión efectiva, haciendo mandatario un régimen de alta dosis e intervalos modificados.<br><br>Perla ENARM: \"Hepatitis B: Dosis doble (40 mcg) a 0, 1, 2 y 6 meses, más refuerzo al año si no existe inmunización adecuada\".<br><br>Análisis de Distractores: A) Dosis y esquema insuficientes para generar memoria inmunológica en el contexto de uremia. C) Corresponde al esquema estándar convencional utilizado en población sana inmunocompetente (20 mcg). D) El refuerzo se utiliza anualmente solo si los anticuerpos declinan, pero no constituye el esquema de primovacunación.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección VI. Seguimiento, Página 17."
    },
    {
        id: 5,
        question: "¿Qué velocidad de caída del filtrado glomerular justifica la derivación al especialista de segundo nivel?",
        options: [">1 mL/min/año", ">3 mL/min/año", ">5 mL/min/año", ">10 mL/min/año"],
        answer: 2,
        justification: "Justificación: De acuerdo al PRONAM de Enfermedad Renal Crónica, la pérdida natural por envejecimiento es de 1 mL/min/año. Un declive acelerado refleja nefrotoxicidad activa, refractariedad al bloqueo neurohormonal o causas secundarias que sobrepasan la capacidad resolutiva del primer nivel.<br><br>Perla ENARM: \"Criterios de referencia a nefrología relacionados a la TFGe: Disminución anual de la TFGe >5 mL/min/1.73m²\".<br><br>Análisis de Distractores: A) Equivalente al desgaste fisiológico esperado en un adulto mayor sano. B) Disminución lenta que amerita vigilancia e intensificación de metas ambulatorias, no envío urgente a especialidad. D) Un declive excesivamente dramático que indica falla renal agudizada, pero el punto de corte establecido en los criterios de envío es menor.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección V. Criterios de Referencia a Nefrología, Página 14."
    },
    {
        id: 6,
        question: "¿Qué combinación farmacológica cardiovascular está contraindicada por aumentar el riesgo de lesión renal aguda?",
        options: ["Calcioantagonista y tiazida", "Betabloqueador y espironolactona", "Inhibidor SGLT2 y metformina", "Inhibidor ECA y antagonista ARA2"],
        answer: 3,
        justification: "Justificación: El doble bloqueo suprime totalmente los mecanismos de compensación hemodinámica intraglomerular ante fluctuaciones de volumen. De acuerdo al PRONAM de Enfermedad Renal Crónica, esta conducta se proscribe debido a los efectos adversos severos sin un impacto pronóstico positivo demostrado.<br><br>Perla ENARM: \"Se debe evitar cualquier combinación de IECA y ARA2 en pacientes con ERC con o sin diabetes, ya que esta combinación no genera beneficios cardiovasculares o renales, pero sí mayor riesgo de hiperkalemia o lesión renal aguda\".<br><br>Análisis de Distractores: A) Terapia combinada validada y de uso extendido para hipertensión sistémica sin generar nefrotoxicidad directa. B) Puede utilizarse en insuficiencia cardíaca con vigilancia estricta, no constituye una contraindicación absoluta. C) Pauta recomendada e indicada en pacientes diabéticos siempre y cuando la tasa de filtración soporte el uso de la biguanida.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 10."
    },
    {
        id: 7,
        question: "¿Qué ecuación avala el documento nacional para el cálculo de la tasa de filtración glomerular estimada?",
        options: ["Ecuación CKD-EPI versión 2021", "Ecuación MDRD de 4 variables", "Ecuación de Cockcroft-Gault", "Ecuación CKD-EPI versión 2012"],
        answer: 0,
        justification: "Justificación: Para evitar el sesgo diagnóstico y subestimar el daño temprano, el escrutinio se ha estandarizado hacia fórmulas de alta precisión. De acuerdo al PRONAM de Enfermedad Renal Crónica, la nueva versión elimina la variable de corrección por origen étnico y es el gold standard clínico vigente.<br><br>Perla ENARM: \"La detección de la ERC en adultos con factores de riesgo debe realizarse... mediante el cálculo de la TFGe con la ecuación CKD-EPI versión 2021, utilizando la creatinina sérica\".<br><br>Análisis de Distractores: B) Fórmula que subestima la tasa de filtración en rangos superiores a 60 mL/min, útil en el pasado pero actualmente desplazada. C) Ecuación matemática antigua, dependiente del peso corporal absoluto, altamente imprecisa en pacientes con obesidad severa o sarcopenia. D) Modelo previo que incluía el ajuste por raza, el cual se ha erradicado en las guías más recientes por falta de validez biológica.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección III. Definición, Detección y Clasificación, Página 4."
    },
    {
        id: 8,
        question: "¿Cuál es la conducta terapéutica indicada para el uso de metformina cuando la TFGe desciende a <30 mL/min/1.73 m²?",
        options: ["Disminuir la dosis a la mitad", "Suspender el fármaco definitivamente", "Mantener dosis con vigilancia de lactato", "Cambiar a metformina de liberación prolongada"],
        answer: 1,
        justification: "Justificación: La acumulación tisular de biguanidas por incapacidad de depuración renal bloquea el metabolismo mitocondrial hepático. De acuerdo al PRONAM de Enfermedad Renal Crónica, este estadio marca el punto límite por el alto riesgo de desarrollar acidosis láctica fulminante.<br><br>Perla ENARM: \"...la metformina, misma que debe ser reducida a la mitad cuando la TFGe es <45 mL/min/1.73m², y suspendida cuando es <30 mL/min/1.73m²\".<br><br>Análisis de Distractores: A) Conducta exigida cuando el filtrado decae a <45 mL/min, pero es insuficiente e insegura al alcanzar un nivel inferior a 30 mL/min. C) Práctica de altísimo riesgo que compromete la vida del paciente debido a la falla en la excreción del metabolito. D) La formulación del fármaco no altera su ruta de eliminación renal obligatoria; persiste el riesgo inminente de acidosis severa.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 12."
    },
    {
        id: 9,
        question: "¿A partir de cuántos fármacos antihipertensivos a dosis plenas se define hipertensión resistente para envío a especialidad?",
        options: ["≥ 2 antihipertensivos", "≥ 3 antihipertensivos", "≥ 4 antihipertensivos", "≥ 5 antihipertensivos"],
        answer: 2,
        justification: "Justificación: El manejo hemodinámico en el deterioro funcional involucra retención hídrica masiva y sobreactivación simpática. De acuerdo al PRONAM de Enfermedad Renal Crónica, rebasar este número de moléculas sugiere una causa secundaria grave y amerita manejo de alta especialidad.<br><br>Perla ENARM: \"El médico de primer nivel de atención debe identificar criterios clave para referir... ERC e hipertensión arterial resistente con ≥ 4 antihipertensivos\".<br><br>Análisis de Distractores: A) Esquema dual inicial en pacientes de alto riesgo, no representa resistencia clínica. B) En las guías universales de hipertensión (fuera de ERC) tres fármacos definen el fallo, pero este protocolo específico exige cuatro. D) Escenario de extrema refractariedad, el envío no debe retrasarse hasta agotar cinco familias farmacológicas distintas.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección V. Criterios de Referencia a Nefrología, Página 15."
    },
    {
        id: 10,
        question: "¿Cada cuánto tiempo debe evaluarse en primer nivel a un paciente en estadio G1 a G3a con relación albúmina/creatinina ≤ 300 mg/g?",
        options: ["Cada 3 meses", "Cada 12 meses", "Cada 4 semanas", "Cada 6 meses"],
        answer: 3,
        justification: "Justificación: Los pacientes estratificados en zonas de riesgo bajo y moderado en el mapa KDIGO no exigen control altamente invasivo. De acuerdo al PRONAM de Enfermedad Renal Crónica, la evaluación periódica semestral es suficiente para titular nefroprotectores y monitorizar factores modificables.<br><br>Perla ENARM: \"A menos que exista algún criterio para referir... los pacientes en estadios G1 a G3a con RAC ≤ 300 mg/g deberán ser vistos fundamentalmente en primer nivel de atención cada 6 meses\".<br><br>Análisis de Distractores: A) Intervalo de vigilancia reservado estrictamente para los pacientes derivados a Nefrología por estadio ≥ G3b o proteinuria persistente. B) Tiempo de seguimiento aceptado para población de riesgo sin diagnóstico establecido, pero insuficiente en pacientes que ya cursan con la enfermedad. C) Monitoreo de uso temporal limitado a situaciones agudas como reajuste de bloqueadores del SRA o trastornos hidroelectrolíticos.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección VI. Seguimiento, Página 16-17."
    },
    {
        id: 11,
        question: "¿Qué medicamento hipolipemiante del grupo de los fibratos se debe evitar prescribir en todos los estadios?",
        options: ["Fenofibrato", "Bezafibrato", "Gemfibrozilo", "Ciprofibrato"],
        answer: 1,
        justification: "Justificación: En el paciente urémico, la farmacocinética de ciertos hipolipemiantes se altera drásticamente. De acuerdo al PRONAM de Enfermedad Renal Crónica, esta molécula específica tiene una depuración predominantemente renal y su retención aumenta exponencialmente la toxicidad muscular severa (rabdomiólisis).<br><br>Perla ENARM: \"Cuando se prescriban se recomienda: ...utilizar fenofibrato o gemfibrozilo con dosis ajustadas a función renal, no prescribir bezafibrato, y no usar en ERC G5\".<br><br>Análisis de Distractores: A) Molécula autorizada si se ajusta rigurosamente a la tasa de filtración glomerular. C) Fármaco permitido con precauciones, considerándose seguro en estadios moderados si no hay estatinas contraindicadas en curso. D) Aunque requiere vigilancia por riesgo miopático, el documento proscribe de manera directa y absoluta al bezafibrato.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 13."
    },
    {
        id: 12,
        question: "¿En qué tipo de recolección urinaria se prefiere medir la relación albúmina/creatinina para tamizaje inicial?",

        justification: "Justificación: El aclaramiento de este antidiabético es estrictamente renal. De acuerdo al PRONAM de Enfermedad Renal Crónica, este nivel intermedio de filtración exige disminuir la concentración sistémica para evitar toxicidad hepática sin retirar el beneficio insulinosensibilizador de golpe.<br><br>Perla ENARM: \"...la metformina, misma que debe ser reducida a la mitad cuando la TFGe es <45 mL/min/1.73m², y suspendida cuando es <30 mL/min/1.73m²\".<br><br>Análisis de Distractores: A) Indicación absoluta exclusiva para el estadio subsecuente (menor a 30 mL/min), suspenderla antes descontrola innecesariamente la glucemia. C) El tratamiento exige terapia dual combinada si es necesario, no el retiro de la primera línea sin justificación toxicológica plena. D) Conducta de riesgo, el monitoreo del metabolito no previene el desenlace fatal cuando se omite el ajuste profiláctico de la posología.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 12."
    },
    {
        id: 31,
        question: "¿Cuál es el límite funcional mínimo de la Tasa de Filtración Glomerular para poder iniciar un inhibidor del cotransportador sodio-glucosa tipo 2?",

    {

        justification: "Justificación: El mecanismo intrínseco de acción glucosúrica desvía el metabolismo hacia la beta-oxidación de los lípidos. De acuerdo al PRONAM de Enfermedad Renal Crónica, en pacientes sin reserva insulínica endógena, esto desencadena cetoacidosis euglucémica, una urgencia que amenaza la vida.<br><br>Perla ENARM: \"Una complicación temida, pero infrecuente, es la cetoacidosis, por lo que están contraindicados en pacientes con diabetes tipo 1 (DT1)\".<br><br>Análisis de Distractores: A) Constituye una de las indicaciones principales (\"pilar del tratamiento\") para reducir mortalidad y hospitalizaciones por esta patología cardíaca. B) Entidad metabólica donde demuestran su máxima eficacia para enlentecer el daño endotelial e hiperfiltración compensatoria. D) Escenario de riesgo cardiovascular muy alto, grupo de pacientes que precisamente obtienen el mayor beneficio sistémico del medicamento.",

    {
        id: 33,
        question: "¿Qué agente farmacológico se debe agregar en diabéticos si la albuminuria no remite con la optimización previa de bloqueadores del SRA e inhibidores SGLT2?",
        options: ["Espironolactona", "Finerenona", "Eplerenona", "Aliskireno"],
        answer: 1,
        justification: "Justificación: El escape de aldosterona induce inflamación intersticial progresiva. De acuerdo al PRONAM de Enfermedad Renal Crónica, este nuevo antagonista mineralocorticoide no esteroideo demostró una reducción drástica de desenlaces fatales sin el riesgo severo de hiperkalemia que presentan los agentes antiguos.<br><br>Perla ENARM: \"Actualmente las guías recomiendan que se agregue finererona en aquellos pacientes con ERC y diabetes que persistan con albuminuria a pesar de bloqueo del SAR y uso de iSGLT2\".<br><br>Análisis de Distractores: A) ARM esteroideo no selectivo que carece de evidencia robusta de protección renal e induce complicaciones por hiperkalemia y ginecomastia. C) Agente selectivo indicado en la insuficiencia cardíaca con fracción de eyección reducida, sin las propiedades comprobadas de nefroprotección en este escenario de refractariedad. D) Inhibidor directo de renina cuyo uso concurrente potencia la toxicidad aguda letal si se asocia a la terapia dual recomendada en el documento.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 10."

    {
        id: 34,
        question: "¿Qué rango de porcentaje en hemoglobina glucosilada se plantea como meta individualizada para prevenir la progresión sin inducir hipoglucemias?",
        options: ["<6.0 y <7.0 por ciento", "<6.5 y <8.0 por ciento", "<7.0 y <8.5 por ciento", "<7.5 y <9.0 por ciento"],
        answer: 1,
        justification: "Justificación: La disminución de la excreción renal de insulina expone al paciente a comas hipoglucémicos letales y alteraciones cardiovasculares. De acuerdo al PRONAM de Enfermedad Renal Crónica, el margen debe ser laxo en ancianos y comórbidos, pero estricto en población joven y sin deterioro agudo aparente.<br><br>Perla ENARM: \"El control glucémico óptimo es un elemento clave... La meta propuesta en pacientes con ERC es una HbA1c individualizada con valores entre <6.5% y <8.0%\".<br><br>Análisis de Distractores: A) Control intensivo estricto, el cual ha evidenciado en ensayos recientes un incremento en la mortalidad cardíaca en sujetos frágiles nefrópatas. C) Umbral deficiente para los estadios tempranos que aún mantienen integridad funcional y tolerarían terapias modificadoras sin riesgo severo. D) Pauta de abandono terapéutico, implica permitir de manera deliberada la hiperglucemia destructiva de la membrana basal.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 11."
    },
    {
        id: 35,
        question: "¿Qué dosis de atorvastatina se prescribe para la nefroprotección en pacientes de 18 a 49 años con incidencia estimada alta de muerte coronaria?",
        options: ["10 mg al día", "20 mg al día", "40 mg al día", "80 mg al día"],
        answer: 2,
        justification: "Justificación: El grupo etario joven con alto riesgo aterogénico demanda estabilización intensiva de la placa endotelial. De acuerdo al PRONAM de Enfermedad Renal Crónica, la dosificación de la estatina de elección varía de forma específica según la edad y la seguridad hepática.<br><br>Perla ENARM: \"Se recomienda su uso... en personas de 18-49 años con ERC G1-G5 (sin diálisis o trasplante), 40 mg/día, si tienen... incidencia estimada >10% de muerte coronaria o infarto al miocardio\".<br><br>Análisis de Distractores: A) Infradosificación que carece de la potencia farmacológica necesaria para conferir beneficio en reducción de mortalidad isquémica. B) Dosis de mantenimiento recomendada de rutina, pero específicamente para la población adulta mayor de 50 años. D) Dosis máxima pleiotrópica que incrementa severamente el riesgo de miopatía o falla en pacientes con función renal crónica alterada.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 13."
    },
    {
        id: 36,
        question: "¿Qué cifra de bicarbonato sérico establece el criterio persistente para enviar al paciente al tercer nivel de atención?",
        options: ["<16.0 mEq/L", "<18.0 mEq/L", "<20.0 mEq/L", "<22.0 mEq/L"],

        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección V. Criterios de Referencia a Nefrología, Página 15."
    },
    {
        id: 37,
        question: "¿A partir de qué nivel de potasio sérico se exige documentar electrocardiograma, tratar inmediatamente y derivar de forma urgente al hospital?",
        options: [">5.5 mEq/L", ">6.0 mEq/L", ">6.5 mEq/L", ">7.0 mEq/L"],
        answer: 2,
        justification: "Justificación: La hiperkalemia disminuye el potencial de reposo transmembrana en el miocito, induciendo toxicidad eléctrica. De acuerdo al PRONAM de Enfermedad Renal Crónica, esta alteración es la causa más común de muerte súbita y fibrilación ventricular en el contexto del fallo crónico agudizado.<br><br>Perla ENARM: \"Si el K+ es >6.5 mEq/L realizar EKG, iniciar tratamiento y derivar urgente a hospital\".<br><br>Análisis de Distractores: A) Nivel diagnóstico de hiperkalemia que implica revisión y ajuste de los fármacos retenedores, pero manejable de forma ambulatoria. B) Grado de alteración que exige control y seguimiento estricto en laboratorio sin constituir una emergencia hemodinámica imperativa. D) Cifra catastrófica acompañada de signos electrocardiográficos letales irreversibles en el contexto agudo. La intervención obligatoria es a partir de 6.5.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección IV. Manejo, Página 10."

    {
        id: 38,
        question: "Usando ecuaciones pronósticas, ¿qué porcentaje de riesgo de requerir terapia de reemplazo renal a 5 años estipula el envío a la especialidad?",

        justification: "Justificación: Las herramientas de predicción combinan los determinantes sociodemográficos, la función actual y el daño glomerular. De acuerdo al PRONAM de Enfermedad Renal Crónica, este rango mínimo anticipa una falla orgánica catastrófica a corto plazo, otorgando tiempo valioso para la creación de accesos vasculares o escrutinio de trasplante.<br><br>Perla ENARM: \"Criterios relacionados a la TFGe o riesgo de terapia de reemplazo renal: ...Riesgo >3-5% de requerir terapia de reemplazo renal a 5 años usando ecuaciones de riesgo validadas\".<br><br>Análisis de Distractores: A) Porcentaje que clasifica al paciente en un riesgo basal, adecuado para vigilancia rutinaria sin someter los recursos del especialista. C) El pronóstico es más sombrío, sin embargo, el criterio rector estipula la referencia desde estratos anticipados. D) Probabilidad fatalista que indicaría una referencia tardía, omitiendo la oportunidad de educación pre-diálisis.",
        source: "Protocolo Nacional de Atención Médica (PRONAM) Enfermedad Renal Crónica, 2024, Sección V. Criterios de Referencia a Nefrología, Página 14."

        question: "Tras la aplicación inicial de la vacuna conjugada, ¿cada cuánto tiempo requiere el paciente nefrópata su refuerzo contra el Neumococo?",

                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);
                    if(!qObj) return;
                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';
                });
            });

            });

                window.location.reload();

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

            ).join('');

                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>
                                        <p class="text-[8px] text-slate-400 mt-1 leading-tight">Aciertos vs Respondidas</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="loginlite.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('CambiooooProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('CambiooooLastQId', currentQuestionId);
                else localStorage.removeItem('CambiooooLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('CambiooooProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
