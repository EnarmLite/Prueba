    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">

            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>

        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es la edad gestacional a partir de la cual la presencia de hipertensión y proteinuria establece el diagnóstico clínico de preeclampsia?",
        options: ["12 semanas", "16 semanas", "20 semanas", "24 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, la fisiopatología de la enfermedad recae en una falla en la invasión trofoblástica de las arterias espirales, manifestándose sistémicamente solo después de alcanzar las 20 semanas de gestación.<br><br>Perla ENARM: \"Preeclampsia: Es el estado que se caracteriza por la presencia de hipertensión y proteinuria significativa, lo que ocurre por primera vez después de la semana 20 del embarazo, durante el parto o en el puerperio\".<br><br>Análisis de Distractores: Las 12 y 16 semanas son ventanas preventivas o de escrutinio, y cualquier hipertensión diagnosticada antes de las 20 semanas define a la hipertensión arterial crónica. Las 24 semanas marcan el inicio de la viabilidad fetal extrauterina, no el punto de corte diagnóstico.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Aspectos Generales, Página 14."
    },
    {
        id: 2,
        question: "¿Cuál es el límite máximo de semanas de gestación para iniciar profilaxis con 100 mg diarios de ácido acetilsalicílico en pacientes con alto riesgo?",
        options: ["12 semanas", "14 semanas", "16 semanas", "20 semanas"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, la intervención primaria para modular la cascada inflamatoria y la agregación plaquetaria debe instaurarse de forma temprana, perdiendo su efectividad si se difiere más allá de las 16 semanas.<br><br>Perla ENARM: \"Las intervenciones preventivas para la forma de preeclampsia con presentación temprana, se recomiendan en población con riesgo aumentado de preeclampsia, iniciándolas antes de las 16 semanas de gestación\".<br><br>Análisis de Distractores: Las semanas 12 y 14 son ideales, pero el límite explícito dictado por las recomendaciones es antes de la semana 16. Iniciar a las 20 semanas carece de beneficio profiláctico probado contra la mala adaptación placentaria.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 24."
    },
    {
        id: 3,
        question: "En la evaluación de daño a órgano blanco, ¿cuál es el nivel de trombocitopenia que se considera criterio absoluto de preeclampsia con datos de severidad?",
        options: ["< 150,000", "< 100,000", "< 50,000", "< 20,000"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, la destrucción plaquetaria microangiopática secundaria al daño endotelial clasifica inmediatamente a la enfermedad como severa e incrementa el riesgo de morbilidad al rebasar el umbral de las 100,000 células.<br><br>Perla ENARM: \"Alteraciones de laboratorio: Elevación de creatinina sérica (> 1.1 mg/dL), incremento de AST o ALT (> 70 IU/L) o deshidrogenasa láctica; disminución de plaquetas < 100,000/ mm³\".<br><br>Análisis de Distractores: Una cifra < 150,000 es sugestiva de trombocitopenia gestacional o consumo leve, pero no cumple la definición de severidad. Las cifras < 50,000 y < 20,000 son críticas e indican alto riesgo de sangrado y contraindican anestesia neuroaxial, pero el corte oficial inicial es < 100,000.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Aspectos Generales, Página 14."
    },
    {
        id: 4,
        question: "Ante la imposibilidad de recolectar orina de 24 horas en urgencias, ¿cuál es el valor del cociente proteína/creatinina urinaria al azar que confirma proteinuria significativa?",
        options: ["≥ 0.15 mg/dL", "≥ 0.28 mg/dL", "≥ 0.45 mg/dL", "≥ 1.00 mg/dL"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, el cociente proteína/creatinina es el método subrogado más veloz y confiable en contextos de emergencia, estableciéndose su positividad en ≥ 0.28 mg/dL para correlacionar con los 300 mg diarios.<br><br>Perla ENARM: \"Se recomienda establecer diagnostico de proteinuria cuando: [...] Cociente proteínas/Creatinina urinaria en una muestra de orina al azar mayor o igual a 0.28\".<br><br>Análisis de Distractores: El valor ≥ 0.15 mg/dL es normal en el embarazo debido a la hiperfiltración fisiológica. Los cortes de ≥ 0.45 mg/dL o ≥ 1.00 mg/dL están muy por encima del requerimiento diagnóstico y retrasarían la intervención si se esperan estos niveles.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 19."
    },
    {
        id: 5,
        question: "Para integrar la preeclampsia con datos de severidad por hipertensión descontrolada, ¿cuál es el intervalo temporal mínimo requerido entre las 2 tomas de tensión arterial de ≥ 160/110 mmHg?",
        options: ["5 minutos", "15 minutos", "4 horas", "6 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, a diferencia de la hipertensión leve que puede requerir horas, las cifras en rangos de emergencia requieren confirmación veloz en 15 minutos de reposo para iniciar neuroprotección inmediata.<br><br>Perla ENARM: \"Sistema Nervioso Central: ≥160 de presión sistólica y/o ≥110 mm Hg de presión diastólica. En dos ocasiones con al menos 15 minutos de diferencia en el mismo brazo, con la paciente en reposo\".<br><br>Análisis de Distractores: Esperar 4 o 6 horas en una paciente con 160/110 mmHg la expone a un evento vascular cerebral o eclampsia. 5 minutos es insuficiente para garantizar el reposo hemodinámico basal.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Anexos, Página 77."
    },
    {
        id: 6,
        question: "¿Cuál es el fármaco antihipertensivo de primera línea recomendado para el tratamiento ambulatorio en pacientes con preeclampsia sin datos de severidad?",
        options: ["Hidralazina", "Nifedipino", "Labetalol", "Alfametildopa"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, los agonistas alfa-2 de acción central han acumulado la mayor evidencia de seguridad sobre el flujo uteroplacentario crónico, haciéndolos ideales para el tratamiento de base no urgente.<br><br>Perla ENARM: \"La prescripción de antihipertensivos orales será de acuerdo a las características clínicas de la paciente [...] siendo de primer línea el uso de metildopa sola o asociado a otros fármacos\".<br><br>Análisis de Distractores: Hidralazina y labetalol destacan en su presentación intravenosa para la resolución rápida de crisis hipertensivas hospitalarias. El nifedipino oral también es útil en crisis o segunda línea, pero la metildopa es el estándar ambulatorio explícito.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 34."
    },
    {
        id: 7,
        question: "¿Qué grupo de fármacos antihipertensivos se encuentra absolutamente contraindicado durante la gestación por el alto riesgo de anomalías renales y oligohidramnios fetal?",
        options: ["Betabloqueadores", "Agonistas alfa centrales", "Bloqueadores de canales de calcio", "Inhibidores de enzima convertidora"],
        answer: 3,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, la interrupción exógena del eje renina-angiotensina altera críticamente la perfusión tubular fetal y la nefrogénesis, generando anuria fetal, oligohidramnios severo y falla renal letal.<br><br>Perla ENARM: \"Los inhibidores de la enzima convertidora de angiotensina y los bloqueadores del receptor de angiotensina no son recomendados utilizarlos durante el embarazo\".<br><br>Análisis de Distractores: Los betabloqueadores, los agonistas alfa centrales (alfametildopa) y los bloqueadores de canales de calcio (nifedipino) conforman la piedra angular del tratamiento antihipertensivo seguro y validado en la mujer embarazada.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 42."
    },
    {
        id: 8,
        question: "¿Cuál es el fármaco de primera elección indicado para la prevención y control de las crisis convulsivas en una paciente con preeclampsia con datos de severidad?",
        options: ["Diazepam", "Fenitoína", "Sulfato de magnesio", "Valproato de magnesio"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, el magnesio actúa como neuroprotector bloqueando los receptores NMDA y la entrada de calcio, superando a todos los anticonvulsivantes clásicos en la reducción de mortalidad y recurrencia.<br><br>Perla ENARM: \"El sulfato de magnesio está recomendado como primera línea para prevención de eclampsia en la paciente con preeclampsia con datos de severidad\".<br><br>Análisis de Distractores: El diazepam y la fenitoína se asocian con peores resultados fetales (depresión respiratoria) y maternos comparados con el magnesio. El valproato es teratogénico y no tiene utilidad en el entorno obstétrico agudo.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 44."
    },
    {
        id: 9,
        question: "Durante la infusión continua de neuroprotección intravenosa, ¿cuál es el signo clínico más precoz que advierte sobre una intoxicación inminente?",
        options: ["Disminución de reflejos tendinosos", "Parálisis flácida respiratoria", "Alteración del estado mental", "Arritmia ventricular letal"],
        answer: 0,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, la acumulación progresiva de magnesio deprime gradualmente la unión neuromuscular, siendo la hiporreflexia el primer indicador reversible (niveles entre 7 a 10 mEq/L) antes del colapso respiratorio.<br><br>Perla ENARM: \"Vigilar signos de intoxicación: El signo clínico más precoz de toxicidad es la disminución o ausencia de reflejos tendinosos profundos\".<br><br>Análisis de Distractores: La parálisis flácida respiratoria y la arritmia letal (paro cardíaco) ocurren en etapas muy tardías y fatales (concentraciones >12 a 15 mEq/L). La alteración del estado mental ocurre en rangos variables, pero la abolición patelar siempre la precede.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Anexos, Página 79."
    },
    {
        id: 10,
        question: "En caso de documentarse toxicidad clínica progresiva por el esquema de Zuspan, ¿cuál es el antídoto antagonista de elección a administrar de forma intravenosa?",
        options: ["Bicarbonato de sodio", "Cloruro de potasio", "Gluconato de calcio", "Flumazenil"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, el calcio revierte directamente el bloqueo del magnesio en la membrana celular y la placa neuromuscular motora, restaurando de manera veloz la excitabilidad muscular.<br><br>Perla ENARM: \"En caso de niveles >7 descontinuar la infusión Administrar Gluconato de calcio 1 ámpula = 4.64 mEq IV x 1 dosis\".<br><br>Análisis de Distractores: El flumazenil revierte benzodiacepinas. El bicarbonato se usa en acidosis o intoxicación por antidepresivos tricíclicos. El cloruro de potasio exacerbaría el riesgo de una arritmia cardíaca en lugar de antagonizar al magnesio.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Anexos, Página 80."
    },
    {
        id: 11,
        question: "En el contexto del daño a órgano blanco, ¿cuál es el nivel de deshidrogenasa láctica que confirma la hemólisis microangiopática en el síndrome de HELLP?",
        options: ["> 200 UI/mL", "> 400 UI/mL", "> 600 UI/mL", "> 1000 UI/mL"],
        answer: 2,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, la disrupción eritrocitaria al atravesar el endotelio estenótico libera concentraciones plasmáticas elevadas de esta enzima, estableciéndose el corte en más de 600 unidades para diagnosticar clínicamente hemólisis severa.<br><br>Perla ENARM: \"Órgano o Sistema Afectado: Hepático [...] Elevación de Deshidrogenasa láctica >600UI/ml\".<br><br>Análisis de Distractores: Los cortes de 200 y 400 UI/mL son valores bajos y carecen de especificidad para el diagnóstico de destrucción globular masiva y daño hepático simultáneo requerido en el HELLP.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Anexos, Página 78."
    },
    {
        id: 12,
        question: "En una paciente de 30 semanas de gestación que requiere estabilización por síndrome de HELLP, ¿cuál es el esquema corticoideo de elección para la madurez pulmonar fetal?",
        options: ["Dexametasona 10 mg cada 12 horas", "Betametasona 12 mg cada 24 horas", "Hidrocortisona 100 mg dosis única", "Metilprednisolona 1 g cada 24 horas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de preeclampsia en segundo nivel, acelerar la producción de factor surfactante antes del nacimiento prematuro inminente exige regímenes obstétricos probados que penetran la barrera placentaria de forma consistente.<br><br>Perla ENARM: \"En pacientes con síndrome de hellp y gestación <34 semanas se recomienda la aplicación de inductores de madurez pulmonar. Los esquemas recomendados son: Betametasona 12 mg intramuscular cada 24 horas 2 dosis\".<br><br>Análisis de Distractores: La dexametasona es una opción válida, pero el esquema obstétrico GPC es de 6 mg cada 12 horas (no 10 mg). La dexametasona 10 mg cada 12h IV es un protocolo cuestionado para tratar el HELLP materno, no para el pulmón. Hidrocortisona y metilprednisolona no tienen indicación aquí.",
        source: "S-020-08, Prevención, diagnóstico y tratamiento de la Preeclampsia en segundo y tercer nivel de atención, 2017, Evidencias y Recomendaciones, Página 52."
    },
    {
        id: 13,
        question: "En la evaluación por ultrasonido Doppler en una preeclampsia, ¿cuál hallazgo representa una causa fetal absoluta para la resolución inmediata del embarazo vía abdominal?",
        options: ["Índice de pulsatilidad uterina elevado", "Disminución del líquido amniótico", "Onda A reversa del ductus venoso", "Restricción simétrica del crecimiento"],
        answer: 2,

    {

                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoDUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoDULastQId', currentQuestionId);
                else localStorage.removeItem('gyoDULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoDUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
<script type="module">

    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    const firebaseConfig = {apiKey: "AIzaSyB26PT8kuB-0fxyUYgGk51yC1rAsW0dYj0", authDomain: "enarm-lite.firebaseapp.com", projectId: "enarm-lite", storageBucket: "enarm-lite.firebasestorage.app", messagingSenderId: "767032952477", appId: "1:767032952477:web:84347320ed3d376f7e7674", measurementId: "G-PVR3RBVNSV"};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.1s ease';
    onAuthStateChanged(auth, async (user) => {
        if (user) {const userDocRef = doc(db, "usuarios_autorizados", user.email);
            const userDocSnap = await getDoc(userDocRef);
            if(userDocSnap.exists()) {document.body.style.opacity = '1';} else {window.location.href = "index.html";}} else {window.location.href = "index.html";}
    });
</script>
