    <!-- MODALES -->

            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará todo tu progreso y respuestas de los casos. ¿Deseas empezar desde cero?</p>

    <div id="finish-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Finalizar Simulador</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">¿Estás seguro de que deseas terminar? Se evaluarán todas tus respuestas y se liberará la justificación médica.</p>
            <div class="flex gap-3">
                <button id="cancel-finish" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Seguir contestando</button>
                <button id="confirm-finish" class="flex-1 py-2 bg-emerald-500 text-white rounded-lg text-sm font-bold hover:bg-emerald-600 transition-colors">Sí, Calificar</button>
            </div>
        </div>
    </div>

    <script>

        const casesData = [
{
                id: 1,
                caseText: "Mujer primigesta de 32 años con embarazo de 34 semanas por ecografía. Acude a urgencias por cefalea occipital refractaria a analgésicos de 12 horas de evolución, escotomas centelleantes y dolor epigástrico intenso. Exploración física: TA 165/115 mmHg, FC 88 lpm, FR 16 rpm, SatO2 98%. Fondo uterino acorde a edad gestacional, FC fetal 140 lpm. Exploración neurológica con hiperreflexia rotuliana bilateral cruzada y clonus inagotable. Presencia de edema ++ en miembros inferiores. Resto de la exploración sin alteraciones.",
                source: "Williams Obstetrics, Capítulo 40: Preeclampsia Syndrome y Capítulo 41: Clinical Management of the Preeclampsia Syndrome, Edición 26",
                questions: [
                    {
                        question: "¿Cuál de los siguientes antecedentes maternos es un factor de riesgo clínico patogénico mayor para el desarrollo de la patología que presenta esta paciente?",
                        options: [
                            "Gestación múltiple",
                            "Nuliparidad",
                            "Tabaquismo activo",
                            "Edad de 25 años"
                        ],
                        answer: 1,
                        justification: "La preeclampsia es un trastorno multisistémico impulsado por una mala adaptación inmunológica y endotelial en la placentación. La nuliparidad es uno de los factores de riesgo clínico independientes más importantes, con un riesgo relativo mayor a 2.0. La exposición primaria a las vellosidades coriónicas y antígenos paternos en el primer embarazo desencadena la respuesta inflamatoria sistémica anómala característica de la preeclampsia.<br><br><b>Perla ENARM:</b> \"Los riesgos mayores para preeclampsia incluyen edad avanzada, nuliparidad, obesidad, diabetes e hipertensión crónica.\"<br><br><b>Análisis de Distractores:</b> La gestación múltiple aumenta la masa placentaria y el riesgo, pero la nuliparidad es el antecedente primario clásico aplicable en pacientes sin comorbilidades. El tabaquismo activo paradójicamente se asocia con una disminución del riesgo de preeclampsia (aunque aumenta el riesgo de restricción del crecimiento). La edad de 25 años es el grupo etario de menor riesgo; los extremos de la vida reproductiva (menores de 20 o mayores de 35 años) representan un factor de riesgo real."
                    },
                    {
                        question: "¿Qué criterio clínico o bioquímico define de forma definitiva a esta patología como severa, independientemente de los niveles de proteinuria?",
                        options: [
                            "Creatinina sérica mayor a 0.8 mg/dl",
                            "Conteo plaquetario menor a 150,000/μL",
                            "Presión arterial sistólica mayor o igual a 160 mmHg",
                            "Transaminasas séricas en el límite superior normal"
                        ],
                        answer: 2,
                        justification: "La preeclampsia se divide en no severa y severa. La presión arterial sistólica ≥ 160 mmHg o diastólica ≥ 110 mmHg es un criterio diagnóstico absoluto de severidad que refleja un aumento crítico de la poscarga y vasospasmo sistémico. La proteinuria nefrótica ya no se considera un criterio para clasificar la severidad. El vasospasmo extremo pone a la paciente en riesgo inminente de hemorragia intracraneal y edema pulmonar.<br><br><b>Perla ENARM:</b> \"Las características de severidad incluyen presión arterial sistólica de 160 mmHg o más, o presión diastólica de 110 mmHg o más.\"<br><br><b>Análisis de Distractores:</b> La creatinina sérica mayor a 0.8 mg/dl es normal en el embarazo; el criterio de severidad es mayor a 1.1 mg/dl o el doble del valor basal. El conteo plaquetario debe ser estrictamente menor a 100,000/μL para considerarse un criterio de severidad (trombocitopenia grave). Las transaminasas séricas en el límite superior normal no cumplen el criterio; deben estar elevadas al doble del valor normal para indicar necrosis hepatocelular."
                    },
                    {
                        question: "Ante la inminencia de eclampsia evidenciada por la hiperreflexia y clonus inagotable, ¿cuál es el fármaco de primera línea y la dosis inicial para la profilaxis de convulsiones?",
                        options: [
                            "Diazepam 10 mg en bolo intravenoso",
                            "Difenilhidantoína 15 mg/kg intravenoso",
                            "Sulfato de magnesio 10 g en infusión continua",
                            "Sulfato de magnesio 4 g en bolo intravenoso"
                        ],
                        answer: 3,
                        justification: "El sulfato de magnesio es el neuroprotector y anticonvulsivante de elección superior a las benzodiacepinas o fenitoína. Actúa inhibiendo los receptores NMDA en el sistema nervioso central, estabilizando la membrana neuronal y produciendo vasodilatación cerebral, lo que revierte la isquemia focal (síndrome PRES). La dosis de impregnación estandarizada en Norteamérica es de 4 a 6 g en 15 a 20 minutos.<br><br><b>Perla ENARM:</b> \"Administre 4 g de sulfato de magnesio como solución al 20% por vía intravenosa a una velocidad que no exceda 1 g/min para el control y prevención de las convulsiones.\"<br><br><b>Análisis de Distractores:</b> El diazepam y la difenilhidantoína están contraindicados como fármacos de primera línea, ya que causan depresión respiratoria neonatal y no abordan el mecanismo fisiopatológico del vasospasmo cerebral (solo se usan si hay contraindicación absoluta para el sulfato de magnesio, como miastenia gravis). La dosis de 10 g de sulfato de magnesio es el régimen de dosis de mantenimiento intramuscular (régimen de Pritchard), no la dosis de bolo intravenoso inicial."
                    },
                    {
                        question: "Para el control agudo de la crisis hipertensiva en esta paciente, se decide utilizar hidralazina intravenosa. ¿Cuál es la dosis inicial exacta recomendada para evitar la insuficiencia uteroplacentaria por caída brusca de la presión?",
                        options: [
                            "5 mg",
                            "10 mg",
                            "20 mg",
                            "40 mg"
                        ],
                        answer: 0,
                        justification: "La hidralazina es un vasodilatador arteriolar directo. El exceso en la dosis inicial provoca hipotensión materna grave, resultando en hipoperfusión placentaria abrupta y desaceleraciones de la FC fetal, mimetizando un desprendimiento de placenta. La respuesta vascular en la preeclampsia es impredecible, por lo que se requiere titulación cautelosa, iniciando estrictamente con el margen inferior y reevaluando cada 20 minutos.<br><br><b>Perla ENARM:</b> \"Para presiones arteriales más altas, se debe evitar la tendencia a administrar una dosis inicial mayor de hidralazina; el protocolo es administrar siempre 5 mg como dosis inicial.\"<br><br><b>Análisis de Distractores:</b> Las dosis de 10 mg, 20 mg o 40 mg en bolo inicial exceden el margen terapéutico seguro. Una caída brusca de la presión arterial media a niveles de hipotensión (por vasodilatación inmediata masiva) compromete el flujo sanguíneo umbilical, lo que obligaría a reanimación con cristaloides e incrementa el riesgo de edema agudo de pulmón iatrogénico."
                    },
                    {
                        question: "La paciente cursa con epigastralgia intensa. ¿Cuál es la complicación anatómica hepática grave y silenciosa que se presenta en preeclampsia y cuyo manejo inicial de primera elección es conservador (observación)?",
                        options: [
                            "Cirrosis biliar focal",
                            "Hematoma subcapsular hepático",
                            "Infarto hepático isquémico masivo",
                            "Esteatosis hepática aguda del embarazo"
                        ],
                        answer: 1,
                        justification: "El vasospasmo, isquemia y necrosis hepatocelular generan hemorragias periportales que confluyen formando un hematoma subcapsular en el hígado. Su manifestación clínica cardinal es el dolor en cuadrante superior derecho o epigastrio. Su ruptura es catastrófica (mortalidad superior al 20%). A pesar de su gravedad, en ausencia de inestabilidad hemodinámica o sangrado activo intrabdominal, el abordaje indicado es la monitorización por tomografía o resonancia magnética.<br><br><b>Perla ENARM:</b> \"Aunque antes se consideraba una condición quirúrgica, el manejo actual de un hematoma hepático es usualmente la observación a menos que haya sangrado continuo.\"<br><br><b>Análisis de Distractores:</b> La cirrosis biliar focal no es una complicación aguda obstétrica. El infarto hepático isquémico masivo (shock liver) es infrecuente y su manejo requiere soporte multiorgánico profundo o trasplante, no solo observación. La esteatosis hepática aguda del embarazo es un diagnóstico diferencial del tercer trimestre con coagulopatía grave e hipoglucemia, pero su patogenia es un defecto del metabolismo de los ácidos grasos, no una hemorragia por isquemia vasoactiva."
                    }
                ]
            },
{
                id: 2,
                caseText: "Neonato prematuro de 28 semanas de gestación, actualmente de 14 días de vida extrauterina, alimentado exclusivamente con fórmula láctea. Inicia cuadro clínico hace 12 horas con intolerancia a la vía oral, vómito biliar y evacuaciones con sangre fresca. A la exploración física: 165 lpm, 60 rpm, temperatura de 38.2 °C y letargo. Abdomen globoso, tenso, doloroso a la palpación generalizada, con franco eritema y edema en la pared abdominal anterior; se delimita una masa fija en el cuadrante inferior derecho. Se coloca sonda nasogástrica obteniendo 15 ml de gasto biliar. Los laboratorios de urgencia reportan leucocitosis, aumento de bandas, trombocitopenia y acidosis metabólica.",
                source: "Schwartz's Principles of Surgery, 2019, Páginas 26, 36 y 38.",
                questions: [
                    {
                        question: "¿Cuál es la combinación de factores de riesgo clásicos presentes para el desarrollo de esta patología?",
                        options: [
                            "Prematurez y alimentación con fórmula.",
                            "Macrosomía y lactancia materna exclusiva.",
                            "Fibrosis quística y meconio espeso.",
                            "Tabaquismo materno y uso de drogas."
                        ],
                        answer: 0,
                        justification: "El cuadro clínico describe una enterocolitis necrosante (ECN) estadio II de Bell. La ECN es el trastorno gastrointestinal letal más frecuente en neonatos prematuros sometidos a estrés fisiológico. Su patogenia es multifactorial, pero la inmadurez intestinal sumada a la introducción de alimentación artificial (fórmula láctea) desencadena una cascada inflamatoria isquémica.<br><br><b>Perla ENARM:</b> \"Los factores de riesgo para la enterocolitis necrosante (ECN) incluyen prematurez, alimentación con fórmula, infección bacteriana e isquemia intestinal.\"<br><br><b>Análisis de Distractores:</b> La opción B es incorrecta porque la lactancia materna es un factor protector comprobado contra la ECN. La opción C corresponde a la fisiopatología del íleo meconial, una entidad obstructiva distal que afecta primariamente a pacientes con fibrosis quística, no mediada por isquemia e inflamación aguda. La opción D, aunque representa un riesgo obstétrico general, no es el factor etiopatogénico directo y cardinal para el desarrollo de necrosis intestinal neonatal."
                    },
                    {
                        question: "Se solicita radiografía de abdomen en posiciones supina y decúbito lateral. ¿Cuál es el hallazgo patognomónico que confirma el diagnóstico de esta enfermedad?",
                        options: [
                            "Signo de la doble burbuja.",
                            "Neumatosis intestinal en pared.",
                            "Microcolon en colon por enema.",
                            "Calcificaciones peritoneales en cáscara."
                        ],
                        answer: 1,
                        justification: "La neumatosis intestinal es el sello radiográfico definitivo de la ECN. Representa la invasión de la mucosa isquémica por microorganismos productores de gas, lo cual diseca la pared intestinal. Otros hallazgos asociados incluyen íleo o gas en la vena porta, siendo este último un signo de mal pronóstico que indica necrosis transmural.<br><br><b>Perla ENARM:</b> \"El hallazgo radiográfico patognomónico en la ECN es la neumatosis intestinal, que representa la invasión de la mucosa isquémica por microbios productores de gas.\"<br><br><b>Análisis de Distractores:</b> La opción A es el signo radiográfico clásico de la atresia duodenal (obstrucción proximal congénita). La opción C se observa en atresias ileales o íleo meconial por la falta de uso del colon distal. La opción D es característica del íleo meconial complicado, donde la perforación in utero genera peritonitis meconial y calcificaciones subsecuentes, no neumatosis aguda."
                    },
                    {
                        question: "¿Cuál es la conducta médica inicial de primera línea indispensable a instaurar en este neonato?",
                        options: [
                            "Alimentación enteral trófica profiláctica.",
                            "Reducción hidrostática con bario.",
                            "Ayuno, antibióticos y descompresión gástrica.",
                            "Cirugía urgente con resección primaria."
                        ],
                        answer: 2,
                        justification: "Ante la sospecha diagnóstica de ECN, el reposo intestinal absoluto es imperativo para frenar la progresión isquémica. La descompresión con sonda nasogástrica evita mayor dilatación y riesgo de perforación, mientras que los antibióticos de amplio espectro intravenosos combaten la traslocación bacteriana. Simultáneamente debe iniciarse nutrición parenteral total y reanimación hídrica.<br><br><b>Perla ENARM:</b> \"En todos los lactantes con sospecha de ECN, se suspenden las tomas, se coloca una sonda nasogástrica y se administran antibióticos parenterales de amplio espectro.\"<br><br><b>Análisis de Distractores:</b> La opción A agravaría el daño isquémico; el intestino debe estar en reposo absoluto. La opción B es el tratamiento de elección para la intususcepción intestinal, la cual está contraindicada si hay signos de peritonitis o isquemia. La opción D no es el primer paso; la cirugía se reserva para pacientes con perforación intestinal confirmada o falla al manejo médico conservador inicial."
                    },
                    {
                        question: "Horas más tarde, el paciente presenta deterioro clínico súbito, choque y la radiografía evidencia neumoperitoneo. ¿Cuál es el manejo quirúrgico avanzado de elección para esta complicación?",
                        options: [
                            "Piloromiotomía abierta de Ramstedt.",
                            "Resección y anastomosis término-terminal.",
                            "Desinvaginación manual mediante laparoscopía.",
                            "Drenaje peritoneal primario o laparotomía."
                        ],
                        answer: 3,

                questions: [
                    {

                    {

                    {

                    {

                caseText: "Hombre de 65 años acude a urgencias por dolor abdominal de 48 horas de evolución, localizado en el cuadrante inferior izquierdo, asociado a fiebre y náuseas. TA 120/80 mmHg, FC 98 lpm, FR 20 rpm, Temperatura 38.5 °C. A la exploración física se observa abdomen plano, con ruidos peristálticos disminuidos, doloroso a la palpación profunda en fosa ilíaca izquierda, sin evidencia de irritación peritoneal. Los laboratorios reportan leucocitosis de 14,000 cel/mm3 con neutrofilia.",
                source: "Schwartz's Principles of Surgery, Capítulo 29: Colon, Rectum, and Anus, 11e.",
                questions: [
                    {
                        question: "¿Cuál es el factor de riesgo dietético primario implicado en la fisiopatología de esta enfermedad?",
                        options: [
                            "Ingesta elevada de grasas saturadas",
                            "Dieta baja en fibra",
                            "Consumo excesivo de calcio",
                            "Dieta rica en proteínas"
                        ],
                        answer: 1,
                        justification: "La enfermedad diverticular es una patología adquirida. La deficiencia de fibra en la dieta disminuye el volumen fecal, lo que genera un aumento en la presión intraluminal y en la tensión de la pared colónica para lograr la propulsión (ley de Laplace). Estas altas presiones radiales producen la herniación de la mucosa y submucosa (divertículos de pulsión).<br><br><b>Perla ENARM:</b> \"La teoría más aceptada es que la falta de fibra dietética resulta en un menor volumen de heces, requiriendo alta presión intraluminal y alta tensión de la pared colónica para la propulsión.\"<br><br><b>Análisis de Distractores:</b> El alto consumo de calcio, dietas hiperproteicas o el consumo exclusivo de grasas saturadas no son los factores primarios descritos para el desarrollo de la segmentación colónica y aumento de la presión intraluminal que da origen a los divertículos. La fisiopatología mecánica recae específicamente en el residuo fecal aportado por la fibra."
                    },
                    {
                        question: "¿Cuál es el estudio de imagen de elección para confirmar el diagnóstico y evaluar complicaciones?",
                        options: [
                            "Colonoscopia convencional",
                            "Radiografía simple de abdomen",
                            "Tomografía computarizada",
                            "Enema con contraste de bario"
                        ],
                        answer: 2,
                        justification: "La tomografía computarizada de abdomen es el estándar de oro inicial ante la sospecha de diverticulitis aguda. Permite confirmar el engrosamiento de la pared colónica, la inflamación pericólica y detectar complicaciones extraluminales (flemón, absceso, aire libre). Los estudios endoscópicos e instilación de contraste a presión están proscritos en la fase aguda por riesgo de ruptura.<br><br><b>Perla ENARM:</b> \"La tomografía computarizada es extremadamente útil para definir la inflamación pericólica, el flemón o el absceso. Los enemas de contraste y/o la endoscopia están relativamente contraindicados por el riesgo de perforación.\"<br><br><b>Análisis de Distractores:</b> La colonoscopia convencional y el enema con contraste de bario aumentan la presión intraluminal y tienen alto riesgo de causar una perforación iatrogénica en un tejido agudamente inflamado. La radiografía simple de abdomen solo tiene utilidad limitada para buscar aire libre subdiafragmático en caso de perforación libre, pero carece de sensibilidad para confirmar diverticulitis."
                    },
                    {
                        question: "Al confirmar ausencia de absceso o perforación, ¿cuál es el tratamiento inicial de elección?",
                        options: [
                            "Antibióticos orales y dieta baja en residuos",
                            "Laparotomía exploradora urgente",
                            "Drenaje percutáneo guiado por imagen",
                            "Colectomía sigmoidea electiva"
                        ],
                        answer: 0,
                        justification: "El paciente presenta diverticulitis no complicada (sin peritonitis ni datos de absceso). El tratamiento estándar de primera línea consiste en reposo intestinal relativo (dieta baja en residuos) y cobertura antibiótica de amplio espectro por 7 a 10 días, manejable de forma ambulatoria en pacientes estables que toleran la vía oral.<br><br><b>Perla ENARM:</b> \"La mayoría de los pacientes con diverticulitis no complicada responderán a la terapia ambulatoria con antibióticos orales de amplio espectro y una dieta baja en residuos.\"<br><br><b>Análisis de Distractores:</b> La laparotomía exploradora urgente se reserva para pacientes con peritonitis difusa o inestabilidad hemodinámica grave. El drenaje percutáneo guiado por imagen requiere obligatoriamente la presencia de un absceso organizado (generalmente mayor a 2 o 3 centímetros). La colectomía sigmoidea electiva se considera a largo plazo o tras múltiples recurrencias, no como manejo inicial del evento agudo no complicado."
                    },
                    {
                        question: "Si el paciente desarrollara un absceso pélvico de 4 centímetros, ¿cuál es el manejo indicado?",
                        options: [
                            "Antibióticos parenterales exclusivos",
                            "Colectomía sigmoidea con anastomosis primaria",
                            "Procedimiento de Hartmann de urgencia",
                            "Drenaje percutáneo guiado por tomografía"
                        ],
                        answer: 3,
                        justification: "Un absceso pélvico mayor a 2 centímetros corresponde a una diverticulitis complicada (Hinchey II). La conducta de elección es el drenaje percutáneo mediante tomografía o ultrasonido, acompañado de antibióticos parenterales, lo que permite controlar la sepsis sin requerir resección de urgencia, facilitando una cirugía electiva en un solo tiempo posteriormente.<br><br><b>Perla ENARM:</b> \"Los abscesos más grandes se tratan mejor con drenaje percutáneo guiado por tomografía computarizada y antibióticos.\"<br><br><b>Análisis de Distractores:</b> Los antibióticos parenterales exclusivos son insuficientes para abscesos mayores a 2 centímetros y tienen alta tasa de falla terapéutica. La colectomía con anastomosis o el procedimiento de Hartmann se indican si el absceso es inaccesible al drenaje, falla la terapia percutánea o existe deterioro sistémico progresivo."
                    },
                    {
                        question: "¿Qué complicación aguda es indicación absoluta para realizar una laparotomía de urgencia?",
                        options: [
                            "Presencia de peritonitis difusa",
                            "Formación de fístula colovesical",
                            "Obstrucción colónica incompleta",
                            "Absceso pericólico de 1 centímetro"
                        ],
                        answer: 0,
                        justification: "La presencia de peritonitis purulenta (Hinchey III) o fecal (Hinchey IV) o el deterioro hemodinámico por perforación libre demandan exploración quirúrgica de emergencia. En estos escenarios se debe realizar resección del segmento afectado, siendo el procedimiento de Hartmann (colectomía con colostomía terminal) el más seguro en un campo contaminado.<br><br><b>Perla ENARM:</b> \"El deterioro en la condición clínica del paciente y el desarrollo de peritonitis son indicaciones para laparotomía.\"<br><br><b>Análisis de Distractores:</b> La obstrucción colónica incompleta se maneja inicialmente con reanimación, descompresión y enemas hidrosolubles. Un absceso pericólico pequeño (1 centímetro) suele responder a manejo conservador con antibióticos parenterales. La fístula colovesical es una secuela crónica de la diverticulitis complicada que requiere resección quirúrgica, pero se realiza de manera electiva, no como una urgencia inmediata."
                    }
                ]
            },

{
                id: 34,
                caseText: "Mujer de 62 años. TA 130/80 mmHg, FC 78 lpm, FR 16 rpm, IMC 32 kg/m². Acude por sangrado transvaginal de 3 días de evolución, cantidad moderada, sin coágulos. Refiere menopausia a los 51 años. Niega uso de terapia hormonal o antecedente de coagulopatías. Comorbilidades: diabetes mellitus tipo 2 de 5 años de diagnóstico, en tratamiento con metformina. A la exploración física: genitales externos atróficos, cérvix sin lesiones evidentes, con sangrado escaso proveniente del canal endocervical. Útero en anteversión, tamaño normal, anexos no palpables.",
                source: "Williams Gynecology, Capítulo 8: Abnormal Uterine Bleeding, 4th Edition, Páginas 151-153, 158, 162-179 y 184.",
                questions: [
                    {
                        question: "¿De acuerdo con los factores de riesgo de la paciente, ¿qué mecanismo fisiopatológico contribuye principalmente a la etiología de su sangrado?",
                        options: [
                            "Conversión periférica de andrógenos a estrógenos",
                            "Deficiencia cuantitativa del factor de von Willebrand",
                            "Atrofia severa del epitelio escamoso vaginal",
                            "Presencia de un pólipo endocervical fibroso"
                        ],
                        answer: 0,
                        justification: "La obesidad (IMC de 32 kg/m²) en la mujer posmenopáusica genera un estado de hiperestrogenismo relativo debido a la conversión periférica de andrógenos a estrona en el tejido adiposo mediada por la enzima aromatasa. Este estímulo estrogénico sin oposición, aunado a la diabetes mellitus, representa el principal factor de riesgo para el desarrollo de hiperplasia o carcinoma endometrial, patología que debe descartarse obligatoriamente en toda paciente posmenopáusica con sangrado uterino anormal.<br><br><b>Perla ENARM:</b> \"La obesidad, la anovulación crónica, la diabetes y el uso de estrógenos sin oposición son factores de riesgo mayores para hiperplasia y cáncer endometrial.\"<br><br><b>Análisis de Distractores:</b> La deficiencia del factor de von Willebrand (opción B) es una causa de sangrado en adolescentes o mujeres jóvenes, pero extremadamente rara como causa de inicio de novo en la posmenopausia. La atrofia vaginal (opción C) y el pólipo endocervical (opción D) pueden causar sangrado, pero no están directamente impulsados por el síndrome metabólico y la obesidad de la paciente; además, el caso especifica que el sangrado proviene del canal endocervical y el cérvix no tiene lesiones evidentes."
                    },
                    {
                        question: "¿Cuál es el estudio de imagen de primera elección para el abordaje diagnóstico inicial de esta paciente?",
                        options: [
                            "Histeroscopia diagnóstica en consultorio",
                            "Ultrasonido pélvico transvaginal",
                            "Tomografía computarizada de pelvis",
                            "Sonohisterografía con infusión salina"
                        ],
                        answer: 1,
                        justification: "El ultrasonido transvaginal es la herramienta imagenológica inicial de elección en el sangrado uterino anormal de la paciente posmenopáusica por ser accesible, costo-efectiva y bien tolerada. Permite medir el grosor del eco endometrial con alta sensibilidad para descartar patología maligna y ayuda a diferenciar la enfermedad miometrial de la cavitaria.<br><br><b>Perla ENARM:</b> \"El ultrasonido transvaginal es el primer paso lógico en la evaluación del sangrado uterino anormal para determinar el grosor de la franja endometrial.\"<br><br><b>Análisis de Distractores:</b> La histeroscopia (opción A) y la sonohisterografía (opción D) son excelentes para evaluar lesiones focales (como pólipos o miomas submucosos), pero son más invasivas y costosas, reservándose como estudios de segunda línea si el ultrasonido inicial es anormal o la biopsia es inconclusa. La tomografía computarizada (opción C) no tiene utilidad en la evaluación inicial del grosor endometrial."
                    },
                    {
                        question: "El estudio de imagen reporta un grosor endometrial de 6 milímetros. ¿Cuál es la conducta clínica de primera línea a seguir?",
                        options: [
                            "Seguimiento ecográfico en 6 meses",
                            "Ablación endometrial térmica",
                            "Biopsia endometrial en consultorio",
                            "Histerectomía total abdominal"
                        ],
                        answer: 2,
                        justification: "En pacientes posmenopáusicas con sangrado uterino anormal, un grosor endometrial mayor a 4 milímetros medido por ultrasonido transvaginal es el punto de corte que obliga a realizar una evaluación histológica para descartar hiperplasia o cáncer endometrial. La biopsia en consultorio (ej. cánula de Pipelle) es el método inicial por su alta sensibilidad y menor morbilidad.<br><br><b>Perla ENARM:</b> \"Para mujeres posmenopáusicas con sangrado uterino anormal, un grosor endometrial mayor a 4 milímetros típicamente requiere evaluación adicional con biopsia endometrial, sonohisterografía o histeroscopia.\"<br><br><b>Análisis de Distractores:</b> La observación (opción A) es incorrecta porque el grosor supera el límite de seguridad de 4 milímetros, dejando un cáncer potencial sin diagnóstico. La ablación endometrial (opción B) está absolutamente contraindicada en pacientes con alto riesgo de cáncer o sin diagnóstico histológico previo. La histerectomía (opción D) es un tratamiento quirúrgico radical que no se justifica sin un reporte histopatológico confirmatorio de malignidad o hiperplasia atípica."
                    },
                    {
                        question: "Se realiza el procedimiento indicado, pero el reporte histopatológico de la muestra reporta \"tejido insuficiente\". Considerando las características de la paciente, ¿cuál es el paso a seguir?",
                        options: [
                            "Reiniciar metformina a dosis altas",
                            "Prescribir medroxiprogesterona oral cíclica",
                            "Observación y egreso a primer nivel",
                            "Dilatación y legrado con histeroscopia"
                        ],
                        answer: 3,
                        justification: "Una biopsia endometrial insuficiente en una paciente posmenopáusica con alto riesgo de cáncer (obesidad, diabetes, grosor endometrial >4 mm y sangrado persistente) no descarta malignidad. En estos casos, se requiere un método de muestreo más exhaustivo. La dilatación y legrado ofrece tasas mucho más altas de obtención de tejido adecuado, y su combinación con histeroscopia permite identificar lesiones focales no detectadas a ciegas.<br><br><b>Perla ENARM:</b> \"Para una muestra insuficiente en pacientes que conllevan un mayor riesgo de cáncer, la dilatación y legrado ofrece mayores tasas de muestreo suficiente y la histeroscopia concurrente permite detectar lesiones focales.\"<br><br><b>Análisis de Distractores:</b> Observar a la paciente (opción C) o prescribir progestágenos empíricos (opción B) es una negligencia médica, ya que persiste la alta sospecha de patología maligna no diagnosticada debido a la falla del método de tamizaje. Ajustar la metformina (opción A) controla la diabetes, pero no diagnostica ni trata el origen del sangrado uterino."
                    },
                    {
                        question: "Si el reporte histopatológico final confirmara el diagnóstico de hiperplasia endometrial sin atipia, ¿cuál es el tratamiento farmacológico de primera línea recomendado?",
                        options: [
                            "Dispositivo intrauterino liberador de levonorgestrel",
                            "Ácido tranexámico cada 8 horas por 5 días",
                            "Estrógenos conjugados equinos continuos",
                            "Danazol continuo por 6 meses"
                        ],
                        answer: 0,
                        justification: "La hiperplasia endometrial sin atipia es una lesión global originada por el estímulo estrogénico sin oposición, la cual tiende a regresar al contrarrestar este ambiente hormonal. Los progestágenos son la piedra angular del tratamiento médico. El sistema intrauterino liberador de levonorgestrel (LNG-IUS) o la medroxiprogesterona oral son altamente efectivos para atrofiar el endometrio y revertir la hiperplasia.<br><br><b>Perla ENARM:</b> \"La hiperplasia sin atipia se trata mejor con progesterona; las formas comunes incluyen medroxiprogesterona oral o el sistema intrauterino liberador de levonorgestrel.\"<br><br><b>Análisis de Distractores:</b> El ácido tranexámico (opción B) es un antifibrinolítico útil para sangrados agudos, pero no revierte el cambio hiperplásico del endometrio. Los estrógenos conjugados (opción C) agravarían la patología subyacente al perpetuar el ambiente hiperestrogénico. El Danazol (opción D) es un andrógeno sintético que produce efectos adversos severos y no es de primera línea para hiperplasia endometrial."
                    }
                ]
            },
{
                id: 35,
                caseText: "Mujer de 34 años, multigesta, con antecedente de preeclampsia severa, acude a urgencias a las 36 semanas de gestación por inicio súbito de sangrado transvaginal oscuro y dolor abdominal intenso. A la exploración física: TA 150/100 mmHg, FC 110 lpm, FR 22 rpm. Útero hipertrónico, doloroso a la palpación, altura uterina de 34 cm. Tacto vaginal con sangrado oscuro, sin modificaciones cervicales. El registro cardiotocográfico muestra FC fetal basal de 100 lpm con desaceleraciones tardías repetitivas y ausencia de variabilidad.",
                source: "Williams Obstetrics, Capítulo 43: Hemorrhagic Placental Disorders; Capítulo 44: Management of Obstetrical Hemorrhage, 26a Edición.",
                questions: [
                    {
                        question: "¿Cuál es el factor de riesgo materno más frecuentemente asociado a la patología que presenta esta paciente según la evidencia actual?",
                        options: [
                            "Multiparidad",
                            "Trastornos hipertensivos",
                            "Tabaquismo materno",
                            "Edad mayor a 35 años"
                        ],
                        answer: 1,
                        justification: "El desprendimiento prematuro de placenta normoincerta tiene como condición asociada más frecuente la hipertensión (gestacional, crónica o preeclampsia). El vasoespasmo y daño endotelial alteran la perfusión del lecho placentario, culminando en la ruptura de arterias espirales deciduales y formación de un hematoma retroplacentario.<br><br><b>Perla ENARM:</b> \"Alguna forma de hipertensión es la condición más frecuentemente asociada con el desprendimiento placentario.\"<br><br><b>Análisis de Distractores:</b> La multiparidad (A), el tabaquismo (C) y la edad materna avanzada (D) son factores de riesgo documentados para abrupción placentaria, pero su incidencia y peso etiológico directo son estadísticamente inferiores a la enfermedad hipertensiva del embarazo, la cual eleva el riesgo hasta 4 veces."
                    },
                    {
                        question: "Ante la sospecha clínica evidente, ¿cuál es la utilidad clínica inicial de la ecografía en este escenario específico?",
                        options: [
                            "Confirmar la presencia del hematoma retroplacentario agudo.",
                            "Establecer la edad del coágulo por sus características ecogénicas.",
                            "Clasificar el grado de invasión trofoblástica miometrial.",
                            "Descartar la presencia de una placenta previa concomitante."
                        ],
                        answer: 3,
                        justification: "En pacientes con sangrado uterino de la segunda mitad del embarazo, el diagnóstico de desprendimiento es clínico (dolor, sangrado oscuro, hipertonía). La ecografía tiene una sensibilidad muy baja (24 %) para visualizar coágulos frescos, ya que pueden ser isoecogénicos con la placenta. Su rol crítico inicial es de exclusión topográfica.<br><br><b>Perla ENARM:</b> \"Previa no debe excluirse hasta que la evaluación ecográfica haya demostrado claramente su ausencia.\"<br><br><b>Análisis de Distractores:</b> Confirmar el hematoma (A) no es el objetivo principal por la alta tasa de falsos negativos del ultrasonido en la etapa aguda. La edad del coágulo (B) no se puede determinar ecográficamente con precisión. Clasificar la invasión trofoblástica (C) corresponde al tamizaje del espectro de placenta accreta, no de abrupción."
                    },
                    {
                        question: "Con base en los hallazgos del registro cardiotocográfico y la hipertonía uterina, ¿cuál es la conducta obstétrica de primera línea?",
                        options: [
                            "Inducción del trabajo de parto con oxitocina.",
                            "Administración de terbutalina intravenosa.",
                            "Cesárea de emergencia.",
                            "Amniotomía temprana y vigilancia estricta."
                        ],
                        answer: 2,
                        justification: "La presencia de sangrado, dolor, hipertonía y un trazo cardiotocográfico no tranquilizador (bradicardia, desaceleraciones tardías, pérdida de variabilidad) confirma un compromiso fetal grave secundario a hipoxia. El tratamiento definitivo y salvador es la evacuación uterina inmediata.<br><br><b>Perla ENARM:</b> \"El feto comprometido generalmente se atiende mejor mediante parto por cesárea, y la velocidad de respuesta es un factor importante en los resultados perinatales.\"<br><br><b>Análisis de Distractores:</b> La inducción con oxitocina (A) y la amniotomía temprana (D) están indicadas primariamente si el feto ha fallecido y se busca un parto vaginal, pero no en hipoxia aguda de un feto vivo. El uso de tocolíticos como la terbutalina (B) está categóricamente contraindicado, ya que la taquicardia secundaria enmascara el choque hipovolémico materno."
                    },
                    {
                        question: "Durante el evento, la paciente presenta hemorragia obstétrica en curso. ¿Cuál es el umbral de hematocrito recomendado para indicar una transfusión rápida de concentrados eritrocitarios en este escenario?",
                        options: [
                            "Menor a 25 %",
                            "Menor a 30 %",
                            "Menor a 21 %",
                            "Menor a 28 %"
                        ],
                        answer: 0,
                        justification: "En el manejo de la hemorragia obstétrica activa con pérdida de volumen, el umbral transfusional es mayor que en pacientes críticas estables, con el objetivo de evitar el colapso hemodinámico y optimizar el transporte de oxígeno.<br><br><b>Perla ENARM:</b> \"En general, con hemorragia obstétrica continua, recomendamos una infusión rápida de sangre cuando el hematocrito es menor a 25%.\"<br><br><b>Análisis de Distractores:</b> Un nivel menor a 21 % (C) se utiliza como umbral restrictivo en unidades de cuidados intensivos o trauma sin sangrado activo. Valores de 30 % (B) y 28 % (D) son umbrales liberales no justificados que aumentarían riesgos asociados a la transfusión sin un beneficio adicional comprobado en la oxigenación tisular inicial."
                    },
                    {
                        question: "En el transoperatorio, el útero presenta infiltración extensa de sangre en la musculatura miometrial y debajo de la serosa. ¿Cuál es el impacto clínico directo de este hallazgo?",
                        options: [
                            "Garantiza el fracaso de los uterotónicos y obliga a ligadura arterial.",
                            "Predispone a la presencia de atonía uterina postparto.",
                            "Constituye una indicación quirúrgica absoluta para histerectomía.",
                            "Provoca necrosis isquémica irreversible del miometrio anterior."
                        ],
                        answer: 1,
                        justification: "La extravasación diseminada de sangre hacia la musculatura uterina se denomina útero de Couvelaire (apoplejía uteroplacentaria). Esta infiltración hemorrágica interfiere con la arquitectura y contractilidad del miometrio liso, incrementando significativamente el riesgo de atonía uterina.<br><br><b>Perla ENARM:</b> \"Estas hemorragias miometriales pueden incitar la atonía uterina, pero no son una indicación exclusiva de histerectomía.\"<br><br><b>Análisis de Distractores:</b> El útero de Couvelaire no es una indicación absoluta de histerectomía (C), ya que en la mayoría de los casos responde al manejo médico conservador. No garantiza el fracaso de los uterotónicos (A), los cuales continúan siendo el manejo profiláctico y terapéutico de primera línea. Aunque existe extravasación de sangre, no provoca necrosis isquémica tisular irreversible (D)."
                    }
                ]
            },

{
                id: 36,
                caseText: "Mujer de 35 años, con diagnóstico reciente de infección por virus de la inmunodeficiencia humana (recuento de linfocitos T CD4 45/μL). Acude por fiebre vespertina, diaforesis nocturna y pérdida de 8 kg en 2 meses, asociado a tos productiva purulenta. Exploración física: TA 110/70 mmHg, FC 105 lpm, FR 22 lpm, temperatura 38.5 °C. Caquexia evidente. Tórax con estertores crepitantes en ápice derecho. La radiografía de tórax evidencia infiltrado intersticial difuso sin presencia de cavitaciones.",
                source: "Harrison's Principles of Internal Medicine, Capítulo 183: Tuberculosis y Capítulo 186: Antimycobacterial Agents, 22nd Edition.",
                questions: [
                    {
                        question: "En este paciente, ¿cuál es el factor de riesgo endógeno con mayor peso absoluto para el desarrollo de la enfermedad activa descrita tras una infección primaria?",
                        options: [
                            "Tabaquismo activo crónico",
                            "Desnutrición proteico-calórica",
                            "Infección por virus de la inmunodeficiencia humana",
                            "Antecedente de estancia en hacinamiento"
                        ],
                        answer: 2,
                        justification: "El riesgo de que la infección progrese a enfermedad activa está directamente relacionado con el grado de inmunosupresión del paciente. Aunque la desnutrición y el tabaquismo elevan el riesgo relativo (2 a 3 veces), el déficit de la inmunidad celular provocado por el retrovirus tiene un impacto radicalmente superior (riesgo relativo 21 a >30 veces mayor).<br><br><b>Perla ENARM:</b> \"En términos absolutos, el factor de riesgo más potente para tuberculosis entre las personas infectadas es la coinfección por VIH, la cual suprime la inmunidad celular.\"<br><br><b>Análisis de Distractores:</b> El tabaquismo y la desnutrición (opciones A y B) son comorbilidades reconocidas que aumentan el riesgo de reactivación, pero su peso epidemiológico y absoluto es notablemente inferior al de la alteración inmunológica viral. El hacinamiento (opción D) es un factor exógeno crucial para la transmisión del bacilo y la adquisición de la infección, pero no determina la progresión endógena de infección a enfermedad clínica."
                    },
                    {
                        question: "¿Cuál es el estudio diagnóstico de primera elección recomendado de forma inicial para este escenario clínico?",
                        options: [
                            "Ensayo automatizado de amplificación de ácidos nucleicos",
                            "Baciloscopia seriada con tinción de auramina",
                            "Cultivo automatizado en medio líquido",
                            "Ensayo de liberación de interferón gamma"

{

                questions: [

                    {

                    {
                        question: "¿Cuál es el tratamiento inicial de primera línea para prevenir la progresión del daño renal en este paciente?",

                    {
                        question: "Este paciente presenta potasio de 6.8 mEq/L. ¿Cuál es el tratamiento intravenoso de primera línea indicado específicamente para prevenir arritmias letales?",

                    },
                    {
                        question: "Durante el seguimiento, el paciente cursa con anuria y sobrecarga hídrica pulmonar. Según las guías clínicas, ¿cuál es un criterio absoluto para iniciar terapia de reemplazo renal en este escenario?",

                    {

{

                questions: [

                    },
                    {
                        question: "Para confirmar el diagnóstico de la paciente, ¿cuál es el estudio serológico que ofrece la mayor especificidad (>95%)?",

                    },
                    {
                        question: "¿Cuál es el fármaco modificador de la enfermedad de primera elección que debe iniciar en esta paciente de forma temprana?",

                        answer: 2,
                        justification: "El metotrexato es el estándar de oro inicial debido a su eficacia para inducir remisión, mejorar la supervivencia y reducir la progresión del daño estructural radiográfico. Ejerce su efecto antiinflamatorio estimulando la liberación de adenosina.<br><br><b>Perla ENARM:</b> \"El metotrexato es el fármaco modificador de la enfermedad de primera elección para el tratamiento de la artritis reumatoide y es el fármaco ancla para la mayoría de las terapias combinadas.\"<br><br><b>Análisis de Distractores:</b> La leflunomida (A) y la sulfasalazina (B) son alternativas sintéticas efectivas, pero se reservan para intolerancia al metotrexato o como parte de la terapia combinada (ej. triple terapia oral). La hidroxicloroquina (D) no retrasa la progresión radiográfica del daño articular por sí sola, limitándose a enfermedad leve o como coadyuvante."
                    },
                    {
                        question: "Si la paciente cursa con 6 meses de tratamiento y presenta persistencia de alta actividad clínica sin alcanzar la meta de remisión, ¿cuál es el paso a seguir en el manejo farmacológico avanzado?",
                        options: [

                        ],

                        justification: "Ante el fracaso terapéutico o la respuesta inadecuada con el metotrexato, la conducta de escalonamiento (\"treat-to-target\") indica iniciar terapia combinada con agentes biológicos. Los inhibidores del factor de necrosis tumoral alfa (TNF-a) como infliximab, adalimumab o etanercept actúan bloqueando la cascada proinflamatoria y detienen eficazmente la osteoclastogénesis.<br><br><b>Perla ENARM:</b> \"Los proveedores deben considerar la escalada a la terapia combinada o cambiar a un anti-TNF con o sin metotrexato o un biológico no-TNF ante la enfermedad activa persistente.\"<br><br><b>Análisis de Distractores:</b> El rituximab (A) está aprobado primariamente para enfermedad refractaria que ya ha fallado a un primer inhibidor de TNF-a. Las dosis altas de esteroide (B) son útiles para manifestaciones extraarticulares graves (ej. enfermedad pulmonar intersticial) o como puente temporal, pero no detienen la progresión estructural a largo plazo. La anakinra (C) tiene un uso clínico limitado actualmente por su menor eficacia comparada con los bloqueadores de TNF."

                source: "Current Diagnosis & Treatment: Pediatrics, Capítulo 2: The Newborn Infant, 27th Edition.",
                questions: [
                    {
                        question: "¿Cuál es la intervención antenatal de primera elección que reduce significativamente la incidencia y mortalidad de esta patología?",
                        options: [
                            "Administración de indometacina intravenosa",
                            "Administración de corticosteroides maternos",
                            "Administración de sulfato de magnesio materno",
                            "Administración de antibióticos profilácticos"
                        ],
                        answer: 1,
                        justification: "El paciente presenta un cuadro clásico de enfermedad de membrana hialina (síndrome de dificultad respiratoria tipo 1) caracterizado por prematurez, taquipnea, quejido y cianosis debido a la deficiencia de surfactante. La terapia con corticosteroides prenatales acelera la maduración pulmonar y reduce la morbilidad y mortalidad respiratoria si se administra con tiempo suficiente antes del parto.<br><br><b>Perla ENARM:</b> \"La administración prenatal de corticosteroides a la madre es una estrategia importante para acelerar la maduración pulmonar. Los lactantes cuyas madres recibieron corticosteroides más de 24 horas antes del parto prematuro tienen menos probabilidades de tener enfermedad de membrana hialina y tienen una tasa de mortalidad más baja.\"<br><br><b>Análisis de Distractores:</b> La indometacina intravenosa se utiliza posnatalmente para el cierre del conducto arterioso persistente, no como profilaxis pulmonar. El sulfato de magnesio confiere neuroprotección fetal y previene eclampsia, pero no madura los neumocitos tipo 2. Los antibióticos profilácticos previenen la sepsis neonatal temprana por estreptococo del grupo B, pero no evitan la deficiencia de surfactante pulmonar."
                    },
                    {
                        question: "¿Qué hallazgo radiológico es clásico y confirma el diagnóstico de esta enfermedad?",
                        options: [
                            "Infiltrados asimétricos gruesos con hiperinsuflación",
                            "Líquido en cisuras interlobares con congestión perihiliar",
                            "Atelectasia bilateral difusa con aspecto de vidrio esmerilado",
                            "Neumatosis intestinal con aire en la vena porta"
                        ],
                        answer: 2,
                        justification: "La deficiencia de surfactante provoca un colapso alveolar generalizado (atelectasia difusa) que disminuye la distensibilidad pulmonar. Radiográficamente, esto se traduce en un patrón reticulogranular fino bilateral (\"vidrio esmerilado\") con broncogramas aéreos visibles debido al contraste entre las vías respiratorias mayores aireadas y los sacos alveolares colapsados.<br><br><b>Perla ENARM:</b> \"La radiografía de tórax demuestra atelectasia bilateral difusa, causando un aspecto de vidrio esmerilado. Las vías respiratorias principales se resaltan por los sacos de aire atelectásicos, creando broncogramas aéreos.\"<br><br><b>Análisis de Distractores:</b> Los infiltrados asimétricos gruesos con hiperinsuflación son patognomónicos del síndrome de aspiración de meconio. El líquido en cisuras con marcas perihiliares prominentes define a la taquipnea transitoria del recién nacido. La neumatosis intestinal es el sello radiológico de la enterocolitis necrosante, una emergencia gastrointestinal, no respiratoria."
                    },
                    {
                        question: "¿Cuál es el tratamiento farmacológico de rescate de primera línea indicado en las primeras 2 a 4 horas de vida para este paciente?",
                        options: [
                            "Surfactante exógeno endotraqueal",
                            "Cafeína citrato intravenosa",
                            "Óxido nítrico inhalado",
                            "Ibuprofeno intravenoso"
                        ],
                        answer: 0,
                        justification: "El manejo agudo de la enfermedad de membrana hialina que requiere intubación o no responde a presión positiva continua en la vía aérea (CPAP) incluye la administración temprana de surfactante endotraqueal. Esto reduce la tensión superficial, mejora la oxigenación, previene fugas de aire (neumotórax) y disminuye la mortalidad global.<br><br><b>Perla ENARM:</b> \"El reemplazo de surfactante se puede usar como profilaxis o como rescate en la enfermedad de membrana hialina establecida, preferiblemente dentro de las primeras 2 a 4 horas después del nacimiento.\"<br><br><b>Análisis de Distractores:</b> El citrato de cafeína es el tratamiento de elección para la apnea del prematuro. El óxido nítrico inhalado es un vasodilatador pulmonar reservado para la hipertensión pulmonar persistente del recién nacido. El ibuprofeno intravenoso se indica para el cierre farmacológico del conducto arterioso persistente hemodinámicamente significativo."
                    },
                    {
                        question: "Durante el soporte ventilatorio de este paciente, ¿cuál es la meta estricta de saturación de oxígeno por oximetría de pulso para evitar daño tisular?",
                        options: [
                            "85 a 89 %",
                            "95 a 100 %",
                            "88 a 92 %",
                            "92 a 96 %"
                        ],
                        answer: 3,
                        justification: "La oxigenoterapia en el neonato prematuro debe titularse cuidadosamente para evitar la hipoxemia y la hiperoxia, ya que esta última genera radicales libres de oxígeno que exacerban la lesión pulmonar y retiniana. La oximetría de pulso continua permite ajustar la fracción inspirada de oxígeno para mantenerse dentro de parámetros fisiológicos seguros.<br><br><b>Perla ENARM:</b> \"La dificultad respiratoria neonatal se trata con oxígeno suplementario suficiente para mantener una PaO2 de 60 a 70 mm Hg y una saturación de oxígeno por oximetría de pulso (SaO2) de 92 a 96 %.\"<br><br><b>Análisis de Distractores:</b> Las metas de 85 a 89 % o de 88 a 92 % resultan en hipoxemia subóptima y limitan la perfusión cerebral y miocárdica. Una meta de 95 a 100 % predispone fuertemente a toxicidad por oxígeno, aumentando exponencialmente el riesgo de displasia broncopulmonar y retinopatía del prematuro severa."
                    },
                    {
                        question: "¿Cuál es la principal complicación crónica esperada a las 36 semanas de edad posmenstrual secundaria a la inmadurez, inflamación y toxicidad por oxígeno en este padecimiento?",
                        options: [
                            "Enfermedad pulmonar crónica",
                            "Retinopatía del prematuro",
                            "Hemorragia intraventricular",
                            "Enterocolitis necrosante"
                        ],
                        answer: 0,
                        justification: "Los neonatos ventilados mecánicamente por deficiencia de surfactante desarrollan inflamación pulmonar y daño por volutrauma u oxígeno. Cuando los síntomas respiratorios, la necesidad de oxígeno y las alteraciones radiográficas persisten a las 36 semanas de edad posmenstrual, se diagnostica enfermedad pulmonar crónica (displasia broncopulmonar).<br><br><b>Perla ENARM:</b> \"La enfermedad pulmonar crónica, definida como síntomas respiratorios, requerimiento de oxígeno y anomalías en la radiografía de tórax a las 36 semanas de edad posmenstrual, ocurre en aproximadamente el 20 % de los prematuros ventilados por deficiencia de surfactante.\"<br><br><b>Análisis de Distractores:</b> La retinopatía del prematuro se desencadena por hiperoxia pero se clasifica como una afección oftalmológica y vascular, no una afección parenquimatosa respiratoria a las 36 semanas. La hemorragia intraventricular es una complicación neurológica aguda (primeros 4 días). La enterocolitis necrosante es un cuadro gastrointestinal agudo por isquemia y traslocación bacteriana."
                    }
                ]

{
                id: 53,
                caseText: "Hombre de 62 años acude a consulta por cefalea occipital ocasional. Antecedentes: diabetes mellitus tipo 2 de 5 años de diagnóstico. Exploración física: peso 92 kg, talla 1.68 m, índice de masa corporal 32.6 kg/m², TA 152/94 mmHg, FC 78 lpm, FR 16 rpm. Fondo de ojo: cruces arteriovenosos y estrechamiento arterial leve. Ruidos cardiacos rítmicos, reforzamiento del segundo ruido en foco aórtico. Exámenes de laboratorio: glucosa en ayuno 135 mg/dl, creatinina 1.1 mg/dl, tasa de filtración glomerular estimada 72 ml/min/1.73 m², potasio 4.2 mmol/l. Relación albúmina/creatinina en orina 45 mg/g. Electrocardiograma: ritmo sinusal, sin alteraciones del segmento ST.",
                source: "Current Medical Diagnosis & Treatment 2026, 13-03: Approach to Hypertension; 13-04: Drug Therapy: Current Antihypertensive Agents. Harrison's Principles of Internal Medicine, Capítulo 288: Hypertension, 22nd Edition.",
                questions: [
                    {
                        question: "¿Qué intervención no farmacológica tiene el mayor impacto esperado en la reducción de la presión arterial sistólica (5 a 20 mmHg) en este paciente?",
                        options: [
                            "Adopción de la dieta Dietary Approaches to Stop Hypertension",
                            "Reducción de peso corporal hasta alcanzar un peso ideal",
                            "Restricción del consumo de sodio a menos de 1500 mg diarios",
                            "Suplementación de potasio dietético a 3500 mg diarios"
                        ],
                        answer: 1,
                        justification: "El control del peso es la medida no farmacológica más eficaz para el control de la hipertensión arterial. La pérdida de peso logra una reducción de 5 a 20 mmHg por cada 10 kg de peso perdido, superando a otras intervenciones dietéticas o de estilo de vida de manera individual.<br><br><b>Perla ENARM:</b> \"En pacientes con sobrepeso u obesidad, la reducción de peso tiene el mayor impacto hemodinámico; se espera una disminución de la presión arterial sistólica de aproximadamente 1 mmHg por cada kilogramo de peso perdido.\"<br><br><b>Análisis de Distractores:</b> La adopción de la dieta Dietary Approaches to Stop Hypertension (A) disminuye la presión arterial sistólica entre 8 y 14 mmHg. La restricción estricta de sodio (C) logra una reducción de 2 a 8 mmHg. La suplementación con potasio (D) aporta una disminución de 4 a 5 mmHg. Si bien todas son medidas indicadas, ninguna alcanza el impacto potencial máximo de 20 mmHg que ofrece la pérdida de peso en pacientes con obesidad."
                    },
                    {
                        question: "Según la clasificación del American College of Cardiology y la American Heart Association, ¿en qué categoría diagnóstica de presión arterial se encuentra el paciente?",
                        options: [
                            "Presión arterial elevada",
                            "Hipertensión arterial etapa 1",
                            "Hipertensión arterial etapa 2",

                        answer: 2,
                        justification: "Las guías del American College of Cardiology y la American Heart Association definen la Hipertensión etapa 2 cuando la presión arterial sistólica es mayor o igual a 140 mmHg, o la presión arterial diastólica es mayor o igual a 90 mmHg. El paciente presenta 152/94 mmHg, ubicándolo directamente en esta categoría.<br><br><b>Perla ENARM:</b> \"Cuando las cifras sistólicas y diastólicas caen en categorías distintas, el diagnóstico siempre debe establecerse utilizando la cifra que clasifique al paciente en la etapa más alta.\"<br><br><b>Análisis de Distractores:</b> La presión arterial elevada (A) se define como 120 a 129 mmHg sistólica y menor a 80 mmHg diastólica. La etapa 1 (B) corresponde a 130 a 139 mmHg sistólica o 80 a 89 mmHg diastólica. La crisis hipertensiva tipo urgencia (D) requiere habitualmente cifras mayores a 180/100 mmHg o 180/120 mmHg sin evidencia de daño agudo a órgano blanco."
                    },
                    {
                        question: "¿Cuál es el grupo de fármacos de primera elección para iniciar el tratamiento antihipertensivo en este paciente?",
                        options: [
                            "Inhibidores de la enzima convertidora de angiotensina",
                            "Bloqueadores de los canales de calcio dihidropiridínicos",
                            "Diuréticos tiazídicos o similares a las tiazidas",

                        ],
                        answer: 0,
                        justification: "El paciente cursa con diabetes mellitus tipo 2 y microalbuminuria (45 mg/g). Los bloqueadores del sistema renina-angiotensina-aldosterona (inhibidores de la enzima convertidora de angiotensina o antagonistas del receptor de angiotensina II) retrasan la progresión de la nefropatía diabética al disminuir la presión intraglomerular mediante la vasodilatación de la arteriola eferente.<br><br><b>Perla ENARM:</b> \"Los inhibidores de la enzima convertidora de angiotensina son el fármaco de elección indiscutible en pacientes con diabetes mellitus tipo 1 o tipo 2 que presentan evidencia de disfunción renal o albuminuria mayor a 30 mg/g.\"<br><br><b>Análisis de Distractores:</b> Los bloqueadores de los canales de calcio (B) y los diuréticos tiazídicos (C) son fármacos de primera línea en la población general y raza negra, pero no ofrecen la nefroprotección primaria requerida en nefropatía diabética temprana como monoterapia inicial. Los betabloqueadores (D) están indicados únicamente si existe una condición apremiante como cardiopatía isquémica o falla cardiaca, y pueden enmascarar síntomas de hipoglucemia."
                    },
                    {
                        question: "Según las guías clínicas, ¿cuál es la meta estricta de presión arterial que se debe alcanzar en este paciente para reducir el riesgo de complicaciones cardiovasculares?",
                        options: [
                            "Menor a 140/90 mmHg",
                            "Menor a 130/80 mmHg",
                            "Menor a 120/80 mmHg",
                            "Menor a 150/90 mmHg"
                        ],
                        answer: 1,
                        justification: "Para pacientes con diabetes mellitus y alto riesgo cardiovascular, la recomendación estándar actual para mitigar eventos isquémicos, falla cardiaca y progresión microvascular es lograr una tensión arterial menor a 130/80 mmHg.<br><br><b>Perla ENARM:</b> \"En pacientes con diabetes mellitus, la reducción de la presión arterial sistólica a menos de 130 mmHg tiene su mayor impacto y beneficio clínico en la prevención específica de enfermedad vascular cerebral recurrente e incidente.\"<br><br><b>Análisis de Distractores:</b> La meta menor a 140/90 mmHg (A) es aceptada por guías más antiguas o europeas para población de bajo riesgo sin comorbilidades. La meta menor a 120/80 mmHg (C) corresponde a pacientes del estudio SPRINT (alto riesgo sin diabetes). La meta menor a 150/90 mmHg (D) se llegó a considerar en adultos mayores de 60 años sin diabetes ni enfermedad renal crónica, criterio hoy obsoleto."
                    },
                    {
                        question: "Si el paciente persiste con cifras tensionales de 145/90 mmHg tras 6 meses de tratamiento con dosis máximas de inhibidor de enzima convertidora de angiotensina, calcioantagonista y diurético tiazídico, ¿cuál es el fármaco de cuarta línea indicado?",
                        options: [
                            "Clonidina",
                            "Hidralazina",
                            "Espironolactona",
                            "Doxazosina"
                        ],
                        answer: 2,
                        justification: "El diagnóstico de hipertensión resistente se establece ante la falta de control tensional a pesar del uso de 3 fármacos a dosis tope, incluyendo un diurético. La adición de un antagonista del receptor de mineralocorticoides (espironolactona) es el paso 4 en el algoritmo de tratamiento escalonado.<br><br><b>Perla ENARM:</b> \"En el tratamiento de la hipertensión resistente, la adición de antagonistas de aldosterona es altamente efectiva sin importar los niveles de renina plasmática, previniendo el daño a órgano blanco mediado por fibrosis miocárdica y rigidez arterial.\"<br><br><b>Análisis de Distractores:</b> La hidralazina (B) es un vasodilatador directo reservado para el quinto paso o falla a múltiples terapias. La doxazosina (D), bloqueador alfa, tiene menor evidencia de cardioprotección y puede exacerbar insuficiencia cardiaca. La clonidina (A) tiene múltiples efectos adversos centrales y riesgo de hipertensión de rebote al suspenderse, relegándola a último recurso."
                    }
                ]

    {

                    "Concentración de proteínas totales menor a 1.5 g/dl",

            {

            },
            {
                question: "¿Cuál es el manejo farmacológico intravenoso de primera línea indicado para la infección de este paciente?",

            },
            {
                question: "Tras la resolución del cuadro infeccioso actual, ¿qué grupo farmacológico se debe prescribir obligatoriamente de forma ambulatoria para este paciente?",

            {
                question: "Durante su hospitalización, el paciente desarrolla oliguria progresiva y elevación escalonada de la creatinina sérica a 2.5 mg/dl, refractaria al retiro de diuréticos y a un reto hídrico estandarizado. ¿Qué complicación aguda funcional sospecha en este escenario?",
