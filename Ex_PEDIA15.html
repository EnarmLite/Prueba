    <script>
        // =========================================================
        // DATA: BASE DE DATOS DE PREGUNTAS (AGREGA AQUÍ HASTA 280+)
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "¿Cuál es la entidad clínica fisiológica que representa el diagnóstico diferencial que confunde más frecuentemente de manera inicial el cuadro clínico de la Estenosis Hipertrófica Congénita de Píloro en la consulta?", 
                options: ["Malrotación del tracto intestinal.", "Reflujo gastroesofágico del lactante.", "Atresia duodenal tipo membrana.", "Alergia a proteína láctea de vaca."], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la Guía de Práctica Clínica de Estenosis Hipertrófica de Píloro, dada la alta prevalencia de pérdida postprandial gástrica (regurgitación) esperada en este frágil grupo etario alimentado con líquidos, la anamnesis detallada y dirigida del pediatra (buscando intencionadamente la inmensa avidez por comida post-vómito y la aterradora fuerza explosiva del mismo en el pilórico) define la separación temprana vital entre el reflujo fisiológico o patológico y la verdadera estenosis anatómica del tracto de salida.<br><br>Perla ENARM: \"La mala técnica alimentaria y/o reflujo gastro-esofágico son los diagnósticos con los que se puede confundir con más frecuencia esta patología, por lo que se recomienda realizar un interrogatorio exhaustivo\".<br><br>Análisis de Distractores: Las malrotaciones (vólvulos) y atresias duodenales severas o yeyunales causan típicamente vómitos invariablemente biliosos (amarillos o verdes) al localizarse siempre la obstrucción por debajo o a nivel de la ámpula de Vater biliar, lo cual anatómica y visualmente descarta inmediata y radicalmente una lesión pilórica o pre-pilórica obstructiva, la cual siempre genera emesis de contenido gástrico claro o lácteo puro, sin tinción de bilis jamás.", 
                source: "GPC IMSS-330-10, Diagnóstico y tratamiento de la Estenosis Hipertrófica Congénita de Píloro, 2017, Diagnóstico Diferencial, Página 19." 
            },
            {
                id: 2, 
                question: "Para el abordaje inicial y prevención oportuna de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, ¿cuál es el primer estudio de tamizaje que debe solicitarse a toda gestante en su control prenatal?", 
                options: ["Búsqueda anticuerpos Coombs indirecto", "Prueba de Coombs directo", "Ecografía doppler arteria cerebral", "Amniocentesis para tipificación fetal"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Isoinmunización a Rh Neonatal, es indispensable documentar si la madre ya posee anticuerpos circulantes preformados en su suero (está sensibilizada) antes de administrar profilaxis pasiva, por lo que el escrutinio sérico temprano universal es el pilar preventivo para detectar isoinmunización oculta.<br><br>Perla ENARM: \"Se recomienda que en la primera cita de control prenatal se les realice a todas las mujeres embarazadas (no solo a las mujeres que se conocen Rh negativo) determinación de: Grupo sanguíneo, Rh, Coombs indirecto (búsqueda de anticuerpos)\".<br><br>Análisis de Distractores: La opción B (Coombs directo) se utiliza exclusivamente para confirmar la patología directa pegada a los eritrocitos del recién nacido después del nacimiento o en sangre fetal. Las opciones C y D son intervenciones invasivas y de imagenología avanzada en medicina fetal indicadas solo ante confirmación previa de isoinmunización o sospecha de grados altos de anemia fetal, nunca como tamizaje poblacional inicial de bajo riesgo.", 
                source: "GPC IMSS-373-18, Diagnóstico y Tratamiento de la Enfermedad Hemolítica por Isoinmunización a Rh en el Recién Nacido, 2018, Prevención, Página 29." 
            },    
            {
                id: 3, 
                question: "Desde una perspectiva clínica rápida y certera, ¿cuál es el dato diferencial estricto que permite distinguir la Otitis Media Aguda (OMA) de la Otitis Media con Derrame (OMD) según la guía?", 
                options: ["Signos agudos de infección local", "Hipomovilidad a la otoscopía neumática", "Alteración en la timpanometría", "Líquido en el oído medio"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Otitis Media Aguda, ambas entidades comparten el hallazgo paraclínico y mecánico de líquido retrotimpánico, pero únicamente la OMA requiere la triada de inicio reciente de inflamación sintomática, dolor y fiebre.<br><br>Perla ENARM: \"La OMD es una patología no necesariamente infecciosa por lo que deberá reconocerse tanto por clínica como por la exploración otoscópica para diferenciarla de la OMA\".<br><br>Análisis de Distractores: Las opciones B, C y D son el principio fisiopatológico compartido por ambas entidades clínicas; la presencia de derrame hipomóvil sin datos de infección sistémica es la definición exacta de OMD residual o crónica.", 
                source: "GPC-IMSS-496-21, Prevención, Diagnóstico y Tratamiento de la Otitis Media Aguda en la Edad Pediátrica, 2021, Sección: Diagnóstico Clínico, Página 24." 
            },
            {
                id: 4, 
                question: "En un paciente pediátrico con sospecha de Estreñimiento Funcional, ¿cuál es el hallazgo clínico específico a la exploración física que la guía define como pilar fundamental para integrar el diagnóstico presuntivo de impactación fecal en el primer nivel de atención?", 
                options: ["Ausencia de ruidos peristálticos a la auscultación", "Presencia de masa fecal abdominal grande y dura", "Dolor a la descompresión abdominal (Rebote)", "Sangrado rectal rutilante con la defecación"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Estreñimiento Funcional en escolares, en el primer contacto clínico con el paciente estreñido, ya sea en el servicio de urgencias o en la consulta externa, es médicamente indispensable diferenciar el estreñimiento crónico simple de aquel que ya está complicado anatómicamente por una impactación. La palpación abdominal intencionada es imperativa para identificar el fecaloma retenido en el marco colónico sin necesidad de solicitar estudios radiológicos de primera instancia.<br><br>Perla ENARM: \"En el primer contacto con el paciente estreñido es indispensable la identificación de impactación fecal. Esta se define como: presencia de una masa fecal grande y dura durante la exploración abdominal\".<br><br>Análisis de Distractores: La peligrosa ausencia de ruidos peristálticos (A) y el dolor a la descompresión (C) sugieren francamente un abdomen agudo de inminente resolución quirúrgica (íleo paralítico, peritonitis, apendicitis), no un simple fecaloma. El sangrado rutilante (D) orienta clínicamente hacia la presencia de fisuras anales por esfuerzo, que si bien pueden coexistir o ser la causa del miedo a evacuar, no definen ni confirman por sí mismas el estado volumétrico de impactación de materia fecal.", 
                source: "GPC IMSS-643-18, Tratamiento médico del estreñimiento funcional en el escolar y adolescente, 2018, Diagnóstico, Página 27." 
            },
            {
                id: 5, 
                question: "Utilizando las gráficas poblacionales, ¿cómo se clasifica a un paciente evaluado por sobrepeso y obesidad en niños y adolescentes si su Índice de Masa Corporal se encuentra exactamente en el percentil 90?", 
                options: ["Peso normal para edad", "Paciente con obesidad severa", "Paciente con sobrepeso", "Riesgo de sobrepeso leve"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de Sobrepeso y Obesidad Pediátrica, la definición de los estadios nutricionales en pediatría se basa en cortes estadísticos percentilares estrictos (tablas de la OMS o CDC) según la edad y el sexo, debido al constante crecimiento dinámico del niño que invalida los puntos de corte fijos del adulto.<br><br>Perla ENARM: \"Se considera sobrepeso cuando corresponde a un percentil mayor al 85 y menor a 95, mientras que obesidad representa un valor superior al percentil 95\".<br><br>Análisis de Distractores: El peso normal o eutrófico está firmemente por debajo del percentil 85. La obesidad franca corresponde a todos los valores por arriba del percentil 95. El término clínico \"Riesgo de sobrepeso leve\" es una invención semántica que no existe formalmente en la clasificación estandarizada dictada por las normas nacionales o la GPC evaluada.", 
                source: "GPC SS-025-08, Prevención y diagnóstico de sobrepeso y obesidad en niños y adolescentes, 2018, Introducción, Página 9." 
            },
            {
                id: 6, 
                question: "En el asma en edad pediátrica, ¿cuál es el hallazgo funcional espirométrico inicial que integra el diagnóstico presuntivo de obstrucción al flujo de aire según la GPC?", 
                options: ["Relación VEF1/CVF menor 70%", "Flujo Espiratorio Pico 80%", "Saturación de oxígeno 90%", "Reversibilidad menor 10%"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Asma en Edad Pediátrica, la espirometría es el estándar para confirmar el diagnóstico al documentar la obstrucción del flujo aéreo. Un índice de Tiffeneau (VEF1/CVF) disminuido es el dato fisiopatológico cardinal de los procesos obstructivos.<br><br>Perla ENARM: \"La confirmación del diagnóstico requiere demostrar el proceso obstructivo reversible, lo que en niños a partir de seis años de edad puede realizarse por espirometría, donde la relación volumen espiratorio forzado en el primer segundo y la capacidad vital forzada (VEF1/CVF) inferior a 70%, es diagnóstica de obstrucción al flujo de aire.\"<br><br>Análisis de Distractores: La opción B no diagnostica obstrucción, de hecho >80% suele ser normal. La opción C es un dato de severidad en crisis, no el hallazgo funcional primario. La opción D denota ausencia de reversibilidad, descartando el diagnóstico clásico de asma.", 
                source: "GPC-SS-009-20, Tratamiento del asma en edad pediátrica, 2020, Aspectos Generales: Introducción, Página 9." 
            },
            {
                id: 7, 
                question: "Durante la vital evaluación inicial de un inestable neonato prematuro con fuerte sospecha de Enterocolitis Necrosante en fase aguda (Estadio I), ¿cuál es el diagnóstico diferencial principal o grupo de patologías a descartar de forma forzosa antes de confirmar y etiquetar la enfermedad?", 
                options: ["Sepsis neonatal pura y otras causas metabólicas de íleo", "Atresia duodenal congénita o yeyunal", "Tapón de meconio espeso en fibrosis quística", "Malrotación intestinal aguda con vólvulo"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Enterocolitis Necrosante, los precoces síntomas tempranos de alarma (como el letargo, la distensión abdominal por gas, las apneas y el intolerado residuo gástrico) son extremadamente inespecíficos del prematuro gravemente enfermo por cualquier otra causa y simulan a la perfección una parálisis intestinal por toxinas.<br><br>Perla ENARM: \"El algoritmo de diagnóstico establece que en el estadio I de sospecha (Ayuno y antibióticos empíricos por 3 días) se debe realizar rutinaria y obligadamente una evaluación completa de sepsis sistémica y descartar juiciosamente otras causas de íleo (hipokalemia) antes de asegurar la progresión a un estadio II o dar de alta confiadamente al paciente\".<br><br>Análisis de Distractores: La anatómica atresia duodenal (B) da característicamente un temprano e intratable vómito biliar persistente (\"signo de doble burbuja\") inmediatamente al nacer o al primer trago de leche, no súbitamente al estar progresando y tolerando bien la vía oral en el prematuro de 5 o 10 días de vida. El espeso tapón meconial del colon (C) y la malrotación intestinal con isquemia de vólvulo (D) son letales entidades obstructivas anatómicas de presentación temporal y radiográfica muy distinta al difuso cuadro inflamatorio infeccioso isquémico que mimetiza la sepsis neonatal temprana y la ECN.", 
                source: "GPC SS-481-18, Prevención, diagnóstico y tratamiento de la enterocolitis necrosante del recién nacido, 2018, Anexos (Algoritmos de Diagnóstico), Página 52." 
            },
            {
                id: 8, 
                question: "En un paciente pediátrico con sospecha de Neumonía Bacteriana Adquirida en la Comunidad (NBAC), ¿cuál es el signo clínico que integra el diagnóstico presuntivo por contar con una especificidad del 95%?", 
                options: ["Tos no productiva", "Taquipnea", "Rinorrea hialina", "Fiebre mayor 39°C"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de Neumonía Bacteriana en pediatría, el diagnóstico clínico se fundamenta en la combinación de tos y aumento del trabajo respiratorio. De forma individual, la taquipnea es el signo clínico con mayor especificidad para el diagnóstico presuntivo de consolidación pulmonar.<br><br>Perla ENARM: \"La taquipnea ha demostrado una mayor especificidad (95%) y a su vez un mayor factor predictor negativo individual para la neumonía\".<br><br>Análisis de Distractores: La tos es un signo cardinal pero muy sensible y poco específico si se evalúa de forma aislada. La fiebre es frecuente pero inespecífica para vías respiratorias inferiores. La rinorrea sugiere un cuadro de vías respiratorias altas, alejando el diagnóstico de consolidación.", 
                source: "GPC SS-120-21, Diagnóstico y tratamiento de la neumonía bacteriana adquirida en la comunidad en población menor a 18 años, 2021, Introducción, Página 8." 
            },
            {
                id: 9, 
                question: "¿Cuál es el dato clínico clave en la exploración física que clasifica automáticamente a la Desnutrición en Menores de Cinco Años como un cuadro moderado o grave, forzando su distinción del estadio leve?", 
                options: ["Edema bilateral", "Alopecia focal", "Palidez tegumentaria", "Irritabilidad paradójica"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de Desnutrición en Menores, la fuga de líquido al tercer espacio por hipoalbuminemia severa (Kwashiorkor) desestima las medidas de peso (falsa ganancia) y es criterio ineludible de fracaso metabólico avanzado que exige internamiento.<br><br>Perla ENARM: \"Con alguno de los siguientes signos de desnutrición aguda moderada o grave: Edema bilateral (+), (++) o (+++)\".<br><br>Análisis de Distractores: La palidez (C) y la irritabilidad (D) son sistémicos y se encuentran habitualmente en desnutrición leve. El edema es el divisor de aguas patognomónico que prohíbe mantener al niño en la consulta de primer nivel.", 
                source: "GPC-SS-119-18, Diagnóstico y tratamiento de la desnutrición en menores de cinco años de edad en el primer nivel de atención, 2018, Cuadros o Figuras, 28." 
            },
            {
                id: 10, 
                question: "En Diarrea Aguda pediátrica, ¿cuál es el signo clínico que integra el diagnóstico presuntivo de deshidratación al momento de la exploración física según la Guía de Práctica Clínica?", 
                options: ["Aumento del gasto fecal", "Retardo en llenado capilar", "Ausencia de ruidos hidroaéreos", "Abdomen globoso y timpánico"], 
                answer: 1,

                source: "GPC SS-156-18, Prevención, diagnóstico y tratamiento de diarrea aguda en pacientes de 2 meses a 5 años de edad, en el primer y segundo nivel de atención, 2018, Diagnóstico, Página 15." 
            },
            {
                id: 11, 
                question: "En el diagnóstico diferencial de un paciente pediátrico con sospecha de Linfoma No Hodgkin, ¿qué hallazgo en el aspirado de médula ósea reclasifica clínicamente la enfermedad como leucemia aguda?", 
                options: ["Más de 5% de blastos", "Más de 10% de blastos", "Más de 20% de blastos", "Más de 25% de blastos"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Linfoma No Hodgkin Pediátrico, existe un solapamiento biológico entre el tejido linfoide periférico y medular. Consensuadamente, cruzar un umbral porcentual cambia el rótulo de \"Linfoma Diseminado (Estadio IV)\" al de \"Leucemia\", transformando radicalmente la intensidad y ruta del tratamiento a seguir.<br><br>Perla ENARM: \"Cuadro 4. Sistema de estadificación de St. Jude para LNH pediátrico. Estadio IV: Cualquier tumor con involucro de SNC o MO... Más de 25% de blastos en MO se considera leucemia\".<br><br>Análisis de Distractores: Las opciones A, B y C mantienen la definición de Linfoma Estadio IV. El punto de inflexión fisiopatológico dictado mundialmente para considerar reemplazo hematopoyético leucémico agudo en este escenario es estrictamente sobrepasar el 25%.", 
                source: "GPC-SS-290-18, Tratamiento de Linfoma No Hodgkin en Pediatría, 2018, Cuadros y Tablas, Página 34."

                options: ["Glucosa en ayuno de 110 mg/dl.", "Hemoglobina Glucosilada de 6.0 %.", "Glucosa casual de 150 mg/dl.", "Glucosa casual de 210 mg/dl."], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Diagnóstico y Tratamiento de la Diabetes, el diagnóstico médico inequívoco en presencia de los francos síntomas clásicos descompensados (polidipsia, poliuria, pérdida de peso) no requiere la espera de un ayuno de 8 horas y se realiza de inmediato con una determinación sérica igual o mayor al punto de corte crítico de 200 mg/dl.<br><br>Perla ENARM: \"Para hacer el diagnóstico de DM debe presentar... Síntomas de hiperglucemia (ej. polidipsia, poliuria, polifagia) y una concentración plasmática aleatoria (casual, con o sin ayuno) ≥200 mg/dl\".<br><br>Análisis de Distractores: La glucosa en ayuno de 110 mg/dl (A) y la Hemoglobina Glucosilada (HbA1c) de 6.0 % (B) corresponden a los inciertos rangos de prediabetes o intolerancia a la glucosa, por lo que no confirman la enfermedad manifiesta. La glucosa casual de 150 mg/dl (C) no alcanza el umbral diagnóstico estricto de 200 mg/dl necesario para considerarse criterio absoluto.", 
                source: "GPC SS-302-21, Diagnóstico y tratamiento de la diabetes mellitus tipo 1 y tipo 2 en paciente pediátrico, 2021, Diagnóstico, Página 15."

                id: 13,

                options: ["Infección urinaria no complicada", "Bacteriuria asintomática persistente", "Infección urinaria baja o cistitis", "Infección urinaria complicada"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de Infección de Vías Urinarias, la presencia de documentadas anormalidades mecánicas obstructivas o funcionales del tracto de salida, así como la inmadurez inmunológica extrema de la etapa neonatal per se, elevan dramática y exponencialmente el riesgo inminente de falla renal cicatrizal o rápida progresión a sepsis sistémica fulminante, lo que define el cuadro clínica e inmediatamente como \"complicado\" en el triage y obliga al manejo antibiótico empírico intrahospitalario intravenoso sin dudarlo.<br><br>Perla ENARM: \"Todos los recién nacidos, la mayoría de los pacientes con evidencia clínica de pielonefritis y todos los niños con antecedentes conocidos de obstrucciones mecánicas o funcionales del tracto urinario deben considerarse que tienen una infección urinaria complicada\".<br><br>Análisis de Distractores: Una infección \"no complicada\" (A) excluye expresamente a las malformaciones anatómicas y a todos los neonatos vulnerables menores de 30 días. Una bacteriuria asintomática (B) carece de sintomatología clínica inflamatoria por definición y no se trata. La infección urinaria baja (C) es una simple cistitis limitada a vejiga que cursa con morfología renal alta e integridad sistémica completamente normales.",

                    const id = parseInt(box.dataset.id);
                    const qObj = questionsData.find(q => q.id === id);

                    const matchText = qObj.question.toLowerCase().includes(term);
                    box.style.display = (term === '' || matchText || id.toString() === term) ? 'flex' : 'none';

            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-blue-500 shadow-md z-10 border-blue-500 dark:border-blue-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

            ).join('');

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-blue-100 dark:border-blue-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 dark:has-[:checked]:bg-blue-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('Exapedia15Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('Exapedia15LastQId', currentQuestionId);
                else localStorage.removeItem('Exapedia15LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('Exapedia15Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
