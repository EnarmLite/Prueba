    <script>
        const questionsData = [
    {
        id: 1,
        question: "¿Cuál es el estudio de gabinete inicial a solicitar ante la sospecha clínica de una fractura diafisaria de antebrazo?",
        options: ["Tomografía computarizada simple", "Radiografía anteroposterior y lateral", "Resonancia magnética de extremidad", "Radiografía en proyecciones oblicuas"],
        answer: 1,
        justification: "Justificación: De acuerdo a la GPC de Fracturas de Antebrazo, el abordaje diagnóstico inicial obliga a confirmar la pérdida de la continuidad ósea y la congruencia articular (codo y muñeca) mediante radiografías simples ortogonales.<br><br>Perla ENARM: \"Ante la sospecha de fractura de antebrazo solicitar en forma inicial radiografía simple con proyecciones anteroposterior y lateral de antebrazo\".<br><br>Análisis de Distractores: La tomografía computarizada (A) se limita a trazos articulares o conminución compleja. La resonancia magnética (C) no está indicada en el escrutinio óseo agudo. Las proyecciones oblicuas (D) son complementarias únicamente si existe duda tras el estudio inicial.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Estudios de Gabinete, p. 15."
    },
    {
        id: 2,
        question: "¿Cuál es el hallazgo clínico de mayor valor predictivo para diagnosticar tempranamente un síndrome compartimental en un paciente consciente con fractura de antebrazo?",
        options: ["Ausencia de pulsos distales", "Presencia de flictenas hemorrágicas", "Dolor a la extensión pasiva", "Llenado capilar mayor a 3 segundos"],
        answer: 2,
        justification: "Justificación: La isquemia muscular temprana genera una alta irritabilidad de los vientres musculares al tensarlos, siendo el síntoma cardinal previo al daño irreversible de los nervios. De acuerdo a la GPC de Fracturas de Antebrazo, buscar intencionadamente este reflejo es mandatario.<br><br>Perla ENARM: \"La evaluación neurovascular de la extremidad y la presencia de dolor a la extensión pasiva de los dedos son de gran valor para el diagnóstico de síndrome compartamental\".<br><br>Análisis de Distractores: La ausencia de pulsos (A) y el llenado capilar retardado (D) son signos isquémicos tardíos y de mal pronóstico, no diagnósticos tempranos. Las flictenas (B) indican sufrimiento cutáneo agudo, no presión intracompartimental per se.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Exploración física, p. 14."
    },
    {
        id: 3,
        question: "En el manejo prehospitalario y de urgencias de una fractura expuesta con hemorragia activa, ¿qué intervención está absolutamente contraindicada para el control del sangrado?",
        options: ["Colocación de férula inmovilizadora", "Presión con apósitos estériles", "Irrigación con solución fisiológica", "Aplicación de torniquete proximal"],
        answer: 3,
        justification: "Justificación: La destrucción total del flujo vascular en una extremidad traumatizada exacerba la isquemia tisular y eleva drásticamente el riesgo de necrosis y amputación secundaria. De acuerdo a la GPC de Fracturas de Antebrazo, el control hemorrágico debe ser exclusivamente local y gentil.<br><br>Perla ENARM: \"En caso de hemorragia se deberán colocar apósitos compresivos estériles... Contraindicado el uso de torniquete\".<br><br>Análisis de Distractores: La compresión local (B) es la medida de elección para detener el sangrado. La inmovilización (A) protege las partes blandas de las espículas óseas. La irrigación (C) forma parte de la descontaminación temprana.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Inicial, p. 17."
    },
    {
        id: 4,
        question: "Durante el abordaje inicial en urgencias de una herida contaminada por fractura expuesta de antebrazo, ¿qué recurso está contraindicado utilizar para su lavado?",
        options: ["Solución salina hipertónica", "Antisépticos tópicos locales", "Solución de Hartmann", "Solución inyectable fisiológica"],
        answer: 1,
        justification: "Justificación: Los agentes químicos en los antisépticos poseen un perfil citotóxico alto que daña el lecho capilar y las células viables expuestas, favoreciendo la infección secundaria. De acuerdo a la GPC de Fracturas de Antebrazo, la irrigación se debe realizar por simple arrastre mecánico.<br><br>Perla ENARM: \"Si la herida está contaminada se lavara con solución fisiológica (contraindicado el uso de antisépticos)\".<br><br>Análisis de Distractores: La solución fisiológica (D) es la única indicada explícitamente en el documento para este procedimiento. Las soluciones hipertónicas (A) o de Hartmann (C) no están prescritas para el lavado, pero los antisépticos conllevan una prohibición textual.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Inicial, p. 17."
    },
    {
        id: 5,
        question: "Como parte del escrutinio etiológico y los factores de riesgo en un paciente adulto con fractura diafisaria, ¿qué antecedente psicosocial se debe investigar intencionadamente?",
        options: ["Violencia intrafamiliar", "Tabaquismo crónico activo", "Actividad deportiva de contacto", "Consumo crónico de alcohol"],
        answer: 0,
        justification: "Justificación: El antebrazo es el segmento de protección natural (signo de defensa o fractura del bastonazo) al cubrir la cabeza y el tórax de agresiones directas. De acuerdo a la GPC de Fracturas de Antebrazo, este contexto clínico es un detonante epidemiológico directo.<br><br>Perla ENARM: \"Los factores de riesgo que predisponen la presencia de fractura de antebrazo son: Edad avanzada, Osteoporosis... Violencia intrafamiliar\".<br><br>Análisis de Distractores: El tabaquismo (B) y el alcoholismo (D) impactan el metabolismo óseo de forma sistémica, pero no figuran textualmente como el riesgo etiológico principal de esta GPC. Los deportes de contacto (C) causan lesiones pero no implican el enfoque psicosocial mandatorio dictado.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Factores de Riesgo, p. 13."
    },
    {
        id: 6,
        question: "¿Cuál es el tiempo máximo recomendado para realizar la estabilización y el desbridamiento quirúrgico en una fractura expuesta de antebrazo?",
        options: ["Primeras 2 horas", "Primeras 6 horas", "Primeras 12 horas", "Primeras 24 horas"],
        answer: 1,
        justification: "Justificación: El tejido expuesto cuenta con un límite de tolerancia biológica a la isquemia relativa y contaminación bacteriana ambiental antes de desarrollar una osteomielitis profunda. De acuerdo a la GPC de Fracturas de Antebrazo, el procedimiento es una emergencia absoluta.<br><br>Perla ENARM: \"La debridación del tejido blando lesionado y la reducción de la fractura se debe realizar en quirófano dentro de las 6 horas posteriores al momento en que se produjo la fractura\".<br><br>Análisis de Distractores: Tiempos prolongados de 12 (C) o 24 horas (D) garantizan una colonización bacteriana logarítmica. Las 2 horas (A) son ideales pero no constituyen el umbral normado de decisión temporal (\"regla de las 6 horas\").",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, p. 20."
    },
    {
        id: 7,
        question: "De acuerdo a la clasificación de Gustilo y Anderson, ¿qué característica define específicamente a una fractura expuesta de antebrazo grado II?",
        options: ["Herida limpia menor a 10 mm", "Herida limpia mayor a 10 mm", "Contaminación tisular masiva", "Lesión vascular por isquemia"],
        answer: 1,
        justification: "Justificación: La extensión de la herida correlaciona la cantidad de energía absorbida y el daño muscular subyacente. De acuerdo a la GPC de Fracturas de Antebrazo, este peldaño identifica traumas de mediana energía con daño físico moderado de partes blandas.<br><br>Perla ENARM: \"II Herida limpia mayor a 10 mm. La herida es amplia y la exposición de las partes blandas profundas es evidente, pero el daño físico de ellas es moderado\".<br><br>Análisis de Distractores: Las heridas puntiformes menores a 10 mm (A) corresponden al grado I. La contaminación masiva (C) clasifica como grado IIIB, mientras que el compromiso vascular isquémico (D) categoriza automáticamente al grado IIIC.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Anexos, p. 32."
    },
    {
        id: 8,
        question: "¿Qué hallazgo patológico categoriza de forma directa y automática a una fractura expuesta en el grado IIIC de la clasificación de Gustilo y Anderson?",
        options: ["Exposición ósea sin periostio", "Contaminación con tierra agrícola", "Lesión vascular para reparación", "Pérdida de cobertura cutánea"],
        answer: 2,
        justification: "Justificación: La sección o isquemia grave de los vasos principales del antebrazo pone en riesgo inmediato la viabilidad de toda la extremidad, requiriendo anastomosis quirúrgica antes que la osteosíntesis. De acuerdo a la GPC de Fracturas de Antebrazo, esto marca la máxima severidad del espectro.<br><br>Perla ENARM: \"IIIC Lesión vascular que requiere reparación\".<br><br>Análisis de Distractores: La pérdida masiva de cobertura (D) y la exposición de hueso desnudo (A) son criterios propios del grado IIIB, el cual amerita colgajos o injertos plásticos, pero mantienen perfusión arterial basal intacta.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Anexos, p. 33."
    },
    {
        id: 9,
        question: "¿Cuál es el fármaco de elección para la profilaxis antimicrobiana empírica en una fractura expuesta grado I o II?",
        options: ["Aminoglucósidos intravenosos", "Penicilina sódica cristalina", "Cefalosporinas de primera generación", "Metronidazol y ciprofloxacino"],
        answer: 2,
        justification: "Justificación: Las heridas de baja y mediana energía predominantemente sufren colonización por flora cutánea del propio paciente (Staphylococcus aureus). De acuerdo a la GPC de Fracturas de Antebrazo, no se requiere cobertura gramnegativa extensa de inicio en estos grados.<br><br>Perla ENARM: \"Se recomienda el siguiente esquema antimicrobiano: Fracturas expuestas I y II. cefalosporinas de primera generación\".<br><br>Análisis de Distractores: Los aminoglucósidos (A) son el añadido normado a partir del Grado III de Gustilo. La penicilina (B) se adiciona en casos de sospecha clínica de anaerobios. El metronidazol (D) se utilizaría en escenarios de contaminación fecal o masiva extrema.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Antimicrobiano, p. 23."
    },
    {
        id: 10,
        question: "¿Cuál es la técnica anestésica de primera elección recomendada para la reducción y estabilización de las fracturas diafisarias de antebrazo?",
        options: ["Bloqueo braquial", "Anestesia general balanceada", "Bloqueo regional intravenoso", "Sedación profunda intravenosa"],
        answer: 0,
        justification: "Justificación: Provee una excelente relajación muscular (ideal para reducir la diáfisis), analgesia postoperatoria prolongada y omite los riesgos sistémicos cardiorrespiratorios y de vía aérea. De acuerdo a la GPC de Fracturas de Antebrazo, este abordaje regional está claramente jerarquizado.<br><br>Perla ENARM: \"La técnica de anestesia para la reducción de las fracturas de antebrazo de primera elección es el bloqueo braquial\".<br><br>Análisis de Distractores: La anestesia general (B) se reserva ante contraindicaciones del bloqueo. El bloqueo regional intravenoso o de Bier (C) y la sedación profunda (D) poseen un perfil analgésico de corta duración o inestable para procedimientos quirúrgicos de placa e injerto.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, p. 20."
    },
    {
        id: 11,
        question: "En un paciente con madurez ósea, ¿cuál es el implante estándar de primera elección para fijar internamente la diáfisis del antebrazo?",
        options: ["Clavo centromedular rígido", "Placa de compresión dinámica", "Sistema de fijación externa", "Agujas percutáneas intramedulares"],
        answer: 1,
        justification: "Justificación: La biomecánica de la prono-supinación obliga a conseguir una congruencia anatómica perfecta y una estabilización rígida inmediata, superior a otras técnicas. De acuerdo a la GPC de Fracturas de Antebrazo, se debe optar por implantes corticales con tornillos de 3.5 mm.<br><br>Perla ENARM: \"Para fijar las fracturas de antebrazo en el adulto, las placas de compresión dinámica de 3.5 mm son las de primera elección\".<br><br>Análisis de Distractores: Los clavos centromedulares (A) actúan como tutor biológico secundario, reservados para fallas de placa o hueso patológico. La fijación externa (C) se indica en control de daños (Gustilo IIIB/IIIC). Las agujas (D) resultan muy inestables para soportar cargas funcionales en un adulto.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, p. 21."
    },
    {
        id: 12,
        question: "Durante la planeación preoperatoria, ¿en qué condición anatómica directa se justifica abandonar la placa y utilizar un clavo centromedular en el antebrazo?",
        options: ["Fracturas transversales simples", "Fracturas con luxación distal", "Fracturas óseas segmentarias", "Fracturas expuestas grado I"],
        answer: 2,
        justification: "Justificación: Aplicar placas largas de compresión sobre múltiples trazos desvitaliza severamente el periostio y compromete críticamente la biología de la consolidación (riesgo de pseudoartrosis). De acuerdo a la GPC de Fracturas de Antebrazo, el implante medular soluciona este riesgo aislando el hueso internamente.<br><br>Perla ENARM: \"Indicaciones de enclavado centro medular: Fracturas segmentarias, Algunas Fracturas patológicas, Falla de placa, Fracturas múltiples\".<br><br>Análisis de Distractores: En fracturas transversales simples (A), fracturas con luxación o Galeazzi (B) y Gustilo I (D), la indicación inamovible es la reducción directa y osteosíntesis con placa de compresión.",
        source: "IMSS-193-08, Diagnóstico y Tratamiento de las Fracturas de Antebrazo: Diáfisis de Cúbito y Radio, 2017, Tratamiento Quirúrgico, p. 21."
    },
    {
        id: 13,

                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-teal-100 dark:border-teal-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-teal-50 has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-teal-600 dark:hover:bg-teal-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('cambio3Progress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('cambio3LastQId', currentQuestionId);
                else localStorage.removeItem('cambio3LastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('cambio3Progress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
