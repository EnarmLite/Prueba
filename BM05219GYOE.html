                    Alternar Tema

    <!-- MODAL REINICIAR -->
    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Reiniciar Examen</h3>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 mb-6">Se borrará tu progreso actual. ¿Deseas continuar?</p>
            <div class="flex gap-3">
                <button id="cancel-reset" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                <button id="confirm-reset" class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 transition-colors">Sí, Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // =========================================================
        const questionsData = [
            {
                id: 1, 
                question: "Gestante de 38 semanas acude a urgencias por presentar contracciones uterinas dolorosas. A la exploración física se documenta cérvix con 3 cm de dilatación y 50% de borramiento. ¿Cuál es el paso a seguir en el algoritmo de admisión?", 
                options: ["Ingreso a sala de labor", "Amniotomía para conducción", "Egreso a domicilio", "Oxitocina 10 UI intravenosa"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, el ingreso a sala de labor está indicado a partir de la fase activa (≥ 5 cm de dilatación). Las pacientes con dilatación ≤ 4 cm se encuentran en fase latente y deben ser egresadas a domicilio con indicaciones de regresar ante signos de alarma obstétrica.<br><br>Perla ENARM: El personal médico no deberá indicar el ingreso de la mujer a sala de labor durante la fase latente del trabajo de parto (igual o menor de 4 cm de dilatación).<br><br>Análisis de Distractores: El ingreso a sala de labor (A) precipita cascadas de intervenciones innecesarias si se realiza en fase latente. La amniotomía (B) y la oxitocina (D) están contraindicadas como manejo de rutina para \"abreviar\" un trabajo de parto fisiológico, más aún si la paciente no cuenta con criterios de ingreso.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 26." 
            },
            {
                id: 2, 
                question: "Primigesta sana de 39 semanas cumple criterios de ingreso a sala de labor. ¿Cuál es el estudio inicial recomendado para evaluar el bienestar del feto en el área de triaje?", 
                options: ["Ultrasonido obstétrico", "Perfil biofísico", "Cardiotocografía continua", "Auscultación intermitente"], 
                answer: 3, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, el estándar para evaluar el bienestar fetal de ingreso en pacientes sanas es la auscultación intermitente (con Pinard o Doppler). El uso de monitoreo electrónico continuo no mejora los desenlaces perinatales y aumenta la tasa de cesáreas injustificadas.<br><br>Perla ENARM: Se recomienda auscultar la frecuencia cardiaca fetal, ya sea con Pinard o con monitor fetal Doppler, para establecer el bienestar fetal en el momento del ingreso de la mujer a sala de labor.<br><br>Análisis de Distractores: La cardiotocografía continua (C) está proscrita de rutina al ingreso en embarazo no complicado. El ultrasonido (A) y el perfil biofísico (B) no son el tamizaje inicial ni práctico para establecer la viabilidad y normocardia en el algoritmo de urgencias.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 29." 
            },
            {
                id: 3, 
                question: "Paciente de 25 años en trabajo de parto de bajo riesgo ingresa a tococirugía. Señale la práctica que está proscrita de forma rutinaria al ingreso por carecer de beneficios clínicos.", 
                options: ["Vía venosa periférica", "Enema evacuante", "Ingesta de líquidos", "Movilidad libre"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, la aplicación de enemas, el rasurado púbico y la pelvimetría son intervenciones médicas innecesarias que deben abandonarse al ingreso a sala de labor, ya que no reducen las tasas de infección neonatal o materna.<br><br>Perla ENARM: No se recomienda realizar enemas evacuantes en el momento del ingreso de la mujer a sala de labor.<br><br>Análisis de Distractores: La ingesta de líquidos claros (C) y la libre movilidad (D) son intervenciones activamente recomendadas para la comodidad materna y la progresión. La vía venosa periférica rutinaria (A) también se desaconseja si no hay indicación clínica, pero el enema evacuante es una práctica de \"preparación\" explícitamente proscrita en la bibliografía.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 32." 
            },
            {
                id: 4, 
                question: "Paciente con 6 cm de dilatación cervical y contracciones regulares. ¿Cuál es el intervalo de tiempo recomendado para realizar la evaluación del progreso del trabajo de parto mediante exploración vaginal?", 
                options: ["1 hora", "2 horas", "4 horas", "6 horas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, en ausencia de indicaciones maternas o fetales que demanden una revaloración inmediata, el tacto vaginal para vigilar la progresión en fase activa debe realizarse estandarizadamente cada 4 horas para reducir el riesgo de corioamnionitis y morbilidad infecciosa.<br><br>Perla ENARM: Se puede considerar la realización de tacto vaginal cada 4 horas, durante la fase activa del primer periodo del trabajo de parto.<br><br>Análisis de Distractores: Evaluaciones cada 1 o 2 horas (A, B) incrementan el número de tactos, exponiendo la cavidad a infecciones ascendentes sin modificar el desenlace. Evaluaciones cada 6 horas (D) retrasan la detección de una fase activa prolongada.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 39." 
            },
            {
                id: 5, 
                question: "De acuerdo a la cinética actual de modificaciones cervicales, ¿cuál es el parámetro o regla proscrita para establecer la detención del progreso en el trabajo de parto?", 
                options: ["Dilatación de 1 cm/h", "Dilatación < 5 cm", "Borramiento estacionario", "Frecuencia de contracciones"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, la expectativa clásica de exigir una progresión lineal estricta de 1 cm por hora es irreal para la mayoría de las nulíparas. Su uso provoca diagnósticos falsos de \"detención\" y cesáreas innecesarias.<br><br>Perla ENARM: Dada la gran variabilidad reportada en la tasa de dilatación, no se recomienda emplear el criterio de dilatación de 1 cm/h como referencia para diagnosticar la falta de progresión.<br><br>Análisis de Distractores: La evaluación de la dilatación < 5 cm (B) sirve para diagnosticar fase latente, no detención. El borramiento (C) y las contracciones (D) son parámetros evaluables, pero la \"regla matemática\" abolida es la de 1 cm/hora.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 48." 
            },
            {
                id: 6, 
                question: "Paciente en fase activa del trabajo de parto refiere dolor intenso (8/10). ¿Cuál es el manejo no farmacológico con mayor eficacia demostrada para disminuir la percepción de este dolor?", 
                options: ["Decúbito lateral izquierdo", "Pelota obstétrica", "Ingesta de líquidos", "Respiración dirigida"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, el uso de la pelota obstétrica, el masaje y las compresas calientes son las intervenciones manuales o físicas con evidencia estadística para disminuir la intensidad del dolor durante la primera fase de la labor.<br><br>Perla ENARM: La implementación del uso de la pelota obstétrica puede ser una estrategia para disminuir el dolor durante el trabajo de parto.<br><br>Análisis de Distractores: El decúbito lateral izquierdo (A) mejora el flujo placentario, no el dolor analgésico primario. La ingesta de líquidos (C) evita deshidratación. La respiración dirigida (D) no sustituye la eficacia mecánica de la distensión pélvica sobre una pelota.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 72." 
            },
            {
                id: 7, 
                question: "Primigesta cursa con fase latente prolongada (3 cm de dilatación) y solicita analgesia neuroaxial por dolor incapacitante. ¿En qué momento se recomienda aplicar el bloqueo epidural en esta paciente?", 
                options: ["Al alcanzar 5 cm", "Al momento de solicitarla", "Al iniciar el expulsivo", "Con borramiento del 100%"], 
                answer: 1, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, la anestesia epidural no debe negarse ni retrasarse por no cumplir un umbral de centímetros. Si la paciente lo solicita, debe aplicarse, procurando usar la menor dosis posible, sin importar la dilatación cervical.<br><br>Perla ENARM: Se recomienda administrar la anestesia regional en el momento en que la mujer en trabajo de parto lo solicite, aún durante la fase latente.<br><br>Análisis de Distractores: Retrasar la analgesia hasta los 5 cm (A), hasta el expulsivo (C) o condicionarla al borramiento (D) es un acto que prolonga el sufrimiento materno y contraviene el principio de atención amigable y humanizada.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 69." 
            },
            {
                id: 8, 
                question: "Gestante con embarazo de 40 semanas presenta membranas íntegras, 7 cm de dilatación y dinámica uterina regular. ¿Cuál es la conducta indicada respecto al manejo de las membranas amnióticas?", 
                options: ["Ruptura artificial precoz", "Despegamiento manual", "Evitar amniotomía rutinaria", "Amniotomía más oxitocina"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, intervenir mecánicamente las membranas de forma rutinaria no ha demostrado disminuir el tiempo total del parto y sí puede incrementar complicaciones. Se prefiere la progresión espontánea de la bolsa de las aguas.<br><br>Perla ENARM: No se recomienda realizar amniotomía rutinaria para abreviar el trabajo de parto.<br><br>Análisis de Distractores: La ruptura artificial (A) y la adición de oxitocina (D) conforman la conducción activa o \"medicalización\", proscrita de forma sistemática. El despegamiento manual (B) de membranas (maniobra de Hamilton) se usa para inducción en consulta, no durante la fase activa hospitalaria.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 40." 
            },
            {
                id: 9, 
                question: "Paciente cursando la fase activa del parto sin complicaciones, con dilatación de 7 cm. ¿Con qué frecuencia clínica se debe vigilar intermitentemente la frecuencia cardiaca fetal?", 
                options: ["5 minutos", "10 minutos", "15 a 30 minutos", "60 minutos"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, durante todo el primer periodo (fase de dilatación), el feto de bajo riesgo debe vigilarse intermitentemente en este rango de tiempo. Se debe escuchar por 1 minuto posterior a la contracción.<br><br>Perla ENARM: Se recomienda auscultar intermitentemente la frecuencia cardiaca fetal durante el trabajo de parto de mujeres sanas (cada 15 a 30 minutos).<br><br>Análisis de Distractores: Evaluar cada 5 minutos (A) es el protocolo exclusivo para el segundo periodo (fase expulsiva). Una hora (D) es un periodo muy largo que podría enmascarar un evento hipóxico intraparto. 10 minutos (B) no es el corte establecido por la evidencia nacional.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 36." 
            },
            {
                id: 10, 
                question: "Paciente de 24 años se encuentra en periodo expulsivo del trabajo de parto con descenso de la cabeza en +2. ¿Cuál es el intervalo de tiempo recomendado para vigilar la auscultación cardiaca del feto en esta fase?", 
                options: ["5 minutos", "15 minutos", "30 minutos", "60 minutos"], 
                answer: 0, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, el periodo expulsivo implica un grado máximo de compresión craneal y modificación del flujo umbilical. La exigencia de vigilancia se intensifica, pasando de 15-30 minutos en fase latente/activa, a 5 minutos estrictos.<br><br>Perla ENARM: Se recomienda escuchar intermitentemente la frecuencia cardiaca fetal al término de una contracción, cada 5 minutos.<br><br>Análisis de Distractores: Las opciones de 15, 30 y 60 minutos (B, C, D) son intervalos insuficientes durante el estrés máximo fisiológico que representa el paso por el canal de parto terminal.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 50." 
            },
            {
                id: 11, 
                question: "Secundigesta en dilatación y borramiento completos con analgesia epidural instalada y sin percepción de contracciones perineales. Para el manejo del segundo periodo, ¿cuánto tiempo se aconseja retrasar el inicio del pujo materno?", 
                options: ["15 minutos", "30 minutos", "1 a 2 horas", "3 a 4 horas"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, en mujeres bajo los efectos de un bloqueo epidural, el reflejo de Ferguson fisiológico está abolido. Retrasar el pujo dirigido permite el descenso pasivo del producto guiado por la dinámica uterina, reduciendo el riesgo de parto instrumentado y fatiga.<br><br>Perla ENARM: Se recomienda retrasar, en una o dos horas, el momento de inicio del pujo materno durante el segundo periodo del trabajo de parto en mujeres con analgesia epidural.<br><br>Análisis de Distractores: Esperar solo minutos (A, B) generará pujos inefectivos y materno-agotamiento prematuro. Esperar más de 3 horas (D) incrementa el riesgo de corioamnionitis, compresión de estructuras pélvicas e hipoxia fetal.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 50." 
            },
            {
                id: 12, 
                question: "Durante el expulsivo con presentación cefálica, un médico aplica presión anterógrada intensa en el fondo del útero. ¿Cuál es la lesión materna directamente asociada a esta maniobra?", 
                options: ["Desgarro grado 4", "Hematoma vulvar", "Desgarro cervical", "Laceración vaginal"], 
                answer: 2, 
                justification: "Justificación: De acuerdo a la GPC de trabajo de parto de bajo riesgo, la maniobra de Kristeller impacta forzosamente la cabeza fetal contra el cérvix que puede no estar totalmente retraído o elástico, generando laceraciones severas. Esta intervención incrementa la morbilidad y está catalogada como violencia obstétrica física.<br><br>Perla ENARM: Se observó mayor número de desgarros cervicales en el grupo de pacientes a las que se les realizó presión fúndica; no se recomienda aplicar presión en el fondo del útero durante el periodo expulsivo.<br><br>Análisis de Distractores: Los desgarros perineales superficiales o profundos (A, B, D) dependen de la elasticidad de los tejidos del piso pélvico, episiotomía o control del coronamiento, no de la presión directa y abrupta ejercida desde la cúpula miometrial alta.", 
                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo de bajo riesgo, 2019, Evidencias y Recomendaciones, p. 55." 
            },
            {
                id: 13, 
                question: "Gestante de término se encuentra en periodo expulsivo. Se documenta feto en presentación de cara. ¿Cuál es la técnica profiláctica recomendada para prevenir un trauma severo en este escenario?", 
                options: ["Masaje perineal", "Episiotomía mediolateral", "Episiotomía media", "Compresas calientes"],

            {
                id: 14, 
                question: "Posterior a la salida del hombro anterior del feto, inicia el manejo activo del tercer periodo del parto. ¿Cuál es el agente uterotónico profiláctico de primera elección y su dosis correcta?", 
                options: ["Ergometrina 0.2 mg", "Carbetocina 100 µg", "Misoprostol 600 µg", "Oxitocina 10 UI"],

            {
                id: 15, 
                question: "Nace un producto de término con llanto enérgico, frecuencia cardiaca >100 lpm y buen tono muscular. ¿Cuál es el tiempo clínico mínimo establecido para realizar el pinzamiento del cordón umbilical?",

            {

            {
                id: 17, 
                question: "Tras la atención de un parto eutócico sin desgarros ni manipulación uterina, se da manejo de alta al binomio. ¿Cuál esquema de quimioprofilaxis materna es el indicado para prevenir la infección puerperal?",

            {
                id: 18, 
                question: "Neonato recién nacido vigoroso sin factores de riesgo y con líquido claro. ¿Cuál es la medida inicial universal más efectiva para fomentar y sostener el éxito de la lactancia materna exclusiva?",

            {

                id: 21,

            {

                question: "¿Entre qué semanas de gestación se debe ofrecer la inducción del trabajo de parto para evitar los riesgos inherentes al embarazo prolongado en pacientes sin comorbilidades?",

                justification: "Justificación: De acuerdo a la GPC de Vigilancia en trabajo de parto, el objetivo de la auscultación es evaluar la respuesta fetal ante el estrés de la hipoxia fisiológica que causa la contracción uterina. Por ello, se debe auscultar invariablemente durante un minuto completo e inmediatamente después de percibir el acmé contráctil, detectando precozmente desaceleraciones tardías.<br><br>Perla ENARM: Se recomienda auscultar intermitentemente la frecuencia cardiaca fetal durante el trabajo de parto de mujeres sanas, durante un minuto inmediatamente después de la contracción.<br><br>Análisis de Distractores: Medir durante la contracción (A) es mecánicamente difícil y no refleja la recuperación. Medir antes (B) o mucho tiempo después (D) omite el periodo de ventana crítico para el diagnóstico de sufrimiento fetal tipo \"DIP II\".",

                question: "De acuerdo al manejo no farmacológico de la fase activa del parto en mujeres de bajo riesgo, ¿cuál es la conducta nutricional estrictamente recomendada?",

                source: "GPC-IMSS-052-19, Vigilancia y atención amigable en el trabajo de parto en embarazo no complicado, 2019, Evidencias y Recomendaciones, p. 37."

                id: 26,

                question: "En el abordaje del primer periodo del parto, ¿cuál es la complicación obstétrica demostrada del uso sistemático y continuo del monitoreo cardiotocográfico de ingreso en embarazos sanos?",

                justification: "Justificación: De acuerdo a la GPC de Vigilancia en trabajo de parto, la maniobra de Ritgen modificada (control de la deflexión de la cabeza fetal mediante compresión sobre el mentón a través del periné) reduce la liberación explosiva del diámetro suboccipitobregmático, logrando disminuir selectivamente los desgarros cutáneos y mucosos de primer grado.<br><br>Perla ENARM: El uso de la maniobra de Ritgen se asoció a menor probabilidad de desgarros de primer grado (RR 0.32).<br><br>Análisis de Distractores: Las compresas calientes y masaje perineal (C) previenen desgarros severos de esfínter (grados 3 y 4). La maniobra de Kristeller (A) precipita desgarros cervicales. Las episiotomías (D) aumentan el trauma por corte incisional.",

                question: "¿Cuál de las siguientes alteraciones obstétricas agudas es una indicación absoluta y emergente para realizar el pinzamiento temprano (inmediato) del cordón umbilical?",

        function setupEventListeners() {

                    const qObj = questionsData.find(q => q.id === id);

        function getQBoxClass(qId, isActive) {
            let base = "q-box-item flex items-center justify-center aspect-square rounded-md font-bold text-sm cursor-pointer transition-all select-none border ";
            
            if (isActive) base += "ring-4 ring-pink-500 shadow-md z-10 border-pink-500 dark:border-pink-400 ";

            const state = userProgress[qId];
            if (!state || !state.answered) {
                return base + "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 dark:hover:bg-slate-700";
            } else if (state.isCorrect) {
                return base + "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800";
            } else {
                return base + "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
            }
        }

            return questionsData.map(q => 
                `<div class="${getQBoxClass(q.id, q.id === isActiveIdContext)}" data-id="${q.id}" onclick="displayQuestion(${q.id})">${q.id}</div>`
            ).join('');

                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>

                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="CM23209GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoBMProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoBMLastQId', currentQuestionId);
                else localStorage.removeItem('gyoBMLastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoBMProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
