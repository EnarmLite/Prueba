    <script>
        // =========================================================
        // =========================================================
        const questionsData = [

    {
        id: 1,
        question: "¿Cuál es el tratamiento farmacológico inicial de elección para una paciente obstétrica con diagnóstico de trombosis venosa profunda que se mantiene sin alteraciones hemodinámicas?",
        options: ["Heparina no fraccionada intravenosa", "Fondaparinux subcutáneo", "Heparina de bajo peso molecular", "Antagonistas de la vitamina K"],
        answer: 2,
        justification: "Justificación: El manejo de elección busca la máxima eficacia con el menor perfil de complicaciones hemorrágicas y autoinmunes. De acuerdo GPC de tromboembolia venosa en obstetricia, las heparinas de bajo peso molecular (HBPM) presentan un perfil de bioseguridad superior en la mujer gestante para abordar el coágulo establecido, manteniendo a la paciente fuera de inestabilidad.<br><br>Perla ENARM: \"Se recomienda usar HBPM para tratamiento de pacientes obstétricas con TVP.\"<br><br>Análisis de Distractores: La heparina no fraccionada (HNF) intravenosa se reserva para casos de inestabilidad (choque). Los antagonistas de la vitamina K cruzan la barrera placentaria y son teratógenos. El fondaparinux se usa solo ante alergia documentada a heparinas convencionales.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 27."
    },
    {
        id: 2,
        question: "¿Cuánto tiempo previo a una cesárea electiva se debe suspender la administración de heparina de bajo peso molecular administrada a dosis terapéuticas?",
        options: ["6 horas", "12 horas", "48 horas", "24 horas"],
        answer: 3,
        justification: "Justificación: Las intervenciones obstétricas que requieren bloqueo neuroaxial tienen un elevado riesgo de generar hematomas espinales si persiste el efecto anticoagulante. De acuerdo GPC de tromboembolia venosa en obstetricia, la farmacocinética de las heparinas de depósito (dosis terapéutica) exige una ventana estricta de depuración para evitar complicaciones neurológicas severas.<br><br>Perla ENARM: \"Se sugiere suspender la HBPM 24 h antes del parto programado en las pacientes con TEP, ya sea por cesárea electiva o por inducción del trabajo de parto.\"<br><br>Análisis de Distractores: Las 6 horas corresponden al tiempo de suspensión de la HNF intravenosa. Las 12 horas son para la HNF subcutánea. Las 48 horas representan un tiempo excesivo que expone a la madre a un riesgo tromboembólico innecesario.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 52."
    },
    {
        id: 3,
        question: "En una paciente obstétrica con sospecha clínica de tromboembolia pulmonar que presenta una radiografía de tórax con hallazgos anormales previos, ¿cuál es el estudio de imagen confirmatorio sugerido?",
        options: ["Angiotomografía pulmonar computarizada", "Gamagrama de ventilación perfusión", "Ultrasonido doppler venoso", "Ecocardiograma transtorácico"],
        answer: 0,
        justification: "Justificación: La selección del estudio confirmatorio depende del estado basal pulmonar. De acuerdo GPC de tromboembolia venosa en obstetricia, la presencia de anomalías radiográficas previas (como consolidaciones o derrames) disminuye severamente la especificidad del gamagrama, obligando a utilizar contraste anatómico para observar el lecho arterial.<br><br>Perla ENARM: \"Si la RxT es anormal o no se cuenta con GP V/Q se sugiere realizar APTC.\"<br><br>Análisis de Distractores: El gamagrama ventilatorio-perfusorio es la elección principal únicamente cuando la radiografía de tórax es normal. El ultrasonido doppler es para sospecha de trombosis en extremidades. El ecocardiograma evalúa la disfunción ventricular, pero no es el estudio anatómico confirmatorio de tromboembolia.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 50."
    },
    {
        id: 4,
        question: "Ante la sospecha de tromboembolia pulmonar en una gestante sin síntomas de trombosis venosa profunda y con una radiografía de tórax normal, ¿cuál es el estudio de imagen inicial preferido?",
        options: ["Gamagrama de ventilación perfusión", "Angiotomografía pulmonar computarizada", "Resonancia magnética de tórax", "Electrocardiograma de 12 derivaciones"],
        answer: 0,
        justification: "Justificación: En el abordaje del dolor torácico gestacional, minimizar la dosis de radiación a la mama materna es fundamental si las condiciones lo permiten. De acuerdo GPC de tromboembolia venosa en obstetricia, si el pulmón está radiológicamente sano, un estudio perfusorio tiene una tasa mínima de falsos positivos y menor irradiación local.<br><br>Perla ENARM: \"Se sugiere que en embarazadas con sospecha de TEP sin signos o síntomas de TVP y con RxT normal se le realice un GP V/Q (si está disponible).\"<br><br>Análisis de Distractores: La angiotomografía es de segunda línea si el gamagrama no está disponible o si la radiografía es anormal. La resonancia magnética no es práctica en emergencias pulmonares. El electrocardiograma detecta sobrecarga ventricular (ej. S1Q3T3), pero no confirma anatómicamente el émbolo.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 50."
    },
    {
        id: 5,
        question: "¿Cuál es el fármaco anticoagulante de primera línea indicado en la paciente obstétrica con sospecha de tromboembolia pulmonar grave acompañada de colapso cardiovascular?",
        options: ["Heparina de bajo peso molecular", "Heparina no fraccionada intravenosa", "Alteplasa recombinante intravenosa", "Antagonistas de la vitamina K"],
        answer: 1,
        justification: "Justificación: El choque o colapso hemodinámico altera la absorción subcutánea y requiere un fármaco que actúe de inmediato y sea fácilmente reversible. De acuerdo GPC de tromboembolia venosa en obstetricia, este es el único escenario donde las heparinas estándar se prefieren sobre las fraccionadas para el manejo agudo inicial.<br><br>Perla ENARM: \"Se recomienda que en embarazadas con sospecha de TEP grave (por ejemplo pacientes con colapso cardiovascular, hipoxemia refractaria, disfunción ventricular derecha...) se ministre como tratamiento inicial HNF intravenosa.\"<br><br>Análisis de Distractores: La heparina de bajo peso molecular es ineficaz por su absorción errática en estado de choque. La alteplasa (trombólisis) se considera como maniobra de rescate posterior, no el manejo anticoagulante inicial estipulado. Los antagonistas de la vitamina K están contraindicados y tardan días en actuar.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 51."
    },
    {
        id: 6,
        question: "Al requerir estudios avanzados de imagen en una embarazada, ¿cuál medio de contraste está contraindicado por el riesgo de desencadenar fibrosis sistémica nefrogénica y muerte neonatal?",
        options: ["Material de contraste yodado", "Radioisótopo de tecnecio 99m", "Gadolinio intravenoso", "Sulfato de bario oral"],
        answer: 2,
        justification: "Justificación: El uso de resonancia magnética puede ser seguro durante el embarazo, pero el tipo de potenciador de señal no lo es. De acuerdo GPC de tromboembolia venosa en obstetricia, ciertas moléculas de contraste cruzan libremente la placenta, generando reacciones inflamatorias cutáneas y fallas sistémicas irreversibles en el neonato.<br><br>Perla ENARM: \"No se recomienda realizar resonancia magnética con gadolinio en pacientes embarazadas con sospecha de TVP.\"<br><br>Análisis de Distractores: El contraste yodado (usado en TAC) y el tecnecio 99m (usado en el gamagrama) pueden utilizarse bajo consentimiento si el beneficio supera el riesgo. El sulfato de bario es inabsorbible y se usa para el tracto digestivo, no para evaluación vascular.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 25."
    },
    {
        id: 7,
        question: "¿Qué fármaco anticoagulante se encuentra proscrito para el tratamiento ambulatorio de la enfermedad tromboembólica venosa durante el embarazo por su asociación con embriopatía y muerte fetal?",
        options: ["Enoxaparina sódica", "Heparina no fraccionada", "Dalteparina subcutánea", "Antagonistas de la vitamina K"],
        answer: 3,
        justification: "Justificación: A diferencia de las heparinas, los cumarínicos son moléculas pequeñas que atraviesan rápidamente la circulación fetal. De acuerdo GPC de tromboembolia venosa en obstetricia, la exposición intrauterina causa malformaciones óseas (hipoplasia nasal, condrodisplasia punteada) y un aumento dramático de hemorragias cerebrales fetales.<br><br>Perla ENARM: \"No se recomienda usar antagonistas de la vitamina K para tratamiento de pacientes obstétricas con TVP.\"<br><br>Análisis de Distractores: La enoxaparina y la dalteparina son heparinas de bajo peso molecular, consideradas la primera línea y totalmente seguras para el feto. La heparina no fraccionada también es segura al no cruzar la placenta.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 27."
    },
    {
        id: 8,
        question: "¿Cuál es el tiempo mínimo indicado para mantener la tromboprofilaxis en el puerperio si la paciente acumula un puntaje de riesgo postnatal ≥ 2?",
        options: ["5 días", "10 días", "14 días", "21 días"],
        answer: 1,
        justification: "Justificación: El estado protrombótico del embarazo alcanza su pico máximo durante las semanas inmediatamente posteriores al parto. De acuerdo GPC de tromboembolia venosa en obstetricia, existe un punto de corte temporal basal diseñado para abarcar la ventana de máximo riesgo agudo en pacientes con puntaje clínico moderado.<br><br>Perla ENARM: \"Si el puntaje es ≥ 2 postnatal, tromboprofilaxis por al menos 10 días.\"<br><br>Análisis de Distractores: Las pautas de 5, 14 y 21 días no forman parte de los cortes normativos del algoritmo. La profilaxis se mantiene al menos 10 días, escalando a 6 semanas completas únicamente si existen condiciones de riesgo extremo.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Cuadro 3, p. 68."
    },
    {
        id: 9,
        question: "En una mujer puérpera con antecedente confirmado de tromboembolismo venoso no asociado a cirugía y trombofilia de alto riesgo, ¿cuánto tiempo debe mantenerse la tromboprofilaxis?",
        options: ["10 días postnatales", "14 días postnatales", "4 semanas postnatales", "6 semanas postnatales"],
        answer: 3,
        justification: "Justificación: La presencia de antecedentes trombóticos marca a la paciente como el grupo de vulnerabilidad extrema, donde una pauta corta es insuficiente frente a la persistencia endotelial. De acuerdo GPC de tromboembolia venosa en obstetricia, las pacientes categorizadas en \"riesgo alto\" ameritan una protección total a lo largo de toda la fase puerperal convencional.<br><br>Perla ENARM: \"Riesgo alto. Al menos 6 semanas postnatales de HBPM profiláctica.\"<br><br>Análisis de Distractores: Los 10 días postnatales son para pacientes con riesgo intermedio (puntaje ≥ 2) sin trombofilia grave ni antecedente trombótico. Las opciones de 14 días y 4 semanas son distractores de tiempo infraterapéutico para este grupo en particular.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Cuadro 6, p. 70."
    },
    {
        id: 10,
        question: "Dentro de las intervenciones físicas para prevención, ¿cuál medida mecánica hospitalaria está estrictamente contraindicada como equivalente o sustituto de las medias de compresión?",
        options: ["Vendaje de miembros pélvicos", "Movilización activa temprana", "Compresión neumática intermitente", "Elevación pasiva de extremidades"],
        answer: 0,
        justification: "Justificación: Los dispositivos de compresión requieren aplicar presiones graduadas y sostenidas para favorecer el retorno venoso eficazmente. De acuerdo GPC de tromboembolia venosa en obstetricia, el uso de materiales improvisados genera zonas de torniquete e isquemia, incrementando la estasis distal.<br><br>Perla ENARM: \"No se recomienda utilizar el vendaje de miembros pélvicos como equivalente o sustituto de medias de compresión.\"<br><br>Análisis de Distractores: La movilización temprana y la compresión neumática intermitente son intervenciones físicas altamente recomendadas. La elevación pasiva es una medida de alivio general, pero no es el sustituto peligroso explícitamente proscrito por la recomendación.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 21."
    },
    {
        id: 11,
        question: "En una paciente embarazada con disnea aguda y sospecha de tromboembolia pulmonar que presenta signos evidentes de trombosis en la pantorrilla, ¿cuál es la conducta diagnóstica inicial indicada?",
        options: ["Angiotomografía pulmonar computarizada", "Resonancia magnética sin contraste", "Ultrasonido con compresión venosa", "Gamagrama de ventilación perfusión"],
        answer: 2,
        justification: "Justificación: La confirmación de un origen periférico del trombo es suficiente para iniciar anticoagulación plena, evitando estudios invasivos adicionales en el tórax. De acuerdo GPC de tromboembolia venosa en obstetricia, la regla de oro para salvaguardar al feto es iniciar abordando los signos periféricos si están presentes, limitando radiación.<br><br>Perla ENARM: \"Se sugiere que en embarazadas con sospecha de TEP que presentan signos y síntomas de TVP, se les realice un ultrasonido bidimensional y doppler de miembros pélvicos.\"<br><br>Análisis de Distractores: La angiotomografía y el gamagrama son recursos dirigidos al tórax que se reservan para cuando los signos de TVP en piernas están ausentes o el ultrasonido es negativo. La resonancia magnética no es el abordaje primario por logística y costo.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Algoritmo 2, p. 61."
    },
    {
        id: 12,
        question: "Durante la tromboprofilaxis prolongada con heparina de bajo peso molecular en una paciente gestante sin antecedentes de exposición a heparinas, ¿qué parámetro de laboratorio NO se debe solicitar rutinariamente?",
        options: ["Tiempo de protrombina", "Tiempo de tromboplastina parcial", "Fibrinógeno sérico", "Recuento de plaquetas"],

        justification: "Justificación: La manipulación de los plexos venosos intrarraquídeos bajo influjo anticoagulante precipita sangrado en un espacio cerrado y parálisis irreversible. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, los tiempos de instrumentación en anestesia regional son inflexibles y deben respetar el aclareo metabólico de la molécula.<br><br>Perla ENARM: \"...y el catéter no se debe extraer dentro de las 12 h posteriores a la inyección más reciente de HBPM.\"<br><br>Análisis de Distractores: Las 4 horas corresponden al tiempo de espera posterior al retiro del catéter para poder iniciar una dosis baja (profiláctica). Las 8 a 12 horas es el tiempo para reiniciar dosis plenas (terapéuticas).",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 52."
    },
    {
        id: 31,
        question: "En una cesárea realizada a una paciente con dosis terapéuticas de heparina, ¿qué medida técnica quirúrgica se sugiere para el cierre de la incisión en piel?",
        options: ["Sutura subdérmica continua", "Cierre con grapas metálicas", "Sutura con puntos separados", "Cierre con adhesivo tisular"],
        answer: 2,
        justification: "Justificación: La hemostasia mecánica se ve comprometida en pacientes con anticoagulación activa, por lo que la recolección sanguínea oculta en el tejido celular subcutáneo asocia dehiscencia e infección masiva. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, la incisión debe permitir el escape de fluidos intersticiales evitando colecciones herméticas a tensión.<br><br>Perla ENARM: \"Se sugiere que en pacientes que reciben dosis terapéuticas de heparina se considere colocar drenajes en las incisiones quirúrgicas y suturar la incisión en piel con puntos separados para permitir el drenaje de cualquier hematoma.\"<br><br>Análisis de Distractores: La sutura subdérmica y los adhesivos tisulares crean un sello hermético que propicia la formación de grandes hematomas encapsulados en pacientes heparinizadas, limitando el drenaje espontáneo del sitio de abordaje.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 53."
    },
    {
        id: 32,
        question: "¿Qué método de planificación familiar está contraindicado en una paciente con menos de un día de postparto que no presenta factores de riesgo adicionales para trombosis?",
        options: ["Dispositivo intrauterino de cobre", "Implante subdérmico de progestina", "Anticonceptivos orales combinados", "Preservativo masculino de látex"],
        answer: 2,
        justification: "Justificación: El puerperio inmediato cursa fisiológicamente con una exacerbación transitoria del estado protrombótico debido a la tormenta hemostática uterina, la cual no debe exacerbarse iatrogénicamente. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, la introducción de estrógenos sintéticos exógenos catapulta exponencialmente el riesgo embólico en las primeras 24 horas post-nacimiento.<br><br>Perla ENARM: \"Se sugiere que en mujeres que tienen menos de un día postparto y que no cuentan con otros factores de riesgo para ETEV, no se utilicen anticonceptivos hormonales (anticonceptivos orales combinados...) como método anticonceptivo post natal.\"<br><br>Análisis de Distractores: El dispositivo de cobre y los métodos de barrera (látex) carecen de perfil trombogénico. Los implantes de solo progestina asocian un impacto hemostático sustancialmente menor y no representan la misma contraindicación crítica temprana que la combinación con etinilestradiol.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 58."
    },
    {
        id: 33,
        question: "Al utilizar la estratificación de riesgo prenatal y acumular una puntuación total de 3, ¿en qué semana de gestación está indicado iniciar la tromboprofilaxis farmacológica?",
        options: ["Desde el primer trimestre", "A partir de la semana 28", "Durante el puerperio inmediato", "Únicamente durante el intraparto"],
        answer: 1,
        justification: "Justificación: La categorización de la paciente determina la urgencia del inicio de las medidas parenterales para alcanzar la máxima protección cuando la estasis venosa es más crítica. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, el riesgo intermedio-alto justifica postergar la inyección diaria hasta la entrada del tercer trimestre, momento de máxima compresión de la vena ilíaca.<br><br>Perla ENARM: \"Si el puntaje total es de 3 prenatal, tromboprofilaxis a partir de la semana 28.\"<br><br>Análisis de Distractores: Iniciar desde el primer trimestre aplica para el puntaje ≥ 4. Dejar sin profilaxis antenatal a una paciente con riesgo grado 3 esperando al puerperio omite la protección en el periodo de mayor estasis pélvica gestacional.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Cuadro 3, p. 68."
    },
    {
        id: 34,
        question: "En una embarazada con antecedente de evento trombótico previo asociado únicamente a una cirugía mayor transitoria, ¿cuándo debe iniciarse la tromboprofilaxis con heparina de bajo peso molecular?",
        options: ["Desde el primer trimestre", "Hasta la semana 28 de gestación", "Al inicio del segundo trimestre", "Exclusivamente en el postparto"],
        answer: 1,
        justification: "Justificación: Distinguir la etiología de un evento tromboembólico pasado es cardinal; los trombos inducidos por un factor externo superado (una cirugía) tienen menor tasa de recidiva gestacional espontánea que los idiopáticos o genéticos. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, esta paciente puede diferir de forma segura las punciones heparínicas hasta el pico de riesgo del tercer trimestre.<br><br>Perla ENARM: \"Se sugiere que en pacientes embarazadas con antecedente de ETEV secundario a una cirugía mayor sin presencia de otros factores de riesgo, la tromboprofilaxis con HBPM se inicie hasta la semana 28 del embarazo.\"<br><br>Análisis de Distractores: El inicio temprano (primer trimestre) aplica a eventos tromboembólicos previos NO provocados (idiopáticos) o vinculados con deficiencias graves (ej. antitrombina). Exclusivamente en el postparto es un manejo negligente al dejar desprotegido el tercer trimestre (semana 28 en adelante).",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 35."
    },
    {
        id: 35,
        question: "¿A partir de cuántas horas de inmovilidad por viaje se sugiere iniciar movilización temprana y tromboprofilaxis en una paciente obstétrica?",
        options: ["Mayor a 2 horas", "Mayor a 4 horas", "Mayor a 6 horas", "Mayor a 12 horas"],
        answer: 1,
        justification: "Justificación: El estancamiento sanguíneo de los miembros pélvicos provocado por trayectos prolongados se sinergiza letalmente con el ambiente procoagulante basal de la mujer grávida. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, la literatura define este margen horario como el umbral donde el riesgo supera el daño potencial y obliga a una prescripción activa.<br><br>Perla ENARM: \"Se sugiere que toda paciente obstétrica que esta inmovilizada por tiempo prolongado (hospitalizada por más de tres días o viaje por más de 4 horas) se inicie la movilización temprana y se otorgue tromboprofilaxis mecánica y farmacológica.\"<br><br>Análisis de Distractores: Aunque vuelos menores a 4 horas pueden sugerir movilización básica o medias de compresión ligeras, no exigen formalmente todo el espectro de tromboprofilaxis mecánica y farmacológica estipulado por el corte de inmovilidad normativa.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 40."
    },
    {
        id: 36,
        question: "Fisiológicamente, ¿por qué se prefiere indicar un gamagrama de ventilación perfusión sobre la angiotomografía en el abordaje de tromboembolia pulmonar obstétrica cuando la radiografía es normal?",
        options: ["Otorga menor radiación al tejido tiroideo", "Otorga menor radiación a la médula ósea", "Otorga menor radiación al tejido mamario", "Minimiza el riesgo de desprendimiento placentario"],
        answer: 2,
        justification: "Justificación: La hiperplasia ductal y los cambios proliferativos gravídicos elevan exponencialmente la sensibilidad oncogénica de las mamas ante la energía ionizante. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, es imperativo priorizar recursos nucleares alternativos que liberen dosis absorbidas fraccionarias frente a los cortes axiales intensos de la tomografía en tórax sano.<br><br>Perla ENARM: \"...se continúa recomendando la realización de GP V/Q como estudio de primera línea en el embarazo debido a su alto VPN en esta situación y su dosis de radiación sustancialmente menor al tejido mamario gestacional.\"<br><br>Análisis de Distractores: El blanco crítico a proteger tras descartar radiación fetal con escudo abdominal, son las mamas maternas hiperplásicas. Ni la tiroides ni la médula ósea poseen la misma tasa diferencial de sensibilidad neoplásica aguda dictada por la guía entre la tomografía y el radioisótopo.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 49."
    },
    {
        id: 37,
        question: "Además de encontrarse en etapa embriogénica, ¿cuál característica demográfica contraindica realizar una valoración para la colocación de un filtro de vena cava en una embarazada?",
        options: ["Madre menor de 19 años", "Edad materna mayor a 35 años", "Multiparidad mayor a tres", "Índice de masa corporal mayor a 40"],
        answer: 0,
        justification: "Justificación: Las implicaciones anatómicas a largo plazo por el crecimiento residual y la deformación de la vasculatura en adolescentes prohíben adherir mallas metálicas definitivas al endotelio cava. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, las directrices de cirugía endovascular excluyen explícitamente a este grupo etario por secuelas crónicas incompatibles con su esperanza de vida.<br><br>Perla ENARM: \"Se sugiere realizar valoración integral para colocación de filtro de vena cava considerando edad gestacional (contraindicado en periodo embriogénico) y edad materna (contraindicado en madre menor de 19 años).\"<br><br>Análisis de Distractores: La edad avanzada, obesidad clase 3 (IMC ≥ 40) y alta paridad son, por el contrario, factores de muy alto riesgo de ETEV que hacen a las pacientes susceptibles a manejos agresivos, no contraindicaciones de rescate vascular.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Evidencias y Recomendaciones, p. 29."
    },
    {
        id: 38,
        question: "Como pilar fundamental no farmacológico preventivo en ETEV obstétrica, ¿cuál es la intervención basal paralela al uso de medias compresivas para evadir el desarrollo de síndrome postrombótico?",
        options: ["Restricción de líquidos orales", "Reposo absoluto prolongado en cama", "Evitar la deshidratación", "Vendaje elástico circular"],
        answer: 2,
        justification: "Justificación: La viscosidad sanguínea y la hemoconcentración son gatillos fisiopatológicos primarios de la cascada de coagulación en el territorio venoso pasivo. De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, mantener la volemia óptima diluye de manera mecánica los factores protrombóticos del torrente, consolidándose como indicación universal gratuita de alto impacto clínico.<br><br>Perla ENARM: \"Manejo no farmacológico: Se requiere movilización temprana, evitar deshidratación y uso de medias de compresión para disminuir el desarrollo de síndrome postrombótico.\"<br><br>Análisis de Distractores: La restricción hídrica es deletérea (causa hemoconcentración). El reposo absoluto es altamente trombogénico; la directriz es movilización temprana. El vendaje elástico está estrictamente prohibido por generar zonas de isquemia asimétrica tipo torniquete.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Tratamiento y Manejo, p. 26."
    },
    {
        id: 39,
        question: "¿En qué localización anatómica de trombosis venosa profunda se encuentra indicada la valoración prioritaria para trombectomía ante la inminente falla de heparina?",
        options: ["Trombosis de la vena poplítea", "Trombosis de la vena tibial", "Trombosis de la vena safena", "Trombosis venosa iliofemoral"],
        answer: 3,
        justification: "Justificación: La masiva carga trombótica que se alberga en los vasos proximales mayores es de altísimo riesgo de desprendimiento fatal inminente o estasis irreversible con pérdida de la extremidad (flegmasia). De acuerdo a la GPC de enfermedad tromboembólica venosa obstétrica, la cirugía de extracción física se reserva estrictamente para confluencias de alto calibre donde los fibrinolíticos fisiológicos resultan insuficientes.<br><br>Perla ENARM: \"Toda paciente obstétrica con TVP aguda u obstrucción iliofemoral menor a 48 h con falla al tratamiento farmacológico debe enviarse a tercer nivel para valoración de filtro o trombectomía.\"<br><br>Análisis de Distractores: La safena (superficial) y la tibial o poplítea (distales) albergan émbolos de menor envergadura clínica que excepcionalmente justifican la morbilidad de un abordaje quirúrgico endovascular abierto bajo estado gravídico.",
        source: "GPC-SS-544-20, Prevención, diagnóstico y tratamiento de la enfermedad tromboembólica venosa en la paciente obstétrica, 2020, Complicaciones y Criterios de Referencia, p. 30."
    },

                                <div class="grid grid-cols-3 gap-2 sm:gap-4 divide-x divide-white/20 w-full text-center">

                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Respondidas</p>
                                        <p class="text-2xl sm:text-3xl font-black">${ans}<span class="text-xs sm:text-sm text-slate-500">/${total}</span></p>
                                    </div>
                                    <div>
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Correctas</p>
                                        <p class="text-2xl sm:text-3xl font-black text-emerald-300">${correct}</p>
                                    </div>
                                    <div class="px-2">
                                        <p class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-1">Rendimiento</p>
                                        <p class="text-2xl sm:text-3xl font-black text-yellow-300">${successRate}%</p>

                    </div>

                    <!-- TABLERO VISIBLE Y SCROLLABLE -->
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200/60 dark:border-slate-800 p-6 md:p-8">
                        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                <svg class="w-5 h-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                                Tablero General
                            </h2>
                            <div class="flex gap-4 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700"></div> Pendiente</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-100 dark:bg-emerald-900/40 border border-emerald-300 dark:border-emerald-800"></div> Correcta</div>
                                <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-rose-100 dark:bg-rose-900/40 border border-rose-300 dark:border-rose-800"></div> Incorrecta</div>
                            </div>
                        </div>
                        
                        <div class="grid gap-2 sm:gap-3 grid-cols-[repeat(auto-fill,minmax(42px,1fr))] sm:grid-cols-[repeat(auto-fill,minmax(48px,1fr))] p-1">
                            ${renderGridHTML(null)}
                        </div>
                    </div>

                    <!-- SIGUIENTE LINK -->
                    <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end pb-8">
                        <a href="AE58612GYOE.html" class="bg-slate-800 dark:bg-slate-800 hover:bg-slate-900 dark:hover:bg-slate-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                            Siguiente EXAMEN 
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        function displayQuestion(qId) {
            const displayArea = document.getElementById('module-display');
            const progressContainer = document.getElementById('progress-container');
            const dashboardBtn = document.getElementById('dashboard-button');
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (!displayArea) return;
            
            displayArea.classList.add('opacity-0');

            setTimeout(() => {
                currentQuestionId = qId ? parseInt(qId) : null;
                saveProgress();

                if (!currentQuestionId) {
                    progressContainer.classList.add('hidden');
                    dashboardBtn.classList.add('hidden');
                    menuToggle.classList.add('hidden');
                    
                    // Asegurar que el sidebar se oculte en la pantalla de inicio en escritorio
                    sidebar.classList.remove('lg:translate-x-0');
                    document.getElementById('main-content').classList.remove('lg:ml-80');
                    
                    renderSidebarGrid();
                    displayWelcomeScreen();
                    displayArea.classList.remove('opacity-0');
                    document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                
                // Mostrar botones superiores (Izquierda y Derecha) al entrar a la pregunta
                dashboardBtn.classList.remove('hidden');
                menuToggle.classList.remove('hidden');
                progressContainer.classList.remove('hidden');
                
                // Alineación del botón dashboard según si el sidebar está abierto
                if (window.innerWidth >= 1024) {
                    // Desplegar automáticamente la barra al entrar a contestar en escritorio
                    sidebar.classList.add('lg:translate-x-0');
                    document.getElementById('main-content').classList.add('lg:ml-80');

                    if (sidebar.classList.contains('lg:translate-x-0')) {
                        dashboardBtn.classList.add('lg:left-[22rem]');
                        dashboardBtn.classList.remove('lg:left-8');
                    } else {
                        dashboardBtn.classList.remove('lg:left-[22rem]');
                        dashboardBtn.classList.add('lg:left-8');
                    }
                } else {
                    // Ocultar Sidebar en Móvil al entrar a la pregunta
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
                
                const qData = questionsData.find(q => q.id === currentQuestionId);
                if (!qData) return displayQuestion(null);
                
                const qState = userProgress[currentQuestionId];
                if (qState && qState.answered) renderAnsweredQuestion(qData, qState);
                else renderActiveQuestion(qData);

                renderSidebarGrid();
                displayArea.classList.remove('opacity-0');
                
                document.getElementById('main-content').scrollTo(0, 0);
            }, 150); 
        }

        function renderActiveQuestion(qData) {
            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0">
                    
                    <div class="flex mb-4">
                        <span class="inline-block bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-pink-100 dark:border-pink-800/50">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <form id="q-form-${qData.id}" class="space-y-3">
                        ${qData.options.map((opt, i) => `
                            <label class="flex items-start p-3 sm:p-4 border border-slate-200 dark:border-slate-700/80 rounded-xl cursor-pointer transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50 has-[:checked]:bg-pink-50 has-[:checked]:border-pink-400 dark:has-[:checked]:bg-pink-900/10 shadow-sm hover:shadow">
                                <input type="radio" name="option" value="${i}" class="mt-0.5 h-4 w-4 text-pink-600 focus:ring-pink-500 border-slate-300 dark:border-slate-600 cursor-pointer">
                                <span class="ml-3 text-sm sm:text-[15px] text-slate-700 dark:text-slate-200 font-medium leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                        
                        <div class="pt-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 mt-6">
                            <button type="button" onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                Atrás
                            </button>
                            <button type="button" onclick="submitAnswer(${qData.id})" class="bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-pink-600 dark:hover:bg-pink-500 dark:hover:text-white transition-colors text-sm uppercase tracking-wider">
                                Validar
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function renderAnsweredQuestion(qData, qState) {
            const isCorrect = qState.isCorrect;
            const userAnswer = qState.selectedOption;
            const currentIndex = questionsData.findIndex(q => q.id === qData.id);
            const nextQuestion = currentIndex + 1 < questionsData.length ? questionsData[currentIndex + 1] : null;

            let html = `
                <div class="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] shadow-sm border-t-[5px] border-b border-l border-r border-slate-200 dark:border-slate-800 max-w-4xl mx-auto mt-0 ${isCorrect ? '!border-t-emerald-500' : '!border-t-rose-500'}">
                    
                    <div class="flex items-start mb-4">
                        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-lg text-[10px] sm:text-[11px] font-bold tracking-widest uppercase border border-slate-200 dark:border-slate-700">
                            Pregunta ${qData.id}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-xl font-bold text-slate-800 dark:text-slate-100 mb-6 leading-snug">${qData.question}</h2>
                    
                    <div class="space-y-3 mb-6">
                        ${qData.options.map((opt, i) => {
                            let classes = "flex items-start p-3 sm:p-4 border rounded-xl ";
                            let icon = "";
                            
                            if (i === qData.answer) {
                                classes += "bg-emerald-50 border-emerald-300 dark:bg-emerald-900/20 dark:border-emerald-700 shadow-sm";
                                icon = `<svg class="w-5 h-5 text-emerald-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                            } else if (i === userAnswer) {
                                classes += "bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800 opacity-90";
                                icon = `<svg class="w-5 h-5 text-rose-500 ml-auto flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                            } else {
                                classes += "bg-slate-50 border-slate-200 dark:bg-slate-800/50 dark:border-slate-700 opacity-50";
                            }

                            return `
                                <div class="${classes}">
                                    <span class="text-sm sm:text-[15px] font-medium leading-snug pr-4 ${i === qData.answer ? 'text-emerald-800 dark:text-emerald-200' : (i === userAnswer ? 'text-rose-800 dark:text-rose-200' : 'text-slate-600 dark:text-slate-400')}">${opt}</span>
                                    ${icon}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <!-- JUSTIFICACIÓN -->
                    <div class="bg-blue-50 dark:bg-slate-800/80 border border-blue-100 dark:border-slate-700 rounded-xl p-4 sm:p-5 mb-6">
                        <h4 class="font-bold text-blue-900 dark:text-blue-400 mb-2 text-[11px] uppercase tracking-widest flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Justificación Clínica
                        </h4>
                        <p class="text-slate-700 dark:text-slate-300 text-xs sm:text-sm leading-relaxed mb-3">${qData.justification}</p>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest border-t border-blue-200/50 dark:border-slate-700 pt-3">
                            <span class="font-bold">Fuente:</span> ${qData.source}
                        </p>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-slate-100 dark:border-slate-800 mt-6">
                        <button onclick="goToPreviousQuestion(${qData.id})" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-300 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            Atrás
                        </button>
                        ${nextQuestion ? `
                            <button onclick="displayQuestion(${nextQuestion.id})" class="bg-gradient-to-r from-pink-600 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider flex items-center gap-2">
                                Siguiente
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        ` : `
                            <button onclick="displayQuestion(null)" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors text-sm uppercase tracking-wider">
                                Finalizar
                            </button>
                        `}
                    </div>
                </div>
            `;
            document.getElementById('module-display').innerHTML = html;
        }

        function submitAnswer(qId) {
            const form = document.getElementById(`q-form-${qId}`);
            if(!form) return;
            const selected = form.querySelector('input[name="option"]:checked');
            if (!selected) return;

            const val = parseInt(selected.value);
            const qData = questionsData.find(q => q.id === qId);

            userProgress[qId] = {
                answered: true,
                selectedOption: val,
                isCorrect: val === qData.answer
            };

            saveProgress();
            updateProgressBar();
            renderAnsweredQuestion(qData, userProgress[qId]);
            renderSidebarGrid();
            document.getElementById('main-content').scrollTo(0, 0);
        }

        function updateProgressBar() {
            const total = questionsData.length; 
            const ans = Object.keys(userProgress).filter(id => userProgress[id].answered).length;
            const pct = total > 0 ? Math.round((ans / total) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if (bar) { 
                bar.style.width = pct + '%'; 
                bar.textContent = pct > 0 ? pct + '%' : ''; // Solo muestra el número si es mayor a 0
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('gyoHUProgress', JSON.stringify(userProgress));
                if(currentQuestionId) localStorage.setItem('gyoHULastQId', currentQuestionId);
                else localStorage.removeItem('gyoHULastQId');
            } catch(e) {}
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('gyoHUProgress');
                userProgress = saved ? JSON.parse(saved) : {};
            } catch(e) { userProgress = {}; }
            updateProgressBar();
        }

        function loadTheme() {
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moon-icon').classList.remove('hidden');
                document.getElementById('sun-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moon-icon').classList.add('hidden');
                document.getElementById('sun-icon').classList.remove('hidden');
            }
        }
        
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        }
    </script>
